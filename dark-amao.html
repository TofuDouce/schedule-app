<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>阿毛之塔 - 官方鑑定版</title>
<style>
:root { 
    --gold: #f1c40f; 
    --epic: #a335ee; 
    --legendary: #ff4500; 
    --bg: #0d0d1a; 
}
body { margin:0; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); color: #fff; text-align: center; }

/* --- 霸氣標題區 --- */
.header-container {
    padding: 30px 0 20px 0;
    background: linear-gradient(to bottom, #1a1a2e, #0d0d1a);
    border-bottom: 2px solid var(--gold);
    box-shadow: 0 10px 30px rgba(0,0,0,0.8);
}
.main-title {
    font-size: 2.5rem;
    font-weight: 900;
    letter-spacing: 8px;
    margin: 0;
    padding: 0;
    background: linear-gradient(to bottom, #fff 30%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 15px rgba(241,196,15,0.6));
    position: relative;
    display: inline-block;
}
.sub-title {
    font-size: 0.8rem;
    color: var(--gold);
    letter-spacing: 4px;
    margin-top: 5px;
    opacity: 0.8;
    text-transform: uppercase;
}
.title-decoration {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    margin-top: 10px;
}
.line { width: 50px; height: 1px; background: var(--gold); }
/* --- 標題結束 --- */

.status-bar { display: flex; justify-content: space-around; background: rgba(0,0,0,0.5); padding: 12px; font-size: 14px; border-bottom: 1px solid #333; }
.highlight { color: var(--gold); font-weight: bold; text-shadow: 0 0 8px var(--gold); }

.canvas-wrap { max-width: 350px; margin: 20px auto; border: 5px solid #222; border-radius: 20px; overflow: hidden; background: #000; box-shadow: 0 0 40px rgba(0,0,0,1); }
canvas { width: 100%; display: block; }

.btn-summon { 
    background: radial-gradient(circle, #ffcc00, #ff9900); 
    width: 85px; height: 85px; border-radius: 50%; margin: 15px auto;
    border: 5px solid #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 35px; transition: 0.2s; box-shadow: 0 0 25px var(--gold);
}
.btn-summon:active { transform: scale(0.9) rotate(15deg); }

.code-box { background: rgba(255,255,255,0.03); padding: 20px; margin: 15px; border-radius: 20px; border: 1px solid #333; }
input { background: #000; border: 1px solid #555; color: var(--gold); padding: 12px; border-radius: 10px; width: 80%; margin-bottom: 12px; text-align: center; font-size: 16px; font-weight: bold; }
.btn-code { background: #fff; color: #000; border: none; padding: 12px 25px; border-radius: 10px; font-weight: 900; cursor: pointer; width: 85%; transition: 0.3s; }
.btn-code:hover { background: var(--gold); }

#msgBox { margin-top: 10px; font-size: 13px; color: #666; font-weight: bold; }
</style>
</head>
<body>

<div class="header-container">
    <div class="main-title">阿毛之塔</div>
    <div class="sub-title">TOWER OF AMAO</div>
    <div class="title-decoration">
        <div class="line"></div>
        <span style="color: var(--gold); font-size: 12px;">♦ 稱號召喚祭壇 ♦</span>
        <div class="line"></div>
    </div>
</div>

<div class="status-bar">
    <div>⚡ 剩餘能量: <span id="draws" class="highlight">10</span></div>
    <div>🏰 攀登層數: <span id="layer" class="highlight">0</span></div>
</div>

<div class="canvas-wrap">
    <canvas id="canvas" width="600" height="800"></canvas>
</div>

<div class="btn-summon" onclick="doSummon()">⚔️</div>

<div class="code-box">
    <input type="text" id="codeInput" placeholder="在此輸入遠古密語...">
    <br>
    <button class="btn-code" onclick="verifyCode()">啟 動 契 約</button>
    <div id="msgBox"></div>
</div>

<script>
// 邏輯部分延續之前的 888 抽與每日序號機制
const canvas = document.getElementById("canvas"), ctx = canvas.getContext("2d");
let gameData = { draws: 10, layer: 0 };
const SPECIAL_CODE = "AMAO888";

function getDailyCode() {
    const n = new Date();
    return `AMO${(n.getMonth()+1).toString().padStart(2,'0')}${n.getDate().toString().padStart(2,'0')}`;
}

function verifyCode() {
    const input = document.getElementById("codeInput").value.trim().toUpperCase();
    const msg = document.getElementById("msgBox");
    const today = new Date().toDateString();

    if (input === SPECIAL_CODE) {
        gameData.draws += 888;
        msg.innerText = "✨ 獲得神話祝福：增加 888 抽！";
        msg.style.color = "#00ffff";
        updateUI();
        return;
    }

    if (input === getDailyCode()) {
        if (localStorage.getItem('claimed') === today) {
            msg.innerText = "❌ 今日已領取過每日福利。";
            msg.style.color = "#ff4444";
        } else {
            gameData.draws += 100;
            localStorage.setItem('claimed', today);
            msg.innerText = "✅ 每日契約達成：增加 100 抽！";
            msg.style.color = "#f1c40f";
            updateUI();
        }
    } else {
        msg.innerText = "❌ 密語錯誤，請再次確認。";
        msg.style.color = "#ff4444";
    }
}

function doSummon() {
    if (gameData.draws <= 0) { alert("能量耗盡！請輸入密語 AMAO888"); return; }
    gameData.draws--; gameData.layer++;
    updateUI();
    const r = Math.random();
    let res = { n: "N", c: "#fff" };
    if(r < 0.05) res = { n: "SSR", c: "#ff4500" };
    else if(r < 0.2) res = { n: "SR", c: "#a335ee" };
    drawCard(res);
}

function drawCard(rar) {
    ctx.fillStyle = "#0a0a12"; ctx.fillRect(0,0,600,800);
    ctx.strokeStyle = rar.c; ctx.lineWidth = 15; ctx.strokeRect(30,30,540,740);
    ctx.textAlign = "center";
    ctx.fillStyle = rar.c; ctx.font = "900 120px Impact";
    ctx.globalAlpha = 0.1; ctx.fillText(rar.n, 300, 450);
    ctx.globalAlpha = 1.0;
    ctx.fillStyle = "#fff"; ctx.font = "bold 45px sans-serif";
    ctx.fillText("阿毛認證 · 第 " + gameData.layer + " 層", 300, 300);
    ctx.fillStyle = rar.c; ctx.font = "900 80px sans-serif";
    ctx.shadowBlur = 20; ctx.shadowColor = rar.c;
    ctx.fillText(rar.n + " 級英雄", 300, 480);
    ctx.shadowBlur = 0;
}

function updateUI() {
    document.getElementById("draws").innerText = gameData.draws;
    document.getElementById("layer").innerText = gameData.layer;
}

window.onload = () => drawCard({n:"START", c: "#f1c40f"});
</script>
</body>
</html>
