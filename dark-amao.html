<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>阿毛的冒險食堂 - 傳奇稱號鑑定</title>
<style>
:root { --hunter-gold: #f39c12; --monster-green: #27ae60; --meat-brown: #a0522d; }
body{margin:0;font-family:"PingFang TC", "Microsoft JhengHei", sans-serif;background:#2c3e50; padding-bottom: 120px; color: #ecf0f1;}
.header{background: linear-gradient(135deg, #a0522d, #2c3e50); color: #f1c40f; padding:25px; text-align:center; font-weight:900; font-size:1.6rem; letter-spacing: 3px; border-bottom: 4px solid #f1c40f;}
.container{max-width:520px; margin:auto; padding:10px;}
.canvas-section { position: sticky; top: 0; z-index: 100; background: #2c3e50; padding: 10px 0; }
.canvas-container { background:#1a1a1a; border-radius:15px; padding:10px; box-shadow: 0 0 25px rgba(0,0,0,0.5); max-width: 340px; margin: auto; border: 3px solid #7f8c8d; }
canvas{width:100%; border-radius:10px; display: block;}
.card{background: #34495e; border-radius:20px; padding:20px; margin-top:15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); text-align: center; border: 1px solid #7f8c8d;}
.magic-btn { 
    background: radial-gradient(circle, #e67e22, #d35400);
    border: 4px solid #f1c40f; border-radius: 50%; width: 130px; height: 130px; margin: 10px auto;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    cursor: pointer; transition: 0.2s; box-shadow: 0 0 20px rgba(241,196,15,0.4);
}
.magic-btn:active { transform: scale(0.9) rotate(-10deg); }
.icon-big { font-size: 55px; margin-bottom: 5px; }
.action-row{display:flex; gap:10px; position: fixed; bottom: 0; left:0; right:0; background: #1a1a1a; padding: 15px; border-top: 3px solid #f1c40f;}
button{flex:1; padding:15px; border:none; border-radius:12px; font-weight:bold; cursor:pointer; font-size: 1.1rem;}
.gold-btn{background: #f1c40f; color:#2c3e50;}
.gray-btn{background:#95a5a6; color:#fff;}
.shake { animation: shake 0.4s; }
@keyframes shake { 0%{transform:translate(0)} 25%{transform:translate(5px)} 50%{transform:translate(-5px)} 100%{transform:translate(0)} }
</style>
</head>
<body>

<div class="header">⚔️ 阿毛冒險食堂 🍖</div>

<div class="container">
    <div class="canvas-section">
        <div class="canvas-container">
            <canvas id="canvas" width="600" height="600"></canvas>
        </div>
    </div>
    <div class="card">
        <div class="magic-btn" onclick="rollDice()">
            <span id="magicIcon" class="icon-big">🍗</span>
            <span style="font-weight:bold; color:#fff; text-shadow: 1px 1px 2px #000;">出發獵食！</span>
        </div>
        <p style="font-size: 14px; color: #bdc3c7; margin-top: 10px;">★ 每次抽選皆是命定的羈絆 ★</p>
    </div>
</div>

<div class="action-row">
    <button class="gray-btn" onclick="location.reload()">重新整隊</button>
    <button class="gold-btn" onclick="showPreview()">領取公會名片</button>
</div>

<div id="previewModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center; flex-direction:column;" onclick="this.style.display='none'">
    <img id="previewImage" style="max-width:90%; border: 4px solid #f1c40f; border-radius: 15px;">
    <p style="color:#f1c40f; margin-top:20px; font-weight:bold;">長按圖片保存你的傳奇稱號 🏆</p>
</div>

<script>
const canvas = document.getElementById("canvas"), ctx = canvas.getContext("2d");

// --- 萬級組合詞庫 (形容詞 + 主體 + 封號) ---
const part1 = ["傳說中的", "永恆閃耀的", "剛烤好熟透的", "超越極限的", "被星辰選中的", "公會認證的", "大馬力輸出的", "絕對好吃的", "守護靈魂的", "滿載希望的", "被美食寵壞的", "踏破荒野的", "斬斷黑暗的", "陽光普照的", "被貓飯祝福的", "神入化的", "充滿鬥志的", "究極進化的", "幸運加持的", "無懈可擊的"];
const part2 = ["火龍燒肉", "全熟大肉", "多巴胺", "幻之秘境", "夢幻甜點", "黃金比例", "絕對強者", "艾露貓", "龍結晶", "美味獵人", "元氣補給", "獵人魂", "古代樹", "幸福暖流", "大劍豪", "貓車迴避", "增產肥料", "特急外送", "勇氣果實", "傳奇秘方"];
const part3 = ["大師", "鑑定者", "領航員", "捕獲手", "守護者", "開拓者", "藝術家", "王者", "指揮官", "冒險家", "美食專家", "傳承者", "首席官", "修煉者", "戰略家", "品味家", "導師", "教頭", "大領主", "執行長"];

const themes = [
    { bg: "#2c3e50", line: "#f1c40f", text: "#ffffff", sub: "公會特許" },
    { bg: "#1a0f00", line: "#e67e22", text: "#ffffff", sub: "稀少種" },
    { bg: "#002b36", line: "#2aa198", text: "#ffffff", sub: "古龍級" },
    { bg: "#2d3436", line: "#fab1a0", text: "#ffffff", sub: "特等席" }
];

let lastP = "阿毛幫你", lastS = "鑑定稱號";

function rollDice() {
    const btn = document.querySelector(".magic-btn");
    btn.classList.add("shake");
    setTimeout(()=>btn.classList.remove("shake"), 400);

    const icons = ["🍖", "⚔️", "🛡️", "🏹", "🐲", "🍱", "🐱", "💎"];
    document.getElementById("magicIcon").innerText = icons[Math.floor(Math.random() * icons.length)];

    // 隨機組合產生超過萬種可能
    const p1 = part1[Math.floor(Math.random() * part1.length)];
    const p2 = part2[Math.floor(Math.random() * part2.length)];
    const p3 = part3[Math.floor(Math.random() * part3.length)];
    
    lastP = p1;
    lastS = p2 + p3;
    draw();
}

function draw(){
    const theme = themes[Math.floor(Math.random() * themes.length)];
    ctx.fillStyle = theme.bg;
    ctx.fillRect(0, 0, 600, 600);

    // 繪製皮革質感邊框
    ctx.strokeStyle = theme.line;
    ctx.lineWidth = 10;
    ctx.strokeRect(30, 30, 540, 540);
    ctx.lineWidth = 2;
    ctx.strokeRect(45, 45, 510, 510);

    // 四角鉚釘裝飾
    ctx.fillStyle = theme.line;
    [ [30,30], [570,30], [30,570], [570,570] ].forEach(p => {
        ctx.beginPath(); ctx.arc(p[0], p[1], 15, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "#000"; ctx.stroke();
    });

    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    // 第一行
    ctx.font = `bold 42px "PingFang TC", sans-serif`;
    ctx.fillStyle = "rgba(255,255,255,0.9)";
    ctx.fillText(lastP, 300, 220);

    // 第二行 (自動縮放)
    let sSize = 95;
    ctx.font = `900 ${sSize}px "PingFang TC", sans-serif`;
    while(ctx.measureText(lastS).width > 480 && sSize > 30) {
        sSize -= 5;
        ctx.font = `900 ${sSize}px "PingFang TC", sans-serif`;
    }

    // 文字描邊與陰影
    ctx.shadowColor = theme.line;
    ctx.shadowBlur = 15;
    ctx.lineWidth = 8;
    ctx.strokeStyle = "#000";
    ctx.strokeText(lastS, 300, 350);
    ctx.fillStyle = theme.line;
    ctx.fillText(lastS, 300, 350);
    ctx.shadowBlur = 0;

    // 印章：阿毛認證
    ctx.save();
    ctx.translate(450, 480);
    ctx.rotate(-0.15);
    ctx.fillStyle = "rgba(255,255,255,0.15)";
    ctx.fillRect(-70, -30, 140, 60);
    ctx.strokeStyle = theme.line;
    ctx.lineWidth = 3;
    ctx.strokeRect(-70, -30, 140, 60);
    ctx.fillStyle = theme.line;
    ctx.font = "bold 20px sans-serif";
    ctx.fillText(theme.sub, 0, -10);
    ctx.fillText("阿毛認證", 0, 15);
    ctx.restore();
}

function showPreview() {
    document.getElementById("previewImage").src = canvas.toDataURL("image/png");
    document.getElementById("previewModal").style.display = "flex";
}
window.onload = draw;
</script>
</body>
</html>
