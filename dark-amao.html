<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>阿毛之塔 - 瘋狂 888 召喚祭</title>
<style>
:root { --gold: #f1c40f; --epic: #a335ee; --legendary: #ff4500; --bg: #0d0d1a; --super: #00ffff; }
body { margin:0; font-family: "PingFang TC", sans-serif; background: var(--bg); color: #fff; text-align: center; }
.header { background: #1a1a2e; color: var(--gold); padding: 15px; font-size: 1.5rem; font-weight: 900; border-bottom: 2px solid var(--gold); }

/* 狀態欄 */
.status-bar { display: flex; justify-content: space-around; background: rgba(0,0,0,0.5); padding: 10px; font-size: 14px; border-bottom: 1px solid #333; }
.highlight { color: var(--gold); font-weight: bold; text-shadow: 0 0 5px var(--gold); }

/* 畫布 */
.canvas-wrap { max-width: 350px; margin: 15px auto; position: relative; border: 4px solid #222; border-radius: 15px; overflow: hidden; background: #000; }
canvas { width: 100%; display: block; }

/* 按鈕 */
.btn-summon { 
    background: radial-gradient(circle, #ffcc00, #ff9900); 
    width: 80px; height: 80px; border-radius: 50%; margin: 10px auto;
    border: 4px solid #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 30px; transition: 0.2s; box-shadow: 0 0 20px var(--gold);
}
.btn-summon:active { transform: scale(0.9); }

/* 序號輸入區 */
.code-box { background: rgba(255,255,255,0.05); padding: 15px; margin: 15px; border-radius: 15px; border: 1px solid #444; }
input { background: #111; border: 1px solid var(--gold); color: #fff; padding: 10px; border-radius: 8px; width: 70%; margin-bottom: 10px; text-transform: uppercase; text-align: center; font-weight: bold;}
.btn-code { background: var(--gold); color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 5px; width: 75%; }

#msgBox { font-size: 13px; min-height: 1.5em; color: #888; font-weight: bold; }

/* 888 噴發特效 */
.super-glow { animation: super-glow 0.5s infinite alternate; }
@keyframes super-glow { from { box-shadow: 0 0 10px var(--super); } to { box-shadow: 0 0 30px var(--super); } }
</style>
</head>
<body>

<div class="header">🏰 阿毛之塔：無限進化</div>

<div class="status-bar">
    <div>召喚能量: <span id="draws" class="highlight">10</span></div>
    <div>目前層數: <span id="layer" class="highlight">0</span></div>
</div>

<div class="canvas-wrap" id="canvasWrap">
    <canvas id="canvas" width="600" height="800"></canvas>
</div>

<div class="btn-summon" id="summonBtn" onclick="doSummon()">⚔️</div>

<div class="code-box">
    <input type="text" id="codeInput" placeholder="輸入遠古密語">
    <br>
    <button class="btn-code" onclick="verifyCode()">啟動契約</button>
    <div id="msgBox">輸入每日密語 或 神話序號</div>
</div>

<script>
const canvas = document.getElementById("canvas"), ctx = canvas.getContext("2d");
let gameData = { draws: 10, layer: 0 };

// 序號定義
const SPECIAL_INFINITE_CODE = "AMAO888"; // 888抽不限人使用

function getDailyCode() {
    const now = new Date();
    return `AMO${(now.getMonth() + 1).toString().padStart(2, '0')}${now.getDate().toString().padStart(2, '0')}`;
}

function verifyCode() {
    const input = document.getElementById("codeInput").value.trim().toUpperCase();
    const msg = document.getElementById("msgBox");
    const todayStr = new Date().toDateString();

    // 1. 先判定是否為 888 序號
    if (input === SPECIAL_INFINITE_CODE) {
        gameData.draws += 888;
        msg.innerText = "🌟 神話契約達成！獲得 888 抽！";
        msg.style.color = "#00ffff";
        document.getElementById("canvasWrap").classList.add("super-glow");
        updateUI();
        return;
    }

    // 2. 判定是否為 每日序號
    if (input === getDailyCode()) {
        if (localStorage.getItem('lastClaimDate') === todayStr) {
            msg.innerText = "❌ 今日已領取過每日密語囉！";
            msg.style.color = "#ff4444";
        } else {
            gameData.draws += 100;
            localStorage.setItem('lastClaimDate', todayStr);
            msg.innerText = "✅ 每日密語正確！增加 100 抽！";
            msg.style.color = "#f1c40f";
            updateUI();
        }
    } else {
        msg.innerText = "❌ 密語無效，塔的深處一片寂靜...";
        msg.style.color = "#ff4444";
    }
}

function doSummon() {
    if (gameData.draws <= 0) {
        alert("能量耗盡！請輸入密語：AMAO888 領取福利！");
        return;
    }
    gameData.draws--;
    gameData.layer++;
    updateUI();
    
    // 抽獎機率與效果
    const roll = Math.random();
    let res = { n: "N", c: "#ffffff" };
    if(roll < 0.05) res = { n: "SSR", c: "#ff4500" };
    else if(roll < 0.20) res = { n: "SR", c: "#a335ee" };

    drawTower(res);
}

function drawTower(rar) {
    ctx.fillStyle = "#0a0a12"; ctx.fillRect(0,0,600,800);
    ctx.strokeStyle = rar.c; ctx.lineWidth = 15; ctx.strokeRect(30,30,540,740);
    
    ctx.textAlign = "center";
    ctx.shadowBlur = 0; ctx.fillStyle = "#555"; ctx.font = "30px serif";
    ctx.fillText(`— TOWER LAYER : ${gameData.layer} —`, 300, 120);

    ctx.shadowBlur = 25; ctx.shadowColor = rar.c;
    ctx.fillStyle = "#fff"; ctx.font = "bold 50px sans-serif";
    ctx.fillText("獲得傳奇稱號", 300, 350);
    
    ctx.fillStyle = rar.c; ctx.font = "900 90px Impact";
    ctx.fillText(rar.n, 300, 500);
}

function updateUI() {
    document.getElementById("draws").innerText = gameData.draws;
    document.getElementById("layer").innerText = gameData.layer;
}

window.onload = () => drawTower({n:"READY", c: "#f1c40f"});
</script>
</body>
</html>
