<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>幻彩星辰 - 驚喜抽卡</title>
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'PingFang TC', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }
        .header {
            margin: 30px;
            text-align: center;
        }
        #currency-display {
            background: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-weight: bold;
            color: #ff4757;
            font-size: 1.2rem;
        }
        #card-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            width: 90%;
            max-width: 1000px;
            margin-bottom: 40px;
        }
        .card {
            width: 120px;
            height: 180px;
            background: white;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            transform: scale(0);
            animation: popIn 0.5s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid transparent;
        }
        @keyframes popIn { to { transform: scale(1); } }
        
        .card.UR { border-color: #ff9f43; background: #fffaf0; animation: glow 1.5s infinite alternate; }
        .card.SSR { border-color: #ff4757; background: #fff5f5; }
        .card.SR { border-color: #54a0ff; background: #f0f7ff; }
        
        @keyframes glow { 
            from { box-shadow: 0 0 10px #ff9f43; } 
            to { box-shadow: 0 0 25px #ff9f43; } 
        }

        .controls { margin-bottom: 50px; }
        .btn {
            padding: 15px 35px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin: 0 10px;
            transition: 0.3s;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .btn-single { background: #54a0ff; color: white; }
        .btn-multi { background: #ff4757; color: white; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .btn:active { transform: translateY(0); }

        .reward-name { font-weight: bold; margin-top: 10px; color: #2f3542; text-align: center; padding: 0 5px; }
        .tier-tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; color: white; margin-bottom: 10px; }
        .tag-UR { background: #ff9f43; }
        .tag-SSR { background: #ff4757; }
        .tag-SR { background: #54a0ff; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="color: #2f3542; letter-spacing: 3px;">✨ 夢幻卡片慶典 ✨</h1>
    <div id="currency-display">💎 剩餘鑽石：<span id="diamonds">5000</span></div>
</div>

<div id="card-container"></div>

<div class="controls">
    <button class="btn btn-single" onclick="pull(1)">單抽一次 (100)</button>
    <button class="btn btn-multi" onclick="pull(10)">豪華十連抽 (900)</button>
</div>

<script>
    let diamonds = 5000;
    const container = document.getElementById('card-container');
    const rewards = [
        { name: "閃亮小狗", tier: "UR", icon: "🐶", chance: 2 },
        { name: "超級好運", tier: "SSR", icon: "🍀", chance: 8 },
        { name: "美味蛋糕", tier: "SSR", icon: "🍰", chance: 10 },
        { name: "彩色氣球", tier: "SR", icon: "🎈", chance: 30 },
        { name: "幸運星", tier: "SR", icon: "⭐", chance: 50 }
    ];

    function pull(times) {
        const cost = times === 10 ? 900 : 100;
        if (diamonds < cost) return alert("鑽石不足，明天再來玩吧！");
        
        diamonds -= cost;
        document.getElementById('diamonds').innerText = diamonds;
        container.innerHTML = ''; // 清除舊卡片

        for (let i = 0; i < times; i++) {
            setTimeout(() => {
                const result = getRandomReward();
                createCard(result);
            }, i * 100); // 逐一彈出的效果
        }
    }

    function getRandomReward() {
        const rand = Math.random() * 100;
        let cumulative = 0;
        for (const r of rewards) {
            cumulative += r.chance;
            if (rand <= cumulative) return r;
        }
        return rewards[rewards.length - 1];
    }

    function createCard(item) {
        const card = document.createElement('div');
        card.className = `card ${item.tier}`;
        card.innerHTML = `
            <div class="tier-tag tag-${item.tier}">${item.tier}</div>
            <div style="font-size: 3rem;">${item.icon}</div>
            <div class="reward-name">${item.name}</div>
        `;
        container.appendChild(card);
    }
</script>

</body>
</html>
