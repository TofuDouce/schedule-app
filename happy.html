<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>夢幻推幣機 - Coin Pusher</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #f0f0f2;
            font-family: 'PingFang TC', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }
        #game-info {
            margin-top: 20px;
            padding: 10px 30px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            gap: 20px;
            font-weight: bold;
            color: #7a7387;
        }
        canvas {
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-top: 20px;
            border-radius: 10px;
            background: #e0e0e4;
        }
        .instructions {
            margin-top: 15px;
            color: #999;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div id="game-info">
    <div>🪙 剩餘金幣：<span id="coins">50</span></div>
    <div>✨ 分數：<span id="score">0</span></div>
</div>

<div class="instructions">點擊上方區域投幣，把金幣推下來吧！</div>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Events, Body } = Matter;

    // 設定
    let coinCount = 50;
    let score = 0;
    const canvasWidth = 400;
    const canvasHeight = 600;

    // 初始化引擎
    const engine = Engine.create();
    const render = Render.create({
        element: document.body,
        engine: engine,
        options: {
            width: canvasWidth,
            height: canvasHeight,
            wireframes: false,
            background: '#dcdce0'
        }
    });

    // 建立邊界
    const leftWall = Bodies.rectangle(10, 300, 20, 600, { isStatic: true, render: { fillStyle: '#b8b8be' } });
    const rightWall = Bodies.rectangle(390, 300, 20, 600, { isStatic: true, render: { fillStyle: '#b8b8be' } });
    const bottomHole = Bodies.rectangle(200, 610, 400, 20, { isStatic: true, isSensor: true, label: 'scoreZone' });

    // 推板 (Pusher)
    const pusher = Bodies.rectangle(200, 450, 360, 100, { 
        isStatic: true, 
        render: { fillStyle: '#a89fbb' } 
    });

    Composite.add(engine.world, [leftWall, rightWall, bottomHole, pusher]);

    // 推板移動邏輯
    let pusherDirection = 1;
    Events.on(engine, 'beforeUpdate', () => {
        let py = pusher.position.y;
        if (py > 500) pusherDirection = -1;
        if (py < 400) pusherDirection = 1;
        Body.setPosition(pusher, { x: 200, y: py + (0.5 * pusherDirection) });
    });

    // 投幣功能
    window.addEventListener('mousedown', (e) => {
        if (coinCount <= 0) return;
        if (e.clientY < 200) { // 限制投幣區域
            dropCoin(e.clientX - window.innerWidth/2 + 200);
        }
    });

    function dropCoin(x) {
        const coin = Bodies.circle(x, 50, 15, {
            restitution: 0.5,
            friction: 0.05,
            label: 'coin',
            render: { fillStyle: '#ffcc33', strokeStyle: '#e6b800', lineWidth: 2 }
        });
        Composite.add(engine.world, coin);
        coinCount--;
        updateDisplay();
    }

    // 偵測得分
    Events.on(engine, 'collisionStart', (event) => {
        event.pairs.forEach(pair => {
            if (pair.bodyA.label === 'scoreZone' || pair.bodyB.label === 'scoreZone') {
                const coin = pair.bodyA.label === 'coin' ? pair.bodyA : pair.bodyB;
                if (coin.label === 'coin') {
                    score += 10;
                    Composite.remove(engine.world, coin);
                    updateDisplay();
                }
            }
        });
    });

    function updateDisplay() {
        document.getElementById('coins').innerText = coinCount;
        document.getElementById('score').innerText = score;
    }

    Render.run(render);
    const runner = Runner.create();
    Runner.run(runner, engine);
</script>

</body>
</html>
