<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>✨ All In ETF ✨</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    sans-serif;
}

body{

    min-height:100vh;

    overflow-x:hidden;

    background:
    linear-gradient(
    135deg,
    #ffd6ec 0%,
    #ffe7c7 25%,
    #d9ffd9 50%,
    #d6ecff 75%,
    #efd9ff 100%
    );

    padding:24px;

    color:#444;
}

.bg{

    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:-1;
}

.blob{

    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    opacity:.4;
}

.b1{
    width:320px;
    height:320px;
    background:#ff9dcf;
    top:-100px;
    left:-50px;
}

.b2{
    width:280px;
    height:280px;
    background:#9fe8ff;
    bottom:-90px;
    right:-50px;
}

.b3{
    width:260px;
    height:260px;
    background:#fff1a8;
    top:35%;
    left:45%;
}

.container{

    max-width:760px;
    margin:auto;
}

.title{

    text-align:center;
    margin-bottom:30px;
}

.title h1{

    font-size:44px;
    font-weight:900;

    background:
    linear-gradient(
    90deg,
    #ff67b2,
    #ffb24d,
    #67d98a,
    #68a8ff,
    #c07cff
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.title p{

    margin-top:14px;

    line-height:1.9;

    color:#666;

    font-size:17px;
}

.card{

    background:
    rgba(255,255,255,.72);

    backdrop-filter:blur(18px);

    border-radius:34px;

    padding:28px;

    box-shadow:
    0 15px 40px rgba(0,0,0,.08);

    border:
    2px solid rgba(255,255,255,.7);

    margin-bottom:24px;
}

.label{

    display:block;

    margin-bottom:10px;

    font-size:15px;

    font-weight:800;

    color:#666;
}

.input{

    width:100%;

    height:64px;

    border:none;

    border-radius:24px;

    padding:0 20px;

    font-size:20px;

    outline:none;

    background:white;

    margin-bottom:20px;

    box-shadow:
    inset 0 0 0 2px #f2f2f2;
}

.input:focus{

    box-shadow:
    inset 0 0 0 2px #ff9dcb;
}

button{

    width:100%;

    height:68px;

    border:none;

    border-radius:26px;

    cursor:pointer;

    font-size:22px;

    font-weight:900;

    color:white;

    background:
    linear-gradient(
    90deg,
    #ff7cbd,
    #ffbf6c,
    #76de91,
    #77aaff,
    #c687ff
    );

    background-size:300%;

    animation:rainbow 6s linear infinite;

    transition:.2s;
}

button:hover{

    transform:
    translateY(-3px)
    scale(1.01);
}

@keyframes rainbow{

    0%{
        background-position:0%;
    }

    100%{
        background-position:300%;
    }
}

.loading{

    display:none;

    text-align:center;

    margin-top:18px;

    font-weight:800;

    color:#666;
}

.result{

    display:none;

    animation:fade .45s ease;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.hero{

    border-radius:32px;

    padding:34px;

    text-align:center;

    color:white;

    background:
    linear-gradient(
    135deg,
    #ff7dbf,
    #ffc56f,
    #7ce49e,
    #7eb0ff,
    #cf90ff
    );

    margin-bottom:20px;
}

.hero small{

    font-size:16px;
    opacity:.92;
}

.big{

    font-size:58px;
    font-weight:900;
    margin:12px 0;
}

.stock{

    margin-top:10px;
    font-size:18px;
}

.grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:18px;

    margin-bottom:18px;
}

.box{

    background:white;

    border-radius:26px;

    padding:24px;

    box-shadow:
    0 10px 25px rgba(0,0,0,.05);
}

.box h3{

    color:#888;

    margin-bottom:14px;

    font-size:15px;
}

.value{

    font-size:34px;

    font-weight:900;

    margin-bottom:8px;
}

.green{

    color:#00b56d;

    font-weight:800;
}

.ai{

    background:white;

    border-radius:26px;

    padding:26px;

    line-height:2;

    font-size:17px;

    box-shadow:
    0 10px 25px rgba(0,0,0,.05);
}

.footer{

    text-align:center;

    margin-top:24px;

    color:#777;

    font-size:14px;
}

@media(max-width:640px){

    .title h1{
        font-size:34px;
    }

    .grid{
        grid-template-columns:1fr;
    }

    .big{
        font-size:42px;
    }
}

</style>
</head>

<body>

<div class="bg">

    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>

</div>

<div class="container">

    <div class="title">

        <h1>
            ✨ All In ETF ✨
        </h1>

        <p>
            每次想買東西的時候，
            <br>
            看看這筆錢如果投入 ETF，
            未來可能會變成多少 💖
        </p>

    </div>

    <div class="card">

        <label class="label">
            💸 商品價格
        </label>

        <input
        id="price"
        class="input"
        type="number"
        placeholder="例如 47508">

        <label class="label">
            🌈 ETF 代號
        </label>

        <input
        id="stockCode"
        class="input"
        value="0050">

        <button onclick="calculate()">
            ✨ 幫我算算看 ✨
        </button>

        <div class="loading" id="loading">
            正在抓最新 ETF 資料...
        </div>

    </div>

    <div class="result" id="result">

        <div class="hero">

            <small>
                這筆錢可以買進
            </small>

            <div class="big" id="shares">
                0 股
            </div>

            <div class="stock" id="stockName">
                ETF
            </div>

            <div class="stock">
                即時股價：
                NT$
                <span id="stockPrice">
                    0
                </span>
            </div>

            <div class="stock">
                預設歷史年化：
                <span id="annualReturn">
                    12%
                </span>
            </div>

        </div>

        <div class="grid">

            <div class="box">

                <h3>
                    🌸 3 個月後可能變成
                </h3>

                <div class="value" id="future3m">
                    NT$0
                </div>

                <div class="green" id="gain3m">
                    +0%
                </div>

            </div>

            <div class="box">

                <h3>
                    🌈 1 年後可能變成
                </h3>

                <div class="value" id="future1y">
                    NT$0
                </div>

                <div class="green" id="gain1y">
                    +0%
                </div>

            </div>

        </div>

        <div class="ai" id="aiText"></div>

    </div>

    <div class="footer">
        ✨ 僅供娛樂與投資靈感用途 ✨
    </div>

</div>

<script>

function format(num){

    return Number(num).toLocaleString(
    "zh-TW",
    {
        maximumFractionDigits:0
    });
}

const annualData = {

    "0050":12,
    "006208":11,
    "0056":9,
    "00878":8,
    "00919":10,
    "QQQ":15,
    "VOO":12,
    "SPY":11
};

async function getStockData(code){

    try{

        const isTW =
        /^\d+$/.test(code);

        let url = "";

        if(isTW){

            url =
            `https://www.twse.com.tw/exchangeReport/STOCK_DAY?response=json&stockNo=${code}`;

            const response =
            await fetch(url);

            const data =
            await response.json();

            if(!data.data || !data.data.length){

                return null;
            }

            const latest =
            data.data[
            data.data.length - 1
            ];

            const price =
            Number(
            latest[6]
            .replace(/,/g,"")
            );

            return {

                name:code,

                price:price
            };

        }else{

            return null;
        }

    }catch(err){

        return null;
    }
}

function getAIMessage(
price,
future,
stock
){

    const diff =
    future - price;

    const messages = [

        `😭 這次買了可能只快樂幾天，
        但如果投入 ${stock}，
        未來的你可能會很感謝現在忍住的自己。`,

        `🌈 ${format(price)} 元，
        對商家來說只是一次消費，
        但對未來的你，
        可能是一筆開始成長的資產。`,

        `✨ 有些東西買完三天就膩了，
        但投資可能會陪你好多年。`,

        `💖 如果把這筆錢投入 ETF，
        一年後可能多出
        ${format(diff)} 元。`,

        `🧋 你不是不能買，
        只是現在的你，
        正在替未來的自己存快樂。`
    ];

    return messages[
    Math.floor(
    Math.random() * messages.length
    )];
}

async function calculate(){

    const price =
    Number(
    document.getElementById("price").value
    );

    const code =
    document
    .getElementById("stockCode")
    .value
    .trim()
    .toUpperCase();

    if(!price){

        alert("請輸入商品價格 ✨");

        return;
    }

    document
    .getElementById("loading")
    .style.display = "block";

    const stock =
    await getStockData(code);

    document
    .getElementById("loading")
    .style.display = "none";

    if(!stock){

        alert("抓不到 ETF 資料 😭");

        return;
    }

    const annual =
    annualData[code] || 10;

    const annualRate =
    annual / 100;

    const shares =
    price / stock.price;

    const future3m =
    price *
    Math.pow(
    1 + annualRate,
    0.25
    );

    const future1y =
    price *
    (1 + annualRate);

    const gain3m =
    (
    (future3m - price)
    / price * 100
    ).toFixed(1);

    const gain1y =
    (
    (future1y - price)
    / price * 100
    ).toFixed(1);

    document
    .getElementById("shares")
    .innerText =
    shares.toFixed(2) + " 股";

    document
    .getElementById("stockName")
    .innerText =
    `${code}`;

    document
    .getElementById("stockPrice")
    .innerText =
    stock.price;

    document
    .getElementById("annualReturn")
    .innerText =
    annual + "%";

    document
    .getElementById("future3m")
    .innerText =
    "NT$ " +
    format(future3m);

    document
    .getElementById("future1y")
    .innerText =
    "NT$ " +
    format(future1y);

    document
    .getElementById("gain3m")
    .innerText =
    "+" + gain3m + "%";

    document
    .getElementById("gain1y")
    .innerText =
    "+" + gain1y + "%";

    document
    .getElementById("aiText")
    .innerHTML =
    getAIMessage(
    price,
    future1y,
    code
    );

    document
    .getElementById("result")
    .style.display = "block";

    window.scrollTo({

        top:
        document.body.scrollHeight,

        behavior:"smooth"
    });
}

</script>

</body>
</html>
