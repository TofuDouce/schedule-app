<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>🌈 ETF 彩虹消費勸退機 ✨</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    sans-serif;
}

body{

    min-height:100vh;

    overflow-x:hidden;

    background:
    linear-gradient(
    135deg,
    #ffd7ef 0%,
    #ffe7c8 25%,
    #d8ffd9 50%,
    #d8ecff 75%,
    #f0d9ff 100%
    );

    padding:24px;

    color:#444;
}

.bg{

    position:fixed;

    inset:0;

    overflow:hidden;

    z-index:-1;
}

.blob{

    position:absolute;

    border-radius:50%;

    filter:blur(80px);

    opacity:.45;
}

.b1{
    width:320px;
    height:320px;
    background:#ff9dcb;
    top:-100px;
    left:-50px;
}

.b2{
    width:280px;
    height:280px;
    background:#a9e9ff;
    bottom:-80px;
    right:-40px;
}

.b3{
    width:260px;
    height:260px;
    background:#fff3a3;
    top:35%;
    left:45%;
}

.container{

    max-width:760px;

    margin:auto;
}

.hero-title{

    text-align:center;

    margin-bottom:28px;
}

.hero-title h1{

    font-size:42px;

    font-weight:900;

    background:
    linear-gradient(
    90deg,
    #ff68b3,
    #ffb34d,
    #67d986,
    #6ca8ff,
    #c57cff
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero-title p{

    margin-top:12px;

    line-height:1.8;

    color:#666;
}

.card{

    background:
    rgba(255,255,255,.72);

    backdrop-filter:blur(18px);

    border-radius:32px;

    padding:28px;

    box-shadow:
    0 15px 40px rgba(0,0,0,.08);

    border:
    2px solid rgba(255,255,255,.7);

    margin-bottom:22px;
}

.label{

    display:block;

    margin-bottom:10px;

    font-size:15px;

    font-weight:800;

    color:#666;
}

.input{

    width:100%;

    height:62px;

    border:none;

    border-radius:22px;

    padding:0 20px;

    font-size:20px;

    outline:none;

    margin-bottom:18px;

    background:white;

    box-shadow:
    inset 0 0 0 2px #f2f2f2;
}

.input:focus{

    box-shadow:
    inset 0 0 0 2px #ff9dcb;
}

button{

    width:100%;

    height:66px;

    border:none;

    border-radius:24px;

    cursor:pointer;

    font-size:22px;

    font-weight:900;

    color:white;

    background:
    linear-gradient(
    90deg,
    #ff78bd,
    #ffbd66,
    #75de91,
    #74a9ff,
    #c785ff
    );

    background-size:300%;

    animation:rainbow 6s linear infinite;

    transition:.2s;
}

button:hover{

    transform:
    translateY(-3px)
    scale(1.01);
}

@keyframes rainbow{

    0%{
        background-position:0%;
    }

    100%{
        background-position:300%;
    }
}

.loading{

    display:none;

    text-align:center;

    margin-top:18px;

    font-weight:800;

    color:#666;
}

.result{

    display:none;

    animation:fade .45s ease;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.top-box{

    border-radius:30px;

    padding:34px;

    color:white;

    text-align:center;

    background:
    linear-gradient(
    135deg,
    #ff7ebf,
    #ffc76d,
    #7be49c,
    #7db1ff,
    #ce90ff
    );

    margin-bottom:20px;
}

.top-box small{

    font-size:16px;

    opacity:.92;
}

.big{

    font-size:58px;

    font-weight:900;

    margin:12px 0;
}

.stock{

    font-size:18px;

    margin-top:10px;
}

.grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:18px;

    margin-bottom:18px;
}

.box{

    background:white;

    border-radius:26px;

    padding:24px;

    box-shadow:
    0 10px 25px rgba(0,0,0,.05);
}

.box h3{

    color:#888;

    margin-bottom:14px;

    font-size:15px;
}

.value{

    font-size:34px;

    font-weight:900;

    margin-bottom:8px;
}

.green{

    color:#00b56d;

    font-weight:800;
}

.ai-box{

    background:white;

    border-radius:26px;

    padding:26px;

    line-height:2;

    box-shadow:
    0 10px 25px rgba(0,0,0,.05);

    font-size:17px;
}

.footer{

    text-align:center;

    margin-top:26px;

    color:#777;

    font-size:14px;
}

@media(max-width:640px){

    .hero-title h1{
        font-size:32px;
    }

    .grid{
        grid-template-columns:1fr;
    }

    .big{
        font-size:42px;
    }
}

</style>
</head>

<body>

<div class="bg">

    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>

</div>

<div class="container">

    <div class="hero-title">

        <h1>
            🌈 ETF 彩虹消費勸退機 ✨
        </h1>

        <p>
            每一次衝動購物前，
            <br>
            看看這筆錢如果拿去投資，
            未來可能會變成多少 💖
        </p>

    </div>

    <div class="card">

        <label class="label">
            💸 商品價格
        </label>

        <input
        id="price"
        class="input"
        type="number"
        placeholder="例如 47508">

        <label class="label">
            🌈 ETF 代號
        </label>

        <input
        id="stockCode"
        class="input"
        value="0050">

        <button onclick="calculate()">
            ✨ 幫我算算看 ✨
        </button>

        <div class="loading" id="loading">
            正在抓最新 ETF 資料...
        </div>

    </div>

    <div class="result" id="result">

        <div class="top-box">

            <small>
                這筆錢可以買進
            </small>

            <div class="big" id="shares">
                0 股
            </div>

            <div class="stock" id="stockInfo">
                ETF
            </div>

            <div class="stock">
                即時股價：
                NT$
                <span id="stockPrice">
                    0
                </span>
            </div>

            <div class="stock">
                歷史年化報酬：
                <span id="annualText">
                    0%
                </span>
            </div>

        </div>

        <div class="grid">

            <div class="box">

                <h3>
                    🌸 3 個月後可能變成
                </h3>

                <div class="value" id="future3m">
                    NT$0
                </div>

                <div class="green" id="gain3m">
                    +0%
                </div>

            </div>

            <div class="box">

                <h3>
                    🌈 1 年後可能變成
                </h3>

                <div class="value" id="future1y">
                    NT$0
                </div>

                <div class="green" id="gain1y">
                    +0%
                </div>

            </div>

        </div>

        <div class="ai-box" id="aiText"></div>

    </div>

    <div class="footer">
        ✨ 僅供娛樂與投資靈感用途 ✨
    </div>

</div>

<script>

function format(num){

    return Number(num).toLocaleString(
    "zh-TW",
    {
        maximumFractionDigits:0
    });
}

const annualReturnMap = {

    "0050":12,
    "006208":11,
    "0056":9,
    "00878":8,
    "00919":10,
    "QQQ":15,
    "VOO":12,
    "SPY":11
};

async function getStockPrice(code){

    try{

        const url =
        `https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=tse_${code}.tw`;

        const response = await fetch(url);

        const text = await response.text();

        const clean =
        text
        .replace("jsonp(","")
        .replace(");","");

        const data = JSON.parse(clean);

        const stock =
        data.msgArray[0];

        return {

            price:Number(stock.z),

            name:stock.n
        };

    }catch(err){

        return null;
    }
}

function getAIMessage(
price,
future1y,
stockCode
){

    const diff =
    future1y - price;

    const messages = [

        `😭 這次買了會快樂幾天，
        但如果投入 ${stockCode}，
        未來的你可能會感謝現在忍住的自己。`,

        `🌈 ${format(price)} 元
        看起來只是一次消費，
        但它也可能是未來資產成長的起點。`,

        `✨ 你不是沒錢，
        你只是正在決定：
        要短暫快樂，
        還是長期自由。`,

        `💖 如果把這筆錢投入 ETF，
        一年後可能多出
        ${format(diff)} 元。`,

        `🧋 有些東西買完三天就沒感覺了，
        但投資可能會陪你好多年。`
    ];

    return messages[
    Math.floor(
    Math.random() * messages.length
    )];
}

async function calculate(){

    const price =
    Number(
    document.getElementById("price").value
    );

    const stockCode =
    document
    .getElementById("stockCode")
    .value
    .toUpperCase();

    if(!price){

        alert("請輸入商品價格 ✨");

        return;
    }

    document
    .getElementById("loading")
    .style.display = "block";

    const stock =
    await getStockPrice(stockCode);

    document
    .getElementById("loading")
    .style.display = "none";

    if(!stock){

        alert("抓不到 ETF 資料 😭");

        return;
    }

    const annualReturn =
    annualReturnMap[stockCode] || 10;

    const annualRate =
    annualReturn / 100;

    const shares =
    price / stock.price;

    const future3m =
    price *
    Math.pow(
    1 + annualRate,
    0.25
    );

    const future1y =
    price *
    (1 + annualRate);

    const gain3m =
    (
    (future3m - price)
    / price * 100
    ).toFixed(1);

    const gain1y =
    (
    (future1y - price)
    / price * 100
    ).toFixed(1);

    document
    .getElementById("shares")
    .innerText =
    shares.toFixed(2) + " 股";

    document
    .getElementById("stockInfo")
    .innerText =
    `${stock.name} (${stockCode})`;

    document
    .getElementById("stockPrice")
    .innerText =
    stock.price;

    document
    .getElementById("annualText")
    .innerText =
    annualReturn + "%";

    document
    .getElementById("future3m")
    .innerText =
    "NT$ " + format(future3m);

    document
    .getElementById("future1y")
    .innerText =
    "NT$ " + format(future1y);

    document
    .getElementById("gain3m")
    .innerText =
    "+" + gain3m + "%";

    document
    .getElementById("gain1y")
    .innerText =
    "+" + gain1y + "%";

    document
    .getElementById("aiText")
    .innerHTML =
    getAIMessage(
    price,
    future1y,
    stockCode
    );

    document
    .getElementById("result")
    .style.display = "block";

    window.scrollTo({

        top:
        document.body.scrollHeight,

        behavior:"smooth"
    });
}

</script>

</body>
</html>
