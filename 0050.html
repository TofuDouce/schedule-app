<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>✨ All In ETF ✨</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    sans-serif;
}

body{

    min-height:100vh;

    background:
    linear-gradient(
    135deg,
    #ffd6ec 0%,
    #ffe9c9 25%,
    #d8f5d0 50%,
    #d6ecff 75%,
    #ead9ff 100%
    );

    overflow-x:hidden;

    color:#444;

    padding:24px;
}

.bg1,
.bg2,
.bg3{

    position:fixed;
    border-radius:50%;
    filter:blur(80px);
    opacity:.45;
    z-index:-1;
}

.bg1{
    width:320px;
    height:320px;
    background:#ffb6d9;
    top:-100px;
    left:-60px;
}

.bg2{
    width:260px;
    height:260px;
    background:#b6f3ff;
    bottom:-80px;
    right:-50px;
}

.bg3{
    width:220px;
    height:220px;
    background:#fff0a8;
    top:40%;
    left:50%;
}

.container{

    max-width:760px;
    margin:auto;
}

.top-title{

    text-align:center;
    margin-bottom:28px;
}

.top-title h1{

    font-size:42px;
    font-weight:900;

    background:linear-gradient(
    90deg,
    #ff6fb5,
    #ffb84d,
    #6edb8f,
    #6ea8ff,
    #c07dff
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.top-title p{

    margin-top:10px;
    color:#666;
    line-height:1.7;
    font-size:16px;
}

.card{

    background:rgba(255,255,255,.7);

    backdrop-filter:blur(16px);

    border:2px solid rgba(255,255,255,.6);

    border-radius:32px;

    padding:28px;

    box-shadow:
    0 15px 40px rgba(0,0,0,.08);

    margin-bottom:24px;
}

.label{

    display:block;

    margin-bottom:10px;

    font-size:14px;

    font-weight:800;

    color:#666;
}

.input{

    width:100%;

    height:60px;

    border:none;

    border-radius:20px;

    background:white;

    padding:0 18px;

    font-size:18px;

    outline:none;

    margin-bottom:18px;

    box-shadow:
    inset 0 0 0 2px #f0f0f0;
}

.input:focus{

    box-shadow:
    inset 0 0 0 2px #ff9fd1;
}

.row{

    display:flex;
    gap:14px;
}

button{

    width:100%;

    border:none;

    border-radius:24px;

    height:64px;

    font-size:20px;

    font-weight:900;

    cursor:pointer;

    color:white;

    background:
    linear-gradient(
    90deg,
    #ff78bb,
    #ffb86b,
    #72df8f,
    #73a9ff,
    #bc7dff
    );

    background-size:300%;

    animation:rainbow 6s linear infinite;

    transition:.2s;
}

button:hover{

    transform:translateY(-3px) scale(1.01);
}

@keyframes rainbow{

    0%{
        background-position:0%;
    }

    100%{
        background-position:300%;
    }
}

.result{

    display:none;

    animation:fade .5s ease;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.hero{

    border-radius:30px;

    padding:32px;

    color:white;

    text-align:center;

    background:
    linear-gradient(
    135deg,
    #ff84c1,
    #ffc46b,
    #77e59c,
    #7eb2ff,
    #cb8cff
    );

    margin-bottom:20px;
}

.hero small{

    font-size:15px;
    opacity:.9;
}

.big{

    font-size:54px;
    font-weight:900;
    margin:10px 0;
}

.stock-price{

    margin-top:12px;
    font-size:17px;
}

.grid{

    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

.box{

    background:white;

    border-radius:26px;

    padding:24px;

    box-shadow:
    0 10px 25px rgba(0,0,0,.05);
}

.box h3{

    font-size:15px;
    color:#888;
    margin-bottom:14px;
}

.value{

    font-size:34px;
    font-weight:900;
    margin-bottom:8px;
}

.green{

    color:#00b26f;
    font-weight:800;
}

.message{

    margin-top:20px;

    background:white;

    border-radius:26px;

    padding:24px;

    line-height:2;

    font-size:16px;

    box-shadow:
    0 10px 25px rgba(0,0,0,.05);
}

.footer{

    text-align:center;
    margin-top:24px;
    color:#777;
    font-size:14px;
}

.loading{

    display:none;
    text-align:center;
    margin-top:16px;
    font-weight:800;
    color:#666;
}

@media(max-width:640px){

    .top-title h1{
        font-size:32px;
    }

    .row{
        flex-direction:column;
    }

    .grid{
        grid-template-columns:1fr;
    }

    .big{
        font-size:42px;
    }
}

</style>
</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>
<div class="bg3"></div>

<div class="container">

    <div class="top-title">

        <h1>✨ All In ETF ✨</h1>

        <p>
            每次想買東西的時候，
            <br>
            看看這筆錢如果投入 ETF，
            未來可能會變成多少 ✨
        </p>

    </div>

    <div class="card">

        <label class="label">
            💸 商品價格
        </label>

        <input
        id="price"
        class="input"
        type="number"
        placeholder="例如 47508">

        <div class="row">

            <div style="flex:1">

                <label class="label">
                    🌈 ETF 代號
                </label>

                <input
                id="stockCode"
                class="input"
                value="0050">

            </div>

            <div style="flex:1">

                <label class="label">
                    📈 年化報酬率 %
                </label>

                <input
                id="annualReturn"
                class="input"
                type="number"
                value="12">

            </div>

        </div>

        <button onclick="calculate()">
            ✨ 幫我算算看 ✨
        </button>

        <div class="loading" id="loading">
            正在抓最新股價...
        </div>

    </div>

    <div class="result" id="result">

        <div class="hero">

            <small>
                這筆錢可以買進
            </small>

            <div class="big" id="shares">
                0 股
            </div>

            <div id="stockInfo">
                ETF
            </div>

            <div class="stock-price">
                即時股價：
                NT$
                <span id="currentPrice">
                    0
                </span>
            </div>

        </div>

        <div class="grid">

            <div class="box">

                <h3>
                    🌸 3 個月後
                </h3>

                <div class="value" id="future3m">
                    NT$0
                </div>

                <div class="green" id="gain3m">
                    +0%
                </div>

            </div>

            <div class="box">

                <h3>
                    🌈 1 年後
                </h3>

                <div class="value" id="future1y">
                    NT$0
                </div>

                <div class="green" id="gain1y">
                    +0%
                </div>

            </div>

        </div>

        <div class="message" id="message"></div>

    </div>

    <div class="footer">
        ✨ 僅供娛樂與投資靈感用途 ✨
    </div>

</div>

<script>

function format(num){

    return Number(num).toLocaleString(
    "zh-TW",
    {
        maximumFractionDigits:0
    });
}

async function getStockPrice(code){

    try{

        let finalCode = code;

        if(!code.includes(".")){

            finalCode = code + ".TW";
        }

        const url =
        `https://query1.finance.yahoo.com/v8/finance/chart/${finalCode}`;

        const response = await fetch(url);

        const data = await response.json();

        const result =
        data.chart.result[0];

        return {

            price:
            result.meta.regularMarketPrice,

            name:
            result.meta.symbol
        };

    }catch(err){

        alert("抓不到股票資料 😭");

        return null;
    }
}

async function calculate(){

    const price =
    Number(
    document.getElementById("price").value
    );

    const stockCode =
    document.getElementById("stockCode").value;

    const annualReturn =
    Number(
    document.getElementById("annualReturn").value
    );

    if(!price){

        alert("請輸入商品價格 ✨");

        return;
    }

    document.getElementById("loading")
    .style.display = "block";

    const stock =
    await getStockPrice(stockCode);

    document.getElementById("loading")
    .style.display = "none";

    if(!stock) return;

    const stockPrice =
    stock.price;

    const shares =
    price / stockPrice;

    const annualRate =
    annualReturn / 100;

    const future3m =
    price * Math.pow(
    1 + annualRate,
    0.25
    );

    const future1y =
    price * (
    1 + annualRate
    );

    const gain3m =
    (
    (future3m - price)
    / price * 100
    ).toFixed(1);

    const gain1y =
    (
    (future1y - price)
    / price * 100
    ).toFixed(1);

    document.getElementById("shares")
    .innerText =
    shares.toFixed(2) + " 股";

    document.getElementById("currentPrice")
    .innerText =
    stockPrice;

    document.getElementById("stockInfo")
    .innerText =
    stockCode;

    document.getElementById("future3m")
    .innerText =
    "NT$ " + format(future3m);

    document.getElementById("future1y")
    .innerText =
    "NT$ " + format(future1y);

    document.getElementById("gain3m")
    .innerText =
    "+" + gain3m + "%";

    document.getElementById("gain1y")
    .innerText =
    "+" + gain1y + "%";

    document.getElementById("message")
    .innerHTML =
    `
    ✨ 如果這筆
    <b>NT$ ${format(price)}</b>
    沒有拿去消費，
    而是投入
    <b>${stockCode}</b>，

    未來的你可能會謝謝現在的自己 🌈💖
    `;

    document.getElementById("result")
    .style.display = "block";

    window.scrollTo({

        top:
        document.body.scrollHeight,

        behavior:"smooth"
    });
}

</script>

</body>
</html>
