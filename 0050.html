<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>✨ All In ETF ✨</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg1:#171320;
    --bg2:#261f38;
    --bg3:#32284a;

    --gold:#c9b18a;
    --gold-soft:#8d7a5d;

    --purple:#d9c9ff;
    --purple2:#bda4ff;

    --card:
    rgba(28,24,42,.72);
}

body{

    min-height:100vh;

    overflow-x:hidden;

    background:
    radial-gradient(
    circle at top,
    rgba(180,150,255,.14),
    transparent 25%
    ),

    linear-gradient(
    180deg,
    var(--bg1),
    var(--bg2),
    var(--bg3)
    );

    color:#f1ebff;

    padding:28px;

    font-family:
    "Cormorant Garamond",
    serif;

    position:relative;
}

/* 星空 */

body::before{

    content:"";

    position:fixed;

    inset:0;

    background-image:
    radial-gradient(
    rgba(255,255,255,.8) 1px,
    transparent 1px
    );

    background-size:48px 48px;

    opacity:.08;

    pointer-events:none;

    z-index:-2;
}

/* 慕夏邊框 */

.frame{

    position:fixed;

    inset:14px;

    border:
    1.5px solid rgba(201,177,138,.5);

    border-radius:34px;

    pointer-events:none;

    z-index:999;
}

.frame::before,
.frame::after{

    content:"";

    position:absolute;

    inset:12px;

    border:
    1px solid rgba(201,177,138,.25);

    border-radius:28px;
}

/* 四角裝飾 */

.corner{

    position:fixed;

    width:80px;
    height:80px;

    border:
    1px solid rgba(201,177,138,.4);

    z-index:1000;

    pointer-events:none;
}

.tl{

    top:26px;
    left:26px;

    border-right:none;
    border-bottom:none;

    border-top-left-radius:28px;
}

.tr{

    top:26px;
    right:26px;

    border-left:none;
    border-bottom:none;

    border-top-right-radius:28px;
}

.bl{

    bottom:26px;
    left:26px;

    border-right:none;
    border-top:none;

    border-bottom-left-radius:28px;
}

.br{

    bottom:26px;
    right:26px;

    border-left:none;
    border-top:none;

    border-bottom-right-radius:28px;
}

.container{

    max-width:760px;

    margin:auto;

    position:relative;

    z-index:1;
}

.title{

    text-align:center;

    margin-top:40px;

    margin-bottom:34px;
}

.title h1{

    font-size:56px;

    font-family:
    "Cinzel",
    serif;

    font-weight:700;

    color:#f7f2ff;

    letter-spacing:2px;

    text-shadow:
    0 0 20px rgba(190,160,255,.2);
}

.title p{

    margin-top:18px;

    line-height:1.9;

    color:#d8ccec;

    font-size:22px;
}

.card{

    background:
    var(--card);

    border:
    1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(14px);

    border-radius:34px;

    padding:30px;

    box-shadow:
    0 10px 40px rgba(0,0,0,.35);

    margin-bottom:24px;

    position:relative;

    overflow:hidden;
}

.card::before{

    content:"✦";

    position:absolute;

    top:18px;
    right:22px;

    color:rgba(255,255,255,.12);

    font-size:42px;
}

.label{

    display:block;

    margin-bottom:10px;

    color:#dccdf5;

    font-size:18px;

    letter-spacing:1px;
}

.input{

    width:100%;

    height:68px;

    border:none;

    border-radius:24px;

    background:
    rgba(255,255,255,.05);

    color:white;

    padding:0 20px;

    outline:none;

    font-size:24px;

    margin-bottom:20px;

    border:
    1px solid rgba(255,255,255,.06);
}

.input:focus{

    border:
    1px solid rgba(201,177,138,.6);

    box-shadow:
    0 0 20px rgba(201,177,138,.15);
}

button{

    width:100%;

    height:72px;

    border:none;

    border-radius:26px;

    cursor:pointer;

    font-size:24px;

    font-family:
    "Cinzel",
    serif;

    color:white;

    background:
    linear-gradient(
    90deg,
    #6f5aff,
    #9c7dff,
    #6987ff
    );

    box-shadow:
    0 10px 30px rgba(120,100,255,.25);

    transition:.25s;
}

button:hover{

    transform:
    translateY(-2px)
    scale(1.01);
}

.loading{

    display:none;

    text-align:center;

    margin-top:20px;

    color:#d6caee;

    font-size:18px;
}

.result{

    display:none;

    animation:fade .45s ease;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.hero{

    background:
    linear-gradient(
    135deg,
    rgba(73,61,115,.95),
    rgba(37,31,56,.95)
    );

    border-radius:34px;

    padding:36px;

    text-align:center;

    margin-bottom:20px;

    border:
    1px solid rgba(255,255,255,.06);
}

.hero small{

    color:#d9cdf1;

    font-size:18px;
}

.big{

    font-size:64px;

    margin:14px 0;

    font-family:
    "Cinzel",
    serif;

    color:white;
}

.stock{

    margin-top:12px;

    color:#ddd1f2;

    font-size:21px;
}

.grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:18px;

    margin-bottom:20px;
}

.box{

    background:
    rgba(29,24,44,.85);

    border-radius:28px;

    padding:26px;

    border:
    1px solid rgba(255,255,255,.05);
}

.box h3{

    color:#d4c6ec;

    margin-bottom:12px;

    font-size:20px;
}

.value{

    font-size:42px;

    font-family:
    "Cinzel",
    serif;

    margin-bottom:8px;
}

.green{

    color:#cab0ff;

    font-size:18px;
}

.ai{

    background:
    rgba(30,24,46,.84);

    border-radius:28px;

    padding:30px;

    line-height:2;

    font-size:22px;

    color:#ece4ff;

    border:
    1px solid rgba(255,255,255,.05);
}

.footer{

    text-align:center;

    margin-top:34px;

    margin-bottom:60px;

    font-family:
    "Cinzel",
    serif;

    font-size:28px;

    color:#d7c1ff;

    letter-spacing:2px;

    text-shadow:
    0 0 20px rgba(200,180,255,.2);
}

@media(max-width:640px){

    .title h1{
        font-size:40px;
    }

    .title p{
        font-size:18px;
    }

    .grid{
        grid-template-columns:1fr;
    }

    .big{
        font-size:48px;
    }

    .footer{
        font-size:22px;
    }

    .frame{
        inset:10px;
    }
}

</style>
</head>

<body>

<div class="frame"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="container">

    <div class="title">

        <h1>
            ✨ All In ETF ✨
        </h1>

        <p>
            每次想買東西的時候，
            <br>
            看看這筆錢如果投入 ETF，
            未來可能會變成多少
        </p>

    </div>

    <div class="card">

        <label class="label">
            ✦ 商品價格
        </label>

        <input
        id="price"
        class="input"
        type="number"
        placeholder="例如 47508">

        <label class="label">
            ✦ ETF 代號
        </label>

        <input
        id="stockCode"
        class="input"
        value="0050">

        <button onclick="calculate()">
            ✨ Reveal Destiny ✨
        </button>

        <div class="loading" id="loading">
            正在窺探未來命運...
        </div>

    </div>

    <div class="result" id="result">

        <div class="hero">

            <small>
                這筆錢可以買進
            </small>

            <div class="big" id="shares">
                0 股
            </div>

            <div class="stock">
                ETF：
                <span id="stockName"></span>
            </div>

            <div class="stock">
                現在價格：
                NT$
                <span id="currentPrice"></span>
            </div>

            <div class="stock">
                歷史平均年化：
                <span id="annualText"></span>
            </div>

        </div>

        <div class="grid">

            <div class="box">

                <h3>
                    ✦ 3 個月後
                </h3>

                <div class="value" id="future3m"></div>

                <div class="green" id="gain3m"></div>

            </div>

            <div class="box">

                <h3>
                    ✦ 1 年後
                </h3>

                <div class="value" id="future1y"></div>

                <div class="green" id="gain1y"></div>

            </div>

        </div>

        <div class="ai" id="aiText"></div>

    </div>

    <div class="footer">
        ✨ Lazy Dream ✨ 製作
    </div>

</div>

<script>

function format(num){

    return Number(num).toLocaleString(
    "zh-TW",
    {
        maximumFractionDigits:0
    });
}

const annualReturnMap = {

    "0050":12,
    "006208":11,
    "0056":9,
    "00878":8,
    "00919":10,
    "QQQ":15,
    "VOO":12,
    "SPY":11
};

async function getETFPrice(code){

    try{

        const today = new Date();

        const yyyy =
        today.getFullYear();

        const mm =
        String(today.getMonth()+1)
        .padStart(2,"0");

        const url =
        `https://www.twse.com.tw/exchangeReport/STOCK_DAY?response=json&date=${yyyy}${mm}01&stockNo=${code}`;

        const response =
        await fetch(url);

        const data =
        await response.json();

        if(!data.data){

            return null;
        }

        const prices =
        data.data
        .map(item=>Number(
        item[6].replace(/,/g,"")
        ))
        .filter(v=>!isNaN(v));

        const currentPrice =
        prices[prices.length - 1];

        return {

            currentPrice,

            annualReturn:
            annualReturnMap[code] || 10
        };

    }catch(err){

        return null;
    }
}

function aiMessage(
price,
future,
stock
){

    const diff =
    future - price;

    const messages = [

        `✨ 如果把這筆錢投入 ${stock}，
        未來可能比現在更有價值。`,

        `🌙 有些東西只會快樂幾天，
        但資產可能陪伴你好多年。`,

        `💜 一年後，
        你可能會多出
        ${format(diff)} 元。`,

        `🌌 真正厲害的人，
        是能控制衝動的人。`,

        `✨ 未來的你，
        可能會感謝今天沒有衝動消費的自己。`
    ];

    return messages[
    Math.floor(
    Math.random() * messages.length
    )];
}

async function calculate(){

    const price =
    Number(
    document.getElementById("price").value
    );

    const code =
    document
    .getElementById("stockCode")
    .value
    .trim();

    if(!price){

        alert("請輸入商品價格 ✨");

        return;
    }

    document
    .getElementById("loading")
    .style.display = "block";

    const data =
    await getETFPrice(code);

    document
    .getElementById("loading")
    .style.display = "none";

    if(!data){

        alert("抓不到 ETF 資料 😭");

        return;
    }

    const shares =
    price / data.currentPrice;

    const annualRate =
    data.annualReturn / 100;

    const future3m =
    price *
    Math.pow(
    1 + annualRate,
    0.25
    );

    const future1y =
    price *
    (1 + annualRate);

    const gain3m =
    (
    (future3m - price)
    / price * 100
    ).toFixed(1);

    const gain1y =
    (
    (future1y - price)
    / price * 100
    ).toFixed(1);

    document
    .getElementById("shares")
    .innerText =
    shares.toFixed(2) + " 股";

    document
    .getElementById("stockName")
    .innerText =
    code;

    document
    .getElementById("currentPrice")
    .innerText =
    data.currentPrice;

    document
    .getElementById("annualText")
    .innerText =
    data.annualReturn + "%";

    document
    .getElementById("future3m")
    .innerText =
    "NT$ " +
    format(future3m);

    document
    .getElementById("future1y")
    .innerText =
    "NT$ " +
    format(future1y);

    document
    .getElementById("gain3m")
    .innerText =
    "+" + gain3m + "%";

    document
    .getElementById("gain1y")
    .innerText =
    "+" + gain1y + "%";

    document
    .getElementById("aiText")
    .innerHTML =
    aiMessage(
    price,
    future1y,
    code
    );

    document
    .getElementById("result")
    .style.display = "block";
}

</script>

</body>
</html>
