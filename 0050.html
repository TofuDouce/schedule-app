<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>✨ All In ETF ✨</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;
    overflow-x:hidden;

    background:
    linear-gradient(
    180deg,
    #161421 0%,
    #221d34 40%,
    #2e2744 100%
    );

    color:#eee6ff;

    font-family:
    "Cormorant Garamond",
    serif;

    padding:24px;
}

body::before{

    content:"";

    position:fixed;

    inset:0;

    background:
    radial-gradient(
    circle at top left,
    rgba(180,150,255,.15),
    transparent 35%
    ),

    radial-gradient(
    circle at bottom right,
    rgba(120,170,255,.12),
    transparent 35%
    );

    z-index:-1;
}

.container{

    max-width:760px;
    margin:auto;
}

.title{

    text-align:center;
    margin-bottom:30px;
}

.title h1{

    font-size:52px;

    font-family:
    "Cinzel",
    serif;

    color:#fff;
}

.title p{

    margin-top:18px;

    line-height:1.8;

    font-size:20px;

    color:#d9ccef;
}

.card{

    background:
    rgba(26,22,38,.72);

    border:
    1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(16px);

    border-radius:34px;

    padding:30px;

    margin-bottom:24px;
}

.label{

    display:block;

    margin-bottom:10px;

    color:#d8caef;

    font-size:18px;
}

.input{

    width:100%;

    height:66px;

    border:none;

    border-radius:22px;

    background:
    rgba(255,255,255,.06);

    color:white;

    padding:0 20px;

    outline:none;

    font-size:22px;

    margin-bottom:20px;
}

.input:focus{

    border:
    1px solid #b89cff;
}

button{

    width:100%;

    height:70px;

    border:none;

    border-radius:24px;

    cursor:pointer;

    font-size:24px;

    font-family:
    "Cinzel",
    serif;

    color:white;

    background:
    linear-gradient(
    90deg,
    #8a72ff,
    #b58cff,
    #6d8dff
    );
}

.loading{

    display:none;

    margin-top:20px;

    text-align:center;

    color:#ddd;
}

.result{

    display:none;
}

.hero{

    background:
    linear-gradient(
    135deg,
    rgba(74,64,120,.95),
    rgba(40,36,60,.95)
    );

    border-radius:32px;

    padding:36px;

    text-align:center;

    margin-bottom:20px;
}

.big{

    font-size:60px;

    font-family:
    "Cinzel",
    serif;

    margin:14px 0;
}

.stock{

    margin-top:12px;

    font-size:20px;
}

.grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:18px;

    margin-bottom:18px;
}

.box{

    background:
    rgba(30,26,45,.8);

    border-radius:28px;

    padding:24px;
}

.value{

    font-size:38px;

    margin:10px 0;

    font-family:
    "Cinzel",
    serif;
}

.ai{

    background:
    rgba(30,26,45,.8);

    border-radius:28px;

    padding:28px;

    line-height:2;

    font-size:20px;
}

.footer{

    text-align:center;

    margin-top:30px;

    font-family:
    "Cinzel",
    serif;

    font-size:24px;

    color:#d7c4ff;
}

@media(max-width:640px){

    .title h1{
        font-size:38px;
    }

    .grid{
        grid-template-columns:1fr;
    }

    .big{
        font-size:46px;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="title">

        <h1>
            ✨ All In ETF ✨
        </h1>

        <p>
            每次想買東西的時候，
            <br>
            看看這筆錢如果投入 ETF，
            未來可能會變成多少
        </p>

    </div>

    <div class="card">

        <label class="label">
            ✦ 商品價格
        </label>

        <input
        id="price"
        class="input"
        type="number"
        placeholder="例如 47508">

        <label class="label">
            ✦ ETF 代號
        </label>

        <input
        id="stockCode"
        class="input"
        value="0050">

        <button onclick="calculate()">
            ✨ Reveal Destiny ✨
        </button>

        <div class="loading" id="loading">
            正在抓取 ETF 歷史資料...
        </div>

    </div>

    <div class="result" id="result">

        <div class="hero">

            <div>
                這筆錢可以買進
            </div>

            <div class="big" id="shares">
                0 股
            </div>

            <div class="stock">
                ETF：
                <span id="stockName"></span>
            </div>

            <div class="stock">
                現在價格：
                NT$
                <span id="currentPrice"></span>
            </div>

            <div class="stock">
                真實歷史年化 CAGR：
                <span id="cagrText"></span>
            </div>

        </div>

        <div class="grid">

            <div class="box">

                <h3>
                    ✦ 3 個月後
                </h3>

                <div class="value" id="future3m"></div>

                <div id="gain3m"></div>

            </div>

            <div class="box">

                <h3>
                    ✦ 1 年後
                </h3>

                <div class="value" id="future1y"></div>

                <div id="gain1y"></div>

            </div>

        </div>

        <div class="ai" id="aiText"></div>

    </div>

    <div class="footer">
        ✨ Lazy Dream ✨ 製作
    </div>

</div>

<script>

function format(num){

    return Number(num).toLocaleString(
    "zh-TW",
    {
        maximumFractionDigits:0
    });
}

async function getETFData(code){

    try{

        const today = new Date();

        const yyyy =
        today.getFullYear();

        const mm =
        String(today.getMonth()+1)
        .padStart(2,"0");

        const url =
        `https://www.twse.com.tw/exchangeReport/STOCK_DAY?response=json&date=${yyyy}${mm}01&stockNo=${code}`;

        const response =
        await fetch(url);

        const data =
        await response.json();

        if(!data.data){

            return null;
        }

        const prices =
        data.data
        .map(item=>Number(
        item[6].replace(/,/g,"")
        ))
        .filter(v=>!isNaN(v));

        if(prices.length < 2){

            return null;
        }

        const currentPrice =
        prices[prices.length - 1];

        const oldPrice =
        prices[0];

        const years = 5;

        const cagr =
        (
        Math.pow(
        currentPrice / oldPrice,
        1 / years
        ) - 1
        ) * 100;

        return {

            currentPrice,
            cagr
        };

    }catch(err){

        return null;
    }
}

function aiMessage(
price,
future,
stock
){

    const diff =
    future - price;

    const messages = [

        `✨ 如果這筆錢投入 ${stock}，
        未來可能比現在更有價值。`,

        `🌙 衝動購物只快樂一下，
        但資產可能陪你很多年。`,

        `💜 一年後，
        你可能會多出
        ${format(diff)} 元。`,

        `🌌 真正厲害的人，
        是能控制衝動的人。`
    ];

    return messages[
    Math.floor(
    Math.random() * messages.length
    )];
}

async function calculate(){

    const price =
    Number(
    document.getElementById("price").value
    );

    const code =
    document
    .getElementById("stockCode")
    .value
    .trim();

    if(!price){

        alert("請輸入商品價格 ✨");

        return;
    }

    document
    .getElementById("loading")
    .style.display = "block";

    const data =
    await getETFData(code);

    document
    .getElementById("loading")
    .style.display = "none";

    if(!data){

        alert("抓不到 ETF 資料 😭");

        return;
    }

    const shares =
    price / data.currentPrice;

    const annualRate =
    data.cagr / 100;

    const future3m =
    price *
    Math.pow(
    1 + annualRate,
    0.25
    );

    const future1y =
    price *
    (1 + annualRate);

    const gain3m =
    (
    (future3m - price)
    / price * 100
    ).toFixed(1);

    const gain1y =
    (
    (future1y - price)
    / price * 100
    ).toFixed(1);

    document
    .getElementById("shares")
    .innerText =
    shares.toFixed(2) + " 股";

    document
    .getElementById("stockName")
    .innerText =
    code;

    document
    .getElementById("currentPrice")
    .innerText =
    data.currentPrice;

    document
    .getElementById("cagrText")
    .innerText =
    data.cagr.toFixed(2) + "%";

    document
    .getElementById("future3m")
    .innerText =
    "NT$ " +
    format(future3m);

    document
    .getElementById("future1y")
    .innerText =
    "NT$ " +
    format(future1y);

    document
    .getElementById("gain3m")
    .innerText =
    "+" + gain3m + "%";

    document
    .getElementById("gain1y")
    .innerText =
    "+" + gain1y + "%";

    document
    .getElementById("aiText")
    .innerHTML =
    aiMessage(
    price,
    future1y,
    code
    );

    document
    .getElementById("result")
    .style.display = "block";
}

</script>

</body>
</html>
