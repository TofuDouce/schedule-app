<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貓巫醫的垃圾桶 ✦ 負能量黑洞宣洩口</title>

    <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
    <meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
    <meta name="bingbot" content="noindex,nofollow,noarchive,nosnippet,noimageindex">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: font-size 0.2s ease, transform 0.4s ease, box-shadow 0.4s ease, background-color 0.3s ease, border-color 0.3s ease;
        }

        :root {
            --bg1: #171320;
            --bg2: #241a35;
            --bg3: #31244d;
            --gold: #d8bf8a;
            --text: #f4efff;
            --card: rgba(29, 24, 44, .72);
            --gold-low: rgba(216, 191, 138, 0.15);
            
            /* 貓巫醫主題特殊色 */
            --magic-glow: #9d4edd;

            /* 文字大小基礎設定級距 */
            --base-font-size: 16px;
        }

        body {
            min-height: 100vh;
            color: var(--text);
            font-family: "Cormorant Garamond", serif;
            background: radial-gradient(circle at top, rgba(180,150,255,.14), transparent 40%),
                        linear-gradient(180deg, var(--bg1), var(--bg2), var(--bg3));
            padding: 28px;
            position: relative;
            font-size: var(--base-font-size);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 星空背景 */
        .stars {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: -3;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: .7;
            animation: twinkle 4s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: .15; transform: scale(.7); }
            50% { opacity: 1; transform: scale(1.4); }
        }

        /* 魔法古典外框 */
        .frame {
            position: fixed;
            inset: 14px;
            border: 1.5px solid rgba(216,191,138,.48);
            border-radius: 38px;
            pointer-events: none;
            z-index: 999;
        }

        .frame::before {
            content: "";
            position: absolute;
            inset: 12px;
            border: 1px solid rgba(216,191,138,.18);
            border-radius: 30px;
        }

        /* 四角裝飾 */
        .corner {
            position: fixed;
            width: 120px;
            height: 120px;
            pointer-events: none;
            z-index: 1000;
        }

        .corner::before {
            content: "";
            position: absolute;
            inset: 0;
            border: 1.5px solid rgba(216,191,138,.45);
            border-radius: 50%;
        }

        .corner::after {
            content: "✦";
            position: absolute;
            color: rgba(216,191,138,.85);
            font-size: 26px;
        }

        .tl { top: 18px; left: 18px; }
        .tl::before { clip-path: polygon(0 0, 100% 0, 0 100%); }
        .tl::after { top: 18px; left: 18px; }

        .tr { top: 18px; right: 18px; }
        .tr::before { clip-path: polygon(0 0, 100% 0, 100% 100%); }
        .tr::after { top: 18px; right: 18px; }

        .bl { bottom: 18px; left: 18px; }
        .bl::before { clip-path: polygon(0 0, 0 100%, 100% 100%); }
        .bl::after { bottom: 18px; left: 18px; }

        .br { bottom: 18px; right: 18px; }
        .br::before { clip-path: polygon(100% 0, 0 100%, 100% 100%); }
        .br::after { bottom: 18px; right: 18px; }

        /* 主內容區容器 */
        .container {
            width: 100%;
            max-width: 960px;
            margin: auto;
            position: relative;
            z-index: 2;
            padding: 20px 0;
        }

        /* 文字大小控制列 */
        .font-control {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: -10px;
            position: relative;
            z-index: 1010;
        }

        .font-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(216, 191, 138, 0.3);
            color: var(--text);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-family: "Cinzel", serif;
            font-size: 14px;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .font-btn:hover {
            background: rgba(216, 191, 138, 0.2);
            color: var(--gold);
            border-color: var(--gold);
        }

        .font-btn.active {
            background: var(--gold);
            color: var(--bg1);
            font-weight: bold;
            border-color: var(--gold);
        }

        /* 懸浮月亮 */
        .moon {
            text-align: center;
            margin-top: 10px;
            position: relative;
        }

        .moon::before {
            content: "";
            position: absolute;
            left: 50%;
            top: -50px;
            width: 1px;
            height: 50px;
            background: rgba(216,191,138,.35);
        }

        .moon-symbol {
            font-size: 42px;
            color: var(--gold);
            text-shadow: 0 0 18px rgba(216,191,138,.25);
            animation: floatMoon 4s ease-in-out infinite;
        }

        @keyframes floatMoon {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(6px); }
        }

        /* 標題與核心主視覺 */
        .title-block {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 35px;
        }

        .main-title {
            font-family: "Cinzel", serif;
            font-weight: 700;
            letter-spacing: 4px;
            line-height: 1.2;
            font-size: clamp(32px, 6vw, 54px);
            background: linear-gradient(180deg, #ffffff 0%, #f1e8ff 40%, #d8bf8a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        /* 雙欄響應式布局 */
        .layout-grid {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        @media (min-width: 900px) {
            .layout-grid {
                flex-direction: row;
                align-items: stretch;
            }
        }

        /* 核心主要功能卡片 */
        .main-calculator {
            flex: 1;
            background: var(--card);
            border: 1px solid rgba(255,255,255,.06);
            border-radius: 34px;
            padding: 32px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 20px 50px rgba(0,0,0,.3);
        }

        /* 側邊說明面板卡片 */
        .sidebar-panel {
            width: 100%;
            background: var(--card);
            border: 1px solid rgba(255,255,255,.06);
            border-radius: 34px;
            padding: 28px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 20px 50px rgba(0,0,0,.3);
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 900px) {
            .sidebar-panel {
                width: 320px;
            }
        }

        /* 分隔線 */
        .classic-hr {
            margin: 24px 0;
            border: none;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(216,191,138,.4), transparent);
        }

        /* 側邊欄專用古典標題 */
        .sidebar-title {
            font-family: "Cinzel", serif;
            font-size: calc(var(--base-font-size) * 1.15);
            color: var(--gold);
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .sidebar-desc {
            font-size: 13px;
            color: #a897c9;
            text-align: center;
            line-height: 1.5;
            margin-bottom: 16px;
            font-style: italic;
        }

        /* 顏色語意庫 */
        .color-gold { color: var(--gold); }
        .color-rose { color: #f29494; }
        .color-mint { color: #8ae0be; }
        .color-text { color: var(--text); }

        /* 頁尾 */
        .footer {
            text-align: center;
            margin-top: 35px;
        }

        .footer-line {
            width: 100px;
            height: 1px;
            margin: auto;
            margin-bottom: 14px;
            background: linear-gradient(90deg, transparent, rgba(216,191,138,.5), transparent);
        }

        .footer-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-family: "Cinzel", serif;
            font-size: 20px;
            letter-spacing: 2px;
            color: #eadfff;
        }

        .creator {
            margin-top: 6px;
            font-size: 13px;
            color: #a897c9;
            letter-spacing: 1px;
            font-style: italic;
        }

        /* ========================================================
           以下為貓巫醫垃圾桶專屬新增樣式（完美融合原本魔法框架）
           ======================================================== */
        
        /* 貓巫醫魔法陣 / 黑洞區 */
        .altar-zone {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .magic-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 1px dashed var(--gold);
            border-radius: 50%;
            animation: rotateCircle 20s linear infinite;
            opacity: 0.4;
        }

        .black-hole {
            width: 90px;
            height: 90px;
            background: radial-gradient(circle, #000 40%, var(--magic-glow) 80%, transparent 100%);
            border-radius: 50%;
            box-shadow: 0 0 25px var(--magic-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            z-index: 2;
            cursor: default;
        }

        .black-hole.active {
            animation: pulseHole 0.5s infinite alternate;
        }

        /* 垃圾輸入框容器與文字區 */
        .trash-input-container {
            position: relative;
            width: 100%;
            margin-bottom: 24px;
        }

        textarea.classic-textarea {
            width: 100%;
            height: 140px;
            background: rgba(15, 11, 25, 0.5);
            border: 1px solid rgba(216, 191, 138, 0.25);
            border-radius: 16px;
            padding: 16px;
            color: #ffffff;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            font-size: calc(var(--base-font-size) * 0.95);
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        textarea.classic-textarea:focus {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(157, 78, 221, 0.3);
            background: rgba(15, 11, 25, 0.7);
        }

        /* 被吸入文字的複製模擬層 */
        .suck-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .ghost-text {
            position: absolute;
            color: #e2d5ff;
            font-size: calc(var(--base-font-size) * 0.95);
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
            transform-origin: center;
            transition: all 1.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 施法按鈕（符合古典按鈕規範） */
        .magic-btn {
            display: block;
            width: 100%;
            background: rgba(216, 191, 138, 0.08);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 14px;
            font-family: "Cinzel", serif;
            font-size: calc(var(--base-font-size) * 1);
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .magic-btn:hover {
            background: var(--gold);
            color: var(--bg1);
            box-shadow: 0 6px 20px rgba(216, 191, 138, 0.4);
            transform: translateY(-2px);
        }

        .magic-btn:disabled {
            background: rgba(255, 255, 255, 0.02) !important;
            border-color: rgba(216, 191, 138, 0.15) !important;
            color: rgba(255, 255, 255, 0.2) !important;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* 貓巫醫的對話框（右側面板專用） */
        .cat-dialogue {
            background: rgba(216, 191, 138, 0.05);
            border: 1px solid rgba(216, 191, 138, 0.2);
            padding: 16px;
            border-radius: 14px;
            font-size: calc(var(--base-font-size) * 0.88);
            color: #cbb7f0;
            line-height: 1.6;
            font-style: italic;
            text-align: center;
            animation: fadeIn 0.6s ease forwards;
        }

        /* 新增動畫定義 */
        @keyframes rotateCircle {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulseHole {
            0% { transform: scale(1); box-shadow: 0 0 20px var(--magic-glow); }
            100% { transform: scale(1.1); box-shadow: 0 0 40px #c77dff, 0 0 15px #fff; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="frame"></div>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="container">
    <div class="font-control">
        <button class="font-btn" onclick="changeFontSize('small', this)">A -</button>
        <button class="font-btn active" onclick="changeFontSize('medium', this)">A</button>
        <button class="font-btn" onclick="changeFontSize('large', this)">A +</button>
    </div>

    <div class="moon">
        <div class="moon-symbol">☾</div>
    </div>

    <div class="title-block">
        <!-- 標題同步更改為貓巫醫垃圾桶 -->
        <h1 class="main-title" id="pageTitle">Cat Witch's Cauldron</h1>
    </div>

    <div class="layout-grid">
        
        <!-- 左側：核心功能面板（黑洞與輸入框） -->
        <div class="main-calculator" id="mainCorePanel">
            <!-- 魔法黑洞祭壇 -->
            <div class="altar-zone">
                <div class="magic-circle"></div>
                <div id="blackHole" class="black-hole">🐈‍⬛</div>
            </div>

            <!-- 怨念傾倒區 -->
            <div class="trash-input-container" id="inputContainer">
                <textarea id="trashInput" class="classic-textarea" placeholder="在此寫下你的怨念、委屈或任何不快...（別擔心，它們將永遠在深淵中解體湮滅）"></textarea>
                <div class="suck-layer" id="suckLayer"></div>
            </div>

            <!-- 啟動按鈕 -->
            <button id="castBtn" class="magic-btn" onclick="destroyNegativity()">ANNIHILATION ✦ 黑洞湮滅</button>
        </div>

        <!-- 右側：貓巫醫的低語提示面板 -->
        <div class="sidebar-panel" id="sidebarPanel">
            <h3 class="sidebar-title" id="sideTitle">🔮 貓巫醫的診斷</h3>
            <p class="sidebar-desc" id="sideDesc">把負能量當作祭品餵給深淵後，巫醫將在此為你解讀星塵與心靈狀態。</p>
            
            <div class="classic-hr"></div>

            <!-- 動態對話視窗 -->
            <div id="dialogueContainer" style="flex: 1; display: flex; align-items: center; justify-content: center;">
                <div id="catDialogue" class="cat-dialogue" style="color: #7a6b99;">
                    ※ 巫醫正在冥想中...<br>等待你的不快化作法陣的燃料。
                </div>
            </div>
        </div>

    </div>

    <div class="footer">
        <div class="footer-line"></div>
        <div class="footer-inner">
            <span id="footerBrand">✦ Lazy Dream ✦</span>
        </div>
        <div class="creator" id="footerSubtext">Crafted with moonlight & ledger magic</div>
    </div>
</div>

<script>
/* ===== 星空隨機位置背景生成 ===== */
const stars = document.getElementById("stars");
for (let i = 0; i < 140; i++) {
    const star = document.createElement("div");
    star.className = "star";
    star.style.left = Math.random() * 100 + "%";
    star.style.top = Math.random() * 100 + "%";
    star.style.animationDelay = Math.random() * 4 + "s";
    stars.appendChild(star);
}

/* ===== 魔法字體級距縮放切換 ===== */
function changeFontSize(size, btnElement) {
    const root = document.documentElement;
    document.querySelectorAll('.font-btn').forEach(btn => btn.classList.remove('active'));
    btnElement.classList.add('active');
    
    if (size === 'small') {
        root.style.setProperty('--base-font-size', '13px');
    } else if (size === 'medium') {
        root.style.setProperty('--base-font-size', '16px');
    } else if (size === 'large') {
        root.style.setProperty('--base-font-size', '20px');
    }
}

/* ===== 貓巫醫垃圾桶核心魔法邏輯 ===== */
const catWhispers = [
    "「呼嚕嚕...剛才那些垃圾，本巫醫已經幫你撕碎吞進深淵了。去喝口水吧。」",
    " White Magic：「喵嗚。既然已經丟進來了，回頭路就塌了，不准再想囉！」",
    "「哼，那種傢伙的智商不值得你耗費魔力生氣。本巫醫賞你一個肉墊祝福。」",
    "「垃圾清空了，你的心靈核心現在又是純淨的魔法晶石了。伸個懶腰吧。」",
    "「吸入了飽滿的負能量，本巫醫的毛色好像更亮了。謝謝你的款待，喵。」",
    "「（拍拍你的頭）好啦，壞事都被黑洞碾碎了，明天又是充滿星光的一天。」",
    "「那些讓你受委屈的事，已經被深淵長眠的觸手拖走了，沒事了喵。」"
];

function destroyNegativity() {
    const input = document.getElementById('trashInput');
    const text = input.value.trim();
    
    if (!text) {
        alert('巫醫提示：空無一物的虛無是無法當作祭品的，多多少少寫點什麼吧。');
        return;
    }

    const btn = document.getElementById('castBtn');
    const hole = document.getElementById('blackHole');
    const container = document.getElementById('inputContainer');
    const suckLayer = document.getElementById('suckLayer');
    const dialogue = document.getElementById('catDialogue');

    // 禁用按鈕與輸入
    btn.disabled = true;
    input.disabled = true;

    // 取得輸入框當下的絕對座標與尺寸
    const rect = input.getBoundingClientRect();
    const holeRect = hole.getBoundingClientRect();

    // 建立一個文字分身用於吸入特效
    const ghost = document.createElement('div');
    ghost.className = 'ghost-text';
    ghost.textContent = text;
    ghost.style.left = input.offsetLeft + 'px';
    ghost.style.top = input.offsetTop + 'px';
    ghost.style.width = input.offsetWidth + 'px';
    ghost.style.height = input.offsetHeight + 'px';
    suckLayer.appendChild(ghost);

    // 清空原本的輸入框，讓視覺焦點轉移到分身上
    input.value = '';
    hole.classList.add('active');

    // 計算黑洞中心相對於文字框的偏移量
    const deltaX = (holeRect.left + holeRect.width / 2) - (rect.left + rect.width / 2);
    const deltaY = (holeRect.top + holeRect.height / 2) - (rect.top + rect.height / 2);

    // 觸發黑洞吸入動畫 (縮小、旋轉、平移、淡出)
    setTimeout(() => {
        ghost.style.transform = `translate(${deltaX}px, ${deltaY}px) scale(0) rotate(1080deg)`;
        ghost.style.opacity = '0';
    }, 50);

    // 動畫結束後的復原與右側貓咪低語
    setTimeout(() => {
        ghost.remove();
        hole.classList.remove('active');
        
        // 亂數挑選貓巫醫的治癒台詞
        const randomWhisper = catWhispers[Math.floor(Math.random() * catWhispers.length)];
        
        // 更新右側面板的內容與顏色
        dialogue.innerHTML = randomWhisper;
        dialogue.style.color = '#cbb7f0';
        dialogue.style.fontStyle = 'italic';

        // 重新啟用輸入框與按鈕
        input.disabled = false;
        btn.disabled = false;
        input.placeholder = "又有一點不開心了嗎？這裡隨時為你敞開...";
    }, 1550);
}
</script>

</body>
</html>
