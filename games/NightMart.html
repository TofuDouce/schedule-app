<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>✦ 深夜便利商店 ✦</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg-base:#fff9f6;
    --bg-gradient:#ffebe3;

    --card-bg:#ffffff;

    --text-main:#54433a;
    --text-sub:#8e7a70;

    --gold:#f6c86c;
    --gold-hover:#efb94d;

    --pink:#f79999;

    --line:#eadfd8;

    --base-font-size:20px;

}

body{

    min-height:100vh;

    background:
    linear-gradient(
        180deg,
        var(--bg-base),
        var(--bg-gradient)
    );

    font-family:
    "Zen Maru Gothic",
    "Quicksand",
    sans-serif;

    color:var(--text-main);

    padding:28px;

    display:flex;
    justify-content:center;
    align-items:center;

    position:relative;

    font-size:var(--base-font-size);

}

.decor-border{

    position:fixed;
    inset:12px;

    border:2px dashed rgba(142,122,112,0.15);

    border-radius:24px;

    pointer-events:none;

}

.watermark{

    position:fixed;

    right:24px;
    bottom:24px;

    color:rgba(142,122,112,0.4);

    font-size:12px;

    pointer-events:none;

}

.container{

    width:100%;
    max-width:1200px;

    position:relative;
    z-index:2;

}

.topbar{

    display:flex;
    justify-content:flex-end;
    gap:8px;

    margin-bottom:18px;

}

.top-btn{

    border:none;

    background:white;

    border:1px solid rgba(142,122,112,0.18);

    color:var(--text-main);

    padding:8px 16px;

    border-radius:999px;

    cursor:pointer;

    font-family:inherit;
    font-size:15px;
    font-weight:700;

    transition:0.2s;

}

.top-btn:hover{

    background:#fff4ec;

    border-color:var(--gold);

}

.hero{

    text-align:center;

    margin-bottom:28px;

}

.badge{

    display:inline-block;

    background:rgba(246,200,108,0.18);

    color:#b57d18;

    padding:7px 16px;

    border-radius:999px;

    font-size:15px;
    font-weight:700;

    margin-bottom:14px;

}

.title{

    font-size:clamp(34px,5vw,50px);

    line-height:1.4;

}

.subtitle{

    margin-top:10px;

    color:var(--text-sub);

    font-size:16px;

}

.layout{

    display:grid;

    grid-template-columns:1fr;

    gap:24px;

}

@media(min-width:900px){

    .layout{

        grid-template-columns:1.2fr 0.8fr;

    }

}

.card{

    background:var(--card-bg);

    border-radius:28px;

    border:1px solid rgba(142,122,112,0.1);

    padding:30px;

    box-shadow:
    0 10px 30px rgba(84,67,58,0.05);

}

.section-title{

    font-size:24px;

    margin-bottom:18px;

}

.section-desc{

    color:var(--text-sub);

    line-height:1.8;

    margin-bottom:22px;

}

.soft-box{

    background:#fffaf7;

    border:1px dashed rgba(142,122,112,0.2);

    border-radius:18px;

    padding:18px;

    margin-bottom:18px;

}

.soft-box-title{

    font-size:17px;
    font-weight:700;

    margin-bottom:10px;

}

.soft-box-text{

    color:var(--text-sub);

    line-height:1.9;

}

.choice-grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:12px;

    margin-top:16px;

}

.choice-btn{

    border:none;

    background:white;

    border:1px solid rgba(142,122,112,0.15);

    padding:14px;

    border-radius:16px;

    cursor:pointer;

    font-family:inherit;

    font-size:15px;
    font-weight:700;

    transition:0.2s;

}

.choice-btn:hover{

    background:#fff3eb;

    transform:translateY(-2px);

}

.list{

    display:flex;
    flex-direction:column;

    gap:12px;

}

.list-item{

    background:#fffcfb;

    border:1px solid rgba(142,122,112,0.08);

    border-radius:16px;

    padding:16px 18px;

}

.list-item-title{

    font-weight:700;

    margin-bottom:6px;

}

.list-item-text{

    color:var(--text-sub);

    line-height:1.7;

    font-size:15px;

}

.shop-grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:10px;

    margin-top:12px;

}

.shop-btn{

    border:none;

    background:#4d4038;

    color:white;

    padding:12px;

    border-radius:14px;

    cursor:pointer;

    font-family:inherit;

    font-size:14px;
    font-weight:700;

}

.footer{

    text-align:center;

    margin-top:36px;

    color:var(--text-sub);

    font-size:14px;

}

.footer b{

    color:var(--pink);

}

</style>
</head>

<body>

<div class="decor-border"></div>

<div class="watermark">
    Made with sleepy nights by <b>ChuChu</b> ✦
</div>

<div class="container">

    <div class="topbar">

        <button class="top-btn" onclick="changeFont(-1)">
            A -
        </button>

        <button class="top-btn" onclick="resetFont()">
            A
        </button>

        <button class="top-btn" onclick="changeFont(1)">
            A +
        </button>

    </div>

    <div class="hero">

        <div class="badge">
            深夜便利商店模擬器 🌙
        </div>

        <h1 class="title">
            深夜便利商店
        </h1>

        <p class="subtitle">
            今天也努力撐到天亮吧。
        </p>

    </div>

    <div class="layout">

        <!-- LEFT -->

        <div class="card">

            <h2 class="section-title">
                🌙 今晚事件
            </h2>

            <p class="section-desc">
                深夜兩點後，
                客人會開始變得奇怪。
            </p>

            <div
                class="soft-box"
                id="eventBox"
            >

                <div class="soft-box-title">
                    💤 店裡很安靜
                </div>

                <div class="soft-box-text">
                    點擊下方按鈕開始夜班。
                </div>

            </div>

            <button
                class="choice-btn"
                style="width:100%;margin-bottom:16px;"
                onclick="newEvent()"
            >
                🌙 下一位客人
            </button>

            <div class="choice-grid">

                <button
                    class="choice-btn"
                    onclick="choice(1)"
                >
                    😇 禮貌接待
                </button>

                <button
                    class="choice-btn"
                    onclick="choice(2)"
                >
                    😐 假裝沒看到
                </button>

                <button
                    class="choice-btn"
                    onclick="choice(3)"
                >
                    😭 內心崩潰
                </button>

                <button
                    class="choice-btn"
                    onclick="choice(4)"
                >
                    ☕ 偷喝咖啡
                </button>

            </div>

            <!-- 商店 -->

            <div class="soft-box">

                <div class="soft-box-title">
                    🛒 補貨區
                </div>

                <div class="shop-grid">

                    <button
                        class="shop-btn"
                        onclick="buyFood()"
                    >
                        🍱 補便當
                    </button>

                    <button
                        class="shop-btn"
                        onclick="buyDrink()"
                    >
                        🥤 補飲料
                    </button>

                    <button
                        class="shop-btn"
                        onclick="feedCat()"
                    >
                        🐟 餵店貓
                    </button>

                    <button
                        class="shop-btn"
                        onclick="sleepDesk()"
                    >
                        💤 偷偷休息
                    </button>

                </div>

            </div>

        </div>

        <!-- RIGHT -->

        <div class="card">

            <h2 class="section-title">
                🏪 店內狀態
            </h2>

            <div class="list">

                <div class="list-item">

                    <div class="list-item-title">
                        💰 今日營收
                    </div>

                    <div
                        class="list-item-text"
                        id="moneyText"
                    >
                        NT$ 300
                    </div>

                </div>

                <div class="list-item">

                    <div class="list-item-title">
                        😴 精神值
                    </div>

                    <div
                        class="list-item-text"
                        id="mentalText"
                    >
                        100 / 100
                    </div>

                </div>

                <div class="list-item">

                    <div class="list-item-title">
                        🍱 食物庫存
                    </div>

                    <div
                        class="list-item-text"
                        id="foodText"
                    >
                        10 份
                    </div>

                </div>

                <div class="list-item">

                    <div class="list-item-title">
                        🥤 飲料庫存
                    </div>

                    <div
                        class="list-item-text"
                        id="drinkText"
                    >
                        8 瓶
                    </div>

                </div>

                <div class="list-item">

                    <div class="list-item-title">
                        🐈 店貓好感度
                    </div>

                    <div
                        class="list-item-text"
                        id="catText"
                    >
                        50 / 100
                    </div>

                </div>

                <div class="list-item">

                    <div class="list-item-title">
                        🌟 今日 Buff
                    </div>

                    <div
                        class="list-item-text"
                        id="buffText"
                    >
                        尚未獲得 Buff
                    </div>

                </div>

            </div>

        </div>

    </div>

    <div class="footer">

        <div>
            ✦ Midnight Convenience Store ✦
        </div>

        <div>
            Designed by <b>ChuChu</b> © 2026
        </div>

    </div>

</div>

<script>

/* 字體 */

let currentSize = 20;

function changeFont(value){

    currentSize += value;

    if(currentSize < 16){
        currentSize = 16;
    }

    if(currentSize > 26){
        currentSize = 26;
    }

    document.documentElement.style.setProperty(
        '--base-font-size',
        currentSize + 'px'
    );

}

function resetFont(){

    currentSize = 20;

    document.documentElement.style.setProperty(
        '--base-font-size',
        '20px'
    );

}

/* 數值 */

let money = 300;
let mental = 100;
let food = 10;
let drink = 8;
let cat = 50;

let currentCustomer = "";

/* 客人 */

const customers = [

"👹 奧客：『熱狗為什麼不會自己轉？』",

"🧍 客人買了 18 瓶水。",

"🌙 深夜高中生正在泡麵區發呆。",

"👻 有人凌晨三點只買一根香蕉。",

"🧋 客人問能不能微波奶茶。",

"😭 社畜站在冰櫃前沉思人生。",

"🐈 店貓突然衝去追客人。",

"💡 店裡燈光閃了一下。",

"🍱 有人把所有鮭魚便當買走了。",

"📄 客人開始印 200 張文件。"

];

/* random */

function random(arr){

    return arr[
        Math.floor(
            Math.random()*arr.length
        )
    ];

}

/* 更新 */

function updateUI(){

    document.getElementById(
        "moneyText"
    ).innerText =
    "NT$ " + money;

    document.getElementById(
        "mentalText"
    ).innerText =
    mental + " / 100";

    document.getElementById(
        "foodText"
    ).innerText =
    food + " 份";

    document.getElementById(
        "drinkText"
    ).innerText =
    drink + " 瓶";

    document.getElementById(
        "catText"
    ).innerText =
    cat + " / 100";

}

/* 新事件 */

function newEvent(){

    currentCustomer =
    random(customers);

    mental -= 5;

    if(mental < 0){
        mental = 0;
    }

    document.getElementById(
        "eventBox"
    ).innerHTML = `

        <div class="soft-box-title">
            🌙 深夜客人出現
        </div>

        <div class="soft-box-text">
            ${currentCustomer}
        </div>

    `;

    updateUI();

}

/* 選擇 */

function choice(type){

    let text = "";

    if(type === 1){

        money += 80;

        text =
        "😇 你努力保持微笑。\n客人似乎滿意地離開了。\n💰 營收增加 +80";

    }

    if(type === 2){

        mental -= 5;

        text =
        "😐 你假裝正在整理貨架。\n客人開始自言自語。\n😴 精神值 -5";

    }

    if(type === 3){

        mental -= 12;

        text =
        "😭 你的靈魂離開了 3 秒。\n店貓默默看著你。\n😵 精神值 -12";

    }

    if(type === 4){

        mental += 15;

        drink -= 1;

        text =
        "☕ 你偷喝了冰美式。\n突然恢復一點生命力。\n✨ 精神值 +15";

        document.getElementById(
            "buffText"
        ).innerText =
        "☕ 冰美式 Buff：熬夜能力提升";

    }

    if(mental > 100){
        mental = 100;
    }

    document.getElementById(
        "eventBox"
    ).innerHTML += `

        <br><br>

        <div class="soft-box-text">
            ${text}
        </div>

    `;

    /* 特殊事件 */

    if(Math.random() < 0.18){

        document.getElementById(
            "eventBox"
        ).innerHTML += `

        <br><br>

        <div class="soft-box-text">
            ⚡ 特殊事件：
            店裡突然停電了。
            所有人沉默 5 秒。
        </div>

        `;

        mental -= 8;

    }

    if(Math.random() < 0.15){

        document.getElementById(
            "eventBox"
        ).innerHTML += `

        <br><br>

        <div class="soft-box-text">
            🐈 店貓蹭了你一下。
            精神恢復 +10
        </div>

        `;

        mental += 10;
        cat += 5;

    }

    updateUI();

}

/* 商店 */

function buyFood(){

    if(money >= 120){

        money -= 120;
        food += 5;

        alert("🍱 補充了便當庫存！");

    }else{

        alert("💸 錢不夠。");

    }

    updateUI();

}

function buyDrink(){

    if(money >= 80){

        money -= 80;
        drink += 5;

        alert("🥤 飲料補貨完成！");

    }else{

        alert("💸 錢不夠。");

    }

    updateUI();

}

function feedCat(){

    if(money >= 60){

        money -= 60;

        cat += 10;

        mental += 5;

        alert("🐈 店貓看起來很開心。");

    }

    updateUI();

}

function sleepDesk(){

    mental += 12;

    alert("💤 你趁沒客人時偷偷睡了一下。");

    updateUI();

}

</script>

</body>
</html>
