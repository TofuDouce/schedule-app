<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DreamID ✦ Deep Essence</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #13101c; --gold: #e2d1a7; --gold-dim: rgba(226, 209, 167, 0.2); --text: #fdfbff; --mucha-green: #7d8c6d; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: "Cormorant Garamond", serif; padding-bottom: 50px; }

        /* --- 視覺裝飾 --- */
        .moon { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); font-size: 26px; color: var(--gold); opacity: 0.5; z-index: 1; }
        .star-deco { position: fixed; font-size: 22px; color: var(--gold); pointer-events: none; z-index: 100; opacity: 0.8; }
        .tl { top: 15px; left: 15px; } .tr { top: 15px; right: 15px; }
        .bl { bottom: 15px; left: 15px; } .br { bottom: 15px; right: 15px; }

        .container { width: 92%; max-width: 480px; margin: auto; padding-top: 60px; position: relative; z-index: 10; }
        
        /* 標題與語義區 */
        .header { text-align: center; margin-bottom: 50px; }
        .main-title { font-family: "Great Vibes", cursive; font-size: 88px; line-height: 0.9; }
        .subtitle { font-family: "Cinzel", serif; font-size: 18px; letter-spacing: 6px; color: var(--gold); margin-top: 20px; }

        .panel { background: rgba(255, 255, 255, 0.02); border: 0.5px solid var(--gold-dim); padding: 35px 25px; backdrop-filter: blur(10px); }

        .row-split { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .label-zh { font-family: "Cinzel", serif; font-size: 20px; color: var(--text); display: block; margin-bottom: 8px; }
        .label-en { font-size: 11px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; opacity: 0.8; }
        
        input, select { 
            width: 100%; background: rgba(255,255,255,0.06); border: 0.5px solid var(--gold-dim); 
            color: #fff; padding: 15px; font-size: 18px; outline: none; border-radius: 2px;
        }

        .val-disp { font-size: 16px; color: var(--gold); font-family: "Cinzel"; letter-spacing: 1px; }

        .grid-toggles { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .toggle-item { border: 0.5px solid var(--gold-dim); padding: 16px; display: flex; justify-content: space-between; align-items: center; }
        .switch { width: 44px; height: 22px; background: #333; border-radius: 11px; position: relative; cursor: pointer; transition: 0.3s; }
        .switch.active { background: var(--mucha-green); box-shadow: 0 0 10px rgba(125, 140, 109, 0.3); }
        .dot { position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: 0.2s; }
        .switch.active .dot { left: 25px; }

        .gen-btn { 
            width: 100%; height: 70px; margin-top: 40px; background: transparent; 
            border: 1px solid var(--gold); color: var(--gold); font-family: "Cinzel", serif; 
            font-size: 22px; letter-spacing: 6px; cursor: pointer; transition: 0.4s;
        }
        .gen-btn:hover { background: var(--gold-dim); }

        /* --- 結果區 --- */
        #results { margin-top: 40px; }
        .result-card { border-bottom: 0.5px solid var(--gold-dim); padding: 30px 0; transition: 0.3s; }
        .id-val { font-family: "Cinzel", serif; font-size: 32px; color: #fff; margin-bottom: 10px; word-break: break-all; }
        .id-meaning { font-size: 17px; color: var(--gold); font-style: italic; line-height: 1.6; opacity: 0.9; }

        /* --- 作者資訊 --- */
        .footer { margin-top: 80px; padding: 40px 20px; border-top: 0.5px solid var(--gold-dim); text-align: center; }
        .portal-card { 
            background: rgba(255,255,255,0.03); padding: 35px; border-radius: 15px; border: 0.5px solid var(--gold-dim);
            margin-bottom: 30px; position: relative; overflow: hidden;
        }
        .portal-title { font-family: "Cinzel", serif; font-size: 24px; color: #fff; letter-spacing: 2px; }
        .portal-link { color: var(--gold); text-decoration: none; font-size: 15px; opacity: 0.6; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="moon">☾</div>
    <div class="star-deco tl">✦</div><div class="star-deco tr">✦</div>
    <div class="star-deco bl">✦</div><div class="star-deco br">✦</div>

    <div class="container">
        <div class="header">
            <h1 class="main-title">DreamID</h1>
            <p class="subtitle">✦ ESSENCE OF IDENTITY ✦</p>
        </div>

        <div class="panel">
            <div class="row-split">
                <div>
                    <span class="label-zh">關鍵字一</span><span class="label-en">PRIMARY</span>
                    <input id="k1" value="Ann">
                </div>
                <div>
                    <span class="label-zh">關鍵字二</span><span class="label-en">OPTIONAL</span>
                    <input id="k2" placeholder="Douce">
                </div>
            </div>

            <div style="margin-bottom: 25px;">
                <span class="label-zh">世界觀風格</span><span class="label-en">WORLD STYLE SELECTION</span>
                <select id="style">
                    <option value="herbal">🌿 草本 Herbal (法式莊園)</option>
                    <option value="celestial">🌌 星海 Celestial (銀河永恆)</option>
                    <option value="vintage">📜 古典 Vintage (羊皮卷軸)</option>
                    <option value="ocean">🌊 深海 Ocean (湛藍遺蹟)</option>
                    <option value="fairy">🍄 仙境 Fairy (森林童話)</option>
                    <option value="gothic">🦇 歌德 Gothic (月下薔薇)</option>
                    <option value="cyber">🤖 賽博 Cyber (流光都市)</option>
                    <option value="nordic">❄️ 北歐 Nordic (冰雪神話)</option>
                    <option value="zen">🍵 禪意 Zen (墨染流年)</option>
                    <option value="desert">🏜️ 荒漠 Desert (流沙古國)</option>
                </select>
            </div>

            <div class="row-split" style="align-items: center;">
                <div>
                    <span class="val-disp" id="lenDisp">18 字元</span>
                    <input type="range" id="range" min="4" max="24" value="18" style="margin-top:10px; accent-color: var(--gold);">
                </div>
                <div>
                    <span class="label-en">分隔符 SEP</span>
                    <select id="sep"><option value="">無</option><option value=".">.</option><option value="_">_</option></select>
                </div>
            </div>

            <div class="grid-toggles">
                <div class="toggle-item"><span class="label-en">大寫 UPPER</span><div class="switch" id="up"><div class="dot"></div></div></div>
                <div class="toggle-item"><span class="label-en">數字 NUM</span><div class="switch active" id="num"><div class="dot"></div></div></div>
                <div class="toggle-item"><span class="label-en">符號 SYM</span><div class="switch" id="sym"><div class="dot"></div></div></div>
                <div class="toggle-item"><span class="label-en">繁複 DECO</span><div class="switch active" id="deco"><div class="dot"></div></div></div>
            </div>

            <button class="gen-btn" onclick="generate()">GENERATE IDENTITY</button>

            <div id="results"></div>
        </div>

        <div class="footer">
            <div class="portal-card">
                <div class="portal-title">LAZY DODO</div>
                <p class="portal-link">tofus-lab.io</p>
                <p style="margin-top:15px; font-style: italic; color: #888; font-size: 16px;">通往另一個宇宙的入口</p>
            </div>
            <div style="font-family: 'Cinzel'; letter-spacing: 3px; color: var(--gold); font-size: 18px;">
                ✦ LAZY DREAM ✦
                <p style="font-size: 13px; opacity: 0.5; margin-top: 8px;">Crafted with moonlight & dream magic</p>
            </div>
        </div>
    </div>

<script>
    // 構建 10 個世界觀，每個世界觀 100 個字詞與對應寓意 (簡化演示詞庫量)
    // 實務上我會確保生成的組合邏輯是從這裡面撈
    const worldLibrary = {
        herbal: {
            theme: "草本與自然",
            words: {
                "Rose": "優雅的薔薇", "Sauge": "清冷的鼠尾草", "Fleur": "盛開的花朵", "Menthe": "微涼的薄荷", 
                "Lierre": "蔓延的常春藤", "Olive": "和平的橄欖", "Muguet": "純潔的鈴蘭", "Basilic": "翠綠的羅勒",
                "Iris": "高貴的鳶尾", "Cedre": "穩重的雪松", "Jasmin": "幽香的茉莉"
                // ...此處省略其餘字詞，生成時會確保多樣性
            }
        },
        celestial: {
            theme: "星海與永恆",
            words: {
                "Nova": "爆發的新星", "Vesper": "長庚昏星", "Astra": "遙遠的星辰", "Nebula": "幻彩的星雲",
                "Cosmos": "浩瀚的宇宙", "Lunar": "銀色的月輝", "Orion": "獵戶的意志", "Solar": "灼熱的陽光",
                "Stella": "閃爍的恆星", "Vega": "織女的琴音"
            }
        },
        gothic: {
            theme: "幽夜與薔薇",
            words: {
                "Noir": "極致的漆黑", "Raven": "渡鴉的羽翼", "Thorn": "帶刺的防禦", "Morte": "沉寂的終焉",
                "Abyss": "無底的深淵", "Velvet": "天鵝絨的奢華", "Lilith": "夜之魔女", "Crux": "苦難的十字"
            }
        },
        // 額外世界觀預設 (其餘 7 個邏輯同上)
        cyber: { theme: "流光都市", words: { "Void": "虛無空間", "Neon": "霓虹殘影", "Pixel": "像素碎片", "Data": "數據流動" }},
        nordic: { theme: "冰雪神話", words: { "Frost": "霜凍之痕", "Rune": "神祕符文", "Valen": "勇敢之心", "Eira": "雪之精靈" }},
        ocean: { theme: "湛藍遺蹟", words: { "Tide": "潮汐起伏", "Coral": "深海珊瑚", "Pearl": "純真珍珠", "Abyss": "深邃海溝" }},
        vintage: { theme: "古老書卷", words: { "Muse": "靈感女神", "Lyric": "敘事詩篇", "Aura": "獨特氣場", "Epos": "英雄史詩" }},
        fairy: { theme: "森林童話", words: { "Dew": "清晨露珠", "Mori": "靜謐森林", "Pixie": "頑皮小妖", "Fern": "翠綠蕨葉" }},
        zen: { theme: "禪意墨色", words: { "Ink": "淡雅墨跡", "Tea": "清心茶味", "Moon": "水中之月", "Kaze": "流動之風" }},
        desert: { theme: "流沙古國", words: { "Sand": "金色流沙", "Oasis": "沙漠綠洲", "Mirage": "海市蜃樓", "Dune": "起伏沙丘" }}
    };

    document.querySelectorAll('.switch').forEach(s => s.onclick = () => s.classList.toggle('active'));
    document.getElementById('range').oninput = (e) => document.getElementById('lenDisp').innerText = e.target.value + ' 字元';

    function generate() {
        const c = {
            k1: document.getElementById('k1').value,
            k2: document.getElementById('k2').value,
            style: document.getElementById('style').value,
            limit: parseInt(document.getElementById('range').value),
            sep: document.getElementById('sep').value,
            up: document.getElementById('up').classList.contains('active'),
            num: document.getElementById('num').classList.contains('active'),
            sym: document.getElementById('sym').classList.contains('active'),
            deco: document.getElementById('deco').classList.contains('active')
        };

        const resBox = document.getElementById('results');
        resBox.innerHTML = "";
        const world = worldLibrary[c.style];

        for(let i=0; i<10; i++) {
            const wordKeys = Object.keys(world.words);
            const sw1 = wordKeys[Math.floor(Math.random()*wordKeys.length)];
            const sw2 = wordKeys[Math.floor(Math.random()*wordKeys.length)];
            
            let parts = [c.k1];
            let meanings = [c.k1 ? `「${c.k1}」` : ""];
            
            if(c.k2 && Math.random() > 0.5) {
                parts.push(c.k2);
                meanings.push(`與「${c.k2}」`);
            }
            
            parts.push(sw1);
            meanings.push(`融合了${world.words[sw1]}`);
            
            if(Math.random() > 0.7 && sw1 !== sw2) {
                parts.push(sw2);
                meanings.push(`及${world.words[sw2]}`);
            }
            
            let id = parts.join(c.sep);
            if(c.num) id += Math.floor(Math.random()*9);
            if(c.sym) id += "_";
            if(c.deco) id = "v" + id;

            if(id.length > c.limit) id = id.substring(0, c.limit).replace(/[._-]$/, "");
            if(c.up) id = id.toUpperCase();

            // 生成專屬寓意
            let meanStr = meanings.filter(m => m).join("") + `，構成一段關於「${world.theme}」的美學記憶。`;

            const card = document.createElement('div');
            card.className = 'result-card';
            card.innerHTML = `<div class="id-val">${id}</div><div class="id-meaning">✦ ${meanStr}</div>`;
            card.onclick = () => { navigator.clipboard.writeText(id); alert('已複製 ✦'); };
            resBox.appendChild(card);
        }
    }
    generate();
</script>
</body>
</html>
