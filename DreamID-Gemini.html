<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DreamID ✦ Celestial Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #13101c; --gold: #e2d1a7; --gold-dim: rgba(226, 209, 167, 0.2); --text: #fdfbff; --mucha-green: #7d8c6d; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: "Cormorant Garamond", serif; padding-bottom: 80px; }

        /* --- 纖細星月裝飾 --- */
        .celestial-deco { position: fixed; width: 40px; height: 40px; pointer-events: none; z-index: 100; color: var(--gold); }
        .moon { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); font-size: 20px; opacity: 0.6; }
        .tl { top: 15px; left: 15px; } .tr { top: 15px; right: 15px; }
        .bl { bottom: 15px; left: 15px; } .br { bottom: 15px; right: 15px; }

        .container { width: 92%; max-width: 450px; margin: auto; padding-top: 50px; }
        
        /* --- 標題區 (字體放大) --- */
        .header { text-align: center; margin-bottom: 40px; }
        .main-title { font-family: "Great Vibes", cursive; font-size: 82px; font-weight: 400; line-height: 1; }
        .subtitle { font-family: "Cinzel", serif; font-size: 16px; letter-spacing: 6px; color: var(--gold); margin-top: 15px; }

        .panel { background: rgba(255, 255, 255, 0.02); border: 0.5px solid var(--gold-dim); padding: 30px 20px; }

        /* 表單佈局 */
        .row-split { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .label-zh { font-family: "Cinzel", serif; font-size: 19px; color: var(--text); display: block; margin-bottom: 8px; }
        .label-en { font-size: 11px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; opacity: 0.8; }
        
        input, select { 
            width: 100%; background: rgba(255,255,255,0.05); border: 0.5px solid var(--gold-dim); 
            color: #fff; padding: 14px; font-size: 18px; outline: none; border-radius: 4px;
        }

        /* 數值顯示放大 */
        .val-disp { font-size: 16px; color: var(--gold); font-family: "Cinzel"; }

        .grid-toggles { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .toggle-item { border: 0.5px solid var(--gold-dim); padding: 15px 12px; display: flex; justify-content: space-between; align-items: center; }
        .switch { width: 40px; height: 20px; background: #333; border-radius: 10px; position: relative; cursor: pointer; }
        .switch.active { background: var(--mucha-green); }
        .dot { position: absolute; top: 3px; left: 3px; width: 14px; height: 14px; background: #fff; border-radius: 50%; transition: 0.2s; }
        .switch.active .dot { left: 23px; }

        .gen-btn { 
            width: 100%; height: 65px; margin-top: 30px; background: transparent; 
            border: 1px solid var(--gold); color: var(--gold); font-family: "Cinzel", serif; 
            font-size: 20px; letter-spacing: 5px; cursor: pointer; transition: 0.3s;
        }
        .gen-btn:active { background: var(--gold); color: var(--bg); }

        /* --- 結果區 --- */
        #results { margin-top: 30px; }
        .result-card { border-bottom: 0.5px solid var(--gold-dim); padding: 25px 0; }
        .id-val { font-family: "Cinzel", serif; font-size: 30px; color: #fff; margin-bottom: 8px; letter-spacing: 1px; }
        .id-meaning { font-size: 15px; color: var(--gold); font-style: italic; opacity: 0.8; }

        /* --- 作者資訊區 (Portal Style) --- */
        .footer { margin-top: 60px; padding: 40px 20px; border-top: 0.5px solid var(--gold-dim); text-align: center; }
        .portal-card { 
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            padding: 30px; border-radius: 20px; border: 0.5px solid var(--gold-dim);
            margin-bottom: 20px;
        }
        .portal-title { font-family: "Cinzel", serif; font-size: 22px; color: #fff; margin-bottom: 10px; }
        .portal-link { color: var(--gold); text-decoration: none; font-size: 14px; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="moon">☾</div>
    <div class="celestial-deco tl">✦</div><div class="celestial-deco tr">✦</div>
    <div class="celestial-deco bl">✦</div><div class="celestial-deco br">✦</div>

    <div class="container">
        <div class="header">
            <h1 class="main-title">DreamID</h1>
            <p class="subtitle">✦ ESSENCE OF IDENTITY ✦</p>
        </div>

        <div class="panel">
            <div class="row-split">
                <div>
                    <span class="label-zh">關鍵字一</span><span class="label-en">PRIMARY</span>
                    <input id="k1" value="Ann">
                </div>
                <div>
                    <span class="label-zh">關鍵字二</span><span class="label-en">OPTIONAL</span>
                    <input id="k2" placeholder="Douce">
                </div>
            </div>

            <div style="margin-bottom: 25px;">
                <span class="label-zh">世界觀風格</span><span class="label-en">STYLE WORLD</span>
                <select id="style">
                    <option value="herbal">🌿 草本 Herbal (法式自然)</option>
                    <option value="dreamy">🌙 夢境 Dreamy (幻象輕盈)</option>
                    <option value="angel">✨ 天使 Angel (神聖純淨)</option>
                    <option value="luxury">👑 奢華 Luxury (典雅皇室)</option>
                    <option value="gothic">🦇 幽夜 Gothic (暗黑薔薇)</option>
                    <option value="myth">🏛️ 神話 Myth (永恆意志)</option>
                </select>
            </div>

            <div class="row-split" style="align-items: center;">
                <div>
                    <span class="val-disp" id="lenDisp">16 字元</span>
                    <input type="range" id="range" min="4" max="24" value="16" style="margin-top:10px;">
                </div>
                <div>
                    <span class="label-en">分隔符 SEP</span>
                    <select id="sep"><option value="">無</option><option value=".">.</option><option value="_">_</option></select>
                </div>
            </div>

            <div class="grid-toggles">
                <div class="toggle-item"><span class="label-en">大寫 UPPER</span><div class="switch" id="up"><div class="dot"></div></div></div>
                <div class="toggle-item"><span class="label-en">數字 NUM</span><div class="switch active" id="num"><div class="dot"></div></div></div>
                <div class="toggle-item"><span class="label-en">符號 SYM</span><div class="switch" id="sym"><div class="dot"></div></div></div>
                <div class="toggle-item"><span class="label-en">繁複 DECO</span><div class="switch active" id="deco"><div class="dot"></div></div></div>
            </div>

            <button class="gen-btn" onclick="generate()">GENERATE IDENTITY</button>

            <div id="results"></div>
        </div>

        <div class="footer">
            <div class="portal-card">
                <div class="portal-title">LAZY DODO</div>
                <p class="portal-link">linelogo.html</p>
                <p style="margin-top:15px; font-style: italic; color: #888;">通往另一個宇宙的入口</p>
            </div>
            <div style="font-family: 'Cinzel'; letter-spacing: 2px; color: var(--gold);">
                ✦ LAZY DREAM ✦
                <p style="font-size: 12px; opacity: 0.5; margin-top: 5px;">Crafted with moonlight & dream magic</p>
            </div>
        </div>
    </div>

<script>
    const dict = {
        herbal: { words: ["Fleur", "Sauge", "Rose", "Menthe", "Lierre", "Olive"], mean: "漫步於南法莊園，呼吸著微風中的草本芬芳" },
        dreamy: { words: ["Nova", "Echo", "Vesper", "Somnus", "Luna", "Aura"], mean: "夢境邊緣的星辰，閃爍著不可言說的幻象" },
        angel: { words: ["Halo", "Seraph", "Grace", "Caelum", "Eden", "Purity"], mean: "晨曦中的神聖祝禱，帶著羽翼拂過的純淨" },
        luxury: { words: ["Dore", "Elite", "Bijou", "Reine", "Palais", "Eclat"], mean: "凡爾賽宮殿的璀璨流光，象徵永恆的典雅" },
        gothic: { words: ["Noir", "Morte", "Raven", "Thorn", "Lilith", "Abyss"], mean: "幽夜中盛開的黑色薔薇，靜謐而危險的魅力" },
        myth: { words: ["Athena", "Nyx", "Chaos", "Astra", "Zephyr", "Iris"], mean: "古希臘神壇上的低語，跨越千年的意志傳承" }
    };

    document.querySelectorAll('.switch').forEach(s => s.onclick = () => s.classList.toggle('active'));
    document.getElementById('range').oninput = (e) => document.getElementById('lenDisp').innerText = e.target.value + ' 字元';

    function generate() {
        const c = {
            k1: document.getElementById('k1').value || "Ann",
            k2: document.getElementById('k2').value,
            style: document.getElementById('style').value,
            limit: parseInt(document.getElementById('range').value),
            sep: document.getElementById('sep').value,
            up: document.getElementById('up').classList.contains('active'),
            num: document.getElementById('num').classList.contains('active'),
            sym: document.getElementById('sym').classList.contains('active'),
            deco: document.getElementById('deco').classList.contains('active')
        };

        const resBox = document.getElementById('results');
        resBox.innerHTML = "";

        // 增加到 10 個結果
        for(let i=0; i<10; i++) {
            let styleData = dict[c.style];
            let sw = styleData.words[Math.floor(Math.random()*styleData.words.length)];
            
            let parts = [c.k1];
            if(c.k2 && Math.random() > 0.4) parts.push(c.k2);
            parts.push(sw);
            
            let id = parts.join(c.sep);
            if(c.num) id += Math.floor(Math.random()*9);
            if(c.sym) id += (Math.random() > 0.5 ? "_" : "");
            if(c.deco) {
                const decos = ["v_", "x_", "o_"];
                id = decos[Math.floor(Math.random()*decos.length)] + id;
            }

            if(id.length > c.limit) id = id.substring(0, c.limit).replace(/[._-]$/, "");
            if(c.up) id = id.toUpperCase();

            const card = document.createElement('div');
            card.className = 'result-card';
            card.innerHTML = `<div class="id-val">${id}</div><div class="id-meaning">✦ ${styleData.mean}</div>`;
            card.onclick = () => { navigator.clipboard.writeText(id); alert('Copied ✦'); };
            resBox.appendChild(card);
        }
    }
    generate();
</script>
</body>
</html>
