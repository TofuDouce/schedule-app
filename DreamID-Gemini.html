<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DreamID ✦ Fusion</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #13101c; --gold: #e2d1a7; --gold-dim: rgba(226, 209, 167, 0.2); --text: #fdfbff; --active-bg: rgba(226, 209, 167, 0.15); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: "Cormorant Garamond", serif; padding-bottom: 50px; }

        .container { width: 92%; max-width: 480px; margin: auto; padding-top: 30px; }
        .header { text-align: center; margin-bottom: 20px; }
        .main-title { font-family: "Great Vibes", cursive; font-size: 56px; line-height: 1; }

        .panel { background: rgba(255, 255, 255, 0.02); border: 0.5px solid var(--gold-dim); padding: 18px; backdrop-filter: blur(10px); }

        /* 5x4 矩陣開關視覺 */
        .world-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 20px; }
        .world-btn { 
            background: rgba(255,255,255,0.03); border: 0.5px solid rgba(226, 209, 167, 0.1); 
            color: rgba(255,255,255,0.6); padding: 8px 0; font-size: 12px; cursor: pointer; 
            transition: all 0.2s ease; text-align: center; border-radius: 4px;
            display: flex; flex-direction: column; align-items: center; position: relative;
        }
        /* 選中狀態：發光與內凹感 */
        .world-btn.active { 
            background: var(--active-bg); border-color: var(--gold); color: #fff;
            box-shadow: inset 0 0 8px rgba(226, 209, 167, 0.2), 0 0 12px rgba(226, 209, 167, 0.1);
        }
        .world-btn.active::after { content: '●'; font-size: 6px; color: var(--gold); margin-top: 2px; }
        .world-btn .emoji { font-size: 16px; margin-bottom: 2px; filter: grayscale(100%); transition: 0.3s; }
        .world-btn.active .emoji { filter: grayscale(0%); }

        .row-split { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        input, select { 
            width: 100%; background: rgba(255,255,255,0.06); border: 0.5px solid var(--gold-dim); 
            color: #fff; padding: 10px; font-size: 14px; outline: none; border-radius: 2px;
        }

        .gen-btn { 
            width: 100%; height: 50px; margin-top: 20px; background: transparent; 
            border: 1px solid var(--gold); color: var(--gold); font-family: "Cinzel", serif; 
            font-size: 15px; letter-spacing: 2px; cursor: pointer; transition: 0.4s;
        }
        .gen-btn:active { background: var(--gold-dim); }

        .result-card { border-bottom: 0.5px solid var(--gold-dim); padding: 12px 0; animation: fadeIn 0.4s ease forwards; }
        .id-val { font-family: "Cinzel", serif; font-size: 20px; color: #fff; margin-bottom: 4px; }
        .id-meaning { font-size: 13px; color: var(--gold); font-style: italic; line-height: 1.4; opacity: 0.8; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 class="main-title">DreamID</h1>
        </div>

        <div class="panel">
            <div class="world-grid" id="worldGrid"></div>

            <div class="row-split">
                <input id="k1" value="Ann" placeholder="Key 1">
                <input id="k2" placeholder="Key 2">
            </div>

            <div class="row-split" style="align-items: center;">
                <div>
                    <span style="font-size:12px; color:var(--gold)" id="lenDisp">14 字元</span>
                    <input type="range" id="range" min="6" max="24" value="14" style="accent-color: var(--gold);">
                </div>
                <select id="sep">
                    <option value="">無間隔</option>
                    <option value=".">.</option>
                    <option value="_">_</option>
                </select>
            </div>

            <button class="gen-btn" id="generateBtn">FUSION START</button>
            <div id="results"></div>
        </div>
    </div>

<script>
    const worlds = [
        { id: 'sweet', n: '糖霜', e: '🍭', w: ["Sugar", "Cream", "Berry", "Honey"], m: "砂糖" },
        { id: 'tenno', n: '虛空', e: '⚔️', w: ["Lotus", "Void", "Oro", "Prime"], m: "秘蓮" },
        { id: 'hunter', n: '獵跡', e: '🐉', w: ["Rath", "Scale", "Apex", "Hunt"], m: "火魂" },
        { id: 'desert', n: '荒漠', e: '🏜️', w: ["Sand", "Oasis", "Dune", "Sol"], m: "綠洲" },
        { id: 'herbal', n: '草本', e: '🌿', w: ["Rose", "Mint", "Ivy", "Leaf"], m: "蔓延" },
        { id: 'star', n: '星海', e: '🌌', w: ["Nova", "Luna", "Astra", "Star"], m: "星雲" },
        { id: 'ocean', n: '深海', e: '🌊', w: ["Tide", "Coral", "Abyss", "Aqua"], m: "潮汐" },
        { id: 'classic', n: '古典', e: '📜', w: ["Muse", "Aura", "Velvet", "Poet"], m: "繆思" },
        { id: 'fairy', n: '仙境', e: '🍄', w: ["Dew", "Mori", "Pixie", "Fern"], m: "森林" },
        { id: 'gothic', n: '歌德', e: '🦇', w: ["Noir", "Raven", "Thorn", "Dark"], m: "暗夜" },
        { id: 'cyber', n: '賽博', e: '🤖', w: ["Neon", "Pixel", "Data", "Sync"], m: "霓虹" },
        { id: 'nordic', n: '北歐', e: '❄️', w: ["Frost", "Rune", "Fjord", "Ice"], m: "冰霜" },
        { id: 'zen', n: '禪意', e: '🍵', w: ["Ink", "Tea", "Wind", "Sora"], m: "墨痕" },
        { id: 'magic', n: '奧術', e: '🪄', w: ["Mana", "Sage", "Soul", "Echo"], m: "靈魂" },
        { id: 'steam', n: '蒸氣', e: '⚙️', w: ["Gear", "Haze", "Brass", "Core"], m: "齒輪" },
        { id: 'ink', n: '墨影', e: '📽️', w: ["Lens", "Shadow", "Grain", "Film"], m: "鏡頭" },
        { id: 'sakura', n: '櫻落', e: '🌸', w: ["Hana", "Yoru", "Kaze", "Sake"], m: "花瓣" },
        { id: 'lava', n: '熔岩', e: '🔥', w: ["Ash", "Flare", "Magma", "Pyre"], m: "餘燼" },
        { id: 'ice', n: '晶綻', e: '💎', w: ["Crystal", "Cold", "Glaze", "Blue"], m: "晶體" },
        { id: 'cloud', n: '雲端', e: '☁️', w: ["Cloud", "Mist", "Halo", "Sky"], m: "流雲" }
    ];

    const grid = document.getElementById('worldGrid');
    worlds.forEach(w => {
        const btn = document.createElement('div');
        btn.className = 'world-btn';
        btn.dataset.id = w.id;
        btn.innerHTML = `<span class="emoji">${w.e}</span><span>${w.n}</span>`;
        btn.onclick = () => btn.classList.toggle('active');
        grid.appendChild(btn);
    });

    function toPascal(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1).toLowerCase() : ""; }

    function generate() {
        const activeIds = Array.from(document.querySelectorAll('.world-btn.active')).map(b => b.dataset.id);
        if (activeIds.length === 0) { alert("請至少選擇一個世界觀以進行融合"); return; }

        const k1 = toPascal(document.getElementById('k1').value || "Ann");
        const k2 = toPascal(document.getElementById('k2').value);
        const sep = document.getElementById('sep').value;
        const limit = parseInt(document.getElementById('range').value);
        const resBox = document.getElementById('results');
        resBox.innerHTML = "";

        for(let i=0; i<8; i++) {
            // 隨機打亂選中的 ID，取前兩個進行融合
            const shuffled = activeIds.sort(() => 0.5 - Math.random());
            const picked = shuffled.slice(0, 2);
            
            let fusionWords = [];
            let fusionMeanings = [];
            
            picked.forEach(id => {
                const world = worlds.find(w => w.id === id);
                const word = world.w[Math.floor(Math.random() * world.w.length)];
                fusionWords.push(toPascal(word));
                fusionMeanings.push(world.m);
            });

            // 組合 ID：關鍵字 + 世界1 + 世界2
            let id = k1 + (k2 ? sep + k2 : "") + sep + fusionWords.join("");
            if(id.length > limit) id = id.substring(0, limit);

            const card = document.createElement('div');
            card.className = 'result-card';
            card.innerHTML = `
                <div class="id-val">${id}</div>
                <div class="id-meaning">✦ 融合：${fusionMeanings.join(' 與 ')}之美學</div>
            `;
            resBox.appendChild(card);
        }
    }

    document.getElementById('generateBtn').onclick = generate;
</script>
</body>
</html>
