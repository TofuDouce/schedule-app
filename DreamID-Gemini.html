<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DreamID ✦ Art Nouveau Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg1: #171320;
    --bg2: #241a35;
    --bg3: #31244d;
    --gold: #d8bf8a; /* 經典慕夏金 */
    --gold-bright: #f4e8c1;
    --text: #f4efff;
    --card: rgba(29, 24, 44, 0.85);
    --mucha-green: #7d8c6d; /* 慕夏愛用的粉綠 */
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    min-height: 100vh;
    color: var(--text);
    font-family: "Cormorant Garamond", serif;
    background: radial-gradient(circle at top, rgba(180, 150, 255, 0.14), transparent 30%),
                linear-gradient(180deg, var(--bg1), var(--bg2), var(--bg3));
    padding: 30px 16px;
    position: relative;
    overflow-x: hidden;
}

/* --- 慕夏繁複邊框升級 --- */
.mucha-frame {
    position: fixed;
    inset: 12px;
    border: 1px solid var(--gold);
    pointer-events: none;
    z-index: 999;
}

.mucha-frame::before {
    content: "";
    position: absolute;
    inset: 4px;
    border: 2px solid var(--gold);
    opacity: 0.3;
    clip-path: inset(0 15% 0 15%); /* 只顯示部分線條，營造層次感 */
}

.corner {
    position: fixed;
    width: 120px;
    height: 120px;
    z-index: 1000;
    pointer-events: none;
}

/* 繪製藤蔓感裝飾 */
.corner::before {
    content: "";
    position: absolute;
    width: 60px;
    height: 60px;
    border: 2px solid var(--gold);
    border-radius: 80% 0 80% 0; /* 流動曲線 */
}

.tl { top: 20px; left: 20px; }
.tr { top: 20px; right: 20px; transform: scaleX(-1); }
.bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
.br { bottom: 20px; right: 20px; transform: scale(-1); }

.corner::after {
    content: "✦";
    position: absolute;
    top: 10px;
    left: 10px;
    color: var(--gold-bright);
    font-size: 18px;
    text-shadow: 0 0 10px var(--gold);
}

/* 星空 */
.stars { position: fixed; inset: 0; z-index: -3; }
.star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle 4s infinite;
}
@keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

/* 容器與面板 */
.container { max-width: 680px; margin: auto; position: relative; z-index: 2; }

.main-title {
    font-family: "Great Vibes", cursive;
    font-size: clamp(50px, 12vw, 80px);
    text-align: center;
    color: var(--gold-bright);
    text-shadow: 0 0 15px rgba(216, 191, 138, 0.4);
    margin-bottom: 20px;
}

.panel {
    background: var(--card);
    border: 1.5px solid var(--gold);
    border-radius: 2px; /* 慕夏風講究結構，不適合大圓角 */
    padding: 30px;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 40px rgba(0,0,0,0.4);
}

/* 標籤樣式 */
.label-title { font-family: "Cinzel", serif; font-size: 18px; color: var(--gold); letter-spacing: 2px; }
.label-sub { font-size: 10px; color: #a58e6d; margin-bottom: 8px; }

/* 輸入框與選擇器 */
.input, .select {
    width: 100%; height: 50px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(216, 191, 138, 0.3);
    color: #fff; padding: 0 15px;
    margin-bottom: 20px; font-family: inherit;
    transition: 0.3s;
}
.input:focus { border-color: var(--gold-bright); background: rgba(255, 255, 255, 0.08); }

/* 多元按鈕組 */
.toggle-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
.toggle-item {
    background: rgba(216, 191, 138, 0.05);
    border: 1px solid rgba(216, 191, 138, 0.2);
    padding: 12px; display: flex; justify-content: space-between; align-items: center;
}
.toggle {
    width: 44px; height: 22px; background: #333; border-radius: 11px;
    position: relative; cursor: pointer; transition: 0.3s;
}
.toggle.active { background: var(--mucha-green); box-shadow: 0 0 10px rgba(125, 140, 109, 0.4); }
.toggle-ball { width: 16px; height: 16px; background: var(--gold-bright); border-radius: 50%; position: absolute; top: 3px; left: 3px; transition: 0.3s; }
.toggle.active .toggle-ball { left: 25px; }

/* 生成按鈕 */
.generate-btn {
    width: 100%; height: 60px;
    background: linear-gradient(135deg, #a58e6d, #d8bf8a, #a58e6d);
    border: none; color: #171320;
    font-family: "Cinzel", serif; font-weight: 700; font-size: 20px;
    cursor: pointer; letter-spacing: 4px; transition: 0.4s;
}
.generate-btn:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 5px 20px rgba(216, 191, 138, 0.3); }

/* 結果卡片 */
.result-card {
    background: var(--card);
    border: 1px solid rgba(216, 191, 138, 0.2);
    padding: 20px; margin-top: 15px;
    position: relative; overflow: hidden;
    transition: 0.3s;
}
.result-card::before {
    content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--gold);
}
.username {
    font-family: "Cinzel", serif; font-size: 28px; color: var(--gold-bright);
    word-break: break-all;
}
.meaning { font-size: 14px; color: #b0a3c4; font-style: italic; margin-top: 8px; }

</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="mucha-frame"></div>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="container">
    <div class="main-title">DreamID</div>
    <p style="text-align: center; color: var(--gold); margin-bottom: 25px; letter-spacing: 2px;">✦ 星月之境 ✦</p>

    <div class="panel">
        <div class="label-title">第一關鍵字</div>
        <div class="label-sub">PRIMARY KEYWORD</div>
        <input id="k1" class="input" value="Astra">

        <div class="label-title">風格設定</div>
        <div class="label-sub">WORLD STYLE</div>
        <select id="style" class="select">
            <option value="dreamy">🌙 夢境 Dreamy</option>
            <option value="luxury">👑 奢華 Luxury</option>
            <option value="angel">✨ 天使 Angel</option>
        </select>

        <div class="label-title">字數長度設定</div>
        <div class="label-sub" id="lenVal">MAX LENGTH: 12</div>
        <input type="range" id="maxLen" min="4" max="24" value="12" style="width:100%; accent-color:var(--gold); margin-bottom: 20px;">

        <div class="toggle-grid">
            <div class="toggle-item"><span>大寫 UPPER</span><div class="toggle" id="t-upper"><div class="toggle-ball"></div></div></div>
            <div class="toggle-item"><span>數字 NUM</span><div class="toggle active" id="t-num"><div class="toggle-ball"></div></div></div>
            <div class="toggle-item"><span>符號 SYM</span><div class="toggle" id="t-sym"><div class="toggle-ball"></div></div></div>
            <div class="toggle-item"><span>繁複 DECO</span><div class="toggle active" id="t-deco"><div class="toggle-ball"></div></div></div>
        </div>

        <button class="generate-btn" onclick="generate()">GENERATE ID</button>

        <div id="results"></div>
    </div>
</div>

<script>
/* 初始化星空 */
const starsWrap = document.getElementById("stars");
for(let i=0; i<120; i++){
    const s = document.createElement("div");
    s.className = "star";
    s.style.width = s.style.height = (Math.random()*3) + "px";
    s.style.left = Math.random()*100 + "%";
    s.style.top = Math.random()*100 + "%";
    s.style.animationDelay = Math.random()*5 + "s";
    starsWrap.appendChild(s);
}

/* Toggle 控制 */
document.querySelectorAll(".toggle").forEach(t => t.onclick = () => t.classList.toggle("active"));

/* 長度顯示 */
const range = document.getElementById("maxLen");
range.oninput = () => document.getElementById("lenVal").innerText = `MAX LENGTH: ${range.value}`;

const worlds = {
    dreamy: ["Luna", "Nova", "Somnus", "Aether", "Vesper"],
    luxury: ["Aurelia", "Regis", "Bijou", "Lux", "Grand"],
    angel: ["Caelum", "Seraph", "Halo", "Divi", "Amor"]
};

function generate() {
    const k1 = document.getElementById("k1").value || "Dream";
    const style = document.getElementById("style").value;
    const limit = parseInt(range.value);
    const useUpper = document.getElementById("t-upper").classList.contains("active");
    const useNum = document.getElementById("t-num").classList.contains("active");
    const useDeco = document.getElementById("t-deco").classList.contains("active");
    
    const results = document.getElementById("results");
    results.innerHTML = "";

    for(let i=0; i<4; i++){
        let pool = worlds[style];
        let word = pool[Math.floor(Math.random()*pool.length)];
        
        // --- 核心字數修正邏輯 ---
        let base = k1;
        let suffix = word;
        
        // 組合
        let id = base + (useDeco ? "_" : "") + suffix;
        
        // 如果開啟數字，且長度還夠，才加數字
        if(useNum && id.length < limit - 2) {
            id += Math.floor(Math.random()*99);
        }

        // 嚴格裁切（修正你原本無法調整的問題）
        if(id.length > limit) {
            id = id.substring(0, limit);
        }

        if(useUpper) id = id.toUpperCase();

        const card = document.createElement("div");
        card.className = "result-card";
        card.innerHTML = `
            <div class="username">${id}</div>
            <div class="meaning">來自 ${style} 的神祕編碼 ✦</div>
        `;
        card.onclick = () => {
            navigator.clipboard.writeText(id);
            alert("Copied!");
        };
        results.appendChild(card);
    }
}

// 初始執行一次
generate();
</script>

</body>
</html>
