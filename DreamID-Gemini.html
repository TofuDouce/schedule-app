<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DreamID ✦ Mucha Essence</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;500&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

<style>
:root {
    --bg-deep: #171320;
    --gold-mucha: #d8bf8a;
    --gold-faint: rgba(216, 191, 138, 0.3);
    --text-main: #f4efff;
    --card-bg: rgba(255, 255, 255, 0.03);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
    background: var(--bg-deep);
    color: var(--text-main);
    font-family: "Cormorant Garamond", serif;
    min-height: 100vh;
    padding: 20px;
    display: flex;
    justify-content: center;
    position: relative;
    overflow-x: hidden;
}

/* --- 星光背景 (極細點) --- */
.star-field { position: fixed; inset: 0; z-index: -1; }
.star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.4; }

/* --- 慕夏纖細框 (參考圖一) --- */
.mucha-border {
    position: fixed;
    inset: 15px;
    border: 0.5px solid var(--gold-faint);
    pointer-events: none;
    z-index: 100;
}

.mucha-corner {
    position: fixed;
    width: 80px;
    height: 80px;
    z-index: 101;
    pointer-events: none;
}
.mucha-corner::before {
    content: "";
    position: absolute;
    inset: 0;
    border: 1px solid var(--gold-mucha);
    border-radius: 100% 0 100% 0; /* 纖細葉形 */
}
.tl { top: 10px; left: 10px; }
.tr { top: 10px; right: 10px; transform: scaleX(-1); }
.bl { bottom: 10px; left: 10px; transform: scaleY(-1); }
.br { bottom: 10px; right: 10px; transform: scale(-1); }

/* --- 容器 --- */
.container { width: 100%; max-width: 420px; z-index: 10; padding-top: 40px; }

.header { text-align: center; margin-bottom: 40px; }
.main-title {
    font-family: "Great Vibes", cursive;
    font-size: 64px;
    font-weight: 400;
    color: var(--text-main);
    line-height: 1.1;
}
.subtitle {
    font-family: "Cinzel", serif;
    font-size: 13px;
    letter-spacing: 5px;
    color: var(--gold-mucha);
    margin-top: 15px;
}

/* --- 控制面板 --- */
.panel {
    border: 0.5px solid var(--gold-faint);
    padding: 30px 25px;
    background: rgba(29, 24, 44, 0.4);
}

.label-group { margin-bottom: 25px; }
.label-text { font-family: "Cinzel", serif; font-size: 18px; color: var(--text-main); }
.label-en { font-size: 10px; color: var(--gold-mucha); letter-spacing: 2px; opacity: 0.7; }

input, select {
    width: 100%;
    background: rgba(255, 255, 255, 0.05);
    border: 0.5px solid var(--gold-faint);
    color: #fff;
    padding: 12px;
    margin-top: 10px;
    font-family: inherit;
    font-size: 16px;
    outline: none;
}

/* --- 滑桿客製化 --- */
.range-wrap { margin: 25px 0; }
input[type=range] {
    -webkit-appearance: none;
    background: var(--gold-faint);
    height: 1px;
}
input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    background: #fff; border-radius: 50%;
    cursor: pointer;
}

/* --- 多元切換按鈕 (圖一風格) --- */
.toggle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.toggle-box {
    border: 0.5px solid var(--gold-faint);
    padding: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.switch {
    width: 34px; height: 18px;
    background: #333; border-radius: 10px;
    position: relative; cursor: pointer;
}
.switch.active { background: #7d8c6d; }
.dot {
    position: absolute; top: 3px; left: 3px;
    width: 12px; height: 12px; background: #fff; border-radius: 50%;
    transition: 0.2s;
}
.switch.active .dot { left: 19px; }

.gen-btn {
    width: 100%; margin-top: 30px;
    padding: 15px; background: transparent;
    border: 0.5px solid var(--gold-mucha);
    color: var(--gold-mucha);
    font-family: "Cinzel", serif;
    letter-spacing: 3px; cursor: pointer;
}

/* --- 結果卡片 --- */
.result-item {
    margin-top: 20px;
    border-bottom: 0.5px solid var(--gold-faint);
    padding: 20px 0;
    cursor: pointer;
}
.res-name { font-family: "Cinzel", serif; font-size: 24px; color: var(--text-main); }
.res-sub { font-size: 12px; color: var(--gold-mucha); font-style: italic; opacity: 0.6; }

</style>
</head>
<body>

<div class="star-field" id="starField"></div>
<div class="mucha-border"></div>
<div class="mucha-corner tl"></div>
<div class="mucha-corner tr"></div>
<div class="mucha-corner bl"></div>
<div class="mucha-corner br"></div>

<div class="container">
    <div class="header">
        <h1 class="main-title">DreamID</h1>
        <p class="subtitle">✦ 星月之境 ✦</p>
    </div>

    <div class="panel">
        <div class="label-group">
            <p class="label-text">第一關鍵字</p>
            <p class="label-en">PRIMARY KEYWORD</p>
            <input id="k1" value="Astra">
        </div>

        <div class="label-group">
            <p class="label-text">風格設定</p>
            <p class="label-en">WORLD STYLE</p>
            <select id="style">
                <option value="dreamy">🌙 夢境 Dreamy</option>
                <option value="luxury">👑 奢華 Luxury</option>
            </select>
        </div>

        <div class="range-wrap">
            <p class="label-en" id="lenLabel">MAX LENGTH: 12</p>
            <input type="range" id="limit" min="4" max="24" value="12">
        </div>

        <div class="toggle-grid">
            <div class="toggle-box"><span>大寫 UPPER</span><div class="switch" id="s-up"><div class="dot"></div></div></div>
            <div class="toggle-box"><span>數字 NUM</span><div class="switch active" id="s-num"><div class="dot"></div></div></div>
        </div>

        <button class="gen-btn" onclick="generate()">GENERATE ID</button>

        <div id="results"></div>
    </div>
</div>

<script>
// 生成星星
const field = document.getElementById('starField');
for(let i=0; i<80; i++){
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random()*2;
    s.style.width = s.style.height = size + 'px';
    s.style.left = Math.random()*100 + '%';
    s.style.top = Math.random()*100 + '%';
    field.appendChild(s);
}

// Toggle 邏輯
document.querySelectorAll('.switch').forEach(s => s.onclick = () => s.classList.toggle('active'));
const limitInput = document.getElementById('limit');
limitInput.oninput = () => document.getElementById('lenLabel').innerText = `MAX LENGTH: ${limitInput.value}`;

const db = { dreamy: ["Luna", "Nova", "Somnus"], luxury: ["Aurelia", "Regis", "Bijou"] };

function generate() {
    const k1 = document.getElementById('k1').value;
    const style = document.getElementById('style').value;
    const max = parseInt(limitInput.value);
    const up = document.getElementById('s-up').classList.contains('active');
    const num = document.getElementById('s-num').classList.contains('active');
    
    const container = document.getElementById('results');
    container.innerHTML = "";

    for(let i=0; i<3; i++){
        let word = db[style][Math.floor(Math.random()*db[style].length)];
        let res = k1 + (num ? Math.floor(Math.random()*99) : "") + word;
        
        // --- 核心修復：嚴格字數控管 ---
        if(res.length > max) res = res.substring(0, max);
        if(up) res = res.toUpperCase();

        const item = document.createElement('div');
        item.className = 'result-item';
        item.innerHTML = `<p class="res-name">${res}</p><p class="res-sub">Generated with ${style} essence.</p>`;
        container.appendChild(item);
    }
}
</script>

</body>
</html>
