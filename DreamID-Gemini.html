<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DreamID ✦ Nexus</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #13101c; --gold: #e2d1a7; --gold-dim: rgba(226, 209, 167, 0.2); --text: #fdfbff; --mucha-green: #7d8c6d; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: "Cormorant Garamond", serif; padding-bottom: 50px; overflow-x: hidden; }

        .moon { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); font-size: 26px; color: var(--gold); opacity: 0.5; z-index: 1; }
        .star-deco { position: fixed; font-size: 22px; color: var(--gold); pointer-events: none; z-index: 100; opacity: 0.8; }
        .tl { top: 15px; left: 15px; } .tr { top: 15px; right: 15px; }
        .bl { bottom: 15px; left: 15px; } .br { bottom: 15px; right: 15px; }

        .container { width: 92%; max-width: 480px; margin: auto; padding-top: 60px; position: relative; z-index: 10; }
        
        .header { text-align: center; margin-bottom: 50px; white-space: nowrap; }
        .main-title { font-family: "Great Vibes", cursive; font-size: clamp(60px, 20vw, 88px); line-height: 1; }
        .subtitle { font-family: "Cinzel", serif; font-size: clamp(12px, 3.5vw, 18px); letter-spacing: 0.4em; color: var(--gold); margin-top: 10px; text-transform: uppercase; }

        .panel { background: rgba(255, 255, 255, 0.02); border: 0.5px solid var(--gold-dim); padding: 35px 25px; backdrop-filter: blur(10px); }

        .row-split { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .label-zh { font-family: "Cinzel", serif; font-size: 20px; color: var(--text); display: block; margin-bottom: 8px; }
        .label-en { font-size: 11px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; opacity: 0.8; }
        
        input, select { 
            width: 100%; background: rgba(255,255,255,0.06); border: 0.5px solid var(--gold-dim); 
            color: #fff; padding: 15px; font-size: 18px; outline: none; border-radius: 2px;
        }

        .val-disp { font-size: 16px; color: var(--gold); font-family: "Cinzel"; letter-spacing: 1px; }

        .grid-toggles { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .toggle-item { border: 0.5px solid var(--gold-dim); padding: 16px; display: flex; justify-content: space-between; align-items: center; }
        .switch { width: 44px; height: 22px; background: #333; border-radius: 11px; position: relative; cursor: pointer; transition: 0.3s; }
        .switch.active { background: var(--mucha-green); }
        .dot { position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: 0.2s; }
        .switch.active .dot { left: 25px; }

        .gen-btn { 
            width: 100%; height: 70px; margin-top: 40px; background: transparent; 
            border: 1px solid var(--gold); color: var(--gold); font-family: "Cinzel", serif; 
            font-size: 22px; letter-spacing: 6px; cursor: pointer; transition: 0.4s;
        }
        .gen-btn:active { background: var(--gold-dim); }

        #results { margin-top: 40px; }
        .result-card { border-bottom: 0.5px solid var(--gold-dim); padding: 30px 0; animation: fadeIn 0.4s ease forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .id-val { font-family: "Cinzel", serif; font-size: 32px; color: #fff; margin-bottom: 10px; word-break: break-all; }
        .id-meaning { font-size: 17px; color: var(--gold); font-style: italic; line-height: 1.6; opacity: 0.9; }

        .footer { margin-top: 100px; padding: 60px 20px; text-align: center; border-top: 0.5px solid var(--gold-dim); }
        .brand { font-family: 'Cinzel'; letter-spacing: 4px; color: var(--gold); font-size: 22px; }
        .brand-sub { font-size: 14px; opacity: 0.5; margin-top: 12px; }
    </style>
</head>
<body>

    <div class="moon">☾</div>
    <div class="star-deco tl">✦</div><div class="star-deco tr">✦</div>
    <div class="star-deco bl">✦</div><div class="star-deco br">✦</div>

    <div class="container">
        <div class="header">
            <h1 class="main-title">DreamID</h1>
            <p class="subtitle">Essence of Identity</p>
        </div>

        <div class="panel">
            <div class="row-split">
                <div>
                    <span class="label-zh">關鍵字一</span><span class="label-en">PRIMARY</span>
                    <input id="k1" value="Tofu">
                </div>
                <div>
                    <span class="label-zh">關鍵字二</span><span class="label-en">OPTIONAL</span>
                    <input id="k2" placeholder="預設為空">
                </div>
            </div>

            <div style="margin-bottom: 25px;">
                <span class="label-zh">世界觀風格</span><span class="label-en">WORLD STYLE</span>
                <select id="style">
                    <option value="ginger">🍪 薑餅王國</option>
                    <option value="tenno">⚔️ 天諾聖域 (Warframe)</option>
                    <option value="hunter">🐉 獵人公會 (MH)</option>
                    <option value="desert">🏜️ 荒漠</option>
                    <option value="herbal">🌿 草本</option>
                    <option value="celestial">🌌 星海</option>
                    <option value="ocean">🌊 深海</option>
                    <option value="vintage">📜 古典</option>
                    <option value="fairy">🍄 仙境</option>
                    <option value="gothic">🦇 歌德</option>
                    <option value="cyber">🤖 賽博</option>
                    <option value="nordic">❄️ 北歐</option>
                    <option value="zen">🍵 禪意</option>
                    <option value="arcane">🪄 奧術</option>
                    <option value="steampunk">⚙️ 蒸氣</option>
                    <option value="monochrome">📽️ 墨影</option>
                    <option value="sakura">🌸 櫻落</option>
                    <option value="volcano">🔥 熔岩</option>
                    <option value="glacier">💎 晶綻</option>
                    <option value="ethereal">☁️ 雲端</option>
                </select>
            </div>

            <div class="row-split" style="align-items: center;">
                <div>
                    <span class="val-disp" id="lenDisp">10 字元</span>
                    <input type="range" id="range" min="4" max="24" value="10" style="margin-top:10px; accent-color: var(--gold);">
                </div>
                <div>
                    <span class="label-en">分隔符 SEP</span>
                    <select id="sep">
                        <option value="">無</option>
                        <option value=".">.</option>
                        <option value="-">-</option>
                        <option value="_">_</option>
                        <option value="@">@</option>
                    </select>
                </div>
            </div>

            <div class="grid-toggles">
                <div class="toggle-item"><span class="label-en">大寫 UPPER</span><div class="switch" id="up" onclick="toggleSwitch(this)"><div class="dot"></div></div></div>
                <div class="toggle-item"><span class="label-en">數字 NUM</span><div class="switch active" id="num" onclick="toggleSwitch(this)"><div class="dot"></div></div></div>
                <div class="toggle-item"><span class="label-en">符號 SYM</span><div class="switch" id="sym" onclick="toggleSwitch(this)"><div class="dot"></div></div></div>
                <div class="toggle-item"><span class="label-en">繁複 DECO</span><div class="switch active" id="deco" onclick="toggleSwitch(this)"><div class="dot"></div></div></div>
            </div>

            <button class="gen-btn" id="generateBtn">GENERATE IDENTITY</button>

            <div id="results"></div>
        </div>

        <div class="footer">
            <div class="brand">✦ LAZY DREAM ✦</div>
            <p class="brand-sub">Crafted with moonlight & dream magic</p>
        </div>
    </div>

<script>
    // 擴充至 20 個世界觀，並加入指定元素
    const worldLibrary = {
        ginger: { name: "薑餅王國", words: { "Ginger": "勇敢薑餅", "Latte": "拿鐵咖啡", "Cacao": "黑可可英雄", "Berry": "草莓可麗餅", "Pure": "純香草夢想", "Frost": "霜糖波浪", "Sugar": "砂糖地標", "Heart": "勇敢之心", "Brave": "冒險勇氣", "Kingdom": "甜蜜版圖" }},
        tenno: { name: "天諾聖域", words: { "Lotus": "母體指引", "Excal": "聖裝之刃", "Void": "虛空能量", "Orokin": "月球遺蹟", "Prime": "黃金輝芒", "Dax": "戰士之傲", "War": "戰甲意志", "Axe": "旋轉利刃", "Focus": "專注路徑", "Solar": "太陽星系" }},
        hunter: { name: "獵人公會", words: { "Rath": "雄火龍魂", "Gala": "集會所酒", "Quest": "三星委託", "Carve": "剝取素材", "Wyvern": "飛龍之影", "Meow": "艾露點心", "Zenny": "公會報酬", "Ryu": "昇龍之擊", "Apex": "首領威壓", "Tail": "斷尾瞬時" }},
        desert: { name: "荒漠", words: { "Sand": "金色流沙", "Dune": "起伏沙丘", "Mirage": "海市蜃樓", "Oasis": "沙漠綠洲", "Sol": "烈日之影" }},
        herbal: { name: "草本", words: { "Rose": "優雅薔薇", "Sauge": "清冷鼠尾草", "Fleur": "盛開花卉", "Menthe": "微涼薄荷", "Ivy": "蔓延藤蔓" }},
        celestial: { name: "星海", words: { "Nova": "爆發新星", "Astra": "遙遠星辰", "Lunar": "銀色月輝", "Nebula": "幻彩星雲", "Stella": "閃爍恆星" }},
        ocean: { name: "深海", words: { "Tide": "潮汐起伏", "Coral": "深海珊瑚", "Pearl": "純真珍珠", "Abyss": "海溝秘密", "Aqua": "生命之泉" }},
        vintage: { name: "古典", words: { "Muse": "靈感女神", "Lyric": "敘事詩篇", "Aura": "獨特氣場", "Epos": "英雄史詩", "Velvet": "天鵝絨" }},
        fairy: { name: "仙境", words: { "Dew": "清晨露珠", "Mori": "靜謐森林", "Pixie": "頑皮小妖", "Fern": "翠綠蕨葉", "Bloom": "繁花盛開" }},
        gothic: { name: "歌德", words: { "Noir": "極致漆黑", "Raven": "渡鴉羽翼", "Thorn": "帶刺防禦", "Morte": "沉寂終焉", "Abyss": "無底深淵" }},
        cyber: { name: "賽博", words: { "Void": "虛無空間", "Neon": "霓虹殘影", "Pixel": "像素碎片", "Data": "數據流動", "Sync": "頻率同步" }},
        nordic: { name: "北歐", words: { "Frost": "霜凍之痕", "Rune": "神祕符文", "Eira": "雪之精靈", "Fjord": "深邃峽灣", "Odin": "神祇意志" }},
        zen: { name: "禪意", words: { "Ink": "淡雅墨跡", "Tea": "清心茶味", "Moon": "水中之月", "Kaze": "流動之風", "Sora": "無垠天空" }},
        arcane: { name: "奧術", words: { "Rune": "銘文陣列", "Mana": "魔力泉湧", "Sage": "賢者之塔", "Echo": "秘法迴響", "Soul": "靈魂刻印" }},
        steampunk: { name: "蒸氣", words: { "Gear": "黃銅齒輪", "Haze": "霧都迷蹤", "Clock": "發條核心", "Puff": "白煙裊裊", "Rail": "軌道之眼" }},
        monochrome: { name: "墨影", words: { "Film": "底片雜訊", "Grey": "灰色地帶", "Shadow": "暗箱殘影", "Lens": "定格瞬間", "Blur": "迷濛視角" }},
        sakura: { name: "櫻落", words: { "Hana": "漫天紛飛", "Sake": "月下對酌", "Yoru": "靜謐之夜", "Ume": "冷傲寒梅", "Kami": "神樂節奏" }},
        volcano: { name: "熔岩", words: { "Ash": "餘燼飛散", "Flare": "噴發火舌", "Magma": "流動地脈", "Pyre": "烈焰之儀", "Cinder": "焦土記憶" }},
        glacier: { name: "晶綻", words: { "Ice": "極地凍結", "Diamond": "稜鏡折射", "Blue": "永恆冰芯", "Crystal": "璀璨晶體", "Cold": "零度靜止" }},
        ethereal: { name: "雲端", words: { "Cloud": "輕盈流雲", "Heaven": "極樂淨土", "Angel": "羽翼之光", "Mist": "山嵐迷霧", "Halo": "光環庇護" }}
    };

    function toggleSwitch(el) { el.classList.toggle('active'); }

    document.getElementById('range').addEventListener('input', function(e) {
        document.getElementById('lenDisp').innerText = e.target.value + ' 字元';
    });

    function runGeneration() {
        const k1 = document.getElementById('k1').value || "Tofu";
        const k2 = document.getElementById('k2').value;
        const styleKey = document.getElementById('style').value;
        const limit = parseInt(document.getElementById('range').value);
        const sep = document.getElementById('sep').value;
        
        const isUpper = document.getElementById('up').classList.contains('active');
        const isNum = document.getElementById('num').classList.contains('active');
        const isSym = document.getElementById('sym').classList.contains('active');
        const isDeco = document.getElementById('deco').classList.contains('active');

        const resBox = document.getElementById('results');
        resBox.innerHTML = "";
        const world = worldLibrary[styleKey];

        for(let i=0; i<10; i++) {
            const wordKeys = Object.keys(world.words);
            const sw = wordKeys[Math.floor(Math.random() * wordKeys.length)];
            
            let parts = [k1];
            let meanParts = [`「${k1}」`];
            
            if(k2 && Math.random() > 0.4) {
                parts.push(k2);
                meanParts.push(`與「${k2}」`);
            }
            
            parts.push(sw);
            meanParts.push(`融合了${world.words[sw]}`);
            
            let id = parts.join(sep);
            if(isNum) id += Math.floor(Math.random() * 9);
            if(isSym) id += "_";

            // --- 修復後的 DECO 邏輯 ---
            if(isDeco) {
                const decoStyles = [
                    (s) => "v" + s,
                    (s) => s + "x",
                    (s) => "i" + s,
                    (s) => "_" + s + "_",
                    (s) => "o" + s + "o",
                    (s) => "z" + s
                ];
                const randomDecoIdx = Math.floor(Math.random() * decoStyles.length);
                id = decoStyles[randomDecoIdx](id);
            }

            if(id.length > limit) id = id.substring(0, limit).replace(/[._\-@]$/, "");
            if(isUpper) id = id.toUpperCase();

            let meanStr = `✦ ${meanParts.join("")}，構成一段關於「${world.name}」的美學記憶。`;

            const card = document.createElement('div');
            card.className = 'result-card';
            card.style.animationDelay = (i * 0.05) + "s";
            card.innerHTML = `<div class="id-val">${id}</div><div class="id-meaning">${meanStr}</div>`;
            
            card.onclick = function() {
                navigator.clipboard.writeText(this.querySelector('.id-val').innerText);
                const originalMeaning = this.querySelector('.id-meaning').innerText;
                this.querySelector('.id-meaning').innerText = "已複製 ID ✦";
                setTimeout(() => {
                    this.querySelector('.id-meaning').innerText = originalMeaning;
                }, 1000);
            };
            resBox.appendChild(card);
        }
    }

    document.getElementById('generateBtn').addEventListener('click', runGeneration);
    window.onload = runGeneration;
</script>
</body>
</html>
