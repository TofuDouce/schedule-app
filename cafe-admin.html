<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#F5F1E4">
<title>小怪獸咖啡館 · 後台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@500;700;900&family=LXGW+WenKai+TC&display=swap" rel="stylesheet">
<style>
/* ---------- 預設配色：拿鐵奶油 ---------- */
:root{
  --bg:#F5F1E4; --dot:#E6DDC7; --card:#FFFCF3; --card-edge:#D9CDB0; --card-under:#DDE3CE;
  --ink:#453A28; --ink-soft:#8A7B5C; --ink-faint:#B6A886;
  --accent:#5F9E6E; --accent-dk:#477F58; --accent-pale:#E3EFDD; --on-accent:#FFFFFF;
  --input-bg:#FBF7EA; --danger:#D4826A; --danger-dk:#B36249; --scrim:#3A3223;
  --fs:19px;
  --font:'Zen Maru Gothic','Noto Sans TC','PingFang TC',sans-serif;
  --monster:#8C6FC6; --monster-dk:#6B4FA6; --monster-eye:#FFFDF6;
}

/* ---------- 其他配色 ---------- */
[data-theme="coin"]{
  --bg:#E9EAEC; --dot:#D6D8DB; --card:#FEFEFE; --card-edge:#CBCED2; --card-under:#B7BBC0;
  --ink:#262A2E; --ink-soft:#6E747A; --ink-faint:#A0A6AC;
  --accent:#5B6B7A; --accent-dk:#44515E; --accent-pale:#DEE4E9; --on-accent:#FFFFFF;
  --input-bg:#F5F6F7; --danger:#B4574B; --danger-dk:#8E4136; --scrim:#2A2F34;
}
[data-theme="lucky"]{
  --bg:#F2E4E0; --dot:#E2CFCA; --card:#FFFAF8; --card-edge:#E0C9C3; --card-under:#CFB2AB;
  --ink:#33201C; --ink-soft:#7B6259; --ink-faint:#AE9088;
  --accent:#C0392B; --accent-dk:#96271B; --accent-pale:#F7DDD7; --on-accent:#FFF7EF;
  --input-bg:#FCF3F0; --danger:#A9791F; --danger-dk:#875D12; --scrim:#3E211B;
}
[data-theme="matcha"]{
  --bg:#EDF1E6; --dot:#DBE2D0; --card:#FCFDF9; --card-edge:#CBD5BC; --card-under:#B7C4A5;
  --ink:#2C3327; --ink-soft:#6E7A63; --ink-faint:#9EAA91;
  --accent:#5FA47A; --accent-dk:#437B5A; --accent-pale:#DEEEE0; --on-accent:#FFFFFF;
  --input-bg:#F6F9F1; --danger:#C4785B; --danger-dk:#A05B41; --scrim:#2C3327;
}
[data-theme="book"]{
  --bg:#E7EBF1; --dot:#D3D9E3; --card:#FCFDFE; --card-edge:#C6CEDB; --card-under:#B0BACA;
  --ink:#222833; --ink-soft:#666F7E; --ink-faint:#98A1B0;
  --accent:#3E5C8C; --accent-dk:#2C446B; --accent-pale:#DCE4F0; --on-accent:#FFFFFF;
  --input-bg:#F4F7FB; --danger:#B05A3E; --danger-dk:#8E432B; --scrim:#222833;
}
[data-theme="rose"]{
  --bg:#EFE3E4; --dot:#DFCFD1; --card:#FEFCFC; --card-edge:#D8C4C6; --card-under:#C6AFB2;
  --ink:#2E2224; --ink-soft:#786A6C; --ink-faint:#A79597;
  --accent:#B37784; --accent-dk:#8E5766; --accent-pale:#F2DFE2; --on-accent:#FFFFFF;
  --input-bg:#FBF4F5; --danger:#9A5C3C; --danger-dk:#7C462B; --scrim:#3A2A2C;
}
[data-theme="paper"]{
  --bg:#E6DCC8; --dot:#D5C9B1; --card:#F7F1E3; --card-edge:#CFC0A2; --card-under:#BCAB89;
  --ink:#40372A; --ink-soft:#7E7259; --ink-faint:#A99A7C;
  --accent:#7A5C3E; --accent-dk:#5C4229; --accent-pale:#E5D8BE; --on-accent:#FDF8EE;
  --input-bg:#F1E9D8; --danger:#A24B3C; --danger-dk:#84392C; --scrim:#342C20;
}
[data-theme="night"]{
  --bg:#23262B; --dot:#2E333A; --card:#2C3037; --card-edge:#3F454F; --card-under:#171A1E;
  --ink:#EDEAE3; --ink-soft:#A9AEB6; --ink-faint:#767C85;
  --accent:#6FA8CC; --accent-dk:#93C8E6; --accent-pale:#33414C; --on-accent:#16191D;
  --input-bg:#262A30; --danger:#D98A72; --danger-dk:#EEA88F; --scrim:#000000;
}
[data-theme="ink"]{
  --bg:#121212; --dot:#1E1E1E; --card:#1A1A1A; --card-edge:#343434; --card-under:#000000;
  --ink:#F0EDE6; --ink-soft:#A9A399; --ink-faint:#726C63;
  --accent:#C9A227; --accent-dk:#E0BC49; --accent-pale:#3A3220; --on-accent:#14120A;
  --input-bg:#1F1F1F; --danger:#C96A4A; --danger-dk:#E08A6B; --scrim:#000000;
}

/* ---------- 版式與衍生變數：一律寫在 body ---------- */
body{
  --pnl-r:22px; --pnl-bw:2px; --pnl-bs:solid;
  --pnl-sh:0 6px 0 var(--card-under);
  --pnl-sh-sm:0 4px 0 var(--card-under);
  --soft-sh:0 4px 0 var(--card-edge);
  --tape:var(--monster);
  --c-sim:#8C6FC6; --c-nov:#C4776E; --c-web:#5F9E6E;
  --c-day:#C99B45; --c-exp:#6C8FB5; --c-etc:#9A8B70;
}
body[data-look="bold"]{ --pnl-r:20px; --pnl-bw:3px; }
body[data-look="dash"]{ --pnl-bs:dashed; --pnl-sh:0 3px 0 var(--card-under); --pnl-sh-sm:0 2px 0 var(--card-under); }
body[data-look="flat"]{ --pnl-r:10px; --pnl-sh:0 3px 0 var(--card-under); --pnl-sh-sm:0 2px 0 var(--card-under); }

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0;font-family:var(--font);background:var(--bg);color:var(--ink);
  line-height:1.7;min-height:100svh;font-size:var(--fs);
  background-image:radial-gradient(var(--dot) 1.5px,transparent 1.5px);
  background-size:22px 22px;
  padding:0 13px calc(112px + env(safe-area-inset-bottom));
  transition:background-color .25s,color .25s;
}
.wrap{max-width:620px;margin:0 auto}
@media (min-width:780px){.wrap{max-width:1000px}}

.tape{position:relative}
.tape::before{
  content:"";position:absolute;top:-11px;left:26px;width:82px;height:23px;
  background:var(--tape);opacity:.34;
  border-left:3px dotted rgba(255,255,255,.5);border-right:3px dotted rgba(255,255,255,.5);
  transform:rotate(-3.5deg);border-radius:2px;
}
.card{
  background:var(--card);border:var(--pnl-bw) var(--pnl-bs) var(--card-edge);
  border-radius:var(--pnl-r);box-shadow:var(--pnl-sh);padding:20px 18px;margin-bottom:16px;
}

header{padding:26px 0 4px}
.sign{display:flex;align-items:center;gap:13px}
.monster{width:52px;height:46px;flex:0 0 auto;position:relative;background:var(--monster);border-radius:26px 26px 21px 21px;box-shadow:0 4px 0 var(--monster-dk)}
.monster i{position:absolute;top:16px;width:9px;height:9px;background:var(--monster-eye);border-radius:50%}
.monster i:nth-child(2){left:11px} .monster i:nth-child(3){right:11px}
.monster b{position:absolute;bottom:11px;left:50%;transform:translateX(-50%);width:15px;height:7px;border-radius:0 0 10px 10px;background:var(--monster-eye)}
.monster u{position:absolute;top:-9px;left:50%;transform:translateX(-50%);width:4px;height:11px;background:var(--monster-dk);border-radius:3px}
h1{font-size:1.05em;font-weight:900;margin:0;letter-spacing:.03em}
.sub{font-size:.7em;color:var(--ink-soft);margin:0}
.eyebrow{font-size:.65em;font-weight:700;letter-spacing:.16em;color:var(--ink-faint);margin:20px 0 8px;padding-left:2px}

button{font-family:var(--font);font-weight:700;cursor:pointer;border:0}
.btn{background:var(--accent);color:var(--on-accent);font-size:.86em;border-radius:99px;padding:13px 20px;box-shadow:0 4px 0 var(--accent-dk)}
.btn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--accent-dk)}
.btn:disabled{background:var(--card-edge);box-shadow:0 4px 0 var(--ink-faint);cursor:not-allowed}
.btn.wide{width:100%}
.btn.soft{background:var(--accent-pale);color:var(--accent-dk);box-shadow:var(--soft-sh)}
.btn.soft:active{box-shadow:0 2px 0 var(--card-edge)}
.btn.warn{background:var(--danger);box-shadow:0 4px 0 var(--danger-dk);color:#fff}
.btn.tiny{font-size:.74em;padding:9px 20px}

label.fl{display:block;font-weight:700;font-size:.8em;margin:14px 0 6px}
input[type=text],textarea,select{
  width:100%;font-family:var(--font);font-size:.88em;color:var(--ink);
  background:var(--input-bg);border:2px solid var(--card-edge);
  border-radius:15px;padding:12px 14px;-webkit-appearance:none;appearance:none;
}
select{font-weight:700;border-radius:16px;
  background-image:linear-gradient(45deg,transparent 50%,var(--ink-soft) 50%),linear-gradient(135deg,var(--ink-soft) 50%,transparent 50%);
  background-position:calc(100% - 20px) 50%,calc(100% - 14px) 50%;
  background-size:6px 6px,6px 6px;background-repeat:no-repeat}
textarea{min-height:74px;resize:vertical;line-height:1.6}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-pale)}

.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.row .btn{flex:1;min-width:118px}
.center{text-align:center;margin-top:20px}

.cats{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.cat{font-size:.76em;font-weight:700;padding:8px 15px;border-radius:99px;cursor:pointer;
  background:var(--input-bg);border:2px solid var(--card-edge);color:var(--ink-soft)}
.cat.on{color:#fff;border-color:transparent}
.cat.on[data-c="模擬器"]{background:var(--c-sim)}
.cat.on[data-c="小說"]{background:var(--c-nov)}
.cat.on[data-c="網站工具"]{background:var(--c-web)}
.cat.on[data-c="日常工具"]{background:var(--c-day)}
.cat.on[data-c="實驗性質"]{background:var(--c-exp)}
.cat.on[data-c="其他"]{background:var(--c-etc)}
.cat.on[data-c="全部"]{background:var(--ink);color:var(--bg)}

.toggles{display:flex;gap:10px;margin-top:12px}
.tg{flex:1;text-align:center;background:var(--input-bg);border:2px solid var(--card-edge);
  border-radius:16px;padding:11px 6px;font-size:.8em;font-weight:700;color:var(--ink-soft);cursor:pointer}
.tg.on{background:var(--accent-pale);border-color:var(--accent);color:var(--accent-dk)}
.tg small{display:block;font-weight:500;font-size:.78em;color:var(--ink-faint)}

.file{display:block;text-align:center;background:var(--input-bg);
  border:2px dashed var(--card-edge);border-radius:18px;padding:22px 12px;
  font-size:.82em;font-weight:700;color:var(--accent-dk);cursor:pointer}
.file input{display:none}
.gauge{height:9px;background:var(--input-bg);border:2px solid var(--card-edge);border-radius:99px;overflow:hidden;margin-top:10px}
.gauge span{display:block;height:100%;width:0;background:var(--accent);transition:width .3s}
.gauge.bad span{background:var(--danger)}
.meter{font-size:.72em;color:var(--ink-soft);text-align:center;margin-top:6px}
.meter.bad{color:var(--danger-dk);font-weight:700}

.grid{display:grid;gap:12px}
@media (min-width:780px){.grid{grid-template-columns:repeat(2,1fr)}}
.work{position:relative;background:var(--card);border:var(--pnl-bw) var(--pnl-bs) var(--card-edge);
  border-radius:var(--pnl-r);box-shadow:var(--pnl-sh-sm);
  padding:15px 15px 14px 19px;overflow:hidden;cursor:pointer}
.work:active{transform:translateY(2px);box-shadow:0 2px 0 var(--card-under)}
.work{padding-right:60px}
.work .stripe{position:absolute;left:0;top:0;bottom:0;width:7px}
.ord{position:absolute;right:9px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:6px}
.ord button{width:38px;height:31px;border-radius:11px;background:var(--input-bg);border:2px solid var(--card-edge);color:var(--ink-soft);font-size:.72em;line-height:1}
.ord button:active{background:var(--accent-pale);color:var(--accent-dk)}
.work .nm{font-weight:700;font-size:.9em;line-height:1.4}
.work .ds{font-size:.74em;color:var(--ink-soft);margin-top:2px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.work .mt{display:flex;align-items:center;gap:7px;margin-top:9px;font-size:.66em;color:var(--ink-faint)}
.chip{font-size:.95em;font-weight:700;padding:2px 10px;border-radius:99px;color:#fff}
.chip.lock{background:var(--monster)}
.chip.open{background:var(--accent)}
.star{color:var(--c-day)}
.empty{text-align:center;color:var(--ink-faint);font-size:.82em;padding:34px 10px;line-height:2}

.stat{display:flex;gap:10px;margin-top:12px}
.stat div{flex:1;background:var(--input-bg);border:2px solid var(--card-edge);border-radius:16px;padding:12px 6px;text-align:center}
.stat b{display:block;font-size:1.1em;font-weight:900;color:var(--accent-dk);line-height:1.3}
.stat small{font-size:.62em;color:var(--ink-faint)}

/* 外觀 */
.themes{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px}
.th{background:var(--input-bg);border:2px solid var(--card-edge);border-radius:16px;padding:9px 6px;cursor:pointer;text-align:center}
.th.on{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-pale)}
.th .sw{display:flex;justify-content:center;gap:3px;margin-bottom:5px}
.th .sw span{width:15px;height:15px;border-radius:50%;border:1px solid rgba(0,0,0,.12)}
.th small{font-size:.62em;font-weight:700;color:var(--ink-soft)}
.sizer{display:flex;align-items:center;gap:12px;margin-top:8px}
.sizer button{flex:0 0 auto;width:54px;height:46px;border-radius:15px;background:var(--input-bg);
  border:2px solid var(--card-edge);color:var(--ink);font-size:.9em}
.sizer button:active{background:var(--accent-pale)}
.sizer .val{flex:1;text-align:center;font-weight:900;color:var(--accent-dk);font-size:.95em}
.looks{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.lk{flex:1;min-width:70px;text-align:center;background:var(--input-bg);border:2px solid var(--card-edge);
  border-radius:14px;padding:10px 4px;font-size:.76em;font-weight:700;color:var(--ink-soft);cursor:pointer}
.lk.on{background:var(--accent-pale);border-color:var(--accent);color:var(--accent-dk)}

#err{display:none;background:var(--input-bg);border:2px solid var(--danger);color:var(--danger-dk);
  border-radius:18px;padding:13px 15px;font-size:.78em;margin-bottom:14px}
#err a{color:var(--danger-dk);font-weight:900}
#toast{position:fixed;left:50%;bottom:calc(108px + env(safe-area-inset-bottom));
  transform:translateX(-50%) translateY(18px);background:var(--ink);color:var(--bg);
  font-size:.78em;font-weight:900;padding:11px 24px;border-radius:999px;
  opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:150;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

nav.bottom{position:fixed;left:0;right:0;bottom:0;z-index:70;background:var(--card);
  border-top:2px solid var(--card-edge);display:flex;padding:8px 6px 14px;
  max-width:640px;margin:0 auto;border-radius:22px 22px 0 0}
nav.bottom button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  font-size:.62em;font-weight:900;color:var(--ink-faint);padding:4px 0;min-width:0;background:none}
nav.bottom button .ic{font-size:20px;line-height:1.2}
nav.bottom button.on{color:var(--accent)}
.hide{display:none!important}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="sign">
      <div class="monster"><u></u><i></i><i></i><b></b></div>
      <div style="flex:1;min-width:0">
        <h1>咖啡館後台</h1>
        <p class="sub" id="who">尚未登入</p>
      </div>
    </div>
  </header>

  <div id="err"></div>

  <div class="card tape" id="gate">
    <p style="margin:0 0 12px;font-size:.82em">打烊中。只有老闆能進來。</p>
    <button class="btn wide" id="btnIn">用 Google 登入</button>
  </div>

  <!-- 架上 -->
  <div class="hide" id="tabShelf">
    <div class="eyebrow" id="countLine">架上的作品</div>
    <div class="cats" id="filters"></div>
    <div class="grid" id="list" style="margin-top:14px"></div>
  </div>

  <!-- 新增／編輯 -->
  <div class="hide" id="tabEdit">
    <div class="card tape">
      <h1 id="edTitle" style="margin-bottom:2px">收一件新作品</h1>
      <p class="sub">程式碼會整份存進資料庫，不需要另外放檔案。</p>

      <div class="eyebrow">基本資料</div>
      <label class="fl" for="fName">名稱</label>
      <input type="text" id="fName" placeholder="小怪獸咖啡館">
      <label class="fl" for="fDesc">一句話說明</label>
      <textarea id="fDesc" placeholder="把積木跟糖果罐合在一起的網站產生器"></textarea>
      <label class="fl">分類</label>
      <div class="cats" id="catPick"></div>

      <div class="eyebrow">程式碼</div>
      <label class="file">
        <span id="fileLabel">從「檔案」選一個 HTML 檔</span>
        <input type="file" id="fFile" accept=".html,.htm,text/html">
      </label>
      <div class="gauge" id="gauge"><span></span></div>
      <div class="meter" id="meter">還沒有程式碼</div>

      <div class="eyebrow">上架設定</div>
      <div class="toggles">
        <div class="tg on" id="tgPub">公開<small>大家看得到</small></div>
        <div class="tg" id="tgLock">加鎖<small>只有你看得到</small></div>
      </div>
      <div class="toggles"><div class="tg" id="tgPin">釘選在最前面</div></div>

      <div class="row"><button class="btn wide" id="btnSave">儲存</button></div>
      <div class="row">
        <button class="btn soft" id="btnPrev">另開視窗預覽</button>
        <button class="btn soft" id="btnDown">下載原始碼</button>
      </div>
      <div class="row"><button class="btn soft wide" id="btnBack">回架上</button></div>
      <div class="center"><button class="btn warn tiny hide" id="btnDel">刪掉這件作品</button></div>
    </div>
  </div>

  <!-- 外觀 -->
  <div class="hide" id="tabLook">
    <div class="card tape">
      <div class="eyebrow">配色</div>
      <div class="themes" id="themes"></div>

      <div class="eyebrow">字型</div>
      <select id="fontSel"></select>

      <div class="eyebrow">字級</div>
      <div class="sizer">
        <button id="fsDown">A－</button>
        <div class="val" id="fsVal">19px</div>
        <button id="fsUp">A＋</button>
      </div>

      <div class="eyebrow">版式</div>
      <div class="looks" id="looks"></div>

      <p class="sub" style="margin-top:18px">這裡的設定跟前台共用，改了兩邊一起變。</p>
      <div class="center"><button class="btn soft tiny" id="btnResetLook">恢復預設</button></div>
    </div>
  </div>

  <!-- 帳號 -->
  <div class="hide" id="tabAcc">
    <div class="card tape">
      <div class="eyebrow">目前身分</div>
      <p style="margin:0;font-size:.9em;font-weight:700" id="accName">—</p>
      <p class="sub" id="accUid">—</p>

      <div class="eyebrow">架上統計</div>
      <div class="stat">
        <div><b id="stOpen">0</b><small>公開</small></div>
        <div><b id="stLock">0</b><small>加鎖</small></div>
        <div><b id="stKb">0</b><small>KB 合計</small></div>
      </div>

      <div class="row" style="margin-top:20px">
        <button class="btn soft wide" id="btnReload">重新整理架上</button>
      </div>
      <div class="row"><button class="btn soft wide" id="btnShelfLink">去看前台</button></div>
      <div class="eyebrow">保險起見</div>
      <p class="sub" style="margin:0 0 8px">作品只存在雲端。下載一份放手機或電腦，萬一出事還救得回來。</p>
      <div class="row"><button class="btn soft wide" id="btnBackup">備份全部作品</button></div>
      <div class="center"><button class="btn warn tiny" id="btnOut">登出</button></div>
    </div>
  </div>

</div>

<nav class="bottom hide" id="nav">
  <button class="on" data-tab="shelf"><span class="ic">&#9749;</span>架上</button>
  <button data-tab="edit"><span class="ic">&#10133;</span>新增</button>
  <button data-tab="look"><span class="ic">&#127912;</span>外觀</button>
  <button data-tab="acc"><span class="ic">&#128100;</span>帳號</button>
</nav>
<div id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getFirestore, collection, doc, getDoc, getDocs, setDoc, deleteDoc, updateDoc }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyC4oq_W36ji4o6p7p2JxLS2FKc-gITFJ4I",
  authDomain: "monster-cafe-79d56.firebaseapp.com",
  projectId: "monster-cafe-79d56",
  storageBucket: "monster-cafe-79d56.firebasestorage.app",
  messagingSenderId: "327222778800",
  appId: "1:327222778800:web:a38e81d92c8def3621d475"
};
const OWNER = 'CbBcZ01ymNQou4X6HMfNMtEgXRl2';
const SHELF_URL = 'cafe-shelf.html';
const NS = 'cafeShelf:';
const MAX = 900000;
const CATS = ['模擬器','小說','網站工具','日常工具','實驗性質','其他'];
const COLOR = {'模擬器':'var(--c-sim)','小說':'var(--c-nov)','網站工具':'var(--c-web)',
  '日常工具':'var(--c-day)','實驗性質':'var(--c-exp)','其他':'var(--c-etc)'};

const THEMES = [
  { id:'',       label:'拿鐵奶油', sw:['#F5F1E4','#5F9E6E','#8C6FC6'] },
  { id:'coin',   label:'銀霧冷萃',   sw:['#E9EAEC','#5B6B7A','#B4574B'] },
  { id:'lucky',  label:'莓果紅茶', sw:['#F2E4E0','#C0392B','#A9791F'] },
  { id:'matcha', label:'抹茶拿鐵', sw:['#EDF1E6','#5FA47A','#C4785B'] },
  { id:'book',   label:'藍山深焙',   sw:['#E7EBF1','#3E5C8C','#B05A3E'] },
  { id:'rose',   label:'玫瑰歐蕾', sw:['#EFE3E4','#B37784','#9A5C3C'] },
  { id:'paper',  label:'焦糖瑪奇朵', sw:['#E6DCC8','#7A5C3E','#A24B3C'] },
  { id:'night',  label:'深夜營業', sw:['#23262B','#6FA8CC','#EDEAE3'] },
  { id:'ink',    label:'炭焙黑金', sw:['#121212','#C9A227','#F0EDE6'] }
];
const FONTS = [
  { id:'maru',     label:'圓體（Zen Maru）',   stack:"'Zen Maru Gothic','Noto Sans TC','PingFang TC',sans-serif" },
  { id:'sans',     label:'黑體（Noto Sans）',  stack:"'Noto Sans TC','PingFang TC',sans-serif" },
  { id:'serif',    label:'明體（Noto Serif）', stack:"'Noto Serif TC','Songti TC',serif" },
  { id:'kai',      label:'霞鶩文楷（楷體）',    stack:"'LXGW WenKai TC','Kaiti TC',serif" },
  { id:'pingfang', label:'蘋方黑體',           stack:"'PingFang TC','Heiti TC',sans-serif" }
];
const LOOKS = [
  { id:'',     label:'圓潤' },
  { id:'bold', label:'粗框' },
  { id:'dash', label:'虛線' },
  { id:'flat', label:'方正' }
];
const FS_MIN = 15, FS_MAX = 34, FS_DEF = 19;

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const $ = id => document.getElementById(id);
const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const store = {
  get(k, d){ try{ const v = localStorage.getItem(NS + k); return v === null ? d : v; }catch(e){ return d; } },
  set(k, v){ try{ localStorage.setItem(NS + k, v); }catch(e){} }
};

function err(msg, html){
  const e = $('err');
  if(html) e.innerHTML = msg; else e.textContent = msg;
  e.style.display = 'block';
  window.scrollTo({ top:0, behavior:'smooth' });
}
function clearErr(){ $('err').style.display = 'none'; }
function toast(msg){
  const t = $('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 2200);
}
function friendly(e){
  const c = (e && e.code) || '';
  if(c.includes('permission-denied')) return '權限被擋下來了。請確認 Firebase 規則已發布，而且集合寫的是 {doc=**}。';
  if(c.includes('unauthorized-domain')) return '這個網域還沒授權。Firebase → Authentication → 設定 → 已授權網域，加入 tofudouce.github.io。';
  if(c.includes('popup-blocked')) return '彈出視窗被擋住了。網址列左邊「ᴀA」→ 網站設定 → 允許彈出式視窗。';
  if(c.includes('popup-closed')) return '登入視窗被關掉了，再按一次就好。';
  if(c.includes('unavailable')) return '連不上資料庫，請檢查網路後再試。';
  return '出錯了：' + ((e && e.message) || e);
}

/* ---------- 外觀 ---------- */
function applyTheme(id){
  if(id) document.body.setAttribute('data-theme', id);
  else document.body.removeAttribute('data-theme');
  store.set('theme', id);
  $('themes').querySelectorAll('.th').forEach(t => t.classList.toggle('on', t.dataset.id === id));
  requestAnimationFrame(() => {
    const bg = getComputedStyle(document.body).backgroundColor;
    const mt = document.querySelector('meta[name="theme-color"]');
    if(mt && bg) mt.setAttribute('content', bg);
  });
}
function applyFont(id){
  const f = FONTS.find(x => x.id === id) || FONTS[0];
  document.documentElement.style.setProperty('--font', f.stack);
  store.set('font', f.id);
  $('fontSel').value = f.id;
}
function applyFs(px){
  const v = Math.max(FS_MIN, Math.min(FS_MAX, px));
  document.documentElement.style.setProperty('--fs', v + 'px');
  store.set('fs', v);
  $('fsVal').textContent = v + 'px';
  return v;
}
function applyLook(id){
  if(id) document.body.setAttribute('data-look', id);
  else document.body.removeAttribute('data-look');
  store.set('look', id);
  $('looks').querySelectorAll('.lk').forEach(t => t.classList.toggle('on', t.dataset.id === id));
}

$('themes').innerHTML = THEMES.map(t =>
  '<div class="th" data-id="' + t.id + '"><div class="sw">' +
  t.sw.map(c => '<span style="background:' + c + '"></span>').join('') +
  '</div><small>' + t.label + '</small></div>').join('');
$('themes').addEventListener('click', e => {
  const t = e.target.closest('.th'); if(t) applyTheme(t.dataset.id);
});
$('fontSel').innerHTML = FONTS.map(f => '<option value="' + f.id + '">' + f.label + '</option>').join('');
$('fontSel').addEventListener('change', e => applyFont(e.target.value));
$('looks').innerHTML = LOOKS.map(l => '<div class="lk" data-id="' + l.id + '">' + l.label + '</div>').join('');
$('looks').addEventListener('click', e => {
  const t = e.target.closest('.lk'); if(t) applyLook(t.dataset.id);
});

let fs = FS_DEF;
$('fsUp').addEventListener('click', () => { fs = applyFs(fs + 1); });
$('fsDown').addEventListener('click', () => { fs = applyFs(fs - 1); });
$('btnResetLook').addEventListener('click', () => {
  applyTheme(''); applyFont('maru'); applyLook(''); fs = applyFs(FS_DEF);
  toast('恢復預設了');
});

applyTheme(store.get('theme', ''));
applyFont(store.get('font', 'maru'));
applyLook(store.get('look', ''));
fs = applyFs(parseInt(store.get('fs', FS_DEF), 10) || FS_DEF);

/* ---------- 分頁 ---------- */
const rank = w => (w.order != null ? w.order : (w.updated || 0));
let cur = null, code = '', works = [], filter = '全部', rows = [];
const TABS = [['shelf','tabShelf'],['edit','tabEdit'],['look','tabLook'],['acc','tabAcc']];

function go(tab){
  TABS.forEach(([t, id]) => $(id).classList.toggle('hide', t !== tab));
  $('nav').querySelectorAll('button').forEach(b => b.classList.toggle('on', b.dataset.tab === tab));
  window.scrollTo({ top:0, behavior:'smooth' });
}
$('nav').addEventListener('click', e => {
  const b = e.target.closest('button'); if(!b) return;
  if(b.dataset.tab === 'edit' && !cur && !code) newWork();
  else go(b.dataset.tab);
});

/* ---------- 分類 ---------- */
$('catPick').innerHTML = CATS.map((c, i) =>
  '<div class="cat' + (i === 0 ? ' on' : '') + '" data-c="' + c + '">' + c + '</div>').join('');
$('catPick').addEventListener('click', e => {
  const t = e.target.closest('.cat'); if(!t) return;
  $('catPick').querySelectorAll('.cat').forEach(x => x.classList.toggle('on', x === t));
});
const pickedCat = () => { const on = $('catPick').querySelector('.cat.on'); return on ? on.dataset.c : '其他'; };
const setCat = c => $('catPick').querySelectorAll('.cat').forEach(x => x.classList.toggle('on', x.dataset.c === c));

$('filters').innerHTML = ['全部'].concat(CATS).map((c, i) =>
  '<div class="cat' + (i === 0 ? ' on' : '') + '" data-c="' + c + '">' + c + '</div>').join('');
$('filters').addEventListener('click', e => {
  const t = e.target.closest('.cat'); if(!t) return;
  filter = t.dataset.c;
  $('filters').querySelectorAll('.cat').forEach(x => x.classList.toggle('on', x === t));
  paintList();
});

/* ---------- 登入 ---------- */
$('btnIn').addEventListener('click', async () => {
  clearErr();
  try{ await signInWithPopup(auth, new GoogleAuthProvider()); }
  catch(e){ err(friendly(e)); }
});
$('btnOut').addEventListener('click', () => signOut(auth));
$('btnShelfLink').addEventListener('click', () => { window.location.href = SHELF_URL; });

onAuthStateChanged(auth, async user => {
  if(!user){
    $('who').textContent = '尚未登入';
    $('gate').classList.remove('hide');
    $('nav').classList.add('hide');
    TABS.forEach(([, id]) => $(id).classList.add('hide'));
    return;
  }
  if(user.uid !== OWNER){
    $('who').textContent = '這個帳號不是老闆';
    err('登入的帳號不是老闆本人。請登出換一個帳號。');
    $('gate').classList.add('hide');
    $('nav').classList.remove('hide');
    $('accName').textContent = user.displayName || '—';
    $('accUid').textContent = '這個帳號沒有權限';
    go('acc');
    return;
  }
  $('who').textContent = user.displayName + '，歡迎回來';
  $('accName').textContent = user.displayName || '—';
  $('accUid').textContent = '身分編號末四碼　' + user.uid.slice(-4);
  $('gate').classList.add('hide');
  $('nav').classList.remove('hide');
  go('shelf');
  await loadList();
});

/* ---------- 清單 ---------- */
async function loadList(){
  clearErr();
  $('list').innerHTML = '<div class="empty">正在把作品端上來⋯⋯</div>';
  works = [];
  try{
    for(const coll of ['posts_public','posts_private']){
      const snap = await getDocs(collection(db, coll));
      snap.forEach(d => works.push(Object.assign({ id:d.id, coll }, d.data())));
    }
  }catch(e){ err(friendly(e)); $('list').innerHTML = ''; return; }
  works.sort((a, b) => (b.pinned?1:0) - (a.pinned?1:0) || rank(b) - rank(a));
  paintList();
  paintStat();
}
function paintStat(){
  const open = works.filter(w => w.coll === 'posts_public').length;
  $('stOpen').textContent = open;
  $('stLock').textContent = works.length - open;
  $('stKb').textContent = Math.round(works.reduce((s, w) => s + (w.size || 0), 0) / 1024);
}
function paintList(){
  rows = works.filter(w => filter === '全部' || w.cat === filter);
  $('countLine').textContent = '架上的作品　' + works.length + ' 件';
  if(!rows.length){
    $('list').innerHTML = works.length
      ? '<div class="empty">這個分類還是空的。</div>'
      : '<div class="empty">架上還空著。<br>從下面的「新增」收第一件作品進來。</div>';
    return;
  }
  $('list').innerHTML = rows.map(w =>
    '<div class="work" data-id="' + w.coll + '/' + w.id + '">' +
      '<div class="stripe" style="background:' + (COLOR[w.cat] || 'var(--c-etc)') + '"></div>' +
      '<div class="nm">' + (w.pinned ? '<span class="star">★</span> ' : '') + esc(w.name) + '</div>' +
      (w.desc ? '<div class="ds">' + esc(w.desc) + '</div>' : '') +
      '<div class="mt">' +
        '<span class="chip ' + (w.coll === 'posts_private' ? 'lock">加鎖' : 'open">公開') + '</span>' +
        esc(w.cat || '其他') + '　' + Math.round((w.size||0)/1024) + ' KB' +
      '</div>' +
      '<div class="ord">' +
        '<button data-move="up" data-id="' + w.coll + '/' + w.id + '">&#9650;</button>' +
        '<button data-move="down" data-id="' + w.coll + '/' + w.id + '">&#9660;</button>' +
      '</div>' +
    '</div>'
  ).join('');
  $('list').querySelectorAll('.ord button').forEach(b => {
    b.addEventListener('click', ev => {
      ev.stopPropagation();
      move(b.dataset.id, b.dataset.move === 'up' ? -1 : 1);
    });
  });
  $('list').querySelectorAll('.work').forEach(el => {
    el.addEventListener('click', () => {
      const [coll, id] = el.dataset.id.split('/');
      openEdit(works.find(w => w.coll === coll && w.id === id));
    });
  });
}

async function move(key, dir){
  const i = rows.findIndex(w => (w.coll + '/' + w.id) === key);
  const j = i + dir;
  if(i < 0 || j < 0 || j >= rows.length) return;
  const a = rows[i], b = rows[j];
  if(!!a.pinned !== !!b.pinned){ toast('釘選的作品永遠在最前面'); return; }
  const ra = rank(a), rb = rank(b);
  try{
    await updateDoc(doc(db, a.coll, a.id), { order: rb });
    await updateDoc(doc(db, b.coll, b.id), { order: ra });
    a.order = rb; b.order = ra;
    works.sort((x, y) => (y.pinned?1:0) - (x.pinned?1:0) || rank(y) - rank(x));
    paintList();
  }catch(e){ err(friendly(e)); }
}

async function backup(){
  const btn = $('btnBackup');
  btn.disabled = true;
  const out = { site:'小怪獸咖啡館', at:new Date().toISOString(), works:[] };
  try{
    for(let i = 0; i < works.length; i++){
      const w = works[i];
      btn.textContent = '打包中 ' + (i + 1) + ' / ' + works.length;
      const snap = await getDoc(doc(db, w.coll, w.id, 'blob', 'source'));
      out.works.push({
        id:w.id, coll:w.coll, name:w.name, desc:w.desc, cat:w.cat,
        pinned:!!w.pinned, order:rank(w), size:w.size,
        code: snap.exists() ? (snap.data().code || '') : ''
      });
    }
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(out, null, 1)], { type:'application/json' }));
    a.download = 'cafe-backup-' + new Date().toISOString().slice(0, 10) + '.json';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 8000);
    toast('備份下載好了');
  }catch(e){ err(friendly(e)); }
  finally{ btn.disabled = false; btn.textContent = '備份全部作品'; }
}
$('btnBackup').addEventListener('click', backup);

/* ---------- 編輯 ---------- */
function setMeter(){
  const g = $('gauge'), m = $('meter');
  if(!code){
    g.querySelector('span').style.width = '0';
    g.classList.remove('bad'); m.classList.remove('bad');
    m.textContent = '還沒有程式碼';
    return;
  }
  const b = new Blob([code]).size;
  g.querySelector('span').style.width = Math.min(100, b / MAX * 100) + '%';
  g.classList.toggle('bad', b > MAX);
  m.classList.toggle('bad', b > MAX);
  m.textContent = b > MAX
    ? Math.round(b/1024) + ' KB，超過 880 KB 上限，存不進去'
    : Math.round(b/1024) + ' KB　／　上限 880 KB';
}
function setLock(v){
  $('tgPub').classList.toggle('on', !v);
  $('tgLock').classList.toggle('on', v);
}
$('tgPub').addEventListener('click', () => setLock(false));
$('tgLock').addEventListener('click', () => setLock(true));
$('tgPin').addEventListener('click', e => e.currentTarget.classList.toggle('on'));

function newWork(){
  cur = null; code = '';
  $('edTitle').textContent = '收一件新作品';
  $('fName').value = ''; $('fDesc').value = '';
  $('fFile').value = ''; $('fileLabel').textContent = '從「檔案」選一個 HTML 檔';
  setCat('模擬器'); setLock(false);
  $('tgPin').classList.remove('on');
  setMeter();
  $('btnDel').classList.add('hide');
  go('edit');
}
async function openEdit(w){
  if(!w) return;
  clearErr();
  cur = w; code = '';
  $('edTitle').textContent = '編輯作品';
  $('fName').value = w.name || '';
  $('fDesc').value = w.desc || '';
  $('fFile').value = ''; $('fileLabel').textContent = '換一個 HTML 檔';
  setCat(w.cat || '其他');
  setLock(w.coll === 'posts_private');
  $('tgPin').classList.toggle('on', !!w.pinned);
  $('meter').textContent = '讀取程式碼中⋯⋯';
  $('btnDel').classList.remove('hide');
  go('edit');
  try{
    const snap = await getDoc(doc(db, w.coll, w.id, 'blob', 'source'));
    code = snap.exists() ? (snap.data().code || '') : '';
  }catch(e){ err(friendly(e)); }
  setMeter();
}

$('fFile').addEventListener('change', e => {
  const f = e.target.files && e.target.files[0];
  if(!f) return;
  const r = new FileReader();
  r.onload = () => {
    code = r.result;
    $('fileLabel').textContent = f.name;
    if(!$('fName').value) $('fName').value = f.name.replace(/\.html?$/i, '');
    setMeter();
  };
  r.onerror = () => err('這個檔案讀不起來，換一個試試。');
  r.readAsText(f, 'utf-8');
});

$('btnSave').addEventListener('click', async () => {
  clearErr();
  const name = $('fName').value.trim();
  if(!name){ err('先給它一個名稱。'); return; }
  if(!code){ err('還沒選程式碼檔案。'); return; }
  const size = new Blob([code]).size;
  if(size > MAX){ err('這份檔案 ' + Math.round(size/1024) + ' KB，超過 880 KB 上限，存不進去。'); return; }

  const isLock = $('tgLock').classList.contains('on');
  const coll = isLock ? 'posts_private' : 'posts_public';
  const id = cur ? cur.id : (Date.now().toString(36) + Math.random().toString(36).slice(2, 7));
  const btn = $('btnSave');
  btn.disabled = true; btn.textContent = '儲存中⋯⋯';
  try{
    await setDoc(doc(db, coll, id), {
      name, desc: $('fDesc').value.trim(), cat: pickedCat(),
      pinned: $('tgPin').classList.contains('on'),
      order: (cur && cur.order != null) ? cur.order : Date.now(),
      size, updated: Date.now()
    });
    await setDoc(doc(db, coll, id, 'blob', 'source'), { code });
    if(cur && cur.coll !== coll){
      await deleteDoc(doc(db, cur.coll, cur.id, 'blob', 'source'));
      await deleteDoc(doc(db, cur.coll, cur.id));
    }
    backToShelf();
    toast('已收進架上');
  }catch(e){ err(friendly(e)); }
  finally{ btn.disabled = false; btn.textContent = '儲存'; }
});

$('btnDel').addEventListener('click', async () => {
  if(!cur) return;
  if(!confirm('「' + cur.name + '」會被永久刪掉，包含程式碼。確定嗎？')) return;
  clearErr();
  try{
    await deleteDoc(doc(db, cur.coll, cur.id, 'blob', 'source'));
    await deleteDoc(doc(db, cur.coll, cur.id));
    backToShelf();
    toast('已經刪掉了');
  }catch(e){ err(friendly(e)); }
});

$('btnPrev').addEventListener('click', () => {
  clearErr();
  if(!code){ err('還沒有程式碼可以預覽。'); return; }
  const url = URL.createObjectURL(new Blob([code], { type:'text/html' }));
  const w = window.open(url, '_blank');
  if(!w){
    err('Safari 擋住了新視窗。<a href="' + url + '" target="_blank" rel="noopener">點這裡手動開啟</a>，或到網址列左邊「ᴀA」→ 網站設定 → 允許彈出式視窗。', true);
    return;
  }
  setTimeout(() => URL.revokeObjectURL(url), 60000);
});

$('btnDown').addEventListener('click', () => {
  clearErr();
  if(!code){ err('還沒有程式碼可以下載。'); return; }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([code], { type:'text/html' }));
  a.download = ($('fName').value.trim() || 'work') + '.html';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 4000);
});

$('btnBack').addEventListener('click', backToShelf);
$('btnReload').addEventListener('click', async () => { await loadList(); toast('架上已更新'); });

function backToShelf(){
  cur = null; code = '';
  go('shelf');
  loadList();
}
</script>
</body>
</html>
