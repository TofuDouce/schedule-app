<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ 魔法植物溫室 ✦</title>

<style>
:root{
--bg1:#f4e8ff;
--bg2:#ffeaf5;
--card:rgba(255,255,255,.75);
--text:#5f5875;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Microsoft JhengHei",sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,var(--bg1),var(--bg2));
color:var(--text);
}

.topbar{
display:flex;
justify-content:center;
gap:12px;
padding:15px;
position:sticky;
top:0;
z-index:10;
}

.card{
background:var(--card);
backdrop-filter:blur(10px);
padding:12px 18px;
border-radius:18px;
box-shadow:0 5px 12px rgba(0,0,0,.1);
font-weight:bold;
}

.title{
text-align:center;
font-size:34px;
font-weight:bold;
margin-top:10px;
}

.subtitle{
text-align:center;
margin-bottom:20px;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:15px;
}

.plot{
aspect-ratio:1;
background:rgba(255,255,255,.7);
border-radius:25px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
box-shadow:0 4px 12px rgba(0,0,0,.08);
transition:.2s;
}

.plot:hover{
transform:translateY(-4px);
}

.plant{
font-size:42px;
}

.name{
font-size:12px;
margin-top:6px;
}

.controls{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
margin:20px 0;
}

button{
border:none;
padding:12px 18px;
border-radius:15px;
cursor:pointer;
font-weight:bold;
background:white;
box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.panel{
background:rgba(255,255,255,.75);
padding:20px;
border-radius:25px;
margin-top:20px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.collection{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(100px,1fr));
gap:10px;
margin-top:15px;
}

.item{
background:white;
padding:10px;
border-radius:15px;
text-align:center;
}

.message{
text-align:center;
height:24px;
font-weight:bold;
color:#b1559f;
}
</style>
</head>
<body>

<div class="topbar">
<div class="card">💰 <span id="gold">100</span></div>
<div class="card">✨ <span id="essence">0</span></div>
<div class="card">📖 <span id="discoveries">0</span>/15</div>
</div>

<div class="title">🌙 魔法植物溫室 🌙</div>
<div class="subtitle">收集神秘植物圖鑑</div>

<div class="container">

<div class="controls">

<button onclick="plantSeed()">
🌱 種植種子 (10💰)
</button>

<button onclick="harvestAll()">
✂️ 全部收成
</button>

<button onclick="buyPlot()">
🪴 擴充花盆 (50💰)
</button>

</div>

<div class="message" id="message"></div>

<div id="garden" class="grid"></div>

<div class="panel">

<h2>📖 植物圖鑑</h2>

<div id="collection" class="collection"></div>

</div>

</div>

<script>

let gold=100;
let essence=0;

const discovered=new Set();

const plants=[

{
name:"月光花",
emoji:"🌸",
time:10,
value:20
},

{
name:"星塵草",
emoji:"🌿",
time:15,
value:35
},

{
name:"發光蘑菇",
emoji:"🍄",
time:20,
value:60
},

{
name:"精靈花",
emoji:"🧚",
time:25,
value:100
},

{
name:"黑玫瑰",
emoji:"🌹",
time:30,
value:150
},

{
name:"極光百合",
emoji:"🌺",
time:40,
value:250
},

{
name:"彩虹果",
emoji:"🍎",
time:45,
value:350
},

{
name:"銀月藤",
emoji:"🌱",
time:50,
value:450
},

{
name:"水晶花",
emoji:"💎",
time:60,
value:700
},

{
name:"龍息草",
emoji:"🔥",
time:70,
value:900
},

{
name:"幽夜蘭",
emoji:"🌙",
time:80,
value:1200
},

{
name:"星河樹",
emoji:"🌳",
time:90,
value:1500
},

{
name:"夢境花",
emoji:"💜",
time:100,
value:1800
},

{
name:"神諭果",
emoji:"✨",
time:120,
value:2500
},

{
name:"世界樹幼苗",
emoji:"🌲",
time:150,
value:5000
}

];

const plots=[];

for(let i=0;i<6;i++){

plots.push({
plant:null,
progress:0
});

}

function randomPlant(){

let roll=Math.random();

if(roll<0.4) return plants[0];
if(roll<0.6) return plants[1];
if(roll<0.72) return plants[2];
if(roll<0.82) return plants[3];
if(roll<0.88) return plants[4];
if(roll<0.92) return plants[5];
if(roll<0.95) return plants[6];
if(roll<0.97) return plants[7];
if(roll<0.985) return plants[8];
if(roll<0.992) return plants[9];
if(roll<0.996) return plants[10];
if(roll<0.998) return plants[11];
if(roll<0.999) return plants[12];

return plants[
13+Math.floor(Math.random()*2)
];

}

function plantSeed(){

let empty=
plots.find(
p=>p.plant===null
);

if(!empty){

msg("沒有空花盆");

return;
}

if(gold<10){

msg("金幣不足");

return;
}

gold-=10;

empty.plant=randomPlant();

empty.progress=0;

update();

}

function harvestAll(){

plots.forEach(plot=>{

if(
plot.plant &&
plot.progress>=plot.plant.time
){

gold+=plot.plant.value;

essence+=1;

discovered.add(
plot.plant.name
);

plot.plant=null;

plot.progress=0;

}

});

update();

}

function buyPlot(){

let cost=50+plots.length*20;

if(gold<cost){

msg("金幣不足");

return;
}

gold-=cost;

plots.push({

plant:null,
progress:0

});

update();

}

function msg(text){

message.textContent=text;

}

function renderGarden(){

garden.innerHTML="";

plots.forEach(plot=>{

const div=
document.createElement("div");

div.className="plot";

if(!plot.plant){

div.innerHTML=`
<div class="plant">🪴</div>
<div class="name">空花盆</div>
`;

}
else{

let percent=
Math.floor(
plot.progress/
plot.plant.time*100
);

if(percent>100)
percent=100;

div.innerHTML=`
<div class="plant">
${plot.plant.emoji}
</div>
<div class="name">
${plot.plant.name}
</div>
<div class="name">
${percent}%
</div>
`;

}

garden.appendChild(div);

});

}

function renderCollection(){

collection.innerHTML="";

plants.forEach(p=>{

const div=
document.createElement("div");

div.className="item";

if(discovered.has(p.name)){

div.innerHTML=`
<div style="font-size:28px">
${p.emoji}
</div>
${p.name}
`;

}else{

div.innerHTML=`
<div style="font-size:28px">
❔
</div>
?????
`;

}

collection.appendChild(div);

});

}

function update(){

goldEl.textContent=gold;
essenceEl.textContent=essence;
discoveriesEl.textContent=
discovered.size;

renderGarden();
renderCollection();

}

const goldEl=
document.getElementById("gold");

const essenceEl=
document.getElementById("essence");

const discoveriesEl=
document.getElementById("discoveries");

setInterval(()=>{

plots.forEach(plot=>{

if(plot.plant){

plot.progress++;

}

});

update();

},1000);

update();

</script>

</body>
</html>
