<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中正診所 Portal</title>
<style>
:root{
  --bg:#eef3f8;
  --card:#ffffff;
  --card2:#f6f9fc;
  --text:#17324a;
  --muted:#647d96;
  --line:#c9d9e8;
  --brand:#246394;
  --brand2:#3f8fc6;
  --danger:#c0392b;
  --warn:#b45309;
  --good:#15803d;
  --shadow:0 10px 28px rgba(31,70,105,.12);
}
html[data-theme="dark"]{
  --bg:#0f1b28;
  --card:#172638;
  --card2:#203247;
  --text:#e8f1fa;
  --muted:#91a9bf;
  --line:#31475f;
  --brand:#63aee4;
  --brand2:#8ac9f2;
  --shadow:0 12px 34px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
  font-family:"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;
}
header{
  position:sticky;
  top:0;
  z-index:20;
  display:grid;
  grid-template-columns:auto minmax(220px,430px) auto;
  gap:24px;
  align-items:center;
  padding:14px 28px;
  background:rgba(238,243,248,.92);
  border-bottom:1px solid var(--line);
  backdrop-filter:blur(16px);
}
html[data-theme="dark"] header{background:rgba(15,27,40,.92)}
.logo{display:flex;align-items:center;gap:12px}
.logo-mark{
  width:44px;height:44px;border-radius:12px;
  display:grid;place-items:center;
  color:white;font-size:23px;
  background:linear-gradient(135deg,var(--brand),var(--brand2));
  box-shadow:var(--shadow);
}
.logo h1{margin:0;font-size:24px;font-weight:900;line-height:1.1}
.logo small{display:block;margin-top:3px;color:var(--muted);font-size:11px;font-weight:900;letter-spacing:2px}
.search{position:relative}
.search span{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted)}
.search input{
  width:100%;
  padding:11px 14px 11px 40px;
  border:1px solid var(--line);
  border-radius:10px;
  background:var(--card);
  color:var(--text);
  font-size:15px;
  font-weight:700;
  outline:none;
}
.search input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(36,99,148,.16)}
.clock{text-align:right;font-weight:900}
#time{font-size:28px;font-variant-numeric:tabular-nums}
#date{margin-top:2px;color:var(--muted);font-size:12px}
main{width:min(1480px,calc(100% - 48px));margin:0 auto;padding:22px 0 110px}
.notice{
  display:none;
  margin:4px 0 18px;
  padding:14px 16px;
  border:1px solid var(--line);
  border-left:5px solid var(--brand);
  border-radius:12px;
  background:var(--card);
  box-shadow:var(--shadow);
  font-weight:700;
  line-height:1.7;
}
.notice.show{display:block}
.notice b{display:block;color:var(--brand);font-size:12px;letter-spacing:2px;margin-bottom:4px}
.section-title{
  display:flex;
  align-items:center;
  gap:12px;
  margin:28px 0 14px;
}
.section-title span{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:7px 15px;
  border-radius:999px;
  background:linear-gradient(135deg,var(--brand),var(--brand2));
  color:white;
  font-size:13px;
  font-weight:900;
}
.section-title i{height:1px;flex:1;background:linear-gradient(90deg,var(--line),transparent)}
.grid{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:14px;
}
.card{
  min-height:168px;
  border:1px solid var(--line);
  border-radius:12px;
  background:var(--card);
  box-shadow:0 8px 24px rgba(20,55,85,.08);
  overflow:hidden;
  transition:.16s;
}
.card:hover{transform:translateY(-3px);border-color:var(--brand);box-shadow:var(--shadow)}
.card.hidden{display:none}
.card.important{border-color:#e29b2d;background:#fff8e8}
html[data-theme="dark"] .card.important{background:#2b240f}
.card a,.card button{
  width:100%;
  height:100%;
  min-height:168px;
  padding:24px 14px 20px;
  border:0;
  background:transparent;
  color:inherit;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  text-decoration:none;
  cursor:pointer;
}
.icon{
  position:relative;
  width:58px;
  height:58px;
  margin-bottom:12px;
  display:grid;
  place-items:center;
  border:1px solid var(--line);
  border-radius:14px;
  background:var(--card2);
  font-size:30px;
}
.dot{
  display:none;
  position:absolute;
  top:-8px;
  right:-8px;
  min-width:22px;
  height:22px;
  padding:0 5px;
  border-radius:999px;
  border:2px solid var(--card);
  background:var(--danger);
  color:white;
  font-size:11px;
  font-weight:900;
  place-items:center;
}
.card h3{margin:0;font-size:21px;font-weight:900;line-height:1.3}
.card p{margin:7px 0 0;color:var(--muted);font-size:14px;font-weight:700;line-height:1.5}
.empty{
  grid-column:1/-1;
  padding:28px;
  border:1px dashed var(--line);
  border-radius:12px;
  color:var(--muted);
  text-align:center;
  font-weight:700;
}
.floating{
  position:fixed;
  right:24px;
  bottom:24px;
  z-index:30;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.fab{
  width:50px;
  height:50px;
  border:1px solid var(--line);
  border-radius:13px;
  background:var(--card);
  color:var(--text);
  box-shadow:var(--shadow);
  cursor:pointer;
  font-size:21px;
}
.overlay{
  display:none;
  position:fixed;
  inset:0;
  z-index:40;
  background:rgba(0,0,0,.38);
  backdrop-filter:blur(3px);
}
.overlay.show{display:block}
.modal{
  display:none;
  position:fixed;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  z-index:50;
  width:min(620px,calc(100vw - 34px));
  max-height:84vh;
  border:1px solid var(--line);
  border-radius:18px;
  background:var(--card);
  box-shadow:0 24px 70px rgba(0,0,0,.25);
  overflow:hidden;
}
.modal.show{display:flex;flex-direction:column}
.modal-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:17px 20px;
  border-bottom:1px solid var(--line);
}
.modal-head h2{margin:0;font-size:20px;font-weight:900}
.close{
  width:36px;
  height:36px;
  border:1px solid var(--line);
  border-radius:10px;
  background:transparent;
  color:var(--text);
  cursor:pointer;
  font-size:18px;
}
.modal-body{padding:18px 20px 22px;overflow:auto}
label{display:block;margin:13px 0 6px;color:var(--muted);font-size:13px;font-weight:900}
.input{
  width:100%;
  padding:11px 12px;
  border:1px solid var(--line);
  border-radius:10px;
  background:var(--card2);
  color:var(--text);
  font-size:15px;
  font-weight:700;
  outline:none;
}
.btn{
  width:100%;
  padding:12px;
  border:0;
  border-radius:10px;
  background:linear-gradient(135deg,var(--brand),var(--brand2));
  color:white;
  font-weight:900;
  cursor:pointer;
}
.seg{display:flex;gap:8px;flex-wrap:wrap}
.seg button{
  padding:9px 14px;
  border:1px solid var(--line);
  border-radius:10px;
  background:var(--card2);
  color:var(--text);
  font-weight:900;
  cursor:pointer;
}
.seg button.on{background:var(--brand);border-color:var(--brand);color:white}
.result{
  display:none;
  margin-top:18px;
  padding:20px;
  border:1px solid var(--brand);
  border-radius:14px;
  background:var(--card2);
  text-align:center;
}
.result.show{display:block}
.result .big{font-size:46px;font-weight:900;color:var(--brand);line-height:1}
.result .stage{
  display:inline-block;
  margin-top:10px;
  padding:8px 15px;
  border-radius:999px;
  background:var(--brand);
  color:white;
  font-weight:900;
}
.task{
  display:grid;
  grid-template-columns:auto 1fr;
  gap:14px;
  padding:15px;
  margin-bottom:12px;
  border:1px solid var(--line);
  border-left:6px solid var(--brand);
  border-radius:14px;
  background:var(--card2);
}
.task.overdue{border-left-color:var(--danger);background:#fff1f1}
.task.today,.task.soon{border-left-color:#df8c22;background:#fff8df}
.task.done{border-left-color:var(--good)}
html[data-theme="dark"] .task.overdue{background:#2c1414}
html[data-theme="dark"] .task.today,
html[data-theme="dark"] .task.soon{background:#2b240f}
.task-icon{font-size:34px}
.task h3{margin:0 0 5px;font-size:20px}
.task-meta{color:var(--muted);font-size:14px;font-weight:800;line-height:1.7}
.badge{
  display:inline-block;
  margin-top:8px;
  padding:7px 13px;
  border-radius:999px;
  background:var(--card);
  color:var(--brand);
  font-weight:900;
}
.task.overdue .badge{color:var(--danger)}
.task.today .badge,.task.soon .badge{color:var(--warn)}
.task.done .badge{color:var(--good)}
.memo{
  display:none;
  position:fixed;
  right:86px;
  bottom:24px;
  z-index:35;
  width:min(320px,calc(100vw - 32px));
  padding:16px;
  border:1px solid var(--line);
  border-radius:14px;
  background:var(--card);
  box-shadow:var(--shadow);
}
.memo.show{display:block}
.memo h2{margin:0 0 10px;font-size:17px}
.memo textarea{min-height:130px;resize:vertical}
.alert{
  display:none;
  position:fixed;
  left:50%;
  top:15px;
  transform:translateX(-50%);
  z-index:70;
  padding:10px 18px;
  border:0;
  border-radius:999px;
  background:var(--danger);
  color:white;
  box-shadow:0 8px 26px rgba(192,57,43,.35);
  font-weight:900;
  cursor:pointer;
}
.alert.show{display:block}
@media(max-width:1000px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:720px){
  header{grid-template-columns:1fr auto;padding:12px 15px}
  .search{grid-column:1/-1;order:3}
  .clock{display:none}
  main{width:calc(100% - 24px)}
  .grid{grid-template-columns:repeat(2,1fr)}
  .modal{left:0;right:0;bottom:0;top:auto;transform:none;width:100%;max-height:88vh;border-radius:18px 18px 0 0}
  .memo{right:12px;bottom:86px}
}
@media(max-width:380px){.grid{grid-template-columns:1fr}}
</style>
</head>

<body>
<header>
  <div class="logo">
    <div class="logo-mark">🏥</div>
    <div>
      <h1>中正診所</h1>
      <small>PORTAL SYSTEM</small>
    </div>
  </div>

  <div class="search">
    <span>🔍</span>
    <input id="searchInput" placeholder="搜尋書籤／工具…" oninput="filterCards()">
  </div>

  <div class="clock">
    <div id="time">00:00:00</div>
    <div id="date">-</div>
  </div>
</header>

<main>
  <div id="notice" class="notice">
    <b>📢 診所公告</b>
    <div id="noticeText"></div>
  </div>

  <section>
    <div class="section-title"><span>🏠 主要入口</span><i></i></div>
    <div id="primaryGrid" class="grid"><div class="empty">資料載入中…</div></div>
  </section>

  <section>
    <div class="section-title"><span>🧮 快速工具</span><i></i></div>
    <div class="grid">
      <div class="card" data-search="egfr 腎功能 計算機">
        <button onclick="openModal('egfrModal')">
          <div class="icon">🩺</div>
          <h3>eGFR 計算機</h3>
          <p>CKD-EPI 腎功能分期估算</p>
        </button>
      </div>

      <div class="card" data-search="年份 年齡 西元 民國">
        <button onclick="openModal('yearModal')">
          <div class="icon">📅</div>
          <h3>年齡 / 年份換算</h3>
          <p>西元、民國、年齡互換</p>
        </button>
      </div>

      <div class="card" data-search="定期任務 到期 逾期">
        <button onclick="openModal('taskModal'); loadTasks();">
          <div class="icon">📋<span id="taskDot" class="dot"></span></div>
          <h3>定期任務</h3>
          <p>追蹤院內定期工作事項</p>
        </button>
      </div>
    </div>
  </section>

  <section>
    <div class="section-title"><span>🔧 次要工具</span><i></i></div>
    <div id="secondaryGrid" class="grid"><div class="empty">資料載入中…</div></div>
  </section>
</main>

<button id="taskAlert" class="alert" onclick="openModal('taskModal'); loadTasks();">有任務逾期</button>

<div id="overlay" class="overlay" onclick="closeModal()"></div>

<div id="egfrModal" class="modal">
  <div class="modal-head">
    <h2>🩺 eGFR 計算機</h2>
    <button class="close" onclick="closeModal()">✕</button>
  </div>
  <div class="modal-body">
    <p style="color:var(--muted);font-weight:700;line-height:1.6">根據 2021 CKD-EPI Creatinine 公式計算，結果僅供臨床參考。</p>

    <label>血清肌酸酐 Scr（mg/dL）</label>
    <input id="egfrScr" class="input" type="number" step="0.01" placeholder="例：0.90">

    <label>病患年齡</label>
    <input id="egfrAge" class="input" type="number" placeholder="輸入歲數">

    <label>性別</label>
    <div class="seg">
      <button id="maleBtn" class="on" onclick="setGender('male')">男性</button>
      <button id="femaleBtn" onclick="setGender('female')">女性</button>
    </div>

    <div style="height:16px"></div>
    <button class="btn" onclick="calcEgfr()">計算 eGFR</button>

    <div id="egfrResult" class="result">
      <div>eGFR 為</div>
      <div id="egfrValue" class="big">--</div>
      <div style="color:var(--muted);font-weight:700;margin-top:4px">ml/min/1.73m²</div>
      <div id="egfrStage" class="stage">--</div>
      <p id="egfrDesc" style="font-weight:700;line-height:1.7;text-align:left"></p>
    </div>
  </div>
</div>

<div id="yearModal" class="modal">
  <div class="modal-head">
    <h2>📅 年齡 / 年份換算</h2>
    <button class="close" onclick="closeModal()">✕</button>
  </div>
  <div class="modal-body">
    <label>西元年</label>
    <input id="adYear" class="input" type="number" oninput="fromAD()">

    <label>民國年</label>
    <input id="rocYear" class="input" type="number" oninput="fromROC()">

    <div class="result show">
      <div id="ageLabel">若此年為出生年，於今年滿：</div>
      <div id="ageValue" class="big">0 歲</div>
    </div>
  </div>
</div>

<div id="taskModal" class="modal">
  <div class="modal-head">
    <h2>📋 定期任務</h2>
    <button class="close" onclick="closeModal()">✕</button>
  </div>
  <div id="taskBody" class="modal-body">
    <div class="empty">載入中…</div>
  </div>
</div>

<div id="memo" class="memo">
  <h2>📝 快速備忘</h2>
  <textarea id="memoText" class="input" placeholder="在此輸入備忘事項…"></textarea>
  <div style="height:10px"></div>
  <button class="btn" onclick="saveMemo()">儲存</button>
</div>

<div class="floating">
  <button class="fab" onclick="toggleTheme()" title="切換佈景">🌙</button>
  <button class="fab" onclick="toggleMemo()" title="快速備忘">📝</button>
</div>

<script>
var SHEET_URL = "https://docs.google.com/spreadsheets/d/1uYBA_CncbEAydmzNC1SRnsKJdswNgQh3zg1x6TKo0UU/export?format=csv&gid=0";
var TASK_URL = "https://docs.google.com/spreadsheets/d/1uYBA_CncbEAydmzNC1SRnsKJdswNgQh3zg1x6TKo0UU/export?format=csv&gid=646869954";
var TASK_EDIT = "https://docs.google.com/spreadsheets/d/1uYBA_CncbEAydmzNC1SRnsKJdswNgQh3zg1x6TKo0UU/edit#gid=646869954";

var gender = "male";
var taskLoaded = false;

function $(id){ return document.getElementById(id); }

function escapeHTML(str){
  return String(str || "").replace(/[&<>"']/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c];
  });
}

function parseCSV(text){
  var rows=[], row=[], field="", quote=false;
  for(var i=0;i<text.length;i++){
    var c=text[i], n=text[i+1];
    if(c === '"' && quote && n === '"'){ field += '"'; i++; }
    else if(c === '"'){ quote = !quote; }
    else if(c === "," && !quote){ row.push(field.trim()); field=""; }
    else if((c === "\n" || c === "\r") && !quote){
      if(c === "\r" && n === "\n") i++;
      row.push(field.trim());
      if(row.join("").trim()) rows.push(row);
      row=[]; field="";
    }else field += c;
  }
  row.push(field.trim());
  if(row.join("").trim()) rows.push(row);
  return rows;
}

function createCard(item){
  var cls = item.title.indexOf("重要") >= 0 ? "card important" : "card";
  return ''
    + '<div class="'+cls+'" data-search="'+escapeHTML(item.title+" "+item.desc+" "+item.icon)+'">'
    + '<a href="'+escapeHTML(item.url)+'" target="_blank" rel="noopener">'
    + '<div class="icon">'+escapeHTML(item.icon || "🔗")+'</div>'
    + '<h3>'+escapeHTML(item.title)+'</h3>'
    + (item.desc ? '<p>'+escapeHTML(item.desc)+'</p>' : '')
    + '</a></div>';
}

async function loadBookmarks(){
  var primary=[], secondary=[], announce=[];
  try{
    var res = await fetch(SHEET_URL + "&cb=" + Date.now());
    var text = await res.text();
    var rows = parseCSV(text).slice(1);

    rows.forEach(function(cols){
      var cat=(cols[0]||"").toLowerCase();
      var title=cols[1]||"";
      var url=cols[2]||"";
      var desc=cols[3]||"";
      var icon=cols[4]||"🔗";
      if(!title) return;

      if(cat.indexOf("announce") >= 0){
        announce.push(title + (desc ? "　" + desc : ""));
        return;
      }

      if(!url) return;
      var item={title:title,url:url,desc:desc,icon:icon};
      if(cat.indexOf("primary") >= 0) primary.push(item);
      else secondary.push(item);
    });
  }catch(e){
    $("primaryGrid").innerHTML = '<div class="empty">雲端資料讀取失敗，但快速工具仍可使用</div>';
    $("secondaryGrid").innerHTML = '<div class="empty">尚無資料</div>';
    return;
  }

  $("primaryGrid").innerHTML = primary.length ? primary.map(createCard).join("") : '<div class="empty">尚無書籤</div>';
  $("secondaryGrid").innerHTML = secondary.length ? secondary.map(createCard).join("") : '<div class="empty">尚無書籤</div>';

  if(announce.length){
    $("notice").classList.add("show");
    $("noticeText").innerHTML = announce.map(escapeHTML).join("<br>");
  }

  filterCards();
}

function filterCards(){
  var q = $("searchInput").value.trim().toLowerCase();
  document.querySelectorAll(".card").forEach(function(card){
    var text = (card.textContent + " " + (card.dataset.search || "")).toLowerCase();
    card.classList.toggle("hidden", q && text.indexOf(q) < 0);
  });
}

function openModal(id){
  document.querySelectorAll(".modal").forEach(function(m){ m.classList.remove("show"); });
  $("overlay").classList.add("show");
  $(id).classList.add("show");
  document.body.style.overflow = "hidden";
}

function closeModal(){
  document.querySelectorAll(".modal").forEach(function(m){ m.classList.remove("show"); });
  $("overlay").classList.remove("show");
  document.body.style.overflow = "";
}

function toggleTheme(){
  var html = document.documentElement;
  var next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
  html.setAttribute("data-theme", next);
  localStorage.setItem("cz_theme_simple", next);
}

function toggleMemo(){
  $("memo").classList.toggle("show");
}

function saveMemo(){
  localStorage.setItem("cz_memo_simple", $("memoText").value);
  alert("已儲存");
}

function setGender(g){
  gender = g;
  $("maleBtn").classList.toggle("on", g === "male");
  $("femaleBtn").classList.toggle("on", g === "female");
}

function calcEgfr(){
  var scr = parseFloat($("egfrScr").value);
  var age = parseFloat($("egfrAge").value);
  if(!scr || !age || scr <= 0 || age <= 0){
    alert("請輸入正確的 Scr 與年齡");
    return;
  }

  var female = gender === "female";
  var k = female ? 0.7 : 0.9;
  var alpha = female ? -0.241 : -0.302;
  var factor = female ? 1.012 : 1;
  var scrK = scr / k;

  var val = 142
    * Math.pow(Math.min(scrK,1), alpha)
    * Math.pow(Math.max(scrK,1), -1.2)
    * Math.pow(0.9938, age)
    * factor;

  var stage = getStage(val);
  $("egfrValue").textContent = val.toFixed(2);
  $("egfrStage").textContent = stage.title;
  $("egfrDesc").textContent = stage.desc;
  $("egfrResult").classList.add("show");
}

function getStage(v){
  if(v >= 90) return {title:"第一期：腎功能正常",desc:"腎功能正常，但仍需搭配尿蛋白、血尿與臨床狀況判讀。"};
  if(v >= 60) return {title:"第二期：輕度腎功能受損",desc:"建議定期追蹤腎功能，控制血壓血糖，避免不明藥物與止痛藥。"};
  if(v >= 45) return {title:"第三期A：中度腎功能受損",desc:"腎功能已有明顯下降，建議規律追蹤並注意飲食與慢性病控制。"};
  if(v >= 30) return {title:"第三期B：中度腎功能嚴重受損",desc:"需更密切追蹤，評估貧血、骨病變與飲食調整。"};
  if(v >= 15) return {title:"第四期：重度腎臟病變",desc:"腎功能重度下降，應由醫師評估後續治療與透析準備。"};
  return {title:"第五期：末期腎臟病變",desc:"可能需要透析或腎臟移植評估，請依醫師判斷處理。"};
}

function fromAD(){
  var ad = parseInt($("adYear").value,10);
  $("rocYear").value = ad ? ad - 1911 : "";
  updateAge(ad);
}

function fromROC(){
  var roc = parseInt($("rocYear").value,10);
  var ad = roc ? roc + 1911 : "";
  $("adYear").value = ad;
  updateAge(ad);
}

function updateAge(ad){
  var y = new Date().getFullYear();
  $("ageLabel").textContent = "若此年為出生年，於今年 (" + y + ") 滿：";
  if(!ad) $("ageValue").textContent = "0 歲";
  else if(ad > y) $("ageValue").textContent = "尚未出生";
  else $("ageValue").textContent = (y - ad) + " 歲";
}

function excelDate(v){
  if(!v) return "";
  v = String(v).trim();
  if(/^\d+$/.test(v)){
    var d = new Date((Number(v) - 25569) * 86400000);
    return formatDate(d);
  }
  return v;
}

function parseDate(v){
  if(!v) return null;
  var m = String(v).trim().match(/^(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})/);
  if(m) return new Date(+m[1], +m[2]-1, +m[3]);
  var r = String(v).trim().match(/^(\d{2,3})[\/-](\d{1,2})[\/-](\d{1,2})/);
  if(r && +r[1] < 200) return new Date(+r[1]+1911, +r[2]-1, +r[3]);
  return null;
}

function isDone(v){
  return !!v && !/^(0|false|no|否|x|✗|✕|-|無|未|待)$/i.test(String(v).trim());
}

function taskStatus(t){
  var today = new Date();
  today.setHours(0,0,0,0);
  var due = parseDate(t.due);
  var days = due ? Math.ceil((due - today) / 86400000) : null;

  if(t.done && (!due || days >= 0)){
    return {state:"done",sort:4,days:days || 9999,label: due ? "✅ 已完成・下次到期還有 " + days + " 天" : "✅ 已完成"};
  }
  if(!due) return {state:"todo",sort:3,days:9999,label:"🔵 待完成"};
  if(days < 0) return {state:"overdue",sort:0,days:days,label:"🔴 已逾期 " + Math.abs(days) + " 天"};
  if(days === 0) return {state:"today",sort:1,days:days,label:"🟠 今天到期"};
  if(days <= 3) return {state:"soon",sort:2,days:days,label:"🟠 即將到期・還剩 " + days + " 天"};
  return {state:"todo",sort:3,days:days,label:"🔵 待完成・還剩 " + days + " 天"};
}

async function loadTasks(){
  if(taskLoaded) return;
  $("taskBody").innerHTML = '<div class="empty">載入中…</div>';

  try{
    var res = await fetch(TASK_URL + "&cb=" + Date.now());
    var text = await res.text();
    var rows = parseCSV(text).slice(1);
    var tasks = rows.map(function(c){
      if(!c[0]) return null;
      return {
        name:c[0]||"",
        icon:c[1]||"📋",
        freq:c[2]||"",
        due:excelDate(c[3]),
        doneDate:excelDate(c[4]),
        note:c[5]||"",
        done:isDone(c[6]),
        periodDue:excelDate(c[7])
      };
    }).filter(Boolean);

    renderTasks(tasks);
    taskLoaded = true;
  }catch(e){
    $("taskBody").innerHTML = '<div class="empty">無法讀取任務資料。快速工具仍可使用。</div>';
  }
}

function renderTasks(tasks){
  if(!tasks.length){
    $("taskBody").innerHTML = '<div class="empty">Sheet 裡沒有任務資料</div>';
    updateTaskAlert(0);
    return;
  }

  var list = tasks.map(function(t){
    return {t:t,st:taskStatus(t)};
  }).sort(function(a,b){
    return (a.st.sort - b.st.sort) || (a.st.days - b.st.days);
  });

  var overdue = 0;
  var html = "";

  list.forEach(function(x){
    var t = x.t, st = x.st;
    if(st.state === "overdue") overdue++;

    html += '<div class="task '+st.state+'">';
    html += '<div class="task-icon">'+escapeHTML(t.icon)+'</div>';
    html += '<div>';
    html += '<h3>'+escapeHTML(t.name)+'</h3>';
    if(t.freq) html += '<div class="task-meta">🔁 '+escapeHTML(t.freq)+'</div>';
    if(t.due) html += '<div class="task-meta">到期：'+escapeHTML(t.due)+'</div>';
    if(t.doneDate) html += '<div class="task-meta">完成：'+escapeHTML(t.doneDate)+'</div>';
    if(t.note) html += '<div class="task-meta">💬 '+escapeHTML(t.note)+'</div>';
    html += '<div class="badge">'+escapeHTML(st.label)+'</div>';
    html += '<br><a href="'+TASK_EDIT+'" target="_blank" rel="noopener" style="display:inline-block;margin-top:9px;color:var(--brand);font-weight:900;text-decoration:none">至 Sheet 更新完成日期</a>';
    html += '</div></div>';
  });

  $("taskBody").innerHTML = html;
  updateTaskAlert(overdue);
}

function updateTaskAlert(count){
  var alert = $("taskAlert");
  var dot = $("taskDot");
  if(count > 0){
    alert.classList.add("show");
    alert.textContent = "有 " + count + " 個任務逾期！點此查看";
    dot.style.display = "grid";
    dot.textContent = count > 9 ? "9+" : count;
  }else{
    alert.classList.remove("show");
    dot.style.display = "none";
  }
}

async function silentTaskCheck(){
  try{
    var res = await fetch(TASK_URL + "&cb=" + Date.now());
    var text = await res.text();
    var rows = parseCSV(text).slice(1);
    var count = 0;
    rows.forEach(function(c){
      if(!c[0]) return;
      var t = {due:excelDate(c[3]),done:isDone(c[6])};
      if(taskStatus(t).state === "overdue") count++;
    });
    updateTaskAlert(count);
  }catch(e){}
}

function formatDate(d){
  return d.getFullYear()+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+String(d.getDate()).padStart(2,"0");
}

function tick(){
  var n = new Date();
  $("time").textContent =
    String(n.getHours()).padStart(2,"0") + ":" +
    String(n.getMinutes()).padStart(2,"0") + ":" +
    String(n.getSeconds()).padStart(2,"0");

  var wd = ["日","一","二","三","四","五","六"][n.getDay()];
  $("date").textContent = "民國 " + (n.getFullYear()-1911) + " 年 " + formatDate(n) + "（週" + wd + "）";
}

function init(){
  var theme = localStorage.getItem("cz_theme_simple") || "light";
  document.documentElement.setAttribute("data-theme", theme);

  $("memoText").value = localStorage.getItem("cz_memo_simple") || "";

  var y = new Date().getFullYear();
  $("adYear").value = y;
  fromAD();

  tick();
  setInterval(tick,1000);

  loadBookmarks();
  setTimeout(silentTaskCheck,1500);
}

document.addEventListener("keydown",function(e){
  if(e.key === "Escape") closeModal();
  if(e.key === "/" && !["INPUT","TEXTAREA"].includes(document.activeElement.tagName)){
    e.preventDefault();
    $("searchInput").focus();
  }
});

init();
</script>
