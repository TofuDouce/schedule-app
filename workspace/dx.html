<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>門診病代速查</title>

<style>

:root{
  --bg:#f3f4f6;
  --card:#ffffff;
  --text:#111827;
  --sub:#6b7280;
  --accent:#2563eb;
  --border:#d1d5db;
}

body.dark{
  --bg:#111827;
  --card:#1f2937;
  --text:#f9fafb;
  --sub:#9ca3af;
  --accent:#60a5fa;
  --border:#374151;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  padding:14px;
  transition:.25s;
}

.title{
  font-size:24px;
  font-weight:700;
  margin-bottom:4px;
}

.subtitle{
  color:var(--sub);
  font-size:14px;
  margin-bottom:14px;
}

.search{
  width:100%;
  padding:12px 14px;
  border:none;
  border-radius:14px;
  background:var(--card);
  color:var(--text);
  font-size:16px;
  outline:none;
  margin-bottom:18px;
  border:1px solid var(--border);
}

.section{
  margin-bottom:24px;
}

.section-title{
  font-size:18px;
  font-weight:700;
  margin-bottom:10px;
  color:var(--accent);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(165px,1fr));
  gap:10px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:10px;
  cursor:pointer;
  transition:.18s;
  min-height:82px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.card:hover{
  transform:scale(1.02);
  border-color:var(--accent);
}

.code{
  font-weight:700;
  color:var(--accent);
  margin-bottom:4px;
}

.name{
  line-height:1.35;
  word-break:break-word;
}

.toast{
  position:fixed;
  bottom:85px;
  left:50%;
  transform:translateX(-50%);
  background:var(--accent);
  color:white;
  padding:10px 16px;
  border-radius:999px;
  font-size:14px;
  opacity:0;
  pointer-events:none;
  transition:.25s;
}

.toast.show{
  opacity:1;
}

.settings-btn{
  position:fixed;
  right:18px;
  bottom:18px;
  width:58px;
  height:58px;
  border:none;
  border-radius:50%;
  background:var(--accent);
  color:white;
  font-size:26px;
  cursor:pointer;
  box-shadow:0 10px 24px rgba(0,0,0,.25);
}

.settings-panel{
  position:fixed;
  right:18px;
  bottom:88px;
  width:240px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:16px;
  display:none;
}

.settings-panel.show{
  display:block;
}

.setting-title{
  font-size:15px;
  margin-bottom:8px;
  font-weight:700;
}

.range{
  width:100%;
  margin-bottom:18px;
}

.mode-btn{
  width:100%;
  border:none;
  border-radius:12px;
  padding:12px;
  font-size:15px;
  background:var(--accent);
  color:white;
  cursor:pointer;
}

.footer-space{
  height:90px;
}

</style>
</head>

<body>

<div class="title">門診病代速查</div>
<div class="subtitle">點一下即可複製病代</div>

<input
  type="text"
  class="search"
  id="searchInput"
  placeholder="搜尋病代 / 中文"
/>

<div id="container"></div>

<div class="toast" id="toast">
已複製病代
</div>

<button class="settings-btn" id="settingsBtn">
⚙️
</button>

<div class="settings-panel" id="settingsPanel">

  <div class="setting-title">
    字體大小
  </div>

  <input
    type="range"
    min="12"
    max="28"
    value="16"
    class="range"
    id="fontSlider"
  />

  <button class="mode-btn" id="modeBtn">
    切換深色模式
  </button>

</div>

<div class="footer-space"></div>

<script>

const data = {

"M 關節與肌肉疼痛":[
["M2550","關節痛"],
["M25511","右側肩部關節痛"],
["M25512","左側肩部關節痛"],
["M25519","未明示側性肩部"],
["M25521","右側肘部關節痛"],
["M25522","左側肘部"],
["M25529","未明示側性肘部"],
["M25531","右側腕部關節痛"],
["M25532","左側腕部"],
["M25539","未明示側性"],
["M25551","右側髖部關節痛"],
["M25552","左側髖部"],
["M25559","未明示側性"],
["M25561","右側膝部關節痛"],
["M25562","左側膝部"],
["M25569","未明示"],
["M791","肌痛"],
["M609","肌炎"],
["M79609","肢體疼痛"]
],

"R 症狀":[
["R002","心悸"],
["R05","咳嗽"],
["R070","喉嚨痛"],
["R509","發燒"],
["R319","血尿"],
["R350","頻尿"],
["R079","胸痛"]
],

"L 皮膚":[
["L309","皮膚炎"],
["L209","異位性皮膚炎"],
["L219","脂漏性皮膚炎"],
["L409","乾癬"],
["L509","蕁麻疹"]
],

"J 呼吸道":[
["J00","急性鼻咽炎"],
["J029","急性咽炎"],
["J0390","急性扁桃腺炎"],
["J040","急性喉炎"],
["J0410","急性氣管炎"]
]

};

const container = document.getElementById("container");

function render(keyword=""){

  container.innerHTML="";

  Object.keys(data).forEach(section=>{

    const filtered = data[section].filter(item=>{

      return(
        item[0].toLowerCase().includes(keyword.toLowerCase()) ||
        item[1].includes(keyword)
      );

    });

    if(filtered.length===0) return;

    const sec = document.createElement("div");
    sec.className="section";

    sec.innerHTML=`
      <div class="section-title">${section}</div>
      <div class="grid"></div>
    `;

    const grid = sec.querySelector(".grid");

    filtered.forEach(item=>{

      const card = document.createElement("div");

      card.className="card";

      card.innerHTML=`
        <div class="code">${item[0]}</div>
        <div class="name">${item[1]}</div>
      `;

      card.onclick=()=>{

        navigator.clipboard.writeText(item[0]);

        showToast();

      };

      grid.appendChild(card);

    });

    container.appendChild(sec);

  });

}

render();

document.getElementById("searchInput")
.addEventListener("input",(e)=>{

  render(e.target.value);

});

function showToast(){

  const toast = document.getElementById("toast");

  toast.classList.add("show");

  setTimeout(()=>{

    toast.classList.remove("show");

  },1000);

}

const slider = document.getElementById("fontSlider");

const savedFont = localStorage.getItem("fontSize");

if(savedFont){

  document.documentElement.style.setProperty(
    '--mainFontSize',
    savedFont + 'px'
  );

  document.body.style.fontSize = savedFont + 'px';

  slider.value = savedFont;

}

slider.addEventListener("input",(e)=>{

  const size = e.target.value;

  document.body.style.fontSize = size + "px";

  document.querySelectorAll(".code").forEach(el=>{
    el.style.fontSize = size + "px";
  });

  document.querySelectorAll(".name").forEach(el=>{
    el.style.fontSize = size + "px";
  });

  localStorage.setItem("fontSize",size);

});

const settingsBtn = document.getElementById("settingsBtn");
const settingsPanel = document.getElementById("settingsPanel");

settingsBtn.onclick=()=>{

  settingsPanel.classList.toggle("show");

};

const modeBtn = document.getElementById("modeBtn");

const savedTheme = localStorage.getItem("theme");

if(savedTheme==="dark"){

  document.body.classList.add("dark");

  modeBtn.innerText="切換日間模式";

}

modeBtn.onclick=()=>{

  document.body.classList.toggle("dark");

  if(document.body.classList.contains("dark")){

    localStorage.setItem("theme","dark");

    modeBtn.innerText="切換日間模式";

  }else{

    localStorage.setItem("theme","light");

    modeBtn.innerText="切換深色模式";

  }

};

</script>

</body>
</html>
