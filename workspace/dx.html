<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>門診病代速查</title>

<style>

:root {
  /* 中正診所 Portal 經典藍天白雲風格變數 */
  --bg: linear-gradient(135deg, #f0f4f8 0%, #e6eff9 100%);
  --card: rgba(255, 255, 255, 0.9);
  --card-hover: #ffffff;
  --text: #0f172a; 
  --sub: #475569;  
  --accent: #0284c7; 
  --accent-light: #e0f2fe;
  --border: rgba(203, 213, 225, 0.9); 
  --shadow: 0 10px 32px rgba(31, 38, 135, 0.06);
  --card-shadow: 0 4px 16px rgba(2, 132, 199, 0.08);
  --backdrop: blur(12px);

  /* 專屬筆記區塊的質感翡翠綠變數（用於區隔） */
  --note-accent: #0d9488;
  --note-accent-light: #ccfbf1;
}

body.dark {
  --bg: #0f172a;
  --card: rgba(30, 41, 59, 0.85);
  --card-hover: #1e293b;
  --text: #ffffff; 
  --sub: #cbd5e1;
  --accent: #38bdf8;
  --accent-light: #0c4a6e;
  --border: rgba(71, 85, 105, 0.7);
  --shadow: 0 10px 28px rgba(0, 0, 0, 0.4);
  --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  --backdrop: blur(12px);

  /* 專屬筆記區塊的質感翡翠綠變數（夜間） */
  --note-accent: #2dd4bf;
  --note-accent-light: #115e59;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--bg);
  background-attachment: fixed;
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  padding: 24px 20px 100px;
  transition: background 0.3s, color 0.3s;
  min-height: 100vh;
}

/* 頂部控制列佈局 */
.header-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 24px;
}

.title-area {
  flex: 1;
}

.title {
  font-size: 32px;
  font-weight: 800; 
  letter-spacing: 0.5px;
  margin-bottom: 6px;
  color: var(--text);
  background: linear-gradient(45deg, var(--text), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  color: var(--sub);
  font-size: 16px;
  margin: 0;
  font-weight: 700; 
}

/* 頂部常用新舊代碼快捷鍵 */
.quick-jump-btn {
  background: linear-gradient(135deg, var(--note-accent), #0f766e);
  color: white;
  border: none;
  padding: 12px 20px;
  border-radius: 16px;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(13, 148, 136, 0.3);
  transition: transform 0.2s, box-shadow 0.2s;
  white-space: nowrap;
}

.quick-jump-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(13, 148, 136, 0.4);
}

/* 搜尋框優化 */
.search {
  width: 100%;
  padding: 16px 20px;
  border: 2px solid var(--border); 
  border-radius: 20px;
  background: var(--card);
  backdrop-filter: var(--backdrop);
  -webkit-backdrop-filter: var(--backdrop);
  color: var(--text);
  font-size: 17px;
  font-weight: 700; 
  outline: none;
  margin-bottom: 28px;
  box-shadow: var(--shadow);
  transition: all 0.25s ease;
}

.search:focus {
  border-color: var(--accent);
  background: var(--card-hover);
  box-shadow: 0 8px 24px rgba(2, 132, 199, 0.2);
}

.section {
  margin-bottom: 32px;
}

/* 分類大標題 */
.section-title {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--accent-light);
  color: var(--accent);
  padding: 10px 24px;
  border-radius: 999px;
  font-size: 20px; 
  font-weight: 900; 
  margin-bottom: 16px;
  box-shadow: 0 2px 10px rgba(2, 132, 199, 0.1);
  letter-spacing: 0.5px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 14px;
}

/* 卡片設計 */
.card {
  background: var(--card);
  backdrop-filter: var(--backdrop);
  -webkit-backdrop-filter: var(--backdrop);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 18px 16px;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
  min-height: 100px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  box-shadow: var(--card-shadow);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 6px;
  height: 100%;
  background: var(--accent);
  transition: width 0.2s ease;
}

.card:hover {
  transform: translateY(-4px);
  background: var(--card-hover);
  box-shadow: 0 12px 24px rgba(2, 132, 199, 0.18);
}

.card:hover::before {
  width: 10px;
}

.code {
  font-weight: 900; 
  color: var(--accent);
  margin-bottom: 6px;
  font-size: 18px;
  letter-spacing: 0.5px;
}

.name {
  line-height: 1.4;
  word-break: break-word;
  font-size: 16px;
  font-weight: 800; 
  color: var(--text);
}

/* 括號細則小字化樣式 */
.small-note {
  font-size: 85%;
  font-weight: 600;
  color: #64748b;
  display: block;
  margin-top: 4px;
}
body.dark .small-note {
  color: #94a3b8;
}

/* ===================================================
   專屬色系區隔：手寫筆記獨立翡翠綠 CSS
   =================================================== */
.section.note-section .section-title {
  background: var(--note-accent-light);
  color: var(--note-accent);
}

.section.note-section .card::before {
  background: var(--note-accent);
}

.section.note-section .card:hover {
  box-shadow: 0 12px 24px rgba(13, 148, 136, 0.18);
}

.section.note-section .code {
  color: var(--note-accent);
}

/* 複製提示浮磚 */
.toast {
  position: fixed;
  bottom: 96px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: var(--card);
  padding: 14px 28px;
  border-radius: 999px;
  font-size: 16px;
  font-weight: 800;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, bottom 0.25s;
  box-shadow: 0 10px 24px rgba(0, 0, 0, 0.2);
  z-index: 1001;
}

.toast.show {
  opacity: 1;
  bottom: 106px;
}

/* 右下角齒輪按鈕 */
.settings-btn {
  position: fixed;
  right: 24px;
  bottom: 24px;
  width: 60px;
  height: 60px;
  border: none;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #0284c7);
  color: white;
  font-size: 26px;
  cursor: pointer;
  box-shadow: 0 8px 24px rgba(2, 132, 199, 0.4);
  transition: transform 0.2s, box-shadow 0.2s;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
}

.settings-btn:hover {
  transform: rotate(45deg) scale(1.05);
}

/* 控制面板 */
.settings-panel {
  position: fixed;
  right: 24px;
  bottom: 96px;
  width: 260px;
  background: var(--card);
  backdrop-filter: var(--backdrop);
  -webkit-backdrop-filter: var(--backdrop);
  border: 2px solid var(--accent); 
  border-radius: 24px;
  padding: 20px;
  display: none;
  box-shadow: var(--shadow);
  z-index: 999;
}

.settings-panel.show {
  display: block;
  animation: panelFade 0.2s ease-out;
}

@keyframes panelFade {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.setting-title {
  font-size: 16px;
  margin-bottom: 12px;
  font-weight: 800;
  color: var(--text);
}

.range {
  width: 100%;
  margin-bottom: 20px;
  cursor: pointer;
  accent-color: var(--accent);
}

.mode-btn {
  width: 100%;
  border: none;
  border-radius: 16px;
  padding: 12px;
  font-size: 15px;
  background: var(--accent);
  color: white;
  cursor: pointer;
  font-weight: 800;
  transition: opacity 0.2s;
  box-shadow: 0 4px 12px rgba(2, 132, 199, 0.2);
}

.mode-btn:hover {
  opacity: 0.9;
}

.footer-space {
  height: 80px;
}

</style>
</head>

<body>

<div class="header-row">
  <div class="title-area">
    <div class="title">門診病代速查</div>
    <div class="subtitle">👍 點擊卡片即可快速複製病代</div>
  </div>
  <button class="quick-jump-btn" id="quickJumpBtn">常用新舊代碼📝</button>
</div>

<input
  type="text"

  id="searchInput"
  placeholder="輸入疾病名稱或 ICD 代碼搜尋..."
/>

<div id="container"></div>

<div class="toast" id="toast">
已複製病代
</div>

<button class="settings-btn" id="settingsBtn">⚙️</button>

<div class="settings-panel" id="settingsPanel">
  <div class="setting-title">🔧 調整診間字體大小</div>
  <input
    type="range"
    min="14"
    max="32"
    value="16"
    class="range"
    id="fontSlider"
  />
  <button class="mode-btn" id="modeBtn">切換深色模式</button>
</div>

<div class="footer-space"></div>

// ===================================================
// 已將冗長、重複的官方詞彙，全數轉化為 small-note 樣式
// ===================================================
"📝 常用新舊代碼 ":[
  ["[341] K297", "胃炎 <span class='small-note'>(未明示伴有出血者)</span>"],
  ["[151] K529", "非感染性胃腸炎及結腸炎 <span class='small-note'>(未明示者)</span>"],

  ["Z712", "醫療諮詢與看報告 <span class='small-note'>(因其他諮詢及醫療建議而就醫者)</span>"],

};

const container = document.getElementById("container");
const fontSlider = document.getElementById("fontSlider");

function render(keyword=""){
  container.innerHTML = "";

  Object.keys(data).forEach(section => {
    const filtered = data[section].filter(item => {
      return (
        item[0].toLowerCase().includes(keyword.toLowerCase()) ||
        item[1].includes(keyword)
      );
    });

    if (filtered.length === 0) return;

    const sec = document.createElement("div");
    if (section.includes("常用新舊代碼")) {
      sec.className = "section note-section";
      sec.id = "targetNoteSection";
    } else {
      sec.className = "section";
    }

    sec.innerHTML = `
      <div class="section-title">${section}</div>
      <div class="grid"></div>
    `;

    const grid = sec.querySelector(".grid");

    filtered.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="code">${item[0]}</div>
        <div class="name">${item[1]}</div>
      `;

      card.onclick = () => {
        let cleanCode = item[0];
        if (cleanCode.includes("]")) {
          cleanCode = cleanCode.split("]").pop().trim();
        }
        navigator.clipboard.writeText(cleanCode);
        showToast(cleanCode);
      };

      grid.appendChild(card);
    });

    container.appendChild(sec);
  });

  applyFontSize(fontSlider.value);
}

function showToast(code){
  const toast = document.getElementById("toast");
  toast.innerText = `已複製病代: ${code}`;
  toast.classList.add("show");
  setTimeout(() => {
    toast.classList.remove("show");
  }, 1000);
}

function applyFontSize(size){
  document.querySelectorAll(".code").forEach(el => {
    el.style.fontSize = size + "px";
  });
  document.querySelectorAll(".name").forEach(el => {
    if (!el.classList.contains("small-note")) {
      el.style.fontSize = size + "px";
    }
  });
}

const savedFont = localStorage.getItem("fontSize");
if (savedFont) {
  fontSlider.value = savedFont;
}

fontSlider.addEventListener("input", (e) => {
  const size = e.target.value;
  applyFontSize(size);
  localStorage.setItem("fontSize", size);
});

document.getElementById("searchInput").addEventListener("input", (e) => {
  render(e.target.value);
});

document.getElementById("quickJumpBtn").addEventListener("click", () => {
  const noteEl = document.getElementById("targetNoteSection");
  if (noteEl) {
    noteEl.scrollIntoView({ behavior: "smooth", block: "start" });
  } else {
    document.getElementById("searchInput").value = "";
    render();
    setTimeout(() => {
      document.getElementById("targetNoteSection").scrollIntoView({ behavior: "smooth", block: "start" });
    }, 100);
  }
});

const settingsBtn = document.getElementById("settingsBtn");
const settingsPanel = document.getElementById("settingsPanel");
const modeBtn = document.getElementById("modeBtn");

settingsBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  settingsPanel.classList.toggle("show");
});

settingsPanel.addEventListener("click", (e) => {
  e.stopPropagation();
});

document.addEventListener("click", () => {
  settingsPanel.classList.remove("show");
});

const savedTheme = localStorage.getItem("theme");
if (savedTheme === "dark") {
  document.body.classList.add("dark");
  modeBtn.innerText = "☀️ 切換日間模式";
} else {
  modeBtn.innerText = "🌙 切換深色模式";
}

modeBtn.addEventListener("click", () => {
  document.body.classList.toggle("dark");
  if (document.body.classList.contains("dark")) {
    localStorage.setItem("theme", "dark");
    modeBtn.innerText = "☀️ 切換日間模式";
  } else {
    localStorage.setItem("theme", "light");
    modeBtn.innerText = "🌙 切換深色模式";
  }
});

render();

</script>

</html>
