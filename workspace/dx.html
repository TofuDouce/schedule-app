<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>門診病代速查</title>

<style>

:root {
  /* 中正診所 Portal 經典藍天白雲風格變數 */
  --bg: linear-gradient(135deg, #f0f4f8 0%, #e6eff9 100%);
  --card: rgba(255, 255, 255, 0.9); /* 微調提高白卡片不透明度，增加文字可讀性 */
  --card-hover: #ffffff;
  --text: #0f172a; /* 採用中正診所經典深藍黑，大幅拉高對比度 */
  --sub: #475569;  /* 加深副標題文字，確保字字清晰 */
  --accent: #0284c7; /* 質感天空藍 */
  --accent-light: #e0f2fe;
  --border: rgba(203, 213, 225, 0.9); /* 加深卡片邊框，避免白色背景模糊 */
  --shadow: 0 10px 32px rgba(31, 38, 135, 0.06);
  --card-shadow: 0 4px 16px rgba(2, 132, 199, 0.08);
  --backdrop: blur(12px);
}

body.dark {
  /* 舒適、不刺眼的夜間高對比適配 */
  --bg: #0f172a;
  --card: rgba(30, 41, 59, 0.85);
  --card-hover: #1e293b;
  --text: #ffffff; /* 夜間模式使用純白高亮粗體 */
  --sub: #cbd5e1;
  --accent: #38bdf8;
  --accent-light: #0c4a6e;
  --border: rgba(71, 85, 105, 0.7);
  --shadow: 0 10px 28px rgba(0, 0, 0, 0.4);
  --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  --backdrop: blur(12px);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--bg);
  background-attachment: fixed;
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  padding: 24px 20px 100px;
  transition: background 0.3s, color 0.3s;
  min-height: 100vh;
}

.title {
  font-size: 32px;
  font-weight: 800; /* 超粗體大標題 */
  letter-spacing: 0.5px;
  margin-bottom: 6px;
  color: var(--text);
  background: linear-gradient(45deg, var(--text), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  color: var(--sub);
  font-size: 16px;
  margin-bottom: 24px;
  font-weight: 700; /* 加粗 */
}

/* 搜尋框優化 */
.search {
  width: 100%;
  padding: 16px 20px;
  border: 2px solid var(--border); /* 加粗外框 */
  border-radius: 20px;
  background: var(--card);
  backdrop-filter: var(--backdrop);
  -webkit-backdrop-filter: var(--backdrop);
  color: var(--text);
  font-size: 17px;
  font-weight: 700; /* 輸入關鍵字也是粗體 */
  outline: none;
  margin-bottom: 28px;
  box-shadow: var(--shadow);
  transition: all 0.25s ease;
}

.search:focus {
  border-color: var(--accent);
  background: var(--card-hover);
  box-shadow: 0 8px 24px rgba(2, 132, 199, 0.2);
}

.section {
  margin-bottom: 32px;
}

/* 分類大標題：依照要求字體放大、並且使用超粗體 */
.section-title {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--accent-light);
  color: var(--accent);
  padding: 10px 24px;
  border-radius: 999px;
  font-size: 20px; /* 大字體 */
  font-weight: 900; /* 超級粗體，與 Portal 邏輯一致 */
  margin-bottom: 16px;
  box-shadow: 0 2px 10px rgba(2, 132, 199, 0.1);
  letter-spacing: 0.5px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 14px;
}

/* 卡片設計 */
.card {
  background: var(--card);
  backdrop-filter: var(--backdrop);
  -webkit-backdrop-filter: var(--backdrop);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 18px 16px;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
  min-height: 100px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  box-shadow: var(--card-shadow);
  position: relative;
  overflow: hidden;
}

/* 左側辨識天空藍邊條 */
.card::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 6px;
  height: 100%;
  background: var(--accent);
  transition: width 0.2s ease;
}

.card:hover {
  transform: translateY(-4px);
  background: var(--card-hover);
  box-shadow: 0 12px 24px rgba(2, 132, 199, 0.18);
}

.card:hover::before {
  width: 10px;
}

/* 提高代碼與疾病名稱字體粗度與對比 */
.code {
  font-weight: 900; /* 超粗體代碼 */
  color: var(--accent);
  margin-bottom: 6px;
  font-size: 18px;
  letter-spacing: 0.5px;
}

.name {
  line-height: 1.4;
  word-break: break-word;
  font-size: 16px;
  font-weight: 800; /* 符合中正診所 Portal 的顯眼高對比粗體 */
  color: var(--text);
}

/* 複製提示浮磚 */
.toast {
  position: fixed;
  bottom: 96px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: var(--card);
  padding: 14px 28px;
  border-radius: 999px;
  font-size: 16px;
  font-weight: 800;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, bottom 0.25s;
  box-shadow: 0 10px 24px rgba(0, 0, 0, 0.2);
  z-index: 1001;
}

.toast.show {
  opacity: 1;
  bottom: 106px;
}

/* 右下角齒輪按鈕 */
.settings-btn {
  position: fixed;
  right: 24px;
  bottom: 24px;
  width: 60px;
  height: 60px;
  border: none;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #0284c7);
  color: white;
  font-size: 26px;
  cursor: pointer;
  box-shadow: 0 8px 24px rgba(2, 132, 199, 0.4);
  transition: transform 0.2s, box-shadow 0.2s;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
}

.settings-btn:hover {
  transform: rotate(45deg) scale(1.05);
}

/* 控制面板 */
.settings-panel {
  position: fixed;
  right: 24px;
  bottom: 96px;
  width: 260px;
  background: var(--card);
  backdrop-filter: var(--backdrop);
  -webkit-backdrop-filter: var(--backdrop);
  border: 2px solid var(--accent); /* 用天空藍框起來強化焦點 */
  border-radius: 24px;
  padding: 20px;
  display: none;
  box-shadow: var(--shadow);
  z-index: 999;
}

.settings-panel.show {
  display: block;
  animation: panelFade 0.2s ease-out;
}

@keyframes panelFade {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.setting-title {
  font-size: 16px;
  margin-bottom: 12px;
  font-weight: 800;
  color: var(--text);
}

.range {
  width: 100%;
  margin-bottom: 20px;
  cursor: pointer;
  accent-color: var(--accent);
}

.mode-btn {
  width: 100%;
  border: none;
  border-radius: 16px;
  padding: 12px;
  font-size: 15px;
  background: var(--accent);
  color: white;
  cursor: pointer;
  font-weight: 800;
  transition: opacity 0.2s;
  box-shadow: 0 4px 12px rgba(2, 132, 199, 0.2);
}

.mode-btn:hover {
  opacity: 0.9;
}

.footer-space {
  height: 80px;
}

</style>
</head>

<body>

<div class="title">門診病代速查</div>
<div class="subtitle">👍 點擊卡片即可快速複製病代</div>

<input
  type="text"
  class="search"
  id="searchInput"
  placeholder="輸入疾病名稱或 ICD 代碼搜尋..."
/>

<div id="container"></div>

<div class="toast" id="toast">
已複製病代
</div>

<button class="settings-btn" id="settingsBtn">⚙️</button>

<div class="settings-panel" id="settingsPanel">
  <div class="setting-title">🔧 調整診間字體大小</div>
  <input
    type="range"
    min="14"
    max="32"
    value="16"
    class="range"
    id="fontSlider"
  />
  <button class="mode-btn" id="modeBtn">切換深色模式</button>
</div>

<div class="footer-space"></div>

<script>

// 區塊細分資料庫，搭配直觀 Emoji 標籤
const data = {

"🦴 M00 關節痛 (一般)":[
  ["M2550","關節痛"]
],

"🦺 M01 肩部關節痛":[

  ["M25512","左側肩部關節痛"],

],

"🦾 M02 肘部關節痛":[

  ["M25522","左側肘部關節痛"],
  ["M25529","未明示側性肘部關節痛"]
],

"⌚ M03 腕部關節痛":[

],

"🩲 M04 髖部關節痛":[

],

"🦵 M05 膝部關節痛":[

],

  ["M25579","未明示側性踝部及足部關節痛"]
],

"💥 M07 肌痛與肢體疼痛":[
  ["M791","肌痛"],
  ["M609","肌炎"],
  ["M79609","肢體疼痛"]
],

"✋ M08 手部疼痛":[
  ["M79601","右側手部臂疼痛"],
  ["M79602","左側手部臂疼痛"],
  ["M79603","未明示側性手部臂疼痛"],
  ["M79641","右側手部疼痛"],
  ["M79642","左側手部疼痛"],
  ["M79643","未明示側性手部疼痛"]
],

"👉 M09 手指疼痛":[
  ["M79644","右側手指疼痛"],
  ["M79645","左側手指疼痛"],
  ["M79646","未明示側性手指疼痛"]
],

"💪 M10 上臂與前臂疼痛":[
  ["M79621","右側上臂疼痛"],
  ["M79622","左側上臂疼痛"],
  ["M79629","未明示側性上臂疼痛"],
  ["M79631","右側前臂疼痛"],
  ["M79632","左側前臂疼痛"],
  ["M79639","未明示側性前臂疼痛"]
],

"🍗 M11 大腿與小腿疼痛":[
  ["M79651","右側大腿疼痛"],
  ["M79652","左側大腿疼痛"],
  ["M79659","未明示側性大腿疼痛"],
  ["M79661","右側小腿疼痛"],
  ["M79662","左側小腿疼痛"],
  ["M79669","未明示側性小腿疼痛"]
],

"👣 M12 足部與腳趾疼痛":[
  ["M79671","右側足部疼痛"],
  ["M79672","左側足部疼痛"],
  ["M79673","未明示側性足部疼痛"],
  ["M79674","右側腳趾疼痛"],
  ["M79675","左側腳趾疼痛"],
  ["M79676","未明示側性腳趾疼痛"]
],

"🩺 R 症狀":[
  ["R000","心搏過速"],
  ["R001","心搏過慢"],
  ["R002","心悸"],
  ["R008","其他心搏異常"],
  ["R009","心搏異常"],
  ["R040","鼻出血"],
  ["R070","喉嚨痛"],
  ["R05","咳嗽"],
  ["R0600","呼吸困難"],
  ["R066","打嗝"],
  ["R069","呼吸異常"],
  ["R509","發燒"],
  ["R319","血尿"],
  ["R350","頻尿"],
  ["R300","排尿困難"],
  ["R309","排尿疼痛"],
  ["R071","呼吸時胸痛"],
  ["R072","胸口疼痛"],
  ["R0781","肋膜痛"],
  ["R0782","肋間疼痛"],
  ["R0789","其他胸痛"],
  ["R079","胸痛"]
],

"🧪 L 皮膚":[
  ["L98","其他皮膚疾"],
  ["L99","搔癢症"],
  ["L309","皮膚炎"],
  ["L209","異位性皮膚炎"],
  ["L219","脂漏性皮膚炎"],
  ["L282","其他癢疹"],
  ["L408","其他乾癬"],
  ["L409","乾癬"],
  ["L508","其他蕁麻疹"],
  ["L509","蕁麻疹"]
],

"😮‍💨 J 呼吸道":[
  ["J00","急性鼻咽炎（感冒）"],
  ["J0190","急性鼻竇炎"],
  ["J029","急性咽炎"],
  ["J0390","急性扁桃腺炎"],
  ["J0391","急性復發性扁桃腺炎"],
  ["J040","急性喉炎"],
  ["J0410","急性氣管炎－未伴有阻塞"]
]

};

const container = document.getElementById("container");
const fontSlider = document.getElementById("fontSlider");

// 渲染畫面功能
function render(keyword=""){
  container.innerHTML = "";

  Object.keys(data).forEach(section => {
    const filtered = data[section].filter(item => {
      return (
        item[0].toLowerCase().includes(keyword.toLowerCase()) ||
        item[1].includes(keyword)
      );
    });

    if (filtered.length === 0) return;

    const sec = document.createElement("div");
    sec.className = "section";

    sec.innerHTML = `
      <div class="section-title">${section}</div>
      <div class="grid"></div>
    `;

    const grid = sec.querySelector(".grid");

    filtered.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="code">${item[0]}</div>
        <div class="name">${item[1]}</div>
      `;

      card.onclick = () => {
        navigator.clipboard.writeText(item[0]);
        showToast();
      };

      grid.appendChild(card);
    });

    container.appendChild(sec);
  });

  // 渲染完成後立即套用目前的字體設定
  applyFontSize(fontSlider.value);
}

// 提示浮磚功能
function showToast(){
  const toast = document.getElementById("toast");
  toast.classList.add("show");
  setTimeout(() => {
    toast.classList.remove("show");
  }, 1000);
}

// 調整字體大小功能
function applyFontSize(size){
  document.querySelectorAll(".code").forEach(el => {
    el.style.fontSize = size + "px";
  });
  document.querySelectorAll(".name").forEach(el => {
    el.style.fontSize = size + "px";
  });
}

// 初始化字體滑桿快取
const savedFont = localStorage.getItem("fontSize");
if (savedFont) {
  fontSlider.value = savedFont;
}

fontSlider.addEventListener("input", (e) => {
  const size = e.target.value;
  applyFontSize(size);
  localStorage.setItem("fontSize", size);
});

// 搜尋攔截監聽
document.getElementById("searchInput").addEventListener("input", (e) => {
  render(e.target.value);
});

// 核心修復：齒輪按鈕與控制面板交互邏輯
const settingsBtn = document.getElementById("settingsBtn");
const settingsPanel = document.getElementById("settingsPanel");
const modeBtn = document.getElementById("modeBtn");

// 點擊齒輪切換面板
settingsBtn.addEventListener("click", (e) => {
  e.stopPropagation(); // 防止事件向上冒泡
  settingsPanel.classList.toggle("show");
});

// 點擊控制面板內部時，不關閉面板
settingsPanel.addEventListener("click", (e) => {
  e.stopPropagation();
});

// 點擊網頁任何其他地方，自動縮回面板（防誤觸）
document.addEventListener("click", () => {
  settingsPanel.classList.remove("show");
});

// 夜間模式初始化與切換
const savedTheme = localStorage.getItem("theme");
if (savedTheme === "dark") {
  document.body.classList.add("dark");
  modeBtn.innerText = "☀️ 切換日間模式";
} else {
  modeBtn.innerText = "🌙 切換深色模式";
}

modeBtn.addEventListener("click", () => {
  document.body.classList.toggle("dark");
  if (document.body.classList.contains("dark")) {
    localStorage.setItem("theme", "dark");
    modeBtn.innerText = "☀️ 切換日間模式";
  } else {
    localStorage.setItem("theme", "light");
    modeBtn.innerText = "🌙 切換深色模式";
  }
});

// 第一次載入初始化渲染
render();

</script>

</body>
</html>
