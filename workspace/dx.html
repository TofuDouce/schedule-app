<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>門診病代速查</title>

<style>

:root {
  /* 中正診所 Portal 經典藍天白雲風格變數 */
  --bg: linear-gradient(135deg, #f0f4f8 0%, #e6eff9 100%);
  --card: rgba(255, 255, 255, 0.85);
  --card-hover: #ffffff;
  --text: #1e293b;
  --sub: #64748b;
  --accent: #0284c7; /* 質感天空藍 */
  --accent-light: #e0f2fe;
  --border: rgba(226, 232, 240, 0.8);
  --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.04);
  --card-shadow: 0 4px 16px 0 rgba(2, 132, 199, 0.06);
  --backdrop: blur(8px);
}

body.dark {
  /* 舒適、不刺眼的夜間高對比適配 */
  --bg: #0f172a;
  --card: rgba(30, 41, 59, 0.7);
  --card-hover: #1e293b;
  --text: #f8fafc;
  --sub: #94a3b8;
  --accent: #38bdf8; /* 夜間模式自動調亮 */
  --accent-light: #0c4a6e;
  --border: rgba(51, 65, 85, 0.5);
  --shadow: 0 10px 28px rgba(0, 0, 0, 0.3);
  --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
  --backdrop: blur(10px);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--bg);
  background-attachment: fixed;
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  padding: 24px 20px 100px;
  transition: background 0.3s, color 0.3s;
  min-height: 100vh;
}

.title {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
  color: var(--text);
  background: linear-gradient(45deg, var(--text), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  color: var(--sub);
  font-size: 15px;
  margin-bottom: 24px;
  font-weight: 500;
}

/* 搜尋框毛玻璃化 */
.search {
  width: 100%;
  padding: 16px 20px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: var(--card);
  backdrop-filter: var(--backdrop);
  -webkit-backdrop-filter: var(--backdrop);
  color: var(--text);
  font-size: 16px;
  outline: none;
  margin-bottom: 28px;
  box-shadow: var(--shadow);
  transition: all 0.25s ease;
}

.search:focus {
  border-color: var(--accent);
  background: var(--card-hover);
  box-shadow: 0 8px 24px rgba(2, 132, 199, 0.15);
}

.section {
  margin-bottom: 32px;
}

/* 分類大標題優化：字體加大、加粗、間距舒適 */
.section-title {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--accent-light);
  color: var(--accent);
  padding: 10px 22px;
  border-radius: 999px;
  font-size: 18px; /* 依照需求：標題字加大 */
  font-weight: 800; /* 加粗增強視覺引導 */
  margin-bottom: 16px;
  box-shadow: 0 2px 8px rgba(2, 132, 199, 0.05);
  letter-spacing: 0.5px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 14px;
}

/* 卡片毛玻璃與動態懸浮效果 */
.card {
  background: var(--card);
  backdrop-filter: var(--backdrop);
  -webkit-backdrop-filter: var(--backdrop);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 16px;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
  min-height: 96px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  box-shadow: var(--card-shadow);
  position: relative;
  overflow: hidden;
}

/* 左側裝飾線條 */
.card::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 5px;
  height: 100%;
  background: var(--accent);
  transition: width 0.2s ease;
}

.card:hover {
  transform: translateY(-4px);
  background: var(--card-hover);
  box-shadow: 0 12px 24px rgba(2, 132, 199, 0.12);
}

.card:hover::before {
  width: 8px;
}

.code {
  font-weight: 800;
  color: var(--accent);
  margin-bottom: 6px;
  font-size: 17px;
  letter-spacing: 0.5px;
}

.name {
  line-height: 1.4;
  word-break: break-word;
  font-size: 15px;
  font-weight: 500;
}

/* 提示浮磚樣式優化 */
.toast {
  position: fixed;
  bottom: 96px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--accent);
  color: white;
  padding: 12px 24px;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 600;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, bottom 0.25s;
  box-shadow: 0 10px 24px rgba(2, 132, 199, 0.35);
  z-index: 1000;
}

.toast.show {
  opacity: 1;
  bottom: 106px;
}

/* 右下角齒輪按鈕 */
.settings-btn {
  position: fixed;
  right: 24px;
  bottom: 24px;
  width: 56px;
  height: 56px;
  border: none;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #0284c7);
  color: white;
  font-size: 24px;
  cursor: pointer;
  box-shadow: 0 8px 24px rgba(2, 132, 199, 0.3);
  transition: transform 0.2s, box-shadow 0.2s;
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: center;
}

.settings-btn:hover {
  transform: rotate(45deg) scale(1.05);
  box-shadow: 0 10px 28px rgba(2, 132, 199, 0.4);
}

/* 控制面板 */
.settings-panel {
  position: fixed;
  right: 24px;
  bottom: 94px;
  width: 260px;
  background: var(--card);
  backdrop-filter: var(--backdrop);
  -webkit-backdrop-filter: var(--backdrop);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 20px;
  display: none;
  box-shadow: var(--shadow);
  z-index: 998;
}

.settings-panel.show {
  display: block;
  animation: panelFade 0.2s ease-out;
}

@keyframes panelFade {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.setting-title {
  font-size: 15px;
  margin-bottom: 12px;
  font-weight: 700;
}

.range {
  width: 100%;
  margin-bottom: 20px;
  cursor: pointer;
  accent-color: var(--accent);
}

.mode-btn {
  width: 100%;
  border: none;
  border-radius: 16px;
  padding: 12px;
  font-size: 14px;
  background: var(--accent);
  color: white;
  cursor: pointer;
  font-weight: 700;
  transition: opacity 0.2s;
  box-shadow: 0 4px 12px rgba(2, 132, 199, 0.2);
}

.mode-btn:hover {
  opacity: 0.9;
}

.footer-space {
  height: 80px;
}

</style>
</head>

<body>

<div class="title">門診病代速查</div>
<div class="subtitle">點一下即可複製病代</div>

<input
  type="text"
  class="search"
  id="searchInput"
  placeholder="搜尋病代 / 中文"
/>

<div id="container"></div>

<div class="toast" id="toast">
已複製病代
</div>

<button class="settings-btn" id="settingsBtn">
⚙️
</button>

<div class="settings-panel" id="settingsPanel">

  <div class="setting-title">
    字體大小
  </div>

  <input
    type="range"
    min="12"
    max="30"
    value="16"
    class="range"
    id="fontSlider"
  />

  <button class="mode-btn" id="modeBtn">
    切換深色模式
  </button>

</div>

<div class="footer-space"></div>

<script>

// 資料庫：已依照您的需求將疼痛細化分區，並精心搭配對應的直觀 Emoji 標籤

],

  ["M79621","右側上臂疼痛"],
  ["M79622","左側上臂疼痛"],
  ["M79629","未明示側性上臂疼痛"],

  ["M79673","未明示側性足部疼痛"],
  ["M79674","右側腳趾疼痛"],

  ["M79676","未明示側性腳趾疼痛"]

  ["R000","心搏過速"],
  ["R001","心搏過慢"],

],

"🧪 L 皮膚":[
  ["L98","其他皮膚疾"],
  ["L99","搔癢症"],
  ["L309","皮膚炎"],
  ["L209","異位性皮膚炎"],
  ["L219","脂漏性皮膚炎"],
  ["L282","其他癢疹"],
  ["L408","其他乾癬"],
  ["L409","乾癬"],
  ["L508","其他蕁麻疹"],
  ["L509","蕁麻疹"]
],

"😮‍💨 J 呼吸道":[
  ["J00","急性鼻咽炎（感冒）"],
  ["J0190","急性鼻竇炎"],
  ["J029","急性咽炎"],
  ["J0390","急性扁桃腺炎"],
  ["J0391","急性復發性扁桃腺炎"],
  ["J040","急性喉炎"],
  ["J0410","急性氣管炎－未伴有阻塞"]
]

};

const container = document.getElementById("container");

function render(keyword=""){
  container.innerHTML="";

  Object.keys(data).forEach(section=>{
    const filtered = data[section].filter(item=>{
      return(
        item[0].toLowerCase().includes(keyword.toLowerCase()) ||
        item[1].includes(keyword)
      );
    });

    if(filtered.length===0) return;

    const sec = document.createElement("div");
    sec.className="section";

    sec.innerHTML=`
      <div class="section-title">${section}</div>
      <div class="grid"></div>
    `;

    const grid = sec.querySelector(".grid");

    filtered.forEach(item=>{
      const card = document.createElement("div");
      card.className="card";
      card.innerHTML=`
        <div class="code">${item[0]}</div>
        <div class="name">${item[1]}</div>
      `;

      card.onclick=()=>{
        navigator.clipboard.writeText(item[0]);
        showToast();
      };

      grid.appendChild(card);
    });

    container.appendChild(sec);
  });

  applyFontSize(slider.value);
}

render();

document.getElementById("searchInput")
.addEventListener("input",(e)=>{
  render(e.target.value);
});

function showToast(){
  const toast = document.getElementById("toast");
  toast.classList.add("show");
  setTimeout(()=>{
    toast.classList.remove("show");
  },1000);
}

const slider = document.getElementById("fontSlider");
const savedFont = localStorage.getItem("fontSize");

if(savedFont){
  applyFontSize(savedFont);
  slider.value = savedFont;
}

function applyFontSize(size){
  document.querySelectorAll(".code").forEach(el=>{
    el.style.fontSize = size + "px";
  });
  document.querySelectorAll(".name").forEach(el=>{
    el.style.fontSize = size + "px";
  });
}

slider.addEventListener("input",(e)=>{
  const size = e.target.value;
  applyFontSize(size);
  localStorage.setItem("fontSize",size);
});

const settingsBtn = document.getElementById("settingsBtn");
const settingsPanel = document.getElementById("settingsPanel");

settingsBtn.onclick=()=>{
  settingsPanel.classList.toggle("show");
};

document.addEventListener("click", (e) => {
  if (!settingsBtn.contains(e.target) && !settingsPanel.contains(e.target)) {
    settingsPanel.classList.remove("show");
  }
});

const modeBtn = document.getElementById("modeBtn");
const savedTheme = localStorage.getItem("theme");

if(savedTheme==="dark"){
  document.body.classList.add("dark");
  modeBtn.innerText="切換日間模式";
}

modeBtn.onclick=()=>{
  document.body.classList.toggle("dark");
  if(document.body.classList.contains("dark")){
    localStorage.setItem("theme","dark");
    modeBtn.innerText="切換日間模式";
  }else{
    localStorage.setItem("theme","light");
    modeBtn.innerText="切換深色模式";
  }
};

</script>

</body>
</html>
