<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>門診病代速查</title>

<style>

:root{
  --bg:#f5f7fb;
  --card:#ffffff;
  --text:#111827;
  --sub:#6b7280;
  --accent:#2563eb;
  --accent-light:#dbeafe;
  --border:#dbe2ea;
  --shadow:0 8px 24px rgba(15,23,42,.06);
}

body.dark{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#f8fafc;
  --sub:#94a3b8;
  --accent:#60a5fa;
  --accent-light:#1e3a8a;
  --border:#334155;
  --shadow:0 10px 28px rgba(0,0,0,.28);
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  padding:18px 14px 90px;
  transition:.25s;
}

.title{
  font-size:28px;
  font-weight:800;
  letter-spacing:.5px;
  margin-bottom:4px;
}

.subtitle{
  color:var(--sub);
  font-size:14px;
  margin-bottom:18px;
}

.search{
  width:100%;
  padding:14px 16px;
  border:none;
  border-radius:18px;
  background:var(--card);
  color:var(--text);
  font-size:16px;
  outline:none;
  margin-bottom:22px;
  border:1px solid var(--border);
  box-shadow:var(--shadow);
}

.section{
  margin-bottom:30px;
}

.section-title{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:var(--accent-light);
  color:var(--accent);
  padding:8px 14px;
  border-radius:999px;
  font-size:16px;
  font-weight:800;
  margin-bottom:14px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:12px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:14px;
  cursor:pointer;
  transition:.18s;
  min-height:92px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  box-shadow:var(--shadow);
  position:relative;
  overflow:hidden;
}

.card::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:4px;
  height:100%;
  background:var(--accent);
}

.card:hover{
  transform:translateY(-2px);
}

.code{
  font-weight:800;
  color:var(--accent);
  margin-bottom:6px;
  font-size:16px;
  letter-spacing:.3px;
}

.name{
  line-height:1.4;
  word-break:break-word;
  font-size:15px;
}

.toast{
  position:fixed;
  bottom:86px;
  left:50%;
  transform:translateX(-50%);
  background:var(--accent);
  color:white;
  padding:11px 18px;
  border-radius:999px;
  font-size:14px;
  opacity:0;
  pointer-events:none;
  transition:.25s;
  box-shadow:0 8px 20px rgba(37,99,235,.3);
}

.toast.show{
  opacity:1;
}

.settings-btn{
  position:fixed;
  right:18px;
  bottom:18px;
  width:60px;
  height:60px;
  border:none;
  border-radius:50%;
  background:linear-gradient(135deg,var(--accent),#3b82f6);
  color:white;
  font-size:26px;
  cursor:pointer;
  box-shadow:0 12px 28px rgba(37,99,235,.35);
}

.settings-panel{
  position:fixed;
  right:18px;
  bottom:90px;
  width:250px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:22px;
  padding:18px;
  display:none;
  box-shadow:var(--shadow);
}

.settings-panel.show{
  display:block;
}

.setting-title{
  font-size:15px;
  margin-bottom:10px;
  font-weight:700;
}

.range{
  width:100%;
  margin-bottom:18px;
}

.mode-btn{
  width:100%;
  border:none;
  border-radius:14px;
  padding:13px;
  font-size:15px;
  background:var(--accent);
  color:white;
  cursor:pointer;
  font-weight:700;
}

.footer-space{
  height:90px;
}

</style>
</head>

<body>

<div class="title">門診病代速查</div>
<div class="subtitle">點一下即可複製病代</div>

<input
  type="text"
  class="search"
  id="searchInput"
  placeholder="搜尋病代 / 中文"
/>

<div id="container"></div>

<div class="toast" id="toast">
已複製病代
</div>

<button class="settings-btn" id="settingsBtn">
⚙️
</button>

<div class="settings-panel" id="settingsPanel">

  <div class="setting-title">
    字體大小
  </div>

  <input
    type="range"
    min="12"
    max="30"
    value="16"
    class="range"
    id="fontSlider"
  />

  <button class="mode-btn" id="modeBtn">
    切換深色模式
  </button>

</div>

<div class="footer-space"></div>

<script>

const data = {

"M 關節與肌肉疼痛":[

["M2550","關節痛"],

["M25511","右側肩部關節痛"],
["M25512","左側肩部關節痛"],
["M25519","未明示側性肩部關節痛"],

["M25521","右側肘部關節痛"],
["M25522","左側肘部關節痛"],
["M25529","未明示側性肘部關節痛"],

["M25531","右側腕部關節痛"],
["M25532","左側腕部關節痛"],
["M25539","未明示側性腕部關節痛"],

["M25551","右側髖部關節痛"],
["M25552","左側髖部關節痛"],
["M25559","未明示側性髖部關節痛"],

["M25561","右側膝部關節痛"],
["M25562","左側膝部關節痛"],
["M25569","未明示側性膝部關節痛"],

["M25571","右側踝部及足部關節痛"],
["M25572","左側踝部及足部關節痛"],
["M25579","未明示側性踝部及足部關節痛"],

["M791","肌痛"],
["M609","肌炎"],
["M79609","肢體疼痛"],

["M79601","右側手部疼痛"],
["M79602","左側手部疼痛"],
["M79603","未明示側性手部疼痛"],

["M79604","右側腿部疼痛"],
["M79605","左側腿部疼痛"],
["M79606","未明示側性腿部疼痛"],

["M79621","右側上臂疼痛"],
["M79622","左側上臂疼痛"],
["M79629","未明示側性上臂疼痛"],

["M79631","右側前臂疼痛"],
["M79632","左側前臂疼痛"],
["M79639","未明示側性前臂疼痛"],

["M79641","右側手部疼痛"],
["M79642","左側手部疼痛"],
["M79643","未明示側性手部疼痛"],

["M79644","右側手指疼痛"],
["M79645","左側手指疼痛"],
["M79646","未明示側性手指疼痛"],

["M79651","右側大腿疼痛"],
["M79652","左側大腿疼痛"],
["M79659","未明示側性大腿疼痛"],

["M79661","右側小腿疼痛"],
["M79662","左側小腿疼痛"],
["M79669","未明示側性小腿疼痛"],

["M79671","右側足部疼痛"],
["M79672","左側足部疼痛"],
["M79673","未明示側性足部疼痛"],

["M79674","右側腳趾疼痛"],
["M79675","左側腳趾疼痛"],
["M79676","未明示側性腳趾疼痛"]

],

"R 症狀":[

["R000","心搏過速"],
["R001","心搏過慢"],
["R002","心悸"],
["R008","其他心搏異常"],
["R009","心搏異常"],

["R040","鼻出血"],
["R070","喉嚨痛"],
["R05","咳嗽"],
["R0600","呼吸困難"],
["R066","打嗝"],
["R069","呼吸異常"],
["R509","發燒"],

["R319","血尿"],
["R350","頻尿"],
["R300","排尿困難"],
["R309","排尿疼痛"],

["R071","呼吸時胸痛"],
["R072","胸口疼痛"],
["R0781","肋膜痛"],
["R0782","肋間疼痛"],
["R0789","其他胸痛"],
["R079","胸痛"]

],

"L 皮膚":[

["L98","其他皮膚疾"],
["L99","搔癢症"],
["L309","皮膚炎"],
["L209","異位性皮膚炎"],
["L219","脂漏性皮膚炎"],
["L282","其他癢疹"],
["L408","其他乾癬"],
["L409","乾癬"],
["L508","其他蕁麻疹"],
["L509","蕁麻疹"]

],

"J 呼吸道":[

["J00","急性鼻咽炎（感冒）"],
["J0190","急性鼻竇炎"],
["J029","急性咽炎"],
["J0390","急性扁桃腺炎"],
["J0391","急性復發性扁桃腺炎"],
["J040","急性喉炎"],
["J0410","急性氣管炎－未伴有阻塞"]

]

};

const container = document.getElementById("container");

function render(keyword=""){

  container.innerHTML="";

  Object.keys(data).forEach(section=>{

    const filtered = data[section].filter(item=>{

      return(
        item[0].toLowerCase().includes(keyword.toLowerCase()) ||
        item[1].includes(keyword)
      );

    });

    if(filtered.length===0) return;

    const sec = document.createElement("div");
    sec.className="section";

    sec.innerHTML=`
      <div class="section-title">${section}</div>
      <div class="grid"></div>
    `;

    const grid = sec.querySelector(".grid");

    filtered.forEach(item=>{

      const card = document.createElement("div");

      card.className="card";

      card.innerHTML=`
        <div class="code">${item[0]}</div>
        <div class="name">${item[1]}</div>
      `;

      card.onclick=()=>{

        navigator.clipboard.writeText(item[0]);

        showToast();

      };

      grid.appendChild(card);

    });

    container.appendChild(sec);

  });

}

render();

document.getElementById("searchInput")
.addEventListener("input",(e)=>{

  render(e.target.value);

});

function showToast(){

  const toast = document.getElementById("toast");

  toast.classList.add("show");

  setTimeout(()=>{

    toast.classList.remove("show");

  },1000);

}

const slider = document.getElementById("fontSlider");

const savedFont = localStorage.getItem("fontSize");

if(savedFont){

  applyFontSize(savedFont);

  slider.value = savedFont;

}

slider.addEventListener("input",(e)=>{

  const size = e.target.value;

  applyFontSize(size);

  localStorage.setItem("fontSize",size);

});

function applyFontSize(size){

  document.querySelectorAll(".code").forEach(el=>{
    el.style.fontSize = size + "px";
  });

  document.querySelectorAll(".name").forEach(el=>{
    el.style.fontSize = size + "px";
  });

}

const settingsBtn = document.getElementById("settingsBtn");
const settingsPanel = document.getElementById("settingsPanel");

settingsBtn.onclick=()=>{

  settingsPanel.classList.toggle("show");

};

const modeBtn = document.getElementById("modeBtn");

const savedTheme = localStorage.getItem("theme");

if(savedTheme==="dark"){

  document.body.classList.add("dark");

  modeBtn.innerText="切換日間模式";

}

modeBtn.onclick=()=>{

  document.body.classList.toggle("dark");

  if(document.body.classList.contains("dark")){

    localStorage.setItem("theme","dark");

    modeBtn.innerText="切換日間模式";

  }else{

    localStorage.setItem("theme","light");

    modeBtn.innerText="切換深色模式";

  }

};

</script>

</body>
</html>
