<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light" data-font="pingfang">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>門診病代速查 v4</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&family=Noto+Serif+TC:wght@600;700;900&family=LXGW+WenKai+TC:wght@400;500;700&family=Chiron+GoRound+TC:wght@500;700;900&display=swap" rel="stylesheet">

<style>

/* ═══════════════════════════════════════════════════
   TOKENS — 與主網站（clinic_portal）完全同一套三主題
   明亮 / 夜間 / 仿舊，並共用 localStorage key：cz_theme_v6
   在主網站切主題，這裡會自動同步
═══════════════════════════════════════════════════ */
:root {
  /* 明亮（預設）— 主網站原始色票 */
  --A:   #2C5F8A;
  --A2:  #3A7AB5;
  --Alt: #5A96C8;
  --bg-solid: #EDF2F7;
  --surf:     #FFFFFF;
  --surf2:    #F0F5FA;
  --border:   #C8D9EC;
  --text:     #1A3550;
  --sub:      #2C5F8A;
  --muted:    #5A7FA0;
  --hdr:      rgba(237,242,247,.95);

  /* 由主網站 token 衍生的本頁用途變數 */
  --bg: var(--bg-solid);
  --card: rgba(255,255,255,.72);
  --card-hover: var(--surf);
  --accent: var(--A);
  --accent-light: #E0EDF8;
  --shadow: 0 10px 32px rgba(44, 95, 138, 0.10);
  --card-shadow: 0 4px 16px rgba(44, 95, 138, 0.10);
  --backdrop: blur(16px);
  --sticky-bg: var(--hdr);

  /* 專屬筆記區塊的質感翡翠綠變數（用於區隔） */
  --note-accent: #0d9488;
  --note-accent-light: #ccfbf1;

  /* 回到最上方按鈕配色 */
  --top-btn-a: #64748b;
  --top-btn-b: #475569;

  /* 卡片字級（診間字體大小滑桿控制） */
  --fs-card: 16px;
}

/* 夜間 — 主網站原始色票 */
:root[data-theme="dark"] {
  --A:#3A7AB5; --A2:#5BA0DA; --Alt:#7BBCEE;
  --bg-solid:#0E1C2C; --surf:#162435; --surf2:#1C2E40;
  --border:#2A4060;
  --text:#E2EDF8; --sub:#7BADD8; --muted:#5A82A8;
  --hdr:rgba(14,28,44,.96);

  --card: rgba(22,36,53,.80);
  --accent: var(--A2);
  --accent-light: #163852;
  --shadow: 0 10px 28px rgba(0, 0, 0, 0.40);
  --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.35);

  --note-accent: #2dd4bf;
  --note-accent-light: #115e59;

  --top-btn-a: #475569;
  --top-btn-b: #334155;
}

/* 仿舊 — 主網站原始羊皮紙暖色票 */
:root[data-theme="antique"] {
  --A:#9C6B30; --A2:#B98A4C; --Alt:#D1A86C;
  --bg-solid:#F1E8D8; --surf:#FBF6EC; --surf2:#F5ECDA;
  --border:#D9C6A0;
  --text:#4A3826; --sub:#8B5E34; --muted:#9C8868;
  --hdr:rgba(241,232,216,.95);

  --card: rgba(251,246,236,.82);
  --accent: var(--A);
  --accent-light: #F0E2C6;
  --shadow: 0 10px 32px rgba(120, 90, 40, 0.14);
  --card-shadow: 0 4px 16px rgba(120, 90, 40, 0.14);

  /* 仿舊主題下改用苔蘚綠，避免翡翠綠與暖棕互相打架 */
  --note-accent: #5E7A34;
  --note-accent-light: #E8EDD2;

  --top-btn-a: #9C8868;
  --top-btn-b: #7A6A4E;
}

/* 雅灰 — 小說樣板「人間夜色」：暖灰紙面＋靛藍主色 */
:root[data-theme="ash"] {
  --A:#3E4C6E; --A2:#55668E; --Alt:#7385AC;
  --bg-solid:#EDEAE3; --surf:#F7F5F0; --surf2:#EFECE5;
  --border:#D6D1C2;
  --text:#242320; --sub:#3E4C6E; --muted:#726B5C;
  --hdr:rgba(237,234,227,.95);

  --card: rgba(247,245,240,.80);
  --accent: var(--A);
  --accent-light: #DFE3ED;
  --shadow: 0 10px 32px rgba(62, 76, 110, 0.10);
  --card-shadow: 0 4px 16px rgba(62, 76, 110, 0.10);

  --note-accent: #0F766E;
  --note-accent-light: #CDEEE6;

  --top-btn-a: #726B5C;
  --top-btn-b: #57513F;
}

/* 暗金 — 小說樣板「暗金」：深褐夜幕＋鎏金主色 */
:root[data-theme="gold"] {
  --A:#C9A24A; --A2:#E0BC64; --Alt:#EBD08A;
  --bg-solid:#1C1812; --surf:#26211A; --surf2:#2E2820;
  --border:#3E3626;
  --text:#E8DFC8; --sub:#D8B96A; --muted:#9C9074;
  --hdr:rgba(28,24,18,.96);

  --card: rgba(38,33,26,.80);
  --accent: var(--A2);
  --accent-light: #3A2F14;
  --shadow: 0 10px 28px rgba(0, 0, 0, 0.40);
  --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.35);

  /* 暗金主題下改用玉青，避免與鎏金主色互搶 */
  --note-accent: #6FAE8F;
  --note-accent-light: #1E3A2E;

  --top-btn-a: #57513F;
  --top-btn-b: #3E3626;
}

/* 字型 — 與主網站同五種，讀取主網站 cz_cfg_v6 自動套用 */
:root[data-font="pingfang"]    { --ff:"PingFang TC","PingFang SC",-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif; }
:root[data-font="sourcesans"]  { --ff:"Noto Sans TC","Source Han Sans TC",sans-serif; }
:root[data-font="sourceserif"] { --ff:"Noto Serif TC","Source Han Serif TC",serif; }
:root[data-font="wenkai"]      { --ff:"LXGW WenKai TC","Noto Serif TC",serif; }
:root[data-font="goround"]     { --ff:"Chiron GoRound TC","Noto Sans TC",sans-serif; }

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--bg);
  background-attachment: fixed;
  color: var(--text);
  font-family: var(--ff,"Noto Sans TC",sans-serif);
  padding: 0 20px 100px;
  transition: background 0.3s, color 0.3s;
  min-height: 100vh;
  position: relative;
}

/* 與主網站相同的背景柔光暈 */
body::before {
  content:''; position:fixed; inset:0; z-index:-1; pointer-events:none;
  background:
    radial-gradient(ellipse 55% 40% at 5%  5%,  color-mix(in srgb,var(--A) 8%,transparent) 0%,transparent 70%),
    radial-gradient(ellipse 40% 35% at 95% 90%, color-mix(in srgb,var(--A2) 6%,transparent) 0%,transparent 70%);
}

/* ===================================================
   v3 新增：頂部吸附區塊，現在只放「快速跳轉列」
   搜尋框移出吸附流程，改成右上角浮動搜尋，
   大幅減少固定佔用的可視高度
   =================================================== */
.sticky-wrap {
  position: sticky;
  top: 0;
  z-index: 600;
  background: var(--sticky-bg);
  backdrop-filter: var(--backdrop);
  -webkit-backdrop-filter: var(--backdrop);
  margin: 0 -20px;
  padding: 14px 20px 14px;
  border-bottom: 1px solid var(--border);
}

/* 頂部控制列佈局（不吸附，往下捲就自然滑走） */
.header-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 16px;
  padding-top: 24px;
  padding-right: 70px; /* 預留右上角浮動搜尋按鈕的空間，避免文字被壓到 */
}

.title-area {
  flex: 1;
}

.title {
  font-size: 32px;
  font-weight: 800; 
  letter-spacing: 0.5px;
  margin-bottom: 6px;
  color: var(--text);
  background: linear-gradient(45deg, var(--text), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  color: var(--sub);
  font-size: 16px;
  margin: 0;
  font-weight: 700; 
}

/* ===================================================
   v3 新增：右上角浮動搜尋按鈕 + 展開式半透明搜尋面板
   平常收起來不佔空間，需要搜尋時再點開
   =================================================== */
.search-toggle-btn {
  position: fixed;
  top: 20px;
  right: 24px;
  width: 54px;
  height: 54px;
  border: none;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--A), var(--A2));
  color: white;
  font-size: 22px;
  cursor: pointer;
  box-shadow: 0 8px 20px color-mix(in srgb, var(--A) 35%, transparent);
  z-index: 1100;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.search-toggle-btn:hover {
  transform: scale(1.08);
}

.search-toggle-btn.active {
  box-shadow: 0 0 0 4px var(--accent-light), 0 8px 20px color-mix(in srgb, var(--A) 35%, transparent);
}

.search-float-panel {
  position: fixed;
  top: 20px;
  right: 88px;
  width: 0;
  overflow: hidden;
  opacity: 0;
  pointer-events: none;
  transition: width 0.25s ease, opacity 0.2s ease;
  z-index: 1090;
}

.search-float-panel.show {
  width: min(440px, calc(100vw - 130px));
  opacity: 1;
  pointer-events: auto;
}

.search {
  width: 100%;
  padding: 14px 20px;
  border: 2px solid var(--accent);
  border-radius: 18px;
  background: var(--card);
  backdrop-filter: var(--backdrop);
  -webkit-backdrop-filter: var(--backdrop);
  color: var(--text);
  font-size: 17px;
  font-weight: 700; 
  outline: none;
  box-shadow: var(--shadow);
  transition: all 0.25s ease;
}

.search:focus {
  background: var(--card-hover);
  box-shadow: 0 8px 24px color-mix(in srgb, var(--A) 25%, transparent);
}

/* v2 新增：快速跳轉大字按鈕列 */
.quicknav-label {
  font-size: 14px;
  font-weight: 800;
  color: var(--sub);
  margin: 14px 0 8px 4px;
}

.quicknav {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.quicknav-btn {
  background: var(--card);
  border: 2px solid var(--accent);
  color: var(--accent);
  font-size: 21px;
  font-weight: 900;
  font-family: inherit;
  -webkit-text-stroke: 0.4px currentColor; /* 中文字型 900 有時看起來不夠粗，用描邊補足視覺粗度 */
  padding: 10px 20px;
  border-radius: 14px;
  cursor: pointer;
  transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease;
  box-shadow: var(--card-shadow);
  white-space: nowrap;
}

.quicknav-btn:hover,
.quicknav-btn:active {
  background: var(--accent);
  color: #fff;
  transform: translateY(-2px);
}

.quicknav-btn.quicknav-special {
  border-color: var(--note-accent);
  color: var(--note-accent);
}

.quicknav-btn.quicknav-special:hover,
.quicknav-btn.quicknav-special:active {
  background: var(--note-accent);
  color: #fff;
}

.section {
  margin-bottom: 32px;
  scroll-margin-top: 210px; /* 讓跳轉定位時不被吸附列擋住 */
}

/* 分類大標題 */
.section-title {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--accent-light);
  color: var(--accent);
  padding: 10px 24px;
  border-radius: 999px;
  font-size: 20px; 
  font-weight: 900; 
  margin-bottom: 16px;
  box-shadow: 0 2px 10px color-mix(in srgb, var(--A) 10%, transparent);
  letter-spacing: 0.5px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 14px;
}

/* 卡片設計 */
.card {
  background: var(--card);
  backdrop-filter: var(--backdrop);
  -webkit-backdrop-filter: var(--backdrop);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 18px 16px;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
  min-height: 100px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  box-shadow: var(--card-shadow);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 6px;
  height: 100%;
  background: var(--accent);
  transition: width 0.2s ease;
}

.card:hover {
  transform: translateY(-4px);
  background: var(--card-hover);
  box-shadow: 0 12px 24px color-mix(in srgb, var(--A) 18%, transparent);
}

.card:hover::before {
  width: 10px;
}

.code {
  font-weight: 900; 
  color: var(--accent);
  margin-bottom: 6px;
  font-size: calc(var(--fs-card) + 2px);
  letter-spacing: 0.5px;
}

.name {
  line-height: 1.4;
  word-break: break-word;
  font-size: var(--fs-card);
  font-weight: 800; 
  color: var(--text);
}

/* 括號細則小字化樣式 */
.small-note {
  font-size: 85%;
  font-weight: 600;
  color: var(--muted);
  display: block;
  margin-top: 4px;
}


/* ===================================================
   專屬色系區隔：手寫筆記獨立翡翠綠 CSS
   =================================================== */
.section.note-section .section-title {
  background: var(--note-accent-light);
  color: var(--note-accent);
}

.section.note-section .card::before {
  background: var(--note-accent);
}

.section.note-section .card:hover {
  box-shadow: 0 12px 24px color-mix(in srgb, var(--note-accent) 18%, transparent);
}

.section.note-section .code {
  color: var(--note-accent);
}

/* 複製提示浮磚 */
.toast {
  position: fixed;
  bottom: 96px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: var(--bg-solid);
  padding: 14px 28px;
  border-radius: 999px;
  font-size: 16px;
  font-weight: 800;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, bottom 0.25s;
  box-shadow: 0 10px 24px rgba(0, 0, 0, 0.2);
  z-index: 1001;
}

.toast.show {
  opacity: 1;
  bottom: 106px;
}

/* 右下角齒輪按鈕 */
.settings-btn {
  position: fixed;
  right: 24px;
  bottom: 24px;
  width: 60px;
  height: 60px;
  border: none;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--A), var(--A2));
  color: white;
  font-size: 26px;
  cursor: pointer;
  box-shadow: 0 8px 24px color-mix(in srgb, var(--A) 40%, transparent);
  transition: transform 0.2s, box-shadow 0.2s;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
}

.settings-btn:hover {
  transform: rotate(45deg) scale(1.05);
}

/* v2 新增：左下角「回到最上方」按鈕，滾動一段距離後才出現 */
.back-to-top-btn {
  position: fixed;
  left: 24px;
  bottom: 24px;
  width: 60px;
  height: 60px;
  border: none;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--top-btn-a), var(--top-btn-b));
  color: white;
  font-size: 26px;
  cursor: pointer;
  box-shadow: 0 8px 24px rgba(71, 85, 105, 0.4);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transform: translateY(10px);
  transition: opacity 0.25s, transform 0.25s;
}

.back-to-top-btn.show {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}

.back-to-top-btn:hover {
  transform: translateY(-3px) scale(1.05);
}

/* 控制面板 */
.settings-panel {
  position: fixed;
  right: 24px;
  bottom: 96px;
  width: 300px;
  background: var(--card);
  backdrop-filter: var(--backdrop);
  -webkit-backdrop-filter: var(--backdrop);
  border: 2px solid var(--accent); 
  border-radius: 24px;
  padding: 20px;
  display: none;
  box-shadow: var(--shadow);
  z-index: 999;
}

.settings-panel.show {
  display: block;
  animation: panelFade 0.2s ease-out;
}

@keyframes panelFade {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.setting-title {
  font-size: 16px;
  margin-bottom: 12px;
  font-weight: 800;
  color: var(--text);
}

.range {
  width: 100%;
  margin-bottom: 20px;
  cursor: pointer;
  accent-color: var(--accent);
}

.theme-group {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.theme-tog {
  flex: 1;
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 10px 4px;
  font-size: 14px;
  font-weight: 800;
  font-family: inherit;
  background: var(--card);
  color: var(--sub);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.theme-tog:hover {
  border-color: var(--A);
}

.theme-tog.on {
  background: linear-gradient(135deg, var(--A), var(--A2));
  border-color: transparent;
  color: #fff;
  box-shadow: 0 4px 12px color-mix(in srgb, var(--A) 30%, transparent);
}

.container-wrap {
  padding-top: 20px;
}

.footer-space {
  height: 80px;
}

</style>
</head>

<body>

<div class="header-row">
  <div class="title-area">
    <div class="title">門診病代速查</div>
    <div class="subtitle">👍 點擊卡片即可快速複製病代</div>
  </div>
</div>

<button class="search-toggle-btn" id="searchToggleBtn" title="搜尋">🔍</button>
<div class="search-float-panel" id="searchFloatPanel">
  <input
    type="text"
    class="search"
    id="searchInput"
    placeholder="輸入疾病名稱或 ICD 代碼搜尋..."
  />
</div>

<div class="sticky-wrap">
  <div class="quicknav-label">⚡ 快速跳轉（點大字直接找）</div>
  <div class="quicknav" id="quickNav"></div>
</div>

<div class="container-wrap">
  <div id="container"></div>
</div>

<div class="toast" id="toast">
已複製病代
</div>

<button class="back-to-top-btn" id="backToTopBtn" title="回到最上方">⬆️</button>

<button class="settings-btn" id="settingsBtn">⚙️</button>

<div class="settings-panel" id="settingsPanel">
  <div class="setting-title">🔧 調整診間字體大小</div>
  <input
    type="range"
    min="14"
    max="40"
    value="16"
    class="range"
    id="fontSlider"
  />
  <div class="setting-title">🎨 佈景主題（與主網站同步）</div>
  <div class="theme-group">
    <button class="theme-tog" id="theme-light"   data-theme-val="light">☀️ 明亮</button>
    <button class="theme-tog" id="theme-dark"    data-theme-val="dark">🌙 夜間</button>
    <button class="theme-tog" id="theme-antique" data-theme-val="antique">📜 仿舊</button>
    <button class="theme-tog" id="theme-ash"     data-theme-val="ash">🌫️ 雅灰</button>
    <button class="theme-tog" id="theme-gold"    data-theme-val="gold">✨ 暗金</button>
  </div>
</div>

<div class="footer-space"></div>

<script>

const data = {

"🦴 M00 關節痛 (一般)":[
  ["M2550","關節痛"],
  ["M5450","下背痛"],
  ["M549","背痛"],
  ["S335XXA","腰椎扭傷拉傷初期照護"]
],

"🦺 M01 肩部關節痛":[
  ["M25511","右側肩部關節痛"],
  ["M25512","左側肩部關節痛"],
  ["M25519","未明示側性肩部關節痛"]
],

"🦾 M02 肘部關節痛":[
  ["M25521","右側肘部關節痛"],
  ["M25522","左側肘部關節痛"],
  ["M25529","未明示側性肘部關節痛"]
],

"⌚ M03 腕部關節痛":[
  ["M25531","右側腕部關節痛"],
  ["M25532","左側腕部關節痛"],
  ["M25539","未明示側性腕部關節痛"]
],

/* ===================================================
   v2 新增：快速跳轉設定
   label：按鈕上顯示的大字
   match：用來比對 data 分類標題的關鍵字
   special：是否套用「常用代碼」專屬配色
   =================================================== */
const quickNavConfig = [
  { label: "一般", match: "M00" },
  { label: "肩", match: "肩部" },
  { label: "肘", match: "肘部" },
  { label: "腕", match: "腕部" },
  { label: "髖", match: "髖部" },
  { label: "膝", match: "膝部" },
  { label: "踝足", match: "踝部" },
  { label: "手", match: "M08" },
  { label: "指", match: "M09" },
  { label: "臂", match: "M10" },
  { label: "腿", match: "M11" },
  { label: "足趾", match: "M12" },
  { label: "肌痛", match: "M07" },
  { label: "症狀", match: "R 症狀" },
  { label: "皮膚", match: "L 皮膚" },
  { label: "呼吸", match: "J 呼吸道" },
  { label: "⭐常用代碼", match: "常用新舊代碼", special: true }
];

const container = document.getElementById("container");
const fontSlider = document.getElementById("fontSlider");
const sectionKeys = Object.keys(data);

function render(keyword=""){
  container.innerHTML = "";

  sectionKeys.forEach((section, idx) => {
    const filtered = data[section].filter(item => {
      return (
        item[0].toLowerCase().includes(keyword.toLowerCase()) ||
        item[1].includes(keyword)
      );
    });

    if (filtered.length === 0) return;

    const sec = document.createElement("div");
    sec.id = "sec-" + idx;
    if (section.includes("常用新舊代碼")) {
      sec.className = "section note-section";
    } else {
      sec.className = "section";
    }

    sec.innerHTML = `
      <div class="section-title">${section}</div>
      <div class="grid"></div>
    `;

    const grid = sec.querySelector(".grid");

    filtered.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="code">${item[0]}</div>
        <div class="name">${item[1]}</div>
      `;

      card.onclick = () => {
        let cleanCode = item[0];
        if (cleanCode.includes("]")) {
          cleanCode = cleanCode.split("]").pop().trim();
        }
        copyText(cleanCode);
      };

      grid.appendChild(card);
    });

    container.appendChild(sec);
  });

  applyFontSize(fontSlider.value);
}

function showToast(code){
  const toast = document.getElementById("toast");
  toast.innerText = `已複製病代: ${code}`;
  toast.classList.add("show");
  setTimeout(() => {
    toast.classList.remove("show");
  }, 1000);
}

function applyFontSize(size){
  document.documentElement.style.setProperty("--fs-card", size + "px");
}

const savedFont = localStorage.getItem("fontSize");
if (savedFont) {
  fontSlider.value = savedFont;
}

fontSlider.addEventListener("input", (e) => {
  const size = e.target.value;
  applyFontSize(size);
  localStorage.setItem("fontSize", size);
});

document.getElementById("searchInput").addEventListener("input", (e) => {
  render(e.target.value);
});

/* ===================================================
   v2 新增：建立頂部快速跳轉大字按鈕列
   點擊後會先清空搜尋框（確保該分類一定存在），
   再平滑捲動到對應分類頂部
   =================================================== */
function buildQuickNav(){
  const nav = document.getElementById("quickNav");
  nav.innerHTML = "";

  quickNavConfig.forEach(cfg => {
    const idx = sectionKeys.findIndex(k => k.includes(cfg.match));
    if (idx === -1) return;

    const btn = document.createElement("button");
    btn.className = "quicknav-btn" + (cfg.special ? " quicknav-special" : "");
    btn.innerText = cfg.label;
    btn.onclick = () => jumpToSection(idx);
    nav.appendChild(btn);
  });
}

function jumpToSection(idx){
  const searchInput = document.getElementById("searchInput");
  if (searchInput.value) {
    searchInput.value = "";
    render();
  }
  closeSearchPanel();
  setTimeout(() => {
    const el = document.getElementById("sec-" + idx);
    if (!el) return;
    // v3 修正：用「目前」吸附列的實際高度即時計算，
    // 不再用寫死的數字，避免按鈕換行造成高度不準、跳過頭
    const stickyEl = document.querySelector(".sticky-wrap");
    const offset = (stickyEl ? stickyEl.offsetHeight : 0) + 16;
    const targetY = window.pageYOffset + el.getBoundingClientRect().top - offset;
    window.scrollTo({ top: Math.max(targetY, 0), behavior: "smooth" });
  }, 60);
}

/* ===================================================
   v2 新增：回到最上方按鈕，往下滑超過一定距離才顯示
   =================================================== */
const backToTopBtn = document.getElementById("backToTopBtn");

window.addEventListener("scroll", () => {
  if (window.scrollY > 400) {
    backToTopBtn.classList.add("show");
  } else {
    backToTopBtn.classList.remove("show");
  }
});

backToTopBtn.addEventListener("click", () => {
  window.scrollTo({ top: 0, behavior: "smooth" });
});

/* ===================================================
   v3 新增：右上角浮動搜尋按鈕開關
   點擊展開半透明搜尋框並自動聚焦，
   點擊外部或再點一次按鈕則收合
   =================================================== */
const searchToggleBtn = document.getElementById("searchToggleBtn");
const searchFloatPanel = document.getElementById("searchFloatPanel");
const searchInputEl = document.getElementById("searchInput");

function openSearchPanel(){
  searchFloatPanel.classList.add("show");
  searchToggleBtn.classList.add("active");
  setTimeout(() => searchInputEl.focus(), 150);
}

function closeSearchPanel(){
  searchFloatPanel.classList.remove("show");
  searchToggleBtn.classList.remove("active");
}

searchToggleBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  if (searchFloatPanel.classList.contains("show")) {
    closeSearchPanel();
  } else {
    openSearchPanel();
  }
});

searchFloatPanel.addEventListener("click", (e) => e.stopPropagation());

document.addEventListener("click", () => {
  closeSearchPanel();
});

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeSearchPanel();
});

const settingsBtn = document.getElementById("settingsBtn");
const settingsPanel = document.getElementById("settingsPanel");

settingsBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  settingsPanel.classList.toggle("show");
});

settingsPanel.addEventListener("click", (e) => {
  e.stopPropagation();
});

document.addEventListener("click", () => {
  settingsPanel.classList.remove("show");
});

/* ===================================================
   v4 新增：主題與字型「跟主網站共用同一份設定」
   ‧ 主題：共用 localStorage key「cz_theme_v6」
   ‧ 字型：讀主網站設定「cz_cfg_v6」裡的 font 值
   ‧ 若主網站在另一分頁改設定，這裡透過 storage 事件即時跟著換
   注意：localStorage 以「網域」為單位，兩個網頁必須放在
   同一個 GitHub Pages 網域下才會同步；不同網域時，
   本頁會用自己記住的上次選擇。
   =================================================== */
const THEME_KEY = "cz_theme_v6";
const CFG_KEY   = "cz_cfg_v6";
const VALID_THEMES = ["light", "dark", "antique", "ash", "gold"];
const VALID_FONTS  = ["pingfang", "sourcesans", "sourceserif", "wenkai", "goround"];

function applyTheme(t) {
  if (!VALID_THEMES.includes(t)) t = "light";
  document.documentElement.setAttribute("data-theme", t);
  document.querySelectorAll(".theme-tog").forEach(b =>
    b.classList.toggle("on", b.dataset.themeVal === t)
  );
}

function applyPortalFont() {
  try {
    const cfg = JSON.parse(localStorage.getItem(CFG_KEY) || "{}");
    if (cfg.font && VALID_FONTS.includes(cfg.font)) {
      document.documentElement.setAttribute("data-font", cfg.font);
    }
  } catch (e) { /* 保持預設蘋方黑體 */ }
}

/* 初始化：優先吃 cz_theme_v6；沒有的話沿用本頁 v3 舊的 theme 設定 */
(function initTheme() {
  let t = localStorage.getItem(THEME_KEY);
  if (!t) {
    const legacy = localStorage.getItem("theme");
    if (legacy === "dark") t = "dark";
  }
  applyTheme(t || "light");
  applyPortalFont();
})();

document.querySelectorAll(".theme-tog").forEach(btn => {
  btn.addEventListener("click", () => {
    const t = btn.dataset.themeVal;
    applyTheme(t);
    localStorage.setItem(THEME_KEY, t);
  });
});

/* 主網站分頁改了主題／字型，這頁即時跟著換 */
window.addEventListener("storage", (e) => {
  if (e.key === THEME_KEY) applyTheme(e.newValue);
  if (e.key === CFG_KEY)   applyPortalFont();
});

/* ===================================================
   v4 新增：複製病代（含舊瀏覽器 fallback 與失敗提示）
   =================================================== */
function copyText(code) {
  const done = () => showToast(code);
  const fail = () => {
    const toast = document.getElementById("toast");
    toast.innerText = "⚠️ 複製失敗，請手動輸入：" + code;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2500);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(code).then(done).catch(() => legacyCopy(code) ? done() : fail());
  } else {
    legacyCopy(code) ? done() : fail();
  }
}

function legacyCopy(text) {
  try {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(ta);
    return ok;
  } catch (e) { return false; }
}

buildQuickNav();
render();
