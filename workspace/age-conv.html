<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>年份轉換工具 | 中正診所</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="light"] {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --accent-primary: #0ea5e9; 
            --accent-secondary: #10b981; 
            --text-main: #1e293b;     
            --text-sub: #64748b;      
            --border-color: #e2e8f0;
            --shadow: rgba(14, 165, 233, 0.1);
            --age-bg: rgba(14, 165, 233, 0.05);
            --age-text: #0284c7;
        }
        :root[data-theme="dark"] {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-primary: #38bdf8;
            --accent-secondary: #34d399;
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --border-color: #334155;
            --shadow: rgba(0, 0, 0, 0.3);
            --age-bg: rgba(56, 189, 248, 0.1);
            --age-text: #38bdf8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            min-height: 100vh; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: "Inter", "Microsoft JhengHei", sans-serif; 
            display: flex; flex-direction: column; align-items: center; padding: 40px 20px; transition: 0.3s;
        }

        .container { width: 100%; max-width: 500px; flex: 1; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { 
            font-size: 42px; 
            font-weight: 900; 
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 30px; 
            padding: 35px; 
            border: 1px solid var(--border-color); 
            box-shadow: 0 20px 40px var(--shadow);
            margin-bottom: 20px;
        }

        .input-group { margin-bottom: 20px; position: relative; }
        .label { display: block; font-size: 16px; font-weight: 800; margin-bottom: 10px; color: var(--text-main); letter-spacing: 1px; }
        .input-wrapper { display: flex; align-items: center; background: var(--bg-color); border-radius: 15px; border: 2px solid var(--border-color); transition: 0.3s; }
        .input-wrapper:focus-within { border-color: var(--accent-primary); box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.15); }

        .input-field { 
            width: 100%; padding: 15px; font-size: 24px; font-weight: 900;
            background: transparent; border: none; color: var(--text-main); outline: none;
            text-align: center;
        }

        .unit-tag { padding-right: 20px; font-weight: 900; color: var(--accent-primary); font-size: 20px; }

        .swap-icon { text-align: center; font-size: 30px; margin: -10px 0 10px; color: var(--text-sub); opacity: 0.5; }

        /* 新增：年齡顯示面板的樣式 */
        .age-display-box {
            background: var(--age-bg);
            border: 1.5px dashed var(--accent-primary);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            margin: 25px 0 15px;
            transition: 0.3s;
        }
        .age-title { font-size: 14px; font-weight: 800; color: var(--text-sub); margin-bottom: 4px; }
        .age-result { font-size: 28px; font-weight: 900; color: var(--age-text); }
        .age-result span { font-size: 18px; font-weight: 800; color: var(--text-main); margin-left: 2px; }

        .info-text { text-align: center; font-size: 14px; color: var(--text-sub); font-weight: 700; margin-top: 10px; }

        .theme-toggle { margin-top: 30px; background: none; border: 1.5px solid var(--border-color); color: var(--text-sub); padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: 800; transition: 0.3s; }
        .footer { margin-top: 50px; padding: 20px 0; text-align: center; font-size: 15px; font-weight: 800; color: var(--text-sub); }
        .footer span { color: var(--accent-primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>年份轉換器</h1>
        <div style="background: rgba(14, 165, 233, 0.08); padding: 6px 16px; border-radius: 50px; display: inline-block; font-weight: 800; color: var(--text-sub);">西元 ⇄ 民國 ⇄ 年齡 快速對照</div>
    </div>

    <div class="card">
        <div class="input-group">
            <label class="label">西元年 (A.D.)</label>
            <div class="input-wrapper">
                <input type="number" id="adYear" class="input-field" placeholder="2026" oninput="convAD()" inputmode="numeric">
                <span class="unit-tag">年</span>
            </div>
        </div>

        <div class="swap-icon">⇅</div>

        <div class="input-group">
            <label class="label">民國年 (R.O.C.)</label>
            <div class="input-wrapper">
                <input type="number" id="rocYear" class="input-field" placeholder="115" oninput="convROC()" inputmode="numeric">
                <span class="unit-tag">年</span>
            </div>
        </div>

        <div class="age-display-box" id="ageBox">
            <div class="age-title" id="ageTitle">若此年為出生年，於今年 (2026) 滿：</div>
            <div class="age-result" id="ageOutput">0 <span>歲</span></div>
        </div>

        <div class="info-text">輸入其中一項，另兩項會自動計算</div>
    </div>

    <center><button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 切換模式</button></center>
</div>

<footer class="footer">Made with ✨ by <span>中正小幫手</span></footer>

<script>
    // 獲取當前年份 (2026)
    const currentYear = new Date().getFullYear();

    // 更新年齡顯示的共用函式
    function updateAge(birthYearAD) {
        const ageOutput = document.getElementById('ageOutput');
        const ageBox = document.getElementById('ageBox');
        
        if (birthYearAD) {
            const birth = parseInt(birthYearAD);
            const age = currentYear - birth;
            
            if (age >= 0) {
                ageOutput.innerHTML = `${age} <span>歲</span>`;
                ageBox.style.opacity = '1';
            } else {
                // 如果輸入的年份大於今年（未來年分）
                ageOutput.innerHTML = `<span style="font-size:18px; color:var(--text-sub);">尚未出生</span>`;
            }
        } else {
            ageOutput.innerHTML = `0 <span>歲</span>`;
        }
    }

    function convAD() {
        const ad = document.getElementById('adYear').value;
        const rocInput = document.getElementById('rocYear');
        if (ad) {
            rocInput.value = parseInt(ad) - 1911;
            updateAge(ad); // 同步計算年齡
        } else {
            rocInput.value = '';
            updateAge('');
        }
    }

    function convROC() {
        const roc = document.getElementById('rocYear').value;
        const adInput = document.getElementById('adYear');
        if (roc) {
            const calculatedAD = parseInt(roc) + 1911;
            adInput.value = calculatedAD;
            updateAge(calculatedAD); // 同步計算年齡
        } else {
            adInput.value = '';
            updateAge('');
        }
    }

    function toggleTheme() {
        const doc = document.documentElement;
        const next = doc.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        doc.setAttribute('data-theme', next);
        document.getElementById('themeBtn').innerText = next === 'light' ? '🌙 切換模式' : '☀️ 切換模式';
    }

    // 預設填入今年
    window.onload = () => {
        // 動態將網頁提示標題修正為當前年度
        document.getElementById('ageTitle').innerText = `若此年為出生年，於今年 (${currentYear}) 滿：`;
        document.getElementById('adYear').value = currentYear;
        convAD();
    };
</script>
</body>
</html>
