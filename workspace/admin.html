<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>中正診所 Admin</title>

<meta
name="robots"
content="noindex,nofollow,noarchive,nosnippet,noimageindex">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg1:#0f172a;
    --bg2:#111827;

    --card:
    rgba(20,27,45,.75);

    --border:
    rgba(255,255,255,.08);

    --text:#f8fafc;

    --muted:#94a3b8;

    --accent:#8b5cf6;
}

body{

    min-height:100vh;

    background:
    linear-gradient(
    180deg,
    var(--bg1),
    var(--bg2)
    );

    color:var(--text);

    font-family:
    "Inter",
    sans-serif;

    padding:40px;
}

/* Header */

.header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:36px;
}

.title{

    font-size:38px;

    font-weight:700;
}

.subtitle{

    margin-top:10px;

    color:var(--muted);

    line-height:1.7;
}

/* Layout */

.layout{

    display:grid;

    grid-template-columns:
    420px 1fr;

    gap:28px;
}

/* Card */

.card{

    background:
    var(--card);

    border:
    1px solid var(--border);

    border-radius:26px;

    padding:28px;

    backdrop-filter:blur(18px);
}

/* Form */

.form-group{

    margin-bottom:22px;
}

.label{

    display:block;

    margin-bottom:10px;

    color:#dbe4ff;

    font-size:14px;
}

.input{

    width:100%;

    height:52px;

    border:none;

    outline:none;

    border-radius:14px;

    background:
    rgba(255,255,255,.05);

    color:white;

    padding:0 16px;

    font-size:15px;
}

.textarea{

    width:100%;

    min-height:100px;

    border:none;

    outline:none;

    border-radius:14px;

    background:
    rgba(255,255,255,.05);

    color:white;

    padding:16px;

    font-size:15px;

    resize:vertical;
}

/* Buttons */

.button{

    width:100%;

    height:54px;

    border:none;

    border-radius:16px;

    cursor:pointer;

    font-size:15px;

    font-weight:600;

    color:white;

    transition:.25s;
}

.add{

    background:
    linear-gradient(
    90deg,
    #8b5cf6,
    #7c3aed
    );
}

.add:hover{

    transform:
    translateY(-2px);
}

.download{

    background:
    linear-gradient(
    90deg,
    #2563eb,
    #1d4ed8
    );

    margin-top:18px;
}

/* List */

.list{

    display:flex;

    flex-direction:column;

    gap:18px;
}

.item{

    background:
    rgba(255,255,255,.04);

    border:
    1px solid rgba(255,255,255,.06);

    border-radius:20px;

    padding:22px;
}

.item-top{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:14px;
}

.item-title{

    font-size:22px;

    font-weight:700;
}

.item-category{

    color:#c4b5fd;

    font-size:13px;
}

.item-url{

    color:#94a3b8;

    font-size:13px;

    margin-bottom:14px;

    word-break:break-all;
}

.item-desc{

    color:#dbe4ff;

    line-height:1.7;
}

.delete{

    margin-top:18px;

    background:
    rgba(239,68,68,.15);

    color:#fca5a5;

    border:none;

    border-radius:12px;

    padding:10px 14px;

    cursor:pointer;
}

/* Empty */

.empty{

    color:#94a3b8;

    text-align:center;

    padding:60px 20px;

    line-height:1.8;
}

@media(max-width:1000px){

    body{
        padding:20px;
    }

    .layout{

        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<div class="header">

    <div>

        <div class="title">
            中正診所 Admin
        </div>

        <div class="subtitle">
            Portal 網站管理系統
            <br>
            新增、修改、匯出 data.json
        </div>

    </div>

</div>

<div class="layout">

    <!-- 左側 -->

    <div class="card">

        <div class="form-group">

            <label class="label">
                網站名稱
            </label>

            <input
            id="title"
            class="input"
            placeholder="例如：健保 VPN">

        </div>

        <div class="form-group">

            <label class="label">
                分類
            </label>

            <input
            id="category"
            class="input"
            placeholder="例如：醫療系統">

        </div>

        <div class="form-group">

            <label class="label">
                ICON
            </label>

            <input
            id="icon"
            class="input"
            placeholder="例如：🩺">

        </div>

        <div class="form-group">

            <label class="label">
                網址
            </label>

            <input
            id="url"
            class="input"
            placeholder="https://...">

        </div>

        <div class="form-group">

            <label class="label">
                描述
            </label>

            <textarea
            id="description"
            class="textarea"
            placeholder="網站說明"></textarea>

        </div>

        <button
        class="button add"
        onclick="addWebsite()">

            新增網站

        </button>

        <button
        class="button download"
        onclick="downloadJSON()">

            下載 data.json

        </button>

    </div>

    <!-- 右側 -->

    <div class="card">

        <div
        class="list"
        id="list">

        </div>

    </div>

</div>

<script>

/* ===== 資料 ===== */

let websites = [];

/* ===== render ===== */

const list =
document.getElementById("list");

function render(){

    if(websites.length === 0){

        list.innerHTML =

        `
        <div class="empty">

            尚未新增網站 ✨

        </div>
        `;

        return;
    }

    list.innerHTML = "";

    websites.forEach((item,index)=>{

        const div =
        document.createElement("div");

        div.className = "item";

        div.innerHTML =

        `
        <div class="item-top">

            <div>

                <div class="item-title">
                    ${item.icon}
                    ${item.title}
                </div>

                <div class="item-category">
                    ${item.category}
                </div>

            </div>

        </div>

        <div class="item-url">
            ${item.url}
        </div>

        <div class="item-desc">
            ${item.description}
        </div>

        <button
        class="delete"
        onclick="removeWebsite(${index})">

            刪除

        </button>
        `;

        list.appendChild(div);
    });
}

/* ===== 新增 ===== */

function addWebsite(){

    const title =
    document.getElementById("title")
    .value
    .trim();

    const category =
    document.getElementById("category")
    .value
    .trim();

    const icon =
    document.getElementById("icon")
    .value
    .trim();

    const url =
    document.getElementById("url")
    .value
    .trim();

    const description =
    document.getElementById("description")
    .value
    .trim();

    if(
        !title ||
        !url
    ){

        alert("請填寫名稱與網址");

        return;
    }

    websites.push({

        title,
        category,
        icon,
        url,
        description
    });

    render();

    /* 清空 */

    document.getElementById("title").value = "";
    document.getElementById("category").value = "";
    document.getElementById("icon").value = "";
    document.getElementById("url").value = "";
    document.getElementById("description").value = "";
}

/* ===== 刪除 ===== */

function removeWebsite(index){

    websites.splice(index,1);

    render();
}

/* ===== 下載 JSON ===== */

function downloadJSON(){

    const json =
    JSON.stringify(
    websites,
    null,
    2
    );

    const blob =
    new Blob(
    [json],
    {
        type:"application/json"
    });

    const url =
    URL.createObjectURL(blob);

    const a =
    document.createElement("a");

    a.href = url;

    a.download = "data.json";

    a.click();

    URL.revokeObjectURL(url);
}

/* 初始 */

render();

</script>

</body>
</html>
