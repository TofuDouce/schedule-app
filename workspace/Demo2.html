<!DOCTYPE html>
<html lang="zh-Hant" data-theme="dark" data-color="purple">

<head>
<meta charset="UTF-8" />
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<title>中正診所 Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">

<style>

:root{
    --dynamic-title-size:28px;
    --dynamic-desc-size:17px;
    --grid-cols:4;

    --gold:#e3c47b;
    --gold-light:#fff0bf;

    --bg1:#09070f;
    --bg2:#140f1f;
    --bg3:#1d1630;

    --card-bg:rgba(38,28,56,.88);

    --header-bg:rgba(14,10,22,.92);

    --text-main:#fff5dc;
    --text-sub:#d9cfe7;

    --line:rgba(255,255,255,.08);

    --shadow:
    0 20px 50px rgba(0,0,0,.55);

    --glow:
    0 0 25px rgba(227,196,123,.22);
}

/* 配色 */

:root[data-color="blue"]{
    --accent:#8fd4ff;
}

:root[data-color="green"]{
    --accent:#9ceab9;
}

:root[data-color="purple"]{
    --accent:#dcc8ff;
}

:root[data-color="gray"]{
    --accent:#e4e4ea;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    min-height:100vh;

    font-family:
    "Noto Sans TC",
    sans-serif;

    color:var(--text-main);

    overflow-x:hidden;

    background:
    radial-gradient(
        circle at top,
        rgba(255,255,255,.05),
        transparent 20%
    ),

    radial-gradient(
        circle at 20% 30%,
        rgba(132,92,255,.08),
        transparent 25%
    ),

    radial-gradient(
        circle at 80% 20%,
        rgba(255,215,120,.06),
        transparent 20%
    ),

    linear-gradient(
        180deg,
        var(--bg1),
        var(--bg2),
        var(--bg3)
    );

    background-attachment:fixed;

    position:relative;
}

/* 星點 */

body::before{
    content:"";

    position:fixed;
    inset:0;

    pointer-events:none;

    background-image:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,.7) 1px, transparent 1px),
    radial-gradient(circle at 70% 50%, rgba(255,255,255,.4) 1px, transparent 1px),
    radial-gradient(circle at 90% 20%, rgba(255,255,255,.5) 1px, transparent 1px),
    radial-gradient(circle at 35% 85%, rgba(255,255,255,.4) 1px, transparent 1px);

    background-size:300px 300px;

    opacity:.35;
}

/* 月亮 */

body::after{
    content:"";

    position:fixed;

    width:420px;
    height:420px;

    right:-120px;
    top:-140px;

    border-radius:50%;

    background:
    radial-gradient(
        circle,
        rgba(255,255,255,.12),
        rgba(255,255,255,.04),
        transparent 70%
    );

    filter:blur(10px);

    pointer-events:none;
}

/* ====================== */
/* HEADER */
/* ====================== */

.header{

    position:fixed;

    top:0;
    left:0;
    right:0;

    z-index:1000;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:18px 5%;

    background:
    linear-gradient(
        to bottom,
        rgba(10,8,18,.96),
        rgba(18,14,30,.92)
    );

    backdrop-filter:blur(25px);

    border-bottom:
    1px solid rgba(255,255,255,.06);

    box-shadow:
    0 10px 35px rgba(0,0,0,.5);
}

/* 金線 */

.header::after{
    content:"";

    position:absolute;

    left:0;
    right:0;
    bottom:0;

    height:2px;

    background:
    linear-gradient(
        to right,
        transparent,
        rgba(227,196,123,.85),
        transparent
    );
}

.title-main{

    font-family:"Cinzel",serif;

    font-size:
    clamp(28px,5vw,52px);

    font-weight:900;

    letter-spacing:2px;

    background:
    linear-gradient(
        to bottom,
        #fff8df,
        #e3c47b
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:
    0 0 20px rgba(255,230,180,.15);
}

.portal-sub{

    margin-top:4px;

    font-size:11px;

    letter-spacing:6px;

    color:#e7d6a5;

    opacity:.85;
}

#clock{

    font-family:"Cinzel",serif;

    font-size:
    clamp(24px,5vw,42px);

    font-weight:900;

    color:#fff5d6;

    text-align:right;

    text-shadow:
    0 0 15px rgba(255,255,255,.15);
}

#date{

    margin-top:4px;

    font-size:14px;

    color:#d8cae6;

    text-align:right;

    font-weight:700;
}

/* ====================== */

.main{

    width:100%;
    max-width:1500px;

    margin:auto;

    padding:
    130px
    26px
    120px;
}

/* 區塊標題 */

.section-title{

    position:relative;

    margin:
    48px 0
    26px;

    text-align:center;

    font-size:30px;

    font-weight:900;

    letter-spacing:5px;

    color:#fff0c7;

    text-shadow:
    0 0 20px rgba(255,220,150,.15);
}

.section-title::before,
.section-title::after{

    content:"✦";

    color:var(--gold);

    margin:0 12px;
}

/* ====================== */

.grid{

    display:grid;

    grid-template-columns:
    repeat(var(--grid-cols),1fr);

    gap:28px;
}

/* ====================== */
/* 卡片 */
/* ====================== */

.card{

    position:relative;

    overflow:hidden;

    border-radius:34px;

    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,.06),
        rgba(255,255,255,.02)
    ),
    var(--card-bg);

    border:
    1px solid rgba(255,255,255,.08);

    box-shadow:var(--shadow);

    transition:.35s;
}

/* 慕夏框 */

.card::before{

    content:"";

    position:absolute;

    inset:12px;

    border-radius:28px;

    border:
    1px solid rgba(227,196,123,.22);

    pointer-events:none;
}

/* 小月亮 */

.card::after{

    content:"☽";

    position:absolute;

    top:14px;
    right:18px;

    font-size:20px;

    color:
    rgba(255,228,176,.7);
}

.card:hover{

    transform:
    translateY(-8px)
    scale(1.02);

    box-shadow:
    0 30px 60px rgba(0,0,0,.6),
    0 0 30px rgba(227,196,123,.16);
}

.card-link{

    display:flex;

    flex-direction:column;

    justify-content:center;
    align-items:center;

    text-align:center;

    text-decoration:none;

    color:inherit;

    min-height:250px;

    padding:35px 22px;
}

.icon-box{

    font-size:60px;

    margin-bottom:20px;

    filter:
    drop-shadow(
        0 0 12px rgba(255,255,255,.15)
    );
}

.card-title{

    font-size:
    var(--dynamic-title-size);

    font-weight:900;

    line-height:1.2;

    margin-bottom:12px;

    color:#fff5d6;
}

.card-desc{

    font-size:
    var(--dynamic-desc-size);

    color:var(--text-sub);

    line-height:1.6;
}

/* 重要卡片 */

.highlight-card{

    background:
    linear-gradient(
        180deg,
        rgba(255,220,150,.14),
        rgba(255,255,255,.03)
    ),
    rgba(48,32,20,.92) !important;

    border:
    1px solid rgba(255,225,150,.28) !important;

    box-shadow:
    0 0 35px rgba(255,220,150,.16),
    0 20px 50px rgba(0,0,0,.6);
}

.highlight-card .card-title{
    color:#fff3c3 !important;
}

.highlight-card .card-desc{
    color:#ffe9b3 !important;
}

/* ====================== */
/* 按鈕 */
/* ====================== */

.controls{

    position:fixed;

    right:24px;
    bottom:24px;

    display:flex;
    flex-direction:column;

    gap:16px;

    z-index:1500;
}

.ctrl-btn{

    width:70px;
    height:70px;

    border-radius:50%;

    border:
    1px solid rgba(255,255,255,.08);

    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,.12),
        rgba(255,255,255,.03)
    ),
    rgba(22,16,32,.92);

    backdrop-filter:blur(16px);

    color:white;

    font-size:30px;

    cursor:pointer;

    transition:.3s;

    box-shadow:
    0 15px 35px rgba(0,0,0,.5);
}

.ctrl-btn:hover{

    transform:
    translateY(-4px)
    scale(1.06);

    box-shadow:
    0 20px 40px rgba(0,0,0,.6),
    0 0 20px rgba(255,225,150,.15);
}

/* ====================== */
/* 管理面板 */
/* ====================== */

.admin-panel{

    position:fixed;

    top:0;
    right:-100%;

    width:500px;
    max-width:100%;

    height:100vh;

    overflow-y:auto;

    z-index:3000;

    padding:34px;

    background:
    linear-gradient(
        180deg,
        rgba(18,14,30,.98),
        rgba(12,9,20,.98)
    );

    backdrop-filter:blur(35px);

    border-left:
    1px solid rgba(255,255,255,.08);

    transition:.4s;
}

.admin-panel.show{

    right:0;

    box-shadow:
    -20px 0 60px rgba(0,0,0,.65);
}

.admin-panel h2{

    font-size:34px;

    color:#ffe8b7;

    margin-bottom:28px;
}

.admin-setting-box{

    background:
    rgba(255,255,255,.04);

    border:
    1px solid rgba(255,255,255,.06);

    border-radius:26px;

    padding:24px;

    margin-bottom:30px;
}

.admin-label{

    display:block;

    margin:
    18px 0
    10px;

    font-size:18px;

    font-weight:900;

    color:#fff0cf;
}

/* input */

.input,
select{

    width:100%;

    padding:16px;

    border-radius:16px;

    border:
    1px solid rgba(255,255,255,.08);

    background:
    rgba(255,255,255,.06);

    color:white;

    font-size:16px;

    outline:none;
}

.input::placeholder{
    color:#bfaed8;
}

.btn{

    width:100%;

    padding:18px;

    border:none;

    border-radius:18px;

    cursor:pointer;

    font-size:18px;

    font-weight:900;

    background:
    linear-gradient(
        to right,
        #e3c47b,
        #fff0bf
    );

    color:#2a1b10;

    transition:.25s;
}

.btn:hover{
    transform:translateY(-2px);
}

/* 書籤管理 */

.manage-item{

    display:flex;

    justify-content:space-between;
    align-items:center;

    padding:14px;

    margin-bottom:10px;

    border-radius:16px;

    background:
    rgba(255,255,255,.05);

    border:
    1px solid rgba(255,255,255,.06);
}

.mini-del-btn{

    border:none;

    background:#ff5f7c;

    color:white;

    font-weight:900;

    border-radius:10px;

    padding:8px 12px;

    cursor:pointer;
}

/* 顏色點 */

.color-dot{

    width:48px;
    height:48px;

    border-radius:50%;

    cursor:pointer;

    border:
    2px solid rgba(255,255,255,.25);

    transition:.25s;
}

.color-dot:hover{
    transform:scale(1.08);
}

.color-dot.active{

    outline:
    3px solid white;

    outline-offset:3px;
}

/* emoji */

#emojiPicker div{

    background:
    rgba(255,255,255,.05) !important;

    border:
    1px solid rgba(255,255,255,.06) !important;

    transition:.25s;
}

#emojiPicker div:hover{

    transform:scale(1.08);

    background:
    rgba(255,255,255,.1) !important;
}

/* ====================== */
/* 手機 */
/* ====================== */

@media(max-width:1200px){

    .grid{
        grid-template-columns:repeat(3,1fr);
    }
}

@media(max-width:800px){

    .grid{
        grid-template-columns:repeat(2,1fr);
    }

    .card-link{
        min-height:220px;
    }

    .header{
        padding:16px 20px;
    }
}

@media(max-width:540px){

    .grid{
        grid-template-columns:1fr;
    }

    .main{
        padding:
        118px
        18px
        100px;
    }

    .card-link{

        min-height:200px;

        padding:30px 18px;
    }

    .card-title{
        font-size:24px !important;
    }

    .card-desc{
        font-size:16px !important;
    }

    .ctrl-btn{
        width:62px;
        height:62px;
    }

    .admin-panel{
        width:100%;
    }

    .section-title{
        font-size:26px;
    }

    #clock{
        font-size:32px;
    }
}

</style>
</head>

<body id="bodyRoot">

<div class="header">

    <div class="title-group">

        <div class="title-main">
            中正診所
        </div>

        <div class="portal-sub">
            PORTAL SYSTEM
        </div>

    </div>

    <div>

        <div id="clock">
            00:00:00
        </div>

        <div id="date"></div>

    </div>

</div>

<div class="main" id="mainContainer">

    <div class="section-title">
        主要入口
    </div>

    <div id="primaryGrid" class="grid"></div>

    <div class="section-title">
        次要工具
    </div>

    <div id="secondaryGrid" class="grid"></div>

</div>

<div class="controls">

    <button
        class="ctrl-btn"
        onclick="toggleTheme()"
        id="themeBtn"
    >
        🌙
    </button>

    <button
        class="ctrl-btn"
        onclick="toggleAdminMode()"
    >
        ⚙️
    </button>

</div>

<div class="admin-panel" id="adminPanel">

    <div style="
        display:flex;
        justify-content:space-between;
        align-items:center;
    ">

        <h2>
            介面管理
        </h2>

        <button
            onclick="closeAdmin()"
            style="
            font-size:42px;
            border:none;
            background:none;
            color:#ff7395;
            cursor:pointer;
        ">
            ✕
        </button>

    </div>

    <div class="admin-setting-box">

        <h3 style="
            font-size:22px;
            color:#ffe3a8;
            margin-bottom:18px;
        ">
            ✨ 顯示設定
        </h3>

        <label class="admin-label">
            主題顏色
        </label>

        <div class="color-picker"
        style="
            display:flex;
            gap:16px;
            margin-bottom:20px;
        ">

            <div class="color-dot"
            style="background:#8fd4ff"
            onclick="setColor('blue')"
            id="dot-blue"></div>

            <div class="color-dot"
            style="background:#9ceab9"
            onclick="setColor('green')"
            id="dot-green"></div>

            <div class="color-dot"
            style="background:#dcc8ff"
            onclick="setColor('purple')"
            id="dot-purple"></div>

            <div class="color-dot"
            style="background:#e4e4ea"
            onclick="setColor('gray')"
            id="dot-gray"></div>

        </div>

        <label class="admin-label">
            標題大小
            <span id="ts-val">28px</span>
        </label>

        <input
            type="range"
            id="titleSlider"
            min="16"
            max="45"
            value="28"
            style="width:100%;"
            oninput="applyUIStyle()"
        >

        <label class="admin-label">
            說明大小
            <span id="ds-val">17px</span>
        </label>

        <input
            type="range"
            id="descSlider"
            min="12"
            max="30"
            value="17"
            style="width:100%;"
            oninput="applyUIStyle()"
        >

        <label class="admin-label">
            電腦版排版
        </label>

        <select
            id="gridColSelect"
            onchange="applyUIStyle()"
        >
            <option value="6">一列 6 張</option>
            <option value="5">一列 5 張</option>
            <option value="4" selected>一列 4 張</option>
        </select>

    </div>

    <h3 style="
        font-size:22px;
        margin-bottom:15px;
        color:#ffe7b6;
    ">
        🪄 新增自訂書籤
    </h3>

    <select id="linkCategory" class="input">
        <option value="primary">
            主要入口區
        </option>

        <option value="secondary" selected>
            次要工具區
        </option>
    </select>

    <div
        id="emojiPicker"
        style="
        display:grid;
        grid-template-columns:repeat(4,1fr);
        gap:10px;
        margin:18px 0;
    ">
    </div>

    <input
        id="linkTitle"
        class="input"
        placeholder="名稱"
    >

    <br><br>

    <input
        id="linkUrl"
        class="input"
        placeholder="網址 https://"
    >

    <br><br>

    <input
        id="linkDesc"
        class="input"
        placeholder="簡短說明"
    >

    <br><br>

    <button
        class="btn"
        onclick="saveLink()"
    >
        儲存並新增
    </button>

    <div
        id="customLinksList"
        style="
        margin-top:35px;
        border-top:1px solid rgba(255,255,255,.08);
        padding-top:24px;
    ">
    </div>

    <button
        class="btn"
        style="margin-top:30px;"
        onclick="location.reload()"
    >
        🔄 同步雲端資料
    </button>

</div>

<script>

const SHEET_URL =
`https://docs.google.com/spreadsheets/d/1uYBA_CncbEAydmzNC1SRnsKJdswNgQh3zg1x6TKo0UU/export?format=csv&gid=0`;

const emojis = [
"🩺","💉","🏥","💊",
"📦","💻","🔍","📋",
"🧪","📅","📝","⭐",
"👤","⚙️","🔗","🏠"
];

let selectedIcon = "🔗";

let userLinks =
JSON.parse(
localStorage.getItem('cz_user_links_v4')
)
||
{
    primary:[],
    secondary:[]
};

function setColor(color){

    document.documentElement
    .setAttribute('data-color',color);

    document.querySelectorAll('.color-dot')
    .forEach(d=>d.classList.remove('active'));

    document.getElementById('dot-'+color)
    .classList.add('active');

    localStorage.setItem(
        'cz_theme_color',
        color
    );
}

async function fetchCloudData(){

    try{

        const res =
        await fetch(
            SHEET_URL +
            "&cb=" +
            Date.now()
        );

        const text =
        await res.text();

        const lines =
        text.split(/\r?\n/)
        .slice(1);

        const pg =
        document.getElementById("primaryGrid");

        const sg =
        document.getElementById("secondaryGrid");

        pg.innerHTML = "";
        sg.innerHTML = "";

        lines.forEach(line=>{

            const cols =
            line
            .split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
            .map(c=>
                c.replace(/^"|"$/g,'').trim()
            );

            if(cols.length >= 3){

                const [
                    cat,
                    title,
                    url,
                    desc,
                    icon
                ] = cols;

                const html =
                createCard({
                    title,
                    url,
                    desc,
                    icon,
                    isHighlight:
                    title.includes("重要")
                });

                if(
                    cat
                    .toLowerCase()
                    .includes('primary')
                ){
                    pg.innerHTML += html;
                }else{
                    sg.innerHTML += html;
                }
            }
        });

        updateManageList();

        userLinks.primary.forEach(l=>{

            l.isHighlight =
            l.title.includes("重要");

            pg.innerHTML += createCard(l);
        });

        userLinks.secondary.forEach(l=>{

            l.isHighlight =
            l.title.includes("重要");

            sg.innerHTML += createCard(l);
        });

    }catch(e){

        console.error("Cloud Error");
    }
}

function createCard(l){

    return `
    <div class="card ${l.isHighlight ? 'highlight-card' : ''}">

        <a class="card-link"
        href="${l.url}"
        target="_blank">

            <span class="icon-box">
                ${l.icon || '🔗'}
            </span>

            <div class="card-title">
                ${l.title}
            </div>

            <div class="card-desc">
                ${l.desc || ''}
            </div>

        </a>

    </div>
    `;
}

function updateManageList(){

    const listDiv =
    document.getElementById(
        "customLinksList"
    );

    listDiv.innerHTML =
    `
    <h3 style="
        margin-bottom:12px;
        color:#ffe5b1;
    ">
        📜 已存書籤
    </h3>
    `;

    const all = [
        ...userLinks.primary,
        ...userLinks.secondary
    ];

    all.forEach(l=>{

        const item =
        document.createElement("div");

        item.className =
        "manage-item";

        item.innerHTML =
        `
        <span>
            ${l.icon} ${l.title}
        </span>

        <button
            class="mini-del-btn"
            onclick="deleteLink(${l.id})"
        >
            刪除
        </button>
        `;

        listDiv.appendChild(item);
    });
}

function applyUIStyle(){

    const ts =
    document.getElementById(
        'titleSlider'
    ).value;

    const ds =
    document.getElementById(
        'descSlider'
    ).value;

    const col =
    document.getElementById(
        'gridColSelect'
    ).value;

    document.getElementById(
        'ts-val'
    ).innerText =
    ts + 'px';

    document.getElementById(
        'ds-val'
    ).innerText =
    ds + 'px';

    document.documentElement.style
    .setProperty(
        '--dynamic-title-size',
        ts + 'px'
    );

    document.documentElement.style
    .setProperty(
        '--dynamic-desc-size',
        ds + 'px'
    );

    document.documentElement.style
    .setProperty(
        '--grid-cols',
        col
    );

    localStorage.setItem(
        'cz_ui_config',
        JSON.stringify({
            ts,
            ds,
            col
        })
    );
}

function saveLink(){

    const title =
    document.getElementById(
        'linkTitle'
    ).value;

    const url =
    document.getElementById(
        'linkUrl'
    ).value;

    const desc =
    document.getElementById(
        'linkDesc'
    ).value;

    const cat =
    document.getElementById(
        'linkCategory'
    ).value;

    if(!title || !url){

        return alert(
            "請填寫名稱與網址"
        );
    }

    userLinks[cat].push({

        id:Date.now(),

        title,
        url,
        desc,

        icon:selectedIcon
    });

    localStorage.setItem(
        'cz_user_links_v4',
        JSON.stringify(userLinks)
    );

    location.reload();
}

function deleteLink(id){

    if(!confirm("確定刪除？"))
    return;

    userLinks.primary =
    userLinks.primary.filter(
        x=>x.id != id
    );

    userLinks.secondary =
    userLinks.secondary.filter(
        x=>x.id != id
    );

    localStorage.setItem(
        'cz_user_links_v4',
        JSON.stringify(userLinks)
    );

    location.reload();
}

/* emoji */

const picker =
document.getElementById(
    'emojiPicker'
);

emojis.forEach(e=>{

    const div =
    document.createElement('div');

    div.style = `
        font-size:28px;
        cursor:pointer;
        text-align:center;
        padding:12px;
        border-radius:16px;
    `;

    div.innerText = e;

    div.onclick = ()=>{

        document
        .querySelectorAll(
            '#emojiPicker div'
        )
        .forEach(d=>
            d.style.borderColor =
            "rgba(255,255,255,.08)"
        );

        selectedIcon = e;

        div.style.borderColor =
        "gold";
    };

    picker.appendChild(div);
});

function toggleAdminMode(){

    document
    .getElementById("adminPanel")
    .classList.toggle("show");
}

function closeAdmin(){

    document
    .getElementById("adminPanel")
    .classList.remove("show");
}

function toggleTheme(){

    const next =
    document.documentElement
    .getAttribute('data-theme')
    === 'light'
    ? 'dark'
    : 'light';

    document.documentElement
    .setAttribute(
        'data-theme',
        next
    );

    document.getElementById(
        'themeBtn'
    ).innerText =
    next === 'light'
    ? '🌙'
    : '☀️';

    localStorage.setItem(
        'cz_portal_theme',
        next
    );
}

function updateClock(){

    const now = new Date();

    document.getElementById("clock")
    .innerText =
    now.toLocaleTimeString(
        "zh-TW",
        {hour12:false}
    );

    const y =
    now.getFullYear();

    const minguo =
    y - 1911;

    document.getElementById("date")
    .innerText =
    `(民${minguo}) ${y}/${
        String(now.getMonth()+1)
        .padStart(2,'0')
    }/${
        String(now.getDate())
        .padStart(2,'0')
    }`;
}

window.onload = ()=>{

    const cfg =
    JSON.parse(
        localStorage.getItem(
            'cz_ui_config'
        )
    );

    if(cfg){

        document.getElementById(
            'titleSlider'
        ).value = cfg.ts;

        document.getElementById(
            'descSlider'
        ).value = cfg.ds;

        document.getElementById(
            'gridColSelect'
        ).value = cfg.col;

        applyUIStyle();
    }

    const savedColor =
    localStorage.getItem(
        'cz_theme_color'
    )
    || 'purple';

    setColor(savedColor);

    const savedTheme =
    localStorage.getItem(
        'cz_portal_theme'
    );

    if(savedTheme){

        document.documentElement
        .setAttribute(
            'data-theme',
            savedTheme
        );

        document.getElementById(
            'themeBtn'
        ).innerText =
        savedTheme === 'light'
        ? '🌙'
        : '☀️';
    }

    setInterval(
        updateClock,
        1000
    );

    updateClock();

    fetchCloudData();
};
