<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light" data-color="slate" data-card="glass" data-font="sans" data-texture="none">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>中正診所 Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;900&family=Noto+Sans+TC:wght@500;700;900&family=Noto+Serif+TC:wght@600;700;900&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   TOKENS — 沉穩醫療配色（無螢光）
═══════════════════════════════════════════════════ */
:root {
  --fs-title: clamp(18px,1.8vw,24px);
  --fs-desc:  clamp(14px,1.2vw,17px);
  --grid:     4;

  /* slate (預設) */
  --A:   #2C5F8A;
  --A2:  #3A7AB5;
  --Alt: #5A96C8;

  /* surfaces light */
  --bg:      #EDF2F7;
  --surf:    #FFFFFF;
  --surf2:   #F0F5FA;
  --border:  #C8D9EC;
  --shadow:  rgba(44,95,138,.10);
  --shadowH: rgba(44,95,138,.20);
  --text:    #1A3550;
  --sub:     #2C5F8A;
  --muted:   #5A7FA0;
  --danger:  #C0392B;
  --warn:    #B45309;
  --warnBg:  #FFFBEA;
  --warnBdr: #F59E0B;
  --hdr:     rgba(237,242,247,.95);
}

/* colour presets */
:root[data-color="slate"]  { --A:#2C5F8A; --A2:#3A7AB5; --Alt:#5A96C8; --bg:#EDF2F7; --surf2:#F0F5FA; --border:#C8D9EC; --shadow:rgba(44,95,138,.10); --shadowH:rgba(44,95,138,.20); --text:#1A3550; --sub:#2C5F8A; --muted:#5A7FA0; --hdr:rgba(237,242,247,.95); }
:root[data-color="sage"]   { --A:#3A6B52; --A2:#4E8F6E; --Alt:#76B594; --bg:#EEF4F0; --surf2:#E8F2EC; --border:#B8D8C4; --shadow:rgba(58,107,82,.10); --shadowH:rgba(58,107,82,.20); --text:#1B3828; --sub:#3A6B52; --muted:#5C8A6E; --hdr:rgba(238,244,240,.95); }
:root[data-color="stone"]  { --A:#6B5744; --A2:#8C7260; --Alt:#A8927E; --bg:#F3EFEB; --surf2:#EDE8E2; --border:#D4C4B4; --shadow:rgba(107,87,68,.10); --shadowH:rgba(107,87,68,.20); --text:#352518; --sub:#6B5744; --muted:#8C7260; --hdr:rgba(243,239,235,.95); }
:root[data-color="indigo"] { --A:#3D4E8C; --A2:#5165B5; --Alt:#7A8FD0; --bg:#EEF0F8; --surf2:#E8ECFA; --border:#C0CAE8; --shadow:rgba(61,78,140,.10); --shadowH:rgba(61,78,140,.20); --text:#1C2445; --sub:#3D4E8C; --muted:#6070A8; --hdr:rgba(238,240,248,.95); }

/* dark mode */
:root[data-theme="dark"] {
  --bg:#0E1C2C; --surf:#162435; --surf2:#1C2E40;
  --border:#2A4060; --shadow:rgba(0,0,0,.35); --shadowH:rgba(0,0,0,.55);
  --text:#E2EDF8; --sub:#7BADD8; --muted:#5A82A8;
  --hdr:rgba(14,28,44,.96); --warnBg:#271F00; --warnBdr:#B45309;
}

/* fonts */
:root[data-font="sans"]   { --ff:"Noto Sans TC","Inter",sans-serif; }
:root[data-font="round"]  { --ff:"Nunito","Noto Sans TC",sans-serif; }
:root[data-font="serif"]  { --ff:"Noto Serif TC",serif; }

/* textures */
:root[data-texture="dots"] body::after   { opacity:1; background-image:radial-gradient(circle, color-mix(in srgb,var(--A) 18%,transparent) 1px, transparent 1px); background-size:22px 22px; }
:root[data-texture="grid"] body::after   { opacity:1; background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px); background-size:32px 32px; }
:root[data-texture="none"] body::after   { opacity:0; }

/* card styles */
:root[data-card="glass"] .card { background:rgba(255,255,255,.72); backdrop-filter:blur(16px); }
:root[data-theme="dark"][data-card="glass"] .card { background:rgba(22,36,53,.72); }
:root[data-card="flat"]  .card { background:var(--surf); box-shadow:none; border-width:2px; }
:root[data-card="solid"] .card { background:var(--surf2); border-color:transparent; box-shadow:var(--shadow); }

/* ═══════════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════════ */
*,*::before,*::after { margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent; }

body {
  min-height:100vh; background:var(--bg); color:var(--text);
  font-family:var(--ff,"Noto Sans TC",sans-serif);
  transition:background .3s,color .3s; overflow-x:hidden;
  position:relative;
}
body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 55% 40% at 5%  5%,  color-mix(in srgb,var(--A) 8%,transparent) 0%,transparent 70%),
    radial-gradient(ellipse 40% 35% at 95% 90%, color-mix(in srgb,var(--A2) 6%,transparent) 0%,transparent 70%);
}
body::after {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  opacity:0; transition:opacity .3s;
}

/* ═══════════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════════ */
.hdr {
  position:fixed;top:0;left:0;right:0;z-index:900;
  height:72px; display:flex; align-items:center; justify-content:space-between;
  padding:0 36px;
  background:var(--hdr); backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
}
.hdr::after {
  content:''; position:absolute; bottom:-2px; left:0; right:0; height:2px;
  background:linear-gradient(90deg,var(--A),var(--A2),var(--Alt));
}

.logo { display:flex; align-items:center; gap:14px; }
.logo-icon {
  width:44px;height:44px;border-radius:12px;flex-shrink:0;
  background:linear-gradient(145deg,var(--A),var(--A2));
  display:flex;align-items:center;justify-content:center;font-size:22px;
  box-shadow:0 4px 14px var(--shadow);
}
.logo-name { font-size:clamp(18px,2vw,24px); font-weight:900; color:var(--text); }
.logo-sub  { font-size:10px; font-weight:700; letter-spacing:3px; color:var(--A); margin-top:2px; }

.hdr-center { flex:1; display:flex; justify-content:center; padding:0 20px; }
.search-wrap {
  position:relative; width:100%; max-width:400px;
}
.search-icon {
  position:absolute; left:13px; top:50%; transform:translateY(-50%);
  font-size:16px; pointer-events:none; color:var(--muted);
}
#searchInput {
  width:100%; padding:10px 14px 10px 40px;
  border:1.5px solid var(--border); border-radius:10px;
  font-size:15px; font-family:inherit; font-weight:600;
  background:var(--surf); color:var(--text);
  transition:.2s;
}
#searchInput:focus { outline:none; border-color:var(--A); box-shadow:0 0 0 3px color-mix(in srgb,var(--A) 12%,transparent); }
#searchInput::placeholder { color:var(--muted); }

.hdr-right { display:flex; align-items:center; gap:20px; }
#clock { font-family:"Inter",monospace; font-size:clamp(20px,2vw,28px); font-weight:900; color:var(--text); font-variant-numeric:tabular-nums; letter-spacing:1.5px; }
#date  { font-size:12px; font-weight:700; color:var(--muted); margin-top:2px; }


/* ═══════════════════════════════════════════════════
   MAIN
═══════════════════════════════════════════════════ */
.main {
  position:relative; z-index:1;
  max-width:1520px; margin:0 auto;
  padding:88px 32px 120px;
}

/* ── Announcement Banner ── */
#announceBanner {
  display:none;
  margin:16px 0 8px;
  background:linear-gradient(135deg,color-mix(in srgb,var(--A) 8%,var(--surf)),var(--surf));
  border:1.5px solid var(--border);
  border-left:5px solid var(--A2);
  border-radius:14px; padding:16px 22px;
  font-size:15px; font-weight:700; color:var(--sub);
  line-height:1.7;
}
#announceBanner.show { display:block; }
.announce-label {
  font-size:11px; font-weight:800; letter-spacing:2px;
  color:var(--A); text-transform:uppercase; margin-bottom:6px;
}

/* ── Recent strip ── */
#recentSection { margin:16px 0 0; }
.recent-strip {
  display:flex; gap:10px; overflow-x:auto; padding-bottom:4px;
  scrollbar-width:thin; scrollbar-color:var(--border) transparent;
}
.recent-chip {
  display:flex; align-items:center; gap:6px; flex-shrink:0;
  padding:7px 14px; background:var(--surf); border:1.5px solid var(--border);
  border-radius:999px; font-size:13px; font-weight:700; color:var(--sub);
  text-decoration:none; transition:.15s; white-space:nowrap;
}
.recent-chip:hover { border-color:var(--A); color:var(--A); background:color-mix(in srgb,var(--A) 6%,var(--surf)); }

/* ── Section Label ── */
.sec-label {
  display:flex; align-items:center; gap:12px;
  margin:36px 0 16px;
}
.sec-label:first-of-type { margin-top:20px; }
.sec-pill {
  display:flex; align-items:center; gap:7px;
  background:linear-gradient(135deg,var(--A),var(--A2));
  color:#fff; font-size:13px; font-weight:800;
  padding:6px 16px; border-radius:999px; letter-spacing:1.5px;
  box-shadow:0 3px 12px var(--shadow); flex-shrink:0;
}
.sec-line { flex:1; height:1px; background:linear-gradient(90deg,var(--border),transparent); }

/* ── Grid ── */
.grid {
  display:grid;
  grid-template-columns:repeat(var(--grid,4),1fr);
  gap:16px;
}

/* ── Cards ── */
.card {
  background:rgba(255,255,255,.72); backdrop-filter:blur(16px);
  border-radius:18px; border:1.5px solid var(--border);
  box-shadow:0 3px 16px var(--shadow);
  transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease;
  overflow:hidden; position:relative;
}
.card::before {
  content:''; position:absolute; top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--A),var(--Alt));
  transform:scaleX(0); transform-origin:left;
  transition:transform .25s ease;
}
.card:hover { transform:translateY(-4px); box-shadow:0 10px 30px var(--shadowH); border-color:var(--A2); }
.card:hover::before { transform:scaleX(1); }
.card.hidden { display:none; }

/* highlight */
.card.hl { background:var(--warnBg)!important; border-color:var(--warnBdr)!important; }
.card.hl::before { background:linear-gradient(90deg,#F59E0B,#FBBF24); }
.card.hl .card-title { color:var(--warn); }
.card.hl .card-desc  { color:#92400E; }
:root[data-theme="dark"] .card.hl .card-title { color:#FCD34D; }
:root[data-theme="dark"] .card.hl .card-desc  { color:#F59E0B; }

.card-link {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:30px 18px 26px; text-decoration:none; color:inherit;
  text-align:center; height:100%; gap:10px;
}
.icon-box {
  width:66px; height:66px; border-radius:16px; flex-shrink:0;
  background:var(--surf2); border:1.5px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:34px; line-height:1;
  transition:transform .2s,background .2s;
}
.card:hover .icon-box { transform:scale(1.1); background:color-mix(in srgb,var(--A) 10%,var(--surf2)); }
.card-title { font-size:var(--fs-title); font-weight:900; color:var(--text); line-height:1.3; }
.card-desc  { font-size:var(--fs-desc);  font-weight:600; color:var(--sub); line-height:1.4; }

/* ── Memo panel ── */
#memoPanel {
  position:fixed; bottom:96px; right:30px; z-index:800;
  width:300px; background:var(--surf); border:2px solid var(--border);
  border-radius:18px; box-shadow:0 8px 32px var(--shadowH);
  padding:18px; display:none; flex-direction:column; gap:10px;
}
#memoPanel.show { display:flex; }
#memoPanel h4 { font-size:14px; font-weight:800; color:var(--text); letter-spacing:1px; }
#memoText {
  width:100%; min-height:120px; resize:vertical;
  border:1.5px solid var(--border); border-radius:10px;
  padding:10px; font-family:inherit; font-size:14px; font-weight:600;
  background:var(--surf2); color:var(--text); transition:.15s;
}
#memoText:focus { outline:none; border-color:var(--A); }
.memo-save {
  padding:9px; border:none; border-radius:10px; cursor:pointer;
  background:linear-gradient(135deg,var(--A),var(--A2)); color:#fff;
  font-size:14px; font-weight:800; font-family:inherit;
  transition:.15s;
}

/* ── Float controls ── */
.controls {
  position:fixed; bottom:30px; right:30px;
  display:flex; flex-direction:column; gap:10px; z-index:1000;
}
.ctrl {
  width:50px; height:50px; border-radius:13px;
  border:1.5px solid var(--border); background:var(--surf);
  font-size:20px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 3px 14px var(--shadow); color:var(--text);
  transition:transform .15s,box-shadow .15s;
}
.ctrl:hover { transform:translateY(-2px); box-shadow:0 7px 20px var(--shadowH); }

/* ── Admin panel ── */
.panel {
  position:fixed; top:0; right:-100%; width:460px; height:100vh;
  background:var(--surf); border-left:2px solid var(--border);
  overflow-y:auto; transition:right .35s cubic-bezier(.4,0,.2,1); z-index:2000;
}
.panel.show { right:0; box-shadow:-20px 0 60px rgba(0,0,0,.12); }

.panel-hdr {
  position:sticky; top:0; z-index:5;
  display:flex; align-items:center; justify-content:space-between;
  padding:20px 24px 18px;
  background:var(--surf); border-bottom:2px solid var(--border);
}
.panel-hdr h2 { font-size:18px; font-weight:900; color:var(--text); }
.xbtn {
  width:36px;height:36px;border-radius:9px;border:1.5px solid var(--border);
  background:transparent;cursor:pointer;font-size:17px;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);transition:.15s;
}
.xbtn:hover { background:var(--surf2); color:var(--danger); border-color:var(--danger); }

.panel-body { padding:20px 24px 50px; display:flex; flex-direction:column; gap:16px; }

.pcard {
  background:var(--surf2); border:1.5px solid var(--border);
  border-radius:14px; padding:18px;
}
.pcard-title {
  font-size:11px; font-weight:800; color:var(--A);
  letter-spacing:2.5px; text-transform:uppercase; margin-bottom:14px;
}

.plabel { font-size:13px; font-weight:700; color:var(--muted); display:block; margin:12px 0 7px; }
.plabel:first-of-type { margin-top:0; }

/* color dots */
.cdots { display:flex; gap:10px; flex-wrap:wrap; }
.cdot {
  width:34px;height:34px;border-radius:50%;cursor:pointer;
  border:3px solid var(--surf);
  box-shadow:0 2px 8px rgba(0,0,0,.18);
  transition:transform .15s;
}
.cdot.on { transform:scale(1.25); outline:3px solid var(--text); outline-offset:2px; }

/* toggle button group */
.tog-group { display:flex; gap:8px; flex-wrap:wrap; }
.tog {
  padding:8px 14px; border:1.5px solid var(--border); border-radius:9px;
  background:var(--surf); color:var(--sub); font-size:13px; font-weight:700;
  cursor:pointer; transition:.15s; font-family:inherit;
}
.tog.on { background:var(--A); color:#fff; border-color:var(--A); }

/* slider */
.srow { display:flex; align-items:center; gap:10px; }
.srow input[type=range] { flex:1; height:7px; accent-color:var(--A); cursor:pointer; }
.sval { font-size:12px; font-weight:800; min-width:38px; text-align:right; color:var(--A); }

/* input */
.pin {
  width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:10px;
  font-size:14px; font-family:inherit; font-weight:600;
  background:var(--surf); color:var(--text); margin-bottom:10px; transition:.15s;
}
.pin:focus { outline:none; border-color:var(--A); box-shadow:0 0 0 3px color-mix(in srgb,var(--A) 12%,transparent); }

/* emoji picker */
.epick { display:grid; grid-template-columns:repeat(4,1fr); gap:7px; margin-bottom:12px; }
.eopt {
  font-size:23px; text-align:center; padding:8px 4px;
  border:1.5px solid var(--border); border-radius:10px;
  background:var(--surf); cursor:pointer; transition:.15s; line-height:1;
}
.eopt.on { border-color:var(--A); background:color-mix(in srgb,var(--A) 10%,var(--surf)); }

/* buttons */
.btn-prim {
  width:100%; padding:13px; font-size:15px; font-weight:800; font-family:inherit;
  border:none; border-radius:11px; cursor:pointer;
  background:linear-gradient(135deg,var(--A),var(--A2)); color:#fff;
  box-shadow:0 4px 14px var(--shadow); transition:opacity .15s,transform .15s;
}
.btn-prim:hover { opacity:.9; transform:translateY(-1px); }
.btn-ghost {
  width:100%; padding:11px; font-size:14px; font-weight:700; font-family:inherit;
  border:1.5px solid var(--border); border-radius:11px; cursor:pointer;
  background:transparent; color:var(--muted); transition:.15s;
}
.btn-ghost:hover { background:var(--surf2); color:var(--text); border-color:var(--sub); }

/* manage items */
.mitem {
  display:flex; justify-content:space-between; align-items:center;
  padding:10px 13px; border-radius:10px; border:1.5px solid var(--border);
  margin-bottom:7px; background:var(--surf); font-size:14px; font-weight:600; gap:8px;
}
.mitem span { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.del {
  background:transparent; color:var(--danger); border:1.5px solid var(--danger);
  padding:4px 11px; border-radius:8px; cursor:pointer; font-size:12px; font-weight:800;
  white-space:nowrap; transition:.15s; flex-shrink:0;
}
.del:hover { background:var(--danger); color:#fff; }

/* empty */
.empty { grid-column:1/-1; text-align:center; padding:40px; color:var(--muted); font-size:15px; font-weight:600; }

/* ═══ RWD ═══ */
@media(max-width:1100px){ :root{ --grid:3; } }
@media(max-width:800px) { .grid{ grid-template-columns:repeat(3,1fr)!important; } .hdr-center{ display:none; } }
@media(max-width:580px) {
  .grid{ grid-template-columns:repeat(2,1fr)!important; }
  .hdr{ padding:0 16px; height:68px; }
  .main{ padding:82px 12px 110px; }
  .panel{ width:100%; }
  .card-link{ padding:24px 14px 20px; }
  .icon-box{ width:54px;height:54px;font-size:28px; }
}
@media(max-width:360px){ .grid{ grid-template-columns:1fr!important; } }


/* ═══ TASK PANEL ═══ */
#taskBadge {
  position:fixed; top:16px; left:50%; transform:translateX(-50%);
  z-index:1100; display:none;
  background:#C0392B; color:#fff;
  font-size:15px; font-weight:800;
  padding:10px 24px; border-radius:999px;
  box-shadow:0 4px 20px rgba(192,57,43,.4);
  cursor:pointer; letter-spacing:.5px;
  animation:badgePop .4s cubic-bezier(.34,1.56,.64,1);
  align-items:center; gap:8px;
}
#taskBadge.show { display:flex; }
@keyframes badgePop {
  from { opacity:0; transform:translateX(-50%) scale(.7); }
  to   { opacity:1; transform:translateX(-50%) scale(1); }
}

#taskPanel {
  position:fixed; bottom:96px; right:92px; z-index:800;
  width:380px; max-height:78vh;
  background:var(--surf); border:2px solid var(--border);
  border-radius:20px; box-shadow:0 12px 40px var(--shadowH);
  display:none; flex-direction:column; overflow:hidden;
}
#taskPanel.show { display:flex; }

.tp-hdr {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 18px 14px; border-bottom:2px solid var(--border);
  background:var(--surf); flex-shrink:0;
}
.tp-hdr h3 { font-size:16px; font-weight:900; color:var(--text); }
.tp-hdr-right { display:flex; align-items:center; gap:8px; }
.tp-refresh {
  width:30px; height:30px; border-radius:8px;
  border:1.5px solid var(--border); background:transparent;
  cursor:pointer; font-size:15px;
  display:flex; align-items:center; justify-content:center;
  color:var(--muted); transition:.15s;
}
.tp-refresh:hover { background:var(--surf2); color:var(--A); }
.tp-close {
  width:30px; height:30px; border-radius:8px;
  border:1.5px solid var(--border); background:transparent;
  cursor:pointer; font-size:15px;
  display:flex; align-items:center; justify-content:center;
  color:var(--muted); transition:.15s;
}
.tp-close:hover { background:var(--surf2); color:var(--danger); border-color:var(--danger); }

.tp-body { overflow-y:auto; padding:12px 14px 16px; flex:1; }

.task-item {
  display:flex; align-items:flex-start; gap:11px;
  padding:12px 13px; border-radius:13px;
  border:1.5px solid var(--border);
  margin-bottom:9px; background:var(--surf2);
  transition:.15s;
}
.task-item.overdue  { border-color:#C0392B; background:#FFF5F5; }
.task-item.due-soon { border-color:#F59E0B; background:#FFFBEA; }
:root[data-theme="dark"] .task-item.overdue  { background:#2A0A0A; }
:root[data-theme="dark"] .task-item.due-soon { background:#271F00; }

.task-icon { font-size:26px; line-height:1; margin-top:2px; flex-shrink:0; }

.task-info { flex:1; min-width:0; }
.task-name { font-size:15px; font-weight:800; color:var(--text); line-height:1.3; margin-bottom:3px; }
.task-meta { font-size:12px; font-weight:600; color:var(--muted); line-height:1.6; }

.task-badge {
  display:inline-block; font-size:12px; font-weight:800;
  padding:2px 10px; border-radius:999px; margin-top:5px;
}
.task-badge.ok      { background:#DCFCE7; color:#166534; }
.task-badge.soon    { background:#FEF9C3; color:#92400E; }
.task-badge.overdue { background:#FEE2E2; color:#C0392B; }
:root[data-theme="dark"] .task-badge.ok      { background:#052E16; color:#4ADE80; }
:root[data-theme="dark"] .task-badge.soon    { background:#271F00; color:#FCD34D; }
:root[data-theme="dark"] .task-badge.overdue { background:#2A0A0A; color:#F87171; }

.task-edit-link {
  font-size:11px; font-weight:700; color:var(--A);
  text-decoration:none; opacity:.7; transition:.15s;
  display:block; margin-top:5px;
}
.task-edit-link:hover { opacity:1; text-decoration:underline; }

.tp-footer {
  padding:10px 14px; border-top:1px solid var(--border);
  font-size:11px; font-weight:600; color:var(--muted);
  text-align:center; flex-shrink:0;
}
.tp-footer a { color:var(--A); text-decoration:none; font-weight:700; }
.tp-footer a:hover { text-decoration:underline; }

.tp-loading { text-align:center; padding:32px 20px; color:var(--muted); font-size:14px; font-weight:600; }

</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header class="hdr">
  <div class="logo">
    <div class="logo-icon">🏥</div>
    <div>
      <div class="logo-name">中正診所</div>
      <div class="logo-sub">Portal System</div>
    </div>
  </div>

  <div class="hdr-center">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="searchInput" type="text" placeholder="搜尋書籤…" oninput="filterCards()">
    </div>
  </div>

  <div class="hdr-right">
    <div>
      <div id="clock">00:00:00</div>
      <div id="date">─</div>
    </div>
  </div>
</header>

<!-- ═══ MAIN ═══ -->
<main class="main">

  <!-- 公告欄 -->
  <div id="announceBanner">
    <div class="announce-label">📢 診所公告</div>
    <div id="announceText">─</div>
  </div>

  <!-- 最近開啟 -->
  <div id="recentSection" style="display:none;">
    <div class="sec-label" style="margin-top:16px;">
      <div class="sec-pill">🕐 最近開啟</div>
      <div class="sec-line"></div>
    </div>
    <div class="recent-strip" id="recentStrip"></div>
  </div>

  <!-- 主要入口 -->
  <div class="sec-label">
    <div class="sec-pill">🏠 主要入口</div>
    <div class="sec-line"></div>
  </div>
  <div id="primaryGrid" class="grid"><div class="empty">資料載入中…</div></div>

  <!-- 次要工具 -->
  <div class="sec-label">
    <div class="sec-pill">🔧 次要工具</div>
    <div class="sec-line"></div>
  </div>
  <div id="secondaryGrid" class="grid"><div class="empty">資料載入中…</div></div>

</main>


<!-- ═══ TASK BADGE ═══ -->
<div id="taskBadge" onclick="openTaskPanel()">
  🔴 <span id="taskBadgeText">有任務逾期！</span>
</div>

<!-- ═══ TASK PANEL ═══ -->
<div id="taskPanel">
  <div class="tp-hdr">
    <h3>📋 定期任務</h3>
    <div class="tp-hdr-right">
      <button class="tp-refresh" onclick="loadTasks()" title="重新整理">🔄</button>
      <button class="tp-close"   onclick="closeTaskPanel()">✕</button>
    </div>
  </div>
  <div class="tp-body" id="taskBody">
    <div class="tp-loading">載入中…</div>
  </div>
  <div class="tp-footer">
    完成任務後請至
    <a href="https://docs.google.com/spreadsheets/d/1uYBA_CncbEAydmzNC1SRnsKJdswNgQh3zg1x6TKo0UU/edit#gid=646869954"
       target="_blank" rel="noopener">Google Sheet</a>
    更新完成日期
  </div>
</div>

<!-- ═══ MEMO ═══ -->
<div id="memoPanel">
  <h4>📝 快速備忘</h4>
  <textarea id="memoText" placeholder="在此輸入備忘事項…"></textarea>
  <button class="memo-save" onclick="saveMemo()">儲存</button>
</div>

<!-- ═══ FLOAT CONTROLS ═══ -->
<div class="controls">
  <button class="ctrl" id="themeBtn" onclick="toggleTheme()" title="深淺色">🌙</button>
  <button class="ctrl" id="taskCtrl" onclick="openTaskPanel()" title="定期任務">📋</button>
  <button class="ctrl" onclick="toggleMemo()" title="備忘貼">📝</button>
  <button class="ctrl" onclick="openPanel()" title="介面設定">⚙️</button>
</div>

<!-- ═══ ADMIN PANEL ═══ -->
<div class="panel" id="adminPanel">
  <div class="panel-hdr">
    <h2>⚙️ 介面設定</h2>
    <button class="xbtn" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body">

    <!-- 顯示設定 -->
    <div class="pcard">
      <div class="pcard-title">🎨 顯示設定</div>

      <label class="plabel">主題顏色</label>
      <div class="cdots">
        <div class="cdot" id="dot-slate"  style="background:#2C5F8A" onclick="setColor('slate')"  title="靛藍"></div>
        <div class="cdot" id="dot-sage"   style="background:#3A6B52" onclick="setColor('sage')"   title="鼠尾草綠"></div>
        <div class="cdot" id="dot-stone"  style="background:#6B5744" onclick="setColor('stone')"  title="石褐"></div>
        <div class="cdot" id="dot-indigo" style="background:#3D4E8C" onclick="setColor('indigo')" title="靛紫"></div>
      </div>

      <label class="plabel">卡片風格</label>
      <div class="tog-group">
        <button class="tog" id="card-glass" onclick="setCard('glass')">玻璃</button>
        <button class="tog" id="card-flat"  onclick="setCard('flat')">線框</button>
        <button class="tog" id="card-solid" onclick="setCard('solid')">實色</button>
      </div>

      <label class="plabel">背景材質</label>
      <div class="tog-group">
        <button class="tog" id="tex-none" onclick="setTexture('none')">無</button>
        <button class="tog" id="tex-dots" onclick="setTexture('dots')">點陣</button>
        <button class="tog" id="tex-grid" onclick="setTexture('grid')">網格</button>
      </div>

      <label class="plabel">字型</label>
      <div class="tog-group">
        <button class="tog" id="font-sans"  onclick="setFont('sans')">黑體</button>
        <button class="tog" id="font-round" onclick="setFont('round')">圓體</button>
        <button class="tog" id="font-serif" onclick="setFont('serif')">明體</button>
      </div>
    </div>

    <!-- 大小設定 -->
    <div class="pcard">
      <div class="pcard-title">📏 大小設定</div>

      <label class="plabel">卡片標題大小</label>
      <div class="srow">
        <input type="range" id="tsSlider" min="16" max="30" value="24" oninput="applySize()">
        <span class="sval" id="tsVal">24px</span>
      </div>

      <label class="plabel">說明文字大小</label>
      <div class="srow">
        <input type="range" id="dsSlider" min="13" max="22" value="17" oninput="applySize()">
        <span class="sval" id="dsVal">17px</span>
      </div>

      <label class="plabel">每列卡片數（電腦版）</label>
      <div class="tog-group">
        <button class="tog" id="g3" onclick="setGrid(3)">3</button>
        <button class="tog" id="g4" onclick="setGrid(4)">4</button>
        <button class="tog" id="g5" onclick="setGrid(5)">5</button>
        <button class="tog" id="g6" onclick="setGrid(6)">6</button>
      </div>
    </div>

    <!-- 新增書籤 -->
    <div class="pcard">
      <div class="pcard-title">🔗 新增書籤</div>
      <label class="plabel">放置區域</label>
      <select id="linkCat" class="pin">
        <option value="primary">主要入口區</option>
        <option value="secondary" selected>次要工具區</option>
      </select>
      <label class="plabel">選擇圖示</label>
      <div class="epick" id="emojiPicker"></div>
      <input id="lTitle" class="pin" placeholder="名稱（含「重要」自動標黃色）">
      <input id="lUrl"   class="pin" placeholder="網址 https://…">
      <input id="lDesc"  class="pin" placeholder="簡短說明（選填）">
      <button class="btn-prim" onclick="saveLink()">＋ 儲存並新增</button>
    </div>

    <!-- 管理已存書籤 -->
    <div id="manageWrap"></div>

    <button class="btn-ghost" onclick="location.reload()">🔄 重新同步雲端資料</button>

  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════ */
const SHEET = 'https://docs.google.com/spreadsheets/d/1uYBA_CncbEAydmzNC1SRnsKJdswNgQh3zg1x6TKo0UU/export?format=csv&gid=0';
const EMOJIS = ['🩺','💉','🏥','💊','📦','💻','🔍','📋','🧪','📅','📝','⭐','👤','⚙️','🔗','🏠'];
const LS     = { links:'cz_links_v5', cfg:'cz_cfg_v5', theme:'cz_theme', color:'cz_color', memo:'cz_memo', recent:'cz_recent' };

let selIcon  = '🔗';
let links    = JSON.parse(localStorage.getItem(LS.links))  || { primary:[], secondary:[] };
let recent   = JSON.parse(localStorage.getItem(LS.recent)) || [];

/* ═══════════════════════════════════════════════
   THEME / COLOR / STYLE
═══════════════════════════════════════════════ */
function setColor(c) {
  document.documentElement.setAttribute('data-color', c);
  document.querySelectorAll('.cdot').forEach(d => d.classList.remove('on'));
  const el = document.getElementById('dot-' + c);
  if (el) el.classList.add('on');
  localStorage.setItem(LS.color, c);
}

function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('themeBtn').textContent = next === 'light' ? '🌙' : '☀️';
  localStorage.setItem(LS.theme, next);
}


function setCard(s) {
  document.documentElement.setAttribute('data-card', s);
  ['glass','flat','solid'].forEach(x => document.getElementById('card-'+x).classList.toggle('on', x === s));
  saveCfg();
}

function setTexture(t) {
  document.documentElement.setAttribute('data-texture', t);
  ['none','dots','grid'].forEach(x => document.getElementById('tex-'+x).classList.toggle('on', x === t));
  saveCfg();
}

function setFont(f) {
  document.documentElement.setAttribute('data-font', f);
  ['sans','round','serif'].forEach(x => document.getElementById('font-'+x).classList.toggle('on', x === f));
  saveCfg();
}

function setGrid(n) {
  document.documentElement.style.setProperty('--grid', n);
  [3,4,5,6].forEach(x => document.getElementById('g'+x).classList.toggle('on', x === n));
  saveCfg();
}

function applySize() {
  const ts = document.getElementById('tsSlider').value;
  const ds = document.getElementById('dsSlider').value;
  document.getElementById('tsVal').textContent = ts + 'px';
  document.getElementById('dsVal').textContent = ds + 'px';
  document.documentElement.style.setProperty('--fs-title', ts + 'px');
  document.documentElement.style.setProperty('--fs-desc',  ds + 'px');
  saveCfg();
}

/* ═══════════════════════════════════════════════
   PERSIST CONFIG
═══════════════════════════════════════════════ */
function saveCfg() {
  localStorage.setItem(LS.cfg, JSON.stringify({
    ts:   document.getElementById('tsSlider').value,
    ds:   document.getElementById('dsSlider').value,
    grid: document.documentElement.style.getPropertyValue('--grid').trim() || '4',
    card: document.documentElement.getAttribute('data-card'),
    font: document.documentElement.getAttribute('data-font'),
    tex:  document.documentElement.getAttribute('data-texture'),
  }));
}

function restoreCfg() {
  const c = JSON.parse(localStorage.getItem(LS.cfg));
  if (!c) { initToggles(); return; }
  if (c.ts)   { document.getElementById('tsSlider').value = c.ts; }
  if (c.ds)   { document.getElementById('dsSlider').value = c.ds; }
  applySize();
  setCard(c.card || 'glass');
  setFont(c.font || 'sans');
  setTexture(c.tex || 'none');
  const g = parseInt(c.grid) || 4;
  setGrid(g);
}

function initToggles() {
  setCard('glass'); setFont('sans'); setTexture('none'); setGrid(4);
}

/* ═══════════════════════════════════════════════
   PANEL
═══════════════════════════════════════════════ */
function openPanel()  { document.getElementById('adminPanel').classList.add('show'); }
function closePanel() { document.getElementById('adminPanel').classList.remove('show'); }

/* ═══════════════════════════════════════════════
   MEMO
═══════════════════════════════════════════════ */
function toggleMemo() { document.getElementById('memoPanel').classList.toggle('show'); }
function saveMemo() {
  localStorage.setItem(LS.memo, document.getElementById('memoText').value);
  const btn = document.querySelector('.memo-save');
  btn.textContent = '✓ 已儲存'; setTimeout(() => btn.textContent = '儲存', 1500);
}

/* ═══════════════════════════════════════════════
   SEARCH / FILTER
═══════════════════════════════════════════════ */
function filterCards() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  document.querySelectorAll('.card').forEach(c => {
    const text = c.textContent.toLowerCase();
    c.classList.toggle('hidden', q.length > 0 && !text.includes(q));
  });
}

/* ═══════════════════════════════════════════════
   RECENT LINKS
═══════════════════════════════════════════════ */
function trackClick(title, url, icon) {
  recent = recent.filter(r => r.url !== url);
  recent.unshift({ title, url, icon });
  if (recent.length > 8) recent = recent.slice(0, 8);
  localStorage.setItem(LS.recent, JSON.stringify(recent));
}

function renderRecent() {
  if (!recent.length) return;
  document.getElementById('recentSection').style.display = 'block';
  const strip = document.getElementById('recentStrip');
  strip.innerHTML = recent.map(r =>
    `<a class="recent-chip" href="${r.url}" target="_blank" rel="noopener"
        onclick="trackClick(${JSON.stringify(r.title)},${JSON.stringify(r.url)},${JSON.stringify(r.icon)})">
      ${r.icon || '🔗'} ${r.title}
    </a>`
  ).join('');
}

/* ═══════════════════════════════════════════════
   CARD
═══════════════════════════════════════════════ */
function createCard(l) {
  const hl   = l.isHighlight ? ' hl' : '';
  const icon = l.icon || '🔗';
  const trackAttr = `onclick="trackClick(${JSON.stringify(l.title)},${JSON.stringify(l.url)},${JSON.stringify(icon)})"`;
  return `
  <div class="card${hl}">
    <a class="card-link" href="${l.url}" target="_blank" rel="noopener" ${trackAttr}>
      <div class="icon-box">${icon}</div>
      <div class="card-title">${l.title}</div>
      ${l.desc ? `<div class="card-desc">${l.desc}</div>` : ''}
    </a>
  </div>`;
}

/* ═══════════════════════════════════════════════
   CLOUD DATA
═══════════════════════════════════════════════ */
async function fetchCloud() {
  const pg = document.getElementById('primaryGrid');
  const sg = document.getElementById('secondaryGrid');

  // detect announcement rows (cat = "announce")
  let announcements = [];

  try {
    const r    = await fetch(SHEET + '&cb=' + Date.now());
    const text = await r.text();
    const rows = text.split(/\r?\n/).slice(1);

    pg.innerHTML = ''; sg.innerHTML = '';

    rows.forEach(row => {
      const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
                      .map(c => c.replace(/^"|"$/g,'').trim());
      if (cols.length < 2) return;
      const [cat, title, url, desc, icon] = cols;
      if (!title) return;

      if (cat.toLowerCase().includes('announce')) {
        announcements.push(title + (desc ? '　' + desc : ''));
        return;
      }
      if (!url) return;
      const card = createCard({ title, url, desc, icon, isHighlight: title.includes('重要') });
      if (cat.toLowerCase().includes('primary')) pg.innerHTML += card;
      else sg.innerHTML += card;
    });

  } catch(e) {
    pg.innerHTML = '<div class="empty">⚠️ 雲端連線失敗，顯示本機書籤</div>';
    sg.innerHTML = '';
  }

  // announcements
  if (announcements.length) {
    const b = document.getElementById('announceBanner');
    b.classList.add('show');
    document.getElementById('announceText').innerHTML = announcements.join('<br>');
  }

  // user links
  links.primary.forEach(l => {
    l.isHighlight = l.title.includes('重要');
    document.getElementById('primaryGrid').innerHTML += createCard(l);
  });
  links.secondary.forEach(l => {
    l.isHighlight = l.title.includes('重要');
    document.getElementById('secondaryGrid').innerHTML += createCard(l);
  });

  ['primaryGrid','secondaryGrid'].forEach(id => {
    const el = document.getElementById(id);
    if (!el.querySelector('.card')) el.innerHTML = '<div class="empty">尚無書籤</div>';
  });

  renderManage();
}

/* ═══════════════════════════════════════════════
   BOOKMARK CRUD
═══════════════════════════════════════════════ */
function saveLink() {
  const title = document.getElementById('lTitle').value.trim();
  const url   = document.getElementById('lUrl').value.trim();
  const desc  = document.getElementById('lDesc').value.trim();
  const cat   = document.getElementById('linkCat').value;
  if (!title || !url) { alert('請填寫名稱與網址'); return; }
  links[cat].push({ id:Date.now(), title, url, desc, icon:selIcon });
  localStorage.setItem(LS.links, JSON.stringify(links));
  location.reload();
}

function delLink(id) {
  if (!confirm('確定刪除？')) return;
  ['primary','secondary'].forEach(k => {
    links[k] = links[k].filter(x => x.id != id);
  });
  localStorage.setItem(LS.links, JSON.stringify(links));
  location.reload();
}

function renderManage() {
  const all = [...links.primary, ...links.secondary];
  const w   = document.getElementById('manageWrap');
  if (!all.length) { w.innerHTML = ''; return; }
  w.innerHTML = `
    <div class="pcard">
      <div class="pcard-title">📋 已儲存書籤（${all.length} 筆）</div>
      ${all.map(l => `
      <div class="mitem">
        <span>${l.icon} ${l.title}</span>
        <button class="del" onclick="delLink(${l.id})">刪除</button>
      </div>`).join('')}
    </div>`;
}

/* ═══════════════════════════════════════════════
   EMOJI PICKER
═══════════════════════════════════════════════ */
(function() {
  const w = document.getElementById('emojiPicker');
  EMOJIS.forEach(e => {
    const d = document.createElement('div');
    d.className = 'eopt' + (e === selIcon ? ' on' : '');
    d.textContent = e;
    d.onclick = () => {
      document.querySelectorAll('.eopt').forEach(x => x.classList.remove('on'));
      d.classList.add('on'); selIcon = e;
    };
    w.appendChild(d);
  });
})();

}

/* ═══════════════════════════════════════════════
   CLOCK
═══════════════════════════════════════════════ */
const WD = ['日','一','二','三','四','五','六'];
function tick() {
  const n = new Date();
  const h = String(n.getHours()).padStart(2,'0');
  const m = String(n.getMinutes()).padStart(2,'0');
  const s = String(n.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}:${s}`;
  const y  = n.getFullYear();
  const mo = String(n.getMonth()+1).padStart(2,'0');
  const d  = String(n.getDate()).padStart(2,'0');
  document.getElementById('date').textContent = `民國 ${y-1911} 年 ${y}/${mo}/${d}（週${WD[n.getDay()]}）`;
}

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {

  // theme
  const th = localStorage.getItem(LS.theme);
  if (th) {
    document.documentElement.setAttribute('data-theme', th);
    document.getElementById('themeBtn').textContent = th === 'light' ? '🌙' : '☀️';
  }

  // color
  setColor(localStorage.getItem(LS.color) || 'slate');

  // cfg
  restoreCfg();

  // memo
  const memo = localStorage.getItem(LS.memo);
  if (memo) document.getElementById('memoText').value = memo;

  // clock
  tick(); setInterval(tick, 1000);

  // recent
  renderRecent();

  // tasks (silent check)
  silentCheckTasks();

  // data
  fetchCloud();
});

/* ═══════════════════════════════════════════════
   TASK SYSTEM — 讀取 Google Sheet 任務分頁
   Sheet 欄位（第2列起）：
   A=任務名稱  B=圖示  C=頻率說明  D=到期日(yyyy/MM/dd)  E=最近完成日期  F=備註
═══════════════════════════════════════════════ */

const TASK_SHEET_URL = 'https://docs.google.com/spreadsheets/d/1uYBA_CncbEAydmzNC1SRnsKJdswNgQh3zg1x6TKo0UU/export?format=csv&gid=646869954';
const TASK_EDIT_URL  = 'https://docs.google.com/spreadsheets/d/1uYBA_CncbEAydmzNC1SRnsKJdswNgQh3zg1x6TKo0UU/edit#gid=646869954';

let cachedTasks = [];

function openTaskPanel() {
  document.getElementById('taskPanel').classList.add('show');
  if (!cachedTasks.length) loadTasks();
}
function closeTaskPanel() {
  document.getElementById('taskPanel').classList.remove('show');
}

async function loadTasks() {
  document.getElementById('taskBody').innerHTML = '<div class="tp-loading">⏳ 載入中…</div>';
  try {
    const r    = await fetch(TASK_SHEET_URL + '&cb=' + Date.now());
    const text = await r.text();
    const rows = text.split(/\r?\n/).slice(1); // 跳過標題列

    cachedTasks = rows.map(row => {
      const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
                      .map(c => c.replace(/^"|"$/g,'').trim());
      if (!cols[0]) return null;
      return {
        name:     cols[0] || '',
        icon:     cols[1] || '📋',
        freq:     cols[2] || '',   // 頻率說明（純文字，例如「每週一」）
        dueDate:  cols[3] || '',   // 下次到期日 yyyy/MM/dd 或 民國格式
        lastDone: cols[4] || '',   // 最近完成日期
        note:     cols[5] || '',
      };
    }).filter(Boolean);

    renderTasks();
  } catch(e) {
    document.getElementById('taskBody').innerHTML =
      '<div class="tp-loading">⚠️ 無法讀取任務資料<br><small>請確認 Sheet 已公開分享</small></div>';
  }
}

function parseDate(str) {
  if (!str) return null;
  str = str.trim();
  // 支援 yyyy/MM/dd 或 yyyy-MM-dd
  const m = str.match(/(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  // 支援民國 115/06/01
  const roc = str.match(/(\d{2,3})[\/-](\d{1,2})[\/-](\d{1,2})/);
  if (roc) return new Date(+roc[1]+1911, +roc[2]-1, +roc[3]);
  return null;
}

function calcStatus(task) {
  const today   = new Date(); today.setHours(0,0,0,0);
  const dueDate = parseDate(task.dueDate);
  if (!dueDate) return { label:'─', cls:'ok', daysLeft:999 };

  const daysLeft = Math.ceil((dueDate - today) / 86400000);
  if (daysLeft < 0)   return { label:`逾期 ${Math.abs(daysLeft)} 天`, cls:'overdue', daysLeft };
  if (daysLeft === 0) return { label:'今天到期！',                     cls:'soon',    daysLeft };
  if (daysLeft <= 3)  return { label:`還剩 ${daysLeft} 天`,            cls:'soon',    daysLeft };
  return                     { label:`還剩 ${daysLeft} 天`,            cls:'ok',      daysLeft };
}

function renderTasks() {
  const body = document.getElementById('taskBody');
  if (!cachedTasks.length) {
    body.innerHTML = '<div class="tp-loading">Sheet 裡沒有任務資料</div>';
    return;
  }

  // 排序：逾期 > 快到期 > 正常
  const sorted = [...cachedTasks].sort((a,b) => {
    return calcStatus(a).daysLeft - calcStatus(b).daysLeft;
  });

  let overdueCount = 0;
  let out = '';

  sorted.forEach(t => {
    const st     = calcStatus(t);
    if (st.cls === 'overdue') overdueCount++;

    const itemCls = st.cls === 'overdue' ? 'task-item overdue'
                  : st.cls === 'soon'    ? 'task-item due-soon'
                  : 'task-item';

    out += `
    <div class="${itemCls}">
      <div class="task-icon">${t.icon}</div>
      <div class="task-info">
        <div class="task-name">${t.name}</div>
        <div class="task-meta">
          ${t.freq ? `🔁 ${t.freq}` : ''}
          ${t.dueDate  ? `　📅 到期：${t.dueDate}`  : ''}
          ${t.lastDone ? `　✓ 完成：${t.lastDone}` : ''}
          ${t.note     ? `<br>💬 ${t.note}` : ''}
        </div>
        <span class="task-badge ${st.cls}">${st.label}</span>
        <a class="task-edit-link" href="${TASK_EDIT_URL}" target="_blank" rel="noopener">
          → 至 Sheet 更新完成日期
        </a>
      </div>
    </div>`;
  });

  body.innerHTML = out;
  updateOverdueBadge(overdueCount);
}

function updateOverdueBadge(count) {
  const badge = document.getElementById('taskBadge');
  const ctrl  = document.getElementById('taskCtrl');
  if (count > 0) {
    badge.classList.add('show');
    document.getElementById('taskBadgeText').textContent =
      `有 ${count} 個任務逾期！點此查看`;
    ctrl.style.background   = '#FEE2E2';
    ctrl.style.borderColor  = '#C0392B';
    ctrl.textContent        = '🔴';
  } else {
    badge.classList.remove('show');
    ctrl.style.background  = '';
    ctrl.style.borderColor = '';
    ctrl.textContent       = '📋';
  }
}

// 頁面載入時靜默檢查逾期
async function silentCheckTasks() {
  try {
    const r    = await fetch(TASK_SHEET_URL + '&cb=' + Date.now());
    const text = await r.text();
    const rows = text.split(/\r?\n/).slice(1);
    cachedTasks = rows.map(row => {
      const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
                      .map(c => c.replace(/^"|"$/g,'').trim());
      if (!cols[0]) return null;
      return { name:cols[0], icon:cols[1]||'📋', freq:cols[2]||'', dueDate:cols[3]||'', lastDone:cols[4]||'', note:cols[5]||'' };
    }).filter(Boolean);
    const overdueCount = cachedTasks.filter(t => calcStatus(t).cls === 'overdue').length;
    updateOverdueBadge(overdueCount);
  } catch(e) { /* 靜默失敗 */ }
}

</script>
