<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eGFR 計算工具 | 中正診所</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="light"] {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --accent-primary: #0ea5e9; 
            --accent-secondary: #10b981; 
            --text-main: #0f172a;     
            --text-sub: #475569;      
            --border-color: #e2e8f0;
            --stage-bg: #f0f9ff;
        }
        :root[data-theme="dark"] {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-primary: #38bdf8;
            --accent-secondary: #34d399;
            --text-main: #ffffff;
            --text-sub: #cbd5e1;
            --border-color: #334155;
            --stage-bg: #0c4a6e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            min-height: 100vh; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: "Inter", "Microsoft JhengHei", sans-serif; 
            display: flex; flex-direction: column; align-items: center; padding: 40px 20px; transition: 0.3s;
        }

        .container { width: 100%; max-width: 600px; flex: 1; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 36px; font-weight: 900; color: var(--accent-primary); margin-bottom: 10px; }

        .card { background: var(--card-bg); border-radius: 24px; padding: 30px; border: 2px solid var(--border-color); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }

        .input-group { margin-bottom: 20px; }
        .label { display: block; font-size: 18px; font-weight: 900; margin-bottom: 8px; color: var(--text-main); }
        .input-field { width: 100%; padding: 12px; font-size: 20px; border-radius: 12px; border: 2px solid var(--border-color); background: var(--bg-color); color: var(--text-main); outline: none; }

        .radio-container { display: flex; gap: 15px; }
        .radio-option { flex: 1; }
        .radio-option input { display: none; }
        .radio-label { display: block; padding: 12px; text-align: center; background: var(--bg-color); border: 2px solid var(--border-color); border-radius: 12px; cursor: pointer; font-weight: 900; }
        .radio-option input:checked + .radio-label { background: var(--accent-primary); color: white; border-color: var(--accent-primary); }

        .calc-btn { width: 100%; padding: 18px; font-size: 22px; font-weight: 900; color: white; background: var(--accent-secondary); border: none; border-radius: 12px; cursor: pointer; transition: 0.3s; margin-top: 10px; }

        .result-box { display: none; margin-top: 25px; padding: 20px; border-radius: 20px; background: var(--stage-bg); border: 2px solid var(--accent-primary); }
        .result-value { font-size: 45px; font-weight: 900; color: var(--accent-primary); text-align: center; }
        .stage-title { font-size: 22px; font-weight: 900; color: #ef4444; margin: 10px 0; text-align: center; }
        .stage-desc { font-size: 15px; line-height: 1.5; color: var(--text-sub); text-align: justify; font-weight: 600; }

        .theme-toggle { margin-top: 25px; background: none; border: 1px solid var(--text-sub); color: var(--text-sub); padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: 700; }
        .footer { margin-top: 40px; padding: 20px 0; text-align: center; font-size: 15px; font-weight: 800; color: var(--text-sub); }
        .footer span { color: var(--accent-primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>eGFR 計算器</h1>
        <p style="color:var(--text-sub); font-weight:bold;">2021 CKD-EPI (Creatinine)</p>
    </div>

    <div class="card">
        <div class="input-group">
            <label class="label">血清肌酸酐 (Scr) mg/dL</label>
            <input type="number" id="scr" class="input-field" placeholder="例如: 1.2" step="0.01" inputmode="decimal">
        </div>
        <div class="input-group">
            <label class="label">年齡 Age</label>
            <input type="number" id="age" class="input-field" placeholder="輸入歲數" inputmode="numeric">
        </div>
        <div class="input-group">
            <label class="label">性別</label>
            <div class="radio-container">
                <div class="radio-option">
                    <input type="radio" name="gender" id="male" value="male" checked>
                    <label for="male" class="radio-label">男性</label>
                </div>
                <div class="radio-option">
                    <input type="radio" name="gender" id="female" value="female">
                    <label for="female" class="radio-label">女性</label>
                </div>
            </div>
        </div>

        <button class="calc-btn" onclick="calculate()">觀看計算結果</button>

        <div id="resultBox" class="result-box">
            <div style="text-align:center; color:var(--text-sub); font-size:14px;">您的 eGFR 為：</div>
            <div class="result-value"><span id="egfrVal">--</span> <small style="font-size:16px;">ml/min/1.73m²</small></div>
            <div class="stage-title" id="stageTitle"></div>
            <div class="stage-desc" id="stageDesc"></div>
        </div>
    </div>

    <center><button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 切換模式</button></center>
</div>

<footer class="footer">Made with ✨ by <span>中正小幫手</span></footer>

<script>
    const stages = [
        { min: 90, title: "第一期：腎功能正常", desc: "腎功能正常，但可能有蛋白尿、血尿等腎臟損傷證據。建議積極控制血糖與血壓，維持良好生活習慣。" },
        { min: 60, title: "第二期：輕度腎功能受損", desc: "腎功能輕微下降，合併有蛋白尿、血尿等。應定期追蹤腎功能，注意飲食，避免服用不明藥物或止痛藥。" },
        { min: 45, title: "第三期A：中度腎功能受損", desc: "腎功能顯著下降。應開始限制磷、鈉的攝取，嚴格監控血壓血糖，並每 3-6 個月回診檢查。" },
        { min: 30, title: "第三期B：中度腎功能嚴重受損", desc: "腎功能持續惡化。必須接受低蛋白飲食治療，預防貧血與骨病變等併發症，並由專科醫師持續追蹤。" },
        { min: 15, title: "第四期：重度腎臟病變", desc: "腎功能重度衰竭。腎臟無法有效排除代謝廢物，需嚴格限制飲食，並由醫師評估開始準備透析治療的血管通路。" },
        { min: 0,  title: "第五期：末期腎臟病變", desc: "腎臟功能剩正常人 15% 以下，逐漸無法排除廢物與水分，必須準備接受透析治療（洗腎）或腎臟移植。" }
    ];

    function calculate() {
        const scrVal = document.getElementById('scr').value;
        const ageVal = document.getElementById('age').value;

        if (!scrVal || !ageVal) { 
            alert("請輸入肌酸酐與年齡"); 
            return; 
        }

        const scr = parseFloat(scrVal);
        const age = parseFloat(ageVal);
        const isFemale = document.getElementById('female').checked;

        // 2021 CKD-EPI 公式參數
        const k = isFemale ? 0.7 : 0.9;
        const alpha = isFemale ? -0.241 : -0.302;
        const genderFactor = isFemale ? 1.012 : 1.0;
        const scrK = scr / k;
        
        const val = 142 * Math.pow(Math.min(scrK, 1), alpha) * Math.pow(Math.max(scrK, 1), -1.200) * Math.pow(0.9938, age) * genderFactor;

        // 更新 UI
        document.getElementById('egfrVal').innerText = val.toFixed(2);
        
        const info = stages.find(s => val >= s.min);
        document.getElementById('stageTitle').innerText = info.title;
        document.getElementById('stageDesc').innerText = info.desc;
        
        // 顯示結果盒
        const rb = document.getElementById('resultBox');
        rb.style.display = 'block';

        // 確保結果顯示後再捲動
        setTimeout(() => {
            rb.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 100);
    }

    function toggleTheme() {
        const doc = document.documentElement;
        const next = doc.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        doc.setAttribute('data-theme', next);
        document.getElementById('themeBtn').innerText = next === 'light' ? '🌙 切換模式' : '☀️ 切換模式';
    }
</script>
</body>
</html>
