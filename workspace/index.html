<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>中正診所 Portal</title>

<meta
name="robots"
content="noindex,nofollow,noarchive,nosnippet,noimageindex">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cinzel:wght@500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{

    min-height:100%;

    overflow-x:hidden;

    background:
    linear-gradient(
    180deg,
    #060816,
    #0c1224
    );

    color:white;

    font-family:
    "Inter",
    sans-serif;
}

/* =========================
   慕夏邊框
========================= */

.mucha-frame{

    position:fixed;

    inset:14px;

    pointer-events:none;

    z-index:9999;

    border:
    1px solid
    rgba(214,190,255,.14);

    border-radius:34px;

    box-shadow:

    inset 0 0 0 1px
    rgba(255,255,255,.03),

    0 0 40px
    rgba(139,92,246,.06);
}

.mucha-frame::before{

    content:"";

    position:absolute;

    inset:12px;

    border:
    1px solid
    rgba(214,190,255,.08);

    border-radius:26px;
}

.corner{

    position:absolute;

    width:90px;
    height:90px;

    border:
    1px solid
    rgba(214,190,255,.12);
}

.corner::before{

    content:"";

    position:absolute;

    inset:10px;

    border:
    1px solid
    rgba(214,190,255,.08);

    border-radius:50%;
}

.tl{
    top:-1px;
    left:-1px;
    border-right:none;
    border-bottom:none;
    border-radius:34px 0 0 0;
}

.tr{
    top:-1px;
    right:-1px;
    border-left:none;
    border-bottom:none;
    border-radius:0 34px 0 0;
}

.bl{
    bottom:-1px;
    left:-1px;
    border-right:none;
    border-top:none;
    border-radius:0 0 0 34px;
}

.br{
    bottom:-1px;
    right:-1px;
    border-left:none;
    border-top:none;
    border-radius:0 0 34px 0;
}

/* 星空 */

.stars{

    position:fixed;

    inset:0;

    z-index:-1;
}

.star{

    position:absolute;

    width:2px;
    height:2px;

    background:white;

    border-radius:50%;

    opacity:.4;

    animation:twinkle 5s infinite;
}

@keyframes twinkle{

    0%{
        opacity:.1;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:.1;
    }
}

/* Main */

.main{

    width:100%;

    max-width:1450px;

    margin:auto;

    padding:
    68px 28px 50px;
}

/* Header */

.header{

    display:flex;

    flex-direction:column;

    align-items:flex-start;

    gap:24px;

    margin-bottom:56px;
}

/* Title */

.title{

    line-height:1;
}

.title-main{

    font-size:
    clamp(62px,12vw,110px);

    font-weight:700;

    letter-spacing:2px;
}

.title-sub{

    display:block;

    margin-top:6px;

    font-family:
    "Cinzel",
    serif;

    font-size:
    clamp(42px,8vw,72px);

    letter-spacing:6px;

    color:
    rgba(226,215,255,.92);
}

/* Subtitle */

.subtitle{

    max-width:720px;

    color:
    rgba(226,232,240,.74);

    line-height:1.9;

    font-size:
    clamp(18px,2.6vw,28px);
}

/* 時間 */

.clock{

    font-size:
    clamp(72px,16vw,128px);

    font-weight:800;

    line-height:1;

    letter-spacing:-4px;
}

.date{

    margin-top:14px;

    color:
    rgba(226,232,240,.62);

    font-size:
    clamp(18px,2.6vw,26px);
}

/* 齒輪 */

.admin-btn{

    position:fixed;

    top:28px;
    right:28px;

    width:72px;
    height:72px;

    border:none;

    border-radius:24px;

    cursor:pointer;

    font-size:32px;

    color:white;

    z-index:999;

    background:

    linear-gradient(
    135deg,
    rgba(139,92,246,.28),
    rgba(91,33,182,.16)
    );

    border:
    1px solid
    rgba(214,190,255,.16);

    backdrop-filter:blur(18px);
}

/* Grid */

.grid{

    display:grid;

    grid-template-columns:
    repeat(
        auto-fit,
        minmax(340px,1fr)
    );

    gap:34px;
}

/* Card */

.card{

    position:relative;

    min-height:340px;

    border-radius:34px;

    overflow:hidden;

    background:

    linear-gradient(
    180deg,
    rgba(16,22,40,.88),
    rgba(9,14,28,.96)
    );

    border:
    1px solid
    rgba(214,190,255,.08);

    transition:.35s;
}

.card:hover{

    transform:
    translateY(-10px);
}

.card-link{

    display:block;

    height:100%;

    padding:34px;

    color:white;

    text-decoration:none;
}

.card-top{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:26px;
}

.icon{

    width:74px;
    height:74px;

    border-radius:24px;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:34px;

    background:

    linear-gradient(
    135deg,
    rgba(139,92,246,.22),
    rgba(91,33,182,.10)
    );

    border:
    1px solid
    rgba(214,190,255,.16);
}

.tag{

    color:#d7c5ff;

    font-size:15px;
}

.card-title{

    font-size:46px;

    font-weight:800;

    margin-bottom:18px;
}

.card-url{

    color:
    rgba(226,232,240,.46);

    font-size:13px;

    margin-bottom:24px;

    word-break:break-all;
}

.card-desc{

    color:
    rgba(226,232,240,.84);

    line-height:1.9;

    font-size:18px;
}

.open{

    position:absolute;

    left:34px;
    bottom:28px;

    color:#bb9cff;

    letter-spacing:4px;

    font-size:15px;
}

/* Admin */

.admin-panel{

    position:fixed;

    top:0;
    right:-460px;

    width:460px;

    height:100vh;

    background:
    rgba(8,12,24,.98);

    border-left:
    1px solid
    rgba(214,190,255,.10);

    padding:30px;

    overflow-y:auto;

    transition:.35s;

    z-index:99999;
}

.admin-panel.show{

    right:0;
}

.admin-header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:30px;
}

.admin-title{

    font-size:34px;

    font-weight:700;
}

.close-btn{

    width:46px;
    height:46px;

    border:none;

    border-radius:16px;

    cursor:pointer;

    color:white;

    background:
    rgba(255,255,255,.08);

    font-size:18px;
}

/* 表單 */

.form-group{

    margin-bottom:20px;
}

.label{

    display:block;

    margin-bottom:10px;

    font-size:15px;

    color:#e2e8f0;
}

.input{

    width:100%;

    height:58px;

    border:none;

    outline:none;

    border-radius:18px;

    background:
    rgba(255,255,255,.05);

    color:white;

    padding:0 18px;

    font-size:16px;
}

/* icon 選擇 */

.icon-picker{

    display:flex;

    flex-wrap:wrap;

    gap:12px;

    margin-top:10px;
}

.icon-option{

    width:54px;
    height:54px;

    border-radius:16px;

    display:flex;

    align-items:center;

    justify-content:center;

    cursor:pointer;

    font-size:26px;

    background:
    rgba(255,255,255,.05);

    border:
    1px solid transparent;

    transition:.25s;
}

.icon-option.active{

    border:
    1px solid #9b6dff;

    background:
    rgba(139,92,246,.22);
}

/* 按鈕 */

.button{

    width:100%;

    height:58px;

    border:none;

    border-radius:18px;

    cursor:pointer;

    color:white;

    font-size:16px;

    font-weight:700;

    margin-top:14px;
}

.add-btn{

    background:

    linear-gradient(
    90deg,
    #9b6dff,
    #7c3aed
    );
}

.download-btn{

    background:

    linear-gradient(
    90deg,
    #2563eb,
    #1d4ed8
    );
}

/* 書籤列表 */

.bookmark-list{

    margin-top:34px;
}

.bookmark-item{

    padding:18px;

    border-radius:20px;

    background:
    rgba(255,255,255,.04);

    margin-bottom:14px;
}

.bookmark-top{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:10px;
}

.bookmark-title{

    font-size:18px;

    font-weight:700;
}

.bookmark-url{

    font-size:12px;

    color:
    rgba(226,232,240,.54);

    word-break:break-all;

    margin-bottom:14px;
}

.bookmark-actions{

    display:flex;

    gap:10px;
}

.small-btn{

    flex:1;

    height:42px;

    border:none;

    border-radius:12px;

    cursor:pointer;

    color:white;

    font-size:14px;

    font-weight:600;
}

.edit-small{

    background:
    rgba(139,92,246,.24);
}

.delete-small{

    background:
    rgba(255,80,80,.18);
}

/* 手機 */

@media(max-width:900px){

    .main{

        padding:
        56px 22px 40px;
    }

    .admin-panel{

        width:100%;

        right:-100%;
    }

    .card-title{

        font-size:40px;
    }
}

</style>
</head>

<body>

<!-- 邊框 -->

<div class="mucha-frame">

    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

</div>

<!-- 星空 -->

<div class="stars" id="stars"></div>

<!-- 齒輪 -->

<button
class="admin-btn"
onclick="openAdmin()">

⚙️

</button>

<!-- Main -->

<div class="main">

    <div class="header">

        <div class="title">

            <div class="title-main">
                中正診所
            </div>

            <span class="title-sub">
                PORTAL
            </span>

        </div>

        <div class="subtitle">

            集中所有工作入口與常用網站，
            <br>
            讓每天工作更快速順手。

        </div>

        <div>

            <div
            class="clock"
            id="clock">

                --:--:--

            </div>

            <div
            class="date"
            id="date">

            </div>

        </div>

    </div>

    <!-- cards -->

    <div
    class="grid"
    id="grid">

    </div>

</div>

<!-- Admin -->

<div
class="admin-panel"
id="adminPanel">

    <div class="admin-header">

        <div class="admin-title">
            管理模式
        </div>

        <button
        class="close-btn"
        onclick="closeAdmin()">

            ✕

        </button>

    </div>

    <!-- 標題 -->

    <div class="form-group">

        <label class="label">
            標題
        </label>

        <input
        id="title"
        class="input"
        placeholder="例如：健保 VPN">

    </div>

    <!-- 網址 -->

    <div class="form-group">

        <label class="label">
            網址
        </label>

        <input
        id="url"
        class="input"
        placeholder="https://...">

    </div>

    <!-- icon -->

    <div class="form-group">

        <label class="label">
            選擇圖示
        </label>

        <div
        class="icon-picker"
        id="iconPicker">

        </div>

    </div>

    <!-- 按鈕 -->

    <button
    class="button add-btn"
    onclick="addWebsite()">

        新增 / 修改網站

    </button>

    <button
    class="button download-btn"
    onclick="downloadJSON()">

        下載 data.json

    </button>

    <!-- 書籤列表 -->

    <div class="bookmark-list">

        <div
        style="
        font-size:22px;
        font-weight:700;
        margin-bottom:18px;
        ">

            目前書籤

        </div>

        <div id="bookmarkList"></div>

    </div>

</div>

<script>

/* 星空 */

const stars =
document.getElementById("stars");

for(let i=0;i<140;i++){

    const star =
    document.createElement("div");

    star.className = "star";

    star.style.left =
    Math.random()*100 + "%";

    star.style.top =
    Math.random()*100 + "%";

    star.style.animationDelay =
    Math.random()*5 + "s";

    stars.appendChild(star);
}

/* 時間 */

function updateClock(){

    const now =
    new Date();

    document
    .getElementById("clock")
    .innerText =

    now.toLocaleTimeString(
    "zh-TW",
    {
        hour:"2-digit",
        minute:"2-digit",
        second:"2-digit"
    });

    document
    .getElementById("date")
    .innerText =

    now.toLocaleDateString(
    "zh-TW",
    {
        year:"numeric",
        month:"long",
        day:"numeric",
        weekday:"long"
    });
}

updateClock();

setInterval(
updateClock,
1000
);

/* 密碼 */

const PASSWORD =
"720750";

/* 狀態 */

let editingIndex = null;

let selectedIcon = "✨";

/* icon */

const icons = [

    "🩺",
    "💊",
    "🌐",
    "📄",
    "🧾",
    "📊",
    "💉",
    "🧠",
    "🖥️",
    "📅",
    "🔒",
    "✨"

];

/* data */

let websites = [

    {
        title:"健保 VPN",
        url:"https://www.nhi.gov.tw/",
        icon:"🩺",
        tag:"VPN",
        description:"健保相關入口網站"
    },

    {
        title:"nIIS 系統",
        url:"https://medvpn.mohw.gov.tw/",
        icon:"🌐",
        tag:"nIIS",
        description:"疫苗與醫療資訊系統"
    },

    {
        title:"慢箋計算",
        url:"https://google.com",
        icon:"💊",
        tag:"TOOL",
        description:"慢性處方箋天數計算工具"
    }

];

/* render icon picker */

const iconPicker =
document.getElementById("iconPicker");

function renderIcons(){

    iconPicker.innerHTML = "";

    icons.forEach(icon=>{

        const div =
        document.createElement("div");

        div.className =
        "icon-option";

        if(icon === selectedIcon){

            div.classList.add("active");
        }

        div.innerText =
        icon;

        div.onclick = ()=>{

            selectedIcon =
            icon;

            renderIcons();
        };

        iconPicker.appendChild(div);
    });
}

renderIcons();

/* render cards */

const grid =
document.getElementById("grid");

function renderCards(){

    grid.innerHTML = "";

    websites.forEach(item=>{

        const card =
        document.createElement("div");

        card.className =
        "card";

        card.innerHTML =

        `
        <a
        class="card-link"
        href="${item.url}"
        target="_blank">

            <div class="card-top">

                <div class="icon">
                    ${item.icon}
                </div>

                <div class="tag">
                    ${item.tag}
                </div>

            </div>

            <div class="card-title">
                ${item.title}
            </div>

            <div class="card-url">
                ${item.url}
            </div>

            <div class="card-desc">
                ${item.description}
            </div>

            <div class="open">
                OPEN →
            </div>

        </a>
        `;

        grid.appendChild(card);
    });
}

renderCards();

/* render bookmark list */

function renderBookmarkList(){

    const list =
    document.getElementById("bookmarkList");

    list.innerHTML = "";

    websites.forEach((item,index)=>{

        const div =
        document.createElement("div");

        div.className =
        "bookmark-item";

        div.innerHTML =

        `
        <div class="bookmark-top">

            <div class="bookmark-title">

                ${item.icon}
                ${item.title}

            </div>

        </div>

        <div class="bookmark-url">

            ${item.url}

        </div>

        <div class="bookmark-actions">

            <button
            class="small-btn edit-small"
            onclick="editWebsite(${index})">

                修改

            </button>

            <button
            class="small-btn delete-small"
            onclick="deleteWebsite(${index})">

                刪除

            </button>

        </div>
        `;

        list.appendChild(div);
    });
}

renderBookmarkList();

/* open admin */

function openAdmin(){

    const pass =
    prompt("請輸入管理密碼");

    if(pass !== PASSWORD){

        alert("密碼錯誤");

        return;
    }

    document
    .getElementById("adminPanel")
    .classList
    .add("show");
}

/* close admin */

function closeAdmin(){

    document
    .getElementById("adminPanel")
    .classList
    .remove("show");
}

/* add / edit */

function addWebsite(){

    const title =
    document
    .getElementById("title")
    .value
    .trim();

    const url =
    document
    .getElementById("url")
    .value
    .trim();

    if(!title || !url){

        alert("請輸入標題與網址");

        return;
    }

    if(editingIndex !== null){

        websites[editingIndex].title =
        title;

        websites[editingIndex].url =
        url;

        websites[editingIndex].icon =
        selectedIcon;

        editingIndex = null;

        alert("已修改 ✨");
    }

    else{

        websites.push({

            title:title,
            url:url,
            icon:selectedIcon,
            tag:"LINK",
            description:"自訂網站入口"

        });

        alert("已新增 ✨");
    }

    document
    .getElementById("title")
    .value = "";

    document
    .getElementById("url")
    .value = "";

    selectedIcon = "✨";

    renderIcons();

    renderCards();

    renderBookmarkList();
}

/* edit */

function editWebsite(index){

    const item =
    websites[index];

    document
    .getElementById("title")
    .value =
    item.title;

    document
    .getElementById("url")
    .value =
    item.url;

    selectedIcon =
    item.icon;

    editingIndex =
    index;

    renderIcons();

    window.scrollTo({
        top:0,
        behavior:"smooth"
    });
}

/* delete */

function deleteWebsite(index){

    const yes =
    confirm("確定刪除？");

    if(!yes){

        return;
    }

    websites.splice(index,1);

    renderCards();

    renderBookmarkList();

    alert("已刪除");
}

/* json */

function downloadJSON(){

    const json =
    JSON.stringify(
    websites,
    null,
    2
    );

    const blob =
    new Blob(
    [json],
    {
        type:"application/json"
    });

    const url =
    URL.createObjectURL(blob);

    const a =
    document.createElement("a");

    a.href = url;

    a.download = "data.json";

    a.click();

    URL.revokeObjectURL(url);
}

</script>

</body>
</html>
