<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>中正診所 Portal</title>

<!-- 防搜尋 -->

<meta
name="robots"
content="noindex,nofollow,noarchive,nosnippet,noimageindex">

<meta
name="googlebot"
content="noindex,nofollow,noarchive,nosnippet,noimageindex">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cinzel:wght@500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg1:#0f172a;
    --bg2:#111827;
    --bg3:#1e293b;

    --card:
    rgba(20,27,45,.72);

    --border:
    rgba(255,255,255,.08);

    --text:#f8fafc;

    --muted:#94a3b8;

    --accent:#8b5cf6;

    --glow:
    rgba(139,92,246,.35);
}

body{

    background:
    radial-gradient(
    circle at top,
    rgba(139,92,246,.15),
    transparent 30%
    ),

    linear-gradient(
    180deg,
    var(--bg1),
    var(--bg2),
    var(--bg3)
    );

    min-height:100vh;

    color:var(--text);

    font-family:
    "Inter",
    sans-serif;

    overflow:hidden;
}

/* 星空 */

.stars{

    position:fixed;

    inset:0;

    overflow:hidden;

    z-index:-2;
}

.star{

    position:absolute;

    width:2px;
    height:2px;

    background:white;

    border-radius:50%;

    opacity:.5;

    animation:twinkle 4s infinite;
}

@keyframes twinkle{

    0%{
        opacity:.1;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:.1;
    }
}

/* Layout */

.layout{

    display:flex;

    height:100vh;
}

/* Sidebar */

.sidebar{

    width:280px;

    background:
    rgba(10,15,30,.72);

    border-right:
    1px solid var(--border);

    backdrop-filter:blur(18px);

    padding:28px;

    display:flex;

    flex-direction:column;
}

.logo{

    margin-bottom:40px;
}

.logo-title{

    font-family:
    "Cinzel",
    serif;

    font-size:28px;

    line-height:1.3;

    background:
    linear-gradient(
        180deg,
        #ffffff,
        #c4b5fd
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.logo-sub{

    margin-top:10px;

    color:var(--muted);

    font-size:14px;

    line-height:1.7;
}

/* 搜尋 */

.search-box{

    margin-bottom:30px;
}

.search{

    width:100%;

    height:50px;

    border:none;

    outline:none;

    border-radius:16px;

    background:
    rgba(255,255,255,.05);

    color:white;

    padding:0 18px;

    font-size:15px;
}

/* Menu */

.menu{

    display:flex;

    flex-direction:column;

    gap:10px;
}

.menu-item{

    padding:14px 16px;

    border-radius:14px;

    color:#dbe4ff;

    cursor:pointer;

    transition:.25s;

    font-size:15px;
}

.menu-item:hover{

    background:
    rgba(139,92,246,.15);

    color:white;
}

.menu-item.active{

    background:
    rgba(139,92,246,.18);

    border:
    1px solid rgba(139,92,246,.3);
}

/* Main */

.main{

    flex:1;

    overflow-y:auto;

    padding:36px;
}

/* Header */

.header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:30px;
}

.header-title{

    font-size:34px;

    font-weight:700;
}

.header-sub{

    margin-top:8px;

    color:var(--muted);

    font-size:15px;
}

.time{

    text-align:right;
}

.time-clock{

    font-size:28px;

    font-weight:600;
}

.time-date{

    color:var(--muted);

    margin-top:6px;
}

/* Grid */

.grid{

    display:grid;

    grid-template-columns:
    repeat(
        auto-fill,
        minmax(320px,1fr)
    );

    gap:22px;
}

/* Card */

.card{

    background:
    var(--card);

    border:
    1px solid var(--border);

    border-radius:24px;

    padding:24px;

    backdrop-filter:blur(18px);

    transition:.3s;

    position:relative;

    overflow:hidden;

    text-decoration:none;

    color:white;
}

.card:hover{

    transform:
    translateY(-6px);

    border:
    1px solid rgba(139,92,246,.35);

    box-shadow:
    0 15px 40px var(--glow);
}

.card::before{

    content:"";

    position:absolute;

    inset:0;

    background:
    radial-gradient(
    circle at top right,
    rgba(255,255,255,.06),
    transparent 45%
    );

    pointer-events:none;
}

.card-top{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:20px;
}

.icon{

    width:52px;
    height:52px;

    border-radius:16px;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:24px;

    background:
    rgba(139,92,246,.15);

    border:
    1px solid rgba(139,92,246,.25);
}

.category{

    font-size:13px;

    color:#c4b5fd;

    letter-spacing:1px;
}

.card-title{

    font-size:24px;

    font-weight:700;

    margin-bottom:10px;
}

.card-url{

    font-size:13px;

    color:var(--muted);

    word-break:break-all;

    margin-bottom:16px;

    line-height:1.6;
}

.card-desc{

    color:#cbd5e1;

    line-height:1.8;

    font-size:15px;

    min-height:60px;
}

.open{

    margin-top:24px;

    color:#a78bfa;

    font-size:14px;

    letter-spacing:1px;
}

/* 滾動條 */

::-webkit-scrollbar{
    width:10px;
}

::-webkit-scrollbar-thumb{

    background:
    rgba(255,255,255,.12);

    border-radius:20px;
}

@media(max-width:1000px){

    .sidebar{
        display:none;
    }

    .main{
        padding:24px;
    }
}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="layout">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">

            <div class="logo-title">
                中正診所
                <br>
                Portal
            </div>

            <div class="logo-sub">
                Clinic Workspace System
            </div>

        </div>

        <div class="search-box">

            <input
            id="search"
            class="search"
            placeholder="搜尋網站...">

        </div>

        <div class="menu">

            <div class="menu-item active">
                ✦ 全部工具
            </div>

            <div class="menu-item">
                🩺 醫療系統
            </div>

            <div class="menu-item">
                📅 排班
            </div>

            <div class="menu-item">
                🧾 行政
            </div>

            <div class="menu-item">
                🌐 外部網站
            </div>

        </div>

    </aside>

    <!-- Main -->

    <main class="main">

        <div class="header">

            <div>

                <div class="header-title">
                    中正診所 Portal
                </div>

                <div class="header-sub">
                    常用工作網站與系統入口
                </div>

            </div>

            <div class="time">

                <div
                class="time-clock"
                id="clock">
                    --:--
                </div>

                <div
                class="time-date"
                id="date">
                </div>

            </div>

        </div>

        <!-- 卡片區 -->

        <div
        class="grid"
        id="grid">

        </div>

    </main>

</div>

<script>

/* 星空 */

const stars =
document.getElementById("stars");

for(let i=0;i<120;i++){

    const star =
    document.createElement("div");

    star.className = "star";

    star.style.left =
    Math.random()*100 + "%";

    star.style.top =
    Math.random()*100 + "%";

    star.style.animationDelay =
    Math.random()*4 + "s";

    stars.appendChild(star);
}

/* 時間 */

function updateClock(){

    const now =
    new Date();

    document
    .getElementById("clock")
    .innerText =

    now.toLocaleTimeString(
    "zh-TW",
    {
        hour:"2-digit",
        minute:"2-digit"
    });

    document
    .getElementById("date")
    .innerText =

    now.toLocaleDateString(
    "zh-TW",
    {
        year:"numeric",
        month:"long",
        day:"numeric",
        weekday:"long"
    });
}

updateClock();

setInterval(
updateClock,
1000
);

/* ===== 模擬資料 ===== */
/* 之後會改成 data.json */

const websites = [

    {
        title:"健保 VPN",
        category:"醫療系統",
        icon:"🩺",
        url:"https://example.com",
        description:"VPN 與診所系統入口"
    },

    {
        title:"員工班表",
        category:"排班",
        icon:"📅",
        url:"https://example.com",
        description:"班表查詢與管理"
    },

    {
        title:"Google Drive",
        category:"行政",
        icon:"🧾",
        url:"https://drive.google.com",
        description:"診所文件與共用資料"
    }

];

/* render */

const grid =
document.getElementById("grid");

function renderCards(data){

    grid.innerHTML = "";

    data.forEach(item => {

        const card =
        document.createElement("a");

        card.className = "card";

        card.href = item.url;

        card.target = "_blank";

        card.innerHTML =

        `
        <div class="card-top">

            <div class="icon">
                ${item.icon}
            </div>

            <div class="category">
                ${item.category}
            </div>

        </div>

        <div class="card-title">
            ${item.title}
        </div>

        <div class="card-url">
            ${item.url}
        </div>

        <div class="card-desc">
            ${item.description}
        </div>

        <div class="open">
            OPEN →
        </div>
        `;

        grid.appendChild(card);
    });
}

renderCards(websites);

/* 搜尋 */

document
.getElementById("search")
.addEventListener("input",e=>{

    const keyword =
    e.target.value
    .toLowerCase();

    const filtered =
    websites.filter(item =>

        item.title
        .toLowerCase()
        .includes(keyword)

        ||

        item.description
        .toLowerCase()
        .includes(keyword)
    );

    renderCards(filtered);
});

</script>

</body>
</html>
