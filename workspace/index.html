<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>中正診所 Portal</title>

<meta
name="robots"
content="noindex,nofollow,noarchive,nosnippet,noimageindex">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cinzel:wght@600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg1:#0b1020;
    --bg2:#111827;

    --card:
    rgba(18,25,45,.72);

    --border:
    rgba(255,255,255,.08);

    --text:#f8fafc;

    --muted:#94a3b8;

    --accent:#8b5cf6;
}

body{

    min-height:100vh;

    overflow-x:hidden;

    background:

    radial-gradient(
    circle at top,
    rgba(139,92,246,.16),
    transparent 30%
    ),

    linear-gradient(
    180deg,
    var(--bg1),
    var(--bg2)
    );

    color:var(--text);

    font-family:
    "Inter",
    sans-serif;
}

/* 星空 */

.stars{

    position:fixed;

    inset:0;

    z-index:-1;
}

.star{

    position:absolute;

    width:2px;
    height:2px;

    background:white;

    border-radius:50%;

    opacity:.4;

    animation:twinkle 5s infinite;
}

@keyframes twinkle{

    0%{
        opacity:.1;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:.1;
    }
}

/* Main */

.main{

    width:100%;

    max-width:1400px;

    margin:auto;

    padding:42px 24px 80px;
}

/* Header */

.header{

    display:flex;

    justify-content:space-between;

    align-items:flex-start;

    gap:20px;

    margin-bottom:40px;
}

.title{

    font-family:
    "Cinzel",
    serif;

    font-size:clamp(42px,7vw,72px);

    line-height:1.1;

    background:
    linear-gradient(
    180deg,
    #ffffff,
    #ddd6fe
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{

    margin-top:18px;

    color:var(--muted);

    line-height:1.9;

    font-size:18px;
}

/* 時間 */

.clock-box{

    text-align:right;
}

.clock{

    font-size:52px;

    font-weight:700;
}

.date{

    margin-top:10px;

    color:var(--muted);

    line-height:1.7;

    font-size:15px;
}

/* 齒輪 */

.admin-btn{

    position:fixed;

    top:24px;
    right:24px;

    width:58px;
    height:58px;

    border:none;

    border-radius:18px;

    cursor:pointer;

    font-size:26px;

    color:white;

    z-index:999;

    background:
    rgba(139,92,246,.18);

    border:
    1px solid rgba(139,92,246,.28);

    backdrop-filter:blur(18px);
}

/* Grid */

.grid{

    display:grid;

    grid-template-columns:
    repeat(
        auto-fit,
        minmax(320px,1fr)
    );

    gap:28px;
}

/* Card */

.card{

    background:
    var(--card);

    border:
    1px solid var(--border);

    border-radius:30px;

    padding:30px;

    position:relative;

    overflow:hidden;

    text-decoration:none;

    color:white;

    min-height:320px;

    backdrop-filter:blur(18px);

    transition:.3s;
}

.card:hover{

    transform:
    translateY(-8px);
}

.card-top{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:24px;
}

.icon{

    width:64px;
    height:64px;

    border-radius:20px;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:30px;

    background:
    rgba(139,92,246,.15);
}

.tag{

    color:#d8c7ff;

    font-size:14px;
}

.card-title{

    font-size:40px;

    font-weight:800;

    margin-bottom:16px;
}

.card-url{

    color:var(--muted);

    font-size:13px;

    line-height:1.7;

    margin-bottom:22px;

    word-break:break-all;
}

.card-desc{

    color:#dbe4ff;

    line-height:1.9;

    font-size:17px;
}

.open{

    position:absolute;

    left:30px;
    bottom:24px;

    color:#b794ff;

    letter-spacing:2px;

    font-size:14px;
}

/* Admin Panel */

.admin-panel{

    position:fixed;

    top:0;
    right:-420px;

    width:420px;

    height:100vh;

    background:
    rgba(15,23,42,.98);

    border-left:
    1px solid rgba(255,255,255,.08);

    padding:28px;

    transition:.35s;

    z-index:9999;

    overflow-y:auto;
}

.admin-panel.show{

    right:0;
}

.admin-header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:28px;
}

.admin-title{

    font-size:28px;

    font-weight:700;
}

.close-btn{

    width:42px;
    height:42px;

    border:none;

    border-radius:12px;

    cursor:pointer;

    color:white;

    background:
    rgba(255,255,255,.08);

    font-size:18px;
}

/* Form */

.form-group{

    margin-bottom:18px;
}

.label{

    display:block;

    margin-bottom:10px;

    color:#dbe4ff;

    font-size:14px;
}

.input{

    width:100%;

    height:52px;

    border:none;

    outline:none;

    border-radius:14px;

    background:
    rgba(255,255,255,.05);

    color:white;

    padding:0 16px;

    font-size:15px;
}

.button{

    width:100%;

    height:54px;

    border:none;

    border-radius:14px;

    cursor:pointer;

    color:white;

    font-size:15px;

    font-weight:600;

    margin-top:12px;
}

.add-btn{

    background:
    linear-gradient(
    90deg,
    #8b5cf6,
    #7c3aed
    );
}

.download-btn{

    background:
    linear-gradient(
    90deg,
    #2563eb,
    #1d4ed8
    );
}

/* 手機 */

@media(max-width:900px){

    .header{

        flex-direction:column;
    }

    .clock-box{

        text-align:left;
    }

    .clock{

        font-size:42px;
    }

    .card-title{

        font-size:34px;
    }

    .admin-panel{

        width:100%;
    }
}

</style>
</head>

<body>

<!-- 星空 -->

<div class="stars" id="stars"></div>

<!-- 齒輪 -->

<button
class="admin-btn"
onclick="openAdmin()">

⚙️

</button>

<!-- Main -->

<div class="main">

    <!-- Header -->

    <div class="header">

        <div>

            <div class="title">
                中正診所 Portal
            </div>

            <div class="subtitle">
                集中所有工作入口與常用網站，
                <br>
                讓每天工作更快速順手。
            </div>

        </div>

        <div class="clock-box">

            <div
            class="clock"
            id="clock">

                --:--

            </div>

            <div
            class="date"
            id="date">

            </div>

        </div>

    </div>

    <!-- Cards -->

    <div
    class="grid"
    id="grid">

    </div>

</div>

<!-- Admin -->

<div
class="admin-panel"
id="adminPanel">

    <div class="admin-header">

        <div class="admin-title">
            管理模式
        </div>

        <button
        class="close-btn"
        onclick="closeAdmin()">

            ✕

        </button>

    </div>

    <div class="form-group">

        <label class="label">
            標題
        </label>

        <input
        id="title"
        class="input"
        placeholder="例如：健保 VPN">

    </div>

    <div class="form-group">

        <label class="label">
            網址
        </label>

        <input
        id="url"
        class="input"
        placeholder="https://...">

    </div>

    <button
    class="button add-btn"
    onclick="addWebsite()">

        新增網站

    </button>

    <button
    class="button download-btn"
    onclick="downloadJSON()">

        下載 data.json

    </button>

</div>

<script>

/* ===== 星空 ===== */

const stars =
document.getElementById("stars");

for(let i=0;i<120;i++){

    const star =
    document.createElement("div");

    star.className = "star";

    star.style.left =
    Math.random()*100 + "%";

    star.style.top =
    Math.random()*100 + "%";

    star.style.animationDelay =
    Math.random()*5 + "s";

    stars.appendChild(star);
}

/* ===== 時間 ===== */

function updateClock(){

    const now =
    new Date();

    document
    .getElementById("clock")
    .innerText =

    now.toLocaleTimeString(
    "zh-TW",
    {
        hour:"2-digit",
        minute:"2-digit"
    });

    document
    .getElementById("date")
    .innerText =

    now.toLocaleDateString(
    "zh-TW",
    {
        year:"numeric",
        month:"long",
        day:"numeric",
        weekday:"long"
    });
}

updateClock();

setInterval(
updateClock,
1000
);

/* ===== 密碼 ===== */

const PASSWORD =
"720750";

/* ===== 資料 ===== */

let websites = [

    {
        title:"健保 VPN",
        url:"https://www.nhi.gov.tw/",
        icon:"🩺",
        tag:"VPN",
        description:"健保相關入口網站"
    },

    {
        title:"nIIS 系統",
        url:"https://medvpn.mohw.gov.tw/",
        icon:"🌐",
        tag:"nIIS",
        description:"疫苗與醫療資訊系統"
    },

    {
        title:"慢箋計算",
        url:"https://google.com",
        icon:"💊",
        tag:"TOOL",
        description:"慢性處方箋天數計算工具"
    }

];

/* ===== render ===== */

const grid =
document.getElementById("grid");

function renderCards(){

    grid.innerHTML = "";

    websites.forEach(item => {

        const card =
        document.createElement("a");

        card.className = "card";

        card.href = item.url;

        card.target = "_blank";

        card.innerHTML =

        `
        <div class="card-top">

            <div class="icon">
                ${item.icon}
            </div>

            <div class="tag">
                ${item.tag}
            </div>

        </div>

        <div class="card-title">
            ${item.title}
        </div>

        <div class="card-url">
            ${item.url}
        </div>

        <div class="card-desc">
            ${item.description}
        </div>

        <div class="open">
            OPEN →
        </div>
        `;

        grid.appendChild(card);
    });
}

renderCards();

/* ===== Admin ===== */

function openAdmin(){

    window.scrollTo(0,0);

    const pass =
    prompt("請輸入管理密碼");

    if(pass !== PASSWORD){

        alert("密碼錯誤");

        return;
    }

    document
    .getElementById("adminPanel")
    .classList
    .add("show");
}

function closeAdmin(){

    document
    .getElementById("adminPanel")
    .classList
    .remove("show");
}

/* ===== 新增 ===== */

function addWebsite(){

    const title =
    document
    .getElementById("title")
    .value
    .trim();

    const url =
    document
    .getElementById("url")
    .value
    .trim();

    if(!title || !url){

        alert("請輸入標題與網址");

        return;
    }

    websites.push({

        title:title,
        url:url,
        icon:"✨",
        tag:"LINK",
        description:"自訂網站入口"
    });

    renderCards();

    document
    .getElementById("title")
    .value = "";

    document
    .getElementById("url")
    .value = "";

    alert("已新增 ✨");
}

/* ===== 下載 JSON ===== */

function downloadJSON(){

    const json =
    JSON.stringify(
    websites,
    null,
    2
    );

    const blob =
    new Blob(
    [json],
    {
        type:"application/json"
    });

    const url =
    URL.createObjectURL(blob);

    const a =
    document.createElement("a");

    a.href = url;

    a.download = "data.json";

    a.click();

    URL.revokeObjectURL(url);
}

</script>

</body>
</html>
