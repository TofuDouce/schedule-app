<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中正診所 Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Noto+Sans+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="light"] {
            --bg-sky: linear-gradient(135deg, #e0f2fe 0%, #ffffff 100%);
            --header-bg: rgba(255, 255, 255, 0.85);
            --card-bg: rgba(255, 255, 255, 0.75);
            --accent-primary: #0284c7; 
            --accent-secondary: #7dd3fc; 
            --text-main: #0c4a6e; 
            --text-sub: #334155;      
            --border-color: rgba(255, 255, 255, 0.6);
            --card-shadow: 0 12px 30px -5px rgba(14, 165, 233, 0.15);
        }
        
        :root[data-theme="dark"] {
            --bg-sky: #0f172a;
            --header-bg: rgba(15, 23, 42, 0.9);
            --card-bg: #1e293b;
            --accent-primary: #38bdf8;
            --accent-secondary: #0ea5e9;
            --text-main: #f1f5f9;
            --text-sub: #cbd5e1;
            --border-color: #334155;
            --card-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        :root {
            --dynamic-title-size: 28px;
            --dynamic-desc-size: 18px;
            --grid-cols: 4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            min-height: 100vh; 
            background: var(--bg-sky);
            background-attachment: fixed;
            color: var(--text-main); 
            font-family: "Inter", "Noto Sans TC", sans-serif; 
            transition: background 0.4s, color 0.4s; 
        }

        .header { 
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 5%; 
            background-color: var(--header-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 4px solid var(--accent-secondary); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .title-group { display: flex; flex-direction: column; }
        .title-main { 
            font-size: clamp(32px, 5vw, 48px);
            font-weight: 900; line-height: 1.1; 
            background: linear-gradient(to right, #0369a1, #0ea5e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .title-sub { font-size: 16px; color: var(--accent-primary); font-weight: 700; letter-spacing: 3px; margin-top: 5px; }
        
        .clock-area { text-align: right; }
        .clock { font-size: clamp(32px, 5vw, 52px); font-weight: 900; color: var(--accent-primary); line-height: 1; font-variant-numeric: tabular-nums; }
        .date-display { font-size: 18px; font-weight: 700; color: var(--text-sub); margin-top: 4px; }

        .main { width: 100%; max-width: 1600px; margin: auto; padding: 180px 30px 100px; }

        .section-title { 
            font-size: 32px; font-weight: 900; margin: 50px 0 25px; padding-left: 20px; 
            border-left: 10px solid var(--accent-secondary); 
            color: var(--accent-primary);
        }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(var(--grid-cols, 4), 1fr); 
            gap: 25px; 
            width: 100%;
        }

        @media (max-width: 800px) { 
            .grid { grid-template-columns: repeat(2, 1fr); } 
        }

        .card { 
            position: relative; 
            background: var(--card-bg); 
            backdrop-filter: blur(5px);
            border-radius: 28px; 
            border: 1px solid var(--border-color); 
            box-shadow: var(--card-shadow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .card:hover { 
            transform: translateY(-10px); 
            border-color: var(--accent-primary); 
            background: rgba(255, 255, 255, 0.95);
        }
        .card-link { display: block; padding: 40px 30px; text-decoration: none; color: inherit; text-align: center; }
        .icon-box { font-size: 60px; margin-bottom: 20px; display: block; }
        
        .card-title { font-size: var(--dynamic-title-size); font-weight: 900; color: var(--accent-primary); margin-bottom: 12px; }
        .card-desc { font-size: var(--dynamic-desc-size); font-weight: 700; color: var(--text-sub); line-height: 1.5; }

        /* 這裡移除主畫面卡片上的編輯按鈕，改為全部在側邊欄管理 */
        .card-actions { display: none; }

        .controls { position: fixed; bottom: 30px; right: 30px; display: flex; gap: 20px; z-index: 1000; }
        .ctrl-btn { 
            width: 70px; height: 70px; border-radius: 50%; 
            background: var(--card-bg); border: 3px solid var(--accent-secondary); 
            font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.15); backdrop-filter: blur(10px);
        }

        /* --- 管理面板 (保留原本在右邊的設計) --- */
        .admin-panel { 
            position: fixed; top: 0; right: -100%; width: 95%; max-width: 500px; height: 100vh; 
            background: var(--card-bg); backdrop-filter: blur(25px); 
            border-left: 8px solid var(--accent-primary); padding: 40px; 
            overflow-y: auto; transition: 0.4s; z-index: 2000; color: var(--text-main); 
        }
        .admin-panel.show { right: 0; }
        .admin-panel h2 { font-size: 28px; margin-bottom: 20px; border-bottom: 2px solid var(--accent-secondary); padding-bottom: 10px; }
        .admin-panel label { font-size: 18px; font-weight: 700; display: block; margin-top: 15px; margin-bottom: 5px; }
        
        .input { width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 12px; font-size: 18px; margin-bottom: 10px; background: rgba(255,255,255,0.7); }
        .emoji-picker { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; background: rgba(255,255,255,0.4); padding: 10px; border-radius: 15px; }
        .emoji-item { font-size: 28px; cursor: pointer; text-align: center; padding: 8px; background: white; border-radius: 10px; border: 1px solid #e2e8f0; }
        
        .style-config { background: rgba(2, 132, 199, 0.1); padding: 20px; border-radius: 20px; margin-bottom: 30px; border: 1px dashed var(--accent-primary); }
        .slider-info { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 5px; }

        .btn { width: 100%; padding: 18px; font-size: 20px; font-weight: 900; border: none; border-radius: 15px; cursor: pointer; margin-bottom: 10px; }
        .save-btn { background: var(--accent-primary); color: white; }

        /* --- 新增：管理清單樣式 --- */
        .user-link-item { 
            background: rgba(255,255,255,0.5); padding: 15px; border-radius: 15px; 
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid var(--border-color);
        }
        .user-link-info { display: flex; align-items: center; gap: 10px; }
        .user-link-btns { display: flex; gap: 5px; }
        .mini-btn { padding: 5px 10px; border-radius: 8px; font-size: 14px; border: none; cursor: pointer; color: white; font-weight: bold; }
        .mini-edit { background: #eab308; }
        .mini-del { background: #ef4444; }
    </style>
</head>
<body id="bodyRoot">

<div class="header">
    <div class="title-group">
        <div class="title-main">中正診所</div>
        <div class="title-sub">PORTAL SYSTEM</div>
    </div>
    <div class="clock-area">
        <div class="clock" id="clock">00:00:00</div>
        <div class="date-display" id="date"></div>
    </div>
</div>

<div class="main">
    <div class="section-title">主要入口</div>
    <div id="primaryGrid" class="grid"></div>

    <div class="section-title">次要工具</div>
    <div id="secondaryGrid" class="grid"></div>
</div>

<div class="controls">
    <button class="ctrl-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <button class="ctrl-btn" onclick="toggleAdminMode()">⚙️</button>
</div>

<div class="admin-panel" id="adminPanel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 id="panelTitle">介面管理</h2>
        <button onclick="closeAdmin()" style="font-size:30px; border:none; background:none; cursor:pointer;">✕</button>
    </div>

    <div class="style-config">
        <h3 style="margin-bottom:15px; font-size:18px;">🎨 顯示設定</h3>
        <div style="margin-bottom:15px;">
            <div class="slider-info"><span>卡片標題大小</span><span id="titleSizeText">28px</span></div>
            <input type="range" id="titleSlider" min="16" max="60" value="28" style="width:100%" oninput="applyUIStyle()">
        </div>
        <div style="margin-bottom:15px;">
            <div class="slider-info"><span>卡片內容大小</span><span id="descSizeText">18px</span></div>
            <input type="range" id="descSlider" min="12" max="40" value="18" style="width:100%" oninput="applyUIStyle()">
        </div>
        <div>
            <div class="slider-info"><span>一列顯示幾張卡片</span></div>
            <select id="gridColSelect" class="input" onchange="applyUIStyle()">
                <option value="3">一列 3 張</option>
                <option value="4" selected>一列 4 張 (預設)</option>
                <option value="5">一列 5 張</option>
            </select>
        </div>
    </div>

    <hr style="margin-bottom: 20px; opacity: 0.2;">

    <h3 style="margin-bottom:10px;">🆕 新增/修改書籤</h3>
    <input type="hidden" id="editId">
    <label>分類</label>
    <select id="linkCategory" class="input">
        <option value="primary">主要入口</option>
        <option value="secondary">次要工具</option>
    </select>
    
    <label>選擇圖示</label>
    <div class="emoji-picker" id="emojiPicker"></div>
    <input id="linkIcon" class="input" readonly placeholder="點選上方圖示">
    
    <input id="linkTitle" class="input" placeholder="網站名稱">
    <input id="linkUrl" class="input" placeholder="網址 (https://...)">
    <input id="linkDesc" class="input" placeholder="簡短說明">
    
    <button class="btn save-btn" onclick="saveLink()">確認儲存連結</button>

    <hr style="margin: 30px 0 20px; opacity: 0.2;">

    <h3 style="margin-bottom:15px; color: var(--accent-primary);">📂 管理已新增書籤</h3>
    <div id="userLinksManager">
        </div>
</div>

<script>
    const emojis = ["🩺", "💉", "🏥", "💊", "☁️", "📦", "💻", "🔍", "📋", "🏠", "🧪", "📅", "🔗", "⭐", "👤", "⚙️"];
    
    // 原始核心連結 (不可修改)
    const coreLinks = {
        primary: [
            { id: 'c1', title: "中正診所", url: "https://webhis.vision.com.tw/88336/login", desc: "門診系統登入", icon: "🩺" },
            { id: 'c2', title: "VPN", url: "https://medvpn.nhi.gov.tw/iwse0000/IWSE0001S01.aspx", desc: "健保資訊網服務系統", icon: "💻" },
            { id: 'c3', title: "智慧防疫物資", url: "https://smis.cdc.gov.tw/SMIS/Default.aspx", desc: "每週一登入", icon: "📦" },
            { id: 'c4', title: "雲端查詢系統", url: "https://medcloud2.nhi.gov.tw/imu/IMUE1000/", desc: "健保醫療資訊雲端查詢", icon: "☁️" }
        ],
        secondary: [
            { id: 'c5', title: "NIIS", url: "https://10.241.219.42/Login.aspx", desc: "預防接種管理系統", icon: "💉" },
            { id: 'c6', title: "亞東轉診掛號", url: "https://www.femh.org.tw/webregs/HClinicLogin.aspx", desc: "亞東醫院轉診服務", icon: "🏥" },
            { id: 'c7', title: "亞東轉診查詢", url: "https://hos.femh.org.tw/hosmanplatform/login.aspx", desc: "掛號結果查詢", icon: "🔍" },
            { id: 'c8', title: "醫品平台系統", url: "https://manage.healthleader.com.tw/Account/Login?ReturnUrl=%2F", desc: "台灣優品/醫品平台系統", icon: "📋" },
            { id: 'c9', title: "家醫大平台", url: "https://medqfm.nhi.gov.tw/health-ui/#/login", desc: "家醫照護大平台", icon: "🏠" },
            { id: 'c10', title: "Paxlovid交互", url: "https://depart.femh.org.tw/meta/paxsearch.htm", desc: "交互作用查詢", icon: "💊" },
            { id: 'c11', title: "eGFR 計算", url: "egfr.html", desc: "腎絲球過濾計算", icon: "🧪" },
            { id: 'c12', title: "年份轉換", url: "age-conv.html", desc: "西元 ⇄ 民國轉換", icon: "📅" }
        ]
    };

    let userLinks = JSON.parse(localStorage.getItem('cz_user_links_v4')) || { primary: [], secondary: [] };
    let uiSettings = JSON.parse(localStorage.getItem('cz_ui_config')) || { titleSize: 28, descSize: 18, cols: 4 };

    function applyUIStyle() {
        const titleS = document.getElementById('titleSlider').value;
        const descS = document.getElementById('descSlider').value;
        const colV = document.getElementById('gridColSelect').value;
        document.getElementById('titleSizeText').innerText = titleS + 'px';
        document.getElementById('descSizeText').innerText = descS + 'px';
        document.documentElement.style.setProperty('--dynamic-title-size', titleS + 'px');
        document.documentElement.style.setProperty('--dynamic-desc-size', descS + 'px');
        document.documentElement.style.setProperty('--grid-cols', colV);
        uiSettings = { titleSize: titleS, descSize: descS, cols: colV };
        localStorage.setItem('cz_ui_config', JSON.stringify(uiSettings));
    }

    function initUI() {
        document.getElementById('titleSlider').value = uiSettings.titleSize || 28;
        document.getElementById('descSlider').value = uiSettings.descSize || 18;
        document.getElementById('gridColSelect').value = uiSettings.cols || 4;
        applyUIStyle();
    }

    function toggleAdminMode() {
        document.getElementById("adminPanel").classList.toggle("show");
        renderManager(); // 開啟時同步更新管理清單
    }

    function saveLink() {
        const id = document.getElementById("editId").value;
        const cat = document.getElementById("linkCategory").value;
        const title = document.getElementById("linkTitle").value.trim();
        const url = document.getElementById("linkUrl").value.trim();
        const icon = document.getElementById("linkIcon").value || "🔗";
        const desc = document.getElementById("linkDesc").value.trim();
        if (!title || !url) return alert("名稱與網址必填");
        
        if (id) {
            userLinks.primary = userLinks.primary.filter(l => l.id !== id);
            userLinks.secondary = userLinks.secondary.filter(l => l.id !== id);
            userLinks[cat].push({ id, title, url, desc, icon });
        } else {
            userLinks[cat].push({ id: 'u' + Date.now(), title, url, desc, icon });
        }
        localStorage.setItem('cz_user_links_v4', JSON.stringify(userLinks));
        render(); 
        renderManager();
        resetForm();
    }

    // 側邊欄內的管理清單渲染
    function renderManager() {
        const container = document.getElementById("userLinksManager");
        const allUserLinks = [...userLinks.primary, ...userLinks.secondary];
        
        if (allUserLinks.length === 0) {
            container.innerHTML = '<p style="opacity:0.5; text-align:center;">尚無自訂書籤</p>';
            return;
        }

        container.innerHTML = allUserLinks.map(l => `
            <div class="user-link-item">
                <div class="user-link-info">
                    <span>${l.icon}</span>
                    <strong style="font-size:16px;">${l.title}</strong>
                </div>
                <div class="user-link-btns">
                    <button class="mini-btn mini-edit" onclick="editLink('${l.id}')">✏️</button>
                    <button class="mini-btn mini-del" onclick="deleteLink('${l.id}')">🗑️</button>
                </div>
            </div>
        `).join('');
    }

    window.deleteLink = function(id) {
        if (!confirm("確定刪除此書籤？")) return;
        userLinks.primary = userLinks.primary.filter(l => l.id !== id);
        userLinks.secondary = userLinks.secondary.filter(l => l.id !== id);
        localStorage.setItem('cz_user_links_v4', JSON.stringify(userLinks));
        render();
        renderManager();
    };

    window.editLink = function(id) {
        const link = [...userLinks.primary, ...userLinks.secondary].find(l => l.id === id);
        if (!link) return;
        document.getElementById("editId").value = link.id;
        document.getElementById("linkCategory").value = userLinks.primary.find(l => l.id === id) ? "primary" : "secondary";
        document.getElementById("linkTitle").value = link.title;
        document.getElementById("linkUrl").value = link.url;
        document.getElementById("linkDesc").value = link.desc;
        document.getElementById("linkIcon").value = link.icon;
        document.getElementById("panelTitle").innerText = "修改書籤";
        // 捲動到輸入框位置
        document.getElementById("linkTitle").focus();
    };

    function render() {
        const createCard = (l) => `
            <div class="card">
                <a class="card-link" href="${l.url}" target="_blank">
                    <span class="icon-box">${l.icon}</span>
                    <div class="card-title">${l.title}</div>
                    <div class="card-desc">${l.desc}</div>
                </a>
            </div>`;
        document.getElementById("primaryGrid").innerHTML = coreLinks.primary.map(l => createCard(l)).join('') + userLinks.primary.map(l => createCard(l)).join('');
        document.getElementById("secondaryGrid").innerHTML = coreLinks.secondary.map(l => createCard(l)).join('') + userLinks.secondary.map(l => createCard(l)).join('');
    }

    function resetForm() { 
        document.getElementById("editId").value = ""; 
        document.getElementById("linkTitle").value = ""; 
        document.getElementById("linkUrl").value = ""; 
        document.getElementById("linkDesc").value = ""; 
        document.getElementById("linkIcon").value = ""; 
        document.getElementById("panelTitle").innerText = "介面管理"; 
    }
    
    function closeAdmin() { 
        document.getElementById("adminPanel").classList.remove("show"); 
        resetForm(); 
    }

    const picker = document.getElementById('emojiPicker');
    emojis.forEach(e => {
        const div = document.createElement('div');
        div.className = 'emoji-item'; div.innerText = e;
        div.onclick = () => { document.getElementById('linkIcon').value = e; };
        picker.appendChild(div);
    });

    function updateClock() {
        const now = new Date();
        document.getElementById("clock").innerText = now.toLocaleTimeString("zh-TW", { hour12: false });
        const y = now.getFullYear();
        document.getElementById("date").innerText = `(民${y-1911}) ${y}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
    }

    function toggleTheme() {
        const root = document.documentElement;
        const next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        root.setAttribute('data-theme', next);
        localStorage.setItem('cz_theme', next);
        document.getElementById('themeBtn').innerText = next === 'light' ? '🌙' : '☀️';
    }

    const savedTheme = localStorage.getItem('cz_theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    document.getElementById('themeBtn').innerText = savedTheme === 'light' ? '🌙' : '☀️';

    setInterval(updateClock, 1000); 
    updateClock(); 
    initUI();
    render();
</script>
</body>
</html>
