<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中正診所 Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Noto+Sans+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="light"] {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --accent-primary: #0ea5e9; 
            --accent-secondary: #10b981; 
            --text-main: #0f172a;     
            --text-sub: #475569;      
            --border-color: #e2e8f0;
        }
        :root[data-theme="dark"] {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-primary: #38bdf8;
            --accent-secondary: #34d399;
            --text-main: #ffffff;
            --text-sub: #cbd5e1;
            --border-color: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            min-height: 100vh; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: "Inter", "Noto Sans TC", sans-serif; 
            transition: 0.3s; 
            padding-bottom: 80px; 
        }

        .main { width: 100%; max-width: 1400px; margin: auto; padding: 20px; }
        
        .header { 
            display: flex; 
            flex-direction: row; 
            justify-content: space-between; 
            align-items: flex-start; 
            margin-bottom: 30px; 
            border-bottom: 4px solid var(--accent-secondary); 
            padding: 30px 0 15px; 
        }

        .title-group { display: flex; flex-direction: column; }
        .title-main { 
            font-size: clamp(32px, 5vw, 42px); 
            font-weight: 900; 
            line-height: 1.1; 
            letter-spacing: -1px;
        }
        .title-sub { 
            font-size: 14px; 
            color: var(--accent-primary); 
            font-weight: 700; 
            letter-spacing: 2px; 
            margin-top: 4px;
        }
        
        .clock-area { display: flex; flex-direction: column; align-items: flex-end; text-align: right; }
        .clock { font-size: 32px; font-weight: 900; color: var(--accent-primary); line-height: 1; }
        .date-display { font-size: 16px; font-weight: 700; margin-top: 4px; color: var(--text-sub); }

        .mode-toggle { margin-top: 10px; padding: 5px 10px; font-size: 12px; font-weight: 800; border-radius: 6px; border: 2px solid var(--accent-secondary); background: transparent; color: var(--accent-secondary); cursor: pointer; }

        .section-title { font-size: 32px; font-weight: 900; margin: 25px 0 15px; padding-left: 12px; border-left: 8px solid var(--accent-primary); }
        
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 640px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        @media (min-width: 1400px) { .grid { grid-template-columns: repeat(5, 1fr); } }

        .card { background: var(--card-bg); border-radius: 15px; border: 2px solid var(--border-color); transition: 0.3s; height: 100%; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent-primary); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .card-link { display: block; padding: 25px; text-decoration: none; color: inherit; }
        .icon-box { font-size: 45px; margin-bottom: 12px; display: block; }
        
        .card-title { font-size: 28px; font-weight: 900; color: var(--accent-primary); margin-bottom: 8px; }
        .card-desc { font-size: 16px; font-weight: 700; color: var(--text-sub); line-height: 1.4; }

        .admin-panel { position: fixed; top: 0; right: -100%; width: 90%; max-width: 400px; height: 100vh; background: #fff; border-left: 8px solid var(--accent-primary); padding: 25px; overflow-y: auto; transition: 0.4s; z-index: 2000; color: #000; }
        .admin-panel.show { right: 0; }
        .input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; margin-bottom: 12px; }
        .emoji-picker { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; background: #f1f5f9; padding: 10px; border-radius: 10px; }
        .emoji-item { font-size: 24px; cursor: pointer; text-align: center; padding: 8px; background: #fff; border-radius: 8px; border: 1px solid #e2e8f0; }
        .btn { width: 100%; padding: 15px; font-weight: 900; border: none; border-radius: 10px; cursor: pointer; margin-bottom: 10px; }
        .save-btn { background: var(--accent-primary); color: white; }
        .admin-btn { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: var(--card-bg); border: 2px solid var(--accent-primary); font-size: 20px; cursor: pointer; opacity: 0.2; z-index: 1000; }
    </style>
</head>
<body>

<div class="main">
    <div class="header">
        <div class="title-group">
            <div class="title-main">中正診所</div>
            <div class="title-sub">PORTAL SYSTEM</div>
        </div>
        <div class="clock-area">
            <div class="clock" id="clock">00:00:00</div>
            <div class="date-display" id="date"></div>
            <button class="mode-toggle" onclick="toggleTheme()" id="themeBtn">切換至夜間模式 🌙</button>
        </div>
    </div>

    <div class="section-title">主要入口</div>
    <div id="primaryGrid" class="grid"></div>

    <div class="section-title">次要工具</div>
    <div id="secondaryGrid" class="grid"></div>
</div>

<button class="admin-btn" onclick="openAdmin()">⚙️</button>

<div class="admin-panel" id="adminPanel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="font-weight:900;">管理面板 (免密碼模式)</h2>
        <button onclick="closeAdmin()" style="font-size:24px; border:none; background:none; cursor:pointer;">✕</button>
    </div>
    <label>分類</label>
    <select id="linkCategory" class="input">
        <option value="primary">主要入口</option>
        <option value="secondary">次要工具</option>
    </select>
    <label>選擇圖示</label>
    <div class="emoji-picker" id="emojiPicker"></div>
    <input id="linkIcon" class="input" readonly placeholder="點選圖示">
    <input id="linkTitle" class="input" placeholder="名稱">
    <input id="linkUrl" class="input" placeholder="網址">
    <input id="linkDesc" class="input" placeholder="說明文字">
    <button class="btn save-btn" onclick="saveLink()">保存設定</button>
</div>

<script>
    const emojis = ["🩺", "💉", "🏥", "💊", "☁️", "📦", "💻", "🔍", "📋", "🏠", "🧪", "📅"];

    // 密碼驗證已移除，點擊齒輪直接開啟
    function openAdmin() {
        document.getElementById("adminPanel").classList.add("show");
    }

    const coreLinks = {
        primary: [
            { id: 'c1', title: "中正診所", url: "https://webhis.vision.com.tw/88336/login", desc: "門診系統登入", icon: "🩺" },
            { id: 'c2', title: "VPN", url: "https://medvpn.nhi.gov.tw/iwse0000/IWSE0001S01.aspx", desc: "健保資訊網服務系統", icon: "💻" },
            { id: 'c3', title: "智慧防疫物資", url: "https://smis.cdc.gov.tw/SMIS/Default.aspx", desc: "每週一登入", icon: "📦" },
            { id: 'c4', title: "雲端查詢系統", url: "https://medcloud2.nhi.gov.tw/imu/IMUE1000/", desc: "健保醫療資訊雲端查詢", icon: "☁️" }
        ],
        secondary: [
            { id: 'c5', title: "NIIS", url: "https://10.241.219.42/Login.aspx", desc: "預防接種管理系統", icon: "💉" },
            { id: 'c6', title: "亞東轉診掛號", url: "https://www.femh.org.tw/webregs/HClinicLogin.aspx", desc: "亞東醫院轉診服務", icon: "🏥" },
            { id: 'c7', title: "亞東轉診查詢", url: "https://hos.femh.org.tw/hosmanplatform/login.aspx", desc: "掛號結果查詢", icon: "🔍" },
            { id: 'c8', title: "醫品平台系統", url: "https://manage.healthleader.com.tw/Account/Login?ReturnUrl=%2F", desc: "台灣優品/醫品平台系統", icon: "📋" },
            { id: 'c9', title: "家醫大平台", url: "https://medqfm.nhi.gov.tw/health-ui/#/login", desc: "家醫照護大平台", icon: "🏠" },
            { id: 'c10', title: "Paxlovid交互", url: "https://depart.femh.org.tw/meta/paxsearch.htm", desc: "交互作用查詢", icon: "💊" },
            { id: 'c11', title: "eGFR 計算", url: "egfr.html", desc: "腎絲球過濾計算", icon: "🧪" },
            { id: 'c12', title: "年份轉換", url: "age-conv.html", desc: "西元 ⇄ 民國轉換", icon: "📅" }
        ]
    };

    let userLinks = JSON.parse(localStorage.getItem('cz_user_links_v3')) || { primary: [], secondary: [] };

    function saveLink() {
        const cat = document.getElementById("linkCategory").value;
        const title = document.getElementById("linkTitle").value.trim();
        const url = document.getElementById("linkUrl").value.trim();
        const icon = document.getElementById("linkIcon").value || "🩺";
        const desc = document.getElementById("linkDesc").value.trim();
        if (!title || !url) return alert("名稱與網址必填");
        userLinks[cat].push({ id: 'u' + Date.now(), title, url, desc, icon });
        localStorage.setItem('cz_user_links_v3', JSON.stringify(userLinks));
        closeAdmin(); render();
    }

    function render() {
        const fn = (l) => `<div class="card"><a class="card-link" href="${l.url}" target="_blank"><span class="icon-box">${l.icon}</span><div class="card-title">${l.title}</div><div class="card-desc">${l.desc}</div></a></div>`;
        document.getElementById("primaryGrid").innerHTML = [...coreLinks.primary, ...userLinks.primary].map(fn).join('');
        document.getElementById("secondaryGrid").innerHTML = [...coreLinks.secondary, ...userLinks.secondary].map(fn).join('');
    }

    const picker = document.getElementById('emojiPicker');
    emojis.forEach(e => {
        const div = document.createElement('div');
        div.className = 'emoji-item';
        div.innerText = e;
        div.onclick = () => { document.getElementById('linkIcon').value = e; };
        picker.appendChild(div);
    });

    function updateClock() {
        const now = new Date();
        const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
        document.getElementById("clock").innerText = now.toLocaleTimeString("zh-TW", { hour12: false });
        const y = now.getFullYear();
        const dateStr = `${y}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
        document.getElementById("date").innerText = `(民${y-1911}) ${dateStr} ${days[now.getDay()]}`;
    }

    function toggleTheme() {
        const doc = document.documentElement;
        const next = doc.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        doc.setAttribute('data-theme', next);
        document.getElementById('themeBtn').innerText = next === 'light' ? '切換至夜間模式 🌙' : '切換至日間模式 ☀️';
    }

    function closeAdmin() { 
        document.getElementById("adminPanel").classList.remove("show"); 
        document.getElementById("linkTitle").value = ""; 
        document.getElementById("linkUrl").value = ""; 
        document.getElementById("linkDesc").value = "";
    }

    setInterval(updateClock, 1000); updateClock(); render();
</script>
</body>
</html>
