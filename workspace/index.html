<!DOCTYPE html>
<html lang="zh-Hant" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中正診所 Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Cinzel:wght@600&display=swap" rel="stylesheet">

    <style>
        :root[data-theme="dark"] {
            --bg-grad: linear-gradient(180deg, #060816, #0c1224);
            --card-bg: rgba(16, 22, 40, 0.9);
            --accent-gold: #d4af37;
            --accent-gold-dim: rgba(214, 190, 110, 0.3);
            --text-main: #ffffff;
            --text-dim: rgba(226, 232, 240, 0.7);
            --panel-bg: #0c1224;
            --star-opacity: 0.4;
        }

        :root[data-theme="light"] {
            --bg-grad: linear-gradient(180deg, #f0f4f8, #e2e8f0);
            --card-bg: #ffffff;
            --accent-gold: #0ea5e9;
            --accent-gold-dim: rgba(14, 165, 233, 0.2);
            --text-main: #1e293b;
            --text-dim: #64748b;
            --panel-bg: #ffffff;
            --star-opacity: 0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; background: var(--bg-grad); color: var(--text-main); font-family: "Inter", "Microsoft JhengHei", sans-serif; transition: 0.3s; overflow-x: hidden; }

        /* Mucha 裝飾框 */
        .mucha-frame { position: fixed; inset: 12px; pointer-events: none; z-index: 999; border: 1px solid var(--accent-gold-dim); border-radius: 30px; }
        .corner { position: absolute; width: 60px; height: 60px; border: 1px solid var(--accent-gold-dim); }
        .tl { top:-1px; left:-1px; border-radius: 30px 0 0 0; border-right:none; border-bottom:none; }
        .tr { top:-1px; right:-1px; border-radius: 0 30px 0 0; border-left:none; border-bottom:none; }
        .bl { bottom:-1px; left:-1px; border-radius: 0 0 0 30px; border-right:none; border-top:none; }
        .br { bottom:-1px; right:-1px; border-radius: 0 0 30px 0; border-left:none; border-top:none; }

        /* 星空背景 */
        .stars { position: fixed; inset: 0; z-index: -1; opacity: var(--star-opacity); transition: 0.5s; }
        .star { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; animation: twinkle 5s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        .main { width: 100%; max-width: 1600px; margin: auto; padding: 40px 24px; }
        
        /* Header 佈局：電腦版標題與時間並排 */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end; 
            margin-bottom: 40px; 
            flex-wrap: wrap; 
            gap: 20px; 
        }
        
        .title-group { flex: 1; min-width: 250px; }
        .title-main { font-size: clamp(36px, 6vw, 64px); font-weight: 800; line-height: 1.1; }
        .title-sub { display: block; font-family: "Cinzel", serif; font-size: 18px; color: var(--accent-gold); letter-spacing: 4px; margin-top: 5px; }
        
        .clock-area { text-align: right; }
        .clock { font-size: clamp(40px, 8vw, 60px); font-weight: 800; line-height: 1; }
        .date-display { font-size: 18px; color: var(--text-dim); font-weight: 600; margin-top: 5px; letter-spacing: 1px; }

        .mode-toggle { padding: 10px 20px; border-radius: 12px; border: 1px solid var(--accent-gold-dim); background: var(--card-bg); color: var(--text-main); cursor: pointer; font-weight: 600; transition: 0.2s; margin-top: 15px; }

        /* Grid 佈局：電腦版 5 欄 */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
            gap: 20px; 
        }

        @media (min-width: 1300px) {
            .grid { grid-template-columns: repeat(5, 1fr); }
        }

        /* 卡片設計 */
        .card { background: var(--card-bg); border-radius: 24px; border: 1px solid var(--accent-gold-dim); transition: 0.3s; height: 100%; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent-gold); box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        .card-link { display: block; padding: 25px; text-decoration: none; color: inherit; }
        .icon-circle { width: 56px; height: 56px; border-radius: 18px; background: var(--accent-gold-dim); display: flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 15px; }
        .card-title { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
        .card-desc { color: var(--text-dim); font-size: 15px; line-height: 1.4; }

        /* 手機版適應：時間回到標題下方 */
        @media (max-width: 768px) {
            .header { flex-direction: column; align-items: flex-start; }
            .clock-area { text-align: left; margin-top: 10px; }
            .grid { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
        }

        /* 管理按鈕與面板 */
        .admin-btn { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; background: var(--card-bg); border: 1px solid var(--accent-gold-dim); color: var(--text-main); font-size: 28px; cursor: pointer; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; }
        .admin-panel { position: fixed; top: 0; right: -100%; width: 100%; max-width: 450px; height: 100vh; background: var(--panel-bg); border-left: 1px solid var(--accent-gold-dim); padding: 30px; overflow-y: auto; transition: 0.4s; z-index: 10000; color: var(--text-main); }
        .admin-panel.show { right: 0; }
        
        .admin-label { display: block; margin: 15px 0 5px; font-weight: 600; color: var(--accent-gold); }
        .input { width: 100%; height: 55px; background: rgba(128,128,128,0.05); border: 1px solid var(--accent-gold-dim); border-radius: 12px; color: var(--text-main); padding: 0 15px; font-size: 16px; margin-bottom: 10px; outline: none; }
        
        .icon-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 20px; }
        .icon-opt { aspect-ratio: 1; border-radius: 10px; border: 1px solid var(--accent-gold-dim); display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; }
        .icon-opt.active { background: var(--accent-gold); color: white; border-color: var(--accent-gold); }
        
        .save-btn { width: 100%; height: 55px; border-radius: 12px; border: none; background: var(--accent-gold); color: white; font-weight: 800; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<div class="mucha-frame"><div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div></div>
<div class="stars" id="stars"></div>

<div class="main">
    <div class="header">
        <div class="title-group">
            <div class="title-main">中正診所</div>
            <span class="title-sub">PORTAL SYSTEM</span>
        </div>
        <div class="clock-area">
            <div class="clock" id="clock">00:00:00</div>
            <div class="date-display" id="date">載入中...</div>
            <button class="mode-toggle" onclick="toggleTheme()" id="themeBtn">切換模式 ☀️</button>
        </div>
    </div>
    <div class="grid" id="grid"></div>
</div>

<button class="admin-btn" onclick="openAdmin()">⚙️</button>

<div class="admin-panel" id="adminPanel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="font-size:24px;">管理模式</h2>
        <button onclick="closeAdmin()" style="background:none; border:none; color:var(--text-main); font-size:28px; cursor:pointer;">✕</button>
    </div>
    
    <span class="admin-label">網站名稱</span>
    <input id="title" class="input" placeholder="例如：健保 VPN">
    
    <span class="admin-label">網址 (URL)</span>
    <input id="url" class="input" placeholder="https://...">
    
    <span class="admin-label">選擇圖示</span>
    <div class="icon-grid" id="iconPicker"></div>
    
    <button class="save-btn" id="saveBtn" onclick="addWebsite()">保存網站</button>
    
    <hr style="opacity:0.1; margin:25px 0;">
    <h3 style="margin-bottom: 15px;">目前書籤清單</h3>
    <div id="bookmarkList"></div>
</div>

<script>
    // 720750 的 SHA-256 安全雜湊值
    const _H = "8227b6c507a2a6b7e6417539c36d2c416e9196b653245053f3e786b6a22287b3";

    let websites = JSON.parse(localStorage.getItem('clinic_links')) || [
        { title: "健保 VPN", url: "https://www.nhi.gov.tw/", icon: "🩺", description: "健保內部系統入口" },
        { title: "nIIS 系統", url: "https://medvpn.mohw.gov.tw/", icon: "💉", description: "疫苗與醫療資訊系統" }
    ];

    const iconPool = ["🩺", "💉", "💊", "📋", "🏥", "🧬", "🧠", "🦷", "💻", "🔒", "✨", "📅", "🍎", "🔥"];
    let selectedIcon = "✨";
    let editingIndex = null;

    // 時間日期更新
    function updateClock() {
        const now = new Date();
        document.getElementById("clock").innerText = now.toLocaleTimeString("zh-TW", { hour12: false });
        
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const mingguo = year - 1911;
        const weekDays = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
        document.getElementById("date").innerText = `(民${mingguo}) ${year}/${month}/${day} ${weekDays[now.getDay()]}`;
    }

    // 主題切換
    function toggleTheme() {
        const doc = document.documentElement;
        const next = doc.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        doc.setAttribute('data-theme', next);
        localStorage.setItem('portal_theme', next);
        document.getElementById('themeBtn').innerText = next === 'dark' ? '切換模式 ☀️' : '切換模式 🌙';
    }

    // 安全驗證進入管理模式
    async function openAdmin() {
        let pass = prompt("請輸入管理金鑰");
        if (!pass) return;
        
        pass = pass.trim(); // 修正：自動去除空格

        const msgBuffer = new TextEncoder().encode(pass);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

        if (hashHex === _H) {
            document.getElementById("adminPanel").classList.add("show");
            renderIcons();
        } else {
            alert("驗證失敗，密碼錯誤");
        }
    }

    function closeAdmin() { 
        document.getElementById("adminPanel").classList.remove("show"); 
        editingIndex = null;
        document.getElementById("saveBtn").innerText = "保存網站";
    }

    function renderIcons() {
        const picker = document.getElementById("iconPicker");
        picker.innerHTML = "";
        iconPool.forEach(icon => {
            const div = document.createElement("div");
            div.className = `icon-opt ${icon === selectedIcon ? 'active' : ''}`;
            div.innerText = icon;
            div.onclick = () => { selectedIcon = icon; renderIcons(); };
            picker.appendChild(div);
        });
    }

    function render() {
        localStorage.setItem('clinic_links', JSON.stringify(websites));
        const grid = document.getElementById("grid");
        grid.innerHTML = "";
        websites.forEach(item => {
            grid.innerHTML += `
                <div class="card">
                    <a class="card-link" href="${item.url}" target="_blank">
                        <div class="icon-circle">${item.icon}</div>
                        <div class="card-title">${item.title}</div>
                        <div class="card-desc">${item.description}</div>
                    </a>
                </div>`;
        });

        const list = document.getElementById("bookmarkList");
        list.innerHTML = "";
        websites.forEach((item, index) => {
            list.innerHTML += `
                <div style="background:rgba(128,128,128,0.1); padding:12px; border-radius:12px; margin-bottom:10px;">
                    <b style="font-size:16px;">${item.icon} ${item.title}</b>
                    <div style="margin-top:8px;">
                        <button onclick="editWebsite(${index})" style="padding:5px 10px; border-radius:6px; border:none; background:#4a5568; color:white; cursor:pointer; font-size:12px;">修改</button>
                        <button onclick="deleteWebsite(${index})" style="padding:5px 10px; border-radius:6px; border:none; background:#c53030; color:white; cursor:pointer; font-size:12px; margin-left:5px;">刪除</button>
                    </div>
                </div>`;
        });
    }

    function addWebsite() {
        const t = document.getElementById("title").value.trim();
        const u = document.getElementById("url").value.trim();
        if (!t || !u) return alert("請填寫完整資訊");

        if (editingIndex !== null) {
            websites[editingIndex] = { ...websites[editingIndex], title: t, url: u, icon: selectedIcon };
            editingIndex = null;
            document.getElementById("saveBtn").innerText = "保存網站";
        } else {
            websites.push({ title: t, url: u, icon: selectedIcon, description: "快速連結" });
        }
        
        document.getElementById("title").value = "";
        document.getElementById("url").value = "";
        render();
        alert("已更新成功！");
    }

    function editWebsite(i) {
        editingIndex = i;
        const item = websites[i];
        document.getElementById("title").value = item.title;
        document.getElementById("url").value = item.url;
        selectedIcon = item.icon;
        renderIcons();
        document.getElementById("saveBtn").innerText = "確認修改";
        document.getElementById("adminPanel").scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteWebsite(i) { if (confirm("確定刪除此網站？")) { websites.splice(i, 1); render(); } }

    // 初始化設定
    const savedTheme = localStorage.getItem('portal_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    document.getElementById('themeBtn').innerText = savedTheme === 'dark' ? '切換模式 ☀️' : '切換模式 🌙';

    const stars = document.getElementById("stars");
    for (let i = 0; i < 80; i++) {
        const s = document.createElement("div");
        s.className = "star";
        s.style.left = Math.random() * 100 + "%";
        s.style.top = Math.random() * 100 + "%";
        s.style.animationDelay = Math.random() * 5 + "s";
        stars.appendChild(s);
    }

    setInterval(updateClock, 1000);
    updateClock();
    render();
</script>
</body>
</html>
