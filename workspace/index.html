<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light" data-color="blue">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中正診所 Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Noto+Sans+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --dynamic-title-size: 28px;
            --dynamic-desc-size: 18px;
            --grid-cols: 5;
        }

        /* 🎨 配色定義：[主色] / [夜間亮色] / [黃底加深色] */
        :root[data-color="blue"] { --brand-main: #0284c7; --brand-light: #7dd3fc; --brand-dark: #075985; }
        :root[data-color="green"] { --brand-main: #059669; --brand-light: #6ee7b7; --brand-dark: #064e3b; }
        :root[data-color="purple"] { --brand-main: #8b5cf6; --brand-light: #c4b5fd; --brand-dark: #4c1d95; }
        :root[data-color="gray"] { --brand-main: #64748b; --brand-light: #e2e8f0; --brand-dark: #1e293b; }

        :root[data-theme="light"] {
            --bg-sky: linear-gradient(135deg, #f0f9ff 0%, #ffffff 100%);
            --header-bg: rgba(255, 255, 255, 0.9);
            --card-bg: rgba(255, 255, 255, 0.8);
            --accent-primary: var(--brand-main); 
            --accent-secondary: var(--brand-light); 
            --text-main: #0c4a6e; 
            --text-sub: #334155;      
            --border-color: rgba(255, 255, 255, 0.6);
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        :root[data-theme="dark"] {
            --bg-sky: #0f172a;
            --header-bg: rgba(15, 23, 42, 0.95);
            --card-bg: #1e293b;
            --accent-primary: var(--brand-light);
            --accent-secondary: var(--brand-main);
            --text-main: #f8fafc;
            --text-sub: #cbd5e1;
            --border-color: #334155;
            --card-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            min-height: 100vh; background: var(--bg-sky); background-attachment: fixed;
            color: var(--text-main); font-family: "Noto Sans TC", sans-serif; 
            transition: background 0.4s; overflow-x: hidden;
        }

        .header { 
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 5%; background-color: var(--header-bg); backdrop-filter: blur(15px);
            border-bottom: 3px solid var(--accent-secondary); 
        }
        .title-main { font-size: clamp(20px, 6vw, 40px); font-weight: 900; background: linear-gradient(to right, var(--brand-main), var(--brand-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .main { width: 100%; max-width: 1400px; margin: auto; padding: 110px 15px 100px; }
        .section-title { font-size: 24px; font-weight: 900; margin: 30px 0 15px; padding-left: 12px; border-left: 6px solid var(--accent-secondary); color: var(--accent-primary); }

        /* 📱 響應式網格：解決看太窄的問題 */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(var(--grid-cols, 5), 1fr); 
            gap: 15px; 
        }

        @media (max-width: 1024px) { :root { --grid-cols: 3 !important; } }
        @media (max-width: 600px) { 
            :root { --grid-cols: 1 !important; } /* 手機版改為一列一卡，確保寬度 */
            .main { padding-top: 100px; }
            .card-link { padding: 25px 15px !important; }
            .icon-box { font-size: 45px !important; }
            .admin-panel { width: 100% !important; border-left: none; border-top: 8px solid var(--brand-main); }
        }

        /* 🟡 強調卡片文字加深邏輯 */
        .card.highlight-card { background: #fffceb !important; border: 3px solid #fcc419 !important; }
        .card.highlight-card .card-title { color: var(--brand-dark) !important; font-weight: 900; }
        .card.highlight-card .card-desc { color: #dc2626 !important; font-weight: 900; }

        .card { background: var(--card-bg); border-radius: 20px; border: 1px solid var(--border-color); box-shadow: var(--card-shadow); transition: 0.2s; }
        .card:active { transform: scale(0.98); }
        .card-link { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 20px; text-decoration: none; color: inherit; text-align: center; height: 100%; }
        .icon-box { font-size: 50px; margin-bottom: 12px; }
        .card-title { font-size: var(--dynamic-title-size); font-weight: 900; color: var(--accent-primary); margin-bottom: 6px; line-height: 1.2; }
        .card-desc { font-size: var(--dynamic-desc-size); font-weight: 700; color: var(--text-sub); line-height: 1.3; }

        /* ⚙️ 介面管理大字版 */
        .admin-panel { 
            position: fixed; top: 0; right: -100%; width: 450px; height: 100vh; 
            background: var(--card-bg); backdrop-filter: blur(30px); 
            border-left: 10px solid var(--brand-main); padding: 30px; 
            overflow-y: auto; transition: 0.4s; z-index: 2000;
        }
        .admin-panel.show { right: 0; }
        .admin-panel h2 { font-size: 32px; font-weight: 900; margin-bottom: 25px; }
        .admin-setting-box { background: rgba(255,255,255,0.05); border: 2px dashed var(--accent-secondary); border-radius: 15px; padding: 20px; margin-bottom: 25px; }
        .admin-label { font-size: 20px; font-weight: 900; margin: 15px 0 10px; display: block; }
        
        .color-picker { display: flex; gap: 15px; margin: 10px 0; }
        .color-dot { width: 45px; height: 45px; border-radius: 50%; border: 4px solid #fff; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .color-dot.active { transform: scale(1.15); outline: 4px solid var(--brand-main); outline-offset: 3px; }

        .input { width: 100%; padding: 15px; border: 2px solid #cbd5e1; border-radius: 12px; font-size: 18px; margin-bottom: 15px; }
        .btn { width: 100%; padding: 18px; font-size: 20px; font-weight: 900; border: none; border-radius: 12px; cursor: pointer; }

        .controls { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 15px; z-index: 1000; }
        .ctrl-btn { width: 65px; height: 65px; border-radius: 50%; border: 3px solid var(--accent-secondary); background: var(--card-bg); font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="header">
    <div>
        <div class="title-main">中正診所</div>
        <div style="font-size: 12px; color: var(--brand-main); font-weight: 900; letter-spacing: 2px;">PORTAL SYSTEM</div>
    </div>
    <div style="text-align: right;">
        <div id="clock" style="font-size: clamp(20px, 5vw, 32px); font-weight: 900; color: var(--accent-primary); font-variant-numeric: tabular-nums;">00:00:00</div>
        <div id="date" style="font-size: 13px; font-weight: 700;"></div>
    </div>
</div>

<div class="main">
    <div class="section-title">主要入口</div>
    <div id="primaryGrid" class="grid"></div>
    <div class="section-title">次要工具</div>
    <div id="secondaryGrid" class="grid"></div>
</div>

<div class="controls">
    <button class="ctrl-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <button class="ctrl-btn" onclick="toggleAdminMode()">⚙️</button>
</div>

<div class="admin-panel" id="adminPanel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>介面管理</h2>
        <button onclick="closeAdmin()" style="font-size:40px; border:none; background:none; cursor:pointer; color:#ef4444;">✕</button>
    </div>

    <div class="admin-setting-box">
        <h3 style="font-size:22px; color:var(--brand-main);">🎨 顯示設定</h3>
        <label class="admin-label">主題顏色</label>
        <div class="color-picker">
            <div class="color-dot" style="background:#0284c7" onclick="setColor('blue')" id="dot-blue"></div>
            <div class="color-dot" style="background:#059669" onclick="setColor('green')" id="dot-green"></div>
            <div class="color-dot" style="background:#8b5cf6" onclick="setColor('purple')" id="dot-purple"></div>
            <div class="color-dot" style="background:#64748b" onclick="setColor('gray')" id="dot-gray"></div>
        </div>

        <label class="admin-label">標題文字大小</label>
        <input type="range" id="titleSlider" min="16" max="45" value="28" style="width:100%; height:15px;" oninput="applyUIStyle()">
        
        <label class="admin-label">說明文字大小</label>
        <input type="range" id="descSlider" min="12" max="30" value="18" style="width:100%; height:15px;" oninput="applyUIStyle()">
    </div>

    <h3 style="font-size:22px; margin-bottom:15px;">🆕 新增書籤</h3>
    <input id="linkTitle" class="input" placeholder="名稱 (含「重要」自動變色)">
    <input id="linkUrl" class="input" placeholder="網址 (https://...)">
    <button class="btn" style="background:var(--brand-main); color:white;" onclick="saveLink()">儲存新增</button>
    
    <button class="btn" style="background:#8b5cf6; color:white; margin-top:40px;" onclick="location.reload()">🔄 同步雲端資料</button>
</div>

<script>
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/1uYBA_CncbEAydmzNC1SRnsKJdswNgQh3zg1x6TKo0UU/export?format=csv&gid=0`;
    let userLinks = JSON.parse(localStorage.getItem('cz_user_links_v4')) || { primary: [], secondary: [] };

    function setColor(color) {
        document.documentElement.setAttribute('data-color', color);
        document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
        document.getElementById('dot-' + color).classList.add('active');
        localStorage.setItem('cz_theme_color', color);
    }

    async function fetchCloudData() {
        try {
            const res = await fetch(SHEET_URL + "&cb=" + Date.now());
            const text = await res.text();
            const lines = text.split(/\r?\n/).slice(1);
            const pg = document.getElementById("primaryGrid");
            const sg = document.getElementById("secondaryGrid");
            pg.innerHTML = ""; sg.innerHTML = "";

            lines.forEach(line => {
                const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
                if (cols.length >= 3) {
                    const [cat, title, url, desc, icon] = cols;
                    const html = createCard({title, url, desc, icon, isHighlight: title.includes("重要")});
                    if (cat.toLowerCase().includes('primary')) pg.innerHTML += html;
                    else sg.innerHTML += html;
                }
            });
        } catch (e) { console.error("Cloud Error"); }
    }

    function createCard(l) {
        return `
            <div class="card ${l.isHighlight ? 'highlight-card' : ''}">
                <a class="card-link" href="${l.url}" target="_blank">
                    <span class="icon-box">${l.icon || '🔗'}</span>
                    <div class="card-title">${l.title}</div>
                    <div class="card-desc">${l.desc || ''}</div>
                </a>
            </div>`;
    }

    function applyUIStyle() {
        const ts = document.getElementById('titleSlider').value;
        const ds = document.getElementById('descSlider').value;
        document.documentElement.style.setProperty('--dynamic-title-size', ts + 'px');
        document.documentElement.style.setProperty('--dynamic-desc-size', ds + 'px');
        localStorage.setItem('cz_ui_config', JSON.stringify({ts, ds}));
    }

    function saveLink() {
        const title = document.getElementById('linkTitle').value;
        const url = document.getElementById('linkUrl').value;
        if(!title || !url) return;
        userLinks.secondary.push({id: Date.now(), title, url, icon: '🔗'});
        localStorage.setItem('cz_user_links_v4', JSON.stringify(userLinks));
        location.reload();
    }

    function toggleAdminMode() { document.getElementById("adminPanel").classList.toggle("show"); }
    function closeAdmin() { document.getElementById("adminPanel").classList.remove("show"); }
    function toggleTheme() {
        const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', next);
        document.getElementById('themeBtn').innerText = next === 'light' ? '🌙' : '☀️';
        localStorage.setItem('cz_portal_theme', next);
    }

    function updateClock() {
        const now = new Date();
        document.getElementById("clock").innerText = now.toLocaleTimeString("zh-TW", { hour12: false });
        const y = now.getFullYear();
        document.getElementById("date").innerText = `(民${y-1911}) ${y}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
    }

    window.onload = () => {
        const cfg = JSON.parse(localStorage.getItem('cz_ui_config'));
        if(cfg) {
            document.getElementById('titleSlider').value = cfg.ts;
            document.getElementById('descSlider').value = cfg.ds;
            applyUIStyle();
        }
        const savedColor = localStorage.getItem('cz_theme_color') || 'blue';
        setColor(savedColor);
        const savedTheme = localStorage.getItem('cz_portal_theme');
        if(savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('themeBtn').innerText = savedTheme === 'light' ? '🌙' : '☀️';
        }
        setInterval(updateClock, 1000); updateClock();
        fetchCloudData();
    };
</script>
</body>
</html>
