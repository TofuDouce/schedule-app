<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>中正診所 Portal</title>

<meta
name="robots"
content="noindex,nofollow,noarchive,nosnippet,noimageindex">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cinzel:wght@600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg1:#0b1020;
    --bg2:#111827;

    --card:
    rgba(18,25,45,.72);

    --border:
    rgba(255,255,255,.08);

    --text:#f8fafc;

    --muted:#94a3b8;

    --accent:#8b5cf6;

    --glow:
    rgba(139,92,246,.25);
}

body{

    min-height:100vh;

    overflow-x:hidden;

    background:

    radial-gradient(
    circle at top,
    rgba(139,92,246,.16),
    transparent 30%
    ),

    linear-gradient(
    180deg,
    var(--bg1),
    var(--bg2)
    );

    color:var(--text);

    font-family:
    "Inter",
    sans-serif;
}

/* 星空 */

.stars{

    position:fixed;

    inset:0;

    z-index:-1;

    overflow:hidden;
}

.star{

    position:absolute;

    width:2px;
    height:2px;

    background:white;

    border-radius:50%;

    opacity:.45;

    animation:twinkle 5s infinite;
}

@keyframes twinkle{

    0%{
        opacity:.1;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:.1;
    }
}

/* Main */

.main{

    width:100%;

    max-width:1400px;

    margin:auto;

    padding:42px 24px 80px;
}

/* Header */

.header{

    display:flex;

    justify-content:space-between;

    align-items:flex-start;

    gap:20px;

    margin-bottom:40px;
}

.title{

    font-family:
    "Cinzel",
    serif;

    font-size:clamp(40px,7vw,72px);

    line-height:1.1;

    background:
    linear-gradient(
    180deg,
    #ffffff,
    #ddd6fe
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{

    margin-top:18px;

    color:var(--muted);

    line-height:1.9;

    font-size:18px;
}

/* 時間 */

.clock-box{

    text-align:right;
}

.clock{

    font-size:54px;

    font-weight:700;
}

.date{

    margin-top:10px;

    color:var(--muted);

    line-height:1.7;

    font-size:15px;
}

/* 管理按鈕 */

.admin-btn{

    position:fixed;

    top:24px;
    right:24px;

    width:58px;
    height:58px;

    border:none;

    border-radius:18px;

    cursor:pointer;

    font-size:26px;

    color:white;

    z-index:999;

    background:
    rgba(139,92,246,.18);

    border:
    1px solid rgba(139,92,246,.28);

    backdrop-filter:blur(18px);

    transition:.25s;
}

.admin-btn:hover{

    transform:
    rotate(90deg);

    box-shadow:
    0 10px 30px
    rgba(139,92,246,.28);
}

/* Grid */

.grid{

    display:grid;

    grid-template-columns:
    repeat(
        auto-fit,
        minmax(320px,1fr)
    );

    gap:28px;
}

/* Card */

.card{

    background:
    var(--card);

    border:
    1px solid var(--border);

    border-radius:32px;

    padding:32px;

    text-decoration:none;

    color:white;

    backdrop-filter:blur(20px);

    position:relative;

    overflow:hidden;

    transition:.3s;

    min-height:320px;
}

.card:hover{

    transform:
    translateY(-8px);

    border:
    1px solid rgba(139,92,246,.25);

    box-shadow:
    0 20px 50px
    var(--glow);
}

.card::before{

    content:"";

    position:absolute;

    inset:0;

    background:
    radial-gradient(
    circle at top right,
    rgba(255,255,255,.06),
    transparent 50%
    );

    pointer-events:none;
}

.card-top{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:28px;
}

.icon{

    width:68px;
    height:68px;

    border-radius:22px;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:32px;

    background:
    rgba(139,92,246,.14);

    border:
    1px solid rgba(139,92,246,.24);
}

.tag{

    color:#d8c7ff;

    font-size:14px;

    letter-spacing:1px;
}

.card-title{

    font-size:40px;

    font-weight:800;

    line-height:1.2;

    margin-bottom:18px;
}

.card-url{

    color:var(--muted);

    line-height:1.7;

    font-size:13px;

    margin-bottom:24px;

    word-break:break-all;
}

.card-desc{

    color:#dbe4ff;

    line-height:1.9;

    font-size:17px;
}

.open{

    position:absolute;

    left:32px;
    bottom:28px;

    color:#b794ff;

    letter-spacing:2px;

    font-size:14px;
}

/* 手機 */

@media(max-width:900px){

    .header{

        flex-direction:column;
    }

    .clock-box{

        text-align:left;
    }

    .clock{

        font-size:42px;
    }

    .card-title{

        font-size:34px;
    }
}

</style>
</head>

<body>

<!-- 星空 -->

<div class="stars" id="stars"></div>

<!-- 管理 -->

<button
class="admin-btn"
onclick="openAdmin()">

⚙️

</button>

<!-- Main -->

<div class="main">

    <!-- Header -->

    <div class="header">

        <div>

            <div class="title">
                中正診所 Portal
            </div>

            <div class="subtitle">
                集中所有工作入口與常用網站，
                <br>
                讓每天工作更快速順手。
            </div>

        </div>

        <div class="clock-box">

            <div
            class="clock"
            id="clock">

                --:--

            </div>

            <div
            class="date"
            id="date">

            </div>

        </div>

    </div>

    <!-- Cards -->

    <div class="grid">

        <!-- Card 1 -->

        <a
        class="card"
        href="https://www.nhi.gov.tw/"
        target="_blank">

            <div class="card-top">

                <div class="icon">
                    🩺
                </div>

                <div class="tag">
                    VPN
                </div>

            </div>

            <div class="card-title">
                健保 VPN
            </div>

            <div class="card-url">
                https://www.nhi.gov.tw/
            </div>

            <div class="card-desc">
                健保相關入口與 VPN 使用網站。
            </div>

            <div class="open">
                OPEN →
            </div>

        </a>

        <!-- Card 2 -->

        <a
        class="card"
        href="https://medvpn.mohw.gov.tw/"
        target="_blank">

            <div class="card-top">

                <div class="icon">
                    🌐
                </div>

                <div class="tag">
                    nIIS
                </div>

            </div>

            <div class="card-title">
                nIIS 系統
            </div>

            <div class="card-url">
                https://medvpn.mohw.gov.tw/
            </div>

            <div class="card-desc">
                疫苗與醫療相關資訊查詢入口。
            </div>

            <div class="open">
                OPEN →
            </div>

        </a>

        <!-- Card 3 -->

        <a
        class="card"
        href="https://www.google.com/"
        target="_blank">

            <div class="card-top">

                <div class="icon">
                    💊
                </div>

                <div class="tag">
                    TOOL
                </div>

            </div>

            <div class="card-title">
                慢箋計算
            </div>

            <div class="card-url">
                https://www.google.com/
            </div>

            <div class="card-desc">
                慢性處方箋與領藥天數計算工具。
            </div>

            <div class="open">
                OPEN →
            </div>

        </a>

    </div>

</div>

<script>

/* 星空 */

const stars =
document.getElementById("stars");

for(let i=0;i<120;i++){

    const star =
    document.createElement("div");

    star.className = "star";

    star.style.left =
    Math.random()*100 + "%";

    star.style.top =
    Math.random()*100 + "%";

    star.style.animationDelay =
    Math.random()*5 + "s";

    stars.appendChild(star);
}

/* 時間 */

function updateClock(){

    const now =
    new Date();

    document
    .getElementById("clock")
    .innerText =

    now.toLocaleTimeString(
    "zh-TW",
    {
        hour:"2-digit",
        minute:"2-digit"
    });

    document
    .getElementById("date")
    .innerText =

    now.toLocaleDateString(
    "zh-TW",
    {
        year:"numeric",
        month:"long",
        day:"numeric",
        weekday:"long"
    });
}

updateClock();

setInterval(
updateClock,
1000
);

/* Admin */

const PASSWORD =
"720750";

function openAdmin(){

    const pass =
    prompt("請輸入管理密碼");

    if(pass !== PASSWORD){

        alert("密碼錯誤");

        return;
    }

    alert("管理模式開發中 ✨");
}

</script>

</body>
</html>
