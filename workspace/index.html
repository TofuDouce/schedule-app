<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中正診所 Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800&family=Cinzel:wght@700&display=swap" rel="stylesheet">

    <style>
        :root[data-theme="light"] {
            --bg-grad: linear-gradient(180deg, #f8fafc, #e2e8f0);
            --card-bg: #ffffff;
            --accent-primary: #0284c7; 
            --accent-gold: #b45309;   
            --text-main: #000000;     
            --text-sub: #1e293b;      
            --border-color: rgba(180, 83, 9, 0.3);
            --star-opacity: 0.1;
        }

        :root[data-theme="dark"] {
            --bg-grad: linear-gradient(180deg, #060816, #0c1224);
            --card-bg: rgba(16, 22, 40, 0.95);
            --accent-primary: #38bdf8;
            --accent-gold: #d4af37;
            --text-main: #ffffff;
            --text-sub: #e2e8f0;
            --border-color: rgba(212, 175, 55, 0.4);
            --star-opacity: 0.5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; background: var(--bg-grad); color: var(--text-main); font-family: "Inter", "Microsoft JhengHei", sans-serif; transition: 0.4s; overflow-x: hidden; }

        /* Mucha 風格裝飾框 */
        .mucha-frame { position: fixed; inset: 15px; pointer-events: none; z-index: 99; border: 1px solid var(--border-color); border-radius: 30px; }
        .corner { position: absolute; width: 80px; height: 80px; border: 2px solid var(--accent-gold); opacity: 0.6; }
        .tl { top:-2px; left:-2px; border-radius: 30px 0 0 0; border-right:none; border-bottom:none; }
        .tr { top:-2px; right:-2px; border-radius: 0 30px 0 0; border-left:none; border-bottom:none; }
        .bl { bottom:-2px; left:-2px; border-radius: 0 0 0 30px; border-right:none; border-top:none; }
        .br { bottom:-2px; right:-2px; border-radius: 0 0 30px 0; border-left:none; border-top:none; }

        .stars { position: fixed; inset: 0; z-index: -1; opacity: var(--star-opacity); pointer-events: none; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 4s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .main { width: 100%; max-width: 1400px; margin: auto; padding: 50px 40px; position: relative; z-index: 10; }
        
        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 50px; border-bottom: 4px solid var(--accent-gold); padding-bottom: 25px; }
        .title-main { font-size: 64px; font-weight: 900; letter-spacing: -1px; }
        .title-sub { font-family: 'Cinzel', serif; font-size: 24px; color: var(--accent-gold); letter-spacing: 6px; margin-top: 5px; }
        
        .clock-area { text-align: right; }
        .clock { font-size: 72px; font-weight: 900; color: var(--accent-primary); line-height: 1; font-variant-numeric: tabular-nums; }
        .date-display { font-size: 28px; font-weight: 800; margin-top: 10px; color: var(--text-sub); }

        .mode-toggle { 
            margin-top: 20px; padding: 12px 30px; font-size: 22px; font-weight: 800; 
            border-radius: 50px; border: 2px solid var(--accent-gold); 
            background: transparent; color: var(--accent-gold); cursor: pointer; transition: 0.3s;
        }
        .mode-toggle:hover { background: var(--accent-gold); color: white; }

        .section-title { font-size: 38px; font-weight: 900; margin: 50px 0 25px; padding-left: 20px; border-left: 12px solid var(--accent-gold); color: var(--text-main); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        @media (min-width: 1300px) { .grid { grid-template-columns: repeat(5, 1fr); } }

        .card { background: var(--card-bg); border-radius: 24px; border: 2px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.1); transition: 0.3s; height: 100%; overflow: hidden; }
        .card:hover { transform: translateY(-8px); border-color: var(--accent-gold); box-shadow: 0 15px 40px rgba(0,0,0,0.2); }
        .card-link { display: block; padding: 30px; text-decoration: none; color: inherit; }
        
        .icon-box { font-size: 45px; margin-bottom: 15px; display: block; }
        .card-title { font-size: 32px; font-weight: 900; margin-bottom: 12px; color: var(--accent-primary); line-height: 1.2; }
        .card-desc { font-size: 20px; font-weight: 700; color: var(--text-sub); line-height: 1.5; }

        /* 管理面板 */
        .admin-btn { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; background: var(--card-bg); border: 1px solid var(--accent-gold); color: var(--accent-gold); font-size: 30px; cursor: pointer; opacity: 0.4; z-index: 1000; transition: 0.3s; }
        .admin-btn:hover { opacity: 1; transform: rotate(90deg); }

        .admin-panel { position: fixed; top: 0; right: -100%; width: 100%; max-width: 450px; height: 100vh; background: #ffffff; border-left: 8px solid var(--accent-gold); padding: 35px; overflow-y: auto; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10000; color: #000; box-shadow: -10px 0 50px rgba(0,0,0,0.5); }
        .admin-panel.show { right: 0; }
        .input { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 12px; font-size: 18px; margin-bottom: 15px; }
        .save-btn { width: 100%; padding: 20px; background: var(--accent-gold); color: white; font-weight: 900; font-size: 22px; border: none; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>

<div class="mucha-frame"><div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div></div>
<div class="stars" id="stars"></div>

<div class="main">
    <div class="header">
        <div>
            <div class="title-main">中正診所</div>
            <div class="title-sub">PORTAL SYSTEM</div>
        </div>
        <div class="clock-area">
            <div class="clock" id="clock">00:00:00</div>
            <div class="date-display" id="date">載入中...</div>
            <button class="mode-toggle" onclick="toggleTheme()" id="themeBtn">切換至夜間模式 🌙</button>
        </div>
    </div>

    <div class="section-title">主要入口</div>
    <div class="grid" id="primaryGrid"></div>

    <div class="section-title">次要工具</div>
    <div class="grid" id="secondaryGrid"></div>
</div>

<button class="admin-btn" onclick="openAdmin()">⚙️</button>

<div class="admin-panel" id="adminPanel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h2 style="font-size:32px; font-weight:900;">管理面板</h2>
        <button onclick="closeAdmin()" style="background:none; border:none; font-size:40px; cursor:pointer;">✕</button>
    </div>
    
    <label style="font-weight:800;">分類</label>
    <select id="linkCategory" class="input">
        <option value="primary">主要入口</option>
        <option value="secondary">次要工具</option>
    </select>
    <input id="linkIcon" class="input" placeholder="貼上圖示 Emoji (如 🩺)">
    <input id="linkTitle" class="input" placeholder="網站名稱">
    <input id="linkUrl" class="input" placeholder="網址 (https://)">
    <input id="linkDesc" class="input" placeholder="說明文字">
    <button class="save-btn" id="saveBtn" onclick="saveLink()">保存設定</button>

    <div id="manageList" style="margin-top:30px;"></div>
</div>

<script>
    const _H = "8227b6c507a2a6b7e6417539c36d2c416e9196b653245053f3e786b6a22287b3";

    let primaryLinks = JSON.parse(localStorage.getItem('cz_primary_v2')) || [
        { title: "中正診所 HIS", url: "https://webhis.vision.com.tw/88336/login", desc: "門診系統登入", icon: "🩺" },
        { title: "VPN 健保系統", url: "https://medvpn.nhi.gov.tw/iwse0000/IWSE0001S01.aspx", desc: "健保資訊網服務系統", icon: "💻" },
        { title: "智慧防疫物資", url: "https://smis.cdc.gov.tw/SMIS/Default.aspx", desc: "每週一需登入 (SMIS)", icon: "📦" },
        { title: "雲端查詢系統", url: "https://medcloud2.nhi.gov.tw/imu/IMUE1000/", desc: "健保醫療資訊雲端查詢", icon: "☁️" },
        { title: "NIIS 系統", url: "https://10.241.219.42/Login.aspx", desc: "預防接種管理子系統", icon: "💉" }
    ];

    let secondaryLinks = JSON.parse(localStorage.getItem('cz_secondary_v2')) || [
        { title: "亞東轉診掛號", url: "https://www.femh.org.tw/webregs/HClinicLogin.aspx", desc: "亞東醫院轉診服務", icon: "🏥" },
        { title: "亞東轉診查詢", url: "https://hos.femh.org.tw/hosmanplatform/login.aspx", desc: "掛號結果查詢", icon: "🔍" },
        { title: "台灣醫品平台", url: "https://manage.healthleader.com.tw/Account/Login?ReturnUrl=%2F", desc: "醫品平台登入", icon: "📋" },
        { title: "家醫大平台", url: "https://medqfm.nhi.gov.tw/health-ui/#/login", desc: "健保家醫照護", icon: "🏠" },
        { title: "Paxlovid 比對", url: "https://depart.femh.org.tw/meta/paxsearch.htm?0.08336732489988208", desc: "商品名比對交互作用", icon: "💊" },
        { title: "腎絲球計算", url: "https://www.tckdf.org.tw/Main/CKDEPI?scr=0&age=0&gender=0", desc: "eGFR 計算工具", icon: "🧪" }
    ];

    let editingIndex = null;
    let editingCategory = null;

    async function openAdmin() {
        const pass = prompt("請輸入管理金鑰");
        if (!pass) return;
        const msgBuffer = new TextEncoder().encode(pass.trim());
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        if (hashHex === _H || pass === "720750") {
            document.getElementById("adminPanel").classList.add("show");
            renderManageList();
        } else { alert("密碼錯誤"); }
    }

    function saveLink() {
        const cat = document.getElementById("linkCategory").value;
        const icon = document.getElementById("linkIcon").value || "✨";
        const title = document.getElementById("linkTitle").value.trim();
        const url = document.getElementById("linkUrl").value.trim();
        const desc = document.getElementById("linkDesc").value.trim();
        if (!title || !url) return alert("請完整填寫");
        const item = { title, url, desc, icon };
        if (editingIndex !== null) {
            if (editingCategory === cat) (cat === 'primary' ? primaryLinks : secondaryLinks)[editingIndex] = item;
            else { deleteLink(editingCategory, editingIndex, false); (cat === 'primary' ? primaryLinks : secondaryLinks).push(item); }
        } else { (cat === 'primary' ? primaryLinks : secondaryLinks).push(item); }
        localStorage.setItem('cz_primary_v2', JSON.stringify(primaryLinks));
        localStorage.setItem('cz_secondary_v2', JSON.stringify(secondaryLinks));
        render(); renderManageList(); closeAdmin();
    }

    function deleteLink(cat, index, ask = true) {
        if (ask && !confirm("確定刪除？")) return;
        (cat === 'primary' ? primaryLinks : secondaryLinks).splice(index, 1);
        localStorage.setItem('cz_primary_v2', JSON.stringify(primaryLinks));
        localStorage.setItem('cz_secondary_v2', JSON.stringify(secondaryLinks));
        render(); renderManageList();
    }

    function renderManageList() {
        const list = document.getElementById("manageList");
        let html = "";
        const fn = (l, i, c) => `<div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;"><span>${l.icon} ${l.title}</span><button onclick="deleteLink('${c}', ${i})" style="color:red; border:none; background:none; cursor:pointer;">刪除</button></div>`;
        html += "<b>主要入口</b>" + primaryLinks.map((l, i) => fn(l, i, 'primary')).join('');
        html += "<b style='display:block;margin-top:20px;'>次要工具</b>" + secondaryLinks.map((l, i) => fn(l, i, 'secondary')).join('');
        list.innerHTML = html;
    }

    function render() {
        const fn = (l) => `<div class="card"><a class="card-link" href="${l.url}" target="_blank"><span class="icon-box">${l.icon}</span><div class="card-title">${l.title}</div><div class="card-desc">${l.desc}</div></a></div>`;
        document.getElementById("primaryGrid").innerHTML = primaryLinks.map(fn).join('');
        document.getElementById("secondaryGrid").innerHTML = secondaryLinks.map(fn).join('');
    }

    function updateClock() {
        const now = new Date();
        document.getElementById("clock").innerText = now.toLocaleTimeString("zh-TW", { hour12: false });
        const y = now.getFullYear();
        const week = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
        document.getElementById("date").innerText = `(民${y-1911}) ${y}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${week[now.getDay()]}`;
    }

    function toggleTheme() {
        const doc = document.documentElement;
        const next = doc.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        doc.setAttribute('data-theme', next);
        document.getElementById('themeBtn').innerText = next === 'light' ? '切換至夜間模式 🌙' : '切換至日間模式 ☀️';
    }

    const stars = document.getElementById("stars");
    for(let i=0; i<80; i++) {
        const s = document.createElement("div");
        s.className = "star";
        s.style.width = s.style.height = (Math.random()*3)+"px";
        s.style.top = Math.random()*100+"%";
        s.style.left = Math.random()*100+"%";
        s.style.animationDelay = Math.random()*4+"s";
        stars.appendChild(s);
    }

    function closeAdmin() { document.getElementById("adminPanel").classList.remove("show"); editingIndex = null; }
    setInterval(updateClock, 1000); updateClock(); render();
</script>
</body>
</html>
