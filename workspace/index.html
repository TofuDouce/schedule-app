<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中正診所 Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800&display=swap" rel="stylesheet">

    <style>
        /* 針對高齡友善優化：高對比顏色設定 */
        :root[data-theme="light"] {
            --bg-grad: #f8fafc;
            --card-bg: #ffffff;
            --accent-primary: #0284c7; /* 明亮的藍色 */
            --accent-gold: #b45309;   /* 深金色，確保對比 */
            --text-main: #0f172a;     /* 極深藍，接近黑 */
            --text-sub: #1e293b;      /* 清晰的次要文字 */
            --border-color: #cbd5e1;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        :root[data-theme="dark"] {
            --bg-grad: #0f172a;
            --card-bg: #1e293b;
            --accent-primary: #38bdf8;
            --accent-gold: #fbbf24;
            --text-main: #f8fafc;
            --text-sub: #e2e8f0;
            --border-color: #334155;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; background: var(--bg-grad); color: var(--text-main); font-family: "Inter", "Microsoft JhengHei", sans-serif; transition: 0.3s; padding-bottom: 50px; }

        .main { width: 100%; max-width: 1400px; margin: auto; padding: 30px 20px; }
        
        /* 標題區塊 */
        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; flex-wrap: wrap; gap: 20px; border-bottom: 3px solid var(--accent-primary); padding-bottom: 20px; }
        .title-main { font-size: 56px; font-weight: 800; color: var(--text-main); }
        .title-sub { font-size: 24px; color: var(--accent-gold); letter-spacing: 2px; font-weight: 600; }
        
        .clock-area { text-align: right; min-width: 300px; }
        .clock { font-size: 64px; font-weight: 800; color: var(--accent-primary); line-height: 1; }
        .date-display { font-size: 26px; font-weight: 800; margin-top: 10px; color: var(--text-sub); }

        /* 切換按鈕放大 */
        .mode-toggle { 
            margin-top: 20px; padding: 15px 30px; font-size: 22px; font-weight: 800; 
            border-radius: 15px; border: 3px solid var(--accent-primary); 
            background: var(--card-bg); color: var(--accent-primary); cursor: pointer; 
        }

        /* 分區標題 */
        .section-title { font-size: 32px; font-weight: 800; margin: 40px 0 20px; padding-left: 15px; border-left: 8px solid var(--accent-gold); color: var(--text-main); }

        /* Grid 佈局：電腦版 5 欄 */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }
        @media (min-width: 1300px) { .grid { grid-template-columns: repeat(5, 1fr); } }

        /* 卡片放大設計 */
        .card { background: var(--card-bg); border-radius: 20px; border: 2px solid var(--border-color); box-shadow: var(--shadow); transition: 0.2s; height: 100%; }
        .card:hover { transform: scale(1.03); border-color: var(--accent-primary); }
        .card-link { display: block; padding: 25px; text-decoration: none; color: inherit; }
        .card-title { font-size: 28px; font-weight: 800; margin-bottom: 10px; color: var(--accent-primary); line-height: 1.2; }
        .card-desc { font-size: 18px; font-weight: 600; color: var(--text-sub); line-height: 1.4; }

        @media (max-width: 768px) {
            .header { flex-direction: column; text-align: center; align-items: center; }
            .clock-area { text-align: center; }
            .title-main { font-size: 48px; }
        }

        /* 管理模式 */
        .admin-btn { position: fixed; bottom: 20px; right: 20px; width: 70px; height: 70px; border-radius: 50%; background: #475569; color: white; font-size: 30px; border: none; cursor: pointer; opacity: 0.5; }
        .admin-btn:hover { opacity: 1; }
    </style>
</head>
<body>

<div class="main">
    <div class="header">
        <div class="title-group">
            <div class="title-main">中正診所</div>
            <div class="title-sub">PORTAL SYSTEM</div>
        </div>
        <div class="clock-area">
            <div class="clock" id="clock">00:00:00</div>
            <div class="date-display" id="date">載入中...</div>
            <button class="mode-toggle" onclick="toggleTheme()" id="themeBtn">切換至夜間模式 🌙</button>
        </div>
    </div>

    <div class="section-title">主要入口</div>
    <div class="grid" id="primaryGrid"></div>

    <div class="section-title">次要工具</div>
    <div class="grid" id="secondaryGrid"></div>
</div>

<button class="admin-btn" onclick="openAdmin()">⚙️</button>

<script>
    // 預先設定好的書籤清單
    const primaryLinks = [
        { title: "中正診所 HIS", url: "https://webhis.vision.com.tw/88336/login", desc: "門診系統登入" },
        { title: "VPN 健保系統", url: "https://medvpn.nhi.gov.tw/iwse0000/IWSE0001S01.aspx", desc: "健保資訊網服務系統" },
        { title: "智慧防疫物資", url: "https://smis.cdc.gov.tw/SMIS/Default.aspx", desc: "每週一需登入 (SMIS)" },
        { title: "雲端查詢系統", url: "https://medcloud2.nhi.gov.tw/imu/IMUE1000/", desc: "健保醫療資訊雲端查詢" },
        { title: "NIIS 系統", url: "https://10.241.219.42/Login.aspx", desc: "預防接種管理子系統" }
    ];

    const secondaryLinks = [
        { title: "亞東轉診掛號", url: "https://www.femh.org.tw/webregs/HClinicLogin.aspx", desc: "亞東醫院轉診服務" },
        { title: "亞東轉診查詢", url: "https://hos.femh.org.tw/hosmanplatform/login.aspx", desc: "掛號結果查詢" },
        { title: "台灣醫品平台", url: "https://manage.healthleader.com.tw/Account/Login?ReturnUrl=%2F", desc: "醫品平台登入" },
        { title: "家醫大平台", url: "https://medqfm.nhi.gov.tw/health-ui/#/login", desc: "健保家醫照護" },
        { title: "Paxlovid 比對", url: "https://depart.femh.org.tw/meta/paxsearch.htm?0.08336732489988208", desc: "商品名比對交互作用" },
        { title: "腎絲球過濾率", url: "https://www.tckdf.org.tw/Main/CKDEPI?scr=0&age=0&gender=0", desc: "eGFR 計算工具" }
    ];

    function render() {
        const pGrid = document.getElementById("primaryGrid");
        const sGrid = document.getElementById("secondaryGrid");
        
        pGrid.innerHTML = primaryLinks.map(link => `
            <div class="card">
                <a class="card-link" href="${link.url}" target="_blank">
                    <div class="card-title">${link.title}</div>
                    <div class="card-desc">${link.desc}</div>
                </a>
            </div>
        `).join('');

        sGrid.innerHTML = secondaryLinks.map(link => `
            <div class="card">
                <a class="card-link" href="${link.url}" target="_blank">
                    <div class="card-title">${link.title}</div>
                    <div class="card-desc">${link.desc}</div>
                </a>
            </div>
        `).join('');
    }

    function updateClock() {
        const now = new Date();
        document.getElementById("clock").innerText = now.toLocaleTimeString("zh-TW", { hour12: false });
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const mingguo = year - 1911;
        const weekDays = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
        document.getElementById("date").innerText = `(民${mingguo}) ${year}/${month}/${day} ${weekDays[now.getDay()]}`;
    }

    function toggleTheme() {
        const doc = document.documentElement;
        const isLight = doc.getAttribute('data-theme') === 'light';
        const next = isLight ? 'dark' : 'light';
        doc.setAttribute('data-theme', next);
        document.getElementById('themeBtn').innerText = next === 'light' ? '切換至夜間模式 🌙' : '切換至日間模式 ☀️';
    }

    function openAdmin() {
        const pass = prompt("管理密碼");
        if (pass === "720750") alert("目前為快速存取模式，如需新增書籤請告知助理更新程式碼。");
    }

    setInterval(updateClock, 1000);
    updateClock();
    render();
</script>
</body>
</html>
