<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>中正診所 Portal</title>

<meta
name="robots"
content="noindex,nofollow,noarchive,nosnippet,noimageindex">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cinzel:wght@500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg1:#0f172a;
    --bg2:#111827;
    --bg3:#1e293b;

    --card:
    rgba(20,27,45,.72);

    --border:
    rgba(255,255,255,.08);

    --text:#f8fafc;

    --muted:#94a3b8;

    --accent:#8b5cf6;

    --glow:
    rgba(139,92,246,.35);
}

html{
    scroll-behavior:smooth;
}

body{

    background:
    radial-gradient(
    circle at top,
    rgba(139,92,246,.15),
    transparent 30%
    ),

    linear-gradient(
    180deg,
    var(--bg1),
    var(--bg2),
    var(--bg3)
    );

    min-height:100vh;

    color:var(--text);

    font-family:
    "Inter",
    sans-serif;

    overflow-x:hidden;
}

/* 星空 */

.stars{

    position:fixed;

    inset:0;

    overflow:hidden;

    z-index:-2;
}

.star{

    position:absolute;

    width:2px;
    height:2px;

    background:white;

    border-radius:50%;

    opacity:.5;

    animation:twinkle 4s infinite;
}

@keyframes twinkle{

    0%{
        opacity:.1;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:.1;
    }
}

/* Layout */

.layout{

    display:flex;

    min-height:100vh;
}

/* Sidebar */

.sidebar{

    width:280px;

    background:
    rgba(10,15,30,.72);

    border-right:
    1px solid var(--border);

    backdrop-filter:blur(18px);

    padding:28px;

    display:flex;

    flex-direction:column;

    position:fixed;

    top:0;
    left:0;
    bottom:0;

    z-index:100;
}

.logo{

    margin-bottom:40px;
}

.logo-title{

    font-family:
    "Cinzel",
    serif;

    font-size:30px;

    line-height:1.3;

    background:
    linear-gradient(
        180deg,
        #ffffff,
        #c4b5fd
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.logo-sub{

    margin-top:10px;

    color:var(--muted);

    font-size:14px;

    line-height:1.7;
}

/* 搜尋 */

.search-box{

    margin-bottom:30px;
}

.search{

    width:100%;

    height:52px;

    border:none;

    outline:none;

    border-radius:16px;

    background:
    rgba(255,255,255,.05);

    color:white;

    padding:0 18px;

    font-size:15px;
}

/* Menu */

.menu{

    display:flex;

    flex-direction:column;

    gap:10px;
}

.menu-item{

    padding:14px 16px;

    border-radius:14px;

    color:#dbe4ff;

    transition:.25s;

    font-size:15px;

    background:
    rgba(255,255,255,.03);
}

.menu-item.active{

    background:
    rgba(139,92,246,.18);

    border:
    1px solid rgba(139,92,246,.3);
}

/* Main */

.main{

    flex:1;

    margin-left:280px;

    padding:40px;
}

/* Header */

.header{

    display:flex;

    justify-content:space-between;

    align-items:flex-start;

    margin-bottom:34px;
}

.header-title{

    font-size:40px;

    font-weight:700;

    line-height:1.2;
}

.header-sub{

    margin-top:12px;

    color:var(--muted);

    font-size:16px;

    line-height:1.8;
}

.time{

    text-align:right;
}

.time-clock{

    font-size:32px;

    font-weight:700;
}

.time-date{

    color:var(--muted);

    margin-top:8px;

    font-size:15px;

    line-height:1.6;
}

/* 管理按鈕 */

.admin-btn{

    margin-top:22px;

    padding:14px 20px;

    border:none;

    border-radius:16px;

    cursor:pointer;

    background:
    linear-gradient(
    90deg,
    rgba(139,92,246,.25),
    rgba(124,58,237,.25)
    );

    border:
    1px solid rgba(139,92,246,.3);

    color:#e9ddff;

    font-size:15px;

    transition:.25s;
}

.admin-btn:hover{

    transform:
    translateY(-2px);

    box-shadow:
    0 10px 30px rgba(139,92,246,.2);
}

/* Grid */

.grid{

    display:grid;

    grid-template-columns:
    repeat(
        auto-fill,
        minmax(320px,1fr)
    );

    gap:24px;
}

/* Card */

.card{

    background:
    var(--card);

    border:
    1px solid var(--border);

    border-radius:28px;

    padding:28px;

    backdrop-filter:blur(18px);

    transition:.3s;

    position:relative;

    overflow:hidden;

    text-decoration:none;

    color:white;

    min-height:320px;
}

.card:hover{

    transform:
    translateY(-8px);

    border:
    1px solid rgba(139,92,246,.35);

    box-shadow:
    0 20px 50px var(--glow);
}

.card::before{

    content:"";

    position:absolute;

    inset:0;

    background:
    radial-gradient(
    circle at top right,
    rgba(255,255,255,.06),
    transparent 45%
    );

    pointer-events:none;
}

.card-top{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:26px;
}

.icon{

    width:64px;
    height:64px;

    border-radius:20px;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:28px;

    background:
    rgba(139,92,246,.15);

    border:
    1px solid rgba(139,92,246,.25);
}

.category{

    font-size:14px;

    color:#d8c4ff;

    letter-spacing:1px;
}

.card-title{

    font-size:42px;

    font-weight:800;

    margin-bottom:18px;

    line-height:1.2;
}

.card-url{

    font-size:13px;

    color:var(--muted);

    word-break:break-all;

    margin-bottom:20px;

    line-height:1.6;
}

.card-desc{

    color:#dbe4ff;

    line-height:1.9;

    font-size:18px;
}

.open{

    position:absolute;

    left:28px;
    bottom:24px;

    color:#b794ff;

    font-size:15px;

    letter-spacing:2px;
}

/* Admin Panel */

.admin-panel{

    position:fixed;

    top:0;

    right:-460px;

    width:460px;

    height:100vh;

    background:
    rgba(15,23,42,.98);

    border-left:
    1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(24px);

    transition:.35s;

    z-index:9999;

    overflow-y:auto;

    padding:28px;
}

.admin-panel.show{

    right:0;
}

.admin-title{

    font-size:30px;

    font-weight:700;

    margin-bottom:30px;
}

.form-group{

    margin-bottom:20px;
}

.label{

    display:block;

    margin-bottom:10px;

    font-size:14px;

    color:#dbe4ff;
}

.input{

    width:100%;

    height:52px;

    border:none;

    outline:none;

    border-radius:14px;

    background:
    rgba(255,255,255,.05);

    color:white;

    padding:0 16px;
}

.textarea{

    width:100%;

    min-height:100px;

    border:none;

    outline:none;

    border-radius:14px;

    background:
    rgba(255,255,255,.05);

    color:white;

    padding:16px;

    resize:vertical;
}

.button{

    width:100%;

    height:52px;

    border:none;

    border-radius:14px;

    cursor:pointer;

    color:white;

    font-size:15px;

    font-weight:600;

    margin-top:12px;
}

.add-btn{

    background:
    linear-gradient(
    90deg,
    #8b5cf6,
    #7c3aed
    );
}

.download-btn{

    background:
    linear-gradient(
    90deg,
    #2563eb,
    #1d4ed8
    );
}

.admin-list{

    margin-top:34px;

    display:flex;

    flex-direction:column;

    gap:16px;
}

.admin-item{

    background:
    rgba(255,255,255,.04);

    border:
    1px solid rgba(255,255,255,.06);

    border-radius:18px;

    padding:18px;
}

.admin-item-title{

    font-size:18px;

    font-weight:700;

    margin-bottom:10px;
}

.delete-btn{

    margin-top:14px;

    border:none;

    border-radius:10px;

    padding:10px 14px;

    background:
    rgba(239,68,68,.15);

    color:#fca5a5;

    cursor:pointer;
}

/* 手機 */

@media(max-width:1000px){

    .sidebar{
        display:none;
    }

    .main{
        margin-left:0;
        padding:24px;
    }

    .header{
        flex-direction:column;
        gap:20px;
    }

    .header-title{
        font-size:34px;
    }

    .card-title{
        font-size:32px;
    }

    .admin-panel{
        width:100%;
    }
}

</style>
</head>

<body onload="window.scrollTo(0,0)">

<div class="stars" id="stars"></div>

<div class="layout">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">

            <div class="logo-title">
                中正診所
                <br>
                Portal
            </div>

            <div class="logo-sub">
                Clinic Workspace System
            </div>

        </div>

        <div class="search-box">

            <input
            id="search"
            class="search"
            placeholder="搜尋網站...">

        </div>

        <div class="menu">

            <div class="menu-item active">
                ✦ 全部工具
            </div>

            <div class="menu-item">
                🩺 醫療系統
            </div>

            <div class="menu-item">
                🧾 行政系統
            </div>

            <div class="menu-item">
                🌐 外部網站
            </div>

        </div>

    </aside>

    <!-- Main -->

    <main class="main">

        <div class="header">

            <div>

                <div class="header-title">
                    中正診所 Portal
                </div>

                <div class="header-sub">
                    常用工作網站與系統入口
                </div>

                <button
                class="admin-btn"
                onclick="openAdmin()">

                    ⚙ 管理模式

                </button>

            </div>

            <div class="time">

                <div
                class="time-clock"
                id="clock">
                    --:--
                </div>

                <div
                class="time-date"
                id="date">
                </div>

            </div>

        </div>

        <div
        class="grid"
        id="grid">

        </div>

    </main>

</div>

<!-- Admin Panel -->

<div
class="admin-panel"
id="adminPanel">

    <div class="admin-title">
        Admin Panel
    </div>

    <div class="form-group">

        <label class="label">
            網站名稱
        </label>

        <input
        id="title"
        class="input">

    </div>

    <div class="form-group">

        <label class="label">
            分類
        </label>

        <input
        id="category"
        class="input">

    </div>

    <div class="form-group">

        <label class="label">
            ICON
        </label>

        <input
        id="icon"
        class="input">

    </div>

    <div class="form-group">

        <label class="label">
            網址
        </label>

        <input
        id="url"
        class="input">

    </div>

    <div class="form-group">

        <label class="label">
            描述
        </label>

        <textarea
        id="description"
        class="textarea"></textarea>

    </div>

    <button
    class="button add-btn"
    onclick="addWebsite()">

        新增網站

    </button>

    <button
    class="button download-btn"
    onclick="downloadJSON()">

        下載 data.json

    </button>

    <div
    class="admin-list"
    id="adminList">

    </div>

</div>

<script>

/* 星空 */

const stars =
document.getElementById("stars");

for(let i=0;i<120;i++){

    const star =
    document.createElement("div");

    star.className = "star";

    star.style.left =
    Math.random()*100 + "%";

    star.style.top =
    Math.random()*100 + "%";

    star.style.animationDelay =
    Math.random()*4 + "s";

    stars.appendChild(star);
}

/* 時間 */

function updateClock(){

    const now =
    new Date();

    document
    .getElementById("clock")
    .innerText =

    now.toLocaleTimeString(
    "zh-TW",
    {
        hour:"2-digit",
        minute:"2-digit"
    });

    document
    .getElementById("date")
    .innerText =

    now.toLocaleDateString(
    "zh-TW",
    {
        year:"numeric",
        month:"long",
        day:"numeric",
        weekday:"long"
    });
}

updateClock();

setInterval(
updateClock,
1000
);

/* 資料 */

let websites = [];

/* render */

const grid =
document.getElementById("grid");

function renderCards(data){

    grid.innerHTML = "";

    data.forEach(item => {

        const card =
        document.createElement("a");

        card.className = "card";

        card.href = item.url;

        card.target = "_blank";

        card.innerHTML =

        `
        <div class="card-top">

            <div class="icon">
                ${item.icon}
            </div>

            <div class="category">
                ${item.category}
            </div>

        </div>

        <div class="card-title">
            ${item.title}
        </div>

        <div class="card-url">
            ${item.url}
        </div>

        <div class="card-desc">
            ${item.description}
        </div>

        <div class="open">
            OPEN →
        </div>
        `;

        grid.appendChild(card);
    });
}

/* render admin */

const adminList =
document.getElementById("adminList");

function renderAdmin(){

    adminList.innerHTML = "";

    websites.forEach((item,index)=>{

        const div =
        document.createElement("div");

        div.className =
        "admin-item";

        div.innerHTML =

        `
        <div class="admin-item-title">
            ${item.icon}
            ${item.title}
        </div>

        <div>
            ${item.category}
        </div>

        <button
        class="delete-btn"
        onclick="removeWebsite(${index})">

            刪除

        </button>
        `;

        adminList.appendChild(div);
    });
}

/* 讀取 JSON */

async function loadData(){

    try{

        const response =
        await fetch("data.json");

        websites =
        await response.json();

        renderCards(websites);

        renderAdmin();

    }catch(err){

        console.log(err);
    }
}

loadData();

/* 搜尋 */

document
.getElementById("search")
.addEventListener("input",e=>{

    const keyword =
    e.target.value
    .toLowerCase();

    const filtered =
    websites.filter(item =>

        item.title
        .toLowerCase()
        .includes(keyword)

        ||

        item.description
        .toLowerCase()
        .includes(keyword)

        ||

        item.category
        .toLowerCase()
        .includes(keyword)
    );

    renderCards(filtered);
});

/* Admin */

const PASSWORD =
"720750";

function openAdmin(){

    const pass =
    prompt("請輸入管理密碼");

    if(pass !== PASSWORD){

        alert("密碼錯誤");

        return;
    }

    document
    .getElementById("adminPanel")
    .classList
    .add("show");
}

/* 新增 */

function addWebsite(){

    const title =
    document.getElementById("title")
    .value
    .trim();

    const category =
    document.getElementById("category")
    .value
    .trim();

    const icon =
    document.getElementById("icon")
    .value
    .trim();

    const url =
    document.getElementById("url")
    .value
    .trim();

    const description =
    document.getElementById("description")
    .value
    .trim();

    if(!title || !url){

        alert("請填寫名稱與網址");

        return;
    }

    websites.push({

        title,
        category,
        icon,
        url,
        description
    });

    renderCards(websites);

    renderAdmin();

    document.getElementById("title").value = "";
    document.getElementById("category").value = "";
    document.getElementById("icon").value = "";
    document.getElementById("url").value = "";
    document.getElementById("description").value = "";
}

/* 刪除 */

function removeWebsite(index){

    websites.splice(index,1);

    renderCards(websites);

    renderAdmin();
}

/* 下載 JSON */

function downloadJSON(){

    const json =
    JSON.stringify(
    websites,
    null,
    2
    );

    const blob =
    new Blob(
    [json],
    {
        type:"application/json"
    });

    const url =
    URL.createObjectURL(blob);

    const a =
    document.createElement("a");

    a.href = url;

    a.download = "data.json";

    a.click();

    URL.revokeObjectURL(url);

    setTimeout(()=>{

        window.scrollTo(0,0);

    },100);
}

</script>

</body>
</html>
