<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中正診所 Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="light"] {
            --bg-grad: linear-gradient(135deg, #f0fdf4, #f0f9ff);
            --card-bg: #ffffff;
            --accent-primary: #0EA5E9; /* 專業藍 */
            --accent-secondary: #10B981; /* 健康綠 */
            --text-main: #0f172a;     
            --text-sub: #334155;      
            --border-color: #cbd5e1;
        }
        :root[data-theme="dark"] {
            --bg-grad: linear-gradient(135deg, #020617, #064e3b);
            --card-bg: #1e293b;
            --accent-primary: #38bdf8;
            --accent-secondary: #34d399;
            --text-main: #ffffff;
            --text-sub: #cbd5e1;
            --border-color: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; background: var(--bg-grad); color: var(--text-main); font-family: "Inter", "Microsoft JhengHei", sans-serif; transition: 0.4s; }

        /* 診所風格裝飾線 */
        .clinic-line { position: fixed; top: 0; left: 0; width: 100%; height: 8px; background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary)); z-index: 100; }
        
        .main { width: 100%; max-width: 1400px; margin: auto; padding: 60px 40px; }
        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 50px; border-bottom: 4px solid var(--accent-secondary); padding-bottom: 25px; }
        .title-main { font-size: 70px; font-weight: 900; letter-spacing: -2px; color: var(--text-main); }
        .title-sub { font-size: 24px; color: var(--accent-primary); font-weight: 800; letter-spacing: 4px; margin-top: 5px; }
        
        .clock { font-size: 85px; font-weight: 900; color: var(--accent-primary); line-height: 1; text-shadow: 2px 2px 0px rgba(0,0,0,0.05); }
        .date-display { font-size: 32px; font-weight: 800; margin-top: 10px; color: var(--text-sub); }

        .mode-toggle { margin-top: 20px; padding: 12px 30px; font-size: 22px; font-weight: 900; border-radius: 12px; border: 3px solid var(--accent-secondary); background: transparent; color: var(--accent-secondary); cursor: pointer; transition: 0.3s; }
        .mode-toggle:hover { background: var(--accent-secondary); color: white; }

        .section-title { font-size: 42px; font-weight: 900; margin: 50px 0 30px; padding-left: 20px; border-left: 15px solid var(--accent-primary); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        @media (min-width: 1300px) { .grid { grid-template-columns: repeat(5, 1fr); } }

        .card { background: var(--card-bg); border-radius: 25px; border: 2px solid var(--border-color); transition: 0.3s; height: 100%; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .card:hover { transform: translateY(-8px); border-color: var(--accent-primary); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .card-link { display: block; padding: 35px; text-decoration: none; color: inherit; }
        .icon-box { font-size: 55px; margin-bottom: 15px; display: block; }
        .card-title { font-size: 34px; font-weight: 900; color: var(--accent-primary); margin-bottom: 10px; }
        .card-desc { font-size: 22px; font-weight: 700; color: var(--text-sub); line-height: 1.4; }

        /* 管理面板 */
        .admin-panel { position: fixed; top: 0; right: -100%; width: 100%; max-width: 500px; height: 100vh; background: #fff; border-left: 10px solid var(--accent-primary); padding: 40px; overflow-y: auto; transition: 0.5s; z-index: 10000; color: #000; box-shadow: -10px 0 50px rgba(0,0,0,0.3); }
        .admin-panel.show { right: 0; }
        .input { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 12px; font-size: 20px; margin-bottom: 15px; }
        
        .emoji-picker { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; background: #f1f5f9; padding: 15px; border-radius: 15px; }
        .emoji-item { font-size: 32px; cursor: pointer; text-align: center; padding: 10px; border-radius: 12px; transition: 0.2s; background: white; border: 1px solid #e2e8f0; }
        .emoji-item:hover { background: #d0f9e1; transform: scale(1.1); }
        .emoji-item.selected { border: 4px solid var(--accent-primary); background: #e0f2fe; }

        .save-btn { width: 100%; padding: 20px; background: var(--accent-primary); color: white; font-weight: 900; font-size: 24px; border: none; border-radius: 15px; cursor: pointer; margin-bottom: 20px; }
        .admin-btn { position: fixed; bottom: 30px; right: 30px; width: 70px; height: 70px; border-radius: 50%; background: var(--card-bg); border: 2px solid var(--accent-primary); color: var(--accent-primary); font-size: 40px; cursor: pointer; opacity: 0.2; z-index: 1000; }
        .admin-btn:hover { opacity: 1; }
    </style>
</head>
<body>

<div class="clinic-line"></div>

<div class="main">
    <div class="header">
        <div>
            <div class="title-main">中正診所</div>
            <div class="title-sub">PORTAL SYSTEM</div>
        </div>
        <div class="clock-area">
            <div class="clock" id="clock">00:00:00</div>
            <div class="date-display" id="date">載入中...</div>
            <button class="mode-toggle" onclick="toggleTheme()" id="themeBtn">切換至夜間模式 🌙</button>
        </div>
    </div>

    <div class="section-title">主要入口</div>
    <div class="grid" id="primaryGrid"></div>

    <div class="section-title">次要工具</div>
    <div class="grid" id="secondaryGrid"></div>
</div>

<button class="admin-btn" onclick="openAdmin()">⚙️</button>

<div class="admin-panel" id="adminPanel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h2 style="font-size:36px; font-weight:900;">管理面板</h2>
        <button onclick="closeAdmin()" style="background:none; border:none; font-size:45px; cursor:pointer;">✕</button>
    </div>
    
    <label style="font-weight:900; font-size:20px;">1. 分類</label>
    <select id="linkCategory" class="input">
        <option value="primary">主要入口</option>
        <option value="secondary">次要工具</option>
    </select>

    <label style="font-weight:900; font-size:20px;">2. 圖示 (4x4 快速選)</label>
    <div class="emoji-picker" id="emojiPicker"></div>
    <input id="linkIcon" class="input" readonly placeholder="請點選上方圖示">

    <label style="font-weight:900; font-size:20px;">3. 內容</label>
    <input id="linkTitle" class="input" placeholder="網站名稱">
    <input id="linkUrl" class="input" placeholder="網址 (https://)">
    <input id="linkDesc" class="input" placeholder="說明文字">
    
    <button class="save-btn" onclick="saveLink()">保存設定</button>

    <div id="manageList" style="margin-top:30px; border-top: 2px solid #eee; padding-top: 20px;"></div>
</div>

<script>
    // 密碼 720750 的 SHA-256 加密碼
    const _H = "8227b6c507a2a6b7e6417539c36d2c416e9196b653245053f3e786b6a22287b3";
    const emojis = ["🩺", "💉", "🏥", "💊", "☁️", "📦", "💻", "🔍", "📋", "🏠", "🧪", "📁", "🧬", "📅", "🔔", "✉️"];

    // 同時檢查多個版本的 key，確保舊資料不會因為版本升級消失
    const loadData = (key, defaultData) => {
        return JSON.parse(localStorage.getItem(key)) || JSON.parse(localStorage.getItem(key.replace('v4', 'v3'))) || JSON.parse(localStorage.getItem(key.replace('v4', 'v2'))) || defaultData;
    };

    let primaryLinks = loadData('cz_primary_v4', [
        { title: "中正診所 HIS", url: "https://webhis.vision.com.tw/88336/login", desc: "門診系統登入", icon: "🩺" },
        { title: "VPN 健保系統", url: "https://medvpn.nhi.gov.tw/iwse0000/IWSE0001S01.aspx", desc: "健保資訊網服務系統", icon: "💻" }
    ]);

    let secondaryLinks = loadData('cz_secondary_v4', [
        { title: "亞東轉診掛號", url: "https://www.femh.org.tw/webregs/HClinicLogin.aspx", desc: "亞東醫院轉診服務", icon: "🏥" }
    ]);

    // 初始化 Emoji 選擇器
    const picker = document.getElementById('emojiPicker');
    emojis.forEach(e => {
        const div = document.createElement('div');
        div.className = 'emoji-item';
        div.innerText = e;
        div.onclick = () => {
            document.querySelectorAll('.emoji-item').forEach(i => i.classList.remove('selected'));
            div.classList.add('selected');
            document.getElementById('linkIcon').value = e;
        };
        picker.appendChild(div);
    });

    async function openAdmin() {
        const pass = prompt("請輸入管理密碼");
        if (!pass) return;
        const msgBuffer = new TextEncoder().encode(pass.trim());
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        if (hashHex === _H || pass === "720750") {
            document.getElementById("adminPanel").classList.add("show");
            renderManageList();
        } else { alert("驗證失敗"); }
    }

    function saveLink() {
        const cat = document.getElementById("linkCategory").value;
        const icon = document.getElementById("linkIcon").value || "🩺";
        const title = document.getElementById("linkTitle").value.trim();
        const url = document.getElementById("linkUrl").value.trim();
        const desc = document.getElementById("linkDesc").value.trim();
        if (!title || !url) return alert("名稱與網址必填");
        
        const item = { title, url, desc, icon };
        (cat === 'primary' ? primaryLinks : secondaryLinks).push(item);
        
        localStorage.setItem('cz_primary_v4', JSON.stringify(primaryLinks));
        localStorage.setItem('cz_secondary_v4', JSON.stringify(secondaryLinks));
        render(); renderManageList();
    }

    function deleteLink(cat, index) {
        if (!confirm("確定要刪除這個書籤嗎？")) return;
        (cat === 'primary' ? primaryLinks : secondaryLinks).splice(index, 1);
        localStorage.setItem('cz_primary_v4', JSON.stringify(primaryLinks));
        localStorage.setItem('cz_secondary_v4', JSON.stringify(secondaryLinks));
        render(); renderManageList();
    }

    function renderManageList() {
        const list = document.getElementById("manageList");
        let html = "<h4>目前書籤清單</h4>";
        const row = (l, i, c) => `<div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;"><span>${l.icon} <b>${l.title}</b></span><button onclick="deleteLink('${c}', ${i})" style="color:#ef4444; border:none; background:none; font-weight:900; cursor:pointer;">刪除</button></div>`;
        html += primaryLinks.map((l, i) => row(l, i, 'primary')).join('');
        html += secondaryLinks.map((l, i) => row(l, i, 'secondary')).join('');
        list.innerHTML = html;
    }

    function render() {
        const fn = (l) => `<div class="card"><a class="card-link" href="${l.url}" target="_blank"><span class="icon-box">${l.icon}</span><div class="card-title">${l.title}</div><div class="card-desc">${l.desc}</div></a></div>`;
        document.getElementById("primaryGrid").innerHTML = primaryLinks.map(fn).join('');
        document.getElementById("secondaryGrid").innerHTML = secondaryLinks.map(fn).join('');
    }

    function updateClock() {
        const now = new Date();
        document.getElementById("clock").innerText = now.toLocaleTimeString("zh-TW", { hour12: false });
        const y = now.getFullYear();
        const week = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
        document.getElementById("date").innerText = `(民${y-1911}) ${y}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${week[now.getDay()]}`;
    }

    function toggleTheme() {
        const doc = document.documentElement;
        const next = doc.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        doc.setAttribute('data-theme', next);
        document.getElementById('themeBtn').innerText = next === 'light' ? '切換至夜間模式 🌙' : '切換至日間模式 ☀️';
    }

    function closeAdmin() { document.getElementById("adminPanel").classList.remove("show"); }
    setInterval(updateClock, 1000); updateClock(); render();
</script>
</body>
</html>
