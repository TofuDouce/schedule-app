<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中正診所 Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="light"] {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --accent-primary: #0ea5e9; 
            --accent-secondary: #10b981; 
            --text-main: #0f172a;     
            --text-sub: #475569;      
            --border-color: #e2e8f0;
        }
        :root[data-theme="dark"] {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-primary: #38bdf8;
            --accent-secondary: #34d399;
            --text-main: #ffffff;
            --text-sub: #cbd5e1;
            --border-color: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; background-color: var(--bg-color); color: var(--text-main); font-family: "Inter", "Microsoft JhengHei", sans-serif; transition: 0.3s; padding-bottom: 80px; }

        .main { width: 100%; max-width: 1400px; margin: auto; padding: 20px; }
        
        .header { display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 30px; border-bottom: 4px solid var(--accent-secondary); padding-bottom: 20px; gap: 15px; }
        @media (min-width: 768px) {
            .header { flex-direction: row; justify-content: space-between; align-items: flex-end; text-align: left; padding: 40px 0 20px; }
        }

        .title-group { display: flex; flex-direction: column; }
        .title-main { font-size: clamp(40px, 8vw, 70px); font-weight: 900; line-height: 1.1; }
        .title-sub { font-size: clamp(16px, 3vw, 24px); color: var(--accent-primary); font-weight: 800; letter-spacing: 4px; }
        
        .clock-area { display: flex; flex-direction: column; align-items: center; }
        @media (min-width: 768px) { .clock-area { align-items: flex-end; } }

        .clock { font-size: clamp(50px, 10vw, 85px); font-weight: 900; color: var(--accent-primary); line-height: 1; }
        .date-display { font-size: clamp(18px, 4vw, 32px); font-weight: 800; margin-top: 5px; color: var(--text-sub); }

        .mode-toggle { margin-top: 10px; padding: 8px 20px; font-size: 16px; font-weight: 900; border-radius: 10px; border: 2px solid var(--accent-secondary); background: transparent; color: var(--accent-secondary); cursor: pointer; }

        .section-title { font-size: clamp(28px, 6vw, 42px); font-weight: 900; margin: 30px 0 20px; padding-left: 15px; border-left: 10px solid var(--accent-primary); }
        
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 640px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        @media (min-width: 1400px) { .grid { grid-template-columns: repeat(5, 1fr); } }

        .card { background: var(--card-bg); border-radius: 20px; border: 2px solid var(--border-color); transition: 0.3s; height: 100%; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent-primary); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .card:hover .card-title { color: var(--accent-secondary); }
        
        .card-link { display: block; padding: 25px; text-decoration: none; color: inherit; }
        .icon-box { font-size: 50px; margin-bottom: 12px; display: block; }
        
        .card-title { font-size: 28px; font-weight: 900; color: var(--accent-primary); margin-bottom: 8px; letter-spacing: -0.5px; line-height: 1.2; }
        .card-desc { font-size: 16px; font-weight: 700; color: var(--text-sub); line-height: 1.4; }

        .admin-panel { position: fixed; top: 0; right: -100%; width: 90%; max-width: 450px; height: 100vh; background: #fff; border-left: 8px solid var(--accent-primary); padding: 25px; overflow-y: auto; transition: 0.4s; z-index: 2000; color: #000; }
        .admin-panel.show { right: 0; }
        .input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; margin-bottom: 12px; }
        
        .emoji-picker { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; background: #f1f5f9; padding: 10px; border-radius: 10px; }
        .emoji-item { font-size: 24px; cursor: pointer; text-align: center; padding: 8px; background: #fff; border-radius: 8px; border: 1px solid #e2e8f0; }

        .btn { width: 100%; padding: 15px; font-weight: 900; font-size: 18px; border: none; border-radius: 10px; cursor: pointer; margin-bottom: 10px; }
        .save-btn { background: var(--accent-primary); color: white; }
        .admin-btn { position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px; border-radius: 50%; background: var(--card-bg); border: 2px solid var(--accent-primary); font-size: 24px; cursor: pointer; opacity: 0.2; z-index: 1000; }
    </style>
</head>
<body>

<div class="main">
    <div class="header">
        <div class="title-group">
            <div class="title-main">中正診所</div>
            <div class="title-sub">PORTAL SYSTEM</div>
        </div>
        <div class="clock-area">
            <div class="clock" id="clock">00:00:00</div>
            <div class="date-display" id="date"></div>
            <button class="mode-toggle" onclick="toggleTheme()" id="themeBtn">切換至夜間模式 🌙</button>
        </div>
    </div>

    <div class="section-title">主要入口</div>
    <div id="primaryGrid" class="grid"></div>

    <div class="section-title">次要工具</div>
    <div id="secondaryGrid" class="grid"></div>
</div>

<button class="admin-btn" onclick="openAdmin()">⚙️</button>

<div class="admin-panel" id="adminPanel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="font-size:24px; font-weight:900;">管理面板</h2>
        <button onclick="closeAdmin()" style="font-size:30px; border:none; background:none; cursor:pointer;">✕</button>
    </div>
    <input id="linkTitle" class="input" placeholder="網站名稱">
    <input id="linkUrl" class="input" placeholder="網址 (https://)">
    <button class="btn save-btn" id="saveBtn" onclick="saveLink()">保存設定</button>
</div>

<script>
    const coreLinks = {
        primary: [
            { id: 'c1', title: "中正診所", url: "https://webhis.vision.com.tw/88336/login", desc: "門診系統登入", icon: "🩺", core: true },
            { id: 'c2', title: "VPN", url: "https://medvpn.nhi.gov.tw/iwse0000/IWSE0001S01.aspx", desc: "健保資訊網服務系統", icon: "💻", core: true },
            { id: 'c3', title: "智慧防疫物資", url: "https://smis.cdc.gov.tw/SMIS/Default.aspx", desc: "每週一登入", icon: "📦", core: true },
            { id: 'c4', title: "雲端查詢系統", url: "https://medcloud2.nhi.gov.tw/imu/IMUE1000/", desc: "健保醫療資訊雲端查詢", icon: "☁️", core: true },
            { id: 'c5', title: "NIIS", url: "https://10.241.219.42/Login.aspx", desc: "醫療院所預防接種管理子系統", icon: "💉", core: true }
        ],
        secondary: [
            { id: 'c6', title: "亞東醫院轉診掛號", url: "https://www.femh.org.tw/webregs/HClinicLogin.aspx", desc: "亞東醫院轉診服務", icon: "🏥", core: true },
            { id: 'c7', title: "亞東醫院轉診查詢", url: "https://hos.femh.org.tw/hosmanplatform/login.aspx", desc: "掛號結果查詢", icon: "🔍", core: true },
            { id: 'c8', title: "醫品平台系統", url: "https://manage.healthleader.com.tw/Account/Login?ReturnUrl=%2F", desc: "台灣優品/醫品平台系統", icon: "📋", core: true },
            { id: 'c9', title: "家醫大平台", url: "https://medqfm.nhi.gov.tw/health-ui/#/login", desc: "家醫照護大平台", icon: "🏠", core: true },
            { id: 'c10', title: "Paxlovid交互作用", url: "https://depart.femh.org.tw/meta/paxsearch.htm?0.08336732489988208", desc: "用商品名比對交互作用", icon: "💊", core: true },
            { id: 'c11', title: "腎絲球過濾計算", url: "egfr.html", desc: "eGFR 計算工具", icon: "🧪", core: true }
        ]
    };

    let userLinks = JSON.parse(localStorage.getItem('cz_user_links_v3')) || { primary: [], secondary: [] };

    function render() {
        const fn = (l) => `<div class="card"><a class="card-link" href="${l.url}" target="_blank"><span class="icon-box">${l.icon}</span><div class="card-title">${l.title}</div><div class="card-desc">${l.desc}</div></a></div>`;
        document.getElementById("primaryGrid").innerHTML = [...coreLinks.primary, ...userLinks.primary].map(fn).join('');
        document.getElementById("secondaryGrid").innerHTML = [...coreLinks.secondary, ...userLinks.secondary].map(fn).join('');
    }

    function openAdmin() {
        const pass = prompt("請輸入管理密碼");
        if (pass === "720750") { document.getElementById("adminPanel").classList.add("show"); }
    }

    function toggleTheme() {
        const doc = document.documentElement;
        const next = doc.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        doc.setAttribute('data-theme', next);
        document.getElementById('themeBtn').innerText = next === 'light' ? '切換至夜間模式 🌙' : '切換至日間模式 ☀️';
    }

    function updateClock() {
        const now = new Date();
        document.getElementById("clock").innerText = now.toLocaleTimeString("zh-TW", { hour12: false });
        const y = now.getFullYear();
        document.getElementById("date").innerText = `(民${y-1911}) ${y}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
    }

    setInterval(updateClock, 1000); updateClock(); render();
</script>
</body>
</html>
