<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中正診所 Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800&display=swap" rel="stylesheet">

    <style>
        /* 高對比、大字體設計 */
        :root[data-theme="light"] {
            --bg-grad: #ffffff;
            --card-bg: #f1f5f9;
            --accent-primary: #0284c7;
            --accent-gold: #b45309;
            --text-main: #000000;
            --text-sub: #1e293b;
            --border-color: #000000;
        }

        :root[data-theme="dark"] {
            --bg-grad: #0f172a;
            --card-bg: #1e293b;
            --accent-primary: #38bdf8;
            --accent-gold: #fbbf24;
            --text-main: #ffffff;
            --text-sub: #e2e8f0;
            --border-color: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; background: var(--bg-grad); color: var(--text-main); font-family: sans-serif; padding-bottom: 50px; }

        .main { width: 100%; max-width: 1400px; margin: auto; padding: 30px 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; border-bottom: 4px solid var(--accent-primary); padding-bottom: 20px; }
        .title-main { font-size: 60px; font-weight: 900; }
        .title-sub { font-size: 26px; color: var(--accent-gold); font-weight: 800; }
        
        .clock-area { text-align: right; }
        .clock { font-size: 70px; font-weight: 900; color: var(--accent-primary); line-height: 1; }
        .date-display { font-size: 28px; font-weight: 800; margin-top: 10px; }

        .mode-toggle { 
            margin-top: 20px; padding: 15px 40px; font-size: 24px; font-weight: 900; 
            border-radius: 12px; border: 4px solid var(--accent-primary); 
            background: var(--card-bg); color: var(--accent-primary); cursor: pointer; 
        }

        .section-title { font-size: 36px; font-weight: 900; margin: 40px 0 20px; color: var(--text-main); border-left: 10px solid var(--accent-gold); padding-left: 15px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        @media (min-width: 1300px) { .grid { grid-template-columns: repeat(5, 1fr); } }

        .card { background: var(--card-bg); border-radius: 20px; border: 3px solid var(--border-color); height: 100%; }
        .card-link { display: block; padding: 25px; text-decoration: none; color: inherit; }
        .card-title { font-size: 30px; font-weight: 900; margin-bottom: 10px; color: var(--accent-primary); }
        .card-desc { font-size: 20px; font-weight: 700; color: var(--text-sub); }

        /* 管理面板 */
        .admin-panel { position: fixed; top: 0; right: -100%; width: 100%; max-width: 450px; height: 100vh; background: white; border-left: 5px solid var(--accent-primary); padding: 30px; transition: 0.4s; z-index: 10000; color: black; box-shadow: -5px 0 20px rgba(0,0,0,0.2); }
        .admin-panel.show { right: 0; }
        .admin-btn { position: fixed; bottom: 20px; right: 20px; width: 80px; height: 80px; border-radius: 50%; background: #475569; color: white; font-size: 40px; border: none; cursor: pointer; opacity: 0.3; }
        .input { width: 100%; padding: 15px; font-size: 20px; margin: 10px 0; border: 2px solid #ccc; border-radius: 8px; }
        .save-btn { width: 100%; padding: 20px; background: var(--accent-primary); color: white; font-size: 24px; font-weight: 900; border: none; border-radius: 12px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="main">
    <div class="header">
        <div>
            <div class="title-main">中正診所</div>
            <div class="title-sub">PORTAL SYSTEM</div>
        </div>
        <div class="clock-area">
            <div class="clock" id="clock">00:00:00</div>
            <div class="date-display" id="date">載入中...</div>
            <button class="mode-toggle" onclick="toggleTheme()" id="themeBtn">切換模式 🌙</button>
        </div>
    </div>

    <div class="section-title">主要入口</div>
    <div class="grid" id="primaryGrid"></div>

    <div class="section-title">次要工具</div>
    <div class="grid" id="secondaryGrid"></div>
</div>

<button class="admin-btn" onclick="openAdmin()">⚙️</button>

<div class="admin-panel" id="adminPanel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>管理模式</h2>
        <button onclick="closeAdmin()" style="font-size:30px; cursor:pointer; background:none; border:none;">✕</button>
    </div>
    <p style="margin-top:20px;">新增/修改書籤：</p>
    <input id="newTitle" class="input" placeholder="網站名稱">
    <input id="newUrl" class="input" placeholder="網址 https://">
    <input id="newDesc" class="input" placeholder="說明文字">
    <button class="save-btn" onclick="addNewLink()">保存並更新</button>
</div>

<script>
    // 密碼 720750 的 SHA-256 加密指紋 (密碼不再裸奔)
    const _H = "8227b6c507a2a6b7e6417539c36d2c416e9196b653245053f3e786b6a22287b3";

    let primaryLinks = [
        { title: "中正診所 HIS", url: "https://webhis.vision.com.tw/88336/login", desc: "門診系統登入" },
        { title: "VPN 健保系統", url: "https://medvpn.nhi.gov.tw/iwse0000/IWSE0001S01.aspx", desc: "健保資訊網服務系統" },
        { title: "智慧防疫物資", url: "https://smis.cdc.gov.tw/SMIS/Default.aspx", desc: "每週一需登入 (SMIS)" },
        { title: "雲端查詢系統", url: "https://medcloud2.nhi.gov.tw/imu/IMUE1000/", desc: "健保醫療資訊雲端查詢" },
        { title: "NIIS 系統", url: "https://10.241.219.42/Login.aspx", desc: "預防接種管理子系統" }
    ];

    let secondaryLinks = [
        { title: "亞東轉診掛號", url: "https://www.femh.org.tw/webregs/HClinicLogin.aspx", desc: "亞東醫院轉診服務" },
        { title: "亞東轉診查詢", url: "https://hos.femh.org.tw/hosmanplatform/login.aspx", desc: "掛號結果查詢" },
        { title: "台灣醫品平台", url: "https://manage.healthleader.com.tw/Account/Login?ReturnUrl=%2F", desc: "醫品平台登入" },
        { title: "家醫大平台", url: "https://medqfm.nhi.gov.tw/health-ui/#/login", desc: "健保家醫照護" },
        { title: "Paxlovid 比對", url: "https://depart.femh.org.tw/meta/paxsearch.htm?0.08336732489988208", desc: "商品名比對交互作用" },
        { title: "腎絲球過濾率", url: "https://www.tckdf.org.tw/Main/CKDEPI?scr=0&age=0&gender=0", desc: "eGFR 計算工具" }
    ];

    async function openAdmin() {
        const pass = prompt("請輸入管理密碼");
        if (!pass) return;

        // 將輸入的密碼進行雜湊運算
        const msgBuffer = new TextEncoder().encode(pass);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

        // 比對雜湊值，而非原始密碼
        if (hashHex === _H) {
            document.getElementById("adminPanel").classList.add("show");
        } else {
            alert("驗證失敗，密碼錯誤。");
        }
    }

    function closeAdmin() { document.getElementById("adminPanel").classList.remove("show"); }

    function render() {
        const pGrid = document.getElementById("primaryGrid");
        const sGrid = document.getElementById("secondaryGrid");
        
        pGrid.innerHTML = primaryLinks.map(link => `
            <div class="card"><a class="card-link" href="${link.url}" target="_blank">
                <div class="card-title">${link.title}</div>
                <div class="card-desc">${link.desc}</div>
            </a></div>
        `).join('');

        sGrid.innerHTML = secondaryLinks.map(link => `
            <div class="card"><a class="card-link" href="${link.url}" target="_blank">
                <div class="card-title">${link.title}</div>
                <div class="card-desc">${link.desc}</div>
            </a></div>
        `).join('');
    }

    function updateClock() {
        const now = new Date();
        document.getElementById("clock").innerText = now.toLocaleTimeString("zh-TW", { hour12: false });
        const year = now.getFullYear();
        const mingguo = year - 1911;
        const weekDays = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
        document.getElementById("date").innerText = `(民${mingguo}) ${year}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${weekDays[now.getDay()]}`;
    }

    function toggleTheme() {
        const doc = document.documentElement;
        const next = doc.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        doc.setAttribute('data-theme', next);
        document.getElementById('themeBtn').innerText = next === 'light' ? '切換模式 🌙' : '切換模式 ☀️';
    }

    setInterval(updateClock, 1000);
    updateClock();
    render();
</script>
</body>
</html>
