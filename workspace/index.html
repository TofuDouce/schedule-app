<!DOCTYPE html>
<html lang="zh-Hant" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中正診所 Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Cinzel:wght@600&display=swap" rel="stylesheet">

    <style>
        /* 定義兩套配色方案 */
        :root[data-theme="dark"] {
            --bg-color: #060816;
            --bg-grad: linear-gradient(180deg, #060816, #0c1224);
            --card-bg: rgba(16, 22, 40, 0.9);
            --accent-gold: #d4af37;
            --accent-gold-dim: rgba(214, 190, 110, 0.3);
            --text-main: #ffffff;
            --text-dim: rgba(226, 232, 240, 0.7);
            --panel-bg: #0c1224;
            --star-opacity: 0.4;
        }

        :root[data-theme="light"] {
            --bg-color: #f0f4f8;
            --bg-grad: linear-gradient(180deg, #f0f4f8, #e2e8f0);
            --card-bg: #ffffff;
            --accent-gold: #0ea5e9; /* 日間模式改用專業藍 */
            --accent-gold-dim: rgba(14, 165, 233, 0.2);
            --text-main: #1e293b;
            --text-dim: #64748b;
            --panel-bg: #ffffff;
            --star-opacity: 0; /* 白天隱藏星空 */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; background: var(--bg-grad); color: var(--text-main); font-family: "Inter", "Microsoft JhengHei", sans-serif; transition: 0.3s ease; }

        /* Mucha 裝飾 */
        .mucha-frame { position: fixed; inset: 12px; pointer-events: none; z-index: 999; border: 1px solid var(--accent-gold-dim); border-radius: 30px; transition: 0.3s; }
        .corner { position: absolute; width: 60px; height: 60px; border: 1px solid var(--accent-gold-dim); }
        .tl { top:-1px; left:-1px; border-radius: 30px 0 0 0; border-right:none; border-bottom:none; }
        .tr { top:-1px; right:-1px; border-radius: 0 30px 0 0; border-left:none; border-bottom:none; }
        .bl { bottom:-1px; left:-1px; border-radius: 0 0 0 30px; border-right:none; border-top:none; }
        .br { bottom:-1px; right:-1px; border-radius: 0 0 34px 0; border-left:none; border-top:none; }

        /* 星空 */
        .stars { position: fixed; inset: 0; z-index: -1; opacity: var(--star-opacity); transition: 0.5s; }
        .star { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; animation: twinkle 5s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        /* Header & Toggle */
        .main { width: 100%; max-width: 1400px; margin: auto; padding: 60px 24px; }
        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; flex-wrap: wrap; gap: 20px; }
        .title-main { font-size: clamp(40px, 8vw, 80px); font-weight: 800; }
        .title-sub { display: block; font-family: "Cinzel", serif; font-size: 20px; color: var(--accent-gold); letter-spacing: 4px; }
        
        .mode-toggle { padding: 10px 20px; border-radius: 12px; border: 1px solid var(--accent-gold-dim); background: var(--card-bg); color: var(--text-main); cursor: pointer; font-weight: 600; font-size: 16px; }

        /* Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px; }
        .card { background: var(--card-bg); border-radius: 28px; border: 1px solid var(--accent-gold-dim); transition: 0.3s; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .card:hover { transform: translateY(-8px); border-color: var(--accent-gold); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .card-link { display: block; padding: 30px; text-decoration: none; color: inherit; }
        .icon-circle { width: 60px; height: 60px; border-radius: 18px; background: var(--accent-gold-dim); display: flex; align-items: center; justify-content: center; font-size: 30px; margin-bottom: 20px; }
        .card-title { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
        .card-desc { color: var(--text-dim); font-size: 16px; line-height: 1.5; }

        /* Admin Panel (加大版) */
        .admin-btn { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; background: var(--card-bg); border: 1px solid var(--accent-gold-dim); color: var(--text-main); font-size: 28px; cursor: pointer; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .admin-panel { position: fixed; top: 0; right: -100%; width: 100%; max-width: 500px; height: 100vh; background: var(--panel-bg); border-left: 1px solid var(--accent-gold-dim); padding: 40px 30px; overflow-y: auto; transition: 0.4s; z-index: 10000; color: var(--text-main); }
        .admin-panel.show { right: 0; }
        .input { width: 100%; height: 60px; background: rgba(128,128,128,0.05); border: 1px solid var(--accent-gold-dim); border-radius: 12px; color: var(--text-main); padding: 0 20px; font-size: 18px; margin-bottom: 20px; outline: none; }
        .icon-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 20px; }
        .icon-opt { aspect-ratio: 1; border-radius: 12px; border: 1px solid var(--accent-gold-dim); display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
        .icon-opt.active { background: var(--accent-gold); color: white; border-color: var(--accent-gold); }
        .add-btn { width: 100%; height: 60px; border-radius: 12px; border: none; background: var(--accent-gold); color: white; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

<div class="mucha-frame"><div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div></div>
<div class="stars" id="stars"></div>

<div class="main">
    <div class="header">
        <div>
            <div class="title-main">中正診所</div>
            <span class="title-sub">PORTAL SYSTEM</span>
        </div>
        <button class="mode-toggle" onclick="toggleTheme()" id="themeBtn">切換日間模式 ☀️</button>
    </div>
    <div class="grid" id="grid"></div>
</div>

<button class="admin-btn" onclick="openAdmin()">⚙️</button>

<div class="admin-panel" id="adminPanel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h2 style="font-size:28px;">管理模式</h2>
        <button onclick="closeAdmin()" style="background:none; border:none; color:var(--text-main); font-size:32px; cursor:pointer;">✕</button>
    </div>
    
    <label>網站名稱</label><input id="title" class="input" placeholder="例如：健保 VPN">
    <label>網址 (URL)</label><input id="url" class="input" placeholder="https://...">
    <label>選擇圖示</label><div class="icon-grid" id="iconPicker"></div>
    
    <button class="add-btn" id="saveBtn" onclick="addWebsite()">保存網站</button>
    <div id="bookmarkList" style="margin-top:30px;"></div>
</div>

<script>
    // SHA-256 指紋 (720750)
    const _H = "8227b6c507a2a6b7e6417539c36d2c416e9196b653245053f3e786b6a22287b3";

    let websites = JSON.parse(localStorage.getItem('clinic_links')) || [
        { title: "健保 VPN", url: "https://www.nhi.gov.tw/", icon: "🩺", description: "健保內部系統入口" },
        { title: "nIIS 系統", url: "https://medvpn.mohw.gov.tw/", icon: "💉", description: "疫苗與醫療資訊系統" }
    ];

    const iconPool = ["🩺", "💉", "💊", "📋", "🏥", "🧬", "🧠", "🦷", "💻", "🔒", "✨"];
    let selectedIcon = "✨";
    let editingIndex = null;

    // 日夜模式切換
    function toggleTheme() {
        const doc = document.documentElement;
        const current = doc.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        doc.setAttribute('data-theme', next);
        localStorage.setItem('portal_theme', next);
        updateThemeBtn(next);
    }

    function updateThemeBtn(theme) {
        document.getElementById('themeBtn').innerText = theme === 'dark' ? '切換日間模式 ☀️' : '切換深夜模式 🌙';
    }

    // 初始化主題
    const savedTheme = localStorage.getItem('portal_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    updateThemeBtn(savedTheme);

    // 管理密碼 (SHA-256)
    async function openAdmin() {
        const pass = prompt("請輸入管理金鑰");
        if (!pass) return;
        const msgBuffer = new TextEncoder().encode(pass);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');

        if (hashHex === _H) document.getElementById("adminPanel").classList.add("show");
        else alert("驗證失敗");
    }

    function closeAdmin() { document.getElementById("adminPanel").classList.remove("show"); editingIndex = null; }

    function renderIcons() {
        const picker = document.getElementById("iconPicker");
        picker.innerHTML = "";
        iconPool.forEach(icon => {
            const div = document.createElement("div");
            div.className = `icon-opt ${icon === selectedIcon ? 'active' : ''}`;
            div.innerText = icon;
            div.onclick = () => { selectedIcon = icon; renderIcons(); };
            picker.appendChild(div);
        });
    }

    function render() {
        localStorage.setItem('clinic_links', JSON.stringify(websites));
        const grid = document.getElementById("grid");
        grid.innerHTML = "";
        websites.forEach(item => {
            grid.innerHTML += `<div class="card"><a class="card-link" href="${item.url}" target="_blank"><div class="icon-circle">${item.icon}</div><div class="card-title">${item.title}</div><div class="card-desc">${item.description}</div></a></div>`;
        });

        const list = document.getElementById("bookmarkList");
        list.innerHTML = "";
        websites.forEach((item, index) => {
            list.innerHTML += `<div style="background:rgba(128,128,128,0.1); padding:15px; border-radius:12px; margin-bottom:10px;">
                <b>${item.icon} ${item.title}</b><br>
                <button onclick="editWebsite(${index})" style="margin-top:10px; padding:5px 10px; border-radius:6px; border:none; background:#4a5568; color:white;">修改</button>
                <button onclick="deleteWebsite(${index})" style="margin-top:10px; padding:5px 10px; border-radius:6px; border:none; background:#c53030; color:white;">刪除</button>
            </div>`;
        });
    }

    function addWebsite() {
        const t = document.getElementById("title").value.trim();
        const u = document.getElementById("url").value.trim();
        if (!t || !u) return;
        if (editingIndex !== null) websites[editingIndex] = { ...websites[editingIndex], title: t, url: u, icon: selectedIcon };
        else websites.push({ title: t, url: u, icon: selectedIcon, description: "快速連結" });
        document.getElementById("title").value = "";
        document.getElementById("url").value = "";
        render();
        alert("已更新");
    }

    function editWebsite(i) {
        editingIndex = i;
        const item = websites[i];
        document.getElementById("title").value = item.title;
        document.getElementById("url").value = item.url;
        selectedIcon = item.icon;
        renderIcons();
        document.getElementById("adminPanel").scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteWebsite(i) { if (confirm("刪除嗎？")) { websites.splice(i, 1); render(); } }

    // 初始化星空
    const stars = document.getElementById("stars");
    for (let i = 0; i < 100; i++) {
        const s = document.createElement("div");
        s.className = "star";
        s.style.left = Math.random() * 100 + "%";
        s.style.top = Math.random() * 100 + "%";
        s.style.animationDelay = Math.random() * 5 + "s";
        stars.appendChild(s);
    }

    renderIcons();
    render();
</script>
</body>
</html>
