<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中正診所 Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;900&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="light"] {
            --bg-grad: linear-gradient(180deg, #ffffff, #f1f5f9);
            --card-bg: #ffffff;
            --accent-primary: #0284c7; 
            --accent-gold: #D4AF37;   /* 優雅金色 */
            --text-main: #000000;     
            --text-sub: #1e293b;      
            --border-color: #D4AF37;
        }
        :root[data-theme="dark"] {
            --bg-grad: linear-gradient(180deg, #020617, #0f172a);
            --card-bg: #1e293b;
            --accent-primary: #38bdf8;
            --accent-gold: #FACC15;
            --text-main: #ffffff;
            --text-sub: #e2e8f0;
            --border-color: #FACC15;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; background: var(--bg-grad); color: var(--text-main); font-family: "Inter", sans-serif; transition: 0.4s; overflow-x: hidden; }

        /* 裝飾框 */
        .mucha-frame { position: fixed; inset: 20px; pointer-events: none; z-index: 99; border: 2px solid var(--border-color); border-radius: 40px; opacity: 0.5; }
        
        .main { width: 100%; max-width: 1400px; margin: auto; padding: 60px 40px; position: relative; z-index: 10; }
        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 50px; border-bottom: 5px solid var(--accent-gold); padding-bottom: 25px; }
        .title-main { font-size: 70px; font-weight: 900; letter-spacing: -2px; }
        .title-sub { font-family: 'Cinzel', serif; font-size: 26px; color: var(--accent-gold); letter-spacing: 8px; margin-top: 5px; }
        
        .clock { font-size: 80px; font-weight: 900; color: var(--accent-primary); line-height: 1; }
        .date-display { font-size: 30px; font-weight: 800; margin-top: 10px; }

        .mode-toggle { margin-top: 20px; padding: 15px 35px; font-size: 24px; font-weight: 900; border-radius: 50px; border: 3px solid var(--accent-gold); background: transparent; color: var(--accent-gold); cursor: pointer; transition: 0.3s; }
        .mode-toggle:hover { background: var(--accent-gold); color: white; }

        .section-title { font-size: 42px; font-weight: 900; margin: 50px 0 30px; padding-left: 20px; border-left: 15px solid var(--accent-gold); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 35px; }
        @media (min-width: 1300px) { .grid { grid-template-columns: repeat(5, 1fr); } }

        .card { background: var(--card-bg); border-radius: 30px; border: 3px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.1); transition: 0.3s; height: 100%; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
        .card-link { display: block; padding: 35px; text-decoration: none; color: inherit; }
        .icon-box { font-size: 55px; margin-bottom: 20px; display: block; }
        .card-title { font-size: 36px; font-weight: 900; color: var(--accent-primary); margin-bottom: 15px; }
        .card-desc { font-size: 22px; font-weight: 700; color: var(--text-sub); }

        /* 管理面板 */
        .admin-panel { position: fixed; top: 0; right: -100%; width: 100%; max-width: 500px; height: 100vh; background: #fff; border-left: 10px solid var(--accent-gold); padding: 40px; overflow-y: auto; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10000; color: #000; box-shadow: -10px 0 50px rgba(0,0,0,0.5); }
        .admin-panel.show { right: 0; }
        .input { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 12px; font-size: 20px; margin-bottom: 20px; }
        
        /* Emoji 選擇器 */
        .emoji-picker { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; margin-bottom: 20px; background: #f8fafc; padding: 15px; border-radius: 15px; border: 2px solid #e2e8f0; }
        .emoji-item { font-size: 28px; cursor: pointer; text-align: center; padding: 5px; border-radius: 8px; transition: 0.2s; }
        .emoji-item:hover { background: #dcfce7; transform: scale(1.2); }
        .emoji-item.selected { border: 3px solid var(--accent-gold); background: #fef9c3; }

        .save-btn { width: 100%; padding: 20px; background: var(--accent-gold); color: white; font-weight: 900; font-size: 26px; border: none; border-radius: 15px; cursor: pointer; }
        .admin-btn { position: fixed; bottom: 30px; right: 30px; width: 70px; height: 70px; border-radius: 50%; background: var(--card-bg); border: 2px solid var(--accent-gold); color: var(--accent-gold); font-size: 40px; cursor: pointer; opacity: 0.3; z-index: 1000; }
    </style>
</head>
<body>

<div class="mucha-frame"></div>

<div class="main">
    <div class="header">
        <div>
            <div class="title-main">中正診所</div>
            <div class="title-sub">PORTAL SYSTEM</div>
        </div>
        <div class="clock-area">
            <div class="clock" id="clock">00:00:00</div>
            <div class="date-display" id="date">載入中...</div>
            <button class="mode-toggle" onclick="toggleTheme()" id="themeBtn">切換至夜間模式 🌙</button>
        </div>
    </div>

    <div class="section-title">主要入口</div>
    <div class="grid" id="primaryGrid"></div>

    <div class="section-title">次要工具</div>
    <div class="grid" id="secondaryGrid"></div>
</div>

<button class="admin-btn" onclick="openAdmin()">⚙️</button>

<div class="admin-panel" id="adminPanel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h2 style="font-size:36px; font-weight:900;">管理面板</h2>
        <button onclick="closeAdmin()" style="background:none; border:none; font-size:45px; cursor:pointer;">✕</button>
    </div>
    
    <label style="font-weight:900; font-size:22px; display:block; margin-bottom:10px;">1. 選擇分類</label>
    <select id="linkCategory" class="input">
        <option value="primary">主要入口</option>
        <option value="secondary">次要工具</option>
    </select>

    <label style="font-weight:900; font-size:22px; display:block; margin-bottom:10px;">2. 選擇圖示</label>
    <div class="emoji-picker" id="emojiPicker"></div>
    <input id="linkIcon" class="input" readonly placeholder="點擊上方圖示">

    <label style="font-weight:900; font-size:22px; display:block; margin-bottom:10px;">3. 填寫內容</label>
    <input id="linkTitle" class="input" placeholder="網站名稱">
    <input id="linkUrl" class="input" placeholder="網址 (https://)">
    <input id="linkDesc" class="input" placeholder="說明文字">
    
    <button class="save-btn" onclick="saveLink()">保存設定</button>

    <div id="manageList" style="margin-top:40px; border-top: 2px dashed #ccc; padding-top: 20px;"></div>
</div>

<script>
    const _H = "8227b6c507a2a6b7e6417539c36d2c416e9196b653245053f3e786b6a22287b3";
    const emojis = ["🩺", "💉", "🏥", "💊", "☁️", "📦", "💻", "🔍", "📋", "🏠", "🧪", "📁", "🧬", "📅", "🔔", "✉️"];

    let primaryLinks = JSON.parse(localStorage.getItem('cz_primary_v3')) || [
        { title: "中正診所 HIS", url: "https://webhis.vision.com.tw/88336/login", desc: "門診系統登入", icon: "🩺" },
        { title: "VPN 健保系統", url: "https://medvpn.nhi.gov.tw/iwse0000/IWSE0001S01.aspx", desc: "健保資訊網服務系統", icon: "💻" }
    ];

    let secondaryLinks = JSON.parse(localStorage.getItem('cz_secondary_v3')) || [
        { title: "亞東轉診掛號", url: "https://www.femh.org.tw/webregs/HClinicLogin.aspx", desc: "亞東醫院轉診服務", icon: "🏥" }
    ];

    // 初始化 Emoji 選擇器
    const picker = document.getElementById('emojiPicker');
    emojis.forEach(e => {
        const span = document.createElement('span');
        span.className = 'emoji-item';
        span.innerText = e;
        span.onclick = () => {
            document.querySelectorAll('.emoji-item').forEach(i => i.classList.remove('selected'));
            span.classList.add('selected');
            document.getElementById('linkIcon').value = e;
        };
        picker.appendChild(span);
    });

    async function openAdmin() {
        const pass = prompt("請輸入管理密碼");
        if (!pass) return;
        const msgBuffer = new TextEncoder().encode(pass.trim());
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        if (hashHex === _H || pass === "720750") {
            document.getElementById("adminPanel").classList.add("show");
            renderManageList();
        } else { alert("密碼錯誤"); }
    }

    function saveLink() {
        const cat = document.getElementById("linkCategory").value;
        const icon = document.getElementById("linkIcon").value || "✨";
        const title = document.getElementById("linkTitle").value.trim();
        const url = document.getElementById("linkUrl").value.trim();
        const desc = document.getElementById("linkDesc").value.trim();
        if (!title || !url) return alert("請完整填寫名稱與網址");
        
        const item = { title, url, desc, icon };
        (cat === 'primary' ? primaryLinks : secondaryLinks).push(item);
        
        localStorage.setItem('cz_primary_v3', JSON.stringify(primaryLinks));
        localStorage.setItem('cz_secondary_v3', JSON.stringify(secondaryLinks));
        render(); renderManageList();
    }

    function deleteLink(cat, index) {
        if (!confirm("確定刪除？")) return;
        (cat === 'primary' ? primaryLinks : secondaryLinks).splice(index, 1);
        localStorage.setItem('cz_primary_v3', JSON.stringify(primaryLinks));
        localStorage.setItem('cz_secondary_v3', JSON.stringify(secondaryLinks));
        render(); renderManageList();
    }

    function renderManageList() {
        const list = document.getElementById("manageList");
        let html = "<h4 style='font-size:24px; margin-bottom:15px;'>目前清單</h4>";
        const row = (l, i, c) => `<div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center; font-size:20px;"><span>${l.icon} ${l.title}</span><button onclick="deleteLink('${c}', ${i})" style="color:red; background:none; border:none; font-weight:900; cursor:pointer;">刪除</button></div>`;
        html += primaryLinks.map((l, i) => row(l, i, 'primary')).join('');
        html += secondaryLinks.map((l, i) => row(l, i, 'secondary')).join('');
        list.innerHTML = html;
    }

    function render() {
        const fn = (l) => `<div class="card"><a class="card-link" href="${l.url}" target="_blank"><span class="icon-box">${l.icon}</span><div class="card-title">${l.title}</div><div class="card-desc">${l.desc}</div></a></div>`;
        document.getElementById("primaryGrid").innerHTML = primaryLinks.map(fn).join('');
        document.getElementById("secondaryGrid").innerHTML = secondaryLinks.map(fn).join('');
    }

    function updateClock() {
        const now = new Date();
        document.getElementById("clock").innerText = now.toLocaleTimeString("zh-TW", { hour12: false });
        const y = now.getFullYear();
        const week = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
        document.getElementById("date").innerText = `(民${y-1911}) ${y}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${week[now.getDay()]}`;
    }

    function toggleTheme() {
        const doc = document.documentElement;
        const next = doc.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        doc.setAttribute('data-theme', next);
        document.getElementById('themeBtn').innerText = next === 'light' ? '切換至夜間模式 🌙' : '切換至日間模式 ☀️';
    }

    function closeAdmin() { document.getElementById("adminPanel").classList.remove("show"); }
    setInterval(updateClock, 1000); updateClock(); render();
</script>
</body>
</html>
