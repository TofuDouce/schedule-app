<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>中正診所 Portal</title>

<meta
name="robots"
content="noindex,nofollow,noarchive,nosnippet,noimageindex">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cinzel:wght@500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{

    min-height:100%;

    overflow-x:hidden;

    background:
    linear-gradient(
    180deg,
    #060816,
    #0c1224
    );

    color:white;

    font-family:
    "Inter",
    sans-serif;
}

/* =========================
   慕夏風邊框
========================= */

.mucha-frame{

    position:fixed;

    inset:14px;

    pointer-events:none;

    z-index:9999;

    border:
    1px solid
    rgba(214,190,255,.14);

    border-radius:34px;

    box-shadow:

    inset 0 0 0 1px
    rgba(255,255,255,.03),

    0 0 40px
    rgba(139,92,246,.06);
}

.mucha-frame::before{

    content:"";

    position:absolute;

    inset:12px;

    border:
    1px solid
    rgba(214,190,255,.08);

    border-radius:26px;
}

.corner{

    position:absolute;

    width:90px;
    height:90px;

    border:
    1px solid
    rgba(214,190,255,.12);
}

.corner::before{

    content:"";

    position:absolute;

    inset:10px;

    border:
    1px solid
    rgba(214,190,255,.08);

    border-radius:50%;
}

.tl{
    top:-1px;
    left:-1px;

    border-right:none;
    border-bottom:none;

    border-radius:
    34px 0 0 0;
}

.tr{
    top:-1px;
    right:-1px;

    border-left:none;
    border-bottom:none;

    border-radius:
    0 34px 0 0;
}

.bl{
    bottom:-1px;
    left:-1px;

    border-right:none;
    border-top:none;

    border-radius:
    0 0 0 34px;
}

.br{
    bottom:-1px;
    right:-1px;

    border-left:none;
    border-top:none;

    border-radius:
    0 0 34px 0;
}

/* =========================
   星空
========================= */

.stars{

    position:fixed;

    inset:0;

    z-index:-1;

    overflow:hidden;
}

.star{

    position:absolute;

    width:2px;
    height:2px;

    background:white;

    border-radius:50%;

    opacity:.4;

    animation:twinkle 5s infinite;
}

@keyframes twinkle{

    0%{
        opacity:.15;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:.15;
    }
}

/* =========================
   Main
========================= */

.main{

    width:100%;

    max-width:1450px;

    margin:auto;

    padding:
    68px 28px 50px;
}

/* =========================
   Header
========================= */

.header{

    display:flex;

    flex-direction:column;

    align-items:flex-start;

    gap:24px;

    margin-bottom:56px;
}

/* =========================
   Title
========================= */

.title{

    line-height:1;

    color:white;
}

.title-main{

    font-size:
    clamp(62px,12vw,110px);

    font-weight:700;

    letter-spacing:2px;

    text-shadow:

    0 0 24px
    rgba(255,255,255,.08);
}

.title-sub{

    display:block;

    margin-top:6px;

    font-family:
    "Cinzel",
    serif;

    font-size:
    clamp(42px,8vw,72px);

    letter-spacing:6px;

    color:
    rgba(226,215,255,.92);
}

/* =========================
   Subtitle
========================= */

.subtitle{

    max-width:720px;

    color:
    rgba(226,232,240,.74);

    line-height:1.9;

    font-size:
    clamp(18px,2.6vw,28px);
}

/* =========================
   時間
========================= */

.clock-box{

    margin-top:8px;
}

.clock{

    font-size:
    clamp(72px,16vw,128px);

    font-weight:800;

    line-height:1;

    letter-spacing:-4px;

    color:white;

    text-shadow:

    0 0 24px
    rgba(255,255,255,.08);
}

.date{

    margin-top:16px;

    color:
    rgba(226,232,240,.60);

    font-size:
    clamp(18px,2.6vw,26px);

    letter-spacing:1px;
}

/* =========================
   管理按鈕
========================= */

.admin-btn{

    position:fixed;

    top:28px;
    right:28px;

    width:72px;
    height:72px;

    border:none;

    border-radius:24px;

    cursor:pointer;

    color:white;

    font-size:32px;

    z-index:999;

    background:

    linear-gradient(
    135deg,
    rgba(139,92,246,.28),
    rgba(91,33,182,.16)
    );

    border:
    1px solid
    rgba(214,190,255,.16);

    backdrop-filter:blur(18px);

    transition:.3s;
}

.admin-btn:hover{

    transform:
    rotate(90deg);

    box-shadow:
    0 0 28px
    rgba(139,92,246,.22);
}

/* =========================
   Grid
========================= */

.grid{

    display:grid;

    grid-template-columns:
    repeat(
        auto-fit,
        minmax(340px,1fr)
    );

    gap:34px;

    padding-bottom:10px;
}

/* =========================
   Card
========================= */

.card{

    position:relative;

    min-height:340px;

    border-radius:34px;

    overflow:hidden;

    background:

    linear-gradient(
    180deg,
    rgba(16,22,40,.88),
    rgba(9,14,28,.96)
    );

    border:
    1px solid
    rgba(214,190,255,.08);

    box-shadow:

    inset 0 0 0 1px
    rgba(255,255,255,.02),

    0 12px 40px
    rgba(0,0,0,.25);

    transition:.35s;
}

.card:hover{

    transform:
    translateY(-10px);

    border:
    1px solid
    rgba(180,130,255,.22);

    box-shadow:

    0 24px 60px
    rgba(139,92,246,.14);
}

.card::before{

    content:"";

    position:absolute;

    inset:0;

    background:

    radial-gradient(
    circle at top right,
    rgba(255,255,255,.05),
    transparent 42%
    );

    pointer-events:none;
}

.card-link{

    display:block;

    height:100%;

    padding:34px;

    color:white;

    text-decoration:none;
}

.card-top{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:26px;
}

.icon{

    width:74px;
    height:74px;

    border-radius:24px;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:34px;

    background:

    linear-gradient(
    135deg,
    rgba(139,92,246,.22),
    rgba(91,33,182,.10)
    );

    border:
    1px solid
    rgba(214,190,255,.16);

    box-shadow:
    0 0 24px
    rgba(139,92,246,.10);
}

.tag{

    color:#d7c5ff;

    font-size:15px;

    letter-spacing:1px;
}

.card-title{

    font-size:46px;

    font-weight:800;

    line-height:1.12;

    margin-bottom:18px;
}

.card-url{

    color:
    rgba(226,232,240,.46);

    font-size:13px;

    line-height:1.7;

    margin-bottom:24px;

    word-break:break-all;
}

.card-desc{

    color:
    rgba(226,232,240,.84);

    line-height:1.9;

    font-size:18px;
}

.open{

    position:absolute;

    left:34px;
    bottom:28px;

    color:#bb9cff;

    letter-spacing:4px;

    font-size:15px;
}

/* =========================
   管理按鈕
========================= */

.card-controls{

    position:absolute;

    top:18px;
    right:18px;

    display:flex;

    gap:10px;

    z-index:20;
}

.control-btn{

    width:44px;
    height:44px;

    border:none;

    border-radius:14px;

    cursor:pointer;

    color:white;

    font-size:16px;

    backdrop-filter:blur(10px);
}

.edit-btn{

    background:
    rgba(255,255,255,.10);
}

.delete-btn{

    background:
    rgba(255,80,80,.16);
}

/* =========================
   Admin Panel
========================= */

.admin-panel{

    position:fixed;

    top:0;
    right:-440px;

    width:440px;

    height:100vh;

    background:
    rgba(8,12,24,.97);

    border-left:
    1px solid
    rgba(214,190,255,.10);

    backdrop-filter:blur(22px);

    padding:32px;

    overflow-y:auto;

    transition:.35s;

    z-index:99999;
}

.admin-panel.show{

    right:0;
}

.admin-header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:34px;
}

.admin-title{

    font-size:34px;

    font-weight:700;
}

.close-btn{

    width:46px;
    height:46px;

    border:none;

    border-radius:16px;

    cursor:pointer;

    color:white;

    background:
    rgba(255,255,255,.08);

    font-size:18px;
}

/* =========================
   Form
========================= */

.form-group{

    margin-bottom:22px;
}

.label{

    display:block;

    margin-bottom:12px;

    color:#e2e8f0;

    font-size:15px;
}

.input{

    width:100%;

    height:58px;

    border:none;

    outline:none;

    border-radius:18px;

    background:
    rgba(255,255,255,.05);

    color:white;

    padding:0 18px;

    font-size:16px;
}

.button{

    width:100%;

    height:58px;

    border:none;

    border-radius:18px;

    cursor:pointer;

    color:white;

    font-size:16px;

    font-weight:700;

    margin-top:14px;
}

.add-btn{

    background:

    linear-gradient(
    90deg,
    #9b6dff,
    #7c3aed
    );
}

.download-btn{

    background:

    linear-gradient(
    90deg,
    #2563eb,
    #1d4ed8
    );
}

/* =========================
   手機
========================= */

@media(max-width:900px){

    .main{

        padding:
        56px 22px 40px;
    }

    .title-main{

        font-size:
        clamp(58px,16vw,90px);
    }

    .title-sub{

        font-size:
        clamp(36px,10vw,60px);
    }

    .subtitle{

        font-size:20px;
    }

    .clock{

        font-size:
        clamp(72px,20vw,120px);
    }

    .card-title{

        font-size:40px;
    }

    .admin-panel{

        width:100%;

        right:-100%;
    }

    .admin-btn{

        width:66px;
        height:66px;
    }
}

</style>
</head>

<body>

<!-- 慕夏邊框 -->

<div class="mucha-frame">

    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

</div>

<!-- 星空 -->

<div class="stars" id="stars"></div>

<!-- 管理 -->

<button
class="admin-btn"
onclick="openAdmin()">

⚙️

</button>

<!-- Main -->

<div class="main">

    <!-- Header -->

    <div class="header">

        <div class="title">

            <div class="title-main">
                中正診所
            </div>

            <span class="title-sub">
                PORTAL
            </span>

        </div>

        <div class="subtitle">

            集中所有工作入口與常用網站，
            <br>
            讓每天工作更快速順手。

        </div>

        <div class="clock-box">

            <div
            class="clock"
            id="clock">

                --:--:--

            </div>

            <div
            class="date"
            id="date">

            </div>

        </div>

    </div>

    <!-- Cards -->

    <div
    class="grid"
    id="grid">

    </div>

</div>

<!-- Admin -->

<div
class="admin-panel"
id="adminPanel">

    <div class="admin-header">

        <div class="admin-title">
            管理模式
        </div>

        <button
        class="close-btn"
        onclick="closeAdmin()">

            ✕

        </button>

    </div>

    <div class="form-group">

        <label class="label">
            標題
        </label>

        <input
        id="title"
        class="input"
        placeholder="例如：健保 VPN">

    </div>

    <div class="form-group">

        <label class="label">
            網址
        </label>

        <input
        id="url"
        class="input"
        placeholder="https://...">

    </div>

    <button
    class="button add-btn"
    onclick="addWebsite()">

        新增 / 修改網站

    </button>

    <button
    class="button download-btn"
    onclick="downloadJSON()">

        下載 data.json

    </button>

</div>

<script>

/* =========================
   星空
========================= */

const stars =
document.getElementById("stars");

for(let i=0;i<140;i++){

    const star =
    document.createElement("div");

    star.className = "star";

    star.style.left =
    Math.random()*100 + "%";

    star.style.top =
    Math.random()*100 + "%";

    star.style.animationDelay =
    Math.random()*5 + "s";

    stars.appendChild(star);
}

/* =========================
   時間
========================= */

function updateClock(){

    const now =
    new Date();

    document
    .getElementById("clock")
    .innerText =

    now.toLocaleTimeString(
    "zh-TW",
    {
        hour:"2-digit",
        minute:"2-digit",
        second:"2-digit"
    });

    document
    .getElementById("date")
    .innerText =

    now.toLocaleDateString(
    "zh-TW",
    {
        year:"numeric",
        month:"long",
        day:"numeric",
        weekday:"long"
    });
}

updateClock();

setInterval(
updateClock,
1000
);

/* =========================
   密碼
========================= */

const PASSWORD =
"720750";

/* =========================
   狀態
========================= */

let adminMode = false;

let editingIndex = null;

/* =========================
   資料
========================= */

let websites = [

    {
        title:"健保 VPN",
        url:"https://www.nhi.gov.tw/",
        icon:"🩺",
        tag:"VPN",
        description:"健保相關入口網站"
    },

    {
        title:"nIIS 系統",
        url:"https://medvpn.mohw.gov.tw/",
        icon:"🌐",
        tag:"nIIS",
        description:"疫苗與醫療資訊系統"
    },

    {
        title:"慢箋計算",
        url:"https://google.com",
        icon:"💊",
        tag:"TOOL",
        description:"慢性處方箋天數計算工具"
    }

];

/* =========================
   Grid
========================= */

const grid =
document.getElementById("grid");

/* =========================
   Render
========================= */

function renderCards(){

    grid.innerHTML = "";

    websites.forEach((item,index)=>{

        const card =
        document.createElement("div");

        card.className = "card";

        card.innerHTML =

        `
        <a
        class="card-link"
        href="${item.url}"
        target="_blank">

            <div class="card-top">

                <div class="icon">
                    ${item.icon}
                </div>

                <div class="tag">
                    ${item.tag}
                </div>

            </div>

            <div class="card-title">
                ${item.title}
            </div>

            <div class="card-url">
                ${item.url}
            </div>

            <div class="card-desc">
                ${item.description}
            </div>

            <div class="open">
                OPEN →
            </div>

        </a>
        `;

        /* 管理模式 */

        if(adminMode){

            const controls =
            document.createElement("div");

            controls.className =
            "card-controls";

            controls.innerHTML =

            `
            <button
            class="control-btn edit-btn"
            onclick="editWebsite(${index})">

                ✏️

            </button>

            <button
            class="control-btn delete-btn"
            onclick="deleteWebsite(${index})">

                🗑️

            </button>
            `;

            card.appendChild(controls);
        }

        grid.appendChild(card);
    });
}

renderCards();

/* =========================
   開啟管理
========================= */

function openAdmin(){

    const pass =
    prompt("請輸入管理密碼");

    if(pass !== PASSWORD){

        alert("密碼錯誤");

        return;
    }

    adminMode = true;

    renderCards();

    document
    .getElementById("adminPanel")
    .classList
    .add("show");
}

/* =========================
   關閉管理
========================= */

function closeAdmin(){

    adminMode = false;

    renderCards();

    document
    .getElementById("adminPanel")
    .classList
    .remove("show");
}

/* =========================
   新增 / 修改
========================= */

function addWebsite(){

    const title =
    document
    .getElementById("title")
    .value
    .trim();

    const url =
    document
    .getElementById("url")
    .value
    .trim();

    if(!title || !url){

        alert("請輸入標題與網址");

        return;
    }

    /* 修改 */

    if(editingIndex !== null){

        websites[editingIndex].title =
        title;

        websites[editingIndex].url =
        url;

        editingIndex = null;

        alert("已修改 ✨");
    }

    /* 新增 */

    else{

        websites.push({

            title:title,
            url:url,
            icon:"✨",
            tag:"LINK",
            description:"自訂網站入口"
        });

        alert("已新增 ✨");
    }

    renderCards();

    document
    .getElementById("title")
    .value = "";

    document
    .getElementById("url")
    .value = "";
}

/* =========================
   編輯
========================= */

function editWebsite(index){

    const item =
    websites[index];

    document
    .getElementById("title")
    .value =
    item.title;

    document
    .getElementById("url")
    .value =
    item.url;

    editingIndex =
    index;
}

/* =========================
   刪除
========================= */

function deleteWebsite(index){

    const yes =
    confirm("確定刪除？");

    if(!yes){

        return;
    }

    websites.splice(index,1);

    renderCards();

    alert("已刪除");
}

/* =========================
   JSON
========================= */

function downloadJSON(){

    const json =
    JSON.stringify(
    websites,
    null,
    2
    );

    const blob =
    new Blob(
    [json],
    {
        type:"application/json"
    });

    const url =
    URL.createObjectURL(blob);

    const a =
    document.createElement("a");

    a.href = url;

    a.download = "data.json";

    a.click();

    URL.revokeObjectURL(url);
}

</script>

</body>
</html>
