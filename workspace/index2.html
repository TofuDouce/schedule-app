<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中正診所 Portal</title>
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cinzel:wght@500;600&display=swap" rel="stylesheet">

<style>
/* 核心配色：深沉星空藍 + 香檳金裝飾 */
:root {
    --bg-dark: #060816;
    --bg-grad: linear-gradient(180deg, #060816, #0c1224);
    --accent-gold: rgba(214, 190, 110, 0.4); /* Mucha 風格金 */
    --accent-gold-bright: #d4af37;
    --card-bg: rgba(16, 22, 40, 0.88);
    --text-white: #ffffff;
    --text-dim: rgba(226, 232, 240, 0.7);
}

*{ margin:0; padding:0; box-sizing:border-box; }

html, body {
    min-height: 100%;
    overflow-x: hidden;
    background: var(--bg-grad);
    color: var(--text-white);
    font-family: "Inter", "Microsoft JhengHei", sans-serif;
}

/* =========================
   Mucha 裝飾邊框
========================= */
.mucha-frame {
    position: fixed;
    inset: 14px;
    pointer-events: none;
    z-index: 9999;
    border: 1px solid var(--accent-gold);
    border-radius: 34px;
    box-shadow: inset 0 0 20px rgba(212, 175, 55, 0.05);
}

.corner {
    position: absolute;
    width: 80px; height: 80px;
    border: 1px solid var(--accent-gold);
}
.corner::before {
    content: ""; position: absolute; inset: 10px;
    border: 1px solid rgba(214, 190, 110, 0.15); border-radius: 50%;
}
.tl { top:-1px; left:-1px; border-radius: 34px 0 0 0; border-right:none; border-bottom:none; }
.tr { top:-1px; right:-1px; border-radius: 0 34px 0 0; border-left:none; border-bottom:none; }
.bl { bottom:-1px; left:-1px; border-radius: 0 0 0 34px; border-right:none; border-top:none; }
.br { bottom:-1px; right:-1px; border-radius: 0 0 34px 0; border-left:none; border-top:none; }

/* 星空 */
.stars { position: fixed; inset: 0; z-index: -1; }
.star { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; opacity: 0.4; animation: twinkle 5s infinite; }
@keyframes twinkle { 0%, 100% { opacity: 0.1; } 50% { opacity: 0.8; } }

/* Main */
.main { width: 100%; max-width: 1450px; margin: auto; padding: 68px 28px 50px; }
.header { margin-bottom: 56px; }
.title-main { font-size: clamp(62px, 12vw, 90px); font-weight: 700; letter-spacing: 2px; }
.title-sub { display: block; margin-top: 6px; font-family: "Cinzel", serif; font-size: clamp(32px, 6vw, 48px); letter-spacing: 6px; color: var(--accent-gold-bright); }

.clock { font-size: clamp(42px, 9vw, 72px); font-weight: 800; line-height: 1; margin-top: 20px; }
.date { color: var(--text-dim); margin-top: 10px; font-size: 20px; }

/* Grid & Card */
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 34px; }
.card {
    position: relative; min-height: 280px; border-radius: 34px; overflow: hidden;
    background: var(--card-bg); border: 1px solid rgba(214, 190, 110, 0.1);
    transition: .35s;
}
.card:hover { transform: translateY(-10px); border-color: var(--accent-gold); }
.card-link { display: block; height: 100%; padding: 34px; color: white; text-decoration: none; }
.icon { 
    width: 64px; height: 64px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 30px;
    background: rgba(214, 190, 110, 0.1); border: 1px solid var(--accent-gold); margin-bottom: 20px;
}
.card-title { font-size: 40px; font-weight: 800; margin-bottom: 10px; }
.card-desc { color: var(--text-dim); line-height: 1.6; font-size: 17px; }

/* 管理面板與按鈕 */
.admin-btn { position: fixed; top: 28px; right: 28px; width: 60px; height: 60px; border-radius: 20px; cursor: pointer; background: rgba(255,255,255,0.05); border: 1px solid var(--accent-gold); color: white; font-size: 24px; z-index: 999; backdrop-filter: blur(10px); }
.admin-panel { position: fixed; top: 0; right: -460px; width: 460px; height: 100vh; background: #0c1224; border-left: 1px solid var(--accent-gold); padding: 30px; overflow-y: auto; transition: .35s; z-index: 10000; }
.admin-panel.show { right: 0; }
.input { width: 100%; height: 50px; background: rgba(255,255,255,0.05); border: 1px solid var(--accent-gold); border-radius: 12px; color: white; padding: 0 15px; margin-bottom: 20px; }
.button { width: 100%; height: 50px; border-radius: 12px; border: none; cursor: pointer; font-weight: 700; margin-bottom: 10px; color: white; }
.add-btn { background: linear-gradient(90deg, #d4af37, #b8860b); }
.download-btn { background: rgba(255,255,255,0.1); }
.bookmark-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid rgba(214, 190, 110, 0.1); }
.small-btn { padding: 5px 15px; border-radius: 8px; border: none; cursor: pointer; margin-right: 5px; color: white; font-size: 12px; }
</style>
</head>
<body>

<div class="mucha-frame">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
</div>
<div class="stars" id="stars"></div>
<button class="admin-btn" onclick="openAdmin()">⚙️</button>

<div class="main">
    <div class="header">
        <div class="title-main">中正診所</div>
        <div class="title-sub">PORTAL SYSTEM</div>
        <div class="clock" id="clock">00:00:00</div>
        <div class="date" id="date"></div>
    </div>
    <div class="grid" id="grid"></div>
</div>

<div class="admin-panel" id="adminPanel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h2>管理模式</h2>
        <button onclick="closeAdmin()" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">✕</button>
    </div>
    
    <label>網站名稱</label>
    <input id="title" class="input" placeholder="例如：健保 VPN">
    <label>網址 (URL)</label>
    <input id="url" class="input" placeholder="https://">
    
    <button class="button add-btn" onclick="addWebsite()">保存網站</button>
    <button class="button download-btn" onclick="downloadJSON()">下載備份 (JSON)</button>
    
    <hr style="opacity:0.1; margin:20px 0;">
    <h3>目前清單</h3><br>
    <div id="bookmarkList"></div>
</div>

<script>
/* 密碼混淆：btoa('720750') */
const _K = "NzIwNzUw";

let websites = [
    { title:"健保 VPN", url:"https://www.nhi.gov.tw/", icon:"🩺", description:"健保內部系統入口" },
    { title:"nIIS 系統", url:"https://medvpn.mohw.gov.tw/", icon:"💉", description:"疫苗與醫療資訊系統" }
];

let editingIndex = null;

function render(){
    // 渲染首頁卡片
    const grid = document.getElementById("grid");
    grid.innerHTML = "";
    websites.forEach((item, index) => {
        grid.innerHTML += `
            <div class="card">
                <a class="card-link" href="${item.url}" target="_blank">
                    <div class="icon">${item.icon}</div>
                    <div class="card-title">${item.title}</div>
                    <div class="card-desc">${item.description}</div>
                </a>
            </div>`;
    });

    // 渲染管理清單
    const list = document.getElementById("bookmarkList");
    list.innerHTML = "";
    websites.forEach((item, index) => {
        list.innerHTML += `
            <div class="bookmark-item">
                <div style="font-weight:bold">${item.icon} ${item.title}</div>
                <div style="font-size:11px; opacity:0.5; margin-bottom:10px;">${item.url}</div>
                <button class="small-btn" style="background:#4a5568" onclick="editWebsite(${index})">修改</button>
                <button class="small-btn" style="background:#c53030" onclick="deleteWebsite(${index})">刪除</button>
            </div>`;
    });
}

function addWebsite(){
    const t = document.getElementById("title").value;
    const u = document.getElementById("url").value;
    if(!t || !u) return alert("請填寫內容");

    if(editingIndex !== null){
        websites[editingIndex] = { ...websites[editingIndex], title: t, url: u };
        editingIndex = null;
    } else {
        websites.push({ title: t, url: u, icon: "✨", description: "自訂快速連結" });
    }
    
    document.getElementById("title").value = "";
    document.getElementById("url").value = "";
    render();
    alert("更新成功！");
}

function editWebsite(i){
    editingIndex = i;
    document.getElementById("title").value = websites[i].title;
    document.getElementById("url").value = websites[i].url;
    window.scrollTo(0,0);
}

function deleteWebsite(i){
    if(confirm("確定刪除？")){
        websites.splice(i, 1);
        render();
    }
}

function openAdmin(){
    if(btoa(prompt("請輸入密碼")) === _K) document.getElementById("adminPanel").classList.add("show");
    else alert("密碼錯誤");
}

function closeAdmin(){ document.getElementById("adminPanel").classList.remove("show"); }

function downloadJSON(){
    const blob = new Blob([JSON.stringify(websites, null, 2)], {type: "application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "portal_data.json";
    a.click();
}

/* 初始化星空與時間 */
for(let i=0; i<100; i++){
    const s = document.createElement("div");
    s.className = "star";
    s.style.left = Math.random()*100+"%";
    s.style.top = Math.random()*100+"%";
    s.style.animationDelay = Math.random()*5+"s";
    document.getElementById("stars").appendChild(s);
}

function updateTime(){
    const now = new Date();
    document.getElementById("clock").innerText = now.toLocaleTimeString("zh-TW", {hour12:false});
    document.getElementById("date").innerText = now.toLocaleDateString("zh-TW", {year:"numeric", month:"long", day:"numeric", weekday:"long"});
}
setInterval(updateTime, 1000);
updateTime();
render();
</script>
</body>
</html>
