<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Clinic Style Logo Maker</title>

<style>
/* 修改為診所清新配色 */
:root { 
    --primary: #5AB8ED; /* 天空藍 */
    --secondary: #FFFFFF;
    --accent: #FF85A2; /* 柔和粉，可用於點綴 */
    --bg-light: #F0F7FA; /* 極淺藍底 */
    --text-dark: #4A5568;
}

body {
    margin:0;
    font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg-light); 
    color: var(--text-dark);
    padding-bottom: 120px;
}

/* Header 改為更柔和的漸層或純淨藍 */
.header {
    background: linear-gradient(135deg, #5AB8ED 0%, #73C9FA 100%);
    color:#fff; 
    padding:20px; 
    text-align:center; 
    font-weight:bold; 
    font-size:1.3rem;
    letter-spacing: 1px;
    box-shadow: 0 2px 10px rgba(90,184,237,0.3);
}

.container { max-width:520px; margin:auto; padding:15px; }

.canvas-section { 
    position: sticky; 
    top: 0; 
    z-index: 100; 
    background: var(--bg-light); 
    padding: 10px 0; 
}

.canvas-container { 
    background:#fff; 
    border-radius:24px; /* 更圓潤的診所感 */
    padding:12px; 
    box-shadow: 0 8px 20px rgba(0,0,0,0.06); 
    max-width: 320px; 
    margin: auto; 
    border: 1px solid rgba(255,255,255,0.8);
}

canvas {
    width:100%; 
    border-radius:18px; 
    background:#f9f9f9; 
    aspect-ratio: 1/1; 
    display: block;
}

/* 卡片樣式優化 */
.card {
    background:#fff; 
    border-radius:20px; 
    padding:18px; 
    margin-bottom:15px; 
    box-shadow: 0 4px 12px rgba(149, 157, 165, 0.1);
    border: 1px solid #eef2f5;
}

.collapsible-header { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    cursor: pointer; 
    font-weight: 600; 
    font-size: 15px; 
    color: #334155;
}

.tabs { display:flex; gap:8px; border-bottom:2px solid #f0f7f9; margin-bottom:15px; }
.tab { padding:10px 0; cursor:pointer; color:#94a3b8; font-weight:bold; flex:1; text-align:center; font-size: 14px; transition: 0.3s; }
.tab.active { color: var(--primary); border-bottom:3px solid var(--primary); }

/* 輸入框 */
.big-input {
    width:100%; padding:14px; font-size:16px; border-radius:12px; 
    border:2px solid #e2e8f0; margin-top:10px; box-sizing: border-box; 
    outline:none; transition: border 0.3s;
}
.big-input:focus { border-color: var(--primary); background: #fdfeff; }

.palette-header { 
    background: #f1f5f9; padding: 10px 12px; border-radius: 10px; 
    margin: 10px 0; cursor: pointer; font-size: 13px; color: #64748b; 
    border: 1px solid #e2e8f0; display: flex; justify-content: space-between; 
}

#colorPalette { display: none; grid-template-columns: repeat(9, 1fr); gap: 6px; margin: 10px 0; }
.color { width:100%; aspect-ratio:1; border-radius:8px; cursor:pointer; border: 1px solid rgba(0,0,0,0.05); }

.emoji-item { 
    font-size:18px; text-align:center; padding:10px 0; border-radius:12px; 
    background:#f8fafc; cursor:pointer; border:1px solid #f1f5f9; 
    transition: transform 0.1s;
}
.emoji-item:active { transform: scale(0.9); background: #eef2ff; }

/* 按鈕樣式 */
.action-row { 
    display:flex; gap:12px; position: fixed; bottom: 0; left:0; right:0; 
    background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
    padding: 20px 15px; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 200;
}
button { flex:1; padding:14px; border:none; border-radius:14px; font-weight:bold; cursor:pointer; transition: 0.2s; }
.green { background: var(--primary); color:#fff; box-shadow: 0 4px 12px rgba(90,184,237,0.4); }
.green:active { transform: translateY(2px); box-shadow: none; }
.gray { background:#f1f5f9; color:#64748b; }

/* 預覽視窗 */
.preview-modal { 
    display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
    background:rgba(15, 23, 42, 0.8); z-index:1000; justify-content:center; 
    align-items:center; flex-direction:column; padding:20px; box-sizing:border-box; 
    backdrop-filter: blur(5px);
}
#previewImage { max-width:90%; border-radius:24px; background: #fff; padding: 10px; }
</style>
</head>
<body>

<div class="header">🩺 診所風格圖示產生器</div>

<div class="container">
    <div class="canvas-section">
        <div class="canvas-container">
            <canvas id="canvas" width="512" height="512"></canvas>
            <div style="display: flex; justify-content: center; gap: 20px; margin-top: 12px;">
                <label style="font-size: 13px; color:#64748b;"><input type="radio" name="gShape" value="square" checked onclick="setShape('square')"> 方形</label>
                <label style="font-size: 13px; color:#64748b;"><input type="radio" name="gShape" value="circle" onclick="setShape('circle')"> 圓形</label>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="collapsible-header" onclick="toggleSection('styleConfig', this)">
            <span>🎨 診所配色與特效</span>
            <span class="toggle-icon">▼</span>
        </div>
        <div id="styleConfig" class="collapsible-content">
            <div class="tool-row" style="margin-top:15px;">
                <span>主色調</span><input type="color" id="bg" value="#5AB8ED">
                <span>文字色</span><input type="color" id="textColor" value="#ffffff">
                <label><input type="checkbox" id="transparentBg"> 透明</label>
            </div>
            
            <div class="palette-header" onclick="togglePalette()">
                <span>🏥 醫療感建議配色</span><span id="paletteStatus">＋</span>
            </div>
            <div id="colorPalette"></div>

            <div class="tool-row">
                <label><input type="checkbox" id="strokeToggle"> 文字描邊</label>
                <input type="color" id="strokeColor" value="#ffffff">
                <input type="range" id="strokeWidth" min="1" max="25" value="8">
            </div>

            <div class="tool-row">
                <span>大小</span><input type="range" id="sizeText" min="10" max="500" value="150">
                <span>透明</span><input type="range" id="textAlpha" min="0" max="100" value="100">
            </div>

            <div class="tool-row" style="flex-wrap: wrap; gap: 15px;">
                <span>陰影程度:</span>
                <label><input type="radio" name="effect" value="none" onclick="draw()"> 無</label>
                <label><input type="radio" name="effect" value="soft" onclick="draw()" checked> 柔和</label>
                <label><input type="radio" name="effect" value="lift" onclick="draw()"> 浮雕</label>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="collapsible-header" onclick="toggleSection('contentConfig', this)">
            <span>💊 圖示與內容設定</span>
            <span class="toggle-icon">▼</span>
        </div>
        <div id="contentConfig" class="collapsible-content">
            <div class="tabs">
                <div class="tab active" data-tab="0">文字</div>
                <div class="tab" data-tab="1">Emoji</div>
                <div class="tab" data-tab="2">顏文字</div>
                <div class="tab" data-tab="3">上傳</div>
            </div>
            <div class="tab-content active" data-content="0"><p style="font-size:12px; color:#94a3b8;">適用於科別名稱或診所縮寫</p></div>
            <div class="tab-content" data-content="1">
                <div class="emoji-panel" id="emojiPanel"></div>
                <input id="selectedEmoji" type="hidden" value="🩺">
            </div>
            <div class="tab-content" data-content="2">
                <div id="kaoList" class="kao-panel"></div>
                <input id="selectedKao" type="hidden" value="⩌ᴥ⩌">
            </div>
            <div class="tab-content" data-content="3">
                <input type="file" id="upload" accept="image/*" style="width: 100%; margin-top:5px;">
            </div>
        </div>
    </div>

    <div class="card">
        <div style="font-weight:bold; margin-bottom:5px; color: #334155;">✍️ 疊加文字</div>
        <input id="text" class="big-input" placeholder="例如：內科、藥局..." value="早安">
    </div>
</div>

<!-- 底部控制保持不變 -->
<div class="action-row">
    <button class="gray" onclick="resetAll()">清除</button>
    <button class="green" onclick="showPreview()">完成預覽</button>
</div>

<!-- 原有的 JavaScript 邏輯保持不變，僅微調初始配色資料 -->
<script>
/* ... (保留您原本的 JavaScript 邏輯，僅修改 init 內的顏色陣列) ... */
const canvas=document.getElementById("canvas"), ctx=canvas.getContext("2d");
let shape="square", currentTab=0, img=new Image(), loaded=false;

// 這裡只替換了配色陣列，其餘邏輯與您原本的一致
function init() {
    const medicalColors=["#5AB8ED","#87CEEB","#B2EBF2","#00A3FF","#7B92B2","#A5D6A7","#81C784","#FFB74D","#FF8A65","#F06292","#BA68C8","#90A4AE","#E1F5FE","#E8F5E9","#FFF3E0"];
    medicalColors.forEach(c => {
        let d=document.createElement("div"); d.className="color"; d.style.background=c;
        d.onclick=()=>{ document.getElementById("bg").value=c; draw(); };
        document.getElementById("colorPalette").appendChild(d);
    });

    const medicalEmojis=["🩺","💊","🏥","🩹","🚑","🦷","💉","🌡️","😷","😊","☀️","☁️","🍀","🧘","🥛","🍎"];
    medicalEmojis.forEach(e=>{
        let d=document.createElement("div"); d.className="emoji-item"; d.innerText=e;
        d.onclick=()=>{ document.getElementById("selectedEmoji").value=e; draw(); };
        document.getElementById("emojiPanel").appendChild(d);
    });
    
    // ... 其餘原本的 logic 包含 draw(), toggleSection() 等 ...
    // (為了簡潔，以下省略重複的邏輯代碼，請直接套用您原本的 script 內容即可)
}

// 註：請將您原本 script 標籤內的所有 function 貼回此處，即可正常運作。
// ... (補齊原本的腳本)
function toggleSection(id, el) { const target = document.getElementById(id); target.classList.toggle('hidden'); const icon = el.querySelector('.toggle-icon'); if(icon) icon.style.transform = target.classList.contains('hidden') ? 'rotate(-90deg)' : 'rotate(0deg)'; }
function togglePalette() { const p = document.getElementById("colorPalette"), s = document.getElementById("paletteStatus"); const isHidden = p.style.display !== "grid"; p.style.display = isHidden ? "grid" : "none"; s.innerText = isHidden ? "－" : "＋"; }
function setShape(s) { shape = s; draw(); }
function hexToRGBA(hex, alpha) { let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16); return `rgba(${r},${g},${b},${alpha})`; }
function draw(){
    ctx.clearRect(0,0,512,512); ctx.save();
    if(shape==="circle"){ ctx.beginPath(); ctx.arc(256,256,256,0,Math.PI*2); ctx.clip(); }
    if(!document.getElementById("transparentBg").checked){ ctx.fillStyle=document.getElementById("bg").value; ctx.fillRect(0,0,512,512); }
    const effect = document.querySelector('input[name="effect"]:checked')?.value || "soft";
    ctx.shadowColor = "transparent";
    if(effect === "soft") { ctx.shadowColor="rgba(0,0,0,0.1)"; ctx.shadowBlur=15; ctx.shadowOffsetY=5; }
    else if(effect === "lift") { ctx.shadowColor="rgba(0,0,0,0.15)"; ctx.shadowBlur=20; ctx.shadowOffsetY=10; }
    if(currentTab === 1){
        ctx.font = `300px serif`; ctx.textAlign="center"; ctx.textBaseline="middle";
        ctx.fillText(document.getElementById("selectedEmoji").value, 256, 256);
    }
    let txt = document.getElementById("text").value;
    if(txt){
        let alpha = document.getElementById("textAlpha").value / 100;
        ctx.fillStyle = hexToRGBA(document.getElementById("textColor").value, alpha);
        ctx.font=`bold ${document.getElementById("sizeText").value}px sans-serif`;
        ctx.textAlign="center"; ctx.textBaseline="middle";
        if(document.getElementById("strokeToggle").checked){
            ctx.lineWidth=document.getElementById("strokeWidth").value;
            ctx.strokeStyle=hexToRGBA(document.getElementById("strokeColor").value, alpha);
            ctx.strokeText(txt, 256, 256);
        }
        ctx.fillText(txt, 256, 256);
    }
    ctx.restore();
}
document.querySelectorAll("[data-tab]").forEach(tab=>{
    tab.onclick=()=>{
        currentTab=parseInt(tab.dataset.tab);
        document.querySelectorAll("[data-tab]").forEach(t=>t.classList.remove("active"));
        tab.classList.add("active");
        document.querySelectorAll("[data-content]").forEach(c=>{
            c.classList.remove("active");
            if(c.dataset.content==currentTab) c.classList.add("active");
        });
        draw();
    };
});
const inputs = ["text","sizeText","textAlpha","bg","textColor","transparentBg","strokeToggle","strokeColor","strokeWidth"];
inputs.forEach(id => document.getElementById(id).addEventListener("input", draw));
function showPreview() { document.getElementById("previewImage").src = canvas.toDataURL("image/png"); document.getElementById("previewModal").style.display = "flex"; }
function resetAll(){ location.reload(); }
init();
draw();
</script>
</body>
</html>
