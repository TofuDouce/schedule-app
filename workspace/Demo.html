<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中正診所 Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Noto+Sans+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        /* --- 主題配色變數定義 --- */
        :root[data-theme="light"] {
            --primary-main: #0284c7; /* 經典藍 */
            --bg-sky: linear-gradient(135deg, #e0f2fe 0%, #ffffff 100%);
            --header-bg: rgba(255, 255, 255, 0.85);
            --card-bg: rgba(255, 255, 255, 0.75);
            --text-main: #0c4a6e;
            --text-sub: #334155;
            --accent-secondary: #7dd3fc;
            --border-color: rgba(255, 255, 255, 0.6);
            --card-shadow: 0 12px 30px -5px rgba(14, 165, 233, 0.15);
        }

        [data-color="green"] {
            --primary-main: #16a34a !important;
            --bg-sky: linear-gradient(135deg, #f0fdf4 0%, #ffffff 100%) !important;
            --accent-secondary: #86efac !important;
            --card-shadow: 0 12px 30px -5px rgba(22, 163, 74, 0.15) !important;
        }

        [data-color="red"] {
            --primary-main: #dc2626 !important;
            --bg-sky: linear-gradient(135deg, #fef2f2 0%, #ffffff 100%) !important;
            --accent-secondary: #fca5a5 !important;
            --card-shadow: 0 12px 30px -5px rgba(220, 38, 38, 0.15) !important;
        }

        [data-color="dark"] {
            --primary-main: #38bdf8 !important;
            --bg-sky: #0f172a !important;
            --header-bg: rgba(15, 23, 42, 0.9) !important;
            --card-bg: #1e293b !important;
            --text-main: #f1f5f9 !important;
            --text-sub: #cbd5e1 !important;
            --border-color: #334155 !important;
            --card-shadow: 0 4px 20px rgba(0,0,0,0.3) !important;
        }

        :root {
            --dynamic-title-size: 28px;
            --dynamic-desc-size: 18px;
            --grid-cols: 5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            min-height: 100vh; 
            background: var(--bg-sky);
            background-attachment: fixed;
            color: var(--text-main); 
            font-family: "Inter", "Noto Sans TC", sans-serif; 
            transition: all 0.4s; 
            overflow-x: hidden;
        }

        .header { 
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 5%; 
            background-color: var(--header-bg);
            backdrop-filter: blur(15px);
            border-bottom: 4px solid var(--accent-secondary); 
        }

        .title-main { 
            font-size: clamp(24px, 5vw, 48px);
            font-weight: 900;
            /* 標題漸層連動主色 */
            background: linear-gradient(to right, var(--primary-main), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .main { width: 100%; max-width: 1600px; margin: auto; padding: 140px 20px 100px; }

        .section-title { 
            font-size: 28px; font-weight: 900; margin: 40px 0 20px; padding-left: 15px; 
            border-left: 8px solid var(--accent-secondary); 
            color: var(--primary-main);
        }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(var(--grid-cols, 5), 1fr); 
            gap: 20px; 
        }

        @media (max-width: 768px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .admin-panel { width: 100% !important; }
        }

        .card { 
            position: relative; 
            background: var(--card-bg); 
            backdrop-filter: blur(5px);
            border-radius: 24px; 
            border: 1px solid var(--border-color); 
            box-shadow: var(--card-shadow);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-5px); }

        .card.highlight-card {
            background: rgba(255, 243, 205, 0.95) !important;
            border: 3px solid #ffc107 !important;
        }

        .card-link { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 35px 25px; text-decoration: none; color: inherit; text-align: center; height: 100%;
        }
        .icon-box { font-size: 55px; margin-bottom: 15px; display: block; line-height: 1; }
        .card-title { font-size: var(--dynamic-title-size); font-weight: 900; color: var(--primary-main); margin-bottom: 8px; }
        .card-desc { font-size: var(--dynamic-desc-size); font-weight: 700; color: var(--text-sub); line-height: 1.4; }

        /* --- 管理面板樣式 --- */
        .admin-panel { 
            position: fixed; top: 0; right: -100%; width: 450px; height: 100vh; 
            background: var(--card-bg); backdrop-filter: blur(30px); 
            border-left: 8px solid var(--primary-main); padding: 30px; 
            overflow-y: auto; transition: 0.4s; z-index: 2000;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
        }
        .admin-panel.show { right: 0; }
        
        /* 配色選擇器按鈕 */
        .color-picker { display: flex; gap: 10px; margin-bottom: 15px; }
        .color-dot { 
            width: 35px; height: 35px; border-radius: 50%; border: 3px solid white; cursor: pointer; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: 0.2s;
        }
        .color-dot:hover { transform: scale(1.1); }
        .dot-blue { background: #0284c7; }
        .dot-green { background: #16a34a; }
        .dot-red { background: #dc2626; }
        .dot-dark { background: #1e293b; }

        .input { width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 12px; font-size: 16px; margin-bottom: 10px; background: white; }
        .btn { width: 100%; padding: 15px; font-size: 18px; font-weight: 900; border: none; border-radius: 12px; cursor: pointer; margin-top: 10px; }
        .controls { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 15px; z-index: 1000; }
        .ctrl-btn { width: 60px; height: 60px; border-radius: 50%; border: 3px solid var(--accent-secondary); background: var(--card-bg); font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body id="bodyRoot">

<div class="header">
    <div class="title-group">
        <div class="title-main">中正診所</div>
        <div style="font-size: 12px; color: var(--primary-main); font-weight: 700; letter-spacing: 2px;">PORTAL SYSTEM</div>
    </div>
    <div style="text-align: right;">
        <div id="clock" style="font-size: clamp(24px, 4vw, 40px); font-weight: 900; color: var(--primary-main);">00:00:00</div>
        <div id="date" style="font-size: 14px; font-weight: 700; color: var(--text-sub);"></div>
    </div>
</div>

<div class="main" id="mainContainer">
    <div class="section-title">主要入口</div>
    <div id="primaryGrid" class="grid"></div>
    <div class="section-title">次要工具</div>
    <div id="secondaryGrid" class="grid"></div>
</div>

<div class="controls">
    <button class="ctrl-btn" onclick="toggleAdminMode()">⚙️</button>
</div>

<div class="admin-panel" id="adminPanel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="font-size: 24px; font-weight:900;">系統管理面板</h2>
        <button onclick="closeAdmin()" style="font-size:32px; border:none; background:none; cursor:pointer; color:#ef4444;">✕</button>
    </div>

    <div style="background: rgba(139, 92, 246, 0.05); padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #ddd;">
        <h3 style="margin-bottom:12px; font-size:16px;">🎨 主題配色切換</h3>
        <div class="color-picker">
            <div class="color-dot dot-blue" onclick="changeThemeColor('light')" title="經典藍"></div>
            <div class="color-dot dot-green" onclick="changeThemeColor('green')" title="森林綠"></div>
            <div class="color-dot dot-red" onclick="changeThemeColor('red')" title="熱情紅"></div>
            <div class="color-dot dot-dark" onclick="changeThemeColor('dark')" title="深邃黑"></div>
        </div>
    </div>

    <div style="background: rgba(2, 132, 199, 0.05); padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #ddd;">
        <h3 style="margin-bottom:10px; font-size:16px;">📏 版面與文字</h3>
        <label style="font-size:14px;">卡片標題大小 <span id="ts-val">28px</span></label>
        <input type="range" id="titleSlider" min="16" max="50" value="28" style="width:100%" oninput="applyUIStyle()">
        
        <label style="font-size:14px; margin-top:10px; display:block;">卡片內容大小 <span id="ds-val">18px</span></label>
        <input type="range" id="descSlider" min="12" max="30" value="18" style="width:100%" oninput="applyUIStyle()">
        
        <label style="font-size:14px; margin-top:10px; display:block;">電腦版顯示欄數</label>
        <select id="gridColSelect" class="input" onchange="applyUIStyle()">
            <option value="6">一列 6 張</option>
            <option value="5" selected>一列 5 張</option>
            <option value="4">一列 4 張</option>
            <option value="3">一列 3 張</option>
        </select>
    </div>

    <h3 style="margin-bottom:10px; font-size:18px;">🆕 新增自訂書籤</h3>
    <select id="linkCategory" class="input">
        <option value="primary">主要入口</option>
        <option value="secondary" selected>次要工具</option>
    </select>
    <div id="emojiPicker" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px;"></div>
    <input id="linkTitle" class="input" placeholder="名稱">
    <input id="linkUrl" class="input" placeholder="網址">
    <input id="linkDesc" class="input" placeholder="簡短說明">
    <button class="btn" style="background:var(--primary-main); color:white;" onclick="saveLink()">儲存書籤</button>
    
    <div id="customLinksList" style="margin-top:20px;"></div>
</div>

<script>
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/1uYBA_CncbEAydmzNC1SRnsKJdswNgQh3zg1x6TKo0UU/export?format=csv&gid=0`;
    const emojis = ["🩺", "💉", "🏥", "💊", "💻", "🔍", "📋", "🏠", "🧪", "📅", "📝", "⭐", "👤", "⚙️", "🔗", "💡"];
    let selectedIcon = "🔗";
    let userLinks = JSON.parse(localStorage.getItem('cz_user_links_v4')) || { primary: [], secondary: [] };

    // --- 主題顏色切換邏輯 ---
    function changeThemeColor(color) {
        document.documentElement.setAttribute('data-color', color);
        // 如果是深色模式，同時切換 dark 屬性
        if (color === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
        }
        localStorage.setItem('cz_theme_color', color);
    }

    async function fetchCloudData() {
        try {
            const res = await fetch(SHEET_URL + "&cb=" + Date.now());
            const text = await res.text();
            const lines = text.split(/\r?\n/).slice(1);
            const pg = document.getElementById("primaryGrid");
            const sg = document.getElementById("secondaryGrid");
            pg.innerHTML = ""; sg.innerHTML = "";

            lines.forEach(line => {
                const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
                if (cols.length >= 3) {
                    const [cat, title, url, desc, icon] = cols;
                    const html = createCard({title, url, desc, icon, isHighlight: title.includes("重要")});
                    if (cat.toLowerCase().includes('primary')) pg.innerHTML += html;
                    else sg.innerHTML += html;
                }
            });

            // 加入自訂連結
            userLinks.primary.forEach(l => pg.innerHTML += createCard(l));
            userLinks.secondary.forEach(l => sg.innerHTML += createCard(l));
        } catch (e) { console.error("Cloud Error"); }
    }

    function createCard(l) {
        return `
            <div class="card ${l.isHighlight ? 'highlight-card' : ''}">
                <a class="card-link" href="${l.url}" target="_blank">
                    <span class="icon-box">${l.icon || '🔗'}</span>
                    <div class="card-title">${l.title}</div>
                    <div class="card-desc">${l.desc || ''}</div>
                </a>
            </div>`;
    }

    function applyUIStyle() {
        const ts = document.getElementById('titleSlider').value;
        const ds = document.getElementById('descSlider').value;
        const col = document.getElementById('gridColSelect').value;
        document.getElementById('ts-val').innerText = ts + 'px';
        document.getElementById('ds-val').innerText = ds + 'px';
        document.documentElement.style.setProperty('--dynamic-title-size', ts + 'px');
        document.documentElement.style.setProperty('--dynamic-desc-size', ds + 'px');
        document.documentElement.style.setProperty('--grid-cols', col);
        localStorage.setItem('cz_ui_config', JSON.stringify({ts, ds, col}));
    }

    function saveLink() {
        const title = document.getElementById('linkTitle').value;
        const url = document.getElementById('linkUrl').value;
        const desc = document.getElementById('linkDesc').value;
        const cat = document.getElementById('linkCategory').value;
        if(!title || !url) return alert("請輸入名稱與網址");
        userLinks[cat].push({id: Date.now(), title, url, desc, icon: selectedIcon});
        localStorage.setItem('cz_user_links_v4', JSON.stringify(userLinks));
        location.reload();
    }

    // 初始化 Emoji 選擇器
    emojis.forEach(e => {
        const div = document.createElement('div');
        div.style = "font-size:24px; cursor:pointer; text-align:center; padding:5px; border:1px solid #ddd; border-radius:10px; background:#fff;";
        div.innerText = e;
        div.onclick = () => { 
            document.querySelectorAll('#emojiPicker div').forEach(d => d.style.borderColor = "#ddd");
            selectedIcon = e; 
            div.style.borderColor = "var(--primary-main)"; 
        };
        document.getElementById('emojiPicker').appendChild(div);
    });

    function toggleAdminMode() { document.getElementById("adminPanel").classList.toggle("show"); }
    function closeAdmin() { document.getElementById("adminPanel").classList.remove("show"); }

    function updateClock() {
        const now = new Date();
        document.getElementById("clock").innerText = now.toLocaleTimeString("zh-TW", { hour12: false });
        const y = now.getFullYear();
        document.getElementById("date").innerText = `(民${y-1911}) ${y}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
    }

    window.onload = () => {
        // 載入主題顏色
        const savedColor = localStorage.getItem('cz_theme_color');
        if(savedColor) changeThemeColor(savedColor);

        // 載入版面設定
        const cfg = JSON.parse(localStorage.getItem('cz_ui_config'));
        if(cfg) {
            document.getElementById('titleSlider').value = cfg.ts;
            document.getElementById('descSlider').value = cfg.ds;
            document.getElementById('gridColSelect').value = cfg.col;
            applyUIStyle();
        }
        setInterval(updateClock, 1000); updateClock();
        fetchCloudData();
    };
</script>
</body>
</html>
