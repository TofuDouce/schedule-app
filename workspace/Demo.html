<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light" data-color="blue">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中正診所 Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Noto+Sans+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --dynamic-title-size: 28px;
            --dynamic-desc-size: 18px;
            --grid-cols: 5;
        }

        /* 🎨 主題配色方案：定義 一般色 / 淺色(夜間用) / 深色(黃卡用) */
        /* 藍色系 */
        :root[data-color="blue"] { 
            --brand-color: #0284c7; 
            --brand-light: #7dd3fc; 
            --brand-dark: #075985; /* 強調卡片用的深藍 */
        }
        /* 綠色系 */
        :root[data-color="green"] { 
            --brand-color: #059669; 
            --brand-light: #6ee7b7; 
            --brand-dark: #065f46; /* 強調卡片用的深綠 */
        }
        /* 紫色系 */
        :root[data-color="purple"] { 
            --brand-color: #8b5cf6; 
            --brand-light: #c4b5fd; 
            --brand-dark: #5b21b6; /* 強調卡片用的深紫 */
        }
        /* 灰色系 */
        :root[data-color="gray"] { 
            --brand-color: #475569; 
            --brand-light: #cbd5e1; 
            --brand-dark: #1e293b; /* 強調卡片用的深灰 */
        }

        /* ☀️ 淺色模式 */
        :root[data-theme="light"] {
            --bg-sky: linear-gradient(135deg, #f0f9ff 0%, #ffffff 100%);
            --header-bg: rgba(255, 255, 255, 0.85);
            --card-bg: rgba(255, 255, 255, 0.75);
            --accent-primary: var(--brand-color); 
            --accent-secondary: var(--brand-light); 
            --text-main: #0c4a6e; 
            --text-sub: #334155;      
            --border-color: rgba(255, 255, 255, 0.6);
            --card-shadow: 0 12px 30px -5px rgba(0, 0, 0, 0.1);
        }
        
        /* 🌙 深色模式 */
        :root[data-theme="dark"] {
            --bg-sky: #0f172a;
            --header-bg: rgba(15, 23, 42, 0.9);
            --card-bg: #1e293b;
            --accent-primary: var(--brand-light);
            --accent-secondary: var(--brand-color);
            --text-main: #f1f5f9;
            --text-sub: #cbd5e1;
            --border-color: #334155;
            --card-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            min-height: 100vh; background: var(--bg-sky); background-attachment: fixed;
            color: var(--text-main); font-family: "Inter", "Noto Sans TC", sans-serif; 
            transition: background 0.4s, color 0.4s; overflow-x: hidden;
        }

        /* 標題與版面樣式 */
        .header { 
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 5%; background-color: var(--header-bg); backdrop-filter: blur(15px);
            border-bottom: 4px solid var(--accent-secondary); 
        }
        .title-main { 
            font-size: clamp(24px, 5vw, 48px); font-weight: 900;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .main { width: 100%; max-width: 1600px; margin: auto; padding: 140px 20px 100px; }
        .section-title { 
            font-size: 28px; font-weight: 900; margin: 40px 0 20px; padding-left: 15px; 
            border-left: 8px solid var(--accent-secondary); color: var(--accent-primary);
        }
        .grid { display: grid; grid-template-columns: repeat(var(--grid-cols, 5), 1fr); gap: 20px; }

        /* ⭐ 重點：強調卡片樣式修正 */
        .card.highlight-card {
            background: rgba(255, 243, 205, 1) !important; /* 明亮的黃色背景 */
            border: 3px solid #ffc107 !important;
            box-shadow: 0 10px 20px rgba(255, 193, 7, 0.2) !important;
        }
        
        /* 當卡片是黃色強調時，標題強制使用該主題的「深色版」 */
        .card.highlight-card .card-title {
            color: var(--brand-dark) !important; 
            text-shadow: none; /* 確保在黃底上清晰 */
        }
        
        .card.highlight-card .card-desc {
            color: #dc2626 !important; /* 說明的紅色也保持醒目 */
            font-weight: 900;
        }

        /* 一般卡片樣式 */
        .card { 
            position: relative; background: var(--card-bg); backdrop-filter: blur(5px);
            border-radius: 24px; border: 1px solid var(--border-color); 
            box-shadow: var(--card-shadow); transition: transform 0.2s, border 0.2s;
            display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent-primary); }
        .card-link { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 35px 25px; text-decoration: none; color: inherit; text-align: center; height: 100%;
        }
        .icon-box { font-size: 55px; margin-bottom: 15px; display: block; line-height: 1; }
        .card-title { font-size: var(--dynamic-title-size); font-weight: 900; color: var(--accent-primary); margin-bottom: 8px; transition: color 0.3s; }
        .card-desc { font-size: var(--dynamic-desc-size); font-weight: 700; color: var(--text-sub); line-height: 1.4; }

        /* 控制面板 */
        .admin-panel { 
            position: fixed; top: 0; right: -100%; width: 450px; height: 100vh; 
            background: var(--card-bg); backdrop-filter: blur(30px); 
            border-left: 8px solid var(--accent-primary); padding: 30px; 
            overflow-y: auto; transition: 0.4s; z-index: 2000;
        }
        .admin-panel.show { right: 0; }
        .input { width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 12px; margin-bottom: 10px; }
        .btn { width: 100%; padding: 15px; font-size: 18px; font-weight: 900; border: none; border-radius: 12px; cursor: pointer; margin-top: 10px; }

        .controls { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 15px; z-index: 1000; }
        .ctrl-btn { width: 60px; height: 60px; border-radius: 50%; border: 3px solid var(--accent-secondary); background: var(--card-bg); font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .color-picker { display: flex; gap: 12px; margin-top: 10px; }
        .color-opt { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .color-opt.active { outline: 3px solid var(--accent-primary); outline-offset: 2px; }
    </style>
</head>
<body id="bodyRoot">

<div class="header">
    <div class="title-group">
        <div class="title-main">中正診所</div>
        <div style="font-size: 12px; color: var(--accent-primary); font-weight: 700; letter-spacing: 2px;">PORTAL SYSTEM</div>
    </div>
    <div style="text-align: right;">
        <div id="clock" style="font-size: clamp(24px, 4vw, 40px); font-weight: 900; color: var(--accent-primary); font-variant-numeric: tabular-nums;">00:00:00</div>
        <div id="date" style="font-size: 14px; font-weight: 700; color: var(--text-sub);"></div>
    </div>
</div>

<div class="main" id="mainContainer">
    <div class="section-title">主要入口</div>
    <div id="primaryGrid" class="grid"></div>
    <div class="section-title">次要工具</div>
    <div id="secondaryGrid" class="grid"></div>
</div>

<div class="controls">
    <button class="ctrl-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <button class="ctrl-btn" onclick="toggleAdminMode()">⚙️</button>
</div>

<div class="admin-panel" id="adminPanel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="font-size: 24px; font-weight:900;">介面管理</h2>
        <button onclick="closeAdmin()" style="font-size:32px; border:none; background:none; cursor:pointer; color:#ef4444;">✕</button>
    </div>

    <div style="background: rgba(120, 120, 120, 0.1); padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px dashed var(--accent-primary);">
        <h3 style="margin-bottom:12px; font-size:16px;">🎨 主題配色</h3>
        <div class="color-picker" id="colorPicker">
            <div class="color-opt" style="background:#0284c7;" onclick="changeBrandColor('blue')" data-c="blue"></div>
            <div class="color-opt" style="background:#059669;" onclick="changeBrandColor('green')" data-c="green"></div>
            <div class="color-opt" style="background:#8b5cf6;" onclick="changeBrandColor('purple')" data-c="purple"></div>
            <div class="color-opt" style="background:#475569;" onclick="changeBrandColor('gray')" data-c="gray"></div>
        </div>
        <hr style="margin:20px 0; border:0; border-top:1px solid var(--border-color);">
        <label style="font-size:14px;">標題大小 <span id="ts-val">28px</span></label>
        <input type="range" id="titleSlider" min="16" max="50" value="28" style="width:100%" oninput="applyUIStyle()">
    </div>

    <button class="btn" style="background:var(--accent-primary); color:white;" onclick="saveLink()">新增書籤</button>
    <button class="btn" style="background:#8b5cf6; color:white; margin-top:30px;" onclick="location.reload()">🔄 同步雲端資料</button>
</div>

<script>
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/1uYBA_CncbEAydmzNC1SRnsKJdswNgQh3zg1x6TKo0UU/export?format=csv&gid=0`;
    let userLinks = JSON.parse(localStorage.getItem('cz_user_links_v4')) || { primary: [], secondary: [] };

    function changeBrandColor(color) {
        document.documentElement.setAttribute('data-color', color);
        document.querySelectorAll('.color-opt').forEach(opt => {
            opt.classList.toggle('active', opt.dataset.c === color);
        });
        localStorage.setItem('cz_brand_color', color);
    }

    async function fetchCloudData() {
        try {
            const res = await fetch(SHEET_URL + "&cb=" + Date.now());
            const text = await res.text();
            const lines = text.split(/\r?\n/).slice(1);
            const pg = document.getElementById("primaryGrid");
            const sg = document.getElementById("secondaryGrid");
            pg.innerHTML = ""; sg.innerHTML = "";

            lines.forEach(line => {
                const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
                if (cols.length >= 3) {
                    const [cat, title, url, desc, icon] = cols;
                    const isHigh = title.includes("重要");
                    const html = createCard({title, url, desc, icon, isHighlight: isHigh});
                    if (cat.toLowerCase().includes('primary')) pg.innerHTML += html;
                    else sg.innerHTML += html;
                }
            });
            // 處理自訂連結
            userLinks.primary.forEach(l => { l.isHighlight = l.title.includes("重要"); pg.innerHTML += createCard(l); });
            userLinks.secondary.forEach(l => { l.isHighlight = l.title.includes("重要"); sg.innerHTML += createCard(l); });
        } catch (e) { console.error("Cloud Error"); }
    }

    function createCard(l) {
        return `
            <div class="card ${l.isHighlight ? 'highlight-card' : ''}">
                <a class="card-link" href="${l.url}" target="_blank">
                    <span class="icon-box">${l.icon || '🔗'}</span>
                    <div class="card-title">${l.title}</div>
                    <div class="card-desc">${l.desc || ''}</div>
                </a>
            </div>`;
    }

    function applyUIStyle() {
        const ts = document.getElementById('titleSlider').value;
        document.getElementById('ts-val').innerText = ts + 'px';
        document.documentElement.style.setProperty('--dynamic-title-size', ts + 'px');
        localStorage.setItem('cz_ui_config', JSON.stringify({ts}));
    }

    function toggleAdminMode() { document.getElementById("adminPanel").classList.toggle("show"); }
    function closeAdmin() { document.getElementById("adminPanel").classList.remove("show"); }
    function toggleTheme() {
        const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', next);
        document.getElementById('themeBtn').innerText = next === 'light' ? '🌙' : '☀️';
        localStorage.setItem('cz_theme', next);
    }
    function updateClock() {
        const now = new Date();
        document.getElementById("clock").innerText = now.toLocaleTimeString("zh-TW", { hour12: false });
        const y = now.getFullYear();
        document.getElementById("date").innerText = `(民${y-1911}) ${y}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
    }

    window.onload = () => {
        const savedColor = localStorage.getItem('cz_brand_color') || 'blue';
        changeBrandColor(savedColor);
        const savedTheme = localStorage.getItem('cz_theme');
        if(savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
        setInterval(updateClock, 1000); updateClock();
        fetchCloudData();
    };
</script>
</body>
</html>
