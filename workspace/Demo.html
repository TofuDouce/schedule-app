<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中正診所 Portal - 純淨手動管理版</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Noto+Sans+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="light"] {
            --bg-sky: linear-gradient(135deg, #e0f2fe 0%, #ffffff 100%);
            --header-bg: rgba(255, 255, 255, 0.85);
            --card-bg: rgba(255, 255, 255, 0.75);
            --accent-primary: #0284c7; 
            --accent-secondary: #7dd3fc; 
            --text-main: #0c4a6e; 
            --text-sub: #334155;      
            --border-color: rgba(255, 255, 255, 0.6);
            --card-shadow: 0 12px 30px -5px rgba(14, 165, 233, 0.15);
        }
        :root[data-theme="dark"] {
            --bg-sky: #0f172a; --header-bg: rgba(15, 23, 42, 0.9); --card-bg: #1e293b;
            --accent-primary: #38bdf8; --accent-secondary: #0ea5e9; --text-main: #f1f5f9;
            --text-sub: #cbd5e1; --border-color: #334155; --card-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        :root { --dynamic-title-size: 28px; --dynamic-desc-size: 18px; --grid-cols: 4; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; background: var(--bg-sky); background-attachment: fixed; color: var(--text-main); font-family: "Inter", "Noto Sans TC", sans-serif; transition: 0.4s; }

        .header { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background-color: var(--header-bg); backdrop-filter: blur(15px); border-bottom: 4px solid var(--accent-secondary); }
        .title-main { font-size: clamp(32px, 5vw, 48px); font-weight: 900; background: linear-gradient(to right, #0369a1, #0ea5e9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .clock { font-size: clamp(32px, 5vw, 52px); font-weight: 900; color: var(--accent-primary); font-variant-numeric: tabular-nums; }

        .main { width: 100%; max-width: 1600px; margin: auto; padding: 160px 30px 100px; }
        .section-title { font-size: 32px; font-weight: 900; margin: 50px 0 25px; padding-left: 20px; border-left: 10px solid var(--accent-secondary); color: var(--accent-primary); }
        
        .grid { display: grid; grid-template-columns: repeat(var(--grid-cols), 1fr); gap: 25px; width: 100%; }
        @media (max-width: 1024px) { .grid { grid-template-columns: repeat(2, 1fr); } }

        .card { background: var(--card-bg); border-radius: 28px; border: 1px solid var(--border-color); box-shadow: var(--card-shadow); transition: 0.3s; position: relative; height: 100%; }
        .card:hover { transform: translateY(-8px); border-color: var(--accent-primary); background: rgba(255, 255, 255, 0.95); }
        
        /* 重要提醒效果 */
        .important-card { background: #fff9c4 !important; border: 3px solid #fbc02d !important; }
        .important-card .card-desc { color: #e53935 !important; font-weight: 900 !important; }

        .card-link { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; text-decoration: none; color: inherit; text-align: center; height: 100%; }
        .icon-box { font-size: 60px; margin-bottom: 20px; }
        .card-title { font-size: var(--dynamic-title-size); font-weight: 900; color: var(--accent-primary); margin-bottom: 12px; }
        .card-desc { font-size: var(--dynamic-desc-size); font-weight: 700; color: var(--text-sub); }

        .controls { position: fixed; bottom: 30px; right: 30px; display: flex; gap: 15px; z-index: 1000; }
        .ctrl-btn { width: 60px; height: 60px; border-radius: 50%; background: var(--card-bg); border: 2px solid var(--accent-secondary); font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }

        .admin-panel { position: fixed; top: 0; right: -100%; width: 100%; max-width: 420px; height: 100vh; background: var(--card-bg); backdrop-filter: blur(25px); border-left: 8px solid var(--accent-primary); padding: 30px; overflow-y: auto; transition: 0.4s; z-index: 2000; }
        .admin-panel.show { right: 0; }
        .admin-section { background: rgba(255,255,255,0.4); padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid var(--border-color); }
        h4 { margin-bottom: 10px; color: var(--accent-primary); font-weight: 900; }
        .input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 10px; font-size: 16px; }
        .btn-add { width: 100%; padding: 12px; background: var(--accent-primary); color: white; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; }

        .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>

<div id="loader" class="loading">⚙️ 正在加載診所 Portal...</div>

<div class="header">
    <div class="title-group">
        <div class="title-main">中正診所</div>
        <div style="font-size:14px; color:var(--accent-primary); font-weight:700;">PORTAL V9</div>
    </div>
    <div style="text-align:right;">
        <div class="clock" id="clock">00:00:00</div>
        <div id="date" style="font-weight:700; color:var(--text-sub);"></div>
    </div>
</div>

<div class="main">
    <div class="section-title">主要入口</div>
    <div id="primaryGrid" class="grid"></div>

    <div class="section-title">次要工具</div>
    <div id="secondaryGrid" class="grid"></div>
</div>

<div class="controls">
    <button class="ctrl-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <button class="ctrl-btn" onclick="toggleAdmin()">⚙️</button>
</div>

<div class="admin-panel" id="adminPanel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h3>⚙️ 管理模式</h3>
        <button onclick="toggleAdmin()" style="font-size:24px; border:none; background:none; cursor:pointer;">✕</button>
    </div>

    <div class="admin-section">
        <h4>➕ 新增書籤</h4>
        <input type="text" id="localTitle" class="input" placeholder="書籤標題 (包含「重要」會變黃色)">
        <input type="text" id="localUrl" class="input" placeholder="連結網址 https://...">
        <input type="text" id="localDesc" class="input" placeholder="內容說明">
        <input type="text" id="localIcon" class="input" placeholder="圖示 Emoji (🩺, 📝, 💉)">
        <button class="btn-add" onclick="addLocalLink()">新增到次要工具</button>
    </div>

    <div class="admin-section">
        <h4>📏 介面縮放</h4>
        <label>標題字體大小</label>
        <input type="range" id="titleSlider" min="16" max="50" value="28" style="width:100%" oninput="applyStyle()">
        <label>內文字體大小</label>
        <input type="range" id="descSlider" min="12" max="30" value="18" style="width:100%" oninput="applyStyle()">
    </div>

    <button class="btn-add" style="background:#64748b; margin-top:10px;" onclick="location.reload()">🔄 強制同步雲端資料</button>
</div>

<script>
    const SPREADSHEET_ID = '1uYBA_CncbEAydmzNC1SRnsKJdswNgQh3zg1x6TKo0UU';
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0`;

    let localLinks = JSON.parse(localStorage.getItem('cz_local_links')) || [];

    async function renderAll() {
        try {
            const res = await fetch(SHEET_URL + "&cb=" + Date.now());
            const data = await res.text();
            const lines = data.split(/\r?\n/);
            
            const pg = document.getElementById("primaryGrid");
            const sg = document.getElementById("secondaryGrid");
            pg.innerHTML = ""; sg.innerHTML = "";

            lines.forEach(line => {
                const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
                if (cols.length >= 3) {
                    const [cat, title, url, desc, icon] = cols;
                    const c = cat.toLowerCase();
                    if (c.includes('primary') || c.includes('secondary')) {
                        const html = createCardHtml(title, url, desc, icon);
                        if (c.includes('primary')) pg.innerHTML += html;
                        else sg.innerHTML += html;
                    }
                }
            });

            localLinks.forEach((link, index) => {
                const html = createCardHtml(link.title, link.url, link.desc, link.icon, true, index);
                sg.innerHTML += html;
            });

            document.getElementById('loader').style.display = 'none';
        } catch (e) { console.error(e); }
    }

    function createCardHtml(title, url, desc, icon, isLocal = false, index = null) {
        const isImportant = title.includes("重要");
        return `
            <div class="card ${isImportant ? 'important-card' : ''}">
                ${isLocal ? `<button onclick="deleteLocal(${index})" style="position:absolute; top:8px; right:8px; border:none; background:none; cursor:pointer; font-size:16px;">❌</button>` : ''}
                <a class="card-link" href="${url}" target="_blank">
                    <span class="icon-box">${icon || '🔗'}</span>
                    <div class="card-title">${title}</div>
                    <div class="card-desc">${desc || ''}</div>
                </a>
            </div>`;
    }

    function addLocalLink() {
        const title = document.getElementById('localTitle').value;
        const url = document.getElementById('localUrl').value;
        const desc = document.getElementById('localDesc').value;
        const icon = document.getElementById('localIcon').value;
        if (!title || !url) return;
        localLinks.push({ title, url, desc, icon });
        localStorage.setItem('cz_local_links', JSON.stringify(localLinks));
        renderAll();
        document.getElementById('localTitle').value = '';
        document.getElementById('localUrl').value = '';
        document.getElementById('localDesc').value = '';
        document.getElementById('localIcon').value = '';
    }

    function deleteLocal(index) {
        localLinks.splice(index, 1);
        localStorage.setItem('cz_local_links', JSON.stringify(localLinks));
        renderAll();
    }

    function applyStyle() {
        const ts = document.getElementById('titleSlider').value;
        const ds = document.getElementById('descSlider').value;
        document.documentElement.style.setProperty('--dynamic-title-size', ts + 'px');
        document.documentElement.style.setProperty('--dynamic-desc-size', ds + 'px');
    }

    function toggleTheme() {
        const root = document.documentElement;
        const next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        root.setAttribute('data-theme', next);
        document.getElementById('themeBtn').innerText = next === 'light' ? '🌙' : '☀️';
    }

    function toggleAdmin() { document.getElementById("adminPanel").classList.toggle("show"); }

    function updateClock() {
        const now = new Date();
        document.getElementById("clock").innerText = now.toLocaleTimeString("zh-TW", { hour12: false });
        const y = now.getFullYear();
        document.getElementById("date").innerText = `(民${y-1911}) ${y}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
    }

    window.onload = () => {
        updateClock(); setInterval(updateClock, 1000);
        renderAll();
    };
</script>
</body>
</html>
