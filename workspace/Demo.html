<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中正診所 Portal - 雲端同步版</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Noto+Sans+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="light"] {
            --bg-sky: linear-gradient(135deg, #e0f2fe 0%, #ffffff 100%);
            --header-bg: rgba(255, 255, 255, 0.85);
            --card-bg: rgba(255, 255, 255, 0.75);
            --accent-primary: #0284c7; 
            --accent-secondary: #7dd3fc; 
            --text-main: #0c4a6e; 
            --text-sub: #334155;      
            --border-color: rgba(255, 255, 255, 0.6);
            --card-shadow: 0 12px 30px -5px rgba(14, 165, 233, 0.15);
        }
        :root { --dynamic-title-size: 28px; --dynamic-desc-size: 18px; --grid-cols: 4; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; background: var(--bg-sky); background-attachment: fixed; color: var(--text-main); font-family: "Inter", "Noto Sans TC", sans-serif; }
        .header { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background-color: var(--header-bg); backdrop-filter: blur(15px); border-bottom: 4px solid var(--accent-secondary); }
        .title-main { font-size: clamp(32px, 5vw, 48px); font-weight: 900; background: linear-gradient(to right, #0369a1, #0ea5e9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .clock { font-size: clamp(32px, 5vw, 52px); font-weight: 900; color: var(--accent-primary); }
        .main { width: 100%; max-width: 1600px; margin: auto; padding: 180px 30px 100px; }
        .section-title { font-size: 32px; font-weight: 900; margin: 50px 0 25px; padding-left: 20px; border-left: 10px solid var(--accent-secondary); color: var(--accent-primary); }
        .grid { display: grid; grid-template-columns: repeat(var(--grid-cols, 4), 1fr); gap: 25px; }
        .card { background: var(--card-bg); border-radius: 28px; border: 1px solid var(--border-color); box-shadow: var(--card-shadow); transition: 0.3s; }
        .card:hover { transform: translateY(-10px); border-color: var(--accent-primary); background: white; }
        .highlight-card { background: rgba(255, 243, 205, 0.9) !important; border: 2px solid #ffc107 !important; }
        .card-link { display: block; padding: 40px 30px; text-decoration: none; color: inherit; text-align: center; }
        .icon-box { font-size: 60px; margin-bottom: 20px; display: block; }
        .card-title { font-size: var(--dynamic-title-size); font-weight: 900; color: var(--accent-primary); margin-bottom: 12px; }
        .card-desc { font-size: var(--dynamic-desc-size); font-weight: 700; color: var(--text-sub); line-height: 1.5; }
        #status-msg { position: fixed; bottom: 10px; left: 10px; font-size: 12px; color: #666; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 9999; font-weight: 900; }
    </style>
</head>
<body>

<div id="loader" class="loading-overlay">正在讀取雲端資料，請稍候...</div>
<div id="status-msg">初始化中...</div>

<div class="header">
    <div class="title-group">
        <div class="title-main">中正診所</div>
        <div style="font-size:16px; color:var(--accent-primary); font-weight:700; letter-spacing:3px;">PORTAL SYSTEM</div>
    </div>
    <div style="text-align:right;">
        <div class="clock" id="clock">00:00:00</div>
        <div id="date" style="font-weight:700; color:var(--text-sub);"></div>
    </div>
</div>

<div class="main">
    <div class="section-title">主要入口</div>
    <div id="primaryGrid" class="grid"></div>
    <div class="section-title">次要工具</div>
    <div id="secondaryGrid" class="grid"></div>
</div>

<script>
    // 你的試算表網址
    const SPREADSHEET_ID = '1uYBA_CncbEAydmzNC1SRnsKJdswNgQh3zg1x6TKo0UU';
    // 改用公開的 GID 0 (第一張工作表) 的 CSV 導出網址
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0`;

    async function fetchData() {
        const msg = document.getElementById('status-msg');
        try {
            msg.innerText = "正在連線到 Google Sheets...";
            const response = await fetch(SHEET_URL);
            if (!response.ok) throw new Error("網路回應不正確");
            
            const data = await response.text();
            msg.innerText = "資料下載成功，解析中...";
            
            const rows = data.split('\n').map(row => {
                // 處理 CSV 複雜的逗號引號邏輯
                return row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
            });

            const primaryContainer = document.getElementById("primaryGrid");
            const secondaryContainer = document.getElementById("secondaryGrid");
            primaryContainer.innerHTML = "";
            secondaryContainer.innerHTML = "";

            let count = 0;
            // 從第二列 (index 1) 開始抓資料
            for (let i = 1; i < rows.length; i++) {
                let cols = rows[i].map(c => c.replace(/^"|"$/g, '').trim());
                
                if (cols.length >= 3) {
                    const [cat, title, url, desc, icon] = cols;
                    if (!title || !url) continue;

                    const isHighlight = (title.includes("考核") || (desc && desc.includes("期限")));
                    const cardHtml = `
                        <div class="card ${isHighlight ? 'highlight-card' : ''}">
                            <a class="card-link" href="${url}" target="_blank">
                                <span class="icon-box">${icon || '🔗'}</span>
                                <div class="card-title">${title}</div>
                                <div class="card-desc">${desc || ''}</div>
                            </a>
                        </div>`;

                    if (cat.toLowerCase() === 'primary') {
                        primaryContainer.innerHTML += cardHtml;
                    } else {
                        secondaryContainer.innerHTML += cardHtml;
                    }
                    count++;
                }
            }

            msg.innerText = `同步完成！共載入 ${count} 個連結。`;
            document.getElementById('loader').style.display = 'none';
            if (count === 0) {
                msg.innerText = "警告：抓到 0 筆資料。請確認試算表 A 欄是否填寫 primary 或 secondary";
            }
        } catch (err) {
            msg.innerText = "錯誤: " + err.message;
            console.error(err);
        }
    }

    function updateClock() {
        const now = new Date();
        document.getElementById("clock").innerText = now.toLocaleTimeString("zh-TW", { hour12: false });
        const y = now.getFullYear();
        document.getElementById("date").innerText = `(民${y-1911}) ${y}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
    }

    window.onload = () => {
        updateClock();
        setInterval(updateClock, 1000);
        fetchData();
    };
</script>
</body>
</html>
