<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>中正診所 Portal</title>

<meta
name="robots"
content="noindex,nofollow,noarchive,nosnippet">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Cinzel:wght@500;600&display=swap"
rel="stylesheet">

<style>

/* =========================
RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{

    min-height:100%;

    overflow-x:hidden;

    font-family:
    "Inter",
    "Microsoft JhengHei",
    sans-serif;

    background:
    #060816;

    color:white;
}

/* =========================
背景
========================= */

body::before{

    content:"";

    position:fixed;

    inset:0;

    z-index:-3;

    background:

    radial-gradient(
    circle at top left,
    rgba(124,58,237,.18),
    transparent 35%
    ),

    radial-gradient(
    circle at bottom right,
    rgba(59,130,246,.14),
    transparent 30%
    ),

    linear-gradient(
    180deg,
    #050816,
    #0b1020
    );
}

/* =========================
星空
========================= */

.stars{

    position:fixed;

    inset:0;

    overflow:hidden;

    z-index:-2;
}

.star{

    position:absolute;

    width:2px;
    height:2px;

    border-radius:50%;

    background:white;

    opacity:.3;

    animation:
    twinkle 5s infinite;
}

@keyframes twinkle{

    0%{
        opacity:.1;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:.1;
    }
}

/* =========================
慕夏邊框
========================= */

.frame{

    position:fixed;

    inset:14px;

    border:
    1px solid
    rgba(196,181,253,.10);

    border-radius:34px;

    pointer-events:none;

    z-index:999;
}

.frame::before{

    content:"";

    position:absolute;

    inset:10px;

    border:
    1px solid
    rgba(196,181,253,.06);

    border-radius:26px;
}

.corner{

    position:absolute;

    width:90px;
    height:90px;

    border:
    1px solid
    rgba(196,181,253,.10);
}

.corner::before{

    content:"";

    position:absolute;

    inset:12px;

    border-radius:50%;

    border:
    1px solid
    rgba(196,181,253,.06);
}

.tl{
    top:-1px;
    left:-1px;

    border-right:none;
    border-bottom:none;

    border-radius:34px 0 0 0;
}

.tr{
    top:-1px;
    right:-1px;

    border-left:none;
    border-bottom:none;

    border-radius:0 34px 0 0;
}

.bl{
    bottom:-1px;
    left:-1px;

    border-right:none;
    border-top:none;

    border-radius:0 0 0 34px;
}

.br{
    bottom:-1px;
    right:-1px;

    border-left:none;
    border-top:none;

    border-radius:0 0 34px 0;
}

/* =========================
MAIN
========================= */

.main{

    width:100%;

    max-width:1680px;

    margin:auto;

    padding:
    42px 30px 80px;
}

/* =========================
HEADER
========================= */

.header{

    display:flex;

    justify-content:space-between;

    align-items:flex-start;

    gap:40px;

    margin-bottom:42px;
}

/* =========================
TITLE
========================= */

.title-main{

    font-size:
    clamp(52px,6vw,88px);

    font-weight:900;

    letter-spacing:-3px;

    line-height:1;

    color:
    rgba(255,255,255,.96);
}

.title-sub{

    margin-top:8px;

    font-family:
    "Cinzel",
    serif;

    font-size:
    clamp(22px,2.6vw,42px);

    letter-spacing:5px;

    color:
    rgba(216,180,254,.58);
}

.subtitle{

    margin-top:22px;

    font-size:
    clamp(18px,1.5vw,24px);

    line-height:1.8;

    color:
    rgba(226,232,240,.64);
}

/* =========================
CLOCK
========================= */

.clock-area{

    text-align:right;
}

.clock{

    font-size:
    clamp(38px,5vw,58px);

    font-weight:800;

    letter-spacing:-2px;

    line-height:1;

    color:
    rgba(255,255,255,.92);
}

.date{

    margin-top:10px;

    font-size:
    clamp(16px,1.5vw,20px);

    color:
    rgba(226,232,240,.48);

    white-space:nowrap;

    line-height:1.2;
}

/* =========================
SECTION
========================= */

.section{

    margin-bottom:48px;
}

.section-label{

    font-size:13px;

    letter-spacing:5px;

    color:
    rgba(196,181,253,.58);

    margin-bottom:20px;
}

/* =========================
GRID
========================= */

.grid{

    display:grid;

    grid-template-columns:
    repeat(4,1fr);

    gap:22px;
}

/* =========================
CARD
========================= */

.card{

    position:relative;

    min-height:230px;

    border-radius:28px;

    overflow:hidden;

    background:

    linear-gradient(
    180deg,
    rgba(18,24,40,.88),
    rgba(8,12,24,.96)
    );

    border:
    1px solid
    rgba(255,255,255,.05);

    transition:.3s;

    backdrop-filter:blur(18px);
}

.card:hover{

    transform:
    translateY(-5px);

    border-color:
    rgba(167,139,250,.26);

    box-shadow:

    0 18px 30px
    rgba(0,0,0,.35);
}

.card-link{

    display:block;

    height:100%;

    text-decoration:none;

    color:white;

    padding:26px;
}

.card-top{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:18px;
}

/* =========================
ICON
========================= */

.icon-box{

    width:68px;
    height:68px;

    border-radius:22px;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:32px;

    background:

    linear-gradient(
    135deg,
    rgba(139,92,246,.18),
    rgba(59,130,246,.10)
    );

    border:
    1px solid
    rgba(196,181,253,.14);
}

.card-tag{

    font-size:13px;

    letter-spacing:2px;

    color:
    rgba(216,180,254,.62);
}

/* =========================
CARD TEXT
========================= */

.card-title{

    font-size:
    clamp(26px,2vw,34px);

    font-weight:900;

    line-height:1.2;

    margin-bottom:12px;

    letter-spacing:-1px;
}

.card-desc{

    font-size:
    clamp(15px,1vw,18px);

    line-height:1.7;

    color:
    rgba(226,232,240,.68);
}

.card-url{

    margin-top:14px;

    font-size:12px;

    color:
    rgba(226,232,240,.25);

    word-break:break-all;
}

.open{

    position:absolute;

    left:26px;
    bottom:20px;

    font-size:12px;

    letter-spacing:4px;

    color:
    rgba(196,181,253,.7);
}

/* =========================
ADMIN BUTTON
========================= */

.admin-btn{

    position:fixed;

    right:24px;
    bottom:24px;

    width:68px;
    height:68px;

    border:none;

    border-radius:24px;

    cursor:pointer;

    font-size:28px;

    color:white;

    z-index:9999;

    background:

    linear-gradient(
    135deg,
    rgba(139,92,246,.28),
    rgba(91,33,182,.16)
    );

    border:
    1px solid
    rgba(196,181,253,.14);

    backdrop-filter:blur(18px);
}

/* =========================
ADMIN PANEL
========================= */

.admin-panel{

    position:fixed;

    top:0;
    right:-440px;

    width:420px;

    height:100vh;

    overflow-y:auto;

    padding:30px;

    background:
    rgba(8,12,24,.96);

    border-left:
    1px solid
    rgba(196,181,253,.10);

    backdrop-filter:blur(20px);

    transition:.35s;

    z-index:10000;
}

.admin-panel.show{

    right:0;
}

.admin-header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:28px;
}

.admin-title{

    font-size:30px;

    font-weight:800;
}

.close-btn{

    width:46px;
    height:46px;

    border:none;

    border-radius:16px;

    background:
    rgba(255,255,255,.06);

    color:white;

    cursor:pointer;

    font-size:18px;
}

.input{

    width:100%;

    height:56px;

    border:none;

    outline:none;

    border-radius:16px;

    padding:0 16px;

    margin-bottom:14px;

    background:
    rgba(255,255,255,.05);

    color:white;

    font-size:16px;
}

.save-btn{

    width:100%;

    height:56px;

    border:none;

    border-radius:16px;

    cursor:pointer;

    font-size:16px;

    font-weight:800;

    color:white;

    background:

    linear-gradient(
    90deg,
    #8b5cf6,
    #7c3aed
    );
}

/* =========================
TABLET
========================= */

@media(max-width:1200px){

    .grid{

        grid-template-columns:
        repeat(3,1fr);
    }
}

/* =========================
MOBILE
========================= */

@media(max-width:760px){

    .main{

        padding:
        34px 18px 70px;
    }

    .header{

        flex-direction:column;

        gap:26px;
    }

    .clock-area{

        text-align:left;
    }

    .grid{

        grid-template-columns:
        repeat(2,1fr);

        gap:16px;
    }

    .card{

        min-height:200px;
    }

    .card-link{

        padding:20px;
    }

    .icon-box{

        width:58px;
        height:58px;

        font-size:26px;
    }

    .card-title{

        font-size:24px;
    }

    .subtitle{

        font-size:18px;
    }

    .admin-panel{

        width:100%;

        right:-100%;
    }
}

</style>
</head>

<body>

<!-- 星空 -->

<div class="stars" id="stars"></div>

<!-- 邊框 -->

<div class="frame">

    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

</div>

<!-- MAIN -->

<div class="main">

    <!-- HEADER -->

    <div class="header">

        <div>

            <div class="title-main">
                中正診所
            </div>

            <div class="title-sub">
                Portal
            </div>

            <div class="subtitle">

                診所工作入口與常用工具

            </div>

        </div>

        <!-- 時間 -->

        <div class="clock-area">

            <div
            class="clock"
            id="clock">

                00:00:00

            </div>

            <div
            class="date"
            id="date">

            </div>

        </div>

    </div>

    <!-- PRIMARY -->

    <div class="section">

        <div class="section-label">
            PRIMARY SYSTEM
        </div>

        <div
        class="grid"
        id="primaryGrid">

        </div>

    </div>

    <!-- TOOLS -->

    <div class="section">

        <div class="section-label">
            TOOLS
        </div>

        <div
        class="grid"
        id="secondaryGrid">

        </div>

    </div>

</div>

<!-- admin -->

<button
class="admin-btn"
onclick="openAdmin()">

⚙️

</button>

<!-- ADMIN PANEL -->

<div
class="admin-panel"
id="adminPanel">

    <div class="admin-header">

        <div class="admin-title">
            管理模式
        </div>

        <button
        class="close-btn"
        onclick="closeAdmin()">

            ✕

        </button>

    </div>

    <input
    class="input"
    placeholder="網站名稱">

    <input
    class="input"
    placeholder="https://">

    <button class="save-btn">

        保存設定

    </button>

</div>

<script>

/* 星空 */

const stars =
document.getElementById("stars");

for(let i=0;i<140;i++){

    const star =
    document.createElement("div");

    star.className =
    "star";

    star.style.left =
    Math.random()*100 + "%";

    star.style.top =
    Math.random()*100 + "%";

    star.style.animationDelay =
    Math.random()*5 + "s";

    stars.appendChild(star);
}

/* 時間 */

function updateClock(){

    const now =
    new Date();

    document
    .getElementById("clock")
    .innerText =

    now.toLocaleTimeString(
    "zh-TW",
    {
        hour12:false
    });

    const y =
    now.getFullYear();

    const m =
    String(now.getMonth()+1)
    .padStart(2,'0');

    const d =
    String(now.getDate())
    .padStart(2,'0');

    document
    .getElementById("date")
    .innerText =

    `${y}/${m}/${d}`;
}

updateClock();

setInterval(
updateClock,
1000
);

/* ADMIN */

const PASSWORD =
"720750";

function openAdmin(){

    const pass =
    prompt("請輸入管理密碼");

    if(pass === PASSWORD){

        document
        .getElementById("adminPanel")
        .classList
        .add("show");
    }

    else if(pass){

        alert("密碼錯誤");
    }
}

function closeAdmin(){

    document
    .getElementById("adminPanel")
    .classList
    .remove("show");
}

/* LINKS */

const coreLinks = {

primary:[

{
title:"中正診所",
url:"https://webhis.vision.com.tw/88336/login",
desc:"門診系統登入",
icon:"🩺",
tag:"HIS"
},

{
title:"VPN",
url:"https://medvpn.nhi.gov.tw/",
desc:"健保資訊網服務系統",
icon:"💻",
tag:"VPN"
},

{
title:"智慧防疫",
url:"https://smis.cdc.gov.tw/",
desc:"防疫物資系統",
icon:"📦",
tag:"CDC"
},

{
title:"雲端查詢",
url:"https://medcloud2.nhi.gov.tw/",
desc:"健保醫療雲端查詢",
icon:"☁️",
tag:"CLOUD"
}

],

secondary:[

{
title:"NIIS",
url:"https://10.241.219.42/Login.aspx",
desc:"預防接種管理系統",
icon:"💉",
tag:"NIIS"
},

{
title:"亞東轉診",
url:"https://www.femh.org.tw/",
desc:"亞東醫院轉診服務",
icon:"🏥",
tag:"HOSPITAL"
},

{
title:"Paxlovid",
url:"https://depart.femh.org.tw/",
desc:"交互作用查詢工具",
icon:"💊",
tag:"TOOL"
},

{
title:"年份轉換",
url:"age-conv.html",
desc:"西元與民國轉換",
icon:"📅",
tag:"UTILITY"
}

]

};

/* render */

function render(){

    const fn =
    l =>

    `
    <div class="card">

        <a
        class="card-link"
        href="${l.url}"
        target="_blank">

            <div class="card-top">

                <div class="icon-box">
                    ${l.icon}
                </div>

                <div class="card-tag">
                    ${l.tag}
                </div>

            </div>

            <div class="card-title">
                ${l.title}
            </div>

            <div class="card-desc">
                ${l.desc}
            </div>

            <div class="card-url">
                ${l.url}
            </div>

            <div class="open">
                OPEN →
            </div>

        </a>

    </div>
    `;

    document
    .getElementById("primaryGrid")
    .innerHTML =

    coreLinks.primary
    .map(fn)
    .join("");

    document
    .getElementById("secondaryGrid")
    .innerHTML =

    coreLinks.secondary
    .map(fn)
    .join("");
}

render();

</script>

</body>
</html>
