<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中正診所 Portal - 雲端最終版</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Noto+Sans+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="light"] {
            --bg-sky: linear-gradient(135deg, #e0f2fe 0%, #ffffff 100%);
            --header-bg: rgba(255, 255, 255, 0.85);
            --card-bg: rgba(255, 255, 255, 0.75);
            --accent-primary: #0284c7; 
            --accent-secondary: #7dd3fc; 
            --text-main: #0c4a6e; 
            --text-sub: #334155;      
            --border-color: rgba(255, 255, 255, 0.6);
            --card-shadow: 0 12px 30px -5px rgba(14, 165, 233, 0.15);
        }
        :root[data-theme="dark"] {
            --bg-sky: #0f172a; --header-bg: rgba(15, 23, 42, 0.9); --card-bg: #1e293b;
            --accent-primary: #38bdf8; --accent-secondary: #0ea5e9; --text-main: #f1f5f9;
            --text-sub: #cbd5e1; --border-color: #334155; --card-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        :root { --dynamic-title-size: 28px; --dynamic-desc-size: 18px; --grid-cols: 4; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; background: var(--bg-sky); background-attachment: fixed; color: var(--text-main); font-family: "Inter", "Noto Sans TC", sans-serif; transition: 0.4s; }

        .header { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background-color: var(--header-bg); backdrop-filter: blur(15px); border-bottom: 4px solid var(--accent-secondary); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .title-main { font-size: clamp(32px, 5vw, 48px); font-weight: 900; background: linear-gradient(to right, #0369a1, #0ea5e9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .clock { font-size: clamp(32px, 5vw, 52px); font-weight: 900; color: var(--accent-primary); font-variant-numeric: tabular-nums; }

        .main { width: 100%; max-width: 1600px; margin: auto; padding: 180px 30px 100px; }
        .section-title { font-size: 32px; font-weight: 900; margin: 50px 0 25px; padding-left: 20px; border-left: 10px solid var(--accent-secondary); color: var(--accent-primary); }
        .grid { display: grid; grid-template-columns: repeat(var(--grid-cols), 1fr); gap: 25px; }
        @media (max-width: 800px) { .grid { grid-template-columns: repeat(2, 1fr); } }

        /* 卡片與強調樣式 */
        .card { background: var(--card-bg); border-radius: 28px; border: 1px solid var(--border-color); box-shadow: var(--card-shadow); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-10px); border-color: var(--accent-primary); background: rgba(255, 255, 255, 0.95); }
        
        .highlight-card { background: #fffbe6 !important; border: 2px solid #ffc107 !important; }
        .highlight-card .card-desc { color: #dc2626 !important; font-weight: 900; } /* 重要事項顯示紅字 */

        .card-link { display: block; padding: 40px 30px; text-decoration: none; color: inherit; text-align: center; }
        .icon-box { font-size: 60px; margin-bottom: 20px; display: block; }
        .card-title { font-size: var(--dynamic-title-size); font-weight: 900; color: var(--accent-primary); margin-bottom: 12px; }
        .card-desc { font-size: var(--dynamic-desc-size); font-weight: 700; color: var(--text-sub); }

        /* 控制與設定 */
        .controls { position: fixed; bottom: 30px; right: 30px; display: flex; gap: 20px; z-index: 1000; }
        .ctrl-btn { width: 70px; height: 70px; border-radius: 50%; background: var(--card-bg); border: 3px solid var(--accent-secondary); font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 20px rgba(0,0,0,0.15); backdrop-filter: blur(10px); }

        .admin-panel { position: fixed; top: 0; right: -100%; width: 95%; max-width: 450px; height: 100vh; background: var(--card-bg); backdrop-filter: blur(25px); border-left: 8px solid var(--accent-primary); padding: 40px; overflow-y: auto; transition: 0.4s; z-index: 2000; }
        .admin-panel.show { right: 0; }
        .input { width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 12px; font-size: 18px; margin-top: 10px; }
        .egfr-box { background: rgba(2, 132, 199, 0.1); padding: 20px; border-radius: 20px; border: 2px dashed var(--accent-primary); margin-bottom: 30px; }

        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 9999; font-weight: 900; }
    </style>
</head>
<body>

<div id="loader" class="loading-overlay">同步診所雲端資料...</div>

<div class="header">
    <div class="title-group">
        <div class="title-main">中正診所</div>
        <div style="font-size:16px; color:var(--accent-primary); font-weight:700; letter-spacing:3px;">PORTAL SYSTEM (V6)</div>
    </div>
    <div style="text-align:right;">
        <div class="clock" id="clock">00:00:00</div>
        <div id="date" style="font-size:18px; font-weight:700; color:var(--text-sub);"></div>
    </div>
</div>

<div class="main">
    <div class="section-title">主要入口</div>
    <div id="primaryGrid" class="grid"></div>

    <div class="section-title">次要工具</div>
    <div id="secondaryGrid" class="grid"></div>
</div>

<div class="controls">
    <button class="ctrl-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <button class="ctrl-btn" onclick="toggleAdmin()">⚙️</button>
</div>

<div class="admin-panel" id="adminPanel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h2 style="color:var(--accent-primary)">介面與計算工具</h2>
        <button onclick="toggleAdmin()" style="font-size:30px; border:none; background:none; cursor:pointer;">✕</button>
    </div>

    <div class="egfr-box">
        <label style="font-weight:900;">⚡ eGFR 快速計算</label>
        <input type="number" id="creInput" class="input" placeholder="Creatinine (Cr)" oninput="calcEgfr()">
        <input type="number" id="ageInput" class="input" placeholder="年齡" oninput="calcEgfr()">
        <div id="egfrResult" style="margin-top:15px; font-weight:900; color:#0369a1; font-size:20px;">結果：--</div>
    </div>

    <div style="margin-bottom:20px;">
        <label style="font-weight:900;">標題大小</label>
        <input type="range" id="titleSlider" min="16" max="60" value="28" style="width:100%" oninput="applyStyle()">
        <label style="font-weight:900;">內文大小</label>
        <input type="range" id="descSlider" min="12" max="40" value="18" style="width:100%" oninput="applyStyle()">
    </div>
    <button class="input" style="background:var(--accent-primary); color:white; font-weight:bold; cursor:pointer;" onclick="location.reload()">手動同步雲端資料</button>
</div>

<script>
    const SPREADSHEET_ID = '1uYBA_CncbEAydmzNC1SRnsKJdswNgQh3zg1x6TKo0UU';
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0`;

    let uiSettings = JSON.parse(localStorage.getItem('cz_ui_v6')) || { titleSize: 28, descSize: 18, cols: 4 };

    async function fetchData() {
        try {
            const res = await fetch(SHEET_URL + "&cb=" + Date.now());
            const text = await res.text();
            const lines = text.split(/\r?\n/);
            
            const pg = document.getElementById("primaryGrid");
            const sg = document.getElementById("secondaryGrid");
            pg.innerHTML = ""; sg.innerHTML = "";

            lines.forEach((line) => {
                const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
                if (cols.length >= 3) {
                    const [cat, title, url, desc, icon] = cols;
                    const category = cat.toLowerCase();
                    
                    if (category.includes('primary') || category.includes('secondary')) {
                        // 重點：判斷是否包含「重要」二字
                        const isHighlight = title.includes("重要");
                        
                        const html = `
                            <div class="card ${isHighlight ? 'highlight-card' : ''}">
                                <a class="card-link" href="${url}" target="_blank">
                                    <span class="icon-box">${icon || '🔗'}</span>
                                    <div class="card-title">${title}</div>
                                    <div class="card-desc">${desc || ''}</div>
                                </a>
                            </div>`;
                        
                        if (category.includes('primary')) pg.innerHTML += html;
                        else sg.innerHTML += html;
                    }
                }
            });
            document.getElementById('loader').style.display = 'none';
        } catch (e) { console.error(e); }
    }

    function calcEgfr() {
        const cr = document.getElementById('creInput').value;
        const age = document.getElementById('ageInput').value;
        if (cr && age) {
            const m = (186 * Math.pow(cr, -1.154) * Math.pow(age, -0.203)).toFixed(1);
            const f = (m * 0.742).toFixed(1);
            document.getElementById('egfrResult').innerHTML = `結果：♂ ${m} / ♀ ${f}`;
        }
    }

    function applyStyle() {
        const ts = document.getElementById('titleSlider').value;
        const ds = document.getElementById('descSlider').value;
        document.documentElement.style.setProperty('--dynamic-title-size', ts + 'px');
        document.documentElement.style.setProperty('--dynamic-desc-size', ds + 'px');
        localStorage.setItem('cz_ui_v6', JSON.stringify({ titleSize: ts, descSize: ds }));
    }

    function toggleTheme() {
        const root = document.documentElement;
        const next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        root.setAttribute('data-theme', next);
        localStorage.setItem('cz_theme', next);
        document.getElementById('themeBtn').innerText = next === 'light' ? '🌙' : '☀️';
    }

    function toggleAdmin() { document.getElementById("adminPanel").classList.toggle("show"); }

    function updateClock() {
        const now = new Date();
        document.getElementById("clock").innerText = now.toLocaleTimeString("zh-TW", { hour12: false });
        const y = now.getFullYear();
        document.getElementById("date").innerText = `(民${y-1911}) ${y}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
    }

    window.onload = () => {
        document.getElementById('titleSlider').value = uiSettings.titleSize;
        document.getElementById('descSlider').value = uiSettings.descSize;
        applyStyle();
        const savedTheme = localStorage.getItem('cz_theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('themeBtn').innerText = savedTheme === 'light' ? '🌙' : '☀️';
        updateClock(); setInterval(updateClock, 1000);
        fetchData();
    };
</script>
</body>
</html>
