<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中正診所 Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Noto+Sans+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="light"] {
            --bg-sky: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            --header-bg: rgba(255, 255, 255, 0.95);
            --card-bg: #ffffff;
            --accent-primary: #0369a1; 
            --accent-secondary: #e2e8f0; 
            --text-main: #0f172a; 
            --text-sub: #334155;      
            --border-color: #e2e8f0;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            /* 柔和粉彩色系 */
            --p-1: #ffcfcf; --p-2: #ffe4bc; --p-3: #cffafe; --p-4: #dcfce7; --p-5: #f3e8ff; --p-6: #fce7f3;
        }
        
        :root[data-theme="dark"] {
            --bg-sky: #0f172a;
            --header-bg: rgba(15, 23, 42, 0.9);
            --card-bg: #1e293b;
            --accent-primary: #38bdf8;
            --accent-secondary: #334155;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --border-color: #334155;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        :root {
            --dynamic-title-size: 28px;
            --dynamic-desc-size: 18px;
            --grid-cols: 5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            min-height: 100vh; 
            background: var(--bg-sky);
            background-attachment: fixed;
            color: var(--text-main); 
            font-family: "Inter", "Noto Sans TC", sans-serif; 
            transition: all 0.3s ease; 
        }

        .header { 
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 5%; 
            background-color: var(--header-bg);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--border-color);
        }

        .title-main { 
            font-size: clamp(24px, 5vw, 48px);
            font-weight: 900;
            color: var(--accent-primary);
        }
        
        .main { width: 100%; max-width: 1600px; margin: auto; padding: 140px 20px 100px; }

        .section-title { 
            font-size: 28px; font-weight: 900; margin: 40px 0 20px; padding-left: 15px; 
            border-left: 8px solid var(--accent-primary); 
            color: var(--text-main);
        }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(var(--grid-cols, 5), 1fr); 
            gap: 20px; 
        }

        /* 🌟 卡片設計：柔和配色與高對比文字 */
        .card { 
            position: relative; 
            background: var(--card-bg); 
            border-radius: 24px; 
            border: 2px solid var(--border-color); 
            box-shadow: var(--card-shadow);
            transition: all 0.25s ease;
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* 柔和配色輪播 */
        .card:nth-child(6n+1) { background-color: var(--p-1); }
        .card:nth-child(6n+2) { background-color: var(--p-2); }
        .card:nth-child(6n+3) { background-color: var(--p-3); }
        .card:nth-child(6n+4) { background-color: var(--p-4); }
        .card:nth-child(6n+5) { background-color: var(--p-5); }
        .card:nth-child(6n+6) { background-color: var(--p-6); }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px -5px rgba(0,0,0,0.15);
            filter: brightness(1.05); /* 稍微變亮但不改色 */
        }

        .card-link { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 35px 20px; text-decoration: none; color: inherit; text-align: center; height: 100%;
        }

        .icon-box { 
            font-size: 55px; margin-bottom: 15px; 
            background: rgba(255,255,255,0.5);
            width: 90px; height: 90px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
        }

        /* 修正文字：滑動時依然保持深色高對比 */
        .card-title { 
            font-size: var(--dynamic-title-size); 
            font-weight: 900; 
            color: #0f172a !important; /* 確保在淡色背景下永遠是深色 */
            margin-bottom: 8px;
            text-shadow: 0 1px 0 rgba(255,255,255,0.5);
        }

        .card-desc { 
            font-size: var(--dynamic-desc-size); 
            font-weight: 700; 
            color: #334155 !important;
        }

        /* 重要卡片 - 強調但不刺眼 */
        .card.highlight-card {
            border: 4px solid #ef4444 !important;
            background-color: #fee2e2 !important;
        }

        /* 管理面板：柔和莫蘭迪色 */
        .admin-panel { 
            position: fixed; top: 0; right: -100%; width: 450px; height: 100vh; 
            background: #fdfdfd; backdrop-filter: blur(20px); 
            border-left: 6px solid #64748b; padding: 35px; 
            overflow-y: auto; transition: 0.4s ease; z-index: 2000;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
        }
        .admin-panel.show { right: 0; }
        .input { width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 12px; margin-bottom: 15px; }

        .btn { 
            width: 100%; padding: 15px; font-size: 18px; font-weight: 900; border: none; border-radius: 12px; 
            cursor: pointer; margin-top: 10px; transition: 0.2s;
        }

        .controls { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 15px; z-index: 1000; }
        .ctrl-btn { 
            width: 60px; height: 60px; border-radius: 50%; border: none;
            background: #334155; color: white; font-size: 24px; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
        }

        .manage-item { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #f1f5f9; padding: 12px 15px; border-radius: 12px; margin-bottom: 10px;
            border: 1px solid #e2e8f0;
        }

        @media (max-width: 768px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .admin-panel { width: 100%; }
        }
    </style>
</head>
<body id="bodyRoot">

<div class="header">
    <div>
        <div class="title-main">中正診所</div>
        <div style="font-size: 12px; color: var(--accent-primary); font-weight: 900; letter-spacing: 2px;">PORTAL SYSTEM</div>
    </div>
    <div style="text-align: right;">
        <div id="clock" style="font-size: clamp(24px, 4vw, 40px); font-weight: 900; color: var(--accent-primary);">00:00:00</div>
        <div id="date" style="font-size: 14px; font-weight: 700; color: var(--text-sub);"></div>
    </div>
</div>

<div class="main" id="mainContainer">
    <div class="section-title">🏥 主要入口</div>
    <div id="primaryGrid" class="grid"></div>
    <div class="section-title">🛠️ 常用工具</div>
    <div id="secondaryGrid" class="grid"></div>
</div>

<div class="controls">
    <button class="ctrl-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <button class="ctrl-btn" onclick="toggleAdminMode()" style="background: #64748b;">⚙️</button>
</div>

<div class="admin-panel" id="adminPanel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="font-size: 26px; font-weight:900;">系統管理</h2>
        <button onclick="closeAdmin()" style="font-size:32px; border:none; background:none; cursor:pointer; color:#ef4444;">✕</button>
    </div>

    <div style="background: #f1f5f9; padding: 20px; border-radius: 15px; margin-bottom: 20px;">
        <h3 style="margin-bottom:10px; font-size:16px;">🎨 顯示設定</h3>
        <label>標題大小: <span id="ts-val">28px</span></label>
        <input type="range" id="titleSlider" min="20" max="60" value="28" style="width:100%" oninput="applyUIStyle()">
        <label>內容大小: <span id="ds-val">18px</span></label>
        <input type="range" id="descSlider" min="14" max="30" value="18" style="width:100%" oninput="applyUIStyle()">
        <label>每列卡片數</label>
        <select id="gridColSelect" class="input" onchange="applyUIStyle()">
            <option value="6">6 張</option>
            <option value="5" selected>5 張</option>
            <option value="4">4 張</option>
            <option value="3">3 張</option>
        </select>
    </div>

    <h3 style="margin-bottom:10px;">🆕 新增自訂連結</h3>
    <select id="linkCategory" class="input">
        <option value="primary">主要入口</option>
        <option value="secondary" selected>常用工具</option>
    </select>
    <div id="emojiPicker" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px;"></div>
    <input id="linkTitle" class="input" placeholder="名稱 (含「重要」會變紅框)">
    <input id="linkUrl" class="input" placeholder="網址 (https://...)">
    <input id="linkDesc" class="input" placeholder="說明">
    <button class="btn" style="background:#64748b; color:white;" onclick="saveLink()">儲存並發佈</button>
    
    <div class="manage-list" style="margin-top:30px;">
        <h3 style="margin-bottom:15px; color:#ef4444;">📋 管理自訂連結</h3>
        <div id="customLinksList"></div>
    </div>

    <button class="btn" style="background:#0369a1; color:white; margin-top:30px;" onclick="location.reload()">🔄 同步雲端資料</button>
</div>

<script>
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/1uYBA_CncbEAydmzNC1SRnsKJdswNgQh3zg1x6TKo0UU/export?format=csv&gid=0`;
    const emojis = ["🩺", "💉", "🏥", "💊", "🧪", "📋", "💻", "🔍", "📅", "👤", "📝", "⭐", "🧬", "🩸", "🦴", "🦷"];
    let selectedIcon = "🔗";
    let userLinks = JSON.parse(localStorage.getItem('cz_user_links_v4')) || { primary: [], secondary: [] };

    async function fetchCloudData() {
        try {
            const res = await fetch(SHEET_URL + "&cb=" + Date.now());
            const text = await res.text();
            const lines = text.split(/\r?\n/).slice(1);
            const pg = document.getElementById("primaryGrid");
            const sg = document.getElementById("secondaryGrid");
            pg.innerHTML = ""; sg.innerHTML = "";

            lines.forEach(line => {
                const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
                if (cols.length >= 3) {
                    const [cat, title, url, desc, icon] = cols;
                    const html = createCard({title, url, desc, icon, isHighlight: title.includes("重要")});
                    if (cat.toLowerCase().includes('primary')) pg.innerHTML += html;
                    else sg.innerHTML += html;
                }
            });

            // 顯示自訂書籤
            userLinks.primary.forEach(l => pg.innerHTML += createCard(l));
            userLinks.secondary.forEach(l => sg.innerHTML += createCard(l));
            updateManageList();
        } catch (e) { console.error("Cloud Error"); }
    }

    function createCard(l) {
        return `
            <div class="card ${l.isHighlight ? 'highlight-card' : ''}">
                <a class="card-link" href="${l.url}" target="_blank">
                    <div class="icon-box">${l.icon || '🔗'}</div>
                    <div class="card-title">${l.title}</div>
                    <div class="card-desc">${l.desc || ''}</div>
                </a>
            </div>`;
    }

    function applyUIStyle() {
        const ts = document.getElementById('titleSlider').value;
        const ds = document.getElementById('descSlider').value;
        const col = document.getElementById('gridColSelect').value;
        document.getElementById('ts-val').innerText = ts + 'px';
        document.getElementById('ds-val').innerText = ds + 'px';
        document.documentElement.style.setProperty('--dynamic-title-size', ts + 'px');
        document.documentElement.style.setProperty('--dynamic-desc-size', ds + 'px');
        document.documentElement.style.setProperty('--grid-cols', col);
        localStorage.setItem('cz_ui_config', JSON.stringify({ts, ds, col}));
    }

    function saveLink() {
        const title = document.getElementById('linkTitle').value;
        const url = document.getElementById('linkUrl').value;
        const desc = document.getElementById('linkDesc').value;
        const cat = document.getElementById('linkCategory').value;
        if(!title || !url) return alert("請輸入名稱與網址");
        userLinks[cat].push({id: Date.now(), title, url, desc, icon: selectedIcon});
        localStorage.setItem('cz_user_links_v4', JSON.stringify(userLinks));
        location.reload();
    }

    function updateManageList() {
        const listDiv = document.getElementById("customLinksList");
        listDiv.innerHTML = "";
        const all = [...userLinks.primary, ...userLinks.secondary];
        all.forEach(l => {
            const item = document.createElement("div");
            item.className = "manage-item";
            item.innerHTML = `<span>${l.icon} ${l.title}</span><button onclick="deleteLink(${l.id})" style="background:#ef4444; color:white; border:none; padding:5px 10px; border-radius:8px; cursor:pointer;">刪除</button>`;
            listDiv.appendChild(item);
        });
    }

    function deleteLink(id) {
        if(!confirm("確定刪除？")) return;
        userLinks.primary = userLinks.primary.filter(x => x.id != id);
        userLinks.secondary = userLinks.secondary.filter(x => x.id != id);
        localStorage.setItem('cz_user_links_v4', JSON.stringify(userLinks));
        location.reload();
    }

    emojis.forEach(e => {
        const div = document.createElement('div');
        div.style = "font-size:24px; cursor:pointer; text-align:center; padding:8px; border:1px solid #ddd; border-radius:10px; background:white;";
        div.innerText = e;
        div.onclick = () => { 
            document.querySelectorAll('#emojiPicker div').forEach(d => d.style.borderColor = "#ddd");
            selectedIcon = e; 
            div.style.borderColor = "#64748b"; 
        };
        document.getElementById('emojiPicker').appendChild(div);
    });

    function toggleAdminMode() { document.getElementById("adminPanel").classList.toggle("show"); }
    function closeAdmin() { document.getElementById("adminPanel").classList.remove("show"); }
    function toggleTheme() {
        const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', next);
        document.getElementById('themeBtn').innerText = next === 'light' ? '🌙' : '☀️';
    }

    function updateClock() {
        const now = new Date();
        document.getElementById("clock").innerText = now.toLocaleTimeString("zh-TW", { hour12: false });
        const y = now.getFullYear();
        document.getElementById("date").innerText = `(民${y-1911}年) ${y}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
    }

    window.onload = () => {
        const cfg = JSON.parse(localStorage.getItem('cz_ui_config'));
        if(cfg) {
            document.getElementById('titleSlider').value = cfg.ts;
            document.getElementById('descSlider').value = cfg.ds;
            document.getElementById('gridColSelect').value = cfg.col;
            applyUIStyle();
        }
        setInterval(updateClock, 1000); updateClock();
        fetchCloudData();
    };
</script>
</body>
</html>
