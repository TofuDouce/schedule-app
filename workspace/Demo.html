<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中正診所 Portal</title>
    <style>
        /* 1. 主題配色變數定義 */
        :root {
            --primary-color: #007bff;
            --primary-gradient: linear-gradient(135deg, #007bff, #0056b3);
            --accent-glow: rgba(0, 123, 255, 0.3);
            --bg-glass: rgba(255, 255, 255, 0.8);
            --grid-cols: 4; /* 預設 4 欄 */
        }

        [data-theme="green"] {
            --primary-color: #28a745;
            --primary-gradient: linear-gradient(135deg, #28a745, #1e7e34);
            --accent-glow: rgba(40, 167, 69, 0.3);
        }

        [data-theme="red"] {
            --primary-color: #dc3545;
            --primary-gradient: linear-gradient(135deg, #dc3545, #a71d2a);
            --accent-glow: rgba(220, 53, 69, 0.3);
        }

        [data-theme="dark"] {
            --primary-color: #343a40;
            --primary-gradient: linear-gradient(135deg, #495057, #212529);
            --accent-glow: rgba(0, 0, 0, 0.5);
        }

        /* 核心版型樣式 (保留您的 grid-cols 邏輯) */
        #linkContainer {
            display: grid;
            grid-template-columns: repeat(var(--grid-cols), 1fr);
            gap: 20px;
            padding: 20px;
        }

        /* 管理面板樣式 */
        .admin-panel {
            position: fixed;
            right: -350px;
            top: 0;
            width: 300px;
            height: 100%;
            background: white;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
            transition: right 0.3s;
            padding: 20px;
            z-index: 1000;
            overflow-y: auto;
        }
        .admin-panel.active { right: 0; }

        /* 主題顏色按鈕 */
        .theme-options { display: flex; gap: 10px; margin: 10px 0; }
        .theme-btn { width: 25px; height: 25px; border-radius: 50%; border: 2px solid #ddd; cursor: pointer; }
        .blue { background: #007bff; } .green { background: #28a745; }
        .red { background: #dc3545; } .dark { background: #343a40; }

        .header { background: var(--primary-gradient); color: white; padding: 20px; text-align: center; }
        .card { background: var(--bg-glass); border-left: 5px solid var(--primary-color); padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="header">
    <h1>中正診所 Portal</h1>
    <div id="clock">載入中...</div>
</div>

<div id="adminPanel" class="admin-panel">
    <h2>⚙️ 系統設定</h2>

    <div class="admin-section">
        <label>每列卡片數量: <span id="colValue">4</span> 欄</label>
        <input type="range" id="colSlider" min="2" max="6" value="4" oninput="updateGridCols(this.value)">
    </div>

    <hr>

    <div class="admin-section">
        <label>文字大小: <span id="fontValue">16</span> px</label>
        <input type="range" id="fontSizeSlider" min="14" max="24" value="16" oninput="updateFontSize(this.value)">
    </div>

    <hr>

    <div class="admin-section">
        <label>主題配色</label>
        <div class="theme-options">
            <button onclick="setTheme('default')" class="theme-btn blue" title="經典藍"></button>
            <button onclick="setTheme('green')" class="theme-btn green" title="森林綠"></button>
            <button onclick="setTheme('red')" class="theme-btn red" title="熱情紅"></button>
            <button onclick="setTheme('dark')" class="theme-btn dark" title="深邃黑"></button>
        </div>
    </div>

    <hr>

    <div class="admin-section">
        <h3>新增書籤</h3>
        <input type="text" id="newTitle" placeholder="標題">
        <input type="text" id="newUrl" placeholder="網址">
        <button onclick="addLink()">儲存連結</button>
    </div>
</div>

<button onclick="toggleAdmin()" style="position:fixed; bottom:20px; right:20px; z-index:1001; padding:10px; border-radius:50%; border:none; background:var(--primary-color); color:white; cursor:pointer;">⚙️</button>

<main id="linkContainer">
    </main>

<script>
    // --- 調整功能邏輯 ---

    // 調整卡片數量 (補回)
    function updateGridCols(value) {
        document.documentElement.style.setProperty('--grid-cols', value);
        document.getElementById('colValue').innerText = value;
        localStorage.setItem('gridCols', value);
    }

    // 調整文字大小
    function updateFontSize(size) {
        document.body.style.fontSize = size + 'px';
        document.getElementById('fontValue').innerText = size;
        localStorage.setItem('fontSize', size);
    }

    // 設定顏色主題
    function setTheme(themeName) {
        if(themeName === 'default') {
            document.documentElement.removeAttribute('data-theme');
        } else {
            document.documentElement.setAttribute('data-theme', themeName);
        }
        localStorage.setItem('portalTheme', themeName);
    }

    function toggleAdmin() {
        document.getElementById('adminPanel').classList.toggle('active');
    }

    // --- 初始化與記憶載入 ---
    window.onload = function() {
        // 載入主題
        const savedTheme = localStorage.getItem('portalTheme');
        if (savedTheme) setTheme(savedTheme);

        // 載入卡片數量
        const savedCols = localStorage.getItem('gridCols') || 4;
        document.getElementById('colSlider').value = savedCols;
        updateGridCols(savedCols);

        // 載入字體大小
        const savedFontSize = localStorage.getItem('fontSize') || 16;
        document.getElementById('fontSizeSlider').value = savedFontSize;
        updateFontSize(savedFontSize);

        startClock();
        renderLinks(); // 執行您原本的渲染函式
    };

    function startClock() {
        setInterval(() => {
            const now = new Date();
            const rocYear = now.getFullYear() - 1911;
            document.getElementById('clock').innerText = `民國 ${rocYear} 年 ${now.toLocaleTimeString()}`;
        }, 1000);
    }

    // (此處保留您原本的 renderLinks, addLink 等邏輯)
</script>
</body>
</html>
