<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中正診所 Portal - 視覺恢復版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #f0f7ff;
            --accent-purple: #8b5cf6;
            --accent-blue: #0ea5e9;
            --text-dark: #000000; /* 強調：說明文字改為純黑，確保清晰 */
            --title-blue: #0369a1; /* 卡片標題深藍色 */
            --card-bg: rgba(255, 255, 255, 0.9);
            --dynamic-title-size: 28px;
            --dynamic-desc-size: 18px;
            --grid-cols: 4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-main); font-family: 'Noto Sans TC', sans-serif; transition: 0.3s; }

        /* 標題漸層恢復 */
        .header { position: fixed; top: 0; width: 100%; z-index: 100; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--accent-blue); }
        .title-main { 
            font-weight: 900; 
            font-size: clamp(32px, 5vw, 42px);
            background: linear-gradient(135deg, #0369a1 0%, #0ea5e9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }
        
        .container { max-width: 1500px; margin: 150px auto 100px; padding: 0 30px; }
        .section-title { font-size: 32px; font-weight: 900; color: #1e40af; border-left: 12px solid #1e40af; padding-left: 20px; margin: 50px 0 25px; }
        
        .grid { display: grid; grid-template-columns: repeat(var(--grid-cols), 1fr); gap: 25px; }

        /* 卡片與文字顏色修正 */
        .card { background: var(--card-bg); border-radius: 30px; border: 2px solid #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.08); transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-8px); border-color: var(--accent-blue); box-shadow: 0 15px 35px rgba(14, 165, 233, 0.2); }
        
        /* 重要提醒：維持醫師最能辨識的黃底紅字 */
        .important-card { background: #fff9c4 !important; border: 3px solid #fbc02d !important; }
        .important-card .card-desc { color: #e11d48 !important; font-weight: 900 !important; }

        .card-link { display: flex; flex-direction: column; align-items: center; padding: 45px 25px; text-decoration: none; color: inherit; text-align: center; }
        .icon-box { font-size: 55px; margin-bottom: 18px; }
        .card-title { font-size: var(--dynamic-title-size); font-weight: 900; color: var(--title-blue); margin-bottom: 10px; }
        
        /* 說明文字：拒絕灰色，改用極深色 */
        .card-desc { font-size: var(--dynamic-desc-size); font-weight: 700; color: var(--text-dark); line-height: 1.4; }

        /* 管理面板樣式恢復 */
        .admin-panel { position: fixed; top: 0; right: -100%; width: 100%; max-width: 450px; height: 100vh; background: #fff; z-index: 1000; transition: 0.4s; padding: 35px; overflow-y: auto; border-left: 8px solid var(--accent-purple); box-shadow: -15px 0 35px rgba(0,0,0,0.15); }
        .admin-panel.show { right: 0; }
        .admin-box { background: #f1f5f9; border-radius: 20px; padding: 25px; margin-bottom: 25px; border: 1px solid #cbd5e1; }
        
        .box-label { font-weight: 900; color: var(--accent-purple); margin-bottom: 15px; font-size: 18px; display: flex; align-items: center; gap: 8px; }
        input[type=range] { width: 100%; accent-color: var(--accent-purple); height: 10px; margin: 10px 0; }
        select, .input-field { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #cbd5e1; background: #fff; font-size: 16px; margin: 8px 0; font-weight: 700; }

        /* 圖示選單恢復 */
        .icon-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 15px 0; }
        .icon-opt { padding: 15px; border: 2px solid #e2e8f0; border-radius: 15px; text-align: center; cursor: pointer; font-size: 26px; background: #fff; transition: 0.2s; }
        .icon-opt:hover, .icon-opt.active { background: #ede9fe; border-color: var(--accent-purple); transform: scale(1.1); box-shadow: 0 5px 15px rgba(139, 92, 246, 0.2); }

        .btn-action { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: 900; font-size: 18px; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .btn-save { background: var(--accent-purple); color: #fff; }
        .btn-sync { background: var(--accent-blue); color: #fff; }

        .float-btn { position: fixed; bottom: 40px; right: 40px; width: 65px; height: 65px; border-radius: 50%; border: none; background: #fff; box-shadow: 0 8px 20px rgba(0,0,0,0.15); font-size: 28px; cursor: pointer; z-index: 500; display: flex; align-items: center; justify-content: center; border: 3px solid var(--accent-blue); }
    </style>
</head>
<body>

<div class="header">
    <div class="title-main">中正診所 PORTAL SYSTEM</div>
    <div style="text-align:right;">
        <div id="clock" style="font-size: 34px; color: #1e40af; font-weight:900;">00:00:00</div>
        <div id="date" style="font-size: 18px; color: #475569; font-weight:700;"></div>
    </div>
</div>

<div class="container">
    <div class="section-title">主要入口</div>
    <div id="primaryGrid" class="grid"></div>
    <div class="section-title">次要工具</div>
    <div id="secondaryGrid" class="grid"></div>
</div>

<button class="float-btn" onclick="toggleAdmin()">⚙️</button>

<div class="admin-panel" id="adminPanel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h2 style="font-weight:900; font-size:28px;">介面管理</h2>
        <span onclick="toggleAdmin()" style="cursor:pointer; font-size:30px;">✕</span>
    </div>

    <div class="admin-box">
        <div class="box-label">🎨 顯示與字體</div>
        <div style="margin-bottom:15px;">
            <label style="display:flex; justify-content:space-between; font-weight:900;">標題字體 <span id="ts-val">28px</span></label>
            <input type="range" id="titleSlider" min="20" max="60" value="28" oninput="updateUI()">
        </div>
        <div style="margin-bottom:15px;">
            <label style="display:flex; justify-content:space-between; font-weight:900;">內文字體 <span id="ds-val">18px</span></label>
            <input type="range" id="descSlider" min="14" max="40" value="18" oninput="updateUI()">
        </div>
        <div>
            <label style="font-weight:900;">每列卡片數量</label>
            <select id="colSelect" onchange="updateUI()">
                <option value="5">每列 5 張</option>
                <option value="4" selected>每列 4 張</option>
                <option value="3">每列 3 張</option>
                <option value="2">每列 2 張</option>
            </select>
        </div>
    </div>

    <div class="admin-box">
        <div class="box-label">🆕 新增書籤</div>
        <select id="linkCat">
            <option value="primary">主要入口區</option>
            <option value="secondary" selected>次要工具區</option>
        </select>
        <div class="icon-selector" id="iconSelector"></div>
        <input type="text" id="linkTitle" class="input-field" placeholder="書籤名稱">
        <input type="text" id="linkUrl" class="input-field" placeholder="網址 (https://...)">
        <input type="text" id="linkDesc" class="input-field" placeholder="說明內容">
        <button class="btn-action btn-save" onclick="addLocalLink()">儲存並新增</button>
    </div>

    <button class="btn-action btn-sync" onclick="location.reload()">🔄 刷新並同步雲端</button>
</div>

<script>
    const SPREADSHEET_ID = '1uYBA_CncbEAydmzNC1SRnsKJdswNgQh3zg1x6TKo0UU';
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0`;
    const iconList = ['🩺', '💉', '🏥', '💊', '📋', '📦', '🔍', '🏠', '🧪', '📅', '📝', '💉', '🔗', '⭐', '👤', '⚙️'];
    let selectedIcon = '🔗';

    const iconGrid = document.getElementById('iconSelector');
    iconList.forEach(icon => {
        const div = document.createElement('div');
        div.className = 'icon-opt';
        div.innerText = icon;
        div.onclick = () => {
            document.querySelectorAll('.icon-opt').forEach(el => el.classList.remove('active'));
            div.classList.add('active');
            selectedIcon = icon;
        };
        iconGrid.appendChild(div);
    });

    async function fetchData() {
        try {
            const res = await fetch(SHEET_URL + "&cb=" + Date.now());
            const text = await res.text();
            const lines = text.split(/\r?\n/).slice(1);
            const pg = document.getElementById("primaryGrid");
            const sg = document.getElementById("secondaryGrid");
            pg.innerHTML = ""; sg.innerHTML = "";

            lines.forEach(line => {
                const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
                if (cols.length >= 3) {
                    const [cat, title, url, desc, icon] = cols;
                    const html = createCard(title, url, desc, icon);
                    if (cat.toLowerCase().includes('primary')) pg.innerHTML += html;
                    else sg.innerHTML += html;
                }
            });

            const locals = JSON.parse(localStorage.getItem('cz_locals')) || [];
            locals.forEach((l, idx) => {
                const html = createCard(l.title, l.url, l.desc, l.icon, true, idx);
                if (l.cat === 'primary') pg.innerHTML += html;
                else sg.innerHTML += html;
            });
        } catch (e) { console.error(e); }
    }

    function createCard(title, url, desc, icon, isLocal = false, idx = null) {
        const isImportant = title.includes("重要");
        return `
            <div class="card ${isImportant ? 'important-card' : ''}">
                ${isLocal ? `<button onclick="deleteLocal(${idx})" style="position:absolute; top:8px; right:8px; border:none; background:none; cursor:pointer; font-size:18px;">❌</button>` : ''}
                <a class="card-link" href="${url}" target="_blank">
                    <span class="icon-box">${icon || '🔗'}</span>
                    <div class="card-title">${title}</div>
                    <div class="card-desc">${desc || ''}</div>
                </a>
            </div>`;
    }

    function updateUI() {
        const ts = document.getElementById('titleSlider').value;
        const ds = document.getElementById('descSlider').value;
        const cols = document.getElementById('colSelect').value;
        document.getElementById('ts-val').innerText = ts + 'px';
        document.getElementById('ds-val').innerText = ds + 'px';
        document.documentElement.style.setProperty('--dynamic-title-size', ts + 'px');
        document.documentElement.style.setProperty('--dynamic-desc-size', ds + 'px');
        document.documentElement.style.setProperty('--grid-cols', cols);
        localStorage.setItem('cz_ui_config', JSON.stringify({ts, ds, cols}));
    }

    function addLocalLink() {
        const title = document.getElementById('linkTitle').value;
        const url = document.getElementById('linkUrl').value;
        const desc = document.getElementById('linkDesc').value;
        const cat = document.getElementById('linkCat').value;
        if(!title || !url) return;
        const locals = JSON.parse(localStorage.getItem('cz_locals')) || [];
        locals.push({title, url, desc, cat, icon: selectedIcon});
        localStorage.setItem('cz_locals', JSON.stringify(locals));
        location.reload();
    }

    function deleteLocal(idx) {
        const locals = JSON.parse(localStorage.getItem('cz_locals')) || [];
        locals.splice(idx, 1);
        localStorage.setItem('cz_locals', JSON.stringify(locals));
        location.reload();
    }

    function toggleAdmin() { document.getElementById('adminPanel').classList.toggle('show'); }

    function updateClock() {
        const now = new Date();
        document.getElementById("clock").innerText = now.toLocaleTimeString("zh-TW", { hour12: false });
        const y = now.getFullYear();
        document.getElementById("date").innerText = `(民${y-1911}) ${y}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
    }

    window.onload = () => {
        const cfg = JSON.parse(localStorage.getItem('cz_ui_config'));
        if(cfg) {
            document.getElementById('titleSlider').value = cfg.ts;
            document.getElementById('descSlider').value = cfg.ds;
            document.getElementById('colSelect').value = cfg.cols;
            updateUI();
        }
        updateClock(); setInterval(updateClock, 1000);
        fetchData();
    };
</script>
</body>
</html>
