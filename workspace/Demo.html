<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中正診所 Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Noto+Sans+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="light"] {
            --bg-sky: linear-gradient(135deg, #e0f2fe 0%, #ffffff 100%);
            --header-bg: rgba(255, 255, 255, 0.85);
            --card-bg: rgba(255, 255, 255, 0.75);
            --accent-primary: #0284c7; 
            --accent-secondary: #7dd3fc; 
            --text-main: #0c4a6e; 
            --text-sub: #334155;      
            --border-color: rgba(255, 255, 255, 0.6);
            --card-shadow: 0 12px 30px -5px rgba(14, 165, 233, 0.15);
        }
        
        :root[data-theme="dark"] {
            --bg-sky: #0f172a;
            --header-bg: rgba(15, 23, 42, 0.9);
            --card-bg: #1e293b;
            --accent-primary: #38bdf8;
            --accent-secondary: #0ea5e9;
            --text-main: #f1f5f9;
            --text-sub: #cbd5e1;
            --border-color: #334155;
            --card-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        /* 動態設定變數 */
        :root {
            --dynamic-title-size: 28px;
            --dynamic-desc-size: 18px;
            --grid-cols: 4; /* 預設一列4張 */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            min-height: 100vh; 
            background: var(--bg-sky);
            background-attachment: fixed;
            color: var(--text-main); 
            font-family: "Inter", "Noto Sans TC", sans-serif; 
            transition: background 0.4s, color 0.4s; 
        }

        .header { 
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 5%;
            background-color: var(--header-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 4px solid var(--accent-secondary); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .title-group { display: flex; flex-direction: column; }
        .title-main { 
            font-size: clamp(32px, 5vw, 48px);
            font-weight: 900; line-height: 1.1; 
            background: linear-gradient(to right, #0369a1, #0ea5e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .clock-area { text-align: right; }
        .clock { font-size: clamp(32px, 5vw, 52px); font-weight: 900; color: var(--accent-primary); line-height: 1; }

        .main { width: 100%; max-width: 1600px; margin: auto; padding: 180px 30px 100px; }
        .section-title { 
            font-size: 32px; font-weight: 900; margin: 50px 0 25px; padding-left: 20px; 
            border-left: 10px solid var(--accent-secondary); 
            color: var(--accent-primary);
        }
        
        /* 這裡是排列關鍵：使用 CSS Grid 變數 */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(var(--grid-cols), 1fr); 
            gap: 30px; 
        }

        /* 手機 RWD 自動調整，避免一列4張太擠 */
        @media (max-width: 1200px) { .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); } }

        .card { 
            background: var(--card-bg); 
            border-radius: 28px; 
            border: 1px solid var(--border-color); 
            box-shadow: var(--card-shadow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            position: relative;
        }
        .card:hover { transform: translateY(-10px); background: rgba(255, 255, 255, 0.95); }
        
        .card-link { display: block; padding: 40px 30px; text-decoration: none; color: inherit; text-align: center; }
        .icon-box { font-size: 60px; margin-bottom: 20px; display: block; }
        
        /* 使用動態字級 */
        .card-title { 
            font-size: var(--dynamic-title-size); 
            font-weight: 900; color: var(--accent-primary); margin-bottom: 12px; 
        }
        .card-desc { 
            font-size: var(--dynamic-desc-size); 
            font-weight: 700; color: var(--text-sub); line-height: 1.5; 
        }

        body.admin-mode .card-actions { display: flex; }
        .card-actions { position: absolute; top: 15px; right: 15px; display: none; gap: 8px; }
        .action-btn { padding: 6px 10px; border-radius: 8px; border: none; cursor: pointer; }

        .controls { position: fixed; bottom: 30px; right: 30px; display: flex; gap: 20px; z-index: 1000; }
        .ctrl-btn { width: 70px; height: 70px; border-radius: 50%; background: var(--card-bg); border: 3px solid var(--accent-secondary); font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 20px rgba(0,0,0,0.15); }

        .admin-panel { position: fixed; top: 0; right: -100%; width: 95%; max-width: 500px; height: 100vh; background: var(--card-bg); backdrop-filter: blur(25px); border-left: 8px solid var(--accent-primary); padding: 40px; overflow-y: auto; transition: 0.4s; z-index: 2000; }
        .admin-panel.show { right: 0; }
        
        /* 管理模式內的進階設定樣式 */
        .setting-group { background: rgba(255,255,255,0.4); padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--border-color); }
        .slider-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: bold; }
        input[type="range"] { width: 100%; margin: 10px 0; cursor: pointer; }
        
        .input { width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 12px; font-size: 16px; margin-bottom: 15px; }
        .btn { width: 100%; padding: 15px; font-size: 18px; font-weight: 900; border: none; border-radius: 12px; cursor: pointer; margin-top: 10px; }
        .save-btn { background: var(--accent-primary); color: white; }
    </style>
</head>
<body id="bodyRoot">

<div class="header">
    <div class="title-group">
        <div class="title-main">中正診所</div>
        <div class="title-sub">PORTAL SYSTEM</div>
    </div>
    <div class="clock-area">
        <div class="clock" id="clock">00:00:00</div>
        <div class="date-display" id="date"></div>
    </div>
</div>

<div class="main">
    <div class="section-title">主要入口</div>
    <div id="primaryGrid" class="grid"></div>

    <div class="section-title">次要工具</div>
    <div id="secondaryGrid" class="grid"></div>
</div>

<div class="controls">
    <button class="ctrl-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <button class="ctrl-btn" onclick="toggleAdminMode()">⚙️</button>
</div>

<div class="admin-panel" id="adminPanel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2>介面與連結管理</h2>
        <button onclick="closeAdmin()" style="font-size:30px; border:none; background:none; cursor:pointer;">✕</button>
    </div>

    <!-- 新增：介面樣式自定義區 -->
    <div class="setting-group">
        <div class="slider-label">
            <span>卡片標題大小</span>
            <span id="titleSizeVal">28px</span>
        </div>
        <input type="range" id="titleSlider" min="16" max="48" value="28" oninput="updateUIStyle()">
        
        <div class="slider-label">
            <span>卡片內容大小</span>
            <span id="descSizeVal">18px</span>
        </div>
        <input type="range" id="descSlider" min="12" max="32" value="18" oninput="updateUIStyle()">

        <div class="slider-label">
            <span>每列卡片數量</span>
        </div>
        <select id="gridColSelect" class="input" onchange="updateUIStyle()">
            <option value="2">每列 2 張</option>
            <option value="3">每列 3 張</option>
            <option value="4" selected>每列 4 張</option>
            <option value="5">每列 5 張</option>
        </select>
    </div>

    <hr style="margin-bottom: 20px; opacity: 0.2;">

    <input type="hidden" id="editId">
    <label>分類</label>
    <select id="linkCategory" class="input">
        <option value="primary">主要入口</option>
        <option value="secondary">次要工具</option>
    </select>
    <input id="linkTitle" class="input" placeholder="網站名稱">
    <input id="linkUrl" class="input" placeholder="網址 (https://...)">
    <input id="linkDesc" class="input" placeholder="簡短說明">
    <input id="linkIcon" class="input" placeholder="貼上 Emoji (例如: 🩺)">
    
    <button class="btn save-btn" onclick="saveLink()">儲存連結設定</button>
</div>

<script>
    // --- 初始資料與主題 ---
    let userLinks = JSON.parse(localStorage.getItem('cz_user_links_v5')) || { primary: [], secondary: [] };
    let uiSettings = JSON.parse(localStorage.getItem('cz_ui_settings')) || { titleSize: 28, descSize: 18, cols: 4 };

    const coreLinks = {
        primary: [
            { id: 'c1', title: "中正診所", url: "https://webhis.vision.com.tw/88336/login", desc: "門診系統登入", icon: "🩺" },
            { id: 'c2', title: "VPN", url: "https://medvpn.nhi.gov.tw/iwse0000/IWSE0001S01.aspx", desc: "健保資訊網服務系統", icon: "💻" }
        ],
        secondary: [
            { id: 'c11', title: "eGFR 計算", url: "egfr.html", desc: "腎絲球過濾計算", icon: "🧪" }
        ]
    };

    // --- UI 更新邏輯 ---
    function updateUIStyle() {
        const titleSize = document.getElementById('titleSlider').value;
        const descSize = document.getElementById('descSlider').value;
        const cols = document.getElementById('gridColSelect').value;

        // 更新顯示數值
        document.getElementById('titleSizeVal').innerText = titleSize + 'px';
        document.getElementById('descSizeVal').innerText = descSize + 'px';

        // 直接修改 CSS 變數
        document.documentElement.style.setProperty('--dynamic-title-size', titleSize + 'px');
        document.documentElement.style.setProperty('--dynamic-desc-size', descSize + 'px');
        document.documentElement.style.setProperty('--grid-cols', cols);

        // 儲存設定
        uiSettings = { titleSize, descSize, cols };
        localStorage.setItem('cz_ui_settings', JSON.stringify(uiSettings));
    }

    function applySavedSettings() {
        document.getElementById('titleSlider').value = uiSettings.titleSize;
        document.getElementById('descSlider').value = uiSettings.descSize;
        document.getElementById('gridColSelect').value = uiSettings.cols;
        updateUIStyle();
    }

    // --- 管理功能 ---
    function toggleAdminMode() {
        document.getElementById('bodyRoot').classList.toggle('admin-mode');
        document.getElementById("adminPanel").classList.toggle("show");
    }

    function closeAdmin() { 
        document.getElementById("adminPanel").classList.remove("show"); 
        document.getElementById('bodyRoot').classList.remove('admin-mode');
    }

    function saveLink() {
        const id = document.getElementById("editId").value;
        const cat = document.getElementById("linkCategory").value;
        const title = document.getElementById("linkTitle").value;
        const url = document.getElementById("linkUrl").value;
        const icon = document.getElementById("linkIcon").value || "🔗";
        const desc = document.getElementById("linkDesc").value;

        if (!title || !url) return alert("必填未填");

        if (id) {
            userLinks.primary = userLinks.primary.filter(l => l.id !== id);
            userLinks.secondary = userLinks.secondary.filter(l => l.id !== id);
            userLinks[cat].push({ id, title, url, desc, icon });
        } else {
            userLinks[cat].push({ id: 'u' + Date.now(), title, url, desc, icon });
        }
        localStorage.setItem('cz_user_links_v5', JSON.stringify(userLinks));
        render();
        closeAdmin();
    }

    function render() {
        const createCard = (l, isUser) => `
            <div class="card">
                ${isUser ? `<div class="card-actions"><button class="action-btn" onclick="editLink('${l.id}')">✏️</button></div>` : ''}
                <a class="card-link" href="${l.url}" target="_blank">
                    <span class="icon-box">${l.icon}</span>
                    <div class="card-title">${l.title}</div>
                    <div class="card-desc">${l.desc}</div>
                </a>
            </div>`;
        document.getElementById("primaryGrid").innerHTML = coreLinks.primary.map(l => createCard(l, false)).join('') + userLinks.primary.map(l => createCard(l, true)).join('');
        document.getElementById("secondaryGrid").innerHTML = coreLinks.secondary.map(l => createCard(l, false)).join('') + userLinks.secondary.map(l => createCard(l, true)).join('');
    }

    // --- 輔助功能 ---
    function toggleTheme() {
        const root = document.documentElement;
        const next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        root.setAttribute('data-theme', next);
    }

    function updateClock() {
        const now = new Date();
        document.getElementById("clock").innerText = now.toLocaleTimeString("zh-TW", { hour12: false });
        document.getElementById("date").innerText = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;
    }

    // 初始化
    setInterval(updateClock, 1000);
    applySavedSettings();
    render();
</script>
</body>
</html>
