<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中正診所 Portal - 恢復完整工具版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #f0f7ff;
            --accent-purple: #8b5cf6;
            --accent-blue: #0ea5e9;
            --text-dark: #1e293b;
            --card-bg: rgba(255, 255, 255, 0.85);
            --dynamic-title-size: 28px;
            --dynamic-desc-size: 18px;
            --grid-cols: 4; /* 預設值 */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-main); font-family: 'Noto Sans TC', sans-serif; transition: 0.3s; }

        .header { position: fixed; top: 0; width: 100%; z-index: 100; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; }
        .title-main { color: var(--accent-blue); font-weight: 900; font-size: 32px; }
        
        .container { max-width: 1400px; margin: 140px auto 100px; padding: 0 20px; }
        .section-title { font-size: 32px; font-weight: 900; color: #3b82f6; border-left: 10px solid #3b82f6; padding-left: 15px; margin: 40px 0 20px; }
        
        .grid { display: grid; grid-template-columns: repeat(var(--grid-cols), 1fr); gap: 20px; }

        /* 卡片設計 */
        .card { background: var(--card-bg); border-radius: 30px; border: 2px solid #fff; box-shadow: 0 8px 20px rgba(0,0,0,0.05); transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent-blue); }
        
        /* 「重要」凸顯效果 */
        .important-card { background: #fff9c4 !important; border: 3px solid #fbc02d !important; }
        .important-card .card-desc { color: #e53935 !important; font-weight: 900 !important; }

        .card-link { display: flex; flex-direction: column; align-items: center; padding: 40px 20px; text-decoration: none; color: inherit; text-align: center; height: 100%; }
        .icon-box { font-size: 50px; margin-bottom: 15px; }
        .card-title { font-size: var(--dynamic-title-size); font-weight: 900; color: #0369a1; margin-bottom: 8px; }
        .card-desc { font-size: var(--dynamic-desc-size); font-weight: 700; color: #64748b; }

        /* 管理面板 (恢復原本設計) */
        .admin-panel { position: fixed; top: 0; right: -100%; width: 100%; max-width: 450px; height: 100vh; background: #fff; z-index: 1000; transition: 0.4s; padding: 30px; overflow-y: auto; box-shadow: -10px 0 30px rgba(0,0,0,0.1); border-left: 6px solid var(--accent-purple); }
        .admin-panel.show { right: 0; }
        
        .admin-box { background: #f8fafc; border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .box-label { font-weight: 900; color: var(--accent-purple); margin-bottom: 15px; font-size: 18px; }
        
        label { display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 5px; color: #475569; }
        select, .input-field { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #cbd5e1; background: #fff; font-size: 16px; margin: 10px 0; }
        
        /* 紫色滑桿 */
        input[type=range] { width: 100%; accent-color: var(--accent-purple); }

        /* 圖示選單網格 */
        .icon-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 10px 0; }
        .icon-opt { padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; text-align: center; cursor: pointer; font-size: 24px; background: #fff; transition: 0.2s; }
        .icon-opt:hover, .icon-opt.active { background: #ede9fe; border-color: var(--accent-purple); transform: scale(1.1); }

        .btn-action { width: 100%; padding: 15px; border: none; border-radius: 15px; font-weight: 900; font-size: 18px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-save { background: var(--accent-purple); color: #fff; }
        .btn-sync { background: var(--accent-blue); color: #fff; }

        .float-btn { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; border: none; background: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1); font-size: 24px; cursor: pointer; z-index: 500; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="header">
    <div class="title-main">中正診所 PORTAL SYSTEM</div>
    <div style="text-align:right;">
        <div id="clock" style="font-size: 32px; color: #3b82f6; font-weight:900;">00:00:00</div>
        <div id="date" style="font-size: 16px; color: #64748b; font-weight:700;"></div>
    </div>
</div>

<div class="container">
    <div class="section-title">主要入口</div>
    <div id="primaryGrid" class="grid"></div>
    <div class="section-title">次要工具</div>
    <div id="secondaryGrid" class="grid"></div>
</div>

<button class="float-btn" onclick="toggleAdmin()">⚙️</button>

<div class="admin-panel" id="adminPanel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="font-weight:900;">介面管理</h2>
        <span onclick="toggleAdmin()" style="cursor:pointer; font-size:24px;">✕</span>
    </div>

    <div class="admin-box">
        <div class="box-label">🎨 顯示設定</div>
        <div style="margin-bottom:15px;">
            <label>卡片標題大小 <span id="ts-val">28px</span></label>
            <input type="range" id="titleSlider" min="16" max="50" value="28" oninput="updateUI()">
        </div>
        <div style="margin-bottom:15px;">
            <label>卡片內容大小 <span id="ds-val">18px</span></label>
            <input type="range" id="descSlider" min="12" max="30" value="18" oninput="updateUI()">
        </div>
        <div>
            <label>一列顯示幾張卡片</label>
            <select id="colSelect" onchange="updateUI()">
                <option value="5">一列顯示 5 張</option>
                <option value="4" selected>一列顯示 4 張</option>
                <option value="3">一列顯示 3 張</option>
                <option value="2">一列顯示 2 張</option>
            </select>
        </div>
    </div>

    <div class="admin-box">
        <div class="box-label">🆕 新增/修改書籤</div>
        <label>分類</label>
        <select id="linkCat">
            <option value="primary">主要入口</option>
            <option value="secondary" selected>次要工具</option>
        </select>
        
        <label style="margin-top:10px;">選擇圖示</label>
        <div class="icon-selector" id="iconSelector"></div>
        
        <input type="text" id="linkTitle" class="input-field" placeholder="網站名稱">
        <input type="text" id="linkUrl" class="input-field" placeholder="網址 (https://...)">
        <input type="text" id="linkDesc" class="input-field" placeholder="內容說明">
        
        <button class="btn-action btn-save" onclick="addLocalLink()">儲存書籤</button>
    </div>

    <button class="btn-action btn-sync" onclick="location.reload()">🔄 手動同步雲端資料</button>
</div>

<script>
    const SPREADSHEET_ID = '1uYBA_CncbEAydmzNC1SRnsKJdswNgQh3zg1x6TKo0UU';
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0`;
    
    // 圖示清單
    const iconList = ['🩺', '💉', '🏥', '💊', '☁️', '📦', '💻', '🔍', '📋', '🏠', '🧪', '📅', '📝', '⭐', '👤', '⚙️'];
    let selectedIcon = '🔗';

    // 生成圖示選單
    const iconGrid = document.getElementById('iconSelector');
    iconList.forEach(icon => {
        const div = document.createElement('div');
        div.className = 'icon-opt';
        div.innerText = icon;
        div.onclick = () => {
            document.querySelectorAll('.icon-opt').forEach(el => el.classList.remove('active'));
            div.classList.add('active');
            selectedIcon = icon;
        };
        iconGrid.appendChild(div);
    });

    async function fetchData() {
        try {
            const res = await fetch(SHEET_URL + "&cb=" + Date.now());
            const text = await res.text();
            const lines = text.split(/\r?\n/).slice(1);
            
            const pg = document.getElementById("primaryGrid");
            const sg = document.getElementById("secondaryGrid");
            pg.innerHTML = ""; sg.innerHTML = "";

            lines.forEach(line => {
                const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
                if (cols.length >= 3) {
                    const [cat, title, url, desc, icon] = cols;
                    const html = createCard(title, url, desc, icon);
                    if (cat.toLowerCase().includes('primary')) pg.innerHTML += html;
                    else sg.innerHTML += html;
                }
            });

            // 渲染手動新增的書籤
            const locals = JSON.parse(localStorage.getItem('cz_locals')) || [];
            locals.forEach((l, idx) => {
                const html = createCard(l.title, l.url, l.desc, l.icon, true, idx);
                if (l.cat === 'primary') pg.innerHTML += html;
                else sg.innerHTML += html;
            });
        } catch (e) { console.error(e); }
    }

    function createCard(title, url, desc, icon, isLocal = false, idx = null) {
        const isImportant = title.includes("重要");
        return `
            <div class="card ${isImportant ? 'important-card' : ''}">
                ${isLocal ? `<button onclick="deleteLocal(${idx})" style="position:absolute; top:5px; right:5px; border:none; background:none; cursor:pointer;">❌</button>` : ''}
                <a class="card-link" href="${url}" target="_blank">
                    <span class="icon-box">${icon || '🔗'}</span>
                    <div class="card-title">${title}</div>
                    <div class="card-desc">${desc || ''}</div>
                </a>
            </div>`;
    }

    function updateUI() {
        const ts = document.getElementById('titleSlider').value;
        const ds = document.getElementById('descSlider').value;
        const cols = document.getElementById('colSelect').value;
        
        document.getElementById('ts-val').innerText = ts + 'px';
        document.getElementById('ds-val').innerText = ds + 'px';
        
        document.documentElement.style.setProperty('--dynamic-title-size', ts + 'px');
        document.documentElement.style.setProperty('--dynamic-desc-size', ds + 'px');
        document.documentElement.style.setProperty('--grid-cols', cols);
        
        localStorage.setItem('cz_ui_config', JSON.stringify({ts, ds, cols}));
    }

    function addLocalLink() {
        const title = document.getElementById('linkTitle').value;
        const url = document.getElementById('linkUrl').value;
        const desc = document.getElementById('linkDesc').value;
        const cat = document.getElementById('linkCat').value;
        if(!title || !url) return;

        const locals = JSON.parse(localStorage.getItem('cz_locals')) || [];
        locals.push({title, url, desc, cat, icon: selectedIcon});
        localStorage.setItem('cz_locals', JSON.stringify(locals));
        location.reload();
    }

    function deleteLocal(idx) {
        const locals = JSON.parse(localStorage.getItem('cz_locals')) || [];
        locals.splice(idx, 1);
        localStorage.setItem('cz_locals', JSON.stringify(locals));
        location.reload();
    }

    function toggleAdmin() { document.getElementById('adminPanel').classList.toggle('show'); }

    function updateClock() {
        const now = new Date();
        document.getElementById("clock").innerText = now.toLocaleTimeString("zh-TW", { hour12: false });
        const y = now.getFullYear();
        document.getElementById("date").innerText = `(民${y-1911}) ${y}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
    }

    window.onload = () => {
        const cfg = JSON.parse(localStorage.getItem('cz_ui_config'));
        if(cfg) {
            document.getElementById('titleSlider').value = cfg.ts;
            document.getElementById('descSlider').value = cfg.ds;
            document.getElementById('colSelect').value = cfg.cols;
            updateUI();
        }
        updateClock(); setInterval(updateClock, 1000);
        fetchData();
    };
</script>
</body>
</html>
