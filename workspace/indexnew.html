<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light" data-color="slate" data-card="glass" data-font="sans" data-texture="none">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>中正診所 Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;900&family=Noto+Sans+TC:wght@500;700;900&family=Noto+Serif+TC:wght@600;700;900&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --fs-title: clamp(18px,1.8vw,24px);
  --fs-desc:  clamp(14px,1.2vw,17px);
  --grid:     4;
  --bg-img:   none;
  --bg-pct:   0.85;

  --A:   #2C5F8A; --A2:  #3A7AB5; --Alt: #5A96C8;
  --bg:      #EDF2F7; --surf:    #FFFFFF; --surf2:   #F0F5FA;
  --border:  #C8D9EC; --shadow:  rgba(44,95,138,.10); --shadowH:  rgba(44,95,138,.20);
  --text:    #1A3550; --sub:     #2C5F8A; --muted:   #5A7FA0;
  --danger:  #C0392B; --warn:    #B45309; --warnBg:  #FFFBEA; --warnBdr: #F59E0B;
  --hdr:     rgba(237,242,247,.95);
}

:root[data-color="slate"]  { --A:#2C5F8A; --A2:#3A7AB5; --Alt:#5A96C8; --bg:#EDF2F7; --surf2:#F0F5FA; --border:#C8D9EC; --shadow:rgba(44,95,138,.10); --shadowH:rgba(44,95,138,.20); --text:#1A3550; --sub:#2C5F8A; --muted:#5A7FA0; --hdr:rgba(237,242,247,.95); }
:root[data-color="sage"]   { --A:#3A6B52; --A2:#4E8F6E; --Alt:#76B594; --bg:#EEF4F0; --surf2:#E8F2EC; --border:#B8D8C4; --shadow:rgba(58,107,82,.10); --shadowH:rgba(58,107,82,.20); --text:#1B3828; --sub:#3A6B52; --muted:#5C8A6E; --hdr:rgba(238,244,240,.95); }
:root[data-color="stone"]  { --A:#6B5744; --A2:#8C7260; --Alt:#A8927E; --bg:#F3EFEB; --surf2:#EDE8E2; --border:#D4C4B4; --shadow:rgba(107,87,68,.10); --shadowH:rgba(107,87,68,.20); --text:#352518; --sub:#6B5744; --muted:#8C7260; --hdr:rgba(243,239,235,.95); }
:root[data-color="indigo"] { --A:#3D4E8C; --A2:#5165B5; --Alt:#7A8FD0; --bg:#EEF0F8; --surf2:#E8ECFA; --border:#C0CAE8; --shadow:rgba(61,78,140,.10); --shadowH:rgba(61,78,140,.20); --text:#1C2445; --sub:#3D4E8C; --muted:#6070A8; --hdr:rgba(238,240,248,.95); }

:root[data-theme="dark"] { --bg:#0E1C2C; --surf:#162435; --surf2:#1C2E40; --border:#2A4060; --shadow:rgba(0,0,0,.35); --shadowH:rgba(0,0,0,.55); --text:#E2EDF8; --sub:#7BADD8; --muted:#5A82A8; --hdr:rgba(14,28,44,.96); --warnBg:#271F00; --warnBdr:#B45309; }
:root[data-font="sans"]   { --ff:"Noto Sans TC","Inter",sans-serif; }
:root[data-font="round"]  { --ff:"Nunito","Noto Sans TC",sans-serif; }
:root[data-font="serif"]  { --ff:"Noto Serif TC",serif; }
:root[data-texture="dots"] body::after   { opacity:1; background-image:radial-gradient(circle, color-mix(in srgb,var(--A) 18%,transparent) 1px, transparent 1px); background-size:22px 22px; }
:root[data-texture="grid"] body::after   { opacity:1; background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px); background-size:32px 32px; }
:root[data-texture="none"] body::after   { opacity:0; }
:root[data-card="glass"] .card { background:rgba(255,255,255,.72); backdrop-filter:blur(16px); }
:root[data-theme="dark"][data-card="glass"] .card { background:rgba(22,36,53,.72); }
:root[data-card="flat"]  .card { background:var(--surf); box-shadow:none; border-width:2px; }
:root[data-card="solid"] .card { background:var(--surf2); border-color:transparent; box-shadow:var(--shadow); }

*,*::before,*::after { margin:0;padding:0;box-sizing:border-box; }
body { min-height:100vh; background:var(--bg); color:var(--text); font-family:var(--ff,"Noto Sans TC",sans-serif); background-image: var(--bg-img); background-size: cover; background-attachment: fixed; }
body::before { content:''; position:fixed; inset:0; z-index:0; pointer-events:none; background: rgba(237,242,247, var(--bg-pct)); }
body::after { content:''; position:fixed; inset:0; z-index:0; pointer-events:none; opacity:0; transition:opacity .3s; }
.hdr { position:fixed;top:0;left:0;right:0;z-index:900; height:72px; display:flex; align-items:center; justify-content:space-between; padding:0 36px; background:var(--hdr); backdrop-filter:blur(24px); border-bottom:1px solid var(--border); }
.logo { display:flex; align-items:center; gap:14px; }
.logo-icon { width:44px;height:44px;border-radius:12px;background:linear-gradient(145deg,var(--A),var(--A2));display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 14px var(--shadow); }
.logo-name { font-size:clamp(18px,2vw,24px); font-weight:900; color:var(--text); }
.logo-sub  { font-size:10px; font-weight:700; letter-spacing:3px; color:var(--A); margin-top:2px; }
.hdr-center { flex:1; display:flex; justify-content:center; padding:0 20px; }
.search-wrap { position:relative; width:100%; max-width:400px; }
.search-icon { position:absolute; left:13px; top:50%; transform:translateY(-50%); font-size:16px; color:var(--muted); }
#searchInput { width:100%; padding:10px 14px 10px 40px; border:1.5px solid var(--border); border-radius:10px; font-size:15px; background:var(--surf); color:var(--text); }
.hdr-right { display:flex; align-items:center; gap:20px; }
#clock { font-family:"Inter",monospace; font-size:clamp(20px,2vw,28px); font-weight:900; color:var(--text); }
#weatherWidget { font-size:14px; font-weight:700; color:var(--sub); padding:6px 12px; background:var(--surf2); border:1px solid var(--border); border-radius:10px; }
.main { position:relative; z-index:1; max-width:1520px; margin:0 auto; padding:88px 32px 120px; }
#announceBanner { display:none; margin:16px 0 8px; background:linear-gradient(135deg,color-mix(in srgb,var(--A) 8%,var(--surf)),var(--surf)); border:1.5px solid var(--border); border-left:5px solid var(--A2); border-radius:14px; padding:16px 22px; font-size:15px; font-weight:700; color:var(--sub); }
#announceBanner.show { display:block; }
.sec-label { display:flex; align-items:center; gap:12px; margin:36px 0 16px; }
.sec-pill { background:linear-gradient(135deg,var(--A),var(--A2)); color:#fff; font-size:13px; font-weight:800; padding:6px 16px; border-radius:999px; }
.sec-line { flex:1; height:1px; background:linear-gradient(90deg,var(--border),transparent); }
.grid { display:grid; grid-template-columns:repeat(var(--grid,4),1fr); gap:16px; }
.card { background:rgba(255,255,255,.72); backdrop-filter:blur(16px); border-radius:18px; border:1.5px solid var(--border); box-shadow:0 3px 16px var(--shadow); transition:transform .2s; overflow:hidden; position:relative; }
.card-link { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px 18px 26px; text-decoration:none; color:inherit; height:100%; gap:10px; }
.icon-box { width:66px; height:66px; border-radius:16px; background:var(--surf2); border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:34px; }
.card-title { font-size:var(--fs-title); font-weight:900; color:var(--text); }
.card-desc  { font-size:var(--fs-desc); font-weight:600; color:var(--sub); }
.controls { position:fixed; bottom:30px; right:30px; display:flex; flex-direction:column; gap:10px; z-index:1000; }
.ctrl { width:50px; height:50px; border-radius:13px; border:1.5px solid var(--border); background:var(--surf); font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 3px 14px var(--shadow); }
.panel { position:fixed; top:0; right:-100%; width:460px; height:100vh; background:var(--surf); border-left:2px solid var(--border); transition:right .35s; z-index:2000; }
.panel.show { right:0; }
.panel-hdr { display:flex; align-items:center; justify-content:space-between; padding:20px 24px; border-bottom:2px solid var(--border); }
.panel-body { padding:20px 24px; }
.pcard { background:var(--surf2); border:1.5px solid var(--border); border-radius:14px; padding:18px; margin-bottom:15px; }
.pin { width:100%; padding:10px; border:1.5px solid var(--border); border-radius:10px; margin-top:5px; }
</style>
</head>
<body>
<header class="hdr">
  <div class="logo"><div class="logo-icon">🏥</div><div><div class="logo-name">中正診所</div><div class="logo-sub">Portal System</div></div></div>
  <div class="hdr-center"><div class="search-wrap"><span class="search-icon">🔍</span><input id="searchInput" type="text" placeholder="搜尋…"></div></div>
  <div class="hdr-right"><div id="weatherWidget">載入中...</div><div id="clock">00:00:00</div></div>
</header>
<main class="main">
  <div id="announceBanner"><div class="announce-label">📢 公告</div><div id="announceText">─</div></div>
  <div class="sec-label"><div class="sec-pill">🏠 入口</div><div class="sec-line"></div></div>
  <div id="primaryGrid" class="grid"></div>
</main>
<div class="controls"><button class="ctrl" onclick="openPanel()">⚙️</button></div>
<div class="panel" id="adminPanel">
  <div class="panel-hdr"><h2>介面設定</h2><button onclick="closePanel()">✕</button></div>
  <div class="panel-body">
    <div class="pcard">
      <h3>🖼 背景圖片設定</h3>
      <input type="file" id="bgInput" accept="image/*" class="pin" onchange="handleBgUpload(event)">
      <label>背景遮罩深度 (0.5-0.95)</label>
      <input type="range" min="0.5" max="0.95" step="0.05" value="0.85" oninput="setBgOpacity(this.value)">
      <button onclick="clearBg()" style="width:100%; margin-top:10px;">移除背景</button>
    </div>
  </div>
</div>
<script>
async function fetchWeather() {
  try {
    const r = await fetch('https://wttr.in/?format=%t');
    if(!r.ok) throw new Error();
    document.getElementById('weatherWidget').textContent = await r.text();
  } catch(e) { document.getElementById('weatherWidget').style.display = 'none'; }
}
function handleBgUpload(e) {
  const reader = new FileReader();
  reader.onload = (event) => {
    const data = event.target.result;
    localStorage.setItem('cz_bg', data);
    document.documentElement.style.setProperty('--bg-img', `url(${data})`);
  };
  reader.readAsDataURL(e.target.files[0]);
}
function setBgOpacity(val) {
  document.documentElement.style.setProperty('--bg-pct', val);
  localStorage.setItem('cz_bg_pct', val);
}
function clearBg() {
  localStorage.removeItem('cz_bg');
  document.documentElement.style.setProperty('--bg-img', 'none');
}
function openPanel() { document.getElementById('adminPanel').classList.add('show'); }
function closePanel() { document.getElementById('adminPanel').classList.remove('show'); }

window.addEventListener('DOMContentLoaded', () => {
  const savedBg = localStorage.getItem('cz_bg');
  if (savedBg) document.documentElement.style.setProperty('--bg-img', `url(${savedBg})`);
  const savedPct = localStorage.getItem('cz_bg_pct') || 0.85;
  document.documentElement.style.setProperty('--bg-pct', savedPct);
  fetchWeather();
});
</script>
</body>
</html>
