<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light" data-color="slate" data-card="glass" data-font="sans" data-texture="none">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>中正診所 Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;900&family=Noto+Sans+TC:wght@500;700;900&family=Noto+Serif+TC:wght@600;700;900&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════════════ */
:root {
  --fs-title: clamp(18px,1.8vw,24px);
  --fs-desc:  clamp(14px,1.2vw,17px);
  --grid:     4;
  --bg-img:   none;

  /* slate */
  --A:   #2C5F8A; --A2:  #3A7AB5; --Alt: #5A96C8;
  --bg:  #EDF2F7; --surf: #FFFFFF; --surf2: #F0F5FA;
  --border: #C8D9EC; --text: #1A3550; --sub: #2C5F8A;
  --muted: #5A7FA0; --hdr: rgba(237,242,247,.95);
}

:root[data-theme="dark"] {
  --bg:#0E1C2C; --surf:#162435; --surf2:#1C2E40;
  --border:#2A4060; --text:#E2EDF8; --sub:#7BADD8;
  --muted:#5A82A8; --hdr:rgba(14,28,44,.96);
}

/* 基礎樣式 */
body {
  min-height:100vh; background:var(--bg); color:var(--text);
  font-family:var(--ff,"Noto Sans TC",sans-serif);
  background-image: var(--bg-img);
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  transition:background .3s,color .3s;
}

/* 增加半透明遮罩層讓背景不影響閱讀 */
body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background: rgba(var(--bg-rgb, 237,242,247), 0.85);
}

/* 調整 main 以確保在背景上顯示 */
.main { position:relative; z-index:1; max-width:1520px; margin:0 auto; padding:88px 32px 120px; }

/* 簡化版 header/card 樣式 (其餘保持不變) */
.hdr { position:fixed;top:0;left:0;right:0;z-index:900; height:72px; display:flex; align-items:center; justify-content:space-between; padding:0 36px; background:var(--hdr); backdrop-filter:blur(10px); border-bottom:1px solid var(--border); }
.card { background:rgba(255,255,255,.7); backdrop-filter:blur(10px); border-radius:18px; border:1.5px solid var(--border); transition:.2s; }

/* 設定面板調整 */
.pcard { background:var(--surf2); border:1.5px solid var(--border); border-radius:14px; padding:18px; margin-bottom:16px; }
.pin { width:100%; padding:10px; border:1.5px solid var(--border); border-radius:10px; margin-top:5px; }
</style>
</head>
<body>

<header class="hdr">
  <div class="logo"><div>中正診所 Portal</div></div>
  <div id="weatherWidget" style="font-size:14px; font-weight:700;"></div>
</header>

<main class="main">
    <div id="primaryGrid" class="grid"></div>
</main>

<div class="controls">
  <button class="ctrl" onclick="openPanel()">⚙️</button>
</div>

<div class="panel" id="adminPanel">
  <div class="panel-hdr"><h2>介面設定</h2><button class="xbtn" onclick="closePanel()">✕</button></div>
  <div class="panel-body">
    <div class="pcard">
      <div class="pcard-title">🖼 背景圖片設定</div>
      <input type="file" id="bgInput" accept="image/*" class="pin" onchange="handleBgUpload(event)">
      <button class="btn-ghost" onclick="clearBg()" style="margin-top:10px;">移除背景</button>
    </div>
  </div>
</div>

<script>
// 背景處理
function handleBgUpload(e) {
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = function(event) {
    const imgData = event.target.result;
    localStorage.setItem('cz_bg', imgData);
    applyBg(imgData);
  };
  reader.readAsDataURL(file);
}

function applyBg(imgData) {
  document.documentElement.style.setProperty('--bg-img', `url(${imgData})`);
}

function clearBg() {
  localStorage.removeItem('cz_bg');
  document.documentElement.style.setProperty('--bg-img', 'none');
}

// 修正天氣功能
async function fetchWeather() {
  try {
    // 改用更精簡的請求，失敗則不顯示
    const r = await fetch('https://wttr.in/?format=%t');
    if(!r.ok) throw new Error();
    const t = await r.text();
    document.getElementById('weatherWidget').textContent = '🌡️ ' + t;
  } catch(e) {
    document.getElementById('weatherWidget').style.display = 'none';
  }
}

// 初始化載入
window.addEventListener('DOMContentLoaded', () => {
  const savedBg = localStorage.getItem('cz_bg');
  if (savedBg) applyBg(savedBg);
  fetchWeather();
});

function openPanel() { document.getElementById('adminPanel').classList.add('show'); }
function closePanel() { document.getElementById('adminPanel').classList.remove('show'); }
</script>
</body>
</html>
