<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light" data-color="blue">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中正診所 Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        /* ══════════════════════════════════════════
           DESIGN TOKENS
        ══════════════════════════════════════════ */
        :root {
            /* font sizes — desktop-first, big enough for older eyes */
            --fs-card-title: clamp(18px, 1.6vw, 22px);
            --fs-card-desc:  clamp(14px, 1.2vw, 17px);
            --grid-cols: 4;

            /* palette */
            --c-bg:       #EFF6FF;
            --c-surface:  #FFFFFF;
            --c-surface2: #F0F7FF;
            --c-border:   #BFDBFE;
            --c-shadow:   rgba(30,64,175,.10);
            --c-shadow-h: rgba(30,64,175,.20);
            --c-text:     #1E3A5F;
            --c-sub:      #3B6FA0;
            --c-muted:    #5A7FA8;
            --c-danger:   #DC2626;
            --c-header:   rgba(239,246,255,.95);

            /* accent — overridden by data-color */
            --accent:     #1D6EE2;
            --accent-mid: #2E84FF;
            --accent-lt:  #93C5FD;
        }

        /* colour themes */
        :root[data-color="blue"]   { --accent:#1D6EE2; --accent-mid:#2E84FF; --accent-lt:#93C5FD; --c-bg:#EFF6FF; --c-surface2:#EBF4FF; --c-border:#BFDBFE; --c-shadow:rgba(30,64,175,.10); }
        :root[data-color="teal"]   { --accent:#0D7C6F; --accent-mid:#0FA890; --accent-lt:#6EE7D8; --c-bg:#F0FDFB; --c-surface2:#E6FAF7; --c-border:#99F0E4; --c-shadow:rgba(13,124,111,.10); }
        :root[data-color="green"]  { --accent:#166534; --accent-mid:#16A34A; --accent-lt:#86EFAC; --c-bg:#F0FDF4; --c-surface2:#E8FDF0; --c-border:#A7F3C0; --c-shadow:rgba(22,101,52,.10); }
        :root[data-color="purple"] { --accent:#5B21B6; --accent-mid:#7C3AED; --accent-lt:#C4B5FD; --c-bg:#F5F3FF; --c-surface2:#EDE9FE; --c-border:#C4B5FD; --c-shadow:rgba(91,33,182,.10); }

        /* dark mode */
        :root[data-theme="dark"] {
            --c-bg:      #0D1B2E;
            --c-surface: #162539;
            --c-surface2:#1C2F47;
            --c-border:  #2A4266;
            --c-shadow:  rgba(0,0,0,.35);
            --c-shadow-h:rgba(0,0,0,.55);
            --c-text:    #E8F0FB;
            --c-sub:     #93BAE8;
            --c-muted:   #6B9AC4;
            --c-header:  rgba(13,27,46,.96);
        }

        /* ══════════════════════════════════════════
           RESET
        ══════════════════════════════════════════ */
        *, *::before, *::after {
            margin:0; padding:0; box-sizing:border-box;
            -webkit-tap-highlight-color:transparent;
        }

        body {
            min-height:100vh;
            background: var(--c-bg);
            color: var(--c-text);
            font-family: "Noto Sans TC", "Inter", sans-serif;
            transition: background .3s, color .3s;
            overflow-x:hidden;
        }

        /* ══════════════════════════════════════════
           BACKGROUND DECORATION
        ══════════════════════════════════════════ */
        body::before {
            content:'';
            position:fixed; inset:0; z-index:0; pointer-events:none;
            background:
                radial-gradient(ellipse 60% 40% at 15% 10%, color-mix(in srgb,var(--accent) 12%,transparent) 0%, transparent 70%),
                radial-gradient(ellipse 50% 35% at 85% 85%, color-mix(in srgb,var(--accent-mid) 8%,transparent) 0%, transparent 70%);
        }

        /* ══════════════════════════════════════════
           HEADER
        ══════════════════════════════════════════ */
        .header {
            position:fixed; top:0; left:0; right:0; z-index:1000;
            height: 76px;
            display:flex; align-items:center; justify-content:space-between;
            padding: 0 40px;
            background: var(--c-header);
            backdrop-filter: blur(24px);
            border-bottom: 2px solid var(--c-border);
        }

        .logo-wrap { display:flex; align-items:center; gap:16px; }

        .logo-icon {
            width:48px; height:48px; border-radius:14px; flex-shrink:0;
            background: linear-gradient(145deg, var(--accent), var(--accent-mid));
            display:flex; align-items:center; justify-content:center;
            font-size:24px;
            box-shadow: 0 4px 16px color-mix(in srgb,var(--accent) 35%,transparent);
        }

        .logo-text-wrap { line-height:1.2; }
        .logo-name {
            font-size: clamp(20px,2.2vw,28px);
            font-weight:900; color:var(--c-text); letter-spacing:.5px;
        }
        .logo-badge {
            display:inline-block; margin-top:3px;
            font-size:10px; font-weight:700; letter-spacing:3px;
            color:var(--accent); text-transform:uppercase;
        }

        /* clock */
        .clock-wrap { text-align:right; }
        #clock {
            font-family:"Inter",monospace;
            font-size: clamp(22px,2.5vw,32px);
            font-weight:900; color:var(--c-text);
            font-variant-numeric:tabular-nums; letter-spacing:2px;
        }
        #date {
            font-size: clamp(13px,1vw,15px);
            font-weight:700; color:var(--c-sub); margin-top:2px;
        }

        /* ══════════════════════════════════════════
           MAIN CONTENT
        ══════════════════════════════════════════ */
        .main {
            position:relative; z-index:1;
            max-width: 1500px; margin:0 auto;
            padding: 104px 36px 120px;
        }

        /* ── Section Label ── */
        .section-label {
            display:flex; align-items:center; gap:14px;
            margin: 48px 0 20px;
        }
        .section-label:first-child { margin-top:16px; }
        .section-line {
            flex:1; height:1px;
            background: linear-gradient(90deg, var(--c-border), transparent);
        }
        .section-pill {
            display:flex; align-items:center; gap:8px;
            background: linear-gradient(135deg, var(--accent), var(--accent-mid));
            color:#fff; font-size:14px; font-weight:800;
            padding:6px 18px; border-radius:999px;
            letter-spacing:1.5px;
            box-shadow: 0 4px 14px color-mix(in srgb,var(--accent) 30%,transparent);
        }

        /* ── Card Grid ── */
        .grid {
            display:grid;
            grid-template-columns: repeat(var(--grid-cols, 4), 1fr);
            gap:18px;
        }

        /* ── Cards ── */
        .card {
            background: var(--c-surface);
            border-radius:20px;
            border: 2px solid var(--c-border);
            box-shadow: 0 4px 18px var(--c-shadow);
            transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
            overflow:hidden;
            position:relative;
        }

        /* top accent stripe */
        .card::before {
            content:'';
            position:absolute; top:0; left:0; right:0; height:4px;
            background: linear-gradient(90deg, var(--accent), var(--accent-mid));
            opacity:0; transition:opacity .2s;
        }
        .card:hover {
            transform:translateY(-5px);
            box-shadow: 0 12px 36px var(--c-shadow-h);
            border-color: var(--accent-mid);
        }
        .card:hover::before { opacity:1; }

        /* Highlight card */
        .card.highlight-card {
            background: #FFFBEA;
            border-color: #F59E0B;
            box-shadow: 0 4px 18px rgba(245,158,11,.15);
        }
        :root[data-theme="dark"] .card.highlight-card {
            background:#271F00; border-color:#B45309;
        }
        .card.highlight-card::before { background:linear-gradient(90deg,#F59E0B,#FBBF24); }
        .card.highlight-card .card-title { color:#92400E; }
        .card.highlight-card .card-desc  { color:#B45309; }
        :root[data-theme="dark"] .card.highlight-card .card-title { color:#FCD34D; }
        :root[data-theme="dark"] .card.highlight-card .card-desc  { color:#F59E0B; }

        /* card interior */
        .card-link {
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            padding:34px 20px 30px;
            text-decoration:none; color:inherit; text-align:center; height:100%; gap:12px;
        }

        .icon-wrap {
            width:70px; height:70px; border-radius:18px; flex-shrink:0;
            background: var(--c-surface2);
            border: 2px solid var(--c-border);
            display:flex; align-items:center; justify-content:center;
            font-size:36px; line-height:1;
            transition: transform .2s ease, background .2s;
        }
        .card:hover .icon-wrap {
            transform:scale(1.08);
            background: color-mix(in srgb,var(--accent) 10%,var(--c-surface2));
        }

        .card-title {
            font-size: var(--fs-card-title);
            font-weight:900; color:var(--c-text);
            line-height:1.3;
        }
        .card-desc {
            font-size: var(--fs-card-desc);
            font-weight:600; color:var(--c-sub);
            line-height:1.4;
        }

        /* ══════════════════════════════════════════
           FLOATING CONTROLS
        ══════════════════════════════════════════ */
        .controls {
            position:fixed; bottom:30px; right:30px;
            display:flex; flex-direction:column; gap:12px; z-index:1000;
        }
        .ctrl-btn {
            width:54px; height:54px; border-radius:14px;
            border:2px solid var(--c-border);
            background:var(--c-surface);
            font-size:22px; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            box-shadow:0 4px 16px var(--c-shadow);
            transition:transform .15s, box-shadow .15s;
            color:var(--c-text);
        }
        .ctrl-btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px var(--c-shadow-h); }

        /* ══════════════════════════════════════════
           ADMIN PANEL
        ══════════════════════════════════════════ */
        .admin-panel {
            position:fixed; top:0; right:-100%; width:440px; height:100vh;
            background:var(--c-surface);
            border-left:2px solid var(--c-border);
            overflow-y:auto;
            transition:right .35s cubic-bezier(.4,0,.2,1);
            z-index:2000;
        }
        .admin-panel.show { right:0; box-shadow:-24px 0 60px rgba(0,0,0,.14); }

        .admin-header {
            position:sticky; top:0; z-index:10;
            display:flex; align-items:center; justify-content:space-between;
            padding:22px 26px 18px;
            background:var(--c-surface);
            border-bottom:2px solid var(--c-border);
        }
        .admin-header h2 {
            font-size:20px; font-weight:900; color:var(--c-text);
        }
        .close-btn {
            width:38px; height:38px; border-radius:10px;
            border:2px solid var(--c-border); background:transparent;
            cursor:pointer; font-size:18px;
            display:flex; align-items:center; justify-content:center;
            color:var(--c-muted); transition:.15s;
        }
        .close-btn:hover { background:var(--c-surface2); color:var(--c-danger); border-color:var(--c-danger); }

        .admin-body { padding:22px 26px 50px; display:flex; flex-direction:column; gap:18px; }

        .admin-card {
            background:var(--c-surface2);
            border:2px solid var(--c-border);
            border-radius:16px; padding:20px;
        }
        .admin-card-title {
            font-size:12px; font-weight:800; color:var(--accent);
            letter-spacing:2.5px; text-transform:uppercase; margin-bottom:16px;
        }

        .admin-label {
            font-size:14px; font-weight:700; color:var(--c-sub);
            display:block; margin:14px 0 8px;
        }
        .admin-label:first-of-type { margin-top:0; }

        /* color dots */
        .color-row { display:flex; gap:12px; flex-wrap:wrap; }
        .cdot {
            width:36px; height:36px; border-radius:50%;
            cursor:pointer; border:3px solid var(--c-surface);
            box-shadow:0 2px 8px rgba(0,0,0,.18);
            transition:transform .15s;
        }
        .cdot.active { transform:scale(1.25); outline:3px solid var(--c-text); outline-offset:2px; }

        /* sliders */
        .slider-row { display:flex; align-items:center; gap:12px; }
        .slider-row input[type=range] { flex:1; height:8px; accent-color:var(--accent); cursor:pointer; }
        .sval {
            font-size:13px; font-weight:800; min-width:38px; text-align:right;
            color:var(--accent); background:color-mix(in srgb,var(--accent) 12%,transparent);
            padding:2px 7px; border-radius:6px;
        }

        /* inputs */
        .ainput {
            width:100%; padding:11px 14px;
            border:2px solid var(--c-border); border-radius:11px;
            font-size:15px; font-family:inherit;
            background:var(--c-surface); color:var(--c-text);
            margin-bottom:10px; transition:.15s;
        }
        .ainput:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 12%,transparent); }

        /* emoji picker */
        .epicker { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:14px; }
        .eopt {
            font-size:24px; text-align:center; padding:9px 4px;
            border:2px solid var(--c-border); border-radius:12px;
            background:var(--c-surface); cursor:pointer; transition:.15s;
            line-height:1;
        }
        .eopt.sel { border-color:var(--accent); background:color-mix(in srgb,var(--accent) 10%,var(--c-surface)); }

        /* buttons */
        .btn-add {
            width:100%; padding:14px;
            font-size:15px; font-weight:800; font-family:inherit;
            border:none; border-radius:12px; cursor:pointer;
            background:linear-gradient(135deg,var(--accent),var(--accent-mid));
            color:#fff;
            box-shadow:0 4px 16px color-mix(in srgb,var(--accent) 28%,transparent);
            transition:opacity .15s,transform .15s;
        }
        .btn-add:hover { opacity:.9; transform:translateY(-1px); }

        .btn-sync {
            width:100%; padding:12px;
            font-size:14px; font-weight:700; font-family:inherit;
            border:2px solid var(--c-border); border-radius:12px; cursor:pointer;
            background:transparent; color:var(--c-sub); transition:.15s;
        }
        .btn-sync:hover { background:var(--c-surface2); color:var(--c-text); border-color:var(--c-sub); }

        /* manage items */
        .mitem {
            display:flex; justify-content:space-between; align-items:center;
            padding:11px 14px; border-radius:12px;
            border:2px solid var(--c-border); margin-bottom:8px;
            background:var(--c-surface); font-size:15px; font-weight:600; gap:8px;
        }
        .mitem span { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .del-btn {
            background:transparent; color:var(--c-danger);
            border:2px solid var(--c-danger); padding:5px 12px;
            border-radius:8px; cursor:pointer; font-size:13px; font-weight:800;
            white-space:nowrap; transition:.15s; flex-shrink:0;
        }
        .del-btn:hover { background:var(--c-danger); color:#fff; }

        /* ══════════════════════════════════════════
           RWD — tablet / mobile
        ══════════════════════════════════════════ */
        @media (max-width:1200px) { :root { --grid-cols:3; } }
        @media (max-width:860px)  { .grid { grid-template-columns:repeat(3,1fr)!important; } }
        @media (max-width:600px) {
            .grid { grid-template-columns:repeat(2,1fr)!important; }
            :root { --fs-card-title:17px; --fs-card-desc:13px; }
            .main { padding:90px 14px 110px; }
            .header { padding:0 16px; height:70px; }
            .admin-panel { width:100%; }
            .card-link { padding:26px 14px 22px; }
            .icon-wrap { width:56px; height:56px; font-size:28px; }
        }
        @media (max-width:380px) {
            .grid { grid-template-columns:1fr!important; }
        }

        /* ══════════════════════════════════════════
           EMPTY STATE
        ══════════════════════════════════════════ */
        .empty-hint {
            grid-column:1/-1;
            text-align:center; padding:48px 20px;
            color:var(--c-muted); font-size:16px; font-weight:600;
        }
    </style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header class="header">
    <div class="logo-wrap">
        <div class="logo-icon">🏥</div>
        <div class="logo-text-wrap">
            <div class="logo-name">中正診所</div>
            <div class="logo-badge">Portal System</div>
        </div>
    </div>
    <div class="clock-wrap">
        <div id="clock">00:00:00</div>
        <div id="date">─</div>
    </div>
</header>

<!-- ═══ MAIN ═══ -->
<main class="main">

    <div class="section-label">
        <div class="section-pill">🏠 主要入口</div>
        <div class="section-line"></div>
    </div>
    <div id="primaryGrid" class="grid">
        <div class="empty-hint">資料載入中…</div>
    </div>

    <div class="section-label">
        <div class="section-pill">🔧 次要工具</div>
        <div class="section-line"></div>
    </div>
    <div id="secondaryGrid" class="grid">
        <div class="empty-hint">資料載入中…</div>
    </div>

</main>

<!-- ═══ FLOAT CONTROLS ═══ -->
<div class="controls">
    <button class="ctrl-btn" id="themeBtn" onclick="toggleTheme()" title="切換深淺色">🌙</button>
    <button class="ctrl-btn" onclick="toggleAdmin()" title="介面管理">⚙️</button>
</div>

<!-- ═══ ADMIN PANEL ═══ -->
<div class="admin-panel" id="adminPanel">
    <div class="admin-header">
        <h2>⚙️ 介面管理</h2>
        <button class="close-btn" onclick="closeAdmin()">✕</button>
    </div>
    <div class="admin-body">

        <!-- 顯示設定 -->
        <div class="admin-card">
            <div class="admin-card-title">🎨 顯示設定</div>

            <label class="admin-label">主題顏色</label>
            <div class="color-row">
                <div class="cdot" id="dot-blue"   style="background:#1D6EE2" onclick="setColor('blue')"></div>
                <div class="cdot" id="dot-teal"   style="background:#0D7C6F" onclick="setColor('teal')"></div>
                <div class="cdot" id="dot-green"  style="background:#166534" onclick="setColor('green')"></div>
                <div class="cdot" id="dot-purple" style="background:#5B21B6" onclick="setColor('purple')"></div>
            </div>

            <label class="admin-label">標題大小</label>
            <div class="slider-row">
                <input type="range" id="titleSlider" min="15" max="30" value="22" oninput="applyStyle()">
                <span class="sval" id="tsVal">22px</span>
            </div>

            <label class="admin-label">說明大小</label>
            <div class="slider-row">
                <input type="range" id="descSlider" min="13" max="22" value="17" oninput="applyStyle()">
                <span class="sval" id="dsVal">17px</span>
            </div>

            <label class="admin-label">每列卡片數（電腦版）</label>
            <select id="gridColSel" class="ainput" onchange="applyStyle()">
                <option value="6">6 張</option>
                <option value="5">5 張</option>
                <option value="4" selected>4 張</option>
                <option value="3">3 張</option>
            </select>
        </div>

        <!-- 新增書籤 -->
        <div class="admin-card">
            <div class="admin-card-title">🔗 新增書籤</div>

            <label class="admin-label">放置區域</label>
            <select id="linkCat" class="ainput">
                <option value="primary">主要入口區</option>
                <option value="secondary" selected>次要工具區</option>
            </select>

            <label class="admin-label">選擇圖示</label>
            <div class="epicker" id="emojiPicker"></div>

            <input id="lTitle" class="ainput" placeholder="名稱（含「重要」自動標黃色）">
            <input id="lUrl"   class="ainput" placeholder="網址 https://…">
            <input id="lDesc"  class="ainput" placeholder="簡短說明（選填）">
            <button class="btn-add" onclick="saveLink()">＋ 儲存並新增</button>
        </div>

        <!-- 已存書籤 -->
        <div id="manageList"></div>

        <button class="btn-sync" onclick="location.reload()">🔄 重新同步雲端資料</button>

    </div>
</div>

<script>
/* ════════════════════════════════════
   CONFIG & STATE
════════════════════════════════════ */
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1uYBA_CncbEAydmzNC1SRnsKJdswNgQh3zg1x6TKo0UU/export?format=csv&gid=0';
const EMOJIS    = ['🩺','💉','🏥','💊','📦','💻','🔍','📋','🧪','📅','📝','⭐','👤','⚙️','🔗','🏠'];
const LS_KEY    = 'cz_user_links_v4';
const CFG_KEY   = 'cz_ui_config';
const THEME_KEY = 'cz_portal_theme';
const COLOR_KEY = 'cz_theme_color';

let selectedIcon = '🔗';
let userLinks = JSON.parse(localStorage.getItem(LS_KEY)) || { primary:[], secondary:[] };

/* ════════════════════════════════════
   THEME / COLOR
════════════════════════════════════ */
function setColor(c) {
    document.documentElement.setAttribute('data-color', c);
    document.querySelectorAll('.cdot').forEach(d => d.classList.remove('active'));
    const dot = document.getElementById('dot-' + c);
    if (dot) dot.classList.add('active');
    localStorage.setItem(COLOR_KEY, c);
}

function toggleTheme() {
    const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    document.getElementById('themeBtn').textContent = next === 'light' ? '🌙' : '☀️';
    localStorage.setItem(THEME_KEY, next);
}

/* ════════════════════════════════════
   ADMIN PANEL
════════════════════════════════════ */
function toggleAdmin() { document.getElementById('adminPanel').classList.toggle('show'); }
function closeAdmin()  { document.getElementById('adminPanel').classList.remove('show'); }

/* ════════════════════════════════════
   UI STYLE
════════════════════════════════════ */
function applyStyle() {
    const ts  = document.getElementById('titleSlider').value;
    const ds  = document.getElementById('descSlider').value;
    const col = document.getElementById('gridColSel').value;
    document.getElementById('tsVal').textContent = ts + 'px';
    document.getElementById('dsVal').textContent = ds + 'px';
    const root = document.documentElement;
    root.style.setProperty('--fs-card-title', ts + 'px');
    root.style.setProperty('--fs-card-desc',  ds + 'px');
    root.style.setProperty('--grid-cols', col);
    localStorage.setItem(CFG_KEY, JSON.stringify({ ts, ds, col }));
}

/* ════════════════════════════════════
   CARD HTML
════════════════════════════════════ */
function createCard(l) {
    return `
    <div class="card${l.isHighlight ? ' highlight-card' : ''}">
        <a class="card-link" href="${l.url}" target="_blank" rel="noopener">
            <div class="icon-wrap">${l.icon || '🔗'}</div>
            <div class="card-title">${l.title}</div>
            ${l.desc ? `<div class="card-desc">${l.desc}</div>` : ''}
        </a>
    </div>`;
}

/* ════════════════════════════════════
   CLOUD DATA
════════════════════════════════════ */
async function fetchCloud() {
    const pg = document.getElementById('primaryGrid');
    const sg = document.getElementById('secondaryGrid');

    try {
        const res  = await fetch(SHEET_URL + '&cb=' + Date.now());
        const text = await res.text();
        const rows = text.split(/\r?\n/).slice(1);

        pg.innerHTML = '';
        sg.innerHTML = '';

        rows.forEach(row => {
            const cols = row
                .split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
                .map(c => c.replace(/^"|"$/g, '').trim());
            if (cols.length < 3) return;
            const [cat, title, url, desc, icon] = cols;
            if (!title || !url) return;
            const card = createCard({ title, url, desc, icon, isHighlight: title.includes('重要') });
            if (cat.toLowerCase().includes('primary')) pg.innerHTML += card;
            else sg.innerHTML += card;
        });

    } catch(e) {
        console.warn('Cloud sync failed:', e);
        pg.innerHTML = '<div class="empty-hint">⚠️ 雲端連線失敗，顯示本機書籤</div>';
        sg.innerHTML = '';
    }

    // append local links
    userLinks.primary.forEach(l => {
        l.isHighlight = l.title.includes('重要');
        document.getElementById('primaryGrid').innerHTML += createCard(l);
    });
    userLinks.secondary.forEach(l => {
        l.isHighlight = l.title.includes('重要');
        document.getElementById('secondaryGrid').innerHTML += createCard(l);
    });

    // clean up empties
    ['primaryGrid','secondaryGrid'].forEach(id => {
        const el = document.getElementById(id);
        if (!el.querySelector('.card')) el.innerHTML = '<div class="empty-hint">尚無書籤</div>';
    });

    renderManageList();
}

/* ════════════════════════════════════
   BOOKMARK CRUD
════════════════════════════════════ */
function saveLink() {
    const title = document.getElementById('lTitle').value.trim();
    const url   = document.getElementById('lUrl').value.trim();
    const desc  = document.getElementById('lDesc').value.trim();
    const cat   = document.getElementById('linkCat').value;
    if (!title || !url) { alert('請填寫名稱與網址'); return; }
    userLinks[cat].push({ id:Date.now(), title, url, desc, icon:selectedIcon });
    localStorage.setItem(LS_KEY, JSON.stringify(userLinks));
    location.reload();
}

function deleteLink(id) {
    if (!confirm('確定要刪除這個書籤嗎？')) return;
    ['primary','secondary'].forEach(k => {
        userLinks[k] = userLinks[k].filter(x => x.id != id);
    });
    localStorage.setItem(LS_KEY, JSON.stringify(userLinks));
    location.reload();
}

function renderManageList() {
    const all = [...userLinks.primary, ...userLinks.secondary];
    const div = document.getElementById('manageList');
    if (!all.length) { div.innerHTML = ''; return; }
    div.innerHTML = `
        <div class="admin-card">
            <div class="admin-card-title">📋 已儲存書籤（${all.length} 筆）</div>
            ${all.map(l => `
            <div class="mitem">
                <span>${l.icon} ${l.title}</span>
                <button class="del-btn" onclick="deleteLink(${l.id})">刪除</button>
            </div>`).join('')}
        </div>`;
}

/* ════════════════════════════════════
   EMOJI PICKER
════════════════════════════════════ */
(function() {
    const wrap = document.getElementById('emojiPicker');
    EMOJIS.forEach(e => {
        const el = document.createElement('div');
        el.className = 'eopt' + (e === selectedIcon ? ' sel' : '');
        el.textContent = e;
        el.onclick = () => {
            document.querySelectorAll('.eopt').forEach(d => d.classList.remove('sel'));
            el.classList.add('sel');
            selectedIcon = e;
        };
        wrap.appendChild(el);
    });
})();

/* ════════════════════════════════════
   CLOCK
════════════════════════════════════ */
const WEEKDAY = ['日','一','二','三','四','五','六'];
function tick() {
    const now = new Date();
    const hms = now.toLocaleTimeString('zh-TW', { hour12:false });
    const y   = now.getFullYear();
    const m   = String(now.getMonth()+1).padStart(2,'0');
    const d   = String(now.getDate()).padStart(2,'0');
    document.getElementById('clock').textContent = hms;
    document.getElementById('date').textContent  =
        `民國 ${y-1911} 年 ${y}/${m}/${d}（週${WEEKDAY[now.getDay()]}）`;
}

/* ════════════════════════════════════
   INIT
════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {

    // restore config
    const cfg = JSON.parse(localStorage.getItem(CFG_KEY));
    if (cfg) {
        document.getElementById('titleSlider').value = cfg.ts;
        document.getElementById('descSlider').value  = cfg.ds;
        document.getElementById('gridColSel').value  = cfg.col;
        applyStyle();
    }

    // restore color
    setColor(localStorage.getItem(COLOR_KEY) || 'blue');

    // restore theme
    const theme = localStorage.getItem(THEME_KEY);
    if (theme) {
        document.documentElement.setAttribute('data-theme', theme);
        document.getElementById('themeBtn').textContent = theme === 'light' ? '🌙' : '☀️';
    }

    // clock
    tick();
    setInterval(tick, 1000);

    // data
    fetchCloud();
});
</script>
