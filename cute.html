<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;padding:10px;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;
  background:#f2f2f7;
  overscroll-behavior:none;
}
input{display:none}

button{
  color:#000 !important;
  font-weight:500;
  -webkit-tap-highlight-color:transparent;
  transition:all 0.2s ease;
}
button:active{transform:scale(0.94)}

.topbar{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}
.topbar button{
  height:48px;
  border:none;
  border-radius:16px;
  font-size:20px;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(20px);
}

/* 🔥 背景遮罩 */
#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.25);
  backdrop-filter:blur(4px);
  z-index:999;
  opacity:0;
  pointer-events:none;
  transition:0.25s;
}
#overlay.active{
  opacity:1;
  pointer-events:auto;
}

/* 浮動按鈕 */
.fab{
  position:fixed;
  right:20px;
  bottom:80px;
  width:56px;
  height:56px;
  border-radius:50%;
  border:none;
  font-size:22px;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(20px);
  z-index:1001;
}

/* 選單 */
.fabMenu{
  position:fixed;
  right:20px;
  bottom:150px;
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:1001;

  opacity:0;
  transform:translateY(20px);
  pointer-events:none;
  transition:all 0.25s ease;
}
.fabMenu.active{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

.group{
  background:rgba(255,255,255,0.55);
  backdrop-filter:blur(25px);
  border-radius:18px;
  padding:10px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.group button{
  padding:10px 14px;
  border:none;
  background:rgba(255,255,255,0.6);
  border-radius:12px;
}

/* 日曆 */
#captureArea{
  position:relative;
  border-radius:24px;
  overflow:hidden;
  margin-top:10px;
}

#bg{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
}

#bgOverlay{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(255,255,255,0);
  z-index:1;
  pointer-events:none;
}

.header,.weekRow,.calendar{
  position:relative;
  z-index:2;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
  padding:10px;
}

.day{
  min-height:72px;
  border-radius:16px;
  background:rgba(255,255,255,var(--alpha,1));
}

.sticker{
  position:absolute;
  width:80px;
  z-index:9999;
  touch-action:none;
}
</style>
</head>

<body>

<!-- 🔥 遮罩 -->
<div id="overlay" onclick="closeMenu()"></div>

<div class="topbar">
  <button onclick="exportImage()">📸</button>
  <button onclick="stickerInput.click()">🖼️</button>
  <button onclick="bgInput.click()">🎨</button>
  <button onclick="goToday()">📅</button>
</div>

<div class="fabMenu" id="fabMenu">

  <div class="group">
    <button onclick="clearBg()">清除背景</button>
    <button onclick="clearStickers()">清除貼圖</button>
    <button onclick="clearAll()">清空班表</button>
  </div>

  <div class="group">
    <button onclick="setOpacity(1)">表格不透明</button>
    <button onclick="setOpacity(0.6)">60%透明</button>
    <button onclick="setOpacity(0.9)">90%透明</button>
  </div>

  <div class="group">
    <button onclick="setBgFade(0)">背景不淡化</button>
    <button onclick="setBgFade(0.3)">背景淡化30%</button>
    <button onclick="setBgFade(0.6)">背景淡化60%</button>
  </div>

</div>

<button class="fab" onclick="toggleFab()">⚙️</button>

<input id="stickerInput" type="file">
<input id="bgInput" type="file">

<div id="captureArea">
  <div id="bgOverlay"></div>
  <div class="calendar" id="calendar"></div>
</div>

<script>
function toggleFab(){
  fabMenu.classList.toggle("active");
  overlay.classList.toggle("active");
}

function closeMenu(){
  fabMenu.classList.remove("active");
  overlay.classList.remove("active");
}

function goToday(){}

/* 背景淡化 */
function setBgFade(v){
  document.getElementById("bgOverlay").style.background=`rgba(255,255,255,${v})`;
}

/* 上傳背景 */
bgInput.onchange=e=>{
  let file=e.target.files[0];
  if(!file)return;
  let bg=document.getElementById("bg");
  if(!bg){
    bg=document.createElement("img");
    bg.id="bg";
    captureArea.prepend(bg);
  }
  bg.src=URL.createObjectURL(file);
};

/* 貼圖 */
stickerInput.onchange=e=>{
  let file=e.target.files[0];
  if(!file)return;

  let img=document.createElement("img");
  img.src=URL.createObjectURL(file);
  img.className="sticker";

  captureArea.appendChild(img);
};

/* 其他 */
function clearBg(){document.getElementById("bg")?.remove()}
function clearStickers(){document.querySelectorAll(".sticker").forEach(s=>s.remove())}
function clearAll(){}

function setOpacity(v){
  document.documentElement.style.setProperty('--alpha',v);
}

function exportImage(){
  html2canvas(captureArea).then(canvas=>{
    let img=new Image();
    img.src=canvas.toDataURL();
    document.body.appendChild(img);
  });
}
</script>

</body>
</html>
