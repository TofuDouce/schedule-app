<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;padding:10px;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;
  background:#f2f2f7;
  overscroll-behavior:none;
}
input{display:none}

button{
  color:#000 !important;
  font-weight:500;
  -webkit-tap-highlight-color:transparent;
  transition:all 0.2s ease;
}
button:active{transform:scale(0.94)}

.topbar{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}
.topbar button{
  height:48px;
  border:none;
  border-radius:16px;
  font-size:20px;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(20px);
}

/* 浮動按鈕 */
.fab{
  position:fixed;
  right:20px;
  bottom:80px;
  width:56px;
  height:56px;
  border-radius:50%;
  border:none;
  font-size:22px;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(20px);
  box-shadow:0 6px 20px rgba(0,0,0,0.15);
  z-index:9999;
}

.fabMenu{
  position:fixed;
  right:20px;
  bottom:150px;
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:9999;
  opacity:0;
  transform:translateY(20px);
  pointer-events:none;
  transition:all 0.25s ease;
}
.fabMenu.active{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

.group{
  background:rgba(255,255,255,0.55);
  backdrop-filter:blur(25px);
  border-radius:18px;
  padding:10px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  box-shadow:0 8px 30px rgba(0,0,0,0.08);
}

.group button{
  padding:10px 14px;
  border:none;
  background:rgba(255,255,255,0.6);
  border-radius:12px;
  font-size:14px;
}

/* 日曆 */
#captureArea{
  position:relative;
  border-radius:24px;
  overflow:hidden;
  margin-top:10px;
}

#bg{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
}

#bgOverlay{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(255,255,255,0);
  z-index:1;
  pointer-events:none;
}

.header,.weekRow,.calendar{
  position:relative;
  z-index:2;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
}

.weekRow{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  padding:0 10px;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
  padding:10px;
}

.day{
  min-height:72px;
  border-radius:16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:4px;
  background:rgba(255,255,255,var(--alpha,1));
}

.shift{
  width:80%;
  border-radius:10px;
  margin-top:3px;
  font-size:11px;
  text-align:center;
}

.morning{background:#f7e7a9}
.noon{background:#f5c6aa}
.night{background:#B7E1FF}
.full{background:#d6c2f0}
.off{background:#bfe3d0}

.sunday{color:red}

.sticker{
  position:absolute;
  width:80px;
  z-index:9999;
  touch-action:none;
}

.bottom{display:flex;gap:8px;margin-top:12px}
.bottom button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
}
.bottom button:nth-child(1){background:#f7e7a9}
.bottom button:nth-child(2){background:#f5c6aa}
.bottom button:nth-child(3){background:#B7E1FF}
.bottom button:nth-child(4){background:#d6c2f0}
.bottom button:nth-child(5){background:#bfe3d0}

.bottom button.active{
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.2);
}

#preview img{
  width:100%;
  margin-top:10px;
  border-radius:16px;
}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="exportImage()">📸</button>
  <button onclick="addDefaultSticker()">⭐</button>
  <button onclick="applyDefaultBg()">🌄</button>
  <button onclick="goToday()">📅</button>
</div>

<div class="fabMenu" id="fabMenu">

  <div class="group">
    <button onclick="applyDefaultBg()">預設背景</button>
    <button onclick="addDefaultSticker()">預設貼圖</button>
  </div>

</div>

<button class="fab" onclick="toggleFab()">⚙️</button>

<input id="stickerInput" type="file">
<input id="bgInput" type="file">

<div id="captureArea">
  <div id="bgOverlay"></div>

  <div class="header">
    <button onclick="changeMonth(-1)">←</button>
    <h2 id="title"></h2>
    <button onclick="changeMonth(1)">→</button>
  </div>

  <div class="weekRow">
    <div>一</div><div>二</div><div>三</div>
    <div>四</div><div>五</div><div>六</div><div>日</div>
  </div>

  <div class="calendar" id="calendar"></div>
</div>

<div class="bottom">
  <button onclick="setType(event,'morning')">早</button>
  <button onclick="setType(event,'noon')">午</button>
  <button onclick="setType(event,'night')">晚</button>
  <button onclick="setType(event,'full')">全</button>
  <button onclick="setType(event,'off')">休</button>
</div>

<div id="preview"></div>

<script>
let selected="";
let currentDate=new Date();
let data={};

/* ⭐ 預設背景 */
function applyDefaultBg(){
  let bg=document.getElementById("bg");
  if(!bg){
    bg=document.createElement("img");
    bg.id="bg";
    captureArea.prepend(bg);
  }
  bg.src="bg-default.jpg";
}

/* ⭐ 預設貼圖 */
function addDefaultSticker(){
  let img=document.createElement("img");
  img.src="sticker1.png";
  img.className="sticker";
  img.style.left="50%";
  img.style.top="50%";
  captureArea.appendChild(img);
}

function toggleFab(){fabMenu.classList.toggle("active")}

function goToday(){currentDate=new Date();render();}

function setType(e,t){
  selected=t;
}

function changeMonth(n){currentDate.setMonth(currentDate.getMonth()+n);render()}

function render(){
  calendar.innerHTML="";
  const y=currentDate.getFullYear();
  const m=currentDate.getMonth();
  title.innerText=y+"年"+(m+1)+"月";

  let first=(new Date(y,m,1).getDay()+6)%7;
  let days=new Date(y,m+1,0).getDate();

  for(let i=0;i<first;i++) calendar.appendChild(document.createElement("div"));

  for(let i=1;i<=days;i++){
    let d=document.createElement("div");
    d.className="day";
    d.innerHTML=`<div>${i}</div>`;
    calendar.appendChild(d);
  }
}

render();
</script>

</body>
</html>
