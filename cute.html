<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="apple-touch-icon" href="Icon.PNG">
<meta name="apple-mobile-web-app-capable" content="yes">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;padding:10px;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;
  background:#f2f2f7;
  overscroll-behavior:none;
}
input{display:none}

button{
  color:#000;
  font-weight:500;
}

/* 上方 */
.topbar{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
}
.topbar button{
  height:48px;
  border:none;
  border-radius:16px;
  font-size:20px;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(20px);
}

/* 浮動 */
.fab{
  position:fixed;
  right:20px;
  bottom:90px;
  width:56px;height:56px;
  border-radius:50%;
  border:none;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(20px);
  z-index:9999;
}

/* 全螢幕素材 */
#assetFull{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#fff;
  z-index:99999;
  display:none;
  overflow:auto;
  padding:20px;
}

.assetTitle{
  font-weight:bold;
  margin:10px 0;
}

/* 日曆 */
#captureArea{
  position:relative;
  border-radius:24px;
  overflow:hidden;
  margin-top:10px;
}

#bg{
  position:absolute;
  width:100%;height:100%;
  object-fit:cover;
  z-index:0;
}

.header,.calendar{
  position:relative;
  z-index:2;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
}

.day{
  min-height:70px;
  border-radius:14px;
  background:white;
  text-align:center;
  padding-top:4px;
}

/* 貼圖 */
.sticker{
  position:absolute;
  width:80px;
  z-index:999;
  touch-action:none;
}

#preview img{
  width:100%;
  margin-top:10px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="exportImage()">📸</button>
  <button onclick="stickerInput.click()">🖼️</button>
  <button onclick="bgInput.click()">🎨</button>
  <button onclick="goToday()">📅</button>
  <button onclick="openAssets()">✨</button>
</div>

<button class="fab" onclick="openAssets()">⚙️</button>

<input id="stickerInput" type="file">
<input id="bgInput" type="file">

<div id="captureArea">
  <div class="header">
    <button onclick="changeMonth(-1)">←</button>
    <h2 id="title"></h2>
    <button onclick="changeMonth(1)">→</button>
  </div>

  <div class="calendar" id="calendar"></div>
</div>

<div id="preview"></div>

<!-- 全螢幕素材 -->
<div id="assetFull">

<button onclick="closeAssets()">⬅ 返回</button>

<div class="assetTitle">🎨 背景</div>
<div style="display:flex;gap:10px;flex-wrap:wrap;">
<img src="https://picsum.photos/300/500?1" width="100" onclick="setBg(this.src)">
<img src="https://picsum.photos/300/500?2" width="100" onclick="setBg(this.src)">
<img src="https://picsum.photos/300/500?3" width="100" onclick="setBg(this.src)">
</div>

<div class="assetTitle">✨ 貼圖</div>
<div style="display:flex;gap:10px;flex-wrap:wrap;">
<img src="https://cdn-icons-png.flaticon.com/512/742/742751.png" width="80" onclick="addSticker(this.src)">
<img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" width="80" onclick="addSticker(this.src)">
<img src="https://cdn-icons-png.flaticon.com/512/833/833472.png" width="80" onclick="addSticker(this.src)">
</div>

</div>

<script>
let currentDate=new Date();

/* 月曆 */
function render(){
  const cal=document.getElementById("calendar");
  cal.innerHTML="";
  const y=currentDate.getFullYear();
  const m=currentDate.getMonth();
  document.getElementById("title").innerText=y+"年"+(m+1)+"月";

  let days=new Date(y,m+1,0).getDate();
  for(let i=1;i<=days;i++){
    let d=document.createElement("div");
    d.className="day";
    d.innerText=i;
    cal.appendChild(d);
  }
}
function changeMonth(n){currentDate.setMonth(currentDate.getMonth()+n);render();}
function goToday(){currentDate=new Date();render();}

/* 素材頁 */
function openAssets(){document.getElementById("assetFull").style.display="block";}
function closeAssets(){document.getElementById("assetFull").style.display="none";}

/* 背景 */
function setBg(src){
  let bg=document.getElementById("bg");
  if(!bg){
    bg=document.createElement("img");
    bg.id="bg";
    document.getElementById("captureArea").prepend(bg);
  }
  bg.src=src;
}

/* 上傳背景 */
bgInput.onchange=e=>{
  let file=e.target.files[0];
  if(!file)return;
  setBg(URL.createObjectURL(file));
};

/* 貼圖 */
function addSticker(src){
  let img=document.createElement("img");
  img.src=src;
  img.className="sticker";
  img.style.left="50%";
  img.style.top="50%";

  let drag=false,ox,oy;

  img.ontouchstart=e=>{
    e.preventDefault();
    drag=true;
    ox=e.touches[0].clientX-img.offsetLeft;
    oy=e.touches[0].clientY-img.offsetTop;
  };

  img.ontouchmove=e=>{
    e.preventDefault();
    if(!drag)return;
    img.style.left=(e.touches[0].clientX-ox)+"px";
    img.style.top=(e.touches[0].clientY-oy)+"px";
  };

  img.ontouchend=()=>drag=false;

  document.getElementById("captureArea").appendChild(img);
};

/* 上傳貼圖 */
stickerInput.onchange=e=>{
  let file=e.target.files[0];
  if(!file)return;
  addSticker(URL.createObjectURL(file));
};

/* 截圖 */
function exportImage(){
  html2canvas(document.getElementById("captureArea")).then(canvas=>{
    let img=new Image();
    img.src=canvas.toDataURL();
    document.getElementById("preview").innerHTML="";
    document.getElementById("preview").appendChild(img);
  });
}

render();
</script>

</body>
</html>
