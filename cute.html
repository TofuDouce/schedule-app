<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="apple-touch-icon" href="Icon.PNG">
<meta name="apple-mobile-web-app-capable" content="yes">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;padding:10px;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;
  background:#f2f2f7;
}
input{display:none}

button{
  color:#000 !important;
  font-weight:500;
  -webkit-tap-highlight-color:transparent;
}
button:active{transform:scale(0.94)}

.topbar{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
}
.topbar button{
  height:48px;
  border:none;
  border-radius:16px;
  font-size:20px;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(20px);
}

.fab{
  position:fixed;
  right:20px;
  bottom:80px;
  width:56px;
  height:56px;
  border-radius:50%;
  border:none;
  background:rgba(255,255,255,0.85);
}

.group{
  background:rgba(255,255,255,0.55);
  backdrop-filter:blur(25px);
  border-radius:18px;
  padding:10px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

/* 日曆 */
#captureArea{
  position:relative;
  border-radius:24px;
  overflow:hidden;
  margin-top:10px;
}

#bg{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
}

.header,.weekRow,.calendar{
  position:relative;
  z-index:2;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
}

.day{
  min-height:70px;
  border-radius:16px;
  background:white;
  text-align:center;
  padding-top:4px;
}

.sticker{
  position:absolute;
  width:80px;
  z-index:999;
}

/* 素材面板 */
#assetPanel{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(20px);
  border-radius:20px 20px 0 0;
  padding:10px;
  display:none;
  z-index:9999;
}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="exportImage()">📸</button>
  <button onclick="stickerInput.click()">🖼️</button>
  <button onclick="bgInput.click()">🎨</button>
  <button onclick="goToday()">📅</button>
  <button onclick="toggleAssets()">✨</button>
</div>

<input id="stickerInput" type="file">
<input id="bgInput" type="file">

<div id="captureArea">
  <div class="header">
    <button onclick="changeMonth(-1)">←</button>
    <h2 id="title"></h2>
    <button onclick="changeMonth(1)">→</button>
  </div>

  <div class="calendar" id="calendar"></div>
</div>

<!-- 素材面板 -->
<div id="assetPanel">

<div>🎨 背景</div>
<div style="display:flex;gap:8px;overflow:auto;">
<img src="https://picsum.photos/300/500?1" onclick="setPresetBg(this.src)" width="80">
<img src="https://picsum.photos/300/500?2" onclick="setPresetBg(this.src)" width="80">
<img src="https://picsum.photos/300/500?3" onclick="setPresetBg(this.src)" width="80">
</div>

<div>✨ 貼圖</div>
<div style="display:flex;gap:8px;overflow:auto;">
<img src="https://cdn-icons-png.flaticon.com/512/742/742751.png" onclick="addSticker(this.src)" width="60">
<img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" onclick="addSticker(this.src)" width="60">
<img src="https://cdn-icons-png.flaticon.com/512/833/833472.png" onclick="addSticker(this.src)" width="60">
</div>

</div>

<script>
let currentDate=new Date();

function render(){
  calendar.innerHTML="";
  const y=currentDate.getFullYear();
  const m=currentDate.getMonth();
  title.innerText=y+"年"+(m+1)+"月";

  let days=new Date(y,m+1,0).getDate();
  for(let i=1;i<=days;i++){
    let d=document.createElement("div");
    d.className="day";
    d.innerText=i;
    calendar.appendChild(d);
  }
}

function changeMonth(n){
  currentDate.setMonth(currentDate.getMonth()+n);
  render();
}

function goToday(){
  currentDate=new Date();
  render();
}

function toggleAssets(){
  let p=document.getElementById("assetPanel");
  p.style.display=p.style.display==="block"?"none":"block";
}

function setPresetBg(src){
  let bg=document.getElementById("bg");
  if(!bg){
    bg=document.createElement("img");
    bg.id="bg";
    captureArea.prepend(bg);
  }
  bg.src=src;
}

function addSticker(src){
  let img=document.createElement("img");
  img.src=src;
  img.className="sticker";
  img.style.left="50%";
  img.style.top="50%";
  captureArea.appendChild(img);
}

bgInput.onchange=e=>{
  let file=e.target.files[0];
  if(!file)return;
  let bg=document.createElement("img");
  bg.id="bg";
  bg.src=URL.createObjectURL(file);
  captureArea.prepend(bg);
};

stickerInput.onchange=e=>{
  let file=e.target.files[0];
  if(!file)return;
  let img=document.createElement("img");
  img.src=URL.createObjectURL(file);
  img.className="sticker";
  captureArea.appendChild(img);
};

function exportImage(){
  html2canvas(captureArea).then(c=>{
    let img=new Image();
    img.src=c.toDataURL();
    document.body.appendChild(img);
  });
}

render();
</script>

</body>
</html>
