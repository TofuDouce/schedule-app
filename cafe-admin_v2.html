<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>小怪獸咖啡館 · 後台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F1E4; --dot:#E6DDC7;
  --card:#FFFCF3; --card-edge:#D9CDB0; --card-under:#DDE3CE;
  --ink:#453A28; --ink-soft:#8A7B5C; --ink-faint:#B6A886;
  --accent:#5F9E6E; --accent-dk:#477F58; --accent-pale:#E3EFDD;
  --on-accent:#FFFFFF; --input-bg:#FBF7EA;
  --danger:#D4826A; --danger-dk:#B36249;
  --scrim:#3A3223; --r:24px;
  --monster:#8C6FC6; --monster-dk:#6B4FA6; --monster-eye:#FFFDF6;
  --font:"Zen Maru Gothic",system-ui,sans-serif;
  --c-sim:#8C6FC6; --c-nov:#C4776E; --c-web:#5F9E6E;
  --c-day:#C99B45; --c-exp:#6C8FB5; --c-etc:#9A8B70;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0;font-family:var(--font);background:var(--bg);color:var(--ink);
  line-height:1.7;min-height:100svh;font-size:16px;
  background-image:radial-gradient(var(--dot) 1.5px,transparent 1.5px);
  background-size:22px 22px;
  padding:0 13px calc(46px + env(safe-area-inset-bottom));
}
.wrap{max-width:620px;margin:0 auto}

/* 紙膠帶 */
.tape{position:relative}
.tape::before{
  content:"";position:absolute;top:-11px;left:26px;width:82px;height:23px;
  background:rgba(140,111,198,.34);
  border-left:3px dotted rgba(255,255,255,.5);border-right:3px dotted rgba(255,255,255,.5);
  transform:rotate(-3.5deg);border-radius:2px;
}
.card{
  background:var(--card);border:2px solid var(--card-edge);border-radius:var(--r);
  box-shadow:0 6px 0 var(--card-under);padding:20px 18px;margin-bottom:16px;
}

/* 招牌 */
header{padding:26px 0 4px}
.sign{display:flex;align-items:center;gap:13px}
.monster{width:52px;height:46px;flex:0 0 auto;position:relative;background:var(--monster);border-radius:26px 26px 21px 21px;box-shadow:0 4px 0 var(--monster-dk)}
.monster i{position:absolute;top:16px;width:9px;height:9px;background:var(--monster-eye);border-radius:50%}
.monster i:nth-child(2){left:11px} .monster i:nth-child(3){right:11px}
.monster b{position:absolute;bottom:11px;left:50%;transform:translateX(-50%);width:15px;height:7px;border-radius:0 0 10px 10px;background:var(--monster-eye)}
.monster u{position:absolute;top:-9px;left:50%;transform:translateX(-50%);width:4px;height:11px;background:var(--monster-dk);border-radius:3px}
h1{font-size:19px;font-weight:900;margin:0;letter-spacing:.03em}
.sub{font-size:12.5px;color:var(--ink-soft);margin:0}
.eyebrow{
  font-size:11.5px;font-weight:700;letter-spacing:.16em;color:var(--ink-faint);
  margin:22px 0 9px;padding-left:2px;
}

button{font-family:var(--font);font-weight:700;cursor:pointer;border:0}
.btn{background:var(--accent);color:var(--on-accent);font-size:15px;border-radius:99px;padding:12px 20px;box-shadow:0 4px 0 var(--accent-dk)}
.btn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--accent-dk)}
.btn:disabled{background:var(--card-edge);box-shadow:0 4px 0 var(--ink-faint);cursor:not-allowed}
.btn.wide{width:100%}
.btn.ghost{background:var(--card);color:var(--ink-soft);border:2px solid var(--card-edge);box-shadow:none;font-size:13.5px;padding:10px 16px}
.btn.warn{background:var(--danger);box-shadow:0 4px 0 var(--danger-dk)}
.btn.sm{font-size:12.5px;padding:7px 15px;box-shadow:0 3px 0 var(--accent-dk)}

label.fl{display:block;font-weight:700;font-size:14px;margin:15px 0 6px}
input[type=text],textarea,select{
  width:100%;font-family:var(--font);font-size:15.5px;color:var(--ink);
  background:var(--input-bg);border:2px solid var(--card-edge);
  border-radius:15px;padding:12px 14px;transition:box-shadow .2s,border-color .2s;
}
textarea{min-height:74px;resize:vertical;line-height:1.6}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-pale)}

.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.row .btn{flex:1;min-width:118px}

/* 分類選擇 */
.cats{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.cat{
  font-size:13.5px;font-weight:700;padding:8px 15px;border-radius:99px;cursor:pointer;
  background:var(--input-bg);border:2px solid var(--card-edge);color:var(--ink-soft);
}
.cat.on{color:#fff;border-color:transparent}
.cat.on[data-c="模擬器"]{background:var(--c-sim)}
.cat.on[data-c="小說"]{background:var(--c-nov)}
.cat.on[data-c="網站工具"]{background:var(--c-web)}
.cat.on[data-c="日常工具"]{background:var(--c-day)}
.cat.on[data-c="實驗性質"]{background:var(--c-exp)}
.cat.on[data-c="其他"]{background:var(--c-etc)}
.cat.on[data-c="全部"]{background:var(--ink);}

.toggles{display:flex;gap:10px;margin-top:12px}
.tg{
  flex:1;text-align:center;background:var(--input-bg);border:2px solid var(--card-edge);
  border-radius:16px;padding:11px 6px;font-size:14px;font-weight:700;color:var(--ink-soft);cursor:pointer;
}
.tg.on{background:var(--accent-pale);border-color:var(--accent);color:var(--accent-dk)}
.tg small{display:block;font-weight:500;font-size:11.5px;color:var(--ink-faint)}

.file{
  display:block;text-align:center;background:var(--input-bg);
  border:2px dashed var(--card-edge);border-radius:18px;padding:22px 12px;
  font-size:14.5px;font-weight:700;color:var(--accent-dk);cursor:pointer;
}
.file input{display:none}
.gauge{height:9px;background:var(--input-bg);border:2px solid var(--card-edge);border-radius:99px;overflow:hidden;margin-top:10px}
.gauge span{display:block;height:100%;width:0;background:var(--accent);transition:width .3s}
.gauge.bad span{background:var(--danger)}
.meter{font-size:12.5px;color:var(--ink-soft);text-align:center;margin-top:6px}
.meter.bad{color:var(--danger-dk);font-weight:700}

/* 作品卡 */
.grid{display:grid;gap:12px}
.work{
  position:relative;background:var(--card);border:2px solid var(--card-edge);
  border-radius:20px;box-shadow:0 4px 0 var(--card-under);
  padding:15px 15px 14px 19px;overflow:hidden;cursor:pointer;
}
.work:active{transform:translateY(2px);box-shadow:0 2px 0 var(--card-under)}
.work .stripe{position:absolute;left:0;top:0;bottom:0;width:7px}
.work .nm{font-weight:700;font-size:16px;line-height:1.4}
.work .ds{font-size:13px;color:var(--ink-soft);margin-top:2px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.work .mt{display:flex;align-items:center;gap:7px;margin-top:9px;font-size:11.5px;color:var(--ink-faint)}
.chip{font-size:11.5px;font-weight:700;padding:2px 10px;border-radius:99px;color:#fff}
.chip.lock{background:var(--monster)}
.chip.open{background:var(--accent)}
.star{color:var(--c-day);font-size:14px}
.empty{text-align:center;color:var(--ink-faint);font-size:14px;padding:34px 10px;line-height:2}

#err{display:none;background:#FBEAE4;border:2px solid var(--danger);color:var(--danger-dk);border-radius:18px;padding:13px 15px;font-size:13.5px;margin-bottom:14px}
#err a{color:var(--danger-dk);font-weight:900}
#ok{
  display:none;position:fixed;left:50%;bottom:calc(24px + env(safe-area-inset-bottom));
  transform:translateX(-50%);z-index:60;
  background:var(--accent);color:#fff;font-weight:700;font-size:14px;
  padding:12px 26px;border-radius:99px;box-shadow:0 5px 0 var(--accent-dk);white-space:nowrap;
}
.hide{display:none!important}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="sign">
      <div class="monster"><u></u><i></i><i></i><b></b></div>
      <div style="flex:1;min-width:0">
        <h1>咖啡館後台</h1>
        <p class="sub" id="who">尚未登入</p>
      </div>
      <button class="btn ghost hide" id="btnOut">登出</button>
    </div>
  </header>

  <div id="err"></div>

  <!-- 登入 -->
  <div class="card tape" id="gate">
    <p style="margin:0 0 12px;font-size:14.5px">打烊中。只有老闆能進來。</p>
    <button class="btn wide" id="btnIn">用 Google 登入</button>
  </div>

  <!-- 清單 -->
  <div class="hide" id="listView">
    <button class="btn wide" id="btnNew">收一件新作品</button>
    <div class="eyebrow" id="countLine">架上的作品</div>
    <div class="cats" id="filters"></div>
    <div class="grid" id="list" style="margin-top:14px"></div>
  </div>

  <!-- 編輯 -->
  <div class="hide" id="editView">
    <div class="card tape">
      <h1 id="edTitle" style="margin-bottom:2px">收一件新作品</h1>
      <p class="sub">程式碼會整份存進資料庫，不需要另外放檔案。</p>

      <div class="eyebrow">基本資料</div>
      <label class="fl" for="fName">名稱</label>
      <input type="text" id="fName" placeholder="小怪獸咖啡館">
      <label class="fl" for="fDesc">一句話說明</label>
      <textarea id="fDesc" placeholder="把積木跟糖果罐合在一起的網站產生器"></textarea>
      <label class="fl">分類</label>
      <div class="cats" id="catPick"></div>

      <div class="eyebrow">程式碼</div>
      <label class="file">
        <span id="fileLabel">從「檔案」選一個 HTML 檔</span>
        <input type="file" id="fFile" accept=".html,.htm,text/html">
      </label>
      <div class="gauge" id="gauge"><span></span></div>
      <div class="meter" id="meter">還沒有程式碼</div>

      <div class="eyebrow">上架設定</div>
      <div class="toggles">
        <div class="tg on" id="tgPub">公開<small>大家看得到</small></div>
        <div class="tg" id="tgLock">加鎖<small>只有你看得到</small></div>
      </div>
      <div class="toggles">
        <div class="tg" id="tgPin">釘選在最前面</div>
      </div>

      <div class="row">
        <button class="btn" id="btnSave">儲存</button>
        <button class="btn ghost" id="btnPrev">另開視窗預覽</button>
      </div>
      <div class="row">
        <button class="btn ghost" id="btnDown">下載原始碼</button>
        <button class="btn ghost" id="btnCancel">回架上</button>
      </div>
      <div class="row">
        <button class="btn warn wide hide" id="btnDel">刪掉這件作品</button>
      </div>
    </div>
  </div>

</div>
<div id="ok"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getFirestore, collection, doc, getDoc, getDocs, setDoc, deleteDoc }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyC4oq_W36ji4o6p7p2JxLS2FKc-gITFJ4I",
  authDomain: "monster-cafe-79d56.firebaseapp.com",
  projectId: "monster-cafe-79d56",
  storageBucket: "monster-cafe-79d56.firebasestorage.app",
  messagingSenderId: "327222778800",
  appId: "1:327222778800:web:a38e81d92c8def3621d475"
};
const OWNER = 'CbBcZ01ymNQou4X6HMfNMtEgXRl2';
const MAX = 900000;
const CATS = ['模擬器','小說','網站工具','日常工具','實驗性質','其他'];
const COLOR = {'模擬器':'var(--c-sim)','小說':'var(--c-nov)','網站工具':'var(--c-web)',
  '日常工具':'var(--c-day)','實驗性質':'var(--c-exp)','其他':'var(--c-etc)'};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const $ = id => document.getElementById(id);
const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function err(msg, html){
  const e = $('err');
  if(html) e.innerHTML = msg; else e.textContent = msg;
  e.style.display = 'block';
  window.scrollTo({ top:0, behavior:'smooth' });
}
function clearErr(){ $('err').style.display = 'none'; }
function ok(msg){
  const e = $('ok');
  e.textContent = msg; e.style.display = 'block';
  clearTimeout(ok._t);
  ok._t = setTimeout(() => { e.style.display = 'none'; }, 2400);
}
function friendly(e){
  const c = (e && e.code) || '';
  if(c.includes('permission-denied')) return '權限被擋下來了。請確認 Firebase 規則已發布，而且集合寫的是 {doc=**}。';
  if(c.includes('unauthorized-domain')) return '這個網域還沒授權。Firebase → Authentication → 設定 → 已授權網域，加入 tofudouce.github.io。';
  if(c.includes('popup-blocked')) return '彈出視窗被擋住了。網址列左邊「ᴀA」→ 網站設定 → 允許彈出式視窗。';
  if(c.includes('popup-closed')) return '登入視窗被關掉了，再按一次就好。';
  if(c.includes('unavailable')) return '連不上資料庫，請檢查網路後再試。';
  return '出錯了：' + ((e && e.message) || e);
}

let cur = null, code = '', works = [], filter = '全部';

// 分類按鈕
$('catPick').innerHTML = CATS.map((c, i) =>
  '<div class="cat' + (i === 0 ? ' on' : '') + '" data-c="' + c + '">' + c + '</div>').join('');
$('catPick').addEventListener('click', e => {
  const t = e.target.closest('.cat'); if(!t) return;
  $('catPick').querySelectorAll('.cat').forEach(x => x.classList.toggle('on', x === t));
});
const pickedCat = () => { const on = $('catPick').querySelector('.cat.on'); return on ? on.dataset.c : '其他'; };
const setCat = c => $('catPick').querySelectorAll('.cat').forEach(x => x.classList.toggle('on', x.dataset.c === c));

$('filters').innerHTML = ['全部'].concat(CATS).map((c, i) =>
  '<div class="cat' + (i === 0 ? ' on' : '') + '" data-c="' + c + '">' + c + '</div>').join('');
$('filters').addEventListener('click', e => {
  const t = e.target.closest('.cat'); if(!t) return;
  filter = t.dataset.c;
  $('filters').querySelectorAll('.cat').forEach(x => x.classList.toggle('on', x === t));
  paintList();
});

// 登入
$('btnIn').addEventListener('click', async () => {
  clearErr();
  try{ await signInWithPopup(auth, new GoogleAuthProvider()); }
  catch(e){ err(friendly(e)); }
});
$('btnOut').addEventListener('click', () => signOut(auth));

onAuthStateChanged(auth, async user => {
  if(!user){
    $('who').textContent = '尚未登入';
    $('gate').classList.remove('hide');
    $('btnOut').classList.add('hide');
    $('listView').classList.add('hide');
    $('editView').classList.add('hide');
    return;
  }
  if(user.uid !== OWNER){
    $('who').textContent = '這個帳號不是老闆';
    err('登入的帳號不是老闆本人。請登出換一個帳號。');
    $('btnOut').classList.remove('hide');
    $('gate').classList.add('hide');
    return;
  }
  $('who').textContent = user.displayName + '，歡迎回來';
  $('gate').classList.add('hide');
  $('btnOut').classList.remove('hide');
  $('listView').classList.remove('hide');
  await loadList();
});

// 清單
async function loadList(){
  clearErr();
  $('list').innerHTML = '<div class="empty">正在把作品端上來⋯⋯</div>';
  works = [];
  try{
    for(const coll of ['posts_public','posts_private']){
      const snap = await getDocs(collection(db, coll));
      snap.forEach(d => works.push(Object.assign({ id:d.id, coll }, d.data())));
    }
  }catch(e){ err(friendly(e)); $('list').innerHTML = ''; return; }
  works.sort((a, b) => (b.pinned?1:0) - (a.pinned?1:0) || (b.updated||0) - (a.updated||0));
  paintList();
}

function paintList(){
  const rows = works.filter(w => filter === '全部' || w.cat === filter);
  $('countLine').textContent = '架上的作品　' + works.length + ' 件';
  if(!rows.length){
    $('list').innerHTML = works.length
      ? '<div class="empty">這個分類還是空的。</div>'
      : '<div class="empty">架上還空著。<br>按上面那顆按鈕，收第一件作品進來。</div>';
    return;
  }
  $('list').innerHTML = rows.map(w =>
    '<div class="work" data-id="' + w.coll + '/' + w.id + '">' +
      '<div class="stripe" style="background:' + (COLOR[w.cat] || 'var(--c-etc)') + '"></div>' +
      '<div class="nm">' + (w.pinned ? '<span class="star">★</span> ' : '') + esc(w.name) + '</div>' +
      (w.desc ? '<div class="ds">' + esc(w.desc) + '</div>' : '') +
      '<div class="mt">' +
        '<span class="chip ' + (w.coll === 'posts_private' ? 'lock">加鎖' : 'open">公開') + '</span>' +
        esc(w.cat || '其他') + '　' + Math.round((w.size||0)/1024) + ' KB' +
      '</div>' +
    '</div>'
  ).join('');
  $('list').querySelectorAll('.work').forEach(el => {
    el.addEventListener('click', () => {
      const [coll, id] = el.dataset.id.split('/');
      openEdit(works.find(w => w.coll === coll && w.id === id));
    });
  });
}

// 編輯
function setMeter(){
  const g = $('gauge'), m = $('meter');
  if(!code){
    g.querySelector('span').style.width = '0';
    g.classList.remove('bad'); m.classList.remove('bad');
    m.textContent = '還沒有程式碼';
    return;
  }
  const b = new Blob([code]).size;
  const pct = Math.min(100, b / MAX * 100);
  g.querySelector('span').style.width = pct + '%';
  g.classList.toggle('bad', b > MAX);
  m.classList.toggle('bad', b > MAX);
  m.textContent = b > MAX
    ? Math.round(b/1024) + ' KB，超過 880 KB 上限，存不進去'
    : Math.round(b/1024) + ' KB　／　上限 880 KB';
}
function setLock(v){
  $('tgPub').classList.toggle('on', !v);
  $('tgLock').classList.toggle('on', v);
}
$('tgPub').addEventListener('click', () => setLock(false));
$('tgLock').addEventListener('click', () => setLock(true));
$('tgPin').addEventListener('click', e => e.currentTarget.classList.toggle('on'));

function showEdit(){
  $('listView').classList.add('hide');
  $('editView').classList.remove('hide');
  window.scrollTo({ top:0, behavior:'smooth' });
}

$('btnNew').addEventListener('click', () => {
  cur = null; code = '';
  $('edTitle').textContent = '收一件新作品';
  $('fName').value = ''; $('fDesc').value = '';
  $('fFile').value = ''; $('fileLabel').textContent = '從「檔案」選一個 HTML 檔';
  setCat('模擬器'); setLock(false);
  $('tgPin').classList.remove('on');
  setMeter();
  $('btnDel').classList.add('hide');
  showEdit();
});

async function openEdit(w){
  if(!w) return;
  clearErr();
  cur = w; code = '';
  $('edTitle').textContent = '編輯作品';
  $('fName').value = w.name || '';
  $('fDesc').value = w.desc || '';
  $('fFile').value = ''; $('fileLabel').textContent = '換一個 HTML 檔';
  setCat(w.cat || '其他');
  setLock(w.coll === 'posts_private');
  $('tgPin').classList.toggle('on', !!w.pinned);
  $('meter').textContent = '讀取程式碼中⋯⋯';
  $('btnDel').classList.remove('hide');
  showEdit();
  try{
    const snap = await getDoc(doc(db, w.coll, w.id, 'blob', 'source'));
    code = snap.exists() ? (snap.data().code || '') : '';
  }catch(e){ err(friendly(e)); }
  setMeter();
}

$('fFile').addEventListener('change', e => {
  const f = e.target.files && e.target.files[0];
  if(!f) return;
  const r = new FileReader();
  r.onload = () => {
    code = r.result;
    $('fileLabel').textContent = f.name;
    if(!$('fName').value) $('fName').value = f.name.replace(/\.html?$/i, '');
    setMeter();
  };
  r.onerror = () => err('這個檔案讀不起來，換一個試試。');
  r.readAsText(f, 'utf-8');
});

$('btnSave').addEventListener('click', async () => {
  clearErr();
  const name = $('fName').value.trim();
  if(!name){ err('先給它一個名稱。'); return; }
  if(!code){ err('還沒選程式碼檔案。'); return; }
  const size = new Blob([code]).size;
  if(size > MAX){ err('這份檔案 ' + Math.round(size/1024) + ' KB，超過 880 KB 上限，存不進去。'); return; }

  const isLock = $('tgLock').classList.contains('on');
  const coll = isLock ? 'posts_private' : 'posts_public';
  const id = cur ? cur.id : (Date.now().toString(36) + Math.random().toString(36).slice(2, 7));
  const btn = $('btnSave');
  btn.disabled = true; btn.textContent = '儲存中⋯⋯';
  try{
    await setDoc(doc(db, coll, id), {
      name, desc: $('fDesc').value.trim(), cat: pickedCat(),
      pinned: $('tgPin').classList.contains('on'),
      size, updated: Date.now()
    });
    await setDoc(doc(db, coll, id, 'blob', 'source'), { code });
    if(cur && cur.coll !== coll){
      await deleteDoc(doc(db, cur.coll, cur.id, 'blob', 'source'));
      await deleteDoc(doc(db, cur.coll, cur.id));
    }
    backToList();
    ok('已收進架上');
  }catch(e){ err(friendly(e)); }
  finally{ btn.disabled = false; btn.textContent = '儲存'; }
});

$('btnDel').addEventListener('click', async () => {
  if(!cur) return;
  if(!confirm('「' + cur.name + '」會被永久刪掉，包含程式碼。確定嗎？')) return;
  clearErr();
  try{
    await deleteDoc(doc(db, cur.coll, cur.id, 'blob', 'source'));
    await deleteDoc(doc(db, cur.coll, cur.id));
    backToList();
    ok('已經刪掉了');
  }catch(e){ err(friendly(e)); }
});

// 另開視窗預覽
$('btnPrev').addEventListener('click', () => {
  clearErr();
  if(!code){ err('還沒有程式碼可以預覽。'); return; }
  const url = URL.createObjectURL(new Blob([code], { type:'text/html' }));
  const w = window.open(url, '_blank');
  if(!w){
    err('Safari 擋住了新視窗。<a href="' + url + '" target="_blank" rel="noopener">點這裡手動開啟</a>，或到網址列左邊「ᴀA」→ 網站設定 → 允許彈出式視窗。', true);
    return;
  }
  setTimeout(() => URL.revokeObjectURL(url), 60000);
});

$('btnDown').addEventListener('click', () => {
  clearErr();
  if(!code){ err('還沒有程式碼可以下載。'); return; }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([code], { type:'text/html' }));
  a.download = ($('fName').value.trim() || 'work') + '.html';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 4000);
});

$('btnCancel').addEventListener('click', backToList);

function backToList(){
  cur = null; code = '';
  $('editView').classList.add('hide');
  $('listView').classList.remove('hide');
  loadList();
  window.scrollTo({ top:0, behavior:'smooth' });
}
</script>
</body>
</html>
