function render() {
  const q = document.getElementById('searchBox').value.trim().toLowerCase();

  if (q) {

      ${b.note ? `<span class="bm-note">${escHtml(b.note)}</span>` : ''}

  if (editMode) {
    return `<div class="bm-row em" onclick="openEditModal(${i})">

      <button class="row-del" title="刪除" onclick="event.stopPropagation();deleteBookmark(${i})">✕</button>

  }
  return `<a class="bm-row" href="${b.url}" target="_blank" rel="noopener">${ico}${main}<span class="bm-open">↗</span></a>`;
}

// ── Export source code (self-rebaking) ──
function buildSource() {
  const root = document.documentElement;
  const list = document.getElementById('list'); const listHtml = list.innerHTML; list.innerHTML = '';
  const sb = document.getElementById('searchBox'); const sv = sb.value; sb.value = '';
  const prevTheme = root.getAttribute('data-theme'); root.setAttribute('data-theme', '');
  const prevDens = root.getAttribute('data-density'); root.setAttribute('data-density', 'comfort');
  const shown = document.querySelectorAll('.settings-overlay.show, .modal-overlay.show');
  shown.forEach(o => o.classList.remove('show'));

  const dataStr = JSON.stringify(DATA).replace(/<\//g, '<\\/');
  const M1 = '/*' + '<BMS>' + '*/';
  const M2 = '/*' + '</BMS>' + '*/';
  const re = new RegExp('/\\*<BMS>\\*/[\\s\\S]*?/\\*<\\/BMS>\\*/');
  let src = '<!DOCTYPE html>\n' + root.outerHTML;
  src = src.replace(re, M1 + dataStr + M2);

  // restore live DOM
  list.innerHTML = listHtml; sb.value = sv;
  if (prevTheme !== null) root.setAttribute('data-theme', prevTheme);
  if (prevDens !== null) root.setAttribute('data-density', prevDens);
  shown.forEach(o => o.classList.add('show'));
  return src;
}
function downloadSource() {
  const src = buildSource();
  const blob = new Blob([src], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'Bookmark.html';
  a.click();
  URL.revokeObjectURL(a.href);
  setDirty(false);
  showToast('已下載 Bookmark.html ✓');
}
function copySource() {
  const src = buildSource();
  navigator.clipboard.writeText(src).then(() => {
    setDirty(false);
    showToast('原始碼已複製 ✓ 可貼進 GitHub');
  }).catch(() => showToast('複製失敗，請改用下載'));
}

  setDirty(false); render();
  closeModal('exportModal');
  showToast('已重設為網頁內建書籤');
}
function openExport() { document.getElementById('exportModal').classList.add('show'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Init ──
applyTheme(S.theme);
document.documentElement.setAttribute('data-density', S.density || 'comfort');
applyTextVars();
setDirty(dirty);
render();
</script>
