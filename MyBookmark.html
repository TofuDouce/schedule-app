<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg1:#fff9f6;--bg2:#ffebe3;--card:#fff;--text:#54433a;--sub:#8e7a70;--accent:#f6c86c;--ah:#efb94d;--pink:#f79999;--border:rgba(142,122,112,0.12);--fs:18px;}
body{min-height:100vh;background:linear-gradient(160deg,var(--bg1),var(--bg2));font-family:"Zen Maru Gothic","Quicksand",sans-serif;font-size:var(--fs);color:var(--text);padding:20px;overflow-x:hidden;}
.decor-border{position:fixed;inset:8px;border:2px dashed var(--border);border-radius:24px;pointer-events:none;}
.container{max-width:1100px;margin:auto;position:relative;z-index:2;}
.fc{display:flex;justify-content:flex-end;gap:7px;margin-bottom:16px;}.fb{border:1.5px solid var(--border);background:var(--card);color:var(--text);padding:6px 12px;border-radius:999px;cursor:pointer;font-family:inherit;font-size:0.68em;font-weight:700;transition:0.2s;}.fb:hover,.fb.on{background:var(--accent);border-color:var(--accent);}
.hero{text-align:center;margin-bottom:26px;}
.hero-deco{font-size:1.4em;letter-spacing:4px;margin-bottom:4px;}
.badge{display:inline-block;background:rgba(246,200,108,0.15);color:var(--ah);padding:5px 15px;border-radius:999px;font-size:0.68em;font-weight:700;margin-bottom:10px;}
.site-title{font-size:clamp(26px,5vw,44px);line-height:1.4;font-weight:700;}
.site-sub{color:var(--sub);margin-top:7px;font-size:0.78em;line-height:1.8;}
.site-deco{font-size:0.6em;color:rgba(142,122,112,0.3);margin-top:4px;letter-spacing:2px;}
.sw{max-width:660px;margin:0 auto 20px;}.si{width:100%;padding:12px 17px;border:1.5px solid var(--border);border-radius:15px;background:var(--card);font-family:inherit;font-size:0.8em;color:var(--text);}.si:focus{outline:none;border-color:var(--accent);}
.fb-bar{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:20px;}.fc-btn{border:none;background:#fff6ea;color:#b07910;padding:8px 14px;border-radius:999px;cursor:pointer;font-size:0.63em;font-weight:700;font-family:inherit;transition:0.2s;}.fc-btn:hover{background:#ffe8be;}.fc-btn.on{background:var(--accent);color:var(--text);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
.card{background:var(--card);border-radius:18px;padding:16px;border:1px solid var(--border);box-shadow:0 5px 16px rgba(84,67,58,0.05);transition:0.25s;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--pink));transform:scaleX(0);transform-origin:left;transition:0.25s;}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 28px rgba(84,67,58,0.1);}
.card:hover::before{transform:scaleX(1);}
.card-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.card-favicon{width:18px;height:18px;border-radius:4px;object-fit:cover;flex-shrink:0;}
.card-icon{font-size:28px;margin-bottom:10px;}
.card-body{}
.card-title{font-size:0.95em;font-weight:700;margin-bottom:5px;word-break:break-word;}
.card-desc{color:var(--sub);font-size:0.7em;line-height:1.6;margin-bottom:7px;}
.open-btn{display:inline-block;border:none;background:var(--accent);color:var(--text);padding:8px 16px;border-radius:11px;font-family:inherit;font-size:0.65em;font-weight:700;cursor:pointer;transition:0.2s;text-decoration:none;margin-top:8px;}
.open-btn:hover{background:var(--ah);}
.footer{text-align:center;margin-top:46px;color:var(--sub);font-size:0.65em;line-height:2.2;}
.wm{position:fixed;right:18px;bottom:18px;color:rgba(142,122,112,0.35);font-size:11px;pointer-events:none;}
.empty{text-align:center;color:var(--sub);padding:60px;font-size:0.85em;}
</style></head><body>

const CATS=[{"id":"c1781671678054","name":"生活工具","icon":"☁"},{"id":"c1781671678055","name":"模擬器","icon":"🔮"},{"id":"c1781671678056","name":"產生器","icon":"✨"},{"id":"c1781671678057","name":"小小樂園","icon":"🎮"},{"id":"c1781671678058","name":"暫存工事中","icon":"🫧"},{"id":"c1781671678059","name":"煉金術","icon":"💰"}];
let cur='all';
function render(){
  const kw=(document.getElementById('si')||{value:''}).value.toLowerCase();
  const f=BMS.filter(b=>{
    const mc=cur==='all'||b.cat===cur;
    const mk=!kw||(b.title||'').toLowerCase().includes(kw)||(b.url||'').toLowerCase().includes(kw)||(b.note||'').toLowerCase().includes(kw);
    return mc&&mk;
  });
  const g=document.getElementById('grid');
  if(!f.length){g.innerHTML='<div class="empty">☁ 沒有找到書籤 (˘ω˘)</div>';return;}
  g.innerHTML=f.map(b=>`<div class="card">
        <div class="card-icon">${b.icon||'✨'}</div>
        
        <div class="card-body">
          <div class="card-top">
            ${true&&b.url?'<img class="card-favicon" src="https://www.google.com/s2/favicons?domain='+encodeURIComponent(b.url)+'&sz=32" onerror="this.style.display=\'none\'">':'' }

}
function setC(id,el){cur=id;document.querySelectorAll('.fc-btn').forEach(b=>b.classList.remove('on'));el.classList.add('on');render();}
