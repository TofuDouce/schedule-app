<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>我是誰 · 取得 UID</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F1E4; --dot:#E6DDC7;
  --card:#FFFCF3; --card-edge:#D9CDB0; --card-under:#DDE3CE;
  --ink:#453A28; --ink-soft:#8A7B5C; --ink-faint:#B6A886;
  --accent:#5F9E6E; --accent-dk:#477F58; --accent-pale:#E3EFDD;
  --on-accent:#FFFFFF; --input-bg:#FBF7EA;
  --danger:#D4826A; --danger-dk:#B36249;
  --r:24px; --monster:#8C6FC6; --monster-dk:#6B4FA6; --monster-eye:#FFFDF6;
  --font:"Zen Maru Gothic",system-ui,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0;font-family:var(--font);background:var(--bg);color:var(--ink);
  line-height:1.8;min-height:100svh;
  background-image:radial-gradient(var(--dot) 1.5px,transparent 1.5px);
  background-size:22px 22px;
  padding:24px 14px calc(40px + env(safe-area-inset-bottom));
}
.wrap{max-width:520px;margin:0 auto}
.card{
  background:var(--card);border:2px solid var(--card-edge);border-radius:var(--r);
  box-shadow:0 6px 0 var(--card-under);padding:22px 18px;margin-bottom:16px;
}
.monster{width:70px;height:62px;margin:0 auto 12px;position:relative;background:var(--monster);border-radius:36px 36px 28px 28px;box-shadow:0 4px 0 var(--monster-dk)}
.monster i{position:absolute;top:22px;width:12px;height:12px;background:var(--monster-eye);border-radius:50%}
.monster i:nth-child(1){left:15px} .monster i:nth-child(2){right:15px}
.monster b{position:absolute;bottom:15px;left:50%;transform:translateX(-50%);width:19px;height:8px;border-radius:0 0 12px 12px;background:var(--monster-eye)}
h1{font-size:20px;font-weight:900;text-align:center;margin:0 0 4px}
.sub{text-align:center;color:var(--ink-soft);font-size:13.5px;margin:0}
label{display:block;font-weight:700;font-size:14.5px;margin:0 0 8px}
textarea{
  width:100%;min-height:130px;font-family:ui-monospace,Menlo,monospace;font-size:12.5px;
  line-height:1.6;background:var(--input-bg);color:var(--ink);
  border:2px solid var(--card-edge);border-radius:16px;padding:12px;resize:vertical;
}
textarea:focus{outline:none;border-color:var(--accent)}
.hint{font-size:12.5px;color:var(--ink-faint);margin-top:8px}
button{
  width:100%;font-family:var(--font);font-weight:700;font-size:16px;
  border:0;border-radius:99px;padding:14px;margin-top:14px;cursor:pointer;
  background:var(--accent);color:var(--on-accent);box-shadow:0 4px 0 var(--accent-dk);
}
button:active{transform:translateY(2px);box-shadow:0 2px 0 var(--accent-dk)}
button:disabled{background:var(--card-edge);color:#fff;box-shadow:0 4px 0 var(--ink-faint);cursor:not-allowed}
button.ghost{background:var(--card);color:var(--ink-soft);border:2px solid var(--card-edge);box-shadow:none;font-size:13.5px;padding:11px}
#uidBox{display:none}
.uid{
  font-family:ui-monospace,Menlo,monospace;font-size:15px;word-break:break-all;
  background:var(--accent-pale);border:2px dashed var(--accent);border-radius:16px;
  padding:14px;margin:10px 0 0;text-align:center;
}
.who{font-size:13.5px;color:var(--ink-soft);text-align:center}
#err{
  display:none;background:#FBEAE4;border:2px solid var(--danger);color:var(--danger-dk);
  border-radius:16px;padding:12px 14px;font-size:13.5px;margin-top:14px;
}
.done{font-size:13.5px;color:var(--ink-soft);text-align:center;margin:14px 0 0}
</style>
</head>
<body>
<div class="wrap">

  <div class="card">
    <div class="monster"><i></i><i></i><b></b></div>
    <h1>我是誰</h1>
    <p class="sub">登入一次，拿到你的 UID。用完就可以刪掉這個檔案。</p>
  </div>

  <div class="card">
    <label for="cfg">把 firebaseConfig 整段貼進來</label>
    <textarea id="cfg" spellcheck="false" placeholder="const firebaseConfig = {&#10;  apiKey: &quot;...&quot;,&#10;  authDomain: &quot;...&quot;,&#10;  projectId: &quot;...&quot;&#10;};"></textarea>
    <div class="hint">貼上去就會自動記住，下次打開不用再貼。</div>
    <button id="btnLogin" disabled>用 Google 登入</button>
    <div id="err"></div>
  </div>

  <div class="card" id="uidBox">
    <p class="who" id="who"></p>
    <div class="uid" id="uid"></div>
    <button id="btnCopy">複製 UID</button>
    <button class="ghost" id="btnClear">換一組設定</button>
    <p class="done">拿到了就回說明書打勾，繼續第七章。</p>
  </div>

</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

const NS = 'mcWhoAmI_v1';
const $ = id => document.getElementById(id);
const cfgEl = $('cfg'), btn = $('btnLogin'), errEl = $('err');

function showErr(msg){ errEl.textContent = msg; errEl.style.display = 'block'; }
function clearErr(){ errEl.style.display = 'none'; }

function parseConfig(text){
  const s = text.indexOf('{'), e = text.lastIndexOf('}');
  if(s < 0 || e < 0) return null;
  try{
    const obj = new Function('return (' + text.slice(s, e + 1) + ')')();
    return (obj && obj.apiKey && obj.projectId) ? obj : null;
  }catch(err){ return null; }
}

function refresh(){
  btn.disabled = !parseConfig(cfgEl.value);
}

try{
  const saved = localStorage.getItem(NS);
  if(saved) cfgEl.value = saved;
}catch(err){}
refresh();

cfgEl.addEventListener('input', () => {
  clearErr();
  refresh();
  try{ localStorage.setItem(NS, cfgEl.value); }
  catch(err){ showErr('設定存不起來，可能是開了無痕模式。功能還是可以用，只是下次要重貼。'); }
});

btn.addEventListener('click', async () => {
  clearErr();
  const cfg = parseConfig(cfgEl.value);
  if(!cfg){ showErr('這段設定看起來不完整。請回 Firebase 專案設定，重新複製一次。'); return; }
  btn.disabled = true;
  btn.textContent = '登入中⋯⋯';
  try{
    const auth = getAuth(initializeApp(cfg));
    const res = await signInWithPopup(auth, new GoogleAuthProvider());
    $('who').textContent = res.user.displayName + ' 的身分編號';
    $('uid').textContent = res.user.uid;
    $('uidBox').style.display = 'block';
    btn.textContent = '已登入';
    $('uidBox').scrollIntoView({ behavior:'smooth', block:'center' });
  }catch(err){
    const code = err && err.code ? err.code : '';
    let msg = '登入失敗：' + (err && err.message ? err.message : '未知錯誤');
    if(code.includes('popup-blocked')) msg = '彈出視窗被 Safari 擋住了。請在網址列左邊「ᴀA」→ 網站設定 → 允許彈出式視窗，再試一次。';
    else if(code.includes('unauthorized-domain')) msg = '這個網域還沒授權。請回 Firebase → Authentication → 設定 → 已授權網域，把 tofudouce.github.io 加進去。';
    else if(code.includes('operation-not-allowed')) msg = 'Google 登入還沒開啟。請回 Firebase → Authentication → Sign-in method，把 Google 打開。';
    else if(code.includes('popup-closed')) msg = '登入視窗被關掉了，再按一次就好。';
    showErr(msg);
    btn.disabled = false;
    btn.textContent = '用 Google 登入';
  }
});

$('btnCopy').addEventListener('click', async e => {
  const t = $('uid').textContent;
  try{
    await navigator.clipboard.writeText(t);
    e.currentTarget.textContent = '已複製';
    setTimeout(() => { e.currentTarget.textContent = '複製 UID'; }, 2000);
  }catch(err){
    e.currentTarget.textContent = '複製失敗，請長按上面那串字選取';
  }
});

$('btnClear').addEventListener('click', () => {
  try{ localStorage.removeItem(NS); }catch(err){}
  cfgEl.value = '';
  $('uidBox').style.display = 'none';
  btn.textContent = '用 Google 登入';
  refresh();
  cfgEl.scrollIntoView({ behavior:'smooth', block:'center' });
});
</script>
</body>
</html>
