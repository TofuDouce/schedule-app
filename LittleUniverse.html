<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>✨ Little Universe</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg1:#120f1d;
    --bg2:#201630;
    --bg3:#2d1f48;

    --gold:#d8bf8a;

    --text:#f7f2ff;

    --soft:#d8c8ff;
}

body{

    min-height:100vh;

    overflow-x:hidden;

    color:white;

    font-family:
    "Cormorant Garamond",
    serif;

    background:

    radial-gradient(
    circle at top,
    rgba(180,150,255,.18),
    transparent 30%
    ),

    linear-gradient(
    180deg,
    var(--bg1),
    var(--bg2),
    var(--bg3)
    );

    padding:30px;

    position:relative;
}

/* 星空 */

.stars{

    position:fixed;

    inset:0;

    z-index:-5;

    overflow:hidden;
}

.star{

    position:absolute;

    width:2px;
    height:2px;

    background:white;

    border-radius:50%;

    opacity:.7;

    animation:twinkle 4s infinite;
}

@keyframes twinkle{

    0%{
        opacity:.15;
        transform:scale(.7);
    }

    50%{
        opacity:1;
        transform:scale(1.5);
    }

    100%{
        opacity:.15;
        transform:scale(.7);
    }
}

/* 光暈 */

.glow{

    position:fixed;

    width:600px;
    height:600px;

    border-radius:50%;

    background:
    radial-gradient(
    circle,
    rgba(145,110,255,.18),
    transparent 70%
    );

    filter:blur(30px);

    z-index:-4;
}

.glow1{
    top:-200px;
    left:-200px;
}

.glow2{
    bottom:-200px;
    right:-200px;
}

/* 外框 */

.frame{

    position:fixed;

    inset:14px;

    border:
    1.5px solid rgba(216,191,138,.45);

    border-radius:40px;

    pointer-events:none;

    z-index:999;
}

.frame::before{

    content:"";

    position:absolute;

    inset:12px;

    border:
    1px solid rgba(216,191,138,.15);

    border-radius:30px;
}

/* 四角 */

.corner{

    position:fixed;

    width:130px;
    height:130px;

    pointer-events:none;

    z-index:1000;
}

.corner::before{

    content:"";

    position:absolute;

    inset:0;

    border:
    1.5px solid rgba(216,191,138,.4);

    border-radius:50%;
}

.corner::after{

    content:"✦";

    position:absolute;

    color:rgba(216,191,138,.9);

    font-size:28px;
}

.tl{
    top:18px;
    left:18px;
}

.tl::before{
    clip-path:polygon(0 0,100% 0,0 100%);
}

.tl::after{
    top:20px;
    left:20px;
}

.tr{
    top:18px;
    right:18px;
}

.tr::before{
    clip-path:polygon(0 0,100% 0,100% 100%);
}

.tr::after{
    top:20px;
    right:20px;
}

.bl{
    bottom:18px;
    left:18px;
}

.bl::before{
    clip-path:polygon(0 0,0 100%,100% 100%);
}

.bl::after{
    bottom:20px;
    left:20px;
}

.br{
    bottom:18px;
    right:18px;
}

.br::before{
    clip-path:polygon(100% 0,0 100%,100% 100%);
}

.br::after{
    bottom:20px;
    right:20px;
}

/* 主容器 */

.container{

    max-width:1450px;

    margin:auto;

    display:grid;

    grid-template-columns:
    430px 1fr;

    gap:42px;
}

/* 左側 */

.left{

    background:
    rgba(29,24,44,.68);

    border:
    1px solid rgba(255,255,255,.06);

    border-radius:36px;

    padding:34px;

    backdrop-filter:blur(20px);

    position:sticky;

    top:30px;

    height:fit-content;

    box-shadow:
    0 20px 50px rgba(0,0,0,.3);
}

/* logo */

.logo{

    text-align:center;

    margin-bottom:36px;
}

.logo-small{

    font-family:
    "Great Vibes",
    cursive;

    font-size:44px;

    color:#f0dcff;

    opacity:.9;
}

.logo h1{

    font-family:
    "Cinzel",
    serif;

    font-size:54px;

    letter-spacing:5px;

    margin-top:-5px;

    background:
    linear-gradient(
        180deg,
        #ffffff 0%,
        #f0e6ff 45%,
        #d8bf8a 100%
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.logo p{

    margin-top:14px;

    color:#d9cbf5;

    line-height:1.9;

    font-size:18px;
}

/* 輸入 */

.label{

    display:block;

    margin-bottom:12px;

    color:#eadfff;

    font-size:21px;
}

.textarea{

    width:100%;

    height:240px;

    border:none;

    border-radius:24px;

    padding:22px;

    background:
    rgba(255,255,255,.05);

    color:white;

    outline:none;

    resize:none;

    font-size:20px;

    line-height:1.9;

    margin-bottom:24px;
}

.input{

    width:100%;

    height:60px;

    border:none;

    border-radius:20px;

    background:
    rgba(255,255,255,.05);

    color:white;

    outline:none;

    padding:0 18px;

    font-size:18px;

    margin-bottom:24px;
}

/* tags */

.tags{

    display:flex;

    flex-wrap:wrap;

    gap:10px;

    margin-bottom:30px;
}

.tag{

    padding:10px 18px;

    border-radius:999px;

    border:
    1px solid rgba(216,191,138,.2);

    background:
    rgba(255,255,255,.05);

    cursor:pointer;

    transition:.3s;
}

.tag.active{

    background:
    rgba(216,191,138,.16);

    border:
    1px solid rgba(216,191,138,.55);

    transform:translateY(-2px);
}

/* 按鈕 */

button{

    width:100%;

    height:72px;

    border:none;

    border-radius:26px;

    color:white;

    cursor:pointer;

    font-size:24px;

    font-family:
    "Cinzel",
    serif;

    background:
    linear-gradient(
    90deg,
    #735dff,
    #9f7fff,
    #6488ff
    );

    box-shadow:
    0 10px 30px rgba(120,100,255,.35);

    transition:.35s;
}

button:hover{

    transform:
    translateY(-4px)
    scale(1.01);
}

/* 卡片區 */

.preview-wrap{

    display:flex;

    flex-direction:column;

    align-items:center;
}

/* 卡片 */

.card{

    width:100%;

    max-width:780px;

    min-height:1200px;

    border-radius:48px;

    position:relative;

    overflow:hidden;

    padding:60px;

    background:

    radial-gradient(
    circle at top,
    rgba(160,120,255,.16),
    transparent 26%
    ),

    linear-gradient(
    180deg,
    #241a38,
    #1b152a,
    #171320
    );

    border:
    1px solid rgba(216,191,138,.25);

    box-shadow:
    0 25px 60px rgba(0,0,0,.45);
}

.card::before{

    content:"";

    position:absolute;

    inset:18px;

    border:
    1px solid rgba(216,191,138,.14);

    border-radius:38px;
}

/* 裝飾 */

.top-symbol{

    text-align:center;

    color:var(--gold);

    font-size:64px;

    margin-top:10px;
}

/* 英文 */

.english-title{

    text-align:center;

    font-family:
    "Great Vibes",
    cursive;

    font-size:58px;

    color:#f4dcff;

    margin-top:10px;

    opacity:.95;
}

/* 中文標題 */

.card-title{

    text-align:center;

    font-family:
    "Cinzel",
    serif;

    line-height:1.2;

    margin-top:8px;

    font-size:clamp(38px,5vw,64px);

    background:
    linear-gradient(
        180deg,
        #ffffff 0%,
        #f3e8ff 50%,
        #d8bf8a 100%
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* quote */

.quote{

    margin-top:90px;

    text-align:center;

    line-height:2;

    font-size:clamp(24px,5vw,40px);

    color:#f7f1ff;

    padding:0 40px;

    white-space:pre-wrap;

    word-break:break-word;
}

/* 作者 */

.author{

    margin-top:80px;

    text-align:center;

    color:#d8bf8a;

    font-size:30px;
}

/* note */

.note{

    margin-top:90px;

    text-align:center;

    line-height:2;

    color:#d6c8f5;

    font-size:24px;

    padding:0 40px;
}

/* tags */

.preview-tags{

    display:flex;

    justify-content:center;

    flex-wrap:wrap;

    gap:12px;

    margin-top:80px;
}

.preview-tag{

    padding:10px 20px;

    border-radius:999px;

    border:
    1px solid rgba(216,191,138,.25);

    background:
    rgba(255,255,255,.05);

    color:#eadfff;
}

/* footer */

.footer{

    position:absolute;

    bottom:50px;

    left:50%;

    transform:translateX(-50%);

    text-align:center;
}

.footer-line{

    width:150px;

    height:1px;

    background:
    linear-gradient(
    90deg,
    transparent,
    rgba(216,191,138,.7),
    transparent
    );

    margin:auto;

    margin-bottom:18px;
}

.footer-name{

    font-family:
    "Great Vibes",
    cursive;

    font-size:42px;

    color:#eadfff;
}

/* 圖片預覽 */

#imagePreviewWrap{

    display:none;

    margin-top:36px;

    width:100%;

    max-width:780px;
}

.save-text{

    text-align:center;

    margin-bottom:16px;

    color:#d8bf8a;

    font-size:20px;
}

#imagePreview{

    width:100%;

    border-radius:30px;

    border:
    1px solid rgba(216,191,138,.25);

    box-shadow:
    0 15px 50px rgba(0,0,0,.45);
}

/* 響應式 */

@media(max-width:1100px){

    .container{

        grid-template-columns:1fr;
    }

    .left{

        position:relative;

        top:0;
    }

    .card{

        min-height:1000px;

        padding:40px;
    }

    .quote{

        padding:0 10px;
    }
}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<div class="frame"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="container">

    <!-- 左側 -->

    <div class="left">

        <div class="logo">

            <div class="logo-small">
                Moonlight Memory
            </div>

            <h1>
                Dream Echo
            </h1>

            <p>
                收藏那些曾經讓你心動的句子
                <br>
                讓文字成為另一種宇宙 ✦
            </p>

        </div>

        <label class="label">
            想收藏的文字
        </label>

        <textarea
        id="quoteInput"
        class="textarea"
        placeholder="貼上你在 Threads、書本、電影裡看到的句子..."></textarea>

        <label class="label">
            作者 / 來源
        </label>

        <input
        id="authorInput"
        class="input"
        placeholder="例如：Threads / 某本書 / 某個人">

        <label class="label">
            靈魂標籤
        </label>

        <div class="tags">

            <div class="tag active">成長</div>
            <div class="tag">宇宙</div>
            <div class="tag">夢想</div>
            <div class="tag">深夜</div>
            <div class="tag">療癒</div>
            <div class="tag">孤獨</div>
            <div class="tag">愛情</div>
            <div class="tag">靈魂</div>

        </div>

        <button onclick="generateCard()">
            Generate Dream
        </button>

    </div>

    <!-- 右側 -->

    <div class="preview-wrap">

        <div class="card" id="card">

            <div class="top-symbol">
                ☾
            </div>

            <div class="english-title">
                Dream Echo
            </div>

            <div
            class="card-title"
            id="title">

                靈魂正在發芽

            </div>

            <div
            class="quote"
            id="quote">

欲買桂花同載酒，
終不似，
少年遊。

            </div>

            <div
            class="author"
            id="author">

                — 詞句收藏

            </div>

            <div
            class="note"
            id="note">

                有些思念，
                會在時間裡慢慢發光。
                <br>
                有些靈魂，
                只是還沒找到真正的季節。

            </div>

            <div
            class="preview-tags"
            id="previewTags">

                <div class="preview-tag">
                    深夜
                </div>

                <div class="preview-tag">
                    靈魂
                </div>

            </div>

            <div class="footer">

                <div class="footer-line"></div>

                <div class="footer-name">
                    Lazy Dream
                </div>

            </div>

        </div>

        <!-- 圖片 -->

        <div id="imagePreviewWrap">

            <div class="save-text">
                長按圖片即可儲存 ✨
            </div>

            <img id="imagePreview">

        </div>

    </div>

</div>

<script>

/* 星空 */

const stars =
document.getElementById("stars");

for(let i=0;i<170;i++){

    const star =
    document.createElement("div");

    star.className = "star";

    star.style.left =
    Math.random()*100 + "%";

    star.style.top =
    Math.random()*100 + "%";

    star.style.animationDelay =
    Math.random()*4 + "s";

    stars.appendChild(star);
}

/* tag */

const tags =
document.querySelectorAll(".tag");

tags.forEach(tag=>{

    tag.addEventListener("click",()=>{

        tag.classList.toggle("active");
    });
});

/* 標題 */

function randomTitle(){

    const titles = [

        "凌晨三點的光",
        "月亮知道你的疲憊",
        "宇宙留下的訊息",
        "在沉默之後",
        "靈魂正在發芽",
        "夜晚替你收藏了眼淚",
        "還沒說出口的夢",
        "溫柔地活著",
        "那些未完成的星光",
        "孤獨也是宇宙的一部分"
    ];

    return titles[
    Math.floor(
    Math.random()*titles.length
    )];
}

/* 註解 */

function randomNote(){

    const notes = [

        `
        有些答案，
        不是現在就要找到。
        <br>
        有些光，
        會在你願意停下來時出現。
        `,

        `
        月亮從不催促任何人，
        <br>
        它只是安靜地發光。
        `,

        `
        靈魂真正需要的，
        <br>
        往往不是答案，
        而是被理解。
        `,

        `
        有些情緒不需要解釋，
        <br>
        宇宙會替你溫柔收藏。
        `,

        `
        你不是迷路，
        <br>
        只是正在前往另一個宇宙。
        `
    ];

    return notes[
    Math.floor(
    Math.random()*notes.length
    )];
}

/* 生成 */

function generateCard(){

    const quote =
    document
    .getElementById("quoteInput")
    .value
    .trim();

    const author =
    document
    .getElementById("authorInput")
    .value
    .trim();

    if(!quote){

        alert("請輸入一句想收藏的文字 ✨");

        return;
    }

    document
    .getElementById("title")
    .innerText =
    randomTitle();

    document
    .getElementById("quote")
    .innerText =
    quote;

    document
    .getElementById("author")
    .innerText =
    author
    ?
    `— ${author}`
    :
    "— 來自靈魂深處";

    document
    .getElementById("note")
    .innerHTML =
    randomNote();

    const activeTags =
    document.querySelectorAll(".tag.active");

    let html = "";

    activeTags.forEach(tag=>{

        html +=

        `
        <div class="preview-tag">
            ${tag.innerText}
        </div>
        `;
    });

    document
    .getElementById("previewTags")
    .innerHTML =
    html;

    generateImagePreview();
}

/* 圖片預覽 */

async function generateImagePreview(){

    const canvas = await html2canvas(

        document.getElementById("card"),

        {
            scale:2
        }
    );

    const image =
    canvas.toDataURL("image/png");

    document
    .getElementById("imagePreview")
    .src = image;

    document
    .getElementById("imagePreviewWrap")
    .style.display = "block";
}

</script>

</body>
</html>
