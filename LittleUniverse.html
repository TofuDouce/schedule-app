<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Little Universe</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg1:#120f1d;
    --bg2:#1c1430;
    --bg3:#2a1d47;

    --gold:#d8bf8a;

    --text:#f7f2ff;

    --soft:#d8c8ff;
}

body{

    min-height:100vh;

    overflow-x:hidden;

    color:white;

    font-family:
    "Cormorant Garamond",
    serif;

    background:

    radial-gradient(
    circle at top,
    rgba(180,150,255,.18),
    transparent 30%
    ),

    linear-gradient(
    180deg,
    var(--bg1),
    var(--bg2),
    var(--bg3)
    );

    padding:28px;

    position:relative;
}

/* 星空 */

.stars{

    position:fixed;

    inset:0;

    overflow:hidden;

    z-index:-5;
}

.star{

    position:absolute;

    width:2px;
    height:2px;

    background:white;

    border-radius:50%;

    opacity:.7;

    animation:twinkle 4s infinite;
}

@keyframes twinkle{

    0%{
        opacity:.15;
        transform:scale(.7);
    }

    50%{
        opacity:1;
        transform:scale(1.4);
    }

    100%{
        opacity:.15;
        transform:scale(.7);
    }
}

/* 外框 */

.frame{

    position:fixed;

    inset:14px;

    border:
    1.5px solid rgba(216,191,138,.45);

    border-radius:38px;

    pointer-events:none;

    z-index:999;
}

.frame::before{

    content:"";

    position:absolute;

    inset:12px;

    border:
    1px solid rgba(216,191,138,.12);

    border-radius:30px;
}

/* 四角 */

.corner{

    position:fixed;

    width:130px;
    height:130px;

    pointer-events:none;

    z-index:1000;
}

.corner::before{

    content:"";

    position:absolute;

    inset:0;

    border:
    1.5px solid rgba(216,191,138,.35);

    border-radius:50%;
}

.corner::after{

    content:"✦";

    position:absolute;

    color:rgba(216,191,138,.9);

    font-size:28px;
}

.tl{
    top:18px;
    left:18px;
}

.tl::before{
    clip-path:polygon(0 0,100% 0,0 100%);
}

.tl::after{
    top:20px;
    left:20px;
}

.tr{
    top:18px;
    right:18px;
}

.tr::before{
    clip-path:polygon(0 0,100% 0,100% 100%);
}

.tr::after{
    top:20px;
    right:20px;
}

.bl{
    bottom:18px;
    left:18px;
}

.bl::before{
    clip-path:polygon(0 0,0 100%,100% 100%);
}

.bl::after{
    bottom:20px;
    left:20px;
}

.br{
    bottom:18px;
    right:18px;
}

.br::before{
    clip-path:polygon(100% 0,0 100%,100% 100%);
}

.br::after{
    bottom:20px;
    right:20px;
}

/* 標題 */

.header{

    text-align:center;

    margin-top:10px;

    margin-bottom:40px;
}

.logo{

    font-family:
    "Great Vibes",
    cursive;

    font-size:
    clamp(
        56px,
        10vw,
        110px
    );

    color:#e9d2ff;

    line-height:1.1;

    text-shadow:
    0 0 20px rgba(220,180,255,.2);
}

.subtitle{

    margin-top:10px;

    color:#d8bf8a;

    font-size:
    clamp(
        18px,
        3vw,
        28px
    );

    line-height:1.8;
}

/* 主容器 */

.container{

    max-width:1450px;

    margin:auto;

    display:grid;

    grid-template-columns:
    420px 1fr;

    gap:38px;
}

/* 左側 */

.left{

    background:
    rgba(29,24,44,.62);

    border:
    1px solid rgba(255,255,255,.06);

    border-radius:34px;

    padding:30px;

    backdrop-filter:blur(18px);

    height:fit-content;

    position:sticky;

    top:20px;
}

.panel-title{

    text-align:center;

    margin-bottom:28px;
}

.panel-title h2{

    font-size:36px;

    color:#f1ddff;

    margin-bottom:8px;
}

.panel-title p{

    color:#cdbce8;

    letter-spacing:3px;

    font-size:14px;
}

/* label */

.label{

    display:block;

    margin-bottom:14px;

    font-size:22px;

    color:#f4e9ff;
}

/* textarea */

.textarea{

    width:100%;

    height:260px;

    border:none;

    resize:none;

    border-radius:24px;

    background:
    rgba(255,255,255,.04);

    color:white;

    outline:none;

    padding:24px;

    line-height:2;

    font-size:20px;

    margin-bottom:30px;
}

/* tags */

.tags{

    display:grid;

    grid-template-columns:
    repeat(2,1fr);

    gap:14px;

    margin-bottom:34px;
}

.tag{

    height:58px;

    display:flex;

    align-items:center;

    justify-content:center;

    border-radius:18px;

    border:
    1px solid rgba(216,191,138,.22);

    background:
    rgba(255,255,255,.04);

    color:#e7d9ff;

    cursor:pointer;

    transition:.3s;
}

.tag.active{

    background:
    rgba(216,191,138,.12);

    border:
    1px solid rgba(216,191,138,.5);

    transform:translateY(-2px);
}

/* 按鈕 */

button{

    width:100%;

    height:76px;

    border:none;

    border-radius:24px;

    cursor:pointer;

    color:white;

    font-size:24px;

    font-family:
    "Cormorant Garamond",
    serif;

    background:
    linear-gradient(
    90deg,
    #8268ff,
    #bc8cff,
    #ffb0d9
    );

    box-shadow:
    0 10px 30px rgba(120,100,255,.35);

    transition:.35s;
}

button:hover{

    transform:
    translateY(-4px)
    scale(1.01);
}

/* 卡片區 */

.preview-wrap{

    display:flex;

    flex-direction:column;

    align-items:center;
}

/* 卡片 */

.card{

    width:100%;

    max-width:430px;

    aspect-ratio:9/16;

    border-radius:34px;

    overflow:hidden;

    position:relative;

    background:

    radial-gradient(
    circle at top,
    rgba(160,120,255,.18),
    transparent 30%
    ),

    linear-gradient(
    180deg,
    #24183a,
    #1b142c,
    #130f22
    );

    border:
    1px solid rgba(216,191,138,.22);

    box-shadow:
    0 20px 60px rgba(0,0,0,.45);

    padding:34px;
}

.card::before{

    content:"";

    position:absolute;

    inset:14px;

    border:
    1px solid rgba(216,191,138,.14);

    border-radius:26px;
}

/* 月亮 */

.moon{

    text-align:center;

    color:var(--gold);

    font-size:52px;

    margin-top:6px;
}

/* 英文 */

.card-logo{

    text-align:center;

    font-family:
    "Great Vibes",
    cursive;

    color:#efdbff;

    font-size:
    clamp(
        40px,
        7vw,
        72px
    );

    line-height:1.1;

    margin-top:8px;
}

/* quote */

.quote{

    position:absolute;

    left:50%;

    top:52%;

    transform:
    translate(-50%,-50%);

    width:78%;

    text-align:center;

    color:white;

    line-height:1.9;

    font-size:
    clamp(
        22px,
        4vw,
        40px
    );

    white-space:pre-wrap;

    word-break:break-word;
}

/* tags */

.preview-tags{

    position:absolute;

    bottom:90px;

    left:50%;

    transform:translateX(-50%);

    display:flex;

    flex-wrap:wrap;

    justify-content:center;

    gap:10px;

    width:80%;
}

.preview-tag{

    padding:8px 16px;

    border-radius:999px;

    border:
    1px solid rgba(216,191,138,.2);

    background:
    rgba(255,255,255,.04);

    color:#eadfff;

    font-size:14px;
}

/* footer */

.footer{

    position:absolute;

    bottom:28px;

    left:50%;

    transform:translateX(-50%);

    text-align:center;
}

.footer-line{

    width:100px;

    height:1px;

    background:
    linear-gradient(
    90deg,
    transparent,
    rgba(216,191,138,.7),
    transparent
    );

    margin:auto;

    margin-bottom:10px;
}

.footer-name{

    font-family:
    "Great Vibes",
    cursive;

    font-size:30px;

    color:#eadfff;
}

/* 預覽圖 */

#imagePreviewWrap{

    display:none;

    width:100%;

    max-width:430px;

    margin-top:30px;
}

.save-text{

    text-align:center;

    margin-bottom:14px;

    color:#d8bf8a;

    font-size:18px;
}

#imagePreview{

    width:100%;

    border-radius:28px;

    box-shadow:
    0 15px 50px rgba(0,0,0,.45);
}

/* 手機 */

@media(max-width:1100px){

    .container{

        grid-template-columns:1fr;
    }

    .left{

        position:relative;
    }

    .card{

        max-width:100%;
    }
}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="frame"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<!-- 標題 -->

<div class="header">

    <div class="logo">
        Little Universe
    </div>

    <div class="subtitle">
        收藏那些曾經讓你心動的句子，
        讓文字成為另一種宇宙 ✦
    </div>

</div>

<div class="container">

    <!-- 左 -->

    <div class="left">

        <div class="panel-title">

            <h2>
                ✧ 創建你的宇宙卡片 ✧
            </h2>

            <p>
                CREATE YOUR CARD
            </p>

        </div>

        <label class="label">
            想收藏的文字
        </label>

        <textarea
        id="quoteInput"
        class="textarea"
        placeholder="貼上你想收藏的句子...

可以是 Threads、書本、
電影、音樂、
或任何打動你的話"></textarea>

        <label class="label">
            ✧ 靈魂標籤（可多選）
        </label>

        <div class="tags">

            <div class="tag active">🌿 成長</div>
            <div class="tag">☁ 宇宙</div>
            <div class="tag">✧ 夢想</div>
            <div class="tag">☾ 深夜</div>
            <div class="tag">❀ 療癒</div>
            <div class="tag">✦ 孤獨</div>
            <div class="tag">♡ 愛情</div>
            <div class="tag">🦋 靈魂</div>

        </div>

        <button onclick="generateCard()">
            ✦ 生成宇宙卡片 ✦
        </button>

    </div>

    <!-- 右 -->

    <div class="preview-wrap">

        <!-- 卡片 -->

        <div class="card" id="card">

            <div class="moon">
                ☾
            </div>

            <div class="card-logo">
                Little Universe
            </div>

            <div
            class="quote"
            id="quote">

            </div>

            <div
            class="preview-tags"
            id="previewTags">

            </div>

            <div class="footer">

                <div class="footer-line"></div>

                <div class="footer-name">
                    Lazy Dream
                </div>

            </div>

        </div>

        <!-- 圖片 -->

        <div id="imagePreviewWrap">

            <div class="save-text">
                長按圖片即可儲存 ✨
            </div>

            <img id="imagePreview">

        </div>

    </div>

</div>

<script>

/* 星空 */

const stars =
document.getElementById("stars");

for(let i=0;i<160;i++){

    const star =
    document.createElement("div");

    star.className = "star";

    star.style.left =
    Math.random()*100 + "%";

    star.style.top =
    Math.random()*100 + "%";

    star.style.animationDelay =
    Math.random()*4 + "s";

    stars.appendChild(star);
}

/* tags */

const tags =
document.querySelectorAll(".tag");

tags.forEach(tag=>{

    tag.addEventListener("click",()=>{

        tag.classList.toggle("active");
    });
});

/* 生成 */

function generateCard(){

    const quote =
    document
    .getElementById("quoteInput")
    .value
    .trim();

    if(!quote){

        alert("請輸入一句想收藏的文字 ✨");

        return;
    }

    document
    .getElementById("quote")
    .innerText =
    quote;

    /* tags */

    const activeTags =
    document.querySelectorAll(".tag.active");

    let html = "";

    activeTags.forEach(tag=>{

        html +=

        `
        <div class="preview-tag">
            ${tag.innerText}
        </div>
        `;
    });

    document
    .getElementById("previewTags")
    .innerHTML =
    html;

    generateImagePreview();
}

/* 生成圖片 */

async function generateImagePreview(){

    const canvas = await html2canvas(

        document.getElementById("card"),

        {
            scale:2
        }
    );

    const image =
    canvas.toDataURL("image/png");

    document
    .getElementById("imagePreview")
    .src = image;

    document
    .getElementById("imagePreviewWrap")
    .style.display = "block";
}

</script>

</body>
</html>
