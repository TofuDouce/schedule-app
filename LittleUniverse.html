<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Little Universe</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg1:#120f1d;
    --bg2:#1d1530;
    --bg3:#2d1f48;

    --gold:#d8bf8a;

    --text:#f7f2ff;
}

body{

    min-height:100vh;

    overflow-x:hidden;

    color:white;

    font-family:
    "Cormorant Garamond",
    serif;

    background:

    radial-gradient(
    circle at top,
    rgba(180,150,255,.18),
    transparent 30%
    ),

    linear-gradient(
    180deg,
    var(--bg1),
    var(--bg2),
    var(--bg3)
    );

    padding:28px;

    position:relative;
}

/* 星空 */

.stars{

    position:fixed;

    inset:0;

    overflow:hidden;

    z-index:-5;
}

.star{

    position:absolute;

    width:2px;
    height:2px;

    background:white;

    border-radius:50%;

    opacity:.7;

    animation:twinkle 4s infinite;
}

@keyframes twinkle{

    0%{
        opacity:.15;
        transform:scale(.7);
    }

    50%{
        opacity:1;
        transform:scale(1.4);
    }

    100%{
        opacity:.15;
        transform:scale(.7);
    }
}

/* 外框 */

.frame{

    position:fixed;

    inset:14px;

    border:
    1.5px solid rgba(216,191,138,.45);

    border-radius:38px;

    pointer-events:none;

    z-index:999;
}

.frame::before{

    content:"";

    position:absolute;

    inset:12px;

    border:
    1px solid rgba(216,191,138,.12);

    border-radius:30px;
}

/* 四角 */

.corner{

    position:fixed;

    width:130px;
    height:130px;

    pointer-events:none;

    z-index:1000;
}

.corner::before{

    content:"";

    position:absolute;

    inset:0;

    border:
    1.5px solid rgba(216,191,138,.35);

    border-radius:50%;
}

.corner::after{

    content:"☾";

    position:absolute;

    color:rgba(216,191,138,.9);

    font-size:28px;
}

.tl{
    top:18px;
    left:18px;
}

.tl::before{
    clip-path:polygon(0 0,100% 0,0 100%);
}

.tl::after{
    top:20px;
    left:20px;
}

.tr{
    top:18px;
    right:18px;
}

.tr::before{
    clip-path:polygon(0 0,100% 0,100% 100%);
}

.tr::after{
    top:20px;
    right:20px;
}

.bl{
    bottom:18px;
    left:18px;
}

.bl::before{
    clip-path:polygon(0 0,0 100%,100% 100%);
}

.bl::after{
    bottom:20px;
    left:20px;
}

.br{
    bottom:18px;
    right:18px;
}

.br::before{
    clip-path:polygon(100% 0,0 100%,100% 100%);
}

.br::after{
    bottom:20px;
    right:20px;
}

/* 月亮吊飾 */

.moon-wrap{

    display:flex;

    flex-direction:column;

    align-items:center;

    margin-top:6px;

    margin-bottom:8px;
}

/* 金線 */

.moon-line{

    width:1px;

    height:46px;

    background:
    linear-gradient(
    180deg,
    rgba(216,191,138,.1),
    rgba(216,191,138,.7)
    );
}

/* 月亮 */

.hanging-moon{

    color:#d8bf8a;

    font-size:42px;

    animation:
    swing 5s ease-in-out infinite;

    transform-origin:
    top center;

    filter:
    drop-shadow(
    0 0 10px
    rgba(216,191,138,.35)
    );
}

@keyframes swing{

    0%{
        transform:rotate(-3deg);
    }

    50%{
        transform:rotate(3deg);
    }

    100%{
        transform:rotate(-3deg);
    }
}

/* 標題 */

.header{

    text-align:center;

    margin-bottom:42px;
}

.logo{

    font-family:
    "Great Vibes",
    cursive;

    font-size:
    clamp(
        64px,
        11vw,
        120px
    );

    color:#efd8ff;

    line-height:1.1;

    text-shadow:
    0 0 20px rgba(220,180,255,.2);
}

.subtitle{

    margin-top:10px;

    color:#d8bf8a;

    line-height:1.8;

    font-size:
    clamp(
        18px,
        3vw,
        28px
    );
}

/* 主容器 */

.container{

    max-width:1450px;

    margin:auto;

    display:grid;

    grid-template-columns:
    420px 1fr;

    gap:38px;
}

/* 左側 */

.left{

    background:
    rgba(29,24,44,.62);

    border:
    1px solid rgba(255,255,255,.06);

    border-radius:34px;

    padding:38px 30px;

    backdrop-filter:blur(18px);

    position:sticky;

    top:20px;

    height:fit-content;
}

/* label */

.label{

    display:block;

    margin-bottom:14px;

    font-size:22px;

    color:#f4e9ff;
}

/* textarea */

.textarea{

    width:100%;

    height:260px;

    border:none;

    resize:none;

    border-radius:24px;

    background:
    rgba(255,255,255,.04);

    color:white;

    outline:none;

    padding:24px;

    line-height:2;

    font-size:20px;

    margin-bottom:30px;
}

/* 按鈕 */

button{

    width:100%;

    height:76px;

    border:none;

    border-radius:24px;

    cursor:pointer;

    color:white;

    font-size:24px;

    font-family:
    "Cormorant Garamond",
    serif;

    background:
    linear-gradient(
    90deg,
    #8268ff,
    #bc8cff,
    #ffb0d9
    );

    box-shadow:
    0 10px 30px rgba(120,100,255,.35);

    transition:.35s;
}

button:hover{

    transform:
    translateY(-4px)
    scale(1.01);
}

/* 第二按鈕 */

.save-btn{

    margin-top:16px;

    background:

    linear-gradient(
    90deg,
    #ffb7d5,
    #d7a8ff,
    #9aa8ff
    );
}

/* 收藏庫 */

.archive{

    margin-top:26px;

    display:flex;

    flex-direction:column;

    gap:14px;
}

/* 收藏卡 */

.archive-card{

    padding:18px;

    border-radius:22px;

    background:
    rgba(255,255,255,.04);

    border:
    1px solid rgba(216,191,138,.14);

    color:#f3ecff;

    line-height:1.8;

    cursor:pointer;

    transition:.3s;
}

.archive-card:hover{

    transform:translateY(-2px);

    background:
    rgba(255,255,255,.06);
}

.archive-title{

    color:#d8bf8a;

    margin-bottom:8px;

    font-size:14px;

    letter-spacing:2px;
}

/* 卡片區 */

.preview-wrap{

    display:flex;

    flex-direction:column;

    align-items:center;
}

/* 卡片 */

.card{

    width:100%;

    max-width:430px;

    aspect-ratio:9/16;

    border-radius:34px;

    overflow:hidden;

    position:relative;

    background:

    radial-gradient(
    circle at top,
    rgba(160,120,255,.18),
    transparent 30%
    ),

    linear-gradient(
    180deg,
    #24183a,
    #1b142c,
    #130f22
    );

    border:
    1px solid rgba(216,191,138,.22);

    box-shadow:
    0 20px 60px rgba(0,0,0,.45);

    padding:34px;
}

.card::before{

    content:"";

    position:absolute;

    inset:14px;

    border:
    1px solid rgba(216,191,138,.14);

    border-radius:26px;
}

/* logo */

.card-logo{

    text-align:center;

    font-family:
    "Great Vibes",
    cursive;

    color:#efdbff;

    font-size:
    clamp(
        44px,
        7vw,
        74px
    );

    margin-top:18px;
}

/* quote */

.quote{

    position:absolute;

    left:50%;

    top:52%;

    transform:
    translate(-50%,-50%);

    width:78%;

    text-align:center;

    color:white;

    line-height:1.9;

    font-size:
    clamp(
        20px,
        4vw,
        36px
    );

    white-space:pre-wrap;

    word-break:break-word;
}

/* footer */

.footer{

    position:absolute;

    bottom:28px;

    left:50%;

    transform:translateX(-50%);

    text-align:center;
}

.footer-line{

    width:100px;

    height:1px;

    background:
    linear-gradient(
    90deg,
    transparent,
    rgba(216,191,138,.7),
    transparent
    );

    margin:auto;

    margin-bottom:10px;
}

.footer-name{

    font-family:
    "Great Vibes",
    cursive;

    font-size:30px;

    color:#eadfff;
}

/* 圖片 */

#imagePreviewWrap{

    display:none;

    width:100%;

    max-width:430px;

    margin-top:30px;
}

.save-text{

    text-align:center;

    margin-bottom:14px;

    color:#d8bf8a;

    font-size:18px;
}

#imagePreview{

    width:100%;

    border-radius:28px;

    box-shadow:
    0 15px 50px rgba(0,0,0,.45);
}

/* 手機 */

@media(max-width:1100px){

    .container{

        grid-template-columns:1fr;
    }

    .left{

        position:relative;
    }

    .card{

        max-width:100%;
    }
}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="frame"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<!-- 頂部 -->

<div class="header">

    <div class="moon-wrap">

        <div class="moon-line"></div>

        <div class="hanging-moon">
            ☾
        </div>

    </div>

    <div class="logo">
        Little Universe
    </div>

    <div class="subtitle">
        收藏那些曾經讓你心動的句子，
        <br>
        讓文字成為另一種宇宙 ✦
    </div>

</div>

<div class="container">

    <!-- 左側 -->

    <div class="left">

        <label class="label">
            想收藏的文字
        </label>

        <textarea
        id="quoteInput"
        class="textarea"
        placeholder="貼上想收藏的文字"></textarea>

        <button onclick="generateCard()">
            Create Universe
        </button>

        <button
        class="save-btn"
        onclick="saveCard()">

            Save to Universe

        </button>

        <div
        id="archive"
        class="archive">

        </div>

    </div>

    <!-- 右側 -->

    <div class="preview-wrap">

        <div class="card" id="card">

            <div class="card-logo">
                Little Universe
            </div>

            <div
            class="quote"
            id="quote">

            </div>

            <div class="footer">

                <div class="footer-line"></div>

                <div class="footer-name">
                    Lazy Dream
                </div>

            </div>

        </div>

        <div id="imagePreviewWrap">

            <div class="save-text">
                長按圖片即可儲存 ✨
            </div>

            <img id="imagePreview">

        </div>

    </div>

</div>

<script>

/* 星空 */

const stars =
document.getElementById("stars");

for(let i=0;i<160;i++){

    const star =
    document.createElement("div");

    star.className = "star";

    star.style.left =
    Math.random()*100 + "%";

    star.style.top =
    Math.random()*100 + "%";

    star.style.animationDelay =
    Math.random()*4 + "s";

    stars.appendChild(star);
}

/* AI 排版 */

function formatQuote(text){

    text = text.replace(/，/g,"，\n\n");

    text = text.replace(/。/g,"。\n\n");

    text = text.replace(/？/g,"？\n\n");

    text = text.replace(/！/g,"！\n\n");

    if(text.length > 40){

        const mid =
        Math.floor(text.length / 2);

        text =
        text.slice(0,mid)
        + "\n\n"
        + text.slice(mid);
    }

    return text.trim();
}

/* 生成 */

function generateCard(){

    const quote =
    document
    .getElementById("quoteInput")
    .value
    .trim();

    if(!quote){

        alert("請輸入一句想收藏的文字 ✨");

        return;
    }

    document
    .getElementById("quote")
    .innerText =
    formatQuote(quote);

    generateImagePreview();
}

/* 圖片 */

async function generateImagePreview(){

    const canvas = await html2canvas(

        document.getElementById("card"),

        {
            scale:2
        }
    );

    const image =
    canvas.toDataURL("image/png");

    document
    .getElementById("imagePreview")
    .src = image;

    document
    .getElementById("imagePreviewWrap")
    .style.display = "block";
}

/* 儲存 */

function saveCard(){

    const quote =
    document
    .getElementById("quote")
    .innerText;

    if(!quote){

        alert("先生成卡片 ✨");

        return;
    }

    let archive =

    JSON.parse(
    localStorage.getItem(
    "littleUniverseArchive"
    )
    ) || [];

    archive.unshift({

        text:quote,

        time:
        new Date()
        .toLocaleDateString()
    });

    localStorage.setItem(

        "littleUniverseArchive",

        JSON.stringify(archive)
    );

    renderArchive();
}

/* render */

function renderArchive(){

    const archive =

    JSON.parse(
    localStorage.getItem(
    "littleUniverseArchive"
    )
    ) || [];

    const container =
    document.getElementById(
    "archive"
    );

    container.innerHTML = "";

    archive.forEach(item=>{

        container.innerHTML +=

        `
        <div class="archive-card">

            <div class="archive-title">

                UNIVERSE MEMORY

            </div>

            ${item.text}

        </div>
        `;
    });
}

/* 初始 */

renderArchive();

</script>

</body>
</html>
