<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dream Echo</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg1:#171320;
    --bg2:#241a35;
    --bg3:#31244d;

    --gold:#d8bf8a;

    --text:#f4efff;

    --card:
    rgba(29,24,44,.72);
}

body{

    min-height:100vh;

    overflow-x:hidden;

    background:
    radial-gradient(
    circle at top,
    rgba(180,150,255,.14),
    transparent 30%
    ),

    linear-gradient(
    180deg,
    var(--bg1),
    var(--bg2),
    var(--bg3)
    );

    color:white;

    font-family:
    "Cormorant Garamond",
    serif;

    padding:30px;

    position:relative;
}

/* 星空 */

.stars{

    position:fixed;

    inset:0;

    z-index:-3;

    overflow:hidden;
}

.star{

    position:absolute;

    width:2px;
    height:2px;

    background:white;

    border-radius:50%;

    opacity:.7;

    animation:twinkle 4s infinite;
}

@keyframes twinkle{

    0%{
        opacity:.2;
        transform:scale(.8);
    }

    50%{
        opacity:1;
        transform:scale(1.5);
    }

    100%{
        opacity:.2;
        transform:scale(.8);
    }
}

/* 慕夏邊框 */

.frame{

    position:fixed;

    inset:14px;

    border:
    1.5px solid rgba(216,191,138,.5);

    border-radius:38px;

    pointer-events:none;

    z-index:999;
}

.frame::before{

    content:"";

    position:absolute;

    inset:12px;

    border:
    1px solid rgba(216,191,138,.18);

    border-radius:30px;
}

/* 四角 */

.corner{

    position:fixed;

    width:120px;
    height:120px;

    pointer-events:none;

    z-index:1000;
}

.corner::before{

    content:"";

    position:absolute;

    inset:0;

    border:
    1.5px solid rgba(216,191,138,.45);

    border-radius:50%;
}

.corner::after{

    content:"✦";

    position:absolute;

    color:rgba(216,191,138,.9);

    font-size:26px;
}

.tl{
    top:18px;
    left:18px;
}

.tl::before{
    clip-path:polygon(0 0,100% 0,0 100%);
}

.tl::after{
    top:18px;
    left:18px;
}

.tr{
    top:18px;
    right:18px;
}

.tr::before{
    clip-path:polygon(0 0,100% 0,100% 100%);
}

.tr::after{
    top:18px;
    right:18px;
}

.bl{
    bottom:18px;
    left:18px;
}

.bl::before{
    clip-path:polygon(0 0,0 100%,100% 100%);
}

.bl::after{
    bottom:18px;
    left:18px;
}

.br{
    bottom:18px;
    right:18px;
}

.br::before{
    clip-path:polygon(100% 0,0 100%,100% 100%);
}

.br::after{
    bottom:18px;
    right:18px;
}

/* 主容器 */

.container{

    max-width:1400px;

    margin:auto;

    display:grid;

    grid-template-columns:
    430px 1fr;

    gap:40px;
}

/* 左側 */

.left{

    background:
    rgba(29,24,44,.7);

    border:
    1px solid rgba(255,255,255,.06);

    border-radius:36px;

    padding:32px;

    backdrop-filter:blur(18px);

    height:fit-content;

    position:sticky;

    top:30px;
}

.logo{

    text-align:center;

    margin-bottom:34px;
}

.logo h1{

    font-family:
    "Cinzel",
    serif;

    font-size:52px;

    letter-spacing:4px;

    background:
    linear-gradient(
        180deg,
        #ffffff 0%,
        #f0e6ff 45%,
        #d8bf8a 100%
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.logo p{

    margin-top:14px;

    color:#d6c8f5;

    line-height:1.8;

    font-size:18px;
}

/* 輸入 */

.label{

    display:block;

    margin-bottom:12px;

    color:#eadfff;

    font-size:20px;
}

.textarea{

    width:100%;

    height:240px;

    border:none;

    resize:none;

    border-radius:24px;

    padding:20px;

    background:
    rgba(255,255,255,.05);

    color:white;

    font-size:20px;

    line-height:1.8;

    outline:none;

    margin-bottom:24px;
}

.input{

    width:100%;

    height:60px;

    border:none;

    border-radius:20px;

    background:
    rgba(255,255,255,.05);

    color:white;

    padding:0 18px;

    outline:none;

    font-size:18px;

    margin-bottom:24px;
}

/* tags */

.tags{

    display:flex;

    flex-wrap:wrap;

    gap:10px;

    margin-bottom:28px;
}

.tag{

    padding:10px 18px;

    border-radius:999px;

    background:
    rgba(255,255,255,.06);

    border:
    1px solid rgba(216,191,138,.2);

    cursor:pointer;

    transition:.3s;
}

.tag.active{

    background:
    rgba(216,191,138,.16);

    border:
    1px solid rgba(216,191,138,.6);
}

/* 按鈕 */

button{

    width:100%;

    height:68px;

    border:none;

    border-radius:24px;

    cursor:pointer;

    font-size:22px;

    color:white;

    font-family:
    "Cinzel",
    serif;

    background:
    linear-gradient(
    90deg,
    #6d58ff,
    #9f7fff,
    #6788ff
    );

    margin-top:10px;

    transition:.3s;
}

button:hover{

    transform:translateY(-3px);

    box-shadow:
    0 10px 30px rgba(120,100,255,.35);
}

/* 卡片 */

.preview-wrap{

    display:flex;

    justify-content:center;
}

.card{

    width:100%;

    max-width:760px;

    min-height:1200px;

    position:relative;

    border-radius:46px;

    overflow:hidden;

    padding:50px;

    background:

    radial-gradient(
    circle at top,
    rgba(160,120,255,.16),
    transparent 25%
    ),

    linear-gradient(
    180deg,
    #241a38,
    #1b152a,
    #171320
    );

    border:
    1px solid rgba(216,191,138,.28);

    box-shadow:
    0 20px 60px rgba(0,0,0,.45);
}

/* 卡片內框 */

.card::before{

    content:"";

    position:absolute;

    inset:18px;

    border:
    1px solid rgba(216,191,138,.18);

    border-radius:36px;
}

/* 月亮 */

.moon{

    text-align:center;

    font-size:58px;

    color:var(--gold);

    margin-top:10px;

    margin-bottom:24px;
}

/* 標題 */

.card-title{

    text-align:center;

    font-family:
    "Cinzel",
    serif;

    font-size:54px;

    line-height:1.2;

    margin-bottom:18px;

    background:
    linear-gradient(
        180deg,
        #ffffff 0%,
        #f1e6ff 50%,
        #d8bf8a 100%
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* quote */

.quote{

    margin-top:80px;

    text-align:center;

    line-height:2.1;

    font-size:40px;

    color:#f5efff;

    padding:0 30px;

    white-space:pre-wrap;
}

/* 作者 */

.author{

    margin-top:70px;

    text-align:center;

    color:#d8bf8a;

    font-size:28px;
}

/* AI 註解 */

.note{

    margin-top:80px;

    text-align:center;

    line-height:2;

    color:#d6c8f5;

    font-size:24px;

    padding:0 40px;
}

/* tags */

.preview-tags{

    display:flex;

    justify-content:center;

    flex-wrap:wrap;

    gap:12px;

    margin-top:80px;
}

.preview-tag{

    padding:10px 20px;

    border-radius:999px;

    background:
    rgba(255,255,255,.06);

    border:
    1px solid rgba(216,191,138,.28);

    color:#e7d9ff;
}

/* footer */

.footer{

    position:absolute;

    bottom:50px;

    left:50%;

    transform:translateX(-50%);

    text-align:center;
}

.footer-line{

    width:140px;

    height:1px;

    background:
    linear-gradient(
    90deg,
    transparent,
    rgba(216,191,138,.7),
    transparent
    );

    margin:auto;

    margin-bottom:18px;
}

.footer-name{

    font-family:
    "Cinzel",
    serif;

    font-size:32px;

    color:#eadfff;

    letter-spacing:4px;
}

/* 響應式 */

@media(max-width:1100px){

    .container{

        grid-template-columns:1fr;
    }

    .left{

        position:relative;

        top:0;
    }

    .card{

        min-height:1000px;
    }

    .quote{

        font-size:32px;
    }
}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="frame"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="container">

    <!-- 左側 -->

    <div class="left">

        <div class="logo">

            <h1>
                Dream Echo
            </h1>

            <p>
                收藏那些短暫照亮你的句子
                <br>
                讓文字成為另一種宇宙 ✦
            </p>

        </div>

        <label class="label">
            想收藏的文字
        </label>

        <textarea
        id="quoteInput"
        class="textarea"
        placeholder="貼上你在 Threads、書本、電影裡看到的句子..."></textarea>

        <label class="label">
            作者 / 來源
        </label>

        <input
        id="authorInput"
        class="input"
        placeholder="例如：Threads / 某本書 / 某個人">

        <label class="label">
            靈魂標籤
        </label>

        <div class="tags">

            <div class="tag active">成長</div>
            <div class="tag">宇宙</div>
            <div class="tag">夢想</div>
            <div class="tag">深夜</div>
            <div class="tag">療癒</div>
            <div class="tag">孤獨</div>
            <div class="tag">愛情</div>
            <div class="tag">靈魂</div>

        </div>

        <button onclick="generateCard()">
            Generate Dream
        </button>

        <button onclick="downloadCard()">
            Download Image
        </button>

    </div>

    <!-- 右側 -->

    <div class="preview-wrap">

        <div class="card" id="card">

            <div class="moon">
                ☾
            </div>

            <div
            class="card-title"
            id="title">

                凌晨三點的光

            </div>

            <div
            class="quote"
            id="quote">

不是所有的選擇都一定要有意義，
有時候，
選擇讓自己快樂，
就是最好的意義。

            </div>

            <div
            class="author"
            id="author">

                — 來自某位陌生人的分享

            </div>

            <div
            class="note"
            id="note">

                有些答案，
                不是現在就要找到。
                <br>
                有些光，
                會在你願意停下來時出現。

            </div>

            <div
            class="preview-tags"
            id="previewTags">

                <div class="preview-tag">
                    成長
                </div>

                <div class="preview-tag">
                    宇宙
                </div>

            </div>

            <div class="footer">

                <div class="footer-line"></div>

                <div class="footer-name">
                    Lazy Dream
                </div>

            </div>

        </div>

    </div>

</div>

<script>

/* 星空 */

const stars =
document.getElementById("stars");

for(let i=0;i<150;i++){

    const star =
    document.createElement("div");

    star.className = "star";

    star.style.left =
    Math.random()*100 + "%";

    star.style.top =
    Math.random()*100 + "%";

    star.style.animationDelay =
    Math.random()*4 + "s";

    stars.appendChild(star);
}

/* tag */

const tags =
document.querySelectorAll(".tag");

tags.forEach(tag=>{

    tag.addEventListener("click",()=>{

        tag.classList.toggle("active");
    });
});

/* AI title */

function randomTitle(){

    const titles = [

        "凌晨三點的光",
        "月亮知道你的疲憊",
        "宇宙留下的訊息",
        "在沉默之後",
        "靈魂正在發芽",
        "夜晚替你收藏了眼淚",
        "還沒說出口的夢",
        "溫柔地活著",
        "那些未完成的星光",
        "孤獨也是宇宙的一部分"
    ];

    return titles[
    Math.floor(
    Math.random()*titles.length
    )];
}

/* AI note */

function randomNote(){

    const notes = [

        `
        有些答案，
        不是現在就要找到。
        <br>
        有些光，
        會在你願意停下來時出現。
        `,

        `
        你不是走得太慢，
        <br>
        只是你的靈魂，
        有自己的季節。
        `,

        `
        月亮從不催促任何人，
        <br>
        它只是安靜地發光。
        `,

        `
        有些人會忘記你的話，
        <br>
        但宇宙會記得你曾經溫柔。
        `,

        `
        靈魂真正需要的，
        <br>
        往往不是答案，
        而是被理解。
        `
    ];

    return notes[
    Math.floor(
    Math.random()*notes.length
    )];
}

/* 生成 */

function generateCard(){

    const quote =
    document
    .getElementById("quoteInput")
    .value
    .trim();

    const author =
    document
    .getElementById("authorInput")
    .value
    .trim();

    if(!quote){

        alert("請輸入一句想收藏的文字 ✨");

        return;
    }

    document
    .getElementById("title")
    .innerText =
    randomTitle();

    document
    .getElementById("quote")
    .innerText =
    quote;

    document
    .getElementById("author")
    .innerText =
    author
    ?
    `— ${author}`
    :
    "— 來自靈魂深處";

    document
    .getElementById("note")
    .innerHTML =
    randomNote();

    const activeTags =
    document.querySelectorAll(".tag.active");

    let html = "";

    activeTags.forEach(tag=>{

        html +=

        `
        <div class="preview-tag">
            ${tag.innerText}
        </div>
        `;
    });

    document
    .getElementById("previewTags")
    .innerHTML =
    html;
}

/* 下載 */

function downloadCard(){

    html2canvas(
    document.getElementById("card"),
    {
        scale:2
    })

    .then(canvas=>{

        const link =
        document.createElement("a");

        link.download =
        "dream-echo.png";

        link.href =
        canvas.toDataURL();

        link.click();
    });
}

</script>

</body>
</html>
