<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>風格轉換器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&family=Inter:wght@600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --navy:#1A3550;--blue:#2C5F8A;--blue2:#3A7AB5;--blue-lt:#EDF2F7;
  --surf:#fff;--surf2:#F4F8FC;--border:#D0E0F0;
  --text:#1A3550;--muted:#5A7FA0;--danger:#C0392B;
}
body{
  font-family:"Noto Sans TC","Inter",sans-serif;
  background:linear-gradient(135deg,#EDF2F7 0%,#E8F0F8 100%);
  min-height:100vh;color:var(--text);
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 50% 40% at 5% 5%,rgba(44,95,138,.08) 0%,transparent 70%),
    radial-gradient(ellipse 40% 35% at 95% 90%,rgba(58,122,181,.06) 0%,transparent 70%);
}
.hdr{
  position:sticky;top:0;z-index:100;
  background:rgba(237,242,247,.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 36px;height:68px;
  display:flex;align-items:center;justify-content:space-between;
}
.hdr::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:linear-gradient(90deg,#2C5F8A,#3A7AB5,#5A96C8);}
.logo{display:flex;align-items:center;gap:12px;}
.logo-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(145deg,#2C5F8A,#3A7AB5);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 12px rgba(44,95,138,.25);}
.logo-name{font-size:18px;font-weight:900;color:var(--text);}
.logo-sub{font-size:10px;font-weight:700;letter-spacing:3px;color:var(--blue);margin-top:2px;}
.badge{padding:5px 14px;border-radius:999px;background:#DCFCE7;color:#166534;font-size:12px;font-weight:800;border:1px solid #86EFAC;}

.body{display:grid;grid-template-columns:420px 1fr;min-height:calc(100vh - 68px);position:relative;z-index:1;}
.sidebar{background:var(--surf);border-right:1px solid var(--border);overflow-y:auto;height:calc(100vh - 68px);position:sticky;top:68px;}
.sidebar-inner{padding:24px 22px 60px;}
.sec{margin-bottom:28px;}
.sec-title{font-size:11px;font-weight:900;color:var(--blue);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--blue-lt);display:flex;align-items:center;gap:7px;}
.lbl{font-size:13px;font-weight:700;color:var(--muted);display:block;margin:12px 0 7px;}
.lbl:first-of-type{margin-top:0;}

/* style cards */
.style-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:4px;}
.style-card{border:2px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer;transition:.2s;background:var(--surf2);user-select:none;}
.style-card:hover{border-color:var(--blue);}
.style-card.on{border-color:var(--blue);background:#EDF2F7;box-shadow:0 0 0 3px rgba(44,95,138,.12);}
.style-preview{height:48px;border-radius:8px;margin-bottom:8px;overflow:hidden;position:relative;}
.style-name{font-size:12px;font-weight:800;color:var(--text);}
.style-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.prev-medical{background:linear-gradient(135deg,#EDF2F7,#E8F0F8);}
.prev-medical::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 20%,rgba(44,95,138,.15) 0%,transparent 70%);}
.prev-dream{background:linear-gradient(180deg,#171320,#241a35,#31244d);}
.prev-dream::before{content:'✦ ✧ ✦';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(216,191,138,.6);font-size:14px;}
.prev-cream{background:linear-gradient(180deg,#fff9f6,#ffebe3);}
.prev-cream::before{content:'☁ ☁';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(246,200,108,.8);font-size:18px;}

/* textarea */
.ta-wrap{position:relative;}
.ta{width:100%;height:220px;resize:vertical;border:1.5px solid var(--border);border-radius:11px;padding:12px 14px;font-family:monospace;font-size:12px;line-height:1.6;background:var(--surf2);color:var(--text);transition:.15s;}
.ta:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(44,95,138,.10);}
.ta-count{font-size:11px;color:var(--muted);text-align:right;margin-top:4px;font-weight:600;}
.clear-btn{position:absolute;top:10px;right:10px;width:24px;height:24px;border-radius:6px;border:1px solid var(--border);background:var(--surf);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:.15s;}
.clear-btn:hover{background:var(--surf2);color:var(--danger);}

/* buttons */
.convert-btn{width:100%;padding:14px;border:none;border-radius:12px;cursor:pointer;font-family:inherit;font-size:15px;font-weight:900;background:linear-gradient(135deg,#2C5F8A,#3A7AB5);color:#fff;box-shadow:0 4px 16px rgba(44,95,138,.28);transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.convert-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(44,95,138,.35);}
.dl-btn{width:100%;padding:13px;border:none;border-radius:12px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:800;background:linear-gradient(135deg,#166534,#16A34A);color:#fff;box-shadow:0 4px 14px rgba(22,101,52,.25);transition:.2s;margin-top:10px;display:none;align-items:center;justify-content:center;gap:8px;}
.dl-btn.show{display:flex;}
.dl-btn:hover{transform:translateY(-1px);}

/* status */
.status{margin-top:12px;padding:12px 14px;border-radius:10px;font-size:13px;font-weight:700;display:none;}
.status.ok{display:block;background:#DCFCE7;color:#166534;border:1.5px solid #86EFAC;}
.status.err{display:block;background:#FEE2E2;color:#C0392B;border:1.5px solid #FCA5A5;}
.status.info{display:block;background:#EDF2F7;color:var(--blue);border:1.5px solid var(--border);}

/* change log */
.log{margin-top:12px;background:var(--surf2);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:12px;font-weight:600;color:var(--muted);line-height:1.8;display:none;max-height:140px;overflow-y:auto;}
.log.show{display:block;}
.log-item{display:flex;align-items:center;gap:6px;}
.log-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);flex-shrink:0;}

/* preview */
.preview-pane{padding:28px 32px;overflow-y:auto;display:flex;flex-direction:column;gap:16px;}
.preview-label{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:8px;}
.preview-label::after{content:'';flex:1;height:1px;background:var(--border);}
.preview-tabs{display:flex;gap:8px;margin-bottom:4px;}
.ptab{padding:7px 16px;border:1.5px solid var(--border);border-radius:8px;background:var(--surf);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:.15s;font-family:inherit;}
.ptab.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.frame-wrap{background:var(--surf);border:2px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 4px 20px rgba(44,95,138,.10);flex:1;min-height:500px;position:relative;}
.frame-wrap iframe{width:100%;height:100%;border:none;min-height:500px;}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:12px;min-height:400px;}
.empty-icon{font-size:48px;opacity:.4;}
.empty-text{font-size:15px;font-weight:700;}
.empty-sub{font-size:13px;font-weight:600;opacity:.7;text-align:center;line-height:1.6;}


/* code panel */
.code-panel{
  background:var(--surf);border:2px solid var(--border);
  border-radius:16px;overflow:hidden;
  box-shadow:0 4px 20px rgba(44,95,138,.10);
  display:none;flex-direction:column;
  margin-top:4px;
}
.code-panel.show{display:flex;}
.code-panel-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--border);
  background:var(--surf2);flex-shrink:0;
}
.code-panel-title{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:1.5px;}
.code-panel-btns{display:flex;gap:8px;}
.copy-btn{
  padding:6px 14px;border:1.5px solid var(--border);border-radius:8px;
  background:var(--surf);color:var(--muted);font-size:12px;font-weight:800;
  cursor:pointer;transition:.15s;font-family:inherit;display:flex;align-items:center;gap:5px;
}
.copy-btn:hover{border-color:var(--blue);color:var(--blue);background:#EDF2F7;}
.copy-btn.copied{background:#DCFCE7;border-color:#86EFAC;color:#166534;}
.code-wrap{
  overflow:auto;max-height:320px;
  padding:16px;
  background:#0F172A;
  font-family:"Fira Code","Cascadia Code","Consolas",monospace;
  font-size:12px;line-height:1.7;
  color:#E2E8F0;
  white-space:pre;
}
.code-wrap::-webkit-scrollbar{width:6px;height:6px;}
.code-wrap::-webkit-scrollbar-track{background:transparent;}
.code-wrap::-webkit-scrollbar-thumb{background:#334155;border-radius:3px;}
.code-stats{
  padding:8px 16px;border-top:1px solid var(--border);
  background:var(--surf2);font-size:11px;font-weight:700;color:var(--muted);
  display:flex;gap:16px;flex-shrink:0;
}

@media(max-width:900px){.body{grid-template-columns:1fr;}.sidebar{height:auto;position:static;}}
@media(max-width:580px){.hdr{padding:0 16px;}.sidebar-inner{padding:16px 14px 40px;}.preview-pane{padding:16px;}}
</style>
</head>
<body>

<header class="hdr">
  <div class="logo">
    <div class="logo-icon">🎨</div>
    <div>
      <div class="logo-name">風格轉換器</div>
      <div class="logo-sub">Style Converter</div>
    </div>
  </div>
  <div class="badge">✅ 完全離線・不消耗額度</div>
</header>

<div class="body">
  <aside class="sidebar">
  <div class="sidebar-inner">

    <div class="sec">
      <div class="sec-title">🎨 目標風格</div>
      <div class="style-grid">
        <div class="style-card on" data-style="medical" onclick="pickStyle(this)">
          <div class="style-preview prev-medical"></div>
          <div class="style-name">醫療藍</div>
          <div class="style-sub">沉穩專業</div>
        </div>
        <div class="style-card" data-style="dream" onclick="pickStyle(this)">
          <div class="style-preview prev-dream"></div>
          <div class="style-name">星空紫</div>
          <div class="style-sub">神秘夢幻</div>
        </div>
        <div class="style-card" data-style="cream" onclick="pickStyle(this)">
          <div class="style-preview prev-cream"></div>
          <div class="style-name">奶油粉</div>
          <div class="style-sub">溫柔可愛</div>
        </div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">📋 貼入原始 HTML</div>
      <div class="ta-wrap">
        <textarea class="ta" id="inputHtml" placeholder="把你要轉換的 HTML 完整貼在這裡...&#10;&#10;支援任何結構的 HTML 網頁"></textarea>
        <button class="clear-btn" onclick="clearInput()">✕</button>
      </div>
      <div class="ta-count" id="charCount">0 字元</div>
    </div>

    <div class="sec">
      <div class="sec-title">⚡ 執行轉換</div>
      <button class="convert-btn" onclick="doConvert()">🎨 開始風格轉換</button>
      <button class="dl-btn" id="dlBtn" onclick="doDownload()">⬇️ 下載轉換後的 HTML</button>
      <div class="status" id="statusBox"></div>
      <div class="log" id="changeLog"></div>
    </div>

  </div>
  </aside>

  <div class="preview-pane">
    <div class="preview-label">預覽</div>
    <div class="preview-tabs">
      <button class="ptab on" id="tab-after"  onclick="switchTab('after')">👁 轉換後</button>
      <button class="ptab"    id="tab-before" onclick="switchTab('before')">原始</button>
      <button class="ptab"    id="tab-code"   onclick="switchTab('code')">💻 程式碼</button>
    </div>
    <div class="frame-wrap" id="frameWrap">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🎨</div>
        <div class="empty-text">尚未進行轉換</div>
        <div class="empty-sub">貼入 HTML、選擇風格<br>點擊「開始風格轉換」即可<br><br>✅ 完全離線運作，不消耗 AI 額度</div>
      </div>
      <iframe id="previewFrame" style="display:none;"></iframe>
    </div>

    <!-- CODE PANEL -->
    <div class="code-panel" id="codePanel">
      <div class="code-panel-hdr">
        <div class="code-panel-title">💻 轉換後 HTML 程式碼</div>
        <div class="code-panel-btns">
          <button class="copy-btn" id="copyAllBtn" onclick="copyCode()">
            📋 複製全部
          </button>
          <button class="copy-btn" onclick="copyStyleOnly()">
            🎨 只複製 CSS
          </button>
        </div>
      </div>
      <div class="code-wrap" id="codeWrap"></div>
      <div class="code-stats" id="codeStats"></div>
    </div>

  </div>
</div>

   STATE
════════════════════════════════════ */

════════════════════════════════════ */

/* ════════════════════════════════════
   UI HELPERS
════════════════════════════════════ */
function pickStyle(el) {
  document.querySelectorAll('.style-card').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
  selectedStyle = el.dataset.style;
}

function clearInput() {
  document.getElementById('inputHtml').value = '';
  document.getElementById('charCount').textContent = '0 字元';
}

document.getElementById('inputHtml').addEventListener('input', function() {
  document.getElementById('charCount').textContent = this.value.length.toLocaleString() + ' 字元';
});

function setStatus(type, msg) {
  const el = document.getElementById('statusBox');
  el.className = 'status ' + type;
  el.textContent = msg;
}

function showLog(items) {
  const el = document.getElementById('changeLog');
  if (!items.length) { el.classList.remove('show'); return; }
  el.innerHTML = items.map(i => `<div class="log-item"><div class="log-dot"></div>${i}</div>`).join('');
  el.classList.add('show');
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-after').classList.toggle('on', tab === 'after');
  document.getElementById('tab-before').classList.toggle('on', tab === 'before');
  document.getElementById('tab-code').classList.toggle('on', tab === 'code');

  const frame  = document.getElementById('previewFrame');
  const code   = document.getElementById('codePanel');
  const empty  = document.getElementById('emptyState');

  if (tab === 'code') {
    frame.style.display  = 'none';
    code.classList.add('show');
    empty.style.display  = 'none';
    if (convertedHtml) renderCode(convertedHtml);
  } else {
    code.classList.remove('show');
    showPreview(tab === 'after' ? convertedHtml : originalHtml);
  }
}

function renderCode(html) {
  const wrap  = document.getElementById('codeWrap');
  const stats = document.getElementById('codeStats');

  // Safe escape
  const escaped = html
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  // Simple line-by-line colorization
  const lines = escaped.split('\n');
  const colorized = lines.map(line => {
    // comment line
    if (line.trim().startsWith('&lt;!--')) {
      return '<span style="color:#64748B">' + line + '</span>';
    }
    // closing tag
    line = line.replace(/(&lt;\/[\w-]+&gt;)/g, '<span style="color:#94A3B8">$1</span>');
    // self-closing or opening tag
    line = line.replace(/(&lt;)([\w-]+)/g, '$1<span style="color:#7DD3FC">$2</span>');
    // attribute values in quotes
    line = line.replace(/([\w-]+)(=)("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g,
      '<span style="color:#93C5FD">$1</span><span style="color:#94A3B8">$2</span><span style="color:#86EFAC">$3</span>');
    // hex colors
    line = line.replace(/(#[0-9a-fA-F]{3,8})\b/g, '<span style="color:#FCA5A5">$1</span>');
    // css property keywords
    line = line.replace(/\b(background|color|border|padding|margin|font|display|position|width|height|border-radius|box-shadow|transform)(\s*:)/g,
      '<span style="color:#C4B5FD">$1</span>$2');
    return line;
  }).join('\n');

  wrap.innerHTML = colorized;

  // stats
  const lineCount = lines.length;
  const kb   = (new Blob([html]).size / 1024).toFixed(1);
  const chars = html.length.toLocaleString();
  stats.innerHTML = '<span>\u{1F4C4} ' + lineCount.toLocaleString() + ' \u884C</span>'
    + '<span>\u{1F4DD} ' + chars + ' \u5B57\u5143</span>'
    + '<span>\u{1F4BE} ' + kb + ' KB</span>';
}

function copyCode() {
  if (!convertedHtml) return;
  navigator.clipboard.writeText(convertedHtml).then(() => {
    const btn = document.getElementById('copyAllBtn');
    btn.textContent = '✅ 已複製！';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 複製全部'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = convertedHtml;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const btn = document.getElementById('copyAllBtn');
    btn.textContent = '✅ 已複製！';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 複製全部'; btn.classList.remove('copied'); }, 2000);
  });
}

function copyStyleOnly() {
  if (!convertedHtml) return;
  // extract the override style block
  const match = convertedHtml.match(/<style id="__style-converter-override__">([\s\S]*?)<\/style>/i);
  const toCopy = match ? match[1].trim() : '';
  if (!toCopy) { alert('找不到樣式區塊'); return; }
  navigator.clipboard.writeText(toCopy).then(() => {
    const btns = document.querySelectorAll('.copy-btn');
    btns[1].textContent = '✅ CSS 已複製！';
    btns[1].classList.add('copied');
    setTimeout(() => { btns[1].textContent = '🎨 只複製 CSS'; btns[1].classList.remove('copied'); }, 2000);
  });
}

function showPreview(html) {
  if (!html) return;
  const frame = document.getElementById('previewFrame');
  document.getElementById('emptyState').style.display = 'none';
  frame.style.display = 'block';
  const blob = new Blob([html], {type:'text/html'});
  frame.src = URL.createObjectURL(blob);
}

/* ════════════════════════════════════
   CORE CONVERTER (Rule-based)
════════════════════════════════════ */
function convertStyle(html, st) {
  const changes = [];
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

  /* 1. FONT IMPORT */
  // remove old google font links
  doc.querySelectorAll('link[href*="fonts.googleapis.com"]').forEach(l => l.remove());
  const fontLink = doc.createElement('link');
  fontLink.rel = 'stylesheet';
  fontLink.href = st.fontImport;
  (doc.head || doc.body).prepend(fontLink);
  changes.push('替換 Google Fonts');

  /* 2. FIND OR CREATE <style> block to inject */
  // We'll inject an override stylesheet at the END of <head>
  const overrideStyle = doc.createElement('style');
  overrideStyle.id = '__style-converter-override__';

  const css = `
/* ════ Style Converter Override ════ */
:root {${st.rootVars}
}

/* Body */
body, html {
  background: ${st.bodyBg} !important;
  color: ${st.bodyColor} !important;
  font-family: ${st.fontFamily} !important;
}
body::before {
  content: '' !important;
  position: fixed !important;
  inset: 0 !important;
  z-index: 0 !important;
  pointer-events: none !important;
  background: ${st.bodyDecor} !important;
}

/* Cards — target common card patterns */
.card, [class*="card"], [class*="Card"],
[class*="item"], [class*="box"], [class*="panel"],
[class*="tile"], [class*="block"] {
  background: ${st.cardBg} !important;
  border: ${st.cardBorder} !important;
  border-radius: ${st.cardRadius} !important;
  box-shadow: ${st.cardShadow} !important;
}
.card:hover, [class*="card"]:hover, [class*="Card"]:hover,
[class*="item"]:hover, [class*="box"]:hover,
[class*="tile"]:hover, [class*="block"]:hover {
  transform: ${st.cardHoverTransform} !important;
  box-shadow: ${st.cardHoverShadow} !important;
  border-color: ${st.cardHoverBorder} !important;
}

/* Buttons */
button, .btn, [class*="btn"], [class*="button"],
[class*="Button"], input[type="submit"], input[type="button"] {
  background: ${st.btnBg} !important;
  color: ${st.btnColor} !important;
  border-radius: ${st.btnRadius} !important;
  padding: ${st.btnPadding} !important;
  border: none !important;
  font-family: ${st.fontFamily} !important;
  cursor: pointer !important;
  transition: opacity .15s, transform .15s !important;
}
button:hover, .btn:hover, [class*="btn"]:hover {
  opacity: ${st.btnHoverOpacity} !important;
  transform: translateY(-1px) !important;
}

/* Inputs */
input[type="text"], input[type="search"], input[type="email"],
input[type="number"], input[type="password"], input[type="url"],
textarea, select {
  background: ${st.inputBg} !important;
  border: ${st.inputBorder} !important;
  border-radius: ${st.inputRadius} !important;
  color: ${st.inputColor} !important;
  font-family: ${st.fontFamily} !important;
}
input:focus, textarea:focus, select:focus {
  border-color: ${st.inputFocusBorder} !important;
  outline: none !important;
  box-shadow: 0 0 0 3px color-mix(in srgb, ${st.accentColor} 15%, transparent) !important;
}

/* Headings */
h1 { color: ${st.h1Color} !important; font-family: ${st.fontFamily} !important; }
h2 { color: ${st.h2Color} !important; font-family: ${st.fontFamily} !important; }
h3, h4, h5, h6 { color: ${st.h3Color} !important; font-family: ${st.fontFamily} !important; }

/* Body text */
p, li, td, th, span, div { font-family: ${st.fontFamily} !important; }
p { color: ${st.pColor} !important; }
a { color: ${st.aColor} !important; }

/* Tags / badges / chips */
[class*="tag"], [class*="badge"], [class*="chip"],
[class*="label"], [class*="pill"] {
  background: ${st.tagBg} !important;
  color: ${st.tagColor} !important;
  border-radius: ${st.tagRadius} !important;
}

/* Nav / Header */
nav, header, [class*="nav"], [class*="header"], [class*="hdr"] {
  background: ${st.navBg} !important;
  border-color: ${st.navBorder} !important;
  backdrop-filter: blur(20px) !important;
}

/* HR */
hr { border-color: ${st.hrColor} !important; }

/* Code */
code, pre { background: ${st.codeBg} !important; color: ${st.codeColor} !important; border-radius: 8px !important; }

/* Accent colors via CSS vars */
[style*="background"]:not(body):not(html) { transition: all .2s !important; }
`;

  overrideStyle.textContent = css;
  (doc.head || doc.body).appendChild(overrideStyle);
  changes.push('套用顏色系統（背景、文字、強調色）');
  changes.push('套用卡片風格（背景、邊框、圓角、陰影、hover）');
  changes.push('套用按鈕風格（顏色、圓角、hover）');
  changes.push('套用輸入框風格');
  changes.push('套用字型：' + st.fontFamily);
  changes.push('套用標題顏色');
  changes.push('套用標籤/徽章風格');

  /* 3. PATCH inline styles for common bg colors */
  // Replace hardcoded dark/light backgrounds in inline styles
  const darkBgPattern = /(background(?:-color)?\s*:\s*)(#[0-9a-f]{3,8}|rgb[a]?\([^)]+\)|hsl[a]?\([^)]+\))/gi;

  // patch body inline style
  if (doc.body.style.background || doc.body.style.backgroundColor) {
    doc.body.style.background = '';
    doc.body.style.backgroundColor = '';
    changes.push('移除 body 內聯背景色');
  }

  /* 4. Serialise */
  const result = '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
  return { html: result, changes };
}

/* ════════════════════════════════════
   MAIN CONVERT ACTION
════════════════════════════════════ */
function doConvert() {
  const rawHtml = document.getElementById('inputHtml').value.trim();
  if (!rawHtml) { setStatus('err', '⚠️ 請先貼入要轉換的 HTML'); return; }

  originalHtml  = rawHtml;
  convertedHtml = '';

  const st = STYLES[selectedStyle];
  setStatus('info', '⚙️ 轉換中…');
  document.getElementById('dlBtn').classList.remove('show');
  document.getElementById('changeLog').classList.remove('show');

  try {
    const { html, changes } = convertStyle(rawHtml, st);
    convertedHtml = html;

    setStatus('ok', `✅ 完成！套用「${st.name}」風格，共 ${changes.length} 項修改`);
    showLog(changes);
    document.getElementById('dlBtn').classList.add('show');

    currentTab = 'after';
    document.getElementById('tab-after').classList.add('on');
    document.getElementById('tab-before').classList.remove('on');
    document.getElementById('tab-code').classList.remove('on');
    document.getElementById('codePanel').classList.remove('show');
    showPreview(convertedHtml);

  } catch(e) {
    setStatus('err', '❌ 轉換失敗：' + e.message);
    console.error(e);
  }
}

/* ════════════════════════════════════
   DOWNLOAD
════════════════════════════════════ */
function doDownload() {
  if (!convertedHtml) return;
  const blob = new Blob([convertedHtml], {type:'text/html;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const st   = STYLES[selectedStyle];
  a.href = url;
  a.download = `converted_${st.name}_${Date.now()}.html`;
  a.click();
  URL.revokeObjectURL(url);
}
</script>
