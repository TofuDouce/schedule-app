<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>班表</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; }

/* 工具列 */
.toolbar { display:flex; gap:6px; padding:6px; }
.tool-btn { flex:1; background:#fff; border:none; border-radius:12px; font-size:18px; padding:10px; }

/* 月曆區 */
#captureArea { position:relative; }
#bg { position:absolute; width:100%; height:100%; object-fit:cover; z-index:0; }
.blur { filter: blur(6px); }

.calendar { position:relative; z-index:1; padding:10px; }
.title { text-align:center; font-size:22px; margin:10px 0; }

.grid { display:grid; grid-template-columns:repeat(7,1fr); gap:8px; }
.day { background:rgba(255,255,255,0.85); border-radius:12px; aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.sunday { background:#FBE7EF; color:red; }

.shift { font-size:12px; }

/* 貼圖 */
.sticker { position:absolute; width:60px; z-index:2; }

/* 下方 */
.shift-bar { display:flex; justify-content:space-around; padding:10px; }
.shift-btn { background:#fff; border-radius:20px; padding:6px 12px; }

input { display:none; }
#menu { display:none; padding:10px; }
</style>
</head>

<body>

<div class="toolbar">
<button class="tool-btn" onclick="capture()">📸</button>
<label class="tool-btn">🖼<input type="file" onchange="addSticker(event)"></label>
<label class="tool-btn">🎨<input type="file" onchange="setBg(event)"></label>
<button class="tool-btn" onclick="toggleMenu()">⚙️</button>
</div>

<div id="menu">
<button onclick="clearBg()">清除背景</button>
<button onclick="toggleBlur()">背景模糊</button>
<button onclick="clearAll()">清空班表</button>
<button onclick="capture()">匯出圖片</button>
<button onclick="exportICS()">匯出行事曆</button>

<select onchange="loadSlot(this.value)">
<option value="0">班表1</option>
<option value="1">班表2</option>
<option value="2">班表3</option>
<option value="3">班表4</option>
<option value="4">班表5</option>
<option value="5">班表6</option>
<option value="6">班表7</option>
<option value="7">班表8</option>
<option value="8">班表9</option>
<option value="9">班表10</option>
</select>
</div>

<div id="captureArea">
<img id="bg">
<div class="calendar">
<div class="title">2026年4月</div>
<div class="grid" id="grid"></div>
</div>
</div>

<div class="shift-bar">
<div class="shift-btn" onclick="setShift('早')">早</div>
<div class="shift-btn" onclick="setShift('午')">午</div>
<div class="shift-btn" onclick="setShift('晚')">晚</div>
<div class="shift-btn" onclick="setShift('全')">全</div>
<div class="shift-btn" onclick="setShift('休')">休</div>
</div>

<script>
let selectedShift='', shifts={}, slots=[{}, {}, {}, {}, {}, {}, {}, {}, {}, {}], currentSlot=0;

const order=["早","午","晚","全"];

const grid=document.getElementById("grid");
for(let i=1;i<=30;i++){
 let d=document.createElement("div");
 d.className="day";
 if([5,12,19,26].includes(i)) d.classList.add("sunday");
 d.innerHTML=`<div>${i}</div><div class="box"></div>`;
 d.onclick=()=>apply(i,d);
 grid.appendChild(d);
}

function apply(day,el){
 if(!selectedShift) return;
 if(!shifts[day]) shifts[day]=[];
 if(!shifts[day].includes(selectedShift)) shifts[day].push(selectedShift);
 shifts[day].sort((a,b)=>order.indexOf(a)-order.indexOf(b));
 render(el,shifts[day]);
 saveSlot();
}

function render(el,list){
 el.querySelector(".box").innerHTML=list.map(s=>`<div class="shift">${s}</div>`).join("");
}

function setShift(s){ selectedShift=s; }

function setBg(e){
 let url=URL.createObjectURL(e.target.files[0]);
 document.getElementById("bg").src=url;
}

function clearBg(){ document.getElementById("bg").src=''; }

function toggleBlur(){ document.getElementById("bg").classList.toggle("blur"); }

function addSticker(e){
 let img=document.createElement("img");
 img.src=URL.createObjectURL(e.target.files[0]);
 img.className="sticker";
 img.style.top="50px"; img.style.left="50px";

 img.ondblclick=()=>img.remove();

 img.onmousedown=(e)=>{
  let x=e.clientX,y=e.clientY;
  document.onmousemove=(ev)=>{
    img.style.left=img.offsetLeft+(ev.clientX-x)+"px";
    img.style.top=img.offsetTop+(ev.clientY-y)+"px";
    x=ev.clientX;y=ev.clientY;
  };
  document.onmouseup=()=>document.onmousemove=null;
 };

 document.getElementById("captureArea").appendChild(img);
}

function clearAll(){
 shifts={};
 document.querySelectorAll(".box").forEach(b=>b.innerHTML='');
 saveSlot();
}

function capture(){
 html2canvas(document.querySelector("#captureArea")).then(c=>{
  let a=document.createElement("a");
  a.download="schedule.png";
  a.href=c.toDataURL();
  a.click();
 });
}

function toggleMenu(){
 let m=document.getElementById("menu");
 m.style.display=m.style.display==="none"?"block":"none";
}

function saveSlot(){ slots[currentSlot]=JSON.parse(JSON.stringify(shifts)); }

function loadSlot(i){
 currentSlot=i;
 shifts=JSON.parse(JSON.stringify(slots[i]||{}));
 document.querySelectorAll(".day").forEach((d,idx)=>{
  render(d,shifts[idx+1]||[]);
 });
}

function exportICS(){
 let text="BEGIN:VCALENDAR\nVERSION:2.0\n";
 for(let d in shifts){
  text+=`BEGIN:VEVENT\nSUMMARY:${shifts[d].join(",")}\nDTSTART:202604${String(d).padStart(2,'0')}T090000\nEND:VEVENT\n`;
 }
 text+="END:VCALENDAR";
 let blob=new Blob([text],{type:'text/calendar'});
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="schedule.ics";
 a.click();
}
</script>

</body>
</html>
