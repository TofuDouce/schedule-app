<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{margin:0;padding:10px;font-family:sans-serif;background:#f5f5f5}

/* 🔝 工具列 */
.topbar{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}
.topbar button{
  height:48px;border:none;border-radius:12px;background:#fff;font-size:20px;
}

/* ⚙️ 選單 */
#menu{
  display:none;
  background:#fff;
  border-radius:12px;
  padding:10px;
  margin-top:8px;
}
#menu button{
  width:100%;
  margin:4px 0;
  padding:8px;
  border:none;
  border-radius:8px;
  background:#eee;
}

/* 📅 月份列 */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:10px 0;
}
.header button{
  border:none;
  background:#fff;
  border-radius:10px;
  padding:8px 12px;
}

/* 📅 班表 */
#scheduleArea{
  position:relative;
  width:100%;
  overflow:hidden;
}

/* 背景 */
#bg{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
}
.blur{filter:blur(8px);}

.calendar{
  position:relative;
  z-index:1;
  display:grid;
  grid-template-columns:repeat(7,minmax(0,1fr));
  gap:6px;
}

/* 星期 */
.week{
  font-size:12px;
  text-align:center;
  font-weight:bold;
}

/* 日期 */
.day{
  aspect-ratio:1;
  background:#fff;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:12px;
}
.sunday{background:#FBE7EF;color:red;}
.saturday{background:#f3f3f3;}

/* 班別 */
.shift{
  width:80%;
  border-radius:6px;
  margin-top:2px;
  text-align:center;
}
.morning{background:#f7e7a9;}
.noon{background:#f5c6aa;}
.night{background:#d8c3a5;}
.full{background:#d6c2f0;}
.off{background:#bfe3d0;}

/* 貼圖 */
.sticker{
  position:absolute;
  width:70px;
  z-index:999;
}

/* 🔽 底部 */
.bottom{
  display:flex;
  gap:6px;
  margin-top:10px;
}
.bottom button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
  color:#000;
}
.bottom button:nth-child(1){background:#f7e7a9;}
.bottom button:nth-child(2){background:#f5c6aa;}
.bottom button:nth-child(3){background:#d8c3a5;}
.bottom button:nth-child(4){background:#d6c2f0;}
.bottom button:nth-child(5){background:#bfe3d0;}
.bottom button.active{outline:2px solid #333}

/* 📸 預覽 */
#preview{margin-top:15px}
#preview canvas{width:100%;border-radius:10px}

input{display:none}
</style>
</head>

<body>

<!-- 工具列 -->
<div class="topbar">
  <button onclick="exportImage()">📸</button>
  <button onclick="openSticker()">🖼️</button>
  <button onclick="openBg()">🎨</button>
  <button onclick="toggleMenu()">⚙️</button>
</div>

<!-- 選單 -->
<div id="menu">
  <button onclick="clearBg()">清除背景</button>
  <button onclick="toggleBlur()">模糊背景</button>
  <button onclick="clearAll()">清空班表</button>
</div>

<input id="stickerInput" type="file" accept="image/*">
<input id="bgInput" type="file" accept="image/*">

<!-- 月份 -->
<div class="header">
  <button onclick="changeMonth(-1)">←</button>
  <h3 id="title"></h3>
  <button onclick="changeMonth(1)">→</button>
</div>

<!-- 班表 -->
<div id="scheduleArea">
  <div class="calendar" id="calendar"></div>
</div>

<!-- 班別 -->
<div class="bottom">
  <button onclick="setType(event,'morning')">早</button>
  <button onclick="setType(event,'noon')">午</button>
  <button onclick="setType(event,'night')">晚</button>
  <button onclick="setType(event,'full')">全</button>
  <button onclick="setType(event,'off')">休</button>
</div>

<div id="preview"></div>

<script>
let selected="";
let data={};
let currentDate=new Date(2026,3);

/* 班別選擇 */
function setType(e,t){
  selected=t;
  document.querySelectorAll(".bottom button").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");
}

/* 月份切換 */
function changeMonth(n){
  currentDate.setMonth(currentDate.getMonth()+n);
  render();
}

/* 渲染 */
function render(){
  const cal=document.getElementById("calendar");
  cal.innerHTML="";

  const y=currentDate.getFullYear();
  const m=currentDate.getMonth();

  title.innerText=y+"年"+(m+1)+"月";

  ["一","二","三","四","五","六","日"].forEach(w=>{
    const d=document.createElement("div");
    d.className="week";
    d.innerText=w;
    cal.appendChild(d);
  });

  let firstDay=(new Date(y,m,1).getDay()+6)%7;
  let days=new Date(y,m+1,0).getDate();

  for(let i=0;i<firstDay;i++){
    cal.appendChild(document.createElement("div"));
  }

  for(let i=1;i<=days;i++){
    const d=document.createElement("div");
    d.className="day";

    let dayIndex=(firstDay+i-1)%7;
    if(dayIndex==6)d.classList.add("sunday");
    if(dayIndex==5)d.classList.add("saturday");

    d.innerHTML=`<div>${i}</div>`;

    let key=y+"-"+m+"-"+i;
    (data[key]||[]).forEach(t=>{
      const div=document.createElement("div");
      div.className="shift "+t;
      div.innerText={morning:"早",noon:"午",night:"晚",full:"全",off:"休"}[t];
      d.appendChild(div);
    });

    d.onclick=()=>{
      if(!selected)return;
      let arr=data[key]||[];

      if(selected==="full"){
        arr=["full"];
      }else{
        arr=arr.filter(x=>x!=="full");
        if(arr.includes(selected)){
          arr=arr.filter(x=>x!==selected);
        }else{
          arr.push(selected);
        }
        arr.sort((a,b)=>["morning","noon","night"].indexOf(a)-["morning","noon","night"].indexOf(b));
      }

      data[key]=arr;
      render();
    };

    cal.appendChild(d);
  }
}

/* 📸 截圖 */
function exportImage(){
  html2canvas(document.getElementById("scheduleArea")).then(c=>{
    preview.innerHTML="";
    preview.appendChild(c);
    c.onclick=()=>{
      let a=document.createElement("a");
      a.href=c.toDataURL();
      a.download="schedule.png";
      a.click();
    }
  });
}

/* 🖼️ 貼圖 */
function openSticker(){
  document.getElementById("stickerInput").click();
}

stickerInput.onchange=function(e){
  const file=e.target.files[0];
  if(!file)return;

  const img=document.createElement("img");
  img.src=URL.createObjectURL(file);
  img.className="sticker";
  img.style.top="50px";
  img.style.left="50px";

  let drag=false,ox,oy;

  img.addEventListener("touchstart",ev=>{
    drag=true;
    ox=ev.touches[0].clientX-img.offsetLeft;
    oy=ev.touches[0].clientY-img.offsetTop;
  });

  img.addEventListener("touchmove",ev=>{
    if(!drag)return;
    img.style.left=(ev.touches[0].clientX-ox)+"px";
    img.style.top=(ev.touches[0].clientY-oy)+"px";
  });

  img.addEventListener("touchend",()=>drag=false);

  img.ondblclick=()=>img.remove();

  scheduleArea.appendChild(img);
};

/* 🎨 背景 */
function openBg(){
  document.getElementById("bgInput").click();
}

bgInput.onchange=function(e){
  const file=e.target.files[0];
  if(!file)return;

  let bg=document.getElementById("bg");
  if(!bg){
    bg=document.createElement("img");
    bg.id="bg";
    scheduleArea.prepend(bg);
  }
  bg.src=URL.createObjectURL(file);
};

function clearBg(){
  const bg=document.getElementById("bg");
  if(bg)bg.remove();
}

function toggleBlur(){
  const bg=document.getElementById("bg");
  if(bg)bg.classList.toggle("blur");
}

/* ⚙️ 選單 */
function toggleMenu(){
  const m=document.getElementById("menu");
  m.style.display=m.style.display==="block"?"none":"block";
}

/* 清空 */
function clearAll(){
  data={};
  render();
}

render();
</script>

</body>
</html>
