<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{margin:0;padding:10px;font-family:sans-serif;background:#f5f5f5}
input{display:none}

/* 工具列 */
.topbar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.topbar button{height:48px;border:none;border-radius:12px;background:#fff;font-size:20px}

/* 選單 */
#menu{display:none;background:#fff;border-radius:12px;padding:10px;margin-top:8px}
#menu button{width:100%;margin:5px 0;padding:10px;border:none;border-radius:8px;background:#eee}

/* header */
.header{display:flex;justify-content:space-between;align-items:center;margin:10px 0}

/* 截圖區 */
#captureArea{background:#fff;border-radius:20px;padding:12px}

/* 班表 */
#scheduleArea{position:relative;padding:10px;border-radius:16px;overflow:hidden}

/* 背景 */
#bg{position:absolute;width:100%;height:100%;object-fit:cover;z-index:0}
.blur{filter:blur(12px)}

/* 星期 */
.weekRow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px;z-index:1;position:relative}
.weekRow div{text-align:center;font-weight:bold}

/* 日曆 */
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;z-index:1;position:relative}

/* 日期格（🔥固定不變形） */
.day{
  aspect-ratio:1;
  background:#fff;
  border-radius:14px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  overflow:hidden;
  font-size:12px;
}

/* 班別（🔥不撐開） */
.shift{
  width:80%;
  border-radius:8px;
  margin-top:2px;
  text-align:center;
  font-size:11px;
}

.morning{background:#f7e7a9}
.noon{background:#f5c6aa}
.night{background:#d8c3a5}
.full{background:#d6c2f0}
.off{background:#bfe3d0}

.sunday{background:#FBE7EF;color:red}

/* 貼圖 */
.sticker{position:absolute;width:80px;z-index:999}

/* 底部 */
.bottom{display:flex;gap:6px;margin-top:10px}
.bottom button{flex:1;padding:10px;border:none;border-radius:20px;color:#000}
.bottom button:nth-child(1){background:#f7e7a9}
.bottom button:nth-child(2){background:#f5c6aa}
.bottom button:nth-child(3){background:#d8c3a5}
.bottom button:nth-child(4){background:#d6c2f0}
.bottom button:nth-child(5){background:#bfe3d0}
.bottom button.active{outline:2px solid #333}

#preview img{width:100%;margin-top:10px;border-radius:12px}
</style>
</head>

<body>

<!-- 工具列 -->
<div class="topbar">
  <button onclick="exportImage()">📸</button>
  <button onclick="stickerInput.click()">🖼️</button>
  <button onclick="bgInput.click()">🎨</button>
  <button onclick="toggleMenu()">⚙️</button>
</div>

<div id="menu">
  <button onclick="clearBg()">清除背景</button>
  <button onclick="toggleBlur()">模糊背景</button>
  <button onclick="clearAll()">清空班表</button>
  <button onclick="exportICS()">輸出行事曆</button>
</div>

<input id="stickerInput" type="file">
<input id="bgInput" type="file">

<div id="captureArea">

  <div class="header">
    <button onclick="changeMonth(-1)">←</button>
    <h2 id="title"></h2>
    <button onclick="changeMonth(1)">→</button>
  </div>

  <div id="scheduleArea">
    <div class="weekRow">
      <div>一</div><div>二</div><div>三</div>
      <div>四</div><div>五</div><div>六</div><div>日</div>
    </div>
    <div class="calendar" id="calendar"></div>
  </div>

</div>

<div class="bottom">
  <button onclick="setType(event,'morning')">早</button>
  <button onclick="setType(event,'noon')">午</button>
  <button onclick="setType(event,'night')">晚</button>
  <button onclick="setType(event,'full')">全</button>
  <button onclick="setType(event,'off')">休</button>
</div>

<div id="preview"></div>

<script>
let selected="";
let data={};
let currentDate=new Date(2026,3);
let isBlur=false;

function setType(e,t){
  selected=t;
  document.querySelectorAll(".bottom button").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");
}

function changeMonth(n){
  currentDate.setMonth(currentDate.getMonth()+n);
  render();
}

function render(){
  calendar.innerHTML="";
  const y=currentDate.getFullYear();
  const m=currentDate.getMonth();

  title.innerText=y+"年"+(m+1)+"月";

  let first=(new Date(y,m,1).getDay()+6)%7;
  let days=new Date(y,m+1,0).getDate();

  for(let i=0;i<first;i++) calendar.appendChild(document.createElement("div"));

  for(let i=1;i<=days;i++){
    let d=document.createElement("div");
    d.className="day";

    let idx=(first+i-1)%7;
    if(idx==6)d.classList.add("sunday");

    d.innerHTML=`<div>${i}</div>`;

    let key=y+"-"+m+"-"+i;

    (data[key]||[]).forEach(t=>{
      let s=document.createElement("div");
      s.className="shift "+t;
      s.innerText={morning:"早",noon:"午",night:"晚",full:"全",off:"休"}[t];
      d.appendChild(s);
    });

    d.onclick=()=>{
      if(!selected)return;
      let arr=data[key]||[];

      if(selected==="full") arr=["full"];
      else{
        arr=arr.filter(x=>x!=="full");
        if(arr.includes(selected)) arr=arr.filter(x=>x!==selected);
        else arr.push(selected);
      }

      data[key]=arr;
      render();
    };

    calendar.appendChild(d);
  }
}

/* 截圖 */
function exportImage(){
  if(bg && isBlur) bg.classList.add("blur");
  html2canvas(captureArea).then(canvas=>{
    let img=new Image();
    img.src=canvas.toDataURL();
    preview.innerHTML="";
    preview.appendChild(img);
  });
}

/* 行事曆 */
function exportICS(){
  let y=currentDate.getFullYear();
  let m=currentDate.getMonth()+1;

  let text="BEGIN:VCALENDAR\nVERSION:2.0\n";

  for(let key in data){
    data[key].forEach(type=>{
      if(type==="off") return;

      let [yy,mm,dd]=key.split("-");
      let date=`${yy}${String(+mm+1).padStart(2,'0')}${String(dd).padStart(2,'0')}`;

      text+=`BEGIN:VEVENT
DTSTART;VALUE=DATE:${date}
SUMMARY:${{morning:"早",noon:"午",night:"晚",full:"全"}[type]}
END:VEVENT\n`;
    });
  }

  text+="END:VCALENDAR";

  let blob=new Blob([text],{type:'text/calendar'});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="schedule.ics";
  a.click();
}

/* 背景 */
bgInput.onchange=e=>{
  let file=e.target.files[0];
  if(!file)return;

  let bg=document.getElementById("bg");
  if(!bg){
    bg=document.createElement("img");
    bg.id="bg";
    scheduleArea.prepend(bg);
  }
  bg.src=URL.createObjectURL(file);
};

function toggleBlur(){
  isBlur=!isBlur;
  document.getElementById("bg")?.classList.toggle("blur");
}

/* 貼圖（限制範圍） */
stickerInput.onchange=e=>{
  let file=e.target.files[0];
  if(!file)return;

  let img=document.createElement("img");
  img.src=URL.createObjectURL(file);
  img.className="sticker";

  let drag=false,ox,oy;

  img.ontouchstart=e=>{
    drag=true;
    ox=e.touches[0].clientX-img.offsetLeft;
    oy=e.touches[0].clientY-img.offsetTop;
  };

  img.ontouchmove=e=>{
    if(!drag)return;

    let x=e.touches[0].clientX-ox;
    let y=e.touches[0].clientY-oy;

    x=Math.max(0,Math.min(x,scheduleArea.offsetWidth-80));
    y=Math.max(0,Math.min(y,scheduleArea.offsetHeight-80));

    img.style.left=x+"px";
    img.style.top=y+"px";
  };

  img.ontouchend=()=>drag=false;

  scheduleArea.appendChild(img);
};

function toggleMenu(){
  menu.style.display=menu.style.display==="block"?"none":"block";
}

function clearBg(){document.getElementById("bg")?.remove();}
function clearAll(){data={};render();}

render();
</script>

</body>
</html>
