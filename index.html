<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>群星低語 ✦ Whispering Cosmos</title>

    <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        :root {
            --bg1: #120e1a;
            --bg2: #1a1429;
            --bg3: #221a35;
            --gold: #d8bf8a;
            --text: #f4efff;
            --card: rgba(25, 20, 38, 0.65);
            --base-font-size: 16px;
        }

        body {
            min-height: 100vh;
            color: var(--text);
            font-family: "Zen Maru Gothic", sans-serif;
            background: radial-gradient(circle at top, rgba(150,120,255,.1), transparent 50%),
                        linear-gradient(180deg, var(--bg1), var(--bg2), var(--bg3));
            padding: 24px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 星空背景 */
        .stars {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: -3;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: .7;
            animation: twinkle 4s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: .15; transform: scale(.7); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        /* 魔法古典外框 */
        .frame {
            position: fixed;
            inset: 16px;
            border: 1px solid rgba(216,191,138,.25);
            border-radius: 30px;
            pointer-events: none;
            z-index: 999;
        }

        /* 主容器 */
        .stage {
            width: 100%;
            max-width: 460px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            z-index: 2;
            padding: 20px 0;
        }

        /* 懸浮月亮 */
        .moon-symbol {
            font-size: 36px;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(216, 191, 138, 0.4);
            animation: floatMoon 4s ease-in-out infinite;
            cursor: pointer;
        }

        @keyframes floatMoon {
            0%, 100% { transform: translateY(0px) rotate(-5deg); }
            50% { transform: translateY(6px) rotate(5deg); }
        }

        /* 大標題區塊 */
        .title-block {
            text-align: center;
        }

        .main-title {
            font-weight: 700;
            letter-spacing: 3px;
            font-size: clamp(26px, 6vw, 32px);
            background: linear-gradient(180deg, #ffffff 30%, #d8bf8a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 13px;
            color: #8c7fa6;
            margin-top: 6px;
            letter-spacing: 1px;
        }

        /* 核心卡片 */
        .portal-card {
            width: 100%;
            background: var(--card);
            border: 1px solid rgba(216, 191, 138, 0.15);
            border-radius: 28px;
            padding: 45px 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 30px 70px rgba(0,0,0,.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 初始狀態容器 */
        .init-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* 儀式按鈕 */
        .altar-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(216, 191, 138, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .altar-btn::before {
            content: "";
            position: absolute;
            inset: -6px;
            border: 1px dashed rgba(216,191,138,0.3);
            border-radius: 50%;
            animation: rotateClockwise 20s linear infinite;
        }

        @keyframes rotateClockwise {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .altar-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(216, 191, 138, 0.3);
            background: rgba(216, 191, 138, 0.05);
        }

        .btn-label {
            font-size: 14px;
            color: #bba9e8;
            letter-spacing: 2px;
            text-align: center;
        }

        /* 占卜結果呈現區 */
        .result-view {
            opacity: 0;
            transform: translateY(10px);
            display: none;
            width: 100%;
            text-align: center;
        }

        .result-view.active {
            opacity: 1;
            transform: translateY(0);
            display: block;
        }

        .card-icon {
            font-size: 42px;
            margin-bottom: 12px;
            text-shadow: 0 0 15px rgba(216, 191, 138, 0.4);
        }

        .card-name {
            font-size: 20px;
            color: var(--gold);
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .card-phrase {
            font-size: 14px;
            color: #d1c4e9;
            margin-bottom: 18px;
        }

        .card-detail {
            font-size: 13px;
            color: #a897c9;
            line-height: 1.7;
            text-align: justify;
            background: rgba(15, 11, 25, 0.25);
            padding: 16px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        /* 重置按鈕 */
        .reset-txt {
            font-size: 12px;
            color: #6a5d8c;
            margin-top: 20px;
            cursor: pointer;
            letter-spacing: 1px;
            display: inline-block;
        }

        .reset-txt:hover {
            color: var(--gold);
        }

        /* 頁尾：已修正為精準的 ✦ Lazy Dream ✦ */
        .footer {
            text-align: center;
            margin-top: 10px;
        }

        .footer-brand {
            font-size: 14px;
            letter-spacing: 1px;
            color: rgba(234, 223, 255, 0.5);
            font-weight: 500;
        }

        .footer-sub {
            font-size: 11px;
            color: #6a5d8c;
            margin-top: 4px;
        }

        /* 隱藏元素用 */
        .hide {
            opacity: 0 !important;
            transform: scale(0.9) !important;
            pointer-events: none;
            height: 0;
            margin: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="frame"></div>

<div class="stage">
    
    <div class="moon">
        <div class="moon-symbol" onclick="resetAltar()">☾</div>
    </div>

    <div class="title-block" id="titleBlock">
        <h1 class="main-title">群星低語</h1>
        <div class="subtitle">Whispering Cosmos</div>
    </div>

    <div class="portal-card">
        
        <div id="initView" class="init-box">
            <button class="altar-btn" onclick="whisperToStars()">✦</button>
            <div class="btn-label">輕觸星軌・聆聽低語</div>
        </div>

        <div id="resultView" class="result-view">
            <div class="card-icon" id="cardIcon">🔮</div>
            <div class="card-name" id="cardName">—</div>
            <div class="card-phrase" id="cardPhrase">「—」</div>
            <div class="card-detail" id="cardDetail">—</div>
            <div class="reset-txt" onclick="resetAltar()">✦ 重置星軌 ✦</div>
        </div>

    </div>

    <div class="footer">
        <div class="footer-brand">✦ Lazy Dream ✦</div>
        <div class="footer-sub">Crafted with moonlight & starlight magic</div>
    </div>
</div>

<script>
/* ===== 星空背景生成 ===== */
const stars = document.getElementById("stars");
for (let i = 0; i < 100; i++) {
    const star = document.createElement("div");
    star.className = "star";
    star.style.left = Math.random() * 100 + "%";
    star.style.top = Math.random() * 100 + "%";
    star.style.animationDelay = Math.random() * 4 + "s";
    stars.appendChild(star);
}

/* ===== 啟示資料庫 ===== */
const fateCards = [
    { icon: "🃏", name: "愚者", phrase: "踏上純粹的未知旅程。", detail: "星象顯示你正站在某個全新開端。別被過往的經驗束縛，大膽地盲信一次直覺，答案就在前方。" },
    { icon: "🧙‍♂️", name: "魔術師", phrase: "萬事俱備，只待你的意念。", detail: "周圍的能量正處於和諧狀態。你其實早已擁有解決當前難題的所有才華與工具，現在只需下定決心去創造。" },
    { icon: "👑", name: "女祭司", phrase: "在靜止中聆聽內心智慧。", detail: "群星建議你今日「以靜制動」。不需要急著向外尋求解答或認同，閉上雙眼，秘密會在安靜的黑夜中自行浮現。" },
    { icon: "☀️", name: "太陽", phrase: "驅散一切陰霾的純粹光明。", detail: "恭喜你，星軌正大放異彩！這是極致幸運的象徵。無論此時有什麼苦惱，溫暖的光芒都將照亮前路，帶來好結果。" },
    { icon: "🌙", name: "月亮", phrase: "迷霧微光，穩住前行的腳步。", detail: "潮汐正在影響你的心智，當前看見的阻礙可能只是恐懼投射出的幻影。穩住心神，等待晨曦破曉，迷霧自散。" },
    { icon: "🌟", name: "星星", phrase: "黑夜中永不熄滅的靈感指引。", detail: "在漫長的黑夜中，有一顆屬於你的星辰正閃爍著光芒。保持信念，這是一個漫長但絕對會走向療癒與豐盛的旅程。" }
];

/* ===== 核心點擊儀式邏輯 ===== */
function whisperToStars() {
    const initView = document.getElementById("initView");
    const resultView = document.getElementById("resultView");
    const titleBlock = document.getElementById("titleBlock");

    const card = fateCards[Math.floor(Math.random() * fateCards.length)];

    document.getElementById("cardIcon").innerText = card.icon;
    document.getElementById("cardName").innerText = card.name;
    document.getElementById("cardPhrase").innerText = `「${card.phrase}」`;
    document.getElementById("cardDetail").innerText = card.detail;

    titleBlock.classList.add("hide");
    initView.style.opacity = "0";
    
    setTimeout(() => {
        initView.style.display = "none";
        resultView.style.display = "block"; // 已修正這裡的 JS 小錯字
        
        setTimeout(() => {
            resultView.classList.add("active");
        }, 50);
    }, 400);
}

/* ===== 重置祭壇 ===== */
function resetAltar() {
    const initView = document.getElementById("initView");
    const resultView = document.getElementById("resultView");
    const titleBlock = document.getElementById("titleBlock");

    resultView.classList.remove("active");
    
    setTimeout(() => {
        resultView.style.display = "none";
        initView.style.display = "flex";
        
        setTimeout(() => {
            initView.style.opacity = "1";
            titleBlock.classList.remove("hide");
        }, 50);
    }, 400);
}
</script>

</body>
</html>
