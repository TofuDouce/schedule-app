<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule App</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:#f5f5f5;
text-align:center;
}

/* ===== 工具列 ===== */
.toolbar{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.group{
background:#fff;
border-radius:16px;
padding:10px;
}

.group h3{
margin:5px 0;
font-size:14px;
color:#888;
}

.group button, .group select{
width:100%;
margin:5px 0;
padding:10px;
border:none;
border-radius:12px;
background:#eee;
font-size:14px;
}

/* ===== 標題 ===== */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
font-size:26px;
font-weight:bold;
}

/* ===== 截圖區 ===== */
#capture{
margin:10px;
border-radius:30px;
overflow:hidden;
position:relative;
}

#bg{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
z-index:0;
}

#calendar{
position:relative;
z-index:1;
padding:10px;
}

/* ===== 星期 ===== */
.week{
display:grid;
grid-template-columns:repeat(7,1fr);
margin-bottom:5px;
}

/* ===== 日期格 ===== */
.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
}

.day{
background:rgba(255,255,255,0.9);
border-radius:16px;
padding:5px;
height:80px;
display:flex;
flex-direction:column;
justify-content:flex-start;
}

/* 週日 */
.sun{
background:rgba(255,200,200,0.5);
color:red;
}

/* 週六 */
.sat{
background:rgba(184,222,220,0.6);
}

/* ===== 班別 ===== */
.shift{
border-radius:10px;
margin-top:2px;
font-size:12px;
padding:2px;
color:#000;
}

.early{background:#E8D8A3;}
.noon{background:#E6B89C;}
.night{background:#B7E1FF;}
.all{background:#C8B6E2;}
.off{background:#A8CBB7;}

/* ===== 工具列按鈕 ===== */
.shiftBar{
display:flex;
justify-content:space-around;
margin:10px;
}

.shiftBtn{
padding:10px;
border-radius:20px;
min-width:60px;
color:#000;
}

.preview{
margin:10px;
}
</style>
</head>

<body>

<!-- ===== 工具列 ===== -->
<div class="toolbar">

<div class="group">
<h3>背景</h3>
<button onclick="clearBg()">清除背景</button>
<button onclick="blurBg()">模糊背景</button>
<input type="file" onchange="loadBg(event)">
</div>

<div class="group">
<h3>透明度</h3>
<button onclick="setOpacity(0.3)">30%</button>
<button onclick="setOpacity(0.6)">60%</button>
<button onclick="setOpacity(0.9)">90%</button>
</div>

<div class="group">
<h3>班表</h3>
<select id="sheetSelect" onchange="switchSheet()"></select>
<button onclick="saveSheet()">💾 儲存</button>
<button onclick="clearSchedule()">清空</button>
<button onclick="exportICS()">輸出行事曆</button>
</div>

<div class="group">
<h3>輸出</h3>
<button onclick="capture()">下載圖片</button>
</div>

</div>

<!-- ===== 標題 ===== -->
<div class="header">
<button onclick="prevMonth()">←</button>
<div id="title"></div>
<button onclick="nextMonth()">→</button>
</div>

<!-- ===== 截圖區 ===== -->
<div id="capture">
<div id="bg"></div>
<div id="calendar">
<div class="week">一 二 三 四 五 六 日</div>
<div class="grid" id="grid"></div>
</div>
</div>

<!-- ===== 班別按鈕 ===== -->
<div class="shiftBar">
<div class="shiftBtn early" onclick="setShift('early')">早</div>
<div class="shiftBtn noon" onclick="setShift('noon')">午</div>
<div class="shiftBtn night" onclick="setShift('night')">晚</div>
<div class="shiftBtn all" onclick="setShift('all')">全</div>
<div class="shiftBtn off" onclick="setShift('off')">休</div>
</div>

<img id="preview" class="preview"/>

<script>

let year=2026,month=4;
let data={};
let currentShift=null;
let sheets={sheet1:{}};
let currentSheet="sheet1";

/* ===== 初始化 ===== */
function init(){
updateSheetList();
render();
}
init();

/* ===== 班表 ===== */
function updateSheetList(){
let select=document.getElementById("sheetSelect");
select.innerHTML="";
Object.keys(sheets).forEach(k=>{
let op=document.createElement("option");
op.value=k;
op.text=k;
select.appendChild(op);
});
select.value=currentSheet;
}

function switchSheet(){
currentSheet=document.getElementById("sheetSelect").value;
data=sheets[currentSheet];
render();
}

function saveSheet(){
sheets[currentSheet]=JSON.parse(JSON.stringify(data));
alert("已儲存");
}

/* ===== 背景 ===== */
function loadBg(e){
let reader=new FileReader();
reader.onload=()=>{
document.getElementById("bg").style.backgroundImage=`url(${reader.result})`;
}
reader.readAsDataURL(e.target.files[0]);
}

function clearBg(){
document.getElementById("bg").style.backgroundImage="";
}

function blurBg(){
document.getElementById("bg").style.filter="blur(10px)";
}

/* ===== 透明 ===== */
function setOpacity(o){
document.querySelectorAll(".day").forEach(d=>{
d.style.background=`rgba(255,255,255,${o})`;
});
}

/* ===== 日曆 ===== */
function render(){
document.getElementById("title").innerText=`${year}年${month}月`;
let grid=document.getElementById("grid");
grid.innerHTML="";

let first=new Date(year,month-1,1).getDay();
first=(first===0?6:first-1);

for(let i=0;i<first;i++){
grid.appendChild(document.createElement("div"));
}

let days=new Date(year,month,0).getDate();

for(let d=1;d<=days;d++){
let div=document.createElement("div");
div.className="day";

let dayOfWeek=(first+d-1)%7;
if(dayOfWeek===5) div.classList.add("sat");
if(dayOfWeek===6) div.classList.add("sun");

div.innerHTML=`<b>${d}</b>`;

if(data[d]){
data[d].forEach(s=>{
let sdiv=document.createElement("div");
sdiv.className="shift "+s;
sdiv.innerText=getName(s);
div.appendChild(sdiv);
});
}

div.onclick=()=>{
if(!currentShift)return;
if(currentShift==="all"){
data[d]=["all"];
}else{
data[d]=data[d]||[];
data[d].push(currentShift);
}
render();
};

grid.appendChild(div);
}
}

function getName(s){
return {early:"早",noon:"午",night:"晚",all:"全",off:"休"}[s];
}

/* ===== 班別 ===== */
function setShift(s){
currentShift=s;
}

/* ===== 月份 ===== */
function prevMonth(){month--;if(month<1){month=12;year--;}render();}
function nextMonth(){month++;if(month>12){month=1;year++;}render();}

/* ===== 清空 ===== */
function clearSchedule(){
data={};
render();
}

/* ===== 截圖 ===== */
function capture(){
html2canvas(document.getElementById("capture")).then(canvas=>{
let img=canvas.toDataURL();
let preview=document.getElementById("preview");
preview.src=img;

let a=document.createElement("a");
a.href=img;
a.download="schedule.png";
a.click();
});
}

/* ===== 行事曆 ===== */
function exportICS(){
let text="BEGIN:VCALENDAR\n";
Object.keys(data).forEach(d=>{
text+=`BEGIN:VEVENT\nSUMMARY:班表\nDTSTART:${year}${month}${d}\nEND:VEVENT\n`;
});
text+="END:VCALENDAR";

let blob=new Blob([text]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="schedule.ics";
a.click();
}

</script>

</body>
</html>
