<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  padding:10px;
  font-family:sans-serif;
  background:#f5f5f5;
}

/* 工具列 */
.topbar{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  position:relative;
  z-index:1000;
}
.topbar button{
  height:50px;
  font-size:22px;
  border:none;
  border-radius:12px;
  background:#fff;
}

/* 包裹 */
#wrap{
  position:relative;
  margin-top:10px;
}

/* 背景 */
#bg{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
}

/* 月曆 */
.calendar{
  position:relative;
  z-index:1;
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
}

.day{
  aspect-ratio:1;
  background:rgba(255,255,255,0.9);
  border-radius:12px;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:4px;
}

.saturday{background:#f3f3f3;}
.sunday{background:#FBE7EF;color:red;}

/* 班別 */
.shift{
  width:80%;
  text-align:center;
  border-radius:6px;
  font-size:12px;
  margin-top:2px;
}

.morning{background:#f7e7a9;}
.noon{background:#f5c6aa;}
.night{background:#d8c3a5;}
.full{background:#d6c2f0;}
.off{background:#bfe3d0;}

/* 底部 */
.bottom{
  display:flex;
  gap:6px;
  margin-top:10px;
}
.bottom button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
}

/* 對應顏色 */
.bottom button:nth-child(1){background:#f7e7a9;}
.bottom button:nth-child(2){background:#f5c6aa;}
.bottom button:nth-child(3){background:#d8c3a5;}
.bottom button:nth-child(4){background:#d6c2f0;}
.bottom button:nth-child(5){background:#bfe3d0;}

.bottom button.active{
  outline:2px solid #333;
}

/* 預覽 */
#preview{text-align:center;margin-top:15px;}
#preview canvas{width:100%;border-radius:10px;}
</style>
</head>

<body>

<!-- 工具列 -->
<div class="topbar">
  <button onclick="exportImage()">📸</button>
  <button onclick="document.getElementById('stickerInput').click()">🖼️</button>
  <button onclick="document.getElementById('bgInput').click()">🎨</button>
  <button onclick="clearAll()">🧹</button>
</div>

<input id="stickerInput" type="file" style="display:none" onchange="addSticker(event)">
<input id="bgInput" type="file" style="display:none" onchange="setBg(event)">

<h3 style="text-align:center;">2026年4月</h3>

<div id="wrap">
  <img id="bg">
  <div class="calendar" id="calendar"></div>
</div>

<!-- 班別 -->
<div class="bottom">
  <button onclick="setType(event,'morning')">早</button>
  <button onclick="setType(event,'noon')">午</button>
  <button onclick="setType(event,'night')">晚</button>
  <button onclick="setType(event,'full')">全</button>
  <button onclick="setType(event,'off')">休</button>
</div>

<div id="preview"></div>

<script>
let selected="";
let data={};
const order=["morning","noon","night","full"];

function setType(e,t){
  selected=t;
  document.querySelectorAll(".bottom button").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");
}

function render(){
  const cal=document.getElementById("calendar");
  cal.innerHTML="";

  for(let i=1;i<=30;i++){
    const d=document.createElement("div");
    d.className="day";

    if(i%7==6)d.classList.add("saturday");
    if(i%7==0)d.classList.add("sunday");

    d.innerHTML=`<div>${i}</div>`;

    (data[i]||[]).forEach(t=>{
      const div=document.createElement("div");
      div.className="shift "+t;
      div.innerText={
        morning:"早",noon:"午",night:"晚",full:"全",off:"休"
      }[t];
      d.appendChild(div);
    });

    d.onclick=()=>{
      if(!selected)return;
      if(!data[i])data[i]=[];

      if(data[i].includes(selected)){
        data[i]=data[i].filter(x=>x!==selected);
      }else{
        data[i].push(selected);
      }

      data[i].sort((a,b)=>order.indexOf(a)-order.indexOf(b));
      render();
    };

    cal.appendChild(d);
  }
}

function setBg(e){
  document.getElementById("bg").src=URL.createObjectURL(e.target.files[0]);
}

function clearAll(){
  data={};
  document.getElementById("bg").src="";
  document.querySelectorAll(".sticker").forEach(s=>s.remove());
  render();
}

/* 🔥 貼圖（可拖曳） */
function addSticker(e){
  const img=document.createElement("img");
  img.src=URL.createObjectURL(e.target.files[0]);
  img.className="sticker";
  img.style.position="absolute";
  img.style.width="80px";
  img.style.top="50px";
  img.style.left="50px";
  img.style.zIndex="999";

  let isDragging=false,offsetX=0,offsetY=0;

  img.addEventListener("touchstart",(ev)=>{
    isDragging=true;
    offsetX=ev.touches[0].clientX-img.offsetLeft;
    offsetY=ev.touches[0].clientY-img.offsetTop;
  });

  img.addEventListener("touchmove",(ev)=>{
    if(!isDragging)return;
    img.style.left=(ev.touches[0].clientX-offsetX)+"px";
    img.style.top=(ev.touches[0].clientY-offsetY)+"px";
  });

  img.addEventListener("touchend",()=>isDragging=false);

  img.ondblclick=()=>img.remove();

  document.getElementById("wrap").appendChild(img);
}

/* 匯出（預覽） */
function exportImage(){
  html2canvas(document.querySelector("#wrap")).then(canvas=>{
    const p=document.getElementById("preview");
    p.innerHTML="";
    p.appendChild(canvas);

    const btn=document.createElement("button");
    btn.innerText="下載圖片";
    btn.onclick=()=>{
      const a=document.createElement("a");
      a.href=canvas.toDataURL();
      a.download="schedule.png";
      a.click();
    };
    p.appendChild(btn);
  });
}

render();
</script>

</body>
</html>
