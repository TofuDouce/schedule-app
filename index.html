<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  padding:10px;
  font-family:sans-serif;
  background:#f5f5f5;
}

/* 工具列 */
.topbar{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:10px;
}
.topbar button{
  height:50px;
  font-size:22px;
  border:none;
  border-radius:12px;
  background:#fff;
}

/* 月曆 */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
}

.day{
  aspect-ratio:1;
  border-radius:12px;
  background:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:4px;
}

.saturday{ background:#f3f3f3; }
.sunday{ background:#FBE7EF; color:red; }

/* 班別顏色 */
.shift{
  width:80%;
  text-align:center;
  border-radius:6px;
  font-size:12px;
  margin-top:2px;
}

.morning{ background:#fff3a3; }
.noon{ background:#ffc9a9; }
.night{ background:#d6c4a3; }
.full{ background:#d6c4f0; color:#fff; }

/* 班別按鈕 */
.bottom{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}
.bottom button{
  flex:1;
  margin:4px;
  border-radius:20px;
  border:none;
  padding:10px;
  background:#fff;
}

/* 預覽 */
#preview{
  margin-top:15px;
  text-align:center;
}
#preview canvas{
  width:100%;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- 工具列 -->
<div class="topbar">
  <button onclick="exportImage()">📸</button>
  <button>🖼️</button>
  <button>🎨</button>
  <button>⚙️</button>
</div>

<h3 style="text-align:center;">2026年4月</h3>

<div class="calendar" id="calendar"></div>

<!-- 班別 -->
<div class="bottom">
  <button onclick="setType('morning')">早</button>
  <button onclick="setType('noon')">午</button>
  <button onclick="setType('night')">晚</button>
  <button onclick="setType('full')">全</button>
</div>

<!-- 預覽 -->
<div id="preview"></div>

<script>
let selected="";
let data={};
const order=["morning","noon","night","full"];

function setType(t){ selected=t; }

function render(){
  const cal=document.getElementById("calendar");
  cal.innerHTML="";

  for(let i=1;i<=30;i++){
    const d=document.createElement("div");
    d.className="day";

    if(i%7==6) d.classList.add("saturday");
    if(i%7==0) d.classList.add("sunday");

    let box=data[i]||[];

    d.innerHTML=`<div>${i}</div>`;

    box.forEach(t=>{
      const div=document.createElement("div");
      div.className="shift "+t;
      div.innerText={
        morning:"早",
        noon:"午",
        night:"晚",
        full:"全"
      }[t];
      d.appendChild(div);
    });

    d.onclick=()=>{
      if(!selected) return;
      if(!data[i]) data[i]=[];

      if(!data[i].includes(selected)){
        data[i].push(selected);
      }

      data[i].sort((a,b)=>order.indexOf(a)-order.indexOf(b));
      render();
    };

    cal.appendChild(d);
  }
}

function exportImage(){
  html2canvas(document.body).then(canvas=>{
    const p=document.getElementById("preview");
    p.innerHTML="";
    p.appendChild(canvas);

    const btn=document.createElement("button");
    btn.innerText="下載圖片";
    btn.onclick=()=>{
      const a=document.createElement("a");
      a.href=canvas.toDataURL();
      a.download="schedule.png";
      a.click();
    };
    p.appendChild(btn);
  });
}

render();
</script>

</body>
</html>
