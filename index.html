<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#f3f4f6;padding:10px;}

.topbar{display:flex;gap:5px;margin-bottom:10px;}
.topbar>*{flex:1;font-size:12px;padding:6px;}

#capture{position:relative;}
#bgLayer{
  position:absolute;width:100%;height:100%;
  background-size:cover;background-position:center;
  z-index:0;
}

.calendarWrap{position:relative;z-index:1;}

.title{text-align:center;font-weight:bold;margin:10px 0;}

.week{
  display:grid;grid-template-columns:repeat(7,1fr);
  text-align:center;margin-bottom:5px;
}
.week div:last-child{color:red;}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:10px;
}

.day{
  aspect-ratio:1/1;
  border-radius:14px;
  padding:5px;
  background:rgba(255,255,255,0.9);
}

.sat{background:#f2f2f2;}
.sun{background:#FBE7EF;}

.num{font-size:12px;}
.sun .num{color:red;}

.tag{
  font-size:10px;margin-top:2px;
  text-align:center;border-radius:6px;
}

.morning{background:#fff3a3;}
.noon{background:#ffd6c2;}
.night{background:#d6c2a3;}
.full{background:#dcd6f7;}
.off{background:#cfe5dc;}

.sticker-layer{
  position:absolute;width:100%;height:100%;
  pointer-events:none;z-index:5;
}
.sticker{
  position:absolute;width:70px;
  pointer-events:auto;
}
</style>
</head>

<body>

<div class="topbar">
<button onclick="saveImage()">📸</button>
<input type="file" id="stickerInput">
<input type="file" id="bgInput">

<select id="menu">
<option>⚙️功能</option>
<option value="clearBg">清除背景</option>
<option value="clearData">清空班表</option>
<option value="blur">背景模糊</option>
<option value="export">匯出行事曆</option>
</select>

<select id="slot"></select>
</div>

<div id="capture">

<div id="bgLayer"></div>

<div class="calendarWrap" id="calendarArea">

<div style="display:flex;justify-content:space-between;">
<button onclick="changeMonth(-1)">←</button>
<div class="title" id="title"></div>
<button onclick="changeMonth(1)">→</button>
</div>

<div class="week">
<div>一</div><div>二</div><div>三</div>
<div>四</div><div>五</div><div>六</div><div>日</div>
</div>

<div class="calendar" id="calendar"></div>

</div>

<div class="sticker-layer" id="stickerLayer"></div>

</div>

<div style="display:flex;justify-content:space-around;margin-top:10px;">
<button onclick="selectType('morning')">早</button>
<button onclick="selectType('noon')">午</button>
<button onclick="selectType('night')">晚</button>
<button onclick="selectType('full')">全</button>
<button onclick="selectType('off')">休</button>
</div>

<script>
let currentDate=new Date();
let schedule={};
let currentType=null;
let currentSlot=1;
let opacity=0.9;
let blur=false;

const order=["morning","noon","night","full","off"];

/* 10組 */
const slot=document.getElementById("slot");
for(let i=1;i<=10;i++){
 let o=document.createElement("option");
 o.value=i;o.text="班表"+i;
 slot.appendChild(o);
}

slot.onchange=e=>{
 localStorage.setItem("sch_"+currentSlot,JSON.stringify(schedule));
 currentSlot=e.target.value;
 schedule=JSON.parse(localStorage.getItem("sch_"+currentSlot)||"{}");
 render();
};

function selectType(t){currentType=t;}

function toggle(d){
 if(!currentType)return;
 let key=currentDate.getFullYear()+"-"+currentDate.getMonth()+"-"+d;
 let data=schedule[key]||[];

 if(currentType==="full"){
  data=["full"];
 }else{
  data=data.filter(x=>x!=="full");
  if(data.includes(currentType)){
    data=data.filter(x=>x!==currentType);
  }else{
    data.push(currentType);
  }
 }

 data.sort((a,b)=>order.indexOf(a)-order.indexOf(b));
 schedule[key]=data;
 render();
}

function render(){
 const cal=document.getElementById("calendar");
 cal.innerHTML="";
 let y=currentDate.getFullYear();
 let m=currentDate.getMonth();
 document.getElementById("title").innerText=y+"年"+(m+1)+"月";

 let first=new Date(y,m,1).getDay();
 first=first===0?6:first-1;
 let days=new Date(y,m+1,0).getDate();

 for(let i=0;i<first;i++)cal.innerHTML+="<div></div>";

 for(let i=1;i<=days;i++){
  let d=new Date(y,m,i).getDay();

  let div=document.createElement("div");
  div.className="day";
  if(d===0)div.classList.add("sun");
  if(d===6)div.classList.add("sat");

  let key=y+"-"+m+"-"+i;
  let data=schedule[key]||[];

  div.innerHTML=`<div class="num">${i}</div>`;

  data.forEach(t=>{
    let tag=document.createElement("div");
    tag.className="tag "+t;
    tag.innerText=
      t==="morning"?"早":
      t==="noon"?"午":
      t==="night"?"晚":
      t==="full"?"全":"休";
    div.appendChild(tag);
  });

  div.onclick=()=>toggle(i);
  cal.appendChild(div);
 }
}

function changeMonth(n){
 currentDate.setMonth(currentDate.getMonth()+n);
 render();
}

/* 背景 */
document.getElementById("bgInput").onchange=e=>{
 let f=e.target.files[0];
 let r=new FileReader();
 r.onload=()=>bgLayer.style.backgroundImage=`url(${r.result})`;
 r.readAsDataURL(f);
};

/* 貼圖 */
document.getElementById("stickerInput").onchange=e=>{
 let f=e.target.files[0];
 let r=new FileReader();
 r.onload=()=>{
  let img=document.createElement("img");
  img.src=r.result;
  img.className="sticker";
  img.style.left="50px";img.style.top="100px";

  drag(img);

  let last=0;
  img.ontouchend=()=>{
    let now=Date.now();
    if(now-last<300)img.remove();
    last=now;
  };

  stickerLayer.appendChild(img);
 };
 r.readAsDataURL(f);
};

function drag(el){
 let x,y;
 el.ontouchstart=e=>{
  let t=e.touches[0];
  x=t.clientX-el.offsetLeft;
  y=t.clientY-el.offsetTop;
 };
 el.ontouchmove=e=>{
  let t=e.touches[0];
  el.style.left=t.clientX-x+"px";
  el.style.top=t.clientY-y+"px";
 };
}

/* 功能 */
menu.onchange=e=>{
 let v=e.target.value;

 if(v==="clearBg")bgLayer.style.backgroundImage="";
 if(v==="clearData"){schedule={};render();}
 if(v==="blur"){
  blur=!blur;
  bgLayer.style.filter=blur?"blur(8px)":"none";
 }

 if(v==="export"){
  let txt="BEGIN:VCALENDAR\nVERSION:2.0\n";
  for(let k in schedule){
    let [y,m,d]=k.split("-");
    let content=schedule[k].join(" ");
    if(!content)continue;
    let date=`${y}${String(+m+1).padStart(2,"0")}${String(d).padStart(2,"0")}`;
    txt+=`BEGIN:VEVENT\nSUMMARY:${content}\nDTSTART;VALUE=DATE:${date}\nEND:VEVENT\n`;
  }
  txt+="END:VCALENDAR";
  let blob=new Blob([txt]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="schedule.ics";
  a.click();
 }
};

/* 截圖 */
function saveImage(){
 html2canvas(document.getElementById("calendarArea")).then(c=>{
  let img=new Image();
  img.src=c.toDataURL();
  document.body.appendChild(img);
 });
}

render();
</script>

</body>
</html>
