<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:#f5f5f5;
}

/* ===== 工具列 ===== */
.toolbar{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
padding:10px;
}

.group{
background:#fff;
border-radius:16px;
padding:10px;
}

.group h3{
margin:5px 0;
font-size:14px;
color:#888;
}

.group button,.group select,.group input{
width:100%;
margin:5px 0;
padding:10px;
border:none;
border-radius:12px;
background:#eee;
}

/* ===== 標題 ===== */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
font-size:26px;
font-weight:bold;
}

/* ===== 截圖區 ===== */
#capture{
margin:10px;
border-radius:30px;
overflow:hidden;
position:relative;
background:#fff;
}

#bg{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
z-index:0;
}

#calendar{
position:relative;
z-index:1;
padding:10px;
}

/* ===== 星期 ===== */
.week{
display:grid;
grid-template-columns:repeat(7,1fr);
font-weight:bold;
margin-bottom:5px;
}

.week div{
text-align:center;
}

/* ===== 格子 ===== */
.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
}

.day{
background:rgba(255,255,255,0.9);
border-radius:16px;
height:90px;
padding:5px;
display:flex;
flex-direction:column;
}

/* 週六 */
.sat{
background:rgba(184,222,220,0.6);
}

/* 週日 */
.sun{
background:rgba(255,200,200,0.5);
color:red;
}

/* ===== 班別 ===== */
.shift{
border-radius:10px;
margin-top:3px;
font-size:12px;
padding:2px;
text-align:center;
}

.early{background:#E8D8A3;}
.noon{background:#E6B89C;}
.night{background:#B7E1FF;}
.all{background:#C8B6E2;}
.off{background:#A8CBB7;}

/* ===== 按鈕 ===== */
.shiftBar{
display:flex;
justify-content:space-around;
margin:10px;
}

.shiftBtn{
padding:10px;
border-radius:20px;
min-width:60px;
text-align:center;
}
</style>
</head>

<body>

<!-- 工具列 -->
<div class="toolbar">

<div class="group">
<h3>背景</h3>
<button onclick="clearBg()">清除背景</button>
<button onclick="blurBg()">模糊背景</button>
<input type="file" onchange="loadBg(event)">
</div>

<div class="group">
<h3>透明度</h3>
<button onclick="setOpacity(0.3)">30%</button>
<button onclick="setOpacity(0.6)">60%</button>
<button onclick="setOpacity(0.9)">90%</button>
</div>

<div class="group">
<h3>班表</h3>
<select id="sheetSelect" onchange="switchSheet()"></select>
<button onclick="saveSheet()">💾 儲存</button>
<button onclick="clearSchedule()">清空</button>
<button onclick="exportICS()">輸出行事曆</button>
</div>

<div class="group">
<h3>輸出</h3>
<button onclick="capture()">下載圖片</button>
</div>

</div>

<!-- 標題 -->
<div class="header">
<button onclick="prevMonth()">←</button>
<div id="title"></div>
<button onclick="nextMonth()">→</button>
</div>

<!-- 截圖區 -->
<div id="capture">
<div id="bg"></div>

<div id="calendar">

<div class="week">
<div>一</div>
<div>二</div>
<div>三</div>
<div>四</div>
<div>五</div>
<div>六</div>
<div>日</div>
</div>

<div class="grid" id="grid"></div>

</div>
</div>

<!-- 班別 -->
<div class="shiftBar">
<div class="shiftBtn early" onclick="setShift('early')">早</div>
<div class="shiftBtn noon" onclick="setShift('noon')">午</div>
<div class="shiftBtn night" onclick="setShift('night')">晚</div>
<div class="shiftBtn all" onclick="setShift('all')">全</div>
<div class="shiftBtn off" onclick="setShift('off')">休</div>
</div>

<script>

let year=2026,month=4;
let data={};
let sheets={sheet1:{}};
let currentSheet="sheet1";
let currentShift=null;

/* 初始化 */
function init(){
updateSheet();
render();
}
init();

/* ===== 班表 ===== */
function updateSheet(){
let s=document.getElementById("sheetSelect");
s.innerHTML="";
for(let k in sheets){
let op=document.createElement("option");
op.value=k;
op.text=k;
s.appendChild(op);
}
s.value=currentSheet;
}

function switchSheet(){
currentSheet=document.getElementById("sheetSelect").value;
data=sheets[currentSheet];
render();
}

function saveSheet(){
sheets[currentSheet]=JSON.parse(JSON.stringify(data));
alert("已儲存");
}

/* ===== 背景 ===== */
function loadBg(e){
let r=new FileReader();
r.onload=()=>{
document.getElementById("bg").style.backgroundImage=`url(${r.result})`;
};
r.readAsDataURL(e.target.files[0]);
}

function clearBg(){
document.getElementById("bg").style.backgroundImage="";
document.getElementById("bg").style.filter="";
}

function blurBg(){
document.getElementById("bg").style.filter="blur(10px)";
}

/* ===== 透明 ===== */
function setOpacity(o){
document.querySelectorAll(".day").forEach(d=>{
d.style.background=`rgba(255,255,255,${o})`;
});
}

/* ===== 日曆 ===== */
function render(){
document.getElementById("title").innerText=`${year}年${month}月`;
let grid=document.getElementById("grid");
grid.innerHTML="";

let first=new Date(year,month-1,1).getDay();
first=(first===0?6:first-1);

for(let i=0;i<first;i++){
grid.appendChild(document.createElement("div"));
}

let days=new Date(year,month,0).getDate();

for(let d=1;d<=days;d++){
let div=document.createElement("div");
div.className="day";

let w=(first+d-1)%7;
if(w===5) div.classList.add("sat");
if(w===6) div.classList.add("sun");

div.innerHTML=`<b>${d}</b>`;

if(data[d]){
data[d].forEach(s=>{
let el=document.createElement("div");
el.className="shift "+s;
el.innerText=name(s);
div.appendChild(el);
});
}

div.onclick=()=>{
if(!currentShift)return;
if(currentShift==="all"){
data[d]=["all"];
}else{
data[d]=data[d]||[];
data[d].push(currentShift);
}
render();
};

grid.appendChild(div);
}
}

function name(s){
return {early:"早",noon:"午",night:"晚",all:"全",off:"休"}[s];
}

/* ===== 控制 ===== */
function setShift(s){currentShift=s;}

function prevMonth(){
month--;if(month<1){month=12;year--;}render();
}

function nextMonth(){
month++;if(month>12){month=1;year++;}render();
}

function clearSchedule(){
data={};
render();
}

/* ===== 截圖 ===== */
function capture(){
html2canvas(document.getElementById("capture")).then(c=>{
let link=document.createElement("a");
link.href=c.toDataURL();
link.download="schedule.png";
link.click();
});
}

/* ===== 行事曆 ===== */
function exportICS(){
let txt="BEGIN:VCALENDAR\n";
for(let d in data){
txt+=`BEGIN:VEVENT\nSUMMARY:班表\nDTSTART:${year}${month}${d}\nEND:VEVENT\n`;
}
txt+="END:VCALENDAR";

let blob=new Blob([txt]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="schedule.ics";
a.click();
}

</script>

</body>
</html>
