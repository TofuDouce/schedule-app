<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Style Engine | 設計風格轉換器</title>
<style>
  :root {
    --bg: #F8F9FA; --sidebar-bg: #FFFFFF;
    --accent: #2563EB; --text: #1E293B; --border: #E2E8F0;
  }
  body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; }

  /* 側邊欄：質感升級 */
  .sidebar { width: 360px; background: var(--sidebar-bg); border-right: 1px solid var(--border); padding: 24px; display: flex; flex-direction: column; gap: 20px; box-shadow: 4px 0 15px rgba(0,0,0,0.03); z-index: 10; }
  .title-area { border-bottom: 2px solid var(--bg); padding-bottom: 16px; }
  .title-area h2 { margin: 0; font-size: 20px; letter-spacing: -0.5px; }

  /* 風格卡片：更精簡、優雅 */
  .style-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .style-card { 
    padding: 12px; border: 1px solid var(--border); border-radius: 10px; cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4,0,0.2,1); display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500;
  }
  .style-card:hover { border-color: var(--accent); background: #F0F7FF; }
  .style-card.on { border-color: var(--accent); background: #EFF6FF; color: var(--accent); }
  .dot { width: 10px; height: 10px; border-radius: 50%; }

  /* 預覽區域：高級感 */
  .main { flex: 1; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .frame-wrap { 
    flex: 1; background: #FFF; border-radius: 16px; overflow: hidden; 
    border: 1px solid var(--border); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
    position: relative;
  }
  iframe { width: 100%; height: 100%; border: none; }
  
  /* 按鈕樣式 */
  .action-btn { 
    background: #1E293B; color: white; padding: 12px; border-radius: 8px; border: none;
    font-weight: 600; cursor: pointer; transition: 0.2s;
  }
  .action-btn:hover { background: #0F172A; transform: translateY(-1px); }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="title-area"><h2>Design Engine</h2></div>
  <div class="style-grid" id="styleGrid"></div>
  <textarea id="inputHtml" style="flex:1; padding:16px; border-radius:8px; border:1px solid var(--border); font-size: 12px;" placeholder="貼入 HTML 代碼..."></textarea>
  <button class="action-btn" onclick="process()">渲染設計風格</button>
</aside>

<main class="main">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <strong>預覽畫面</strong>
    <button style="border:1px solid var(--border); background:white; padding:6px 12px; border-radius:6px; cursor:pointer;" onclick="toggleFS()">⛶ 全螢幕</button>
  </div>
  <div class="frame-wrap" id="frameWrap">
    <iframe id="preview"></iframe>
  </div>
</main>

<script>
const themes = [
  { name: 'Apple 簡潔', color: '#000000' }, { name: '質感醫療', color: '#2C5F8A' },
  { name: '賽博龐克', color: '#D946EF' }, { name: '北歐森系', color: '#065F46' },
  { name: '溫柔奶油', color: '#FCA5A5' }, { name: '深海湛藍', color: '#0369A1' },
  { name: '復古書卷', color: '#9F1239' }, { name: '暗黑模式', color: '#374151' },
  { name: '薰衣草色', color: '#7C3AED' }, { name: '陽光活潑', color: '#F59E0B' }
];

const grid = document.getElementById('styleGrid');
themes.forEach((t, i) => {
  const div = document.createElement('div');
  div.className = `style-card ${i === 0 ? 'on' : ''}`;
  div.innerHTML = `<span class="dot" style="background:${t.color}"></span>${t.name}`;
  div.onclick = function() {
    document.querySelectorAll('.style-card').forEach(c => c.classList.remove('on'));
    this.classList.add('on');
  };
  grid.appendChild(div);
});

function process() {
  const html = document.getElementById('inputHtml').value;
  const frame = document.getElementById('preview');
  // 這裡放入您覺得最優雅的 CSS 規則注入
  const blob = new Blob([html], { type: 'text/html' });
  frame.src = URL.createObjectURL(blob);
}

function toggleFS() { document.getElementById('frameWrap').requestFullscreen(); }
</script>
</body>
</html>
