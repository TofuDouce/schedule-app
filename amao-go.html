<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿毛之塔</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card-bg: rgba(22, 33, 62, 0.95);
            --accent: #ff7675;
            --gold: #ffeaa7;
            --text: #dfe6e9;
            --morandi-blue: #74b9ff;
            --morandi-green: #55efc4;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; font-family: -apple-system, "Microsoft JhengHei", sans-serif;
            background: var(--bg); color: var(--text); overflow: hidden;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* 1. 阿毛舞台區：佔比約 45%，阿毛與層數資訊極大化 */
        .stage {
            flex: 0 0 45%; position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #bg-lvl {
            position: absolute; font-size: 10rem; font-weight: 900;
            color: rgba(255, 255, 255, 0.05); z-index: 0;
            text-shadow: 0 0 20px rgba(255,255,255,0.05);
        }

        #amao-emoji {
            font-size: 100px; z-index: 2; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .status-top {
            position: absolute; top: 15px; width: 90%; display: flex; justify-content: space-between;
            font-size: 16px; font-weight: bold; color: var(--gold); z-index: 10;
        }

        /* 2. 日誌文字層：嚴格佔比 30%，字體放大 */
        .log-container {
            flex: 0 0 30%; background: rgba(0,0,0,0.3); overflow-y: auto;
            padding: 15px; border-top: 1px solid rgba(255,255,255,0.1);
        }
        .log-entry { 
            margin-bottom: 8px; border-left: 4px solid var(--accent); 
            padding-left: 12px; line-height: 1.5;
            font-size: 18px; font-weight: 500;
        }

        /* 3. 底部懸浮功能區：佔比約 25% */
        .float-controls {
            flex: 1; padding: 10px 15px 20px 15px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border-radius: 25px 25px 0 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; gap: 8px;
            z-index: 20;
        }

        .main-btn {
            background: var(--gold); color: #2d3436; border: none; padding: 14px;
            border-radius: 15px; font-size: 20px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 0 #b2bec3; width: 100%;
        }
        .main-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #b2bec3; }

        .sub-btns { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; 
        }
        .sub-btn {
            background: rgba(255,255,255,0.08); color: #fff; border: none; padding: 10px 5px;
            border-radius: 12px; font-size: 14px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center;
        }
        .sub-btn span:first-child { font-size: 20px; margin-bottom: 4px; }

        #drawer {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 75%;
            background: #121212; border-radius: 25px 25px 0 0; z-index: 100;
            transition: bottom 0.3s ease-out; padding: 25px; border-top: 2px solid var(--gold);
        }
        #drawer.open { bottom: 0; }
    </style>
</head>
<body>

    <div class="stage">
        <div id="bg-lvl">0001</div>
        <div class="status-top">
            <div id="stat-nrg">⚡ 體力: 60/60</div>
            <div id="stat-gold">💰 金幣: 100</div>
        </div>
        <div id="amao-emoji">🐶</div>
        <div id="amao-title" style="margin-top: 15px; color: var(--gold); font-size: 18px; font-weight: bold; letter-spacing: 1px;">【初出的冒險犬】</div>
    </div>

    <div class="log-container" id="log-box">
        <div class="log-entry" style="color:var(--morandi-blue);">🐾 阿毛在夢境醒來了。</div>
    </div>

    <div class="float-controls">
        <button class="main-btn" onclick="AmaoApp.rollDice()">🎲 投擲命運</button>
        <div class="sub-btns">
            <button class="sub-btn" onclick="UI.openDrawer('bag')"><span>🍱</span><span>萬寶袋</span></button>
            <button class="sub-btn" onclick="UI.openDrawer('collection')"><span>🏅</span><span>榮譽牆</span></button>
            <button class="sub-btn" onclick="UI.openDrawer('shop')"><span>🛒</span><span>找商人</span></button>
        </div>
    </div>

    <div id="drawer">
        <div class="drawer-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 id="drawer-title" style="margin:0;">標題</h2>
            <button onclick="UI.closeDrawer()" style="background:none; border:none; color:#fff; font-size:28px;">✕</button>
        </div>
        <div id="drawer-content" style="height: calc(100% - 60px); overflow-y: auto;"></div>
    </div>

    <script>
        const state = {
            lvl: 1, nrg: 60, gold: 100,
            title: "【初出的冒險犬】",
            unlockedTitles: ["【初出的冒險犬】"],
            inv: [], isProcessing: false
        };

        const Generator = {
            rnd: (arr) => arr[Math.floor(Math.random() * arr.length)],
            getFood: () => ({ name: Generator.rnd(["香噴噴烤雞", "夢幻舒芙蕾", "莫蘭迪拿鐵"]), type: "美食", val: 20 }),
            getFurniture: () => ({ name: Generator.rnd(["質感灰落地燈", "北歐風單人椅", "莫蘭迪地毯"]), type: "家具" }),
            getTitle: () => `【${Generator.rnd(["夢境", "星光", "幻夢"])}${Generator.rnd(["守護者", "收藏家", "觀察家"])}】`
        };

        const AmaoApp = {
            updateUI: function() {
                document.getElementById('bg-lvl').innerText = String(state.lvl).padStart(4, '0');
                document.getElementById('stat-nrg').innerText = `⚡ 體力: ${state.nrg}/60`;
                document.getElementById('stat-gold').innerText = `💰 金幣: ${state.gold}`;
                document.getElementById('amao-title').innerText = state.title;
                localStorage.setItem("AmaoTowerSave_Final", JSON.stringify(state));
            },
            addLog: function(msg, color = "#fff") {
                const box = document.getElementById('log-box');
                const div = document.createElement('div');
                div.className = "log-entry";
                div.style.color = color;
                div.style.borderLeftColor = color;
                div.innerText = msg;
                box.prepend(div);
            },
            rollDice: function() {
                if (state.nrg < 5) {
                    this.addLog("❌ 體力不足，阿毛跑不動了。", "#ff4757");
                    return;
                }
                if (state.isProcessing) return;
                
                state.isProcessing = true;

                try {
                    const steps = Math.floor(Math.random() * 6) + 1;
                    state.nrg -= 5;
                    state.lvl += steps;
                    
                    this.addLog(`🎲 投出了 ${steps} 點！來到 ${state.lvl}F`, "#ffeaa7");

                    // 處理隨機事件
                    const r = Math.random();
                    if (r < 0.15) {
                        const item = Generator.getFood();
                        state.inv.push(item);
                        this.addLog(`🍱 獲得美食：${item.name}`, "#55efc4");
                    } else if (r < 0.25) {
                        const item = Generator.getFurniture();
                        state.inv.push(item);
                        this.addLog(`🏠 獲得家具：${item.name}`, "#74b9ff");
                    }

                    this.updateUI();

                    const emoji = document.getElementById('amao-emoji');
                    emoji.style.transform = "scale(1.3) translateY(-30px)";
                    setTimeout(() => {
                        emoji.style.transform = "scale(1)";
                        state.isProcessing = false; // 正常解鎖
                    }, 300);

                } catch (e) {
                    console.error("33F Error:", e);
                    state.isProcessing = false; // 錯誤解鎖，防止卡死
                }
            }
        };

        const UI = {
            openDrawer: (type) => {
                document.getElementById('drawer').classList.add('open');
                const content = document.getElementById('drawer-content');
                if (type === 'bag') {
                    document.getElementById('drawer-title').innerText = "🍱 萬寶袋";
                    content.innerHTML = state.inv.length ? state.inv.map((i, idx) => `
                        <div style="background:#222; padding:15px; border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                            <span>${i.name}</span>
                            <button onclick="UI.useItem(${idx})" style="background:var(--gold); border:none; padding:8px 15px; border-radius:8px; font-weight:bold;">${i.type === '美食' ? '食用' : '佈置'}</button>
                        </div>`).join('') : "<p style='text-align:center; color:#666;'>萬寶袋空空的</p>";
                }
                if (type === 'collection') {
                    document.getElementById('drawer-title').innerText = "🏅 榮譽牆";
                    content.innerHTML = state.unlockedTitles.map(t => `<div onclick="state.title='${t}'; AmaoApp.updateUI(); UI.closeDrawer();" style="padding:15px; background:#222; margin-bottom:10px; border-radius:12px;">${t} ${state.title===t?'(使用中)':''}</div>`).join('');
                }
                if (type === 'shop') {
                    document.getElementById('drawer-title').innerText = "🛒 找商人";
                    content.innerHTML = `<div style="text-align:center; padding:30px; color:#888;">商人正在前往下一層的路上...</div>`;
                }
            },
            closeDrawer: () => document.getElementById('drawer').classList.remove('open'),
            useItem: (index) => {
                const item = state.inv[index];
                if (item.type === '美食') state.nrg = Math.min(60, state.nrg + item.val);
                state.inv.splice(index, 1);
                AmaoApp.addLog(`✨ 使用了 ${item.name}`);
                AmaoApp.updateUI();
                UI.closeDrawer();
            }
        };

        window.onload = () => {
            const saved = localStorage.getItem("AmaoTowerSave_Final");
            if (saved) Object.assign(state, JSON.parse(saved));
            AmaoApp.updateUI();
        };
    </script>
</body>
</html>
