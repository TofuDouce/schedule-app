<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿毛之塔</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card-bg: rgba(22, 33, 62, 0.95);
            --accent: #ff7675;
            --gold: #ffeaa7;
            --text: #dfe6e9;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; font-family: -apple-system, sans-serif;
            background: var(--bg); color: var(--text); overflow: hidden;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* 1. 舞台區比例縮小，確保不擠壓下方 */
        .stage {
            flex: 0 0 30%; position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
        }

        #bg-lvl {
            position: absolute; font-size: 6rem; font-weight: 900;
            color: rgba(255, 255, 255, 0.03); z-index: 0;
        }

        #amao-emoji {
            font-size: 60px; z-index: 2; transition: transform 0.2s;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        .status-top {
            position: absolute; top: 10px; width: 90%; display: flex; justify-content: space-between;
            font-size: 13px; font-weight: bold;
        }

        /* 2. 日誌區比例調整 */
        .log-container {
            flex: 1; background: rgba(0,0,0,0.2); overflow-y: auto;
            padding: 10px; font-size: 13px; margin: 5px 0;
        }
        .log-entry { margin-bottom: 5px; border-left: 3px solid var(--accent); padding-left: 8px; line-height: 1.4; }

        /* 3. 懸浮式控制選單 (Float Menu) */
        .float-controls {
            padding: 10px 15px 25px 15px; /* 底部預留空間避開手機導覽列 */
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px 20px 0 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: grid; grid-template-columns: 1fr; gap: 10px;
        }

        .main-btn {
            background: var(--gold); color: #2d3436; border: none; padding: 12px;
            border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 0 #b2bec3; width: 100%;
        }
        .main-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #b2bec3; }

        .sub-btns { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; 
        }
        .sub-btn {
            background: rgba(255,255,255,0.08); color: #fff; border: none; padding: 8px;
            border-radius: 12px; font-size: 12px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .sub-btn span:first-child { font-size: 18px; margin-bottom: 2px; }

        /* 抽屜系統保持原樣但更流暢 */
        #drawer {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 70%;
            background: #121212; border-radius: 20px 20px 0 0; z-index: 100;
            transition: bottom 0.3s cubic-bezier(0, 0, 0.2, 1);
            padding: 20px; border-top: 2px solid var(--gold);
        }
        #drawer.open { bottom: 0; }
    </style>
</head>
<body>

    <div class="stage">
        <div id="bg-lvl">0001</div>
        <div class="status-top">
            <div id="stat-nrg">⚡ 60/60</div>
            <div id="stat-gold">💰 0</div>
        </div>
        <div id="amao-emoji">🐶</div>
        <div id="amao-title" style="margin-top: 5px; color: var(--gold); font-size: 14px; font-weight: bold;">【初出的冒險犬】</div>
    </div>

    <div class="log-container" id="log-box">
        <div class="log-entry">🐾 阿毛在夢境醒來了，準備出發！</div>
    </div>

    <div class="float-controls">
        <button class="main-btn" onclick="AmaoApp.rollDice()">🎲 投擲命運</button>
        <div class="sub-btns">
            <button class="sub-btn" onclick="UI.openDrawer('bag')"><span>🍱</span><span>萬寶袋</span></button>
            <button class="sub-btn" onclick="UI.openDrawer('collection')"><span>🏅</span><span>榮譽牆</span></button>
            <button class="sub-btn" onclick="UI.openDrawer('shop')"><span>🛒</span><span>找商人</span></button>
        </div>
    </div>

    <div id="drawer">
        <div class="drawer-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 id="drawer-title" style="margin:0; font-size: 18px;">標題</h2>
            <button onclick="UI.closeDrawer()" style="background:none; border:none; color:#fff; font-size:24px;">✕</button>
        </div>
        <div id="drawer-content" style="height: calc(100% - 50px); overflow-y: auto;"></div>
    </div>

    <script>
        // 核心邏輯保持輕量與嚴謹
        const state = {
            lvl: 1, nrg: 60, gold: 100,
            title: "【初出的冒險犬】",
            unlockedTitles: ["【初出的冒險犬】"],
            inv: [], isProcessing: false
        };

        const AmaoApp = {
            updateUI: function() {
                document.getElementById('bg-lvl').innerText = String(state.lvl).padStart(4, '0');
                document.getElementById('stat-nrg').innerText = `⚡ ${state.nrg}/60`;
                document.getElementById('stat-gold').innerText = `💰 ${state.gold}`;
                document.getElementById('amao-title').innerText = state.title;
                localStorage.setItem("AmaoTowerSave_v3", JSON.stringify(state));
            },
            addLog: function(msg, color = "#fff") {
                const box = document.getElementById('log-box');
                const div = document.createElement('div');
                div.className = "log-entry";
                div.style.color = color;
                div.style.borderLeftColor = color;
                div.innerText = msg;
                box.prepend(div);
            },
            rollDice: function() {
                if (state.isProcessing || state.nrg < 5) return;
                state.isProcessing = true;
                const steps = Math.floor(Math.random() * 6) + 1;
                this.addLog(`🎲 投出了 ${steps} 點！來到 ${state.lvl + steps}F`, "#ffeaa7");
                
                state.nrg -= 5;
                state.lvl += steps;
                
                // 模擬獲得家具
                if (Math.random() < 0.2) {
                    state.inv.push({name: "質感灰落地燈", type: "家具"});
                    this.addLog("🏠 獲得家具：質感灰落地燈", "#74b9ff");
                }

                this.updateUI();
                const emoji = document.getElementById('amao-emoji');
                emoji.style.transform = "scale(1.2) translateY(-10px)";
                setTimeout(() => {
                    emoji.style.transform = "scale(1)";
                    state.isProcessing = false;
                }, 300);
            }
        };

        const UI = {
            openDrawer: (type) => {
                document.getElementById('drawer').classList.add('open');
                const content = document.getElementById('drawer-content');
                if (type === 'bag') {
                    document.getElementById('drawer-title').innerText = "🍱 萬寶袋";
                    content.innerHTML = state.inv.map(i => `<div style="background:#222; padding:12px; margin-bottom:8px; border-radius:10px; display:flex; justify-content:space-between;"><span>${i.name}</span><button style="background:var(--gold); border:none; border-radius:5px; padding:2px 10px;">佈置</button></div>`).join('') || "萬寶袋是空的";
                }
                if (type === 'collection') {
                    document.getElementById('drawer-title').innerText = "🏅 榮譽牆";
                    content.innerHTML = state.unlockedTitles.map(t => `<div onclick="state.title='${t}'; AmaoApp.updateUI(); UI.closeDrawer();" style="padding:12px; background:#222; margin-bottom:8px; border-radius:10px;">${t}</div>`).join('');
                }
                if (type === 'shop') {
                    document.getElementById('drawer-title').innerText = "🛒 找商人";
                    content.innerHTML = `<div style="text-align:center; padding:20px; color:#888;">商人正在補貨中...</div>`;
                }
            },
            closeDrawer: () => document.getElementById('drawer').classList.remove('open')
        };

        window.onload = () => {
            const saved = localStorage.getItem("AmaoTowerSave_v3");
            if (saved) Object.assign(state, JSON.parse(saved));
            AmaoApp.updateUI();
        };
    </script>
</body>
</html>
