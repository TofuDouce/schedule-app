<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿毛之塔 - 視覺強化版</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --panel-bg: rgba(30, 30, 50, 0.98);
            --accent: #ff7675;
            --gold: #ffeaa7;
            --text: #dfe6e9;
            --btn-sub: #2d3436;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; font-family: -apple-system, sans-serif;
            background: var(--bg); color: var(--text); overflow: hidden;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* 頂部工具欄：強化辨識度 */
        .top-bar {
            height: 50px; background: rgba(0, 0, 0, 0.6);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }
        .stat-item { font-size: 16px; display: flex; align-items: center; gap: 5px; }
        .energy { color: #fffa65; }
        .money { color: #55efc4; }

        /* 舞台區 */
        .stage {
            flex: 1; position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 0;
        }
        #bg-lvl {
            position: absolute; font-size: 12rem; font-weight: 900;
            color: rgba(255, 255, 255, 0.03); z-index: 0; user-select: none;
        }
        #amao-emoji { font-size: 110px; z-index: 2; transition: transform 0.2s; }
        #amao-title { 
            margin-top: 20px; color: var(--gold); font-size: 22px; 
            font-weight: bold; text-shadow: 0 2px 10px rgba(0,0,0,0.5); 
        }

        /* 日誌區：高度縮減，確保工具欄可見 */
        .log-container {
            height: 180px; background: rgba(0,0,0,0.4); overflow-y: auto;
            padding: 15px; border-top: 2px solid rgba(255,255,255,0.05);
        }
        .log-entry { 
            margin-bottom: 8px; border-left: 5px solid var(--accent); 
            padding-left: 12px; font-size: 18px; font-weight: 500; 
        }

        /* 底部工具欄：一眼可見的佈局 */
        .bottom-panel {
            background: var(--panel-bg); padding: 15px 15px 30px 15px;
            border-radius: 30px 30px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .main-btn {
            background: var(--gold); color: #1e272e; border: none;
            width: 100%; height: 65px; border-radius: 18px;
            font-size: 24px; font-weight: 900; margin-bottom: 12px;
            box-shadow: 0 5px 0 #d1ccc0; transition: 0.1s;
        }
        .main-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #d1ccc0; }

        .sub-nav { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .nav-btn {
            background: var(--btn-sub); color: #fff; border: none;
            height: 70px; border-radius: 15px; font-size: 15px; font-weight: bold;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .nav-btn span { font-size: 24px; margin-bottom: 4px; }

        /* 抽屜系統 */
        #drawer {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 85%;
            background: #0f0f1b; border-radius: 30px 30px 0 0; z-index: 200;
            transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding: 25px;
            border-top: 3px solid var(--gold);
        }
        #drawer.open { bottom: 0; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="stat-item energy" id="stat-nrg">⚡ 體力: 無限</div>
        <div class="stat-item money" id="stat-gold">💰 金幣: 1000</div>
    </div>

    <div class="stage">
        <div id="bg-lvl">0001</div>
        <div id="amao-emoji">🐶</div>
        <div id="amao-title">【開發測試員】</div>
    </div>

    <div class="log-container" id="log-box">
        <div class="log-entry" style="color:var(--accent);">🚀 系統已就緒，開始一眼可見的冒險！</div>
    </div>

    <div class="bottom-panel">
        <button class="main-btn" onclick="AmaoApp.rollDice()">🎲 投擲命運</button>
        <div class="sub-nav">
            <button class="nav-btn" onclick="UI.openDrawer('bag')"><span>🍱</span>萬寶袋</button>
            <button class="nav-btn" onclick="UI.openDrawer('collection')"><span>🏅</span>榮譽牆</button>
            <button class="nav-btn" onclick="UI.openDrawer('shop')"><span>🛒</span>找商人</button>
        </div>
    </div>

    <div id="drawer">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 id="drawer-title" style="margin:0; font-size:24px;">標題</h2>
            <button onclick="UI.closeDrawer()" style="background:none; border:none; color:#fff; font-size:32px;">✕</button>
        </div>
        <div id="drawer-content" style="height: calc(100% - 60px); overflow-y: auto;"></div>
    </div>

    <script>
        const state = {
            lvl: 1, gold: 1000, title: "【開發測試員】",
            unlockedTitles: ["【開發測試員】", "【夢境守護者】"],
            inv: [], isProcessing: false
        };

        const AmaoApp = {
            updateUI: function() {
                document.getElementById('bg-lvl').innerText = String(state.lvl).padStart(4, '0');
                document.getElementById('stat-gold').innerText = `💰 金幣: ${state.gold}`;
                document.getElementById('amao-title').innerText = state.title;
            },
            addLog: function(msg, color = "#74b9ff") {
                const box = document.getElementById('log-box');
                const div = document.createElement('div');
                div.className = "log-entry";
                div.style.color = color;
                div.style.borderLeftColor = color;
                div.innerText = msg;
                box.prepend(div);
            },
            rollDice: function() {
                if (state.isProcessing) return;
                state.isProcessing = true;
                
                const steps = Math.floor(Math.random() * 6) + 1;
                state.lvl += steps;
                this.addLog(`🎲 投出 ${steps} 點！目前：${state.lvl}F`, "#ffeaa7");

                this.updateUI();
                const emoji = document.getElementById('amao-emoji');
                emoji.style.transform = "scale(1.4) translateY(-20px)";
                setTimeout(() => { 
                    emoji.style.transform = "scale(1)"; 
                    state.isProcessing = false; 
                }, 300);
            }
        };

        const UI = {
            openDrawer: (mode) => {
                document.getElementById('drawer').classList.add('open');
                const content = document.getElementById('drawer-content');
                if (mode === 'bag') {
                    document.getElementById('drawer-title').innerText = "🍱 萬寶袋";
                    content.innerHTML = state.inv.length ? "" : "<p style='text-align:center; padding-top:100px; color:#666; font-size:20px;'>空空如也</p>";
                } else if (mode === 'collection') {
                    document.getElementById('drawer-title').innerText = "🏅 榮譽牆";
                    content.innerHTML = state.unlockedTitles.map(t => `<div style="padding:20px; background:#222; margin-bottom:15px; border-radius:15px; font-size:20px; font-weight:bold;">${t}</div>`).join('');
                } else {
                    document.getElementById('drawer-title').innerText = "🛒 商店";
                    content.innerHTML = "<p style='text-align:center; padding-top:100px; color:#666;'>商人補貨中...</p>";
                }
            },
            closeDrawer: () => document.getElementById('drawer').classList.remove('open')
        };

        window.onload = () => AmaoApp.updateUI();
    </script>
</body>
</html>
