<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿毛之塔</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card-bg: #16213e;
            --accent: #ff7675;
            --gold: #ffeaa7;
            --text: #dfe6e9;
            --morandi-blue: #74b9ff;
            --morandi-green: #55efc4;
            --morandi-purple: #a29bfe;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; font-family: -apple-system, sans-serif;
            background: var(--bg); color: var(--text); overflow: hidden;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* 緊湊舞台區 */
        .stage {
            flex: 0 0 35%; position: relative; overflow: hidden;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #bg-lvl {
            position: absolute; font-size: 8rem; font-weight: 900;
            color: rgba(255, 255, 255, 0.03); z-index: 0; pointer-events: none;
        }

        #amao-emoji {
            font-size: 80px; z-index: 2; transition: transform 0.2s;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
            cursor: default; user-select: none;
        }

        .status-top {
            position: absolute; top: 10px; width: 90%; display: flex; justify-content: space-between;
            z-index: 10; font-size: 14px; font-weight: bold;
        }

        /* 緊湊日誌區 */
        .log-container {
            flex: 1; background: rgba(0,0,0,0.4); overflow-y: auto;
            padding: 10px; font-size: 13px; border-top: 1px solid #333;
        }
        .log-entry { margin-bottom: 4px; border-left: 3px solid var(--accent); padding-left: 8px; line-height: 1.4; }

        /* 緊湊控制區 */
        .controls {
            padding: 12px; display: grid; grid-template-columns: 1fr; gap: 8px;
            background: var(--card-bg); z-index: 10; border-top: 1px solid #444;
        }

        .main-btn {
            background: var(--gold); color: #2d3436; border: none; padding: 12px;
            border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 0 #b2bec3;
        }
        .main-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #b2bec3; }

        .sub-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .sub-btn {
            background: #333; color: #fff; border: none; padding: 10px 5px;
            border-radius: 10px; font-size: 13px; cursor: pointer; display: flex; flex-direction: column; align-items: center;
        }

        /* 抽屜系統 */
        #drawer {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 75%;
            background: #121212; border-radius: 20px 20px 0 0; z-index: 100;
            transition: bottom 0.3s ease-out; padding: 20px; border-top: 2px solid var(--gold);
        }
        #drawer.open { bottom: 0; }
        .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="stage">
        <div id="bg-lvl">0001</div>
        <div class="status-top">
            <div id="stat-nrg">⚡ 60/60</div>
            <div id="stat-gold">💰 0</div>
        </div>
        <div id="amao-emoji">🐶</div>
        <div id="amao-title" style="margin-top: 10px; color: var(--gold); font-size: 14px; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">【初出的冒險犬】</div>
        <div id="weather-effect" style="font-size: 11px; color: #888; margin-top: 4px;">✨ 環境：和平幻夢</div>
    </div>

    <div class="log-container" id="log-box"></div>

    <div class="controls">
        <button class="main-btn" onclick="AmaoApp.rollDice()">🎲 投擲命運</button>
        <div class="sub-btns">
            <button class="sub-btn" onclick="UI.openDrawer('bag')"><span>🍱</span><span>萬寶袋</span></button>
            <button class="sub-btn" onclick="UI.openDrawer('collection')"><span>🏅</span><span>榮譽牆</span></button>
            <button class="sub-btn" onclick="UI.openDrawer('shop')"><span>🛒</span><span>找商人</span></button>
        </div>
    </div>

    <div id="drawer">
        <div class="drawer-header">
            <h2 id="drawer-title" style="margin:0; font-size: 18px;">標題</h2>
            <button onclick="UI.closeDrawer()" style="background:none; border:none; color:#fff; font-size:24px;">✕</button>
        </div>
        <div id="drawer-content" style="height: calc(100% - 50px); overflow-y: auto; font-size: 14px;"></div>
    </div>

    <script>
        const state = {
            lvl: 1, nrg: 60, gold: 100,
            title: "【初出的冒險犬】",
            unlockedTitles: ["【初出的冒險犬】"],
            inv: [], isProcessing: false
        };

        const Generator = {
            rnd: (arr) => arr[Math.floor(Math.random() * arr.length)],
            getFood: () => ({ name: Generator.rnd(["香噴噴烤雞", "夢幻舒芙蕾", "莫蘭迪拿鐵", "星光飯糰"]), type: "美食", energy: 20 }),
            getFurniture: () => ({ name: Generator.rnd(["質感灰落地燈", "北歐風單人椅", "大理石茶几", "莫蘭迪地毯"]), type: "家具" }),
            getTitle: () => `【${Generator.rnd(["夢境", "星光", "幻夢", "永恆"])}${Generator.rnd(["守護者", "收藏家", "觀察家"])}】`
        };

        const AmaoApp = {
            updateUI: function() {
                document.getElementById('bg-lvl').innerText = String(state.lvl).padStart(4, '0');
                document.getElementById('stat-nrg').innerText = `⚡ ${state.nrg}/60`;
                document.getElementById('stat-gold').innerText = `💰 ${state.gold}`;
                document.getElementById('amao-title').innerText = state.title;
                localStorage.setItem("AmaoTowerSave", JSON.stringify(state));
            },
            addLog: function(msg, color = "#fff") {
                const box = document.getElementById('log-box');
                const div = document.createElement('div');
                div.className = "log-entry";
                div.style.color = color;
                div.style.borderLeftColor = color;
                div.innerText = msg;
                box.prepend(div);
            },
            rollDice: function() {
                if (state.isProcessing || state.nrg < 5) {
                    if (state.nrg < 5) this.addLog("❌ 體力不足！需要休息或進食。", "#ff4757");
                    return;
                }
                state.isProcessing = true;
                const steps = Math.floor(Math.random() * 6) + 1;
                this.addLog(`🎲 投出了 ${steps} 點！目前：${state.lvl + steps} F`, "#ffeaa7");
                
                state.nrg -= 5;
                state.lvl += steps;

                // 隨機事件
                const r = Math.random();
                if (r < 0.15) {
                    const item = Generator.getFood();
                    state.inv.push(item);
                    this.addLog(`🍱 獲得美食：${item.name}`, "#55efc4");
                } else if (r < 0.25) {
                    const item = Generator.getFurniture();
                    state.inv.push(item);
                    this.addLog(`🏠 獲得家具：${item.name}`, "#74b9ff");
                }

                this.updateUI();
                const emoji = document.getElementById('amao-emoji');
                emoji.style.transform = "scale(1.3) translateY(-20px)";
                setTimeout(() => {
                    emoji.style.transform = "scale(1)";
                    state.isProcessing = false;
                }, 300);
            }
        };

        const UI = {
            openDrawer: (type) => {
                document.getElementById('drawer').classList.add('open');
                const content = document.getElementById('drawer-content');
                if (type === 'bag') {
                    document.getElementById('drawer-title').innerText = "🍱 萬寶袋";
                    content.innerHTML = state.inv.map(i => `<div style="background:#222; padding:10px; margin-bottom:8px; border-radius:8px; display:flex; justify-content:space-between;"><span>${i.name}</span><button onclick="UI.useItem('${i.name}')" style="background:var(--gold); border:none; border-radius:4px; padding:2px 10px;">使用</button></div>`).join('') || "空空如也";
                }
                if (type === 'collection') {
                    document.getElementById('drawer-title').innerText = "🏅 榮譽牆";
                    content.innerHTML = state.unlockedTitles.map(t => `<div onclick="state.title='${t}'; AmaoApp.updateUI(); UI.closeDrawer();" style="padding:10px; background:#222; margin-bottom:5px; border-radius:8px;">${t}</div>`).join('');
                }
                if (type === 'shop') {
                    document.getElementById('drawer-title').innerText = "🛒 神祕商店";
                    content.innerHTML = `<p>金幣：${state.gold}</p><div style="background:#222; padding:10px; border-radius:8px; display:flex; justify-content:space-between;"><span>高級罐罐 (💰50)</span><button onclick="UI.buy(50, '美食', '高級罐罐')" style="background:var(--morandi-green); border:none; padding:5px 10px; border-radius:4px;">購買</button></div>`;
                }
            },
            closeDrawer: () => document.getElementById('drawer').classList.remove('open'),
            useItem: (name) => {
                const idx = state.inv.findIndex(i => i.name === name);
                const item = state.inv[idx];
                if (item.type === "美食") state.nrg = Math.min(60, state.nrg + 20);
                state.inv.splice(idx, 1);
                AmaoApp.addLog(`✨ 使用了 ${name}`);
                AmaoApp.updateUI();
                UI.closeDrawer();
            },
            buy: (price, type, name) => {
                if (state.gold >= price) {
                    state.gold -= price;
                    state.inv.push({ name, type, energy: 30 });
                    AmaoApp.addLog(`🛒 買到了 ${name}`);
                    AmaoApp.updateUI();
                    UI.closeDrawer();
                } else { alert("金幣不足！"); }
            }
        };

        window.onload = () => {
            const saved = localStorage.getItem("AmaoTowerSave");
            if (saved) Object.assign(state, JSON.parse(saved));
            AmaoApp.updateUI();
            AmaoApp.addLog("🐾 阿毛在夢境醒來了。");
        };
    </script>
</body>
</html>
