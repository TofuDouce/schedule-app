<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿毛之塔 - 測試開發版 (無限體力)</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card-bg: rgba(22, 33, 62, 0.95);
            --accent: #ff7675;
            --gold: #ffeaa7;
            --text: #dfe6e9;
            --desc-text: #a4b0be;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; font-family: -apple-system, "Microsoft JhengHei", sans-serif;
            background: var(--bg); color: var(--text); overflow: hidden;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* 舞台區：佔比 45% */
        .stage { flex: 0 0 45%; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #bg-lvl { position: absolute; font-size: 10rem; font-weight: 900; color: rgba(255, 255, 255, 0.05); z-index: 0; }
        #amao-emoji { font-size: 100px; z-index: 2; transition: transform 0.2s; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); }
        .status-top { position: absolute; top: 15px; width: 90%; display: flex; justify-content: space-between; font-size: 16px; font-weight: bold; color: var(--gold); z-index: 10; }

        /* 日誌區：佔比 30%，字體放大 */
        .log-container { flex: 0 0 30%; background: rgba(0,0,0,0.3); overflow-y: auto; padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        .log-entry { margin-bottom: 8px; border-left: 4px solid var(--accent); padding-left: 12px; line-height: 1.5; font-size: 18px; font-weight: 500; }

        /* 底部選單 */
        .float-controls { flex: 1; padding: 10px 15px 20px 15px; background: var(--card-bg); border-radius: 25px 25px 0 0; display: flex; flex-direction: column; gap: 8px; }
        .main-btn { background: var(--gold); color: #2d3436; border: none; padding: 14px; border-radius: 15px; font-size: 20px; font-weight: bold; box-shadow: 0 4px 0 #b2bec3; width: 100%; }
        .sub-nav { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .nav-btn { background: rgba(255,255,255,0.08); color: #fff; border: none; padding: 12px 5px; border-radius: 12px; font-size: 14px; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .nav-btn span { font-size: 20px; margin-bottom: 4px; }

        /* 抽屜與物品卡片 */
        #drawer { position: fixed; bottom: -100%; left: 0; width: 100%; height: 80%; background: #121212; border-radius: 25px 25px 0 0; z-index: 100; transition: bottom 0.3s ease-out; padding: 20px; border-top: 2px solid var(--gold); }
        #drawer.open { bottom: 0; }
        .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; text-align: center; background: rgba(255,255,255,0.1); border-radius: 10px; font-weight: bold; }
        .tab.active { background: var(--gold); color: #111; }
        
        .item-card { background: #222; padding: 18px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .item-info b { font-size: 20px; display: block; margin-bottom: 4px; color: #fff; }
        .item-info span { font-size: 15px; color: var(--desc-text); }
        .use-btn, .buy-btn { border: none; padding: 10px 18px; border-radius: 10px; font-weight: bold; font-size: 16px; }
        .use-btn { background: var(--gold); }
        .buy-btn { background: #55efc4; }
    </style>
</head>
<body>

    <div class="stage">
        <div id="bg-lvl">0001</div>
        <div class="status-top">
            <div id="stat-nrg">⚡ 體力: 無限</div>
            <div id="stat-gold">💰 金幣: 100</div>
        </div>
        <div id="amao-emoji">🐶</div>
        <div id="amao-title" style="margin-top: 15px; color: var(--gold); font-size: 18px; font-weight: bold;">【開發測試員】</div>
    </div>

    <div class="log-container" id="log-box"></div>

    <div class="float-controls">
        <button class="main-btn" onclick="AmaoApp.rollDice()">🎲 投擲命運 (測試模式)</button>
        <div class="sub-nav">
            <button class="nav-btn" onclick="UI.openDrawer('bag')"><span>🍱</span>萬寶袋</button>
            <button class="nav-btn" onclick="UI.openDrawer('collection')"><span>🏅</span>榮譽牆</button>
            <button class="nav-btn" onclick="UI.openDrawer('shop')"><span>🛒</span>找商人</button>
        </div>
    </div>

    <div id="drawer">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 id="drawer-title" style="margin:0;">標題</h2>
            <button onclick="UI.closeDrawer()" style="background:none; border:none; color:#fff; font-size:28px;">✕</button>
        </div>
        <div id="bag-tabs" class="tab-bar" style="display:none;">
            <div id="tab-food" class="tab active" onclick="UI.switchBagTab('美食')">美食 🍱</div>
            <div id="tab-furn" class="tab" onclick="UI.switchBagTab('家具')">家具 🏠</div>
        </div>
        <div id="drawer-content" style="height: calc(100% - 100px); overflow-y: auto;"></div>
    </div>

    <script>
        const state = {
            lvl: 1, nrg: 999, gold: 1000, // 初始金幣也給多一點方便測試
            title: "【開發測試員】",
            unlockedTitles: ["【開發測試員】", "【夢境守護者】"],
            inv: [], currentTab: '美食', isProcessing: false
        };

        const AmaoApp = {
            updateUI: function() {
                document.getElementById('bg-lvl').innerText = String(state.lvl).padStart(4, '0');
                document.getElementById('stat-nrg').innerText = `⚡ 體力: 無限`;
                document.getElementById('stat-gold').innerText = `💰 金幣: ${state.gold}`;
                document.getElementById('amao-title').innerText = state.title;
                localStorage.setItem("AmaoTower_Debug", JSON.stringify(state));
            },
            addLog: function(msg, color = "#74b9ff") {
                const box = document.getElementById('log-box');
                const div = document.createElement('div');
                div.className = "log-entry";
                div.style.color = color;
                div.style.borderLeftColor = color;
                div.innerText = msg;
                box.prepend(div);
            },
            rollDice: function() {
                if (state.isProcessing) return;
                state.isProcessing = true;

                try {
                    const steps = Math.floor(Math.random() * 6) + 1;
                    // --- 無限體力：不扣除體力 ---
                    // state.nrg -= 5; 
                    state.lvl += steps;
                    this.addLog(`🎲 測試投骰：${steps} 點！來到 ${state.lvl}F`, "#ffeaa7");

                    if (Math.random() < 0.25) {
                        const items = [
                            { name: "香噴噴烤雞", type: "美食", desc: "恢復大量體力的開發者美食", val: 30 },
                            { name: "除錯專用沙發", type: "家具", desc: "讓阿毛躺著寫程式的沙發" }
                        ];
                        const pick = items[Math.floor(Math.random() * items.length)];
                        state.inv.push(pick);
                        this.addLog(`🎁 獲得測試獎勵：${pick.name}`, "#55efc4");
                    }

                    this.updateUI();
                    document.getElementById('amao-emoji').style.transform = "scale(1.4) translateY(-20px)";
                    setTimeout(() => { document.getElementById('amao-emoji').style.transform = "scale(1)"; state.isProcessing = false; }, 300);
                } catch(e) { state.isProcessing = false; }
            }
        };

        const UI = {
            openDrawer: (mode) => {
                const drawer = document.getElementById('drawer');
                const content = document.getElementById('drawer-content');
                const tabs = document.getElementById('bag-tabs');
                drawer.classList.add('open');
                
                if (mode === 'bag') {
                    document.getElementById('drawer-title').innerText = "🍱 萬寶袋";
                    tabs.style.display = 'flex';
                    UI.switchBagTab(state.currentTab);
                } else if (mode === 'collection') {
                    document.getElementById('drawer-title').innerText = "🏅 榮譽牆";
                    tabs.style.display = 'none';
                    content.innerHTML = state.unlockedTitles.map(t => `
                        <div class="item-card" onclick="state.title='${t}'; AmaoApp.updateUI(); UI.closeDrawer();">
                            <div class="item-info"><b>${t}</b><span>${t === state.title ? '使用中' : '點擊立即切換'}</span></div>
                        </div>`).join('');
                } else if (mode === 'shop') {
                    document.getElementById('drawer-title').innerText = "🛒 測試商店";
                    tabs.style.display = 'none';
                    const goods = [
                        { name: "萬能骨頭", price: 10, type: "美食", val: 60, desc: "瞬間補滿所有體力" },
                        { name: "DEBUG 皇冠", price: 50, type: "家具", desc: "象徵開發者的榮耀" }
                    ];
                    content.innerHTML = goods.map(g => `
                        <div class="item-card">
                            <div class="item-info"><b>${g.name} (💰${g.price})</b><span>${g.desc}</span></div>
                            <button class="buy-btn" onclick="UI.buy('${g.name}', ${g.price}, '${g.type}', '${g.desc}', ${g.val||0})">購買</button>
                        </div>`).join('');
                }
            },
            closeDrawer: () => document.getElementById('drawer').classList.remove('open'),
            switchBagTab: (tab) => {
                state.currentTab = tab;
                document.getElementById('tab-food').className = tab === '美食' ? 'tab active' : 'tab';
                document.getElementById('tab-furn').className = tab === '家具' ? 'tab active' : 'tab';
                const filtered = state.inv.filter(i => i.type === tab);
                document.getElementById('drawer-content').innerHTML = filtered.length ? filtered.map(item => `
                    <div class="item-card">
                        <div class="item-info"><b>${item.name}</b><span>${item.desc}</span></div>
                        <button class="use-btn" onclick="UI.useItem('${item.name}', '${tab}')">${tab==='美食'?'食用':'佈置'}</button>
                    </div>`).join('') : `<p style='text-align:center; color:#666; margin-top:50px;'>尚未持有${tab}類別</p>`;
            },
            buy: (name, price, type, desc, val) => {
                if (state.gold >= price) {
                    state.gold -= price;
                    state.inv.push({ name, type, desc, val });
                    AmaoApp.addLog(`🛒 測試購入：${name}`, "#55efc4");
                    AmaoApp.updateUI();
                } else { alert("金幣不足！"); }
            },
            useItem: (name, type) => {
                const idx = state.inv.findIndex(i => i.name === name);
                const item = state.inv[idx];
                if (type === '美食') state.nrg = Math.min(999, state.nrg + (item.val || 20));
                state.inv.splice(idx, 1);
                AmaoApp.addLog(`✨ 執行測試使用：${name}`);
                AmaoApp.updateUI();
                UI.switchBagTab(type);
            }
        };

        window.onload = () => {
            const saved = localStorage.getItem("AmaoTower_Debug");
            if (saved) Object.assign(state, JSON.parse(saved));
            AmaoApp.updateUI();
        };
    </script>
</body>
</html>
