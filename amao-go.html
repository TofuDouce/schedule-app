<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿毛之塔 - 終極開發者全功能版</title>
    <style>
        /* 視覺規範：莫蘭迪低飽和專業色調 */
        :root {
            --bg-main: #2c3e50;
            --bg-stage: #1a1a2e;
            --panel-bg: rgba(44, 62, 80, 0.98);
            --accent-red: #e67e22;
            --accent-green: #2ecc71;
            --gold: #f1c40f;
            --text-main: #ecf0f1;
            --text-sub: #bdc3c7;
            --btn-dark: #34495e;
            --shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin: 0; padding: 0; font-family: -apple-system, "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
            background: var(--bg-main); color: var(--text-main); overflow: hidden;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* 頂部導航欄：一眼可見阿毛的身份與數據 */
        .top-nav {
            height: 70px; background: rgba(0, 0, 0, 0.85);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; border-bottom: 3px solid var(--gold); z-index: 1000;
        }
        .hero-profile { display: flex; align-items: center; gap: 10px; }
        .hero-avatar { font-size: 32px; filter: drop-shadow(0 0 5px var(--gold)); }
        .hero-info-text { display: flex; flex-direction: column; }
        .hero-name { font-size: 20px; font-weight: 900; letter-spacing: 1px; }
        .hero-subtitle { font-size: 12px; color: var(--gold); opacity: 0.8; }
        
        .realtime-stats { text-align: right; }
        .stat-line { font-family: 'Courier New', Courier, monospace; font-size: 15px; font-weight: bold; }
        .nrg-text { color: var(--gold); text-shadow: 0 0 10px rgba(241, 196, 15, 0.3); }
        .gold-text { color: var(--accent-green); }

        /* 核心舞台：阿毛所在的層數 */
        .game-stage {
            flex: 1; position: relative; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a2e 0%, #0f0f1b 100%);
            min-height: 0; transition: background 0.5s;
        }
        #floor-bg {
            position: absolute; font-size: 14rem; font-weight: 900;
            color: rgba(255, 255, 255, 0.02); z-index: 0; pointer-events: none;
        }
        .character-container { position: relative; z-index: 10; text-align: center; }
        #amao-sprite { font-size: 120px; transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #current-title-badge {
            margin-top: 15px; padding: 5px 20px; background: rgba(0,0,0,0.5);
            border: 1px solid var(--gold); border-radius: 50px;
            color: var(--gold); font-size: 18px; font-weight: bold;
        }

        /* 冒險日誌：一眼可見歷史記錄 */
        .adventure-logs {
            height: 190px; background: rgba(0,0,0,0.5); overflow-y: auto;
            padding: 15px; border-top: 1px solid rgba(255,255,255,0.1);
            scrollbar-width: thin; scrollbar-color: var(--gold) transparent;
        }
        .log-item {
            margin-bottom: 10px; padding: 10px 15px; border-radius: 8px;
            background: rgba(255,255,255,0.03); border-left: 6px solid var(--accent-red);
            font-size: 17px; line-height: 1.4; animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        /* 底部操作面板：整合 15 區功能的控制核心 */
        .control-panel {
            background: var(--panel-bg); padding: 15px 15px 35px 15px;
            border-radius: 35px 35px 0 0; box-shadow: var(--shadow);
        }
        .dice-btn {
            background: linear-gradient(135deg, var(--gold) 0%, #d4ac0d 100%);
            color: #1a1a2e; border: none; width: 100%; height: 75px;
            border-radius: 20px; font-size: 26px; font-weight: 900;
            margin-bottom: 15px; box-shadow: 0 6px 0 #9a7d0a;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .dice-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #9a7d0a; }
        
        .sub-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .action-node {
            background: var(--btn-dark); color: white; border: none;
            height: 85px; border-radius: 18px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: 0.2s;
        }
        .action-node span { font-size: 28px; margin-bottom: 5px; }
        .action-node label { font-size: 15px; font-weight: bold; pointer-events: none; }
        .action-node:active { background: #4a627a; transform: scale(0.95); }

        /* 全屏抽屜式選單 */
        .drawer-overlay {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 88%;
            background: #141e30; border-radius: 35px 35px 0 0; z-index: 2000;
            transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 30px 20px; border-top: 4px solid var(--gold);
        }
        .drawer-overlay.active { bottom: 0; }
        .drawer-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;
        }
        .drawer-title { font-size: 28px; font-weight: 900; color: var(--gold); }
        .close-drawer { background: none; border: none; color: white; font-size: 35px; }

        .tab-switcher { display: flex; gap: 12px; margin-bottom: 20px; }
        .tab-node {
            flex: 1; padding: 15px; text-align: center; background: rgba(255,255,255,0.05);
            border-radius: 15px; font-weight: bold; font-size: 18px; color: var(--text-sub);
        }
        .tab-node.active { background: var(--gold); color: #1a1a2e; }

        /* 物品與稱號卡片：放大字體與莫蘭迪風格 */
        .card-list { height: calc(100% - 130px); overflow-y: auto; padding-right: 5px; }
        .entity-card {
            background: rgba(255,255,255,0.06); padding: 22px; border-radius: 20px;
            margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .entity-info b { font-size: 24px; display: block; margin-bottom: 8px; color: #fff; }
        .entity-info p { font-size: 17px; color: var(--text-sub); margin: 0; }
        .entity-btn {
            background: var(--gold); color: #1a1a2e; border: none;
            padding: 12px 25px; border-radius: 12px; font-weight: bold; font-size: 18px;
        }
        .entity-btn.owned { background: #555; color: #999; }
    </style>
</head>
<body>

    <header class="top-nav">
        <div class="hero-profile">
            <div class="hero-avatar">🐶</div>
            <div class="hero-info-text">
                <span class="hero-name">阿毛 (A-MAO)</span>
                <span class="hero-subtitle">全能冒險犬</span>
            </div>
        </div>
        <div class="realtime-stats">
            <div class="stat-line nrg-text">⚡ 體力: 無限 (測試中)</div>
            <div class="stat-line gold-text" id="ui-gold">💰 金幣: 0</div>
        </div>
    </header>

    <main class="game-stage" id="stage-area">
        <div id="floor-bg">0001</div>
        <div class="character-container">
            <div id="amao-sprite">🐶</div>
            <div id="current-title-badge">【初出的冒險犬】</div>
        </div>
    </main>

    <section class="adventure-logs" id="log-viewport"></section>

    <footer class="control-panel">
        <button class="dice-btn" onclick="GameEngine.rollDice()">
            <span>🎲</span> 投擲命運之骰
        </button>
        <div class="sub-actions">
            <button class="action-node" onclick="UIEngine.showDrawer('inventory')">
                <span>🍱</span> <label>萬寶袋</label>
            </button>
            <button class="action-node" onclick="UIEngine.showDrawer('titles')">
                <span>🏅</span> <label>榮譽牆</label>
            </button>
            <button class="action-node" onclick="UIEngine.showDrawer('market')">
                <span>🛒</span> <label>找商人</label>
            </button>
        </div>
    </footer>

    <div class="drawer-overlay" id="global-drawer">
        <div class="drawer-header">
            <span class="drawer-title" id="drawer-header-text">選單標題</span>
            <button class="close-drawer" onclick="UIEngine.hideDrawer()">✕</button>
        </div>
        
        <div id="inventory-tabs" class="tab-switcher" style="display:none;">
            <div class="tab-node active" id="tab-food" onclick="UIEngine.switchInvTab('FOOD')">美食 🍜</div>
            <div class="tab-node" id="tab-decor" onclick="UIEngine.switchInvTab('DECOR')">家具 🏠</div>
        </div>

        <div class="card-list" id="drawer-render-target"></div>
    </div>

    <script>
        /**
         * 阿毛之塔：終極遊戲資料與邏輯引擎
         * 整合 4+2R 與莫蘭迪美學邏輯
         */
        const GameState = {
            floor: 1,
            gold: 1500,
            currentTitle: "【初出的冒險犬】",
            unlockedTitles: ["【初出的冒險犬】", "【15區領航者】", "【金幣大富翁】"],
            inventory: [],
            currentInvTab: 'FOOD',
            isRolling: false,
            
            // 隨機池資料
            dataPool: {
                foods: [
                    { name: "莫蘭迪拿鐵", desc: "低飽和度的優雅咖啡，提神 20 點", val: 20 },
                    { name: "香噴噴烤雞", desc: "冒險必備蛋白質，提神 50 點", val: 50 },
                    { name: "夢幻舒芙蕾", desc: "甜而不膩，提神 30 點", val: 30 }
                ],
                decors: [
                    { name: "質感灰落地燈", desc: "柔和的燈光點亮房間" },
                    { name: "北歐風單人沙發", desc: "適合阿毛午睡的角落" },
                    { name: "大理石紋地毯", desc: "提升室內高級感的關鍵" }
                ],
                shopItems: [
                    { name: "究極罐罐", price: 80, type: 'FOOD', desc: "吃一個就飽飽的", val: 100 },
                    { name: "純金阿毛像", price: 500, type: 'DECOR', desc: "極其奢華的家具" }
                ]
            }
        };

        const GameEngine = {
            init() {
                this.loadData();
                this.refreshUI();
                this.postLog("🐾 阿毛從夢境中醒來，準備挑戰高塔！", "var(--accent-green)");
            },

            refreshUI() {
                document.getElementById('floor-bg').innerText = String(GameState.floor).padStart(4, '0');
                document.getElementById('ui-gold').innerText = `💰 金幣: ${GameState.gold}`;
                document.getElementById('current-title-badge').innerText = GameState.currentTitle;
                this.saveData();
            },

            postLog(msg, color = "var(--text-main)") {
                const box = document.getElementById('log-viewport');
                const log = document.createElement('div');
                log.className = "log-item";
                log.style.borderLeftColor = color;
                log.innerText = `> ${msg}`;
                box.prepend(log);
            },

            rollDice() {
                if (GameState.isRolling) return;
                GameState.isRolling = true;
                
                const steps = Math.floor(Math.random() * 6) + 1;
                GameState.floor += steps;

                // 視覺回饋
                const sprite = document.getElementById('amao-sprite');
                sprite.style.transform = "scale(1.5) translateY(-30px) rotate(10deg)";
                
                setTimeout(() => {
                    sprite.style.transform = "scale(1) translateY(0) rotate(0deg)";
                    this.postLog(`🎲 投出 ${steps} 點！阿毛來到了第 ${GameState.floor} 層。`, "var(--gold)");
                    this.triggerEvent();
                    this.refreshUI();
                    GameState.isRolling = false;
                }, 400);
            },

            triggerEvent() {
                const rng = Math.random();
                if (rng < 0.15) {
                    const item = GameState.dataPool.foods[Math.floor(Math.random() * GameState.dataPool.foods.length)];
                    GameState.inventory.push({ ...item, type: 'FOOD' });
                    this.postLog(`🎁 驚喜！阿毛在層間發現了【${item.name}】！`, "var(--accent-green)");
                } else if (rng < 0.25) {
                    const foundGold = Math.floor(Math.random() * 50) + 10;
                    GameState.gold += foundGold;
                    this.postLog(`💰 阿毛在角落嗅到了 ${foundGold} 枚失落的金幣！`, "#f1c40f");
                } else if (rng > 0.9) {
                    this.postLog("⚠️ 遇到了一陣強風，但阿毛腳步穩健！", "var(--text-sub)");
                }
            },

            saveData() { localStorage.setItem('AmaoTower_Ultimate', JSON.stringify(GameState)); },
            loadData() {
                const saved = localStorage.getItem('AmaoTower_Ultimate');
                if (saved) {
                    const data = JSON.parse(saved);
                    Object.assign(GameState, data);
                }
            }
        };

        const UIEngine = {
            showDrawer(mode) {
                const drawer = document.getElementById('global-drawer');
                const target = document.getElementById('drawer-render-target');
                const tabs = document.getElementById('inventory-tabs');
                const header = document.getElementById('drawer-header-text');
                
                drawer.classList.add('active');
                tabs.style.display = (mode === 'inventory') ? 'flex' : 'none';

                if (mode === 'inventory') {
                    header.innerText = "🍱 萬寶袋";
                    this.switchInvTab(GameState.currentInvTab);
                } else if (mode === 'titles') {
                    header.innerText = "🏅 榮譽牆";
                    this.renderTitles(target);
                } else if (mode === 'market') {
                    header.innerText = "🛒 找商人";
                    this.renderMarket(target);
                }
            },

            hideDrawer() { document.getElementById('global-drawer').classList.remove('active'); },

            switchInvTab(tab) {
                GameState.currentInvTab = tab;
                document.getElementById('tab-food').className = (tab === 'FOOD') ? 'tab-node active' : 'tab-node';
                document.getElementById('tab-decor').className = (tab === 'DECOR') ? 'tab-node active' : 'tab-node';
                
                const target = document.getElementById('drawer-render-target');
                const filtered = GameState.inventory.filter(i => i.type === tab);
                
                if (filtered.length === 0) {
                    target.innerHTML = `<div style="text-align:center; margin-top:100px; color:#555; font-size:22px;">阿毛的口袋是空的...</div>`;
                    return;
                }

                target.innerHTML = filtered.map((item, idx) => `
                    <div class="entity-card">
                        <div class="entity-info">
                            <b>${item.name}</b>
                            <p>${item.desc}</p>
                        </div>
                        <button class="entity-btn" onclick="UIEngine.useItem('${item.name}', '${tab}')">${tab === 'FOOD' ? '食用' : '佈置'}</button>
                    </div>
                `).join('');
            },

            renderTitles(target) {
                target.innerHTML = GameState.unlockedTitles.map(t => `
                    <div class="entity-card" onclick="UIEngine.changeTitle('${t}')">
                        <div class="entity-info">
                            <b>${t}</b>
                            <p>${t === GameState.currentTitle ? '✅ 目前佩戴中' : '✨ 點擊進行切換'}</p>
                        </div>
                    </div>
                `).join('');
            },

            renderMarket(target) {
                target.innerHTML = GameState.dataPool.shopItems.map(i => `
                    <div class="entity-card">
                        <div class="entity-info">
                            <b>${i.name} (💰${i.price})</b>
                            <p>${i.desc}</p>
                        </div>
                        <button class="entity-btn" onclick="UIEngine.buyItem('${i.name}', ${i.price}, '${i.type}', '${i.desc}')">購入</button>
                    </div>
                `).join('');
            },

            buyItem(name, price, type, desc) {
                if (GameState.gold >= price) {
                    GameState.gold -= price;
                    GameState.inventory.push({ name, type, desc });
                    GameEngine.postLog(`🛒 購入了：${name}！`, "var(--accent-green)");
                    GameEngine.refreshUI();
                    this.hideDrawer();
                } else {
                    alert("阿毛的金幣不夠喔，再去爬幾層樓吧！");
                }
            },

            useItem(name, tab) {
                const idx = GameState.inventory.findIndex(i => i.name === name);
                if (idx > -1) {
                    GameState.inventory.splice(idx, 1);
                    GameEngine.postLog(`✨ 阿毛使用了：${name}`, "var(--gold)");
                    this.switchInvTab(tab);
                    GameEngine.refreshUI();
                }
            },

            changeTitle(t) {
                GameState.currentTitle = t;
                GameEngine.postLog(`🏅 阿毛獲得了新身份：${t}`);
                GameEngine.refreshUI();
                this.hideDrawer();
            }
        };

        // 啟動引擎
        window.onload = () => GameEngine.init();
    </script>
</body>
</html>
