<head>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Cinzel:wght@700&family=Bungee+Shade&display=swap" rel="stylesheet">

<body style="background: var(--bg); margin: 0; overflow-x: hidden; font-family: 'Noto Sans TC', sans-serif; color: white;">

<script>
/**
 * 【阿毛之塔：鮪魚堡的創世數據核心】
 * 此為開放式架構，請勿在此區塊後方加入結束標籤。
 */

const DB = {
    // 1-A. 魔法怪物矩陣：豐富且充滿趣味
    m_pre: ["星光熠熠的", "七彩噴發的", "時空跳躍的", "充滿肉泥香氣的", "銀色長髮飄飄的", "百合花盛開的", "史萊哲林優雅的", "南瓜式熱血的", "夢幻聯動的", "發出貓鈴聲的", "量子疊加態的", "被魔法親吻過的", "鮪魚堡眷顧的"],
    m_names: ["幻獸惡貓", "彩虹史萊姆", "鍵盤魔法師", "正在寫輕小說的羊", "守護南瓜魂", "邏輯大師", "金幣領主", "代碼幻影", "極光獨角獸", "加班中的精靈", "滿電量的喜悅", "社交之星"],
    m_suf: ["(SSR形態)", "(覺醒女神)", "(傳奇英雄)", "(神話化身)", "(星塵微粒)", "(時空旅者)", "(次元唯一版)"],

    // 1-B. 五維幻想美食：極致組合
    f_dims: {
        temp: ["發光恆溫的", "如晨露般清涼的", "溫暖心靈的", "充滿活力的", "星辰溫度的"],
        texture: ["爆裂漿果感的", "Q彈如跳跳糖的", "像羽毛般輕盈的", "香脆如魔法碎片的", "絲滑如高級緞面的"],
        method: ["魔法粒子加速料理", "星光萃取烘烤", "深海珍珠慢燉", "史萊哲林幻影煮法", "南瓜式爆裂油炸"],
        main: ["頂級鮪魚堡", "黃金滷肉飯", "銀河拉麵", "草莓百合舒芙蕾", "爆汁魔力雞排"],
        extra: ["灑了璀璨星塵", "淋了人造極光糖漿", "搭配一杯不老泉珍珠奶茶", "混入了瞬間勇氣精華", "附贈一顆發光的魔法種子"]
    },

    // 1-C. 史萊哲林式華麗裝備詞綴
    e_pre: ["史萊哲林的隱傲", "南瓜噴汗熱血", "羊的百合瑰麗", "滷滷米達精算", "鮪魚堡的絕對意志", "神聖銀色長髮", "時空交織的", "深淵秘辛的", "璀璨奪目的", "無視地心引力的"],
    e_name: {
        head: ["智慧之冠", "貓耳神經共鳴器", "邏輯之眼單眼鏡", "史萊哲林純銀髮箍", "星塵斗笠"],
        body: ["極光防護披風", "黃金比例訓練服", "百合蕾絲戰袍", "史萊哲林長袍", "次元摺疊套裝"],
        hand: ["聖光斷罪劍", "星軌修正法杖", "雷霆重量啞鈴", "夢幻百合原稿", "鮪魚堡的創世筆"],
        feet: ["疾風掠影戰靴", "拓撲空間漫步鞋", "粉紅絲帶輕舞鞋", "噴射星火靴", "銀蛇巡遊靴"]
    },

    // 1-D. 進化頭銜：帶有華麗色彩與描述
    titles: [
        { p: "塔之", s: "幸運兒", d: "剛進塔就被魔法包圍的阿毛，看來會有一段奇遇。", color: "#00d4ff" },
        { p: "燃燒", s: "鬥士", d: "南瓜教練的熱血注入！你的拳頭現在帶有南瓜火花。", color: "#ff8c00" },
        { p: "瑰麗", s: "夢想家", d: "羊的百合故事讓你覺醒了魔法，心情永遠不低落。", color: "#ff69b4" },
        { p: "真理", s: "探求者", d: "滷滷米達認可了你的智慧，你能看穿所有魔法流動。", color: "#00f2fe" },
        { p: "史萊哲林", s: "繼承者", d: "繼承了優雅與野心，這座塔開始向你低頭。", color: "#2ecc71" },
        { p: "奇蹟", s: "創造神", d: "你與鮪魚堡大人的意志共鳴，世界就在你指尖。", color: "#f1c40f" }

// --- 1-2. 遊戲初始狀態 (完全體) ---
let state = {
    lvl: 1,
    nrg: 60,
    gold: 200,
    mood: 100,
    atk: 25, // 魔法初始強化
    def: 25,
    spd: 15,
    luk: 30, // 幸運值設定
    int: 20,
    inv: [],
    equips: { head: null, body: null, hand: null, feet: null },
    unlockedSkills: ['blood', 'light', 'heal', 'rage'],
    titles: [DB.titles[0]],
    curTitleIdx: 0,
    unlockedTitles: new Set(["塔之幸運兒"]),
    isBattle: false,
    curTab: 'food',
    atkBuff: 1,
    isProcessing: false
};
</script>
<div id="top-bar" style="position: fixed; top: 0; width: 100%; height: 60px; background: rgba(10,10,25,0.95); border-bottom: 2px solid var(--magic); display: flex; justify-content: space-around; align-items: center; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">

</div>

    <div id="amao-panel" style="width: 90%; max-width: 400px; background: var(--panel); border-radius: 20px; border: 1px solid var(--silver); padding: 15px; position: relative; margin-bottom: 20px;">

            <div class="v-stat">👟 速度 <br> <span id="val-spd" style="color:var(--silver);">15</span></div>
            <div class="v-stat">🍀 幸運 <br> <span id="val-luk" style="color:#2ecc71;">30</span></div>
            <div class="v-stat">🧠 智力 <br> <span id="val-int" style="color:var(--magic);">20</span></div>
        </div>
    </div>

    <div class="battle-area" style="width: 90%; max-width: 400px; min-height: 250px; background: rgba(0,0,0,0.3); border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border: 1px dashed var(--magic); margin-bottom: 20px;">
        
        <div id="amao-sprite" style="font-size: 80px; transition: all 0.3s; filter: drop-shadow(0 0 10px white);">🐶</div>
        <div id="amao-hp-bar" style="width: 150px; height: 10px; background: #333; border-radius: 5px; margin-top: 10px; overflow: hidden; border: 1px solid #fff;">
            <div id="amao-hp-fill" style="width: 100%; height: 100%; background: linear-gradient(90deg, #ff007f, #ff69b4); transition: width 0.3s;"></div>
        </div>

        <div id="vs-text" style="font-family: 'Bungee Shade', cursive; font-size: 30px; color: var(--legend); margin: 10px 0; opacity: 0.8;">VS</div>

        <div id="enemy-sprite" style="font-size: 60px; transition: all 0.3s;">✨</div>
        <div id="enemy-name" style="font-size: 14px; color: var(--silver); margin-top: 5px;">尋找魔法中...</div>

    </div>

            🎲

        <div style="color: var(--silver); font-size: 12px; letter-spacing: 2px;">「 命 運 投 擲 」</div>

            <button class="skill-btn" onclick="castSkill('blood')">🩸血崩</button>
            <button class="skill-btn" onclick="castSkill('light')">✨聖光</button>
            <button class="skill-btn" onclick="castSkill('heal')">💖治癒</button>
            <button class="skill-btn" onclick="castSkill('rage')">🔥狂暴</button>
        </div>
    </div>

    <div style="position: fixed; right: 15px; bottom: 100px; display: flex; flex-direction: column; gap: 15px;">

        <button onclick="openStore()" style="width: 60px; height: 60px; border-radius: 30px; border: 2px solid var(--equip); background: var(--panel); font-size: 25px;">🏪</button>
    </div>

    <div id="msg-box" style="width: 90%; max-width: 400px; height: 80px; background: rgba(0,0,0,0.5); border: 1px solid var(--magic); margin-top: 20px; border-radius: 10px; padding: 10px; font-size: 13px; overflow-y: auto; line-height: 1.6; color: #eee;">
        歡迎進入阿毛之塔，創世神鮪魚堡正在幕後注視著你...
    </div>
</div>
<style>
    /* 3-1. 全域美學與滾動條優化 */
    * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    
    body {
        background-attachment: fixed;
        background-image: radial-gradient(circle at 50% 50%, #1a1535 0%, #0d0a1a 100%);
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--magic); border-radius: 10px; }

    /* 3-2. 數值與標題字體細節 */
    .v-stat {
        text-align: center;
        font-size: 11px;
        color: var(--silver);
        font-weight: bold;
    }
    .v-stat span {
        font-size: 16px;
        font-family: 'Cinzel', serif;
        display: block;
        margin-top: 4px;
    }

    /* 3-3. 史萊哲林式發光邊框 */
    #amao-panel, .battle-area, #msg-box {
        box-shadow: 0 0 15px rgba(157, 80, 187, 0.2);
        transition: all 0.3s ease;
    }

    /* 3-4. 奧義技能按鈕美化 (最好最滿版) */
    .skill-btn {
        background: rgba(30, 20, 60, 0.8);
        border: 1px solid var(--magic);
        color: white;
        padding: 8px 12px;
        border-radius: 12px;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 4px 0 var(--magic);
    }
    .skill-btn:active {
        transform: translateY(4px);
        box-shadow: 0 0px 0 var(--magic);
    }
    .skill-btn:hover {
        background: var(--magic);
        box-shadow: 0 0 10px var(--magic);
    }

    /* 3-5. 動畫庫：震動、發光、浮動 */
    
    /* 受到傷害的震動 */
    @keyframes hurtShake {
        0% { transform: translate(1px, 1px) rotate(0deg); }
        10% { transform: translate(-1px, -2px) rotate(-1deg); }
        30% { transform: translate(3px, 2px) rotate(0deg); }
        50% { transform: translate(-1px, 2px) rotate(1deg); }
        70% { transform: translate(3px, 1px) rotate(-1deg); }
        90% { transform: translate(-1px, 1px) rotate(0deg); }
        100% { transform: translate(1px, -2px) rotate(-1deg); }
    }

    /* 創世神降臨的閃爍 */
    @keyframes magicGlow {
        0% { filter: drop-shadow(0 0 5px var(--gold)); }
        50% { filter: drop-shadow(0 0 20px var(--gold)); }
        100% { filter: drop-shadow(0 0 5px var(--gold)); }
    }

    /* 骰子旋轉動畫 */
    @keyframes diceRoll {
        0% { transform: rotate(0deg) scale(1); }
        25% { transform: rotate(90deg) scale(1.1); }
        50% { transform: rotate(180deg) scale(0.9); }
        75% { transform: rotate(270deg) scale(1.1); }
        100% { transform: rotate(360deg) scale(1); }
    }

    .rolling { animation: diceRoll 0.4s infinite linear; }
    .hurt { animation: hurtShake 0.4s infinite linear; }
    .blessed { animation: magicGlow 1.5s infinite alternate; }

    /* 3-6. 背包與彈窗容器 (為第 5, 8 區塊預留) */
    .modal {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 85%;
        max-width: 450px;
        height: 70vh;
        background: #151025;
        border: 2px solid var(--gold);
        border-radius: 25px;
        z-index: 2000;
        padding: 20px;
        overflow: hidden;
    }
    .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.8);
        z-index: 1999;
    }

    /* 3-7. 物品卡片細節 */
    .item-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        padding: 10px;
        text-align: center;
        transition: transform 0.2s;
    }
    .item-card:hover {
        border-color: var(--gold);
        background: rgba(255,255,255,0.1);
        transform: scale(1.05);
    }
</style>

<div id="modal-overlay" class="modal-overlay" onclick="closeAllModals()"></div>

<div id="inv-modal" class="modal">

<div id="store-modal" class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h2 style="margin:0; font-family:'Cinzel'; color:var(--equip);">🏪 魔法商店</h2>
        <button onclick="closeAllModals()" style="background:none; border:none; color:white; font-size:24px;">×</button>
    </div>
    <div id="npc-area" style="display:flex; align-items:center; gap:10px; background:rgba(255,255,255,0.05); padding:10px; border-radius:15px; margin-bottom:15px;">
        <div id="npc-avatar" style="font-size:40px;">🎃</div>
        <div>
            <div id="npc-name" style="font-weight:bold; color:var(--gold);">南瓜</div>
            <div id="npc-dialogue" style="font-size:12px; font-style:italic;">「...」</div>
        </div>
    </div>
    <div id="store-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; height:calc(100% - 130px); overflow-y:auto;"></div>
</div>
<script>
/**
 * 【阿毛之塔：創世神邏輯引擎】
 * 負責處理所有複雜的數值加成、頭銜判定與裝備權重。
 */

// 4-1. 極致數值演算：基礎值 + 裝備權重 + 智力補正
function calculateFinalStats() {
    let bonus = { atk: 0, def: 0, spd: 0, luk: 0, int: 0 };

    // 遍歷所有已穿戴的裝備槽位
    Object.values(state.equips).forEach(item => {
        if (item) {
            bonus.atk += (item.atk || 0);
            bonus.def += (item.def || 0);
            bonus.spd += (item.spd || 0);
            bonus.luk += (item.luk || 0);
            bonus.int += (item.int || 0);
        }
    });

    // 智力補正：智力越高，額外獲得 5% 的攻擊力補強 (史萊哲林的聰明才智)
    const intBonus = Math.floor(state.int * 0.05);

    return {
        atk: (state.atk + bonus.atk + intBonus) * state.atkBuff, // 考慮狂暴倍率
        def: state.def + bonus.def,
        spd: state.spd + bonus.spd,
        luk: state.luk + bonus.luk,
        int: state.int + bonus.int
    };
}

// 4-2. 史萊哲林式頭銜晉升判定
function checkTitles() {
    let changed = false;

    // 判斷是否達成解鎖條件 (最複雜的進化條件)
    if (state.lvl >= 50 && !state.unlockedTitles.has("奇蹟創造神")) {
        unlockTitle(5); changed = true;
    } else if (state.lvl >= 30 && !state.unlockedTitles.has("史萊哲林繼承者")) {
        unlockTitle(4); changed = true;
    } else if (state.int >= 50 && !state.unlockedTitles.has("真理探求者")) {
        unlockTitle(3); changed = true;
    } else if (state.mood >= 100 && state.lvl >= 10 && !state.unlockedTitles.has("瑰麗夢想家")) {
        unlockTitle(2); changed = true;
    } else if (state.atk >= 40 && !state.unlockedTitles.has("燃燒鬥士")) {
        unlockTitle(1); changed = true;
    }

    if (changed) {
        updateMsg(`<b style="color:var(--gold)">🏆 頭銜晉升！</b> 阿毛獲得了新的魔法稱號！`);
        saveGame();
    }
}

function unlockTitle(idx) {
    const t = DB.titles[idx];
    state.titles.push(t);
    state.unlockedTitles.add(`${t.p}${t.s}`);
    state.curTitleIdx = state.titles.length - 1; // 自動裝備最新頭銜
}

// 4-3. 魔法日誌更新更新 (確保文字不塌陷)
function updateMsg(text) {
    const box = document.getElementById('msg-box');
    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    box.innerHTML = `<div style="margin-bottom:5px; border-left:2px solid var(--magic); padding-left:5px;">
        <small style="color:var(--silver)">[${time}]</small> ${text}
    </div>` + box.innerHTML;
    
    // 限制顯示條數，保持流暢
    if (box.children.length > 20) box.removeChild(box.lastChild);
}

// 4-4. 全域更新界面 (核心)
function update() {
    const stats = calculateFinalStats();
    
    // 更新頂部欄
    document.getElementById('stat-lvl').innerText = state.lvl;
    document.getElementById('stat-nrg').innerText = state.nrg;
    document.getElementById('stat-gold').innerText = state.gold;
    document.getElementById('stat-mood').innerText = state.mood;

    // 更新五維面板
    document.getElementById('val-atk').innerText = Math.floor(stats.atk);
    document.getElementById('val-def').innerText = stats.def;
    document.getElementById('val-spd').innerText = stats.spd;
    document.getElementById('val-luk').innerText = stats.luk;
    document.getElementById('val-int').innerText = stats.int;

    // 更新頭銜顏色與文字
    const curT = DB.titles.find(t => `${t.p}${t.s}` === `${state.titles[state.curTitleIdx].p}${state.titles[state.curTitleIdx].s}`);
    const titleEl = document.getElementById('amao-title');
    titleEl.innerText = `${curT.p}${curT.s}`;
    titleEl.style.color = curT.color;
    titleEl.style.textShadow = `0 0 10px ${curT.color}`;

    // 更新血條視覺
    document.getElementById('amao-hp-fill').style.width = (state.mood) + "%";
}
</script>
<script>
/**
 * 【阿毛之塔：創世神物資演算系統】
 * 負責生成數千種組合的美食與裝備，並精確計算其魔法價值。
 */

const Generator = {
    // 5-1. 幻想美食生成：3125 種隨機組合
    generateFood: function() {
        const d = DB.f_dims;
        const t = d.temp[Math.floor(Math.random() * d.temp.length)];
        const x = d.texture[Math.floor(Math.random() * d.texture.length)];
        const m = d.method[Math.floor(Math.random() * d.method.length)];
        const n = d.main[Math.floor(Math.random() * d.main.length)];
        const e = d.extra[Math.floor(Math.random() * d.extra.length)];

        // 根據詞條賦予魔法效果 (例如：燃燒的會加攻擊，清涼的加心情)
        const buffAtk = t.includes("燃燒") ? 5 : (t.includes("活力") ? 2 : 0);
        const recoverMood = x.includes("雲朵") ? 40 : 20;

        return {
            type: 'food',
            icon: (n === "鮪魚堡") ? "🍔" : (n === "雞排" ? "🍗" : "🍜"),
            name: `${t}${x}${m}${n}`,
            desc: `這道菜${e}，充滿了不可思議的魔力。`,
            eff: { atk: buffAtk, mood: recoverMood },
            id: Date.now() + Math.random()
        };
    },

    // 5-2. 史萊哲林裝備生成：千變萬化的詞綴組合
    generateEquip: function(slot) {
        const pre = DB.e_pre[Math.floor(Math.random() * DB.e_pre.length)];
        const name = DB.e_name[slot][Math.floor(Math.random() * DB.e_name[slot].length)];
        
        // 複雜數值權重：根據前綴決定屬性傾向
        let atk = 0, def = 0, spd = 0, luk = 0, int = 0;
        const lvlBonus = state.lvl * 2; // 層數越高，裝備越強

        if (pre.includes("史萊哲林")) { int = 15; def = 10; }
        else if (pre.includes("南瓜")) { atk = 20; spd = 5; }
        else if (pre.includes("羊")) { luk = 20; int = 5; }
        else if (pre.includes("絕對意志")) { atk = 15; def = 15; int = 15; }
        else { atk = 5; def = 5; spd = 5; }

        return {
            type: 'equip',
            slot: slot,
            icon: (slot==='head'?'🫅':(slot==='body'?'🥋':(slot==='hand'?'🪄':'🧦'))),
            name: `${pre}·${name}`,
            atk: atk + lvlBonus,
            def: def + lvlBonus,
            spd: spd + Math.floor(lvlBonus/2),
            luk: luk,
            int: int,
            id: Date.now() + Math.random()
        };
    }
};

// 5-3. 輔助功能：將物品加入背包 (包含上限邏輯，避免過載)
function addToInv(item) {
    if (state.inv.length >= 24) {
        updateMsg("<span style='color:var(--legend)'>⚠️ 背包滿了！創世神建議你清理一下。</span>");
        return false;
    }
    state.inv.push(item);
    updateMsg(`獲得了 <b style="color:var(--gold)">${item.name}</b>！`);
    return true;
}

// 5-4. 物品使用/裝備邏輯
function useItem(id) {
    const idx = state.inv.findIndex(i => i.id === id);
    if (idx === -1) return;
    const item = state.inv[idx];

    if (item.type === 'food') {
        // 使用美食：永久提升微量屬性 + 恢復心情
        state.atk += (item.eff.atk || 0);
        state.mood = Math.min(100, state.mood + item.eff.mood);
        updateMsg(`阿毛優雅地享用了 ${item.name}，心情大好！`);
        state.inv.splice(idx, 1);
    } else if (item.type === 'equip') {
        // 穿戴裝備
        const oldEquip = state.equips[item.slot];
        state.equips[item.slot] = item;
        state.inv.splice(idx, 1);
        if (oldEquip) state.inv.push(oldEquip); // 換下來的回背包
        updateMsg(`阿毛裝備了 ${item.name}，魔力流動更加穩定。`);
    }
    
    closeAllModals();
    update();
}

// 5-5. 物品丟棄 (轉換為少量金幣)
function scrapItem(id) {
    const idx = state.inv.findIndex(i => i.id === id);
    if (idx !== -1) {
        state.gold += 10;
        state.inv.splice(idx, 1);
        updateMsg("物品已分解為微量金幣。");
        openInv(); // 刷新背包
    }
}
</script>
<script>
/**
 * 【阿毛之塔：創世神戰鬥與奧義系統】
 * 負責處理怪物生成、回合制邏輯以及四種極致奧義的發動。
 */

// 6-1. 魔法怪物生成：根據層數膨脹數值
function spawnEnemy() {
    const pre = DB.m_pre[Math.floor(Math.random() * DB.m_pre.length)];
    const name = DB.m_names[Math.floor(Math.random() * DB.m_names.length)];
    const suf = DB.m_suf[Math.floor(Math.random() * DB.m_suf.length)];
    
    const lvlFactor = 1 + (state.lvl * 0.1); // 每層強 10%
    const baseHp = 50 * lvlFactor;
    
    window.currentEnemy = {
        name: `${pre}${name}${suf}`,
        hp: Math.floor(baseHp),
        maxHp: Math.floor(baseHp),
        atk: Math.floor(10 * lvlFactor),
        def: Math.floor(5 * lvlFactor),
        gold: Math.floor(20 + state.lvl * 5),
        exp: 1
    };

    // 更新 UI
    const enArea = document.getElementById('enemy-hp-bar');
    enArea.style.display = 'block';
    document.getElementById('enemy-name').innerText = window.currentEnemy.name;
    document.getElementById('enemy-sprite').innerText = (name.includes('貓')) ? '🐱' : (name.includes('羊') ? '🐑' : '👾');
    document.getElementById('en-hp-fill').style.width = "100%";
    
    updateMsg(`警告！<b style="color:var(--legend)">${window.currentEnemy.name}</b> 出現在阿毛面前！`);
}

// 6-2. 奧義技能系統：鮪魚堡親自設定的絕對武力
async function castSkill(type) {
    if (!state.isBattle || !window.currentEnemy) {
        updateMsg("現在不是發動奧義的時機。");
        return;
    }
    
    if (state.nrg < 10) {
        updateMsg("<span style='color:var(--legend)'>❌ 能量不足，無法施展奧義！</span>");
        return;
    }

    state.nrg -= 10;
    const enemy = window.currentEnemy;
    let effectMsg = "";
    const stats = calculateFinalStats();

    // 史萊哲林魔法演算
    switch(type) {
        case 'blood': // 血崩：根據敵人當前血量比例造成真實傷害
            const bleedDmg = Math.floor(enemy.hp * 0.4);
            enemy.hp -= bleedDmg;
            effectMsg = `阿毛發動【血崩】，敵方大量出血，蒸發了 ${bleedDmg} 點生命！`;
            break;
        case 'light': // 聖光：大幅削弱敵方攻擊力，並造成智力補正傷害
            const lightDmg = Math.floor(stats.int * 2);
            enemy.atk = Math.max(1, Math.floor(enemy.atk * 0.4));
            enemy.hp -= lightDmg;
            effectMsg = `【聖光】降臨！造成 ${lightDmg} 點魔法傷害，並永久淨化了敵方的鬥志！`;
            break;
        case 'heal': // 治癒：恢復心情並短暫提升防禦
            state.mood = Math.min(100, state.mood + 40);
            state.def += 5; 
            effectMsg = `阿毛使用了【治癒】，心靈被洗滌，快樂值與防禦力同時提升！`;
            break;
        case 'rage': // 狂暴：捨棄幸運，攻擊力翻倍
            state.atkBuff = 2.5;
            effectMsg = `阿毛進入【狂暴】狀態！毛都炸起來了，攻擊力瘋狂提升！`;
            setTimeout(() => { state.atkBuff = 1; update(); }, 8000);
            break;
    }

    updateMsg(`<b style="color:var(--gold)">✨ 奧義：${effectMsg}</b>`);
    triggerEffect('blessed'); // 阿毛髮光
    
    // 檢查敵人是否死亡
    if (enemy.hp <= 0) {
        winBattle();
    } else {
        updateBattleUI();
        enemyTurn(); // 奧義後敵方反擊
    }
}

// 6-3. 回合制核心邏輯
function enemyTurn() {
    if (!state.isBattle || !window.currentEnemy) return;
    
    const enemy = window.currentEnemy;
    const stats = calculateFinalStats();
    
    // 傷害計算：敵攻 - 阿毛防 (最少 1 點傷害)
    const dmg = Math.max(1, enemy.atk - Math.floor(stats.def / 2));
    state.mood = Math.max(0, state.mood - dmg);
    
    updateMsg(`敵方攻擊！阿毛受傷了，心情低落了 ${dmg} 點。`);
    triggerEffect('hurt');

    if (state.mood <= 0) {
        loseBattle();
    }
    update();
}

function updateBattleUI() {
    const enemy = window.currentEnemy;
    const hpPercent = (enemy.hp / enemy.maxHp) * 100;
    document.getElementById('en-hp-fill').style.width = Math.max(0, hpPercent) + "%";
}

function triggerEffect(cssClass) {
    const sprite = document.getElementById('amao-sprite');
    sprite.classList.add(cssClass);
    setTimeout(() => sprite.classList.remove(cssClass), 500);
}

// 6-4. 戰鬥結束判定
function winBattle() {
    state.isBattle = false;
    const enemy = window.currentEnemy;
    state.gold += enemy.gold;
    updateMsg(`<b style="color:#2ecc71;">🎉 勝利！</b> 阿毛優雅地擊敗了 ${enemy.name}，獲得了 ${enemy.gold} 金幣！`);
    
    // 隨機掉落裝備或美食
    if (Math.random() > 0.5) {
        const slots = ['head', 'body', 'hand', 'feet'];
        const item = Math.random() > 0.3 ? Generator.generateFood() : Generator.generateEquip(slots[Math.floor(Math.random()*4)]);
        addToInv(item);
    }

    document.getElementById('enemy-hp-bar').style.display = 'none';
    window.currentEnemy = null;
    update();
}

function loseBattle() {
    state.isBattle = false;
    state.lvl = Math.max(1, state.lvl - 1); // 掉下一層
    state.mood = 20;
    updateMsg("<b style='color:var(--legend)'>💀 阿毛太累了...</b> 逃回了前一層休息。");
    document.getElementById('enemy-hp-bar').style.display = 'none';
    window.currentEnemy = null;
    update();
}
</script>
<script>
/**
 * 【阿毛之塔：命運投擲引擎】
 * 負責處理擲骰動畫、層數移動以及隨機魔法事件的發生。
 */

// 7-1. 投擲命運之骰
async function rollDice() {
    if (state.isBattle) {
        // 戰鬥中點擊骰子改為一般攻擊
        normalAttack();
        return;
    }
    
    if (state.nrg < 5) {
        updateMsg("<span style='color:var(--legend)'>⚠️ 能量枯竭！阿毛需要休息或吃點鮪魚堡。</span>");
        return;
    }

    if (state.isProcessing) return; // 防止連點
    state.isProcessing = true;

    // 1. 消耗能量
    state.nrg -= 5;
    
    // 2. 執行旋轉動畫
    const dice = document.getElementById('dice-container');
    dice.classList.add('rolling');
    updateMsg("命運之骰旋轉中...");

    // 3. 延時判定結果 (模擬隨機感)
    setTimeout(() => {
        dice.classList.remove('rolling');
        const roll = Math.floor(Math.random() * 6) + 1;
        dice.innerText = ["⚀","⚁","⚂","⚃","⚄","⚅"][roll-1];
        
        // 提升層數 (考慮幸運值補正)
        const luckBonus = state.luk > 50 ? 2 : 1;
        const move = roll + luckBonus;
        state.lvl += move;
        
        updateMsg(`阿毛擲出了 ${roll} 點！幸運加持下，一口氣往上爬了 ${move} 層。`);
        
        // 4. 隨機事件判定 (最雜最滿的事件池)
        triggerRandomEvent();
        
        state.isProcessing = false;
        update();
    }, 600);
}

// 7-2. 隨機事件池：史萊哲林式隨機性
function triggerRandomEvent() {
    const r = Math.random() * 100;

    if (r > 85) {
        // A. 遭遇怪物 (15% 機率)
        state.isBattle = true;
        spawnEnemy();
    } 
    else if (r > 70) {
        // B. 撿到物資 (15% 機率)
        const item = Math.random() > 0.5 ? Generator.generateFood() : Generator.generateEquip(['head','body','hand','feet'][Math.floor(Math.random()*4)]);
        addToInv(item);
        updateMsg(`<b style="color:var(--equip)">✨ 奇遇！</b> 阿毛在角落發現了 ${item.name}！`);
    } 
    else if (r > 60) {
        // C. 鮪魚堡神蹟 (10% 機率)
        tunaBlessing();
    }
    else if (r > 50) {
        // D. 魔法陷阱 (有趣的挑戰，非負面)
        const goldLost = Math.floor(state.gold * 0.1);
        state.gold -= goldLost;
        updateMsg(`阿毛不小心踩到了「金幣噴泉」，噴掉了 ${goldLost} 金幣，但感覺整隻狗都變亮了！`);
    }
    else {
        // E. 平安無事
        const hints = [
            "空氣中瀰漫著淡淡的肉泥香氣。",
            "遠處傳來南瓜重訓的嘶哈聲。",
            "牆上貼著羊寫的百合小說試閱版。",
            "滷滷米達似乎在附近調整塔的重力。",
            "這裡很安全，適合伸個懶腰。"
        ];
        updateMsg(hints[Math.floor(Math.random() * hints.length)]);
    }
}

// 7-3. 戰鬥中的普通攻擊 (骰子功能的延伸)
function normalAttack() {
    if (!state.isBattle || !window.currentEnemy) return;

    const stats = calculateFinalStats();
    const enemy = window.currentEnemy;
    
    // 基礎傷害演算
    const dmg = Math.max(5, Math.floor(stats.atk - (enemy.def / 2)));
    enemy.hp -= dmg;
    
    updateMsg(`阿毛奮力一躍！對敵人造成 ${dmg} 點物理衝擊。`);
    triggerEffect('hurt');

    if (enemy.hp <= 0) {
        winBattle();
    } else {
        updateBattleUI();
        // 50% 機率敵方反擊，增加戰鬥深度
        if (Math.random() > 0.5) enemyTurn();
    }
}

// 7-4. 幕後觀察者（鮪魚堡）的隨機干預：最華麗效果
function tunaBlessing() {
    const r = Math.random();
    const dice = document.getElementById('dice-container');
    dice.classList.add('blessed'); // 全局發光
    
    if (r > 0.5) {
        state.gold += 500;
        updateMsg(`<b style="color:var(--gold)">🐍 創世神的神祕微笑</b><br>鮪魚堡大人覺得你的進度太慢，直接往你口袋塞了 500 金幣。`);
    } else {
        state.nrg = 60;
        state.mood = 100;
        updateMsg(`<b style="color:var(--legend)">🌀 塔之法則重寫</b><br>一股史萊哲林的意志降臨，阿毛的能量與心情瞬間回滿！`);
    }
    
    setTimeout(() => dice.classList.remove('blessed'), 2000);
}
</script>
<script>
/**
 * 【阿毛之塔：史萊哲林魔法背包引擎】
 * 負責渲染高度複雜的物品卡片，並處理分頁切換與裝備交互。
 */

// 8-1. 打開背包並執行首屏渲染
function openInv() {
    document.getElementById('modal-overlay').style.display = 'block';
    document.getElementById('inv-modal').style.display = 'block';
    renderInv();
}

// 8-2. 分頁切換邏輯 (Food / Equip)
function switchTab(tab) {
    state.curTab = tab;
    renderInv();
}

// 8-3. 核心渲染函數：動態生成最華麗的物品卡片
function renderInv() {
    const grid = document.getElementById('inv-grid');
    grid.innerHTML = ""; // 清空舊內容
    
    // 過濾出目前分頁的物品
    const items = state.inv.filter(i => i.type === state.curTab);

    if (items.length === 0) {
        grid.innerHTML = `<div style="grid-column: 1/3; text-align: center; color: var(--silver); margin-top: 50px; opacity: 0.5;">「 空 蕩 蕩 的 史 萊 哲 林 儲 物 間 」</div>`;
        return;
    }

    items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'item-card';
        
        let statsHtml = "";
        // 如果是裝備，顯示五維增幅標籤
        if (item.type === 'equip') {
            statsHtml = `
                <div style="font-size: 10px; display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; margin-top: 5px;">
                    ${item.atk ? `<span style="color:var(--legend)">⚔️${item.atk}</span>` : ''}
                    ${item.def ? `<span style="color:var(--equip)">🛡️${item.def}</span>` : ''}
                    ${item.spd ? `<span style="color:var(--silver)">👟${item.spd}</span>` : ''}
                    ${item.int ? `<span style="color:var(--magic)">🧠${item.int}</span>` : ''}
                    ${item.luk ? `<span style="color:#2ecc71;">🍀${item.luk}</span>` : ''}
                </div>
            `;
        } else {
            // 如果是食物，顯示恢復量與特殊效果
            statsHtml = `<div style="font-size: 10px; color: #ff69b4; margin-top: 5px;">💖 心情 +${item.eff.mood} ${item.eff.atk ? ` | ⚔️ +${item.eff.atk}` : ''}</div>`;
        }

        card.innerHTML = `
            <div style="font-size: 35px; margin-bottom: 5px;">${item.icon}</div>
            <b style="font-size: 12px; color: var(--gold); display: block; min-height: 32px;">${item.name}</b>
            ${statsHtml}
            <div style="margin-top: 10px; display: flex; gap: 5px;">
                <button onclick="useItem(${item.id})" style="flex: 2; background: var(--magic); border: none; color: white; border-radius: 5px; font-size: 11px; padding: 5px 0; cursor: pointer;">
                    ${item.type === 'food' ? '享用' : '裝備'}
                </button>
                <button onclick="scrapItem(${item.id})" style="flex: 1; background: #444; border: none; color: #bbb; border-radius: 5px; font-size: 11px; padding: 5px 0; cursor: pointer;">
                    👋
                </button>
            </div>
        `;
        grid.appendChild(card);
    });
}

// 8-4. 全域關閉彈窗邏輯
function closeAllModals() {
    document.getElementById('modal-overlay').style.display = 'none';
    document.getElementById('inv-modal').style.display = 'none';
    document.getElementById('store-modal').style.display = 'none';
    update(); // 關閉時強制刷新主介面數值
}

// 8-5. 裝備欄位佔位符美化 (顯示目前裝備中)
function getEquipStatus(slot) {
    const item = state.equips[slot];
    return item ? `${item.icon} ${item.name}` : "「 虛 位 以 待 」";
}
</script>
<script>
/**
 * 【阿毛之塔：NPC 家人式吐槽商貿系統】
 * 移除客套與過度稱讚，換成朋友間的損人語錄。
 */

const Store = {
    npcs: [
        {
            name: "南瓜 (肌肉教練)",
            avatar: "🎃",
            color: "#ff8c00",
            items: ['hand', 'body', 'food'],
            dialogue: [
                "「阿毛，你這腿細得跟竹竿一樣，是在演弱不禁風嗎？」", "「這把劍很重，拿不動的話記得叫你媽幫你。」", "「又來買鮪魚堡？你的肚子快要比我這顆南瓜還圓了。」",

<script>
/**
 * 【阿毛之塔：阿毛養成與搞怪動效引擎】
 * 處理阿毛的隨機行為、餵食深度加成，以及與環境的冷幽默互動。
 */

const Life = {
    // 10-1. 阿毛的隨機日常動作 (每 10 秒判定一次)
    idleTimer: null,
    startIdle: function() {
        this.idleTimer = setInterval(() => {
            const r = Math.random();
            const sprite = document.getElementById('amao-sprite');
            
            if (r > 0.8) {
                updateMsg("阿毛優雅地伸了一個懶腰，順便吐槽了一下塔裡的空氣。");
                sprite.style.transform = "scale(1.2) rotate(5deg)";
                setTimeout(() => sprite.style.transform = "scale(1)", 1000);
            } else if (r > 0.6) {
                updateMsg("阿毛開始打瞌睡，夢到了滿地的鮪魚堡。");
                sprite.innerText = "😴";
                setTimeout(() => sprite.innerText = "🐶", 3000);
            } else if (r > 0.5) {
                updateMsg("阿毛覺得腳有點癢，但他決定忍住，保持史萊哲林的優雅。");
                triggerEffect('hurt'); // 借用震動特效
            }
        }, 15000);
    },

    // 10-2. 極致餵食加成：滷肉飯與鮪魚堡的「靈魂對話」
    feedDeepEffect: function(foodName) {
        const r = Math.random();
        if (foodName.includes("鮪魚堡")) {
            state.int += 2;
            state.luk += 5;
            updateMsg(`<b style="color:var(--gold)">🍔 鮪魚堡靈魂加持</b>：這口感...這就是家的味道！阿毛感到智商與運氣同時爆棚。`);
        } else if (foodName.includes("滷肉飯")) {
            state.atk += 3;
            updateMsg(`<b style="color:#f39c12">🍚 黃金滷肉飯能量</b>：滿滿的膠質轉化為物理衝擊力！阿毛現在可以一拳打飛南瓜。`);
        }
        
        // 飽食度連動心情
        if (state.mood < 100) {
            state.mood = Math.min(100, state.mood + 10);
            updateMsg("胃滿了，心就暖了。心情指數小幅回升。");
        }
    },

    // 10-3. 家族式神蹟：當阿毛處於極端狀態時觸發
    checkFamilyBlessing: function() {
        // 如果金幣極少且能量極低 (窮困潦倒時)
        if (state.gold < 50 && state.nrg < 10) {
            const gift = 200;
            state.gold += gift;
            updateMsg(`<b style="color:var(--equip)">✉️ 家人的緊急快遞</b>：南瓜和羊看你太慘了，偷偷往你鞋子裡塞了 ${gift} 金幣。`);
        }
        
        // 如果心情連續低迷 (沮喪判定)
        if (state.mood < 30) {
            state.mood = 60;
            updateMsg(`<b style="color:var(--magic)">🔮 史萊哲林的傲嬌關懷</b>：滷滷米達丟了一瓶強效藥劑，罵了一句「廢物」後幫你補滿了心情。`);
        }
    }
};

// 10-4. 初始化養成系統
Life.startIdle();

// 10-5. 存檔與讀取邏輯 (Local Storage)
function saveGame() {
    const data = JSON.stringify(state);
    localStorage.setItem('amao_tower_save', data);
    // 為了不打擾玩家，僅靜默存檔，或在特定日誌顯示
    console.log("阿毛的足跡已刻在塔的牆上。");
}

function loadGame() {
    const data = localStorage.getItem('amao_tower_save');
    if (data) {
        const savedState = JSON.parse(data);
        // 合併數據，確保新版本增加的欄位不會遺失
        state = { ...state, ...savedState };
        updateMsg("命運之書已翻回上次停留的那一頁。");
        update();
    }
}

// 啟動時自動嘗試讀取
window.onload = () => {
    loadGame();
    update();
};
</script>
<script>
/**
 * 【阿毛之塔：創世神終極權限與系統封口】

 */

// 11-1. 隱藏的創世神後台 (Console 開發者指令)
// 製作人可以在控制台輸入以下指令：
// God.giveMoney(9999) - 暴富
// God.levelUp(10) - 直接跳層
const God = {
    giveMoney: function(amount) {
        state.gold += amount;
        updateMsg(`【創世神蹟】天降金幣 ${amount} 枚！`);
        update();
    },
    levelUp: function(lv) {
        state.lvl += lv;
        updateMsg(`【創世神蹟】空間摺疊，阿毛瞬間上升了 ${lv} 層！`);
        update();
    },
    fullNrg: function() {
        state.nrg = 60;
        state.mood = 100;
        updateMsg(`【創世神蹟】時間回溯，阿毛狀態全滿！`);
        update();
    }
};

// 11-2. 自動存檔循環 (每 30 秒存一次)
setInterval(() => {
    saveGame();
}, 30000);

// 11-3. 介面初始化補丁 (確保所有按鈕綁定正確)
document.addEventListener('DOMContentLoaded', () => {
    // 檢查是否有存檔需要載入
    loadGame();
    
    // 初始屬性刷新
    update();
    
    updateMsg("<b style='color:var(--gold)'>[系統啟動]</b> 阿毛之塔正式載入。史萊哲林的旗幟正在頂端飄揚。");
});

// 11-4. 處理視窗關閉前的最後存檔
window.onbeforeunload = function() {
    saveGame();
};

console.log("阿毛之塔：第 11 區塊封頂完成。所有魔法迴路已接通。");
</script>
