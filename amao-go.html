<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿毛之塔</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --panel: rgba(25, 25, 45, 0.98);
            --accent: #ff7675; /* 莫蘭迪粉 */
            --gold: #f1c40f;
            --text: #ecf0f1;
            --font-main: 22px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, "Microsoft JhengHei", sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
            user-select: none;
        }

        /* 1. 狀態列 (Header) */
        .header {
            display: flex; justify-content: space-around; align-items: center;
            height: 65px; background: #0f0f1b;
            border-bottom: 2px solid var(--accent);
            font-size: 20px; font-weight: bold; z-index: 10;
        }

        .header span { display: flex; align-items: center; gap: 5px; }

        /* 2. 舞台區 (Stage) */
        .stage {
            flex: 1; position: relative;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            overflow: hidden;
        }

        .lvl-watermark {
            position: absolute; font-size: 140px; color: rgba(255,255,255,0.03);
            font-weight: 900; top: 15%; z-index: 1;
            font-family: serif; font-style: italic;
        }

        #amao-sprite {
            font-size: 110px; z-index: 2; 
            transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
            cursor: pointer;
        }

        #amao-sprite:active { transform: scale(1.2); }

        #current-title {
            color: var(--gold); font-size: 24px; font-weight: bold;
            margin-top: 15px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 2; letter-spacing: 1px;
        }

        /* 3. 日誌區 (Log) */
        #log-area {
            width: 100%; height: 160px;
            background: rgba(0,0,0,0.5);
            padding: 15px; overflow-y: auto;
            font-size: 20px; line-height: 1.6;
            border-top: 2px solid rgba(255,255,255,0.1);
        }

        .log-entry { margin-bottom: 8px; border-left: 3px solid var(--accent); padding-left: 10px; }

        /* 4. 控制面板 (Controls) */
        .controls {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 12px; padding: 15px; background: #0f0f1b;
            border-top: 1px solid #333;
        }

        .btn {
            border-radius: 18px; border: none;
            font-size: 20px; font-weight: bold; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.1s; active { transform: scale(0.95); }
        }

        .btn-main { 
            background: var(--gold); color: #000; 
            grid-column: span 3; font-size: 28px; 
            height: 85px; margin-bottom: 5px;
            box-shadow: 0 5px 0 #b8960c;
        }
        .btn-main:active { box-shadow: 0 2px 0 #b8960c; transform: translateY(3px); }

        .btn-sub { background: #2d3436; color: #fff; height: 75px; border: 1px solid #444; }

        /* 5. 全螢幕收集面板 (Drawer) */
        .drawer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--panel); z-index: 100;
            transform: translateY(100%); transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
            display: flex; flex-direction: column;
        }
        .drawer.active { transform: translateY(0); }

        .drawer-header { 
            padding: 25px; border-bottom: 1px solid #444; 
            font-size: 26px; font-weight: bold; 
            display: flex; justify-content: space-between; align-items: center;
            background: #000;
        }

        .drawer-content { flex: 1; overflow-y: auto; padding: 25px; font-size: 22px; line-height: 1.8; }

        /* 動態效果：震動 */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-1px, -2px) rotate(-1deg); }
            40% { transform: translate(-3px, 0px) rotate(1deg); }
            60% { transform: translate(3px, 2px) rotate(0deg); }
            80% { transform: translate(1px, -1px) rotate(1deg); }
            100% { transform: translate(-1px, 2px) rotate(-1deg); }
        }
    </style>
</head>
<body>

    <div class="header">
        <span>🏰 <span id="ui-lvl">1</span>F</span>
        <span>⚡ <span id="ui-nrg">60</span>/60</span>
        <span>💰 <span id="ui-gold">100</span></span>
    </div>

    <div class="stage">
        <div class="lvl-watermark" id="bg-lvl">0001</div>
        <div id="amao-sprite">🐶</div>
        <div id="current-title">初出的冒險犬</div>
        <div id="weather-effect" style="margin-top:10px; font-size: 18px; color: #888;">✨ 環境：和平幻夢</div>
    </div>

    <div id="log-area">
        <div class="log-entry" style="color:var(--accent)">> 歡迎來到「阿毛之塔」。</div>
        <div class="log-entry" style="color:#aaa">> 9999 層的收集之旅由此開始。</div>
    </div>

    <div class="controls">
        <button class="btn btn-main" onclick="AmaoApp.rollDice()">🎲 投擲命運</button>
        <button class="btn btn-sub" onclick="UI.openDrawer('bag')">🍱 萬寶袋</button>
        <button class="btn btn-sub" onclick="UI.openDrawer('collection')">🏅 榮譽牆</button>
        <button class="btn btn-sub" onclick="UI.openDrawer('cards')">🎴 卡片庫</button>
    </div>

    <div id="main-drawer" class="drawer">
        <div class="drawer-header">
            <span id="drawer-title">萬寶袋</span>
            <span onclick="UI.closeDrawer()" style="cursor:pointer; font-size: 30px;">✕</span>
        </div>
        <div id="drawer-content" class="drawer-content">
            </div>
    </div>

    <script>
    // --- 遊戲數據核心 ---
    const state = {
        lvl: 1, nrg: 60, gold: 100,
        title: "初出的冒險犬",
        inv: [], cards: [], unlockedTitles: [],
        isProcessing: false
    };

    // --- UI 控制 ---
    const UI = {
        openDrawer: function(type) {
            const d = document.getElementById('main-drawer');
            const t = document.getElementById('drawer-title');
            const c = document.getElementById('drawer-content');
            d.classList.add('active');
            
            if(type === 'bag') { 
                t.innerText = "🍱 萬寶袋 (2000種美食)"; 
                c.innerHTML = "目前還沒有收集到美食或物品喔！快去投擲骰子探索吧。"; 
            }
            if(type === 'collection') { 
                t.innerText = "🏅 榮譽牆 (300種頭銜)"; 
                c.innerHTML = "<b>目前頭銜：</b><br>【初出的冒險犬】<br><br>隨著爬塔層數增加，會解鎖更多強大的稱號！"; 
            }
            if(type === 'cards') { 
                t.innerText = "🎴 卡片庫 (50張精選)"; 
                c.innerHTML = "卡片系統尚未獲得初始卡片。"; 
            }
        },
        closeDrawer: function() {
            document.getElementById('main-drawer').classList.remove('active');
        }
    };

    // --- 遊戲引擎 (測試版邏輯) ---
    const AmaoApp = {
        rollDice: function() {
            if (state.isProcessing) return;
            state.isProcessing = true;
            
            // 視覺特效
            const sprite = document.getElementById('amao-sprite');
            sprite.style.animation = "shake 0.3s infinite";
            
            setTimeout(() => {
                const steps = Math.floor(Math.random() * 6) + 1;
                sprite.style.animation = "none";
                
                state.lvl += steps;
                state.nrg -= 1;
                this.addLog(`🎲 阿毛投出了 ${steps} 點，爬升到了第 ${state.lvl} 層！`);
                
                this.updateUI();
                state.isProcessing = false;
            }, 600);
        },
        
        updateUI: function() {
            document.getElementById('ui-lvl').innerText = state.lvl;
            document.getElementById('ui-nrg').innerText = state.nrg;
            document.getElementById('ui-gold').innerText = state.gold;
            document.getElementById('current-title').innerText = state.title;
            document.getElementById('bg-lvl').innerText = state.lvl.toString().padStart(4, '0');
        },

        addLog: function(msg, color = "#fff") {
            const area = document.getElementById('log-area');
            const div = document.createElement('div');
            div.className = "log-entry";
            div.style.color = color;
            div.innerHTML = `> ${msg}`;
            area.prepend(div);
            // 保持日誌乾淨
            if (area.childNodes.length > 20) area.removeChild(area.lastChild);
        }
    };

    // 啟動
    window.onload = () => AmaoApp.updateUI();
    </script>
</body>
</html>
