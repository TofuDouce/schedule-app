<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿毛之塔 - 專業版</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card-bg: rgba(22, 33, 62, 0.95);
            --accent: #ff7675;
            --gold: #ffeaa7;
            --text: #dfe6e9;
            --morandi-blue: #74b9ff;
            --morandi-green: #55efc4;
            --desc-text: #a4b0be;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; font-family: -apple-system, "Microsoft JhengHei", sans-serif;
            background: var(--bg); color: var(--text); overflow: hidden;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* 舞台區：阿毛與層數 */
        .stage {
            flex: 0 0 45%; position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #bg-lvl {
            position: absolute; font-size: 10rem; font-weight: 900;
            color: rgba(255, 255, 255, 0.05); z-index: 0;
        }
        #amao-emoji {
            font-size: 100px; z-index: 2; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .status-top {
            position: absolute; top: 15px; width: 90%; display: flex; justify-content: space-between;
            font-size: 16px; font-weight: bold; color: var(--gold); z-index: 10;
        }

        /* 日誌區：30% 高度 + 大字體 */
        .log-container {
            flex: 0 0 30%; background: rgba(0,0,0,0.3); overflow-y: auto;
            padding: 15px; border-top: 1px solid rgba(255,255,255,0.1);
        }
        .log-entry { 
            margin-bottom: 8px; border-left: 4px solid var(--accent); 
            padding-left: 12px; line-height: 1.5; font-size: 18px; font-weight: 500;
        }

        /* 底部按鈕區 */
        .float-controls {
            flex: 1; padding: 10px 15px 20px 15px;
            background: var(--card-bg); border-radius: 25px 25px 0 0;
            display: flex; flex-direction: column; gap: 8px; z-index: 20;
        }
        .main-btn {
            background: var(--gold); color: #2d3436; border: none; padding: 14px;
            border-radius: 15px; font-size: 20px; font-weight: bold; box-shadow: 0 4px 0 #b2bec3;
        }

        /* 抽屜與分類標籤 */
        #drawer {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 80%;
            background: #121212; border-radius: 25px 25px 0 0; z-index: 100;
            transition: bottom 0.3s ease-out; padding: 20px; border-top: 2px solid var(--gold);
        }
        #drawer.open { bottom: 0; }
        
        .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab {
            flex: 1; padding: 12px; text-align: center; background: rgba(255,255,255,0.1);
            border-radius: 10px; font-weight: bold; cursor: pointer;
        }
        .tab.active { background: var(--gold); color: #111; }

        /* 物品卡片樣式：字體放大 + 功能說明 */
        .item-card {
            background: #222; padding: 18px; border-radius: 15px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .item-info b { font-size: 20px; display: block; margin-bottom: 4px; color: #fff; }
        .item-info span { font-size: 14px; color: var(--desc-text); }
        .use-btn {
            background: var(--gold); border: none; padding: 10px 20px;
            border-radius: 10px; font-weight: bold; font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="stage">
        <div id="bg-lvl">0001</div>
        <div class="status-top">
            <div id="stat-nrg">⚡ 體力: 60/60</div>
            <div id="stat-gold">💰 金幣: 100</div>
        </div>
        <div id="amao-emoji">🐶</div>
        <div id="amao-title" style="margin-top: 15px; color: var(--gold); font-size: 18px; font-weight: bold;">【初出的冒險犬】</div>
    </div>

    <div class="log-container" id="log-box"></div>

    <div class="float-controls">
        <button class="main-btn" onclick="AmaoApp.rollDice()">🎲 投擲命運</button>
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
            <button class="tab" style="background:rgba(255,255,255,0.08);color:#fff" onclick="UI.openDrawer('bag')">🍱 萬寶袋</button>
            <button class="tab" style="background:rgba(255,255,255,0.08);color:#fff" onclick="UI.openDrawer('collection')">🏅 榮譽牆</button>
            <button class="tab" style="background:rgba(255,255,255,0.08);color:#fff" onclick="UI.openDrawer('shop')">🛒 找商人</button>
        </div>
    </div>

    <div id="drawer">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 id="drawer-title" style="margin:0;">萬寶袋</h2>
            <button onclick="UI.closeDrawer()" style="background:none; border:none; color:#fff; font-size:28px;">✕</button>
        </div>
        
        <div id="bag-tabs" class="tab-bar">
            <div class="tab active" onclick="UI.switchBagTab('美食')">美食 🍱</div>
            <div class="tab" onclick="UI.switchBagTab('家具')">家具 🏠</div>
        </div>

        <div id="drawer-content" style="height: calc(100% - 120px); overflow-y: auto;"></div>
    </div>

    <script>
        const state = {
            lvl: 1, nrg: 60, gold: 100,
            title: "【初出的冒險犬】",
            unlockedTitles: ["【初出的冒險犬】"],
            inv: [], currentTab: '美食', isProcessing: false
        };

        const Generator = {
            getFood: () => {
                const list = [
                    { name: "香噴噴烤雞", val: 25, desc: "吃完感覺充滿力量 (回體 25)" },
                    { name: "夢幻舒芙蕾", val: 15, desc: "甜甜的心情很好 (回體 15)" },
                    { name: "莫蘭迪拿鐵", val: 10, desc: "優雅地提神 (回體 10)" }
                ];
                return { ...list[Math.floor(Math.random() * list.length)], type: '美食' };
            },
            getFurniture: () => {
                const list = [
                    { name: "質感灰落地燈", desc: "溫暖夢境角落的燈光" },
                    { name: "北歐風單人椅", desc: "阿毛專屬的午睡小椅" },
                    { name: "莫蘭迪地毯", desc: "踩上去軟綿綿的很舒服" }
                ];
                return { ...list[Math.floor(Math.random() * list.length)], type: '家具' };
            }
        };

        const AmaoApp = {
            updateUI: function() {
                document.getElementById('bg-lvl').innerText = String(state.lvl).padStart(4, '0');
                document.getElementById('stat-nrg').innerText = `⚡ 體力: ${state.nrg}/60`;
                document.getElementById('stat-gold').innerText = `💰 金幣: ${state.gold}`;
                document.getElementById('amao-title').innerText = state.title;
                localStorage.setItem("AmaoTower_V5", JSON.stringify(state));
            },
            addLog: function(msg, color = "#74b9ff") {
                const box = document.getElementById('log-box');
                const div = document.createElement('div');
                div.className = "log-entry";
                div.style.color = color;
                div.style.borderLeftColor = color;
                div.innerText = msg;
                box.prepend(div);
            },
            rollDice: function() {
                if (state.nrg < 5 || state.isProcessing) return;
                state.isProcessing = true;
                
                try {
                    const steps = Math.floor(Math.random() * 6) + 1;
                    state.nrg -= 5;
                    state.lvl += steps;
                    this.addLog(`🎲 投出 ${steps} 點！來到 ${state.lvl}F`, "#ffeaa7");

                    if (Math.random() < 0.2) {
                        const item = Math.random() < 0.5 ? Generator.getFood() : Generator.getFurniture();
                        state.inv.push(item);
                        this.addLog(`🎁 獲得${item.type}：${item.name}`, item.type === '美食' ? '#55efc4' : '#74b9ff');
                    }

                    this.updateUI();
                    const emoji = document.getElementById('amao-emoji');
                    emoji.style.transform = "scale(1.4) translateY(-20px)";
                    setTimeout(() => { emoji.style.transform = "scale(1)"; state.isProcessing = false; }, 300);
                } catch(e) { state.isProcessing = false; }
            }
        };

        const UI = {
            openDrawer: (mode) => {
                document.getElementById('drawer').classList.add('open');
                if (mode === 'bag') {
                    document.getElementById('bag-tabs').style.display = 'flex';
                    UI.switchBagTab(state.currentTab);
                } else {
                    document.getElementById('bag-tabs').style.display = 'none';
                    document.getElementById('drawer-content').innerHTML = "<p style='text-align:center;color:#666'>此功能開發中...</p>";
                }
            },
            closeDrawer: () => document.getElementById('drawer').classList.remove('open'),
            switchBagTab: (tab) => {
                state.currentTab = tab;
                const tabs = document.querySelectorAll('.tab');
                tabs[0].className = tab === '美食' ? 'tab active' : 'tab';
                tabs[1].className = tab === '家具' ? 'tab active' : 'tab';
                
                const filtered = state.inv.filter(i => i.type === tab);
                const content = document.getElementById('drawer-content');
                content.innerHTML = filtered.length ? filtered.map((item, idx) => `
                    <div class="item-card">
                        <div class="item-info">
                            <b>${item.name}</b>
                            <span>${item.desc}</span>
                        </div>
                        <button class="use-btn" onclick="UI.useItem('${item.name}', '${tab}')">${tab==='美食'?'食用':'佈置'}</button>
                    </div>`).join('') : `<p style='text-align:center; margin-top:50px; color:#666'>這裡目前沒有${tab}</p>`;
            },
            useItem: (name, type) => {
                const idx = state.inv.findIndex(i => i.name === name);
                const item = state.inv[idx];
                if (type === '美食') state.nrg = Math.min(60, state.nrg + item.val);
                state.inv.splice(idx, 1);
                AmaoApp.addLog(`✨ 已${type==='美食'?'食用':'佈置'}：${name}`);
                AmaoApp.updateUI();
                UI.switchBagTab(type);
            }
        };

        window.onload = () => {
            const saved = localStorage.getItem("AmaoTower_V5");
            if (saved) Object.assign(state, JSON.parse(saved));
            AmaoApp.updateUI();
        };
    </script>
</body>
</html>
