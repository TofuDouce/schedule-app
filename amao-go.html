<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿毛之塔：藍莓歐蕾輕盈版</title>
    <style>
        /* --- 輕柔藍莓果茶配色定義 --- */
        :root {
            --berry-soft: #f3e5f5;    /* 輕柔莓果紫 */
            --berry-milk: #ede7f6;    /* 藍莓鮮奶藍 */
            --berry-bright: #ce93d8;  /* 熟透藍莓色 */
            --berry-dark: #7b1fa2;    /* 莓果強調色 */
            --cream: #ffffff;         /* 奶霜白 */
            --glass: rgba(255, 255, 255, 0.7);
            --shadow: 0 8px 32px rgba(186, 104, 200, 0.15);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; padding: 0; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--berry-soft);
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                              radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            /* 修正背景為輕柔漸層 */
            background: linear-gradient(135deg, #fdfcfb 0%, #e2d1f9 100%);
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
            color: #512da8;
        }

        /* --- 1. 懸浮頂部看板 (HUD) --- */
        .hud-glass {
            margin: 15px; padding: 15px; border-radius: 20px;
            background: var(--glass); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: var(--shadow);
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
        }
        .hud-item { text-align: center; }
        .hud-label { font-size: 10px; color: var(--berry-bright); font-weight: bold; display: block; }
        .hud-val { font-size: 16px; font-weight: 900; color: var(--berry-dark); }
        .hud-full { grid-column: span 3; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 8px; margin-top: 5px; font-size: 12px; font-weight: bold; }

        /* --- 2. 集中式舞台區 --- */
        .main-stage {
            flex: 1; position: relative; display: flex; flex-direction: column; align-items: center;
        }
        
        /* 樓層浮水印 */
        #floor-tag {
            position: absolute; top: 10%; font-size: 120px; font-weight: 900;
            color: rgba(123, 31, 162, 0.04); z-index: 0; pointer-events: none;
        }

        /* 阿毛劇場 */
        .amao-theater {
            flex: 2; display: flex; align-items: center; justify-content: center;
            position: relative; width: 100%;
        }
        #amao-entity {
            font-size: 120px; z-index: 10; cursor: pointer;
            filter: drop-shadow(0 10px 15px rgba(123, 31, 162, 0.2));
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        /* 氣泡對話 */
        #amao-speech {
            position: absolute; top: 20%; background: var(--cream);
            padding: 8px 15px; border-radius: 15px; font-size: 14px; font-weight: bold;
            box-shadow: var(--shadow); opacity: 0; transform: translateY(10px);
            transition: 0.3s; z-index: 20;
        }

        /* 即時簡潔日誌 */
        .mini-logs {
            width: 90%; height: 120px; background: var(--glass);
            border-radius: 20px; margin-bottom: 20px; padding: 15px;
            overflow-y: auto; box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .log-entry { font-size: 13px; margin-bottom: 6px; padding-left: 10px; border-left: 3px solid var(--berry-bright); animation: fadeIn 0.3s forwards; }
        .log-entry.battle { border-left-color: #ff80ab; color: #ad1457; }
        .log-entry.gain { border-left-color: #4db6ac; color: #00695c; }

        /* --- 3. 底部控制台 --- */
        .bottom-nav {
            background: var(--cream); padding: 20px 20px 40px 20px;
            border-radius: 40px 40px 0 0; box-shadow: 0 -10px 40px rgba(123, 31, 162, 0.1);
        }
        .roll-area { margin-bottom: 15px; }
        .btn-main {
            width: 100%; height: 70px; border-radius: 25px; border: none;
            background: linear-gradient(135deg, #ce93d8 0%, #ba68c8 100%);
            color: white; font-size: 22px; font-weight: 900;
            box-shadow: 0 10px 20px rgba(186, 104, 200, 0.3);
            transition: 0.2s;
        }
        .btn-main:active { transform: scale(0.96) translateY(5px); box-shadow: 0 4px 10px rgba(186, 104, 200, 0.3); }

        .icon-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .icon-btn {
            background: var(--berry-milk); border: none; border-radius: 18px;
            padding: 10px; display: flex; flex-direction: column; align-items: center;
            color: var(--berry-dark); font-size: 11px; font-weight: bold;
        }
        .icon-btn span { font-size: 24px; margin-bottom: 4px; }

        /* --- 4. 側選單/彈窗 --- */
        .sheet {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 80%;
            background: var(--cream); border-radius: 35px 35px 0 0; z-index: 3000;
            transition: 0.5s cubic-bezier(0, 1, 0.5, 1); padding: 30px;
            box-shadow: 0 -20px 50px rgba(0,0,0,0.1);
        }
        .sheet.active { bottom: 0; }
        .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .sheet-content { height: calc(100% - 60px); overflow-y: auto; }
        .item-card {
            background: var(--berry-milk); padding: 18px; border-radius: 20px;
            margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } }
    </style>
</head>
<body>

    <header class="hud-glass">
        <div class="hud-item"><span class="hud-label">藍莓金幣</span><b id="ui-gold">0</b></div>
        <div class="hud-item"><span class="hud-label">當前樓層</span><b id="ui-floor">1F</b></div>
        <div class="hud-item"><span class="hud-label">阿毛狀態</span><b id="ui-hp">100%</b></div>
        <div class="hud-full" id="ui-title">🫐 藍莓歐蕾初學者</div>
    </header>

    <main class="main-stage">
        <div id="floor-tag">01</div>
        
        <div class="amao-theater">
            <div id="amao-speech">好喝！</div>
            <div id="amao-entity" onclick="Game.pet()">🐶</div>
        </div>

        <div class="mini-logs" id="log-box"></div>
    </main>

    <footer class="bottom-nav">
        <div class="roll-area">
            <button class="btn-main" onclick="Game.roll()">🎲 攪拌果茶 (前進)</button>
        </div>
        <div class="icon-grid">
            <button class="icon-btn" onclick="UI.toggle('bag')"><span>👜</span>口袋</button>
            <button class="icon-btn" onclick="UI.toggle('mix')"><span>🍹</span>調配</button>
            <button class="icon-btn" onclick="UI.toggle('shop')"><span>🏪</span>茶店</button>
            <button class="icon-btn" onclick="UI.toggle('rank')"><span>🏆</span>成就</button>
        </div>
    </footer>

    <div class="sheet" id="sheet">
        <div class="sheet-header">
            <h2 id="sheet-title" style="margin:0; color:var(--berry-dark);">選單</h2>
            <button onclick="UI.toggle()" style="background:none; border:none; color:var(--berry-bright); font-size:40px;">×</button>
        </div>
        <div class="sheet-content" id="sheet-body"></div>
    </div>

    <script>
        /**
         * 藍莓果茶冒險：核心邏輯系統
         * 開發版本：5.0 (輕柔歐蕾版)
         */
        const State = {
            gold: 1200, floor: 1, hp: 100, maxHp: 100, 
            exp: 0, lvl: 1,
            title: "🫐 藍莓歐蕾初學者",
            inventory: {},
            titles: ["🫐 藍莓歐蕾初學者", "🍹 專業調茶犬", "👑 莓果高塔王"],
            isRolling: false,
            
            // 資料庫
            db: {
                events: [
                    { t: "發現一袋藍莓果粒！", g: 150, h: 0, msg: "又是豐收的一天呢。", type: "gain" },
                    { t: "遇到搶茶的壞貓咪！", g: -50, h: -15, msg: "阿毛奮力守住了果茶！", type: "battle" },
                    { t: "這層樓有溫暖的陽光。", g: 0, h: 10, msg: "體力稍微恢復了。", type: "gain" },
                    { t: "掉進了珍珠陷阱！", g: 0, h: -10, msg: "好黏啊，阿毛掙扎了一下。", type: "battle" }
                ],
                items: [
                    { n: "特濃藍莓醬", p: 400, d: "恢復 50% 的體力", v: 50 },
                    { n: "純白鮮奶蓋", p: 600, d: "提升體力上限 20 點", v: 20 },
                    { n: "紫色吸管", p: 200, d: "只是裝飾，阿毛很喜歡", v: 0 },
                    { n: "大顆果粒", p: 800, d: "永久提升戰鬥勝率", v: 1 }
                ],
                talks: ["藍莓賽高！", "這口歐蕾好香~", "加油爬塔！", "摸摸我？", "想喝果茶了。"]
            }
        };

        const Game = {
            init() {
                this.updateUI();
                this.log("🚩 歡迎回來，製作人！阿毛已經準備好攪拌果茶了。");
                this.autoSave();
            },

            updateUI() {
                document.getElementById('ui-gold').innerText = State.gold;
                document.getElementById('ui-floor').innerText = State.floor + "F";
                document.getElementById('ui-hp').innerText = State.hp + "%";
                document.getElementById('ui-title').innerText = State.title;
                document.getElementById('floor-tag').innerText = String(State.floor).padStart(2, '0');
                
                // 動態背景色偏轉 (隨樓層變換輕柔色調)
                const hue = (State.floor * 10) % 360;
                document.body.style.backgroundColor = `hsl(${hue}, 30%, 95%)`;
            },

            log(msg, type = '') {
                const box = document.getElementById('log-box');
                const div = document.createElement('div');
                div.className = `log-entry ${type}`;
                div.innerText = msg;
                box.prepend(div);
                if(box.childNodes.length > 30) box.removeChild(box.lastChild);
            },

            speak(text) {
                const bubble = document.getElementById('amao-speech');
                bubble.innerText = text || State.db.talks[Math.floor(Math.random()*State.db.talks.length)];
                bubble.style.opacity = 1;
                bubble.style.transform = "translateY(0)";
                setTimeout(() => {
                    bubble.style.opacity = 0;
                    bubble.style.transform = "translateY(10px)";
                }, 2000);
            },

            pet() {
                this.speak("汪！(蹭~)");
                const amao = document.getElementById('amao-entity');
                amao.style.transform = "scale(1.2)";
                setTimeout(() => amao.style.transform = "scale(1)", 200);
            },

            roll() {
                if(State.isRolling) return;
                if(State.hp <= 0) {
                    this.log("⚠️ 阿毛累壞了，請先喝點藍莓醬恢復體力！", "battle");
                    return;
                }

                State.isRolling = true;
                const dice = Math.floor(Math.random() * 6) + 1;
                State.floor += dice;
                
                const amao = document.getElementById('amao-entity');
                amao.style.transform = "translateY(-50px) rotate(20deg)";
                
                this.log(`🎲 攪拌成功！擲出 ${dice} 點，阿毛跑到了 ${State.floor}F。`);

                setTimeout(() => {
                    amao.style.transform = "translateY(0) rotate(0deg)";
                    this.triggerEvent();
                    this.updateUI();
                    State.isRolling = false;
                }, 400);
            },

            triggerEvent() {
                const rng = Math.random();
                if(rng < 0.4) {
                    const ev = State.db.events[Math.floor(Math.random() * State.db.events.length)];
                    State.gold = Math.max(0, State.gold + ev.g);
                    State.hp = Math.min(100, Math.max(0, State.hp + ev.h));
                    this.log(`${ev.t} ${ev.msg}`, ev.type);
                    if(ev.h < 0) this.speak("哎呀！");
                } else if(rng < 0.55) {
                    this.log("🎁 意外發現了果茶配料！");
                    this.addLoot();
                } else {
                    this.speak();
                }
            },

            addLoot() {
                const item = State.db.items[Math.floor(Math.random() * State.db.items.length)];
                if(State.inventory[item.n]) State.inventory[item.n].count++;
                else State.inventory[item.n] = { ...item, count: 1 };
                this.log(`獲得了 [${item.n}]，已存入口袋。`, "gain");
            },

            autoSave() {
                const save = { gold: State.gold, floor: State.floor, hp: State.hp, inv: State.inventory };
                localStorage.setItem('Amao_Blueberry_Save', JSON.stringify(save));
                setTimeout(() => this.autoSave(), 10000);
            }
        };

        const UI = {
            toggle(mode) {
                const sheet = document.getElementById('sheet');
                const title = document.getElementById('sheet-title');
                const body = document.getElementById('sheet-body');
                
                if(!mode) {
                    sheet.classList.remove('active');
                    return;
                }

                sheet.classList.add('active');
                if(mode === 'bag') {
                    title.innerText = "👜 口袋裡的配料";
                    const items = Object.entries(State.inventory);
                    body.innerHTML = items.length ? items.map(([n, i]) => `
                        <div class="item-card">
                            <div><b>${n} (x${i.count})</b><p style="font-size:11px;color:#999;margin:5px 0 0 0;">${i.d}</p></div>
                            <button class="btn-main" style="width:auto;height:40px;font-size:14px;padding:0 15px;" onclick="UI.useItem('${n}')">使用</button>
                        </div>
                    `).join('') : "<p style='text-align:center;padding-top:50px;color:#aaa;'>目前沒有配料喔。</p>";
                } else if(mode === 'shop') {
                    title.innerText = "🏪 藍莓精品茶店";
                    body.innerHTML = State.db.items.map(i => `
                        <div class="item-card">
                            <div><b>${i.n} (💰${i.p})</b><p style="font-size:11px;color:#999;margin:5px 0 0 0;">${i.d}</p></div>
                            <button class="btn-main" style="width:auto;height:40px;font-size:14px;padding:0 15px;" onclick="UI.buyItem('${i.n}', ${i.p})">購買</button>
                        </div>
                    `).join('');
                } else if(mode === 'rank') {
                    title.innerText = "🏆 冒險榮譽";
                    body.innerHTML = State.titles.map(t => `
                        <div class="item-card" onclick="State.title='${t}'; Game.updateUI(); UI.toggle();">
                            <b>${t}</b>
                        </div>
                    `).join('');
                }
            },

            useItem(name) {
                const item = State.inventory[name];
                if(item.count > 1) item.count--;
                else delete State.inventory[name];
                
                if(name === "特濃藍莓醬") State.hp = Math.min(100, State.hp + 50);
                if(name === "純白鮮奶蓋") { State.maxHp += 20; State.hp = 100; }
                
                Game.log(`✨ 使用了 [${name}]！阿毛恢復了活力。`);
                Game.updateUI();
                this.toggle();
            },

            buyItem(name, price) {
                if(State.gold >= price) {
                    State.gold -= price;
                    const item = State.db.items.find(i => i.n === name);
                    if(State.inventory[name]) State.inventory[name].count++;
                    else State.inventory[name] = { ...item, count: 1 };
                    Game.log(`🛒 購入了 [${name}]！花費了 ${price} 金幣。`);
                    Game.updateUI();
                    this.toggle();
                } else {
                    alert("金幣不足，阿毛需要再努力爬塔喔！");
                }
            }
        };

        // 啟動遊戲
        window.onload = () => {
            const saved = localStorage.getItem('Amao_Blueberry_Save');
            if(saved) {
                const data = JSON.parse(saved);
                State.gold = data.gold;
                State.floor = data.floor;
                State.hp = data.hp;
                State.inventory = data.inv || {};
            }
            Game.init();
        };
    </script>
</body>
</html>
