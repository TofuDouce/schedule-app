<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>阿毛之塔：藍莓歐蕾極限版</title>
    <style>
        /* --- 視覺主題：輕柔藍莓歐蕾 --- */
        :root {
            --berry-soft: #f8f0fc;    /* 背景輕紫 */
            --berry-bright: #c8a2c8;  /* 藍莓歐蕾紫 */
            --berry-deep: #7b1fa2;    /* 文字強調紫 */
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.85);
            --shadow: 0 4px 15px rgba(186, 104, 200, 0.1);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; padding: 0; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background: linear-gradient(180deg, #ffffff 0%, #f3e5f5 100%);
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            color: var(--berry-deep);
        }

        /* --- 1. 固定頂部 (Fixed Header) --- */
        header {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
            background: var(--glass); backdrop-filter: blur(12px);
            padding: calc(var(--safe-top) + 10px) 15px 10px 15px;
            border-bottom: 1px solid rgba(200, 162, 200, 0.3);
            box-shadow: var(--shadow);
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
        }
        .stat-card { text-align: center; background: rgba(255,255,255,0.5); padding: 5px; border-radius: 12px; }
        .stat-label { font-size: 10px; color: #999; display: block; margin-bottom: 2px; }
        .stat-val { font-size: 14px; font-weight: 900; }

        /* --- 2. 中央滾動舞台 (Main Content) --- */
        main {
            flex: 1; margin-top: 100px; margin-bottom: 180px; /* 留出上下固定欄的空間 */
            overflow-y: auto; display: flex; flex-direction: column; align-items: center;
            padding: 20px; -webkit-overflow-scrolling: touch;
        }

        .stage-container { width: 100%; max-width: 500px; text-align: center; }
        
        #amao-display {
            font-size: 100px; margin: 30px 0; display: inline-block;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 10px 20px rgba(123, 31, 162, 0.15));
        }

        .title-tag { 
            background: var(--berry-bright); color: white; padding: 4px 15px; 
            border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 20px;
            display: inline-block;
        }

        /* 冒險日誌樣式 */
        .log-list { width: 100%; display: flex; flex-direction: column; gap: 10px; }
        .log-item {
            background: white; padding: 12px 15px; border-radius: 18px;
            font-size: 14px; box-shadow: var(--shadow);
            border-left: 5px solid var(--berry-bright);
            animation: slideIn 0.3s forwards; line-height: 1.5;
        }
        .log-item.battle { border-left-color: #ff80ab; background: #fff5f8; }
        .log-item.rare { border-left-color: #ffd700; background: #fffdf0; }

        /* --- 3. 固定底部 (Fixed Footer) --- */
        footer {
            position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1000;
            background: var(--white); 
            padding: 15px 20px calc(var(--safe-bottom) + 20px) 20px;
            border-top: 1px solid rgba(200, 162, 200, 0.2);
            box-shadow: 0 -10px 30px rgba(123, 31, 162, 0.08);
            border-radius: 30px 30px 0 0;
        }

        .btn-roll {
            width: 100%; height: 60px; border-radius: 20px; border: none;
            background: linear-gradient(135deg, #ce93d8 0%, #ba68c8 100%);
            color: white; font-size: 20px; font-weight: 900;
            margin-bottom: 15px; box-shadow: 0 8px 20px rgba(186, 104, 200, 0.3);
            transition: 0.2s;
        }
        .btn-roll:active { transform: scale(0.97); opacity: 0.9; }

        .nav-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .nav-item {
            background: #f3e5f5; border: none; border-radius: 15px; padding: 10px 5px;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            color: var(--berry-deep); font-size: 11px; font-weight: bold;
        }
        .nav-item i { font-style: normal; font-size: 22px; }

        /* --- 4. 彈出選單 --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000;
            display: none; align-items: flex-end;
        }
        .modal-sheet {
            width: 100%; background: white; border-radius: 30px 30px 0 0;
            padding: 30px; transform: translateY(100%); transition: 0.4s ease;
            max-height: 80vh; overflow-y: auto;
        }
        .modal-overlay.active { display: flex; }
        .modal-overlay.active .modal-sheet { transform: translateY(0); }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } }

        /* 響應式微調 */
        @media (max-height: 700px) {
            main { margin-top: 90px; margin-bottom: 160px; }
            #amao-display { font-size: 80px; margin: 15px 0; }
        }
    </style>
</head>
<body>

    <header>
        <div class="stat-card">
            <span class="stat-label">藍莓金幣</span>
            <span class="stat-val" id="st-gold">2250</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">當前位置</span>
            <span class="stat-val" id="st-floor">1F</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">歐蕾能量</span>
            <span class="stat-val" id="st-hp">100%</span>
        </div>
    </header>

    <main id="scroll-area">
        <div class="stage-container">
            <div id="amao-display" onclick="Game.interact()">🐶</div>
            <br>
            <div class="title-tag" id="st-title">【藍莓歐蕾初學者】</div>
            
            <div class="log-list" id="log-list">
                <div class="log-item">📍 塔門開啟，阿毛充滿期待地踏入了一樓。</div>
            </div>
        </div>
    </main>

    <footer>
        <button class="btn-roll" onclick="Game.roll()">🎲 攪拌果茶 (前進)</button>
        <div class="nav-grid">
            <button class="nav-item" onclick="UI.show('bag')"><i>👜</i>口袋</button>
            <button class="nav-item" onclick="UI.show('mix')"><i>🍹</i>調配</button>
            <button class="nav-item" onclick="UI.show('shop')"><i>🏪</i>茶店</button>
            <button class="nav-item" onclick="UI.show('rank')"><i>🏆</i>成就</button>
        </div>
    </footer>

    <div class="modal-overlay" id="overlay" onclick="UI.hide()">
        <div class="modal-sheet" id="sheet" onclick="event.stopPropagation()">
            <h2 id="modal-title">選單</h2>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        /**
         * 遊戲邏輯引擎 - 高密度版
         */
        const Game = {
            data: {
                gold: 2250, floor: 1, hp: 100,
                inv: {},
                logs: [],
                isMoving: false,
                db: {
                    events: [
                        { msg: "發現一粒藍莓果粒！", g: 120, h: 0, type: 'rare' },
                        { msg: "遇到搶茶的貓咪...", g: -40, h: -10, type: 'battle' },
                        { msg: "吸管稍微堵住了。", g: 0, h: -5, type: 'normal' },
                        { msg: "這層茶香好濃郁。", g: 0, h: 5, type: 'normal' }
                    ],
                    shop: [
                        { n: "特濃藍莓醬", p: 500, d: "恢復 50% 能量" },
                        { n: "純白鮮奶蓋", p: 800, d: "提升能量上限" },
                        { n: "紫晶果凍", p: 300, d: "下次投擲必為 6" }
                    ]
                }
            },

            init() {
                this.updateUI();
                console.log("遊戲初始化成功");
            },

            updateUI() {
                document.getElementById('st-gold').innerText = this.data.gold;
                document.getElementById('st-floor').innerText = this.data.floor + "F";
                document.getElementById('st-hp').innerText = this.data.hp + "%";
            },

            log(text, type = 'normal') {
                const list = document.getElementById('log-list');
                const div = document.createElement('div');
                div.className = `log-item ${type}`;
                div.innerText = text;
                list.prepend(div);
                
                // 自動滾動到頂部（因為我們是用 prepend，最新日誌在最上面）
                document.getElementById('scroll-area').scrollTo({ top: 0, behavior: 'smooth' });
            },

            roll() {
                if(this.data.isMoving || this.data.hp <= 0) return;
                this.data.isMoving = true;

                const dice = Math.floor(Math.random() * 6) + 1;
                this.data.floor += dice;
                
                const amao = document.getElementById('amao-display');
                amao.style.transform = "translateY(-40px) scale(1.2)";
                
                this.log(`🎲 攪拌成功！擲出 ${dice} 點，來到 ${this.data.floor}F。`);

                setTimeout(() => {
                    amao.style.transform = "translateY(0) scale(1)";
                    this.trigger();
                    this.updateUI();
                    this.data.isMoving = false;
                }, 400);
            },

            trigger() {
                const r = Math.random();
                if(r < 0.4) {
                    const ev = this.data.db.events[Math.floor(Math.random()*this.data.db.events.length)];
                    this.data.gold = Math.max(0, this.data.gold + ev.g);
                    this.data.hp = Math.min(100, Math.max(0, this.data.hp + ev.h));
                    this.log(`✨ ${ev.msg}`, ev.type);
                }
                if(this.data.hp <= 0) this.log("💀 阿毛能量耗盡了...", "battle");
            },

            interact() {
                const amao = document.getElementById('amao-display');
                amao.style.transform = "rotate(20deg)";
                setTimeout(()=>amao.style.transform="rotate(0deg)", 200);
                this.log("🐶 阿毛向妳撒嬌了一下！");
            }
        };

        const UI = {
            show(mode) {
                const over = document.getElementById('overlay');
                const title = document.getElementById('modal-title');
                const content = document.getElementById('modal-content');
                over.classList.add('active');

                if(mode === 'bag') {
                    title.innerText = "👜 藍莓萬寶袋";
                    content.innerHTML = "<p style='color:#999'>口袋裡空空如也...</p>";
                } else if(mode === 'shop') {
                    title.innerText = "🏪 藍莓精品茶店";
                    content.innerHTML = Game.data.db.shop.map(i => `
                        <div style="background:#f9f9f9; padding:15px; border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                            <div><b>${i.n}</b><br><small>${i.d}</small></div>
                            <button style="background:var(--berry-bright); border:none; color:white; padding:8px 12px; border-radius:10px;" onclick="UI.buy('${i.n}', ${i.p})">💰${i.p}</button>
                        </div>
                    `).join('');
                } else if(mode === 'rank') {
                    title.innerText = "🏆 冒險成就";
                    content.innerHTML = "<div style='padding:10px;'>阿毛正在努力寫下傳奇...</div>";
                }
            },
            hide() { document.getElementById('overlay').classList.remove('active'); },
            buy(n, p) {
                if(Game.data.gold >= p) {
                    Game.data.gold -= p;
                    Game.log(`🛒 買到了 [${n}]！`);
                    Game.updateUI();
                    this.hide();
                } else { alert("藍莓金幣不夠喔！"); }
            }
        };

        window.onload = () => Game.init();
    </script>
</body>
</html>
