<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿毛之塔：幻夢冒險</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card-bg: #16213e;
            --accent: #ff7675;
            --gold: #ffeaa7;
            --text: #dfe6e9;
            --morandi-blue: #74b9ff;
            --morandi-green: #55efc4;
            --morandi-purple: #a29bfe;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; font-family: -apple-system, "Microsoft JhengHei", sans-serif;
            background: var(--bg); color: var(--text); overflow: hidden;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* 舞台區 */
        .stage {
            flex: 1; position: relative; overflow: hidden;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #bg-lvl {
            position: absolute; font-size: 12rem; font-weight: 900;
            color: rgba(255, 255, 255, 0.03); z-index: 0; pointer-events: none;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #amao-sprite {
            width: 120px; height: 120px; z-index: 2; transition: transform 0.3s;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }

        .status-top {
            position: absolute; top: 20px; width: 90%; display: flex; justify-content: space-between;
            z-index: 10;
        }

        /* 日誌區 */
        .log-container {
            height: 120px; background: rgba(0,0,0,0.4); overflow-y: auto;
            padding: 10px; font-size: 14px; border-top: 1px solid #333;
        }
        .log-entry { margin-bottom: 5px; border-left: 3px solid var(--accent); padding-left: 8px; }

        /* 控制區 */
        .controls {
            padding: 20px; display: grid; grid-template-columns: 1fr; gap: 10px;
            background: var(--card-bg); z-index: 10;
        }

        .main-btn {
            background: var(--gold); color: #2d3436; border: none; padding: 15px;
            border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 0 #b2bec3; active: translateY(2px);
        }

        .sub-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .sub-btn {
            background: #333; color: #fff; border: none; padding: 10px;
            border-radius: 10px; font-size: 13px; cursor: pointer;
        }

        /* 抽屜系統 */
        #drawer {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 80%;
            background: #121212; border-radius: 30px 30px 0 0; z-index: 100;
            transition: bottom 0.4s cubic-bezier(0, 0, 0.2, 1);
            padding: 20px; border-top: 2px solid var(--gold);
        }
        #drawer.open { bottom: 0; }
        .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="stage">
        <div id="bg-lvl">0001</div>
        <div class="status-top">
            <div id="stat-nrg">⚡ 能量: 60/60</div>
            <div id="stat-gold">💰 錢包: 0</div>
        </div>
        <img id="amao-sprite" src="https://api.iconify.design/noto:dog-face.svg" alt="阿毛">
        <div id="amao-title" style="margin-top: 15px; color: var(--gold); font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">【初出的冒險犬】</div>
        <div id="weather-effect" style="font-size: 12px; color: #888;">✨ 環境：和平幻夢</div>
    </div>

    <div class="log-container" id="log-box">
        <div class="log-entry">阿毛醒來了，發現自己身處神秘的高塔第一層。</div>
    </div>

    <div class="controls">
        <button class="main-btn" onclick="AmaoApp.rollDice()">🎲 投擲命運</button>
        <div class="sub-btns">
            <button class="sub-btn" onclick="UI.openDrawer('bag')">🍱 萬寶袋</button>
            <button class="sub-btn" onclick="UI.openDrawer('collection')">🏅 榮譽牆</button>
            <button class="sub-btn" onclick="UI.openDrawer('shop')">🛒 找商人</button>
        </div>
    </div>

    <div id="drawer">
        <div class="drawer-header">
            <h2 id="drawer-title" style="margin:0;">標題</h2>
            <button onclick="UI.closeDrawer()" style="background:none; border:none; color:#fff; font-size:24px;">✕</button>
        </div>
        <div id="drawer-content" style="height: calc(100% - 60px); overflow-y: auto;"></div>
    </div>

    <script>
        // --- 1. 核心狀態 ---
        const state = {
            lvl: 1, nrg: 60, gold: 100,
            title: "【初出的冒險犬】",
            unlockedTitles: ["【初出的冒險犬】"],
            inv: [], cards: [],
            stats: { luk: 10, history: { totalSteps: 0, totalEaten: 0, angelRescue: 0, totalSpent: 0 } },
            isProcessing: false
        };

        // --- 2. 生成器 (Generator) ---
        const Generator = {
            rnd: (arr) => arr[Math.floor(Math.random() * arr.length)],
            getFood: function() {
                const f = ["香噴噴烤雞", "夢幻舒芙蕾", "莫蘭迪拿鐵", "星光飯糰"];
                return { name: this.rnd(f), type: "美食", energy: 20 };
            },
            getFurniture: function() {
                const f = ["質感灰落地燈", "北歐風單人椅", "大理石茶几", "復古留聲機"];
                return { name: this.rnd(f), type: "家具", icon: "🏠" };
            },
            getTitle: function() {
                const a = ["夢境", "星光", "幻夢", "流浪", "永恆"];
                const b = ["守護者", "收藏家", "探險員", "觀察家"];
                return `【${this.rnd(a)}${this.rnd(b)}】`;
            }
        };

        // --- 3. 核心邏輯 (AmaoApp) ---
        const AmaoApp = {
            updateUI: function() {
                document.getElementById('bg-lvl').innerText = String(state.lvl).padStart(4, '0');
                document.getElementById('stat-nrg').innerText = `⚡ 能量: ${state.nrg}/60`;
                document.getElementById('stat-gold').innerText = `💰 錢包: ${state.gold}`;
                document.getElementById('amao-title').innerText = state.title;
                SaveSystem.save();
            },

            addLog: function(msg, color = "#fff") {
                const box = document.getElementById('log-box');
                const div = document.createElement('div');
                div.className = "log-entry";
                div.style.color = color;
                div.style.borderLeftColor = color;
                div.innerText = msg;
                box.prepend(div);
            },

            rollDice: function() {
                if (state.isProcessing || state.nrg <= 0) {
                    if (state.nrg <= 0) this.addLog("❌ 體力耗盡！請吃點美食或找小天使。", "#ff4757");
                    return;
                }
                state.isProcessing = true;
                const steps = Math.floor(Math.random() * 6) + 1;
                this.addLog(`🎲 投出了 ${steps} 點！`, var(--gold));
                
                state.nrg -= 5;
                state.stats.history.totalSteps += steps;

                setTimeout(() => {
                    state.lvl += steps;
                    this.handleRandomEvent();
                    this.updateUI();
                    state.isProcessing = false;
                    FXSystem.playJumpFX();
                }, 500);
            },

            handleRandomEvent: function() {
                const r = Math.random();
                if (r < 0.2) {
                    const item = Generator.getFood();
                    state.inv.push(item);
                    this.addLog(`🎁 撿到了美食：${item.name}！`, var(--morandi-green));
                } else if (r < 0.3) {
                    const gold = Math.floor(Math.random() * 50) + 10;
                    state.gold += gold;
                    this.addLog(`💰 在路邊撿到 ${gold} 枚金幣！`, var(--gold));
                } else if (r < 0.35) {
                    const newTitle = Generator.getTitle();
                    if (!state.unlockedTitles.includes(newTitle)) {
                        state.unlockedTitles.push(newTitle);
                        this.addLog(`🏅 榮獲新稱號：${newTitle}！`, var(--morandi-purple));
                    }
                }
            }
        };

        // --- 4. 萬寶袋系統 (BagSystem) ---
        const BagSystem = {
            currentTab: 'food',
            switchTab: function(tab) { this.currentTab = tab; this.render(); },
            render: function() {
                const c = document.getElementById('drawer-content');
                const items = state.inv.filter(i => (this.currentTab === 'food' ? i.type === "美食" : i.type === "家具"));
                
                let html = `<div style="display:flex; gap:10px; margin-bottom:15px;">
                    <button onclick="BagSystem.switchTab('food')" style="flex:1; padding:10px; border-radius:10px; background:${this.currentTab==='food'?'var(--gold)':'#333'}">🍱 美食</button>
                    <button onclick="BagSystem.switchTab('furniture')" style="flex:1; padding:10px; border-radius:10px; background:${this.currentTab==='furniture'?'var(--gold)':'#333'}">🏠 家具</button>
                </div>`;
                
                items.forEach(item => {
                    html += `<div style="background:#222; padding:15px; border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                        <span>${item.name}</span>
                        <button onclick="BagSystem.useItem('${item.name}')" style="background:var(--gold); border:none; padding:5px 15px; border-radius:5px;">使用</button>
                    </div>`;
                });
                c.innerHTML = html || "<p style='text-align:center;'>袋子是空的</p>";
            },
            useItem: function(name) {
                const idx = state.inv.findIndex(i => i.name === name);
                const item = state.inv[idx];
                if (item.type === "美食") {
                    state.nrg = Math.min(60, state.nrg + item.energy);
                    AmaoApp.addLog(`😋 享用了 ${item.name}，體力恢復！`, var(--morandi-green));
                } else {
                    AmaoApp.addLog(`🏠 佈置了 ${item.name}，塔內變得更溫馨了。`, var(--morandi-blue));
                }
                state.inv.splice(idx, 1);
                this.render();
                AmaoApp.updateUI();
            }
        };

        // --- 5. UI 與 存檔控制 ---
        const UI = {
            openDrawer: function(type) {
                const d = document.getElementById('drawer');
                const t = document.getElementById('drawer-title');
                d.classList.add('open');
                if (type === 'bag') { t.innerText = "🍱 萬寶袋"; BagSystem.render(); }
                if (type === 'collection') { t.innerText = "🏅 榮譽牆"; this.renderCollection(); }
                if (type === 'shop') { t.innerText = "🛒 神祕商店"; this.renderShop(); }
            },
            closeDrawer: function() { document.getElementById('drawer').classList.remove('open'); },
            renderCollection: function() {
                let html = `<p>已解鎖稱號 (${state.unlockedTitles.length}/300)</p>`;
                state.unlockedTitles.forEach(t => {
                    html += `<div onclick="state.title='${t}'; AmaoApp.updateUI(); UI.closeDrawer();" style="background:#222; padding:10px; margin-bottom:5px; border-radius:8px; cursor:pointer;">${t} ${state.title===t?'(使用中)':''}</div>`;
                });
                document.getElementById('drawer-content').innerHTML = html;
            },
            renderShop: function() {
                const items = [
                    { name: "超級能量餅乾", price: 50, type: "美食", energy: 40 },
                    { name: "莫蘭迪小沙發", price: 150, type: "家具" }
                ];
                let html = `<p>💰 我的錢包: ${state.gold}</p>`;
                items.forEach(i => {
                    html += `<div style="background:#222; padding:15px; border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between;">
                        <span>${i.name} (💰${i.price})</span>
                        <button onclick="UI.buyItem('${i.name}', ${i.price}, '${i.type}')" style="background:var(--morandi-green); border:none; padding:5px 15px; border-radius:5px;">購買</button>
                    </div>`;
                });
                document.getElementById('drawer-content').innerHTML = html;
            },
            buyItem: function(name, price, type) {
                if (state.gold >= price) {
                    state.gold -= price;
                    state.inv.push({ name, type, energy: 40 });
                    AmaoApp.addLog(`🛒 買到了 ${name}！`, var(--gold));
                    this.renderShop();
                    AmaoApp.updateUI();
                } else { alert("金幣不足！"); }
            }
        };

        const SaveSystem = {
            key: "AmaoTower_Production_Save",
            save: function() { localStorage.setItem(this.key, JSON.stringify(state)); },
            load: function() {
                const d = localStorage.getItem(this.key);
                if (d) { Object.assign(state, JSON.parse(d)); AmaoApp.updateUI(); }
            }
        };

        const FXSystem = {
            playJumpFX: function() {
                const sprite = document.getElementById('amao-sprite');
                sprite.style.transform = "translateY(-30px) scale(1.1)";
                setTimeout(() => sprite.style.transform = "translateY(0) scale(1)", 300);
            }
        };

        // 初始化
        window.addEventListener('load', () => SaveSystem.load());
    </script>
</body>
</html>
