<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿毛之塔：終極奧德賽 - 製作人極限版</title>
    <style>
        /* 視覺規範：莫蘭迪配色系統 */
        :root {
            --bg-deep: #1a1a1c;
            --bg-panel: rgba(45, 52, 54, 0.98);
            --morandi-blue: #748da6;
            --morandi-green: #9fb8ad;
            --morandi-rose: #c18c8c;
            --gold-leaf: #d4af37;
            --soft-white: #dfe6e9;
            --hp-danger: #d63031;
            --shadow-lg: 0 15px 35px rgba(0,0,0,0.6);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin: 0; padding: 0; font-family: -apple-system, "Noto Sans TC", sans-serif;
            background: var(--bg-deep); color: var(--soft-white); overflow: hidden;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* 頂部導航：數據與美感兼具 */
        .top-bar {
            height: 75px; background: rgba(0, 0, 0, 0.85);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; border-bottom: 3px solid var(--gold-leaf); z-index: 1000;
        }
        .profile { display: flex; align-items: center; gap: 12px; }
        .avatar { font-size: 32px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        .name-box { display: flex; flex-direction: column; }
        .name-box b { font-size: 19px; letter-spacing: 0.5px; }
        .name-box span { font-size: 12px; color: var(--gold-leaf); opacity: 0.8; font-weight: bold; }

        .stats { text-align: right; min-width: 140px; }
        .hp-container { height: 10px; background: #333; border-radius: 5px; margin-bottom: 5px; overflow: hidden; }
        #hp-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff7675, #d63031); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .gold-display { font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold; color: var(--gold-leaf); }

        /* 遊戲舞台區 */
        .stage {
            flex: 1; position: relative; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: radial-gradient(circle, #2d3436 0%, #000 100%);
            overflow: hidden;
        }
        #floor-number {
            position: absolute; font-size: 16rem; font-weight: 900;
            color: rgba(255, 255, 255, 0.02); z-index: 0; pointer-events: none;
        }
        .amao-container { position: relative; z-index: 10; text-align: center; }
        #amao-sprite { font-size: 125px; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8)); }
        #current-title {
            margin-top: 20px; padding: 6px 22px; background: rgba(0,0,0,0.6);
            border: 1.5px solid var(--gold-leaf); border-radius: 50px;
            color: var(--gold-leaf); font-size: 17px; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* 冒險日誌：一眼可見的歷史 */
        .log-section {
            height: 180px; background: rgba(0,0,0,0.7); overflow-y: auto;
            padding: 15px; border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 16px; scroll-behavior: smooth;
        }
        .log-entry {
            margin-bottom: 10px; padding: 12px; border-radius: 10px;
            background: rgba(255,255,255,0.03); border-left: 5px solid var(--morandi-blue);
            animation: slideIn 0.3s ease-out; line-height: 1.5;
        }
        .log-entry.battle { border-left-color: var(--hp-danger); color: #fab1a0; }
        .log-entry.event { border-left-color: var(--gold-leaf); color: #ffeaa7; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1; transform: translateX(0); } }

        /* 底部操作面板 */
        .footer-nav {
            background: var(--bg-panel); padding: 15px 15px 35px 15px;
            border-radius: 35px 35px 0 0; box-shadow: var(--shadow-lg); z-index: 1000;
        }
        .roll-dice-btn {
            background: linear-gradient(135deg, var(--gold-leaf), #b8860b);
            color: #1a1a1c; border: none; width: 100%; height: 75px;
            border-radius: 20px; font-size: 26px; font-weight: 900; margin-bottom: 15px;
            box-shadow: 0 6px 0 #7e6300; transition: 0.1s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .roll-dice-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #7e6300; }

        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .menu-btn {
            background: #3d464d; color: white; border: none; height: 85px;
            border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .menu-btn span { font-size: 28px; margin-bottom: 4px; }
        .menu-btn label { font-size: 15px; font-weight: bold; pointer-events: none; }
        .menu-btn:active { background: #4b565e; transform: scale(0.96); }

        /* 全屏抽屜式 UI */
        .overlay-drawer {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 86%;
            background: #1e1e24; border-radius: 35px 35px 0 0; z-index: 2000;
            transition: bottom 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            padding: 30px 22px; border-top: 5px solid var(--gold-leaf);
        }
        .overlay-drawer.open { bottom: 0; }
        .drawer-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .drawer-title { font-size: 28px; font-weight: 900; color: var(--gold-leaf); }
        .close-btn { background: none; border: none; color: white; font-size: 35px; }

        .tab-bar { display: flex; gap: 10px; margin-bottom: 22px; }
        .tab-item { flex: 1; padding: 15px; text-align: center; background: #2d3436; border-radius: 15px; font-weight: bold; color: #a2a2a2; }
        .tab-item.active { background: var(--gold-leaf); color: #1e1e24; }

        /* 卡片設計 */
        .card-scroller { height: calc(100% - 130px); overflow-y: auto; }
        .data-card {
            background: rgba(255,255,255,0.06); padding: 22px; border-radius: 22px; margin-bottom: 16px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.03);
        }
        .data-info b { font-size: 24px; display: block; color: #fff; margin-bottom: 5px; }
        .data-info b i { color: var(--gold-leaf); font-style: normal; margin-left: 8px; font-size: 18px; }
        .data-info p { font-size: 16px; color: var(--morandi-blue); margin: 0; line-height: 1.4; }
        .action-btn { background: var(--gold-leaf); color: #1e1e24; border: none; padding: 12px 24px; border-radius: 12px; font-weight: bold; font-size: 18px; }

        /* 特效類別 */
        @keyframes shake { 0%, 100% { transform: translate(0); } 20% { transform: translate(-8px, 5px); } 40% { transform: translate(8px, -5px); } 60% { transform: translate(-8px, -5px); } 80% { transform: translate(8px, 5px); } }
        .screen-shake { animation: shake 0.3s ease-in-out; }
        .damage-flash { background: rgba(214, 48, 49, 0.4) !important; }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="profile">
            <div class="avatar">🐶</div>
            <div class="name-box">
                <b>阿毛 (A-Mao)</b>
                <span>傳說級引路犬</span>
            </div>
        </div>
        <div class="stats">
            <div class="hp-container"><div id="hp-bar"></div></div>
            <div class="gold-display" id="ui-gold">💰 金幣: 0</div>
        </div>
    </header>

    <main class="stage" id="viewport">
        <div id="floor-number">0001</div>
        <div class="amao-container">
            <div id="amao-sprite">🐶</div>
            <div id="current-title">【塔之勇者】</div>
        </div>
    </main>

    <section class="log-section" id="log-box"></section>

    <footer class="footer-nav">
        <button class="roll-dice-btn" onclick="Core.roll()">
            <span>🎲</span> 投擲命運之骰
        </button>
        <div class="menu-grid">
            <button class="menu-btn" onclick="View.open('inventory')"><span>🍱</span><label>萬寶袋</label></button>
            <button class="menu-btn" onclick="View.open('titles')"><span>🏅</span><label>榮譽牆</label></button>
            <button class="menu-btn" onclick="View.open('shop')"><span>🛒</span><label>找商人</label></button>
        </div>
    </footer>

    <div class="overlay-drawer" id="main-drawer">
        <div class="drawer-head">
            <span class="drawer-title" id="drawer-title-text">萬寶袋</span>
            <button class="close-btn" onclick="View.close()">✕</button>
        </div>
        <div id="bag-tabs" class="tab-bar" style="display:none;">
            <div class="tab-item active" id="tab-CONSUME" onclick="View.switchTab('CONSUME')">補給物</div>
            <div class="tab-item" id="tab-COLLECT" onclick="View.switchTab('COLLECT')">裝飾品</div>
        </div>
        <div class="card-scroller" id="render-target"></div>
    </div>

    <script>
        /**
         * 阿毛之塔：核心引擎數據模型
         */
        const State = {
            floor: 1, gold: 2000, hp: 100, maxHp: 100, atk: 15,
            activeTitle: "【塔之勇者】",
            unlockedTitles: ["【塔之勇者】", "【屠龍傳奇】", "【莫蘭迪收藏家】"],
            inventory: {}, // 數據結構：{ name: { count, type, desc, value } }
            isBusy: false, currentTab: 'CONSUME',
            
            // 資料字典
            dictionary: {
                enemies: [
                    { name: "貪婪史萊姆", hp: 30, dmg: 10, loot: 100, emoji: "🤢" },
                    { name: "影子獵人", hp: 50, dmg: 18, loot: 250, emoji: "👤" },
                    { name: "機關魔方", hp: 40, dmg: 12, loot: 180, emoji: "📦" }
                ],
                lootTable: [
                    { name: "能量肉排", type: "CONSUME", desc: "恢復 25 點生命值", val: 25 },
                    { name: "晨曦甘露", type: "CONSUME", desc: "恢復 50 點生命值", val: 50 },
                    { name: "復古落地燈", type: "COLLECT", desc: "散發暖光的莫蘭迪家具" },
                    { name: "羊毛地毯", type: "COLLECT", desc: "阿毛最喜歡躺的地方" }
                ],
                shop: [
                    { name: "全回復藥水", price: 300, type: "CONSUME", desc: "瞬間將生命值補滿", val: 999 },
                    { name: "大理石紋柱", price: 1200, type: "COLLECT", desc: "極致奢華的高塔裝飾" }
                ]
            }
        };

        const Core = {
            init() {
                this.load();
                this.updateUI();
                this.log("🏰 塔門開啟，阿毛充滿期待地踏入了一樓。");
            },

            updateUI() {
                document.getElementById('floor-number').innerText = String(State.floor).padStart(4, '0');
                document.getElementById('ui-gold').innerText = `💰 金幣: ${State.gold}`;
                document.getElementById('hp-bar').style.width = `${(State.hp / State.maxHp) * 100}%`;
                document.getElementById('current-title').innerText = State.activeTitle;
                this.save();
            },

            log(msg, style = '') {
                const box = document.getElementById('log-box');
                const entry = document.createElement('div');
                entry.className = `log-entry ${style}`;
                entry.innerText = `> ${msg}`;
                box.prepend(entry);
                if (box.childNodes.length > 50) box.removeChild(box.lastChild);
            },

            roll() {
                if (State.isBusy || State.hp <= 0) return;
                State.isBusy = true;
                
                const steps = Math.floor(Math.random() * 6) + 1;
                State.floor += steps;
                this.log(`🎲 投出 ${steps} 點，阿毛來到了 ${State.floor}F。`);

                const amao = document.getElementById('amao-sprite');
                amao.style.transform = "scale(1.4) translateY(-30px)";

                setTimeout(() => {
                    amao.style.transform = "scale(1)";
                    this.triggerEvent();
                    this.updateUI();
                    State.isBusy = false;
                }, 300);
            },

            triggerEvent() {
                const rng = Math.random();
                if (rng < 0.25) this.battle();
                else if (rng < 0.45) this.findLoot();
                else if (rng < 0.60) this.specialSite();
            },

            battle() {
                const enemy = State.dictionary.enemies[Math.floor(Math.random() * State.dictionary.enemies.length)];
                const stage = document.getElementById('viewport');
                const sprite = document.getElementById('amao-sprite');
                
                stage.classList.add('damage-flash', 'screen-shake');
                sprite.innerText = enemy.emoji;
                this.log(`⚔️ 遭遇 ${enemy.name}！戰鬥激烈進行中...`, 'battle');

                setTimeout(() => {
                    stage.classList.remove('damage-flash', 'screen-shake');
                    sprite.innerText = "🐶";
                    
                    const damage = Math.max(5, enemy.dmg - Math.floor(Math.random() * 5));
                    State.hp = Math.max(0, State.hp - damage);
                    State.gold += enemy.loot;
                    
                    this.log(`✨ 擊退強敵！受傷 ${damage} HP，獲得金幣 ${enemy.loot}。`, 'battle');
                    if (State.hp <= 0) {
                        this.log("💀 阿毛體力耗盡了... 請使用藥水或休息。", "battle");
                    }
                    this.updateUI();
                }, 600);
            },

            findLoot() {
                const item = State.dictionary.lootTable[Math.floor(Math.random() * State.dictionary.lootTable.length)];
                this.addItem(item.name, item.type, item.desc, item.val);
                this.log(`🎁 發現一個古老寶箱！獲得：${item.name}。`, 'event');
            },

            specialSite() {
                const healing = 15;
                State.hp = Math.min(State.maxHp, State.hp + healing);
                this.log(`💧 發現純淨泉水，阿毛喝了一些，生命值恢復了 ${healing}。`, 'event');
                this.updateUI();
            },

            addItem(n, t, d, v) {
                if (State.inventory[n]) State.inventory[n].count++;
                else State.inventory[n] = { count: 1, type: t, desc: d, val: v || 0 };
            },

            save() { localStorage.setItem('Amao_Tower_Master', JSON.stringify(State)); },
            load() {
                const data = localStorage.getItem('Amao_Tower_Master');
                if (data) Object.assign(State, JSON.parse(data));
            }
        };

        const View = {
            open(mode) {
                const dr = document.getElementById('main-drawer');
                const title = document.getElementById('drawer-title-text');
                const tabs = document.getElementById('bag-tabs');
                dr.classList.add('open');

                if (mode === 'inventory') {
                    title.innerText = "🍱 萬寶袋";
                    tabs.style.display = 'flex';
                    this.switchTab(State.currentTab);
                } else if (mode === 'titles') {
                    title.innerText = "🏅 榮譽牆";
                    tabs.style.display = 'none';
                    this.renderTitles();
                } else if (mode === 'shop') {
                    title.innerText = "🛒 找商人";
                    tabs.style.display = 'none';
                    this.renderShop();
                }
            },

            close() { document.getElementById('main-drawer').classList.remove('open'); },

            switchTab(t) {
                State.currentTab = t;
                document.getElementById('tab-CONSUME').className = t === 'CONSUME' ? 'tab-item active' : 'tab-item';
                document.getElementById('tab-COLLECT').className = t === 'COLLECT' ? 'tab-item active' : 'tab-item';
                
                const target = document.getElementById('render-target');
                const items = Object.entries(State.inventory).filter(([_, obj]) => obj.type === t);
                
                target.innerHTML = items.length ? items.map(([name, obj]) => `
                    <div class="data-card">
                        <div class="data-info"><b>${name} <i>x${obj.count}</i></b><p>${obj.desc}</p></div>
                        <button class="action-btn" onclick="View.use('${name}','${t}')">${t === 'CONSUME' ? '使用' : '佈置'}</button>
                    </div>`).join('') : `<p style='text-align:center; padding-top:100px; color:#555;'>口袋空空如也...</p>`;
            },

            renderTitles() {
                document.getElementById('render-target').innerHTML = State.unlockedTitles.map(t => `
                    <div class="data-card" onclick="View.setTitle('${t}')">
                        <div class="data-info"><b>${t}</b><p>${t === State.activeTitle ? '正在佩戴' : '點擊切換稱號'}</p></div>
                    </div>`).join('');
            },

            renderShop() {
                document.getElementById('render-target').innerHTML = State.dictionary.shop.map(i => `
                    <div class="data-card">
                        <div class="data-info"><b>${i.name} (💰${i.price})</b><p>${i.desc}</p></div>
                        <button class="action-btn" onclick="View.buy('${i.name}', ${i.price}, '${i.type}', '${i.desc}', ${i.val})">購入</button>
                    </div>`).join('');
            },

            buy(n, p, t, d, v) {
                if (State.gold >= p) {
                    State.gold -= p;
                    Core.addItem(n, t, d, v);
                    Core.log(`🛒 成功購入：${n}。`);
                    Core.updateUI();
                    this.close();
                } else { alert("金幣不夠唷！"); }
            },

            use(n, t) {
                const item = State.inventory[n];
                if (item.count > 1) item.count--;
                else delete State.inventory[n];

                if (t === 'CONSUME') {
                    State.hp = Math.min(State.maxHp, State.hp + item.val);
                    Core.log(`✨ 使用了 ${n}，生命值恢復為 ${State.hp}。`);
                } else {
                    Core.log(`🏠 阿毛佈置了 ${n}，讓休息區更美了。`);
                }
                Core.updateUI();
                this.switchTab(t);
            },

            setTitle(t) { State.activeTitle = t; Core.updateUI(); this.close(); }
        };

        window.onload = () => Core.init();
    </script>
</body>
</html>
