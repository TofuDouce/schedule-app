<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿毛之塔</title>
    <style>
        /* --- 莫蘭迪深色調系統 --- */
        :root {
            --bg-dark: #1A1A22;        /* 極深色背景 */
            --panel-bg: #252533;      /* 面板背景 */
            --morandi-green: #B4C6A6; /* 莫蘭迪綠 */
            --morandi-gold: #EAC4D5;  /* 莫蘭迪柔粉金 */
            --text-light: #E0E0E0;
            --accent-blue: #A3B1C6;
            --dice-yellow: #FFE082;
            --header-height: 80px;
            --footer-height: 160px; /* 包含按鈕與導航列的高度 */
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0; padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* 禁止全體捲動 */
            display: flex;
            flex-direction: column;
        }

        /* --- 1. 固定頂部 (固定在最上方) --- */
        #fixed-header {
            height: var(--header-height);
            background: rgba(26, 26, 34, 0.95);
            border-bottom: 1px solid #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 100;
            flex-shrink: 0;
        }

        .status-row {
            display: flex;
            justify-content: space-around;
            padding: 5px 10px;
            font-size: 0.85em;
        }

        .game-title {
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
            letter-spacing: 2px;
            color: var(--morandi-gold);
        }

        /* --- 2. 中間可捲動區 (阿毛與日誌) --- */
        #main-scroll-area {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding-bottom: 20px;
        }

        #stage-view {
            height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            flex-shrink: 0;
        }

        .floor-indicator {
            position: absolute;
            font-size: 5em;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03);
            z-index: 0;
        }

        .amao-main-sprite { font-size: 70px; z-index: 1; margin-bottom: 8px; }
        .amao-title-label {
            background: var(--morandi-gold);
            color: #4A4A4A;
            padding: 2px 12px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.85em;
            z-index: 1;
        }

        #game-log-list {
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .log-entry {
            background: var(--panel-bg);
            padding: 12px;
            border-radius: 10px;
            border-left: 4px solid var(--accent-blue);
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 3. 固定底部 (鎖定在最下方) --- */
        #fixed-footer {
            height: var(--footer-height);
            background: var(--bg-dark);
            border-top: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 10px 15px;
            z-index: 100;
            flex-shrink: 0;
        }

        .dice-button {
            background-color: var(--dice-yellow);
            color: #333;
            border: none;
            border-radius: 12px;
            width: 100%;
            height: 60px;
            font-size: 1.1em;
            font-weight: bold;
            box-shadow: 0 4px 0 #D4A017;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .dice-button:active { transform: translateY(2px); box-shadow: 0 2px 0 #D4A017; }

        .bottom-nav {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .nav-item {
            flex: 1;
            background: #333344;
            height: 50px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.4em;
            cursor: pointer;
            transition: 0.2s;
        }
        .nav-item:active { background: var(--morandi-green); }

        /* --- 彈窗全屏優化 --- */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            z-index: 200;
            display: none;
            flex-direction: column;
        }

        .overlay-header {
            height: 60px;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #444;
        }

        .notebook-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .item-slot {
            aspect-ratio: 1;
            background: #252533;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8em;
            color: #666;
            border: 1px solid #333;
        }
        .item-slot.unlocked { color: var(--text-light); border-color: var(--morandi-green); }

    </style>
</head>
<body>

    <div id="fixed-header">
        <div class="status-row">
            <span>⚡ 體力: 無限</span>
            <span>💰 金幣: <span id="gold-val">1000</span></span>
        </div>
        <div class="game-title">阿毛之塔</div>
    </div>

    <div id="main-scroll-area">
        <div id="stage-view">
            <div class="floor-indicator" id="bg-floor">0001</div>
            <div class="amao-main-sprite">🐶</div>
            <div class="amao-title-label" id="current-title">【新手爬塔狗】</div>
        </div>

        <div id="game-log-list">
            <div class="log-entry">
                <div>🦴</div>
                <div>歡迎來到阿毛之塔！點擊下方骰子開始爬塔。</div>
            </div>
        </div>
    </div>

    <div id="fixed-footer">
        <button class="dice-button" onclick="handleRoll()">
            🎲 投擲命運 (測試模式)
        </button>
        
        <div class="bottom-nav">
            <div class="nav-item" onclick="openMenu('food')">🍱</div>
            <div class="nav-item" onclick="openMenu('title')">🏅</div>
            <div class="nav-item" onclick="openMenu('bag')">🎒</div>
            <div class="nav-item" onclick="openMenu('shop')">🛒</div>
        </div>
    </div>

    <div id="menu-overlay" class="overlay">
        <div class="overlay-header">
            <h2 id="menu-title">筆記本</h2>
            <div onclick="closeMenu()" style="font-size: 1.5em; padding: 10px;">✕</div>
        </div>
        <div id="menu-content" class="notebook-content">
            </div>
    </div>

<script>
    let floor = 1;

    function handleRoll() {
        const step = Math.floor(Math.random() * 6) + 1;
        floor += step;
        
        // 更新顯示
        document.getElementById('bg-floor').innerText = floor.toString().padStart(4, '0');
        
        // 新增日誌
        const logList = document.getElementById('game-log-list');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `
            <div>🎲</div>
            <div>投擲出 ${step} 點！來到 <span style="color:var(--morandi-gold)">${floor}F</span></div>
        `;
        logList.insertBefore(entry, logList.firstChild);

        // 隨機觸發小驚喜
        if(Math.random() > 0.8) {
            addRewardLog();
        }
    }

    function addRewardLog() {
        const logList = document.getElementById('game-log-list');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.style.borderLeftColor = 'var(--morandi-gold)';
        entry.innerHTML = `<div>🎁</div><div>發現路邊的<span style="color:var(--morandi-green)">美味香煎豬排</span>！</div>`;
        logList.insertBefore(entry, logList.firstChild);
    }

    function openMenu(type) {
        const overlay = document.getElementById('menu-overlay');
        const content = document.getElementById('menu-content');
        const title = document.getElementById('menu-title');
        
        content.innerHTML = ''; // 清空
        overlay.style.display = 'flex';

        if(type === 'food') {
            title.innerText = '🍱 美食筆記本 (300)';
            for(let i=1; i<=300; i++) {
                let slot = document.createElement('div');
                slot.className = 'item-slot';
                slot.innerText = i;
                content.appendChild(slot);
            }
        } else if(type === 'title') {
            title.innerText = '🏅 稱號筆記本 (150)';
            for(let i=1; i<=150; i++) {
                let slot = document.createElement('div');
                slot.className = 'item-slot';
                slot.innerText = '鎖定';
                content.appendChild(slot);
            }
        } else {
            title.innerText = '尚未解鎖';
            content.innerHTML = '<p style="grid-column: span 4; text-align:center; padding: 20px;">此功能正在由滷滷米達開發中...</p>';
        }
    }

    function closeMenu() {
        document.getElementById('menu-overlay').style.display = 'none';
    }
</script>

</body>
</html>
