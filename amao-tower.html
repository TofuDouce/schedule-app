<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿毛之塔：勇者鬥餓龍</title>
    <style>
        :root { 
            --gold: #f1c40f; --pink: #ff99cc; --bg: #0a0a12; --card: #1a1a2e; 
            --equip: #00f2ff; --monster: #e74c3c; --choco: #5d4037;
        }
        body { margin:0; font-family: sans-serif; background: var(--bg); color: #fff; user-select: none; overflow-x: hidden; }
        
        /* 標題與數值 */
        .tower-header { padding: 20px 0; text-align: center; border-bottom: 4px solid var(--gold); background: #000; }
        .tower-title { font-size: 2.5rem; color: var(--gold); text-shadow: 0 0 10px var(--gold); margin: 0; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); background: #111; padding: 12px; text-align: center; border-bottom: 1px solid #333; }
        .stat-val { color: var(--pink); font-weight: bold; font-size: 1.1rem; }
        
        /* 戰鬥舞台 */
        .adventure-zone { min-height: 450px; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        .battle-stage { display: flex; justify-content: space-around; align-items: center; width: 100%; height: 200px; position: relative; }
        
        .unit { display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .unit-sprite { font-size: 80px; position: relative; }
        .hp-bar { width: 60px; height: 6px; background: #444; border-radius: 3px; margin-top: 10px; overflow: hidden; }
        .hp-fill { height: 100%; background: #2ecc71; transition: 0.3s; }
        
        /* 阿毛紙娃娃 */
        .layer { position: absolute; font-size: 45px; pointer-events: none; opacity: 0; transform: scale(0); transition: 0.3s; }
        .layer.active { opacity: 1; transform: scale(1); }
        .layer-head { top: -15px; z-index: 15; }
        .layer-body { top: 30px; z-index: 5; font-size: 60px; opacity: 0.7; }
        .layer-hand { right: -25px; top: 40px; z-index: 20; }
        .layer-feet { bottom: -10px; z-index: 3; }

        /* 卡片與按鈕 */
        .stage { display: flex; justify-content: center; gap: 10px; min-height: 180px; padding: 10px; }
        .card { width: 140px; background: var(--card); border: 2px solid #444; border-radius: 15px; display: none; flex-direction: column; align-items: center; padding: 10px; text-align: center; animation: pop 0.4s forwards; }
        .card.reveal { display: flex; }
        .bonus-text { font-size: 11px; color: var(--gold); font-weight: bold; margin-top: 5px; }

        .dice { width: 80px; height: 80px; background: #fff; color: #000; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 40px; cursor: pointer; box-shadow: 0 6px 0 #999; margin: 20px; }
        .dice:active { transform: translateY(4px); box-shadow: 0 2px 0 #999; }

        .nav-menu { position: fixed; right: 20px; bottom: 100px; display: flex; flex-direction: column; gap: 15px; }
        .circle-btn { width: 60px; height: 60px; background: #222; border: 3px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; padding: 20px; overflow-y: auto; }
        #choco-screen { display: none; position: fixed; inset: 0; background: var(--choco); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        
        @keyframes pop { 0%{transform:scale(0)} 100%{transform:scale(1)} }
        @keyframes attackAmao { 0% { transform: translateX(0); } 50% { transform: translateX(30px); } 100% { transform: translateX(0); } }
        @keyframes attackEnemy { 0% { transform: translateX(0); } 50% { transform: translateX(-30px); } 100% { transform: translateX(0); } }
    </style>
</head>
<body>

<div id="choco-screen">
    <div style="font-size:100px;">🍫</div>
    <h2 style="color:#fff;">巧克力神救援！</h2>
    <p id="choco-msg" style="color:var(--gold); padding:20px;"></p>
    <button onclick="closeChoco()" style="background:var(--gold); border:none; padding:15px 30px; border-radius:10px; font-weight:bold; cursor:pointer;">謝謝巧克力！</button>
</div>

<div class="tower-header">
    <h1 class="tower-title">阿毛之塔</h1>
    <div id="amao-title" style="color:#888; font-size:14px; margin-top:5px;">👑 冒險者 阿毛</div>
</div>

<div class="stats-grid">
    <div><small>⚔️ 攻擊</small><br><span id="st-atk" class="stat-val">5</span></div>
    <div><small>🛡️ 防禦</small><br><span id="st-def" class="stat-val">5</span></div>
    <div><small>👟 速度</small><br><span id="st-spd" class="stat-val">5</span></div>
    <div><small>✨ 魅力</small><br><span id="st-chr" class="stat-val">5</span></div>
</div>

<div class="adventure-zone">
    <div class="battle-stage">
        <div class="unit" id="am-unit">
            <div class="unit-sprite">
                <div id="layer-head" class="layer layer-head"></div>
                <div id="layer-body" class="layer layer-body"></div>
                🐶
                <div id="layer-hand" class="layer layer-hand"></div>
                <div id="layer-feet" class="layer layer-feet"></div>
            </div>
            <div class="hp-bar"><div id="am-hp" class="hp-fill" style="width:100%"></div></div>
        </div>

        <div style="font-size:30px; color:var(--monster); font-weight:bold;" id="vs">VS</div>

        <div class="unit" id="en-unit" style="opacity:0">
            <div class="unit-sprite" id="en-sprite">👾</div>
            <div id="en-name" style="font-size:12px; font-weight:bold;">怪物</div>
            <div class="hp-bar"><div id="en-hp" class="hp-fill" style="width:100%"></div></div>
        </div>
    </div>

    <div id="info-msg" style="text-align:center; color:var(--gold); font-weight:bold; height:40px; padding:0 10px;">點擊骰子開始爬塔！</div>
    
    <div class="stage" id="stage"></div>

    <div class="dice" onclick="roll()">🎲</div>
</div>

<div style="display:flex; justify-content:space-around; padding:15px; background:#000; border-top:1px solid #333;">
    <span>🏰 層數: <b id="lvl" style="color:var(--gold)">0</b></span>
    <span>⚡ 體力: <b id="nrg" style="color:var(--pink)">60</b></span>
    <span>💰 金幣: <b id="gold" style="color:#2ecc71">100</b></span>
</div>

<div class="nav-menu">
    <div class="circle-btn" onclick="openStore()">🏪</div>
    <div class="circle-btn" onclick="openInv()">🎒</div>
</div>

<div id="inv-modal" class="modal">
    <div style="display:flex; justify-content:space-between;"><h2>🎒 背包</h2><button onclick="closeModal('inv-modal')">關閉</button></div>
    <div id="inv-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
</div>

<div id="store-modal" class="modal">
    <div style="display:flex; justify-content:space-between;"><h2>🏪 商店</h2><button onclick="closeModal('store-modal')">離開</button></div>
    <div id="store-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
</div>

<script>
// --- 資料庫 ---
const FOOD_ADJ = ["極致","閃光","噴火","發臭","媽媽味","濃郁","爆漿","神級","巧克力味","鮪魚味","焦掉的","夢幻","超彈牙","大份量","特製","秘傳","隔壁家","深夜"];
const FOOD_MTH = ["紅燒","清蒸","油炸","乾燒","慢燉","冰鎮","香煎","炭烤","白燙","煙燻","麻辣","酸湯","勾芡","蜜汁","鹽酥","火烤"];
const FOOD_ING = ["豬肉","骨頭","魚片","牛排","雞腿","水餃","肉包","蝦仁","雞排","罐頭","丸子","章魚","甜不辣","玉米","雞蛋","泡麵","肉燥","小籠包"];

const ENEMY_DB = [
    {n: "史萊姆", i: "💧", hp: 30, atk: 5},
    {n: "哥布林", i: "👺", hp: 50, atk: 12},
    {n: "小烏鴉", i: "🐦", hp: 20, atk: 15},
    {n: "巨大蜘蛛", i: "🕷️", hp: 60, atk: 18},
    {n: "隔壁惡犬", i: "🐕", hp: 80, atk: 25},
    {n: "掃地機器人(失控)", i: "🤖", hp: 100, atk: 30}
];

const EQUIP_DB = {
    head: ["戰鬥墨鏡","安全帽","鴨鴨帽","耳機","派對帽","蝴蝶結"],
    body: ["睡衣","汗衫","雨衣","圍裙","西裝","羽絨衣"],
    hand: ["不求人","吹風機","蒼蠅拍","遙控器","湯匙","皮帶"],
    feet: ["涼鞋","拖鞋","滑板","溜冰鞋","藍白拖","長靴"]
};

// --- 狀態 ---
let state = {
    lvl: 0, nrg: 60, gold: 100,
    inv: [], equips: {head:null, body:null, hand:null, feet:null},
    isBattle: false
};

// --- 邏輯 ---
function getRandomFood() {
    const name = FOOD_ADJ[Math.floor(Math.random()*FOOD_ADJ.length)] + 
                 FOOD_MTH[Math.floor(Math.random()*FOOD_MTH.length)] + 
                 FOOD_ING[Math.floor(Math.random()*FOOD_ING.length)];
    const val = Math.floor(Math.random()*30)+20;
    return { n: name, i: "🍱", v: val, type: 'food', d: `恢復 ${val} 體力` };
}

function getRandomEquip() {
    const slots = ["head", "body", "hand", "feet"];
    const slot = slots[Math.floor(Math.random()*4)];
    const name = EQUIP_DB[slot][Math.floor(Math.random()*EQUIP_DB[slot].length)];
    const icons = {head:"🕶️", body:"👕", hand:"🥢", feet:"👟"};
    return {
        n: name, i: icons[slot], t: slot, type: 'equip',
        atk: slot==='hand'?20:5, def: slot==='body'?20:5, spd: slot==='feet'?20:5
    };
}

function update() {
    let s = {atk:5, def:5, spd:5, chr:5};
    Object.values(state.equips).forEach(e => { if(e){ s.atk+=e.atk||0; s.def+=e.def||0; s.spd+=e.spd||0; }});
    
    document.getElementById('st-atk').innerText = s.atk;
    document.getElementById('st-def').innerText = s.def;
    document.getElementById('st-spd').innerText = s.spd;
    document.getElementById('lvl').innerText = state.lvl;
    document.getElementById('nrg').innerText = state.nrg;
    document.getElementById('gold').innerText = state.gold;

    ['head','body','hand','feet'].forEach(slot => {
        const el = document.getElementById(`layer-${slot}`);
        if(state.equips[slot]) { el.innerText = state.equips[slot].i; el.classList.add('active'); }
        else { el.classList.remove('active'); }
    });
}

function roll() {
    if(state.isBattle) return;
    if(state.nrg <= 0) return triggerChoco("體力耗盡！");
    
    state.nrg--;
    const step = Math.floor(Math.random()*6)+1;
    state.lvl += step;
    document.querySelector('.dice').innerText = step;
    
    const r = Math.random();
    if(r < 0.4) startBattle();
    else if(r < 0.5) triggerMom();
    else findTreasure();
    
    update();
}

// 戰鬥邏輯
async function startBattle() {
    state.isBattle = true;
    const enemy = {...ENEMY_DB[Math.floor(Math.random()*ENEMY_DB.length)]};
    const enUI = document.getElementById('en-unit');
    const msg = document.getElementById('info-msg');
    
    document.getElementById('en-sprite').innerText = enemy.i;
    document.getElementById('en-name').innerText = enemy.n;
    document.getElementById('en-hp').style.width = "100%";
    enUI.style.opacity = "1";
    msg.innerText = `遭遇 ${enemy.n}！戰鬥開始！`;

    let eHP = enemy.hp;
    let aHP = 100; // 阿毛假想血量

    while(eHP > 0 && aHP > 0) {
        await new Promise(r => setTimeout(r, 800));
        // 阿毛攻擊
        let dmg = Math.max(5, (parseInt(document.getElementById('st-atk').innerText) - 2));
        eHP -= dmg;
        document.getElementById('en-hp').style.width = Math.max(0, (eHP/enemy.hp)*100) + "%";
        document.getElementById('am-unit').style.animation = "attackAmao 0.2s";
        msg.innerText = `阿毛攻擊！造成 ${dmg} 傷害`;
        setTimeout(()=>document.getElementById('am-unit').style.animation="", 200);

        if(eHP <= 0) break;

        await new Promise(r => setTimeout(r, 800));
        // 敵人攻擊
        let eDmg = Math.max(2, enemy.atk - Math.floor(parseInt(document.getElementById('st-def').innerText)/2));
        aHP -= eDmg;
        document.getElementById('am-hp').style.width = Math.max(0, aHP) + "%";
        document.getElementById('en-unit').style.animation = "attackEnemy 0.2s";
        msg.innerText = `${enemy.n} 反擊！造成 ${eDmg} 傷害`;
        setTimeout(()=>document.getElementById('en-unit').style.animation="", 200);
    }

    if(eHP <= 0) {
        msg.innerText = `勝利！獲得 30 金幣`;
        state.gold += 30;
    } else {
        msg.innerText = `慘敗... 體力大量流失`;
        state.nrg = Math.max(0, state.nrg - 20);
    }

    setTimeout(() => {
        enUI.style.opacity = "0";
        document.getElementById('am-hp').style.width = "100%";
        state.isBattle = false;
        update();
    }, 2000);
}

function findTreasure() {
    const s = document.getElementById('stage'); s.innerHTML = "";
    document.getElementById('info-msg').innerText = "發現寶箱！";
    for(let i=0; i<2; i++) {
        let it = (Math.random()<0.5) ? getRandomEquip() : getRandomFood();
        state.inv.push(it);
        let c = document.createElement('div');
        c.className = "card reveal";
        c.innerHTML = `<div style="font-size:30px">${it.i}</div><div style="font-size:12px"><b>${it.n}</b></div>`;
        s.appendChild(c);
    }
}

function triggerMom() {
    alert("媽媽出現了！把你的裝備拿去洗了！");
    const keys = Object.keys(state.equips).filter(k => state.equips[k]);
    if(keys.length > 0) {
        const k = keys[Math.floor(Math.random()*keys.length)];
        state.inv.push(state.equips[k]);
        state.equips[k] = null;
    }
    update();
}

function openInv() {
    document.getElementById('inv-modal').style.display='block';
    const g = document.getElementById('inv-grid'); g.innerHTML = "";
    state.inv.forEach((it, i) => {
        let d = document.createElement('div');
        d.style.background="#222"; d.style.padding="10px"; d.style.textAlign="center"; d.style.borderRadius="10px";
        d.innerHTML = `${it.i}<br><small>${it.n}</small><br><button onclick="useItem(${i})">使用</button>`;
        g.appendChild(d);
    });
}

function useItem(i) {
    const it = state.inv[i];
    if(it.type === 'food') state.nrg = Math.min(60, state.nrg + it.v);
    else {
        let old = state.equips[it.t];
        if(old) state.inv.push(old);
        state.equips[it.t] = it;
    }
    state.inv.splice(i, 1);
    update(); closeModal('inv-modal');
}

function openStore() {
    document.getElementById('store-modal').style.display='block';
    const g = document.getElementById('store-grid'); g.innerHTML = "";
    for(let i=0; i<4; i++) {
        let it = getRandomEquip();
        let d = document.createElement('div');
        d.style.background="#222"; d.style.padding="10px"; d.style.textAlign="center"; d.style.borderRadius="10px";
        d.innerHTML = `${it.i}<br><small>${it.n}</small><br><button onclick="buy(50, ${i})">💰50</button>`;
        g.appendChild(d);
    }
}

function buy(p, i) {
    if(state.gold >= p) { state.gold -= p; state.inv.push(getRandomEquip()); update(); alert("購買成功！"); }
    else alert("金幣不足！");
}

function triggerChoco(m) { 
    document.getElementById('choco-screen').style.display='flex';
    document.getElementById('choco-msg').innerText = m + " 巧克力帶著加薪便當來救你了！";
    state.nrg = 60;
}
function closeChoco() { document.getElementById('choco-screen').style.display='none'; update(); }
function closeModal(id) { document.getElementById(id).style.display='none'; }
function pet() { alert("汪！(阿毛很開心地搖尾巴)"); }

window.onload = update;
</script>
</body>
</html>
