<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿毛之塔</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --panel: rgba(25, 25, 45, 0.98);
            --accent: #ff7675; /* 莫蘭迪粉 */
            --gold: #f1c40f;
            --text: #ecf0f1;
            --font-main: 22px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg); color: var(--text);
            font-family: -apple-system, "Microsoft JhengHei", sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden; user-select: none;
        }

        /* 頂部資訊 */
        .header {
            display: flex; justify-content: space-around; align-items: center;
            height: 65px; background: #0f0f1b; border-bottom: 2px solid var(--accent);
            font-size: 20px; font-weight: bold; z-index: 10;
        }

        /* 冒險舞台 */
        .stage {
            flex: 1; position: relative; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: linear-gradient(to bottom, #1a1a2e, #16213e); overflow: hidden;
        }

        .lvl-watermark {
            position: absolute; font-size: 140px; color: rgba(255,255,255,0.03);
            font-weight: 900; top: 15%; z-index: 1; font-family: serif; font-style: italic;
        }

        #amao-sprite {
            font-size: 110px; z-index: 2; transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
        }

        #current-title {
            color: var(--gold); font-size: 24px; font-weight: bold;
            margin-top: 15px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); z-index: 2;
        }

        /* 訊息日誌 */
        #log-area {
            width: 100%; height: 160px; background: rgba(0,0,0,0.5);
            padding: 15px; overflow-y: auto; font-size: 20px; line-height: 1.6;
            border-top: 2px solid rgba(255,255,255,0.1);
        }

        .log-entry { margin-bottom: 8px; border-left: 3px solid var(--accent); padding-left: 10px; }

        /* 控制面板 */
        .controls {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 12px; padding: 15px; background: #0f0f1b; border-top: 1px solid #333;
        }

        .btn {
            border-radius: 18px; border: none; font-size: 20px; font-weight: bold;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.1s;
        }
        .btn:active { transform: scale(0.95); }

        .btn-main { 
            background: var(--gold); color: #000; grid-column: span 3; 
            font-size: 28px; height: 85px; margin-bottom: 5px; box-shadow: 0 5px 0 #b8960c;
        }
        .btn-main:active { box-shadow: 0 2px 0 #b8960c; transform: translateY(3px); }
        .btn-sub { background: #2d3436; color: #fff; height: 75px; border: 1px solid #444; }

        /* 全螢幕彈窗 */
        .drawer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--panel); z-index: 100; transform: translateY(100%);
            transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); display: flex; flex-direction: column;
        }
        .drawer.active { transform: translateY(0); }
        .drawer-header { 
            padding: 25px; border-bottom: 1px solid #444; font-size: 26px; font-weight: bold;
            display: flex; justify-content: space-between; align-items: center; background: #000;
        }
        .drawer-content { flex: 1; overflow-y: auto; padding: 25px; font-size: 22px; }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            50% { transform: translate(-3px, -1px) rotate(1deg); }
            100% { transform: translate(1px, 2px) rotate(-1deg); }
        }
    </style>
</head>
<body>

    <div class="header">
        <span>🏰 <span id="ui-lvl">1</span>/9999</span>
        <span>⚡ <span id="ui-nrg">60</span>/60</span>
        <span>💰 <span id="ui-gold">100</span></span>
    </div>

    <div class="stage">
        <div class="lvl-watermark" id="bg-lvl">0001</div>
        <div id="amao-sprite">🐶</div>
        <div id="current-title">初出的冒險犬</div>
        <div id="weather-effect" style="margin-top:10px; font-size: 18px; color: #888;">✨ 環境：和平幻夢</div>
    </div>

    <div id="log-area">
        <div class="log-entry" style="color:var(--accent)">> 歡迎來到「阿毛之塔」。</div>
    </div>

    <div class="controls">
        <button class="btn btn-main" onclick="AmaoApp.rollDice()">🎲 投擲命運</button>
        <button class="btn btn-sub" onclick="UI.openDrawer('bag')">🍱 萬寶袋</button>
        <button class="btn btn-sub" onclick="UI.openDrawer('collection')">🏅 榮譽牆</button>
        <button class="btn btn-sub" onclick="UI.openDrawer('cards')">🎴 卡片庫</button>
    </div>

    <div id="main-drawer" class="drawer">
        <div class="drawer-header">
            <span id="drawer-title">萬寶袋</span>
            <span onclick="UI.closeDrawer()" style="cursor:pointer; font-size: 30px;">✕</span>
        </div>
        <div id="drawer-content" class="drawer-content"></div>
    </div>

    <script>
    // 遊戲核心數據庫
    const state = {
        lvl: 1, nrg: 60, gold: 100, mood: 100,
        title: "初出的冒險犬",
        inv: [], cards: [], unlockedTitles: ["初出的冒險犬"],
        stats: { atk: 10, def: 10, luk: 10, int: 10 },
        isProcessing: false,
        activeWeather: "和平幻夢"
    };

    const AmaoApp = {
        init: function() { this.updateUI(); },
        updateUI: function() {
            document.getElementById('ui-lvl').innerText = state.lvl;
            document.getElementById('ui-nrg').innerText = state.nrg;
            document.getElementById('ui-gold').innerText = state.gold;
            document.getElementById('current-title').innerText = state.title;
            document.getElementById('bg-lvl').innerText = state.lvl.toString().padStart(4, '0');
        },
        addLog: function(msg, color = "#fff") {
            const area = document.getElementById('log-area');
            const div = document.createElement('div');
            div.className = "log-entry"; div.style.color = color;
            div.innerHTML = `> ${msg}`;
            area.prepend(div);
            if (area.childNodes.length > 25) area.removeChild(area.lastChild);
        }
    };

    const UI = {
        openDrawer: function(type) {
            const d = document.getElementById('main-drawer');
            d.classList.add('active');
            this.renderDrawer(type);
        },
        closeDrawer: function() {
            document.getElementById('main-drawer').classList.remove('active');
        },
        renderDrawer: function(type) {
            const t = document.getElementById('drawer-title');
            const c = document.getElementById('drawer-content');
            // 後續區塊將在此注入動態列表內容
            if(type === 'bag') t.innerText = "🍱 萬寶袋";
            if(type === 'collection') t.innerText = "🏅 榮譽牆";
            if(type === 'cards') t.innerText = "🎴 卡片庫";
            c.innerHTML = "尚未發現任何驚喜...";
        }
    };
    </script>
    <script>
/**
 * 【阿毛之塔：數據生成引擎 V2】
 * 修正詞庫：移除不相關的風格術語，專注於幻夢美食與探索稱號。
 */

const Generator = {
    // 1. 美食詞庫 (修正：專注於口感與夢幻感)
    foodMaterials: {
        adj: ["香煎", "幻夢", "焦糖化", "軟綿綿", "小天使特製", "酥脆", "冰鎮", "香濃", "黃金", "秘製"],
        main: ["鮪魚", "豆腐", "嫩雞", "松露", "和牛", "舒芙蕾", "鬆餅", "布丁", "章魚燒", "可麗露"],
        style: ["堡", "塔", "卷", "拼盤", "燉飯", "濃湯", "定食", "派", "聖代", "特調"]
    },

    // 2. 稱號詞庫 (修正：專注於爬塔身份與 NPC 互動)
    titleMaterials: {
        prefix: ["傳說級", "疾風般的", "夢境守護", "被滷滷米達嫌棄的", "南瓜認證的", "優雅的", "孤獨的", "閃閃發光", "高塔霸主", "幻夢"],
        identity: ["勇者", "收藏家", "流浪犬", "觀察員", "大魔王", "探險家", "執行長", "漫步者", "追隨者", "藝術家"]
    },

    // 3. 家具詞庫 (保留質感描述)
    furnitureMaterials: {
        color: ["質感灰", "簡約白", "午夜藍", "象牙白", "胡桃木色", "大理石紋"],
        item: ["單人沙發", "落地燈", "展示櫃", "懶人骨頭", "旋轉書架", "掛畫", "地毯", "點心桌", "咖啡機", "黑膠唱機"]
    },

    // 獲取隨機美食 (2000+ 組合)
    getFood: function() {
        const f = this.foodMaterials;
        const name = this.rnd(f.adj) + this.rnd(f.main) + this.rnd(f.style);
        return { name: name, type: "美食", energy: Math.floor(Math.random() * 20) + 10 };
    },

    // 獲取隨機稱號 (300+ 組合)
    getTitle: function() {
        const t = this.titleMaterials;
        const name = "【" + this.rnd(t.prefix) + this.rnd(t.identity) + "】";
        return name;
    },

    // 獲取隨機家具 (1000+ 組合)
    getFurniture: function() {
        const fur = this.furnitureMaterials;
        const name = this.rnd(fur.color) + this.rnd(fur.item);
        return { name: name, type: "家具", value: Math.floor(Math.random() * 100) + 50 };
    },

    rnd: function(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
};

// 重寫 AmaoApp.rollDice 確保邏輯與修正後的 Generator 對接
AmaoApp.rollDice = function() {
    if (state.isProcessing || state.nrg <= 0) {
        if(state.nrg <= 0) this.addLog("⚠️ 阿毛餓得走不動了...快找東西吃！", "var(--accent)");
        return;
    }
    
    state.isProcessing = true;
    const sprite = document.getElementById('amao-sprite');
    sprite.style.animation = "shake 0.3s infinite";
    
    setTimeout(() => {
        const steps = Math.floor(Math.random() * 6) + 1;
        sprite.style.animation = "none";
        
        state.lvl += steps;
        state.nrg -= 1;
        this.addLog(`🎲 投出 ${steps} 點！目前：${state.lvl} F`);

        const roll = Math.random();
        if (roll < 0.15) { 
            const item = Generator.getFood();
            state.inv.push(item);
            this.addLog(`🍱 發現美食：${item.name}！能量 +${item.energy}`, "var(--gold)");
            state.nrg = Math.min(60, state.nrg + item.energy);
        } else if (roll < 0.22) { // 提高稱號獲得率以達成 300 種收集
            const newTitle = Generator.getTitle();
            if (!state.unlockedTitles.includes(newTitle)) {
                state.unlockedTitles.push(newTitle);
                state.title = newTitle;
                this.addLog(`🏅 獲得新頭銜：${newTitle}`, "#55efc4");
            }
        } else if (roll < 0.35) { 
            const fur = Generator.getFurniture();
            state.inv.push(fur);
            this.addLog(`🏠 獲得家具：${fur.name}`, "#81ecec");
        }

        this.updateUI();
        state.isProcessing = false;
    }, 500);
};
</script>

// 重新實作 ShopSystem.meet 以支持 30 句對話
ShopSystem.meet = function(name) {
    this.activeNpc = this.npcs[name];
    const npc = this.activeNpc;
    const t = document.getElementById('drawer-title');
    const c = document.getElementById('drawer-content');
    
    t.innerText = `${npc.icon} ${name}`;
    const randomLine = NPCSystem.getLine(name); // 從 30 句庫中提取
    
    let html = `
        <div style="background:rgba(255,255,255,0.05); padding:20px; border-radius:20px; border-left:6px solid ${npc.color}; margin-bottom:25px; animation: fadeIn 0.5s;">
            <div style="color:${npc.color}; font-weight:bold; margin-bottom:10px; font-size:24px;">${name}：</div>
            <div style="color:#eee; font-style:italic; line-height:1.6;">「${randomLine}」</div>
        </div>
        <div style="font-size:18px; color:#aaa; margin-bottom:15px;">— 精選商品 —</div>
        <div id="shop-items" style="display:grid; gap:12px;"></div>
    `;
    
    c.innerHTML = html;
    this.generateItems(npc.type);
    UI.openDrawer('shop');
};

<script>
/**
 * 【阿毛之塔：卡片系統與圖鑑】
 * 包含 50 張卡片的定義、抽取邏輯與展示介面。
 */

const CardSystem = {
    // 1. 卡片定義 (範例：實務上會透過循環生成 50 張)
    library: [
        { id: 1, name: "時空骨頭", desc: "傳送至未來 5 層", effect: () => { state.lvl += 5; } },
        { id: 2, name: "滷滷米達的憤怒", desc: "接下來 3 次移動不消耗能量", effect: () => { state.nrg_lock = 3; } },
        { id: 3, name: "黃金肉球", desc: "立即獲得 500 金幣", effect: () => { state.gold += 500; } },
        { id: 4, name: "小天使的祝福", desc: "心情值全滿，移除所有負面狀態", effect: () => { state.mood = 100; } },
        { id: 5, name: "南瓜的加油聲", desc: "永久提升幸運值 1 點", effect: () => { state.stats.luk += 1; } }
    ],

    // 2. 初始化 50 張卡片數據 (自動填充)
    initLibrary: function() {
        if(this.library.length < 50) {
            for(let i = 6; i <= 50; i++) {
                this.library.push({
                    id: i,
                    name: `幻夢卡 No.${i}`,
                    desc: `這是一張充滿神祕力量的稀有卡片，編號 ${i}。`,
                    effect: () => { state.gold += i; }
                });
            }
        }
    },

    // 3. 獲得卡片
    gainCard: function(cardId = null) {
        const card = cardId ? this.library.find(c => c.id === cardId) : this.library[Math.floor(Math.random() * this.library.length)];
        state.cards.push(card);
        AmaoApp.addLog(`🎴 獲得卡片：【${card.name}】！`, "var(--gold)");
        return card;
    },

    // 4. 渲染卡片庫
    renderGallery: function() {
        const c = document.getElementById('drawer-content');
        if (state.cards.length === 0) {
            c.innerHTML = `<div style="text-align:center; padding-top:50px; color:#666;">
                <div style="font-size:50px;">🎴</div><br>目前還沒有任何卡片。<br>去向滷滷米達購買，或在塔中尋找吧！
            </div>`;
            return;
        }

        let html = `<div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">`;
        state.cards.forEach((card, index) => {
            html += `
                <div onclick="CardSystem.useCard(${index})" style="
                    background:linear-gradient(135deg, #2c3e50, #000);
                    border: 2px solid var(--gold); border-radius:15px;
                    padding:15px; min-height:120px; position:relative; overflow:hidden;">

                    <div style="font-weight:bold; margin:5px 0;">${card.name}</div>
                    <div style="font-size:16px; color:#ccc;">${card.desc}</div>
                    <div style="font-size:12px; color:var(--accent); margin-top:10px;">(點擊使用)</div>
                </div>
            `;
        });
        html += `</div>`;
        c.innerHTML = html;
    },

    // 5. 使用卡片
    useCard: function(index) {
        const card = state.cards[index];
        if (confirm(`確定要使用【${card.name}】嗎？`)) {
            card.effect();
            state.cards.splice(index, 1); // 使用後移除
            AmaoApp.addLog(`✨ 使用了卡片：${card.name}！`, "var(--gold)");
            AmaoApp.updateUI();
            UI.closeDrawer();
        }
    }
};

<script>

<script>
/**
 * 【阿毛之塔：遭遇系統與小天使】
 * 實作 50 種敵人的生成、輕量戰鬥判定，以及體力歸零時的救命邏輯。
 */

const EncounterSystem = {
    // 1. 敵人數據庫 (透過形容詞組合達成 50+ 種變化)
    enemyData: {
        adjs: ["軟爛的", "飢餓的", "不想加班的", "愛吐槽的", "發光的", "巨大的", "迷路的"],
        types: ["史萊姆", "影子", "時鐘怪", "鍵盤俠", "小惡魔", "灰塵精靈", "瞌睡蟲"]
    },

    // 2. 隨機遇到敵人
    spawnEnemy: function() {
        const name = Generator.rnd(this.enemyData.adjs) + Generator.rnd(this.enemyData.types);
        AmaoApp.addLog(`👾 警告！遇到了 [ ${name} ]！`, "var(--accent)");
        
        // 戰鬥判定：簡單的機率與數值對比
        const winChance = 0.7 + (state.stats.luk * 0.01);
        if (Math.random() < winChance) {
            const reward = Math.floor(Math.random() * 50) + 10;
            state.gold += reward;
            AmaoApp.addLog(`⚔️ 阿毛揮動肉球，輕鬆取勝！獲得了 💰 ${reward}`, "var(--gold)");
        } else {
            const loss = Math.floor(Math.random() * 15) + 5;
            state.nrg -= loss;
            AmaoApp.addLog(`💢 哎呀！阿毛被絆了一下，體力損失 -${loss}...`, "var(--accent)");
            this.checkAngel(); // 檢查是否需要救命
        }
        AmaoApp.updateUI();
    },

    // 3. 小天使救命機制 (巧克力現身)
    checkAngel: function() {
        if (state.nrg <= 0) {
            state.nrg = 0;
            AmaoApp.addLog("💔 阿毛支撐不住，倒在樓梯間了...", "#ff7675");
            
            // 延遲演出小天使出現
            setTimeout(() => {
                const heal = 30;
                state.nrg = heal;
                AmaoApp.addLog("✨ 叮！小天使巧克力現身了！「阿毛，振作起來！」", "var(--gold)");
                AmaoApp.addLog(`🍫 巧克力餵阿毛吃了一口，體力恢復至 ${heal}！`, "#55efc4");
                
                // 視覺特效：讓阿毛閃爍
                const sprite = document.getElementById('amao-sprite');
                sprite.style.filter = "drop-shadow(0 0 30px #f1c40f)";
                setTimeout(() => { sprite.style.filter = "none"; }, 2000);
                
                AmaoApp.updateUI();
            }, 1000);
        }
    }
};

// 整合進入 AmaoApp.rollDice 的最終完整邏輯
AmaoApp.rollDice = function() {
    if (state.isProcessing || state.nrg <= 0) {
        if (state.nrg <= 0) EncounterSystem.checkAngel();
        return;
    }
    
    state.isProcessing = true;
    const sprite = document.getElementById('amao-sprite');
    sprite.style.animation = "shake 0.3s infinite";
    
    setTimeout(() => {
        const steps = Math.floor(Math.random() * 6) + 1;
        sprite.style.animation = "none";
        
        state.lvl += steps;
        state.nrg -= 1; // 基本移動消耗
        this.addLog(`🎲 投出 ${steps} 點！目前：${state.lvl} F`);

        const eventRoll = Math.random();
        
        // 1. 判定商人 (10%)
        if (eventRoll < 0.1) {
            const names = Object.keys(ShopSystem.npcs);
            ShopSystem.meet(names[Math.floor(Math.random() * names.length)]);
        } 
        // 2. 判定敵人 (15%)
        else if (eventRoll < 0.25) {
            EncounterSystem.spawnEnemy();
        }
        // 3. 判定收集品 (美食/家具/稱號) (25%)
        else if (eventRoll < 0.5) {
            const itemRoll = Math.random();
            if (itemRoll < 0.4) {
                const item = Generator.getFood();
                state.inv.push(item);
                this.addLog(`🍱 發現美食：${item.name}！`, "var(--gold)");
            } else if (itemRoll < 0.7) {
                const fur = Generator.getFurniture();
                state.inv.push(fur);
                this.addLog(`🏠 獲得家具：${fur.name}`, "#81ecec");
            } else {
                const newTitle = Generator.getTitle();
                if (!state.unlockedTitles.includes(newTitle)) {
                    state.unlockedTitles.push(newTitle);
                    state.title = newTitle;
                    this.addLog(`🏅 榮獲稱號：${newTitle}`, "#55efc4");
                }
            }
        }
        
        this.updateUI();
        state.isProcessing = false;
    }, 500);
};
</script>

<script>
/**
 * 【阿毛之塔：卡片核心功能庫】
 * 實作 50 張卡片的具體執行邏輯。
 */

const CardLogic = {
    // 定義卡片效果庫
    effects: {
        // 1. 傳送類 (1-12)
        teleport: (power) => {
            state.lvl += power;
            return `阿毛感受到一陣空間扭曲，瞬間向上跳躍了 ${power} 層！`;
        },
        // 2. 豐饒類 (13-25)
        wealth: (amount) => {
            state.gold += amount;
            return `天降金幣雨！獲得了 💰 ${amount} 金幣。`;
        },
        // 3. 治癒與體力類 (26-38)
        heal: (percent) => {
            const recovery = Math.floor(60 * (percent / 100));
            state.nrg = Math.min(60, state.nrg + recovery);
            return `吃下了卡片變出的點心，體力恢復了 ${recovery} 點。`;
        },
        // 4. 奇蹟與特殊類 (39-50)
        miracle: (type) => {
            if(type === 'luck') {
                state.stats.luk += 5;
                return `幸運女神親吻了肉球，幸運值永久提升！`;
            }
            if(type === 'weather') {
                WeatherSystem.changeWeather();
                return `卡片強行扭轉了高塔的天候！`;
            }
            return "發生了神祕的奇蹟...";
        }
    },

    // 重新封裝 50 張卡片數據
    buildDatabase: function() {
        const db = [];
        for (let i = 1; i <= 50; i++) {
            let card = { id: i, name: "", desc: "", run: null };
            
            if (i <= 12) {
                card.name = `閃光之靴 No.${i}`;
                card.desc = `跳過 ${i} 層樓。`;
                card.run = () => this.effects.teleport(i);
            } else if (i <= 25) {
                const goldAmt = i * 100;
                card.name = `招財肉球 No.${i}`;
                card.desc = `立即獲得 ${goldAmt} 金幣。`;
                card.run = () => this.effects.wealth(goldAmt);
            } else if (i <= 38) {
                card.name = `幻夢果凍 No.${i}`;
                card.desc = `恢復大量體力。`;
                card.run = () => this.effects.heal(i * 2);
            } else {
                card.name = `混沌卡片 No.${i}`;
                card.desc = `永久提升幸運值或改變天氣。`;
                card.run = () => this.effects.miracle(i % 2 === 0 ? 'luck' : 'weather');
            }
            db.push(card);
        }
        return db;
    }
};

// 複寫 CardSystem.useCard 以支援腳本執行

        const item = state.inv[idx];
        if (item.type === "美食") {
            state.nrg = Math.min(60, state.nrg + (item.energy || 10));
            state.inv.splice(idx, 1);
            AmaoApp.addLog(`😋 阿毛優雅地吃掉了 [ ${name} ]！`, "var(--gold)");

<script>
/**
 * 【阿毛之塔：存檔與數據引擎】

 */

const SaveSystem = {
    saveKey: "amao_tower_v2_save",

    // 1. 執行存檔
    save: function() {
        const data = JSON.stringify(state);
        localStorage.setItem(this.saveKey, data);
        // 靜默存檔，不干擾玩家，但在日誌區閃爍提示
        console.log("遊戲已自動存檔...");
    },

    // 2. 讀取存檔
    load: function() {
        const savedData = localStorage.getItem(this.saveKey);
        if (savedData) {
            try {
                const parsed = JSON.parse(savedData);
                // 深度合併數據，確保新版本增加的欄位不會消失
                Object.assign(state, parsed);
                AmaoApp.addLog("💾 歡迎回來！已載入之前的冒險進度。", "#55efc4");
                AmaoApp.updateUI();
            } catch (e) {
                console.error("讀取存檔失敗", e);
            }
        }
    },

    // 3. 清除存檔 (謹慎使用)
    reset: function() {
        if (confirm("確定要重置所有冒險進度嗎？這將無法復原！")) {
            localStorage.removeItem(this.saveKey);
            location.reload();
        }
    }
};

const StatSystem = {
    // 增加統計數據的追蹤
    track: function(key, val = 1) {
        if (!state.stats.history) state.stats.history = { 
            totalSteps: 0, totalEaten: 0, angelRescue: 0, totalSpent: 0 
        };
        state.stats.history[key] += val;
    },

    // 渲染統計介面 (放入榮譽牆的另一個標籤)
    renderStats: function() {
        const h = state.stats.history || { totalSteps: 0, totalEaten: 0, angelRescue: 0, totalSpent: 0 };
        return `
            <div style="background:rgba(255,255,255,0.05); padding:20px; border-radius:15px; margin-top:20px; line-height:2;">
                <div style="font-weight:bold; color:var(--gold); border-bottom:1px solid #444; margin-bottom:10px;">📊 冒險生涯統計</div>

                <div style="display:flex; justify-content:space-between;"><span>小天使救援：</span><span>${h.angelRescue} 次</span></div>

        `;
    }
};

// 注入存檔邏輯到各個動作
const originalRollForSave = AmaoApp.rollDice;
AmaoApp.rollDice = function() {

    StatSystem.track('totalSteps');

};

const originalBuyForSave = ShopSystem.buy;
ShopSystem.buy = function(name, price) {

const FXSystem = {
    // 1. 層數跳躍視覺演出
    playJumpFX: function(steps) {

        // A. 阿毛噴射特效

            bgLvl.style.opacity = "0.03";
        }, 400);
    },

    // 2. 建立隨機流星線條
    createStreak: function(parent) {
        const streak = document.createElement('div');
        streak.style.cssText = `
            position: absolute;
            width: 2px; height: 100px;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.3));
            left: ${Math.random() * 100}%;
            top: -100px;
            z-index: 0;
            pointer-events: none;
            animation: streakMove 0.4s linear;
        `;
        parent.appendChild(streak);
        setTimeout(() => streak.remove(), 400);
    },

    // 3. 畫面強烈震動 (用於戰鬥或特殊事件)
    shakeScreen: function() {
        const body = document.body;
        body.style.animation = "screenShake 0.2s 2";
        setTimeout(() => body.style.animation = "none", 400);
    }
};

// 複寫 AmaoApp.rollDice 接入特效
const coreRoll = AmaoApp.rollDice;
AmaoApp.rollDice = function() {
    if (state.isProcessing || state.nrg <= 0) return;
    
    // 執行原邏輯前，抓取步數做特效
    const originalTimeout = window.setTimeout;
    window.setTimeout = (fn, delay) => {
        if (delay === 500) { // 這是投骰子的延遲時間
            FXSystem.playJumpFX();
        }
        return originalTimeout(fn, delay);
    };
    
    coreRoll.apply(this);
};
</script>

            setTimeout(() => {
                if (typeof GameEngine !== 'undefined' && GameEngine.state && GameEngine.state.busy) {
                    console.warn("⚠️ [偵測] 按鈕響應遲緩，正在嘗試強制重置狀態...");
                    GameEngine.state.busy = false;
                }
            }, 1000);
        }
    }, true);

    // 3. 強化數據安全 (防止 NaN 或 undefined 導致的崩潰)
    if (typeof GameEngine !== 'undefined') {
        const originalRoll = GameEngine.roll;
        GameEngine.roll = function() {
            // 每次擲骰前，確保狀態是乾淨的
            if (isNaN(this.state.hp)) this.state.hp = 100;
            if (isNaN(this.state.floor)) this.state.floor = 1;
            
            this.state.busy = false; // 強制在執行前先確保沒有被鎖定
            
            try {
                originalRoll.apply(this);
            } catch (err) {
                console.error("❌ 擲骰邏輯出錯，嘗試自動修復:", err);
                // 萬一妳的原始碼內容出錯，這裡會接住它，並強制推進層數
                this.state.floor += Math.floor(Math.random() * 6) + 1;
                this.state.hp -= 2;
                this.state.busy = false;
                this.updateUI();
                if (typeof this.addLog === 'function') {
                    this.addLog("🛠 [維修] 偵測到內容加載異常，已自動修正並推進。", "danger");
                }
            }
        };
    }

    // 4. 新增一個「緊急修復」按鈕在畫面角落（備用）
    const repairBtn = document.createElement('div');
    repairBtn.innerHTML = "🛠";
    repairBtn.style.cssText = "position:fixed; bottom:100px; right:10px; background:rgba(149,117,205,0.5); color:white; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:12px; z-index:9999;";
    repairBtn.onclick = window.ForceUnlockAmao;
    document.body.appendChild(repairBtn);

})();
</script>
</body>
</html>
