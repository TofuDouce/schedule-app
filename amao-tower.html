<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿毛之塔</title>
    <style>
        /* --- 莫蘭迪深色調系統 --- */
        :root {
            --bg-dark: #1A1A22;        
            --panel-bg: #252533;      
            --morandi-green: #B4C6A6; 
            --morandi-gold: #EAC4D5;  
            --text-light: #E0E0E0;
            --accent-blue: #A3B1C6;
            --dice-yellow: #FFE082;
            --header-height: 80px;
            --footer-height: 160px; 
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0; padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        /* --- 1. 固定頂部 --- */
        #fixed-header {
            height: var(--header-height);
            background: rgba(26, 26, 34, 0.95);
            border-bottom: 1px solid #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 100;
            flex-shrink: 0;
        }

        .status-row {
            display: flex;
            justify-content: space-around;
            padding: 5px 10px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .game-title {
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
            letter-spacing: 3px;
            color: var(--morandi-gold);
            text-shadow: 0 0 10px rgba(234, 196, 213, 0.3);
        }

        /* --- 2. 中間滑動冒險區 --- */
        #main-scroll-area {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding-bottom: 20px;
            scroll-behavior: smooth;
        }

        #stage-view {
            height: 240px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            flex-shrink: 0;
            background: radial-gradient(circle, rgba(163,177,198,0.1) 0%, rgba(26,26,34,0) 70%);
        }

        .floor-indicator {
            position: absolute;
            font-size: 5.5em;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03);
            z-index: 0;
            font-style: italic;
        }

        .amao-main-sprite { 
            font-size: 85px; 
            z-index: 1; 
            margin-bottom: 12px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .amao-title-label {
            background: var(--morandi-gold);
            color: #2D2D3A;
            padding: 4px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
            z-index: 1;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }

        #game-log-list {
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .log-entry {
            background: var(--panel-bg);
            padding: 14px;
            border-radius: 12px;
            border-left: 5px solid var(--accent-blue);
            display: flex;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .log-icon { font-size: 1.2em; }
        .log-content { font-size: 1em; line-height: 1.5; color: var(--text-light); }
        .highlight-text { color: var(--dice-yellow); font-weight: bold; }

        /* --- 3. 固定底部控制列 --- */
        #fixed-footer {
            height: var(--footer-height);
            background: rgba(26, 26, 34, 0.98);
            border-top: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 12px 18px;
            z-index: 100;
            flex-shrink: 0;
        }

        .dice-button {
            background-color: var(--dice-yellow);
            color: #333;
            border: none;
            border-radius: 15px;
            width: 100%;
            height: 65px;
            font-size: 1.2em;
            font-weight: 800;
            box-shadow: 0 5px 0 #D4A017;
            margin-bottom: 18px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            transition: all 0.1s;
        }

        .dice-button:active { 
            transform: translateY(3px); 
            box-shadow: 0 2px 0 #D4A017; 
        }

        .bottom-nav {
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }

        .nav-item {
            flex: 1;
            background: #333344;
            height: 55px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.6em;
            cursor: pointer;
        }
        .nav-item:active { background: var(--morandi-green); transform: scale(0.95); }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            z-index: 200;
            display: none;
            flex-direction: column;
        }

        .overlay-header {
            height: 70px;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #444;
        }

        .notebook-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .item-slot {
            aspect-ratio: 1;
            background: #252533;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.85em;
            color: #555;
            border: 1px solid #333;
        }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <div id="fixed-header">
        <div class="status-row">
            <span>⚡ 體力: 無限</span>
            <span>💰 金幣: <span id="gold-val">1000</span></span>
        </div>
        <div class="game-title">阿毛之塔</div>
    </div>

    <div id="main-scroll-area">
        <div id="stage-view">
            <div class="floor-indicator" id="bg-floor">0001</div>
            <div class="amao-main-sprite" id="amao-sprite">🐶</div>
            <div class="amao-title-label" id="current-title">【新手爬塔狗】</div>
        </div>

        <div id="game-log-list">
            <div class="log-entry">
                <div class="log-icon">🔮</div>
                <div class="log-content">阿毛感受到塔頂傳來一股強大的魔力... 傳說抵達 9,999 樓就能實現心中的那個願望。</div>
            </div>
        </div>
    </div>

    <div id="fixed-footer">
        <button class="dice-button" onclick="handleRoll()">
            <span>🎲</span> 投擲命運之骰
        </button>
        
        <div class="bottom-nav">
            <div class="nav-item" onclick="openMenu('inventory')">🍖</div>
            <div class="nav-item" onclick="openMenu('title')">🏅</div>
            <div class="nav-item" onclick="openMenu('bag')">🎒</div>
            <div class="nav-item" onclick="openMenu('shop')">🛒</div>
        </div>
    </div>

    <div id="menu-overlay" class="overlay">
        <div class="overlay-header">
            <h2 id="menu-title">筆記本</h2>
            <div onclick="closeMenu()" style="font-size: 1.8em; padding: 10px; cursor: pointer;">✕</div>
        </div>
        <div id="menu-content" class="notebook-content">
        </div>
    </div>

<script>
    let floor = 1;

    function handleRoll() {
        const amao = document.getElementById('amao-sprite');
        amao.style.transform = "scale(1.2) translateY(-20px)";
        
        setTimeout(() => {
            const step = Math.floor(Math.random() * 6) + 1;
            floor += step;
            amao.style.transform = "scale(1) translateY(0)";
            document.getElementById('bg-floor').innerText = floor.toString().padStart(4, '0');
            
            const logList = document.getElementById('game-log-list');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `
                <div class="log-icon">✨</div>
                <div class="log-content">阿毛使出了中二的衝刺步，前進了 <span class="highlight-text">${step}</span> 層。目前位於 <span class="highlight-text">${floor}F</span>。</div>
            `;
            logList.insertBefore(entry, logList.firstChild);
        }, 150);
    }

    function openMenu(type) {
        const overlay = document.getElementById('menu-overlay');
        const content = document.getElementById('menu-content');
        const title = document.getElementById('menu-title');
        content.innerHTML = ''; 
        overlay.style.display = 'flex';

        if(type === 'food') {
            title.innerText = '🍱 美食收藏 (0/300)';
            for(let i=1; i<=300; i++) {
                let slot = document.createElement('div');
                slot.className = 'item-slot';
                slot.innerText = '???';
                content.appendChild(slot);
            }
        } else if(type === 'title') {
            title.innerText = '🏅 稱號成就 (0/150)';
            for(let i=1; i<=150; i++) {
                let slot = document.createElement('div');
                slot.className = 'item-slot';
                slot.innerText = '鎖定';
                content.appendChild(slot);
            }
        } else {
            title.innerText = '系統訊息';
            content.innerHTML = '<p style="grid-column: span 4; text-align:center; padding: 20px; color: #777;">前方似乎有股神秘的力量擋住了背包...</p>';
        }
    }

    function closeMenu() {
        document.getElementById('menu-overlay').style.display = 'none';
    }
</script>
<script>
/**
 * 阿毛之塔 - 核心引擎 2.4
 * 特色：動態格數相容，支援隨時擴充圖鑑上限
 */

const GameDB = {
    // --- 只要改下面這個數字，筆記本就會自動變大 ---
    MAX_FOOD: 300, 
    
    foodPrefix: ["香氣四溢的", "極致濃郁的", "灑滿蔥花的", "黃金比例的", "來自地獄的", "媽媽特製的", "滷滷米達嫌棄過的", "南瓜老闆激推的", "充滿魔法氣息的", "散發銀紫光芒的", "路邊撿到的", "奶奶特傳的", "夢幻莫蘭迪色的", "超音速生成的", "罪惡感爆表的", "蒜泥狠的", "讓人流口水的", "焦糖琥珀色的", "苦中帶甜的", "冰鎮極品的"],
    foodMiddle: ["爆發性", "口感滑順", "現炸酥脆", "慢火細熬", "七彩噴發", "Q彈有勁", "香煎熟成", "外酥內嫩", "鮮甜多汁", "微苦甘醇", "冰封後的", "剛出爐的", "文火慢燉", "大火快炒", "魔法加持", "中二魂注入", "極致壓縮", "層層堆疊", "五味雜陳", "鮮味濃縮"],
    foodSuffix: ["豬排大餐", "伯爵紅茶", "藍莓果茶", "炒飯", "鹹稀飯", "現包水餃", "能量飲料", "大骨棒", "手作肉餅", "厚片土司", "義大利麵", "濃厚拉麵", "脆皮泡芙", "舒芙蕾", "雞腿堡", "布丁", "三明治", "夏威夷披薩", "關東煮", "絲襪奶茶"],
    
    getEmoji(name) {
        if (name.includes("茶") || name.includes("奶")) return "🍵";
        if (name.includes("飯") || name.includes("粥")) return "🍚";
        if (name.includes("麵")) return "🍜";
        if (name.includes("排") || name.includes("肉") || name.includes("骨")) return "🍖";
        if (name.includes("水餃") || name.includes("煮")) return "🥟";
        if (name.includes("甜") || name.includes("堡") || name.includes("餅") || name.includes("芙")) return "🍰";
        if (name.includes("飲")) return "🥤";
        return "🍱";
    }
};

const AmaoGame = {
    foodNotebook: [],
    titleNotebook: [],
    floor: 1,
    stats: { hp: 100, gold: 1000, title: '新手爬塔狗' },

    init() {
        this.generateFood();
        this.generateTitles();
        this.load();
        this.refreshUI();
        
        // 修正 UI 上的顯示
        const btn = document.querySelector('.dice-button');
        if(btn) btn.innerHTML = '<span>🎲</span> 投擲命運之骰';
    },

    generateFood() {
        const special = [
            { name: "奶奶煮的炒飯", desc: "阿嬤怕妳餓的魔力。HP+5", consumed: false, emoji: "🍚" },
            { name: "爺爺的鹹稀飯", desc: "充滿家的味道。MP+5", consumed: false, emoji: "🥣" },
            { name: "每個禮拜三的水餃", desc: "週三限定美食。恢復HP", consumed: false, emoji: "🥟" },
            { name: "鮮茶道伯爵紅茶", desc: "茶香濃郁，精神百倍。", consumed: false, emoji: "🍵" },
            { name: "鮮茶道藍莓果茶", desc: "酸甜滋味，魔法感十足。", consumed: false, emoji: "🍹" }
        ];
        
        this.foodNotebook = [...special];
        
        // 依照 MAX_FOOD 自動填滿剩下的格子
        for(let i = special.length; i < GameDB.MAX_FOOD; i++) {
            let p = GameDB.foodPrefix[Math.floor(Math.random()*20)];
            let m = GameDB.foodMiddle[Math.floor(Math.random()*20)];
            let s = GameDB.foodSuffix[Math.floor(Math.random()*20)];
            let fullName = p + m + s;
            this.foodNotebook.push({ 
                name: fullName, 
                desc: "在塔中意外發現的神祕料理。", 
                consumed: false,
                emoji: GameDB.getEmoji(fullName)
            });
        }
    },

    generateTitles() {
        this.titleNotebook = [];
        for(let i=0; i<150; i++) {
            this.titleNotebook.push({ id: i+1, rank: 'C', name: i===0 ? '新手爬塔狗' : '未知的傳說', desc: '探索以解鎖。', unlocked: i===0 });
        }
    },

    roll() {
        const step = Math.floor(Math.random() * 6) + 1;
        this.floor += step;
        
        let logIcon = "✨";
        let logText = `阿毛前進了 ${step} 層，抵達了 <span class="highlight-text">${this.floor}F</span>。`;
        
        // 取得還沒被吃過的食物清單
        const uncollected = this.foodNotebook.filter(f => !f.consumed);
        
        // 35% 機率獲得新食物
        if(Math.random() > 0.65 && uncollected.length > 0) {
            let luckyFood = uncollected[Math.floor(Math.random() * uncollected.length)];
            luckyFood.consumed = true;
            logIcon = luckyFood.emoji;
            logText += ` 妳在路邊撿到了 <span style="color:var(--morandi-green)">${luckyFood.name}</span>！`;
        } else if (uncollected.length === 0) {
            // 如果全滿了，改送金幣
            this.stats.gold += 50;
            logIcon = "💰";
            logText += ` 既然 300 種美食都吃遍了，那就拿 50 金幣吧！`;
        }

        this.addLog(logIcon, logText);
        this.save();
        this.refreshUI();
    },

    addLog(icon, text) {
        const list = document.getElementById('game-log-list');
        const e = document.createElement('div');
        e.className = 'log-entry';
        e.innerHTML = `<div class="log-icon">${icon}</div><div class="log-content">${text}</div>`;
        list.insertBefore(e, list.firstChild);
    },

    refreshUI() {
        if(document.getElementById('bg-floor')) document.getElementById('bg-floor').innerText = this.floor.toString().padStart(4, '0');
        if(document.getElementById('gold-val')) document.getElementById('gold-val').innerText = this.stats.gold;
    },

    save() {
        localStorage.setItem('AmaoSave', JSON.stringify({
            floor: this.floor, food: this.foodNotebook, titles: this.titleNotebook, stats: this.stats
        }));
    },

    load() {
        const s = localStorage.getItem('AmaoSave');
        if(s) {
            try {
                const d = JSON.parse(s);
                // 檢查存檔格數是否跟目前設定的一樣，不一樣就重置(確保動態調整生效)
                if(d.food && d.food.length === GameDB.MAX_FOOD) {
                    this.floor = d.floor || 1;
                    this.foodNotebook = d.food;
                    this.titleNotebook = d.titles;
                    this.stats = d.stats;
                }
            } catch(e) { console.log("重載數據中..."); }
        }
    }
};

window.handleRoll = () => AmaoGame.roll();
window.closeMenu = () => { document.getElementById('menu-overlay').style.display = 'none'; };
window.openMenu = (type) => {
    const ov = document.getElementById('menu-overlay');
    const ct = document.getElementById('menu-content');
    const tt = document.getElementById('menu-title');
    ct.innerHTML = '';
    ov.style.display = 'flex';

    if(type === 'food') {
        let count = AmaoGame.foodNotebook.filter(f=>f.consumed).length;
        tt.innerText = `🍱 美食圖鑑 (${count}/${GameDB.MAX_FOOD})`;
        AmaoGame.foodNotebook.forEach((f, i) => {
            let s = document.createElement('div');
            s.className = 'item-slot' + (f.consumed ? ' unlocked' : '');
            if(f.consumed) {
                s.style.background = 'var(--panel-bg)';
                s.style.border = '1px solid var(--morandi-green)';
                s.innerHTML = `<div style="font-size:1.5em">${f.emoji}</div><div style="font-size:0.6em;color:var(--text-light)">${f.name.substring(0,2)}</div>`;
                s.onclick = () => alert(`${f.emoji} 【${f.name}】\n${f.desc}`);
            } else {
                s.innerText = i + 1;
            }
            ct.appendChild(s);
        });
    } else if(type === 'title') {
        tt.innerText = '🏅 稱號紀錄 (150)';
        AmaoGame.titleNotebook.forEach(t => {
            let s = document.createElement('div');
            s.className = 'item-slot';
            s.innerText = t.unlocked ? t.name.substring(0, 2) : '???';
            ct.appendChild(s);
        });
    }
};

AmaoGame.init();
</script><script>
/**
 * 阿毛之塔 - 戰鬥引擎 1.0
 * 功能：怪物詞條生成、自動戰鬥邏輯、掉落系統
 */

const MonsterDB = {
    prefix: ["兇猛的", "中二的", "閃閃發光的", "莫蘭迪色的", "來自深淵的", "熬夜加班的", "忘記吃早餐的", "愛生氣的", "看起來很香的", "透明的"],
    names: ["哥布林", "加班小精靈", "香菜惡魔", "低飽和史萊姆", "減肥失敗的幽靈", "怪鄰居", "BUG魔王", "咖啡因怪獸", "壞掉的自動販賣機", "奇怪歐巴桑"],
    
    // 根據樓層計算怪物強度
    getMonster(floor) {
        const p = this.prefix[Math.floor(Math.random() * this.prefix.length)];
        const n = this.names[Math.floor(Math.random() * this.names.length)];
        const level = Math.ceil(floor / 10);
        return {
            name: `${p}${n}`,
            hp: 20 + (level * 10),
            atk: 5 + (level * 2),
            gold: 10 + (level * 5),
            icon: "👾"
        };
    }
};

// 擴展 AmaoGame 的功能
Object.assign(AmaoGame, {
    isFighting: false,

    // 觸發戰鬥事件
    triggerBattle(monster) {
        this.isFighting = true;
        this.addLog("⚔️", `遇到了 <span style="color:#EAC4D5">${monster.name}</span> (HP: ${monster.hp})！`);
        
        // 簡單的自動戰鬥模擬
        const battleInterval = setInterval(() => {
            // 阿毛攻擊
            const damageToMonster = 10 + Math.floor(Math.random() * 5);
            monster.hp -= damageToMonster;
            
            // 怪物攻擊阿毛
            const damageToAmao = monster.atk + Math.floor(Math.random() * 3);
            this.stats.hp -= damageToAmao;
            
            this.addLog("💢", `阿毛造成 ${damageToMonster} 傷害；怪物反擊扣了 ${damageToAmao} HP。`);
            
            // 判斷勝負
            if (monster.hp <= 0) {
                clearInterval(battleInterval);
                this.isFighting = false;
                this.stats.gold += monster.gold;
                this.addLog("🏆", `擊敗了 ${monster.name}！獲得了 <span class="highlight-text">${monster.gold}</span> 金幣。`);
                this.refreshUI();
                this.save();
            } else if (this.stats.hp <= 0) {
                clearInterval(battleInterval);
                this.isFighting = false;
                this.stats.hp = 10; // 保底留 10 點血
                this.addLog("💀", `阿毛被打倒了... 趕快去吃點東西補充體力！`);
                this.refreshUI();
                this.save();
            }
        }, 800);
    },

    // 覆寫原本的 roll 函數，加入戰鬥觸發機率
    rollWithBattle() {
        if (this.isFighting) {
            alert("正在戰鬥中，不能分心投骰子！");
            return;
        }

        const step = Math.floor(Math.random() * 6) + 1;
        this.floor += step;
        
        let logIcon = "🎲";
        let logText = `前進 ${step} 層，目前：<span class="highlight-text">${this.floor}F</span>。`;
        this.addLog(logIcon, logText);

        const eventRoll = Math.random();
        if (eventRoll > 0.7) {

                    if (confirm(`【${t.name}】\n效果：${eff.desc}\n能力：HP ${eff.hp}, ATK ${eff.atk}, 金幣 ${eff.goldRate}x\n\n是否要更換為此頭銜？`)) {

                    }
                } else {
                    alert(`【未解鎖稱號】\n達成條件：${t.condition || '神秘成就'}`);
                }
            };
            ct.appendChild(s);
        });
    } else if (type === 'food') {
        // [原有美食邏輯]
        let count = AmaoGame.foodNotebook.filter(f=>f.consumed).length;
        tt.innerText = `🍱 美食圖鑑 (${count}/300)`;

            let s = document.createElement('div');
            s.className = 'item-slot' + (f.consumed ? ' unlocked' : '');

                s.onclick = () => alert(`${f.emoji} 【${f.name}】\n${f.desc}`);
            } else {
                s.innerText = i + 1;
            }
            ct.appendChild(s);
        });
    }
};

// --- 重寫買東西效果 ---
AmaoGame.buyItem = function(itemId) {
    const item = AmaoWorld.items.find(i => i.id === itemId);
    this.stats.gold -= item.price;
    
    if (item.type === 'stat') {
        // 永久增加數值邏輯

    } else if (item.type === 'floor') {
        this.floor += item.val;
        this.addLog("🚀", `使用了 ${item.name}！傳送到第 ${this.floor} 層！`);
    }
    
    this.save();
    this.refreshUI();
};

            btn.innerText = "🛑 停止自動冒險";

<script>

Object.assign(AmaoGame, {
    // 確保背包存在
    inventory: AmaoGame.inventory || [],
    currentTab: 'food', // 預設顯示食物

    // 獲得物品邏輯 (自動判斷分類)
    receiveItem(itemData) {
        const itemName = itemData.fullName || itemData.name;
        let existingItem = this.inventory.find(i => i.fullName === itemName);
        
        // 判斷類型：若名字含水餃/肉/麵，或原始類型是 food/consumable，歸類為食物
        let finalType = 'item';
        if (itemData.type === 'food' || itemData.type === 'consumable' || 
            /水餃|肉|麵|堡|飯|餅|茶|飲/.test(itemName)) {
            finalType = 'food';
        }

        if (existingItem) {
            existingItem.count++;
        } else {
            this.inventory.push({
                fullName: itemName,
                icon: itemData.icon || '📦',
                category: finalType, 
                desc: itemData.desc || '神祕的物件。',
                count: 1,
                power: itemData.power || 20
            });
        }
        this.addLog("🎁", `獲得了 <span class="highlight-text">${itemName}</span>！`);
        this.save();
        this.refreshUI();
    },

    // 使用物品邏輯
    useItem(itemName) {
        const idx = this.inventory.findIndex(i => i.fullName === itemName);
        if (idx === -1) return;
        const item = this.inventory[idx];

        if (item.category === 'food') {
            const heal = item.power || 20;
            this.stats.hp = Math.min(100, this.stats.hp + heal);
            this.addLog("🍴", `阿毛吃掉了 ${item.fullName}，體力恢復了 ${heal} 點！`);
        } else {
            this.addLog("✨", `使用了 ${item.fullName}：${item.desc}`);
        }

        item.count--;
        if (item.count <= 0) this.inventory.splice(idx, 1);
        this.save();
        this.refreshUI();
        window.openMenu('inventory'); // 保持在背包畫面
    }
});

    } else {
        displayList.forEach(item => {
            let card = document.createElement('div');
            card.className = 'item-slot unlocked';
            card.style.position = 'relative';
            card.innerHTML = `
                <div style="font-size:1.8em">${item.icon}</div>
                <div style="font-size:0.55em; margin-top:5px; text-align:center;">${item.fullName}</div>
                <div style="position:absolute; bottom:2px; right:5px; background:var(--morandi-green); color:white; font-size:0.6em; padding:0 4px; border-radius:5px;">x${item.count}</div>
            `;
            card.onclick = () => {
                if (confirm(`【${item.fullName}】\n${item.desc}\n\n確定要使用嗎？`)) AmaoGame.useItem(item.fullName);
            };
            ct.appendChild(card);
        });
    }
};

console.log("阿毛之塔：分類背包系統啟動，圖鑑功能已優化移除。");
</script>
<script>
/**
 * 阿毛之塔 - 核心擴充 8.0
 * 功能：巧克力小天使救援系統、瀕死保護、隨機祝福
 */

const ChocoAngel = {
    emoji: '👼', // 象徵迷你杜賓與天使翅膀
    name: '巧克力小天使',

    // [1] 巧克力現身動畫
    spawn() {
        const div = document.createElement('div');
        div.className = 'choco-arrival';
        div.innerHTML = `<div class="choco-aura"></div>${this.emoji}`;
        document.body.appendChild(div);

        // 隨機播放祝福音樂 (如果有音效的話) 或純特效
        EffectEngine.startRain('✨', 30);
        EffectEngine.startRain('💖', 20);

        setTimeout(() => {
            div.style.opacity = '0';
            div.style.transition = '2s';
            setTimeout(() => div.remove(), 2000);
        }, 3000);
    },

    // [2] 救援邏輯：當阿毛被圍毆 (HP 降低) 或沮喪時
    triggerSupport(reason) {
        this.spawn();
        let message = "";
        
        switch(reason) {
            case 'HELP': // 戰鬥支援
                AmaoGame.stats.hp = Math.min(100, AmaoGame.stats.hp + 50);
                message = "巧克力小天使揮動翅膀！一道聖光降臨，阿毛感覺傷口全都癒合了！";
                break;
            case 'GIFT': // 給予資源
                const randomGift = ItemEngine.generateItem();
                AmaoGame.receiveItem(randomGift);
                message = "巧克力小天使輕輕放下了一個神祕包袱，裡面裝著給阿毛的禮物！";
                break;
            case 'BLESS': // 隨機祝福
                AmaoGame.addLog("🌈", "巧克力小天使扁了阿毛一拳，阿毛獲得了『幸運加護』！");
                // 暫時性提升金幣獲取率 (邏輯擴充)
                AmaoGame.stats.gold += 500;
                message = "巧克力小天使留下了 500 枚閃亮的金幣！";
                break;
        }

        AmaoGame.addLog("💖", `<span style="color:#D4ADCF; font-weight:bold;">[守護天使] ${message}</span>`);
        AmaoGame.refreshUI();
    }
};

// [3] 整合至遊戲戰鬥與投擲邏輯
const originalBattleWithChoco = AmaoGame.rollWithBattle;
AmaoGame.rollWithBattle = function() {
    // 執行原始邏輯
    originalBattleWithChoco.apply(this);

    const roll = Math.random();

    // 觸發條件 A：體力過低 (低於 20)
    if (this.stats.hp > 0 && this.stats.hp <= 20 && roll > 0.6) {
        ChocoAngel.triggerSupport('HELP');
    }
    // 觸發條件 B：純隨機幸運 (5% 機率)
    else if (roll > 0.95) {
        const subRoll = Math.random();
        if (subRoll > 0.5) {
            ChocoAngel.triggerSupport('GIFT');
        } else {
            ChocoAngel.triggerSupport('BLESS');
        }
    }
};

// [4] 增加一個「巧克力的小秘密」到紙條系統中
const secretNoteV8 = document.querySelector('.secret-note');
if (secretNoteV8) {
    secretNoteV8.innerText += "\n\n（底下還有一行極小的字：聽說如果妳對著塔大喊『CHOCO_LOVE』，那位巧克力色的小天使就會帶著翅膀降臨喔...）";
}

// [5] 註冊對應禮包碼
SecretCodes.codes['CHOCO_LOVE'] = { 
    type: 'custom', 
    msg: '巧克力小天使聽到了妳的呼喚！', 
    icon: '💖',
    action: () => ChocoAngel.triggerSupport('HELP')
};

// 修正禮包碼執行邏輯以支援自定義動作
const originalRedeemV8 = AmaoGame.redeemGift;
AmaoGame.redeemGift = function() {
    const input = document.getElementById('gift-code-input');
    const code = input.value.trim().toUpperCase();
    const gift = SecretCodes.codes[code];

    if (gift && gift.type === 'custom') {
        gift.action();
        input.value = "";
        this.refreshUI();
        this.save();
        alert(gift.msg);
    } else {
        originalRedeemV8.apply(this);
    }
};

console.log("巧克力小天使系統已就位，她正拍動著翅膀守護著阿毛。");
</script>
</body>
