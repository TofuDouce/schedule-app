<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿毛之塔：鮪魚堡的陰謀</title>
    <style>
        :root { --gold: #f1c40f; --pink: #ff99cc; --bg: #0a0a12; --card: #1a1a2e; --s-rank: #ff4500; --equip-glow: #00f2ff; }
        body { margin:0; font-family: sans-serif; background: var(--bg); color: #fff; user-select: none; touch-action: manipulation; }
        
        .header { padding: 25px 0 15px; text-align: center; background: #000; border-bottom: 4px solid var(--gold); }
        .main-title { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin: 0; }
        #full-title { font-size: 16px; color: #fff; background: rgba(255,255,255,0.15); padding: 4px 12px; border-radius: 20px; display: inline-block; margin-top: 10px; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); background: #1a1a1a; padding: 10px; text-align: center; font-size: 14px; border-bottom: 1px solid #333; }
        .stat-val { color: var(--pink); font-weight: bold; font-size: 16px; }

        .info-bar { display: flex; justify-content: space-around; padding: 12px; background: #111; font-size: 16px; font-weight: bold; }

        .adventure-zone { height: 350px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        #amao-sprite { font-size: 80px; transition: 0.3s; cursor: pointer; z-index: 10; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); }
        
        /* 裝備卡片特殊外框 */
        .card { width: 100px; height: 140px; background: var(--card); border: 2px solid #444; border-radius: 12px; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; font-size: 13px; padding: 8px; box-sizing: border-box; }
        .card.is-equip { border: 2px solid var(--equip-glow); box-shadow: 0 0 15px var(--equip-glow); }
        .card.rank-S { border: 3px solid var(--s-rank); box-shadow: 0 0 20px var(--s-rank); }
        .card.reveal { display: flex; animation: pop 0.4s forwards; }

        .nav-menu { position: fixed; right: 20px; bottom: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 100; }
        .circle-btn { width: 65px; height: 65px; background: #222; border: 3px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; padding: 20px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; overflow-y: auto; max-height: 75vh; }
        .item-box { background: #1a1a2e; padding: 15px; border-radius: 12px; text-align: center; border: 2px solid #333; font-weight: bold; position: relative; }

        .dice-wrap { text-align: center; padding: 10px 0 40px; }
        .dice { width: 75px; height: 75px; background: #fff; color: #000; border-radius: 18px; display: inline-flex; align-items: center; justify-content: center; font-size: 35px; font-weight: bold; box-shadow: 0 6px 0 #bbb; }
        
        /* 鮪魚堡商店風格 */
        .store-title { color: #5dade2; font-size: 24px; text-shadow: 0 0 10px #2874a6; }
        .close-btn { background: var(--gold); border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; font-size: 16px; }

        #event-overlay { display: none; position: fixed; inset: 0; z-index: 1500; background: rgba(0,0,0,0.85); flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        @keyframes pop { 0%{transform:scale(0)} 100%{transform:scale(1)} }
    </style>
</head>
<body>

<div class="header">
    <h1 class="main-title">阿毛之塔</h1>
    <div id="full-title">📜 載入冒險紀錄中...</div>
</div>

<div class="stats-grid">
    <div>⚔️<br><span id="st-atk" class="stat-val">5</span></div>
    <div>🛡️<br><span id="st-def" class="stat-val">5</span></div>
    <div>👟<br><span id="st-spd" class="stat-val">5</span></div>
    <div>✨<br><span id="st-chr" class="stat-val">5</span></div>
</div>

<div class="info-bar">
    <div>🏰 <span id="lvl">0</span></div>
    <div>⚡ <span id="nrg">60</span></div>
    <div>💰 <span id="gold">100</span></div>
</div>

<div class="adventure-zone">
    <div id="event-msg">目標：第 9999 層的鮮茶道！</div>
    <div id="amao-sprite" onclick="petAmao()">🐶</div>
    <div class="stage" id="stage"></div>
</div>

<div class="dice-wrap">
    <div id="dice" class="dice" onclick="rollDice()">🎲</div>
</div>

<div class="nav-menu">
    <div class="circle-btn" onclick="openStore()">🏪</div>
    <div class="circle-btn" onclick="openEquip()">🧥</div>
    <div class="circle-btn" onclick="openInv()">🎒</div>
</div>

<div id="store-modal" class="modal">
    <div class="modal-header" style="display:flex; justify-content:space-between; align-items:center;">
        <h2 class="store-title">🍣 鮪魚堡的黑心商店</h2>
        <button class="close-btn" onclick="closeModal('store-modal')">快逃</button>
    </div>
    <p style="color:#aaa; font-size:12px;">鮪魚堡：「嘿嘿，不買嗎？這些可是『限量』的廢物喔！」</p>
    <div id="store-grid" class="grid"></div>
</div>

<div id="event-overlay">
    <div id="event-icon" style="font-size:80px;">❓</div>
    <h2 id="event-title" style="font-size:24px; color:var(--gold);">奇遇發生！</h2>
    <p id="event-desc" style="margin:20px; line-height:1.6;"></p>
    <div id="event-btns"></div>
</div>

<div id="inv-modal" class="modal">
    <div class="modal-header" style="display:flex; justify-content:space-between;"><h2>阿毛背包</h2><button class="close-btn" onclick="closeModal('inv-modal')">關閉</button></div>
    <div id="inv-grid" class="grid"></div>
</div>

<div id="equip-modal" class="modal">
    <div class="modal-header" style="display:flex; justify-content:space-between;"><h2>全身裝備</h2><button class="close-btn" onclick="closeModal('equip-modal')">關閉</button></div>
    <div id="equip-list" style="display:flex; flex-direction:column; gap:10px;"></div>
</div>

<script>
let state = {
    lvl: 0, nrg: 60, gold: 100, inv: [], 
    equips: {head:null, body:null, hand:null, feet:null},
    title: "📜 飢餓的冒險者", isSulking: false, sulkCount: 0
};

const DB = {
    foods: ["姊姊煮的水餃","姊姊煮的麵","鮮茶道紅茶","好吃的雞排","阿毛零食"],
    equips: [
        {n:"爸爸的白袍", i:"🥼", t:"body", r:"S"}, {n:"姊姊買的涼鞋", i:"👡", t:"feet", r:"A"},
        {n:"普通的襪子", i:"🧦", t:"feet", r:"N"}, {n:"毛茸茸帽子", i:"👒", t:"head", r:"B"}
    ],
    junk: [
        {n:"過期香水", i:"🧴", v:999, d:"聞起來像過期的罐頭，毫無作用。"},
        {n:"鮪魚堡的簽名", i:"📝", v:1500, d:"一張廢紙，但鮪魚堡說這很值錢。"},
        {n:"純金垃圾桶", i:"🗑️", v:5000, d:"裝垃圾也顯得尊貴，但依然是垃圾。"}
    ]
};

function save() { localStorage.setItem('amao_rpg_save', JSON.stringify(state)); }
function load() {
    const s = localStorage.getItem('amao_rpg_save');
    if(s) state = JSON.parse(s);
    updateUI();
}

function rollDice() {
    if(state.isSulking) return alert("阿毛在耍賴，快點擊阿毛摸頭安撫！");
    if(state.nrg <= 0) return alert("體力耗盡！去商店看看有沒有吃的？");
    
    state.nrg--;
    let roll = Math.floor(Math.random()*6)+1;
    document.getElementById('dice').innerText = roll;
    state.lvl += roll;

    setTimeout(() => {
        let r = Math.random();
        if(r < 0.2) startEvent(); // 奇遇
        else if(r < 0.4) startBattle(); // 戰鬥
        else findBox(); // 寶箱
        updateUI();
        save();
    }, 400);
}

function findBox() {
    const s = document.getElementById('stage');
    s.innerHTML = "";
    document.getElementById('event-msg').innerText = `阿毛在第 ${state.lvl} 層發現了寶箱！🎁`;
    
    for(let i=0; i<2; i++) {
        let it = (Math.random() < 0.3) ? genEquip() : genFood();
        state.inv.push(it);
        let c = document.createElement('div');
        c.className = `card reveal ${it.type==='equip'?'is-equip':''} rank-${it.rank||'N'}`;
        c.innerHTML = `<div style="font-size:40px">${it.i}</div>${it.n}`;
        s.appendChild(c);
    }
}

function genEquip() {
    let b = DB.equips[Math.floor(Math.random()*DB.equips.length)];
    return {...b, type:'equip', atk:20, def:20, spd:20, v:100};
}
function genFood() {
    let f = DB.foods[Math.floor(Math.random()*DB.foods.length)];
    return {n:f, i:"🍱", type:'food', v:20};
}

// --- 奇遇系統 ---
function startEvent() {
    const ov = document.getElementById('event-overlay');
    const t = document.getElementById('event-title');
    const d = document.getElementById('event-desc');
    const b = document.getElementById('event-btns');
    ov.style.display = 'flex';
    b.innerHTML = "";

    let rnd = Math.random();
    if(rnd < 0.3) {
        t.innerText = "姊姊的突然關心";
        d.innerText = "姊姊出現了！她問你：「阿毛，我今天漂亮嗎？」";
        createEvtBtn(b, "超漂亮！", () => { alert("姊姊很開心，全屬性+10！"); state.gold+=100; endEvent(); });
        createEvtBtn(b, "還可以...", () => { alert("姊姊不開心，扣除 10 點體力。"); state.nrg-=10; endEvent(); });
    } else if(rnd < 0.6) {
        t.innerText = "轉生史萊姆的挑戰";
        d.innerText = "一隻史萊姆擋住去路，要跟你玩猜拳！";
        createEvtBtn(b, "剪刀", () => rps('scissors'));
        createEvtBtn(b, "石頭", () => rps('stone'));
        createEvtBtn(b, "布", () => rps('paper'));
    } else {
        t.innerText = "鮪魚堡的強迫推銷";
        d.innerText = "鮪魚堡：「少年，看你骨骼精奇，花 50 金幣抽個獎？」";
        createEvtBtn(b, "抽！", () => { 
            if(state.gold>=50) { 
                state.gold-=50; 
                let gift = genFood(); state.inv.push(gift); alert("抽到了 "+gift.n); 
            } else alert("錢不夠啦！");
            endEvent();
        });
        createEvtBtn(b, "不要", endEvent);
    }
}

function rps(player) {
    let win = Math.random() > 0.5;
    if(win) { alert("你贏了！前進 10 層！"); state.lvl+=10; }
    else { alert("輸了... 被彈回 3 層。"); state.lvl = Math.max(0, state.lvl-3); }
    endEvent();
}

function createEvtBtn(p, txt, fn) {
    let btn = document.createElement('button');
    btn.className = "close-btn"; btn.style.margin="5px";
    btn.innerText = txt; btn.onclick = fn;
    p.appendChild(btn);
}
function endEvent() { document.getElementById('event-overlay').style.display='none'; updateUI(); save(); }

// --- 戰鬥系統 ---
function startBattle() {
    const enemies = ["兇惡的黑粉","路邊的野貓","討厭洗澡的惡魔"];
    document.getElementById('event-msg').innerText = `遭受 ${enemies[Math.floor(Math.random()*3)]} 的偷襲！⚔️`;
    let win = (getStats().atk + Math.random()*50) > 40;
    if(win) { alert("阿毛大獲全勝！撿到 30 金幣。"); state.gold+=30; }
    else { alert("阿毛被打敗了，開始耍賴...快摸摸頭！"); state.isSulking=true; document.getElementById('amao-sprite').style.filter="hue-rotate(90deg)"; }
}

function petAmao() {
    if(!state.isSulking) return;
    state.sulkCount++;
    if(state.sulkCount >= 3) {
        state.isSulking = false; state.sulkCount = 0;
        document.getElementById('amao-sprite').style.filter="none";
        alert("阿毛被摸得很舒服，站起來了！");
    }
}

function openStore() {
    document.getElementById('store-modal').style.display='block';
    const g = document.getElementById('store-grid'); g.innerHTML = "";
    // 鮪魚堡的黑心商品
    let items = [
        ...DB.junk,
        {n:"姊姊的愛心水餃", i:"🥟", v:200, type:'food'},
        {n:"傳說稱號：鮪魚堡之友", i:"👑", v:9999, type:'title'}
    ];
    items.forEach(it => {
        g.innerHTML += `<div class="item-box">
            <div style="font-size:30px">${it.i}</div>${it.n}<br>
            <small style="color:#888; font-size:10px;">${it.d||'這很有用，真的。'}</small><br>
            <button class="close-btn" onclick="buy('${it.n}',${it.v},'${it.i}','${it.type}')" style="margin-top:5px;">$${it.v}</button>
        </div>`;
    });
}

function buy(n,v,i,t) {
    if(state.gold>=v) { state.gold-=v; state.inv.push({n,i,v:v/2,type:t}); updateUI(); save(); alert("感謝惠顧！嘿嘿..."); }
    else alert("沒錢還想買？滾去爬塔！");
}

function getStats() {
    let s = {atk:5, def:5, spd:5, chr:5};
    Object.values(state.equips).forEach(e => { if(e){ s.atk+=e.atk; s.def+=e.def; s.spd+=e.spd; s.chr+=e.chr; }});
    return s;
}

function updateUI() {
    document.getElementById('lvl').innerText = state.lvl;
    document.getElementById('nrg').innerText = state.nrg;
    document.getElementById('gold').innerText = state.gold;
    document.getElementById('st-atk').innerText = getStats().atk;
    document.getElementById('st-def').innerText = getStats().def;
    document.getElementById('st-spd').innerText = getStats().spd;
    document.getElementById('st-chr').innerText = getStats().chr;
}

function openInv() {
    document.getElementById('inv-modal').style.display='block';
    const g = document.getElementById('inv-grid'); g.innerHTML = "";
    state.inv.forEach((it, idx) => {
        g.innerHTML += `<div class="item-box" onclick="use(${idx})">${it.i}<br>${it.n}</div>`;
    });
}

function use(idx) {
    const it = state.inv[idx];
    if(it.type==='food') { state.nrg = Math.min(60, state.nrg+20); state.inv.splice(idx,1); }
    else if(it.type==='equip') { state.equips[it.slot] = it; }
    else if(it.type==='title') { state.title = it.n; }
    updateUI(); closeModal('inv-modal'); save();
}

function openEquip() {
    document.getElementById('equip-modal').style.display='block';
    const l = document.getElementById('equip-list'); l.innerHTML = "";
    for(let s in state.equips) {
        let it = state.equips[s];
        l.innerHTML += `<div class="item-box">${s.toUpperCase()}: ${it?it.n:'空'} ${it?`<button onclick="unequip('${s}')">脫下</button>`:''}</div>`;
    }
}
function unequip(s) { state.equips[s]=null; updateUI(); openEquip(); save(); }

function closeModal(id) { document.getElementById(id).style.display='none'; }
window.onload = load;
</script>
</body>
</html>
