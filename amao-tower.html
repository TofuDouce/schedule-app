<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿毛之塔</title>
    <style>
        /* --- 莫蘭迪深色調系統 --- */
        :root {
            --bg-dark: #1A1A22;        /* 極深色背景 */
            --panel-bg: #252533;      /* 面板背景 */
            --morandi-green: #B4C6A6; /* 莫蘭迪綠 */
            --morandi-gold: #EAC4D5;  /* 莫蘭迪柔粉金 */
            --text-light: #E0E0E0;
            --accent-blue: #A3B1C6;
            --dice-yellow: #FFE082;
            --header-height: 80px;
            --footer-height: 160px; 
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0; padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        /* --- 1. 固定頂部 --- */
        #fixed-header {
            height: var(--header-height);
            background: rgba(26, 26, 34, 0.95);
            border-bottom: 1px solid #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 100;
            flex-shrink: 0;
        }

        .status-row {
            display: flex;
            justify-content: space-around;
            padding: 5px 10px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .game-title {
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
            letter-spacing: 3px;
            color: var(--morandi-gold);
            text-shadow: 0 0 10px rgba(234, 196, 213, 0.3);
        }

        /* --- 2. 中間滑動冒險區 --- */
        #main-scroll-area {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding-bottom: 20px;
            scroll-behavior: smooth;
        }

        #stage-view {
            height: 240px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            flex-shrink: 0;
            background: radial-gradient(circle, rgba(163,177,198,0.1) 0%, rgba(26,26,34,0) 70%);
        }

        .floor-indicator {
            position: absolute;
            font-size: 5.5em;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03);
            z-index: 0;
            font-style: italic;
        }

        .amao-main-sprite { 
            font-size: 85px; 
            z-index: 1; 
            margin-bottom: 12px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .amao-title-label {
            background: var(--morandi-gold);
            color: #2D2D3A;
            padding: 4px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
            z-index: 1;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }

        /* 日誌列表 */
        #game-log-list {
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .log-entry {
            background: var(--panel-bg);
            padding: 14px;
            border-radius: 12px;
            border-left: 5px solid var(--accent-blue);
            display: flex;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .log-icon { font-size: 1.2em; }
        .log-content { font-size: 1em; line-height: 1.5; color: var(--text-light); }
        .highlight-text { color: var(--dice-yellow); font-weight: bold; }

        /* --- 3. 固定底部控制列 --- */
        #fixed-footer {
            height: var(--footer-height);
            background: rgba(26, 26, 34, 0.98);
            border-top: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 12px 18px;
            z-index: 100;
            flex-shrink: 0;
        }

        .dice-button {
            background-color: var(--dice-yellow);
            color: #333;
            border: none;
            border-radius: 15px;
            width: 100%;
            height: 65px;
            font-size: 1.2em;
            font-weight: 800;
            box-shadow: 0 5px 0 #D4A017;
            margin-bottom: 18px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            transition: all 0.1s;
        }

        .dice-button:active { 
            transform: translateY(3px); 
            box-shadow: 0 2px 0 #D4A017; 
        }

        .bottom-nav {
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }

        .nav-item {
            flex: 1;
            background: #333344;
            height: 55px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.6em;
            cursor: pointer;
            box-shadow: 0 3px 0 #222;
        }
        .nav-item:active { background: var(--morandi-green); transform: scale(0.95); }

        /* --- 選單彈窗 --- */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            z-index: 200;
            display: none;
            flex-direction: column;
        }

        .overlay-header {
            height: 70px;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #444;
        }

        .notebook-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .item-slot {
            aspect-ratio: 1;
            background: #252533;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.85em;
            color: #555;
            border: 1px solid #333;
        }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <div id="fixed-header">
        <div class="status-row">
            <span>⚡ 體力: 無限</span>
            <span>💰 金幣: <span id="gold-val">1000</span></span>
        </div>
        <div class="game-title">阿毛之塔</div>
    </div>

    <div id="main-scroll-area">
        <div id="stage-view">
            <div class="floor-indicator" id="bg-floor">0001</div>
            <div class="amao-main-sprite" id="amao-sprite">🐶</div>
            <div class="amao-title-label" id="current-title">【新手爬塔狗】</div>
        </div>

        <div id="game-log-list">
            <div class="log-entry">
                <div class="log-icon">🍖</div>
                <div class="log-content">冒險開始了！這是一段通往 9,999 樓鮮茶道的漫長旅程。</div>
            </div>
        </div>
    </div>

    <div id="fixed-footer">
        <button class="dice-button" onclick="handleRoll()">
            <span>🎲</span> 投擲命運之骰
        </button>
        
        <div class="bottom-nav">
            <div class="nav-item" onclick="openMenu('food')">🍱</div>
            <div class="nav-item" onclick="openMenu('title')">🏅</div>
            <div class="nav-item" onclick="openMenu('bag')">🎒</div>
            <div class="nav-item" onclick="openMenu('shop')">🛒</div>
        </div>
    </div>

    <div id="menu-overlay" class="overlay">
        <div class="overlay-header">
            <h2 id="menu-title">筆記本</h2>
            <div onclick="closeMenu()" style="font-size: 1.8em; padding: 10px; cursor: pointer;">✕</div>
        </div>
        <div id="menu-content" class="notebook-content">
            </div>
    </div>

<script>
    let floor = 1;

    function handleRoll() {
        const amao = document.getElementById('amao-sprite');
        amao.style.transform = "scale(1.2) translateY(-20px)";
        
        setTimeout(() => {
            const step = Math.floor(Math.random() * 6) + 1;
            floor += step;
            amao.style.transform = "scale(1) translateY(0)";
            
            // 更新樓層顯示
            document.getElementById('bg-floor').innerText = floor.toString().padStart(4, '0');
            
            // 新增正式冒險日誌
            const logList = document.getElementById('game-log-list');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `
                <div class="log-icon">🎲</div>
                <div class="log-content">擲出了 <span class="highlight-text">${step}</span> 點！阿毛矯健地爬上了 <span class="highlight-text">${floor}F</span>。</div>
            `;
            logList.insertBefore(entry, logList.firstChild);
        }, 150);
    }

    function openMenu(type) {
        const overlay = document.getElementById('menu-overlay');
        const content = document.getElementById('menu-content');
        const title = document.getElementById('menu-title');
        
        content.innerHTML = ''; 
        overlay.style.display = 'flex';

        if(type === 'food') {
            title.innerText = '🍱 美食收藏 (0/300)';
            for(let i=1; i<=300; i++) {
                let slot = document.createElement('div');
                slot.className = 'item-slot';
                slot.innerText = '???';
                content.appendChild(slot);
            }
        } else if(type === 'title') {
            title.innerText = '🏅 稱號成就 (0/150)';
            for(let i=1; i<=150; i++) {
                let slot = document.createElement('div');
                slot.className = 'item-slot';
                slot.innerText = '鎖定';
                content.appendChild(slot);
            }
        } else {
            title.innerText = '系統訊息';
            content.innerHTML = '<p style="grid-column: span 4; text-align:center; padding: 20px; color: var(--text-dim);">目前背包內空空如也...</p>';
        }
    }

    function closeMenu() {
        document.getElementById('menu-overlay').style.display = 'none';
    }
</script>

</body>
</html>
