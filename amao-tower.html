<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿毛之塔：究極冒險</title>
    <style>
        :root { --gold: #f1c40f; --pink: #ff99cc; --bg: #0a0a12; --card: #1a1a2e; --equip: #00f2ff; --choco: #5d4037; }
        body { margin:0; font-family: sans-serif; background: var(--bg); color: #fff; user-select: none; overflow-x: hidden; }
        .tower-header { padding: 20px 0; text-align: center; border-bottom: 4px solid var(--gold); }
        .tower-title { font-size: 2.5rem; color: var(--gold); text-shadow: 0 0 10px var(--gold); margin: 0; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); background: #111; padding: 12px; text-align: center; border-bottom: 1px solid #333; }
        .stat-val { color: var(--pink); font-weight: bold; font-size: 1.1rem; }
        .avatar-container { position: relative; width: 140px; height: 140px; margin: 25px auto; display: flex; align-items: center; justify-content: center; }
        #amao-sprite { font-size: 90px; z-index: 10; transition: 0.2s; cursor: pointer; }
        .layer { position: absolute; font-size: 50px; pointer-events: none; transition: 0.3s; opacity: 0; transform: scale(0); }
        .layer.active { opacity: 1; transform: scale(1); }
        .layer-head { top: -15px; z-index: 15; }
        .layer-body { top: 35px; z-index: 5; font-size: 65px; opacity: 0.75; }
        .layer-hand { right: -25px; top: 50px; z-index: 20; }
        .layer-feet { bottom: -10px; z-index: 3; }
        .stage { display: flex; justify-content: center; gap: 10px; min-height: 180px; padding: 10px; }
        .card { width: 150px; background: var(--card); border: 2px solid #444; border-radius: 15px; display: none; flex-direction: column; align-items: center; padding: 12px; text-align: center; }
        .card.reveal { display: flex; animation: pop 0.4s forwards; }
        .card.is-equip { border-color: var(--equip); box-shadow: 0 0 15px var(--equip); }
        .desc-text { font-size: 10px; color: #aaa; margin: 6px 0; height: 24px; overflow: hidden; }
        .bonus-text { font-size: 11px; color: var(--gold); font-weight: bold; background: rgba(0,0,0,0.3); border-radius: 4px; padding: 2px 5px; }
        .dice { width: 80px; height: 80px; background: #fff; color: #000; border-radius: 20px; margin: 15px auto; display: flex; align-items: center; justify-content: center; font-size: 40px; cursor: pointer; box-shadow: 0 6px 0 #999; }
        .nav-menu { position: fixed; right: 20px; bottom: 20px; display: flex; flex-direction: column; gap: 15px; }
        .circle-btn { width: 65px; height: 65px; background: #222; border: 3px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; padding: 20px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .item-box { background: #1a1a2e; padding: 12px; border-radius: 10px; text-align: center; border: 1px solid #333; }
        #choco-screen { display: none; position: fixed; inset: 0; background: var(--choco); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; }
        @keyframes pop { 0%{transform:scale(0)} 100%{transform:scale(1)} }
    </style>
</head>
<body>

<div id="choco-screen">
    <div style="font-size:100px;">🍫</div>
    <h2 style="color:#fff;">巧克力神救援！</h2>
    <p id="choco-msg" style="color:var(--gold); padding:0 20px; text-align:center;"></p>
    <button onclick="closeChoco()" style="background:var(--gold); border:none; padding:15px 30px; border-radius:10px; font-weight:bold;">謝謝巧克力！</button>
</div>

<div class="tower-header">
    <h1 class="tower-title">阿毛之塔</h1>
    <div id="amao-full-title" style="color:#888; font-size:14px; margin-top:5px;">👑 究極生命體 阿毛</div>
</div>

<div class="stats-grid">
    <div><small>⚔️ 攻擊</small><br><span id="st-atk" class="stat-val">5</span></div>
    <div><small>🛡️ 防禦</small><br><span id="st-def" class="stat-val">5</span></div>
    <div><small>👟 速度</small><br><span id="st-spd" class="stat-val">5</span></div>
    <div><small>✨ 魅力</small><br><span id="st-chr" class="stat-val">5</span></div>
</div>

<div class="avatar-container">
    <div id="layer-head" class="layer layer-head"></div>
    <div id="layer-body" class="layer layer-body"></div>
    <div id="amao-sprite" onclick="pet()">🐶</div>
    <div id="layer-hand" class="layer layer-hand"></div>
    <div id="layer-feet" class="layer layer-feet"></div>
</div>

<div id="info-msg" style="text-align:center; height:20px; color:var(--gold); font-weight:bold;"></div>
<div class="stage" id="stage"></div>
<div class="dice" onclick="roll()">🎲</div>

<div style="display:flex; justify-content:space-around; padding:15px; background:#111; font-weight:bold; border-top:1px solid #333;">
    <span>🏰 層數: <b id="lvl" style="color:var(--gold)">0</b></span>
    <span>⚡ 體力: <b id="nrg" style="color:var(--pink)">60</b></span>
    <span>💰 金幣: <b id="gold" style="color:#2ecc71">100</b></span>
</div>

<div class="nav-menu">
    <div class="circle-btn" onclick="openStore()">🏪</div>
    <div class="circle-btn" onclick="openInv()">🎒</div>
</div>

<div id="store-modal" class="modal">
    <div style="display:flex; justify-content:space-between;"><h2>🏪 鮪魚堡商店</h2><button onclick="closeModal('store-modal')">離開</button></div>
    <div id="store-grid" class="grid" style="margin-top:15px;"></div>
</div>

<div id="inv-modal" class="modal">
    <div style="display:flex; justify-content:space-between;"><h2>🎒 阿毛背包</h2><button onclick="closeModal('inv-modal')">關閉</button></div>
    <div id="inv-grid" class="grid" style="margin-top:15px;"></div>
</div>

<script>
// --- 核心邏輯 ---
let state = {
    lvl: 0, nrg: 60, gold: 100, 
    titlePrefix: "究極生命體", titleSuffix: "阿毛",
    inv: [], equips: {head:null, body:null, hand:null, feet:null}
};

const DB = {
    // 稱號組件：可組合出百種稱號
    adj: ["傳說中","被沒收過","穿著睡衣","巧克力認證","鮪魚堡認可","發光的","飢餓的","爬塔狂人","被媽媽抓到","散發汗香","極致尊榮","不可一世","軟綿綿"],
    identity: ["冒險者","守護神","小幫手","破壞王","美食家","紙娃娃大師","睡覺專家","耍賴高手","拆家員","好狗狗","大將軍","小霸王"],
    
    // 生活用品資料庫：豐富你的裝備庫
    equips: [
        {n:"媽媽的真絲睡衣", i:"👘", t:"body", def:80, spd:10, d:"絲滑親膚，媽媽的愛"},
        {n:"爸爸的陳年汗衫", i:"👕", t:"body", atk:10, def:20, d:"充滿了安心的味道"},
        {n:"姊姊的增高涼鞋", i:"👡", t:"feet", spd:60, d:"視野突然變得很寬廣"},
        {n:"掃地機器人", i:"🤖", t:"feet", spd:100, d:"阿毛專屬奢華座駕"},
        {n:"不求人抓背棒", i:"🥢", t:"hand", atk:45, d:"阿毛手不夠長的救星"},
        {n:"長柄吹風機", i:"💨", t:"hand", atk:30, d:"對敵人發射熱風"},
        {n:"酷炫戰鬥墨鏡", i:"🕶️", t:"head", chr:100, d:"全場你最帥"},
        {n:"生日派對尖帽", i:"🥳", t:"head", chr:30, atk:5, d:"每天都要慶祝過關"},
        {n:"黃色小鴨帽", i:"🐤", t:"head", def:15, d:"減緩對水的恐懼"},
        {n:"抗噪耳機", i:"🎧", t:"head", def:10, spd:5, d:"聽不到媽媽叫我"},
        {n:"阿公的拐杖", i:"🦯", t:"hand", atk:50, spd:-5, d:"雖然重但很有威嚴"},
        {n:"藍白拖", i:"🩴", t:"feet", spd:30, atk:10, d:"台灣味神速戰靴"}
    ],
    
    // 美食組件：可隨機生成數百種美食
    fPrefix: ["超級","香噴噴","過期的","燙手的","媽媽特製","巧克力秘傳","鮪魚堡偷來的","發光的","深夜的"],
    fNames: ["紅燒肉","水餃","罐頭","雞腿","便當","手搖飲","大骨湯","滷肉飯","甜不辣"]
};

// 讓稱號動起來的函數
function updateTitle() {
    const a = DB.adj[Math.floor(Math.random()*DB.adj.length)];
    const i = DB.identity[Math.floor(Math.random()*DB.identity.length)];
    state.titlePrefix = a;
    state.titleSuffix = i;
    document.getElementById('amao-full-title').innerText = `👑 ${a}的${i} 阿毛`;
}
function roll() {
    if (state.nrg <= 0) return triggerChoco("阿毛累壞了！聖光降臨！");
    state.nrg--;
    const step = Math.floor(Math.random() * 6) + 1;
    state.lvl += step;
    document.querySelector('.dice').innerText = step;

    if (Math.random() < 0.15) {
        triggerMom();
    } else {
        findBox();
    }
    update();
}

function findBox() {
    const s = document.getElementById('stage'); s.innerHTML = "";
    document.getElementById('info-msg').innerText = `第 ${state.lvl} 層發現寶箱！`;
    for (let i = 0; i < 2; i++) {
        let it = (Math.random() < 0.5) ? 
            { ...DB.equips[Math.floor(Math.random() * DB.equips.length)], type: 'equip' } : 
            getRandomFood();
        state.inv.push(it);
        s.appendChild(renderCard(it));
    }
}

function getRandomFood() {
    // 形容詞 (20個)
    const adjectives = [
        "香噴噴的", "發光的", "媽媽特製的", "巧克力秘傳的", "鮪魚堡偷來的", 
        "燙手的", "過期的", "深夜限定的", "超級豪華的", "軟綿綿的", 
        "充滿靈魂的", "會爆漿的", "阿毛夢見的", "傳說級的", "微甜的", 
        "酸溜溜的", "鹹甜適中的", "咬不動的", "入口即化的", "五彩繽紛的"
    ];

    // 烹飪/狀態 (18個)
    const methods = [
        "紅燒", "清蒸", "油炸", "慢火燉", "炭烤", 
        "涼拌", "香煎", "秘製", "現做", "冷凍", 
        "煙燻", "水煮", "乾拌", "鹽酥", "麻辣", 
        "勾芡", "糖醋", "火烤"
    ];

    // 食材 (18個)
    const ingredients = [
        "豬五花", "大骨頭", "鮮魚片", "厚切牛排", "大雞腿", 
        "手工水餃", "多汁肉包", "鮮蝦仁", "厚厚雞排", "特級罐頭", 
        "雞米花", "章魚燒", "甜不辣", "黃金玉米", "半熟蛋", 
        "馬鈴薯泥", "炒泡麵", "糯米飯"
    ];

    // 隨機組合邏輯 (組合數 = 20 * 18 * 18 = 6,480 種)
    const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
    const method = methods[Math.floor(Math.random() * methods.length)];
    const ing = ingredients[Math.floor(Math.random() * ingredients.length)];
    
    const name = adj + method + ing;
    const value = Math.floor(Math.random() * 40) + 20; // 恢復 20~60 體力

    return { 
        n: name, 
        i: "🍱", 
        v: value, 
        d: `這是一份${name}，聞起來超棒！`, 
        type: 'food' 
    };
}

function renderCard(it) {
    let c = document.createElement('div');
    c.className = `card reveal ${it.type==='equip'?'is-equip':''}`;
    let bonus = it.type === 'equip' ? 
        (it.atk?`⚔️${it.atk} `:'') + (it.def?`🛡️${it.def} `:'') + (it.spd?`👟${it.spd}`:'') : `🔋恢復 ${it.v}`;
    c.innerHTML = `<div style="font-size:35px">${it.i}</div><b>${it.n}</b><p class="desc-text">${it.d}</p><div class="bonus-text">${bonus}</div>`;
    return c;
}

function update() {
    let s = {atk:5, def:5, spd:5, chr:5};
    Object.values(state.equips).forEach(e => { if(e){ s.atk+=(e.atk||0); s.def+=(e.def||0); s.spd+=(e.spd||0); s.chr+=(e.chr||0); }});
    
    // 每升 5 層換一次稱號
    if(state.lvl > 0 && state.lvl % 5 === 0) updateTitle();

    const ids = ['st-atk','st-def','st-spd','st-chr','lvl','nrg','gold'];
    ids.forEach(id => { 
        let val = (['lvl','nrg','gold'].includes(id)) ? state[id] : s[id.replace('st-','')];
        document.getElementById(id).innerText = val;
    });
    
    ['head','body','hand','feet'].forEach(slot => {
        const el = document.getElementById(`layer-${slot}`);
        if(state.equips[slot]) { el.innerText = state.equips[slot].i; el.classList.add('active'); }
        else { el.classList.remove('active'); }
    });
}

function triggerMom() {
    const slots = Object.keys(state.equips).filter(s => state.equips[s]);
    if(slots.length > 0) {
        let p = slots[Math.floor(Math.random()*slots.length)];
        alert(`媽媽：「阿毛，${state.equips[p].n}玩髒了，我拿去洗喔！」`);
        state.inv.push(state.equips[p]); state.equips[p] = null;
    } else { state.gold += 20; alert("媽媽：「阿毛真乖！」（獲得20元）"); }
}

function openInv() {
    document.getElementById('inv-modal').style.display='block';
    const g = document.getElementById('inv-grid'); g.innerHTML = "";
    state.inv.forEach((it, idx) => {
        let div = document.createElement('div'); div.className = "item-box";
        div.innerHTML = `<div style="font-size:30px">${it.i}</div><small>${it.n}</small>`;
        div.onclick = () => { useItem(idx); }; g.appendChild(div);
    });
}

function useItem(idx) {
    const it = state.inv[idx];
    if(it.type==='food') { state.nrg = Math.min(60, state.nrg+it.v); }
    else { let old = state.equips[it.t]; if(old) state.inv.push(old); state.equips[it.t] = it; }
    state.inv.splice(idx,1); update(); closeModal('inv-modal');
}

function openStore() {
    document.getElementById('store-modal').style.display='block';
    const g = document.getElementById('store-grid'); g.innerHTML = "";
    for(let i=0; i<4; i++) {
        // 隨機抽裝備或美食
        let isEquip = Math.random() > 0.5;
        let it = isEquip ? 
            {...DB.equips[Math.floor(Math.random()*DB.equips.length)], type:'equip'} : 
            getRandomFood();
            
        let price = isEquip ? 80 : 40;
        let box = document.createElement('div'); 
        box.className = "item-box";
        box.innerHTML = `<div style="font-size:30px">${it.i}</div><small>${it.n}</small><br><button style="background:#2ecc71; border:none; border-radius:3px; color:white;">💰${price}</button>`;
        box.onclick = () => { 
            if(state.gold >= price){ 
                state.gold -= price; state.inv.push(it); update(); 
                alert(`鮪魚堡：「${it.n} 拿去吧，別說我虧待你！」`); 
                openStore(); // 刷新商店
            } else {
                alert("鮪魚堡：「沒錢還想買東西？去爬塔掙點錢再來！」");
            }
        };
        g.appendChild(box);
    }
}

function triggerChoco(m) { document.getElementById('choco-screen').style.display='flex'; document.getElementById('choco-msg').innerText = m; state.nrg=60; }
function closeChoco() { document.getElementById('choco-screen').style.display='none'; update(); }
function closeModal(id) { document.getElementById(id).style.display='none'; }
function pet() { alert("汪！阿毛最愛你了！"); }
window.onload = update;
</script>
</body>
</html>
