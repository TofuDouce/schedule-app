<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿毛之塔 - Amao Tower: Magic Edition</title>
    <style>
        :root {
            --bg-deep: #121218;
            --magic-purple: #EAC4D5;
            --magic-gold: #FFE082;
            --gold: #D4A017;
            --danger: #FF6B6B;
            --font-main: "PingFang TC", "Microsoft JhengHei", sans-serif;
            --header-h: 90px;
            --footer-h: 160px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; user-select: none; }

        body {
            background-color: var(--bg-deep); /* 最底層背景色 */
            color: #E0E0E0;
            font-family: var(--font-main);
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: flex; flex-direction: column;
            position: relative;
        }

        /* --- 核心修正：粒子畫布 --- */
        #magic-engine {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0; /* 確保在最底層 */
            pointer-events: none;
        }

        /* --- 修正：讓所有介面容器透明，否則會擋住粒子 --- */
        header {
            height: var(--header-h);
            background: rgba(31, 31, 42, 0.7); /* 半透明 */
            backdrop-filter: blur(5px); /* 毛玻璃效果，更有質感 */
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 10; flex-shrink: 0;
            display: flex; flex-direction: column; justify-content: center;
        }

        main {
            flex: 1; 
            background: transparent; /* 必須透明，粒子才看得到 */
            overflow-y: auto; 
            position: relative; 
            z-index: 5;
            display: flex; flex-direction: column;
        }

        footer {
            height: var(--footer-h);
            background: rgba(18, 18, 24, 0.85); /* 半透明 */
            backdrop-filter: blur(8px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 15px 20px; z-index: 10;
            display: flex; flex-direction: column; gap: 15px;
        }

        /* --- 舞台內容 --- */
        #world-stage {
            height: 320px; flex-shrink: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative;
        }

        .floor-giant-text {
            position: absolute; font-size: 8em; font-weight: 900;
            color: rgba(255, 255, 255, 0.03); z-index: 0;
            font-style: italic; pointer-events: none;
        }

        .amao-avatar {
            font-size: 100px; 
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer; z-index: 2;
        }

        .amao-badge {
            background: linear-gradient(135deg, var(--gold) 0%, #FFE082 100%);
            color: #2D2D3A; padding: 6px 20px; border-radius: 20px;
            font-weight: 900; font-size: 0.85em; margin-top: -10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 3;
        }

        /* --- 按鈕與其餘 UI --- */
        .main-action-btn {
            background: linear-gradient(135deg, #FFE082 0%, var(--gold) 100%);
            color: #333; border: none; border-radius: 20px;
            width: 100%; height: 70px; font-size: 1.3em; font-weight: 900;
            box-shadow: 0 5px 0 #8B6B0E; cursor: pointer;
        }

        .nav-grid { display: flex; justify-content: space-between; gap: 10px; }
        .nav-btn {
            flex: 1; background: rgba(255,255,255,0.1);
            height: 50px; border-radius: 15px;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.5em; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
        }

        #adventure-logs { padding: 15px; display: flex; flex-direction: column-reverse; gap: 10px; }
        .log-card {
            background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 15px;
            border-left: 4px solid var(--magic-purple); font-size: 0.9em;
        }

        /* Toast 通知 */
        #magic-toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.9); color: #000; padding: 12px 30px;
            border-radius: 25px; z-index: 1000; display: none; font-weight: 900;
        }
    </style>
</head>
<body>

    <canvas id="magic-engine"></canvas>
    
    <div id="magic-toast">✨ 魔法儲存 ✨</div>

    <header>
        <div style="display:flex; justify-content:space-between; padding:0 20px;">
            <div style="font-size:0.8em;">🐶 HP: <span style="color:var(--danger)">MAX</span></div>
            <div style="font-size:0.8em;">💰 <span id="gold-display" style="color:var(--magic-gold)">1,000</span></div>
        </div>
        <div style="text-align:center; font-size:1.4em; font-weight:900; color:var(--magic-purple); letter-spacing:3px;">阿毛之塔</div>
    </header>

    <main id="main-container">
        <section id="world-stage">
            <div class="floor-giant-text" id="bg-floor-number">0001</div>
            <div class="amao-avatar" id="amao-sprite" onclick="amaoReact()">🐶</div>
            <div class="amao-badge" id="current-title-label">【新手爬塔狗】</div>
        </section>
        <div id="adventure-logs"></div>
    </main>

    <footer>
        <button class="main-action-btn" onclick="amaoJump()">🎲 投擲命運之骰</button>
        <div class="nav-grid">
            <div class="nav-btn" onclick="alert('開啟設定')">⚙️</div>
            <div class="nav-btn">🏅</div>
            <div class="nav-btn">🎒</div>
            <div class="nav-btn">🛒</div>
        </div>
    </footer>

    <script>
        // --- 粒子引擎邏輯 (確保渲染) ---
        function initMagicParticles() {
            const canvas = document.getElementById('magic-engine');
            const ctx = canvas.getContext('2d');
            
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            const colors = ['#EAC4D5', '#FFE082', '#FFFFFF']; // 粉紫、金、白

            for(let i = 0; i < 50; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 1,
                    speed: Math.random() * 0.5 + 0.2,
                    opacity: Math.random(),
                    color: colors[Math.floor(Math.random() * colors.length)]
                });
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    ctx.globalAlpha = p.opacity;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();

                    // 移動邏輯
                    p.y -= p.speed;
                    if(p.y < -10) {
                        p.y = canvas.height + 10;
                        p.x = Math.random() * canvas.width;
                    }
                    
                    // 閃爍效果
                    p.opacity += (Math.random() - 0.5) * 0.05;
                    if(p.opacity < 0.1) p.opacity = 0.1;
                    if(p.opacity > 0.8) p.opacity = 0.8;
                });
                requestAnimationFrame(draw);
            }
            draw();
        }

        function amaoJump() {
            const s = document.getElementById('amao-sprite');
            s.style.transform = "translateY(-40px) scale(1.1)";
            setTimeout(() => s.style.transform = "translateY(0) scale(1)", 300);
            
            const log = document.getElementById('adventure-logs');
            const entry = document.createElement('div');
            entry.className = 'log-card';
            entry.innerText = "阿毛向上跳了一層！";
            log.appendChild(entry);
        }

        function amaoReact() {
            const t = document.getElementById('magic-toast');
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 1000);
        }

        window.onload = initMagicParticles;
        window.onresize = () => {
            const canvas = document.getElementById('magic-engine');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
    </script>
</body>
</html>
