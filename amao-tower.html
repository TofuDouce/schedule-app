<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿毛之塔：萬味覺醒</title>
    <style>
        :root { --gold: #f1c40f; --blue: #3498db; --bg: #0a0a12; --card-bg: #1a1a2e; --rare: #ff4500; }
        body { margin:0; font-family: "PingFang TC", sans-serif; background: var(--bg); color: #fff; user-select: none; }
        .header { padding: 20px 0; text-align: center; background: #000; border-bottom: 3px solid var(--gold); }
        .main-title { font-size: 2rem; font-weight: 900; text-shadow: 0 0 10px var(--gold); margin: 0; }
        #currentTitle { color: var(--gold); font-size: 13px; margin-top: 5px; background: rgba(255,255,255,0.1); padding: 2px 10px; border-radius: 10px; }
        .status-panel { background: rgba(255,255,255,0.05); padding: 10px; text-align: center; display: flex; justify-content: space-around; font-size: 14px; border-bottom: 1px solid #333; }
        .adventure-zone { height: 350px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #eventMsg { font-size: 1rem; color: #fff; margin-bottom: 15px; text-align: center; padding: 0 15px; height: 4em; display: flex; align-items: center; justify-content: center; }
        .stage { display: flex; justify-content: center; gap: 8px; width: 100%; min-height: 160px; }
        .card { 
            width: 100px; height: 150px; background: var(--card-bg); border: 2px solid #444; border-radius: 12px; 
            display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 8px; box-sizing: border-box;
        }
        .card.reveal { display: flex; animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .card .emoji { font-size: 40px; margin-bottom: 8px; }
        .card .name { font-size: 11px; font-weight: bold; line-height: 1.2; }
        .rarity-food { border-color: var(--blue); }
        .rarity-title { border-color: var(--gold); }
        .rarity-empty { border-color: #333; color: #666; }
        .controls { text-align: center; padding: 20px; }
        .dice { width: 70px; height: 70px; background: #fff; color: #000; border-radius: 15px; display: inline-flex; align-items: center; justify-content: center; font-size: 35px; cursor: pointer; box-shadow: 0 5px 0 #bbb; }
        .rolling { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: rotate(5deg); } 100% { transform: rotate(-5deg); } }
        .nav-btns { position: fixed; right: 20px; bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        .circle-btn { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; border: 2px solid var(--gold); background: #222; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; padding: 20px; box-sizing: border-box; }
        .tab-bar { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab { padding: 8px 15px; cursor: pointer; border-radius: 5px; font-size: 14px; background: #333; }
        .tab.active { background: var(--gold); color: #000; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; overflow-y: auto; max-height: 70vh; }
        .item-box { background: #1a1a2e; padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #333; font-size: 11px; }
    </style>
</head>
<body>

<div class="header">
    <h1 class="main-title">阿毛之塔</h1>
    <div id="currentTitle">📜 飢餓的冒險者</div>
</div>

<div class="status-panel">
    <div>🏰 <span id="lvl">0</span> / 9999</div>
    <div>⚡ <span id="nrg">60</span></div>
    <div>💰 <span id="gold">0</span></div>
</div>

<div class="adventure-zone">
    <div id="eventMsg">投擲骰子，開啟萬味冒險！</div>
    <div class="stage" id="stage"></div>
</div>

<div class="controls">
    <div id="dice" class="dice" onclick="rollDice()">🎲</div>
    <div style="margin-top:10px;">
        <input type="text" id="gmCode" placeholder="GM 密語" style="padding:5px; border-radius:5px; width:100px;">
        <button onclick="applyGM()">套用</button>
    </div>
</div>

<div class="nav-btns">
    <div class="circle-btn" onclick="openInv()">🎒</div>
</div>

<div id="invModal" class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 style="color:var(--gold)">冒險背包</h2>
        <button onclick="closeModal()" style="padding:5px 15px;">關閉</button>
    </div>
    <div class="tab-bar">
        <div id="tab-food" class="tab active" onclick="switchTab('food')">美食</div>
        <div id="tab-stuff" class="tab" onclick="switchTab('stuff')">日常</div>
        <div id="tab-title" class="tab" onclick="switchTab('title')">稱號</div>
    </div>
    <div id="invGrid" class="grid"></div>
</div>

<script>
// --- 美食引擎資料庫 ---
const FOOD_PARTS = {
    methods: ["泰式","日式","鮮茶道式","阿毛特製","酥脆的","爆汁的","火烤的","剛出爐的","淋上金箔的","來自天堂的"],
    mains: ["伯爵紅茶","藍莓果茶","招牌咖啡","阿里山冰茶","珍珠奶茶","馬鈴薯","和牛","史萊姆果凍","炸蝦","冬瓜青茶","特大號雞排"],
    extras: ["佐靈魂香氣","配上秘密醬汁","拌入秘製紅油","灑滿了金粉","附贈特製酸菜","配上阿毛的愛"]
};

const STUFF_DB = [
    {n:"阿毛的掃把", i:"🧹"}, {n:"臭襪子", i:"🧦"}, {n:"公園散步券", i:"🎟️"},
    {n:"到火星的機票", i:"✈️"}, {n:"阿毛寫真集", i:"📚"}, {n:"破掉的帽子", i:"👒"}
];

const TITLE_PARTS = {
    pfx: ["傳說中","路過的","飢餓的","萬年單身","超級頂級","閃光的"],
    sfx: ["吃貨","鑑定師","外送大師","教主","史萊姆","破壞神"]
};

let state = {
    nrg: 60, lvl: 0, gold: 0, inv: [], equipped: "📜 飢餓的冒險者",
    lastUpd: Date.now(), currentTab: 'food'
};

function save() { localStorage.setItem('amao_v_god', JSON.stringify(state)); }
function load() {
    const d = localStorage.getItem('amao_v_god');
    if(d) state = JSON.parse(d);
    updateUI();
}

function updateUI() {
    document.getElementById('lvl').innerText = state.lvl;
    document.getElementById('nrg').innerText = state.nrg;
    document.getElementById('gold').innerText = state.gold;
    document.getElementById('currentTitle').innerText = state.equipped;
}

function rollDice() {
    if(state.nrg <= 0) return alert("沒體力了！");
    const d = document.getElementById('dice');
    d.classList.add('rolling');
    state.nrg--;
    
    setTimeout(() => {
        d.classList.remove('rolling');
        let step = Math.floor(Math.random()*6)+1;
        d.innerText = step;
        state.lvl += step;
        handleEvent(step);
        save(); updateUI();
    }, 500);
}

function handleEvent(step) {
    const stage = document.getElementById('stage');
    const msg = document.getElementById('eventMsg');
    stage.innerHTML = "";
    
    // 80% 機率有寶箱，20% 遇到壞人
    if(Math.random() > 0.2) {
        msg.innerHTML = `🎁 發現寶箱！正在打開第 ${state.lvl} 層的驚喜...`;
        for(let i=0; i<3; i++) {
            let item = generateItem();
            if(item) state.inv.push(item);
            
            let card = document.createElement('div');
            card.className = `card reveal ${item ? (item.type === 'food' ? 'rarity-food' : (item.type === 'title' ? 'rarity-title' : '')) : 'rarity-empty'}`;
            card.innerHTML = item ? `<div class="emoji">${item.i}</div><div class="name">${item.n}</div>` : `<div class="emoji">💨</div><div class="name">空的包裝袋</div>`;
            stage.appendChild(card);
        }
    } else {
        msg.innerHTML = `⚔️ 遇到壞人偷襲！<br>阿毛掏出隨身物品亂打，嚇跑了對方！獲得 30 金幣！`;
        state.gold += 30;
    }
}

function generateItem() {
    const r = Math.random();
    if(r < 0.15) return null; // 15% 機率是空的
    if(r < 0.6) { // 美食
        const m = FOOD_PARTS.methods[Math.floor(Math.random()*FOOD_PARTS.methods.length)];
        const main = FOOD_PARTS.mains[Math.floor(Math.random()*FOOD_PARTS.mains.length)];
        const e = FOOD_PARTS.extras[Math.floor(Math.random()*FOOD_PARTS.extras.length)];
        return {n: m+main+e, i: "🍱", type: "food", v: 10};
    } else if (r < 0.85) { // 雜物
        let s = STUFF_DB[Math.floor(Math.random()*STUFF_DB.length)];
        return {...s, type: "stuff", v: 5};
    } else { // 稱號
        const p = TITLE_PARTS.pfx[Math.floor(Math.random()*TITLE_PARTS.pfx.length)];
        const s = TITLE_PARTS.sfx[Math.floor(Math.random()*TITLE_PARTS.sfx.length)];
        return {n: p+s, i: "✨", type: "title", v: 100};
    }
}

function applyGM() {
    if(document.getElementById('gmCode').value === "製作人是我") {
        state.nrg = 9999;
        alert("GM 模式：能量已滿！");
        save(); updateUI();
    }
}

function openInv() {
    document.getElementById('invModal').style.display = 'block';
    switchTab(state.currentTab);
}

function switchTab(t) {
    state.currentTab = t;
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-'+t).classList.add('active');
    
    const grid = document.getElementById('invGrid');
    grid.innerHTML = "";
    state.inv.filter(x => x.type === t).forEach(item => {
        let box = document.createElement('div');
        box.className = "item-box";
        box.innerHTML = `<div style="font-size:24px">${item.i}</div>${item.n}`;
        if(t === 'title') box.onclick = () => { state.equipped = "📜 " + item.n; save(); updateUI(); openInv(); };
        grid.appendChild(box);
    });
}

function closeModal() { document.getElementById('invModal').style.display = 'none'; }
window.onload = load;
</script>
</body>
</html>
