<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿毛之塔：究極生活冒險</title>
    <style>
        :root { 
            --gold: #f1c40f; --pink: #ff99cc; --bg: #0a0a12; --card: #1a1a2e; 
            --s-rank: #ff4500; --equip-glow: #00f2ff; --choco: #5d4037; 
        }
        body { margin:0; font-family: 'PingFang TC', sans-serif; background: var(--bg); color: #fff; user-select: none; touch-action: manipulation; }
        
        /* 頂部資訊欄 */
        .header { padding: 15px 0; text-align: center; background: #000; border-bottom: 3px solid var(--gold); }
        .main-title { font-size: 1.8rem; font-weight: 900; color: var(--gold); margin: 0; }
        #full-title { font-size: 14px; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; margin-top: 5px; display: inline-block; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); background: #1a1a1a; padding: 10px; text-align: center; border-bottom: 1px solid #333; }
        .stat-val { color: var(--pink); font-weight: bold; font-size: 16px; }

        .info-bar { display: flex; justify-content: space-around; padding: 10px; background: #111; font-weight: bold; }

        /* 巧克力救援層 */
        #choco-overlay { 
            display: none; position: fixed; inset: 0; z-index: 5000; 
            background: rgba(93, 64, 55, 0.95); flex-direction: column; 
            align-items: center; justify-content: center; text-align: center; 
        }
        .choco-light { font-size: 100px; filter: drop-shadow(0 0 20px #fff); animation: float 2s infinite ease-in-out; }

        /* 遊戲主區域 */
        .adventure-zone { height: 350px; display: flex; flex-direction: column; align-items: center; position: relative; padding-top: 10px; }
        #amao-sprite { font-size: 80px; margin-bottom: 15px; z-index: 10; transition: 0.3s; cursor: pointer; }
        .stage { display: flex; flex-direction: row; justify-content: center; gap: 15px; width: 100%; min-height: 130px; }
        
        /* 卡片與特殊外框 */
        .card { 
            width: 125px; height: 140px; background: var(--card); border: 2px solid #444; 
            border-radius: 12px; display: none; flex-direction: column; align-items: center; 
            justify-content: center; text-align: center; font-size: 13px; padding: 8px; box-sizing: border-box; 
        }
        .card.reveal { display: flex; animation: pop 0.3s forwards; }
        .card.is-equip { border: 2px solid var(--equip-glow); box-shadow: 0 0 15px var(--equip-glow); }
        .card.rank-S { border: 3px solid var(--s-rank); box-shadow: 0 0 20px var(--s-rank); }

        /* 骰子與選單 */
        .dice-wrap { text-align: center; padding-bottom: 30px; }
        .dice { 
            width: 80px; height: 80px; background: #fff; color: #000; border-radius: 20px; 
            display: inline-flex; align-items: center; justify-content: center; 
            font-size: 36px; font-weight: bold; cursor: pointer; box-shadow: 0 6px 0 #bbb;
        }
        .dice:active { transform: translateY(3px); box-shadow: 0 3px 0 #bbb; }

        .nav-menu { position: fixed; right: 20px; bottom: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 100; }
        .circle-btn { width: 65px; height: 65px; background: #222; border: 3px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; }

        /* 彈窗系統 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding-bottom: 20px; }
        .item-box { background: #1a1a2e; padding: 15px; border-radius: 12px; text-align: center; border: 2px solid #333; }
        .close-btn { background: var(--gold); border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        #action-overlay { display: none; position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.95); flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        
        @keyframes pop { 0%{transform:scale(0)} 100%{transform:scale(1)} }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
    </style>
</head>
<body>

<div id="choco-overlay">
    <div class="choco-light">🍫</div>
    <h1 style="color:#fff;">巧克力神救援！</h1>
    <p id="choco-msg" style="color:var(--gold); font-size:18px; padding: 0 20px; font-weight: bold;"></p>
    <button class="close-btn" onclick="closeChoco()">謝主隆恩巧克力！</button>
</div>

<div class="header">
    <h1 class="main-title">阿毛之塔</h1>
    <div id="full-title">📜 飢餓的冒險者 阿毛</div>
</div>

<div class="stats-grid">
    <div>⚔️<br><span id="st-atk" class="stat-val">5</span></div>
    <div>🛡️<br><span id="st-def" class="stat-val">5</span></div>
    <div>👟<br><span id="st-spd" class="stat-val">5</span></div>
    <div>✨<br><span id="st-chr" class="stat-val">5</span></div>
</div>

<div class="info-bar">
    <div>🏰 <span id="lvl">0</span></div>
    <div>⚡ <span id="nrg">60</span></div>
    <div>💰 <span id="gold">100</span></div>
</div>

<div class="adventure-zone">
    <div id="amao-sprite" onclick="petAmao()">🐶</div>
    <div id="event-msg" style="color:var(--gold); font-weight:bold; height: 30px; text-align: center; margin-bottom: 10px;"></div>
    <div class="stage" id="stage"></div>
</div>

<div class="dice-wrap">
    <div class="dice" id="dice" onclick="rollDice()">🎲</div>
</div>

<div class="nav-menu">
    <div class="circle-btn" onclick="openStore()">🏪</div>
    <div class="circle-btn" onclick="openEquip()">🧥</div>
    <div class="circle-btn" onclick="openInv()">🎒</div>
</div>

<div id="store-modal" class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="color:#5dade2">🍣 鮪魚堡的黑心商店</h2>
        <button class="close-btn" onclick="closeModal('store-modal')">快逃</button>
    </div>
    <p style="color:#aaa; font-size:12px;">鮪魚堡：「嘿嘿，這裡的東西雖然沒用，但保證很貴！」</p>
    <div id="store-grid" class="grid"></div>
</div>

<div id="action-overlay">
    <div id="action-icon" style="font-size:80px">👾</div>
    <h2 id="action-title">遭遇到敵人！</h2>
    <p id="action-desc" style="margin: 15px 0; font-size: 18px;"></p>
    <div id="action-btns"></div>
</div>

<div id="inv-modal" class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>阿毛背包</h2><button class="close-btn" onclick="closeModal('inv-modal')">關閉</button>
    </div>
    <div id="inv-grid" class="grid" style="margin-top:20px;"></div>
</div>

<div id="equip-modal" class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>身上穿戴</h2><button class="close-btn" onclick="closeModal('equip-modal')">關閉</button>
    </div>
    <div id="equip-list" style="margin-top:20px; display:flex; flex-direction:column; gap:10px;"></div>
</div>

<script>
let state = {
    lvl: 0, nrg: 60, gold: 100, inv: [], 
    equips: {head:null, body:null, hand:null, feet:null},
    title: "📜 飢餓的冒險者", isSulking: false, sulkCount: 0
};

const DB = {
    monsters: [
        {n:"想剪指甲的媽媽", i:"✂️", atk:45, isMom: true, msg: "「過來剪指甲！沒收你的裝備！」"},
        {n:"洗澡桶惡魔", i:"🛁", atk:30, isMom: false, msg: "「阿毛，快來洗澡！」"},
        {n:"吸塵器怪獸", i:"🧹", atk:20, isMom: false, msg: "「嗡嗡嗡！阿毛快跑！」"},
        {n:"鄰居的機車貓", i:"🐱", atk:25, isMom: false, msg: "「哈氣！！！」"},
        {n:"鮪魚堡的黑心影子", i:"👤", atk:35, isMom: false, msg: "「嘿嘿，要把金幣留下來嗎？」"}
    ],
    equips: [
        {n:"媽媽的絲質睡衣", i:"👘", t:"body", r:"S", atk:0, def:80, spd:30, d:"滑溜溜的，防禦極高！"},
        {n:"掃地機器人", i:"🤖", t:"feet", r:"S", atk:0, def:10, spd:100, d:"阿毛最愛的坐騎。"},
        {n:"爸爸的舊汗衫", i:"👕", t:"body", r:"B", atk:10, def:15, spd:0, d:"充滿了安心的味道。"},
        {n:"曬衣架手杖", i:"🥢", t:"hand", r:"A", atk:40, def:0, spd:5, d:"居家戰鬥必備神兵。"},
        {n:"吹風機", i:"💨", t:"hand", r:"B", atk:25, def:0, spd:0, d:"對付濕漉漉的敵人有奇效。"},
        {n:"姊姊的涼鞋", i:"👡", t:"feet", r:"A", atk:5, def:5, spd:50, d:"穿上去走路很有風。"}
    ],
    foods: [
        {n:"姊姊煮的水餃", i:"🥟", v:30}, {n:"媽媽紅燒肉", i:"🥩", v:50},
        {n:"鮮茶道紅茶", i:"🥤", v:20}, {n:"巧克力便當", i:"🍱", v:60}
    ],
    junk: [
        {n:"鮪魚堡的腳毛", i:"🦵", v:8888, d:"鮪魚堡宣稱這能保平安，但其實完全沒用。"},
        {n:"過期香水", i:"🧴", v:999, d:"聞起來像腐爛的罐頭。"},
        {n:"沒水的原子筆", i:"🖊️", v:500, d:"除了收藏，別無他用。"},
        {n:"純金垃圾桶", i:"🗑️", v:5000, d:"顯現你的土豪氣息。"}
    ]
};

function save() { localStorage.setItem('amao_tower_v10', JSON.stringify(state)); }
function load() {
    const s = localStorage.getItem('amao_tower_v10');
    if(s) state = JSON.parse(s);
    updateUI();
}

function rollDice() {
    if(state.isSulking) return triggerChoco("阿毛耍賴中，巧克力帶著零食來安撫了！");
    if(state.nrg <= 0) return triggerChoco("體力耗盡！巧克力送來了巧克力味聖光！");
    
    state.nrg--;
    let roll = Math.floor(Math.random()*6)+1;
    document.getElementById('dice').innerText = roll;
    state.lvl += roll;

    setTimeout(() => {
        let r = Math.random();
        if(r < 0.2) startBattle();
        else if(r < 0.3) showEvent();
        else findBox();
        updateUI(); save();
    }, 300);
}

function findBox() {
    const s = document.getElementById('stage');
    s.innerHTML = "";
    document.getElementById('event-msg').innerText = `阿毛在第 ${state.lvl} 層開啟了寶箱！🎁`;
    
    for(let i=0; i<2; i++) {
        let it = (Math.random() < 0.4) ? {...DB.equips[Math.floor(Math.random()*DB.equips.length)], type:'equip'} : {...DB.foods[Math.floor(Math.random()*DB.foods.length)], type:'food'};
        state.inv.push(it);
        let c = document.createElement('div');
        c.className = `card reveal ${it.type==='equip'?'is-equip':''} rank-${it.r||'N'}`;
        c.innerHTML = `<div style="font-size:40px">${it.i}</div>${it.n}`;
        s.appendChild(c);
    }
}

function startBattle() {
    const ov = document.getElementById('action-overlay');
    ov.style.display = 'flex';
    const m = DB.monsters[Math.floor(Math.random()*DB.monsters.length)];
    document.getElementById('action-icon').innerText = m.i;
    document.getElementById('action-title').innerText = m.n;
    document.getElementById('action-desc').innerText = m.msg;
    
    const btns = document.getElementById('action-btns');
    btns.innerHTML = `<button class="close-btn" onclick='resolveBattle(${JSON.stringify(m).replace(/'/g, "&apos;")})'>汪汪決鬥！</button>`;
}

function resolveBattle(m) {
    const myAtk = getStats().atk + Math.random()*50;
    if(myAtk >= m.atk) {
        alert(`大勝！${m.n} 逃跑了，留下 50 金幣！`);
        state.gold += 50;
    } else {
        if(m.isMom) {
            const slots = Object.keys(state.equips).filter(s => state.equips[s] !== null);
            if(slots.length > 0) {
                const picked = slots[Math.floor(Math.random()*slots.length)];
                alert(`輸給了媽媽！媽媽說：整天只會玩！沒收你的【${state.equips[picked].n}】！`);
                state.equips[picked] = null;
            } else {
                alert(`輸給了媽媽！因為你身上沒東西可以沒收，媽媽罰你原地罰站（體力-10）。`);
                state.nrg -= 10;
            }
        } else {
            if (Math.random() < 0.3) {
                triggerChoco("戰鬥快失敗時，巧克力突然降臨驅趕了敵人！");
                document.getElementById('action-overlay').style.display = 'none';
                return;
            }
            alert(`打輸了...阿毛開始原地耍賴！`);
            state.isSulking = true;
            document.getElementById('amao-sprite').innerText = "😫";
        }
    }
    document.getElementById('action-overlay').style.display = 'none';
    updateUI(); save();
}

function showEvent() {
    const ov = document.getElementById('action-overlay');
    ov.style.display = 'flex';
    document.getElementById('action-icon').innerText = "❓";
    document.getElementById('action-title').innerText = "奇遇：轉生史萊姆";
    document.getElementById('action-desc').innerText = "史萊姆想跟你猜拳，贏了前進 10 層！";
    const btns = document.getElementById('action-btns');
    btns.innerHTML = `<button class="close-btn" onclick="rps()">猜拳！</button>`;
}

function rps() {
    if(Math.random() > 0.5) { alert("贏了！阿毛高興地跳過 10 層！"); state.lvl += 10; }
    else { alert("輸了，被史萊姆彈回 3 層。"); state.lvl = Math.max(0, state.lvl-3); }
    document.getElementById('action-overlay').style.display = 'none';
    updateUI(); save();
}

function triggerChoco(msg) {
    document.getElementById('choco-overlay').style.display = 'flex';
    document.getElementById('choco-msg').innerText = msg;
    state.nrg = 60; state.isSulking = false;
    document.getElementById('amao-sprite').innerText = "🐶";
}

function closeChoco() { document.getElementById('choco-overlay').style.display = 'none'; updateUI(); }

function getStats() {
    let s = {atk:5, def:5, spd:5, chr:5};
    Object.values(state.equips).forEach(e => { if(e){ s.atk+=(e.atk||0); s.def+=(e.def||0); s.spd+=(e.spd||0); }});
    return s;
}

function updateUI() {
    document.getElementById('lvl').innerText = state.lvl;
    document.getElementById('nrg').innerText = state.nrg;
    document.getElementById('gold').innerText = state.gold;
    document.getElementById('st-atk').innerText = getStats().atk;
    document.getElementById('st-def').innerText = getStats().def;
    document.getElementById('st-spd').innerText = getStats().spd;
    document.getElementById('full-title').innerText = state.title + " 阿毛";
}

function openStore() {
    document.getElementById('store-modal').style.display='block';
    const g = document.getElementById('store-grid'); g.innerHTML = "";
    const storeItems = [...DB.junk, DB.foods[1], DB.equips[0]];
    storeItems.forEach(it => {
        g.innerHTML += `<div class="item-box">
            <div style="font-size:30px">${it.i}</div><b>${it.n}</b><br>
            <small style="color:#888;">${it.d||''}</small><br>
            <button class="close-btn" onclick="buy('${it.n}',${it.v||2000},'${it.i}','${it.t?'equip':'food'}')" style="margin-top:8px;">$${it.v||2000}</button>
        </div>`;
    });
}

function buy(n,v,i,t) {
    if(state.gold >= v) {
        state.gold -= v;
        const base = t === 'equip' ? DB.equips.find(e => e.n === n) : DB.foods.find(f => f.n === n);
        state.inv.push({...base, type: t});
        alert("鮪魚堡：嘿嘿，錢我收下了！");
        updateUI(); save();
    } else alert("錢不夠啦，去多爬幾層！");
}

function openInv() {
    document.getElementById('inv-modal').style.display='block';
    const g = document.getElementById('inv-grid'); g.innerHTML = "";
    state.inv.forEach((it, idx) => {
        g.innerHTML += `<div class="item-box" onclick="use(${idx})"><div style="font-size:30px">${it.i}</div>${it.n}<br><small>點擊使用</small></div>`;
    });
}

function use(idx) {
    const it = state.inv[idx];
    if(it.type==='food') { state.nrg = Math.min(60, state.nrg + (it.v||20)); state.inv.splice(idx,1); }
    else if(it.type==='equip') { state.equips[it.t] = it; state.inv.splice(idx,1); }
    updateUI(); closeModal('inv-modal'); save();
}

function openEquip() {
    document.getElementById('equip-modal').style.display='block';
    const l = document.getElementById('equip-list'); l.innerHTML = "";
    ["head","body","hand","feet"].forEach(s => {
        let it = state.equips[s];
        l.innerHTML += `<div class="item-box" style="display:flex; justify-content:space-between; align-items:center;">
            <span>${s.toUpperCase()}: ${it?it.n:'空'}</span>
            ${it?`<button class="close-btn" onclick="unequip('${s}')">脫下</button>`:''}
        </div>`;
    });
}

function unequip(s) {
    state.inv.push(state.equips[s]);
    state.equips[s] = null;
    updateUI(); openEquip(); save();
}

function petAmao() {
    if(!state.isSulking) {
        document.getElementById('amao-sprite').style.transform = "scale(1.2)";
        setTimeout(()=> document.getElementById('amao-sprite').style.transform = "scale(1)", 200);
        return;
    }
    state.sulkCount++;
    if(state.sulkCount >= 3) {
        state.isSulking = false; state.sulkCount = 0;
        document.getElementById('amao-sprite').innerText = "🐶";
        alert("摸摸成功！阿毛原諒你了！");
        updateUI();
    }
}

function closeModal(id) { document.getElementById(id).style.display='none'; }
window.onload = load;
</script>
</body>
</html>
