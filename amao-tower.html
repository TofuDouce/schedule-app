<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿毛之塔：家人與生活</title>
    <style>
        :root { --gold: #f1c40f; --pink: #ff99cc; --bg: #0a0a12; --card: #1a1a2e; --equip-glow: #00f2ff; }
        body { margin:0; font-family: sans-serif; background: var(--bg); color: #fff; user-select: none; }
        
        /* 數值面板 */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); background: #1a1a1a; padding: 10px; text-align: center; border-bottom: 2px solid var(--gold); }
        .stat-val { color: var(--pink); font-weight: bold; font-size: 16px; }

        /* 紙娃娃容器 */
        .avatar-container { position: relative; width: 100px; height: 100px; margin: 20px auto; display: flex; align-items: center; justify-content: center; }
        #amao-sprite { font-size: 80px; z-index: 5; }
        .layer { position: absolute; font-size: 40px; pointer-events: none; transition: 0.3s; opacity: 0; transform: scale(0); }
        .layer.active { opacity: 1; transform: scale(1); }
        .layer-head { top: -10px; z-index: 6; }
        .layer-body { top: 30px; z-index: 4; font-size: 50px; opacity: 0.6; }
        .layer-hand { right: -15px; top: 40px; z-index: 7; }
        .layer-feet { bottom: -10px; z-index: 3; }

        /* 卡片設計 (含詳細小字) */
        .stage { display: flex; justify-content: center; gap: 10px; min-height: 150px; }
        .card { 
            width: 135px; background: var(--card); border: 2px solid #444; border-radius: 12px; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            padding: 10px; text-align: center;
        }
        .card.reveal { display: flex; animation: pop 0.3s forwards; }
        .card.is-equip { border-color: var(--equip-glow); box-shadow: 0 0 10px var(--equip-glow); }
        .item-detail { font-size: 10px; color: #aaa; margin-top: 5px; line-height: 1.2; }
        .stat-bonus { color: #5dade2; font-weight: bold; }

        /* 選單與按鈕 */
        .dice { width: 70px; height: 70px; background: #fff; color: #000; border-radius: 15px; margin: 20px auto; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; cursor: pointer; }
        .nav-menu { position: fixed; right: 20px; bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        .circle-btn { width: 60px; height: 60px; background: #222; border: 2px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 25px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; padding: 20px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .item-box { background: #222; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #444; }
        
        @keyframes pop { 0%{transform:scale(0)} 100%{transform:scale(1)} }
    </style>
</head>
<body>

<div class="stats-grid">
    <div>⚔️<br><span id="st-atk" class="stat-val">5</span></div>
    <div>🛡️<br><span id="st-def" class="stat-val">5</span></div>
    <div>👟<br><span id="st-spd" class="stat-val">5</span></div>
    <div>✨<br><span id="st-chr" class="stat-val">5</span></div>
</div>

<div class="avatar-container">
    <div id="layer-head" class="layer layer-head"></div>
    <div id="layer-body" class="layer layer-body"></div>
    <div id="amao-sprite">🐶</div>
    <div id="layer-hand" class="layer layer-hand"></div>
    <div id="layer-feet" class="layer layer-feet"></div>
</div>

<div id="event-msg" style="text-align:center; color:var(--gold); font-weight:bold; height:20px;"></div>

<div class="stage" id="stage"></div>

<div class="dice" onclick="rollDice()">🎲</div>

<div class="nav-menu">
    <div class="circle-btn" onclick="openInv()">🎒</div>
    <div class="circle-btn" onclick="openEquip()">🧥</div>
</div>

<div id="inv-modal" class="modal">
    <div style="display:flex; justify-content:space-between;"><h2>阿毛背包</h2><button onclick="closeModal('inv-modal')">關閉</button></div>
    <div id="inv-grid" class="grid"></div>
</div>

<script>
let state = {
    lvl: 0, nrg: 60, gold: 100, inv: [], 
    equips: {head:null, body:null, hand:null, feet:null}
};

// 擴充後的物品資料庫
const DB = {
    equips: [
        {n:"媽媽的睡衣", i:"👘", t:"body", atk:0, def:80, spd:10, d:"絲滑親膚，超級防禦"},
        {n:"爸爸的汗衫", i:"👕", t:"body", atk:10, def:20, spd:0, d:"安心的汗水味(?)"},
        {n:"姊姊的涼鞋", i:"👡", t:"feet", atk:5, def:5, spd:60, d:"輕盈好跑，閃避up"},
        {n:"曬衣架手杖", i:"🥢", t:"hand", atk:45, def:0, spd:5, d:"居家戰鬥長兵器"},
        {n:"吹風機", i:"💨", t:"hand", atk:30, def:0, spd:0, d:"暖風攻擊，吹乾敵人"},
        {n:"掃地機器人", i:"🤖", t:"feet", atk:0, def:10, spd:100, d:"全自動阿毛座駕"},
        {n:"帥氣墨鏡", i:"🕶️", t:"head", atk:0, def:5, spd:0, chr:50, d:"戴上去全場最帥"},
        {n:"派對帽", i:"🥳", t:"head", atk:5, def:5, spd:5, chr:20, d:"充滿歡樂的氣息"}
    ],
    foods: [
        {n:"媽媽紅燒肉", i:"🥩", v:50, d:"體力恢復 50"},
        {n:"姊姊煮水餃", i:"🥟", v:30, d:"體力恢復 30"}
    ]
};

function rollDice() {
    if(state.nrg <= 0) return alert("體力不足！");
    state.nrg--;
    state.lvl += Math.floor(Math.random()*6)+1;
    findBox();
    updateUI();
}

function findBox() {
    const s = document.getElementById('stage'); s.innerHTML = "";
    document.getElementById('event-msg').innerText = `阿毛在 ${state.lvl} 層發現雜物箱！`;
    for(let i=0; i<2; i++) {
        let it = (Math.random() < 0.5) ? {...DB.equips[Math.floor(Math.random()*DB.equips.length)], type:'equip'} : {...DB.foods[Math.floor(Math.random()*DB.foods.length)], type:'food'};
        state.inv.push(it);
        let c = document.createElement('div');
        c.className = `card reveal ${it.type==='equip'?'is-equip':''}`;
        
        // 組合詳細說明小字
        let statText = it.type === 'equip' ? 
            `<span class="stat-bonus">${it.atk?`⚔️${it.atk}`:''} ${it.def?`🛡️${it.def}`:''} ${it.spd?`👟${it.spd}`:''}</span>` : 
            `<span class="stat-bonus">✨恢復${it.v}</span>`;

        c.innerHTML = `
            <div style="font-size:35px">${it.i}</div>
            <div style="font-weight:bold; font-size:12px;">${it.n}</div>
            <div class="item-detail">${it.d}<br>${statText}</div>
        `;
        s.appendChild(c);
    }
}

function updateUI() {
    let s = {atk:5, def:5, spd:5, chr:5};
    Object.values(state.equips).forEach(e => { if(e){ s.atk+=(e.atk||0); s.def+=(e.def||0); s.spd+=(e.spd||0); s.chr+=(e.chr||0); }});
    document.getElementById('st-atk').innerText = s.atk;
    document.getElementById('st-def').innerText = s.def;
    document.getElementById('st-spd').innerText = s.spd;
    document.getElementById('st-chr').innerText = s.chr;
    
    // 更新紙娃娃
    ['head','body','hand','feet'].forEach(slot => {
        const el = document.getElementById(`layer-${slot}`);
        if(state.equips[slot]) { el.innerText = state.equips[slot].i; el.classList.add('active'); }
        else { el.classList.remove('active'); }
    });
}

function openInv() {
    document.getElementById('inv-modal').style.display='block';
    const g = document.getElementById('inv-grid'); g.innerHTML = "";
    state.inv.forEach((it, idx) => {
        let stat = it.type === 'equip' ? `⚔️${it.atk||0} 🛡️${it.def||0}` : `恢復${it.v}`;
        g.innerHTML += `
            <div class="item-box" onclick="use(${idx})">
                <div style="font-size:30px">${it.i}</div>
                <div style="font-size:11px;">${it.n}</div>
                <div style="font-size:9px; color:#888;">${stat}</div>
            </div>`;
    });
}

function use(idx) {
    const it = state.inv[idx];
    if(it.type==='food') { state.nrg = Math.min(60, state.nrg+it.v); state.inv.splice(idx,1); }
    else { 
        let old = state.equips[it.t];
        if(old) state.inv.push(old);
        state.equips[it.t] = it; state.inv.splice(idx,1);
    }
    updateUI(); closeModal('inv-modal');
}

function closeModal(id) { document.getElementById(id).style.display='none'; }
function openEquip() { alert("目前穿著：\n" + Object.values(state.equips).map(e=>e?e.n:'空').join("\n")); }
window.onload = updateUI;
</script>
</body>
</html>
