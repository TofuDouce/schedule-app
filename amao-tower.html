<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿毛之塔</title>
    <style>
        /* --- 莫蘭迪深色調系統 --- */
        :root {
            --bg-dark: #1A1A22;        
            --panel-bg: #252533;      
            --morandi-green: #B4C6A6; 
            --morandi-gold: #EAC4D5;  
            --text-light: #E0E0E0;
            --accent-blue: #A3B1C6;
            --dice-yellow: #FFE082;
            --header-height: 80px;
            --footer-height: 160px; 
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0; padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        /* --- 1. 固定頂部 --- */
        #fixed-header {
            height: var(--header-height);
            background: rgba(26, 26, 34, 0.95);
            border-bottom: 1px solid #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 100;
            flex-shrink: 0;
        }

        .status-row {
            display: flex;
            justify-content: space-around;
            padding: 5px 10px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .game-title {
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
            letter-spacing: 3px;
            color: var(--morandi-gold);
            text-shadow: 0 0 10px rgba(234, 196, 213, 0.3);
        }

        /* --- 2. 中間滑動冒險區 --- */
        #main-scroll-area {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding-bottom: 20px;
            scroll-behavior: smooth;
        }

        #stage-view {
            height: 240px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            flex-shrink: 0;
            background: radial-gradient(circle, rgba(163,177,198,0.1) 0%, rgba(26,26,34,0) 70%);
        }

        .floor-indicator {
            position: absolute;
            font-size: 5.5em;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03);
            z-index: 0;
            font-style: italic;
        }

        .amao-main-sprite { 
            font-size: 85px; 
            z-index: 1; 
            margin-bottom: 12px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .amao-title-label {
            background: var(--morandi-gold);
            color: #2D2D3A;
            padding: 4px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
            z-index: 1;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }

        #game-log-list {
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .log-entry {
            background: var(--panel-bg);
            padding: 14px;
            border-radius: 12px;
            border-left: 5px solid var(--accent-blue);
            display: flex;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .log-icon { font-size: 1.2em; }
        .log-content { font-size: 1em; line-height: 1.5; color: var(--text-light); }
        .highlight-text { color: var(--dice-yellow); font-weight: bold; }

        /* --- 3. 固定底部控制列 --- */
        #fixed-footer {
            height: var(--footer-height);
            background: rgba(26, 26, 34, 0.98);
            border-top: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 12px 18px;
            z-index: 100;
            flex-shrink: 0;
        }

        .dice-button {
            background-color: var(--dice-yellow);
            color: #333;
            border: none;
            border-radius: 15px;
            width: 100%;
            height: 65px;
            font-size: 1.2em;
            font-weight: 800;
            box-shadow: 0 5px 0 #D4A017;
            margin-bottom: 18px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            transition: all 0.1s;
        }

        .dice-button:active { 
            transform: translateY(3px); 
            box-shadow: 0 2px 0 #D4A017; 
        }

        .bottom-nav {
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }

        .nav-item {
            flex: 1;
            background: #333344;
            height: 55px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.6em;
            cursor: pointer;
        }
        .nav-item:active { background: var(--morandi-green); transform: scale(0.95); }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            z-index: 200;
            display: none;
            flex-direction: column;
        }

        .overlay-header {
            height: 70px;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #444;
        }

        .notebook-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .item-slot {
            aspect-ratio: 1;
            background: #252533;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.85em;
            color: #555;
            border: 1px solid #333;
        }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <div id="fixed-header">
        <div class="status-row">
            <span>⚡ 體力: 無限</span>
            <span>💰 金幣: <span id="gold-val">1000</span></span>
        </div>
        <div class="game-title">阿毛之塔</div>
    </div>

    <div id="main-scroll-area">
        <div id="stage-view">
            <div class="floor-indicator" id="bg-floor">0001</div>
            <div class="amao-main-sprite" id="amao-sprite">🐶</div>
            <div class="amao-title-label" id="current-title">【新手爬塔狗】</div>
        </div>

        <div id="game-log-list">
            <div class="log-entry">
                <div class="log-icon">🔮</div>
                <div class="log-content">阿毛感受到塔頂傳來一股強大的魔力... 傳說抵達 9,999 樓就能實現心中的那個願望。</div>
            </div>
        </div>
    </div>

    <div id="fixed-footer">
        <button class="dice-button" onclick="handleRoll()">
            <span>🎲</span> 投擲命運之骰
        </button>
        
        <div class="bottom-nav">
            <div class="nav-item" onclick="openMenu('food')">🍱</div>
            <div class="nav-item" onclick="openMenu('title')">🏅</div>
            <div class="nav-item" onclick="openMenu('bag')">🎒</div>
            <div class="nav-item" onclick="openMenu('shop')">🛒</div>
        </div>
    </div>

    <div id="menu-overlay" class="overlay">
        <div class="overlay-header">
            <h2 id="menu-title">筆記本</h2>
            <div onclick="closeMenu()" style="font-size: 1.8em; padding: 10px; cursor: pointer;">✕</div>
        </div>
        <div id="menu-content" class="notebook-content">
        </div>
    </div>

<script>
    let floor = 1;

    function handleRoll() {
        const amao = document.getElementById('amao-sprite');
        amao.style.transform = "scale(1.2) translateY(-20px)";
        
        setTimeout(() => {
            const step = Math.floor(Math.random() * 6) + 1;
            floor += step;
            amao.style.transform = "scale(1) translateY(0)";
            document.getElementById('bg-floor').innerText = floor.toString().padStart(4, '0');
            
            const logList = document.getElementById('game-log-list');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `
                <div class="log-icon">✨</div>
                <div class="log-content">阿毛使出了中二的衝刺步，前進了 <span class="highlight-text">${step}</span> 層。目前位於 <span class="highlight-text">${floor}F</span>。</div>
            `;
            logList.insertBefore(entry, logList.firstChild);
        }, 150);
    }

    function openMenu(type) {
        const overlay = document.getElementById('menu-overlay');
        const content = document.getElementById('menu-content');
        const title = document.getElementById('menu-title');
        content.innerHTML = ''; 
        overlay.style.display = 'flex';

        if(type === 'food') {
            title.innerText = '🍱 美食收藏 (0/300)';
            for(let i=1; i<=300; i++) {
                let slot = document.createElement('div');
                slot.className = 'item-slot';
                slot.innerText = '???';
                content.appendChild(slot);
            }
        } else if(type === 'title') {
            title.innerText = '🏅 稱號成就 (0/150)';
            for(let i=1; i<=150; i++) {
                let slot = document.createElement('div');
                slot.className = 'item-slot';
                slot.innerText = '鎖定';
                content.appendChild(slot);
            }
        } else {
            title.innerText = '系統訊息';
            content.innerHTML = '<p style="grid-column: span 4; text-align:center; padding: 20px; color: #777;">前方似乎有股神秘的力量擋住了背包...</p>';
        }
    }

    function closeMenu() {
        document.getElementById('menu-overlay').style.display = 'none';
    }
</script>
<script>
/**
 * 阿毛之塔 - 核心引擎 2.0
 * 包含：1000種美食算法、150種稱號、300件物品、自動存檔與正式版 UI 覆寫
 */

const GameDB = {
    // A: 形容詞 B: 狀態 C: 主體
    foodPrefix: ["香氣四溢的", "極致濃郁的", "灑滿蔥花的", "黃金比例的", "來自地獄的", "媽媽特製的", "滷滷米達嫌棄過的", "南瓜老闆激推的", "充滿魔法氣息的", "散發銀紫光芒的", "路邊撿到的", "奶奶特傳的", "夢幻莫蘭迪色的", "超音速生成的", "罪惡感爆表的", "蒜泥狠的", "讓人流口水的", "焦糖琥珀色的", "苦中帶甜的", "冰鎮極品的"],
    foodMiddle: ["爆發性", "口感滑順", "現炸酥脆", "慢火細熬", "七彩噴發", "Q彈有勁", "香煎熟成", "外酥內嫩", "鮮甜多汁", "微苦甘醇", "冰封後的", "剛出爐的", "文火慢燉", "大火快炒", "魔法加持", "中二魂注入", "極致壓縮", "層層堆疊", "五味雜陳", "鮮味濃縮"],
    foodSuffix: ["豬排大餐", "伯爵紅茶", "藍莓果茶", "炒飯", "鹹稀飯", "現包水餃", "能量飲料", "大骨棒", "手作肉餅", "厚片土司", "義大利麵", "濃厚拉麵", "脆皮泡芙", "舒芙蕾", "雞腿堡", "布丁", "三明治", "夏威夷披薩", "關東煮", "絲襪奶茶"],

    titles: [
        { id: 1, rank: 'C', name: '新手爬塔狗', effect: 'HP + 10', desc: '剛踏入塔內的神祕小狗。' },
        { id: 2, rank: 'C', name: '路邊的小乞丐', effect: '金幣獲取 + 5%', desc: '擅長在塔底徘徊。' },
        { id: 3, rank: 'B', name: '胃袋魔術師', effect: '食物效果提升 20%', desc: '阿毛的胃是異次元。' },
        { id: 4, rank: 'B', name: '全能拆遷王', effect: '攻擊力 + 20', desc: '走到哪拆到哪。' },
        { id: 5, rank: 'A', name: '莫蘭迪美學家', effect: '全屬性 + 15', desc: '追求優雅色調的阿毛。' },
        { id: 6, rank: 'A', name: '中二病覺醒者', effect: '爆擊率 + 10%', desc: '右手封印著黑暗力量。' },
        { id: 7, rank: 'S', name: '傳說神之胃', effect: '永久生命力 + 500', desc: '連骨頭都能消化的神級存在。' },
        { id: 8, rank: 'S', name: '鮮茶道品飲大師', effect: '魔力上限 + 200', desc: '喝茶喝到了最高境界。' }
    ],

    items: [
        { name: '魔法掃把', desc: '雖然只是掃地的，但看起來很酷。' },
        { name: '媽媽的毛毯', desc: '防禦力極高，還有安心的味道。' },
        { name: '香香護手霜', desc: '阿毛的肉球變得超軟嫩。' },
        { name: '白袍碎片', desc: '上面有明顯的阿毛咬痕，可能是醫生的。' },
        { name: '火星機票', desc: '一張去不了火星的廢物。' }
    ]
};

const AmaoGame = {
    foodNotebook: [],
    titleNotebook: [],
    inventory: [],
    floor: 1,
    stats: { hp: 100, gold: 1000, title: '新手爬塔狗' },

    init() {
        this.generateFood();
        this.generateTitles();
        this.load();
        this.refreshUI();
        console.log("阿毛之塔數據引擎啟動...");
    },

    generateFood() {
        const special = [
            { name: "奶奶煮的炒飯", desc: "阿嬤怕妳餓的魔力。HP+5", consumed: false },
            { name: "爺爺的鹹稀飯", desc: "充滿家的味道。MP+5", consumed: false },
            { name: "禮拜三的水餃", desc: "週三限定美食。恢復HP", consumed: false },
            { name: "伯爵紅茶", desc: "鮮茶道招牌。精神百倍", consumed: false },
            { name: "藍莓果茶", desc: "酸甜魔法味。恢復MP", consumed: false }
        ];
        this.foodNotebook = [...special];
        for(let i=special.length; i<300; i++) {
            let p = GameDB.foodPrefix[Math.floor(Math.random()*20)];
            let m = GameDB.foodMiddle[Math.floor(Math.random()*20)];
            let s = GameDB.foodSuffix[Math.floor(Math.random()*20)];
            this.foodNotebook.push({ name: p+m+s, desc: "隨機生成的塔內美食。", consumed: false });
        }
    },

    generateTitles() {
        this.titleNotebook = [];
        for(let i=0; i<150; i++) {
            if(i < GameDB.titles.length) {
                this.titleNotebook.push({ ...GameDB.titles[i], unlocked: i===0 });
            } else {
                this.titleNotebook.push({ id: i+1, rank: 'C', name: '未知的傳說', desc: '繼續探索以解鎖。', unlocked: false });
            }
        }
    },

    // 點擊骰子
    roll() {
        const step = Math.floor(Math.random() * 6) + 1;
        this.floor += step;
        
        // 更新 UI
        document.getElementById('bg-floor').innerText = this.floor.toString().padStart(4, '0');
        
        // 隨機事件
        let logIcon = "✨";
        let logText = `擲出 ${step} 點！來到 <span class="highlight-text">${this.floor}F</span>。`;
        
        if(Math.random() > 0.8) {
            let fIdx = Math.floor(Math.random()*300);
            this.foodNotebook[fIdx].consumed = true;
            logIcon = "🎁";
            logText += ` 意外獲得了 <span style="color:var(--morandi-green)">${this.foodNotebook[fIdx].name}</span>！`;
        }

        this.addLog(logIcon, logText);
        this.save();
    },

    addLog(icon, text) {
        const list = document.getElementById('game-log-list');
        const e = document.createElement('div');
        e.className = 'log-entry';
        e.innerHTML = `<div class="log-icon">${icon}</div><div class="log-content">${text}</div>`;
        list.insertBefore(e, list.firstChild);
    },

    refreshUI() {
        document.getElementById('bg-floor').innerText = this.floor.toString().padStart(4, '0');
        document.getElementById('gold-val').innerText = this.stats.gold;
        // 修正原本的按鈕文字與標題
        document.querySelector('.dice-button').innerHTML = '<span>🎲</span> 投擲命運之骰';
        document.getElementById('current-title').innerText = `【${this.stats.title}】`;
    },

    save() {
        localStorage.setItem('AmaoSave', JSON.stringify({
            floor: this.floor,
            food: this.foodNotebook,
            titles: this.titleNotebook,
            stats: this.stats
        }));
    },

    load() {
        const s = localStorage.getItem('AmaoSave');
        if(s) {
            const d = JSON.parse(s);
            this.floor = d.floor || 1;
            this.foodNotebook = d.food;
            this.titleNotebook = d.titles;
            this.stats = d.stats;
        }
    }
};

// 覆寫介面點擊邏輯
window.handleRoll = () => AmaoGame.roll();

window.openMenu = (type) => {
    const ov = document.getElementById('menu-overlay');
    const ct = document.getElementById('menu-content');
    const tt = document.getElementById('menu-title');
    ct.innerHTML = '';
    ov.style.display = 'flex';

    if(type === 'food') {
        let count = AmaoGame.foodNotebook.filter(f=>f.consumed).length;
        tt.innerText = `🍱 美食筆記本 (${count}/300)`;
        AmaoGame.foodNotebook.forEach((f, i) => {
            let s = document.createElement('div');
            s.className = 'item-slot' + (f.consumed ? ' unlocked' : '');
            if(f.consumed) {
                s.style.background = 'var(--morandi-green)';
                s.style.color = 'white';
                s.innerText = f.name.substring(0, 2);
                s.onclick = () => alert(`【${f.name}】\n${f.desc}`);
            } else {
                s.innerText = i + 1;
            }
            ct.appendChild(s);
        });
    } else if(type === 'title') {
        tt.innerText = '🏅 稱號紀錄 (150)';
        AmaoGame.titleNotebook.forEach(t => {
            let s = document.createElement('div');
            s.className = 'item-slot';
            s.innerText = t.unlocked ? t.name.substring(0, 2) : '???';
            if(t.unlocked) s.onclick = () => alert(`【${t.name}】\n${t.desc}`);
            ct.appendChild(s);
        });
    } else {
        tt.innerText = '背包系統';
        ct.innerHTML = '<p style="grid-column: span 4; text-align:center; padding: 20px;">背包目前空空如也...</p>';
    }
};

window.closeMenu = () => { document.getElementById('menu-overlay').style.display = 'none'; };

// 啟動
AmaoGame.init();

</script>

</body>
</html>
