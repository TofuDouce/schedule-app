<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿毛之塔 - 粒子魔法版</title>
    <style>
        :root {
            --bg-deep: #121218;
            --panel-bg: rgba(31, 31, 42, 0.85);
            --magic-purple: #EAC4D5;
            --magic-gold: #FFE082;
            --morandi-green: #A9BA9D;
            --gold: #D4A017;
            --danger: #FF6B6B;
            --font-main: "PingFang TC", "Microsoft JhengHei", sans-serif;
            --header-h: 90px;
            --footer-h: 160px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; user-select: none; }

        body {
            background-color: var(--bg-deep);
            color: #E0E0E0;
            font-family: var(--font-main);
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: flex; flex-direction: column;
            position: relative;
        }

        /* 粒子畫布 */
        #magic-engine {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }

        header {
            height: var(--header-h);
            background: rgba(31, 31, 42, 0.7);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 10; flex-shrink: 0;
            display: flex; flex-direction: column; justify-content: center;
        }

        main {
            flex: 1; background: transparent; overflow-y: auto;
            position: relative; z-index: 5; display: flex; flex-direction: column;
        }

        footer {
            height: var(--footer-h);
            background: rgba(18, 18, 24, 0.85);
            backdrop-filter: blur(8px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 15px 20px; z-index: 10;
            display: flex; flex-direction: column; gap: 15px;
        }

        #world-stage {
            height: 280px; flex-shrink: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative;
        }

        .floor-giant-text {
            position: absolute; font-size: 8em; font-weight: 900;
            color: rgba(255, 255, 255, 0.03); z-index: 0;
            font-style: italic; pointer-events: none;
        }

        .amao-avatar {
            font-size: 100px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2;
        }

        .amao-badge {
            background: linear-gradient(135deg, var(--magic-purple) 0%, #d4adcf 100%);
            color: #2D2D3A; padding: 6px 20px; border-radius: 20px;
            font-weight: 900; font-size: 0.85em; margin-top: -10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 3;
        }

        .main-action-btn {
            background: linear-gradient(135deg, #FFE082 0%, var(--gold) 100%);
            color: #333; border: none; border-radius: 20px;
            width: 100%; height: 70px; font-size: 1.3em; font-weight: 900;
            box-shadow: 0 5px 0 #8B6B0E; cursor: pointer;
        }
        .main-action-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #8B6B0E; }

        .nav-grid { display: flex; justify-content: space-between; gap: 10px; }
        .nav-btn {
            flex: 1; background: rgba(255,255,255,0.1);
            height: 50px; border-radius: 15px;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.5em; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
        }

        #adventure-logs { padding: 15px; display: flex; flex-direction: column-reverse; gap: 10px; }
        .log-card {
            background: rgba(255, 255, 255, 0.05); padding: 12px; border-radius: 15px;
            border-left: 4px solid var(--magic-purple); font-size: 0.85em;
            display: flex; gap: 10px; align-items: center; animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        /* 彈窗 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(18, 18, 24, 0.95); z-index: 1000;
            display: none; flex-direction: column;
        }
        .modal-header { height: 70px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .grid-container { flex: 1; overflow-y: auto; padding: 15px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; align-content: start; }

        .item-slot { aspect-ratio: 1/1; background: rgba(255,255,255,0.05); border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .item-slot.unlocked { border-color: var(--magic-purple); }

        #magic-toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; color: #000; padding: 10px 30px; border-radius: 20px;
            z-index: 2000; display: none; font-weight: 900; box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>

    <canvas id="magic-engine"></canvas>
    <div id="magic-toast"></div>

    <header>
        <div style="display:flex; justify-content:space-between; padding:0 20px;">
            <div style="font-size:0.8em;">❤️ HP: <span id="hp-val" style="color:var(--danger)">100</span></div>
            <div style="font-size:0.8em;">💰 <span id="gold-val" style="color:var(--magic-gold)">500</span></div>
        </div>
        <div style="text-align:center; font-size:1.4em; font-weight:900; color:var(--magic-purple); letter-spacing:3px;">阿毛之塔</div>
    </header>

    <main>
        <section id="world-stage">
            <div class="floor-giant-text" id="bg-floor">0001</div>
            <div class="amao-avatar" id="amao-sprite">🐶</div>
            <div class="amao-badge" id="title-label">【新手爬塔狗】</div>
        </section>
        <div id="adventure-logs"></div>
    </main>

    <footer>
        <button class="main-action-btn" onclick="AmaoGame.roll()">🎲 投擲命運之骰</button>
        <div class="nav-grid">
