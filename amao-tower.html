<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿毛之塔：究極真理版</title>
    <style>
        :root { --gold: #f1c40f; --pink: #ff99cc; --bg: #05050a; --card: #161625; --equip: #00f2ff; --monster: #e74c3c; --angel: #fff176; }
        body { margin:0; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); color: #fff; user-select: none; overflow-x: hidden; }
        
        /* 頂部數據儀表板 */
        .status-bar { display: flex; justify-content: space-around; background: rgba(0,0,0,0.85); padding: 10px 0; border-bottom: 2px solid var(--gold); font-size: 13px; backdrop-filter: blur(5px); position: sticky; top: 0; z-index: 500; }
        .status-item { text-align: center; }
        .status-item b { display: block; font-size: 16px; color: var(--gold); }

        .tower-header { padding: 15px 0; text-align: center; background: linear-gradient(to bottom, #111, var(--bg)); }
        .tower-title { font-size: 1.8rem; color: var(--gold); text-shadow: 0 0 10px var(--gold); margin: 0; }
        #amao-full-title { font-size: 14px; color: var(--equip); margin-top: 5px; font-weight: bold; }
    </style>
    <style>
        .stats-row { display: flex; justify-content: center; gap: 15px; background: #111; padding: 10px; border-radius: 20px; margin: 10px 20px; border: 1px solid #333; }
        .stat-box { font-size: 12px; color: #888; text-align: center; min-width: 65px; }
        .stat-val { display: block; color: var(--pink); font-weight: bold; font-size: 16px; }

        .adventure-zone { height: 50vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .battle-stage { width: 90%; display: flex; justify-content: space-between; align-items: center; position: relative; height: 180px; }
        
        .unit { width: 110px; display: flex; flex-direction: column; align-items: center; position: relative; }
        .unit-sprite { font-size: 75px; position: relative; z-index: 10; cursor: pointer; }
        .hp-bar { width: 80px; height: 8px; background: #333; border-radius: 4px; margin-top: 10px; overflow: hidden; border: 1px solid #000; }
        .hp-fill { height: 100%; background: #2ecc71; transition: 0.3s; width: 100%; }

        /* 紙娃娃層級 */
        .layer { position: absolute; pointer-events: none; opacity: 0; transform: scale(0); transition: 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        .layer.active { opacity: 1; transform: scale(1); }
        .layer-head { top: -10px; left: 50%; transform: translateX(-50%) scale(0); font-size: 45px; z-index: 20; }
        .layer-body { top: 30px; left: 50%; transform: translateX(-50%) scale(0); font-size: 55px; opacity: 0.8; z-index: 5; }
        .layer-hand { right: -25px; top: 40px; font-size: 35px; z-index: 25; }
        .layer-feet { bottom: -5px; left: 50%; transform: translateX(-50%) scale(0); font-size: 35px; z-index: 2; }
    </style>
    <style>
        .side-ctrl { position: fixed; right: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 600; }
        .ctrl-btn { width: 60px; height: 60px; background: rgba(30,30,40,0.9); border: 2px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 1000; padding: 20px; overflow-y: auto; border: 2px solid var(--gold); margin: 15px; border-radius: 25px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; background: #222; border: none; color: #fff; border-radius: 12px; font-size: 13px; }
        .tab-btn.active { background: var(--gold); color: #000; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .item-card { background: var(--card); border: 1px solid #333; padding: 12px; border-radius: 18px; text-align: center; }
        .item-desc { font-size: 10px; color: #888; margin: 6px 0; min-height: 24px; line-height: 1.2; }
        
        .dice-area { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 500; }
        .dice { width: 95px; height: 95px; background: #fff; color: #000; border-radius: 25px; display: flex; align-items: center; justify-content: center; font-size: 50px; box-shadow: 0 8px 0 #bbb; font-weight: bold; cursor: pointer; }
        #angel-popup { position: absolute; font-size: 50px; pointer-events: none; z-index: 100; transition: 1.5s; opacity: 0; }
    </style>
</head>
<body>
    <div id="angel-popup">👼</div>
    <div class="status-bar">
        <div class="status-item">🏰 層數<b id="lvl">0</b></div>
        <div class="status-item">⚡ 體力<b id="nrg">60</b></div>
        <div class="status-item">💰 金幣<b id="gold">100</b></div>
        <div class="status-item">😊 快樂<b id="st-hp">100</b></div>
    </div>

    <div class="tower-header">
        <h1 class="tower-title">阿毛之塔</h1>
        <div id="amao-full-title">[載入中...]</div>
    </div>

    <div class="stats-row">
        <div class="stat-box">⚔️ 攻擊<span id="st-atk" class="stat-val">0</span></div>
        <div class="stat-box">🛡️ 防禦<span id="st-def" class="stat-val">0</span></div>
        <div class="stat-box">👟 速度<span id="st-spd" class="stat-val">0</span></div>
    </div>

    <div class="adventure-zone">
        <div class="battle-stage">
            <div class="unit" id="am-unit">
                <div class="unit-sprite" onclick="petAmao()">
                    <div id="layer-head" class="layer layer-head"></div>
                    <div id="layer-body" class="layer layer-body"></div>
                    <span id="amao-face">🐶</span>
                    <div id="layer-hand" class="layer layer-hand"></div>
                    <div id="layer-feet" class="layer layer-feet"></div>
                </div>
                <div class="hp-bar"><div id="am-hp-fill" class="hp-fill"></div></div>
            </div>
            <div id="vs-box" style="font-size:35px; opacity:0; color:var(--monster); font-weight:900;">VS</div>
            <div class="unit" id="en-unit" style="opacity:0">
                <div id="en-sprite" class="unit-sprite">👾</div>
                <div class="hp-bar"><div id="en-hp-fill" class="hp-fill"></div></div>
                <div id="en-name" style="font-size:12px; margin-top:8px; font-weight:bold;">怪物</div>
            </div>
        </div>
        <div id="info-msg" style="margin-top:25px; padding:0 30px; text-align:center; color:var(--gold); font-size:15px; min-height:45px; font-weight:bold;">準備好挑戰更高層了嗎？</div>
        <div id="stage" style="display:flex; gap:12px; margin-top:15px;"></div>
    </div>
    <div class="side-ctrl">
        <div class="ctrl-btn" onclick="openInv()">🎒</div>
        <div class="ctrl-btn" onclick="openStore()">🏪</div>
    </div>

    <div class="dice-area"><div class="dice" onclick="roll()">🎲</div></div>

    <div id="inv-modal" class="modal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="margin:0;">🎒 阿毛的背包</h2>
            <button onclick="closeModal('inv-modal')">關閉</button>
        </div>
        <div class="tabs">
            <button class="tab-btn active" id="tab-food" onclick="switchTab('food')">美食飲品</button>
            <button class="tab-btn" id="tab-equip" onclick="switchTab('equip')">裝備用品</button>
            <button class="tab-btn" id="tab-title" onclick="switchTab('title')">稱號勳章</button>
        </div>
        <div id="inv-grid" class="grid"></div>
    </div>

    <div id="store-modal" class="modal">
        <div style="display:flex; justify-content:space-between; align-items:center;"><h2>🏪 秘密商店</h2><button onclick="closeModal('store-modal')">離開</button></div>
        <div style="background:#222; padding:12px; border-radius:15px; margin:15px 0; text-align:center;">
            <small>暗號兌換：</small><input type="text" id="serial-input" style="width:100px; background:#000; color:var(--gold); border:1px solid #444; padding:5px;">
            <button onclick="useSerial()">確認</button>
        </div>
        <div id="store-grid" class="grid"></div>
    </div>
    <script>
const DB = {
    f_p: ["超級","傳說級","地獄的","被封印的","閃耀的","鮮茶道的","夢幻的","極致的","拾荒來的","阿公秘傳","神話般的","被詛咒的","巧克力味的","宇宙級","燙口的"],
    f_m: ["紅燒","清蒸","油炸","火烤","鹽酥","冰鎮","麻辣","蜜汁","現萃的","厚奶蓋的","爆汁的","起司","炭烤","勾芡","香濃"],
    f_i: ["豬肉","火鍋","牛排","雞腿","雞排","罐頭","飯糰","和牛","壽喜燒","龍蝦","阿里山冰茶","熊貓珍珠奶茶","四季春青茶","伯爵拿鐵","鮮果雙Q","冬瓜檸檬","豆花","臭豆腐"],
    
    t_pre: ["新手","平凡的","路過的","愛吃的","熬夜的","橫衝直撞","傳說級","地獄級","鮮茶道大師","終結者","覺醒的","弒神之","孤傲的","金閃閃","被沒收的","傳奇"],
    t_suf: ["冒險者","守護神","小幫手","破壞王","美食家","拾荒者","戰神","英雄","薪水小偷","單身漢","外送員","大魔王","拆家手","啃骨家","收藏家","開拓者"],

    monsters: [{n: "史萊姆", i: "💧", hp: 45, atk: 12},{n: "哥布林", i: "👺", hp: 85, atk: 22},{n: "塔頂烏鴉", i: "🐦", hp: 40, atk: 35},{n: "惡犬", i: "🐕", hp: 130, atk: 45}],
    
    joke_items: [
        { n: "洗腳水", i: "🍵", p: 9999, d: "聽說喝了會成仙。體力 -10。" },
        { n: "國王的新衣", i: "🧥", p: 5000, d: "只有聰明人能看到。防禦 +0。" },
        { n: "純金便便", i: "💩", p: 15000, d: "它是純金的，但還是便便。魅力 -10。" }
    ],

    e_pre: ["阿毛的","生鏽的","阿公的","鮪魚堡的","閃光的","新手用","傳奇","地獄"],
    e_name: {head:["墨鏡","安全帽","鴨帽","耳機"],body:["睡衣","背心","雨衣","西裝"],hand:["不求人","吹風機","皮帶","蒼蠅拍"],feet:["藍白拖","涼鞋","球鞋","溜冰鞋"]}
};
let state = { lvl: 0, nrg: 60, gold: 100, mood: 100, inv: [], equips: {head:null, body:null, hand:null, feet:null}, titles: [{p:"新手", s:"冒險者", atk:1, def:1}], curTitleIdx: 0, curTab: 'food', isBattle: false };
</script>
<script>
function generateFood() {
    const name = DB.f_p[Math.floor(Math.random()*DB.f_p.length)] + DB.f_m[Math.floor(Math.random()*DB.f_m.length)] + DB.f_i[Math.floor(Math.random()*DB.f_i.length)];
    const val = Math.floor(Math.random()*31)+25;
    const isD = name.includes("茶") || name.includes("奶") || name.includes("萃");
    return { n: name, i: isD ? "🧋" : "🍱", v: val, type: 'food', d: `這是「${name}」。回復 ${val} 體力。` };
}

function generateEquip() {
    const slot = ["head", "body", "hand", "feet"][Math.floor(Math.random()*4)];
    const name = DB.e_pre[Math.floor(Math.random()*DB.e_pre.length)] + DB.e_name[slot][Math.floor(Math.random()*4)];
    const icons = {head:"🕶️", body:"👕", hand:"🥢", feet:"👟"};
    const atk = slot==='hand'? Math.floor(Math.random()*15)+10 : 2;
    const def = slot==='body'? Math.floor(Math.random()*15)+10 : 2;
    const spd = slot==='feet'? Math.floor(Math.random()*20)+15 : 2;
    return { n: name, i: icons[slot], t: slot, type: 'equip', atk, def, spd, d: `裝備「${name}」後屬性大幅提升。` };
}

function unlockTitle() {
    if (Math.random() > 0.15) return; 
    const p = DB.t_pre[Math.floor(Math.random()*DB.t_pre.length)];
    const s = DB.t_suf[Math.floor(Math.random()*DB.t_suf.length)];
    const rarity = Math.random();
    let atk = 5, def = 2, color = "#fff";

    if (rarity > 0.92) { atk = 55; def = 25; color = "var(--gold)"; }
    else if (rarity > 0.7) { atk = 25; def = 12; color = "var(--equip)"; }

    state.titles.push({ p, s, atk, def, color });
    document.getElementById('info-msg').innerHTML = `<span style="color:${color}">🏆 解鎖稀有稱號：【${p}${s}】！</span>`;
}
</script>
<script>
async function startBattle() {
    state.isBattle = true;
    const base = DB.monsters[Math.floor(Math.random()*DB.monsters.length)];
    const diff = 1 + (Math.sqrt(state.lvl) * 0.45); 
    const enemy = {
        n: `${state.lvl > 50 ? '超覺醒 ' : (state.lvl > 20 ? '強化的 ' : '')}${base.n}`, i: base.i,
        hp: Math.floor(base.hp * diff),
        atk: Math.floor(base.atk * (1 + state.lvl * 0.05))
    };
    
    document.getElementById('en-sprite').innerText = enemy.i;
    document.getElementById('en-name').innerText = `${enemy.n} (Lv.${state.lvl})`;
    document.getElementById('en-hp-fill').style.width = "100%";
    document.getElementById('en-unit').style.opacity = "1";
    document.getElementById('vs-box').style.opacity = "1";
    
    let eHP = enemy.hp, aHP = 100;
    while(eHP > 0 && aHP > 0) {
        await new Promise(r => setTimeout(r, 600));
        let amDmg = (parseInt(document.getElementById('st-atk').innerText) + 12) * (0.9 + Math.random()*0.2);
        eHP -= amDmg;
        document.getElementById('en-hp-fill').style.width = Math.max(0, (eHP/enemy.hp)*100) + "%";
        if(eHP <= 0) break;
        await new Promise(r => setTimeout(r, 600));
        let enDmg = Math.max(5 + (state.lvl*0.2), enemy.atk - parseInt(document.getElementById('st-def').innerText));
        aHP -= enDmg;
        document.getElementById('am-hp-fill').style.width = Math.max(0, aHP) + "%";
    }
    if(eHP <= 0) { 
        const loot = 50 + (state.lvl * 3); state.gold += loot; unlockTitle();
        document.getElementById('info-msg').innerText = `🎉 戰勝了 ${enemy.n}！獲得 ${loot} 金幣。`; 
    } else { 
        state.nrg -= 10; state.mood -= 25; document.getElementById('info-msg').innerText = "戰鬥失敗，阿毛體力耗盡了。"; 
    }
    setTimeout(() => { document.getElementById('en-unit').style.opacity = "0"; document.getElementById('vs-box').style.opacity = "0"; state.isBattle = false; update(); }, 1000);
}
</script>
<script>
function roll() {
    if(state.isBattle || state.nrg <= 0) return;
    state.nrg--; state.mood -= 2;
    const step = Math.floor(Math.random()*6)+1;
    state.lvl += step;
    document.querySelector('.dice').innerText = step;
    const r = Math.random();
    if(r < 0.35) startBattle();
    else if(r < 0.65) findTreasure();
    else document.getElementById('info-msg').innerText = "阿毛在塔內快速穿梭...";
    update();
}

function findTreasure() {
    const s = document.getElementById('stage'); s.innerHTML = "";
    if(Math.random() < 0.2) { document.getElementById('info-msg').innerText = "🎁 箱子裡什麼都沒有，空歡喜一場。"; return; }
    document.getElementById('info-msg').innerText = "🎁 發現路邊的寶藏箱！";
    for(let i=0; i<2; i++) {
        let it = (Math.random()<0.5) ? generateEquip() : generateFood();
        state.inv.push(it);
        s.innerHTML += `<div style="background:var(--card); padding:8px; border-radius:12px; flex:1; text-align:center;"><div style="font-size:25px">${it.i}</div></div>`;
    }
}

function openStore() {
    document.getElementById('store-modal').style.display='block';
    const g = document.getElementById('store-grid'); g.innerHTML = "";
    DB.joke_items.concat([generateEquip(), generateFood()]).forEach(it => {
        const p = it.p || 100;
        g.innerHTML += `<div class="item-card"><div style="font-size:25px">${it.i}</div><b style="font-size:12px">${it.n}</b><div class="item-desc">${it.d}</div><button onclick="buy('${it.n}', ${p})">💰 ${p}</button></div>`;
    });
}
function buy(n, p) { if(state.gold >= p) { state.gold -= p; state.inv.push(generateEquip()); alert("成交！鮪魚堡露出奸笑。"); update(); } else { alert("你的金幣不夠買這件藝術品！"); } }
function useSerial() {
    const c = document.getElementById('serial-input').value;
    if(c === "鮮茶道現萃茶") { state.nrg = 60; state.mood = 100; alert("能量爆發！"); }
    else if(c === "巧克力加薪") { state.gold += 1500; alert("收到一大筆橫財！"); }
    else alert("暗號錯誤。");
    update();
}
</script>
<script>
function update() {
    let t = state.titles[state.curTitleIdx];
    let s = {atk:t.atk, def:t.def, spd:5};
    let bA="", bD="", bS=""; let mA=-1, mD=-1, mS=-1;
    Object.values(state.equips).forEach(e => { if(e){ 
        s.atk+=e.atk; s.def+=e.def; s.spd+=e.spd; 
        if(e.atk>mA){ mA=e.atk; bA=e.i; } if(e.def>mD){ mD=e.def; bD=e.i; } if(e.spd>mS){ mS=e.spd; bS=e.i; }
    }});
    document.getElementById('st-atk').innerHTML = `${s.atk} ${bA}`;
    document.getElementById('st-def').innerHTML = `${s.def} ${bD}`;
    document.getElementById('st-spd').innerHTML = `${s.spd} ${bS}`;
    document.getElementById('st-hp').innerText = state.mood;
    document.getElementById('lvl').innerText = state.lvl;
    document.getElementById('nrg').innerText = state.nrg;
    document.getElementById('gold').innerText = state.gold;
    document.getElementById('amao-full-title').innerText = `[${t.p}${t.s}] 阿毛`;
    document.getElementById('amao-full-title').style.color = t.color || "var(--equip)";
    ['head','body','hand','feet'].forEach(slot => {
        const el = document.getElementById(`layer-${slot}`);
        if(state.equips[slot]) { el.innerText = state.equips[slot].i; el.classList.add('active'); }
        else { el.classList.remove('active'); }
    });
    document.getElementById('amao-face').innerText = state.mood > 80 ? "🐶" : (state.mood > 40 ? "🐕" : "🐩");
}
function switchTab(t) { state.curTab = t; renderInv(); }
function renderInv() {
    const g = document.getElementById('inv-grid'); g.innerHTML = "";
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-'+state.curTab).classList.add('active');
    if(state.curTab === 'title') {
        state.titles.forEach((t, i) => { g.innerHTML += `<div class="item-card"><b style="color:${t.color}">${t.p}${t.s}</b><br><small>⚔️+${t.atk}</small><br><button onclick="setT(${i})">配戴</button></div>`; });
    } else {
        state.inv.filter(it => it.type === state.curTab).forEach((it) => {
            const idx = state.inv.indexOf(it);
            g.innerHTML += `<div class="item-card"><div style="font-size:30px">${it.i}</div><b style="font-size:12px">${it.n}</b><div class="item-desc">${it.d}</div><button onclick="use(${idx})">使用</button> <button onclick="sell(${idx})">賣錢</button></div>`;
        });
    }
}
function use(i) {
    const it = state.inv[i];
    if(it.type==='food') { state.nrg = Math.min(60, state.nrg + it.v); state.mood = Math.min(100, state.mood+15); }
    else { let old = state.equips[it.t]; if(old) state.inv.push(old); state.equips[it.t] = it; }
    state.inv.splice(i, 1); update(); renderInv();
}
function sell(i) { state.gold += 40; state.inv.splice(i, 1); update(); renderInv(); }
function setT(i) { state.curTitleIdx = i; update(); renderInv(); }
function openInv() { document.getElementById('inv-modal').style.display='block'; renderInv(); }
function closeModal(id) { document.getElementById(id).style.display='none'; }
function petAmao() { state.mood = Math.min(100, state.mood + 5); document.getElementById('info-msg').innerText = "阿毛開心地搖了搖尾巴！"; update(); }
window.onload = update;
</script>
</body>
</html>
