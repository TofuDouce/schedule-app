<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿毛之塔 - Amao Tower: Elegant Card Edition</title>
    <style>
        /* --- 核心視覺系統 (莫蘭迪色系) --- */
        :root {
            --bg-dark: #1A1A22;        
            --panel-bg: #252533;      
            --morandi-green: #B4C6A6; 
            --morandi-gold: #EAC4D5;  
            --text-light: #E0E0E0;
            --accent-blue: #A3B1C6;
            --dice-yellow: #FFE082;
            --danger-red: #FF6B6B;
            --rarity-s: #FF4444; 
            --rarity-a: #FFBB33; 
            --rarity-b: #33B5E5; 
            --rarity-c: #99CC00; 
            --header-height: 85px;
            --footer-height: 150px; 
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0; padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            height: 100vh; width: 100vw;
            overflow: hidden; 
            display: flex; flex-direction: column;
        }

        /* --- 你最喜歡的粉紫粒子背景 --- */
        #magic-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0; pointer-events: none; opacity: 0.4;
        }

        /* --- 頂部狀態列 --- */
        #fixed-header {
            height: var(--header-height);
            background: linear-gradient(180deg, rgba(37,37,51,0.98) 0%, rgba(26,26,34,0.95) 100%);
            border-bottom: 2px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; justify-content: center;
            z-index: 100; flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .status-container {
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px;
        }

        .stat-box {
            display: flex; align-items: center; gap: 8px;
            background: rgba(0,0,0,0.2); padding: 5px 12px;
            border-radius: 12px; font-size: 0.85em;
        }

        .game-title {
            text-align: center; font-size: 1.4em; font-weight: 900;
            letter-spacing: 5px; color: var(--morandi-gold);
            text-shadow: 0 0 15px rgba(234, 196, 213, 0.4);
            margin-top: 5px;
        }

        /* --- 內容滾動區域 --- */
        #main-scroll-area {
            flex: 1; overflow-y: auto;
            display: flex; flex-direction: column;
            z-index: 1; scroll-behavior: smooth;
        }

        #stage-view {
            height: 280px; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            position: relative; flex-shrink: 0;
        }

        .floor-indicator {
            position: absolute; font-size: 6.5em; font-weight: 900;
            color: rgba(255, 255, 255, 0.03); z-index: 0;
            font-style: italic; transition: all 0.5s ease;
        }

        .amao-container {
            position: relative; z-index: 2;
            display: flex; flex-direction: column; align-items: center;
        }

        .amao-main-sprite { 
            font-size: 90px; filter: drop-shadow(0 15px 20px rgba(0,0,0,0.6));
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .amao-title-label {
            background: linear-gradient(90deg, #D4A017, #FFE082);
            color: #2D2D3A; padding: 5px 20px; border-radius: 20px;
            font-weight: 800; font-size: 0.85em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            margin-top: -10px; border: 2px solid rgba(255,255,255,0.3);
        }

        /* --- 遊戲日誌 --- */
        #game-log-list { padding: 15px; display: flex; flex-direction: column; gap: 12px; }

        .log-entry {
            background: rgba(37, 37, 51, 0.8); backdrop-filter: blur(5px);
            padding: 15px; border-radius: 16px;
            border-left: 6px solid var(--accent-blue);
            display: flex; gap: 15px;
            animation: logFade 0.4s ease-out;
        }

        @keyframes logFade { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1; transform: translateX(0); } }

        /* --- 底部控制 --- */
        #fixed-footer {
            height: var(--footer-height);
            background: rgba(26, 26, 34, 0.98);
            border-top: 2px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column;
            padding: 15px 20px; z-index: 100;
        }

        .dice-button {
            background: linear-gradient(135deg, #FFE082 0%, #D4A017 100%);
            color: #333; border: none; border-radius: 18px;
            width: 100%; height: 70px;
            font-size: 1.3em; font-weight: 900;
            box-shadow: 0 6px 0 #8B6B0E; margin-bottom: 12px;
            cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 15px;
        }

        .dice-button:active { transform: translateY(4px); box-shadow: 0 2px 0 #8B6B0E; }

        .bottom-nav { display: flex; justify-content: space-between; gap: 12px; }

        .nav-item {
            flex: 1; background: rgba(255,255,255,0.05);
            height: 55px; border-radius: 15px;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.8em; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
        }

        /* --- 選單彈窗與卡片系統 --- */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 1000;
            display: none; flex-direction: column;
            animation: overlaySlide 0.3s ease-out;
        }

        @keyframes overlaySlide { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .overlay-header {
            height: 75px; padding: 0 25px;
            display: flex; justify-content: space-between; align-items: center;
            background: var(--panel-bg); border-bottom: 2px solid rgba(255,255,255,0.05);
        }

        .settings-container { padding: 30px 20px; display: flex; flex-direction: column; gap: 20px; }

        .settings-btn {
            background: #2D2D3A; color: var(--text-light); border: 1px solid rgba(255,255,255,0.1);
            padding: 20px; border-radius: 18px; display: flex; align-items: center; gap: 15px;
            cursor: pointer; transition: 0.2s;
        }

        .settings-btn.danger { color: var(--danger-red); border-color: rgba(255,107,107,0.3); }

        .notebook-content {
            flex: 1; overflow-y: auto; padding: 15px;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
            align-content: start;
        }

        /* 卡片精化樣式 */
        .slot {
            aspect-ratio: 1 / 1.3; background: rgba(255, 255, 255, 0.02);
            border-radius: 12px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; position: relative;
            border: 1px dashed rgba(255, 255, 255, 0.1); transition: all 0.2s;
            overflow: hidden;
        }
        .slot.unlocked { background: var(--panel-bg); border: 1.5px solid var(--accent-blue); box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; }
        .slot.rank-S { border-color: var(--rarity-s); box-shadow: 0 0 8px rgba(255,68,68,0.2); }
        .slot.rank-A { border-color: var(--rarity-a); box-shadow: 0 0 8px rgba(255,187,51,0.2); }
        .slot.rank-B { border-color: var(--rarity-b); }
        .slot.rank-C { border-color: var(--rarity-c); }

        .slot-rank-tag { position: absolute; top: 2px; right: 4px; font-size: 0.6em; font-weight: 900; font-style: italic; opacity: 0.6; }
        .slot-name { font-size: 0.65em; margin-top: 5px; text-align: center; padding: 0 2px; line-height: 1.2; color: var(--text-light); }
        .slot-icon { font-size: 1.4em; }

        /* 背包分頁 */
        .tab-bar {
            display: flex; background: #2D2D3A; padding: 5px;
            gap: 5px; margin: 15px 20px 0; border-radius: 12px;
        }

        .tab-item {
            flex: 1; padding: 10px; text-align: center; border-radius: 8px;
            font-weight: bold; font-size: 0.9em; color: #888; cursor: pointer;
        }

        .tab-item.active { background: var(--morandi-gold); color: #2D2D3A; }

        #toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85); color: white; padding: 15px 30px;
            border-radius: 30px; z-index: 2000; display: none; pointer-events: none;
        }

        ::-webkit-scrollbar { width: 0; }
        /* 選單與卡片系統：統一圖鑑與背包的網格 */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 1000; display: none; flex-direction: column; }
        .overlay-header { height: 75px; padding: 0 25px; display: flex; justify-content: space-between; align-items: center; background: var(--panel-bg); }
        .notebook-content { flex: 1; overflow-y: auto; padding: 15px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; align-content: start; }
        
        /* 背包(格子)與稱號(圖鑑)卡片通用樣式 */
        .slot { aspect-ratio: 1/1.3; background: rgba(255,255,255,0.03); border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px solid rgba(255,255,255,0.1); position: relative; overflow: hidden; transition: 0.2s; }
        .slot.unlocked { background: var(--panel-bg); border: 1.5px solid var(--accent-blue); box-shadow: 0 4px 10px rgba(0,0,0,0.3); color: var(--text-light); cursor: pointer; }
        .slot-name { font-size: 0.6em; text-align: center; margin-top: 4px; padding: 0 2px; line-height: 1.2; }
    </style>
    
</head>
<body>

    <canvas id="magic-canvas"></canvas>
    <div id="toast">已儲存</div>

    <div id="fixed-header">
        <div class="status-container">
            <div class="stat-box">⚡ 體力: <span style="color:var(--morandi-green)">無限</span></div>
            <div class="stat-box">💰 金幣: <span id="gold-val" style="color:var(--dice-yellow)">1000</span></div>
        </div>
        <div class="game-title">阿毛之塔</div>
    </div>

    <div id="main-scroll-area">
        <div id="stage-view">
            <div class="floor-indicator" id="bg-floor">0001</div>
            <div class="amao-container">
                <div class="amao-main-sprite" id="amao-sprite" onclick="amaoJump()">🐶</div>
                <div class="amao-title-label" id="current-title">【新手爬塔狗】</div>
            </div>
        </div>
        <div id="game-log-list"></div>
    </div>

    <div id="fixed-footer">
        <button class="dice-button" id="btn-roll">🎲 投擲命運之骰</button>
        <div class="bottom-nav">
            <div class="nav-item" onclick="openMenu('settings')">⚙️</div>
            <div class="nav-item" onclick="openMenu('titles')">🏅</div>
            <div class="nav-item" onclick="openMenu('bag')">🎒</div>
            <div class="nav-item" onclick="openMenu('shop')">🛒</div>
        </div>
    </div>

    <div id="menu-overlay" class="overlay">
        <div class="overlay-header">
            <h2 id="menu-title">選單</h2>
            <div onclick="closeMenu()" style="font-size: 2.5em; cursor: pointer;">✕</div>
        </div>
        
        <div id="bag-tabs" class="tab-bar" style="display:none;">
            <div class="tab-item active" id="tab-food" onclick="switchBagTab('food')">🍱 美食</div>
            <div class="tab-item" id="tab-items" onclick="switchBagTab('items')">🎁 物品</div>
        </div>

        <div id="menu-content" class="notebook-content"></div>
    </div>

<script>
    /* --- 1. 遊戲資料 --- */
    let G = {
        floor: 1, gold: 1000, currentTitle: "新手爬塔狗",
        titles: [0], inventory: { food: [], items: [] }, currentBagTab: 'food'
    };

    // 稱號資料庫
    const TITLE_DB = [
        { id: 0, name: "新手爬塔狗", rank: "C" },
        { id: 1, name: "胃袋的魔術師", rank: "B" },
        { id: 2, name: "藍莓果茶中毒者", rank: "S" },
        { id: 3, name: "全能住宅改造王", rank: "A" },
        { id: 4, name: "黃金尿尿小童", rank: "S" }
    ];
    // 補足預留稱號至 20 個作為展示
    for(let i=5; i<20; i++) TITLE_DB.push({ id: i, name: `封印稱號 #${i}`, rank: i%3==0?'A':'B' });

    window.onload = () => {
        loadGame();
        initParticles();
        addLog("🔮", "「阿毛之塔」大門開啟！目標 9,999 層！");
        updateUI();
        document.getElementById('btn-roll').onclick = handleRoll;
    };

    /* --- 2. 選單與渲染 --- */
    function openMenu(type) {
        const overlay = document.getElementById('menu-overlay');
        const title = document.getElementById('menu-title');
        const content = document.getElementById('menu-content');
        const tabs = document.getElementById('bag-tabs');
        
        overlay.style.display = 'flex';
        tabs.style.display = (type === 'bag') ? 'flex' : 'none';

        if (type === 'settings') {
            title.innerText = "⚙️ 冒險設定";
            content.style.display = 'block'; 
            renderSettings();
        } else {
            content.style.display = 'grid'; 
            if (type === 'titles') {
                title.innerText = "🏅 稱號筆記本";
                renderTitles();
            } else if (type === 'bag') {
                title.innerText = "🎒 阿毛的口袋";
                renderBag();
            } else {
                title.innerText = "🛒 商店";
                content.innerHTML = '<p style="grid-column:span 4; text-align:center; padding:50px; opacity:0.3;">尚未營業</p>';
            }
        }
    }

    function renderTitles() {
        const c = document.getElementById('menu-content'); c.innerHTML = '';
        TITLE_DB.forEach(t => {
            const isOwn = G.titles.includes(t.id);
            const slot = document.createElement('div');
            slot.className = `slot ${isOwn ? 'unlocked rank-' + t.rank : ''}`;
            slot.innerHTML = `
                ${isOwn ? `<div class="slot-rank-tag">${t.rank}</div>` : ''}
                <div class="slot-icon">${isOwn ? '🏅' : '🔒'}</div>
                <div class="slot-name">${isOwn ? t.name : '???'}</div>
            `;
            if(isOwn) {
                slot.onclick = () => { G.currentTitle = t.name; updateUI(); showToast(`已裝備：${t.name}`); };
            }
            c.appendChild(slot);
        });
    }

    function renderSettings() {
        document.getElementById('menu-content').innerHTML = `
            <div class="settings-container">
                <div class="settings-btn" onclick="saveGame()">💾 <span>保存目前進度</span></div>
                <div class="settings-btn danger" onclick="resetToFloorOne()">⏳ <span>回到 1 樓 (保留物品)</span></div>
            </div>
        `;
    }

    /* --- 3. 核心系統 --- */
    function handleRoll() {
        const btn = document.getElementById('btn-roll');
        if(btn.disabled) return;
        btn.disabled = true; amaoJump();
        let count = 0;
        const timer = setInterval(() => {
            btn.innerText = ['⚀','⚁','⚂','⚃','⚄','⚅'][Math.floor(Math.random()*6)];
            if(count++ > 10) {
                clearInterval(timer);
                const move = Math.floor(Math.random() * 6) + 1;
                G.floor += move;
                // 隨機獲得稱號測試
                if(Math.random() > 0.8 && G.titles.length < TITLE_DB.length) {
                    let nextId = G.titles.length;
                    G.titles.push(nextId);
                    addLog("🏅", `獲得新稱號：【${TITLE_DB[nextId].name}】`);
                }
                btn.innerText = "🎲 投擲命運之骰";
                addLog("🎲", `前進了 ${move} 層。`);
                updateUI(); btn.disabled = false;
            }
        }, 60);
    }

    function saveGame() { localStorage.setItem('amao_tower_save', JSON.stringify(G)); showToast("💾 已存檔"); }
    function loadGame() { const saved = localStorage.getItem('amao_tower_save'); if(saved) G = JSON.parse(saved); }
    function resetToFloorOne() { if(confirm("回 1 樓嗎？")) { G.floor = 1; updateUI(); closeMenu(); saveGame(); } }
    function updateUI() {
        document.getElementById('bg-floor').innerText = G.floor.toString().padStart(4, '0');
        document.getElementById('gold-val').innerText = G.gold;
        document.getElementById('current-title').innerText = `【${G.currentTitle}】`;
    }
    function addLog(icon, txt) {
        const list = document.getElementById('game-log-list');
        const div = document.createElement('div');
        div.className = 'log-entry';
        div.innerHTML = `<div>${icon}</div><div>${txt} (目前:${G.floor}F)</div>`;
        list.insertBefore(div, list.firstChild);
        if(list.children.length > 15) list.lastChild.remove();
    }
    function amaoJump() {
        const s = document.getElementById('amao-sprite');
        s.style.transform = "translateY(-40px) scale(1.1)";
        setTimeout(() => s.style.transform = "translateY(0) scale(1)", 300);
    }
    function closeMenu() { document.getElementById('menu-overlay').style.display = 'none'; }
    function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 1200); }

    function initParticles() {
        const c = document.getElementById('magic-canvas'); const ctx = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        let p = Array(30).fill().map(() => ({ x: Math.random()*c.width, y: Math.random()*c.height, v: Math.random()*0.5+0.2 }));
        function anim() {
            ctx.clearRect(0,0,c.width,c.height); ctx.fillStyle = "#EAC4D5";
            p.forEach(i => { i.y -= i.v; if(i.y < -10) i.y = c.height+10; ctx.beginPath(); ctx.arc(i.x, i.y, 1.5, 0, Math.PI*2); ctx.fill(); });
            requestAnimationFrame(anim);
        }
        anim();
    }
</script><script>
/**
 * 阿毛之塔 - 核心引擎 3.0 (整合版)
 * 特色：
 * 1. 美食放入「背包」：隨機組合出數百種料理，可消耗吃掉。
 * 2. 稱號放入「圖鑑」：150 格精緻卡片式網格。
 * 3. 視覺連動：骰子動畫與阿毛跳動同步。
 */

const GameDB = {
    MAX_TITLE: 150,
    MAX_FOOD_SLOTS: 16, // 背包預設顯示格子數
    
    // 你的 300 種美食命名引擎
    foodPrefix: ["香氣四溢的", "極致濃郁的", "灑滿蔥花的", "黃金比例的", "來自地獄的", "媽媽特製的", "路邊撿到的", "奶奶特傳的", "夢幻莫蘭迪色的", "超音速生成的", "罪惡感爆表的", "蒜泥狠的", "讓人流口水的", "焦糖琥珀色的", "苦中帶甜的", "冰鎮極品的"],
    foodMiddle: ["爆發性", "口感滑順", "現炸酥脆", "慢火細熬", "七彩噴發", "Q彈有勁", "香煎熟成", "外酥內嫩", "鮮甜多汁", "微苦甘醇", "冰封後的", "剛出爐的", "文火慢燉", "大火快炒"],
    foodSuffix: ["豬排大餐", "伯爵紅茶", "藍莓果茶", "炒飯", "鹹稀飯", "現包水餃", "能量飲料", "大骨棒", "手作肉餅", "厚片土司", "義大利麵", "濃厚拉麵", "脆皮泡芙", "舒芙蕾", "雞腿堡", "布丁", "三明治"],
    
    getEmoji(name) {
        if (name.includes("茶") || name.includes("飲") || name.includes("奶")) return "🍵";
        if (name.includes("飯") || name.includes("粥")) return "🍚";
        if (name.includes("麵")) return "🍜";
        if (name.includes("排") || name.includes("肉") || name.includes("骨")) return "🍖";
        if (name.includes("水餃") || name.includes("煮")) return "🥟";
        if (name.includes("甜") || name.includes("堡") || name.includes("餅") || name.includes("芙") || name.includes("丁")) return "🍰";
        return "🍱";
    }
};

const AmaoGame = {
    myBackpack: [],      // 儲存撿到的美食
    titleNotebook: [],   // 儲存 150 個稱號圖鑑
    floor: 1,
    stats: { gold: 1000, title: '新手爬塔狗' },

    init() {
        this.generateTitles();
        this.load();
        this.refreshUI();
        if(typeof initParticles === 'function') initParticles(); // 如果有背景粒子則啟動
    },

    // 初始化稱號圖鑑 (150格)
    generateTitles() {
        this.titleNotebook = [];
        for(let i=0; i < GameDB.MAX_TITLE; i++) {
            this.titleNotebook.push({ 
                id: i, 
                name: i === 0 ? '新手爬塔狗' : '未知的傳說', 
                unlocked: i === 0 
            });
        }
    },

    // 投擲骰子邏輯
    roll() {
        const btn = document.querySelector('.dice-button');
        if(btn.disabled) return;
        btn.disabled = true;
        
        const sprite = document.getElementById('amao-sprite');
        if(sprite) sprite.style.transform = "translateY(-40px) scale(1.1)";
        
        let count = 0;
        const rollEffect = setInterval(() => {
            btn.innerText = ['⚀','⚁','⚂','⚃','⚄','⚅'][Math.floor(Math.random()*6)];
            if(count++ > 10) {
                clearInterval(rollEffect);
                if(sprite) sprite.style.transform = "translateY(0) scale(1)";
                
                const step = Math.floor(Math.random() * 6) + 1;
                this.floor += step;
                
                let logIcon = "🎲";
                let logText = `前進了 ${step} 層，來到 ${this.floor}F。`;
                
                // 30% 機率撿到美食
                if(Math.random() > 0.7) {
                    const fn = GameDB.foodPrefix[Math.floor(Math.random()*GameDB.foodPrefix.length)] + 
                               GameDB.foodMiddle[Math.floor(Math.random()*GameDB.foodMiddle.length)] + 
                               GameDB.foodSuffix[Math.floor(Math.random()*GameDB.foodSuffix.length)];
                    const fe = GameDB.getEmoji(fn);
                    
                    this.myBackpack.push({ name: fn, emoji: fe });
                    logIcon = fe;
                    logText += ` 撿到了 <span style="color:var(--morandi-gold)">${fn}</span>！`;
                    
                    // 隨機解鎖一個新稱號 (作為獎勵測試)
                    if(Math.random() > 0.5) {
                        let lockList = this.titleNotebook.filter(t => !t.unlocked);
                        if(lockList.length > 0) {
                            let luckyT = lockList[Math.floor(Math.random()*lockList.length)];
                            luckyT.unlocked = true;
                            luckyT.name = "塔之食客";
                        }
                    }
                }

                this.addLog(logIcon, logText);
                btn.innerText = "🎲 投擲命運之骰";
                btn.disabled = false;
                this.save();
                this.refreshUI();
            }
        }, 60);
    },

    addLog(icon, text) {
        const list = document.getElementById('game-log-list');
        if(!list) return;
        const e = document.createElement('div');
        e.className = 'log-entry';
        e.innerHTML = `<div>${icon}</div><div>${text}</div>`;
        list.insertBefore(e, list.firstChild);
        if(list.children.length > 15) list.lastChild.remove();
    },

    refreshUI() {
        const f = document.getElementById('bg-floor');
        const g = document.getElementById('gold-val');
        const t = document.getElementById('current-title');
        if(f) f.innerText = this.floor.toString().padStart(4, '0');
        if(g) g.innerText = this.stats.gold;
        if(t) t.innerText = `【${this.stats.title}】`;
    },

    save() {
        localStorage.setItem('AmaoSave_V3_Final', JSON.stringify({
            floor: this.floor,
            backpack: this.myBackpack,
            titles: this.titleNotebook,
            stats: this.stats
        }));
    },

    load() {
        const saved = localStorage.getItem('AmaoSave_V3_Final');
        if(saved) {
            try {
                const d = JSON.parse(saved);
                this.floor = d.floor || 1;
                this.myBackpack = d.backpack || [];
                this.titleNotebook = d.titles || this.titleNotebook;
                this.stats = d.stats || { gold: 1000, title: '新手爬塔狗' };
            } catch(e) { console.error("存檔讀取失敗"); }
        }
    }
};

/* --- UI 互動控制 --- */
window.handleRoll = () => AmaoGame.roll();
window.closeMenu = () => { 
    document.getElementById('menu-overlay').style.display = 'none'; 
};

window.openMenu = (type) => {
    const ov = document.getElementById('menu-overlay');
    const ct = document.getElementById('menu-content');
    const tt = document.getElementById('menu-title');
    if(!ov || !ct) return;

    ct.innerHTML = ''; 
    ct.style.display = 'grid'; // 確保使用網格佈局
    ov.style.display = 'flex';

    if(type === 'food') {
        tt.innerText = `🎒 阿毛的口袋 (${AmaoGame.myBackpack.length})`;
        // 渲染背包物品
        AmaoGame.myBackpack.forEach((item, index) => {
            const slot = document.createElement('div');
            slot.className = 'slot unlocked';
            slot.innerHTML = `<div style="font-size:1.5em">${item.emoji}</div><div class="slot-name">${item.name.substring(0,4)}...</div>`;
            slot.onclick = () => {
                if(confirm(`要吃掉「${item.name}」嗎？`)) {
                    AmaoGame.myBackpack.splice(index, 1);
                    AmaoGame.save();
                    if(typeof showToast === 'function') showToast("真香！");
                    openMenu('food'); // 重新渲染背包
                }
            };
            ct.appendChild(slot);
        });
        // 補滿空的格子 (顯示至少 16 格)
        const emptyCount = Math.max(0, GameDB.MAX_FOOD_SLOTS - AmaoGame.myBackpack.length);
        for(let i=0; i < emptyCount; i++) {
            const emptySlot = document.createElement('div');
            emptySlot.className = 'slot';
            ct.appendChild(emptySlot);
        }
    } else if(type === 'title') {
        let count = AmaoGame.titleNotebook.filter(t => t.unlocked).length;
        tt.innerText = `🏅 稱號圖鑑 (${count}/150)`;
        AmaoGame.titleNotebook.forEach(title => {
            const slot = document.createElement('div');
            slot.className = 'slot' + (title.unlocked ? ' unlocked' : '');
            slot.innerHTML = `
                <div style="font-size:1.2em">${title.unlocked ? '🏅' : '🔒'}</div>
                <div class="slot-name">${title.unlocked ? title.name : '???'}</div>
            `;
            if(title.unlocked) {
                slot.onclick = () => {
                    AmaoGame.stats.title = title.name;
                    AmaoGame.refreshUI();
                    AmaoGame.save();
                    if(typeof showToast === 'function') showToast(`裝備：${title.name}`);
                };
            }
            ct.appendChild(slot);
        });
    } else if(type === 'settings') {
        tt.innerText = '⚙️ 冒險設定';
        ct.style.display = 'block';
        ct.innerHTML = `
            <div style="padding:20px; display:flex; flex-direction:column; gap:15px;">
                <button onclick="AmaoGame.save(); alert('存檔成功！')" style="width:100%; padding:15px; border-radius:12px; background:#2D2D3A; color:white; border:1px solid #444;">💾 手動存檔</button>
                <button onclick="if(confirm('確定要清除所有回憶嗎？')){localStorage.clear(); location.reload();}" style="width:100%; padding:15px; border-radius:12px; background:#FF6B6B; color:white; border:none;">🔥 重置遊戲</button>
            </div>
        `;
    }
};

// 初始化啟動
AmaoGame.init();
</script>
