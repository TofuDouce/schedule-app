<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿毛之塔</title>
    <style>
        /* --- 莫蘭迪深色調系統 --- */
        :root {
            --bg-dark: #1A1A22;        
            --panel-bg: #252533;      
            --morandi-green: #B4C6A6; 
            --morandi-gold: #EAC4D5;  
            --text-light: #E0E0E0;
            --accent-blue: #A3B1C6;
            --dice-yellow: #FFE082;
            --header-height: 80px;
            --footer-height: 160px; 
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0; padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        /* --- 1. 固定頂部 --- */
        #fixed-header {
            height: var(--header-height);
            background: rgba(26, 26, 34, 0.95);
            border-bottom: 1px solid #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 100;
            flex-shrink: 0;
        }

        .status-row {
            display: flex;
            justify-content: space-around;
            padding: 5px 10px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .game-title {
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
            letter-spacing: 3px;
            color: var(--morandi-gold);
            text-shadow: 0 0 10px rgba(234, 196, 213, 0.3);
        }

        /* --- 2. 中間滑動冒險區 --- */
        #main-scroll-area {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding-bottom: 20px;
            scroll-behavior: smooth;
        }

        #stage-view {
            height: 240px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            flex-shrink: 0;
            background: radial-gradient(circle, rgba(163,177,198,0.1) 0%, rgba(26,26,34,0) 70%);
        }

        .floor-indicator {
            position: absolute;
            font-size: 5.5em;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03);
            z-index: 0;
            font-style: italic;
        }

        .amao-main-sprite { 
            font-size: 85px; 
            z-index: 1; 
            margin-bottom: 12px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .amao-title-label {
            background: var(--morandi-gold);
            color: #2D2D3A;
            padding: 4px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
            z-index: 1;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }

        #game-log-list {
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .log-entry {
            background: var(--panel-bg);
            padding: 14px;
            border-radius: 12px;
            border-left: 5px solid var(--accent-blue);
            display: flex;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .log-icon { font-size: 1.2em; }
        .log-content { font-size: 1em; line-height: 1.5; color: var(--text-light); }
        .highlight-text { color: var(--dice-yellow); font-weight: bold; }

        /* --- 3. 固定底部控制列 --- */
        #fixed-footer {
            height: var(--footer-height);
            background: rgba(26, 26, 34, 0.98);
            border-top: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 12px 18px;
            z-index: 100;
            flex-shrink: 0;
        }

        .dice-button {
            background-color: var(--dice-yellow);
            color: #333;
            border: none;
            border-radius: 15px;
            width: 100%;
            height: 65px;
            font-size: 1.2em;
            font-weight: 800;
            box-shadow: 0 5px 0 #D4A017;
            margin-bottom: 18px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            transition: all 0.1s;
        }

        .dice-button:active { 
            transform: translateY(3px); 
            box-shadow: 0 2px 0 #D4A017; 
        }

        .bottom-nav {
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }

        .nav-item {
            flex: 1;
            background: #333344;
            height: 55px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.6em;
            cursor: pointer;
        }
        .nav-item:active { background: var(--morandi-green); transform: scale(0.95); }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            z-index: 200;
            display: none;
            flex-direction: column;
        }

        .overlay-header {
            height: 70px;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #444;
        }

        .notebook-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .item-slot {
            aspect-ratio: 1;
            background: #252533;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.85em;
            color: #555;
            border: 1px solid #333;
        }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <div id="fixed-header">
        <div class="status-row">
            <span>⚡ 體力: 無限</span>
            <span>💰 金幣: <span id="gold-val">1000</span></span>
        </div>
        <div class="game-title">阿毛之塔</div>
    </div>

    <div id="main-scroll-area">
        <div id="stage-view">
            <div class="floor-indicator" id="bg-floor">0001</div>
            <div class="amao-main-sprite" id="amao-sprite">🐶</div>
            <div class="amao-title-label" id="current-title">【新手爬塔狗】</div>
        </div>

        <div id="game-log-list">
            <div class="log-entry">
                <div class="log-icon">🔮</div>
                <div class="log-content">阿毛感受到塔頂傳來一股強大的魔力... 傳說抵達 9,999 樓就能實現心中的那個願望。</div>
            </div>
        </div>
    </div>

    <div id="fixed-footer">
        <button class="dice-button" onclick="handleRoll()">
            <span>🎲</span> 投擲命運之骰
        </button>
        
        <div class="bottom-nav">
            <div class="nav-item" onclick="openMenu('food')">🍱</div>
            <div class="nav-item" onclick="openMenu('title')">🏅</div>
            <div class="nav-item" onclick="openMenu('bag')">🎒</div>
            <div class="nav-item" onclick="openMenu('shop')">🛒</div>
        </div>
    </div>

    <div id="menu-overlay" class="overlay">
        <div class="overlay-header">
            <h2 id="menu-title">筆記本</h2>
            <div onclick="closeMenu()" style="font-size: 1.8em; padding: 10px; cursor: pointer;">✕</div>
        </div>
        <div id="menu-content" class="notebook-content">
        </div>
    </div>

<script>
    let floor = 1;

    function handleRoll() {
        const amao = document.getElementById('amao-sprite');
        amao.style.transform = "scale(1.2) translateY(-20px)";
        
        setTimeout(() => {
            const step = Math.floor(Math.random() * 6) + 1;
            floor += step;
            amao.style.transform = "scale(1) translateY(0)";
            document.getElementById('bg-floor').innerText = floor.toString().padStart(4, '0');
            
            const logList = document.getElementById('game-log-list');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `
                <div class="log-icon">✨</div>
                <div class="log-content">阿毛使出了中二的衝刺步，前進了 <span class="highlight-text">${step}</span> 層。目前位於 <span class="highlight-text">${floor}F</span>。</div>
            `;
            logList.insertBefore(entry, logList.firstChild);
        }, 150);
    }

    function openMenu(type) {
        const overlay = document.getElementById('menu-overlay');
        const content = document.getElementById('menu-content');
        const title = document.getElementById('menu-title');
        content.innerHTML = ''; 
        overlay.style.display = 'flex';

        if(type === 'food') {
            title.innerText = '🍱 美食收藏 (0/300)';
            for(let i=1; i<=300; i++) {
                let slot = document.createElement('div');
                slot.className = 'item-slot';
                slot.innerText = '???';
                content.appendChild(slot);
            }
        } else if(type === 'title') {
            title.innerText = '🏅 稱號成就 (0/150)';
            for(let i=1; i<=150; i++) {
                let slot = document.createElement('div');
                slot.className = 'item-slot';
                slot.innerText = '鎖定';
                content.appendChild(slot);
            }
        } else {
            title.innerText = '系統訊息';
            content.innerHTML = '<p style="grid-column: span 4; text-align:center; padding: 20px; color: #777;">前方似乎有股神秘的力量擋住了背包...</p>';
        }
    }

    function closeMenu() {
        document.getElementById('menu-overlay').style.display = 'none';
    }
</script>
<script>
/**
 * 阿毛之塔 - 核心引擎 2.2
 * 修正 undefined 錯誤並強制清理舊快取
 */

// [強制清理] 如果發現舊資料導致錯誤，自動重置
if (localStorage.getItem('AmaoSave') && !localStorage.getItem('AmaoSave').includes('emoji')) {
    localStorage.removeItem('AmaoSave');
}

const GameDB = {
    foodPrefix: ["香氣四溢的", "極致濃郁的", "灑滿蔥花的", "黃金比例的", "來自地獄的", "媽媽特製的", "滷滷米達嫌棄過的", "南瓜老闆激推的", "充滿魔法氣息的", "散發銀紫光芒的", "路邊撿到的", "奶奶特傳的", "夢幻莫蘭迪色的", "超音速生成的", "罪惡感爆表的", "蒜泥狠的", "讓人流口水的", "焦糖琥珀色的", "苦中帶甜的", "冰鎮極品的"],
    foodMiddle: ["爆發性", "口感滑順", "現炸酥脆", "慢火細熬", "七彩噴發", "Q彈有勁", "香煎熟成", "外酥內嫩", "鮮甜多汁", "微苦甘醇", "冰封後的", "剛出爐的", "文火慢燉", "大火快炒", "魔法加持", "中二魂注入", "極致壓縮", "層層堆疊", "五味雜陳", "鮮味濃縮"],
    foodSuffix: ["豬排大餐", "伯爵紅茶", "藍莓果茶", "炒飯", "鹹稀飯", "現包水餃", "能量飲料", "烤肉拼盤", "牛奶火鍋", "厚片土司", "義大利麵", "濃厚拉麵", "脆皮泡芙", "舒芙蕾", "雞腿堡", "布丁", "三明治", "夏威夷披薩", "關東煮", "炸魚薯條"],
    
    getEmoji(name) {
        if (name.includes("茶") || name.includes("奶")) return "🍵";
        if (name.includes("飯") || name.includes("粥")) return "🍚";
        if (name.includes("麵")) return "🍜";
        if (name.includes("排") || name.includes("肉") || name.includes("骨")) return "🍖";
        if (name.includes("水餃") || name.includes("煮")) return "🥟";
        if (name.includes("甜") || name.includes("堡") || name.includes("餅") || name.includes("芙")) return "🍰";
        if (name.includes("飲")) return "🥤";
        return "🍱";
    }
};

const AmaoGame = {
    foodNotebook: [],
    titleNotebook: [],
    floor: 1,
    stats: { hp: 100, gold: 1000, title: '新手爬塔狗' },

    init() {
        this.generateFood();
        this.generateTitles();
        this.load();
        this.refreshUI();
        
        // 強制移除畫面上可能殘留的「測試」字眼
        const btn = document.querySelector('.dice-button');
        if(btn) btn.innerHTML = '<span>🎲</span> 投擲命運之骰';
        const titleLabel = document.getElementById('current-title');
        if(titleLabel && titleLabel.innerText.includes('測試')) titleLabel.innerText = '【新手爬塔狗】';
    },

    generateFood() {
        const special = [
            { name: "奶奶煮的炒飯", desc: "阿嬤怕妳餓的魔力。HP+5", consumed: false, emoji: "🍚" },
            { name: "爺爺的鹹稀飯", desc: "充滿家的味道。MP+5", consumed: false, emoji: "🥣" },
            { name: "禮拜三的水餃", desc: "週三限定美食。恢復HP", consumed: false, emoji: "🥟" },
            { name: "伯爵紅茶", desc: "鮮茶道招牌。精神百倍", consumed: false, emoji: "🍵" },
            { name: "藍莓果茶", desc: "酸甜魔法味。恢復MP", consumed: false, emoji: "🍹" }
        ];
        this.foodNotebook = [...special];
        for(let i=special.length; i<300; i++) {
            let p = GameDB.foodPrefix[Math.floor(Math.random()*20)];
            let m = GameDB.foodMiddle[Math.floor(Math.random()*20)];
            let s = GameDB.foodSuffix[Math.floor(Math.random()*20)];
            let fullName = p+m+s;
            this.foodNotebook.push({ 
                name: fullName, 
                desc: "隨機生成的塔內美食。", 
                consumed: false,
                emoji: GameDB.getEmoji(fullName)
            });
        }
    },

    generateTitles() {
        this.titleNotebook = [];
        for(let i=0; i<150; i++) {
            this.titleNotebook.push({ id: i+1, rank: 'C', name: i===0 ? '新手爬塔狗' : '未知的傳說', desc: '繼續探索以解鎖。', unlocked: i===0 });
        }
    },

    roll() {
        const step = Math.floor(Math.random() * 6) + 1;
        this.floor += step;
        document.getElementById('bg-floor').innerText = this.floor.toString().padStart(4, '0');
        
        let logIcon = "✨";
        let logText = `擲出 ${step} 點！來到 <span class="highlight-text">${this.floor}F</span>。`;
        
        if(Math.random() > 0.6) {
            let fIdx = Math.floor(Math.random()*300);
            this.foodNotebook[fIdx].consumed = true;
            logIcon = this.foodNotebook[fIdx].emoji;
            logText += ` 意外獲得了 <span style="color:var(--morandi-green)">${this.foodNotebook[fIdx].name}</span>！`;
        }

        this.addLog(logIcon, logText);
        this.save();
    },

    addLog(icon, text) {
        const list = document.getElementById('game-log-list');
        const e = document.createElement('div');
        e.className = 'log-entry';
        e.innerHTML = `<div class="log-icon">${icon}</div><div class="log-content">${text}</div>`;
        list.insertBefore(e, list.firstChild);
    },

    refreshUI() {
        const floorEl = document.getElementById('bg-floor');
        if(floorEl) floorEl.innerText = this.floor.toString().padStart(4, '0');
        const goldEl = document.getElementById('gold-val');
        if(goldEl) goldEl.innerText = this.stats.gold;
        const titleEl = document.getElementById('current-title');
        if(titleEl) titleEl.innerText = `【${this.stats.title}】`;
    },

    save() {
        localStorage.setItem('AmaoSave', JSON.stringify({
            floor: this.floor, food: this.foodNotebook, titles: this.titleNotebook, stats: this.stats
        }));
    },

    load() {
        const s = localStorage.getItem('AmaoSave');
        if(s) {
            try {
                const d = JSON.parse(s);
                if(d.food && d.food[0].emoji) { // 確保有 Emoji 才載入
                    this.floor = d.floor || 1;
                    this.foodNotebook = d.food;
                    this.titleNotebook = d.titles;
                    this.stats = d.stats;
                }
            } catch(e) { console.error("載入失敗，重置資料"); }
        }
    }
};

// 重新綁定所有視窗函數，確保覆蓋舊版
window.handleRoll = () => AmaoGame.roll();
window.closeMenu = () => { document.getElementById('menu-overlay').style.display = 'none'; };
window.openMenu = (type) => {
    const ov = document.getElementById('menu-overlay');
    const ct = document.getElementById('menu-content');
    const tt = document.getElementById('menu-title');
    ct.innerHTML = '';
    ov.style.display = 'flex';

    if(type === 'food') {
        let count = AmaoGame.foodNotebook.filter(f=>f.consumed).length;
        tt.innerText = `🍱 美食圖鑑 (${count}/300)`;
        AmaoGame.foodNotebook.forEach((f, i) => {
            let s = document.createElement('div');
            s.className = 'item-slot' + (f.consumed ? ' unlocked' : '');
            if(f.consumed) {
                s.style.background = 'var(--panel-bg)';
                s.style.border = '1px solid var(--morandi-green)';
                s.innerHTML = `<div style="font-size:1.5em">${f.emoji || '🍱'}</div><div style="font-size:0.6em;color:var(--text-light)">${f.name.substring(0,2)}</div>`;
                s.onclick = () => alert(`${f.emoji || '🍱'} 【${f.name}】\n${f.desc}`);
            } else {
                s.innerText = i + 1;
            }
            ct.appendChild(s);
        });
    } else if(type === 'title') {
        tt.innerText = '🏅 稱號紀錄 (150)';
        AmaoGame.titleNotebook.forEach(t => {
            let s = document.createElement('div');
            s.className = 'item-slot';
            s.innerText = t.unlocked ? t.name.substring(0, 2) : '???';
            ct.appendChild(s);
        });
    } else {
        tt.innerText = '背包系統';
        ct.innerHTML = '<p style="grid-column: span 4; text-align:center; padding: 20px;">目前背包內尚無物品。</p>';
    }
};

// 啟動引擎
AmaoGame.init();
</script>
</body>
</html>
