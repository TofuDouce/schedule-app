<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>✦ Daily Soft ✦</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg-base:#fff9f6;
    --bg-gradient:#ffebe3;

    --card-bg:#ffffff;

    --text-main:#54433a;
    --text-sub:#8e7a70;

    --gold:#f6c86c;
    --gold-hover:#efb94d;

    --pink:#f79999;

    --line:#eadfd8;
}

body{

    min-height:100vh;

    background:
    linear-gradient(
        180deg,
        var(--bg-base) 0%,
        var(--bg-gradient) 100%
    );

    font-family:
    "Zen Maru Gothic",
    "Quicksand",
    "Microsoft JhengHei",
    sans-serif;

    color:var(--text-main);

    padding:28px;

    position:relative;
}

/* border */

.decor-border{

    position:fixed;

    inset:12px;

    border:
    2px dashed rgba(142,122,112,0.15);

    border-radius:24px;

    pointer-events:none;
}

/* watermark */

.watermark{

    position:fixed;

    right:24px;
    bottom:24px;

    color:rgba(142,122,112,0.4);

    font-size:12px;

    letter-spacing:0.5px;

    pointer-events:none;
}

/* container */

.container{

    width:100%;

    max-width:1200px;

    margin:auto;

    position:relative;

    z-index:2;
}

/* hero */

.hero{

    text-align:center;

    margin-bottom:28px;
}

.badge{

    display:inline-block;

    background:
    rgba(246,200,108,0.18);

    color:#b57d18;

    padding:7px 16px;

    border-radius:999px;

    font-size:15px;

    font-weight:700;

    margin-bottom:14px;
}

.title{

    font-size:
    clamp(
        34px,
        5vw,
        50px
    );

    line-height:1.4;

    letter-spacing:1px;
}

.subtitle{

    margin-top:10px;

    color:var(--text-sub);

    font-size:16px;

    line-height:1.8;
}

/* layout */

.layout{

    display:grid;

    grid-template-columns:1fr;

    gap:24px;
}

@media(min-width:900px){

    .layout{

        grid-template-columns:
        1.2fr 0.8fr;
    }
}

/* card */

.card{

    background:var(--card-bg);

    border-radius:28px;

    border:
    1px solid rgba(142,122,112,0.1);

    padding:30px;

    box-shadow:
    0 10px 30px rgba(84,67,58,0.05);
}

/* title */

.section-title{

    font-size:24px;

    margin-bottom:18px;
}

.section-desc{

    color:var(--text-sub);

    line-height:1.8;

    margin-bottom:22px;
}

/* tabs */

.tabs{

    display:flex;

    gap:12px;

    overflow:auto;

    padding-bottom:10px;

    margin-bottom:22px;
}

.tab{

    border:none;

    min-width:140px;

    height:54px;

    border-radius:999px;

    background:white;

    border:
    1px solid rgba(142,122,112,0.18);

    color:var(--text-main);

    font-family:inherit;

    font-size:15px;

    font-weight:700;

    cursor:pointer;

    transition:.2s;

    flex-shrink:0;
}

.tab:hover{

    background:#fff4ec;
}

.tab.active{

    background:var(--gold);

    color:var(--text-main);
}

/* inputs */

.input-group{

    margin-bottom:18px;
}

.label{

    display:block;

    margin-bottom:8px;

    font-weight:700;

    font-size:16px;
}

.input{

    width:100%;

    padding:14px 16px;

    border-radius:16px;

    border:
    1.5px solid rgba(142,122,112,0.16);

    background:#fffbf9;

    color:var(--text-main);

    font-size:16px;

    font-family:inherit;
}

.input:focus{

    outline:none;

    border-color:var(--gold);

    background:white;

    box-shadow:
    0 0 0 4px rgba(246,200,108,0.2);
}

/* buttons */

.main-btn{

    width:100%;

    border:none;

    background:var(--gold);

    color:var(--text-main);

    padding:16px;

    border-radius:18px;

    cursor:pointer;

    font-family:inherit;

    font-size:17px;

    font-weight:700;

    margin-top:10px;

    box-shadow:
    0 6px 16px rgba(246,200,108,0.25);

    transition:.2s;
}

.main-btn:hover{

    background:var(--gold-hover);

    transform:translateY(-2px);
}

.secondary-btn{

    width:100%;

    border:none;

    background:#4d4038;

    color:white;

    padding:14px;

    border-radius:16px;

    cursor:pointer;

    font-family:inherit;

    font-size:15px;

    font-weight:700;

    margin-top:10px;
}

/* task section */

.task-grid{

    display:grid;

    grid-template-columns:
    repeat(
        auto-fit,
        minmax(180px,1fr)
    );

    gap:16px;
}

.task{

    background:#fffcfb;

    border:
    1px solid rgba(142,122,112,0.08);

    border-radius:20px;

    padding:20px;

    min-height:180px;

    display:flex;

    flex-direction:column;

    justify-content:space-between;

    transition:.2s;
}

.task.done{

    background:
    linear-gradient(
        180deg,
        #ffe8c3,
        #ffdca7
    );
}

.task-title{

    font-size:18px;

    font-weight:700;

    line-height:1.7;
}

.task-buttons{

    display:flex;

    gap:10px;

    margin-top:18px;
}

.icon-btn{

    flex:1;

    border:none;

    padding:12px;

    border-radius:14px;

    cursor:pointer;

    font-size:16px;

    font-family:inherit;

    transition:.2s;
}

.done-btn{

    background:white;

    color:#b57d18;

    border:
    1px solid rgba(246,200,108,.3);
}

.delete-btn{

    background:#fff1f1;

    color:#d17f7f;
}

.icon-btn:hover{

    transform:translateY(-1px);
}

/* board list */

.board-list{

    display:flex;

    flex-direction:column;

    gap:12px;

    margin-top:18px;
}

.board-item{

    background:#fffcfb;

    border:
    1px solid rgba(142,122,112,0.08);

    border-radius:16px;

    padding:16px 18px;
}

.board-item-title{

    font-weight:700;

    margin-bottom:6px;
}

.board-item-text{

    color:var(--text-sub);

    line-height:1.7;

    font-size:15px;
}

/* empty */

.empty{

    background:#fffaf7;

    border:
    1px dashed rgba(142,122,112,0.2);

    border-radius:18px;

    padding:40px;

    text-align:center;

    color:var(--text-sub);

    line-height:1.8;
}

/* footer */

.footer{

    text-align:center;

    margin-top:36px;

    color:var(--text-sub);

    font-size:14px;
}

.footer b{

    color:var(--pink);
}

@media(max-width:700px){

    body{
        padding:18px;
    }

    .card{
        padding:24px;
    }
}

</style>
</head>

<body>

<div class="decor-border"></div>

<div class="watermark">
    Made with pastel thoughts by <b>ChuChu</b> ✦
</div>

<div class="container">

    <!-- HERO -->

    <div class="hero">

        <div class="badge">
            Daily Soft Planner 🌸
        </div>

        <h1 class="title">
            今天的小任務
        </h1>

        <p class="subtitle">
            Clean · Gentle · Cozy · Minimal
        </p>

    </div>

    <div class="layout">

        <!-- LEFT -->

        <div class="card">

            <h2 class="section-title">
                任務管理 ✦
            </h2>

            <p class="section-desc">
                可以建立不同任務區塊、
                管理每日待辦事項、
                並保存你的生活計劃。
            </p>

            <!-- tabs -->

            <div
            class="tabs"
            id="tabs"
            ></div>

            <!-- add task -->

            <div class="input-group">

                <label class="label">
                    新增任務
                </label>

                <input
                id="taskInput"
                class="input"
                placeholder="輸入新的小任務..."
                >

            </div>

            <button
            class="main-btn"
            onclick="addTask()"
            >
                ✦ 新增任務 ✦
            </button>

            <!-- add board -->

            <div
            style="margin-top:26px;"
            class="input-group"
            >

                <label class="label">
                    新增任務區塊
                </label>

                <input
                id="boardInput"
                class="input"
                placeholder="例如：健身計劃"
                >

            </div>

            <button
            class="secondary-btn"
            onclick="addBoard()"
            >
                ＋ 新增任務區塊
            </button>

            <!-- task grid -->

            <div
            style="margin-top:28px;"
            id="taskArea"
            ></div>

        </div>

        <!-- RIGHT -->

        <div class="card">

            <h2 class="section-title">
                任務摘要
            </h2>

            <p class="section-desc">
                顯示目前任務區塊、
                完成狀態、
                與統計資訊。
            </p>

            <div class="board-list">

                <div class="board-item">

                    <div class="board-item-title">
                        目前區塊
                    </div>

                    <div
                    class="board-item-text"
                    id="currentBoardText"
                    >
                        每日任務
                    </div>

                </div>

                <div class="board-item">

                    <div class="board-item-title">
                        任務總數
                    </div>

                    <div
                    class="board-item-text"
                    id="taskCount"
                    >
                        0
                    </div>

                </div>

                <div class="board-item">

                    <div class="board-item-title">
                        已完成
                    </div>

                    <div
                    class="board-item-text"
                    id="doneCount"
                    >
                        0
                    </div>

                </div>

            </div>

        </div>

    </div>

    <div class="footer">

        <div>
            ✦ Daily Soft ✦
        </div>

        <div>
            Designed by <b>ChuChu</b> © 2026
        </div>

    </div>

</div>

<script>

/* boards */

let boards = {

    "每日任務":[

        {
            text:"喝6杯水",
            done:true
        },

        {
            text:"打掃臥室",
            done:false
        },

        {
            text:"閱讀30分鐘",
            done:false
        }
    ],

    "出遊計劃":[],

    "每月任務":[

        {
            text:"整理房間",
            done:false
        }
    ]
};

let currentBoard = "每日任務";

/* save */

function saveBoards(){

    localStorage.setItem(
        "dailysoft_boards_v2",
        JSON.stringify(boards)
    );
}

/* load */

function loadBoards(){

    const saved =
    localStorage.getItem(
        "dailysoft_boards_v2"
    );

    if(saved){

        boards = JSON.parse(saved);
    }
}

/* render tabs */

function renderTabs(){

    const tabs =
    document.getElementById("tabs");

    tabs.innerHTML = "";

    Object.keys(boards).forEach(name=>{

        const button =
        document.createElement("button");

        button.className =
        currentBoard === name
        ? "tab active"
        : "tab";

        button.innerText = name;

        button.onclick = ()=>{

            currentBoard = name;

            renderTabs();

            renderTasks();
        };

        tabs.appendChild(button);
    });
}

/* render tasks */

function renderTasks(){

    const area =
    document.getElementById("taskArea");

    area.innerHTML = "";

    const tasks =
    boards[currentBoard];

    document.getElementById(
        "currentBoardText"
    ).innerText =
    currentBoard;

    document.getElementById(
        "taskCount"
    ).innerText =
    tasks.length;

    document.getElementById(
        "doneCount"
    ).innerText =
    tasks.filter(
        t=>t.done
    ).length;

    if(tasks.length === 0){

        area.innerHTML =
        `
        <div class="empty">
            目前沒有任務 🌸
        </div>
        `;

        return;
    }

    const grid =
    document.createElement("div");

    grid.className =
    "task-grid";

    tasks.forEach((task,index)=>{

        const div =
        document.createElement("div");

        div.className =
        task.done
        ? "task done"
        : "task";

        div.innerHTML =

        `
        <div class="task-title">
            ${task.text}
        </div>

        <div class="task-buttons">

            <button
            class="icon-btn done-btn"
            onclick="toggleTask(${index})"
            >
                ✓ 完成
            </button>

            <button
            class="icon-btn delete-btn"
            onclick="deleteTask(${index})"
            >
                ✕ 刪除
            </button>

        </div>
        `;

        grid.appendChild(div);
    });

    area.appendChild(grid);
}

/* add task */

function addTask(){

    const input =
    document.getElementById(
        "taskInput"
    );

    const text =
    input.value.trim();

    if(!text){

        return;
    }

    boards[currentBoard].unshift({

        text:text,
        done:false
    });

    input.value = "";

    saveBoards();

    renderTasks();
}

/* add board */

function addBoard(){

    const input =
    document.getElementById(
        "boardInput"
    );

    const name =
    input.value.trim();

    if(!name){

        return;
    }

    if(boards[name]){

        alert("已經有這個任務區塊 ✨");

        return;
    }

    boards[name] = [];

    currentBoard = name;

    input.value = "";

    saveBoards();

    renderTabs();

    renderTasks();
}

/* toggle */

function toggleTask(index){

    boards[currentBoard][index].done =
    !boards[currentBoard][index].done;

    saveBoards();

    renderTasks();
}

/* delete */

function deleteTask(index){

    boards[currentBoard].splice(index,1);

    saveBoards();

    renderTasks();
}

/* enter */

document
.getElementById("taskInput")
.addEventListener(
"keydown",
function(e){

    if(e.key === "Enter"){

        addTask();
    }
});

document
.getElementById("boardInput")
.addEventListener(
"keydown",
function(e){

    if(e.key === "Enter"){

        addBoard();
    }
});

/* init */

loadBoards();

renderTabs();

renderTasks();

</script>

</body>
</html>
