<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light" data-size="m">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>額度結算 · 慵懶夢境</title>

<script>
  const CONFIG = {
    brandMain: "額度結算",
    brandSub:  "慵懶夢境",
    sessionHours: 5,
    storageKey: "claude_quota_v1"
  };
</script>

<style>
  /* [保持你原本的 CSS 不變，建議直接複製並將下方的 HTML/JS 替換即可] */
  :root[data-theme="light"]{ --bg:#f5efe4; --bg2:#faf6ee; --header:#2a2420; --header-text:#e9d9b6; --card:#fffdf8; --line:#ece2d0; --text:#4a4038; --muted:#9c8d7c; --gold:#b8924f; --gold-soft:#d9bd85; --accent:#c8a45c; --track:#ece2d0; --fill:#c8a45c; --fill2:#b8924f; --panel:#fbf6ec; --shadow:rgba(90,74,64,.14); }
  :root[data-theme="night"]{ --bg:#1a1714; --bg2:#211d19; --header:#100e0c; --header-text:#d8b878; --card:#262019; --line:#3a3128; --text:#ece0cf; --muted:#9a8a76; --gold:#d4af6a; --gold-soft:#bf9c5e; --accent:#d4af6a; --track:#3a3128; --fill:#d4af6a; --fill2:#c8a45c; --panel:#201b15; --shadow:rgba(0,0,0,.4); }
  :root[data-theme="vintage"]{ --bg:#e8ddc7; --bg2:#efe7d5; --header:#3a3324; --header-text:#e0cb9a; --card:#f3ecdb; --line:#d8cbb0; --text:#4a3f2f; --muted:#9b8a6e; --gold:#9c7b3f; --gold-soft:#bfa067; --accent:#a8824a; --track:#ddd0b3; --fill:#a8824a; --fill2:#9c7b3f; --panel:#efe6d0; --shadow:rgba(74,63,47,.18); }
  :root[data-size="s"]{ font-size:15px; } :root[data-size="m"]{ font-size:16.5px; } :root[data-size="l"]{ font-size:18.5px; }
  *{ box-sizing:border-box; margin:0; padding:0; } html,body{ height:100%; }
  body{ min-height:100svh; background:linear-gradient(165deg, var(--bg) 0%, var(--bg2) 100%); color:var(--text); font-family:"Noto Sans TC",sans-serif; padding-bottom:40px; }
  .topbar{ position:sticky; top:0; z-index:20; display:flex; align-items:center; justify-content:space-between; background:var(--header); color:var(--header-text); padding:16px 20px; box-shadow:0 2px 14px var(--shadow); }
  .brand{ display:flex; flex-direction:column; line-height:1.15; }
  .brand .main{ font-family:"Noto Serif TC",serif; font-weight:700; font-size:1.35rem; letter-spacing:3px; }
  .brand .sub{ font-size:.7rem; letter-spacing:4px; opacity:.7; }
  .gear{ width:42px; height:42px; border-radius:50%; border:1px solid rgba(233,217,182,.35); background:transparent; color:var(--header-text); cursor:pointer; }
  main{ max-width:560px; margin:0 auto; padding:24px 18px 0; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:24px; padding:26px 22px 22px; box-shadow:0 14px 36px var(--shadow); margin-bottom:22px; }
  .card-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .card-head h2{ font-family:"Noto Serif TC",serif; font-size:1.2rem; font-weight:700; color:var(--gold); }
  .badge{ font-size:.72rem; padding:4px 12px; border-radius:999px; background:var(--track); color:var(--muted); }
  .badge.on{ background:var(--gold-soft); color:#3a2f1e; }
  .time-display{ font-family:"Noto Serif TC",serif; font-size:2.3rem; font-weight:700; color:var(--text); margin:14px 0 4px; line-height:1.1; }
  .time-sub{ font-size:.92rem; color:var(--muted); }
  .bar{ height:9px; border-radius:999px; background:var(--track); margin:18px 0 4px; overflow:hidden; }
  .bar-fill{ height:100%; width:0%; background:linear-gradient(90deg, var(--fill), var(--fill2)); transition:width .6s ease; }
  .actions{ display:flex; gap:10px; margin-top:18px; }
  .pill{ border:none; border-radius:999px; cursor:pointer; font-size:.92rem; padding:11px 20px; transition:transform .12s; }
  .pill.primary{ background:var(--gold); color:#fff; }
  .pill.ghost{ background:transparent; color:var(--gold); border:1.5px solid var(--gold-soft); }
  .panel{ margin-top:16px; padding:16px; border-radius:16px; background:var(--panel); border:1px solid var(--line); }
  input[type="datetime-local"], input[type="number"]{ width:100%; padding:10px; border-radius:11px; border:1px solid var(--line); background:var(--card); color:var(--text); margin-top:6px; }
  .hint{ text-align:center; font-size:.78rem; color:var(--muted); margin-top:4px; }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="main" id="brandMain">額度結算</span>
    <span class="sub" id="brandSub">慵懶夢境</span>
  </div>
  <button class="gear" id="openSettings">⚙</button>
</header>

<main>
  <section class="card">
    <div class="card-head"><h2>當前 Session</h2><span class="badge" id="sessionBadge">尚未開始</span></div>
    <div class="time-display" id="sessionCountdown">--:--:--</div>
    <div class="time-sub" id="sessionEnd">送出第一則訊息後點擊「現在開始」</div>
    <div class="bar"><div class="bar-fill" id="sessionBar"></div></div>
    <div class="actions">
      <button class="pill primary" id="sessionNow">現在開始</button>
    </div>
  </section>

  <section class="card">
    <div class="card-head">
      <h2>下次重置</h2>
      <span class="badge" id="weekBadge">尚未設定</span>
    </div>
    <div class="time-display" id="weekTargetTime">--:--</div>
    <div class="time-sub" id="weekStatus">請設定預計重置的時間</div>
    <div class="bar"><div class="bar-fill" id="weekBar"></div></div>
    <div class="actions">
      <button class="pill primary" id="weekToggle">設定時間</button>
    </div>
    <div class="panel" id="weekPanel" hidden>
      <label>目標重置時間
        <input type="datetime-local" id="weekInput">
      </label>
      <div class="actions" style="margin-top:12px;">
        <button class="pill primary" id="weekApply">儲存</button>
        <button class="pill ghost" id="weekClear">清除</button>
      </div>
    </div>
  </section>
</main>

<script>
// (JS 部分核心邏輯)
const $ = id => document.getElementById(id);
let state = { weekReset: null, sessionStart: null, sessionHours: 5 };
try { state = Object.assign(state, JSON.parse(localStorage.getItem("claude_quota_v1"))); } catch(e){}

function render() {
  const now = Date.now();
  
  // 處理週用量顯示
  if(state.weekReset) {
    const d = new Date(state.weekReset);
    const timeStr = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    
    if(now >= state.weekReset) {
      $("weekTargetTime").textContent = "時間已到";
      $("weekStatus").textContent = "額度應已重置，請更新時間";
      $("weekBadge").textContent = "可重置";
      $("weekBadge").classList.add("on");
    } else {
      $("weekTargetTime").textContent = timeStr;
      $("weekStatus").textContent = `距離目標重置還剩 ${Math.floor((state.weekReset-now)/3600000)} 小時`;
      $("weekBadge").textContent = "倒數中";
      $("weekBadge").classList.add("on");
    }
  } else {
    $("weekTargetTime").textContent = "--:--";
    $("weekStatus").textContent = "請設定預計重置的時間";
    $("weekBadge").textContent = "尚未設定";
  }
}

$("weekToggle").onclick = () => $("weekPanel").hidden = !$("weekPanel").hidden;
$("weekApply").onclick = () => {
  const v = $("weekInput").value;
  if(!v) return;
  state.weekReset = new Date(v).getTime();
  localStorage.setItem("claude_quota_v1", JSON.stringify(state));
  $("weekPanel").hidden = true;
  render();
};
$("weekClear").onclick = () => {
  state.weekReset = null;
  localStorage.setItem("claude_quota_v1", JSON.stringify(state));
  render();
};

// 初始化
render();
setInterval(render, 10000); // 10秒更新一次即可
</script>
</body>
</html>
