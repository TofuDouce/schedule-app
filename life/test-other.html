<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>額度重置時間</title>
<style>
  body { font-family: sans-serif; background: #f5efe4; color: #4a4038; display: flex; justify-content: center; padding-top: 50px; }
  .card { background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); text-align: center; width: 300px; }
  .time-display { font-size: 2.5rem; font-weight: bold; color: #b8924f; margin: 20px 0; }
  .status { margin-bottom: 20px; font-weight: bold; }
  button { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; background: #b8924f; color: white; width: 100%; }
  input { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc; }
</style>
</head>
<body>

<div class="card">
  <h2>下次重置時間</h2>
  <div class="time-display" id="clock">--:--</div>
  <div class="status" id="status">尚未設定</div>
  
  <div id="panel" style="display:none;">
    <input type="datetime-local" id="timeInput">
    <button onclick="saveTime()">儲存時間</button>
  </div>
  <button id="toggleBtn" onclick="togglePanel()">設定重置時間</button>
</div>

<script>
  function update() {
    const saved = localStorage.getItem("resetTime");
    const status = document.getElementById("status");
    const clock = document.getElementById("clock");
    
    if (!saved) return;
    
    const resetTime = new Date(saved);
    const now = new Date();
    
    clock.innerText = `${String(resetTime.getHours()).padStart(2,'0')}:${String(resetTime.getMinutes()).padStart(2,'0')}`;
    
    if (now >= resetTime) {
      status.innerText = "時間已到，請去使用！";
      status.style.color = "red";
    } else {
      status.innerText = `預計於 ${resetTime.getMonth()+1}/${resetTime.getDate()} 重置`;
      status.style.color = "#4a4038";
    }
  }

  function togglePanel() {
    document.getElementById("panel").style.display = "block";
    document.getElementById("toggleBtn").style.display = "none";
  }

  function saveTime() {
    const val = document.getElementById("timeInput").value;
    if (val) {
      localStorage.setItem("resetTime", val);
      document.getElementById("panel").style.display = "none";
      document.getElementById("toggleBtn").style.display = "block";
      update();
    }
  }

  setInterval(update, 1000);
  update();
</script>
</body>
</html>
