<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light" data-size="m">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>額度結算 · 慵懶夢境</title>

<!-- ============================================================
     ★ 共用設定區 ★  要改的東西都集中在這裡
     ============================================================ -->
<script>
  const CONFIG = {
    brandMain: "額度結算",          // 主標題
    brandSub:  "慵懶夢境",          // 副標題
    sessionHours: 5,               // 一個 session 預設幾小時(可在設定裡改)
    storageKey: "claude_quota_v1"  // localStorage 命名空間
  };
</script>
<!-- ============================================================ -->

<style>
  /* ===== 主題色階(文庫:暖奶油金) ===== */
  :root[data-theme="light"]{
    --bg:#f5efe4; --bg2:#faf6ee; --header:#2a2420; --header-text:#e9d9b6;
    --card:#fffdf8; --line:#ece2d0; --text:#4a4038; --muted:#9c8d7c;
    --gold:#b8924f; --gold-soft:#d9bd85; --accent:#c8a45c;
    --track:#ece2d0; --fill:#c8a45c; --fill2:#b8924f;
    --panel:#fbf6ec; --shadow:rgba(90,74,64,.14);
  }
  :root[data-theme="night"]{
    --bg:#1a1714; --bg2:#211d19; --header:#100e0c; --header-text:#d8b878;
    --card:#262019; --line:#3a3128; --text:#ece0cf; --muted:#9a8a76;
    --gold:#d4af6a; --gold-soft:#bf9c5e; --accent:#d4af6a;
    --track:#3a3128; --fill:#d4af6a; --fill2:#c8a45c;
    --panel:#201b15; --shadow:rgba(0,0,0,.4);
  }
  :root[data-theme="vintage"]{
    --bg:#e8ddc7; --bg2:#efe7d5; --header:#3a3324; --header-text:#e0cb9a;
    --card:#f3ecdb; --line:#d8cbb0; --text:#4a3f2f; --muted:#9b8a6e;
    --gold:#9c7b3f; --gold-soft:#bfa067; --accent:#a8824a;
    --track:#ddd0b3; --fill:#a8824a; --fill2:#9c7b3f;
    --panel:#efe6d0; --shadow:rgba(74,63,47,.18);
  }

  /* ===== 字級 ===== */
  :root[data-size="s"]{ font-size:15px; }
  :root[data-size="m"]{ font-size:16.5px; }
  :root[data-size="l"]{ font-size:18.5px; }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    min-height:100svh;
    background:linear-gradient(165deg, var(--bg) 0%, var(--bg2) 100%);
    color:var(--text);
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:40px;
  }

  /* ===== 頂部 ===== */
  .topbar{
    position:sticky; top:0; z-index:20;
    display:flex; align-items:center; justify-content:space-between;
    background:var(--header); color:var(--header-text);
    padding:16px 20px; padding-top:max(16px, env(safe-area-inset-top));
    box-shadow:0 2px 14px var(--shadow);
  }
  .brand{ display:flex; flex-direction:column; line-height:1.15; }
  .brand .main{
    font-family:"Noto Serif TC",serif; font-weight:700;
    font-size:1.35rem; letter-spacing:3px; color:var(--header-text);
  }
  .brand .sub{ font-size:.7rem; letter-spacing:4px; opacity:.7; margin-top:2px; }
  .gear{
    width:42px; height:42px; border-radius:50%;
    border:1px solid rgba(233,217,182,.35); background:transparent;
    color:var(--header-text); font-size:1.15rem; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:background .2s;
  }
  .gear:hover{ background:rgba(233,217,182,.12); }

  /* ===== 主體 ===== */
  main{ max-width:560px; margin:0 auto; padding:24px 18px 0; }
  .card{
    background:var(--card); border:1px solid var(--line);
    border-radius:24px; padding:26px 22px 22px;
    box-shadow:0 14px 36px var(--shadow);
    margin-bottom:22px;
  }
  .card-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .card-head h2{
    font-family:"Noto Serif TC",serif; font-size:1.2rem; font-weight:700;
    letter-spacing:1.5px; color:var(--gold);
  }
  .badge{
    font-size:.72rem; letter-spacing:1px; padding:4px 12px; border-radius:999px;
    background:var(--track); color:var(--muted); white-space:nowrap;
  }
  .badge.on{ background:var(--gold-soft); color:#3a2f1e; }

  .countdown{
    font-family:"Noto Serif TC",serif;
    font-size:2.3rem; font-weight:700; letter-spacing:1px;
    color:var(--text); margin:14px 0 4px;
    font-variant-numeric:tabular-nums; line-height:1.1;
  }
  .endline{ font-size:.92rem; color:var(--muted); letter-spacing:.5px; }

  .bar{ height:9px; border-radius:999px; background:var(--track); margin:18px 0 4px; overflow:hidden; }
  .bar-fill{
    height:100%; width:0%; border-radius:999px;
    background:linear-gradient(90deg, var(--fill), var(--fill2));
    transition:width .6s ease;
  }
  .usage-row{
    display:flex; justify-content:space-between; align-items:baseline;
    font-size:.86rem; color:var(--muted); margin-top:16px; letter-spacing:.5px;
  }
  .usage-row b{ color:var(--gold); font-size:1rem; font-variant-numeric:tabular-nums; }

  /* ===== 按鈕 ===== */
  .actions{ display:flex; gap:10px; margin-top:18px; flex-wrap:wrap; }
  .pill{
    border:none; border-radius:999px; cursor:pointer;
    font-size:.92rem; letter-spacing:1px; padding:11px 20px;
    font-family:inherit; transition:transform .12s, box-shadow .2s, background .2s;
  }
  .pill:active{ transform:scale(.96); }
  .pill.primary{ background:var(--gold); color:#fff; box-shadow:0 4px 12px var(--shadow); }
  .pill.ghost{ background:transparent; color:var(--gold); border:1.5px solid var(--gold-soft); }
  .pill.sm{ padding:9px 16px; font-size:.85rem; }
  .pill.danger{ color:#b5524a; border-color:#e0b0ab; }

  /* ===== 展開面板(accordion) ===== */
  .panel{
    margin-top:16px; padding:16px; border-radius:16px;
    background:var(--panel); border:1px solid var(--line);
  }
  .panel label{ display:block; font-size:.82rem; color:var(--muted); letter-spacing:.5px; margin-bottom:12px; }
  .panel label:last-of-type{ margin-bottom:0; }
  input[type="datetime-local"], input[type="number"]{
    margin-top:6px; width:100%; padding:10px 12px; border-radius:11px;
    border:1px solid var(--line); background:var(--card); color:var(--text);
    font-family:inherit; font-size:.95rem;
  }
  input:focus-visible{ outline:2px solid var(--gold-soft); outline-offset:1px; }
  .hm{ display:flex; align-items:center; gap:8px; margin-top:6px; color:var(--muted); font-size:.9rem; }
  .hm input{ margin-top:0; width:80px; text-align:center; }
  .panel-actions{ display:flex; gap:10px; margin-top:16px; }

  .seg{ display:flex; gap:6px; background:var(--track); border-radius:12px; padding:4px; margin-bottom:14px; }
  .seg-btn{
    flex:1; border:none; background:transparent; cursor:pointer;
    padding:8px; border-radius:9px; font-family:inherit; font-size:.85rem;
    color:var(--muted); letter-spacing:.5px; transition:background .2s,color .2s;
  }
  .seg-btn.active{ background:var(--card); color:var(--gold); box-shadow:0 2px 6px var(--shadow); }

  .hint{ text-align:center; font-size:.78rem; color:var(--muted); letter-spacing:.5px; margin-top:4px; }

  /* ===== 設定面板(滑入) ===== */
  .overlay{
    position:fixed; inset:0; background:rgba(20,16,12,.4); z-index:30;
    opacity:0; transition:opacity .28s;
  }
  .overlay.show{ opacity:1; }
  .settings{
    position:fixed; top:0; right:0; z-index:40;
    width:min(330px,86vw); height:100svh;
    background:var(--bg2); border-left:1px solid var(--line);
    box-shadow:-10px 0 40px var(--shadow);
    transform:translateX(105%); transition:transform .3s ease;
    padding:0 22px 30px; overflow-y:auto;
  }
  .settings.show{ transform:translateX(0); }
  .settings-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 0; padding-top:max(18px, env(safe-area-inset-top));
    position:sticky; top:0; background:var(--bg2); z-index:2;
  }
  .settings-head h2{ font-family:"Noto Serif TC",serif; color:var(--gold); letter-spacing:2px; }
  .settings .gear{ color:var(--text); border-color:var(--line); }
  .set-group{ margin-bottom:24px; }
  .set-label{ font-size:.82rem; color:var(--muted); letter-spacing:1.5px; margin-bottom:10px; }
  .theme-row,.size-row{ display:flex; gap:8px; }
  .theme-btn{
    flex:1; padding:11px 6px; border-radius:13px; cursor:pointer;
    border:1.5px solid var(--line); background:var(--card); color:var(--text);
    font-family:inherit; font-size:.88rem; letter-spacing:1px; transition:.2s;
  }
  .theme-btn.active{ border-color:var(--gold); color:var(--gold); background:var(--panel); }
  .size-btn{
    flex:1; padding:8px; border-radius:13px; cursor:pointer;
    border:1.5px solid var(--line); background:var(--card); color:var(--text);
    font-family:"Noto Serif TC",serif; transition:.2s;
  }
  .size-btn[data-size="s"]{ font-size:.9rem; }
  .size-btn[data-size="m"]{ font-size:1.15rem; }
  .size-btn[data-size="l"]{ font-size:1.45rem; }
  .size-btn.active{ border-color:var(--gold); color:var(--gold); background:var(--panel); }
  .about{ font-size:.78rem; color:var(--muted); line-height:1.85; letter-spacing:.5px; border-top:1px solid var(--line); padding-top:16px; }

  /* ===== Toast ===== */
  .toast{
    position:fixed; left:50%; bottom:34px; transform:translate(-50%,20px);
    background:var(--header); color:var(--header-text);
    padding:12px 22px; border-radius:999px; font-size:.88rem; letter-spacing:1px;
    box-shadow:0 8px 24px var(--shadow); opacity:0; pointer-events:none;
    transition:opacity .25s, transform .25s; z-index:50; white-space:nowrap;
  }
  .toast.show{ opacity:1; transform:translate(-50%,0); }

  @media (prefers-reduced-motion:reduce){
    *{ transition:none !important; animation:none !important; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="main" id="brandMain">額度結算</span>
    <span class="sub" id="brandSub">慵懶夢境</span>
  </div>
  <button class="gear" id="openSettings" aria-label="開啟設定">⚙</button>
</header>

<main>
  <!-- ===== Session ===== -->
  <section class="card">
    <div class="card-head">
      <h2>當前 Session</h2>
      <span class="badge" id="sessionBadge">尚未開始</span>
    </div>
    <div class="countdown" id="sessionCountdown">--:--:--</div>
    <div class="endline" id="sessionEnd">送出第一則訊息後，按「現在開始」</div>
    <div class="bar"><div class="bar-fill" id="sessionBar"></div></div>
    <div class="actions">
      <button class="pill primary" id="sessionNow">現在開始</button>
      <button class="pill ghost" id="sessionManualToggle">手動設定</button>
    </div>
    <div class="panel" id="sessionManual" hidden>
      <label>第一則訊息送出的時間
        <input type="datetime-local" id="sessionInput">
      </label>
      <div class="panel-actions">
        <button class="pill primary sm" id="sessionApply">套用</button>
        <button class="pill ghost sm" id="sessionClear">清除</button>
      </div>
    </div>
  </section>

  <!-- ===== 週用量 ===== -->
  <section class="card">
    <div class="card-head">
      <h2>週用量</h2>
      <span class="badge" id="weekBadge">尚未設定</span>
    </div>
    <div class="countdown" id="weekCountdown">--</div>
    <div class="endline" id="weekEnd">設定重置時間後開始倒數</div>
    <div class="usage-row" id="usageRow" hidden>
      <span>本週用量</span><b id="usagePct">--</b>
    </div>
    <div class="bar"><div class="bar-fill" id="weekBar"></div></div>
    <div class="actions">
      <button class="pill primary" id="weekToggle">設定重置</button>
    </div>
    <div class="panel" id="weekPanel" hidden>
      <div class="seg">
        <button class="seg-btn active" data-mode="remain">輸入剩餘</button>
        <button class="seg-btn" data-mode="absolute">指定時間</button>
      </div>
      <div id="modeRemain">
        <label>距離重置還有
          <span class="hm">
            <input type="number" id="remainH" min="0" max="168" placeholder="0"> 時
            <input type="number" id="remainM" min="0" max="59" placeholder="0"> 分
          </span>
        </label>
      </div>
      <div id="modeAbsolute" hidden>
        <label>重置時間
          <input type="datetime-local" id="weekInput">
        </label>
      </div>
      <label>本週用量 %（選填）
        <input type="number" id="usageInput" min="0" max="100" placeholder="如 99">
      </label>
      <div class="panel-actions">
        <button class="pill primary sm" id="weekApply">套用</button>
        <button class="pill ghost sm" id="weekClear">清除</button>
      </div>
    </div>
  </section>

  <p class="hint">所有時間只存在這台裝置，重新整理也會記得。</p>
</main>

<!-- ===== 設定 ===== -->
<div class="overlay" id="overlay" hidden></div>
<aside class="settings" id="settings">
  <div class="settings-head">
    <h2>設定</h2>
    <button class="gear" id="closeSettings" aria-label="關閉設定">✕</button>
  </div>

  <div class="set-group">
    <div class="set-label">主題</div>
    <div class="theme-row">
      <button class="theme-btn" data-theme="light">明亮</button>
      <button class="theme-btn" data-theme="night">夜間</button>
      <button class="theme-btn" data-theme="vintage">仿舊</button>
    </div>
  </div>

  <div class="set-group">
    <div class="set-label">字級</div>
    <div class="size-row">
      <button class="size-btn" data-size="s">A</button>
      <button class="size-btn" data-size="m">A</button>
      <button class="size-btn" data-size="l">A</button>
    </div>
  </div>

  <div class="set-group">
    <div class="set-label">Session 長度</div>
    <div class="hm">
      <input type="number" id="sessionHoursInput" min="1" max="48" step="0.5"> 小時
    </div>
  </div>

  <div class="set-group">
    <button class="pill ghost danger" id="resetAll">清除所有資料</button>
  </div>

  <div class="about">
    Session 在送出第一則訊息時開始，預設倒數 5 小時。<br>
    週用量則依 app 上「Resets in …」的剩餘時間設定，兩條時間線各自獨立。
  </div>
</aside>

<div class="toast" id="toast"></div>

<script>
/* ============ 狀態 ============ */
const KEY = CONFIG.storageKey;
let state = {
  sessionStart: null,   // ms timestamp
  weekReset:    null,   // ms timestamp
  usage:        null,   // 0~100
  sessionHours: CONFIG.sessionHours,
  theme: "light",
  size:  "m"
};

function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw) state = Object.assign(state, JSON.parse(raw));
  }catch(e){}
}
function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){}
}

/* ============ 小工具 ============ */
const $ = id => document.getElementById(id);
const pad = n => String(n).padStart(2,"0");

function toLocalInput(ts){
  const d = new Date(ts);
  return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())+"T"+pad(d.getHours())+":"+pad(d.getMinutes());
}
function fmtClock(ms){          // X 時 YY 分 ZZ 秒
  if(ms<0) ms=0;
  const s = Math.floor(ms/1000);
  return Math.floor(s/3600)+" 時 "+pad(Math.floor(s%3600/60))+" 分 "+pad(s%60)+" 秒";
}
function fmtLong(ms){           // X 天 Y 時 ZZ 分
  if(ms<0) ms=0;
  const m = Math.floor(ms/60000);
  const d = Math.floor(m/1440), h = Math.floor(m%1440/60), mm = m%60;
  return (d>0 ? d+" 天 " : "") + h+" 時 "+pad(mm)+" 分";
}
function fmtWhen(ts){           // 今天/明天/MM-DD HH:MM
  const d = new Date(ts), now = new Date();
  const hhmm = pad(d.getHours())+":"+pad(d.getMinutes());
  const day0 = new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime();
  const dd   = new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();
  const diff = Math.round((dd-day0)/86400000);
  if(diff===0) return "今天 "+hhmm;
  if(diff===1) return "明天 "+hhmm;
  if(diff===-1) return "昨天 "+hhmm;
  return (d.getMonth()+1)+"/"+d.getDate()+" "+hhmm;
}

let toastTimer;
function toast(msg){
  const t = $("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove("show"), 1800);
}

/* ============ 渲染 ============ */
function render(){
  const now = Date.now();

  // --- Session ---
  if(state.sessionStart){
    const span = state.sessionHours*3600000;
    const end  = state.sessionStart + span;
    const remain = end - now;
    if(remain > 0){
      $("sessionCountdown").textContent = fmtClock(remain);
      $("sessionEnd").textContent = "結束 · "+fmtWhen(end);
      $("sessionBadge").textContent = "進行中";
      $("sessionBadge").classList.add("on");
      $("sessionBar").style.width = Math.min(100,(now-state.sessionStart)/span*100)+"%";
    }else{
      $("sessionCountdown").textContent = "Session 已結束";
      $("sessionEnd").textContent = "送新訊息後，按「現在開始」重新計時";
      $("sessionBadge").textContent = "已結束";
      $("sessionBadge").classList.remove("on");
      $("sessionBar").style.width = "100%";
    }
  }else{
    $("sessionCountdown").textContent = "--:--:--";
    $("sessionEnd").textContent = "送出第一則訊息後，按「現在開始」";
    $("sessionBadge").textContent = "尚未開始";
    $("sessionBadge").classList.remove("on");
    $("sessionBar").style.width = "0%";
  }

  // --- 週用量 ---
  if(state.weekReset){
    const remain = state.weekReset - now;
    if(remain > 0){
      $("weekCountdown").textContent = fmtLong(remain);
      $("weekEnd").textContent = "重置 · "+fmtWhen(state.weekReset);
      $("weekBadge").textContent = "倒數中";
      $("weekBadge").classList.add("on");
    }else{
      $("weekCountdown").textContent = "已重置";
      $("weekEnd").textContent = "額度應已恢復，可重新設定";
      $("weekBadge").textContent = "已重置";
      $("weekBadge").classList.remove("on");
    }
  }else{
    $("weekCountdown").textContent = "--";
    $("weekEnd").textContent = "設定重置時間後開始倒數";
    $("weekBadge").textContent = "尚未設定";
    $("weekBadge").classList.remove("on");
  }

  // --- 用量 % ---
  if(state.usage !== null && state.usage !== undefined && state.usage !== ""){
    $("usageRow").hidden = false;
    $("usagePct").textContent = state.usage+"%";
    $("weekBar").style.width = Math.min(100,Math.max(0,state.usage))+"%";
  }else{
    $("usageRow").hidden = true;
    $("weekBar").style.width = "0%";
  }
}

/* ============ 套用偏好 ============ */
function applyPrefs(){
  document.documentElement.dataset.theme = state.theme;
  document.documentElement.dataset.size  = state.size;
  document.querySelectorAll(".theme-btn").forEach(b=>b.classList.toggle("active", b.dataset.theme===state.theme));
  document.querySelectorAll(".size-btn").forEach(b=>b.classList.toggle("active", b.dataset.size===state.size));
  $("sessionHoursInput").value = state.sessionHours;
}

/* ============ Session 操作 ============ */
$("sessionNow").onclick = ()=>{
  state.sessionStart = Date.now();
  save(); render(); toast("已從現在開始計時");
};
$("sessionManualToggle").onclick = ()=>{
  const p = $("sessionManual");
  p.hidden = !p.hidden;
  if(!p.hidden) $("sessionInput").value = toLocalInput(state.sessionStart || Date.now());
};
$("sessionApply").onclick = ()=>{
  const v = $("sessionInput").value;
  if(!v){ toast("請先選擇時間"); return; }
  state.sessionStart = new Date(v).getTime();
  save(); render(); $("sessionManual").hidden = true; toast("已套用開始時間");
};
$("sessionClear").onclick = ()=>{
  state.sessionStart = null;
  save(); render(); $("sessionManual").hidden = true; toast("已清除 Session");
};

/* ============ 週用量操作 ============ */
let weekMode = "remain";
document.querySelectorAll(".seg-btn").forEach(btn=>{
  btn.onclick = ()=>{
    weekMode = btn.dataset.mode;
    document.querySelectorAll(".seg-btn").forEach(b=>b.classList.toggle("active", b===btn));
    $("modeRemain").hidden   = weekMode!=="remain";
    $("modeAbsolute").hidden = weekMode!=="absolute";
  };
});
$("weekToggle").onclick = ()=>{
  const p = $("weekPanel");
  p.hidden = !p.hidden;
  if(!p.hidden){
    $("weekInput").value = toLocalInput(state.weekReset || Date.now());
    $("usageInput").value = (state.usage ?? "");
  }
};
$("weekApply").onclick = ()=>{
  if(weekMode === "remain"){
    const h = parseFloat($("remainH").value)||0;
    const m = parseFloat($("remainM").value)||0;
    if(h===0 && m===0){ toast("請輸入剩餘時間"); return; }
    state.weekReset = Date.now() + (h*3600000 + m*60000);
  }else{
    const v = $("weekInput").value;
    if(!v){ toast("請先選擇時間"); return; }
    state.weekReset = new Date(v).getTime();
  }
  const u = $("usageInput").value;
  state.usage = (u==="" ? null : Math.min(100,Math.max(0,parseFloat(u))));
  save(); render(); $("weekPanel").hidden = true; toast("已更新週用量");
};
$("weekClear").onclick = ()=>{
  state.weekReset = null; state.usage = null;
  $("remainH").value=""; $("remainM").value=""; $("usageInput").value="";
  save(); render(); $("weekPanel").hidden = true; toast("已清除週用量");
};

/* ============ 設定面板 ============ */
function openSettings(){ $("overlay").hidden=false; requestAnimationFrame(()=>{ $("overlay").classList.add("show"); $("settings").classList.add("show"); }); }
function closeSettings(){ $("overlay").classList.remove("show"); $("settings").classList.remove("show"); setTimeout(()=>$("overlay").hidden=true,300); }
$("openSettings").onclick = openSettings;
$("closeSettings").onclick = closeSettings;
$("overlay").onclick = closeSettings;

document.querySelectorAll(".theme-btn").forEach(b=>{
  b.onclick = ()=>{ state.theme=b.dataset.theme; save(); applyPrefs(); };
});
document.querySelectorAll(".size-btn").forEach(b=>{
  b.onclick = ()=>{ state.size=b.dataset.size; save(); applyPrefs(); };
});
$("sessionHoursInput").onchange = ()=>{
  let v = parseFloat($("sessionHoursInput").value);
  if(isNaN(v)||v<=0) v = CONFIG.sessionHours;
  state.sessionHours = v; save(); render(); toast("Session 長度已更新");
};
$("resetAll").onclick = ()=>{
  if(confirm("確定要清除所有資料嗎？")){
    localStorage.removeItem(KEY);
    state = { sessionStart:null, weekReset:null, usage:null, sessionHours:CONFIG.sessionHours, theme:"light", size:"m" };
    applyPrefs(); render(); closeSettings(); toast("已全部清除");
  }
};

/* ============ 啟動 ============ */
$("brandMain").textContent = CONFIG.brandMain;
$("brandSub").textContent  = CONFIG.brandSub;
document.title = CONFIG.brandMain + " · " + CONFIG.brandSub;
load();
applyPrefs();
render();
setInterval(render, 1000);
</script>
</body>
</html>
