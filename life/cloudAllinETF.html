<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>✦ ALL IN ETF ✦</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg-base:#fff9f6;
    --bg-gradient:#ffebe3;

    --card-bg:#ffffff;

    --text-main:#54433a;
    --text-sub:#8e7a70;

    --gold:#f6c86c;
    --gold-hover:#efb94d;

    --pink:#f79999;

    --line:#eadfd8;

    --soft:#fffaf7;
}

body{

    min-height:100vh;

    background:
    linear-gradient(
        180deg,
        var(--bg-base) 0%,
        var(--bg-gradient) 100%
    );

    font-family:
    "Zen Maru Gothic",
    "Quicksand",
    "Microsoft JhengHei",
    sans-serif;

    color:var(--text-main);

    padding:28px;

    position:relative;

    overflow-x:hidden;
}

/* 背景光暈 */

body::before{

    content:"";

    position:fixed;

    inset:0;

    background:
    radial-gradient(
        circle at 20% 20%,
        rgba(255,255,255,.7),
        transparent 25%
    ),

    radial-gradient(
        circle at 80% 10%,
        rgba(246,200,108,.15),
        transparent 18%
    ),

    radial-gradient(
        circle at 70% 80%,
        rgba(247,153,153,.12),
        transparent 20%
    );

    pointer-events:none;
}

/* 邊框 */

.frame{

    position:fixed;

    inset:12px;

    border:
    2px dashed rgba(142,122,112,.15);

    border-radius:26px;

    pointer-events:none;
}

/* container */

.container{

    max-width:920px;

    margin:auto;

    position:relative;

    z-index:2;
}

/* icon */

.moon{

    text-align:center;

    margin-bottom:18px;
}

.moon-symbol{

    width:82px;
    height:82px;

    margin:auto;

    border-radius:50%;

    background:
    linear-gradient(
        135deg,
        #ffe8b5,
        #ffd9a1
    );

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:36px;

    box-shadow:
    0 10px 25px rgba(246,200,108,.25);

    animation:float 4s ease-in-out infinite;
}

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-6px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* title */

.title{

    text-align:center;

    margin-bottom:30px;
}

.main-title{

    font-size:
    clamp(
        42px,
        8vw,
        72px
    );

    line-height:1.2;

    color:var(--text-main);

    letter-spacing:2px;

    font-weight:700;
}

.subtitle{

    margin-top:16px;

    color:var(--text-sub);

    line-height:2;

    font-size:
    clamp(
        17px,
        3vw,
        24px
    );
}

/* 卡片 */

.card{

    background:var(--card-bg);

    border-radius:32px;

    padding:32px;

    border:
    1px solid rgba(142,122,112,.08);

    box-shadow:
    0 10px 30px rgba(84,67,58,.06);

    margin-bottom:24px;
}

/* label */

.label{

    display:block;

    margin-bottom:10px;

    font-size:17px;

    font-weight:700;
}

/* input */

.input{

    width:100%;

    height:68px;

    border-radius:18px;

    border:
    1.5px solid rgba(142,122,112,.12);

    background:#fffbf9;

    color:var(--text-main);

    padding:0 18px;

    outline:none;

    font-size:22px;

    font-family:inherit;

    margin-bottom:20px;

    transition:.2s;
}

.input:focus{

    border-color:var(--gold);

    background:white;

    box-shadow:
    0 0 0 4px rgba(246,200,108,.18);
}

/* 按鈕 */

button{

    width:100%;

    height:72px;

    border:none;

    border-radius:22px;

    cursor:pointer;

    font-size:20px;

    font-family:inherit;

    font-weight:700;

    color:var(--text-main);

    background:
    linear-gradient(
        135deg,
        #ffe19f,
        #ffd37e
    );

    box-shadow:
    0 8px 20px rgba(246,200,108,.25);

    transition:.2s;
}

button:hover{

    transform:translateY(-2px);

    background:
    linear-gradient(
        135deg,
        #ffd98c,
        #ffc85d
    );
}

/* 結果 */

.result{
    display:none;
}

.hero{

    background:
    linear-gradient(
        180deg,
        #fffaf5,
        #fff4ea
    );

    border-radius:30px;

    padding:36px;

    text-align:center;

    border:
    1px dashed rgba(142,122,112,.15);

    margin-bottom:22px;
}

.hero small{

    color:var(--text-sub);

    font-size:16px;
}

.big{

    font-size:
    clamp(
        48px,
        8vw,
        72px
    );

    margin:18px 0;

    color:#c58b1d;

    font-weight:700;
}

.stock{

    margin-top:12px;

    color:var(--text-sub);

    font-size:18px;

    line-height:1.8;
}

/* grid */

.grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:20px;

    margin-bottom:22px;
}

.box{

    background:#fffdfc;

    border-radius:26px;

    padding:28px;

    border:
    1px solid rgba(142,122,112,.08);

    box-shadow:
    0 6px 18px rgba(84,67,58,.04);
}

.box h3{

    margin-bottom:12px;

    font-size:20px;
}

.value{

    font-size:42px;

    color:#c58b1d;

    font-weight:700;

    margin-bottom:10px;
}

.green{

    color:#de7b7b;

    font-size:18px;
}

/* quote */

.ai{

    background:#fffaf7;

    border:
    1px dashed rgba(142,122,112,.18);

    border-radius:28px;

    padding:30px;

    line-height:2.1;

    color:var(--text-sub);

    font-size:20px;
}

/* footer */

.footer{

    text-align:center;

    margin-top:36px;

    margin-bottom:60px;
}

.footer-line{

    width:120px;

    height:2px;

    margin:auto;

    margin-bottom:20px;

    background:
    linear-gradient(
        90deg,
        transparent,
        rgba(246,200,108,.8),
        transparent
    );
}

.footer-inner{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:14px;
}

.sparkle{

    color:#f6c86c;

    font-size:24px;
}

.dream{

    font-size:30px;

    color:var(--text-main);

    font-weight:700;
}

.creator{

    margin-top:12px;

    color:var(--text-sub);

    font-size:14px;
}

@media(max-width:700px){

    .grid{
        grid-template-columns:1fr;
    }

    body{
        padding:18px;
    }

    .card{
        padding:24px;
    }

    .big{
        font-size:52px;
    }
}

</style>
</head>

<body>

<div class="frame"></div>

<div class="container">

    <div class="moon">

        <div class="moon-symbol">
            🌸
        </div>

    </div>

    <div class="title">

        <h1 class="main-title">
            ALL IN ETF
        </h1>

        <p class="subtitle">
            在衝動消費之前
            <br>
            先看看這筆錢的另一種未來 ✦
        </p>

    </div>

    <div class="card">

        <label class="label">
            商品價格
        </label>

        <input
        id="price"
        class="input"
        type="number"
        value="1000"
        placeholder="例如 1000">

        <label class="label">
            ETF / 股票代號
        </label>

        <input
        id="stockCode"
        class="input"
        value="0050">

        <button onclick="calculate()">
            ✦ 開始計算 ✦
        </button>

    </div>

    <div class="result" id="result">

        <div class="hero">

            <small>
                Your Future ✨
            </small>

            <div class="big" id="shares">
                0 股
            </div>

            <div class="stock">
                標的：
                <span id="stockName"></span>
            </div>

            <div class="stock">
                現在價格：
                NT$
                <span id="currentPrice"></span>
            </div>

            <div class="stock">
                歷史平均年化：
                <span id="annualText"></span>
            </div>

        </div>

        <div class="grid">

            <div class="box">

                <h3>
                    3 個月後
                </h3>

                <div class="value" id="future3m"></div>

                <div class="green" id="gain3m"></div>

            </div>

            <div class="box">

                <h3>
                    1 年後
                </h3>

                <div class="value" id="future1y"></div>

                <div class="green" id="gain1y"></div>

            </div>

        </div>

        <div class="ai" id="aiText"></div>

    </div>

    <div class="footer">

        <div class="footer-line"></div>

        <div class="footer-inner">

            <span class="sparkle">✦</span>

            <span class="dream">
                Lazy Dream
            </span>

            <span class="sparkle">✦</span>

        </div>

        <div class="creator">
            Crafted with pastel ETF magic 🌸
        </div>

    </div>

</div>

<script>

function format(num){

    return Number(num).toLocaleString(
    "zh-TW",
    {
        maximumFractionDigits:0
    });
}

const annualReturnMap = {

    "0050":12,
    "006208":11,
    "0056":9,
    "00878":8,
    "00919":10,
    "QQQ":15,
    "VOO":12,
    "SPY":11,
    "2330":18,
    "2317":10
};

async function getETFPrice(code){

    try{

        const today = new Date();

        const yyyy =
        today.getFullYear();

        const mm =
        String(today.getMonth()+1)
        .padStart(2,"0");

        const url =
        `https://www.twse.com.tw/exchangeReport/STOCK_DAY?response=json&date=${yyyy}${mm}01&stockNo=${code}`;

        const response =
        await fetch(url);

        const data =
        await response.json();

        if(!data.data){

            return null;
        }

        const prices =
        data.data
        .map(item=>Number(
        item[6].replace(/,/g,"")
        ))
        .filter(v=>!isNaN(v));

        const currentPrice =
        prices[prices.length - 1];

        const title =
        data.title || "";

        const stockName =
        title
        .replace(/[\d年月\s]/g,"")
        .replace(code,"")
        .replace("各日成交資訊","");

        return {

            currentPrice,

            stockName,

            annualReturn:
            annualReturnMap[code] || 10
        };

    }catch(err){

        return null;
    }
}

function aiMessage(){

    const quotes = [

        `
        ✨ 「真正的財富，
        是未來的自由。」
        `,

        `
        🌸 「今天少一點衝動，
        明天多一點選擇。」
        `,

        `
        ☁️ 「慢慢存下來的未來，
        最溫柔。」
        `,

        `
        ✦ 「ETF 不只是投資，
        也是時間的朋友。」
        `,

        `
        🌙 「你現在放棄的消費，
        未來可能會長成自由。」
        `
    ];

    return quotes[
    Math.floor(
    Math.random() * quotes.length
    )];
}

async function calculate(){

    const price =
    Number(
    document.getElementById("price").value
    );

    const code =
    document
    .getElementById("stockCode")
    .value
    .trim();

    if(!price){

        alert("請輸入商品價格 ✨");

        return;
    }

    const data =
    await getETFPrice(code);

    if(!data){

        alert("抓不到資料 😭");

        return;
    }

    const shares =
    price / data.currentPrice;

    const annualRate =
    data.annualReturn / 100;

    const future3m =
    price *
    Math.pow(
    1 + annualRate,
    0.25
    );

    const future1y =
    price *
    (1 + annualRate);

    const gain3m =
    (
    (future3m - price)
    / price * 100
    ).toFixed(1);

    const gain1y =
    (
    (future1y - price)
    / price * 100
    ).toFixed(1);

    document
    .getElementById("shares")
    .innerText =
    shares.toFixed(2) + " 股";

    document
    .getElementById("stockName")
    .innerText =
    `${code} ${data.stockName}`;

    document
    .getElementById("currentPrice")
    .innerText =
    data.currentPrice;

    document
    .getElementById("annualText")
    .innerText =
    data.annualReturn + "%";

    document
    .getElementById("future3m")
    .innerText =
    "NT$ " +
    format(future3m);

    document
    .getElementById("future1y")
    .innerText =
    "NT$ " +
    format(future1y);

    document
    .getElementById("gain3m")
    .innerText =
    "+" + gain3m + "%";

    document
    .getElementById("gain1y")
    .innerText =
    "+" + gain1y + "%";

    document
    .getElementById("aiText")
    .innerHTML =
    aiMessage();

    document
    .getElementById("result")
    .style.display = "block";
}

</script>

</body>
</html>
