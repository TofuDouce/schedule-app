<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>✨ All In ETF ✨</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    background:
    linear-gradient(
    180deg,
    #171320,
    #241c36,
    #312649
    );

    color:white;

    font-family:
    "Cormorant Garamond",
    serif;

    padding:24px;

    overflow-x:hidden;

    position:relative;
}

/* 星空 */

body::before{

    content:"";

    position:fixed;

    inset:0;

    background-image:
    radial-gradient(
    rgba(255,255,255,.8) 1px,
    transparent 1px
    );

    background-size:42px 42px;

    opacity:.08;

    pointer-events:none;

    z-index:-3;
}

/* 月輪 */

body::after{

    content:"";

    position:fixed;

    width:700px;
    height:700px;

    border-radius:50%;

    top:50%;
    left:50%;

    transform:
    translate(-50%,-50%);

    background:
    radial-gradient(
    circle,
    rgba(255,240,210,.06),
    rgba(180,150,255,.04),
    transparent 70%
    );

    z-index:-2;
}

/* 慕夏邊框 */

.frame{

    position:fixed;

    inset:12px;

    border:
    1px solid rgba(210,190,150,.5);

    border-radius:30px;

    pointer-events:none;
}

.frame::before{

    content:"";

    position:absolute;

    inset:10px;

    border:
    1px solid rgba(210,190,150,.2);

    border-radius:24px;
}

/* 滑鼠光暈 */

.cursor-glow{

    position:fixed;

    width:280px;
    height:280px;

    border-radius:50%;

    pointer-events:none;

    background:
    radial-gradient(
    circle,
    rgba(180,150,255,.14),
    transparent 70%
    );

    transform:
    translate(-50%,-50%);

    z-index:-1;
}

.container{

    max-width:760px;

    margin:auto;

    position:relative;

    z-index:1;
}

.title{

    text-align:center;

    margin-top:40px;

    margin-bottom:34px;
}

.title h1{

    font-size:54px;

    font-family:
    "Cinzel",
    serif;

    color:#f7f1ff;

    position:relative;
}

.title h1::before,
.title h1::after{

    content:"☾";

    position:absolute;

    top:50%;

    transform:
    translateY(-50%);

    font-size:28px;

    color:
    rgba(220,200,255,.45);
}

.title h1::before{
    left:-42px;
}

.title h1::after{
    right:-42px;
}

.subtitle{

    margin-top:18px;

    line-height:2;

    color:#ddd0f5;

    font-size:22px;
}

/* 呼吸感 */

.card,
.hero,
.box,
.ai{

    animation:
    breathe 7s ease-in-out infinite;
}

@keyframes breathe{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-4px);
    }

    100%{
        transform:translateY(0px);
    }
}

.card{

    background:
    rgba(28,24,42,.72);

    border:
    1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(12px);

    border-radius:32px;

    padding:28px;

    margin-bottom:24px;
}

.label{

    display:block;

    margin-bottom:10px;

    color:#dccdf5;

    font-size:18px;
}

.input{

    width:100%;

    height:66px;

    border:none;

    border-radius:22px;

    background:
    rgba(255,255,255,.06);

    color:white;

    padding:0 18px;

    outline:none;

    font-size:22px;

    margin-bottom:20px;
}

.main-btn{

    width:100%;

    height:70px;

    border:none;

    border-radius:24px;

    cursor:pointer;

    font-size:24px;

    font-family:
    "Cinzel",
    serif;

    color:white;

    background:
    linear-gradient(
    90deg,
    #6f5aff,
    #9c7dff,
    #6987ff
    );

    transition:.3s;
}

.main-btn:hover{

    transform:
    scale(1.02);

    box-shadow:
    0 0 30px rgba(180,150,255,.25);
}

/* 結果動畫 */

.result{

    display:none;

    animation:
    reveal 1s ease;
}

@keyframes reveal{

    from{

        opacity:0;

        transform:
        translateY(20px)
        scale(.98);

        filter:blur(10px);
    }

    to{

        opacity:1;

        transform:
        translateY(0)
        scale(1);

        filter:blur(0);
    }
}

.hero{

    background:
    linear-gradient(
    135deg,
    rgba(73,61,115,.95),
    rgba(37,31,56,.95)
    );

    border-radius:30px;

    padding:34px;

    text-align:center;

    margin-bottom:20px;
}

.big{

    font-size:60px;

    margin:12px 0;

    font-family:
    "Cinzel",
    serif;

    text-shadow:
    0 0 18px rgba(190,160,255,.2);
}

.stock{

    margin-top:10px;

    color:#ddd1f2;

    font-size:20px;
}

.grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:18px;

    margin-bottom:20px;
}

.box{

    background:
    rgba(255,255,255,.05);

    border-radius:28px;

    padding:24px;
}

.value{

    font-size:36px;

    margin:10px 0;

    font-family:
    "Cinzel",
    serif;
}

.ai{

    background:
    rgba(255,255,255,.05);

    border-radius:28px;

    padding:28px;

    line-height:2;

    font-size:22px;

    position:relative;
}

.ai::before{

    content:"✦";

    position:absolute;

    top:14px;
    right:18px;

    color:
    rgba(255,255,255,.15);

    font-size:24px;
}

/* footer */

.footer{

    text-align:center;

    margin-top:40px;

    margin-bottom:60px;
}

.footer-line{

    width:120px;

    height:1px;

    margin:auto;

    margin-bottom:20px;

    background:
    linear-gradient(
    90deg,
    transparent,
    rgba(210,190,150,.8),
    transparent
    );
}

.dream{

    font-size:34px;

    font-family:
    "Cinzel",
    serif;

    color:#eadfff;
}

.creator{

    margin-top:10px;

    color:#a897c9;

    font-style:italic;
}

@media(max-width:640px){

    .title h1{
        font-size:40px;
    }

    .subtitle{
        font-size:18px;
    }

    .grid{
        grid-template-columns:1fr;
    }

    .big{
        font-size:46px;
    }
}

</style>
</head>

<body>

<div class="frame"></div>

<div
class="cursor-glow"
id="cursorGlow">

</div>

<div class="container">

    <div class="title">

        <h1>
            ✨ All In ETF ✨
        </h1>

        <p class="subtitle">
            在衝動消費之前
            <br>
            先看看這筆錢的另一種未來 ✨
        </p>

    </div>

    <div class="card">

        <label class="label">
            ✦ 商品價格
        </label>

        <input
        id="price"
        class="input"
        type="number"
        placeholder="例如 47508">

        <label class="label">
            ✦ ETF / 股票代號
        </label>

        <input
        id="stockCode"
        class="input"
        value="0050">

        <button
        class="main-btn"
        onclick="calculate()">

            ✨ Reveal Destiny ✨

        </button>

    </div>

    <div
    class="result"
    id="result">

        <div class="hero">

            <div>
                這筆錢可以買進
            </div>

            <div
            class="big"
            id="shares">

                0 股

            </div>

            <div class="stock">

                標的：
                <span id="stockName"></span>

            </div>

            <div class="stock">

                歷史平均年化：
                <span id="annualText"></span>

            </div>

        </div>

        <div class="grid">

            <div class="box">

                <h3>
                    ✦ 10 天後模擬
                </h3>

                <div
                class="value"
                id="future10d">

                </div>

                <div id="gain10d"></div>

            </div>

            <div class="box">

                <h3>
                    ✦ 1 年後
                </h3>

                <div
                class="value"
                id="future1y">

                </div>

                <div id="gain1y"></div>

            </div>

        </div>

        <div
        class="ai"
        id="aiText">

        </div>

    </div>

    <div class="footer">

        <div class="footer-line"></div>

        <div class="dream">
            ✨ Lazy Dream ✨
        </div>

        <div class="creator">
            Crafted with moonlight & ETF magic
        </div>

    </div>

</div>

<script>

function format(num){

    return Number(num).toLocaleString(
    "zh-TW",
    {
        maximumFractionDigits:0
    });
}

const annualMap = {

    "0050":12,
    "0056":9,
    "2330":15,
    "2891":8
};

function aiMessage(){

    const messages = [

        `
        🌙 “The stock market is a device
        for transferring money
        from the impatient to the patient.”
        <br><br>
        「股市是把錢從沒耐心的人，
        轉移到有耐心的人手上的地方。」
        <br><br>
        — Warren Buffett
        `,

        `
        ✨ “Someone is sitting in the shade today
        because someone planted a tree
        a long time ago.”
        <br><br>
        「今天有人能在樹蔭下休息，
        是因為很久以前有人種了樹。」
        <br><br>
        — Warren Buffett
        `,

        `
        💜 “An investment in knowledge
        pays the best interest.”
        <br><br>
        「投資自己，
        永遠是報酬率最高的投資。」
        <br><br>
        — Benjamin Franklin
        `
    ];

    return messages[
    Math.floor(
    Math.random() * messages.length
    )];
}

function calculate(){

    const price =
    Number(
    document
    .getElementById("price")
    .value
    );

    const code =
    document
    .getElementById("stockCode")
    .value
    .trim();

    if(!price){

        alert("請輸入商品價格 ✨");

        return;
    }

    const annual =
    annualMap[code] || 10;

    const annualRate =
    annual / 100;

    const fake10d =
    price *
    (1 + annualRate / 36);

    const future1y =
    price *
    (1 + annualRate);

    const gain10d =
    (
    (fake10d - price)
    / price * 100
    ).toFixed(1);

    const gain1y =
    (
    (future1y - price)
    / price * 100
    ).toFixed(1);

    const fakePrice =
    (100 + annual).toFixed(1);

    document
    .getElementById("shares")
    .innerText =
    (price / fakePrice)
    .toFixed(2) + " 股";

    document
    .getElementById("stockName")
    .innerText =
    code;

    document
    .getElementById("annualText")
    .innerText =
    annual + "%";

    document
    .getElementById("future10d")
    .innerText =
    "NT$ " +
    format(fake10d);

    document
    .getElementById("future1y")
    .innerText =
    "NT$ " +
    format(future1y);

    document
    .getElementById("gain10d")
    .innerText =
    "+" + gain10d + "%";

    document
    .getElementById("gain1y")
    .innerText =
    "+" + gain1y + "%";

    document
    .getElementById("aiText")
    .innerHTML =
    aiMessage();

    document
    .getElementById("result")
    .style.display =
    "block";
}

/* 滑鼠光暈 */

document.addEventListener(
"mousemove",
e=>{

    const glow =
    document.getElementById(
    "cursorGlow"
    );

    glow.style.left =
    e.clientX + "px";

    glow.style.top =
    e.clientY + "px";
});

</script>

</body>
</html>
