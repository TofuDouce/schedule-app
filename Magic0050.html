<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALL IN ETF</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg1:#120f1f;
    --bg2:#221938;
    --bg3:#32244f;

    --gold:#d8bf8a;
    --softGold:#f1ddb1;

    --purple:#b496ff;

    --card:
    rgba(28,22,43,.78);
}

body{

    min-height:100vh;

    overflow-x:hidden;

    color:#f7f3ff;

    font-family:
    "Cormorant Garamond",
    serif;

    background:
    radial-gradient(
    circle at top,
    rgba(171,139,255,.18),
    transparent 25%
    ),

    linear-gradient(
    180deg,
    var(--bg1),
    var(--bg2),
    var(--bg3)
    );

    position:relative;

    padding:30px;
}

/* 月光 */

body::before{

    content:"";

    position:fixed;

    width:700px;
    height:700px;

    border-radius:50%;

    left:50%;
    top:180px;

    transform:translateX(-50%);

    background:
    radial-gradient(
    circle,
    rgba(190,170,255,.12),
    transparent 70%
    );

    animation:
    moonBreath 7s ease-in-out infinite;

    pointer-events:none;

    z-index:-4;
}

@keyframes moonBreath{

    0%{
        transform:translateX(-50%) scale(1);
        opacity:.6;
    }

    50%{
        transform:translateX(-50%) scale(1.08);
        opacity:1;
    }

    100%{
        transform:translateX(-50%) scale(1);
        opacity:.6;
    }
}

/* 星空 */

.stars{

    position:fixed;

    inset:0;

    overflow:hidden;

    z-index:-5;
}

.star{

    position:absolute;

    width:2px;
    height:2px;

    background:white;

    border-radius:50%;

    opacity:.6;

    animation:
    twinkle 4s infinite;
}

@keyframes twinkle{

    0%{
        opacity:.1;
        transform:scale(.5);
    }

    50%{
        opacity:1;
        transform:scale(1.6);
    }

    100%{
        opacity:.1;
        transform:scale(.5);
    }
}

/* 流光 */

.flow{

    position:fixed;

    inset:0;

    pointer-events:none;

    z-index:-2;

    overflow:hidden;
}

.flow::before{

    content:"";

    position:absolute;

    width:200%;
    height:2px;

    top:90px;

    left:-50%;

    background:
    linear-gradient(
    90deg,
    transparent,
    rgba(255,235,190,.6),
    transparent
    );

    animation:
    flowLine 8s linear infinite;
}

@keyframes flowLine{

    0%{
        transform:translateX(-20%);
    }

    100%{
        transform:translateX(20%);
    }
}

/* 慕夏 SVG */

.svg-frame{

    position:fixed;

    inset:0;

    width:100%;
    height:100%;

    pointer-events:none;

    z-index:999;
}

/* 主容器 */

.container{

    max-width:760px;

    margin:auto;

    position:relative;

    z-index:2;
}

/* 標題 */

.title{

    text-align:center;

    margin-top:40px;

    margin-bottom:46px;

    position:relative;
}

.moon{

    color:var(--gold);

    font-size:40px;

    margin-bottom:12px;

    animation:
    floatMoon 4s ease-in-out infinite;
}

@keyframes floatMoon{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(7px);
    }

    100%{
        transform:translateY(0px);
    }
}

.main-title{

    font-family:
    "Cinzel",
    serif;

    font-weight:700;

    line-height:1;

    letter-spacing:4px;

    white-space:nowrap;

    font-size:
    clamp(
        46px,
        10vw,
        82px
    );

    background:
    linear-gradient(
    180deg,
    #fff,
    #efe4ff,
    #d8bf8a
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:
    0 0 30px rgba(255,255,255,.06);

    position:relative;
}

.main-title::after{

    content:"";

    position:absolute;

    width:320px;
    height:320px;

    border:
    1px solid rgba(216,191,138,.12);

    border-radius:50%;

    left:50%;
    top:50%;

    transform:
    translate(-50%,-50%);

    z-index:-1;
}

.subtitle{

    margin-top:28px;

    line-height:2;

    color:#ddd2f3;

    font-size:
    clamp(
        20px,
        4vw,
        30px
    );
}

/* 卡片 */

.card{

    position:relative;

    background:
    var(--card);

    border:
    1px solid rgba(255,255,255,.05);

    backdrop-filter:blur(18px);

    border-radius:38px;

    padding:36px;

    overflow:hidden;

    margin-bottom:24px;

    box-shadow:
    0 15px 50px rgba(0,0,0,.4);
}

.card::before{

    content:"";

    position:absolute;

    inset:0;

    background:
    linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,.03),
    transparent
    );

    animation:
    shimmer 8s linear infinite;
}

@keyframes shimmer{

    0%{
        transform:translateX(-100%);
    }

    100%{
        transform:translateX(100%);
    }
}

.label{

    display:block;

    margin-bottom:12px;

    color:#ddd0f2;

    font-size:20px;

    letter-spacing:1px;
}

.input{

    width:100%;

    height:72px;

    border:none;

    border-radius:26px;

    background:
    rgba(255,255,255,.05);

    color:white;

    font-size:28px;

    padding:0 24px;

    margin-bottom:22px;

    outline:none;

    transition:.3s;
}

.input:focus{

    box-shadow:
    0 0 20px rgba(180,150,255,.3);
}

button{

    width:100%;

    height:78px;

    border:none;

    border-radius:30px;

    cursor:pointer;

    font-size:30px;

    letter-spacing:2px;

    color:white;

    font-family:
    "Cinzel",
    serif;

    background:
    linear-gradient(
    90deg,
    #6d58ff,
    #b28bff,
    #6488ff
    );

    box-shadow:
    0 0 35px rgba(125,110,255,.4);

    transition:.35s;
}

button:hover{

    transform:translateY(-2px) scale(1.01);

    box-shadow:
    0 0 45px rgba(125,110,255,.6);
}

/* 結果 */

.result{

    display:none;
}

.hero{

    position:relative;

    overflow:hidden;

    border-radius:40px;

    padding:42px;

    text-align:center;

    background:
    linear-gradient(
    135deg,
    rgba(73,61,115,.96),
    rgba(34,27,54,.96)
    );

    margin-bottom:24px;

    border:
    1px solid rgba(255,255,255,.06);
}

.hero::before{

    content:"";

    position:absolute;

    width:500px;
    height:500px;

    border-radius:50%;

    border:
    1px solid rgba(216,191,138,.08);

    left:50%;
    top:50%;

    transform:
    translate(-50%,-50%);
}

.big{

    font-size:78px;

    margin:16px 0;

    font-family:
    "Cinzel",
    serif;
}

.stock{

    margin-top:14px;

    font-size:24px;

    color:#e5dcff;
}

/* 卡牌 */

.grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:20px;

    margin-bottom:22px;
}

.box{

    position:relative;

    overflow:hidden;

    border-radius:34px;

    padding:34px;

    background:
    rgba(25,20,40,.88);

    border:
    1px solid rgba(255,255,255,.04);
}

.box::before{

    content:"";

    position:absolute;

    inset:12px;

    border:
    1px solid rgba(216,191,138,.12);

    border-radius:24px;
}

.box h3{

    font-size:28px;

    margin-bottom:18px;
}

.value{

    font-size:56px;

    font-family:
    "Cinzel",
    serif;

    margin-bottom:10px;
}

.green{

    color:#cdb3ff;

    font-size:22px;
}

/* 神諭 */

.oracle{

    position:relative;

    overflow:hidden;

    border-radius:36px;

    padding:38px;

    background:
    rgba(28,22,42,.88);

    border:
    1px solid rgba(255,255,255,.05);

    line-height:2.1;

    font-size:24px;

    text-align:center;

    animation:
    oracleFade .7s ease;
}

@keyframes oracleFade{

    from{
        opacity:0;
        transform:translateY(12px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* footer */

.footer{

    text-align:center;

    margin-top:44px;

    margin-bottom:90px;
}

.footer-line{

    width:140px;
    height:1px;

    margin:auto;

    margin-bottom:24px;

    background:
    linear-gradient(
    90deg,
    transparent,
    rgba(216,191,138,.7),
    transparent
    );
}

.footer-inner{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:18px;
}

.sparkle{

    color:#f7dd9f;

    font-size:26px;
}

.dream{

    font-family:
    "Cinzel",
    serif;

    font-size:38px;

    letter-spacing:5px;

    background:
    linear-gradient(
    180deg,
    #fff,
    #d8bf8a
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.creator{

    margin-top:12px;

    color:#b6a7d4;

    font-size:18px;

    letter-spacing:2px;
}

/* 星塵 */

.dust{

    position:fixed;

    width:10px;
    height:10px;

    border-radius:50%;

    background:
    radial-gradient(
    circle,
    rgba(255,230,180,.9),
    transparent
    );

    pointer-events:none;

    z-index:9999;

    animation:
    dustFade 1s linear forwards;
}

@keyframes dustFade{

    to{
        opacity:0;
        transform:
        translateY(-18px)
        scale(0);
    }
}

@media(max-width:700px){

    .grid{
        grid-template-columns:1fr;
    }

    .big{
        font-size:56px;
    }

    .value{
        font-size:46px;
    }
}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="flow"></div>

<!-- SVG 慕夏邊框 -->

<svg class="svg-frame" viewBox="0 0 100 100" preserveAspectRatio="none">

<path
d="M4,12
Q10,2 20,8
M96,12
Q90,2 80,8
M4,88
Q10,98 20,92
M96,88
Q90,98 80,92"

fill="none"
stroke="rgba(216,191,138,.5)"
stroke-width=".2"/>

<rect
x="2"
y="2"
width="96"
height="96"
rx="3"

fill="none"
stroke="rgba(216,191,138,.35)"
stroke-width=".15"/>

</svg>

<div class="container">

<div class="title">

<div class="moon">
☾
</div>

<h1 class="main-title">
ALL IN ETF
</h1>

<p class="subtitle">
在衝動消費之前
<br>
先看看這筆錢的另一種未來
</p>

</div>

<div class="card">

<label class="label">
商品價格
</label>

<input
id="price"
class="input"
type="number"
value="1000">

<label class="label">
ETF / 股票代號
</label>

<input
id="stockCode"
class="input"
value="0050">

<button onclick="calculate()">
Reveal Destiny
</button>

</div>

<div class="result" id="result">

<div class="hero">

<small>
Your Fate
</small>

<div class="big" id="shares">
0 股
</div>

<div class="stock">
標的：
<span id="stockName"></span>
</div>

<div class="stock">
現在價格：
NT$
<span id="currentPrice"></span>
</div>

<div class="stock">
歷史平均年化：
<span id="annualText"></span>
</div>

</div>

<div class="grid">

<div class="box">

<h3>
3 個月後
</h3>

<div class="value" id="future3m"></div>

<div class="green" id="gain3m"></div>

</div>

<div class="box">

<h3>
1 年後
</h3>

<div class="value" id="future1y"></div>

<div class="green" id="gain1y"></div>

</div>

</div>

<div class="oracle" id="aiText"></div>

</div>

<div class="footer">

<div class="footer-line"></div>

<div class="footer-inner">

<span class="sparkle">
✦
</span>

<span class="dream">
Lazy Dream
</span>

<span class="sparkle">
✦
</span>

</div>

<div class="creator">
Crafted with moonlight & ETF magic
</div>

</div>

</div>

<script>

/* 星空 */

const stars =
document.getElementById("stars");

for(let i=0;i<150;i++){

    const star =
    document.createElement("div");

    star.className = "star";

    star.style.left =
    Math.random()*100 + "%";

    star.style.top =
    Math.random()*100 + "%";

    star.style.animationDelay =
    Math.random()*5 + "s";

    star.style.opacity =
    Math.random();

    stars.appendChild(star);
}

/* 星塵 */

document.addEventListener(
"mousemove",
e=>{

    const dust =
    document.createElement("div");

    dust.className = "dust";

    dust.style.left =
    e.clientX + "px";

    dust.style.top =
    e.clientY + "px";

    document.body.appendChild(dust);

    setTimeout(()=>{

        dust.remove();

    },1000);
});

/* 數字 */

function format(num){

    return Number(num)
    .toLocaleString(
    "zh-TW",
    {
        maximumFractionDigits:0
    });
}

/* 年化 */

const annualReturnMap = {

    "0050":12,
    "0056":9,
    "00878":8,
    "00919":10,
    "2330":18,
    "QQQ":15
};

/* 抓資料 */

async function getETFPrice(code){

    try{

        const today =
        new Date();

        const yyyy =
        today.getFullYear();

        const mm =
        String(
        today.getMonth()+1
        ).padStart(2,"0");

        const url =
        `https://www.twse.com.tw/exchangeReport/STOCK_DAY?response=json&date=${yyyy}${mm}01&stockNo=${code}`;

        const response =
        await fetch(url);

        const data =
        await response.json();

        if(!data.data){

            return null;
        }

        const prices =
        data.data
        .map(item=>Number(
        item[6].replace(/,/g,"")
        ))
        .filter(v=>!isNaN(v));

        const currentPrice =
        prices[prices.length-1];

        const title =
        data.title || "";

        const stockName =
        title
        .replace(/[\d年月\s]/g,"")
        .replace(code,"")
        .replace("各日成交資訊","");

        return{

            currentPrice,

            stockName,

            annualReturn:
            annualReturnMap[code]
            || 10
        };

    }catch(err){

        return null;
    }
}

/* 神諭 */

function aiMessage(){

const quotes = [

`
✨「當你真心渴望某樣東西時，
整個宇宙都會聯合起來幫助你。」
<br><br>
“When you want something,
all the universe conspires
in helping you achieve it.”
<br><br>
— The Alchemist
`,

`
🌙「只有一件事
會讓夢想無法實現：
那就是害怕失敗。」
<br><br>
“There is only one thing
that makes a dream impossible:
the fear of failure.”
<br><br>
— The Alchemist
`,

`
☾「你的心在哪裡，
寶藏就在哪裡。」
<br><br>
“Wherever your heart is,
there you will find your treasure.”
<br><br>
— The Alchemist
`,

`
✨「夢想可能實現，
人生才因此浪漫。」
<br><br>
“It’s the possibility
of having a dream come true
that makes life interesting.”
<br><br>
— The Alchemist
`
];

return quotes[
Math.floor(
Math.random()*quotes.length
)];
}

/* 計算 */

async function calculate(){

    const price =
    Number(
    document.getElementById("price")
    .value
    );

    const code =
    document
    .getElementById("stockCode")
    .value
    .trim();

    if(!price){

        alert("請輸入商品價格 ✨");

        return;
    }

    const data =
    await getETFPrice(code);

    if(!data){

        alert("抓不到資料 😭");

        return;
    }

    const shares =
    price / data.currentPrice;

    const annualRate =
    data.annualReturn / 100;

    const future3m =
    price *
    Math.pow(
    1+annualRate,
    0.25
    );

    const future1y =
    price *
    (1+annualRate);

    const gain3m =
    (
    (future3m-price)
    / price *100
    ).toFixed(1);

    const gain1y =
    (
    (future1y-price)
    / price *100
    ).toFixed(1);

    document
    .getElementById("shares")
    .innerText =
    shares.toFixed(2)+" 股";

    document
    .getElementById("stockName")
    .innerText =
    `${code} ${data.stockName}`;

    document
    .getElementById("currentPrice")
    .innerText =
    data.currentPrice;

    document
    .getElementById("annualText")
    .innerText =
    data.annualReturn+"%";

    document
    .getElementById("future3m")
    .innerText =
    "NT$ "+
    format(future3m);

    document
    .getElementById("future1y")
    .innerText =
    "NT$ "+
    format(future1y);

    document
    .getElementById("gain3m")
    .innerText =
    "+"+gain3m+"%";

    document
    .getElementById("gain1y")
    .innerText =
    "+"+gain1y+"%";

    const oracle =
    document.getElementById("aiText");

    oracle.style.opacity = 0;

    setTimeout(()=>{

        oracle.innerHTML =
        aiMessage();

        oracle.style.opacity = 1;

    },200);

    document
    .getElementById("result")
    .style.display =
    "block";
}

</script>

</body>
</html>
