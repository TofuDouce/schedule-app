<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALL IN ETF</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg1:#171320;
    --bg2:#261f38;
    --bg3:#32284a;

    --gold:#d8bf8a;

    --card:
    rgba(29,24,44,.72);
}

body{

    min-height:100vh;

    overflow-x:hidden;

    background:
    radial-gradient(
    circle at top,
    rgba(180,150,255,.16),
    transparent 25%
    ),

    linear-gradient(
    180deg,
    var(--bg1),
    var(--bg2),
    var(--bg3)
    );

    color:#f4efff;

    font-family:
    "Cormorant Garamond",
    serif;

    padding:28px;

    position:relative;
}

/* 星空 */

.stars{

    position:fixed;

    inset:0;

    overflow:hidden;

    z-index:-3;
}

.star{

    position:absolute;

    width:2px;
    height:2px;

    background:white;

    border-radius:50%;

    opacity:.6;

    animation:twinkle 4s infinite;
}

@keyframes twinkle{

    0%{
        opacity:.15;
        transform:scale(.7);
    }

    50%{
        opacity:1;
        transform:scale(1.4);
    }

    100%{
        opacity:.15;
        transform:scale(.7);
    }
}

/* 主邊框 */

.frame{

    position:fixed;

    inset:14px;

    border:
    1.5px solid rgba(216,191,138,.5);

    border-radius:38px;

    pointer-events:none;

    z-index:999;
}

.frame::before{

    content:"";

    position:absolute;

    inset:12px;

    border:
    1px solid rgba(216,191,138,.22);

    border-radius:30px;
}

/* 四角 */

.corner{

    position:fixed;

    width:120px;
    height:120px;

    pointer-events:none;

    z-index:1000;
}

.corner::before{

    content:"";

    position:absolute;

    inset:0;

    border:
    1.5px solid rgba(216,191,138,.45);

    border-radius:50%;
}

.corner::after{

    content:"✦";

    position:absolute;

    color:rgba(216,191,138,.8);

    font-size:26px;
}

.tl{
    top:18px;
    left:18px;
}

.tl::before{
    clip-path:polygon(0 0,100% 0,0 100%);
}

.tl::after{
    top:18px;
    left:18px;
}

.tr{
    top:18px;
    right:18px;
}

.tr::before{
    clip-path:polygon(0 0,100% 0,100% 100%);
}

.tr::after{
    top:18px;
    right:18px;
}

.bl{
    bottom:18px;
    left:18px;
}

.bl::before{
    clip-path:polygon(0 0,0 100%,100% 100%);
}

.bl::after{
    bottom:18px;
    left:18px;
}

.br{
    bottom:18px;
    right:18px;
}

.br::before{
    clip-path:polygon(100% 0,0 100%,100% 100%);
}

.br::after{
    bottom:18px;
    right:18px;
}

/* 容器 */

.container{

    max-width:760px;

    margin:auto;

    position:relative;

    z-index:1;
}

/* 月亮 */

.moon{

    text-align:center;

    margin-top:10px;

    margin-bottom:20px;

    position:relative;
}

.moon::before{

    content:"";

    position:absolute;

    top:-60px;

    left:50%;

    width:1px;
    height:60px;

    background:
    rgba(216,191,138,.35);
}

.moon-symbol{

    font-size:38px;

    color:var(--gold);

    text-shadow:
    0 0 18px rgba(216,191,138,.3);

    animation:floatMoon 4s ease-in-out infinite;
}

@keyframes floatMoon{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(6px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* 標題 */

.title{

    text-align:center;

    margin-bottom:42px;
}

.main-title{

    font-family:
    "Cinzel",
    serif;

    font-weight:700;

    letter-spacing:4px;

    line-height:1.1;

    position:relative;

    z-index:2;

    text-align:center;

    white-space:nowrap;

    margin:0 auto;

    font-size:
    clamp(
        42px,
        9vw,
        78px
    );

    background:
    linear-gradient(
        180deg,
        #ffffff 0%,
        #efe5ff 45%,
        #d8bf8a 100%
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:
    0 0 24px
    rgba(255,255,255,.05);
}

/* 神聖圓環 */

.main-title::before{

    content:"";

    position:absolute;

    width:
    clamp(
        180px,
        40vw,
        320px
    );

    height:
    clamp(
        180px,
        40vw,
        320px
    );

    border:
    1px solid
    rgba(216,191,138,.14);

    border-radius:50%;

    left:50%;
    top:50%;

    transform:
    translate(-50%,-50%);

    z-index:-1;
}

/* 副標 */

.subtitle{

    margin-top:26px;

    line-height:2;

    color:#ddd0f5;

    font-size:
    clamp(
        18px,
        3.8vw,
        28px
    );

    letter-spacing:1px;

    text-align:center;

    opacity:.92;
}

/* 卡片 */

.card{

    background:
    var(--card);

    border:
    1px solid rgba(255,255,255,.06);

    backdrop-filter:blur(16px);

    border-radius:34px;

    padding:32px;

    margin-bottom:24px;

    box-shadow:
    0 10px 40px rgba(0,0,0,.35);

    position:relative;

    overflow:hidden;
}

.card::before{

    content:"✦";

    position:absolute;

    top:18px;
    right:24px;

    color:rgba(255,255,255,.12);

    font-size:38px;
}

.label{

    display:block;

    margin-bottom:10px;

    color:#ddd1f6;

    font-size:18px;
}

.input{

    width:100%;

    height:68px;

    border:none;

    border-radius:24px;

    background:
    rgba(255,255,255,.05);

    color:white;

    padding:0 20px;

    outline:none;

    font-size:24px;

    margin-bottom:20px;

    border:
    1px solid rgba(255,255,255,.05);
}

.input:focus{

    border:
    1px solid rgba(216,191,138,.6);

    box-shadow:
    0 0 20px rgba(216,191,138,.15);
}

/* 按鈕 */

button{

    width:100%;

    height:72px;

    border:none;

    border-radius:26px;

    cursor:pointer;

    font-size:24px;

    font-family:
    "Cinzel",
    serif;

    color:white;

    background:
    linear-gradient(
    90deg,
    #6d58ff,
    #9f7fff,
    #6788ff
    );

    box-shadow:
    0 10px 30px rgba(120,100,255,.28);

    transition:.25s;
}

button:hover{

    transform:
    translateY(-2px)
    scale(1.01);
}

/* loading */

.loading{

    display:none;

    text-align:center;

    margin-top:20px;

    color:#d9ccef;

    font-size:18px;
}

/* 結果 */

.result{

    display:none;

    animation:fade .5s ease;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(12px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.hero{

    background:
    linear-gradient(
    135deg,
    rgba(73,61,115,.95),
    rgba(37,31,56,.95)
    );

    border-radius:36px;

    padding:38px;

    text-align:center;

    margin-bottom:20px;

    border:
    1px solid rgba(255,255,255,.05);

    position:relative;
}

.hero small{

    color:#d7c9ef;

    font-size:18px;
}

.big{

    font-size:64px;

    margin:16px 0;

    font-family:
    "Cinzel",
    serif;
}

.stock{

    margin-top:12px;

    color:#ddd2f2;

    font-size:21px;
}

/* grid */

.grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:18px;

    margin-bottom:20px;
}

.box{

    background:
    rgba(29,24,44,.85);

    border-radius:30px;

    padding:28px;

    border:
    1px solid rgba(255,255,255,.05);
}

.box h3{

    color:#d6c8ee;

    margin-bottom:12px;

    font-size:20px;
}

.value{

    font-size:42px;

    font-family:
    "Cinzel",
    serif;

    margin-bottom:8px;
}

.green{

    color:#cab0ff;

    font-size:18px;
}

/* ai */

.ai{

    background:
    rgba(30,24,46,.84);

    border-radius:30px;

    padding:32px;

    line-height:2.1;

    font-size:22px;

    color:#ece4ff;

    border:
    1px solid rgba(255,255,255,.05);
}

/* footer */

.footer{

    text-align:center;

    margin-top:40px;

    margin-bottom:80px;
}

.footer-line{

    width:120px;

    height:1px;

    margin:auto;

    margin-bottom:22px;

    background:
    linear-gradient(
    90deg,
    transparent,
    rgba(216,191,138,.7),
    transparent
    );
}

.footer-inner{

    display:flex;

    align-items:center;

    justify-content:center;

    gap:18px;
}

.sparkle{

    color:#f6d98f;

    font-size:24px;
}

.dream{

    font-family:
    "Cinzel",
    serif;

    font-size:34px;

    letter-spacing:4px;

    color:#eadfff;
}

.creator{

    margin-top:10px;

    font-size:16px;

    color:#a897c9;

    letter-spacing:2px;

    font-style:italic;
}

@media(max-width:640px){

    .grid{
        grid-template-columns:1fr;
    }

    .big{
        font-size:48px;
    }

    .frame{
        inset:10px;
    }
}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="frame"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="container">

    <div class="moon">

        <div class="moon-symbol">
            ☾
        </div>

    </div>

    <div class="title">

        <h1 class="main-title">
            ALL IN ETF
        </h1>

        <p class="subtitle">
            在衝動消費之前
            <br>
            先看看這筆錢的另一種未來
        </p>

    </div>

    <div class="card">

        <label class="label">
            ✦ 商品價格
        </label>

        <input
        id="price"
        class="input"
        type="number"
        placeholder="例如 47508">

        <label class="label">
            ✦ ETF 代號
        </label>

        <input
        id="stockCode"
        class="input"
        value="0050">

        <button onclick="calculate()">
            Reveal Destiny
        </button>

        <div class="loading" id="loading">
            正在窺探未來命運...
        </div>

    </div>

    <div class="result" id="result">

        <div class="hero">

            <small>
                Your Fate
            </small>

            <div class="big" id="shares">
                0 股
            </div>

            <div class="stock">
                ETF：
                <span id="stockName"></span>
            </div>

            <div class="stock">
                現在價格：
                NT$
                <span id="currentPrice"></span>
            </div>

            <div class="stock">
                歷史平均年化：
                <span id="annualText"></span>
            </div>

        </div>

        <div class="grid">

            <div class="box">

                <h3>
                    ✦ 3 個月後
                </h3>

                <div class="value" id="future3m"></div>

                <div class="green" id="gain3m"></div>

            </div>

            <div class="box">

                <h3>
                    ✦ 1 年後
                </h3>

                <div class="value" id="future1y"></div>

                <div class="green" id="gain1y"></div>

            </div>

        </div>

        <div class="ai" id="aiText"></div>

    </div>

    <div class="footer">

        <div class="footer-line"></div>

        <div class="footer-inner">

            <span class="sparkle">✦</span>

            <span class="dream">
                Lazy Dream
            </span>

            <span class="sparkle">✦</span>

        </div>

        <div class="creator">
            Crafted with moonlight & ETF magic
        </div>

    </div>

</div>

<script>

/* 星空 */

const stars =
document.getElementById("stars");

for(let i=0;i<120;i++){

    const star =
    document.createElement("div");

    star.className = "star";

    star.style.left =
    Math.random()*100 + "%";

    star.style.top =
    Math.random()*100 + "%";

    star.style.animationDelay =
    Math.random()*4 + "s";

    stars.appendChild(star);
}

function format(num){

    return Number(num).toLocaleString(
    "zh-TW",
    {
        maximumFractionDigits:0
    });
}

const annualReturnMap = {

    "0050":12,
    "006208":11,
    "0056":9,
    "00878":8,
    "00919":10,
    "QQQ":15,
    "VOO":12,
    "SPY":11
};

async function getETFPrice(code){

    try{

        const today = new Date();

        const yyyy =
        today.getFullYear();

        const mm =
        String(today.getMonth()+1)
        .padStart(2,"0");

        const url =
        `https://www.twse.com.tw/exchangeReport/STOCK_DAY?response=json&date=${yyyy}${mm}01&stockNo=${code}`;

        const response =
        await fetch(url);

        const data =
        await response.json();

        if(!data.data){

            return null;
        }

        const prices =
        data.data
        .map(item=>Number(
        item[6].replace(/,/g,"")
        ))
        .filter(v=>!isNaN(v));

        const currentPrice =
        prices[prices.length - 1];

        return {

            currentPrice,

            annualReturn:
            annualReturnMap[code] || 10
        };

    }catch(err){

        return null;
    }
}

function aiMessage(){

    const quotes = [

        `
        ✨ “Do not save what is left after spending,
        but spend what is left after saving.”
        <br><br>
        「不要把剩下的錢拿去儲蓄，
        而是把儲蓄後剩下的錢拿去花。」
        <br><br>
        — Warren Buffett
        `,

        `
        🌙 “The stock market is a device
        for transferring money from the impatient
        to the patient.”
        <br><br>
        「股市是把錢從沒耐心的人，
        轉移到有耐心的人手上的地方。」
        <br><br>
        — Warren Buffett
        `,

        `
        💜 “An investment in knowledge
        pays the best interest.”
        <br><br>
        「投資自己，
        永遠是報酬率最高的投資。」
        <br><br>
        — Benjamin Franklin
        `
    ];

    return quotes[
    Math.floor(
    Math.random() * quotes.length
    )];
}

async function calculate(){

    const price =
    Number(
    document.getElementById("price").value
    );

    const code =
    document
    .getElementById("stockCode")
    .value
    .trim();

    if(!price){

        alert("請輸入商品價格 ✨");

        return;
    }

    document
    .getElementById("loading")
    .style.display = "block";

    const data =
    await getETFPrice(code);

    document
    .getElementById("loading")
    .style.display = "none";

    if(!data){

        alert("抓不到 ETF 資料 😭");

        return;
    }

    const shares =
    price / data.currentPrice;

    const annualRate =
    data.annualReturn / 100;

    const future3m =
    price *
    Math.pow(
    1 + annualRate,
    0.25
    );

    const future1y =
    price *
    (1 + annualRate);

    const gain3m =
    (
    (future3m - price)
    / price * 100
    ).toFixed(1);

    const gain1y =
    (
    (future1y - price)
    / price * 100
    ).toFixed(1);

    document
    .getElementById("shares")
    .innerText =
    shares.toFixed(2) + " 股";

    document
    .getElementById("stockName")
    .innerText =
    code;

    document
    .getElementById("currentPrice")
    .innerText =
    data.currentPrice;

    document
    .getElementById("annualText")
    .innerText =
    data.annualReturn + "%";

    document
    .getElementById("future3m")
    .innerText =
    "NT$ " +
    format(future3m);

    document
    .getElementById("future1y")
    .innerText =
    "NT$ " +
    format(future1y);

    document
    .getElementById("gain3m")
    .innerText =
    "+" + gain3m + "%";

    document
    .getElementById("gain1y")
    .innerText =
    "+" + gain1y + "%";

    document
    .getElementById("aiText")
    .innerHTML =
    aiMessage();

    document
    .getElementById("result")
    .style.display = "block";
}

</script>

</body>
</html>
