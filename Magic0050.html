<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>✨ All In ETF ✨</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg1:#171320;
    --bg2:#241c36;
    --bg3:#312649;

    --gold:#c9b18a;

    --card:
    rgba(28,24,42,.72);
}

body{

    min-height:100vh;

    overflow-x:hidden;

    background:
    radial-gradient(
    circle at top,
    rgba(180,150,255,.14),
    transparent 25%
    ),

    linear-gradient(
    180deg,
    var(--bg1),
    var(--bg2),
    var(--bg3)
    );

    color:#f1ebff;

    padding:28px;

    font-family:
    "Cormorant Garamond",
    serif;

    position:relative;
}

body::before{

    content:"";

    position:fixed;

    inset:0;

    background-image:
    radial-gradient(
    rgba(255,255,255,.8) 1px,
    transparent 1px
    );

    background-size:48px 48px;

    opacity:.08;

    pointer-events:none;

    z-index:-2;
}

/* 慕夏邊框 */

.frame{

    position:fixed;

    inset:14px;

    border:
    1.5px solid rgba(201,177,138,.5);

    border-radius:34px;

    pointer-events:none;

    z-index:999;
}

.frame::before,
.frame::after{

    content:"";

    position:absolute;

    inset:12px;

    border:
    1px solid rgba(201,177,138,.22);

    border-radius:28px;
}

.corner{

    position:fixed;

    width:80px;
    height:80px;

    border:
    1px solid rgba(201,177,138,.4);

    z-index:1000;

    pointer-events:none;
}

.tl{

    top:26px;
    left:26px;

    border-right:none;
    border-bottom:none;

    border-top-left-radius:28px;
}

.tr{

    top:26px;
    right:26px;

    border-left:none;
    border-bottom:none;

    border-top-right-radius:28px;
}

.bl{

    bottom:26px;
    left:26px;

    border-right:none;
    border-top:none;

    border-bottom-left-radius:28px;
}

.br{

    bottom:26px;
    right:26px;

    border-left:none;
    border-top:none;

    border-bottom-right-radius:28px;
}

.container{

    max-width:760px;

    margin:auto;

    position:relative;

    z-index:1;
}

.title{

    text-align:center;

    margin-top:40px;

    margin-bottom:34px;
}

.title h1{

    font-size:58px;

    font-family:
    "Cinzel",
    serif;

    color:#f8f4ff;

    letter-spacing:2px;
}

.subtitle{

    margin-top:18px;

    line-height:2;

    color:#ddd0f5;

    font-size:22px;
}

.card{

    background:
    var(--card);

    border:
    1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(14px);

    border-radius:34px;

    padding:30px;

    box-shadow:
    0 10px 40px rgba(0,0,0,.35);

    margin-bottom:24px;

    position:relative;
}

.label{

    display:block;

    margin-bottom:10px;

    color:#dccdf5;

    font-size:18px;
}

.input{

    width:100%;

    height:68px;

    border:none;

    border-radius:24px;

    background:
    rgba(255,255,255,.05);

    color:white;

    padding:0 20px;

    outline:none;

    font-size:24px;

    margin-bottom:20px;

    border:
    1px solid rgba(255,255,255,.06);
}

.input:focus{

    border:
    1px solid rgba(201,177,138,.6);
}

.mode-toggle{

    display:flex;

    gap:12px;

    margin-bottom:20px;
}

.mode-btn{

    flex:1;

    height:52px;

    border:none;

    border-radius:18px;

    cursor:pointer;

    font-size:18px;

    font-family:
    "Cormorant Garamond",
    serif;

    color:white;

    background:
    rgba(255,255,255,.06);

    border:
    1px solid rgba(255,255,255,.08);
}

.mode-btn.active{

    background:
    linear-gradient(
    90deg,
    #6f5aff,
    #9d7dff
    );
}

button{

    width:100%;

    height:72px;

    border:none;

    border-radius:26px;

    cursor:pointer;

    font-size:24px;

    font-family:
    "Cinzel",
    serif;

    color:white;

    background:
    linear-gradient(
    90deg,
    #6f5aff,
    #9c7dff,
    #6987ff
    );

    box-shadow:
    0 10px 30px rgba(120,100,255,.25);
}

.loading{

    display:none;

    text-align:center;

    margin-top:20px;

    color:#d6caee;

    font-size:18px;
}

.result{

    display:none;

    animation:fade .45s ease;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.hero{

    background:
    linear-gradient(
    135deg,
    rgba(73,61,115,.95),
    rgba(37,31,56,.95)
    );

    border-radius:34px;

    padding:36px;

    text-align:center;

    margin-bottom:20px;
}

.big{

    font-size:64px;

    margin:14px 0;

    font-family:
    "Cinzel",
    serif;
}

.stock{

    margin-top:12px;

    color:#ddd1f2;

    font-size:21px;
}

.grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:18px;

    margin-bottom:20px;
}

.box{

    background:
    rgba(29,24,44,.85);

    border-radius:28px;

    padding:26px;
}

.box h3{

    color:#d4c6ec;

    margin-bottom:12px;
}

.value{

    font-size:42px;

    font-family:
    "Cinzel",
    serif;

    margin-bottom:8px;
}

.green{

    color:#cab0ff;
}

.ai{

    background:
    rgba(30,24,46,.84);

    border-radius:28px;

    padding:30px;

    line-height:2;

    font-size:22px;

    color:#ece4ff;

    margin-bottom:20px;
}

.rank{

    background:
    linear-gradient(
    135deg,
    rgba(201,177,138,.18),
    rgba(140,120,255,.15)
    );

    border-radius:28px;

    padding:26px;

    margin-bottom:20px;

    text-align:center;

    border:
    1px solid rgba(201,177,138,.18);
}

.rank-title{

    font-size:18px;

    color:#d6caee;

    margin-bottom:10px;
}

.rank-name{

    font-size:42px;

    font-family:
    "Cinzel",
    serif;

    color:#f7e2a8;
}

.footer{

    text-align:center;

    margin-top:40px;

    margin-bottom:70px;
}

.footer-line{

    width:120px;

    height:1px;

    margin:auto;

    margin-bottom:22px;

    background:
    linear-gradient(
    90deg,
    transparent,
    rgba(201,177,138,.7),
    transparent
    );
}

.footer-inner{

    display:flex;

    align-items:center;

    justify-content:center;

    gap:18px;
}

.sparkle{

    color:#f6d98f;

    font-size:24px;
}

.dream{

    font-family:
    "Cinzel",
    serif;

    font-size:34px;

    letter-spacing:4px;

    color:#eadfff;
}

.creator{

    margin-top:10px;

    font-size:16px;

    color:#a897c9;

    letter-spacing:2px;

    font-style:italic;
}

@media(max-width:640px){

    .title h1{
        font-size:40px;
    }

    .subtitle{
        font-size:18px;
    }

    .grid{
        grid-template-columns:1fr;
    }

    .big{
        font-size:48px;
    }

    .rank-name{
        font-size:32px;
    }
}

</style>
</head>

<body>

<div class="frame"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="container">

    <div class="title">

        <h1>
            ✨ All In ETF ✨
        </h1>

        <p class="subtitle">
            在衝動消費之前
            <br>
            先看看這筆錢的另一種未來 ✨
        </p>

    </div>

    <div class="card">

        <label class="label">
            ✦ 商品價格
        </label>

        <input
        id="price"
        class="input"
        type="number"
        placeholder="例如 47508">

        <label class="label">
            ✦ ETF / 股票代號
        </label>

        <input
        id="stockCode"
        class="input"
        value="0050">

        <div class="mode-toggle">

            <button
            class="mode-btn active"
            id="gentleBtn"
            onclick="setMode('gentle')">

                🌙 溫柔模式

            </button>

            <button
            class="mode-btn"
            id="roastBtn"
            onclick="setMode('roast')">

                🗡 毒舌模式

            </button>

        </div>

        <button onclick="calculate()">
            ✨ Reveal Destiny ✨
        </button>

        <div class="loading" id="loading">
            正在窺探未來命運...
        </div>

    </div>

    <div class="result" id="result">

        <div class="hero">

            <div>
                這筆錢可以買進
            </div>

            <div class="big" id="shares">
                0 股
            </div>

            <div class="stock">
                標的：
                <span id="stockName"></span>
            </div>

            <div class="stock">
                現在價格：
                NT$
                <span id="currentPrice"></span>
            </div>

            <div class="stock">
                歷史平均年化：
                <span id="annualText"></span>
            </div>

        </div>

        <div class="rank">

            <div class="rank-title">
                ✨ 消費靈魂等級 ✨
            </div>

            <div class="rank-name" id="rankName">
                —
            </div>

        </div>

        <div class="grid">

            <div class="box">

                <h3>
                    ✦ 10 天後模擬
                </h3>

                <div class="value" id="future10d"></div>

                <div class="green" id="gain10d"></div>

            </div>

            <div class="box">

                <h3>
                    ✦ 1 年後
                </h3>

                <div class="value" id="future1y"></div>

                <div class="green" id="gain1y"></div>

            </div>

        </div>

        <div class="ai" id="aiText"></div>

    </div>

    <div class="footer">

        <div class="footer-line"></div>

        <div class="footer-inner">

            <span class="sparkle">✦</span>

            <span class="dream">
                Lazy Dream
            </span>

            <span class="sparkle">✦</span>

        </div>

        <div class="creator">
            Crafted with moonlight & ETF magic
        </div>

    </div>

</div>

<script>

let currentMode = "gentle";

function setMode(mode){

    currentMode = mode;

    document
    .getElementById("gentleBtn")
    .classList.remove("active");

    document
    .getElementById("roastBtn")
    .classList.remove("active");

    if(mode === "gentle"){

        document
        .getElementById("gentleBtn")
        .classList.add("active");

    }else{

        document
        .getElementById("roastBtn")
        .classList.add("active");
    }
}

function format(num){

    return Number(num).toLocaleString(
    "zh-TW",
    {
        maximumFractionDigits:0
    });
}

const annualReturnMap = {

    "0050":12,
    "0056":9,
    "2330":15,
    "2891":8
};

async function getETFPrice(code){

    try{

        const today = new Date();

        const yyyy =
        today.getFullYear();

        const mm =
        String(today.getMonth()+1)
        .padStart(2,"0");

        const url =
        `https://www.twse.com.tw/exchangeReport/STOCK_DAY?response=json&date=${yyyy}${mm}01&stockNo=${code}`;

        const response =
        await fetch(url);

        const data =
        await response.json();

        if(!data.data){

            return null;
        }

        const prices =
        data.data
        .map(item=>Number(
        item[6].replace(/,/g,"")
        ))
        .filter(v=>!isNaN(v));

        const currentPrice =
        prices[prices.length - 1];

        return {

            currentPrice,

            annualReturn:
            annualReturnMap[code] || 10
        };

    }catch(err){

        return null;
    }
}

function getRank(price){

    if(price < 1000){

        return "理性旅人";

    }else if(price < 5000){

        return "慾望觀察者";

    }else if(price < 20000){

        return "衝動魔導士";

    }else if(price < 50000){

        return "ETF 毀滅者";

    }else{

        return "傳說級課金王";
    }
}

function aiMessage(){

    const gentle = [

        `
        🌙 “The stock market is a device
        for transferring money from the impatient
        to the patient.”
        <br><br>
        「股市是把錢從沒耐心的人，
        轉移到有耐心的人手上的地方。」
        <br><br>
        — Warren Buffett
        `,

        `
        ✨ 未來的你，
        可能會感謝今天沒有衝動消費的自己。
        `,

        `
        💜 有些東西只快樂幾天，
        但資產可能陪伴你好多年。
        `
    ];

    const roast = [

        `
        🗡 「你的購物車，
        比你的 ETF 還努力。」
        `,

        `
        🌚 「你買的是快樂，
        還是 3 秒鐘的多巴胺？」
        `,

        `
        ⚰️ 「0050 默默上漲，
        而你默默下單。」
        `
    ];

    const pool =
    currentMode === "gentle"
    ? gentle
    : roast;

    return pool[
    Math.floor(
    Math.random() * pool.length
    )];
}

async function calculate(){

    const price =
    Number(
    document.getElementById("price").value
    );

    const code =
    document
    .getElementById("stockCode")
    .value
    .trim();

    if(!price){

        alert("請輸入商品價格 ✨");

        return;
    }

    document
    .getElementById("loading")
    .style.display = "block";

    const data =
    await getETFPrice(code);

    document
    .getElementById("loading")
    .style.display = "none";

    if(!data){

        alert("抓不到資料 😭");

        return;
    }

    const shares =
    price / data.currentPrice;

    const annualRate =
    data.annualReturn / 100;

    const future10d =
    price *
    (1 + annualRate / 36);

    const future1y =
    price *
    (1 + annualRate);

    const gain10d =
    (
    (future10d - price)
    / price * 100
    ).toFixed(1);

    const gain1y =
    (
    (future1y - price)
    / price * 100
    ).toFixed(1);

    document
    .getElementById("shares")
    .innerText =
    shares.toFixed(2) + " 股";

    document
    .getElementById("stockName")
    .innerText =
    code;

    document
    .getElementById("currentPrice")
    .innerText =
    data.currentPrice;

    document
    .getElementById("annualText")
    .innerText =
    data.annualReturn + "%";

    document
    .getElementById("future10d")
    .innerText =
    "NT$ " +
    format(future10d);

    document
    .getElementById("future1y")
    .innerText =
    "NT$ " +
    format(future1y);

    document
    .getElementById("gain10d")
    .innerText =
    "+" + gain10d + "%";

    document
    .getElementById("gain1y")
    .innerText =
    "+" + gain1y + "%";

    document
    .getElementById("rankName")
    .innerText =
    getRank(price);

    document
    .getElementById("aiText")
    .innerHTML =
    aiMessage();

    document
    .getElementById("result")
    .style.display = "block";
}

</script>

</body>
</html>
