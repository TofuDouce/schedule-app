<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DreamID</title>

<meta
name="robots"
content="noindex,nofollow,noarchive,nosnippet,noimageindex">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg1:#171320;
    --bg2:#241a35;
    --bg3:#31244d;

    --gold:#d8bf8a;

    --text:#f4efff;

    --card:
    rgba(29,24,44,.72);
}

body{

    min-height:100vh;

    overflow-x:hidden;

    color:var(--text);

    font-family:
    "Cormorant Garamond",
    serif;

    background:

    radial-gradient(
    circle at top,
    rgba(180,150,255,.14),
    transparent 30%
    ),

    radial-gradient(
    circle at bottom,
    rgba(120,90,255,.08),
    transparent 30%
    ),

    linear-gradient(
    180deg,
    var(--bg1),
    var(--bg2),
    var(--bg3)
    );

    padding:16px;

    position:relative;
}

/* 星空 */

.stars{

    position:fixed;

    inset:0;

    overflow:hidden;

    z-index:-3;
}

.star{

    position:absolute;

    width:2px;
    height:2px;

    background:white;

    border-radius:50%;

    opacity:.7;

    animation:twinkle 4s infinite;
}

.star.big{

    width:4px;
    height:4px;

    background:var(--gold);

    box-shadow:
    0 0 10px rgba(216,191,138,.8);
}

@keyframes twinkle{

    0%{
        opacity:.15;
        transform:scale(.7);
    }

    50%{
        opacity:1;
        transform:scale(1.4);
    }

    100%{
        opacity:.15;
        transform:scale(.7);
    }
}

/* 邊框 */

.frame{

    position:fixed;

    inset:10px;

    border:
    1.2px solid rgba(216,191,138,.42);

    border-radius:34px;

    pointer-events:none;

    z-index:999;
}

.frame::before{

    content:"";

    position:absolute;

    inset:10px;

    border:
    1px solid rgba(216,191,138,.12);

    border-radius:28px;
}

/* 四角 */

.corner{

    position:fixed;

    width:95px;
    height:95px;

    pointer-events:none;

    z-index:1000;
}

.corner::before{

    content:"";

    position:absolute;

    inset:0;

    border:
    1px solid rgba(216,191,138,.38);

    border-radius:50%;
}

.corner::after{

    content:"✦";

    position:absolute;

    color:rgba(216,191,138,.9);

    font-size:20px;
}

.tl{
    top:14px;
    left:14px;
}

.tl::before{
    clip-path:polygon(0 0,100% 0,0 100%);
}

.tl::after{
    top:12px;
    left:12px;
}

.tr{
    top:14px;
    right:14px;
}

.tr::before{
    clip-path:polygon(0 0,100% 0,100% 100%);
}

.tr::after{
    top:12px;
    right:12px;
}

.bl{
    bottom:14px;
    left:14px;
}

.bl::before{
    clip-path:polygon(0 0,0 100%,100% 100%);
}

.bl::after{
    bottom:12px;
    left:12px;
}

.br{
    bottom:14px;
    right:14px;
}

.br::before{
    clip-path:polygon(100% 0,0 100%,100% 100%);
}

.br::after{
    bottom:12px;
    right:12px;
}

/* container */

.container{

    max-width:720px;

    margin:auto;

    position:relative;

    z-index:2;
}

/* moon */

.moon{

    text-align:center;

    margin-top:2px;

    position:relative;
}

.moon::before{

    content:"";

    position:absolute;

    left:50%;

    top:-42px;

    width:1px;
    height:42px;

    background:
    rgba(216,191,138,.35);
}

.moon-symbol{

    font-size:28px;

    color:var(--gold);

    animation:floatMoon 4s ease-in-out infinite;
}

@keyframes floatMoon{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(4px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* title */

.title{

    text-align:center;

    margin-top:12px;

    margin-bottom:20px;
}

.main-title{

    font-family:
    "Great Vibes",
    cursive;

    font-size:
    clamp(
        44px,
        10vw,
        72px
    );

    color:#efd8ff;
}

.subtitle{

    margin-top:6px;

    font-size:
    clamp(
        14px,
        3vw,
        18px
    );

    color:#d8bf8a;
}

/* panel */

.panel{

    background:
    var(--card);

    border:
    1px solid rgba(255,255,255,.05);

    border-radius:28px;

    padding:18px;

    backdrop-filter:blur(16px);
}

/* label */

.label{

    margin-bottom:6px;
}

.label-title{

    font-size:22px;

    font-weight:600;
}

.label-sub{

    color:#d8bf8a;

    font-size:12px;

    letter-spacing:2px;
}

/* input */

.input{

    width:100%;

    height:58px;

    border:none;

    outline:none;

    border-radius:18px;

    background:
    rgba(255,255,255,.05);

    color:white;

    font-size:22px;

    padding:0 18px;

    margin-bottom:14px;

    font-family:
    "Cormorant Garamond",
    serif;
}

.input::placeholder{

    color:
    rgba(255,255,255,.28);
}

/* select */

.select{

    width:100%;

    height:54px;

    border:none;

    outline:none;

    border-radius:16px;

    background:
    rgba(255,255,255,.06);

    color:white;

    font-size:18px;

    padding:0 14px;

    margin-bottom:14px;
}

/* button */

.generate-btn{

    width:100%;

    height:64px;

    border:none;

    border-radius:22px;

    cursor:pointer;

    color:white;

    font-size:22px;

    font-family:
    "Cinzel",
    serif;

    letter-spacing:2px;

    background:
    linear-gradient(
    90deg,
    #8268ff,
    #bc8cff,
    #ffb0d9
    );

    box-shadow:
    0 10px 26px rgba(120,100,255,.28);
}

/* results */

.results{

    margin-top:16px;

    display:grid;

    gap:12px;
}

.result-card{

    background:
    var(--card);

    border:
    1px solid rgba(255,255,255,.05);

    border-radius:20px;

    padding:18px;

    cursor:pointer;

    transition:.3s;

    position:relative;

    overflow:hidden;
}

.result-card:hover{

    transform:
    translateY(-3px);
}

.result-card::before{

    content:"";

    position:absolute;

    inset:0;

    background:
    radial-gradient(
    circle at top,
    rgba(255,255,255,.04),
    transparent 60%
    );
}

.result-title{

    color:var(--gold);

    font-size:11px;

    letter-spacing:2px;

    margin-bottom:6px;

    position:relative;
}

.username{

    font-size:
    clamp(
        24px,
        5vw,
        38px
    );

    word-break:break-word;

    position:relative;
}

.meaning{

    margin-top:10px;

    color:#d8c9f3;

    line-height:1.7;

    font-size:16px;

    position:relative;
}

.rare{

    position:absolute;

    top:16px;
    right:16px;

    font-size:11px;

    letter-spacing:2px;

    color:#ffdf9f;
}

/* copied */

.copied{

    position:fixed;

    left:50%;

    bottom:24px;

    transform:translateX(-50%);

    background:
    rgba(20,16,32,.95);

    border:
    1px solid rgba(255,255,255,.08);

    padding:10px 18px;

    border-radius:999px;

    opacity:0;

    transition:.35s;

    pointer-events:none;

    z-index:9999;
}

.copied.show{

    opacity:1;
}

</style>

</head>

<body>

<div class="stars" id="stars"></div>

<div class="frame"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="container">

    <div class="moon">

        <div class="moon-symbol">
            ☾
        </div>

    </div>

    <div class="title">

        <h1 class="main-title">
            DreamID
        </h1>

        <p class="subtitle">
            Create beautiful usernames ✦
        </p>

    </div>

    <div class="panel">

        <div class="label">

            <div class="label-title">
                第一關鍵字
            </div>

            <div class="label-sub">
                KEYWORD
            </div>

        </div>

        <input
        id="keyword1"
        class="input"
        placeholder="Lazy">

        <div class="label">

            <div class="label-title">
                第二關鍵字
            </div>

            <div class="label-sub">
                OPTIONAL
            </div>

        </div>

        <input
        id="keyword2"
        class="input"
        placeholder="Mamoru">

        <div class="label">

            <div class="label-title">
                風格世界觀
            </div>

            <div class="label-sub">
                STYLE
            </div>

        </div>

        <select
        id="style"
        class="select">

            <option value="dreamy">
                Dreamy
            </option>

            <option value="angel">
                Angel
            </option>

            <option value="cyber">
                Cyber
            </option>

            <option value="gothic">
                Gothic
            </option>

            <option value="soft">
                Soft
            </option>

        </select>

        <button
        class="generate-btn"
        onclick="generateID()">

            GENERATE ID

        </button>

    </div>

    <div
    class="results"
    id="results">

    </div>

</div>

<div
id="copied"
class="copied">

    已複製 ✦

</div>

<script>

/* 星空 */

const stars =
document.getElementById("stars");

for(let i=0;i<160;i++){

    const star =
    document.createElement("div");

    star.className = "star";

    if(Math.random()>.92){

        star.classList.add("big");
    }

    star.style.left =
    Math.random()*100 + "%";

    star.style.top =
    Math.random()*100 + "%";

    star.style.animationDelay =
    Math.random()*4 + "s";

    stars.appendChild(star);
}

/* 世界觀詞庫 */

const styleWorlds = {

dreamy:[

"nova",
"luna",
"veil",
"echo",
"cloud",
"night",
"mist",
"star",
"dream",
"aurora",
"velvet",
"moon",
"glow",
"dawn"
],

angel:[

"halo",
"seraph",
"aether",
"celest",
"angel",
"divine",
"solis",
"light",
"bless",
"elys",
"lucent"
],

cyber:[

"neo",
"404",
"byte",
"void",
"zero",
"core",
"pixel",
"vortex",
"glitch",
"data",
"quantum"
],

gothic:[

"grave",
"noct",
"mour",
"shade",
"raven",
"abyss",
"veil",
"thorn",
"blood",
"phantom"
],

soft:[

"milk",
"peach",
"bunny",
"cotton",
"vanilla",
"cream",
"puff",
"angel",
"mochi",
"softie"
]

};

/* 中文寓意 */

const meanings = [

"像深夜漂浮在宇宙中的旅人。",

"帶有溫柔與神秘氣息的名字。",

"像月光下安靜閃耀的人。",

"帶有守護感與夢境氛圍。",

"像夜空裡緩慢墜落的流星。",

"有種會被人默默記住的氣質。",

"像藏著故事感的名字。",

"帶有安靜卻耀眼的存在感。",

"像夢與現實交界的微光。",

"有種孤獨又浪漫的氛圍。"

];

/* rarity */

const rarities = [

"COMMON",
"RARE",
"EPIC",
"LEGENDARY"
];

/* 拆字 */

function splitWord(word){

    if(word.length < 4){

        return word;
    }

    const cut =
    Math.floor(word.length/2);

    return [

        word.slice(0,cut),

        word.slice(cut)
    ];
}

/* 生成 */

function generateID(){

    const k1 =
    document
    .getElementById("keyword1")
    .value
    .trim()

    || "dream";

    const k2 =
    document
    .getElementById("keyword2")
    .value
    .trim()

    || "";

    const style =
    document
    .getElementById("style")
    .value;

    const world =
    styleWorlds[style];

    const results =
    document.getElementById("results");

    results.innerHTML = "";

    const split1 =
    splitWord(k1);

    const split2 =
    k2
    ?
    splitWord(k2)
    :
    ["",""];

    for(let i=0;i<8;i++){

        const randomWord =
        world[
        Math.floor(
        Math.random()
        * world.length
        )];

        const randomNumber =
        Math.floor(
        Math.random()*99
        );

        let id = "";

        const mode =
        Math.floor(
        Math.random()*6
        );

        /* 多種生成模式 */

        switch(mode){

            case 0:

            id =
            split1[0]
            +
            randomWord;

            break;

            case 1:

            id =
            randomWord
            +
            split1[1];

            break;

            case 2:

            id =
            split1[0]
            +
            split2[1]
            +
            randomNumber;

            break;

            case 3:

            id =
            randomWord
            +
            split2[0];

            break;

            case 4:

            id =
            split1[0]
            +
            randomWord
            +
            split2[1];

            break;

            default:

            id =
            split1[0]
            +
            split2[0]
            +
            randomWord;

        }

        id =
        id
        .replace(/\s/g,"");

        /* 首字大寫 */

        id =
        id.charAt(0)
        .toUpperCase()
        +
        id.slice(1);

        const meaning =
        meanings[
        Math.floor(
        Math.random()
        * meanings.length
        )];

        const rarity =
        rarities[
        Math.floor(
        Math.random()
        * rarities.length
        )];

        const card =
        document.createElement("div");

        card.className =
        "result-card";

        card.innerHTML =

        `
        <div class="rare">
            ${rarity}
        </div>

        <div class="result-title">
            DREAM ID ✦
        </div>

        <div class="username">
            ${id}
        </div>

        <div class="meaning">
            ${meaning}
        </div>
        `;

        card.onclick=()=>{

            navigator
            .clipboard
            .writeText(id);

            const copied =
            document.getElementById("copied");

            copied.classList.add("show");

            setTimeout(()=>{

                copied.classList.remove("show");

            },1800);
        };

        results.appendChild(card);
    }
}

/* first */

generateID();

</script>

</body>
</html>
