<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DreamID</title>

<meta
name="robots"
content="noindex,nofollow,noarchive,nosnippet,noimageindex">

<meta
name="googlebot"
content="noindex,nofollow,noarchive,nosnippet,noimageindex">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg1:#171320;
    --bg2:#241a35;
    --bg3:#31244d;

    --gold:#d8bf8a;

    --text:#f4efff;

    --card:
    rgba(29,24,44,.72);
}

body{

    min-height:100vh;

    overflow-x:hidden;

    color:var(--text);

    font-family:
    "Cormorant Garamond",
    serif;

    background:

    radial-gradient(
    circle at top,
    rgba(180,150,255,.14),
    transparent 30%
    ),

    radial-gradient(
    circle at bottom,
    rgba(120,90,255,.08),
    transparent 30%
    ),

    linear-gradient(
    180deg,
    var(--bg1),
    var(--bg2),
    var(--bg3)
    );

    padding:16px;

    position:relative;
}

/* 星空 */

.stars{

    position:fixed;

    inset:0;

    overflow:hidden;

    z-index:-3;
}

.star{

    position:absolute;

    width:2px;
    height:2px;

    background:white;

    border-radius:50%;

    opacity:.7;

    animation:twinkle 4s infinite;
}

.star.big{

    width:4px;
    height:4px;

    background:var(--gold);

    box-shadow:
    0 0 10px rgba(216,191,138,.8);
}

@keyframes twinkle{

    0%{
        opacity:.15;
        transform:scale(.7);
    }

    50%{
        opacity:1;
        transform:scale(1.4);
    }

    100%{
        opacity:.15;
        transform:scale(.7);
    }
}

/* 外框 */

.frame{

    position:fixed;

    inset:10px;

    border:
    1.2px solid rgba(216,191,138,.42);

    border-radius:34px;

    pointer-events:none;

    z-index:999;
}

.frame::before{

    content:"";

    position:absolute;

    inset:10px;

    border:
    1px solid rgba(216,191,138,.12);

    border-radius:28px;
}

/* 四角 */

.corner{

    position:fixed;

    width:95px;
    height:95px;

    pointer-events:none;

    z-index:1000;
}

.corner::before{

    content:"";

    position:absolute;

    inset:0;

    border:
    1px solid rgba(216,191,138,.38);

    border-radius:50%;
}

.corner::after{

    content:"✦";

    position:absolute;

    color:rgba(216,191,138,.9);

    font-size:20px;
}

.tl{
    top:14px;
    left:14px;
}

.tl::before{
    clip-path:polygon(0 0,100% 0,0 100%);
}

.tl::after{
    top:12px;
    left:12px;
}

.tr{
    top:14px;
    right:14px;
}

.tr::before{
    clip-path:polygon(0 0,100% 0,100% 100%);
}

.tr::after{
    top:12px;
    right:12px;
}

.bl{
    bottom:14px;
    left:14px;
}

.bl::before{
    clip-path:polygon(0 0,0 100%,100% 100%);
}

.bl::after{
    bottom:12px;
    left:12px;
}

.br{
    bottom:14px;
    right:14px;
}

.br::before{
    clip-path:polygon(100% 0,0 100%,100% 100%);
}

.br::after{
    bottom:12px;
    right:12px;
}

/* container */

.container{

    max-width:720px;

    margin:auto;

    position:relative;

    z-index:2;
}

/* 月亮 */

.moon{

    text-align:center;

    margin-top:2px;

    position:relative;
}

.moon::before{

    content:"";

    position:absolute;

    left:50%;

    top:-42px;

    width:1px;
    height:42px;

    background:
    rgba(216,191,138,.35);
}

.moon-symbol{

    font-size:28px;

    color:var(--gold);

    animation:floatMoon 4s ease-in-out infinite;
}

@keyframes floatMoon{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(4px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* 標題 */

.title{

    text-align:center;

    margin-top:12px;

    margin-bottom:20px;
}

.main-title{

    font-family:
    "Great Vibes",
    cursive;

    font-size:
    clamp(
        44px,
        10vw,
        72px
    );

    color:#efd8ff;
}

.subtitle{

    margin-top:6px;

    font-size:
    clamp(
        14px,
        3vw,
        18px
    );

    color:#d8bf8a;
}

/* panel */

.panel{

    background:
    var(--card);

    border:
    1px solid rgba(255,255,255,.05);

    border-radius:28px;

    padding:18px;

    backdrop-filter:blur(16px);
}

/* label */

.label{

    margin-bottom:6px;
}

.label-title{

    font-size:20px;

    font-weight:600;
}

.label-sub{

    color:#d8bf8a;

    font-size:12px;

    letter-spacing:2px;
}

/* input */

.input{

    width:100%;

    height:56px;

    border:none;

    outline:none;

    border-radius:18px;

    background:
    rgba(255,255,255,.05);

    color:white;

    font-size:22px;

    padding:0 18px;

    margin-bottom:14px;

    font-family:
    "Cormorant Garamond",
    serif;
}

/* row */

.row{

    display:grid;

    grid-template-columns:
    1fr 1fr;

    gap:14px;

    margin-bottom:16px;
}

/* select */

.select{

    width:100%;

    height:54px;

    border:none;

    outline:none;

    border-radius:16px;

    background:
    rgba(255,255,255,.06);

    color:white;

    font-size:18px;

    padding:0 14px;
}

/* slider */

.range-box{

    background:
    rgba(255,255,255,.04);

    border:
    1px solid rgba(255,255,255,.04);

    border-radius:18px;

    padding:14px;
}

.range{

    width:100%;
}

/* tags */

.tags-container{

    display:flex;

    flex-wrap:wrap;

    gap:10px;

    margin-bottom:18px;
}

.tag{

    display:flex;

    align-items:center;

    gap:8px;

    padding:10px 14px;

    border-radius:999px;

    background:
    rgba(255,255,255,.06);

    border:
    1px solid rgba(255,255,255,.08);
}

.tag-remove{

    cursor:pointer;

    color:#d8bf8a;
}

/* toggles */

.toggle-grid{

    display:grid;

    grid-template-columns:
    repeat(2,1fr);

    gap:10px;

    margin-bottom:14px;
}

.toggle-item{

    background:
    rgba(255,255,255,.04);

    border:
    1px solid rgba(255,255,255,.05);

    border-radius:16px;

    padding:12px;

    display:flex;

    align-items:center;

    justify-content:space-between;
}

.toggle{

    width:42px;
    height:22px;

    background:
    rgba(255,255,255,.08);

    border-radius:999px;

    position:relative;

    cursor:pointer;
}

.toggle.active{

    background:
    linear-gradient(
    90deg,
    #8268ff,
    #ffb0d9
    );
}

.toggle-ball{

    width:16px;
    height:16px;

    background:white;

    border-radius:50%;

    position:absolute;

    top:3px;
    left:3px;

    transition:.3s;
}

.toggle.active .toggle-ball{

    left:23px;
}

/* button */

.generate-btn{

    width:100%;

    height:62px;

    border:none;

    border-radius:22px;

    cursor:pointer;

    color:white;

    font-size:22px;

    font-family:
    "Cinzel",
    serif;

    letter-spacing:2px;

    background:
    linear-gradient(
    90deg,
    #8268ff,
    #bc8cff,
    #ffb0d9
    );
}

/* results */

.results{

    margin-top:18px;

    display:grid;

    gap:12px;
}

.result-card{

    background:
    var(--card);

    border:
    1px solid rgba(255,255,255,.05);

    border-radius:20px;

    padding:18px;

    cursor:pointer;
}

.username{

    font-size:
    clamp(
        24px,
        5vw,
        38px
    );

    word-break:break-word;
}

.meaning{

    margin-top:10px;

    color:#d8c9f3;

    line-height:1.7;

    font-size:16px;
}

/* copied */

.copied{

    position:fixed;

    left:50%;

    bottom:24px;

    transform:translateX(-50%);

    background:
    rgba(20,16,32,.95);

    padding:10px 18px;

    border-radius:999px;

    opacity:0;

    transition:.35s;
}

.copied.show{

    opacity:1;
}

</style>

</head>

<body>

<div class="stars" id="stars"></div>

<div class="frame"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="container">

    <div class="moon">

        <div class="moon-symbol">
            ☾
        </div>

    </div>

    <div class="title">

        <h1 class="main-title">
            DreamID
        </h1>

        <p class="subtitle">
            Create beautiful usernames ✦
        </p>

    </div>

    <div class="panel">

        <div class="label">
            <div class="label-title">
                第一關鍵字
            </div>
        </div>

        <input
        id="keyword1"
        class="input"
        value="Tofu">

        <div class="label">
            <div class="label-title">
                第二關鍵字
            </div>
        </div>

        <input
        id="keyword2"
        class="input"
        value="Douce">

        <div class="label">
            <div class="label-title">
                自訂元素
            </div>
        </div>

        <input
        id="customTagInput"
        class="input"
        placeholder="輸入元素後按 Enter">

        <div
        class="tags-container"
        id="tagsContainer">

        </div>

        <div class="row">

            <div class="range-box">

                <div id="lengthValue">
                    12 字元
                </div>

                <input
                type="range"
                min="4"
                max="24"
                value="12"
                class="range"
                id="lengthRange">

            </div>

            <select
            id="separator"
            class="select">

                <option value="">
                    無分隔
                </option>

                <option value=".">.</option>
                <option value="_">_</option>
                <option value="-">-</option>
                <option value="@">@</option>

            </select>

        </div>

        <div class="toggle-grid">

            <div class="toggle-item">

                <span>大寫</span>

                <div class="toggle" id="upperToggle">
                    <div class="toggle-ball"></div>
                </div>

            </div>

            <div class="toggle-item">

                <span>數字</span>

                <div
                class="toggle active"
                id="numberToggle">

                    <div class="toggle-ball"></div>

                </div>

            </div>

            <div class="toggle-item">

                <span>符號</span>

                <div class="toggle" id="symbolToggle">
                    <div class="toggle-ball"></div>
                </div>

            </div>

            <div class="toggle-item">

                <span>極簡</span>

                <div class="toggle" id="simpleToggle">
                    <div class="toggle-ball"></div>
                </div>

            </div>

        </div>

        <button
        class="generate-btn"
        onclick="generateID()">

            GENERATE ID

        </button>

    </div>

    <div
    class="results"
    id="results">

    </div>

</div>

<div
id="copied"
class="copied">

    已複製 ✦

</div>

<script>

/* 星空 */

const stars =
document.getElementById("stars");

for(let i=0;i<160;i++){

    const star =
    document.createElement("div");

    star.className = "star";

    if(Math.random()>.92){

        star.classList.add("big");
    }

    star.style.left =
    Math.random()*100 + "%";

    star.style.top =
    Math.random()*100 + "%";

    star.style.animationDelay =
    Math.random()*4 + "s";

    stars.appendChild(star);
}

/* toggle */

document
.querySelectorAll(".toggle")
.forEach(toggle=>{

    toggle.onclick=()=>{

        toggle.classList.toggle("active");
    };
});

/* range */

const range =
document.getElementById("lengthRange");

const value =
document.getElementById("lengthValue");

range.oninput=()=>{

    value.innerText =
    range.value + " 字元";
};

/* tags */

const customTagInput =
document.getElementById("customTagInput");

const tagsContainer =
document.getElementById("tagsContainer");

let customTags = [
    "yume",
    "sleepy",
    "mori"
];

function renderTags(){

    tagsContainer.innerHTML = "";

    customTags.forEach((tag,index)=>{

        const el =
        document.createElement("div");

        el.className = "tag";

        el.innerHTML =

        `
        <span>${tag}</span>

        <span
        class="tag-remove"
        onclick="removeTag(${index})">

        ✕
        </span>
        `;

        tagsContainer.appendChild(el);
    });
}

function removeTag(index){

    customTags.splice(index,1);

    renderTags();
}

customTagInput
.addEventListener("keydown",e=>{

    if(e.key==="Enter"){

        e.preventDefault();

        const value =
        customTagInput.value.trim();

        if(!value) return;

        customTags.push(value);

        customTagInput.value = "";

        renderTags();
    }
});

renderTags();

/* 詞庫 */

const worlds = [

"Nova",
"Moon",
"Dream",
"Void",
"Angel",
"Royal",
"Cloud",
"Echo"
];

/* generate */

function generateID(){

    const k1 =
    document
    .getElementById("keyword1")
    .value
    .trim()

    || "Tofu";

    const k2 =
    document
    .getElementById("keyword2")
    .value
    .trim()

    || "Douce";

    const separator =
    document
    .getElementById("separator")
    .value;

    const upper =
    document
    .getElementById("upperToggle")
    .classList.contains("active");

    const number =
    document
    .getElementById("numberToggle")
    .classList.contains("active");

    const symbol =
    document
    .getElementById("symbolToggle")
    .classList.contains("active");

    const simple =
    document
    .getElementById("simpleToggle")
    .classList.contains("active");

    const maxLength =
    parseInt(range.value);

    const results =
    document.getElementById("results");

    results.innerHTML = "";

    for(let i=0;i<8;i++){

        const worldWord =
        worlds[
        Math.floor(
        Math.random()*worlds.length
        )];

        const customWord =
        customTags[
        Math.floor(
        Math.random()*customTags.length
        )];

        const randomNumber =
        Math.floor(
        Math.random()*999
        );

        let id = "";

        /* 真正依字數 */

        if(maxLength <= 6){

            const pool = [

                k1,
                k2,
                worldWord,
                customWord
            ];

            id =
            pool[
            Math.floor(
            Math.random()*pool.length
            )];

            id =
            id.substring(0,maxLength);
        }

        else if(maxLength <= 10){

            const mode =
            Math.floor(
            Math.random()*4
            );

            switch(mode){

                case 0:

                id =
                k1 + worldWord;

                break;

                case 1:

                id =
                worldWord + k2;

                break;

                case 2:

                id =
                k1 + customWord;

                break;

                default:

                id =
                customWord + k2;
            }
        }

        else{

            const mode =
            Math.floor(
            Math.random()*6
            );

            switch(mode){

                case 0:

                id =
                k1
                +
                separator
                +
                k2;

                break;

                case 1:

                id =
                k2
                +
                randomNumber
                +
                separator
                +
                k1;

                break;

                case 2:

                id =
                k1
                +
                worldWord;

                break;

                case 3:

                id =
                customWord
                +
                separator
                +
                k2;

                break;

                case 4:

                id =
                k1
                +
                randomNumber
                +
                customWord;

                break;

                default:

                id =
                k1
                +
                separator
                +
                worldWord;
            }
        }

        if(simple){

            id =
            id.replace(
            /[^a-zA-Z0-9@._-]/g,
            ""
            );
        }

        if(number){

            if(!id.match(/\d/)
            && maxLength >= 8){

                id +=
                Math.floor(
                Math.random()*99
                );
            }
        }

        if(symbol){

            if(maxLength >= 8){

                const symbols = [
                    ".",
                    "_",
                    "x"
                ];

                id +=
                symbols[
                Math.floor(
                Math.random()*symbols.length
                )];
            }
        }

        if(upper){

            id =
            id.toUpperCase();
        }

        id =
        id.substring(0,maxLength);

        let meaning =
        "帶有獨特世界觀氣息的名字。";

        if(id.includes("Moon")){

            meaning =
            "像月光般安靜溫柔。";
        }

        if(id.includes("Nova")){

            meaning =
            "帶有宇宙與星體誕生感。";
        }

        if(id.includes(k1)
        &&
        id.includes(k2)){

            meaning =
            "保留原始名稱連結感。";
        }

        const card =
        document.createElement("div");

        card.className =
        "result-card";

        card.innerHTML =

        `
        <div class="username">
            ${id}
        </div>

        <div class="meaning">
            ${meaning}
        </div>
        `;

        card.onclick=()=>{

            navigator
            .clipboard
            .writeText(id);

            const copied =
            document.getElementById("copied");

            copied.classList.add("show");

            setTimeout(()=>{

                copied.classList.remove("show");

            },1800);
        };

        results.appendChild(card);
    }
}

generateID();

</script>

</body>
</html>
