<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Little Universe ID Generator</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg1:#120f1d;
    --bg2:#1d1530;
    --bg3:#2d1f48;

    --gold:#d8bf8a;

    --pink:#f3c6ff;

    --glow:#9d7bff;
}

body{

    min-height:100vh;

    overflow-x:hidden;

    color:white;

    font-family:
    "Cormorant Garamond",
    serif;

    background:

    radial-gradient(
    circle at top,
    rgba(180,150,255,.18),
    transparent 30%
    ),

    linear-gradient(
    180deg,
    var(--bg1),
    var(--bg2),
    var(--bg3)
    );

    padding:28px;

    position:relative;
}

/* 星空 */

.stars{

    position:fixed;

    inset:0;

    overflow:hidden;

    z-index:-5;
}

.star{

    position:absolute;

    width:2px;
    height:2px;

    background:white;

    border-radius:50%;

    opacity:.7;

    animation:twinkle 4s infinite;
}

@keyframes twinkle{

    0%{
        opacity:.15;
        transform:scale(.7);
    }

    50%{
        opacity:1;
        transform:scale(1.4);
    }

    100%{
        opacity:.15;
        transform:scale(.7);
    }
}

/* 邊框 */

.frame{

    position:fixed;

    inset:14px;

    border:
    1.5px solid
    rgba(216,191,138,.55);

    border-radius:38px;

    pointer-events:none;

    z-index:999;
}

.frame::before{

    content:"";

    position:absolute;

    inset:14px;

    border:
    1px solid
    rgba(216,191,138,.16);

    border-radius:30px;
}

.frame::after{

    content:"";

    position:absolute;

    inset:28px;

    border:
    1px solid
    rgba(216,191,138,.07);

    border-radius:24px;
}

/* 裝飾 */

.ornament{

    position:fixed;

    width:160px;
    height:160px;

    pointer-events:none;

    z-index:1001;
}

.ornament::before{

    content:"";

    position:absolute;

    inset:0;

    border:
    1.5px solid
    rgba(216,191,138,.42);

    border-radius:50%;
}

.ornament::after{

    content:"✦";

    position:absolute;

    color:#d8bf8a;

    font-size:26px;
}

.o1{
    top:18px;
    left:18px;
}

.o1::before{
    clip-path:polygon(0 0,100% 0,0 100%);
}

.o1::after{
    top:18px;
    left:18px;
}

.o2{
    top:18px;
    right:18px;
}

.o2::before{
    clip-path:polygon(0 0,100% 0,100% 100%);
}

.o2::after{
    top:18px;
    right:18px;
}

.o3{
    bottom:18px;
    left:18px;
}

.o3::before{
    clip-path:polygon(0 0,0 100%,100% 100%);
}

.o3::after{
    bottom:18px;
    left:18px;
}

.o4{
    bottom:18px;
    right:18px;
}

.o4::before{
    clip-path:polygon(100% 0,0 100%,100% 100%);
}

.o4::after{
    bottom:18px;
    right:18px;
}

/* 月亮 */

.moon-wrap{

    display:flex;

    flex-direction:column;

    align-items:center;

    margin-top:10px;
}

.moon-line{

    width:1px;

    height:42px;

    background:
    linear-gradient(
    180deg,
    transparent,
    rgba(216,191,138,.8)
    );
}

.hanging-moon{

    color:#d8bf8a;

    font-size:42px;

    animation:swing 5s ease-in-out infinite;

    transform-origin:top center;
}

@keyframes swing{

    0%{
        transform:rotate(-3deg);
    }

    50%{
        transform:rotate(3deg);
    }

    100%{
        transform:rotate(-3deg);
    }
}

/* Header */

.header{

    text-align:center;

    margin-bottom:50px;
}

.logo{

    font-family:
    "Great Vibes",
    cursive;

    font-size:
    clamp(
        68px,
        12vw,
        120px
    );

    color:#efd8ff;

    text-shadow:
    0 0 20px rgba(220,180,255,.25);
}

.subtitle{

    margin-top:10px;

    color:#d8bf8a;

    font-size:
    clamp(
        18px,
        3vw,
        26px
    );

    line-height:1.8;
}

/* layout */

.container{

    max-width:1400px;

    margin:auto;

    display:grid;

    grid-template-columns:
    430px 1fr;

    gap:34px;
}

/* 左側 */

.panel{

    background:
    rgba(29,24,44,.62);

    border:
    1px solid rgba(255,255,255,.05);

    border-radius:34px;

    padding:34px;

    backdrop-filter:blur(18px);

    box-shadow:
    0 10px 40px rgba(0,0,0,.3);
}

/* label */

.label{

    margin-bottom:12px;

    font-size:22px;

    color:#f3eaff;
}

/* input */

.input{

    width:100%;

    height:70px;

    border:none;

    border-radius:24px;

    padding:0 24px;

    background:
    rgba(255,255,255,.05);

    color:white;

    font-size:24px;

    outline:none;

    margin-bottom:24px;
}

/* style buttons */

.styles{

    display:flex;

    flex-wrap:wrap;

    gap:12px;

    margin-bottom:24px;
}

.style-btn{

    border:none;

    border-radius:999px;

    padding:12px 18px;

    cursor:pointer;

    color:white;

    background:
    rgba(255,255,255,.06);

    border:
    1px solid rgba(255,255,255,.08);

    transition:.3s;
}

.style-btn.active{

    background:
    linear-gradient(
    90deg,
    #8268ff,
    #ffb0d9
    );

    box-shadow:
    0 0 20px rgba(155,120,255,.45);
}

/* options */

.option-group{

    margin-bottom:24px;
}

.option-title{

    margin-bottom:12px;

    color:#d8bf8a;

    font-size:18px;
}

.option-row{

    display:flex;

    gap:10px;

    flex-wrap:wrap;
}

.option{

    padding:10px 18px;

    border-radius:999px;

    background:
    rgba(255,255,255,.05);

    cursor:pointer;

    border:
    1px solid rgba(255,255,255,.08);
}

.option.active{

    background:
    rgba(170,130,255,.35);
}

/* generate */

.generate-btn{

    width:100%;

    height:76px;

    border:none;

    border-radius:24px;

    cursor:pointer;

    color:white;

    font-size:26px;

    font-family:
    "Cormorant Garamond",
    serif;

    background:
    linear-gradient(
    90deg,
    #8268ff,
    #bc8cff,
    #ffb0d9
    );

    box-shadow:
    0 12px 30px rgba(120,100,255,.4);

    transition:.35s;
}

.generate-btn:hover{

    transform:
    translateY(-3px)
    scale(1.01);
}

/* results */

.results{

    display:grid;

    gap:18px;
}

/* card */

.id-card{

    background:
    rgba(29,24,44,.62);

    border:
    1px solid rgba(255,255,255,.05);

    border-radius:28px;

    padding:28px;

    backdrop-filter:blur(18px);

    transition:.35s;

    cursor:pointer;

    position:relative;

    overflow:hidden;
}

.id-card::before{

    content:"";

    position:absolute;

    inset:0;

    background:
    linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,.04),
    transparent
    );

    transform:
    translateX(-100%);
}

.id-card:hover::before{

    transform:
    translateX(100%);

    transition:1s;
}

.id-card:hover{

    transform:
    translateY(-4px);

    box-shadow:
    0 12px 40px rgba(120,100,255,.22);
}

/* title */

.id-title{

    color:#d8bf8a;

    letter-spacing:2px;

    font-size:14px;

    margin-bottom:14px;
}

/* username */

.username{

    font-size:
    clamp(
        28px,
        4vw,
        44px
    );

    color:#f6eaff;

    word-break:break-word;
}

/* copied */

.copied{

    position:fixed;

    left:50%;

    bottom:40px;

    transform:translateX(-50%);

    background:
    rgba(25,20,40,.92);

    border:
    1px solid rgba(255,255,255,.08);

    color:white;

    padding:14px 26px;

    border-radius:999px;

    opacity:0;

    pointer-events:none;

    transition:.35s;

    z-index:9999;
}

.copied.show{

    opacity:1;
}

/* 手機 */

@media(max-width:1100px){

    .container{

        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="frame"></div>

<div class="ornament o1"></div>
<div class="ornament o2"></div>
<div class="ornament o3"></div>
<div class="ornament o4"></div>

<!-- Header -->

<div class="header">

    <div class="moon-wrap">

        <div class="moon-line"></div>

        <div class="hanging-moon">
            ☾
        </div>

    </div>

    <div class="logo">
        Little Universe
    </div>

    <div class="subtitle">

        Create aesthetic usernames
        <br>
        from your soul ✦

    </div>

</div>

<div class="container">

    <!-- LEFT -->

    <div class="panel">

        <div class="label">
            Soul Word
        </div>

        <input
        id="keyword"
        class="input"
        placeholder="Dream...">

        <!-- style -->

        <div class="label">
            Universe Style
        </div>

        <div class="styles">

            <button class="style-btn active">
                ☾ Dreamy
            </button>

            <button class="style-btn">
                ✦ Angel
            </button>

            <button class="style-btn">
                ♱ Gothic
            </button>

            <button class="style-btn">
                ☁ Soft
            </button>

            <button class="style-btn">
                ⟡ Cyber
            </button>

        </div>

        <!-- separator -->

        <div class="option-group">

            <div class="option-title">
                Separator
            </div>

            <div class="option-row">

                <div class="option active">
                    .
                </div>

                <div class="option">
                    _
                </div>

                <div class="option">
                    -
                </div>

                <div class="option">
                    none
                </div>

            </div>

        </div>

        <!-- case -->

        <div class="option-group">

            <div class="option-title">
                Letter Style
            </div>

            <div class="option-row">

                <div class="option active">
                    lowercase
                </div>

                <div class="option">
                    Capitalize
                </div>

                <div class="option">
                    UPPERCASE
                </div>

            </div>

        </div>

        <button
        class="generate-btn"
        onclick="generateUsernames()">

            Generate Universe

        </button>

    </div>

    <!-- RIGHT -->

    <div
    class="results"
    id="results">

    </div>

</div>

<div
id="copied"
class="copied">

    Copied to your universe ✨

</div>

<script>

/* 星空 */

const stars =
document.getElementById("stars");

for(let i=0;i<160;i++){

    const star =
    document.createElement("div");

    star.className = "star";

    star.style.left =
    Math.random()*100 + "%";

    star.style.top =
    Math.random()*100 + "%";

    star.style.animationDelay =
    Math.random()*4 + "s";

    stars.appendChild(star);
}

/* options active */

document
.querySelectorAll(".option")
.forEach(btn=>{

    btn.onclick=()=>{

        const parent =
        btn.parentElement;

        parent
        .querySelectorAll(".option")
        .forEach(b=>
            b.classList.remove("active")
        );

        btn.classList.add("active");
    };
});

/* styles */

document
.querySelectorAll(".style-btn")
.forEach(btn=>{

    btn.onclick=()=>{

        document
        .querySelectorAll(".style-btn")
        .forEach(b=>
            b.classList.remove("active")
        );

        btn.classList.add("active");
    };
});

/* word banks */

const prefixes = [

    "moon",
    "little",
    "velvet",
    "dreamy",
    "astral",
    "midnight",
    "soft",
    "echo",
    "hollow",
    "lunar",
    "void",
    "angel",
    "cloud",
    "nova"
];

const suffixes = [

    "archive",
    "memory",
    "verse",
    "echo",
    "dream",
    "signal",
    "garden",
    "child",
    "velvet",
    "dust",
    "moon",
    "angel",
    "void"
];

/* generate */

function generateUsernames(){

    const keyword =

    document
    .getElementById("keyword")
    .value
    .trim()

    || "dream";

    const separator =

    document
    .querySelector(
    ".option-row:nth-child(2) .option.active"
    )?.innerText || ".";

    const caseStyle =

    document
    .querySelector(
    ".option-row:nth-child(4) .option.active"
    )?.innerText || "lowercase";

    const results =
    document.getElementById("results");

    results.innerHTML = "";

    for(let i=0;i<8;i++){

        let name =

        prefixes[
        Math.floor(
        Math.random()
        * prefixes.length
        )]

        +

        (
            separator==="none"
            ? ""
            : separator
        )

        +

        keyword

        +

        (
            separator==="none"
            ? ""
            : separator
        )

        +

        suffixes[
        Math.floor(
        Math.random()
        * suffixes.length
        )];

        /* case */

        if(caseStyle==="Capitalize"){

            name =
            name.replace(
            /\b\w/g,
            c=>c.toUpperCase()
            );
        }

        if(caseStyle==="UPPERCASE"){

            name =
            name.toUpperCase();
        }

        const card =
        document.createElement("div");

        card.className = "id-card";

        card.innerHTML =

        `
        <div class="id-title">
            LITTLE UNIVERSE ID
        </div>

        <div class="username">
            ${name}
        </div>
        `;

        card.onclick=()=>{

            navigator.clipboard.writeText(name);

            const copied =
            document.getElementById("copied");

            copied.classList.add("show");

            setTimeout(()=>{

                copied.classList.remove("show");

            },1800);
        };

        results.appendChild(card);
    }
}

/* first */

generateUsernames();

</script>

</body>
</html>
