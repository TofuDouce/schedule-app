<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DreamID</title>

<meta
name="robots"
content="noindex,nofollow,noarchive,nosnippet,noimageindex">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg1:#171320;
    --bg2:#241a35;
    --bg3:#31244d;

    --gold:#d8bf8a;

    --text:#f4efff;

    --card:
    rgba(29,24,44,.72);
}

body{

    min-height:100vh;

    overflow-x:hidden;

    color:var(--text);

    font-family:
    "Cormorant Garamond",
    serif;

    background:

    radial-gradient(
    circle at top,
    rgba(180,150,255,.14),
    transparent 30%
    ),

    radial-gradient(
    circle at bottom,
    rgba(120,90,255,.08),
    transparent 30%
    ),

    linear-gradient(
    180deg,
    var(--bg1),
    var(--bg2),
    var(--bg3)
    );

    padding:16px;

    position:relative;
}

/* 星空 */

.stars{

    position:fixed;

    inset:0;

    overflow:hidden;

    z-index:-3;
}

.star{

    position:absolute;

    width:2px;
    height:2px;

    background:white;

    border-radius:50%;

    opacity:.7;

    animation:twinkle 4s infinite;
}

.star.big{

    width:4px;
    height:4px;

    background:var(--gold);

    box-shadow:
    0 0 10px rgba(216,191,138,.8);
}

@keyframes twinkle{

    0%{
        opacity:.15;
        transform:scale(.7);
    }

    50%{
        opacity:1;
        transform:scale(1.4);
    }

    100%{
        opacity:.15;
        transform:scale(.7);
    }
}

/* 邊框 */

.frame{

    position:fixed;

    inset:10px;

    border:
    1.2px solid rgba(216,191,138,.42);

    border-radius:34px;

    pointer-events:none;

    z-index:999;
}

.frame::before{

    content:"";

    position:absolute;

    inset:10px;

    border:
    1px solid rgba(216,191,138,.12);

    border-radius:28px;
}

/* 四角 */

.corner{

    position:fixed;

    width:95px;
    height:95px;

    pointer-events:none;

    z-index:1000;
}

.corner::before{

    content:"";

    position:absolute;

    inset:0;

    border:
    1px solid rgba(216,191,138,.38);

    border-radius:50%;
}

.corner::after{

    content:"✦";

    position:absolute;

    color:rgba(216,191,138,.9);

    font-size:20px;
}

.tl{
    top:14px;
    left:14px;
}

.tl::before{
    clip-path:polygon(0 0,100% 0,0 100%);
}

.tl::after{
    top:12px;
    left:12px;
}

.tr{
    top:14px;
    right:14px;
}

.tr::before{
    clip-path:polygon(0 0,100% 0,100% 100%);
}

.tr::after{
    top:12px;
    right:12px;
}

.bl{
    bottom:14px;
    left:14px;
}

.bl::before{
    clip-path:polygon(0 0,0 100%,100% 100%);
}

.bl::after{
    bottom:12px;
    left:12px;
}

.br{
    bottom:14px;
    right:14px;
}

.br::before{
    clip-path:polygon(100% 0,0 100%,100% 100%);
}

.br::after{
    bottom:12px;
    right:12px;
}

/* container */

.container{

    max-width:720px;

    margin:auto;

    position:relative;

    z-index:2;
}

/* 月亮 */

.moon{

    text-align:center;

    margin-top:2px;

    position:relative;
}

.moon::before{

    content:"";

    position:absolute;

    left:50%;

    top:-42px;

    width:1px;
    height:42px;

    background:
    rgba(216,191,138,.35);
}

.moon-symbol{

    font-size:28px;

    color:var(--gold);

    animation:floatMoon 4s ease-in-out infinite;
}

@keyframes floatMoon{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(4px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* title */

.title{

    text-align:center;

    margin-top:12px;

    margin-bottom:20px;
}

.main-title{

    font-family:
    "Great Vibes",
    cursive;

    font-size:
    clamp(
        44px,
        10vw,
        72px
    );

    color:#efd8ff;
}

.subtitle{

    margin-top:6px;

    font-size:
    clamp(
        14px,
        3vw,
        18px
    );

    color:#d8bf8a;
}

/* panel */

.panel{

    background:
    var(--card);

    border:
    1px solid rgba(255,255,255,.05);

    border-radius:28px;

    padding:18px;

    backdrop-filter:blur(16px);
}

/* label */

.label{

    margin-bottom:6px;
}

.label-title{

    font-size:20px;

    font-weight:600;
}

.label-sub{

    color:#d8bf8a;

    font-size:12px;

    letter-spacing:2px;
}

/* input */

.input{

    width:100%;

    height:56px;

    border:none;

    outline:none;

    border-radius:18px;

    background:
    rgba(255,255,255,.05);

    color:white;

    font-size:22px;

    padding:0 18px;

    margin-bottom:14px;

    font-family:
    "Cormorant Garamond",
    serif;
}

.input::placeholder{

    color:
    rgba(255,255,255,.28);
}

/* 世界觀 */

.world-select{

    margin-bottom:22px;
}

/* row */

.row{

    display:grid;

    grid-template-columns:
    1fr 1fr;

    gap:14px;

    margin-bottom:16px;
}

/* select */

.select{

    width:100%;

    height:54px;

    border:none;

    outline:none;

    border-radius:16px;

    background:
    rgba(255,255,255,.06);

    color:white;

    font-size:18px;

    padding:0 14px;
}

/* slider */

.range-box{

    background:
    rgba(255,255,255,.04);

    border:
    1px solid rgba(255,255,255,.04);

    border-radius:18px;

    padding:14px;
}

.range-value{

    color:#d8bf8a;

    margin-bottom:8px;

    font-size:16px;
}

.range{

    width:100%;
}

/* toggle */

.toggle-grid{

    display:grid;

    grid-template-columns:
    repeat(2,1fr);

    gap:10px;

    margin-bottom:14px;
}

.toggle-item{

    background:
    rgba(255,255,255,.04);

    border:
    1px solid rgba(255,255,255,.05);

    border-radius:16px;

    padding:12px;

    display:flex;

    align-items:center;

    justify-content:space-between;
}

.toggle-name{

    font-size:16px;
}

.toggle{

    width:42px;
    height:22px;

    background:
    rgba(255,255,255,.08);

    border-radius:999px;

    position:relative;

    cursor:pointer;
}

.toggle.active{

    background:
    linear-gradient(
    90deg,
    #8268ff,
    #ffb0d9
    );
}

.toggle-ball{

    width:16px;
    height:16px;

    background:white;

    border-radius:50%;

    position:absolute;

    top:3px;
    left:3px;

    transition:.3s;
}

.toggle.active .toggle-ball{

    left:23px;
}

/* button */

.generate-btn{

    width:100%;

    height:62px;

    border:none;

    border-radius:22px;

    cursor:pointer;

    color:white;

    font-size:22px;

    font-family:
    "Cinzel",
    serif;

    letter-spacing:2px;

    background:
    linear-gradient(
    90deg,
    #8268ff,
    #bc8cff,
    #ffb0d9
    );

    box-shadow:
    0 10px 26px rgba(120,100,255,.28);
}

/* results */

.results{

    margin-top:16px;

    display:grid;

    gap:12px;
}

.result-card{

    background:
    var(--card);

    border:
    1px solid rgba(255,255,255,.05);

    border-radius:20px;

    padding:18px;

    cursor:pointer;

    position:relative;

    overflow:hidden;
}

.result-card::before{

    content:"";

    position:absolute;

    inset:0;

    background:
    radial-gradient(
    circle at top,
    rgba(255,255,255,.04),
    transparent 60%
    );
}

.result-title{

    color:var(--gold);

    font-size:11px;

    letter-spacing:2px;

    margin-bottom:6px;

    position:relative;
}

.username{

    font-size:
    clamp(
        24px,
        5vw,
        38px
    );

    word-break:break-word;

    position:relative;
}

.meaning{

    margin-top:10px;

    color:#d8c9f3;

    line-height:1.7;

    font-size:16px;

    position:relative;
}

.rare{

    position:absolute;

    top:16px;
    right:16px;

    font-size:11px;

    letter-spacing:2px;

    color:#ffdf9f;
}

/* copied */

.copied{

    position:fixed;

    left:50%;

    bottom:24px;

    transform:translateX(-50%);

    background:
    rgba(20,16,32,.95);

    border:
    1px solid rgba(255,255,255,.08);

    padding:10px 18px;

    border-radius:999px;

    opacity:0;

    transition:.35s;

    pointer-events:none;

    z-index:9999;
}

.copied.show{

    opacity:1;
}

</style>

</head>

<body>

<div class="stars" id="stars"></div>

<div class="frame"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="container">

    <div class="moon">

        <div class="moon-symbol">
            ☾
        </div>

    </div>

    <div class="title">

        <h1 class="main-title">
            DreamID
        </h1>

        <p class="subtitle">
            Create beautiful usernames ✦
        </p>

    </div>

    <div class="panel">

        <!-- 第一關鍵字 -->

        <div class="label">

            <div class="label-title">
                第一關鍵字
            </div>

            <div class="label-sub">
                KEYWORD
            </div>

        </div>

        <input
        id="keyword1"
        class="input"
        value="Tofu"
        placeholder="Tofu">

        <!-- 第二關鍵字 -->

        <div class="label">

            <div class="label-title">
                第二關鍵字
            </div>

            <div class="label-sub">
                OPTIONAL
            </div>

        </div>

        <input
        id="keyword2"
        class="input"
        value="Douce"
        placeholder="Douce">

        <!-- 世界觀 -->

        <div class="label">

            <div class="label-title">
                世界觀風格
            </div>

            <div class="label-sub">
                STYLE WORLD
            </div>

        </div>

        <select
        id="style"
        class="select world-select">

            <option value="dreamy">
                🌙 夢境 Dreamy
            </option>

            <option value="angel">
                ✨ 天使 Angel
            </option>

            <option value="cyber">
                ⚡ 賽博 Cyber
            </option>

            <option value="gothic">
                🦇 暗夜 Gothic
            </option>

            <option value="soft">
                ☁️ 柔霧 Soft
            </option>

            <option value="luxury">
                👑 奢華 Luxury
            </option>

            <option value="ocean">
                🌊 深海 Ocean
            </option>

            <option value="fairy">
                🧚 精靈 Fairy
            </option>

            <option value="space">
                🌌 星際 Space
            </option>

            <option value="royal">
                🏛️ 王室 Royal
            </option>

        </select>

        <!-- 字數 + 分隔 -->

        <div class="row">

            <div class="range-box">

                <div
                class="range-value"
                id="lengthValue">

                    12 字元

                </div>

                <input
                type="range"
                min="4"
                max="20"
                value="12"
                class="range"
                id="lengthRange">

            </div>

            <select
            id="separator"
            class="select">

                <option value="">
                    無分隔
                </option>

                <option value=".">
                    .
                </option>

                <option value="_">
                    _
                </option>

                <option value="-">
                    -
                </option>

                <option value="@">
                    @
                </option>

            </select>

        </div>

        <!-- toggle -->

        <div class="toggle-grid">

            <div class="toggle-item">

                <div class="toggle-name">
                    大寫
                </div>

                <div
                class="toggle"
                id="upperToggle">

                    <div class="toggle-ball"></div>

                </div>

            </div>

            <div class="toggle-item">

                <div class="toggle-name">
                    數字
                </div>

                <div
                class="toggle active"
                id="numberToggle">

                    <div class="toggle-ball"></div>

                </div>

            </div>

            <div class="toggle-item">

                <div class="toggle-name">
                    符號
                </div>

                <div
                class="toggle"
                id="symbolToggle">

                    <div class="toggle-ball"></div>

                </div>

            </div>

            <div class="toggle-item">

                <div class="toggle-name">
                    極簡
                </div>

                <div
                class="toggle"
                id="simpleToggle">

                    <div class="toggle-ball"></div>

                </div>

            </div>

        </div>

        <button
        class="generate-btn"
        onclick="generateID()">

            GENERATE ID

        </button>

    </div>

    <div
    class="results"
    id="results">

    </div>

</div>

<div
id="copied"
class="copied">

    已複製 ✦

</div>

<script>

/* 星空 */

const stars =
document.getElementById("stars");

for(let i=0;i<160;i++){

    const star =
    document.createElement("div");

    star.className = "star";

    if(Math.random()>.92){

        star.classList.add("big");
    }

    star.style.left =
    Math.random()*100 + "%";

    star.style.top =
    Math.random()*100 + "%";

    star.style.animationDelay =
    Math.random()*4 + "s";

    stars.appendChild(star);
}

/* toggle */

document
.querySelectorAll(".toggle")
.forEach(toggle=>{

    toggle.onclick=()=>{

        toggle.classList.toggle("active");
    };
});

/* range */

const range =
document.getElementById("lengthRange");

const value =
document.getElementById("lengthValue");

range.oninput=()=>{

    value.innerText =
    range.value + " 字元";
};

/* 世界觀詞庫 */

const styleWorlds = {

dreamy:[

"nova","luna","veil",
"echo","cloud","night",
"mist","star","dream",
"aurora","velvet","moon",
"ether","celeste","dawn",
"starlit","mirage"
],

angel:[

"halo","seraph","aether",
"celest","divine","solis",
"lucent","elys","blessing",
"grace","feather","heaven"
],

cyber:[

"neo","404","byte",
"void","core","pixel",
"quantum","vortex",
"glitch","zero","code",
"matrix","cyber","data"
],

gothic:[

"grave","shade","thorn",
"raven","abyss","phantom",
"mour","blood","noctis",
"obsidian","velvet","dark"
],

soft:[

"milk","peach","mochi",
"cream","cotton","bunny",
"softie","vanilla",
"marsh","angel","snow"
],

luxury:[

"velour","gold","royal",
"diamond","celine",
"noir","silk","crown",
"luxe","opal"
],

ocean:[

"wave","aqua","coral",
"blue","marine","deep",
"whale","siren",
"ocean","misty"
],

fairy:[

"fairy","flora","petal",
"sprite","muse",
"butterfly","elven",
"forest","magic"
],

space:[

"galaxy","nova","orbit",
"cosmos","stellar",
"saturn","meteor",
"comet","nebula"
],

royal:[

"royal","duke","queen",
"prince","palace",
"empire","noble",
"velvet","kingdom"
]

};

/* 中文寓意 */

const meanings = [

"像深夜漂浮在宇宙中的旅人。",

"帶有溫柔與神秘氣息的名字。",

"像月光下安靜閃耀的人。",

"帶有守護感與夢境氛圍。",

"像夜空裡緩慢墜落的流星。",

"有種會被人默默記住的氣質。",

"像藏著故事感的名字。",

"帶有安靜卻耀眼的存在感。"
];

/* 稀有度 */

const rarities = [

"COMMON",
"RARE",
"EPIC",
"LEGENDARY"
];

/* 拆字 */

function splitWord(word){

    if(word.length < 4){

        return [word,word];
    }

    const cut =
    Math.floor(word.length/2);

    return [

        word.slice(0,cut),

        word.slice(cut)
    ];
}

/* generate */

function generateID(){

    const k1 =
    document
    .getElementById("keyword1")
    .value
    .trim()

    || "Tofu";

    const k2 =
    document
    .getElementById("keyword2")
    .value
    .trim()

    || "Douce";

    const style =
    document
    .getElementById("style")
    .value;

    const separator =
    document
    .getElementById("separator")
    .value;

    const upper =
    document
    .getElementById("upperToggle")
    .classList.contains("active");

    const number =
    document
    .getElementById("numberToggle")
    .classList.contains("active");

    const symbol =
    document
    .getElementById("symbolToggle")
    .classList.contains("active");

    const simple =
    document
    .getElementById("simpleToggle")
    .classList.contains("active");

    const maxLength =
    parseInt(range.value);

    const world =
    styleWorlds[style];

    const results =
    document.getElementById("results");

    results.innerHTML = "";

    const split1 =
    splitWord(k1);

    const split2 =
    splitWord(k2);

    const symbols = [
        "x","v","_","."
    ];

    for(let i=0;i<8;i++){

        const randomWord =
        world[
        Math.floor(
        Math.random()
        * world.length
        )];

        const randomNumber =
        Math.floor(
        Math.random()*99
        );

        const randomSymbol =
        symbols[
        Math.floor(
        Math.random()
        * symbols.length
        )];

        let id = "";

        const mode =
        Math.floor(
        Math.random()*7
        );

        switch(mode){

            case 0:

            id =
            split1[0]
            +
            separator
            +
            randomWord;

            break;

            case 1:

            id =
            randomWord
            +
            separator
            +
            split2[1];

            break;

            case 2:

            id =
            split1[0]
            +
            split2[1];

            break;

            case 3:

            id =
            split1[0]
            +
            randomWord
            +
            split2[1];

            break;

            case 4:

            id =
            randomWord
            +
            split1[1];

            break;

            case 5:

            id =
            split1[0]
            +
            separator
            +
            split2[0];

            break;

            default:

            id =
            randomWord
            +
            split2[1];
        }

        if(simple){

            id =
            id
            .replace(/[^a-zA-Z]/g,"");
        }

        if(number){

            id +=
            randomNumber;
        }

        if(symbol){

            id +=
            randomSymbol;
        }

        if(upper){

            id =
            id.toUpperCase();
        }else{

            id =
            id.charAt(0).toUpperCase()
            +
            id.slice(1);
        }

        id =
        id.substring(0,maxLength);

        const meaning =
        meanings[
        Math.floor(
        Math.random()
        * meanings.length
        )];

        const rarity =
        rarities[
        Math.floor(
        Math.random()
        * rarities.length
        )];

        const card =
        document.createElement("div");

        card.className =
        "result-card";

        card.innerHTML =

        `
        <div class="rare">
            ${rarity}
        </div>

        <div class="result-title">
            DREAM ID ✦
        </div>

        <div class="username">
            ${id}
        </div>

        <div class="meaning">
            ${meaning}
        </div>
        `;

        card.onclick=()=>{

            navigator
            .clipboard
            .writeText(id);

            const copied =
            document.getElementById("copied");

            copied.classList.add("show");

            setTimeout(()=>{

                copied.classList.remove("show");

            },1800);
        };

        results.appendChild(card);
    }
}

generateID();

</script>

</body>
</html>
