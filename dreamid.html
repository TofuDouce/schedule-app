<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DreamID</title>

<meta
name="robots"
content="noindex,nofollow,noarchive,nosnippet,noimageindex">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg1:#171320;
    --bg2:#241a35;
    --bg3:#31244d;

    --gold:#d8bf8a;

    --text:#f4efff;

    --card:
    rgba(29,24,44,.72);
}

body{

    min-height:100vh;

    overflow-x:hidden;

    color:var(--text);

    font-family:
    "Cormorant Garamond",
    serif;

    background:

    radial-gradient(
    circle at top,
    rgba(180,150,255,.14),
    transparent 30%
    ),

    radial-gradient(
    circle at bottom,
    rgba(120,90,255,.08),
    transparent 30%
    ),

    linear-gradient(
    180deg,
    var(--bg1),
    var(--bg2),
    var(--bg3)
    );

    padding:20px;

    position:relative;
}

/* 星空 */

.stars{

    position:fixed;

    inset:0;

    overflow:hidden;

    z-index:-3;
}

.star{

    position:absolute;

    width:2px;
    height:2px;

    background:white;

    border-radius:50%;

    opacity:.7;

    animation:twinkle 4s infinite;
}

.star.big{

    width:4px;
    height:4px;

    background:var(--gold);

    box-shadow:
    0 0 10px rgba(216,191,138,.8);
}

@keyframes twinkle{

    0%{
        opacity:.15;
        transform:scale(.7);
    }

    50%{
        opacity:1;
        transform:scale(1.4);
    }

    100%{
        opacity:.15;
        transform:scale(.7);
    }
}

/* 外框 */

.frame{

    position:fixed;

    inset:12px;

    border:
    1.5px solid rgba(216,191,138,.45);

    border-radius:36px;

    pointer-events:none;

    z-index:999;
}

.frame::before{

    content:"";

    position:absolute;

    inset:12px;

    border:
    1px solid rgba(216,191,138,.14);

    border-radius:28px;
}

/* 四角 */

.corner{

    position:fixed;

    width:110px;
    height:110px;

    pointer-events:none;

    z-index:1000;
}

.corner::before{

    content:"";

    position:absolute;

    inset:0;

    border:
    1.5px solid rgba(216,191,138,.4);

    border-radius:50%;
}

.corner::after{

    content:"✦";

    position:absolute;

    color:rgba(216,191,138,.9);

    font-size:24px;
}

.tl{
    top:16px;
    left:16px;
}

.tl::before{
    clip-path:polygon(0 0,100% 0,0 100%);
}

.tl::after{
    top:14px;
    left:14px;
}

.tr{
    top:16px;
    right:16px;
}

.tr::before{
    clip-path:polygon(0 0,100% 0,100% 100%);
}

.tr::after{
    top:14px;
    right:14px;
}

.bl{
    bottom:16px;
    left:16px;
}

.bl::before{
    clip-path:polygon(0 0,0 100%,100% 100%);
}

.bl::after{
    bottom:14px;
    left:14px;
}

.br{
    bottom:16px;
    right:16px;
}

.br::before{
    clip-path:polygon(100% 0,0 100%,100% 100%);
}

.br::after{
    bottom:14px;
    right:14px;
}

/* container */

.container{

    max-width:760px;

    margin:auto;

    position:relative;

    z-index:2;
}

/* 月亮 */

.moon{

    text-align:center;

    margin-top:6px;

    position:relative;
}

.moon::before{

    content:"";

    position:absolute;

    left:50%;

    top:-58px;

    width:1px;
    height:58px;

    background:
    rgba(216,191,138,.35);
}

.moon-symbol{

    font-size:34px;

    color:var(--gold);

    animation:floatMoon 4s ease-in-out infinite;
}

@keyframes floatMoon{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(5px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* 標題 */

.title{

    text-align:center;

    margin-top:16px;

    margin-bottom:30px;
}

.main-title{

    font-family:
    "Great Vibes",
    cursive;

    font-size:
    clamp(
        52px,
        11vw,
        88px
    );

    color:#efd8ff;

    line-height:1;
}

.subtitle{

    margin-top:10px;

    font-size:
    clamp(
        16px,
        3vw,
        22px
    );

    color:#d8bf8a;

    line-height:1.8;
}

/* panel */

.panel{

    background:
    var(--card);

    border:
    1px solid rgba(255,255,255,.06);

    border-radius:34px;

    padding:24px;

    backdrop-filter:blur(16px);
}

/* label */

.label{

    margin-bottom:10px;
}

.label-title{

    font-size:28px;

    font-weight:600;
}

.label-sub{

    color:#d8bf8a;

    letter-spacing:2px;

    margin-top:2px;

    font-size:14px;
}

/* input */

.input{

    width:100%;

    height:74px;

    border:none;

    outline:none;

    border-radius:24px;

    background:
    rgba(255,255,255,.05);

    color:white;

    font-size:28px;

    padding:0 24px;

    margin-bottom:24px;

    font-family:
    "Cormorant Garamond",
    serif;
}

.input::placeholder{

    color:
    rgba(255,255,255,.3);
}

/* options */

.settings{

    display:grid;

    gap:18px;

    margin-bottom:28px;
}

.setting{

    background:
    rgba(255,255,255,.04);

    border:
    1px solid rgba(255,255,255,.05);

    border-radius:24px;

    padding:18px;
}

.setting-top{

    display:flex;

    align-items:center;

    justify-content:space-between;

    margin-bottom:14px;
}

.setting-name{

    font-size:22px;
}

.toggle{

    width:58px;
    height:32px;

    background:
    rgba(255,255,255,.08);

    border-radius:999px;

    position:relative;

    cursor:pointer;
}

.toggle.active{

    background:
    linear-gradient(
    90deg,
    #8268ff,
    #ffb0d9
    );
}

.toggle-ball{

    width:24px;
    height:24px;

    background:white;

    border-radius:50%;

    position:absolute;

    top:4px;
    left:4px;

    transition:.3s;
}

.toggle.active .toggle-ball{

    left:30px;
}

/* select */

.select{

    width:100%;

    height:60px;

    border:none;

    outline:none;

    border-radius:18px;

    background:
    rgba(255,255,255,.06);

    color:white;

    font-size:20px;

    padding:0 18px;
}

/* slider */

.range-wrap{

    margin-top:8px;
}

.range-value{

    color:#d8bf8a;

    margin-bottom:8px;

    font-size:18px;
}

.range{

    width:100%;
}

/* button */

.generate-btn{

    width:100%;

    height:82px;

    border:none;

    border-radius:28px;

    cursor:pointer;

    color:white;

    font-size:28px;

    font-family:
    "Cinzel",
    serif;

    letter-spacing:2px;

    background:
    linear-gradient(
    90deg,
    #8268ff,
    #bc8cff,
    #ffb0d9
    );

    box-shadow:
    0 14px 34px rgba(120,100,255,.35);
}

/* result */

.results{

    margin-top:26px;

    display:grid;

    gap:16px;
}

.result-card{

    background:
    var(--card);

    border:
    1px solid rgba(255,255,255,.05);

    border-radius:26px;

    padding:22px;

    cursor:pointer;

    transition:.35s;
}

.result-card:hover{

    transform:
    translateY(-5px);
}

.result-title{

    color:var(--gold);

    font-size:13px;

    letter-spacing:3px;

    margin-bottom:10px;
}

.username{

    font-size:
    clamp(
        24px,
        5vw,
        42px
    );

    word-break:break-word;
}

/* copied */

.copied{

    position:fixed;

    left:50%;

    bottom:30px;

    transform:translateX(-50%);

    background:
    rgba(20,16,32,.95);

    border:
    1px solid rgba(255,255,255,.08);

    padding:12px 24px;

    border-radius:999px;

    opacity:0;

    transition:.35s;

    pointer-events:none;

    z-index:9999;
}

.copied.show{

    opacity:1;
}

</style>

</head>

<body>

<div class="stars" id="stars"></div>

<div class="frame"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="container">

    <div class="moon">

        <div class="moon-symbol">
            ☾
        </div>

    </div>

    <div class="title">

        <h1 class="main-title">
            DreamID
        </h1>

        <p class="subtitle">
            Create beautiful usernames ✦
        </p>

    </div>

    <div class="panel">

        <!-- keyword -->

        <div class="label">

            <div class="label-title">
                關鍵字
            </div>

            <div class="label-sub">
                KEYWORD
            </div>

        </div>

        <input
        id="keyword1"
        class="input"
        placeholder="dream">

        <!-- second -->

        <div class="label">

            <div class="label-title">
                第二關鍵字（選填）
            </div>

            <div class="label-sub">
                OPTIONAL
            </div>

        </div>

        <input
        id="keyword2"
        class="input"
        placeholder="moon">

        <!-- settings -->

        <div class="settings">

            <!-- length -->

            <div class="setting">

                <div class="setting-name">
                    ID 長度
                </div>

                <div class="range-wrap">

                    <div
                    class="range-value"
                    id="lengthValue">

                        12 字元

                    </div>

                    <input
                    type="range"
                    min="4"
                    max="20"
                    value="12"
                    class="range"
                    id="lengthRange">

                </div>

            </div>

            <!-- separator -->

            <div class="setting">

                <div class="setting-name">
                    分隔符號
                </div>

                <select
                id="separator"
                class="select">

                    <option value=".">.</option>
                    <option value="_">_</option>
                    <option value="-">-</option>
                    <option value="">無</option>

                </select>

            </div>

            <!-- uppercase -->

            <div class="setting">

                <div class="setting-top">

                    <div class="setting-name">
                        大寫字母
                    </div>

                    <div
                    class="toggle"
                    id="upperToggle">

                        <div class="toggle-ball"></div>

                    </div>

                </div>

            </div>

            <!-- number -->

            <div class="setting">

                <div class="setting-top">

                    <div class="setting-name">
                        加入數字
                    </div>

                    <div
                    class="toggle active"
                    id="numberToggle">

                        <div class="toggle-ball"></div>

                    </div>

                </div>

            </div>

            <!-- symbol -->

            <div class="setting">

                <div class="setting-top">

                    <div class="setting-name">
                        特殊符號
                    </div>

                    <div
                    class="toggle"
                    id="symbolToggle">

                        <div class="toggle-ball"></div>

                    </div>

                </div>

            </div>

        </div>

        <button
        class="generate-btn"
        onclick="generateID()">

            GENERATE ID

        </button>

    </div>

    <div
    class="results"
    id="results">

    </div>

</div>

<div
id="copied"
class="copied">

    已複製 ✦

</div>

<script>

/* 星空 */

const stars =
document.getElementById("stars");

for(let i=0;i<140;i++){

    const star =
    document.createElement("div");

    star.className = "star";

    if(Math.random()>.92){

        star.classList.add("big");
    }

    star.style.left =
    Math.random()*100 + "%";

    star.style.top =
    Math.random()*100 + "%";

    star.style.animationDelay =
    Math.random()*4 + "s";

    stars.appendChild(star);
}

/* toggle */

document
.querySelectorAll(".toggle")
.forEach(toggle=>{

    toggle.onclick=()=>{

        toggle.classList.toggle("active");
    };
});

/* range */

const range =
document.getElementById("lengthRange");

const value =
document.getElementById("lengthValue");

range.oninput=()=>{

    value.innerText =
    range.value + " 字元";
};

/* generate */

function generateID(){

    const keyword1 =
    document
    .getElementById("keyword1")
    .value
    .trim();

    const keyword2 =
    document
    .getElementById("keyword2")
    .value
    .trim();

    const separator =
    document
    .getElementById("separator")
    .value;

    const upper =
    document
    .getElementById("upperToggle")
    .classList.contains("active");

    const number =
    document
    .getElementById("numberToggle")
    .classList.contains("active");

    const symbol =
    document
    .getElementById("symbolToggle")
    .classList.contains("active");

    const length =
    parseInt(range.value);

    const results =
    document.getElementById("results");

    results.innerHTML = "";

    const extras = [

        "nova",
        "velvet",
        "luna",
        "echo",
        "cloud",
        "night",
        "midnight",
        "angel",
        "soft",
        "dream"
    ];

    const symbols = [
        "x",
        "v",
        "_",
        "."
    ];

    for(let i=0;i<8;i++){

        let id = "";

        const extra =
        extras[
        Math.floor(
        Math.random()
        * extras.length
        )];

        id =
        keyword1
        +

        separator

        +

        (keyword2 || extra);

        if(number){

            id +=
            Math.floor(
            Math.random()*99
            );
        }

        if(symbol){

            id +=
            symbols[
            Math.floor(
            Math.random()
            * symbols.length
            )];
        }

        if(upper){

            id =
            id.toUpperCase();
        }

        id =
        id.substring(0,length);

        const card =
        document.createElement("div");

        card.className =
        "result-card";

        card.innerHTML =

        `
        <div class="result-title">
            YOUR ID ✦
        </div>

        <div class="username">
            ${id}
        </div>
        `;

        card.onclick=()=>{

            navigator
            .clipboard
            .writeText(id);

            const copied =
            document.getElementById("copied");

            copied.classList.add("show");

            setTimeout(()=>{

                copied.classList.remove("show");

            },1800);
        };

        results.appendChild(card);
    }
}

/* first */

generateID();

</script>

</body>
</html>
