<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamID - Mucha Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        *{ margin:0; padding:0; box-sizing:border-box; }

        :root{
            --bg1:#171320;
            --bg2:#241a35;
            --bg3:#31244d;
            --gold:#d4af37; /* 慕夏感的古銅金 */
            --gold-light: #f1e5ac;
            --text:#f4efff;
            --card: rgba(29,24,44,.85);
        }

        body{
            min-height:100vh;
            overflow-x:hidden;
            color:var(--text);
            font-family: "Cormorant Garamond", serif;
            background: radial-gradient(circle at top, rgba(180,150,255,.14), transparent 30%),
                        linear-gradient(180deg, var(--bg1), var(--bg2), var(--bg3));
            padding: 40px 20px;
            position:relative;
        }

        /* --- 慕夏風邊框升級 --- */
        .frame {
            position: fixed;
            inset: 15px;
            border: 2px solid var(--gold);
            border-radius: 4px;
            pointer-events: none;
            z-index: 999;
            box-shadow: inset 0 0 15px rgba(212,175,55,0.2);
        }

        .frame::after {
            content: "";
            position: absolute;
            inset: 5px;
            border: 1px solid var(--gold);
            opacity: 0.5;
        }

        /* 慕夏經典裝飾元素：角落的圓環與花紋 */
        .corner {
            position: fixed;
            width: 120px;
            height: 120px;
            pointer-events: none;
            z-index: 1000;
            border: 1.5px solid var(--gold);
            border-radius: 50%;
        }

        .tl { top: -40px; left: -40px; }
        .tr { top: -40px; right: -40px; }
        .bl { bottom: -40px; left: -40px; }
        .br { bottom: -40px; right: -40px; }

        /* 中間的裝飾線條 */
        .ornament-line {
            position: fixed;
            background: var(--gold);
            z-index: 1000;
        }
        .line-h { height: 1px; width: 60px; left: 50%; transform: translateX(-50%); }
        .line-t { top: 30px; }
        .line-b { bottom: 30px; }

        /* 星空 */
        .stars { position:fixed; inset:0; z-index:-3; }
        .star { position:absolute; width:2px; height:2px; background:white; border-radius:50%; opacity:.7; animation:twinkle 4s infinite; }
        .star.big { width:4px; height:4px; background:var(--gold); box-shadow: 0 0 10px rgba(216,191,138,.8); }

        @keyframes twinkle{
            0%, 100%{ opacity:.15; transform:scale(.7); }
            50%{ opacity:1; transform:scale(1.4); }
        }

        /* 容器與面板 */
        .container { max-width:600px; margin:auto; position:relative; z-index:2; }
        
        .main-title {
            font-family: "Great Vibes", cursive;
            font-size: clamp(50px, 12vw, 80px);
            color: var(--gold-light);
            text-align: center;
            text-shadow: 0 0 20px rgba(212,175,55,0.5);
        }

        .panel {
            background: var(--card);
            border: 1px solid var(--gold);
            border-radius: 0px; /* 慕夏風較少大圓角，改用直角或裝飾角 */
            padding: 30px;
            backdrop-filter: blur(16px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        /* 裝飾性標籤 */
        .label-title { font-size:18px; font-weight:600; color: var(--gold-light); letter-spacing: 1px; }
        .label-sub { color:var(--gold); font-size:10px; letter-spacing:3px; margin-bottom: 8px; }

        .input, .select {
            width:100%; height:50px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212,175,55,0.3); color: white;
            padding: 0 15px; margin-bottom: 20px; font-family: inherit; outline: none;
        }

        .input:focus { border-color: var(--gold); }

        /* 按鈕升級 */
        .generate-btn {
            width:100%; height:60px; border: 1px solid var(--gold);
            background: transparent; color: var(--gold-light);
            font-family: "Cinzel", serif; font-size: 20px; cursor: pointer;
            transition: all 0.3s; margin-top: 10px;
            position: relative; overflow: hidden;
        }

        .generate-btn:hover {
            background: var(--gold);
            color: var(--bg1);
        }

        /* 結果卡片 */
        .result-card {
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--gold);
            padding: 20px; margin-top: 15px; transition: 0.3s;
        }
        .result-card:hover { background: rgba(212,175,55,0.1); }
        .username { font-size: 32px; color: var(--gold-light); font-family: "Cinzel", serif; }
        .meaning { font-size: 14px; color: #aaa; margin-top: 5px; }

        .tags-container { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:15px; }
        .tag { background:rgba(212,175,55,0.1); border:1px solid var(--gold); padding:4px 12px; font-size:14px; color:var(--gold-light); }
        
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .range-box { border: 1px solid rgba(212,175,55,0.3); padding: 10px; margin-bottom: 20px; }

        .toggle-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .toggle-item { border: 1px solid rgba(255,255,255,0.1); padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .toggle { width: 35px; height: 18px; background: #444; border-radius: 10px; position: relative; cursor: pointer; }
        .toggle.active { background: var(--gold); }
        .toggle-ball { width: 12px; height: 12px; background: white; border-radius: 50%; position: absolute; top: 3px; left: 3px; transition: 0.3s; }
        .toggle.active .toggle-ball { left: 20px; }

    </style>
</head>
<body>

<div class="stars" id="stars"></div>

<!-- 慕夏風裝飾組件 -->
<div class="frame"></div>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>
<div class="ornament-line line-h line-t"></div>
<div class="ornament-line line-h line-b"></div>

<div class="container">
    <div class="main-title">DreamID</div>
    <p style="text-align: center; color: var(--gold); margin-bottom: 30px; letter-spacing: 2px;">✦ ESTHÉTIQUE DE MUCHA ✦</p>

    <div class="panel">
        <div class="label">
            <div class="label-title">第一關鍵字</div>
            <div class="label-sub">PRIMARY KEYWORD</div>
        </div>
        <input id="keyword1" class="input" value="Tofu">

        <div class="label">
            <div class="label-title">第二關鍵字</div>
            <div class="label-sub">SECONDARY KEYWORD</div>
        </div>
        <input id="keyword2" class="input" value="Douce">

        <div class="label-title">世界觀風格</div>
        <div class="label-sub">WORLD STYLE</div>
        <select id="style" class="select">
            <option value="dreamy">🌙 夢境 Dreamy</option>
            <option value="angel">✨ 天使 Angel</option>
            <option value="cyber">⚡ 賽博 Cyber</option>
            <option value="gothic">🦇 暗夜 Gothic</option>
            <option value="soft">☁️ 柔霧 Soft</option>
            <option value="luxury">👑 奢華 Luxury</option>
        </select>

        <div class="label-title">自訂元素</div>
        <div class="label-sub">CUSTOM ELEMENTS</div>
        <input id="customTagInput" class="input" placeholder="按 Enter 加入">
        <div class="tags-container" id="tagsContainer"></div>

        <div class="row">
            <div class="range-box">
                <div class="label-sub" id="lengthValue">長度: 12 字元</div>
                <input type="range" min="4" max="24" value="12" class="range" id="lengthRange" style="width:100%">
            </div>
            <select id="separator" class="select">
                <option value="">無分隔</option>
                <option value=".">.</option>
                <option value="_">_</option>
            </select>
        </div>

        <div class="toggle-grid">
            <div class="toggle-item"><span>大寫</span><div class="toggle" id="upperToggle"><div class="toggle-ball"></div></div></div>
            <div class="toggle-item"><span>數字</span><div class="toggle active" id="numberToggle"><div class="toggle-ball"></div></div></div>
            <div class="toggle-item"><span>符號</span><div class="toggle" id="symbolToggle"><div class="toggle-ball"></div></div></div>
            <div class="toggle-item"><span>簡約</span><div class="toggle" id="simpleToggle"><div class="toggle-ball"></div></div></div>
        </div>

        <button class="generate-btn" onclick="generateID()">GENERATE ID</button>
    </div>

    <div class="results" id="results"></div>
</div>

<script>
/* 星空背景初始化 */
const starsWrap = document.getElementById("stars");
for(let i=0; i<100; i++){
    const star = document.createElement("div");
    star.className = "star" + (Math.random() > 0.9 ? " big" : "");
    star.style.left = Math.random()*100 + "%";
    star.style.top = Math.random()*100 + "%";
    star.style.animationDelay = Math.random()*4 + "s";
    starsWrap.appendChild(star);
}

/* UI 互動控制 */
document.querySelectorAll(".toggle").forEach(t => t.onclick = () => t.classList.toggle("active"));
const range = document.getElementById("lengthRange");
range.oninput = () => document.getElementById("lengthValue").innerText = `長度: ${range.value} 字元`;

let customTags = ["yume", "mori"];
function renderTags() {
    const container = document.getElementById("tagsContainer");
    container.innerHTML = "";
    customTags.forEach((tag, i) => {
        const el = document.createElement("div");
        el.className = "tag";
        el.innerHTML = `${tag} <span style="cursor:pointer" onclick="removeTag(${i})">×</span>`;
        container.appendChild(el);
    });
}
function removeTag(i) { customTags.splice(i,1); renderTags(); }
document.getElementById("customTagInput").onkeydown = (e) => {
    if(e.key === "Enter" && e.target.value.trim()){
        customTags.push(e.target.value.trim());
        e.target.value = "";
        renderTags();
    }
}
renderTags();

const styleWorlds = {
    dreamy:["Nova","Moon","Velvet","Cloud","Dream","Aurora"],
    angel:["Angel","Halo","Celest","Grace","Cherub"],
    cyber:["Void","Quantum","Pixel","Neo","Cyber"],
    gothic:["Noir","Raven","Abyss","Phantom","Vamp"],
    soft:["Mochi","Milk","Peach","Cream","Fluff"],
    luxury:["Royal","Gold","Diamond","Luxe","Elite"]
};

/* 生成邏輯：修正字數限制問題 */
function generateID(){
    const k1 = document.getElementById("keyword1").value || "User";
    const k2 = document.getElementById("keyword2").value || "";
    const style = document.getElementById("style").value;
    const sep = document.getElementById("separator").value;
    const isUpper = document.getElementById("upperToggle").classList.contains("active");
    const hasNum = document.getElementById("numberToggle").classList.contains("active");
    const hasSym = document.getElementById("symbolToggle").classList.contains("active");
    const maxL = parseInt(range.value);
    
    const results = document.getElementById("results");
    results.innerHTML = "";

    for(let i=0; i<6; i++){
        let wordList = styleWorlds[style];
        let randomWord = wordList[Math.floor(Math.random()*wordList.length)];
        let extra = customTags.length ? customTags[Math.floor(Math.random()*customTags.length)] : "";
        
        // 構建 ID 零件
        let parts = [k1];
        if(k2 && Math.random() > 0.5) parts.push(k2);
        if(Math.random() > 0.3) parts.push(randomWord);
        if(extra && Math.random() > 0.5) parts.push(extra);
        
        // 組合
        let id = parts.join(sep);
        
        // 處理數字
        if(hasNum) id += Math.floor(Math.random()*99);
        if(hasSym) id += (Math.random() > 0.5 ? "_" : ".");

        // --- 字數嚴格控制修復 ---
        // 如果太長，先嘗試移除分隔符，若還太長則裁切
        if(id.length > maxL) {
            id = id.substring(0, maxL);
        }

        // 大小寫處理
        if(isUpper) id = id.toUpperCase();
        else if(Math.random() > 0.7) id = id.toLowerCase();

        const card = document.createElement("div");
        card.className = "result-card";
        card.innerHTML = `
            <div class="username">${id}</div>
            <div class="meaning">具有 ${style} 風格的獨特 ID</div>
        `;
        card.onclick = () => {
            navigator.clipboard.writeText(id);
            alert("Copied: " + id);
        };
        results.appendChild(card);
    }
}
generateID();
</script>

</body>
</html>
