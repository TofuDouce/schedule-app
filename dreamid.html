<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Little Universe ID</title>

<!-- 防止搜尋 -->

<meta
name="robots"
content="noindex,nofollow,noarchive,nosnippet,noimageindex">

<meta
name="googlebot"
content="noindex,nofollow,noarchive,nosnippet,noimageindex">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg1:#171320;
    --bg2:#241a35;
    --bg3:#31244d;

    --gold:#d8bf8a;

    --text:#f4efff;

    --card:
    rgba(29,24,44,.72);
}

body{

    min-height:100vh;

    overflow-x:hidden;

    color:var(--text);

    font-family:
    "Cormorant Garamond",
    serif;

    background:

    radial-gradient(
    circle at top,
    rgba(180,150,255,.14),
    transparent 30%
    ),

    radial-gradient(
    circle at bottom,
    rgba(120,90,255,.08),
    transparent 30%
    ),

    linear-gradient(
    180deg,
    var(--bg1),
    var(--bg2),
    var(--bg3)
    );

    padding:28px;

    position:relative;
}

/* 星空 */

.stars{

    position:fixed;

    inset:0;

    overflow:hidden;

    z-index:-3;
}

.star{

    position:absolute;

    width:2px;
    height:2px;

    background:white;

    border-radius:50%;

    opacity:.7;

    animation:twinkle 4s infinite;
}

.star.big{

    width:4px;
    height:4px;

    background:var(--gold);

    box-shadow:
    0 0 10px rgba(216,191,138,.8);
}

@keyframes twinkle{

    0%{
        opacity:.15;
        transform:scale(.7);
    }

    50%{
        opacity:1;
        transform:scale(1.4);
    }

    100%{
        opacity:.15;
        transform:scale(.7);
    }
}

/* 外框 */

.frame{

    position:fixed;

    inset:14px;

    border:
    1.5px solid rgba(216,191,138,.48);

    border-radius:38px;

    pointer-events:none;

    z-index:999;
}

.frame::before{

    content:"";

    position:absolute;

    inset:12px;

    border:
    1px solid rgba(216,191,138,.18);

    border-radius:30px;
}

/* 四角 */

.corner{

    position:fixed;

    width:120px;
    height:120px;

    pointer-events:none;

    z-index:1000;
}

.corner::before{

    content:"";

    position:absolute;

    inset:0;

    border:
    1.5px solid rgba(216,191,138,.45);

    border-radius:50%;
}

.corner::after{

    content:"✦";

    position:absolute;

    color:rgba(216,191,138,.85);

    font-size:26px;
}

.tl{
    top:18px;
    left:18px;
}

.tl::before{
    clip-path:polygon(0 0,100% 0,0 100%);
}

.tl::after{
    top:18px;
    left:18px;
}

.tr{
    top:18px;
    right:18px;
}

.tr::before{
    clip-path:polygon(0 0,100% 0,100% 100%);
}

.tr::after{
    top:18px;
    right:18px;
}

.bl{
    bottom:18px;
    left:18px;
}

.bl::before{
    clip-path:polygon(0 0,0 100%,100% 100%);
}

.bl::after{
    bottom:18px;
    left:18px;
}

.br{
    bottom:18px;
    right:18px;
}

.br::before{
    clip-path:polygon(100% 0,0 100%,100% 100%);
}

.br::after{
    bottom:18px;
    right:18px;
}

/* container */

.container{

    max-width:760px;

    margin:auto;

    position:relative;

    z-index:2;
}

/* 月亮 */

.moon{

    text-align:center;

    margin-top:10px;

    position:relative;
}

.moon::before{

    content:"";

    position:absolute;

    left:50%;

    top:-70px;

    width:1px;
    height:70px;

    background:
    rgba(216,191,138,.35);
}

.moon-symbol{

    font-size:42px;

    color:var(--gold);

    text-shadow:
    0 0 18px rgba(216,191,138,.25);

    animation:floatMoon 4s ease-in-out infinite;
}

@keyframes floatMoon{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(6px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* 標題 */

.title{

    text-align:center;

    margin-top:20px;

    margin-bottom:50px;
}

.main-title{

    font-family:
    "Great Vibes",
    cursive;

    font-size:
    clamp(
        70px,
        13vw,
        130px
    );

    color:#efd8ff;

    text-shadow:
    0 0 20px rgba(220,180,255,.18);

    line-height:1.1;
}

.subtitle{

    margin-top:24px;

    font-size:
    clamp(
        18px,
        3vw,
        28px
    );

    color:#ddd0f5;

    line-height:2;
}

/* 卡片 */

.panel{

    background:
    var(--card);

    border:
    1px solid rgba(255,255,255,.06);

    border-radius:34px;

    padding:32px;

    backdrop-filter:blur(16px);

    position:relative;

    overflow:hidden;
}

.panel::before{

    content:"";

    position:absolute;

    inset:0;

    background:
    radial-gradient(
    circle at top,
    rgba(255,255,255,.04),
    transparent 60%
    );

    pointer-events:none;
}

/* label */

.label{

    margin-bottom:12px;
}

.label-title{

    font-size:34px;

    font-weight:600;
}

.label-sub{

    color:#d8bf8a;

    letter-spacing:3px;

    margin-top:4px;

    font-size:16px;
}

/* input */

.input{

    width:100%;

    height:84px;

    border:none;

    outline:none;

    border-radius:28px;

    background:
    rgba(255,255,255,.05);

    color:white;

    font-size:32px;

    padding:0 28px;

    margin-bottom:36px;

    font-family:
    "Cormorant Garamond",
    serif;
}

.input::placeholder{

    color:
    rgba(255,255,255,.28);
}

/* options */

.options{

    display:grid;

    grid-template-columns:
    repeat(2,1fr);

    gap:14px;

    margin-bottom:36px;
}

.option{

    background:
    rgba(255,255,255,.04);

    border:
    1px solid rgba(255,255,255,.06);

    border-radius:999px;

    height:70px;

    color:white;

    font-size:20px;

    cursor:pointer;

    transition:.35s;
}

.option.active{

    background:
    linear-gradient(
    90deg,
    #8268ff,
    #ffb0d9
    );

    box-shadow:
    0 10px 24px rgba(130,100,255,.35);
}

/* button */

.generate-btn{

    width:100%;

    height:86px;

    border:none;

    border-radius:28px;

    cursor:pointer;

    color:white;

    font-size:30px;

    font-family:
    "Cinzel",
    serif;

    letter-spacing:2px;

    background:
    linear-gradient(
    90deg,
    #8268ff,
    #bc8cff,
    #ffb0d9
    );

    box-shadow:
    0 14px 34px rgba(120,100,255,.38);

    transition:.35s;
}

.generate-btn:hover{

    transform:
    translateY(-4px)
    scale(1.01);
}

/* 結果 */

.results{

    margin-top:30px;

    display:grid;

    gap:18px;
}

.result-card{

    background:
    var(--card);

    border:
    1px solid rgba(255,255,255,.06);

    border-radius:28px;

    padding:26px;

    cursor:pointer;

    transition:.35s;

    position:relative;

    overflow:hidden;
}

.result-card:hover{

    transform:
    translateY(-6px);

    box-shadow:
    0 20px 40px rgba(0,0,0,.35);
}

.result-card::before{

    content:"";

    position:absolute;

    inset:0;

    background:
    linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,.05),
    transparent
    );

    transform:
    translateX(-100%);
}

.result-card:hover::before{

    transform:
    translateX(100%);

    transition:1s;
}

.result-title{

    color:var(--gold);

    font-size:14px;

    letter-spacing:3px;

    margin-bottom:12px;
}

.username{

    font-size:
    clamp(
        28px,
        5vw,
        48px
    );

    word-break:break-word;
}

/* copied */

.copied{

    position:fixed;

    left:50%;

    bottom:40px;

    transform:translateX(-50%);

    background:
    rgba(20,16,32,.95);

    border:
    1px solid rgba(255,255,255,.08);

    padding:14px 28px;

    border-radius:999px;

    opacity:0;

    pointer-events:none;

    transition:.35s;

    z-index:9999;
}

.copied.show{

    opacity:1;
}

@media(max-width:640px){

    .options{

        grid-template-columns:1fr;
    }

    .panel{

        padding:26px;
    }

    .label-title{

        font-size:28px;
    }
}

</style>

</head>

<body>

<div class="stars" id="stars"></div>

<div class="frame"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="container">

    <div class="moon">

        <div class="moon-symbol">
            ☾
        </div>

    </div>

    <div class="title">

        <h1 class="main-title">
            Little Universe
        </h1>

        <p class="subtitle">
            創造屬於你的宇宙 ID ✦
            <br>
            每個名字，都是另一個平行宇宙
        </p>

    </div>

    <div class="panel">

        <div class="label">

            <div class="label-title">
                靈魂關鍵字
            </div>

            <div class="label-sub">
                SOUL WORD
            </div>

        </div>

        <input
        id="keyword"
        class="input"
        placeholder="Dream...">

        <div class="label">

            <div class="label-title">
                宇宙風格
            </div>

            <div class="label-sub">
                UNIVERSE STYLE
            </div>

        </div>

        <div class="options">

            <button class="option active">
                ☾ Dreamy
            </button>

            <button class="option">
                ✦ Angel
            </button>

            <button class="option">
                ♱ Gothic
            </button>

            <button class="option">
                ☁ Soft
            </button>

        </div>

        <button
        class="generate-btn"
        onclick="generateID()">

            GENERATE ID

        </button>

    </div>

    <div
    class="results"
    id="results">

    </div>

</div>

<div
id="copied"
class="copied">

    已複製到你的宇宙 ✨

</div>

<script>

/* 星空 */

const stars =
document.getElementById("stars");

for(let i=0;i<140;i++){

    const star =
    document.createElement("div");

    star.className = "star";

    if(Math.random()>.92){

        star.classList.add("big");
    }

    star.style.left =
    Math.random()*100 + "%";

    star.style.top =
    Math.random()*100 + "%";

    star.style.animationDelay =
    Math.random()*4 + "s";

    stars.appendChild(star);
}

/* style */

document
.querySelectorAll(".option")
.forEach(btn=>{

    btn.onclick=()=>{

        document
        .querySelectorAll(".option")
        .forEach(b=>
            b.classList.remove("active")
        );

        btn.classList.add("active");
    };
});

/* 詞庫 */

const prefixes = [

    "moon",
    "velvet",
    "dreamy",
    "astral",
    "nova",
    "lunar",
    "echo",
    "angel",
    "soft",
    "midnight",
    "cloud",
    "little"
];

const suffixes = [

    "dream",
    "echo",
    "verse",
    "memory",
    "garden",
    "archive",
    "moon",
    "dust",
    "signal",
    "void"
];

/* generate */

function generateID(){

    const keyword =

    document
    .getElementById("keyword")
    .value
    .trim()

    || "dream";

    const results =
    document.getElementById("results");

    results.innerHTML = "";

    for(let i=0;i<8;i++){

        const name =

        prefixes[
        Math.floor(
        Math.random()
        * prefixes.length
        )]

        +

        "."

        +

        keyword

        +

        "."

        +

        suffixes[
        Math.floor(
        Math.random()
        * suffixes.length
        )];

        const card =
        document.createElement("div");

        card.className =
        "result-card";

        card.innerHTML =

        `
        <div class="result-title">
            YOUR UNIVERSE ID ✦
        </div>

        <div class="username">
            ${name}
        </div>
        `;

        card.onclick=()=>{

            navigator
            .clipboard
            .writeText(name);

            const copied =
            document.getElementById("copied");

            copied.classList.add("show");

            setTimeout(()=>{

                copied.classList.remove("show");

            },1800);
        };

        results.appendChild(card);
    }
}

/* first */

generateID();

</script>

</body>
</html>
