<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Little Universe ID</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --gold:#d8bf8a;
    --pink:#f0d5ff;
}

/* =========================
   深色宇宙背景（修正版）
========================= */

body{

    min-height:100vh;

    overflow-x:hidden;

    color:white;

    font-family:
    "Cormorant Garamond",
    serif;

    position:relative;

    padding:28px;

    background:

    radial-gradient(
    circle at top,
    rgba(120,90,255,.18),
    transparent 20%
    ),

    radial-gradient(
    circle at bottom,
    rgba(70,40,160,.14),
    transparent 24%
    ),

    radial-gradient(
    circle at 15% 30%,
    rgba(170,120,255,.04),
    transparent 18%
    ),

    radial-gradient(
    circle at 85% 70%,
    rgba(120,90,255,.05),
    transparent 20%
    ),

    linear-gradient(
    180deg,
    #090611 0%,
    #120d20 28%,
    #1b1430 55%,
    #120f1d 100%
    );

    background-attachment:fixed;
}

/* 大型光暈 */

body::before{

    content:"";

    position:fixed;

    width:850px;
    height:850px;

    border-radius:50%;

    background:

    radial-gradient(
    circle,
    rgba(120,90,255,.10),
    transparent 72%
    );

    top:-300px;
    left:50%;

    transform:translateX(-50%);

    z-index:-5;

    filter:blur(40px);
}

/* 宇宙霧氣 */

body::after{

    content:"";

    position:fixed;

    inset:0;

    background:

    radial-gradient(
    circle at 20% 30%,
    rgba(255,180,255,.025),
    transparent 18%
    ),

    radial-gradient(
    circle at 80% 70%,
    rgba(130,100,255,.035),
    transparent 20%
    );

    z-index:-4;

    pointer-events:none;
}

/* 星空 */

.stars{

    position:fixed;

    inset:0;

    overflow:hidden;

    z-index:-3;

    pointer-events:none;
}

.star{

    position:absolute;

    width:2px;
    height:2px;

    background:white;

    border-radius:50%;

    opacity:.7;

    animation:
    twinkle 4s infinite;
}

.star.big{

    width:4px;
    height:4px;

    box-shadow:
    0 0 10px rgba(255,255,255,.8);
}

.star.gold{

    background:#d8bf8a;

    box-shadow:
    0 0 12px rgba(216,191,138,.8);
}

@keyframes twinkle{

    0%{
        opacity:.2;
        transform:scale(.7);
    }

    50%{
        opacity:1;
        transform:scale(1.5);
    }

    100%{
        opacity:.2;
        transform:scale(.7);
    }
}

/* 月亮背景 */

.moon-bg{

    position:fixed;

    width:520px;
    height:520px;

    border-radius:50%;

    top:120px;
    left:50%;

    transform:translateX(-50%);

    background:

    radial-gradient(
    circle,
    rgba(255,255,255,.018),
    rgba(180,150,255,.008),
    transparent 72%
    );

    border:
    1px solid rgba(255,255,255,.02);

    z-index:-2;
}

/* 光線 */

.light-ray{

    position:fixed;

    width:1px;

    height:100vh;

    background:

    linear-gradient(
    180deg,
    transparent,
    rgba(216,191,138,.08),
    transparent
    );

    z-index:-1;
}

.ray1{
    left:20%;
}

.ray2{
    left:50%;
}

.ray3{
    left:80%;
}

/* =========================
   慕夏邊框
========================= */

.frame{

    position:fixed;

    inset:14px;

    border:
    1.5px solid rgba(216,191,138,.55);

    border-radius:38px;

    pointer-events:none;

    z-index:999;
}

.frame::before{

    content:"";

    position:absolute;

    inset:14px;

    border:
    1px solid rgba(216,191,138,.16);

    border-radius:30px;
}

.frame::after{

    content:"";

    position:absolute;

    inset:28px;

    border:
    1px solid rgba(216,191,138,.07);

    border-radius:24px;
}

/* 四角 */

.ornament{

    position:fixed;

    width:160px;
    height:160px;

    pointer-events:none;

    z-index:1001;
}

.ornament::before{

    content:"";

    position:absolute;

    inset:0;

    border:
    1.5px solid rgba(216,191,138,.42);

    border-radius:50%;
}

.ornament::after{

    content:"✦";

    position:absolute;

    color:#d8bf8a;

    font-size:26px;
}

.o1{
    top:18px;
    left:18px;
}

.o1::before{
    clip-path:polygon(0 0,100% 0,0 100%);
}

.o1::after{
    top:18px;
    left:18px;
}

.o2{
    top:18px;
    right:18px;
}

.o2::before{
    clip-path:polygon(0 0,100% 0,100% 100%);
}

.o2::after{
    top:18px;
    right:18px;
}

.o3{
    bottom:18px;
    left:18px;
}

.o3::before{
    clip-path:polygon(0 0,0 100%,100% 100%);
}

.o3::after{
    bottom:18px;
    left:18px;
}

.o4{
    bottom:18px;
    right:18px;
}

.o4::before{
    clip-path:polygon(100% 0,0 100%,100% 100%);
}

.o4::after{
    bottom:18px;
    right:18px;
}

/* =========================
   Header
========================= */

.header{

    text-align:center;

    margin-top:20px;

    margin-bottom:50px;
}

/* 月亮吊飾 */

.moon-wrap{

    display:flex;

    flex-direction:column;

    align-items:center;

    margin-bottom:10px;
}

.moon-line{

    width:1px;

    height:46px;

    background:
    linear-gradient(
    180deg,
    transparent,
    rgba(216,191,138,.9)
    );
}

.hanging-moon{

    color:#d8bf8a;

    font-size:42px;

    animation:
    swing 5s ease-in-out infinite;

    transform-origin:top center;
}

@keyframes swing{

    0%{
        transform:rotate(-3deg);
    }

    50%{
        transform:rotate(3deg);
    }

    100%{
        transform:rotate(-3deg);
    }
}

/* 標題 */

.logo{

    font-family:
    "Great Vibes",
    cursive;

    font-size:
    clamp(
        72px,
        12vw,
        130px
    );

    color:#efd8ff;

    text-shadow:
    0 0 20px rgba(220,180,255,.25);
}

/* 副標 */

.subtitle{

    margin-top:14px;

    color:#d8bf8a;

    line-height:1.9;

    font-size:
    clamp(
        18px,
        3vw,
        28px
    );
}

/* 主內容 */

.main{

    max-width:760px;

    margin:auto;
}

/* 面板 */

.panel{

    background:
    rgba(25,20,40,.58);

    border:
    1px solid rgba(255,255,255,.05);

    backdrop-filter:
    blur(22px);

    border-radius:38px;

    padding:34px;

    box-shadow:
    0 10px 40px rgba(0,0,0,.32);
}

/* label */

.label{

    margin-bottom:14px;
}

.label-title{

    font-size:28px;

    color:#f4e9ff;
}

.label-sub{

    color:#d8bf8a;

    margin-top:4px;

    font-size:16px;

    letter-spacing:2px;
}

/* input */

.input{

    width:100%;

    height:82px;

    border:none;

    border-radius:26px;

    background:
    rgba(255,255,255,.05);

    padding:0 26px;

    color:white;

    font-size:28px;

    outline:none;

    margin-bottom:34px;
}

.input::placeholder{

    color:
    rgba(255,255,255,.35);
}

/* style */

.styles{

    display:grid;

    grid-template-columns:
    repeat(2,1fr);

    gap:14px;

    margin-bottom:36px;
}

.style-btn{

    border:none;

    height:72px;

    border-radius:999px;

    cursor:pointer;

    color:white;

    background:
    rgba(255,255,255,.05);

    border:
    1px solid rgba(255,255,255,.08);

    transition:.35s;
}

.style-btn.active{

    background:
    linear-gradient(
    90deg,
    #8268ff,
    #ffb0d9
    );

    box-shadow:
    0 10px 24px rgba(130,100,255,.35);
}

/* button */

.generate-btn{

    width:100%;

    height:86px;

    border:none;

    border-radius:28px;

    cursor:pointer;

    color:white;

    font-size:30px;

    font-family:
    "Cormorant Garamond",
    serif;

    background:
    linear-gradient(
    90deg,
    #8268ff,
    #bc8cff,
    #ffb0d9
    );

    box-shadow:
    0 14px 34px rgba(120,100,255,.38);
}

/* result */

.results{

    margin-top:34px;

    display:grid;

    gap:18px;
}

.card{

    background:
    rgba(25,20,40,.58);

    border:
    1px solid rgba(255,255,255,.05);

    border-radius:30px;

    padding:28px;

    backdrop-filter:
    blur(18px);

    cursor:pointer;
}

.card-title{

    color:#d8bf8a;

    font-size:14px;

    letter-spacing:3px;

    margin-bottom:14px;
}

.username{

    font-size:
    clamp(
        28px,
        5vw,
        48px
    );

    color:#f6eaff;

    word-break:break-word;
}

/* copied */

.copied{

    position:fixed;

    left:50%;

    bottom:36px;

    transform:translateX(-50%);

    background:
    rgba(20,16,32,.95);

    border:
    1px solid rgba(255,255,255,.08);

    padding:14px 26px;

    border-radius:999px;

    opacity:0;

    transition:.35s;

    pointer-events:none;

    z-index:9999;
}

.copied.show{

    opacity:1;
}

</style>
</head>

<body>

<div class="moon-bg"></div>

<div class="light-ray ray1"></div>
<div class="light-ray ray2"></div>
<div class="light-ray ray3"></div>

<div class="stars" id="stars"></div>

<div class="frame"></div>

<div class="ornament o1"></div>
<div class="ornament o2"></div>
<div class="ornament o3"></div>
<div class="ornament o4"></div>

<!-- Header -->

<div class="header">

    <div class="moon-wrap">

        <div class="moon-line"></div>

        <div class="hanging-moon">
            ☾
        </div>

    </div>

    <div class="logo">
        Little Universe
    </div>

    <div class="subtitle">

        創造屬於你的宇宙 ID ✦
        <br>
        Create aesthetic usernames from your soul

    </div>

</div>

<!-- Main -->

<div class="main">

    <div class="panel">

        <div class="label">

            <div class="label-title">
                靈魂關鍵字
            </div>

            <div class="label-sub">
                SOUL WORD
            </div>

        </div>

        <input
        id="keyword"
        class="input"
        placeholder="Dream...">

        <div class="styles">

            <button class="style-btn active">
                ☾ Dreamy
            </button>

            <button class="style-btn">
                ✦ Angel
            </button>

            <button class="style-btn">
                ♱ Gothic
            </button>

            <button class="style-btn">
                ☁ Soft
            </button>

        </div>

        <button
        class="generate-btn"
        onclick="generateNames()">

            生成宇宙 ID

        </button>

    </div>

    <div
    class="results"
    id="results">

    </div>

</div>

<div
id="copied"
class="copied">

    已複製到你的宇宙 ✨

</div>

<script>

/* 星空 */

const stars =
document.getElementById("stars");

for(let i=0;i<170;i++){

    const star =
    document.createElement("div");

    star.className = "star";

    if(Math.random()>.92){

        star.classList.add("big");
    }

    if(Math.random()>.95){

        star.classList.add("gold");
    }

    star.style.left =
    Math.random()*100 + "%";

    star.style.top =
    Math.random()*100 + "%";

    star.style.animationDelay =
    Math.random()*4 + "s";

    stars.appendChild(star);
}

/* style active */

document
.querySelectorAll(".style-btn")
.forEach(btn=>{

    btn.onclick=()=>{

        document
        .querySelectorAll(".style-btn")
        .forEach(b=>
            b.classList.remove("active")
        );

        btn.classList.add("active");
    };
});

/* 詞庫 */

const prefixes = [

    "moon",
    "little",
    "velvet",
    "dreamy",
    "astral",
    "midnight",
    "soft",
    "echo",
    "angel",
    "nova",
    "lunar",
    "cloud"
];

const suffixes = [

    "archive",
    "memory",
    "verse",
    "echo",
    "dream",
    "signal",
    "garden",
    "angel",
    "moon",
    "dust",
    "void"
];

/* generate */

function generateNames(){

    const keyword =

    document
    .getElementById("keyword")
    .value
    .trim()

    || "dream";

    const results =
    document.getElementById("results");

    results.innerHTML = "";

    for(let i=0;i<8;i++){

        const name =

        prefixes[
        Math.floor(
        Math.random()
        * prefixes.length
        )]

        +

        "."

        +

        keyword

        +

        "."

        +

        suffixes[
        Math.floor(
        Math.random()
        * suffixes.length
        )];

        const card =
        document.createElement("div");

        card.className = "card";

        card.innerHTML =

        `
        <div class="card-title">
            你的宇宙名稱
        </div>

        <div class="username">
            ${name}
        </div>
        `;

        card.onclick=()=>{

            navigator.clipboard.writeText(name);

            const copied =
            document.getElementById("copied");

            copied.classList.add("show");

            setTimeout(()=>{

                copied.classList.remove("show");

            },1800);
        };

        results.appendChild(card);
    }
}

/* first */

generateNames();

</script>

</body>
</html>
