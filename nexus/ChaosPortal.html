<script>

/* ===== 星空 ===== */

const stars =
document.getElementById("stars");

for(let i=0;i<140;i++){

    const star =
    document.createElement("div");

    star.className = "star";

    star.style.left =
    Math.random()*100 + "%";

    star.style.top =
    Math.random()*100 + "%";

    star.style.animationDelay =
    Math.random()*4 + "s";

    stars.appendChild(star);
}

/* ===== 自動抓目前資料夾 ===== */

const currentPath =
window.location.pathname;

/* 取得目前資料夾 */

const folderPath =
currentPath.substring(
0,
currentPath.lastIndexOf("/")
);

/* GitHub Pages 路徑 */

const pathParts =
folderPath.split("/").filter(Boolean);

/* repo 名稱 */

const repo =
pathParts[0];

/* 子資料夾 */

const folder =
pathParts.slice(1).join("/");

/* GitHub 使用者 */

const username =
"TofuDouce";

/* ===== icon ===== */

const symbols = [
    "✦",
    "☾",
    "✧",
    "✶",
    "❂",
    "☽"
];

/* ===== 載入 ===== */

async function loadProjects(){

    const container =
    document.getElementById("projects");

    try{

        const response =
        await fetch(
        `https://api.github.com/repos/${username}/${repo}/contents/${folder}`
        );

        const files =
        await response.json();

        const htmlFiles =
        files.filter(file =>

            file.name.endsWith(".html")

            &&

            file.name !==
            currentPath.split("/").pop()
        );

        /* 清空 */

        container.innerHTML = "";

        /* 自己 */

        const selfCard =
        document.createElement("a");

        selfCard.className = "card";

        selfCard.href =
        currentPath.split("/").pop();

        selfCard.target =
        "_blank";

        selfCard.innerHTML =

        `
        <div class="card-symbol">
            ☾
        </div>

        <div class="card-title">
            Chaos Portal
        </div>

        <div class="card-file">
            ${currentPath.split("/").pop()}
        </div>

        <div class="card-desc">
            通往所有宇宙的核心入口
        </div>

        <div class="card-footer">
            CURRENT PORTAL ✦
        </div>
        `;

        container.appendChild(
        selfCard
        );

        /* 其他 html */

        for (const [index,file]
        of htmlFiles.entries()) {

            const card =
            document.createElement("a");

            card.className = "card";

            card.target = "_blank";

            card.href =
            `./${file.name}`;

            const symbol =
            symbols[
            index % symbols.length
            ];

            let title =
            file.name
            .replace(".html","");

            try{

                const pageResponse =
                await fetch(
                file.download_url
                );

                const html =
                await pageResponse.text();

                const match =
                html.match(
                /<title>(.*?)<\/title>/i
                );

                if(match && match[1]){

                    title =
                    match[1];
                }

            }catch(e){

                console.log(
                "title 讀取失敗"
                );
            }

            card.innerHTML =

            `
            <div class="card-symbol">
                ${symbol}
            </div>

            <div class="card-title">
                ${title}
            </div>

            <div class="card-file">
                ${file.name}
            </div>

            <div class="card-desc">
                通往另一個宇宙的入口
            </div>

            <div class="card-footer">
                OPEN PORTAL →
            </div>
            `;

            container.appendChild(card);
        }

    }catch(err){

        container.innerHTML =

        `
        <div class="loading">
            無法讀取目前資料夾 😭
        </div>
        `;
    }
}

loadProjects();

</script>
