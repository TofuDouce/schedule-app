<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌙 點心漫遊 · 太極鰲車輪餅點餐本 by ChuChu ✦</title>

    <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
    <meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
    <meta name="bingbot" content="noindex,nofollow,noarchive,nosnippet,noimageindex">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: font-size 0.2s ease, transform 0.4s ease, box-shadow 0.4s ease, background-color 0.3s ease, border-color 0.3s ease;
        }

        :root {
            --bg1: #171320;
            --bg2: #241a35;
            --bg3: #31244d;
            --gold: #d8bf8a;
            --gold-hover: #f3e5ab;
            --text: #f4efff;
            --text-sub: #a897c9;
            --card: rgba(29, 24, 44, .72);
            --flavor-bg: rgba(15, 11, 25, 0.45);
            --gold-low: rgba(216, 191, 138, 0.15);
            --berry-pink: #ff7676;
            --base-font-size: 16px;
        }

        body {
            min-height: 100vh;
            color: var(--text);
            font-family: "Zen Maru Gothic", "Cormorant Garamond", serif;
            background: radial-gradient(circle at top, rgba(180,150,255,.14), transparent 40%),
                        linear-gradient(180deg, var(--bg1), var(--bg2), var(--bg3));
            padding: 28px;
            position: relative;
            font-size: var(--base-font-size);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 星空背景 */
        .stars {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: -3;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: .7;
            animation: twinkle 4s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: .15; transform: scale(.7); }
            50% { opacity: 1; transform: scale(1.4); }
        }

        /* 經典古典外框 */
        .frame {
            position: fixed;
            inset: 14px;
            border: 1.5px solid rgba(216,191,138,.48);
            border-radius: 38px;
            pointer-events: none;
            z-index: 999;
        }

        .frame::before {
            content: "";
            position: absolute;
            inset: 12px;
            border: 1px solid rgba(216,191,138,.18);
            border-radius: 30px;
        }

        /* 四角裝飾 */
        .corner {
            position: fixed;
            width: 120px;
            height: 120px;
            pointer-events: none;
            z-index: 1000;
        }

        .corner::before {
            content: "";
            position: absolute;
            inset: 0;
            border: 1.5px solid rgba(216,191,138,.45);
            border-radius: 50%;
        }

        .corner::after {
            content: "✦";
            position: absolute;
            color: rgba(216,191,138,.85);
            font-size: 26px;
        }

        .tl { top: 18px; left: 18px; }
        .tl::before { clip-path: polygon(0 0, 100% 0, 0 100%); }
        .tl::after { top: 18px; left: 18px; }

        .tr { top: 18px; right: 18px; }
        .tr::before { clip-path: polygon(0 0, 100% 0, 100% 100%); }
        .tr::after { top: 18px; right: 18px; }

        .bl { bottom: 18px; left: 18px; }
        .bl::before { clip-path: polygon(0 0, 0 100%, 100% 100%); }
        .bl::after { bottom: 18px; left: 18px; }

        .br { bottom: 18px; right: 18px; }
        .br::before { clip-path: polygon(100% 0, 0 100%, 100% 100%); }
        .br::after { bottom: 18px; right: 18px; }

        /* 主內容區容器 */
        .container {
            width: 100%;
            max-width: 1250px;
            margin: auto;
            position: relative;
            z-index: 2;
            padding: 20px 0;
        }

        /* 文字大小控制列 */
        .font-control {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: -10px;
            position: relative;
            z-index: 1010;
        }

        .font-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(216, 191, 138, 0.3);
            color: var(--text);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-family: "Cinzel", serif;
            font-size: 14px;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .font-btn:hover {
            background: rgba(216, 191, 138, 0.2);
            color: var(--gold);
            border-color: var(--gold);
        }

        .font-btn.active {
            background: var(--gold);
            color: var(--bg1);
            font-weight: bold;
            border-color: var(--gold);
        }

        /* 懸浮月亮 */
        .moon {
            text-align: center;
            margin-top: 10px;
            position: relative;
        }

        .moon::before {
            content: "";
            position: absolute;
            left: 50%;
            top: -50px;
            width: 1px;
            height: 50px;
            background: rgba(216,191,138,.35);
        }

        .moon-symbol {
            font-size: 42px;
            color: var(--gold);
            text-shadow: 0 0 18px rgba(216,191,138,.25);
            animation: floatMoon 4s ease-in-out infinite;
        }

        @keyframes floatMoon {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(6px); }
        }

        /* 標題與核心主視覺 */
        .title-block {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 35px;
        }

        .title-badge {
            display: inline-block;
            background: var(--gold-low);
            border: 1px solid rgba(216, 191, 138, 0.4);
            color: var(--gold);
            font-size: 14px;
            padding: 4px 16px;
            border-radius: 20px;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            backdrop-filter: blur(5px);
        }

        .main-title {
            font-family: "Cinzel", serif;
            font-weight: 700;
            letter-spacing: 3px;
            line-height: 1.3;
            font-size: clamp(28px, 5vw, 42px);
            background: linear-gradient(180deg, #ffffff 0%, #f1e8ff 40%, #d8bf8a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        /* 雙欄響應式布局 */
        .layout-grid {
            display: flex;
            flex-direction: column;
            gap: 28px;
            margin-bottom: 28px;
        }

        @media (min-width: 950px) {
            .layout-grid {
                flex-direction: row;
                align-items: stretch;
            }
        }

        /* 主要功能卡片 */
        .main-calculator {
            flex: 1;
            background: var(--card);
            border: 1px solid rgba(255,255,255,.06);
            border-radius: 34px;
            padding: 32px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 20px 50px rgba(0,0,0,.3);
            display: flex;
            flex-direction: column;
        }

        /* 側邊說明面板卡片 */
        .sidebar-panel {
            width: 100%;
            background: var(--card);
            border: 1px solid rgba(255,255,255,.06);
            border-radius: 34px;
            padding: 28px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 20px 50px rgba(0,0,0,.3);
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 950px) {
            .sidebar-panel {
                width: 440px;
            }
        }

        /* 表單元件設計 */
        .form-label {
            display: block;
            font-size: calc(var(--base-font-size) * 0.95);
            font-weight: 700;
            color: #bba9e8;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .classic-input {
            width: 100%;
            background: var(--flavor-bg);
            border: 1px solid rgba(216, 191, 138, 0.25);
            border-radius: 16px;
            padding: 14px 18px;
            color: #ffffff;
            font-size: calc(var(--base-font-size) * 1.0);
            font-family: inherit;
        }

        .classic-input:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(15, 11, 25, 0.7);
            box-shadow: 0 0 12px rgba(216, 191, 138, 0.2);
        }

        /* 分類頁籤 */
        .category-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
            overflow-x: auto;
            padding-bottom: 6px;
        }
        
        .category-tabs::-webkit-scrollbar {
            height: 4px;
        }
        .category-tabs::-webkit-scrollbar-thumb {
            background: rgba(216, 191, 138, 0.2);
            border-radius: 2px;
        }

        .tab-btn {
            background: var(--flavor-bg);
            border: 1px solid transparent;
            color: var(--text-sub);
            padding: 10px 18px;
            border-radius: 14px;
            cursor: pointer;
            font-size: calc(var(--base-font-size) * 0.85);
            font-weight: 700;
            white-space: nowrap;
            font-family: inherit;
        }

        .tab-btn:hover {
            color: var(--text);
            background: rgba(216, 191, 138, 0.1);
        }

        .tab-btn.active {
            background: rgba(216, 191, 138, 0.15);
            border-color: var(--gold);
            color: var(--gold);
        }

        /* 口味滾動選單區 */
        .flavor-scroll-area {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 6px;
            margin-bottom: 15px;
        }
        
        .flavor-scroll-area::-webkit-scrollbar {
            width: 5px;
        }
        .flavor-scroll-area::-webkit-scrollbar-thumb {
            background: rgba(216, 191, 138, 0.2);
            border-radius: 3px;
        }

        .flavor-group-pane { display: none; }
        .flavor-group-pane.active { display: block; }

        .flavor-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--flavor-bg);
            padding: 14px 18px;
            border-radius: 16px;
            margin-bottom: 10px;
            border: 1px solid rgba(216, 191, 138, 0.1);
        }

        .flavor-name {
            font-size: calc(var(--base-font-size) * 1.0);
            color: var(--text);
            font-weight: 700;
        }

        .flavor-price {
            font-size: calc(var(--base-font-size) * 0.8);
            color: var(--text-sub);
            margin-left: 8px;
        }

        /* 數量加減器 */
        .counter-controls {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .counter-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid rgba(216, 191, 138, 0.4);
            background: rgba(29, 24, 44, 0.6);
            color: var(--gold);
            cursor: pointer;
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .counter-btn:hover {
            border-color: var(--gold);
            color: var(--gold-hover);
            background: var(--flavor-bg);
            transform: scale(1.05);
        }

        .counter-value {
            font-size: calc(var(--base-font-size) * 1.05);
            font-weight: 700;
            width: 24px;
            text-align: center;
            color: var(--text);
        }

        /* 傳送按鈕 */
        .magic-btn {
            width: 100%;
            background: linear-gradient(135deg, #e5c158 0%, #b38f24 100%);
            border: none;
            color: var(--bg1);
            padding: 16px;
            border-radius: 16px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 700;
            font-size: calc(var(--base-font-size) * 1.05);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
            margin-top: auto;
            letter-spacing: 2px;
        }

        .magic-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 22px rgba(212, 175, 55, 0.4);
            background: linear-gradient(135deg, #f3e5ab 0%, #d4af37 100%);
        }

        /* 側邊欄大帳本紀錄 */
        .ledger-list {
            max-height: 280px;
            overflow-y: auto;
            margin-bottom: 15px;
            padding-right: 6px;
        }
        
        .ledger-list::-webkit-scrollbar {
            width: 5px;
        }
        .ledger-list::-webkit-scrollbar-thumb {
            background: rgba(216, 191, 138, 0.15);
            border-radius: 3px;
        }

        .ledger-item {
            padding: 14px 0;
            border-bottom: 1px dashed rgba(216, 191, 138, 0.2);
            font-size: calc(var(--base-font-size) * 0.88);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .ledger-name {
            color: var(--gold);
            font-weight: 700;
            white-space: nowrap;
        }

        .ledger-detail {
            color: var(--text);
            word-break: break-all;
        }

        .delete-record {
            color: var(--berry-pink);
            cursor: pointer;
            margin-left: 12px;
            font-size: 16px;
            font-weight: 700;
        }
        .delete-record:hover {
            transform: scale(1.2);
        }

        /* 篩選過濾器 */
        .filter-box {
            background: var(--flavor-bg);
            border: 1px dashed rgba(216, 191, 138, 0.25);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 14px;
        }

        .filter-title {
            font-size: calc(var(--base-font-size) * 0.8);
            font-weight: 700;
            color: var(--text-sub);
            margin-bottom: 10px;
        }

        .filter-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: calc(var(--base-font-size) * 0.85);
            color: var(--text);
            font-weight: 700;
            cursor: pointer;
        }

        .filter-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--gold);
            cursor: pointer;
        }

        /* 結算總計框 */
        .summary-box {
            background: rgba(216, 191, 138, 0.04);
            border: 1px solid rgba(216, 191, 138, 0.25);
            border-radius: 18px;
            padding: 18px;
            margin-top: auto;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: calc(var(--base-font-size) * 0.9);
        }

        /* 分隔線 */
        .classic-hr {
            margin: 20px 0;
            border: none;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(216,191,138,.3), transparent);
        }

        .sidebar-title {
            font-family: "Cinzel", serif;
            font-size: calc(var(--base-font-size) * 1.15);
            color: var(--gold);
            text-align: center;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .sidebar-desc {
            font-size: 13px;
            color: var(--text-sub);
            text-align: center;
            line-height: 1.5;
            margin-bottom: 18px;
            font-style: italic;
        }

        /* 複製大帳本按鈕 */
        .copy-all-btn {
            width: 100%;
            background: var(--flavor-bg);
            border: 1px solid rgba(216, 191, 138, 0.5);
            color: var(--gold);
            padding: 13px;
            border-radius: 14px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 700;
            font-size: calc(var(--base-font-size) * 0.85);
            margin-top: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .copy-all-btn:hover {
            background: rgba(216, 191, 138, 0.12);
            color: var(--gold-hover);
            border-color: var(--gold);
        }

        /* 下方大圖卡區域設計 */
        .image-card-container {
            background: var(--card);
            border: 1px solid rgba(255,255,255,.06);
            border-radius: 34px;
            padding: 28px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,.3);
            max-width: 850px;
            margin: 28px auto 0 auto;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .image-card-container h4 {
            font-family: "Cinzel", serif;
            font-size: calc(var(--base-font-size) * 1.05);
            color: var(--gold);
            margin-bottom: 6px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .image-card-container p {
            font-size: 13px;
            color: var(--text-sub);
            margin-bottom: 18px;
            font-style: italic;
        }
        .output-real-image {
            width: 100%;
            height: auto;
            border-radius: 20px;
            border: 1px solid rgba(216, 191, 138, 0.25);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            display: none;
        }
        .image-placeholder {
            padding: 60px 20px;
            border: 2px dashed rgba(216, 191, 138, 0.2);
            border-radius: 20px;
            color: var(--text-sub);
            font-size: calc(var(--base-font-size) * 0.85);
            font-style: italic;
        }

        /* 浮動提示訊息 */
        .toast {
            position: fixed;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--gold);
            color: var(--bg1);
            padding: 12px 26px;
            border-radius: 14px;
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s ease;
            font-size: 15px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            text-align: center;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        #captureCanvas { display: none; }

        /* 頁尾 */
        .footer {
            text-align: center;
            margin-top: 40px;
        }

        .footer-line {
            width: 100px;
            height: 1px;
            margin: auto;
            margin-bottom: 14px;
            background: linear-gradient(90deg, transparent, rgba(216,191,138,.5), transparent);
        }

        .footer-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-family: "Cinzel", serif;
            font-size: 18px;
            letter-spacing: 2px;
            color: #eadfff;
        }

        .creator {
            margin-top: 6px;
            font-size: 13px;
            color: var(--text-sub);
            letter-spacing: 1px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="frame"></div>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="container">
    <div class="font-control">
        <button class="font-btn" onclick="changeFontSize('small', this)">A -</button>
        <button class="font-btn active" onclick="changeFontSize('medium', this)">A</button>
        <button class="font-btn" onclick="changeFontSize('large', this)">A +</button>
    </div>

    <div class="moon">
        <div class="moon-symbol">☾</div>
    </div>

    <div class="title-block">
        <div class="title-badge">✨ 下午茶星幕開團應援 🥞</div>
        <h1 class="main-title">點心漫遊 · 太極鰲車輪餅</h1>
    </div>

    <div class="layout-grid">
        
        <div class="main-calculator" id="mainCorePanel">
            <div class="form-group">
                <label class="form-label">🌙 Step 1. 輸入名字或暱稱</label>
                <input type="text" id="memberInput" class="classic-input" placeholder="請輸入名字，主揪才找得到人喔..." autocomplete="off">
            </div>

            <label class="form-label">✨ Step 2. 選擇口味與數量</label>
            
            <div class="category-tabs" id="tabBar">
                <button id="btn-cat15" class="tab-btn active" onclick="switchCategory('cat15')">15元 超值經典</button>
                <button id="btn-cat18-19" class="tab-btn" onclick="switchCategory('cat18-19')">18-19元 雙餡芝麻</button>
                <button id="btn-cat20" class="tab-btn" onclick="switchCategory('cat20')">20元 地瓜麻吉</button>
                <button id="btn-cat21-25" class="tab-btn" onclick="switchCategory('cat21-25')">21-25元 豪華頂級</button>
            </div>

            <div class="flavor-scroll-area" id="flavorScrollArea"></div>

            <div class="classic-hr"></div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <span class="form-label" style="margin: 0;">您的本次點餐小計：</span>
                <span style="font-size: 30px; font-weight: 700; color: var(--gold);" id="singleTotal">$ 0</span>
            </div>

            <button class="magic-btn" onclick="submitOrder()">✦ 將點餐心願送至星空 ✦</button>
        </div>

        <div class="sidebar-panel" id="sidebarPanel">
            <h3 class="sidebar-title">🥞 今日全體點餐大帳本</h3>
            <p class="sidebar-desc">目前已匯整的車輪餅美食清單</p>
            
            <div class="ledger-list" id="ledgerList">
                <div id="emptyLedger" style="text-align: center; padding: 50px 0; color: var(--text-sub); font-size: 15px; font-style: italic;">
                    🌙 星盤空空如也，快來當第一個點餐的人！
                </div>
            </div>

            <div class="filter-box">
                <div class="filter-title">✨ 美食圖卡與複製內容篩選器</div>
                <div class="filter-options">
                    <label class="filter-label">
                        <input type="checkbox" id="showIndividualOpt" checked onchange="onFilterChanged()"> 顯示各自個人明細 (A)
                    </label>
                    <label class="filter-label">
                        <input type="checkbox" id="showStatsOpt" checked onchange="onFilterChanged()"> 顯示全體品項加總 (B)
                    </label>
                    <label class="filter-label">
                        <input type="checkbox" id="showTotalOpt" checked onchange="onFilterChanged()"> 顯示今日開團總金額 (C)
                    </label>
                </div>
            </div>

            <div class="summary-box">
                <div class="summary-row" style="align-items: flex-start;">
                    <span style="color: var(--text-sub); white-space: nowrap;">全體口味統計：</span>
                    <span id="allFlavorStats" style="font-size: 14px; text-align: right; max-width: 240px; word-break: break-all; color: var(--gold); font-weight: 700; line-height: 1.4;">無</span>
                </div>
                <div class="summary-row" style="margin-top: 12px; padding-top: 12px; border-top: 1px dashed rgba(216, 191, 138, 0.3);">
                    <span style="font-weight: 700; color: var(--text);">整單應付總金額：</span>
                    <span style="font-size: 26px; font-weight: 700; color: var(--gold);" id="grandTotal">$ 0</span>
                </div>
            </div>

            <button class="copy-all-btn" onclick="copyFilteredLedgerText()">📋 依篩選條件複製大帳本文字</button>
        </div>
    </div>

    <div class="image-card-container">
        <h4>✦ 點餐結算大圖卡 ✦</h4>
        <p>（下方圖片隨帳本即時生成，可「長按圖片」儲存分享唷）</p>
        <div id="imgPlaceholder" class="image-placeholder">✦ 帳本內有資料時，這裡會自動同步出精美結算圖卡唷！✦</div>
        <img id="outputCardImage" class="output-real-image" alt="太極鰲車輪餅結算單">
    </div>

    <div class="footer">
        <div class="footer-line"></div>
        <div class="footer-inner">
            <span id="footerBrand">✦ Lazy Dream ✦</span>
        </div>
        <div class="creator" id="footerSubtext">Designed by ChuChu © 2026 · Crafted with candlelight & tea time comfort</div>
    </div>
</div>

<div class="toast" id="toastBox"></div>
<canvas id="captureCanvas" width="800" height="900"></canvas>

<script>
/* ===== 星空隨機位置背景生成 ===== */
const stars = document.getElementById("stars");
for (let i = 0; i < 140; i++) {
    const star = document.createElement("div");
    star.className = "star";
    star.style.left = Math.random() * 100 + "%";
    star.style.top = Math.random() * 100 + "%";
    star.style.animationDelay = Math.random() * 4 + "s";
    stars.appendChild(star);
}

/* ===== 魔法字體級距縮放切換 ===== */
function changeFontSize(size, btnElement) {
    const root = document.documentElement;
    document.querySelectorAll('.font-btn').forEach(btn => btn.classList.remove('active'));
    btnElement.classList.add('active');
    
    if (size === 'small') {
        root.style.setProperty('--base-font-size', '13px');
    } else if (size === 'medium') {
        root.style.setProperty('--base-font-size', '16px');
    } else if (size === 'large') {
        root.style.setProperty('--base-font-size', '20px');
    }
}

/* ===== 菜單資料核心 ===== */
const menuData = {
    cat15: [
        { id: 'ch1', name: '紅豆', price: 15 },
        { id: 'ch2', name: '奶油', price: 15 },
        { id: 'ch3', name: '花生', price: 15 },
        { id: 'ch4', name: '巧克力', price: 15 },
        { id: 'ch5', name: '咖啡', price: 15 },
        { id: 'ch6', name: '玉米', price: 15 },
        { id: 'ch7', name: '哈密瓜奶油', price: 15 },
        { id: 'ch8', name: '草莓奶油', price: 15 },
        { id: 'ch9', name: '起士', price: 15 },
        { id: 'ch10', name: '胡椒蛋', price: 15 },
        { id: 'ch11', name: '蘿蔔絲', price: 15 },
        { id: 'ch12', name: '酸菜菜脯', price: 15 },
        { id: 'ch13', name: '高麗菜飯', price: 15 }
    ],
    'cat18-19': [
        { id: 'ch14', name: '奧利奧OREO', price: 18 },
        { id: 'ch15', name: '芝麻', price: 19 }
    ],
    cat20: [
        { id: 'ch16', name: '地瓜', price: 20 },
        { id: 'ch17', name: '三餡', price: 20 },
        { id: 'ch18', name: '麻吉 + 任一口味', price: 20 },
        { id: 'ch19', name: '原味麻吉', price: 20 },
        { id: 'ch20', name: '黑糖麻吉', price: 20 },
        { id: 'ch21', name: '紅豆 + 麻吉', price: 20 },
        { id: 'ch22', name: '奶油 + 麻吉', price: 20 },
        { id: 'ch23', name: '芝麻 + 麻吉', price: 20 },
        { id: 'ch24', name: '巧克力 + 麻吉', price: 20 }
    ],
    'cat21-25': [
        { id: 'ch25', name: '起司蛋', price: 21 },
        { id: 'ch26', name: '芋頭', price: 25 },
        { id: 'ch27', name: '五餡', price: 25 }
    ]
};

let currentSelection = {};
let globalLedger = [];

function initSelections() {
    Object.keys(menuData).forEach(cat => { menuData[cat].forEach(item => { currentSelection[item.id] = 0; }); });
}

function renderFlavorLists() {
    const scrollArea = document.getElementById('flavorScrollArea');
    scrollArea.innerHTML = '';
    Object.keys(menuData).forEach((cat, idx) => {
        const pane = document.createElement('div');
        pane.className = `flavor-group-pane ${idx === 0 ? 'active' : ''}`;
        pane.id = `pane-${cat}`;
        menuData[cat].forEach(item => {
            const row = document.createElement('div'); row.className = 'flavor-row';
            row.innerHTML = `<div class="flavor-info"><span class="flavor-name">${item.name}</span><span class="flavor-price">$ ${item.price} / 個</span></div>
                             <div class="counter-controls"><button class="counter-btn" type="button" onclick="updateCount('${item.id}', -1)">-</button>
                             <span class="counter-value" id="count-${item.id}">0</span><button class="counter-btn" type="button" onclick="updateCount('${item.id}', 1)">+</button></div>`;
            pane.appendChild(row);
        });
        scrollArea.appendChild(pane);
    });
}

function switchCategory(catId) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`btn-${catId}`).classList.add('active');
    document.querySelectorAll('.flavor-group-pane').forEach(pane => pane.classList.remove('active'));
    document.getElementById(`pane-${catId}`).classList.add('active');
}

function updateCount(id, delta) {
    const newVal = (currentSelection[id] || 0) + delta;
    if (newVal >= 0 && newVal <= 99) { currentSelection[id] = newVal; document.getElementById(`count-${id}`).textContent = newVal; calculateSingleTotal(); }
}

function findItemById(id) {
    for (let cat of Object.keys(menuData)) { let match = menuData[cat].find(i => i.id === id); if (match) return match; }
    return null;
}

function calculateSingleTotal() {
    let sum = 0;
    Object.keys(currentSelection).forEach(id => { const qty = currentSelection[id]; const item = findItemById(id); if (item && qty > 0) sum += qty * item.price; });
    document.getElementById('singleTotal').textContent = `$ ${sum}`;
    return sum;
}

function showToast(msg) {
    const toast = document.getElementById('toastBox'); toast.textContent = msg; toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
}

function submitOrder() {
    const name = document.getElementById('memberInput').value.trim();
    if (!name) { showToast('🥞 請先填寫暱稱，方便主揪核對明細唷！'); return; }
    let hasItems = false; 
    let detailSegments = []; 
    let itemsOrdered = {};
    
    Object.keys(currentSelection).forEach(id => {
        const qty = currentSelection[id];
        if (qty > 0) { 
            hasItems = true; 
            const item = findItemById(id); 
            detailSegments.push(`${item.name}${item.price}元 ${qty}個`); 
            itemsOrdered[id] = qty; 
        }
    });
    if (!hasItems) { showToast('🥞 請先點選至少一種口味與數量喔！'); return; }
    const cost = calculateSingleTotal();
    const copyText = `✦ 下午茶小憩 ✦ 【${name}】\n點餐明細：${detailSegments.join(' ')}\n合計金額 ${cost} 元。\nDesign by ChuChu 🥞`;
    globalLedger.push({ id: Date.now(), name: name, detailsText: detailSegments.join(' '), items: itemsOrdered, cost: cost });
    
    navigator.clipboard.writeText(copyText).then(() => {
        showToast(`✨ 點餐成功！明細已自動複製到剪貼簿囉！`);
    }).catch(() => { showToast(`✨ 已成功寫入全體點餐大帳本！`); });
    
    document.getElementById('memberInput').value = ''; initSelections(); initSelectionsOnList(); calculateSingleTotal(); renderLedger();
}

function initSelectionsOnList() { Object.keys(currentSelection).forEach(id => { const element = document.getElementById(`count-${id}`); if(element) element.textContent = '0'; }); }
function removeRecord(id) { globalLedger = globalLedger.filter(rec => rec.id !== id); renderLedger(); showToast('💡 已移除該筆點餐資料'); }

function onFilterChanged() {
    if (globalLedger.length > 0) {
        autoUpdateVisualCardImage();
    }
}

function renderLedger() {
    const listContainer = document.getElementById('ledgerList');
    if (globalLedger.length === 0) {
        listContainer.innerHTML = `<div id="emptyLedger" style="text-align: center; padding: 50px 0; color: var(--text-sub); font-size: 15px; font-style: italic;">🌙 星盤空空如也，快來當第一個點餐的人！</div>`;
        document.getElementById('allFlavorStats').textContent = '無'; document.getElementById('grandTotal').textContent = '$ 0';
        document.getElementById('imgPlaceholder').style.display = 'block';
        document.getElementById('outputCardImage').style.display = 'none';
        return;
    }
    listContainer.innerHTML = ''; let totalMoney = 0; let totalFlavorCounters = {};
    globalLedger.forEach(record => {
        totalMoney += record.cost; Object.keys(record.items).forEach(id => { totalFlavorCounters[id] = (totalFlavorCounters[id] || 0) + record.items[id]; });
        const div = document.createElement('div'); div.className = 'ledger-item';
        div.innerHTML = `<div><span class="ledger-name">【${record.name}】</span><span class="ledger-detail">${record.detailsText}</span></div>
                         <div style="display:flex;align-items:center;white-space:nowrap;"><span style="color:var(--gold);font-weight:700;">$${record.cost}</span>
                         <span class="delete-record" onclick="removeRecord(${record.id})">✕</span></div>`;
        listContainer.appendChild(div);
    });
    document.getElementById('grandTotal').textContent = `$ ${totalMoney}`;
    
    let statSegments = []; 
    Object.keys(totalFlavorCounters).forEach(id => { 
        const item = findItemById(id); 
        if (item && totalFlavorCounters[id] > 0) { 
            statSegments.push(`${item.name}${item.price}元:${totalFlavorCounters[id]}個`); 
        } 
    });
    document.getElementById('allFlavorStats').textContent = statSegments.length > 0 ? statSegments.join(' / ') : '無';

    autoUpdateVisualCardImage();
}

function copyFilteredLedgerText() {
    if (globalLedger.length === 0) { showToast('🥞 目前帳本空空的，還沒有資料可以複製唷！'); return; }
    
    const showIndividual = document.getElementById('showIndividualOpt').checked;
    const showStats = document.getElementById('showStatsOpt').checked;
    const showTotal = document.getElementById('showTotalOpt').checked;

    if (!showIndividual && !showStats && !showTotal) {
        showToast('🥞 請至少勾選一種想要顯示的內容唷！');
        return;
    }

    let textSegments = ['🥞 星幕漫遊 · 太極鰲車輪餅 🥞\n'];

    if (showIndividual) {
        textSegments.push('📝 【各人點餐明細】');
        globalLedger.forEach(record => {
            textSegments.push(`【${record.name}】${record.detailsText} 共 ${record.cost} 元`);
        });
        textSegments.push('');
    }

    if (showStats) {
        textSegments.push('🥞 【全體口味加總】');
        textSegments.push(document.getElementById('allFlavorStats').textContent);
        textSegments.push('');
    }

    if (showTotal) {
        textSegments.push('💰 【本次點餐終極總額】');
        textSegments.push(`合計金額：${document.getElementById('grandTotal').textContent} 元`);
        textSegments.push('');
    }

    textSegments.push('Design by ChuChu 🥞');
    const finalCopyText = textSegments.join('\n');

    navigator.clipboard.writeText(finalCopyText).then(() => {
        showToast(`✨ 點餐明細已成功複製囉！`);
    }).catch(() => { showToast(`❌ 複製失敗，請手動複製。`); });
}

function drawTextWithWrapping(ctx, text, x, startY, maxWidth, lineHeight) {
    let words = text.split(' ');
    let line = '';
    let currentY = startY;
    let linesCount = 0;

    for (let n = 0; n < words.length; n++) {
        let testLine = line + words[n] + ' ';
        let metrics = ctx.measureText(testLine);
        let testWidth = metrics.width;
        if (testWidth > maxWidth && n > 0) {
            ctx.fillText(line, x, currentY);
            line = words[n] + ' ';
            currentY += lineHeight;
            linesCount++;
        } else {
            line = testLine;
        }
    }
    ctx.fillText(line, x, currentY);
    return linesCount * lineHeight;
}

/* ===== 核心圖卡導出：同步渲染星空、月亮與古典四角邊框 ===== */
function autoUpdateVisualCardImage() {
    const canvas = document.getElementById('captureCanvas'); 
    const ctx = canvas.getContext('2d');
    
    const showIndividual = document.getElementById('showIndividualOpt').checked;
    const showStats = document.getElementById('showStatsOpt').checked;
    const showTotal = document.getElementById('showTotalOpt').checked;

    let baseHeaderHeight = 170; 
    let baseFooterWatermarkHeight = 70;
    
    let itemsHeight = 0;
    if (showIndividual) {
        itemsHeight += 40; 
        ctx.font = '19px "Microsoft JhengHei", sans-serif';
        let usableTextWidth = canvas.width - 150 - 130; 

        globalLedger.forEach(record => {
            let words = record.detailsText.split(' ');
            let line = '';
            let extraLines = 0;
            for (let n = 0; n < words.length; n++) {
                let testLine = line + words[n] + ' ';
                if (ctx.measureText(testLine).width > usableTextWidth && n > 0) {
                    line = words[n] + ' ';
                    extraLines++;
                } else {
                    line = testLine;
                }
            }
            itemsHeight += 50 + (extraLines * 26); 
        });
        itemsHeight += 20;
    }

    let summaryBoxHeight = 0;
    let estimatedStatLines = 1;
    const footerStatsRaw = document.getElementById('allFlavorStats').textContent;
    
    if (showStats || showTotal) {
        const maxCharsPerLine = 35;
        estimatedStatLines = Math.max(1, Math.ceil(footerStatsRaw.length / maxCharsPerLine));
        
        let boxPaddingAndTitle = 25;
        let statsSectionHeight = showStats ? (30 + (estimatedStatLines * 26)) : 0;
        let totalSectionHeight = showTotal ? 55 : 0;
        
        summaryBoxHeight = boxPaddingAndTitle + statsSectionHeight + totalSectionHeight + 20;
    }

    canvas.height = baseHeaderHeight + itemsHeight + summaryBoxHeight + baseFooterWatermarkHeight + 40;

    // 1. 繪製漸層背景
    let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
    gradient.addColorStop(0, '#171320'); 
    gradient.addColorStop(0.5, '#241a35');
    gradient.addColorStop(1, '#31244d');
    ctx.fillStyle = gradient; 
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // 2. 隨機撒上背景小星星
    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
    for (let s = 0; s < 60; s++) {
        let sx = Math.sin(s) * canvas.width * 2 % canvas.width;
        let sy = Math.cos(s) * canvas.height * 2 % canvas.height;
        ctx.fillRect(sx, sy, 1.5, 1.5);
    }

    // 3. 繪製外層框架
    ctx.strokeStyle = 'rgba(216, 191, 138, 0.48)'; 
    ctx.lineWidth = 1.5; 
    ctx.strokeRect(15, 15, canvas.width - 30, canvas.height - 30);
    
    ctx.strokeStyle = 'rgba(216, 191, 138, 0.18)'; 
    ctx.lineWidth = 1; 
    ctx.strokeRect(23, 23, canvas.width - 46, canvas.height - 46);

    // 四角標上對稱星芒 ✦
    ctx.font = '22px serif'; ctx.fillStyle = 'rgba(216, 191, 138, 0.8)'; ctx.textAlign = 'center';
    ctx.fillText('✦', 30, 42); 
    ctx.fillText('✦', canvas.width - 30, 42); 
    ctx.fillText('✦', 30, canvas.height - 26); 
    ctx.fillText('✦', canvas.width - 30, canvas.height - 26); 

    // 4. 頂部懸浮月亮 ☾ 與標題
    ctx.font = '36px "Microsoft JhengHei", serif'; ctx.fillStyle = '#d8bf8a';
    ctx.fillText('☾', canvas.width / 2, 65);
    
    ctx.font = 'bold 28px "Microsoft JhengHei", sans-serif'; ctx.fillStyle = '#ffffff';
    ctx.fillText('今日午茶清單 · 太極鰲車輪餅', canvas.width / 2, 115);
    
    ctx.strokeStyle = 'rgba(216, 191, 138, 0.25)'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(80, 140); ctx.lineTo(canvas.width - 80, 140); ctx.stroke();
    
    let currentY = 190;

    // 5. 繪製個人明細
    if (showIndividual) {
        ctx.textAlign = 'left';
        ctx.font = 'bold 19px "Microsoft JhengHei", sans-serif'; ctx.fillStyle = '#bba9e8';
        ctx.fillText('📝 點餐明細匯整：', 50, currentY);
        currentY += 40;

        globalLedger.forEach((record) => {
            ctx.font = 'bold 19px "Microsoft JhengHei", sans-serif'; ctx.fillStyle = '#d8bf8a'; 
            ctx.fillText(`【${record.name}】`, 50, currentY);
            
            ctx.textAlign = 'right'; ctx.font = 'bold 21px sans-serif'; ctx.fillStyle = '#d8bf8a'; 
            ctx.fillText(`$${record.cost}`, canvas.width - 50, currentY);
            
            ctx.textAlign = 'left'; ctx.font = '18px "Microsoft JhengHei", sans-serif'; ctx.fillStyle = '#f4efff';
            let textBlockHeight = drawTextWithWrapping(ctx, record.detailsText, 165, currentY, canvas.width - 165 - 120, 26);
            
            currentY += Math.max(35, textBlockHeight + 35);
            
            ctx.strokeStyle = 'rgba(216, 191, 138, 0.15)'; ctx.beginPath(); ctx.moveTo(50, currentY - 15); ctx.lineTo(canvas.width - 50, currentY - 15); ctx.stroke();
        });
        currentY += 10;
    }
    
    // 6. 綜合統計區區塊
    if (showStats || showTotal) {
        const summaryBoxTop = currentY;
        
        ctx.fillStyle = 'rgba(29, 24, 44, 0.72)'; ctx.fillRect(50, summaryBoxTop, canvas.width - 100, summaryBoxHeight);
        ctx.strokeStyle = 'rgba(216, 191, 138, 0.4)'; ctx.lineWidth = 1; ctx.strokeRect(50, summaryBoxTop, canvas.width - 100, summaryBoxHeight);
        
        let boxInnerY = summaryBoxTop + 35;

        if (showStats) {
            ctx.textAlign = 'left';
            ctx.font = 'bold 18px "Microsoft JhengHei", sans-serif'; ctx.fillStyle = '#bba9e8';
            ctx.fillText('全體口味加總：', 70, boxInnerY);
            
            ctx.font = '17px "Microsoft JhengHei", sans-serif'; ctx.fillStyle = '#f4efff';
            let startX = 205;
            let startY = boxInnerY;
            
            const maxCharsPerLine = 28;
            for (let i = 0; i < footerStatsRaw.length; i += maxCharsPerLine) {
                let chunk = footerStatsRaw.substring(i, i + maxCharsPerLine);
                ctx.fillText(chunk, startX, startY);
                startY += 26;
            }
            boxInnerY = startY + 15;
        }

        if (showTotal) {
            if (showStats) {
                ctx.strokeStyle = 'rgba(216, 191, 138, 0.15)'; ctx.beginPath(); ctx.moveTo(70, boxInnerY - 15); ctx.lineTo(canvas.width - 70, boxInnerY - 15); ctx.stroke();
            }
            ctx.textAlign = 'left';
            ctx.font = 'bold 19px "Microsoft JhengHei", sans-serif'; ctx.fillStyle = '#f4efff'; 
            ctx.fillText('應付總金額：', 70, boxInnerY);
            ctx.textAlign = 'right'; ctx.font = 'bold 32px sans-serif'; ctx.fillStyle = '#d8bf8a'; 
            ctx.fillText(document.getElementById('grandTotal').textContent, canvas.width - 70, boxInnerY + 8);
        }
    }

    // 7. 頁尾標記
    ctx.textAlign = 'center'; ctx.font = '14px serif'; ctx.fillStyle = 'rgba(216, 191, 138, 0.45)';
    ctx.fillText('✦ Lazy Dream ✦ Designed by ChuChu © 2026', canvas.width / 2, canvas.height - 30);

    const dataURL = canvas.toDataURL("image/png");
    const outputImg = document.getElementById('outputCardImage');
    outputImg.src = dataURL;
    
    document.getElementById('imgPlaceholder').style.display = 'none';
    outputImg.style.display = 'block';
}

window.onload = function() { initSelections(); initSelectionsOnList(); renderFlavorLists(); };
</script>
