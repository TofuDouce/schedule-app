<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>壯觀千塊骨牌 ✦ Domino Mega-Chain</title>
    <meta name="robots" content="noindex,nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #fafafa;
            font-family: "Zen Maru Gothic", sans-serif;
        }
        svg {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        .domino {
            cursor: pointer;
            transition: transform 0.25s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.25s ease;
        }
        /* 壓倒後的傾斜狀態 */
        .domino.down {
            opacity: 0.35;
        }
        /* 介面層 */
        .ui-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
            z-index: 10;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: auto;
        }
        .title {
            font-size: 20px;
            font-weight: 700;
            color: #1c1921;
            letter-spacing: 2px;
        }
        .subtitle {
            font-size: 12px;
            color: #8a8299;
            margin-top: 4px;
            letter-spacing: 1px;
        }
        .btn {
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.08);
            color: #332f3d;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn:hover {
            background: rgba(0, 0, 0, 0.1);
            transform: translateY(-1px);
        }
        .footer {
            text-align: center;
            width: 100%;
        }
        .hint {
            font-size: 14px;
            color: rgba(0, 0, 0, 0.25);
            letter-spacing: 2px;
            animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
    </style>
</head>
<body>

    <svg id="dominoField"></svg>

    <div class="ui-container">
        <div class="header">
            <div>
                <h1 class="title">無盡骨牌效應</h1>
                <div class="subtitle">✦ 1200+ Domino Mega-Chain</div>
            </div>
            <button class="btn" onclick="resetField()">✦ 重置骨牌 (R) ✦</button>
        </div>
        <div class="footer">
            <div class="hint" id="hintText">點擊最左上角第一塊骨牌・釋放連鎖</div>
        </div>
    </div>

    <script>
        const svg = document.getElementById('dominoField');
        let dominoes = [];
        let isRunning = false;

        function initDominoes() {
            svg.innerHTML = '';
            dominoes = [];
            isRunning = false;
            document.getElementById('hintText').style.display = 'block';

            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;
            
            // 骨牌幾何尺寸
            const dWidth = 4;
            const dHeight = 18;
            const step = 8; // 軌道前進步長
            
            // 實打實的 1200 塊骨牌
            const totalDominoes = 1200; 
            
            // 蛇行軌道物理參數
            const padding = 60;
            const rowHeight = dHeight * 2.5; // 每列的上下間距
            const availableWidth = screenWidth - padding * 2;
            
            let currentX = padding;
            let currentY = padding + 40;
            let direction = 1; // 1 = 向右跑, -1 = 向左跑

            for (let i = 0; i < totalDominoes; i++) {
                // 建立 SVG 矩形
                const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                
                // 動態流體色彩（360度絢麗漸層）
                const hue = (i * 0.4) % 360;
                const color = `hsl(${hue}, 80%, 55%)`;
                
                rect.setAttribute("class", "domino");
                rect.setAttribute("width", dWidth);
                rect.setAttribute("height", dHeight);
                rect.setAttribute("rx", "1");
                rect.setAttribute("fill", color);
                
                // 根據當前前進方向，計算骨牌應該傾倒的角度
                // 向右跑的骨牌往右倒（90deg），向左跑的往左倒（-90deg）
                const fallAngle = direction * 75; 
                rect.dataset.fallAngle = fallAngle;

                // 軌道邏輯：計算折返蛇行
                if (direction === 1) {
                    // 向右前進
                    if (currentX < screenWidth - padding) {
                        currentX += step;
                    } else {
                        // 撞到右牆，轉彎向下，並切換方向往左
                        currentY += rowHeight;
                        direction = -1;
                    }
                } else {
                    // 向左前進
                    if (currentX > padding) {
                        currentX -= step;
                    } else {
                        // 撞到左牆，轉彎向下，並切換方向往右
                        currentY += rowHeight;
                        direction = 1;
                    }
                }

                // 超出螢幕底部就停止產生，防死當
                if (currentY > screenHeight - padding) break;

                rect.setAttribute("x", currentX - dWidth / 2);
                rect.setAttribute("y", currentY - dHeight);
                
                // 設定每塊骨牌以其「底部中心點」為物理旋轉軸
                rect.style.transformOrigin = `${currentX}px ${currentY}px`;
                
                svg.appendChild(rect);
                dominoes.push(rect);
            }

            // 綁定極左上角第一塊骨牌作為引爆點
            if (dominoes.length > 0) {
                dominoes[0].addEventListener('click', startChainAction);
            }
        }

        function startChainAction() {
            if (isRunning) return;
            isRunning = true;
            document.getElementById('hintText').style.display = 'none';
            dominoes[0].removeEventListener('click', startChainAction);

            // 1200塊巨量連鎖引擎
            dominoes.forEach((domino, i) => {
                setTimeout(() => {
                    const angle = domino.dataset.fallAngle;
                    // 執行精準的方向傾倒
                    domino.style.transform = `rotate(${angle}deg)`;
                    domino.classList.add('down');
                }, i * 12); // 縮短至 12 毫秒，維持極速流暢的骨牌奔跑感
            });
        }

        function resetField() {
            initDominoes();
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                resetField();
            }
        });

        initDominoes();
        window.addEventListener('resize', initDominoes);
    </script>
</body>
</html>
