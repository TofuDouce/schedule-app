<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原諒色螢幕 ✦ 功德加成</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #8fb98b; /* 極致原諒綠 */
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font-family: 'Zen Maru Gothic', sans-serif;
            overflow: hidden; cursor: pointer;
            transition: background-color 0.5s ease;
        }

        #frog {
            font-size: 150px;
            transition: transform 0.1s ease;
        }

        #frog:active { transform: scale(0.9); }

        #counter {
            margin-top: 40px;
            font-size: 24px;
            color: rgba(255,255,255,0.7);
            letter-spacing: 5px;
        }

        .float-text {
            position: absolute;
            font-size: 30px;
            font-weight: bold;
            color: white;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }
    </style>
</head>
<body>

    <div id="frog">🐸</div>
    <div id="counter">功德：0</div>

    <script>
        let count = 0;
        const counter = document.getElementById('counter');
        const frog = document.getElementById('frog');
        const phrases = ["算了吧", "別氣了", "一切都是命", "功德+1", "原諒他", "放過自己"];

        frog.addEventListener('click', (e) => {
            count++;
            counter.innerText = `功德：${count}`;
            
            // 播放木魚聲 (簡單頻率模擬)
            playWoodBlock();
            
            // 隨機跳出原諒金句
            showFloatingText(e.clientX, e.clientY);
        });

        function playWoodBlock() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(400, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        function showFloatingText(x, y) {
            const div = document.createElement('div');
            div.className = 'float-text';
            div.innerText = phrases[Math.floor(Math.random() * phrases.length)];
            div.style.left = x + 'px';
            div.style.top = (y - 50) + 'px';
            document.body.appendChild(div);
            
            setTimeout(() => div.remove(), 1000);
        }
    </script>
</body>
</html>
