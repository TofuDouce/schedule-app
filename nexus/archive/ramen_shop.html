<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🍜 深夜拉麵店</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
}

body{
    overflow:hidden;
    background:#0b0f16;
    color:white;
}

#game{
    display:flex;
    width:100vw;
    height:100vh;
}

/* LEFT */

#left{
    position:relative;
    width:72%;
    background:
    linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.75)),
    linear-gradient(#1a2433,#0b0f16);
    overflow:hidden;
}

#rain{
    position:absolute;
    inset:0;
    opacity:.18;
    pointer-events:none;
}

.drop{
    position:absolute;
    width:2px;
    height:20px;
    background:white;
    animation:rain linear infinite;
}

@keyframes rain{
    from{
        transform:translateY(-30px);
    }
    to{
        transform:translateY(110vh);
    }
}

#topBar{
    position:absolute;
    top:16px;
    left:16px;
    z-index:5;
}

#day{
    font-size:28px;
    margin-bottom:8px;
}

#phase{
    opacity:.8;
}

#shop{
    position:absolute;
    bottom:0;
    width:100%;
    height:48%;
    background:#241814;
    border-top:5px solid #4e3227;
}

#counter{
    position:absolute;
    bottom:110px;
    width:100%;
    height:85px;
    background:#5a3b28;
}

#kitchen{
    position:absolute;
    right:40px;
    bottom:160px;
    width:160px;
    height:120px;
    background:#2d2d2d;
    border-radius:14px;
    border:3px solid #555;
}

#pot{
    position:absolute;
    left:45px;
    top:30px;
    width:70px;
    height:45px;
    background:#111;
    border-radius:0 0 40px 40px;
}

.steam{
    position:absolute;
    width:20px;
    height:20px;
    border-radius:50%;
    background:rgba(255,255,255,.1);
    animation:steam 3s infinite;
}

@keyframes steam{
    from{
        transform:translateY(0) scale(1);
        opacity:.5;
    }
    to{
        transform:translateY(-90px) scale(2);
        opacity:0;
    }
}

.customer{
    position:absolute;
    bottom:165px;
    width:70px;
    transition:.3s;
}

.head{
    width:40px;
    height:40px;
    background:#ffd7b0;
    border-radius:50%;
    margin:auto;
}

.body{
    width:52px;
    height:72px;
    border-radius:12px;
    margin:auto;
    margin-top:4px;
}

.order{
    position:absolute;
    top:-42px;
    left:-10px;
    background:white;
    color:black;
    padding:5px 10px;
    border-radius:12px;
    font-size:14px;
    white-space:nowrap;
}

.patienceWrap{
    margin-top:4px;
    width:100%;
    height:6px;
    background:#333;
    border-radius:99px;
    overflow:hidden;
}

.patience{
    height:100%;
    background:#ff6565;
}

#line{
    position:absolute;
    left:20px;
    bottom:160px;
    display:flex;
    flex-direction:column;
    gap:6px;
    opacity:.8;
}

.queuePerson{
    font-size:22px;
}

/* RIGHT */

#right{
    width:28%;
    background:#141b24;
    border-left:4px solid #1f2733;
    padding:18px;
    overflow:auto;
}

.panel{
    background:#1d2633;
    border-radius:16px;
    padding:16px;
    margin-bottom:18px;
}

.panel h2{
    margin-bottom:12px;
    color:#ffd27d;
}

.stat{
    margin-bottom:10px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    background:#ff934d;
    color:white;
    cursor:pointer;
    font-size:15px;
    transition:.2s;
}

button:hover{
    transform:scale(1.03);
}

button:active{
    transform:scale(.97);
}

#log{
    height:220px;
    overflow:auto;
    line-height:1.6;
    font-size:14px;
}

.logItem{
    margin-bottom:6px;
}

.combo{
    color:#ffe066;
}

.good{
    color:#7dff8f;
}

.bad{
    color:#ff7d7d;
}

#pauseScreen{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.7);
    backdrop-filter:blur(5px);
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:999;
}

#pauseScreen h1{
    font-size:48px;
    margin-bottom:12px;
}

#pauseScreen p{
    opacity:.8;
}

#cheatBox{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#0d1117;
    color:#fff;
    margin-top:10px;
}

#moneyPop{
    position:absolute;
    font-weight:bold;
    color:#ffe066;
    pointer-events:none;
}

.glow{
    box-shadow:0 0 20px rgba(255,180,80,.5);
}

</style>
</head>

<body>

<div id="game">

<!-- LEFT -->

<div id="left">

<div id="topBar">
<div id="day">🌙 第 1 天</div>
<div id="phase">🍜 準備營業中</div>
</div>

<div id="rain"></div>

<div id="line"></div>

<div id="shop">

<div id="counter"></div>

<div id="kitchen" class="glow">
<div id="pot"></div>
</div>

</div>

<div id="pauseScreen">
<h1>💤 店休中</h1>
<p>老闆去休息了</p>
</div>

</div>

<!-- RIGHT -->

<div id="right">

<div class="panel">
<h2>🏮 店鋪資訊</h2>

<div class="stat">💰 金錢：<span id="money">120</span></div>
<div class="stat">⭐ 評價：<span id="rating">5.0</span></div>
<div class="stat">🔥 Combo：<span id="combo">0</span></div>
<div class="stat">🍜 今日客人：<span id="served">0</span></div>
<div class="stat">🏮 氣氛值：<span id="mood">1</span></div>

<button onclick="togglePause()">⏸️ 暫停 / 休息</button>

</div>

<div class="panel">
<h2>🍳 製作料理</h2>

<button onclick="cook('ramen')">🍜 拉麵</button>
<button onclick="cook('friedrice')">🍳 炒飯</button>
<button onclick="cook('miso')">🥣 味噌湯</button>
<button onclick="cook('gyoza')">🥟 煎餃</button>

</div>

<div class="panel">
<h2>⚙️ 放置升級</h2>

<button onclick="buyUpgrade('autoCook')">
🤖 自動煮麵 Lv.<span id="autoCookLv">0</span>
</button>

<button onclick="buyUpgrade('cat')">
🐱 招財貓 Lv.<span id="catLv">0</span>
</button>

<button onclick="buyUpgrade('seat')">
🪑 座位數 Lv.<span id="seatLv">3</span>
</button>

<button onclick="buyUpgrade('speed')">
⚡ 出餐速度 Lv.<span id="speedLv">1</span>
</button>

</div>

<div class="panel">
<h2>🎴 秘笈輸入</h2>

<input id="cheatBox" placeholder="輸入秘笈..." />
</div>

<div class="panel">
<h2>📜 店內消息</h2>
<div id="log"></div>
</div>

</div>

</div>

<script>

/* =========================
   DATA
========================= */

let paused = false;

let money = 120;
let rating = 5;
let combo = 0;
let served = 0;
let mood = 1;

let day = 1;

let seats = 3;

let autoCookLv = 0;
let catLv = 0;
let speedLv = 1;

let customers = [];
let queue = [];

const dishes = {

    ramen:{
        emoji:"🍜",
        name:"拉麵",
        price:20
    },

    friedrice:{
        emoji:"🍳",
        name:"炒飯",
        price:25
    },

    miso:{
        emoji:"🥣",
        name:"味噌湯",
        price:15
    },

    gyoza:{
        emoji:"🥟",
        name:"煎餃",
        price:18
    }
};

/* =========================
   UI
========================= */

const moneyEl = document.getElementById("money");
const ratingEl = document.getElementById("rating");
const comboEl = document.getElementById("combo");
const servedEl = document.getElementById("served");
const moodEl = document.getElementById("mood");

const autoCookLvEl = document.getElementById("autoCookLv");
const catLvEl = document.getElementById("catLv");
const seatLvEl = document.getElementById("seatLv");
const speedLvEl = document.getElementById("speedLv");

function updateUI(){

    moneyEl.textContent = Math.floor(money);

    ratingEl.textContent =
    rating.toFixed(1);

    comboEl.textContent = combo;

    servedEl.textContent = served;

    moodEl.textContent = mood;

    autoCookLvEl.textContent = autoCookLv;

    catLvEl.textContent = catLv;

    seatLvEl.textContent = seats;

    speedLvEl.textContent = speedLv;

    document.getElementById("day")
    .textContent = `🌙 第 ${day} 天`;
}

function log(text, type=""){

    const div = document.createElement("div");

    div.className = "logItem " + type;

    div.innerHTML = text;

    const logBox = document.getElementById("log");

    logBox.prepend(div);
}

function moneyPop(text){

    const pop = document.createElement("div");

    pop.id = "moneyPop";

    pop.textContent = text;

    pop.style.left = "50%";
    pop.style.top = "50%";

    document.body.appendChild(pop);

    let y = 0;

    const int = setInterval(()=>{

        y -= 2;

        pop.style.transform =
        `translateY(${y}px)`;

        pop.style.opacity =
        1 + y/60;

        if(y < -60){

            clearInterval(int);

            pop.remove();
        }

    },16);
}

/* =========================
   CUSTOMERS
========================= */

function spawnCustomer(){

    if(paused) return;

    if(customers.length >= seats){

        queue.push("🧍");

        renderQueue();

        return;
    }

    const keys = Object.keys(dishes);

    const order =
    keys[Math.floor(Math.random()*keys.length)];

    const customer = {

        id:Date.now()+Math.random(),

        order,

        patience:100,

        color:
        `hsl(${Math.random()*360},40%,40%)`
    };

    customers.push(customer);

    renderCustomers();
}

function renderCustomers(){

    document
    .querySelectorAll(".customer")
    .forEach(e=>e.remove());

    customers.forEach((c,i)=>{

        const div = document.createElement("div");

        div.className = "customer";

        div.style.left =
        90 + i*150 + "px";

        div.innerHTML = `

        <div class="order">
        ${dishes[c.order].emoji}
        ${dishes[c.order].name}

        <div class="patienceWrap">
        <div class="patience"
        style="width:${c.patience}%"></div>
        </div>

        </div>

        <div class="head"></div>

        <div class="body"
        style="background:${c.color}">
        </div>
        `;

        document
        .getElementById("left")
        .appendChild(div);

    });
}

function renderQueue(){

    const line =
    document.getElementById("line");

    line.innerHTML = "";

    queue.slice(0,8).forEach(()=>{

        const q =
        document.createElement("div");

        q.className = "queuePerson";

        q.textContent = "🧍";

        line.appendChild(q);
    });
}

/* =========================
   COOK
========================= */

function cook(type){

    if(paused) return;

    const target =
    customers.find(c=>c.order===type);

    if(!target){

        combo = 0;

        log("❌ 沒有人點這道料理","bad");

        updateUI();

        return;
    }

    const dish = dishes[type];

    let earn =
    dish.price + combo + mood;

    money += earn;

    combo++;

    served++;

    rating += 0.02;

    moneyPop("+"+earn);

    log(
    `${dish.emoji} 完成 ${dish.name} +$${earn}`,
    "good"
    );

    if(combo % 5 === 0){

        log(
        `🔥 COMBO x${combo}`,
        "combo"
        );
    }

    customers =
    customers.filter(c=>c.id!==target.id);

    if(queue.length > 0){

        queue.shift();

        spawnCustomer();

    }

    renderQueue();

    renderCustomers();

    updateUI();
}

/* =========================
   PATIENCE
========================= */

function patienceLoop(){

    if(paused) return;

    customers.forEach(c=>{

        c.patience -= 0.08;

        if(c.patience <= 0){

            customers =
            customers.filter(x=>x.id!==c.id);

            combo = 0;

            rating -= 0.12;

            log(
            "😡 客人氣跑了",
            "bad"
            );
        }

    });

    renderCustomers();

    updateUI();
}

/* =========================
   UPGRADES
========================= */

function buyUpgrade(type){

    if(type==="autoCook"){

        const cost =
        (autoCookLv+1)*200;

        if(money < cost) return;

        money -= cost;

        autoCookLv++;

        log("🤖 自動煮麵機升級");

    }

    if(type==="cat"){

        const cost =
        (catLv+1)*180;

        if(money < cost) return;

        money -= cost;

        catLv++;

        mood++;

        log("🐱 招財貓帶來好運");

    }

    if(type==="seat"){

        const cost =
        seats*250;

        if(money < cost) return;

        money -= cost;

        seats++;

        log("🪑 增加座位");

    }

    if(type==="speed"){

        const cost =
        speedLv*220;

        if(money < cost) return;

        money -= cost;

        speedLv++;

        log("⚡ 出餐速度提升");
    }

    updateUI();
}

/* =========================
   AUTO COOK
========================= */

function autoCook(){

    if(paused) return;

    if(autoCookLv <= 0) return;

    if(customers.length <= 0) return;

    const target = customers[0];

    cook(target.order);
}

setInterval(autoCook, 5000);

/* =========================
   CAT MONEY
========================= */

setInterval(()=>{

    if(paused) return;

    if(catLv <= 0) return;

    const earn = catLv * 6;

    money += earn;

    log(
    `🐱 招財貓帶來 $${earn}`
    );

    updateUI();

},10000);

/* =========================
   DAY SYSTEM
========================= */

const phases = [

"🍱 準備時間",
"🌆 晚餐時段",
"🌧️ 深夜尖峰",
"🌙 凌晨時段",
"💤 打烊休息"

];

let phaseIndex = 0;

function nextPhase(){

    phaseIndex++;

    if(phaseIndex >= phases.length){

        phaseIndex = 0;

        day++;

        money += 50;

        log(
        `🌅 新的一天開始了`
        );
    }

    document
    .getElementById("phase")
    .textContent = phases[phaseIndex];
}

setInterval(nextPhase, 40000);

/* =========================
   EVENTS
========================= */

const events = [

"🌧️ 下雨天，拉麵人氣增加",

"📺 美食節目介紹了你的店",

"🐱 門口來了一隻流浪貓",

"🌸 櫻花季到了，氣氛值提升",

"👑 熟客給了超大紅包"

];

setInterval(()=>{

    if(paused) return;

    const e =
    events[
    Math.floor(Math.random()*events.length)
    ];

    log(e);

    if(e.includes("紅包")){

        money += 150;
    }

    if(e.includes("氣氛")){

        mood++;
    }

    updateUI();

},25000);

/* =========================
   PAUSE
========================= */

function togglePause(){

    paused = !paused;

    document
    .getElementById("pauseScreen")
    .style.display =
    paused ? "flex" : "none";

    log(
    paused ?
    "💤 店休中" :
    "🍜 恢復營業"
    );
}

/* =========================
   CHEATS
========================= */

const cheatBox =
document.getElementById("cheatBox");

cheatBox.addEventListener("keydown",e=>{

    if(e.key !== "Enter") return;

    const value =
    cheatBox.value.toLowerCase();

    if(value==="ramengod"){

        money += 9999;

        log("👑 拉麵之神降臨");

    }

    else if(value==="catcafe"){

        catLv += 5;

        log("🐱 貓咪天堂模式");

    }

    else if(value==="rushhour"){

        for(let i=0;i<5;i++){

            spawnCustomer();
        }

        log("⚡ 尖峰時段開始");
    }

    else if(value==="slowlife"){

        paused = true;

        togglePause();

        log("🌙 進入慢活模式");
    }

    else if(value==="rich"){

        money += 5000;

        log("💰 神秘金援");
    }

    else if(value==="rainnight"){

        log("☔ 永夜雨模式");
    }

    else{

        log("❓ 什麼都沒發生");
    }

    cheatBox.value = "";

    updateUI();

});

/* =========================
   RAIN
========================= */

function createRain(){

    for(let i=0;i<120;i++){

        const d =
        document.createElement("div");

        d.className = "drop";

        d.style.left =
        Math.random()*100 + "%";

        d.style.top =
        Math.random()*100 + "%";

        d.style.opacity =
        Math.random();

        d.style.animationDuration =
        .5 + Math.random()*1 + "s";

        document
        .getElementById("rain")
        .appendChild(d);
    }
}

createRain();

/* =========================
   STEAM
========================= */

function steam(){

    const s =
    document.createElement("div");

    s.className = "steam";

    s.style.left =
    980 + Math.random()*40 + "px";

    s.style.bottom =
    230 + Math.random()*20 + "px";

    document
    .getElementById("left")
    .appendChild(s);

    setTimeout(()=>{

        s.remove();

    },3000);
}

setInterval(steam,300);

/* =========================
   GAME LOOP
========================= */

setInterval(spawnCustomer,3500);

setInterval(patienceLoop,100);

updateUI();

log("🍜 深夜拉麵店開始營業");

</script>

</body>
</html>
