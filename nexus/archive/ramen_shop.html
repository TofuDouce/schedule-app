<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>🍜 深夜拉麵店</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
    font-family:
    -apple-system,
    BlinkMacSystemFont,
    sans-serif;
}

body{
    overflow:hidden;
    background:#081018;
    color:white;
}

/* =========================
   GAME
========================= */

#game{

    width:100vw;
    height:100vh;

    position:relative;

    overflow:hidden;

    background:
    linear-gradient(rgba(0,0,0,.45),
    rgba(0,0,0,.7)),

    linear-gradient(#0d1c2d,#081018);
}

/* =========================
   RAIN
========================= */

#rain{

    position:absolute;

    inset:0;

    pointer-events:none;

    opacity:.16;
}

.drop{

    position:absolute;

    width:2px;

    height:20px;

    background:white;

    animation:rain linear infinite;
}

@keyframes rain{

    from{
        transform:translateY(-30px);
    }

    to{
        transform:translateY(110vh);
    }
}

/* =========================
   TOP BAR
========================= */

#topUI{

    position:absolute;

    top:14px;
    left:14px;
    right:14px;

    z-index:20;

    display:flex;

    justify-content:space-between;

    align-items:flex-start;
}

#shopInfo{

    background:rgba(0,0,0,.35);

    padding:14px 18px;

    border-radius:22px;

    backdrop-filter:blur(10px);

    border:
    1px solid rgba(255,255,255,.08);
}

#shopName{

    font-size:24px;

    color:#ffd27d;

    margin-bottom:4px;
}

#phase{

    opacity:.75;

    font-size:14px;
}

#moneyBox{

    background:rgba(0,0,0,.35);

    padding:14px 18px;

    border-radius:22px;

    backdrop-filter:blur(10px);

    border:
    1px solid rgba(255,255,255,.08);

    text-align:right;
}

.money{

    font-size:22px;

    color:#ffe066;
}

.small{

    opacity:.75;

    font-size:13px;

    margin-top:4px;
}

/* =========================
   SHOP
========================= */

#shop{

    position:absolute;

    bottom:0;

    width:100%;

    height:52%;

    background:
    linear-gradient(#2c1913,#1a0f0c);

    border-top:
    5px solid #6b4333;
}

/* =========================
   COUNTER
========================= */

#counter{

    position:absolute;

    bottom:120px;

    left:50%;

    transform:translateX(-50%);

    width:92%;

    height:145px;

    border-radius:28px;

    background:
    linear-gradient(#5c3a2b,#3d251d);

    border:
    4px solid #80513b;

    box-shadow:
    0 0 35px rgba(255,140,60,.2);
}

/* =========================
   SEATS
========================= */

.seat{

    position:absolute;

    bottom:150px;

    width:74px;

    height:74px;

    border-radius:50%;

    background:
    radial-gradient(circle at top,
    #666,#222);

    border:
    4px solid #777;
}

#seat1{ left:12%; }
#seat2{ left:38%; }
#seat3{ right:12%; }

/* =========================
   CUSTOMERS
========================= */

.customer{

    position:absolute;

    bottom:200px;

    width:90px;

    z-index:10;

    transition:.3s;
}

.head{

    width:44px;

    height:44px;

    border-radius:50%;

    background:#ffd7b0;

    margin:auto;
}

.body{

    width:58px;

    height:82px;

    border-radius:16px;

    margin:auto;

    margin-top:4px;
}

.order{

    position:absolute;

    top:-48px;

    left:-10px;

    background:white;

    color:black;

    padding:6px 12px;

    border-radius:14px;

    font-size:15px;

    white-space:nowrap;
}

.patienceWrap{

    width:100%;

    height:6px;

    margin-top:5px;

    background:#333;

    border-radius:999px;

    overflow:hidden;
}

.patience{

    height:100%;

    background:#ff6464;
}

/* =========================
   QUEUE
========================= */

#line{

    position:absolute;

    left:10px;

    bottom:210px;

    display:flex;

    flex-direction:column;

    gap:6px;

    z-index:5;
}

.queue{

    font-size:22px;

    opacity:.75;
}

/* =========================
   STEAM
========================= */

.steam{

    position:absolute;

    width:24px;

    height:24px;

    border-radius:50%;

    background:
    rgba(255,255,255,.08);

    animation:steam 3s infinite;
}

@keyframes steam{

    from{
        transform:translateY(0)
        scale(1);

        opacity:.4;
    }

    to{
        transform:translateY(-90px)
        scale(2);

        opacity:0;
    }
}

/* =========================
   BOTTOM MENU
========================= */

#menu{

    position:fixed;

    bottom:0;
    left:0;

    width:100%;

    height:115px;

    background:
    rgba(10,15,24,.96);

    backdrop-filter:blur(12px);

    display:grid;

    grid-template-columns:
    repeat(4,1fr);

    gap:10px;

    padding:12px;

    z-index:999;
}

.foodBtn{

    border:none;

    border-radius:22px;

    background:
    linear-gradient(#ff9d57,#ff8642);

    color:white;

    font-size:18px;

    font-weight:bold;

    box-shadow:
    0 6px 16px rgba(0,0,0,.3);
}

/* =========================
   SIDE BUTTONS
========================= */

#sideBtns{

    position:absolute;

    right:14px;

    top:110px;

    display:flex;

    flex-direction:column;

    gap:10px;

    z-index:20;
}

.sideBtn{

    width:62px;

    height:62px;

    border:none;

    border-radius:20px;

    background:
    rgba(0,0,0,.4);

    color:white;

    font-size:24px;

    backdrop-filter:blur(8px);

    border:
    1px solid rgba(255,255,255,.08);
}

/* =========================
   MODAL
========================= */

.modal{

    position:fixed;

    inset:0;

    background:
    rgba(0,0,0,.7);

    display:none;

    align-items:center;

    justify-content:center;

    z-index:9999;

    backdrop-filter:blur(8px);
}

.modalBox{

    width:88%;

    max-width:420px;

    background:#18202b;

    border-radius:28px;

    padding:26px;

    border:
    1px solid rgba(255,255,255,.08);
}

.modalTitle{

    font-size:28px;

    color:#ffd27d;

    margin-bottom:14px;
}

.modal input{

    width:100%;

    padding:16px;

    border:none;

    border-radius:16px;

    background:#0e141c;

    color:white;

    margin-top:12px;

    font-size:18px;
}

.modal button{

    width:100%;

    padding:16px;

    border:none;

    border-radius:18px;

    margin-top:16px;

    background:
    linear-gradient(#ff9d57,#ff8642);

    color:white;

    font-size:18px;
}

/* =========================
   LOG
========================= */

#log{

    margin-top:16px;

    max-height:180px;

    overflow:auto;

    line-height:1.6;

    font-size:14px;
}

.logItem{

    margin-bottom:7px;
}

/* =========================
   PAUSE
========================= */

#pauseScreen{

    position:fixed;

    inset:0;

    background:
    rgba(0,0,0,.72);

    display:none;

    align-items:center;

    justify-content:center;

    flex-direction:column;

    z-index:99999;

    backdrop-filter:blur(8px);
}

#pauseScreen h1{

    font-size:52px;

    margin-bottom:10px;
}

#pauseScreen p{

    opacity:.8;
}

/* =========================
   MONEY POP
========================= */

.moneyPop{

    position:absolute;

    color:#ffe066;

    font-weight:bold;

    pointer-events:none;

    z-index:9999;
}

</style>
</head>

<body>

<div id="game">

<div id="rain"></div>

<!-- TOP -->

<div id="topUI">

<div id="shopInfo">

<div id="shopName">
🏮 深夜食堂
</div>

<div id="phase">
🌙 準備營業中
</div>

</div>

<div id="moneyBox">

<div class="money">
💰 <span id="money">120</span>
</div>

<div class="small">
⭐ <span id="rating">5.0</span>
・🔥 <span id="combo">0</span>
</div>

<div class="small">
🍜 <span id="served">0</span>
・🏮 <span id="mood">1</span>
</div>

</div>

</div>

<!-- SIDE -->

<div id="sideBtns">

<button class="sideBtn"
onclick="togglePause()">
💤
</button>

<button class="sideBtn"
onclick="openUpgrade()">
⚙️
</button>

<button class="sideBtn"
onclick="openCheat()">
🎴
</button>

</div>

<!-- LINE -->

<div id="line"></div>

<!-- SHOP -->

<div id="shop">

<div id="counter"></div>

<div class="seat" id="seat1"></div>
<div class="seat" id="seat2"></div>
<div class="seat" id="seat3"></div>

</div>

<!-- MENU -->

<div id="menu">

<button class="foodBtn"
onclick="cook('ramen')">
🍜<br>拉麵
</button>

<button class="foodBtn"
onclick="cook('friedrice')">
🍳<br>炒飯
</button>

<button class="foodBtn"
onclick="cook('miso')">
🥣<br>味噌
</button>

<button class="foodBtn"
onclick="cook('gyoza')">
🥟<br>煎餃
</button>

</div>

<!-- NAME MODAL -->

<div class="modal"
id="nameModal"
style="display:flex">

<div class="modalBox">

<div class="modalTitle">
🍜 深夜拉麵店
</div>

請輸入你的店名

<input
id="nameInput"
maxlength="20"
placeholder="例如：深夜食堂">

<button onclick="saveShopName()">
🌙 開始營業
</button>

</div>

</div>

<!-- UPGRADE -->

<div class="modal"
id="upgradeModal">

<div class="modalBox">

<div class="modalTitle">
⚙️ 店鋪升級
</div>

<button onclick="buyUpgrade('auto')">
🤖 自動煮麵 Lv.<span id="autoLv">0</span>
</button>

<button onclick="buyUpgrade('cat')">
🐱 招財貓 Lv.<span id="catLv">0</span>
</button>

<button onclick="buyUpgrade('seat')">
🪑 座位 Lv.<span id="seatLv">3</span>
</button>

<button onclick="buyUpgrade('mood')">
🏮 氣氛值 Lv.<span id="moodLv">1</span>
</button>

<button onclick="closeUpgrade()">
關閉
</button>

</div>

</div>

<!-- CHEAT -->

<div class="modal"
id="cheatModal">

<div class="modalBox">

<div class="modalTitle">
🎴 秘笈輸入
</div>

<input
id="cheatInput"
placeholder="輸入秘笈">

<button onclick="submitCheat()">
輸入
</button>

<div id="log"></div>

<button onclick="closeCheat()">
關閉
</button>

</div>

</div>

<!-- PAUSE -->

<div id="pauseScreen">

<h1>💤</h1>

<p>店休中</p>

</div>

</div>

<script>

/* =========================
   DATA
========================= */

let money = 120;

let rating = 5;

let combo = 0;

let served = 0;

let mood = 1;

let paused = false;

let shopName = "深夜食堂";

let seats = 3;

let autoLv = 0;

let catLv = 0;

let moodLv = 1;

let customers = [];

let queue = [];

const dishes = {

    ramen:{
        emoji:"🍜",
        name:"拉麵",
        price:20
    },

    friedrice:{
        emoji:"🍳",
        name:"炒飯",
        price:25
    },

    miso:{
        emoji:"🥣",
        name:"味噌湯",
        price:15
    },

    gyoza:{
        emoji:"🥟",
        name:"煎餃",
        price:18
    }
};

/* =========================
   UI
========================= */

function updateUI(){

    document
    .getElementById("money")
    .textContent =
    Math.floor(money);

    document
    .getElementById("rating")
    .textContent =
    rating.toFixed(1);

    document
    .getElementById("combo")
    .textContent =
    combo;

    document
    .getElementById("served")
    .textContent =
    served;

    document
    .getElementById("mood")
    .textContent =
    mood;

    document
    .getElementById("autoLv")
    .textContent =
    autoLv;

    document
    .getElementById("catLv")
    .textContent =
    catLv;

    document
    .getElementById("seatLv")
    .textContent =
    seats;

    document
    .getElementById("moodLv")
    .textContent =
    moodLv;
}

function log(text){

    const div =
    document.createElement("div");

    div.className = "logItem";

    div.innerHTML = text;

    document
    .getElementById("log")
    .prepend(div);
}

/* =========================
   NAME
========================= */

function saveShopName(){

    const val =
    document
    .getElementById("nameInput")
    .value
    .trim();

    if(val){

        shopName = val;
    }

    document
    .getElementById("shopName")
    .innerHTML =
    `🏮 ${shopName}`;

    document
    .getElementById("nameModal")
    .style.display =
    "none";

    log(`🌙 ${shopName} 開始營業`);
}

/* =========================
   CUSTOMERS
========================= */

function spawnCustomer(){

    if(paused) return;

    if(customers.length >= seats){

        if(queue.length < 8){

            queue.push("🧍");

            renderQueue();
        }

        return;
    }

    const keys =
    Object.keys(dishes);

    const order =
    keys[
    Math.floor(
    Math.random()*keys.length
    )
    ];

    const customer = {

        id:
        Date.now()+Math.random(),

        order,

        patience:100,

        color:
        `hsl(${Math.random()*360},
        40%,40%)`
    };

    customers.push(customer);

    renderCustomers();
}

function renderCustomers(){

    document
    .querySelectorAll(".customer")
    .forEach(e=>e.remove());

    const pos = [
        "12%",
        "38%",
        "64%"
    ];

    customers.forEach((c,i)=>{

        const div =
        document.createElement("div");

        div.className =
        "customer";

        div.style.left =
        pos[i];

        div.innerHTML = `

        <div class="order">

        ${dishes[c.order].emoji}
        ${dishes[c.order].name}

        <div class="patienceWrap">

        <div class="patience"
        style="
        width:${c.patience}%">
        </div>

        </div>

        </div>

        <div class="head"></div>

        <div class="body"
        style="
        background:${c.color}">
        </div>
        `;

        document
        .getElementById("game")
        .appendChild(div);
    });
}

function renderQueue(){

    const line =
    document
    .getElementById("line");

    line.innerHTML = "";

    queue.forEach(()=>{

        const q =
        document
        .createElement("div");

        q.className =
        "queue";

        q.textContent = "🧍";

        line.appendChild(q);
    });
}

/* =========================
   COOK
========================= */

function cook(type){

    if(paused) return;

    const target =
    customers.find(
    c=>c.order===type
    );

    if(!target){

        combo = 0;

        log(
        "❌ 沒有人點這道料理"
        );

        updateUI();

        return;
    }

    const dish =
    dishes[type];

    const earn =
    dish.price +
    combo +
    mood;

    money += earn;

    combo++;

    served++;

    rating += .03;

    log(
    `${dish.emoji}
    完成 ${dish.name}
    +$${earn}`
    );

    moneyPop(
    "+"+earn
    );

    customers =
    customers.filter(
    c=>c.id!==target.id
    );

    if(queue.length > 0){

        queue.shift();

        spawnCustomer();
    }

    renderCustomers();

    renderQueue();

    updateUI();
}

/* =========================
   PATIENCE
========================= */

function patienceLoop(){

    if(paused) return;

    customers.forEach(c=>{

        c.patience -= .08;

        if(c.patience <= 0){

            customers =
            customers.filter(
            x=>x.id!==c.id
            );

            combo = 0;

            rating -= .1;

            log(
            "😡 客人氣跑了"
            );
        }

    });

    renderCustomers();

    updateUI();
}

/* =========================
   MONEY POP
========================= */

function moneyPop(text){

    const pop =
    document
    .createElement("div");

    pop.className =
    "moneyPop";

    pop.textContent =
    text;

    pop.style.left =
    "50%";

    pop.style.top =
    "45%";

    document.body
    .appendChild(pop);

    let y = 0;

    const int =
    setInterval(()=>{

        y -= 2;

        pop.style.transform =
        `translateY(${y}px)`;

        pop.style.opacity =
        1 + y/60;

        if(y < -60){

            clearInterval(int);

            pop.remove();
        }

    },16);
}

/* =========================
   UPGRADE
========================= */

function buyUpgrade(type){

    if(type==="auto"){

        const cost =
        (autoLv+1)*200;

        if(money < cost) return;

        money -= cost;

        autoLv++;

        log(
        "🤖 自動煮麵升級"
        );
    }

    if(type==="cat"){

        const cost =
        (catLv+1)*180;

        if(money < cost) return;

        money -= cost;

        catLv++;

        log(
        "🐱 招財貓升級"
        );
    }

    if(type==="seat"){

        const cost =
        seats*300;

        if(money < cost) return;

        if(seats >= 3){

            log(
            "🪑 店太小了，暫時無法增加"
            );

            return;
        }

        money -= cost;

        seats++;
    }

    if(type==="mood"){

        const cost =
        moodLv*150;

        if(money < cost) return;

        money -= cost;

        moodLv++;

        mood++;

        log(
        "🏮 氣氛提升"
        );
    }

    updateUI();
}

/* =========================
   AUTO
========================= */

setInterval(()=>{

    if(paused) return;

    if(autoLv <= 0) return;

    if(customers.length <= 0)
    return;

    cook(
    customers[0].order
    );

},5000);

setInterval(()=>{

    if(paused) return;

    if(catLv <= 0) return;

    const earn =
    catLv * 5;

    money += earn;

    log(
    `🐱 招財貓帶來
    $${earn}`
    );

    updateUI();

},10000);

/* =========================
   PHASE
========================= */

const phases = [

"🍱 準備時間",

"🌆 晚餐時段",

"🌧️ 深夜尖峰",

"🌙 凌晨時段",

"💤 打烊休息"

];

let phase = 0;

setInterval(()=>{

    phase++;

    if(phase >= phases.length){

        phase = 0;
    }

    document
    .getElementById("phase")
    .textContent =
    phases[phase];

},40000);

/* =========================
   PAUSE
========================= */

function togglePause(){

    paused = !paused;

    document
    .getElementById("pauseScreen")
    .style.display =
    paused ?
    "flex" :
    "none";
}

/* =========================
   MODAL
========================= */

function openUpgrade(){

    document
    .getElementById("upgradeModal")
    .style.display =
    "flex";
}

function closeUpgrade(){

    document
    .getElementById("upgradeModal")
    .style.display =
    "none";
}

function openCheat(){

    document
    .getElementById("cheatModal")
    .style.display =
    "flex";
}

function closeCheat(){

    document
    .getElementById("cheatModal")
    .style.display =
    "none";
}

/* =========================
   CHEAT
========================= */

function submitCheat(){

    const value =
    document
    .getElementById("cheatInput")
    .value
    .toLowerCase();

    if(value==="ramengod"){

        money += 9999;

        log(
        "👑 拉麵之神降臨"
        );
    }

    else if(value==="catcafe"){

        catLv += 5;

        log(
        "🐱 貓咪天堂"
        );
    }

    else if(value==="rich"){

        money += 5000;

        log(
        "💰 神秘金援"
        );
    }

    else if(value==="rushhour"){

        for(let i=0;i<5;i++){

            spawnCustomer();
        }

        log(
        "⚡ 尖峰時段"
        );
    }

    else{

        log(
        "❓ 什麼都沒發生"
        );
    }

    updateUI();

    document
    .getElementById("cheatInput")
    .value = "";
}

/* =========================
   RAIN
========================= */

function createRain(){

    for(let i=0;i<120;i++){

        const d =
        document
        .createElement("div");

        d.className =
        "drop";

        d.style.left =
        Math.random()*100 + "%";

        d.style.top =
        Math.random()*100 + "%";

        d.style.opacity =
        Math.random();

        d.style.animationDuration =
        .5 + Math.random()*1 + "s";

        document
        .getElementById("rain")
        .appendChild(d);
    }
}

createRain();

/* =========================
   STEAM
========================= */

function steam(){

    const s =
    document
    .createElement("div");

    s.className =
    "steam";

    s.style.left =
    65 + Math.random()*20 + "%";

    s.style.bottom =
    250 + Math.random()*20 + "px";

    document
    .getElementById("game")
    .appendChild(s);

    setTimeout(()=>{

        s.remove();

    },3000);
}

setInterval(steam,400);

/* =========================
   LOOP
========================= */

setInterval(
spawnCustomer,
3500
);

setInterval(
patienceLoop,
100
);

updateUI();

log("🍜 深夜拉麵店開始營業");

</script>

</body>
</html>
