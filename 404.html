<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>這裡沒有路喔～</title>
  <!-- 不被搜尋引擎收錄 -->
  <meta name="robots" content="noindex, nofollow">

  <!-- ============================================================
       ★ 共用設定區 ★  這三項不分主題,固定顯示
       ============================================================ -->
  <script>
    const SHARED = {
      title:    "這裡沒有路喔～",
      subtitle: "Under Construction",
      brand:    "工事中 · 慵懶夢境"
    };

    // ★ 五種柔和主題 ★ 每次載入隨機抽一種
    const THEMES = [
      {
        name: "莫蘭迪紫",
        emoji: "🌙",
        lines: ["這個小角落還在悄悄施工中,", "夢還沒織完、星星還在排隊🌙", "不如先回頭走走,稍後再來看看吧!"],
        bg: "#f4f1f7", bg2: "#faf8fc", card: "#fffdff",
        text: "#5d5468", muted: "#9a8fa8", title: "#6f6386", sub: "#c3b6d8",
        ramp: ["#6f6386", "#9b8eb3", "#c3b6d8", "#ddd3ec", "#ece5f4"]
      },
      {
        name: "奶椰可可",
        emoji: "🥥",
        lines: ["這個小角落還在悄悄施工中,", "可可正在烘焙、奶椰還在攪拌🥥", "不如先回頭走走,稍後再來看看吧!"],
        bg: "#f6f1e9", bg2: "#fbf8f3", card: "#fffdf9",
        text: "#5a4a40", muted: "#a08d7f", title: "#6e5346", sub: "#9c8273",
        ramp: ["#6e5346", "#9c8273", "#d8c3a8", "#b6c39d", "#8f9f78"]
      },
      {
        name: "蜜桃奶霜",
        emoji: "🍑",
        lines: ["這個小角落還在悄悄施工中,", "蜜桃剛採下、奶霜還在打發🍑", "不如先回頭走走,稍後再來看看吧!"],
        bg: "#fbf2ee", bg2: "#fef9f6", card: "#fffdfb",
        text: "#6b5048", muted: "#b59287", title: "#c97b63", sub: "#e0a890",
        ramp: ["#c97b63", "#e0a890", "#f0c4ad", "#f7d9c8", "#fceae0"]
      },
      {
        name: "薄荷海鹽",
        emoji: "🍃",
        lines: ["這個小角落還在悄悄施工中,", "薄荷正冰鎮、海鹽還在融化🍃", "不如先回頭走走,稍後再來看看吧!"],
        bg: "#eef5f2", bg2: "#f8fcfa", card: "#fcfffe",
        text: "#46584f", muted: "#8aa79b", title: "#5b8a76", sub: "#9cc4b4",
        ramp: ["#5b8a76", "#7faf9a", "#a8cdbf", "#c8e0d6", "#e3f0ea"]
      },
      {
        name: "霧藍天空",
        emoji: "☁️",
        lines: ["這個小角落還在悄悄施工中,", "雲朵還在飄、藍天正在曬乾☁️", "不如先回頭走走,稍後再來看看吧!"],
        bg: "#eef2f6", bg2: "#f8fafc", card: "#fcfdff",
        text: "#4c5663", muted: "#8f9eb0", title: "#5f7693", sub: "#9bb1c9",
        ramp: ["#5f7693", "#86a0bb", "#aec5db", "#cdddea", "#e6eef5"]
      }
    ];
  </script>
  <!-- ============================================================ -->

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, var(--bg) 0%, var(--bg2) 100%);
      color: var(--text);
      font-family: "Noto Serif TC", "Microsoft JhengHei", serif;
      padding: 28px;
      text-align: center;
      overflow: hidden;
    }
    .card {
      position: relative;
      background: var(--card);
      border-radius: 30px;
      padding: 48px 36px 40px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 18px 50px rgba(80, 70, 90, .15);
    }
    .blob {
      font-size: 72px;
      display: inline-block;
      animation: float 3.6s ease-in-out infinite;
      filter: drop-shadow(0 6px 10px rgba(80, 70, 90, .18));
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-3deg); }
      50%      { transform: translateY(-12px) rotate(3deg); }
    }
    h1 {
      font-size: 26px; font-weight: 700; letter-spacing: 2px;
      margin: 20px 0 6px; color: var(--title);
    }
    .sub {
      font-size: 14px; letter-spacing: 4px; color: var(--sub);
      margin-bottom: 22px; text-transform: uppercase;
    }
    p { color: var(--muted); line-height: 1.9; font-size: 15.5px; }
    .dots { display: flex; justify-content: center; gap: 9px; margin-top: 30px; }
    .dots span {
      width: 14px; height: 14px; border-radius: 50%;
      animation: blink 1.6s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: .35; transform: translateY(0); }
      50%      { opacity: 1;   transform: translateY(-5px); }
    }
    .footnote {
      margin-top: 26px; font-size: 12.5px; letter-spacing: 1px; color: var(--sub);
    }
    .deco { position: fixed; border-radius: 50%; filter: blur(2px); opacity: .5; z-index: -1; }
    .deco.a { width: 160px; height: 160px; top: -40px; left: -40px; }
    .deco.b { width: 220px; height: 220px; bottom: -70px; right: -60px; }
    .deco.c { width: 90px;  height: 90px;  bottom: 60px; left: 20px; opacity: .25; }
  </style>
</head>
<body>
  <div class="deco a"></div>
  <div class="deco b"></div>
  <div class="deco c"></div>

  <div class="card">
    <div class="blob" id="emoji"></div>
    <h1 id="title"></h1>
    <div class="sub" id="subtitle"></div>
    <p id="lines"></p>
    <div class="dots" id="dots"></div>
    <div class="footnote" id="brand"></div>
  </div>

  <script>
    // 隨機抽一種主題
    const t = THEMES[Math.floor(Math.random() * THEMES.length)];
    const r = document.documentElement.style;

    // 套用配色
    r.setProperty("--bg",    t.bg);
    r.setProperty("--bg2",   t.bg2);
    r.setProperty("--card",  t.card);
    r.setProperty("--text",  t.text);
    r.setProperty("--muted", t.muted);
    r.setProperty("--title", t.title);
    r.setProperty("--sub",   t.sub);

    // 套用文字
    document.getElementById("emoji").textContent    = t.emoji;
    document.getElementById("title").textContent    = SHARED.title;
    document.getElementById("subtitle").textContent = SHARED.subtitle;
    document.getElementById("brand").textContent    = SHARED.brand;
    document.getElementById("lines").innerHTML       = t.lines.join("<br>");
    document.title = SHARED.title;

    // 用主題色階產生 5 顆色點
    const dots = document.getElementById("dots");
    t.ramp.forEach(function (c, i) {
      const s = document.createElement("span");
      s.style.background = c;
      s.style.animationDelay = (i * 0.2) + "s";
      dots.appendChild(s);
    });

    // 裝飾圓也跟著主題色
    document.querySelector(".deco.a").style.background = t.ramp[3];
    document.querySelector(".deco.b").style.background = t.ramp[4];
    document.querySelector(".deco.c").style.background = t.ramp[1];
  </script>
</body>
</html>
