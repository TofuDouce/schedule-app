<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#F5F1E4">
<title>小怪獸咖啡館</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@500;700;900&family=LXGW+WenKai+TC&display=swap" rel="stylesheet">
<style>
/* ---------- 預設配色：拿鐵奶油 ---------- */
:root{
  --bg:#F5F1E4; --dot:#E6DDC7; --card:#FFFCF3; --card-edge:#D9CDB0; --card-under:#DDE3CE;
  --ink:#453A28; --ink-soft:#8A7B5C; --ink-faint:#B6A886;
  --accent:#5F9E6E; --accent-dk:#477F58; --accent-pale:#E3EFDD; --on-accent:#FFFFFF;
  --input-bg:#FBF7EA; --danger:#D4826A; --danger-dk:#B36249; --scrim:#3A3223;
  --fs:19px;
  --font:'Zen Maru Gothic','Noto Sans TC','PingFang TC',sans-serif;
  --monster:#8C6FC6; --monster-dk:#6B4FA6; --monster-eye:#FFFDF6;
}

/* ---------- 其他配色 ---------- */
[data-theme="coin"]{
  --bg:#E9EAEC; --dot:#D6D8DB; --card:#FEFEFE; --card-edge:#CBCED2; --card-under:#B7BBC0;
  --ink:#262A2E; --ink-soft:#6E747A; --ink-faint:#A0A6AC;
  --accent:#5B6B7A; --accent-dk:#44515E; --accent-pale:#DEE4E9; --on-accent:#FFFFFF;
  --input-bg:#F5F6F7; --danger:#B4574B; --danger-dk:#8E4136; --scrim:#2A2F34;
}
[data-theme="lucky"]{
  --bg:#F2E4E0; --dot:#E2CFCA; --card:#FFFAF8; --card-edge:#E0C9C3; --card-under:#CFB2AB;
  --ink:#33201C; --ink-soft:#7B6259; --ink-faint:#AE9088;
  --accent:#C0392B; --accent-dk:#96271B; --accent-pale:#F7DDD7; --on-accent:#FFF7EF;
  --input-bg:#FCF3F0; --danger:#A9791F; --danger-dk:#875D12; --scrim:#3E211B;
}
[data-theme="matcha"]{
  --bg:#EDF1E6; --dot:#DBE2D0; --card:#FCFDF9; --card-edge:#CBD5BC; --card-under:#B7C4A5;
  --ink:#2C3327; --ink-soft:#6E7A63; --ink-faint:#9EAA91;
  --accent:#5FA47A; --accent-dk:#437B5A; --accent-pale:#DEEEE0; --on-accent:#FFFFFF;
  --input-bg:#F6F9F1; --danger:#C4785B; --danger-dk:#A05B41; --scrim:#2C3327;
}
[data-theme="book"]{
  --bg:#E7EBF1; --dot:#D3D9E3; --card:#FCFDFE; --card-edge:#C6CEDB; --card-under:#B0BACA;
  --ink:#222833; --ink-soft:#666F7E; --ink-faint:#98A1B0;
  --accent:#3E5C8C; --accent-dk:#2C446B; --accent-pale:#DCE4F0; --on-accent:#FFFFFF;
  --input-bg:#F4F7FB; --danger:#B05A3E; --danger-dk:#8E432B; --scrim:#222833;
}
[data-theme="rose"]{
  --bg:#EFE3E4; --dot:#DFCFD1; --card:#FEFCFC; --card-edge:#D8C4C6; --card-under:#C6AFB2;
  --ink:#2E2224; --ink-soft:#786A6C; --ink-faint:#A79597;
  --accent:#B37784; --accent-dk:#8E5766; --accent-pale:#F2DFE2; --on-accent:#FFFFFF;
  --input-bg:#FBF4F5; --danger:#9A5C3C; --danger-dk:#7C462B; --scrim:#3A2A2C;
}
[data-theme="paper"]{
  --bg:#E6DCC8; --dot:#D5C9B1; --card:#F7F1E3; --card-edge:#CFC0A2; --card-under:#BCAB89;
  --ink:#40372A; --ink-soft:#7E7259; --ink-faint:#A99A7C;
  --accent:#7A5C3E; --accent-dk:#5C4229; --accent-pale:#E5D8BE; --on-accent:#FDF8EE;
  --input-bg:#F1E9D8; --danger:#A24B3C; --danger-dk:#84392C; --scrim:#342C20;
}
[data-theme="night"]{
  --bg:#23262B; --dot:#2E333A; --card:#2C3037; --card-edge:#3F454F; --card-under:#171A1E;
  --ink:#EDEAE3; --ink-soft:#A9AEB6; --ink-faint:#767C85;
  --accent:#6FA8CC; --accent-dk:#93C8E6; --accent-pale:#33414C; --on-accent:#16191D;
  --input-bg:#262A30; --danger:#D98A72; --danger-dk:#EEA88F; --scrim:#000000;
}
[data-theme="ink"]{
  --bg:#121212; --dot:#1E1E1E; --card:#1A1A1A; --card-edge:#343434; --card-under:#000000;
  --ink:#F0EDE6; --ink-soft:#A9A399; --ink-faint:#726C63;
  --accent:#C9A227; --accent-dk:#E0BC49; --accent-pale:#3A3220; --on-accent:#14120A;
  --input-bg:#1F1F1F; --danger:#C96A4A; --danger-dk:#E08A6B; --scrim:#000000;
}

/* ---------- 版式與衍生變數：一律寫在 body ----------
   data-theme 掛在 body，這些若寫在 :root 會先結算成預設色，換配色時不會跟著變。 */
body{
  --pnl-r:22px; --pnl-bw:2px; --pnl-bs:solid;
  --pnl-sh:0 6px 0 var(--card-under);
  --pnl-sh-sm:0 4px 0 var(--card-under);
  --soft-sh:0 4px 0 var(--card-edge);
  --tape:var(--monster);
  --c-sim:#8C6FC6; --c-nov:#C4776E; --c-web:#5F9E6E;
  --c-day:#C99B45; --c-exp:#6C8FB5; --c-etc:#9A8B70;
}
body[data-look="bold"]{ --pnl-r:20px; --pnl-bw:3px; }
body[data-look="dash"]{ --pnl-bs:dashed; --pnl-sh:0 3px 0 var(--card-under); --pnl-sh-sm:0 2px 0 var(--card-under); }
body[data-look="flat"]{ --pnl-r:10px; --pnl-sh:0 3px 0 var(--card-under); --pnl-sh-sm:0 2px 0 var(--card-under); }

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0;font-family:var(--font);background:var(--bg);color:var(--ink);
  line-height:1.7;min-height:100svh;font-size:var(--fs);
  background-image:radial-gradient(var(--dot) 1.5px,transparent 1.5px);
  background-size:22px 22px;
  padding:0 13px calc(112px + env(safe-area-inset-bottom));
  transition:background-color .25s,color .25s;
}
.wrap{max-width:620px;margin:0 auto}
@media (min-width:780px){.wrap{max-width:1120px}}

.tape{position:relative}
.tape::before{
  content:"";position:absolute;top:-11px;left:26px;width:82px;height:23px;
  background:var(--tape);opacity:.34;
  border-left:3px dotted rgba(255,255,255,.5);border-right:3px dotted rgba(255,255,255,.5);
  transform:rotate(-3.5deg);border-radius:2px;
}
.card{
  background:var(--card);border:var(--pnl-bw) var(--pnl-bs) var(--card-edge);
  border-radius:var(--pnl-r);box-shadow:var(--pnl-sh);padding:20px 18px;margin-bottom:16px;
}

header{padding:28px 0 6px;text-align:center}
.monster{width:62px;height:55px;margin:0 auto 10px;position:relative;background:var(--monster);border-radius:31px 31px 25px 25px;box-shadow:0 4px 0 var(--monster-dk)}
.monster i{position:absolute;top:19px;width:11px;height:11px;background:var(--monster-eye);border-radius:50%}
.monster i:nth-child(2){left:13px} .monster i:nth-child(3){right:13px}
.monster b{position:absolute;bottom:13px;left:50%;transform:translateX(-50%);width:17px;height:8px;border-radius:0 0 11px 11px;background:var(--monster-eye)}
.monster u{position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:4px;height:12px;background:var(--monster-dk);border-radius:3px}
h1{font-size:1.28em;font-weight:900;margin:0;letter-spacing:.05em}
.sub{font-size:.74em;color:var(--ink-soft);margin:2px 0 0}
.eyebrow{font-size:.65em;font-weight:700;letter-spacing:.16em;color:var(--ink-faint);margin:20px 0 8px;padding-left:2px}

button{font-family:var(--font);font-weight:700;cursor:pointer;border:0}
.btn{background:var(--accent);color:var(--on-accent);font-size:.86em;border-radius:99px;padding:13px 20px;box-shadow:0 4px 0 var(--accent-dk)}
.btn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--accent-dk)}
.btn.wide{width:100%}
.btn.soft{background:var(--accent-pale);color:var(--accent-dk);box-shadow:var(--soft-sh)}
.btn.soft:active{box-shadow:0 2px 0 var(--card-edge)}
.btn.warn{background:var(--danger);box-shadow:0 4px 0 var(--danger-dk);color:#fff}
.btn.tiny{font-size:.74em;padding:9px 20px}
.center{text-align:center;margin-top:20px}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.row .btn{flex:1;min-width:118px}

input[type=search],select{
  width:100%;font-family:var(--font);font-size:.88em;color:var(--ink);font-weight:700;
  background:var(--input-bg);border:2px solid var(--card-edge);
  border-radius:99px;padding:12px 18px;-webkit-appearance:none;appearance:none;
}
select{
  border-radius:16px;
  background-image:linear-gradient(45deg,transparent 50%,var(--ink-soft) 50%),linear-gradient(135deg,var(--ink-soft) 50%,transparent 50%);
  background-position:calc(100% - 20px) 50%,calc(100% - 14px) 50%;
  background-size:6px 6px,6px 6px;background-repeat:no-repeat;
}
input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-pale)}

.cats{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.cat{font-size:.76em;font-weight:700;padding:8px 15px;border-radius:99px;cursor:pointer;
  background:var(--input-bg);border:2px solid var(--card-edge);color:var(--ink-soft)}
.cat.on{color:#fff;border-color:transparent}
.cat.on[data-c="模擬器"]{background:var(--c-sim)}
.cat.on[data-c="小說"]{background:var(--c-nov)}
.cat.on[data-c="網站工具"]{background:var(--c-web)}
.cat.on[data-c="日常工具"]{background:var(--c-day)}
.cat.on[data-c="實驗性質"]{background:var(--c-exp)}
.cat.on[data-c="其他"]{background:var(--c-etc)}
.cat.on[data-c="全部"]{background:var(--ink);color:var(--bg)}

/* 作品卡 */
.grid{display:grid;gap:16px;margin-top:16px}
@media (min-width:780px){.grid{grid-template-columns:repeat(2,1fr)}}
@media (min-width:1100px){.grid{grid-template-columns:repeat(3,1fr)}}
@media (min-width:780px){body{padding-bottom:calc(120px + env(safe-area-inset-bottom))}.shot{height:200px}}
.work{
  position:relative;background:var(--card);border:var(--pnl-bw) var(--pnl-bs) var(--card-edge);
  border-radius:var(--pnl-r);box-shadow:var(--pnl-sh);overflow:hidden;cursor:pointer;
}
.work:active{transform:translateY(2px);box-shadow:var(--pnl-sh-sm)}
.shot{position:relative;height:172px;background:var(--input-bg);
  border-bottom:2px solid var(--card-edge);overflow:hidden}
.shot iframe{position:absolute;top:0;left:0;width:300%;height:300%;border:0;
  transform:scale(.3333);transform-origin:0 0;pointer-events:none;background:#fff}
.shot .veil{position:absolute;inset:0}
.shot .ph{position:absolute;inset:0;display:grid;place-items:center;color:var(--ink-faint);font-size:.72em;font-weight:700}
.meta{padding:14px 16px 15px;position:relative}
.meta .stripe{position:absolute;left:0;top:0;bottom:0;width:7px}
.meta .nm{font-weight:900;font-size:.94em;line-height:1.4}
.meta .ds{font-size:.76em;color:var(--ink-soft);margin-top:2px}
.meta .mt{display:flex;align-items:center;gap:7px;margin-top:9px;font-size:.66em;color:var(--ink-faint)}
.chip{font-size:.95em;font-weight:700;padding:2px 10px;border-radius:99px;color:#fff}
.chip.lock{background:var(--monster)}
.chip.open{background:var(--accent)}
.star{color:var(--c-day)}
.empty{text-align:center;color:var(--ink-faint);font-size:.82em;padding:40px 10px;line-height:2}

/* 外觀 */
.themes{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px}
.th{background:var(--input-bg);border:2px solid var(--card-edge);border-radius:16px;
  padding:9px 6px;cursor:pointer;text-align:center}
.th.on{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-pale)}
.th .sw{display:flex;justify-content:center;gap:3px;margin-bottom:5px}
.th .sw span{width:15px;height:15px;border-radius:50%;border:1px solid rgba(0,0,0,.12)}
.th small{font-size:.62em;font-weight:700;color:var(--ink-soft);letter-spacing:.02em}
.sizer{display:flex;align-items:center;gap:12px;margin-top:8px}
.sizer button{flex:0 0 auto;width:54px;height:46px;border-radius:15px;background:var(--input-bg);
  border:2px solid var(--card-edge);color:var(--ink);font-size:.9em}
.sizer button:active{background:var(--accent-pale)}
.sizer .val{flex:1;text-align:center;font-weight:900;color:var(--accent-dk);font-size:.95em}
.looks{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.lk{flex:1;min-width:70px;text-align:center;background:var(--input-bg);border:2px solid var(--card-edge);
  border-radius:14px;padding:10px 4px;font-size:.76em;font-weight:700;color:var(--ink-soft);cursor:pointer}
.lk.on{background:var(--accent-pale);border-color:var(--accent);color:var(--accent-dk)}
.demo{margin-top:10px}
.demo .d1{background:var(--card);border:var(--pnl-bw) var(--pnl-bs) var(--card-edge);border-radius:var(--pnl-r);
  box-shadow:var(--pnl-sh-sm);padding:12px 14px;font-size:.8em;margin-bottom:9px}
.demo .d2{background:var(--accent-pale);color:var(--accent-dk);border-radius:var(--pnl-r);
  padding:12px 14px;font-size:.8em;font-weight:700;margin-bottom:9px}
.demo .d3{background:var(--card);border-left:7px solid var(--accent);border-radius:0 var(--pnl-r) var(--pnl-r) 0;
  box-shadow:var(--pnl-sh-sm);padding:12px 14px;font-size:.8em}

.about p{font-size:.82em;margin:0 0 12px}
.legend{display:flex;flex-wrap:wrap;gap:9px;margin-top:6px}
.lg{display:flex;align-items:center;gap:6px;font-size:.74em;color:var(--ink-soft)}
.lg span{width:13px;height:13px;border-radius:5px;display:inline-block}
.stat{display:flex;gap:10px;margin-top:12px}
.stat div{flex:1;background:var(--input-bg);border:2px solid var(--card-edge);border-radius:16px;padding:12px 6px;text-align:center}
.stat b{display:block;font-size:1.1em;font-weight:900;color:var(--accent-dk);line-height:1.3}
.stat small{font-size:.62em;color:var(--ink-faint)}

#err{display:none;background:var(--input-bg);border:2px solid var(--danger);color:var(--danger-dk);
  border-radius:18px;padding:13px 15px;font-size:.78em;margin-bottom:14px}
#toast{position:fixed;left:50%;bottom:calc(108px + env(safe-area-inset-bottom));
  transform:translateX(-50%) translateY(18px);background:var(--ink);color:var(--bg);
  font-size:.78em;font-weight:900;padding:11px 24px;border-radius:999px;
  opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:150;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

#viewer{position:fixed;inset:0;z-index:200;background:var(--scrim);display:none;flex-direction:column;
  padding:calc(10px + env(safe-area-inset-top)) 10px calc(10px + env(safe-area-inset-bottom))}
#viewer.on{display:flex}
#viewer .top{display:flex;gap:8px;align-items:center;margin-bottom:9px}
#viewer .vname{flex:1;min-width:0;color:#F3EEE0;font-weight:900;font-size:.82em;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-left:6px}
#viewer .btn{padding:9px 15px;font-size:.74em}
#viewer iframe{flex:1;width:100%;border:0;border-radius:18px;background:#fff}

nav.bottom{position:fixed;left:0;right:0;bottom:0;z-index:70;background:var(--card);
  border-top:2px solid var(--card-edge);display:flex;padding:8px 6px 14px;
  max-width:640px;margin:0 auto;border-radius:22px 22px 0 0}
nav.bottom button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  font-size:.62em;font-weight:900;color:var(--ink-faint);padding:4px 0;min-width:0;background:none}
nav.bottom button .ic{font-size:20px;line-height:1.2}
nav.bottom button.on{color:var(--accent)}
.hide{display:none!important}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="monster"><u></u><i></i><i></i><b></b></div>
    <h1>小怪獸咖啡館</h1>
    <p class="sub">一個人的作品架</p>
  </header>

  <div id="err"></div>

  <!-- 架上 -->
  <div id="tabShelf">
    <input type="search" id="q" placeholder="找找看⋯⋯">
    <div class="cats" id="filters"></div>
    <div class="eyebrow" id="countLine">正在開店⋯⋯</div>
    <div class="grid" id="list"></div>
  </div>

  <!-- 關於 -->
  <div class="hide" id="tabAbout">
    <div class="card tape about">
      <div class="eyebrow">這裡是什麼</div>
      <p>這裡收著我自己寫的網頁工具。每一件都是單獨一份 HTML 檔，程式碼原封不動存在這裡，點開就能直接跑。</p>
      <p>卡片上那塊小畫面是作品本人，不是截圖。</p>
      <div class="eyebrow">分類</div>
      <div class="legend" id="legend"></div>
      <div class="eyebrow">目前架上</div>
      <div class="stat">
        <div><b id="stN">0</b><small>件作品</small></div>
        <div><b id="stKb">0</b><small>KB 程式碼</small></div>
        <div><b id="stC">0</b><small>個分類</small></div>
      </div>
    </div>
  </div>

  <!-- 外觀 -->
  <div class="hide" id="tabLook">
    <div class="card tape">
      <div class="eyebrow">配色</div>
      <div class="themes" id="themes"></div>

      <div class="eyebrow">字型</div>
      <select id="fontSel"></select>

      <div class="eyebrow">字級</div>
      <div class="sizer">
        <button id="fsDown">A－</button>
        <div class="val" id="fsVal">19px</div>
        <button id="fsUp">A＋</button>
      </div>

      <div class="eyebrow">版式</div>
      <div class="looks" id="looks"></div>

      <div class="eyebrow">看起來像這樣</div>
      <div class="demo">
        <div class="d1">基本框。底色、框線、圓角、陰影都跟著配色走。</div>
        <div class="d2">淡彩底。用來放重點或提示。</div>
        <div class="d3">左槓重點。適合條列說明。</div>
      </div>

      <div class="center"><button class="btn soft tiny" id="btnReset">恢復預設</button></div>
    </div>
  </div>

  <!-- 老闆 -->
  <div class="hide" id="tabOwner">
    <div class="card tape">
      <div class="eyebrow">帳號</div>
      <p style="margin:0 0 4px;font-size:.82em" id="ownerLine">登入之後，加鎖的作品會一起出現在架上。</p>
      <p class="sub" id="ownerWho"></p>
      <div class="row"><button class="btn wide" id="btnIn">用 Google 登入</button></div>
      <div class="row hide" id="ownerTools"><button class="btn soft wide" id="btnAdmin">進後台管理</button></div>
      <div class="center hide" id="outWrap"><button class="btn warn tiny" id="btnOut">登出</button></div>
    </div>
  </div>

</div>

<nav class="bottom" id="nav">
  <button class="on" data-tab="shelf"><span class="ic">&#9749;</span>架上</button>
  <button data-tab="about"><span class="ic">&#128218;</span>關於</button>
  <button data-tab="look"><span class="ic">&#127912;</span>外觀</button>
  <button data-tab="owner"><span class="ic">&#128100;</span>帳號</button>
</nav>

<div id="viewer">
  <div class="top">
    <button class="btn" id="vClose">關閉</button>
    <div class="vname" id="vName"></div>
    <button class="btn soft" id="vLink">連結</button>
    <button class="btn soft" id="vOpen">另開</button>
  </div>
  <iframe id="vFrame" sandbox="allow-scripts allow-same-origin allow-modals allow-popups allow-forms"></iframe>
</div>
<div id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getFirestore, collection, doc, getDoc, getDocs }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

  apiKey: "AIzaSyC4oq_W36ji4o6p7p2JxLS2FKc-gITFJ4I",

const FS_MIN = 15, FS_MAX = 34, FS_DEF = 19;

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const $ = id => document.getElementById(id);
const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const store = {
  get(k, d){ try{ const v = localStorage.getItem(NS + k); return v === null ? d : v; }catch(e){ return d; } },
  set(k, v){ try{ localStorage.setItem(NS + k, v); }catch(e){} }
};

function err(msg){ $('err').textContent = msg; $('err').style.display = 'block'; }
function clearErr(){ $('err').style.display = 'none'; }
function toast(msg){
  const t = $('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 2200);
}
function friendly(e){
  const c = (e && e.code) || '';
  if(c.includes('permission-denied')) return '讀不到資料，可能是門禁規則擋住了。';
  if(c.includes('popup-blocked')) return '彈出視窗被擋住了。網址列左邊「ᴀA」→ 網站設定 → 允許彈出式視窗。';
  if(c.includes('popup-closed')) return '登入視窗被關掉了，再按一次就好。';
  if(c.includes('unavailable')) return '連不上資料庫，請檢查網路後再試。';
  return '出錯了：' + ((e && e.message) || e);
}

/* ---------- 外觀 ---------- */
function applyTheme(id){
  if(id) document.body.setAttribute('data-theme', id);
  else document.body.removeAttribute('data-theme');
  store.set('theme', id);
  $('themes').querySelectorAll('.th').forEach(t => t.classList.toggle('on', t.dataset.id === id));
  requestAnimationFrame(() => {
    const bg = getComputedStyle(document.body).backgroundColor;
    const mt = document.querySelector('meta[name="theme-color"]');
    if(mt && bg) mt.setAttribute('content', bg);
  });
}
function applyFont(id){
  const f = FONTS.find(x => x.id === id) || FONTS[0];
  document.documentElement.style.setProperty('--font', f.stack);
  store.set('font', f.id);
  $('fontSel').value = f.id;
}
function applyFs(px){
  const v = Math.max(FS_MIN, Math.min(FS_MAX, px));
  document.documentElement.style.setProperty('--fs', v + 'px');
  store.set('fs', v);
  $('fsVal').textContent = v + 'px';
  return v;
}
function applyLook(id){
  if(id) document.body.setAttribute('data-look', id);
  else document.body.removeAttribute('data-look');
  store.set('look', id);
  $('looks').querySelectorAll('.lk').forEach(t => t.classList.toggle('on', t.dataset.id === id));
}

$('themes').innerHTML = THEMES.map(t =>
  '<div class="th" data-id="' + t.id + '"><div class="sw">' +
  t.sw.map(c => '<span style="background:' + c + '"></span>').join('') +
  '</div><small>' + t.label + '</small></div>').join('');
$('themes').addEventListener('click', e => {
  const t = e.target.closest('.th'); if(t) applyTheme(t.dataset.id);
});

$('fontSel').innerHTML = FONTS.map(f => '<option value="' + f.id + '">' + f.label + '</option>').join('');
$('fontSel').addEventListener('change', e => applyFont(e.target.value));

$('looks').innerHTML = LOOKS.map(l => '<div class="lk" data-id="' + l.id + '">' + l.label + '</div>').join('');
$('looks').addEventListener('click', e => {
  const t = e.target.closest('.lk'); if(t) applyLook(t.dataset.id);
});

let fs = FS_DEF;
$('fsUp').addEventListener('click', () => { fs = applyFs(fs + 1); });
$('fsDown').addEventListener('click', () => { fs = applyFs(fs - 1); });
$('btnReset').addEventListener('click', () => {
  applyTheme(''); applyFont('maru'); applyLook(''); fs = applyFs(FS_DEF);
  toast('恢復預設了');
});

applyTheme(store.get('theme', ''));
applyFont(store.get('font', 'maru'));
applyLook(store.get('look', ''));
fs = applyFs(parseInt(store.get('fs', FS_DEF), 10) || FS_DEF);

/* ---------- 分頁 ---------- */
function go(tab){
  [['shelf','tabShelf'],['about','tabAbout'],['look','tabLook'],['owner','tabOwner']].forEach(([t, id]) => {
    $(id).classList.toggle('hide', t !== tab);
  });
  $('nav').querySelectorAll('button').forEach(b => b.classList.toggle('on', b.dataset.tab === tab));
  window.scrollTo({ top:0, behavior:'smooth' });
}
$('nav').addEventListener('click', e => {
  const b = e.target.closest('button'); if(b) go(b.dataset.tab);
});

/* ---------- 篩選 ---------- */
const rank = w => (w.order != null ? w.order : (w.updated || 0));
let works = [], filter = '全部', keyword = '', isOwner = false;
const codeCache = new Map();

$('filters').innerHTML = ['全部'].concat(CATS).map((c, i) =>
  '<div class="cat' + (i === 0 ? ' on' : '') + '" data-c="' + c + '">' + c + '</div>').join('');
$('filters').addEventListener('click', e => {
  const t = e.target.closest('.cat'); if(!t) return;
  filter = t.dataset.c;
  $('filters').querySelectorAll('.cat').forEach(x => x.classList.toggle('on', x === t));
  paintList();
});
$('q').addEventListener('input', e => { keyword = e.target.value.trim(); paintList(); });
$('legend').innerHTML = CATS.map(c =>
  '<div class="lg"><span style="background:' + COLOR[c] + '"></span>' + c + '</div>').join('');

/* ---------- 資料 ---------- */
async function load(){
  clearErr();
  works = [];
  const colls = isOwner ? ['posts_public','posts_private'] : ['posts_public'];
  try{
    for(const coll of colls){
      const snap = await getDocs(collection(db, coll));
      snap.forEach(d => works.push(Object.assign({ id:d.id, coll }, d.data())));
    }
  }catch(e){ err(friendly(e)); }
  works.sort((a, b) => (b.pinned?1:0) - (a.pinned?1:0) || rank(b) - rank(a));
  paintList();
  paintStat();
  const m = location.hash.match(/^#w=(.+)$/);
  if(m && works.some(w => (w.coll + '/' + w.id) === m[1])) openWork(m[1]);
}
function paintStat(){
  $('stN').textContent = works.length;
  $('stKb').textContent = Math.round(works.reduce((s, w) => s + (w.size||0), 0) / 1024);
  $('stC').textContent = new Set(works.map(w => w.cat || '其他')).size;
}

const io = new IntersectionObserver(async entries => {
  for(const en of entries){
    if(!en.isIntersecting) continue;
    const el = en.target;
    io.unobserve(el);
    try{
      const c = await fetchCode(el.dataset.key);
      const f = document.createElement('iframe');
      f.setAttribute('sandbox', 'allow-scripts allow-same-origin');
      f.setAttribute('scrolling', 'no');
      f.srcdoc = c;
      el.appendChild(f);
      const ph = el.querySelector('.ph');
      if(ph) ph.remove();
    }catch(e){
      const ph = el.querySelector('.ph');
      if(ph) ph.textContent = '這件作品的畫面載不出來';
    }
  }
}, { rootMargin: '250px' });

async function fetchCode(key){
  if(codeCache.has(key)) return codeCache.get(key);
  const [coll, id] = key.split('/');
  const snap = await getDoc(doc(db, coll, id, 'blob', 'source'));
  const c = snap.exists() ? (snap.data().code || '') : '';
  if(!c) throw new Error('empty');
  codeCache.set(key, c);
  return c;
}

function paintList(){
  const kw = keyword.toLowerCase();
  const rows = works.filter(w =>
    (filter === '全部' || w.cat === filter) &&
    (!kw || (w.name||'').toLowerCase().includes(kw) || (w.desc||'').toLowerCase().includes(kw))
  );
  $('countLine').textContent = rows.length ? '架上　' + rows.length + ' 件' + (isOwner ? '（含加鎖）' : '') : '架上';
  if(!rows.length){
    $('list').innerHTML = works.length
      ? '<div class="empty">這裡沒有符合的作品。</div>'
      : '<div class="empty">架上還空著。<br>老闆正在後面忙。</div>';
    return;
  }
  $('list').innerHTML = rows.map(w => {
    const key = w.coll + '/' + w.id;
    return '<div class="work" data-key="' + key + '">' +
      '<div class="shot" data-key="' + key + '"><div class="ph">畫面載入中⋯⋯</div><div class="veil"></div></div>' +
      '<div class="meta">' +
        '<div class="stripe" style="background:' + (COLOR[w.cat] || 'var(--c-etc)') + '"></div>' +
        '<div class="nm">' + (w.pinned ? '<span class="star">★</span> ' : '') + esc(w.name) + '</div>' +
        (w.desc ? '<div class="ds">' + esc(w.desc) + '</div>' : '') +
        '<div class="mt">' +
          '<span class="chip ' + (w.coll === 'posts_private' ? 'lock">加鎖' : 'open">公開') + '</span>' +
          esc(w.cat || '其他') + '　' + Math.round((w.size||0)/1024) + ' KB' +
        '</div>' +
      '</div></div>';
  }).join('');
  $('list').querySelectorAll('.shot').forEach(el => io.observe(el));
  $('list').querySelectorAll('.work').forEach(el => {
    el.addEventListener('click', () => openWork(el.dataset.key));
  });
}

/* ---------- 檢視 ---------- */
let viewKey = '';
async function openWork(key){
  const w = works.find(x => (x.coll + '/' + x.id) === key);
  viewKey = key;
  $('vName').textContent = w ? w.name : '';
  $('vFrame').srcdoc = '';
  $('viewer').classList.add('on');
  document.body.style.overflow = 'hidden';
  try{ history.replaceState(null, '', '#w=' + key); }catch(e){}
  try{
    $('vFrame').srcdoc = await fetchCode(key);
  }catch(e){
    $('viewer').classList.remove('on');
    document.body.style.overflow = '';
    err('這件作品打不開，程式碼可能還沒存進去。');
  }
}
$('vClose').addEventListener('click', () => {
  $('viewer').classList.remove('on');
  $('vFrame').srcdoc = '';
  document.body.style.overflow = '';
  try{ history.replaceState(null, '', location.pathname + location.search); }catch(e){}
});
$('vLink').addEventListener('click', async () => {
  const url = location.origin + location.pathname + '#w=' + viewKey;
  try{ await navigator.clipboard.writeText(url); toast('連結複製好了'); }
  catch(e){ toast('複製失敗，請從網址列複製'); }
});
$('vOpen').addEventListener('click', () => {
  const c = codeCache.get(viewKey);
  if(!c){ toast('還在載入，等一下'); return; }
  const url = URL.createObjectURL(new Blob([c], { type:'text/html' }));
  if(!window.open(url, '_blank')) toast('新視窗被擋住了，請允許彈出式視窗');
  setTimeout(() => URL.revokeObjectURL(url), 60000);
});

/* ---------- 登入 ---------- */
$('btnIn').addEventListener('click', async () => {
  clearErr();
  try{ await signInWithPopup(auth, new GoogleAuthProvider()); }
  catch(e){ err(friendly(e)); }
});
$('btnOut').addEventListener('click', () => signOut(auth));
$('btnAdmin').addEventListener('click', () => { window.location.href = ADMIN_URL; });

onAuthStateChanged(auth, async user => {
  const owner = !!user && user.uid === OWNER;
  if(user && !owner){
    $('ownerLine').textContent = '這個帳號沒有權限，看到的還是公開的部分。';
    $('ownerWho').textContent = user.displayName || '';
    $('btnIn').classList.add('hide');
    $('ownerTools').classList.add('hide');
    $('outWrap').classList.remove('hide');
  }else if(owner){
    $('ownerLine').textContent = '已登入。加鎖的作品都放上架了。';
    $('ownerWho').textContent = user.displayName || '';
    $('btnIn').classList.add('hide');
    $('ownerTools').classList.remove('hide');
    $('outWrap').classList.remove('hide');
  }else{
    $('ownerLine').textContent = '登入之後，加鎖的作品會一起出現在架上。';
    $('ownerWho').textContent = '';
    $('btnIn').classList.remove('hide');
    $('ownerTools').classList.add('hide');
    $('outWrap').classList.add('hide');
  }
  if(owner !== isOwner || !works.length){
    isOwner = owner;
    codeCache.clear();
    await load();
  }
});
</script>
