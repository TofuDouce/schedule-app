<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>命運之書｜AI 小說生成器</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"PingFang TC","Noto Sans TC",sans-serif;
}

body{

    background:
    radial-gradient(circle at top, rgba(120,80,255,.25), transparent 40%),
    linear-gradient(180deg,#07070d,#0f1020,#090912);

    color:#f5f2ff;

    min-height:100vh;

    overflow-x:hidden;
}

body::before{

    content:"";

    position:fixed;

    inset:0;

    background-image:
    linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);

    background-size:40px 40px;

    pointer-events:none;
}

.container{

    width:min(1300px,92%);

    margin:auto;

    padding:40px 0 100px;
}

.title{

    text-align:center;

    margin-bottom:40px;
}

.title h1{

    font-size:58px;

    letter-spacing:8px;

    background:linear-gradient(
        90deg,
        #fff,
        #c6b3ff,
        #8ba7ff
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    margin-bottom:14px;
}

.title p{

    color:#cfc9e8;

    line-height:1.8;
}

.panel{

    display:grid;

    grid-template-columns:420px 1fr;

    gap:28px;
}

.card{

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.08);

    border-radius:28px;

    padding:28px;

    backdrop-filter:blur(14px);

    box-shadow:0 10px 40px rgba(0,0,0,.35);
}

.card h2{

    margin-bottom:20px;

    font-size:24px;

    color:#fff;
}

.grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:16px;
}

label{

    display:flex;

    flex-direction:column;

    gap:8px;

    font-size:14px;

    color:#d5d0eb;
}

select,
textarea,
input{

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.08);

    color:white;

    padding:14px;

    border-radius:16px;

    outline:none;

    font-size:15px;
}

textarea{

    min-height:120px;

    resize:vertical;
}

button{

    width:100%;

    margin-top:16px;

    border:none;

    border-radius:20px;

    padding:18px;

    font-size:17px;

    cursor:pointer;

    color:white;

    background:linear-gradient(
        90deg,
        #745dff,
        #9a6dff,
        #5a8cff
    );

    transition:.3s;

    box-shadow:0 10px 30px rgba(114,94,255,.35);
}

button:hover{

    transform:translateY(-2px);
}

.output{

    margin-top:18px;

    background:rgba(255,255,255,.04);

    border:1px solid rgba(255,255,255,.08);

    border-radius:30px;

    padding:34px;

    line-height:2;

    white-space:pre-wrap;

    min-height:700px;

    font-size:17px;

    color:#ece8ff;
}

.typing::after{

    content:"▋";

    animation:blink .8s infinite;
}

@keyframes blink{

    50%{
        opacity:0;
    }
}

.glow{

    position:fixed;

    width:300px;
    height:300px;

    background:rgba(123,88,255,.2);

    border-radius:50%;

    filter:blur(100px);

    z-index:-1;
}

.glow1{

    top:-100px;
    left:-80px;
}

.glow2{

    bottom:-120px;
    right:-100px;
}

.result-top{

    display:flex;

    justify-content:space-between;

    align-items:center;

    flex-wrap:wrap;

    gap:12px;
}

.small-btn{

    width:auto;

    margin:0;

    padding:12px 18px;

    border-radius:14px;

    font-size:14px;
}

.footer{

    margin-top:24px;

    text-align:center;

    color:#9f97bf;

    font-size:14px;
}

@media(max-width:1000px){

    .panel{
        grid-template-columns:1fr;
    }

    .title h1{
        font-size:42px;
    }

    .grid{
        grid-template-columns:1fr;
    }

}

</style>
</head>

<body>

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<div class="container">

    <div class="title">

        <h1>命運之書</h1>

        <p>
            AI 小說生成器｜宿命感 × 古典敘事 × 黑暗史詩
        </p>

    </div>

    <div class="panel">

        <!-- 左側設定 -->

        <div class="card">

            <h2>世界設定</h2>

            <div class="grid">

                <label>
                    小說風格

                    <select id="style">

                        <option>古典</option>
                        <option>現代</option>
                        <option>東方仙俠</option>
                        <option>日式物語</option>
                        <option>西方奇幻</option>
                        <option>蒸氣龐克</option>
                        <option>黑暗哥德</option>
                        <option>宮廷權謀</option>

                    </select>
                </label>

                <label>
                    感情類型

                    <select id="love">

                        <option>虐戀</option>
                        <option>甜虐交織</option>
                        <option>宿命感</option>
                        <option>相愛相殺</option>
                        <option>禁忌戀</option>
                        <option>破鏡重圓</option>
                        <option>敵國戀人</option>

                    </select>
                </label>

                <label>
                    結局

                    <select id="ending">

                        <option>HE 圓滿</option>
                        <option>BE 悲劇</option>
                        <option>雙死結局</option>
                        <option>轉世重逢</option>
                        <option>開放式結局</option>

                    </select>
                </label>

                <label>
                    敘事風格

                    <select id="tone">

                        <option>古典文學</option>
                        <option>史詩感</option>
                        <option>黑暗壓抑</option>
                        <option>電影感</option>
                        <option>詩意敘述</option>

                    </select>
                </label>

                <label>
                    主角身份

                    <select id="hero">

                        <option>王子</option>
                        <option>流浪劍士</option>
                        <option>魔法師</option>
                        <option>狐妖</option>
                        <option>神官</option>
                        <option>騎士</option>
                        <option>亡國公主</option>

                    </select>
                </label>

                <label>
                    另一位主角

                    <select id="heroine">

                        <option>刺客</option>
                        <option>皇女</option>
                        <option>龍族後裔</option>
                        <option>醫者</option>
                        <option>惡魔</option>
                        <option>精靈</option>
                        <option>敵國將軍</option>

                    </select>
                </label>

                <label>
                    字數長度

                    <select id="length">

                        <option value="3000">
                            短篇（3000字）
                        </option>

                        <option value="6000">
                            中篇（6000字）
                        </option>

                        <option value="10000">
                            長篇（10000字）
                        </option>

                    </select>
                </label>

                <label>
                    黑暗程度

                    <select id="darkness">

                        <option>普通</option>
                        <option>壓抑</option>
                        <option>黑暗</option>
                        <option>極致致鬱</option>

                    </select>
                </label>

            </div>

            <label style="margin-top:20px;">

                額外關鍵字

                <textarea
                    id="keywords"
                    placeholder="例如：銀白長髮、命運詛咒、王城陷落、雪夜、龍焰"
                ></textarea>

            </label>

            <button onclick="randomAll()">
                ✦ 隨機命運
            </button>

            <button onclick="generateNovel()">
                ✦ 生成小說
            </button>

        </div>

        <!-- 右側結果 -->

        <div class="card">

            <div class="result-top">

                <h2 style="margin:0;">
                    生成結果
                </h2>

                <div style="
                display:flex;
                gap:10px;
                align-items:center;
                flex-wrap:wrap;
                ">

                    <div style="
                    color:#cfc9e8;
                    font-size:14px;
                    ">
                        全文字數：
                        <span id="wordCount">0</span> 字
                    </div>

                    <button
                        class="small-btn"
                        onclick="copyText()"
                    >
                        一鍵複製
                    </button>

                </div>

            </div>

            <div id="output" class="output typing">
命運尚未被書寫……
            </div>

        </div>

    </div>

    <div class="footer">
        命運之書｜高級 AI 小說生成器
    </div>

</div>

<script>

function random(arr){

    return arr[
        Math.floor(Math.random()*arr.length)
    ];
}

function randomAll(){

    const selects =
        document.querySelectorAll("select");

    selects.forEach(select=>{

        select.selectedIndex =
            Math.floor(
                Math.random() * select.options.length
            );

    });

    generateNovel();
}

function generateNovel(){

    const style =
        document.getElementById("style").value;

    const love =
        document.getElementById("love").value;

    const ending =
        document.getElementById("ending").value;

    const tone =
        document.getElementById("tone").value;

    const hero =
        document.getElementById("hero").value;

    const heroine =
        document.getElementById("heroine").value;

    const length =
        parseInt(
            document.getElementById("length").value
        );

    const darkness =
        document.getElementById("darkness").value;

    const keywords =
        document.getElementById("keywords").value;

    const kingdoms = [

        "被冰雪覆蓋的北境王朝",
        "漂浮於天空的古老帝國",
        "以龍焰維持文明的聖都",
        "早已腐朽卻仍歌舞昇平的王城",
        "被神遺棄的永夜國度"

    ];

    const conflicts = [

        "王權鬥爭",
        "古神甦醒",
        "國家戰爭",
        "禁忌詛咒",
        "血脈秘密",
        "世界崩壞"

    ];

    const emotional = [

        "他們明明彼此深愛，卻始終站在命運兩端。",

        "兩人的感情像雪夜中的火焰，越熾烈便越接近毀滅。",

        "他們在長久的戰爭中逐漸理解彼此，也逐漸失去彼此。",

        "愛意在沉默與犧牲之中緩慢滋長。",

        "那份感情從一開始便注定無法被世人允許。"

    ];

    const chapterEvents = [

        "暴雪覆蓋整座北境王城。",
        "古老神殿深處傳來鐘聲。",
        "邊境戰爭全面爆發。",
        "王族內部出現背叛者。",
        "龍焰照亮了整片黑夜。",
        "古神的低語逐漸甦醒。",
        "帝國陷入飢荒與混亂。",
        "血色月亮升上天空。",
        "封印逐漸崩壞。",
        "深海開始吞噬大陸。"

    ];

    let outline = `

【小說類型】
${style} × ${love} × ${ending}

【預計篇幅】
約 ${length} 字

【黑暗程度】
${darkness}

【整體氛圍】
本作採用「${tone}」風格進行敘述，
整體帶有濃厚宿命感與史詩氛圍。

【世界觀設定】
故事發生於${random(kingdoms)}。

這個世界被「${random(conflicts)}」長年籠罩。

主角是一名${hero}，
而另一位重要角色則是${heroine}。

【感情主軸】
${random(emotional)}

`;

    let chapter = 1;

    while(outline.length < length){

        outline += `

══════════════════

【第 ${chapter} 章】

${random(chapterEvents)}

主角在旅途中逐漸理解世界真正的殘酷。

他開始發現，
真正可怕的並不是戰爭，
而是人心深處對權力與恐懼的渴望。

而另一位主角，
似乎始終隱瞞著某個秘密。

兩人的關係也在一次次衝突中逐漸改變。

他們曾在雪夜中互相依靠，
也曾在王城崩塌時彼此背離。

然而，
命運卻始終將兩人重新拉回彼此身旁。

在這段旅途中，
主角逐漸得知自己的血脈，
竟與古老封印有關。

若封印崩潰，
世界將再次陷入黑暗。

但若選擇拯救世界，
他或許必須親手失去最重要的人。

這份痛苦逐漸侵蝕他的內心。

而另一位主角，
也終於第一次坦白自己的過去。

原來，
對方從很久以前便知道這場災厄的結局。

只是從未說出口。

${random(emotional)}

`;

        chapter++;
    }

    outline += `

══════════════════

【最終結局】

本作採用「${ending}」作為結局。

最終，
世界雖然付出了巨大代價，
卻終於迎來新的時代。

王座崩毀，
舊神消亡，
而新的黎明終於降臨。

至於兩位主角——

他們或許再也無法回到最初，
但那份曾在黑暗中燃燒過的感情，
卻會像傳說一樣，
被後世永遠記得。

【額外元素】
${keywords || "無"}

`;

    typeWriter(outline);
}

function typeWriter(text){

    const output =
        document.getElementById("output");

    output.innerHTML = "";

    output.classList.add("typing");

    let i = 0;

    const timer = setInterval(()=>{

        output.innerHTML += text.charAt(i);

        document.getElementById("wordCount")
        .innerText = output.innerText.length;

        i++;

        if(i >= text.length){

            clearInterval(timer);

            output.classList.remove("typing");
        }

    },1);
}

function copyText(){

    const text =
        document.getElementById("output").innerText;

    navigator.clipboard.writeText(text);

    alert("已複製小說內容！");
}

</script>

</body>
</html>
