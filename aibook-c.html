<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Middle Earth Story Generator</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"PingFang TC","Noto Sans TC",sans-serif;
}

:root{

    --bg1:#09090f;
    --bg2:#10131d;
    --card:rgba(255,255,255,.05);

    --gold:#d8c08c;
    --text:#ece8ff;
    --sub:#b9b3d3;

    --line:rgba(255,255,255,.08);

}

body{

    background:
    radial-gradient(circle at top, rgba(110,80,255,.18), transparent 35%),
    linear-gradient(180deg,var(--bg1),var(--bg2));

    color:var(--text);

    min-height:100vh;

    overflow-x:hidden;
}

body::before{

    content:"";

    position:fixed;

    inset:0;

    background-image:
    linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);

    background-size:40px 40px;

    pointer-events:none;
}

.glow{

    position:fixed;

    width:350px;
    height:350px;

    border-radius:50%;

    filter:blur(120px);

    z-index:-1;
}

.glow1{

    top:-100px;
    left:-100px;

    background:rgba(121,91,255,.18);
}

.glow2{

    right:-120px;
    bottom:-120px;

    background:rgba(70,130,255,.18);
}

.container{

    width:min(1450px,94%);

    margin:auto;

    padding:40px 0 80px;
}

.hero{

    text-align:center;

    margin-bottom:35px;
}

.hero h1{

    font-size:68px;

    letter-spacing:8px;

    margin-bottom:14px;

    background:
    linear-gradient(
        90deg,
        #ffffff,
        #e5d3a5,
        #b8c7ff
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero p{

    color:var(--sub);

    line-height:1.9;

    font-size:16px;
}

.layout{

    display:grid;

    grid-template-columns:430px 1fr;

    gap:28px;
}

.card{

    background:var(--card);

    border:1px solid var(--line);

    border-radius:30px;

    padding:28px;

    backdrop-filter:blur(14px);

    box-shadow:0 10px 40px rgba(0,0,0,.35);
}

.card h2{

    margin-bottom:22px;

    font-size:24px;

    color:#fff;
}

.grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:16px;
}

label{

    display:flex;

    flex-direction:column;

    gap:8px;

    font-size:14px;

    color:#d2caea;
}

select,
textarea{

    background:rgba(255,255,255,.07);

    border:1px solid rgba(255,255,255,.08);

    color:white;

    padding:14px;

    border-radius:16px;

    outline:none;

    font-size:15px;
}

textarea{

    resize:vertical;

    min-height:120px;
}

button{

    width:100%;

    border:none;

    border-radius:18px;

    padding:17px;

    margin-top:16px;

    font-size:16px;

    cursor:pointer;

    color:white;

    background:
    linear-gradient(
        90deg,
        #7d63ff,
        #5e8cff
    );

    transition:.25s;

    box-shadow:0 8px 25px rgba(103,95,255,.35);
}

button:hover{

    transform:translateY(-2px);
}

.resultTop{

    display:flex;

    justify-content:space-between;

    align-items:center;

    gap:12px;

    flex-wrap:wrap;
}

.smallBtn{

    width:auto;

    margin:0;

    padding:11px 16px;

    font-size:14px;

    border-radius:14px;
}

.output{

    margin-top:18px;

    min-height:800px;

    background:rgba(255,255,255,.03);

    border:1px solid rgba(255,255,255,.06);

    border-radius:28px;

    padding:34px;

    line-height:2.15;

    white-space:pre-wrap;

    font-size:17px;

    overflow:auto;
}

.typing::after{

    content:"▋";

    animation:blink .8s infinite;
}

@keyframes blink{

    50%{
        opacity:0;
    }
}

.footer{

    text-align:center;

    margin-top:26px;

    color:#8f89aa;

    font-size:14px;
}

@media(max-width:1100px){

    .layout{
        grid-template-columns:1fr;
    }

    .hero h1{
        font-size:42px;
    }

    .grid{
        grid-template-columns:1fr;
    }

}

</style>
</head>

<body>

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<div class="container">

    <div class="hero">

        <h1>命運之書</h1>

        <p>
            西方中土奇幻小說生成器<br>
            黑暗史詩 × 宿命感 × 長篇冒險 × 戰爭與愛情
        </p>

    </div>

    <div class="layout">

        <!-- 左側設定 -->

        <div class="card">

            <h2>世界設定</h2>

            <div class="grid">

                <label>
                    感情主題

                    <select id="love">

                        <option>虐戀</option>
                        <option>宿命感</option>
                        <option>相愛相殺</option>
                        <option>救贖</option>
                        <option>禁忌戀</option>
                        <option>主僕關係</option>
                        <option>政治聯姻</option>
                        <option>敵國戀人</option>

                    </select>
                </label>

                <label>
                    結局

                    <select id="ending">

                        <option>HE 圓滿</option>
                        <option>BE 悲劇</option>
                        <option>雙死結局</option>
                        <option>犧牲式結局</option>
                        <option>轉世重逢</option>

                    </select>
                </label>

                <label>
                    黑暗程度

                    <select id="darkness">

                        <option>普通</option>
                        <option>壓抑</option>
                        <option>黑暗</option>
                        <option>絕望史詩</option>

                    </select>
                </label>

                <label>
                    篇幅

                    <select id="length">

                        <option value="4000">
                            短篇（4000字）
                        </option>

                        <option value="8000">
                            中篇（8000字）
                        </option>

                        <option value="15000">
                            長篇（15000字）
                        </option>

                        <option value="30000">
                            史詩級（30000字）
                        </option>

                    </select>
                </label>

                <label>
                    男主身份

                    <select id="hero">

                        <option>流亡王子</option>
                        <option>黑騎士</option>
                        <option>龍語者</option>
                        <option>北境領主</option>
                        <option>聖殿騎士</option>
                        <option>白銀劍士</option>
                        <option>亡國繼承人</option>
                        <option>被詛咒的王</option>
                        <option>森林遊俠</option>

                    </select>
                </label>

                <label>
                    女主身份

                    <select id="heroine">

                        <option>精靈祭司</option>
                        <option>龍族後裔</option>
                        <option>王國公主</option>
                        <option>黑魔女</option>
                        <option>預言者</option>
                        <option>雪原巫女</option>
                        <option>聖女</option>
                        <option>敵國女王</option>
                        <option>月神侍女</option>

                    </select>
                </label>

            </div>

            <label style="margin-top:18px;">

                額外關鍵字

                <textarea
                    id="keywords"
                    placeholder="例如：白銀王城、暴雪、巨龍、古神、黑海、月光、長劍、命運詛咒"
                ></textarea>

            </label>

            <button onclick="randomAll()">
                ✦ 隨機命運
            </button>

            <button onclick="generateStory()">
                ✦ 生成史詩故事
            </button>

        </div>

        <!-- 右側結果 -->

        <div class="card">

            <div class="resultTop">

                <h2 style="margin:0;">
                    生成結果
                </h2>

                <div style="
                display:flex;
                gap:10px;
                align-items:center;
                flex-wrap:wrap;
                ">

                    <div style="
                    color:#d0c8ea;
                    font-size:14px;
                    ">
                        全文字數：
                        <span id="wordCount">0</span>
                    </div>

                    <button
                        class="smallBtn"
                        onclick="copyStory()"
                    >
                        一鍵複製
                    </button>

                </div>

            </div>

            <div id="output" class="output typing">
命運尚未開始轉動……
            </div>

        </div>

    </div>

    <div class="footer">
        命運之書｜Western Fantasy Generator
    </div>

</div>

<script>

function random(arr){

    return arr[
        Math.floor(Math.random()*arr.length)
    ];
}

function randomAll(){

    const selects =
        document.querySelectorAll("select");

    selects.forEach(select=>{

        select.selectedIndex =
            Math.floor(
                Math.random()*select.options.length
            );

    });

    generateStory();
}

function copyStory(){

    const text =
        document.getElementById("output").innerText;

    navigator.clipboard.writeText(text);

    alert("已複製故事！");
}

function typeWriter(text){

    const output =
        document.getElementById("output");

    output.innerHTML = "";

    output.classList.add("typing");

    let i = 0;

    const speed = 1;

    const timer = setInterval(()=>{

        output.innerHTML += text.charAt(i);

        document.getElementById("wordCount")
        .innerText = output.innerText.length;

        i++;

        if(i >= text.length){

            clearInterval(timer);

            output.classList.remove("typing");
        }

    },speed);
}

function generateStory(){

    const love =
        document.getElementById("love").value;

    const ending =
        document.getElementById("ending").value;

    const darkness =
        document.getElementById("darkness").value;

    const hero =
        document.getElementById("hero").value;

    const heroine =
        document.getElementById("heroine").value;

    const length =
        parseInt(
            document.getElementById("length").value
        );

    const keywords =
        document.getElementById("keywords").value;

    const kingdoms = [

        "艾德蘭王國",
        "霜狼北境",
        "白銀聖都",
        "黑海帝國",
        "永夜森林",
        "龍脊山脈",
        "灰燼荒原",
        "月影王城"

    ];

    const factions = [

        "白銀騎士團",
        "黑龍議會",
        "深淵法師塔",
        "舊神信徒",
        "月神教廷",
        "北境狼族",
        "王室審判庭"

    ];

    const disasters = [

        "古龍甦醒",
        "亡靈軍團南下",
        "天空出現血色紅月",
        "封印千年的古神重新睜眼",
        "黑海吞噬大陸",
        "世界樹開始枯萎",
        "魔法失控暴走"

    ];

    const emotionalLines = [

        "他們彼此深愛，卻始終無法真正靠近。",
        "兩人的感情像暴風雪中的火焰，越熾烈越接近毀滅。",
        "愛意在戰爭與死亡中逐漸滋長。",
        "從一開始，他們便註定無法得到幸福。",
        "那份感情比信仰更危險。"

    ];

    const chapterEvents = [

        "北境長城崩塌。",
        "白銀王城陷入瘟疫。",
        "巨龍掠過夜空。",
        "教廷宣布異端審判。",
        "古老神殿傳來鐘聲。",
        "王族爆發繼承戰爭。",
        "精靈森林燃起黑火。",
        "亡靈軍團跨越雪原。",
        "封印逐漸破裂。",
        "天空裂開巨大的紅月。"

    ];

    let story = `

══════════════════

【世界觀】

故事發生於「${random(kingdoms)}」。

這片大陸長年被「${random(disasters)}」所籠罩。

而「${random(factions)}」與
「${random(factions)}」
之間的戰爭，
也正在逐漸失控。

男主是一名${hero}。

而女主則是${heroine}。

【感情主題】

${love}

${random(emotionalLines)}

【黑暗程度】

${darkness}

══════════════════

`;

    let chapter = 1;

    while(story.length < length){

        story += `

【第 ${chapter} 章】

${random(chapterEvents)}

男主逐漸發現，
真正腐朽的並不是王國，
而是人們內心深處對恐懼與權力的渴望。

在旅途中，
他與女主被迫同行。

他們曾在暴雪中逃亡，
也曾於深夜裡討論命運。

然而，
兩人之間始終隔著某種無法跨越的距離。

女主似乎隱瞞著某個秘密。

而那個秘密，
很可能與世界即將毀滅的真相有關。

隨著旅程深入，
男主逐漸得知：

自己體內流淌的血脈，
竟與遠古封印相連。

若封印徹底崩潰，
整個世界都將墜入黑暗。

然而，
若想阻止災厄，
他或許必須親手失去女主。

這份痛苦開始逐漸侵蝕他的內心。

${random(emotionalLines)}

而遠方的戰火，
也正在迅速逼近。

${random(factions)}
開始進軍北境。

無數城市陷入火海。

王國開始崩塌。

人民在飢荒與恐懼中死去。

曾經輝煌的文明，
如今只剩殘骸。

══════════════════

`;

        chapter++;
    }

    story += `

【最終篇章】

最後，
「${random(disasters)}」
徹底降臨。

整個世界陷入戰火。

王城崩毀。

舊神甦醒。

天空被黑暗吞噬。

而男主終於明白：

所謂命運，
並不是神明的安排。

而是人們一次次在痛苦中做出的選擇。

於是，
他決定親手終結一切。

在最終決戰裡，
男主與女主重新相遇。

他們早已遍體鱗傷。

卻仍選擇站在彼此身旁。

══════════════════

【結局】

本作採用「${ending}」作為收束。

最後，
新的時代終於在灰燼中誕生。

至於那段曾燃燒於黑暗中的感情——

將會像古老史詩一樣，
被後世永遠傳唱。

══════════════════

【額外元素】

${keywords || "無"}

`;

    typeWriter(story);
}

</script>

</body>
</html>
