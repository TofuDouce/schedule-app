<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Little Universe Template</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg1:#120f1d;
    --bg2:#1d1530;
    --bg3:#2d1f48;

    --gold:#d8bf8a;

    --text:#f7f2ff;
}

body{

    min-height:100vh;

    overflow-x:hidden;

    color:white;

    font-family:
    "Cormorant Garamond",
    serif;

    background:

    radial-gradient(
    circle at top,
    rgba(180,150,255,.18),
    transparent 30%
    ),

    linear-gradient(
    180deg,
    var(--bg1),
    var(--bg2),
    var(--bg3)
    );

    padding:28px;

    position:relative;
}

/* 星空 */

.stars{

    position:fixed;

    inset:0;

    overflow:hidden;

    z-index:-5;
}

.star{

    position:absolute;

    width:2px;
    height:2px;

    background:white;

    border-radius:50%;

    opacity:.7;

    animation:twinkle 4s infinite;
}

@keyframes twinkle{

    0%{
        opacity:.15;
        transform:scale(.7);
    }

    50%{
        opacity:1;
        transform:scale(1.4);
    }

    100%{
        opacity:.15;
        transform:scale(.7);
    }
}

/* 主邊框 */

.frame{

    position:fixed;

    inset:14px;

    border:
    1.5px solid
    rgba(216,191,138,.55);

    border-radius:38px;

    pointer-events:none;

    z-index:999;

    overflow:hidden;
}

/* 第二層 */

.frame::before{

    content:"";

    position:absolute;

    inset:14px;

    border:
    1px solid
    rgba(216,191,138,.18);

    border-radius:30px;
}

/* 第三層 */

.frame::after{

    content:"";

    position:absolute;

    inset:28px;

    border:
    1px solid
    rgba(216,191,138,.08);

    border-radius:24px;
}

/* 四角裝飾 */

.ornament{

    position:fixed;

    width:160px;
    height:160px;

    pointer-events:none;

    z-index:1001;
}

.ornament::before{

    content:"";

    position:absolute;

    inset:0;

    border:
    1.5px solid
    rgba(216,191,138,.42);

    border-radius:50%;
}

.ornament::after{

    content:"✦";

    position:absolute;

    color:#d8bf8a;

    font-size:26px;

    text-shadow:
    0 0 12px
    rgba(216,191,138,.4);
}

/* 左上 */

.o1{
    top:18px;
    left:18px;
}

.o1::before{

    clip-path:
    polygon(0 0,100% 0,0 100%);
}

.o1::after{
    top:18px;
    left:18px;
}

/* 右上 */

.o2{
    top:18px;
    right:18px;
}

.o2::before{

    clip-path:
    polygon(0 0,100% 0,100% 100%);
}

.o2::after{
    top:18px;
    right:18px;
}

/* 左下 */

.o3{
    bottom:18px;
    left:18px;
}

.o3::before{

    clip-path:
    polygon(0 0,0 100%,100% 100%);
}

.o3::after{
    bottom:18px;
    left:18px;
}

/* 右下 */

.o4{
    bottom:18px;
    right:18px;
}

.o4::before{

    clip-path:
    polygon(100% 0,0 100%,100% 100%);
}

.o4::after{
    bottom:18px;
    right:18px;
}

/* 上下徽章 */

.top-emblem,
.bottom-emblem{

    position:fixed;

    left:50%;

    transform:translateX(-50%);

    color:#d8bf8a;

    letter-spacing:10px;

    font-size:24px;

    z-index:1002;

    text-shadow:
    0 0 12px
    rgba(216,191,138,.35);
}

.top-emblem{
    top:10px;
}

.bottom-emblem{
    bottom:10px;
}

/* 月亮吊飾 */

.moon-wrap{

    display:flex;

    flex-direction:column;

    align-items:center;

    margin-top:6px;

    margin-bottom:8px;
}

/* 金線 */

.moon-line{

    width:1px;

    height:46px;

    background:
    linear-gradient(
    180deg,
    rgba(216,191,138,.1),
    rgba(216,191,138,.7)
    );
}

/* 月亮 */

.hanging-moon{

    color:#d8bf8a;

    font-size:42px;

    animation:
    swing 5s ease-in-out infinite;

    transform-origin:
    top center;

    filter:
    drop-shadow(
    0 0 10px
    rgba(216,191,138,.35)
    );
}

@keyframes swing{

    0%{
        transform:rotate(-3deg);
    }

    50%{
        transform:rotate(3deg);
    }

    100%{
        transform:rotate(-3deg);
    }
}

/* 標題 */

.header{

    text-align:center;

    margin-bottom:42px;
}

.logo{

    font-family:
    "Great Vibes",
    cursive;

    font-size:
    clamp(
        64px,
        11vw,
        120px
    );

    color:#efd8ff;

    line-height:1.1;

    text-shadow:
    0 0 20px rgba(220,180,255,.2);
}

.subtitle{

    margin-top:10px;

    color:#d8bf8a;

    line-height:1.8;

    font-size:
    clamp(
        18px,
        3vw,
        28px
    );
}

/* 主內容 */

.container{

    max-width:1200px;

    margin:auto;

    display:grid;

    grid-template-columns:
    420px 1fr;

    gap:38px;
}

/* 左側面板 */

.panel{

    background:
    rgba(29,24,44,.62);

    border:
    1px solid rgba(255,255,255,.06);

    border-radius:34px;

    padding:38px 30px;

    backdrop-filter:blur(18px);

    height:fit-content;
}

/* 區塊標題 */

.section-title{

    font-size:24px;

    margin-bottom:18px;

    color:#f4e9ff;
}

/* 輸入框 */

.input-box{

    width:100%;

    height:220px;

    border:none;

    resize:none;

    border-radius:24px;

    background:
    rgba(255,255,255,.04);

    color:white;

    outline:none;

    padding:24px;

    line-height:2;

    font-size:20px;
}

/* 按鈕 */

.button{

    width:100%;

    height:76px;

    border:none;

    border-radius:24px;

    cursor:pointer;

    color:white;

    font-size:24px;

    margin-top:24px;

    font-family:
    "Cormorant Garamond",
    serif;

    background:
    linear-gradient(
    90deg,
    #8268ff,
    #bc8cff,
    #ffb0d9
    );

    box-shadow:
    0 10px 30px rgba(120,100,255,.35);

    transition:.35s;
}

.button:hover{

    transform:
    translateY(-4px)
    scale(1.01);
}

/* 預覽卡片 */

.preview{

    width:100%;

    aspect-ratio:9/16;

    border-radius:34px;

    overflow:hidden;

    position:relative;

    background:

    radial-gradient(
    circle at top,
    rgba(160,120,255,.18),
    transparent 30%
    ),

    linear-gradient(
    180deg,
    #24183a,
    #1b142c,
    #130f22
    );

    border:
    1px solid rgba(216,191,138,.22);

    box-shadow:
    0 20px 60px rgba(0,0,0,.45);

    padding:34px;
}

.preview::before{

    content:"";

    position:absolute;

    inset:14px;

    border:
    1px solid rgba(216,191,138,.14);

    border-radius:26px;
}

/* 卡片標題 */

.preview-logo{

    text-align:center;

    font-family:
    "Great Vibes",
    cursive;

    color:#efdbff;

    font-size:
    clamp(
        44px,
        7vw,
        74px
    );

    margin-top:18px;
}

/* 卡片內容 */

.preview-content{

    position:absolute;

    left:50%;

    top:52%;

    transform:
    translate(-50%,-50%);

    width:78%;

    text-align:center;

    color:white;

    line-height:1.9;

    font-size:
    clamp(
        20px,
        4vw,
        36px
    );

    word-break:break-word;
}

/* 底部 */

.preview-footer{

    position:absolute;

    bottom:28px;

    left:50%;

    transform:translateX(-50%);

    text-align:center;
}

.footer-line{

    width:100px;

    height:1px;

    background:
    linear-gradient(
    90deg,
    transparent,
    rgba(216,191,138,.7),
    transparent
    );

    margin:auto;

    margin-bottom:10px;
}

.footer-name{

    font-family:
    "Great Vibes",
    cursive;

    font-size:30px;

    color:#eadfff;
}

/* 手機 */

@media(max-width:1100px){

    .container{

        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<!-- 星空 -->

<div class="stars" id="stars"></div>

<!-- 邊框 -->

<div class="frame"></div>

<div class="top-emblem">
    ✦ ☾ ✦
</div>

<div class="bottom-emblem">
    ✦ ☾ ✦
</div>

<div class="ornament o1"></div>
<div class="ornament o2"></div>
<div class="ornament o3"></div>
<div class="ornament o4"></div>

<!-- 標題 -->

<div class="header">

    <div class="moon-wrap">

        <div class="moon-line"></div>

        <div class="hanging-moon">
            ☾
        </div>

    </div>

    <div class="logo">
        Little Universe
    </div>

    <div class="subtitle">
        Your Beautiful Universe Template ✦
    </div>

</div>

<!-- 主內容 -->

<div class="container">

    <!-- 左側 -->

    <div class="panel">

        <div class="section-title">
            Content Area
        </div>

        <textarea
        class="input-box"
        placeholder="Write something..."></textarea>

        <button class="button">
            Create
        </button>

    </div>

    <!-- 右側 -->

    <div class="preview">

        <div class="preview-logo">
            Little Universe
        </div>

        <div class="preview-content">

            Your content preview
            <br><br>
            will appear here ✨

        </div>

        <div class="preview-footer">

            <div class="footer-line"></div>

            <div class="footer-name">
                Lazy Dream
            </div>

        </div>

    </div>

</div>

<script>

/* 星空 */

const stars =
document.getElementById("stars");

for(let i=0;i<160;i++){

    const star =
    document.createElement("div");

    star.className = "star";

    star.style.left =
    Math.random()*100 + "%";

    star.style.top =
    Math.random()*100 + "%";

    star.style.animationDelay =
    Math.random()*4 + "s";

    stars.appendChild(star);
}

</script>

</body>
</html>
