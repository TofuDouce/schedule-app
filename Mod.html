<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MOD TEMPLATE</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* =========================
   RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg1:#120f1d;
    --bg2:#1d1530;
    --bg3:#2d1f48;

    --gold:#d8bf8a;

    --text:#f7f2ff;
}

/* =========================
   BODY
========================= */

body{

    min-height:100vh;

    overflow-x:hidden;

    color:white;

    font-family:
    "Cormorant Garamond",
    serif;

    background:

    radial-gradient(
        circle at top,
        rgba(180,150,255,.18),
        transparent 30%
    ),

    linear-gradient(
        180deg,
        #120f1d 0%,
        #1d1530 45%,
        #2d1f48 100%
    );

    background-attachment:fixed;

    position:relative;

    padding:40px 22px;
}

/* =========================
   宇宙光暈
========================= */

.bg-glow{

    position:fixed;

    border-radius:50%;

    filter:blur(100px);

    z-index:-6;

    opacity:.45;

    pointer-events:none;
}

.glow1{

    width:420px;
    height:420px;

    background:
    rgba(170,120,255,.32);

    top:-120px;
    left:-120px;
}

.glow2{

    width:520px;
    height:520px;

    background:
    rgba(120,170,255,.22);

    bottom:-180px;
    right:-180px;
}

.glow3{

    width:340px;
    height:340px;

    background:
    rgba(255,180,230,.15);

    top:40%;
    left:35%;
}

/* =========================
   星空
========================= */

.stars{

    position:fixed;

    inset:0;

    overflow:hidden;

    z-index:-5;
}

.star{

    position:absolute;

    width:2px;
    height:2px;

    background:white;

    border-radius:50%;

    opacity:.75;

    animation:
    twinkle 4s infinite;
}

@keyframes twinkle{

    0%{
        opacity:.2;
        transform:scale(.7);
    }

    50%{
        opacity:1;
        transform:scale(1.4);
    }

    100%{
        opacity:.2;
        transform:scale(.7);
    }
}

/* =========================
   主邊框
========================= */

.frame{

    position:fixed;

    inset:14px;

    border:
    1.5px solid
    rgba(216,191,138,.55);

    border-radius:38px;

    pointer-events:none;

    z-index:999;

    overflow:hidden;
}

.frame::before{

    content:"";

    position:absolute;

    inset:14px;

    border:
    1px solid
    rgba(216,191,138,.18);

    border-radius:30px;
}

.frame::after{

    content:"";

    position:absolute;

    inset:28px;

    border:
    1px solid
    rgba(216,191,138,.08);

    border-radius:24px;
}

/* =========================
   四角裝飾
========================= */

.ornament{

    position:fixed;

    width:160px;
    height:160px;

    pointer-events:none;

    z-index:1001;
}

.ornament::before{

    content:"";

    position:absolute;

    inset:0;

    border:
    1.5px solid
    rgba(216,191,138,.42);

    border-radius:50%;
}

.ornament::after{

    content:"✦";

    position:absolute;

    color:#d8bf8a;

    font-size:26px;

    text-shadow:
    0 0 12px
    rgba(216,191,138,.4);
}

.o1{
    top:18px;
    left:18px;
}

.o1::before{

    clip-path:
    polygon(0 0,100% 0,0 100%);
}

.o1::after{

    top:18px;
    left:18px;
}

.o2{
    top:18px;
    right:18px;
}

.o2::before{

    clip-path:
    polygon(0 0,100% 0,100% 100%);
}

.o2::after{

    top:18px;
    right:18px;
}

.o3{
    bottom:18px;
    left:18px;
}

.o3::before{

    clip-path:
    polygon(0 0,0 100%,100% 100%);
}

.o3::after{

    bottom:18px;
    left:18px;
}

.o4{
    bottom:18px;
    right:18px;
}

.o4::before{

    clip-path:
    polygon(100% 0,0 100%,100% 100%);
}

.o4::after{

    bottom:18px;
    right:18px;
}

/* =========================
   上下徽章
========================= */

.top-emblem,
.bottom-emblem{

    position:fixed;

    left:50%;

    transform:translateX(-50%);

    color:#d8bf8a;

    letter-spacing:10px;

    font-size:24px;

    z-index:1002;

    text-shadow:
    0 0 12px
    rgba(216,191,138,.35);
}

.top-emblem{
    top:10px;
}

.bottom-emblem{
    bottom:10px;
}

/* =========================
   月亮吊飾
========================= */

.moon-wrap{

    display:flex;

    flex-direction:column;

    align-items:center;

    margin-top:10px;

    margin-bottom:18px;
}

.moon-line{

    width:1px;

    height:48px;

    background:
    linear-gradient(
    180deg,
    rgba(216,191,138,.08),
    rgba(216,191,138,.7)
    );
}

.hanging-moon{

    color:#d8bf8a;

    font-size:42px;

    animation:
    swing 5s ease-in-out infinite;

    transform-origin:
    top center;

    filter:
    drop-shadow(
    0 0 10px
    rgba(216,191,138,.35)
    );
}

@keyframes swing{

    0%{
        transform:rotate(-3deg);
    }

    50%{
        transform:rotate(3deg);
    }

    100%{
        transform:rotate(-3deg);
    }
}

/* =========================
   HEADER
========================= */

.header{

    text-align:center;

    margin-top:20px;

    margin-bottom:60px;
}

.logo{

    font-family:
    "Great Vibes",
    cursive;

    font-size:
    clamp(
        68px,
        11vw,
        140px
    );

    color:#efd8ff;

    line-height:1.1;

    text-shadow:
    0 0 20px
    rgba(220,180,255,.18);
}

.subtitle{

    margin-top:12px;

    color:#d8bf8a;

    line-height:1.8;

    font-size:
    clamp(
        18px,
        3vw,
        28px
    );
}

/* =========================
   主內容區
========================= */

.container{

    max-width:1200px;

    margin:auto;
}

/* =========================
   玻璃卡片
========================= */

.glass-card{

    background:
    rgba(29,24,44,.58);

    border:
    1px solid
    rgba(255,255,255,.06);

    border-radius:34px;

    padding:40px;

    backdrop-filter:blur(18px);

    box-shadow:
    0 10px 40px
    rgba(0,0,0,.25);
}

/* =========================
   範例標題
========================= */

.section-title{

    font-size:32px;

    color:#f5ebff;

    margin-bottom:18px;

    letter-spacing:2px;
}

.section-text{

    color:#e7ddff;

    line-height:2;

    font-size:22px;
}

/* =========================
   手機
========================= */

@media(max-width:768px){

    body{
        padding:28px 18px;
    }

    .glass-card{
        padding:28px;
    }

    .section-title{
        font-size:28px;
    }

    .section-text{
        font-size:20px;
    }
}

</style>

</head>

<body>

<!-- 星空 -->

<div class="stars" id="stars"></div>

<!-- 光暈 -->

<div class="bg-glow glow1"></div>
<div class="bg-glow glow2"></div>
<div class="bg-glow glow3"></div>

<!-- 主邊框 -->

<div class="frame"></div>

<!-- 上下徽章 -->

<div class="top-emblem">
    ✦ ☾ ✦
</div>

<div class="bottom-emblem">
    ✦ ☾ ✦
</div>

<!-- 四角裝飾 -->

<div class="ornament o1"></div>
<div class="ornament o2"></div>
<div class="ornament o3"></div>
<div class="ornament o4"></div>

<!-- HEADER -->

<div class="header">

    <div class="moon-wrap">

        <div class="moon-line"></div>

        <div class="hanging-moon">
            ☾
        </div>

    </div>

    <div class="logo">
        MOD TEMPLATE
    </div>

    <div class="subtitle">

        紫色星月慕夏風格空白模板
        <br>

        Purple Cosmic Art Nouveau Base ✦

    </div>

</div>

<!-- 內容 -->

<div class="container">

    <div class="glass-card">

        <div class="section-title">
            Base Layout
        </div>

        <div class="section-text">

            這是一個乾淨的 MOD 模板。

            <br><br>

            之後可以直接在這個版型上，
            增加新的網站功能與設計。

        </div>

    </div>

</div>

<script>

/* =========================
   星空生成
========================= */

const stars =
document.getElementById("stars");

for(let i=0;i<160;i++){

    const star =
    document.createElement("div");

    star.className = "star";

    star.style.left =
    Math.random()*100 + "%";

    star.style.top =
    Math.random()*100 + "%";

    star.style.animationDelay =
    Math.random()*4 + "s";

    stars.appendChild(star);
}

</script>

</body>
</html>
