<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazy Dream Archive</title>

    <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
    <meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
    <meta name="bingbot" content="noindex,nofollow,noarchive,nosnippet,noimageindex">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: font-size 0.2s ease, transform 0.4s ease, box-shadow 0.4s ease;
        }

        :root {
            --bg1: #171320;
            --bg2: #241a35;
            --bg3: #31244d;
            --gold: #d8bf8a;
            --text: #f4efff;
            --card: rgba(29, 24, 44, .72);
            
            /* 文字大小基礎設定級距 */
            --base-font-size: 16px;
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--text);
            font-family: "Cormorant Garamond", serif;
            background: radial-gradient(circle at top, rgba(180,150,255,.14), transparent 30%),
                        linear-gradient(180deg, var(--bg1), var(--bg2), var(--bg3));
            padding: 28px;
            position: relative;
            font-size: var(--base-font-size);
        }

        /* 星空背景 */
        .stars {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: -3;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: .7;
            animation: twinkle 4s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: .15; transform: scale(.7); }
            50% { opacity: 1; transform: scale(1.4); }
        }

        /* 魔法古典外框 */
        .frame {
            position: fixed;
            inset: 14px;
            border: 1.5px solid rgba(216,191,138,.48);
            border-radius: 38px;
            pointer-events: none;
            z-index: 999;
        }

        .frame::before {
            content: "";
            position: absolute;
            inset: 12px;
            border: 1px solid rgba(216,191,138,.18);
            border-radius: 30px;
        }

        /* 四角裝飾 */
        .corner {
            position: fixed;
            width: 120px;
            height: 120px;
            pointer-events: none;
            z-index: 1000;
        }

        .corner::before {
            content: "";
            position: absolute;
            inset: 0;
            border: 1.5px solid rgba(216,191,138,.45);
            border-radius: 50%;
        }

        .corner::after {
            content: "✦";
            position: absolute;
            color: rgba(216,191,138,.85);
            font-size: 26px;
        }

        .tl { top: 18px; left: 18px; }
        .tl::before { clip-path: polygon(0 0, 100% 0, 0 100%); }
        .tl::after { top: 18px; left: 18px; }

        .tr { top: 18px; right: 18px; }
        .tr::before { clip-path: polygon(0 0, 100% 0, 100% 100%); }
        .tr::after { top: 18px; right: 18px; }

        .bl { bottom: 18px; left: 18px; }
        .bl::before { clip-path: polygon(0 0, 0 100%, 100% 100%); }
        .bl::after { bottom: 18px; left: 18px; }

        .br { bottom: 18px; right: 18px; }
        .br::before { clip-path: polygon(100% 0, 0 100%, 100% 100%); }
        .br::after { bottom: 18px; right: 18px; }

        /* 主內容區 */
        .container {
            max-width: 1000px;
            margin: auto;
            position: relative;
            z-index: 2;
        }

        /* ② 新增功能：文字大小控制列排版 */
        .font-control {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 10px;
            position: relative;
            z-index: 1010;
        }

        .font-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(216, 191, 138, 0.3);
            color: var(--text);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-family: "Cinzel", serif;
            font-size: 14px;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .font-btn:hover {
            background: rgba(216, 191, 138, 0.2);
            color: var(--gold);
            border-color: var(--gold);
        }

        .font-btn.active {
            background: var(--gold);
            color: var(--bg1);
            font-weight: bold;
            border-color: var(--gold);
        }

        /* 懸浮月亮 */
        .moon {
            text-align: center;
            margin-top: 10px;
            position: relative;
        }

        .moon::before {
            content: "";
            position: absolute;
            left: 50%;
            top: -70px;
            width: 1px;
            height: 70px;
            background: rgba(216,191,138,.35);
        }

        .moon-symbol {
            font-size: 42px;
            color: var(--gold);
            text-shadow: 0 0 18px rgba(216,191,138,.25);
            animation: floatMoon 4s ease-in-out infinite;
        }

        @keyframes floatMoon {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(6px); }
        }

        /* 標題與文字 */
        .title {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 50px;
        }

        .main-title {
            font-family: "Cinzel", serif;
            font-weight: 700;
            letter-spacing: 5px;
            line-height: 1.1;
            font-size: clamp(42px, 9vw, 82px);
            background: linear-gradient(180deg, #ffffff 0%, #f1e8ff 40%, #d8bf8a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        .main-title::before {
            content: "";
            position: absolute;
            width: clamp(180px, 40vw, 340px);
            height: clamp(180px, 40vw, 340px);
            border: 1px solid rgba(216,191,138,.12);
            border-radius: 50%;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
        }

        .subtitle {
            margin-top: 24px;
            font-size: calc(var(--base-font-size) * 1.3);
            color: #ddd0f5;
            line-height: 2;
        }

        /* 卡片網格排版 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 28px;
        }

        .card {
            background: var(--card);
            border: 1px solid rgba(255,255,255,.06);
            border-radius: 34px;
            padding: 28px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            text-decoration: none;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 50px rgba(0,0,0,.4);
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top, rgba(255,255,255,.06), transparent 60%);
            pointer-events: none;
        }

        .card-symbol {
            font-size: calc(var(--base-font-size) * 1.75);
            color: var(--gold);
            margin-bottom: 16px;
        }

        .card-title {
            font-family: "Cinzel", serif;
            font-size: calc(var(--base-font-size) * 1.6);
            margin-bottom: 10px;
            line-height: 1.3;
            word-break: break-word;
        }

        .card-file {
            color: #bba9e8;
            font-size: calc(var(--base-font-size) * 0.9);
            letter-spacing: 1px;
            margin-bottom: 18px;
            opacity: .82;
        }

        .card-desc {
            color: #d6c8f5;
            line-height: 1.8;
            font-size: calc(var(--base-font-size) * 1.05);
            min-height: 70px;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            margin-top: 24px;
            color: #b89ef0;
            font-size: calc(var(--base-font-size) * 0.9);
            letter-spacing: 1px;
        }

        /* 頁尾樣式 */
        .footer {
            text-align: center;
            margin-top: 70px;
            margin-bottom: 90px;
        }

        .footer-line {
            width: 120px;
            height: 1px;
            margin: auto;
            margin-bottom: 22px;
            background: linear-gradient(90deg, transparent, rgba(216,191,138,.7), transparent);
        }

        .footer-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
        }

        .sparkle {
            color: #f6d98f;
            font-size: 24px;
        }

        .dream {
            font-family: "Cinzel", serif;
            font-size: 34px;
            letter-spacing: 4px;
            color: #eadfff;
        }

        .creator {
            margin-top: 10px;
            font-size: 16px;
            color: #a897c9;
            letter-spacing: 2px;
            font-style: italic;
        }

        .loading {
            text-align: center;
            color: #c9b8f1;
            font-size: 22px;
            margin-top: 50px;
            grid-column: 1 / -1;
        }

        @media(max-width: 640px) {
            .frame { inset: 10px; }
        }
    </style>
</head>

<body>

<div class="stars" id="stars"></div>
<div class="frame"></div>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="container">
    <div class="font-control">
        <button class="font-btn" onclick="changeFontSize('small', this)">A -</button>
        <button class="font-btn active" onclick="changeFontSize('medium', this)">A</button>
        <button class="font-btn" onclick="changeFontSize('large', this)">A +</button>
    </div>

    <div class="moon">
        <div class="moon-symbol">☾</div>
    </div>

    <div class="title">
        <h1 class="main-title">Lazy Dream Archive</h1>
        <p class="subtitle">
            所有靈感與作品的入口
            <br>
            每個網頁，都是另一個宇宙 ✦
        </p>
    </div>

    <div class="grid" id="projects">
        <div class="loading">正在讀取魔法書庫...</div>
    </div>

    <div class="footer">
        <div class="footer-line"></div>
        <div class="footer-inner">
            <span class="sparkle">✦</span>
            <span class="dream">Lazy Dream</span>
            <span class="sparkle">✦</span>
        </div>
        <div class="creator">Crafted with moonlight & dream magic</div>
    </div>
</div>

<script>
/* ===== 星空背景生成 ===== */
const stars = document.getElementById("stars");
for (let i = 0; i < 140; i++) {
    const star = document.createElement("div");
    star.className = "star";
    star.style.left = Math.random() * 100 + "%";
    star.style.top = Math.random() * 100 + "%";
    star.style.animationDelay = Math.random() * 4 + "s";
    stars.appendChild(star);
}

/* ===== 文字大小切換控制功能 ===== */
function changeFontSize(size, btnElement) {
    const root = document.documentElement;
    // 切換按鈕 active 樣式
    document.querySelectorAll('.font-btn').forEach(btn => btn.classList.remove('active'));
    btnElement.classList.add('active');
    
    // 依據選擇調整 CSS 變數中的根部基礎文字大小
    if (size === 'small') {
        root.style.setProperty('--base-font-size', '13px');
    } else if (size === 'medium') {
        root.style.setProperty('--base-font-size', '16px');
    } else if (size === 'large') {
        root.style.setProperty('--base-font-size', '20px');
    }
}

/* ===== GitHub 帳戶與儲存庫自動配置 ===== */
const username = "TofuDouce";
const repo = "schedule-app";

/* ===== 預設隨機圖標庫 ===== */
const symbols = ["✦", "☾", "✧", "✶", "❂", "☽"];

/* ===== 核心核心：完全自主向檔案提取標題與內容描述 ===== */
async function loadProjects() {
    const container = document.getElementById("projects");
    
    try {
        // Step 1: 先去抓取整個 Repo 的檔案清單
        const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents`);
        if (!response.ok) throw new Error("API 讀取失敗");
        
        const files = await response.json();
        
        // 自動排除入口大廳自己，不重複跑出卡片 (比如 index.html 或 archive.html)
        const currentFileName = window.location.pathname.split("/").pop() || "archive.html";
        const htmlFiles = files.filter(file => 
            file.name.endsWith(".html") && 
            file.name !== currentFileName && 
            file.name !== "archive.html"
        );

        // 初始化入口大廳自己本身的置頂固定展示卡
        let gridHTML = `
        <a class="card" href="archive.html" target="_blank">
            <div class="card-symbol">☾</div>
            <div class="card-title">Lazy Dream Archive</div>
            <div class="card-file">archive.html</div>
            <div class="card-desc">所有作品與宇宙的入口</div>
            <div class="card-footer">CURRENT PORTAL ✦</div>
        </a>
        `;

        // 並行發送封包：去「深入閱讀」資料庫內每個 HTML 檔案的實際內容
        const cardPromises = htmlFiles.map(async (file, index) => {
            const symbol = symbols[index % symbols.length];
            let title = file.name.replace(".html", ""); // 降級機制：最慘就拿檔名當標題
            let desc = "通往另一個宇宙的入口"; // 預設降級描述

            try {
                // 加設 4 秒超時防禦阻斷器，避免某個網頁卡住導致整個大廳進不去
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 4000);
                
                const pageResponse = await fetch(file.download_url, { signal: controller.signal });
                clearTimeout(timeoutId);
                
                const htmlText = await pageResponse.text();
                
                // 【全自動抽取機制一】自動正則提取網頁的 <title> 標題
                const titleMatch = htmlText.match(/<title>(.*?)<\/title>/i);
                if (titleMatch && titleMatch[1]) {
                    title = titleMatch[1].trim();
                }

                // 【全自動抽取機制二】自動正則提取網頁的 <meta name="description" content="..."> 描述
                const metaDescMatch = htmlText.match(/<meta[^>]*name=["']description["'][[^>]*content=["']([^"']*)["'][^>]*>/i) || 
                                      htmlText.match(/<meta[^>]*content=["']([^"']*)["'][^>]*name=["']description["']/i);
                
                if (metaDescMatch && metaDescMatch[1]) {
                    desc = metaDescMatch[1].trim();
                } else {
                    // 【全自動抽取機制三 (後備降級)】如果該網頁沒寫 meta description，自動拔除 HTML 標籤抓內文前 60 字
                    const bodyMatch = htmlText.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
                    if (bodyMatch && bodyMatch[1]) {
                        let cleanText = bodyMatch[1]
                            .replace(/<script[\s\S]*?<\/script>/gi, '') // 拔掉腳本
                            .replace(/<style[\s\S]*?<\/style>/gi, '')   // 拔掉內建樣式
                            .replace(/<[^>]+>/g, '')                     // 拔掉標籤
                            .replace(/\s+/g, ' ')                        // 壓縮空格
                            .trim();
                        if (cleanText.length > 0) {
                            desc = cleanText.substring(0, 60) + "...";
                        }
                    }
                }
            } catch (e) {
                console.log(`讀取 ${file.name} 內部內容失敗或超時，以檔名直接呈現。`);
            }

            return `
            <a class="card" href="${file.name}" target="_blank">
                <div class="card-symbol">${symbol}</div>
                <div class="card-title">${title}</div>
                <div class="card-file">${file.name}</div>
                <div class="card-desc">${desc}</div>
                <div class="card-footer">OPEN PORTAL →</div>
            </a>
            `;
        });

        // 收集所有並行處理完的卡片，合體渲染上畫面
        const cardsHTMLArray = await Promise.all(cardPromises);
        container.innerHTML = gridHTML + cardsHTMLArray.join("");

    } catch (err) {
        console.error(err);
        container.innerHTML = `
        <div class="loading">
            無法動態連線至 GitHub 魔法書庫 😭 <br>
            <span style="font-size: 14px; color: rgba(255,255,255,0.4);">請確認網路連線是否通暢。</span>
        </div>
        `;
    }
}

// 喚醒大廳自動抓取魔法
loadProjects();
</script>

</body>
</html>
