<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazy Dream Archive</title>

    <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
    <meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
    <meta name="bingbot" content="noindex,nofollow,noarchive,nosnippet,noimageindex">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: font-size 0.2s ease, transform 0.4s ease, box-shadow 0.4s ease;
        }

        :root {
            --bg1: #171320;
            --bg2: #241a35;
            --bg3: #31244d;
            --gold: #d8bf8a;
            --text: #f4efff;
            --card: rgba(29, 24, 44, .72);
            
            /* 文字大小基礎設定級距 */
            --base-font-size: 16px;
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--text);
            font-family: "Cormorant Garamond", serif;
            background: radial-gradient(circle at top, rgba(180,150,255,.14), transparent 30%),
                        linear-gradient(180deg, var(--bg1), var(--bg2), var(--bg3));
            padding: 20px; /* 縮小網頁四周留白 */
            position: relative;
            font-size: var(--base-font-size);
        }

        /* 星空背景 */
        .stars {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: -3;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: .7;
            animation: twinkle 4s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: .15; transform: scale(.7); }
            50% { opacity: 1; transform: scale(1.4); }
        }

        /* 魔法古典外框 */
        .frame {
            position: fixed;
            inset: 10px; /* 外框微調邊緣，釋放內部空間 */
            border: 1.5px solid rgba(216,191,138,.48);
            border-radius: 26px;
            pointer-events: none;
            z-index: 999;
        }

        .frame::before {
            content: "";
            position: absolute;
            inset: 8px;
            border: 1px solid rgba(216,191,138,.18);
            border-radius: 20px;
        }

        /* 四角裝飾 */
        .corner {
            position: fixed;
            width: 90px; /* 稍微縮小四角裝飾，避免壓迫到卡片內容 */
            height: 90px;
            pointer-events: none;
            z-index: 1000;
        }

        .corner::before {
            content: "";
            position: absolute;
            inset: 0;
            border: 1.5px solid rgba(216,191,138,.45);
            border-radius: 50%;
        }

        .corner::after {
            content: "✦";
            position: absolute;
            color: rgba(216,191,138,.85);
            font-size: 22px;
        }

        .tl { top: 14px; left: 14px; }
        .tl::before { clip-path: polygon(0 0, 100% 0, 0 100%); }
        .tl::after { top: 14px; left: 14px; }

        .tr { top: 14px; right: 14px; }
        .tr::before { clip-path: polygon(0 0, 100% 0, 100% 100%); }
        .tr::after { top: 14px; right: 14px; }

        .bl { bottom: 14px; left: 14px; }
        .bl::before { clip-path: polygon(0 0, 0 100%, 100% 100%); }
        .bl::after { bottom: 14px; left: 14px; }

        .br { bottom: 14px; right: 14px; }
        .br::before { clip-path: polygon(100% 0, 0 100%, 100% 100%); }
        .br::after { bottom: 14px; right: 14px; }

        /* 主內容區 */
        .container {
            max-width: 1080px; /* 加寬整體容器，讓橫向能排入更多卡片 */
            margin: auto;
            position: relative;
            z-index: 2;
        }

        /* 文字大小控制列排版 */
        .font-control {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 5px; /* 縮減間距 */
            position: relative;
            z-index: 1010;
        }

        .font-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(216, 191, 138, 0.3);
            color: var(--text);
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-family: "Cinzel", serif;
            font-size: 13px;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .font-btn:hover {
            background: rgba(216, 191, 138, 0.2);
            color: var(--gold);
            border-color: var(--gold);
        }

        .font-btn.active {
            background: var(--gold);
            color: var(--bg1);
            font-weight: bold;
            border-color: var(--gold);
        }

        /* 懸浮月亮 */
        .moon {
            text-align: center;
            margin-top: 5px;
            position: relative;
        }

        .moon::before {
            content: "";
            position: absolute;
            left: 50%;
            top: -45px; /* 縮短掛線，節省高度 */
            width: 1px;
            height: 45px;
            background: rgba(216,191,138,.35);
        }

        .moon-symbol {
            font-size: 36px; /* 稍微精簡大小 */
            color: var(--gold);
            text-shadow: 0 0 18px rgba(216,191,138,.25);
            animation: floatMoon 4s ease-in-out infinite;
        }

        @keyframes floatMoon {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(5px); }
        }

        /* 標題與文字 */
        .title {
            text-align: center;
            margin-top: 10px;
            margin-bottom: 30px; /* 從 50px 大幅壓縮，讓下方卡片往上提 */
        }

        .main-title {
            font-family: "Cinzel", serif;
            font-weight: 700;
            letter-spacing: 4px;
            line-height: 1.1;
            font-size: clamp(36px, 7vw, 64px); /* 略微縮減大標題字級，避免過度佔用螢幕 */
            background: linear-gradient(180deg, #ffffff 0%, #f1e8ff 40%, #d8bf8a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        .main-title::before {
            content: "";
            position: absolute;
            width: clamp(140px, 35vw, 260px);
            height: clamp(140px, 35vw, 260px);
            border: 1px solid rgba(216,191,138,.12);
            border-radius: 50%;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
        }

        .subtitle {
            margin-top: 12px;
            font-size: calc(var(--base-font-size) * 1.1);
            color: #ddd0f5;
            line-height: 1.8;
        }

        /* 卡片網格排版 (美感保留＋緊湊優化) */
        .grid {
            display: grid;
            /* 最小寬度由 260px 調降至 220px，讓橫向能塞下更多卡片（大螢幕一行可達 4~5 張） */
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px; /* 卡片跟卡片的間距從 28px 緊縮至 16px，有效阻止版面無限拉長 */
        }

        .card {
            background: var(--card);
            border: 1px solid rgba(255,255,255,.06);
            border-radius: 22px; /* 圓角微調得更精緻細緻 */
            padding: 18px 20px; /* 內襯從 28px 縮小，大幅瘦身，同時不會擁擠 */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            text-decoration: none;
            color: white;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 12px 30px rgba(0,0,0,.4);
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top, rgba(255,255,255,.06), transparent 60%);
            pointer-events: none;
        }

        /* 您最喜歡的隨機魔法符號樣式 */
        .card-symbol {
            font-size: calc(var(--base-font-size) * 1.4); /* 微縮大小，更加精緻 */
            color: var(--gold);
            margin-bottom: 8px; /* 縮減符號下方的空間 */
        }

        .card-title {
            font-family: "Cinzel", serif;
            font-size: calc(var(--base-font-size) * 1.3);
            margin-bottom: 4px;
            line-height: 1.3;
            word-break: break-word;
        }

        .card-file {
            color: #bba9e8;
            font-size: calc(var(--base-font-size) * 0.8);
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            opacity: .82;
        }

        .card-desc {
            color: #d6c8f5;
            line-height: 1.6;
            font-size: calc(var(--base-font-size) * 0.95);
            min-height: unset; /* 取消原本死板的最小高度 */
            /* 核心優化：限制描述文字最多顯示 2 行（原本 3 行），精簡垂直多餘空白 */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 唯美腳註樣式保留 */
        .card-footer {
            margin-top: 14px; /* 從 24px 大幅壓縮 */
            color: #b89ef0;
            font-size: calc(var(--base-font-size) * 0.8);
            letter-spacing: 1px;
        }

        /* 頁尾樣式 (縮減間距) */
        .footer {
            text-align: center;
            margin-top: 40px; /* 從 70px 縮減 */
            margin-bottom: 50px; /* 從 90px 縮減 */
        }

        .footer-line {
            width: 120px;
            height: 1px;
            margin: auto;
            margin-bottom: 16px;
            background: linear-gradient(90deg, transparent, rgba(216,191,138,.6), transparent);
        }

        .footer-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }

        .sparkle {
            color: #f6d98f;
            font-size: 20px;
        }

        .dream {
            font-family: "Cinzel", serif;
            font-size: 28px;
            letter-spacing: 4px;
            color: #eadfff;
        }

        .creator {
            margin-top: 8px;
            font-size: 14px;
            color: #a897c9;
            letter-spacing: 1px;
            font-style: italic;
        }

        .loading {
            text-align: center;
            color: #c9b8f1;
            font-size: 20px;
            margin-top: 40px;
            grid-column: 1 / -1;
        }

        @media(max-width: 640px) {
            .frame { inset: 8px; }
            .grid {
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); /* 手機版橫向也能更緊湊 */
                gap: 12px;
            }
            .card { padding: 14px 16px; }
        }
    </style>
</head>

<body>

<div class="stars" id="stars"></div>
<div class="frame"></div>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="container">
    <div class="font-control">
        <button class="font-btn" onclick="changeFontSize('small', this)">A -</button>
        <button class="font-btn active" onclick="changeFontSize('medium', this)">A</button>
        <button class="font-btn" onclick="changeFontSize('large', this)">A +</button>
    </div>

    <div class="moon">
        <div class="moon-symbol">☾</div>
    </div>

    <div class="title">
        <h1 class="main-title">Lazy Dream Archive</h1>
        <p class="subtitle">
            所有靈感與作品的入口
            <br>
            每個網頁，都是另一個宇宙 ✦
        </p>
    </div>

    <div class="grid" id="projects">
        <div class="loading">正在讀取魔法書庫...</div>
    </div>

    <div class="footer">
        <div class="footer-line"></div>
        <div class="footer-inner">
            <span class="sparkle">✦</span>
            <span class="dream">Lazy Dream</span>
            <span class="sparkle">✦</span>
        </div>
        <div class="creator">Crafted with moonlight & dream magic</div>
    </div>
</div>

<script>
/* ===== 星空背景生成 ===== */
const stars = document.getElementById("stars");
for (let i = 0; i < 140; i++) {
    const star = document.createElement("div");
    star.className = "star";
    star.style.left = Math.random() * 100 + "%";
    star.style.top = Math.random() * 100 + "%";
    star.style.animationDelay = Math.random() * 4 + "s";
    stars.appendChild(star);
}

/* ===== 文字大小切換控制功能 ===== */
function changeFontSize(size, btnElement) {
    const root = document.documentElement;
    document.querySelectorAll('.font-btn').forEach(btn => btn.classList.remove('active'));
    btnElement.classList.add('active');
    
    if (size === 'small') {
        root.style.setProperty('--base-font-size', '13px');
    } else if (size === 'medium') {
        root.style.setProperty('--base-font-size', '16px');
    } else if (size === 'large') {
        root.style.setProperty('--base-font-size', '19px');
    }
}

/* ===== GitHub 帳戶與一鍵命名配置變數 ===== */
const username = "TofuDouce";
const repo = "schedule-app";
const portalFileName = "index.html"; 

/* ===== 預設隨機圖標庫 (完全保留！) ===== */
const symbols = ["✦", "☾", "✧", "✶", "❂", "☽"];

/* ===== 全自動向外部檔案提取標題與內容描述 ===== */
async function loadProjects() {
    const container = document.getElementById("projects");
    
    try {
        const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents`);
        if (!response.ok) throw new Error("API 讀取失敗");
        
        const files = await response.json();
        
        // 依據變數自動排除入口大廳自己，不重複跑出卡片
        const htmlFiles = files.filter(file => 
            file.name.endsWith(".html") && 
            file.name !== portalFileName
        );

        // 置頂大廳卡片（完美保留內嵌的符號與腳註結構）
        let gridHTML = `
        <a class="card" href="${portalFileName}" target="_blank" style="border-color: rgba(216,191,138,0.35);">
            <div class="card-symbol">☾</div>
            <div class="card-title" style="color: var(--gold);">Lazy Dream Archive</div>
            <div class="card-file">${portalFileName}</div>
            <div class="card-desc">所有作品與宇宙的入口</div>
            <div class="card-footer">CURRENT PORTAL ✦</div>
        </a>
        `;

        // 並行發送封包解析內文
        const cardPromises = htmlFiles.map(async (file, index) => {
            const symbol = symbols[index % symbols.length]; // 循環配對隨機魔法符號
            let title = file.name.replace(".html", ""); 
            let desc = "通往另一個宇宙的入口"; 

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 4000);
                
                const pageResponse = await fetch(file.download_url, { signal: controller.signal });
                clearTimeout(timeoutId);
                
                const htmlText = await pageResponse.text();
                
                // 1. 自動提取網頁的 <title>
                const titleMatch = htmlText.match(/<title>(.*?)<\/title>/i);
                if (titleMatch && titleMatch[1]) {
                    title = titleMatch[1].trim();
                }

                // 2. 自動提取網頁的 <meta name="description">
                const metaDescMatch = htmlText.match(/<meta[^>]*name=["']description["'][[^>]*content=["']([^"']*)["'][^>]*>/i) || 
                                      htmlText.match(/<meta[^>]*content=["']([^"']*)["'][^>]*name=["']description["']/i);
                
                if (metaDescMatch && metaDescMatch[1]) {
                    desc = metaDescMatch[1].trim();
                } else {
                    // 3. 後備降級：沒寫 meta 時，自動剝除 HTML 標籤，並精簡抓取開頭前 35 個字
                    const bodyMatch = htmlText.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
                    if (bodyMatch && bodyMatch[1]) {
                        let cleanText = bodyMatch[1]
                            .replace(/<script[\s\S]*?<\/script>/gi, '') 
                            .replace(/<style[\s\S]*?<\/style>/gi, '')   
                            .replace(/<[^>]+>/g, '')                     
                            .replace(/\s+/g, ' ')                        
                            .trim();
                        if (cleanText.length > 0) {
                            desc = cleanText.substring(0, 35) + "..."; // ✂️ 縮短為 35 字，使卡片高度均勻緊湊
                        }
                    }
                }
            } catch (e) {
                console.log(`讀取 ${file.name} 內容超時，直接以基本資料呈現。`);
            }

            // 動態卡片渲染：完美將符號（symbol）與腳註（OPEN PORTAL）放回原本對應位置！
            return `
            <a class="card" href="${file.name}" target="_blank">
                <div>
                    <div class="card-symbol">${symbol}</div>
                    <div class="card-title">${title}</div>
                    <div class="card-file">${file.name}</div>
                    <div class="card-desc">${desc}</div>
                </div>
                <div class="card-footer">OPEN PORTAL →</div>
            </a>
            `;
        });

        const cardsHTMLArray = await Promise.all(cardPromises);
        container.innerHTML = gridHTML + cardsHTMLArray.join("");

    } catch (err) {
        console.error(err);
        container.innerHTML = `
        <div class="loading">
            無法動態連線至 GitHub 儲存庫 😭 <br>
            <span style="font-size: 14px; color: rgba(255,255,255,0.4);">請檢查網路連線。</span>
        </div>
        `;
    }
}

loadProjects();
</script>

</body>
</html>
