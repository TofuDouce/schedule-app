<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault — 我的收藏庫</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;500&family=Lora:ital,wght@0,400;0,600;1,400&family=Source+Han+Serif+TC:wght@300;400;600&family=JetBrains+Mono:wght@400;500&family=Fira+Code:wght@400;500&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:        #2C2016;
    --ink-soft:   #6B5744;
    --ink-muted:  #A08878;
    --parchment:  #F7F1E8;
    --parchment2: #EDE5D8;
    --parchment3: #E2D8C8;
    --amber:      #C8843A;
    --amber-soft: #E8A85A;
    --amber-pale: #F5DEB8;
    --rose:       #C4736A;
    --rose-pale:  #F2E0DC;
    --sage:       #7A9B7A;
    --sage-pale:  #DFF0DF;
    --shadow:     rgba(44,32,22,0.10);
    --shadow-md:  rgba(44,32,22,0.18);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--parchment);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: var(--ink);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px var(--shadow-md);
  }
  .logo {
    font-family: 'Noto Serif TC', serif;
    font-weight: 600;
    font-size: 1.25rem;
    color: var(--amber-soft);
    letter-spacing: 0.08em;
  }
  .logo span { color: var(--parchment2); font-weight: 300; font-size: 0.85rem; margin-left: 10px; letter-spacing: 0.04em; }

  .header-actions { display: flex; gap: 8px; }
  .btn-header {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.78rem;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--ink-soft);
    background: transparent;
    color: var(--parchment2);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }
  .btn-header:hover { background: var(--ink-soft); border-color: var(--amber-soft); color: var(--amber-soft); }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    background: var(--parchment2);
    border-bottom: 1px solid var(--parchment3);
    padding: 0 24px;
    gap: 4px;
  }
  .tab {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    padding: 14px 22px;
    border: none;
    background: transparent;
    color: var(--ink-muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }
  .tab:hover { color: var(--ink-soft); }
  .tab.active { color: var(--amber); border-bottom-color: var(--amber); }

  /* ── Main layout ── */
  .main { display: flex; flex: 1; min-height: 0; }

  /* ── Sidebar ── */
  .sidebar {
    width: 280px;
    min-width: 220px;
    background: var(--parchment2);
    border-right: 1px solid var(--parchment3);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-top {
    padding: 16px;
    border-bottom: 1px solid var(--parchment3);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .search-input {
    flex: 1;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.82rem;
    padding: 7px 12px;
    border-radius: 8px;
    border: 1px solid var(--parchment3);
    background: var(--parchment);
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--amber-soft); }
  .search-input::placeholder { color: var(--ink-muted); }

  .btn-new {
    font-size: 1.3rem;
    width: 34px; height: 34px;
    border-radius: 8px;
    border: none;
    background: var(--amber);
    color: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
  }
  .btn-new:hover { background: var(--amber-soft); transform: scale(1.05); }

  /* ── Folder section in sidebar ── */
  .item-list { flex: 1; overflow-y: auto; padding: 8px; }
  .item-list::-webkit-scrollbar { width: 4px; }
  .item-list::-webkit-scrollbar-thumb { background: var(--parchment3); border-radius: 4px; }

  /* Folder row */
  .folder-row {
    display: flex;
    align-items: center;
    padding: 7px 10px;
    border-radius: 8px;
    cursor: pointer;
    user-select: none;
    margin-bottom: 2px;
    gap: 6px;
    transition: background 0.15s;
  }
  .folder-row:hover { background: var(--parchment3); }
  .folder-row.active-folder { background: var(--amber-pale); }

  .folder-arrow {
    font-size: 0.65rem;
    color: var(--ink-muted);
    transition: transform 0.2s;
    width: 12px;
    flex-shrink: 0;
  }
  .folder-arrow.open { transform: rotate(90deg); }

  .folder-icon { font-size: 0.85rem; flex-shrink: 0; }
  .folder-name {
    flex: 1;
    font-size: 0.83rem;
    font-weight: 500;
    color: var(--ink-soft);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .folder-count {
    font-size: 0.68rem;
    color: var(--ink-muted);
    background: var(--parchment3);
    border-radius: 10px;
    padding: 1px 7px;
    flex-shrink: 0;
  }
  .folder-actions {
    display: none;
    gap: 3px;
    flex-shrink: 0;
  }
  .folder-row:hover .folder-actions { display: flex; }
  .folder-action-btn {
    width: 20px; height: 20px;
    border: none;
    background: transparent;
    color: var(--ink-muted);
    cursor: pointer;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    transition: background 0.15s, color 0.15s;
  }
  .folder-action-btn:hover { background: var(--parchment); color: var(--ink); }
  .folder-action-btn.del:hover { color: var(--rose); }

  /* Items inside folder */
  .folder-items {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.25s ease;
  }
  .folder-items.open { max-height: 9999px; }
  .folder-items-inner { padding: 2px 0 4px 16px; }

  .item-card {
    padding: 10px 12px;
    border-radius: 9px;
    cursor: pointer;
    margin-bottom: 3px;
    border: 1px solid transparent;
    transition: all 0.15s;
    position: relative;
  }
  .item-card:hover { background: var(--parchment); border-color: var(--parchment3); }
  .item-card.active { background: var(--parchment); border-color: var(--amber-pale); box-shadow: 0 1px 6px var(--shadow); }
  .item-card .card-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-card .card-meta {
    font-size: 0.70rem;
    color: var(--ink-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .badge {
    font-size: 0.64rem;
    padding: 1px 7px;
    border-radius: 10px;
    font-weight: 500;
    letter-spacing: 0.03em;
  }
  .badge-code { background: var(--amber-pale); color: var(--amber); }
  .badge-text { background: var(--rose-pale); color: var(--rose); }

  .empty-list {
    text-align: center;
    padding: 40px 20px;
    color: var(--ink-muted);
    font-size: 0.85rem;
    line-height: 1.8;
  }
  .empty-list .icon { font-size: 2rem; margin-bottom: 10px; opacity: 0.5; }

  .empty-folder {
    padding: 10px 12px;
    color: var(--ink-muted);
    font-size: 0.75rem;
    font-style: italic;
  }

  /* Add folder button at bottom of list */
  .add-folder-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 10px;
    border-radius: 8px;
    cursor: pointer;
    color: var(--ink-muted);
    font-size: 0.78rem;
    border: 1px dashed var(--parchment3);
    margin-top: 6px;
    transition: all 0.15s;
  }
  .add-folder-row:hover { border-color: var(--amber-soft); color: var(--amber); background: var(--amber-pale); }

  /* ── Content area ── */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--parchment);
  }

  /* ── Welcome screen ── */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--ink-muted);
    text-align: center;
    padding: 40px;
  }
  .welcome .big-icon { font-size: 3rem; opacity: 0.35; }
  .welcome h2 { font-family: 'Noto Serif TC', serif; font-weight: 400; font-size: 1.1rem; color: var(--ink-soft); }
  .welcome p { font-size: 0.83rem; line-height: 1.9; }

  /* ── Detail toolbar ── */
  .detail-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--parchment3);
    background: var(--parchment2);
    flex-wrap: wrap;
  }
  .detail-title-input {
    flex: 1;
    font-family: 'Noto Serif TC', serif;
    font-size: 1.05rem;
    font-weight: 600;
    border: none;
    background: transparent;
    color: var(--ink);
    outline: none;
    min-width: 120px;
  }
  .detail-title-input::placeholder { color: var(--ink-muted); }

  .btn-action {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.76rem;
    padding: 6px 13px;
    border-radius: 7px;
    border: 1px solid var(--parchment3);
    background: var(--parchment);
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-action:hover { background: var(--parchment3); color: var(--ink); }
  .btn-action.primary { background: var(--amber); border-color: var(--amber); color: #fff; }
  .btn-action.primary:hover { background: var(--amber-soft); border-color: var(--amber-soft); }
  .btn-action.danger { color: var(--rose); border-color: var(--rose-pale); }
  .btn-action.danger:hover { background: var(--rose-pale); }

  /* Folder selector in toolbar */
  .folder-select-wrap {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.75rem;
    color: var(--ink-muted);
  }
  .folder-select {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.75rem;
    padding: 4px 8px;
    border-radius: 6px;
    border: 1px solid var(--parchment3);
    background: var(--parchment);
    color: var(--ink-soft);
    outline: none;
    cursor: pointer;
    max-width: 130px;
  }
  .folder-select:focus { border-color: var(--amber-soft); }

  /* ── Editor ── */
  .editor-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .code-editor {
    flex: 1;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    line-height: 1.75;
    padding: 20px 24px;
    border: none;
    background: #1E1810;
    color: #E8D8B8;
    resize: none;
    outline: none;
    tab-size: 2;
    white-space: pre;
    overflow: auto;
  }
  .text-editor {
    flex: 1;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.95rem;
    line-height: 2.1;
    padding: 28px 36px;
    border: none;
    background: var(--parchment);
    color: var(--ink);
    resize: none;
    outline: none;
  }

  /* ── Preview ── */
  .preview-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .preview-bar {
    padding: 8px 20px;
    font-size: 0.75rem;
    color: var(--ink-muted);
    background: var(--parchment3);
    border-bottom: 1px solid var(--parchment3);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .preview-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--amber-soft); display: inline-block; }
  .preview-iframe {
    flex: 1;
    border: none;
    background: #fff;
  }

  /* ── Split view ── */
  .split-view { flex: 1; display: flex; overflow: hidden; }
  .split-left { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--parchment3); overflow: hidden; }
  .split-right { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .split-label {
    font-size: 0.72rem;
    padding: 5px 14px;
    background: var(--parchment3);
    color: var(--ink-muted);
    letter-spacing: 0.05em;
    font-weight: 500;
  }

  /* ── View toggle ── */
  .view-toggle {
    display: flex;
    gap: 4px;
    background: var(--parchment3);
    border-radius: 8px;
    padding: 3px;
  }
  .view-btn {
    font-size: 0.73rem;
    padding: 4px 10px;
    border-radius: 5px;
    border: none;
    background: transparent;
    color: var(--ink-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .view-btn.active { background: var(--parchment); color: var(--ink); box-shadow: 0 1px 3px var(--shadow); }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(44,32,22,0.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--parchment);
    border-radius: 16px;
    padding: 28px 30px;
    width: min(90vw, 420px);
    box-shadow: 0 8px 40px var(--shadow-md);
    transform: translateY(10px);
    transition: transform 0.2s;
  }
  .modal-overlay.show .modal { transform: translateY(0); }
  .modal h3 { font-family: 'Noto Serif TC', serif; font-size: 1.1rem; margin-bottom: 18px; color: var(--ink); }
  .modal-label { font-size: 0.8rem; color: var(--ink-soft); margin-bottom: 6px; margin-top: 14px; }
  .modal-input, .modal-select {
    width: 100%;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.88rem;
    padding: 9px 13px;
    border-radius: 8px;
    border: 1px solid var(--parchment3);
    background: var(--parchment2);
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  .modal-input:focus, .modal-select:focus { border-color: var(--amber-soft); }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 22px; }

  /* Emoji picker row */
  .emoji-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .emoji-btn {
    width: 34px; height: 34px;
    border: 1px solid var(--parchment3);
    border-radius: 7px;
    background: var(--parchment2);
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .emoji-btn:hover { border-color: var(--amber-soft); background: var(--amber-pale); }
  .emoji-btn.selected { border-color: var(--amber); background: var(--amber-pale); box-shadow: 0 0 0 2px var(--amber-pale); }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--amber-soft);
    font-size: 0.82rem;
    padding: 9px 20px;
    border-radius: 20px;
    z-index: 300;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    box-shadow: 0 4px 16px var(--shadow-md);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Settings panel ── */
  .settings-overlay {
    position: fixed; inset: 0;
    background: rgba(44,32,22,0.3);
    z-index: 150;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  .settings-overlay.show { opacity: 1; pointer-events: all; }

  .settings-panel {
    position: fixed;
    top: 0; right: 0;
    width: min(360px, 92vw);
    height: 100%;
    background: var(--parchment);
    box-shadow: -4px 0 32px var(--shadow-md);
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
    z-index: 151;
    overflow: hidden;
  }
  .settings-overlay.show .settings-panel { transform: translateX(0); }

  .settings-header {
    padding: 20px 22px 16px;
    border-bottom: 1px solid var(--parchment3);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--parchment2);
    flex-shrink: 0;
  }
  .settings-header h3 {
    font-family: 'Noto Serif TC', serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--ink);
  }
  .settings-close {
    width: 28px; height: 28px;
    border: none;
    background: transparent;
    color: var(--ink-muted);
    cursor: pointer;
    font-size: 1.1rem;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .settings-close:hover { background: var(--parchment3); color: var(--ink); }

  .settings-body { flex: 1; overflow-y: auto; padding: 20px 22px; }
  .settings-body::-webkit-scrollbar { width: 4px; }
  .settings-body::-webkit-scrollbar-thumb { background: var(--parchment3); border-radius: 4px; }

  .settings-section {
    margin-bottom: 28px;
  }
  .settings-section-title {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--ink-muted);
    text-transform: uppercase;
    margin-bottom: 14px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--parchment3);
  }
  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    gap: 12px;
  }
  .settings-label {
    font-size: 0.82rem;
    color: var(--ink-soft);
    flex-shrink: 0;
  }
  .settings-select {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.78rem;
    padding: 5px 10px;
    border-radius: 7px;
    border: 1px solid var(--parchment3);
    background: var(--parchment2);
    color: var(--ink);
    outline: none;
    cursor: pointer;
    flex: 1;
    min-width: 0;
    transition: border-color 0.2s;
  }
  .settings-select:focus { border-color: var(--amber-soft); }

  /* Slider */
  .slider-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
  }
  .settings-slider {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 4px;
    background: var(--parchment3);
    outline: none;
    cursor: pointer;
  }
  .settings-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--amber);
    cursor: pointer;
    box-shadow: 0 1px 4px var(--shadow-md);
    transition: background 0.15s, transform 0.1s;
  }
  .settings-slider::-webkit-slider-thumb:hover { background: var(--amber-soft); transform: scale(1.15); }
  .settings-slider::-moz-range-thumb {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--amber);
    cursor: pointer;
    border: none;
  }
  .slider-value {
    font-size: 0.75rem;
    color: var(--ink-muted);
    min-width: 30px;
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Font preview */
  .font-preview {
    margin-top: 8px;
    padding: 10px 14px;
    border-radius: 8px;
    background: var(--parchment2);
    border: 1px solid var(--parchment3);
    font-size: 0.88rem;
    color: var(--ink-soft);
    line-height: 1.7;
    transition: all 0.2s;
    min-height: 52px;
  }
  .font-preview.code-preview {
    background: #1E1810;
    color: #E8D8B8;
    border-color: #3a3020;
    font-size: 0.8rem;
  }

  .settings-reset {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.75rem;
    padding: 6px 14px;
    border-radius: 7px;
    border: 1px solid var(--parchment3);
    background: transparent;
    color: var(--ink-muted);
    cursor: pointer;
    width: 100%;
    margin-top: 8px;
    transition: all 0.15s;
  }
  .settings-reset:hover { background: var(--parchment3); color: var(--ink); }

  /* ── Divider ── */
  .divider { width: 1px; background: var(--parchment3); margin: 0 4px; align-self: stretch; }

  /* ── Mobile bottom tab bar (hidden on desktop) ── */
  .mobile-tabbar { display: none; }
  .btn-back { display: none; }

  /* ── Responsive: tablet ── */
  @media (max-width: 640px) {
    .sidebar { width: 240px; }
    .text-editor { padding: 20px; }
    .code-editor { font-size: 0.75rem; }
    .detail-toolbar { gap: 5px; }
  }

  /* ── Mobile: ≤600px full redesign ── */
  @media (max-width: 600px) {

    /* Header: compact */
    header { padding: 10px 14px; }
    .logo { font-size: 1rem; }
    .logo span { display: none; }
    .btn-header { font-size: 0.68rem; padding: 5px 9px; }

    /* Tabs: tighter */
    .tab { font-size: 0.78rem; padding: 10px 14px; }

    /* Main: vertical stack, fills viewport minus header+tabs+tabbar */
    .main {
      flex-direction: column;
      height: calc(100dvh - 44px - 44px - 54px);
      /* header ~44, tabs ~44, tabbar ~54 */
    }

    /* Sidebar: full width, collapsible */
    .sidebar {
      width: 100%;
      border-right: none;
      border-bottom: 1px solid var(--parchment3);
      flex-shrink: 0;
      max-height: 55dvh;
      transition: max-height 0.3s ease, opacity 0.25s, border 0.2s;
      overflow: hidden;
    }
    .sidebar.mobile-hidden {
      max-height: 0 !important;
      opacity: 0;
      pointer-events: none;
      border-bottom: none;
    }

    /* Content: fills the rest */
    .content { flex: 1; min-height: 0; }

    /* Toolbar: compact wrap */
    .detail-toolbar { padding: 7px 10px; gap: 5px; flex-wrap: wrap; }
    .detail-title-input { font-size: 0.9rem; min-width: 60px; }
    .folder-select-wrap { font-size: 0.68rem; }
    .folder-select { font-size: 0.68rem; max-width: 80px; padding: 3px 5px; }
    .detail-toolbar .divider { display: none; }
    .btn-action { font-size: 0.68rem; padding: 5px 9px; }

    /* Show back button on mobile */
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 0.75rem;
      padding: 5px 10px;
      border-radius: 7px;
      border: 1px solid var(--parchment3);
      background: var(--parchment);
      color: var(--ink-soft);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      font-family: 'Noto Sans TC', sans-serif;
      transition: background 0.15s;
    }
    .btn-back:hover { background: var(--parchment3); }

    /* Hide desktop view-toggle (bottom tab bar takes over) */
    .view-toggle { display: none; }

    /* Split view: vertical */
    .split-view { flex-direction: column; }
    .split-left {
      border-right: none;
      border-bottom: 1px solid var(--parchment3);
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .split-right {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .code-editor { font-size: 0.74rem; padding: 12px 14px; }
    .text-editor  { padding: 14px 16px; }

    /* Bottom tab bar */
    .mobile-tabbar {
      display: flex;
      background: var(--ink);
      border-top: 1px solid rgba(255,255,255,0.07);
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 90;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      height: 54px;
    }
    .mobile-tabbar.hidden { display: none !important; }

    .mob-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6px 4px 8px;
      border: none;
      background: transparent;
      color: rgba(240,220,180,0.45);
      cursor: pointer;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.58rem;
      gap: 3px;
      transition: color 0.15s, background 0.15s;
      letter-spacing: 0.02em;
    }
    .mob-tab .mob-icon { font-size: 1.05rem; line-height: 1; }
    .mob-tab.active { color: var(--amber-soft); }
    .mob-tab:active { background: rgba(255,255,255,0.06); }

    /* Separator between list and actions in tabbar */
    .mob-tab-sep {
      width: 1px;
      background: rgba(255,255,255,0.08);
      align-self: stretch;
      margin: 8px 0;
      flex-shrink: 0;
    }
  }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">Vault <span>我的收藏庫</span></div>
  <div class="header-actions">
    <button class="btn-header" onclick="exportData()">匯出備份</button>
    <button class="btn-header" onclick="document.getElementById('importFile').click()">匯入還原</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    <button class="btn-header" onclick="openSettings()" style="letter-spacing:0.05em;">⚙ 設定</button>
  </div>
</header>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" id="tab-code" onclick="switchTab('code')">💻 程式碼專案</button>
  <button class="tab" id="tab-text" onclick="switchTab('text')">📝 文字文章</button>
</div>

<!-- Main -->
<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-top">
      <input class="search-input" id="searchInput" placeholder="搜尋…" oninput="renderList()">
      <button class="btn-new" title="新增項目" onclick="openNewItemModal()">＋</button>
    </div>
    <div class="item-list" id="itemList"></div>
  </div>

  <!-- Content -->
  <div class="content" id="contentArea">
    <div class="welcome">
      <div class="big-icon">✦</div>
      <h2>選擇一個項目，或新增一個</h2>
      <p>程式碼專案可以即時預覽效果<br>文字文章可以在這裡安靜閱讀與編輯</p>
    </div>
  </div>
</div>

<!-- New Item Modal -->
<div class="modal-overlay" id="newItemModal">
  <div class="modal">
    <h3 id="itemModalTitle">新增項目</h3>
    <div class="modal-label">名稱</div>
    <input class="modal-input" id="itemModalName" placeholder="輸入名稱…" maxlength="60">
    <div id="itemModalTypeRow">
      <div class="modal-label">類型</div>
      <select class="modal-select" id="itemModalType">
        <option value="code">💻 程式碼專案（HTML）</option>
        <option value="text">📝 文字文章</option>
      </select>
    </div>
    <div class="modal-label">資料夾</div>
    <select class="modal-select" id="itemModalFolder"></select>
    <div class="modal-actions">
      <button class="btn-action" onclick="closeItemModal()">取消</button>
      <button class="btn-action primary" id="itemModalConfirm" onclick="confirmItemModal()">建立</button>
    </div>
  </div>
</div>

<!-- New/Rename Folder Modal -->
<div class="modal-overlay" id="folderModal">
  <div class="modal">
    <h3 id="folderModalTitle">新增資料夾</h3>
    <div class="modal-label">資料夾名稱</div>
    <input class="modal-input" id="folderModalName" placeholder="例如：互動小說、工具類…" maxlength="30">
    <div class="modal-label">圖示</div>
    <div class="emoji-row" id="emojiRow"></div>
    <div class="modal-actions">
      <button class="btn-action" onclick="closeFolderModal()">取消</button>
      <button class="btn-action primary" id="folderModalConfirm" onclick="confirmFolderModal()">建立</button>
    </div>
  </div>
</div>

<!-- Settings Panel -->
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettingsOnBg(event)">
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <h3>⚙ 外觀設定</h3>
      <button class="settings-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="settings-body">

      <!-- Text editor settings -->
      <div class="settings-section">
        <div class="settings-section-title">📝 文字編輯器</div>

        <div class="settings-row">
          <span class="settings-label">字型</span>
          <select class="settings-select" id="textFontFamily" onchange="applySettings()">
            <option value="'Noto Serif TC', serif">Noto Serif TC（明體）</option>
            <option value="'Noto Sans TC', sans-serif">Noto Sans TC（黑體）</option>
            <option value="'Lora', serif">Lora（英文襯線）</option>
            <option value="Georgia, serif">Georgia</option>
            <option value="-apple-system, sans-serif">系統預設</option>

        <div class="settings-row">
          <span class="settings-label">字體大小</span>
          <div class="slider-wrap">
            <input type="range" class="settings-slider" id="textFontSize" min="12" max="22" step="1" oninput="applySettings()">
            <span class="slider-value" id="textFontSizeVal">15</span>
          </div>
        </div>

        <div class="settings-row">
          <span class="settings-label">行距</span>
          <div class="slider-wrap">
            <input type="range" class="settings-slider" id="textLineHeight" min="1.4" max="3.0" step="0.1" oninput="applySettings()">
            <span class="slider-value" id="textLineHeightVal">2.1</span>
          </div>
        </div>

        <div class="font-preview" id="textFontPreview">
          願我如星君如月，夜夜流光相皎潔。<br>
          The quick brown fox jumps over the lazy dog.
        </div>
      </div>

      <!-- Code editor settings -->
      <div class="settings-section">
        <div class="settings-section-title">💻 程式碼編輯器</div>

        <div class="settings-row">
          <span class="settings-label">字型</span>
          <select class="settings-select" id="codeFontFamily" onchange="applySettings()">
            <option value="'JetBrains Mono', monospace">JetBrains Mono</option>
            <option value="'Fira Code', monospace">Fira Code</option>
            <option value="'Source Code Pro', monospace">Source Code Pro</option>
            <option value="'Courier New', monospace">Courier New</option>
            <option value="monospace">系統等寬</option>
          </select>
        </div>

        <div class="settings-row">
          <span class="settings-label">字體大小</span>
          <div class="slider-wrap">
            <input type="range" class="settings-slider" id="codeFontSize" min="10" max="20" step="1" oninput="applySettings()">
            <span class="slider-value" id="codeFontSizeVal">13</span>
          </div>
        </div>

        <div class="settings-row">
          <span class="settings-label">行距</span>
          <div class="slider-wrap">
            <input type="range" class="settings-slider" id="codeLineHeight" min="1.3" max="2.4" step="0.1" oninput="applySettings()">
            <span class="slider-value" id="codeLineHeightVal">1.75</span>
          </div>
        </div>

        <div class="font-preview code-preview" id="codeFontPreview">
          const greet = (name) => {<br>
          &nbsp;&nbsp;return `Hello, ${name}!`;<br>
          };

      </div>

      <button class="settings-reset" onclick="resetSettings()">↺ 恢復預設值</button>
    </div>
  </div>
</div>

<!-- Mobile bottom tab bar (code items only, hidden on desktop via CSS) -->
<div class="mobile-tabbar hidden" id="mobileTabbar">
  <button class="mob-tab active" id="mobTab-editor" onclick="setView('editor')">
    <span class="mob-icon">✏️</span>編輯
  </button>
  <button class="mob-tab" id="mobTab-split" onclick="setView('split')">
    <span class="mob-icon">⬛</span>分割
  </button>
  <button class="mob-tab" id="mobTab-preview" onclick="setView('preview')">
    <span class="mob-icon">👁</span>預覽
  </button>
  <div class="mob-tab-sep"></div>
  <button class="mob-tab" onclick="manualSave()">
    <span class="mob-icon">💾</span>儲存
  </button>
  <button class="mob-tab" onclick="copyContent()">
    <span class="mob-icon">📋</span>複製
  </button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── Constants ──
const FOLDER_EMOJIS = ['📁','💻','📝','🎮','🛠️','📖','🎨','🌟','🔮','💡','🗂️','📦','🎭','🌿','🔧','📜','🎵','🏠','⚗️','🗺️'];

// ── State ──
let db = JSON.parse(localStorage.getItem('vault_db_v2') || 'null');
// Migrate from old vault_db if exists
if (!db) {
  const old = JSON.parse(localStorage.getItem('vault_db') || '{"items":[]}');
  db = {
    folders: {
      code: [{ id: 'code_default', name: '全部', icon: '📁', builtIn: true }],
      text: [{ id: 'text_default', name: '全部', icon: '📁', builtIn: true }]
    },
    items: old.items || []
  };
  // Assign all old items to default folder
  db.items.forEach(i => { if (!i.folderId) i.folderId = i.type + '_default'; });
  saveDB();
}

let currentTab = 'code';
let currentId = null;
let currentView = 'split';
let autoSaveTimer = null;

// Folder open/closed state (not persisted, just UI)
let openFolders = new Set();

// Folder modal state
let folderModalMode = 'new'; // 'new' | 'rename'
let folderModalTab = 'code';
let folderModalEditId = null;
let selectedEmoji = '📁';

// Item modal state
let itemModalMode = 'new';

function saveDB() {
  localStorage.setItem('vault_db_v2', JSON.stringify(db));
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function getFolders(tab) {
  return db.folders[tab] || [];
}

function getItemsInFolder(folderId, q = '') {
  return db.items
    .filter(i => i.folderId === folderId)
    .filter(i => !q || i.name.toLowerCase().includes(q.toLowerCase()) || i.content.toLowerCase().includes(q.toLowerCase()))
    .sort((a, b) => b.updatedAt - a.updatedAt);
}

function getAllItems(tab, q = '') {
  return db.items
    .filter(i => i.type === tab)
    .filter(i => !q || i.name.toLowerCase().includes(q.toLowerCase()) || i.content.toLowerCase().includes(q.toLowerCase()))
    .sort((a, b) => b.updatedAt - a.updatedAt);
}

// ── Tab ──
function switchTab(tab) {
  currentTab = tab;
  currentId = null;
  document.getElementById('tab-code').classList.toggle('active', tab === 'code');
  document.getElementById('tab-text').classList.toggle('active', tab === 'text');
  renderList();
  showWelcome();
}

// ── Sidebar list ──
function renderList() {
  const q = document.getElementById('searchInput').value.trim();
  const el = document.getElementById('itemList');
  const folders = getFolders(currentTab);

  if (!folders.length) {
    el.innerHTML = `<div class="empty-list"><div class="icon">${currentTab === 'code' ? '💻' : '📝'}</div>還沒有資料夾<br>點下方新增一個</div>`;
    renderAddFolderBtn(el);
    return;
  }

  let html = '';

  // If searching, show flat list across all folders
  if (q) {
    const items = getAllItems(currentTab, q);
    if (!items.length) {
      html = `<div class="empty-list"><div class="icon">🔍</div>找不到符合的項目</div>`;
    } else {
      html = items.map(item => renderItemCard(item)).join('');
    }
    el.innerHTML = html;
    return;
  }

  // Normal folder view
  folders.forEach(folder => {
    const items = getItemsInFolder(folder.id);
    const isOpen = openFolders.has(folder.id);
    const arrowClass = isOpen ? 'open' : '';

    html += `
      <div class="folder-row ${isOpen ? 'active-folder' : ''}" onclick="toggleFolder('${folder.id}')">
        <span class="folder-arrow ${arrowClass}">▶</span>
        <span class="folder-icon">${folder.icon}</span>
        <span class="folder-name">${escHtml(folder.name)}</span>
        <span class="folder-count">${items.length}</span>
        <span class="folder-actions" onclick="event.stopPropagation()">
          ${!folder.builtIn ? `
            <button class="folder-action-btn" title="重新命名" onclick="openRenameFolderModal('${folder.id}')">✏️</button>
            <button class="folder-action-btn del" title="刪除資料夾" onclick="deleteFolder('${folder.id}')">✕</button>
          ` : `
            <button class="folder-action-btn" title="重新命名" onclick="openRenameFolderModal('${folder.id}')">✏️</button>
          `}
        </span>
      </div>
      <div class="folder-items ${isOpen ? 'open' : ''}" id="folder-${folder.id}">
        <div class="folder-items-inner">
          ${items.length
            ? items.map(item => renderItemCard(item)).join('')
            : `<div class="empty-folder">尚無項目，點右上角 ＋ 新增</div>`
          }
        </div>
      </div>
    `;
  });

  el.innerHTML = html;
  renderAddFolderBtn(el);
}

function renderItemCard(item) {
  return `
    <div class="item-card ${item.id === currentId ? 'active' : ''}" onclick="selectItem('${item.id}')">
      <div class="card-title">${escHtml(item.name)}</div>
      <div class="card-meta">
        <span class="badge ${item.type === 'code' ? 'badge-code' : 'badge-text'}">${item.type === 'code' ? 'HTML' : '文章'}</span>
        ${formatDate(item.updatedAt)}
      </div>
    </div>
  `;
}

function renderAddFolderBtn(el) {
  const div = document.createElement('div');
  div.className = 'add-folder-row';
  div.innerHTML = `<span>📁</span><span>新增資料夾</span>`;
  div.onclick = () => openNewFolderModal(currentTab);
  el.appendChild(div);
}

function toggleFolder(folderId) {
  if (openFolders.has(folderId)) {
    openFolders.delete(folderId);
  } else {
    openFolders.add(folderId);
  }
  renderList();
}

function formatDate(ts) {
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Select item ──
function selectItem(id) {
  currentId = id;
  renderList();
  const item = db.items.find(i => i.id === id);
  if (!item) return;
  if (item.type === 'code') renderCodeDetail(item);
  else renderTextDetail(item);
}

// ── Mobile helpers ──
function isMobile() { return window.innerWidth <= 600; }

function showMobileTabbar(show) {
  const bar = document.getElementById('mobileTabbar');
  if (show) bar.classList.remove('hidden');
  else bar.classList.add('hidden');
}

function updateMobileTabbarActive(v) {
  ['editor','split','preview'].forEach(name => {
    const btn = document.getElementById('mobTab-' + name);
    if (btn) btn.classList.toggle('active', name === v);
  });
}

function mobileSidebarHide() {
  document.querySelector('.sidebar').classList.add('mobile-hidden');
}
function mobileSidebarShow() {
  document.querySelector('.sidebar').classList.remove('mobile-hidden');
}

function mobileBack() {
  // Save before going back
  manualSave(true);
  currentId = null;
  showMobileTabbar(false);
  mobileSidebarShow();
  renderList();
  showWelcome();
}

// ── Code detail ──
function renderCodeDetail(item) {
  currentView = 'split';
  document.getElementById('contentArea').innerHTML = `
    <div class="detail-toolbar">
      <button class="btn-back" onclick="mobileBack()">‹ 返回</button>
      <input class="detail-title-input" id="detailTitle" value="${escHtml(item.name)}" placeholder="專案名稱" oninput="scheduleSave()">
      <div class="folder-select-wrap">
        <span>📁</span>
        <select class="folder-select" id="detailFolder" onchange="moveItemFolder()">
          ${getFolders(item.type).map(f => `<option value="${f.id}" ${f.id === item.folderId ? 'selected' : ''}>${f.icon} ${escHtml(f.name)}</option>`).join('')}
        </select>
      </div>
      <div class="view-toggle">
        <button class="view-btn" onclick="setView('editor')">編輯</button>
        <button class="view-btn active" onclick="setView('split')">分割</button>
        <button class="view-btn" onclick="setView('preview')">預覽</button>
      </div>
      <div class="divider"></div>
      <button class="btn-action primary" onclick="manualSave()">儲存</button>
      <button class="btn-action" onclick="copyContent()">複製</button>
      <button class="btn-action" onclick="downloadFile()">下載</button>
      <button class="btn-action danger" onclick="deleteItem()">刪除</button>
    </div>
    <div class="editor-wrap" id="editorWrap">
      ${buildCodeViewHtml(item.content)}
    </div>
  `;
  if (isMobile()) {
    mobileSidebarHide();
    showMobileTabbar(true);
  }
  setView('split');
  applySettingsToEditor();
}

function buildCodeViewHtml(content) {
  const safe = content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return `
    <div class="split-view" id="splitView">
      <div class="split-left">
        <div class="split-label">CODE</div>
        <textarea class="code-editor" id="codeEditor" spellcheck="false" oninput="scheduleSave(); refreshPreview()">${safe}</textarea>
      </div>
      <div class="split-right">
        <div class="split-label">PREVIEW</div>
        <iframe class="preview-iframe" id="previewFrame" sandbox="allow-scripts allow-same-origin"></iframe>
      </div>
    </div>
  `;
}

function setView(v) {
  currentView = v;
  const sv = document.getElementById('splitView');
  const left = sv ? sv.querySelector('.split-left') : null;
  const right = sv ? sv.querySelector('.split-right') : null;
  // Desktop view-toggle buttons
  const btns = document.querySelectorAll('.view-btn');
  btns.forEach((b,i) => b.classList.toggle('active', ['editor','split','preview'][i] === v));
  // Mobile tabbar active
  updateMobileTabbarActive(v);
  if (!sv) return;
  if (v === 'editor') { left.style.flex='1'; left.style.display=''; right.style.display='none'; }
  else if (v === 'preview') { left.style.display='none'; right.style.display=''; right.style.flex='1'; }
  else { left.style.flex='1'; left.style.display=''; right.style.display=''; right.style.flex='1'; }
  refreshPreview();
}

function refreshPreview() {
  const frame = document.getElementById('previewFrame');
  const editor = document.getElementById('codeEditor');
  if (!frame || !editor) return;
  const blob = new Blob([editor.value], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  frame.onload = () => URL.revokeObjectURL(url);
  frame.src = url;
}

// ── Text detail ──
function renderTextDetail(item) {
  document.getElementById('contentArea').innerHTML = `
    <div class="detail-toolbar">
      <button class="btn-back" onclick="mobileBack()">‹ 返回</button>
      <input class="detail-title-input" id="detailTitle" value="${escHtml(item.name)}" placeholder="文章標題" oninput="scheduleSave()">
      <div class="folder-select-wrap">
        <span>📁</span>
        <select class="folder-select" id="detailFolder" onchange="moveItemFolder()">
          ${getFolders(item.type).map(f => `<option value="${f.id}" ${f.id === item.folderId ? 'selected' : ''}>${f.icon} ${escHtml(f.name)}</option>`).join('')}
        </select>
      </div>
      <div class="divider"></div>
      <button class="btn-action primary" onclick="manualSave()">儲存</button>
      <button class="btn-action" onclick="copyContent()">複製</button>
      <button class="btn-action" onclick="downloadFile()">下載</button>
      <button class="btn-action danger" onclick="deleteItem()">刪除</button>
    </div>
    <textarea class="text-editor" id="textEditor" placeholder="在這裡輸入文章內容…" oninput="scheduleSave()">${escHtml(item.content)}</textarea>
  `;
  if (isMobile()) {
    mobileSidebarHide();
    showMobileTabbar(false); // text has no preview, no tabbar needed
  }
  applySettingsToEditor();
}

// ── Move item to different folder ──
function moveItemFolder() {
  if (!currentId) return;
  const item = db.items.find(i => i.id === currentId);
  if (!item) return;
  const sel = document.getElementById('detailFolder');
  if (!sel) return;
  item.folderId = sel.value;
  item.updatedAt = Date.now();
  // Make sure target folder is open
  openFolders.add(item.folderId);
  saveDB();
  renderList();
  showToast('已移至資料夾 ✓');
}

// ── Save logic ──
function scheduleSave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => manualSave(true), 1500);
}

function manualSave(silent = false) {
  if (!currentId) return;
  const item = db.items.find(i => i.id === currentId);
  if (!item) return;
  const titleEl = document.getElementById('detailTitle');
  const editorEl = document.getElementById('codeEditor') || document.getElementById('textEditor');
  if (titleEl) item.name = titleEl.value.trim() || '未命名';
  if (editorEl) item.content = editorEl.value;
  item.updatedAt = Date.now();
  saveDB();
  renderList();
  if (!silent) showToast('已儲存 ✓');
}

function copyContent() {
  const editorEl = document.getElementById('codeEditor') || document.getElementById('textEditor');
  if (!editorEl) return;
  navigator.clipboard.writeText(editorEl.value).then(() => showToast('已複製到剪貼板 ✓'));
}

function downloadFile() {
  manualSave(true);
  const item = db.items.find(i => i.id === currentId);
  if (!item) return;
  const ext = item.type === 'code' ? 'html' : 'txt';
  const blob = new Blob([item.content], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${item.name}.${ext}`;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast(`已下載 ${item.name}.${ext}`);
}

function deleteItem() {
  if (!currentId) return;
  const item = db.items.find(i => i.id === currentId);
  if (!item) return;
  if (!confirm(`確定刪除「${item.name}」？此操作無法復原。`)) return;
  db.items = db.items.filter(i => i.id !== currentId);
  currentId = null;
  saveDB();
  renderList();
  showWelcome(); // showWelcome already handles mobile state
  showToast('已刪除');
}

function showWelcome() {
  document.getElementById('contentArea').innerHTML = `
    <div class="welcome">
      <div class="big-icon">✦</div>
      <h2>選擇一個項目，或新增一個</h2>
      <p>程式碼專案可以即時預覽效果<br>文字文章可以在這裡安靜閱讀與編輯</p>
    </div>
  `;
  showMobileTabbar(false);
  mobileSidebarShow();
}

// ── Item Modal ──
function openNewItemModal() {
  itemModalMode = 'new';
  document.getElementById('itemModalTitle').textContent = '新增項目';
  document.getElementById('itemModalName').value = '';
  document.getElementById('itemModalType').value = currentTab;
  document.getElementById('itemModalTypeRow').style.display = '';
  document.getElementById('itemModalConfirm').textContent = '建立';
  // Populate folder dropdown
  populateItemModalFolders(currentTab);
  document.getElementById('newItemModal').classList.add('show');
  setTimeout(() => document.getElementById('itemModalName').focus(), 100);
}

function populateItemModalFolders(tab) {
  const sel = document.getElementById('itemModalFolder');
  const folders = getFolders(tab);
  sel.innerHTML = folders.map(f => `<option value="${f.id}">${f.icon} ${escHtml(f.name)}</option>`).join('');
}

document.getElementById('itemModalType').addEventListener('change', function() {
  populateItemModalFolders(this.value);
});

function closeItemModal() {
  document.getElementById('newItemModal').classList.remove('show');
}

function confirmItemModal() {
  const name = document.getElementById('itemModalName').value.trim();
  if (!name) { document.getElementById('itemModalName').focus(); return; }
  const type = document.getElementById('itemModalType').value;
  const folderId = document.getElementById('itemModalFolder').value;

  const item = {
    id: uid(),
    name,
    type,
    folderId,
    content: '',
    createdAt: Date.now(),
    updatedAt: Date.now()
  };
  db.items.push(item);
  saveDB();
  openFolders.add(folderId);
  if (type !== currentTab) switchTab(type);
  else renderList();
  closeItemModal();
  selectItem(item.id);
  showToast('已建立 ✓');
}

document.getElementById('newItemModal').addEventListener('click', e => {
  if (e.target === document.getElementById('newItemModal')) closeItemModal();
});
document.getElementById('itemModalName').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmItemModal();
  if (e.key === 'Escape') closeItemModal();
});

// ── Folder Modal ──
function buildEmojiPicker() {
  const row = document.getElementById('emojiRow');
  row.innerHTML = FOLDER_EMOJIS.map(e => `
    <button class="emoji-btn ${e === selectedEmoji ? 'selected' : ''}" onclick="selectEmoji('${e}')">${e}</button>
  `).join('');
}

function selectEmoji(e) {
  selectedEmoji = e;
  buildEmojiPicker();
}

function openNewFolderModal(tab) {
  folderModalMode = 'new';
  folderModalTab = tab;
  folderModalEditId = null;
  selectedEmoji = '📁';
  document.getElementById('folderModalTitle').textContent = '新增資料夾';
  document.getElementById('folderModalName').value = '';
  document.getElementById('folderModalConfirm').textContent = '建立';
  buildEmojiPicker();
  document.getElementById('folderModal').classList.add('show');
  setTimeout(() => document.getElementById('folderModalName').focus(), 100);
}

function openRenameFolderModal(folderId) {
  const tab = currentTab;
  const folder = getFolders(tab).find(f => f.id === folderId);
  if (!folder) return;
  folderModalMode = 'rename';
  folderModalTab = tab;
  folderModalEditId = folderId;
  selectedEmoji = folder.icon || '📁';
  document.getElementById('folderModalTitle').textContent = '重新命名資料夾';
  document.getElementById('folderModalName').value = folder.name;
  document.getElementById('folderModalConfirm').textContent = '儲存';
  buildEmojiPicker();
  document.getElementById('folderModal').classList.add('show');
  setTimeout(() => document.getElementById('folderModalName').focus(), 100);
}

function closeFolderModal() {
  document.getElementById('folderModal').classList.remove('show');
}

function confirmFolderModal() {
  const name = document.getElementById('folderModalName').value.trim();
  if (!name) { document.getElementById('folderModalName').focus(); return; }

  if (folderModalMode === 'new') {
    const folder = { id: uid(), name, icon: selectedEmoji, builtIn: false };
    if (!db.folders[folderModalTab]) db.folders[folderModalTab] = [];
    db.folders[folderModalTab].push(folder);
    openFolders.add(folder.id);
    saveDB();
    renderList();
    closeFolderModal();
    showToast(`資料夾「${name}」已建立 ✓`);
  } else {
    const folder = getFolders(folderModalTab).find(f => f.id === folderModalEditId);
    if (folder) {
      folder.name = name;
      folder.icon = selectedEmoji;
      saveDB();
      renderList();
    }
    closeFolderModal();
    showToast('已更新 ✓');
  }
}

document.getElementById('folderModal').addEventListener('click', e => {
  if (e.target === document.getElementById('folderModal')) closeFolderModal();
});
document.getElementById('folderModalName').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmFolderModal();
  if (e.key === 'Escape') closeFolderModal();
});

function deleteFolder(folderId) {
  const folder = getFolders(currentTab).find(f => f.id === folderId);
  if (!folder) return;
  const count = getItemsInFolder(folderId).length;
  const msg = count > 0
    ? `確定刪除資料夾「${folder.name}」？\n裡面的 ${count} 個項目會移到「全部」資料夾。`
    : `確定刪除資料夾「${folder.name}」？`;
  if (!confirm(msg)) return;

  // Move items to default folder
  const defaultFolder = getFolders(currentTab).find(f => f.builtIn);
  db.items.forEach(i => {
    if (i.folderId === folderId) i.folderId = defaultFolder ? defaultFolder.id : '';
  });

  db.folders[currentTab] = db.folders[currentTab].filter(f => f.id !== folderId);
  openFolders.delete(folderId);
  saveDB();
  renderList();
  showToast('資料夾已刪除');
}

// ── Export / Import ──
function exportData() {
  if (!db.items.length) { showToast('還沒有任何資料'); return; }
  const blob = new Blob([JSON.stringify(db, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `vault_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast(`已匯出 ${db.items.length} 個項目`);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      // Support both old and new format
      const importedItems = imported.items || [];
      const importedFolders = imported.folders || null;
      if (!Array.isArray(importedItems)) throw new Error();
      const count = importedItems.length;
      if (!confirm(`匯入 ${count} 個項目？\n這會與現有資料合併（不會刪除現有項目）。`)) return;
      const existingIds = new Set(db.items.map(i => i.id));
      let added = 0;
      importedItems.forEach(item => {
        if (!existingIds.has(item.id)) {
          if (!item.folderId) item.folderId = item.type + '_default';
          db.items.push(item);
          added++;
        }
      });
      // Merge folders
      if (importedFolders) {
        ['code','text'].forEach(tab => {
          if (!importedFolders[tab]) return;
          const existingFolderIds = new Set((db.folders[tab]||[]).map(f => f.id));
          importedFolders[tab].forEach(f => {
            if (!existingFolderIds.has(f.id)) {
              if (!db.folders[tab]) db.folders[tab] = [];
              db.folders[tab].push(f);
            }
          });
        });
      }
      saveDB();
      renderList();
      showToast(`已匯入 ${added} 個新項目`);
    } catch {
      showToast('匯入失敗：檔案格式不正確');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ── Settings ──
const SETTINGS_DEFAULTS = {
  textFontFamily: "'Noto Serif TC', serif",
  textFontSize: 15,
  textLineHeight: 2.1,
  codeFontFamily: "'JetBrains Mono', monospace",
  codeFontSize: 13,
  codeLineHeight: 1.75
};

let appSettings = JSON.parse(localStorage.getItem('vault_settings') || 'null') || { ...SETTINGS_DEFAULTS };

function saveSettings() {
  localStorage.setItem('vault_settings', JSON.stringify(appSettings));
}

function applySettings() {
  // Read current UI values
  appSettings.textFontFamily  = document.getElementById('textFontFamily').value;
  appSettings.textFontSize    = parseFloat(document.getElementById('textFontSize').value);
  appSettings.textLineHeight  = parseFloat(document.getElementById('textLineHeight').value);
  appSettings.codeFontFamily  = document.getElementById('codeFontFamily').value;
  appSettings.codeFontSize    = parseFloat(document.getElementById('codeFontSize').value);
  appSettings.codeLineHeight  = parseFloat(document.getElementById('codeLineHeight').value);

  // Update slider labels
  document.getElementById('textFontSizeVal').textContent   = appSettings.textFontSize + 'px';
  document.getElementById('textLineHeightVal').textContent = appSettings.textLineHeight.toFixed(1);
  document.getElementById('codeFontSizeVal').textContent   = appSettings.codeFontSize + 'px';
  document.getElementById('codeLineHeightVal').textContent = appSettings.codeLineHeight.toFixed(1);

  // Update previews
  const tp = document.getElementById('textFontPreview');
  tp.style.fontFamily  = appSettings.textFontFamily;
  tp.style.fontSize    = appSettings.textFontSize + 'px';
  tp.style.lineHeight  = appSettings.textLineHeight;

  const cp = document.getElementById('codeFontPreview');
  cp.style.fontFamily  = appSettings.codeFontFamily;
  cp.style.fontSize    = appSettings.codeFontSize + 'px';
  cp.style.lineHeight  = appSettings.codeLineHeight;

  // Apply to live editors if open
  const textEditor = document.getElementById('textEditor');
  if (textEditor) {
    textEditor.style.fontFamily  = appSettings.textFontFamily;
    textEditor.style.fontSize    = appSettings.textFontSize + 'px';
    textEditor.style.lineHeight  = appSettings.textLineHeight;
  }
  const codeEditor = document.getElementById('codeEditor');
  if (codeEditor) {
    codeEditor.style.fontFamily  = appSettings.codeFontFamily;
    codeEditor.style.fontSize    = appSettings.codeFontSize + 'px';
    codeEditor.style.lineHeight  = appSettings.codeLineHeight;
  }

  saveSettings();
}

function syncSettingsUI() {
  document.getElementById('textFontFamily').value  = appSettings.textFontFamily;
  document.getElementById('textFontSize').value    = appSettings.textFontSize;
  document.getElementById('textLineHeight').value  = appSettings.textLineHeight;
  document.getElementById('codeFontFamily').value  = appSettings.codeFontFamily;
  document.getElementById('codeFontSize').value    = appSettings.codeFontSize;
  document.getElementById('codeLineHeight').value  = appSettings.codeLineHeight;
  // Trigger label & preview update without saving again
  document.getElementById('textFontSizeVal').textContent   = appSettings.textFontSize + 'px';
  document.getElementById('textLineHeightVal').textContent = appSettings.textLineHeight.toFixed(1);
  document.getElementById('codeFontSizeVal').textContent   = appSettings.codeFontSize + 'px';
  document.getElementById('codeLineHeightVal').textContent = appSettings.codeLineHeight.toFixed(1);
  const tp = document.getElementById('textFontPreview');
  tp.style.fontFamily = appSettings.textFontFamily;
  tp.style.fontSize   = appSettings.textFontSize + 'px';
  tp.style.lineHeight = appSettings.textLineHeight;
  const cp = document.getElementById('codeFontPreview');
  cp.style.fontFamily = appSettings.codeFontFamily;
  cp.style.fontSize   = appSettings.codeFontSize + 'px';
  cp.style.lineHeight = appSettings.codeLineHeight;
}

function applySettingsToEditor() {
  // Called after an editor is rendered into DOM
  const textEditor = document.getElementById('textEditor');
  if (textEditor) {
    textEditor.style.fontFamily = appSettings.textFontFamily;
    textEditor.style.fontSize   = appSettings.textFontSize + 'px';
    textEditor.style.lineHeight = appSettings.textLineHeight;
  }
  const codeEditor = document.getElementById('codeEditor');
  if (codeEditor) {
    codeEditor.style.fontFamily = appSettings.codeFontFamily;
    codeEditor.style.fontSize   = appSettings.codeFontSize + 'px';
    codeEditor.style.lineHeight = appSettings.codeLineHeight;
  }
}

function resetSettings() {
  appSettings = { ...SETTINGS_DEFAULTS };
  syncSettingsUI();
  applySettingsToEditor();
  saveSettings();
  showToast('已恢復預設值');
}

function openSettings() {
  syncSettingsUI();
  document.getElementById('settingsOverlay').classList.add('show');
}

function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('show');
}

function closeSettingsOnBg(e) {
  if (e.target === document.getElementById('settingsOverlay')) closeSettings();
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Init ──
// Open default folders
getFolders('code').forEach(f => openFolders.add(f.id));
renderList();
// Apply persisted settings (editors not open yet, just ready for when they open)
// Settings will be applied via applySettingsToEditor() when an item is selected
</script>
