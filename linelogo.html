<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE LOGO 3.0</title>

<style>
body{margin:0;background:#f3f4f6;font-family:-apple-system;}
.container{max-width:520px;margin:auto;padding:15px;}

canvas{width:100%;border-radius:20px;background:#eee;}

.card{background:#fff;padding:15px;border-radius:16px;margin-bottom:15px;}

.colors{
display:grid;
grid-template-columns:repeat(9,1fr);
gap:8px;margin-top:10px;
}
.color{aspect-ratio:1;border-radius:50%;cursor:pointer;}

/* 浮動工具 */
.toolbar{
position:fixed;
right:20px;
bottom:20px;
background:#fff;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
}

.tool-btn{
background:#06C755;
color:#fff;
border:none;
padding:10px;
border-radius:12px;
cursor:pointer;
font-size:14px;
}

.panel{
position:fixed;
bottom:100px;
right:20px;
width:260px;
background:#fff;
border-radius:16px;
padding:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
display:none;
}

.panel.active{display:block;}

input{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
margin-top:5px;
}

.emoji-grid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:5px;
margin-top:5px;
}

.emoji{
text-align:center;
padding:6px;
background:#f2f2f2;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<canvas id="canvas" width="512" height="512"></canvas>
</div>

<div class="card">
背景色
<input type="color" id="bg" value="#06C755">
<div class="colors" id="palette"></div>
</div>

</div>

<!-- 工具列 -->
<div class="toolbar">
<button class="tool-btn" onclick="openPanel('text')">文字</button>
<button class="tool-btn" onclick="openPanel('emoji')">Emoji</button>
<button class="tool-btn" onclick="openPanel('kao')">顏文字</button>
<button class="tool-btn" onclick="openPanel('logo')">LOGO</button>
</div>

<!-- 面板 -->
<div id="textPanel" class="panel">
<input id="textInput" placeholder="輸入文字">
</div>

<div id="emojiPanel" class="panel">
<div class="emoji-grid" id="emojiGrid"></div>
</div>

<div id="kaoPanel" class="panel">
<input id="kaoInput">
<div id="kaoGrid"></div>
</div>

<div id="logoPanel" class="panel">
<input type="file" id="upload">
</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let content="";
let type="text";
let img=new Image();
let loaded=false;

// 色票
const colors=["#FF3B30","#FF9500","#FFCC00","#34C759","#00C7BE","#007AFF","#5856D6","#FF2D55","#8E8E93"];
colors.forEach(c=>{
const d=document.createElement("div");
d.className="color";
d.style.background=c;
d.onclick=()=>{document.getElementById("bg").value=c;draw();}
palette.appendChild(d);
});

// panel
function openPanel(p){
document.querySelectorAll(".panel").forEach(x=>x.classList.remove("active"));
document.getElementById(p+"Panel").classList.add("active");
}

// emoji
["🎧","🎵","🎸","🍔","☕","🏋️","🧘","🔥","❤️","⭐","🐶","🐱"]
.forEach(e=>{
const d=document.createElement("div");
d.className="emoji";
d.innerText=e;
d.onclick=()=>{
content=e;
type="emoji";
draw();
};
emojiGrid.appendChild(d);
});

// 顏文字
["ദ്ദി ˉ꒳ˉ )✧","(≧▽≦)","(T_T)","(¬_¬)","(づ｡◕‿‿◕｡)づ"]
.forEach(k=>{
const d=document.createElement("div");
d.className="emoji";
d.innerText=k;
d.onclick=()=>{
content=k;
type="kao";
draw();
};
kaoGrid.appendChild(d);
});

// 輸入
textInput.oninput=()=>{
content=textInput.value;
type="text";
draw();
};

kaoInput.oninput=()=>{
content=kaoInput.value;
type="kao";
draw();
};

// 上傳
upload.onchange=e=>{
const reader=new FileReader();
reader.onload=ev=>{
img.onload=()=>{loaded=true;type="logo";draw();}
img.src=ev.target.result;
};
reader.readAsDataURL(e.target.files[0]);
};

// ⭐自動縮放
function autoFont(text){
let size=200;
while(size>20){
ctx.font=`bold ${size}px sans-serif`;
if(ctx.measureText(text).width<460) return size;
size-=2;
}
return size;
}

function draw(){
ctx.clearRect(0,0,512,512);

// 背景
ctx.fillStyle=document.getElementById("bg").value;
ctx.fillRect(0,0,512,512);

if(type==="logo" && loaded){
ctx.drawImage(img,0,0,512,512);
return;
}

// 自動文字
const size=autoFont(content||"哈囉");

ctx.fillStyle="#fff";
ctx.textAlign="center";
ctx.textBaseline="middle";
ctx.font=`bold ${size}px sans-serif`;

ctx.fillText(content||"阿毛",256,256);
}

draw();
</script>

</body>
</html>
