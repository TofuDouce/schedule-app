<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE 大頭照產生器</title>

<style>
body{margin:0;font-family:-apple-system;background:#f3f4f6;}
.header{background:#06C755;color:#fff;padding:20px;text-align:center;font-weight:bold;}
.container{max-width:520px;margin:auto;padding:15px;}
.card{background:#fff;border-radius:16px;padding:15px;margin-bottom:15px;}
canvas{width:100%;border-radius:20px;background:#eee;}

.tabs{display:flex;gap:20px;border-bottom:2px solid #eee;margin-bottom:10px;}
.tab{padding:10px 0;cursor:pointer;color:#999;font-weight:bold;}
.tab.active{color:#06C755;border-bottom:3px solid #06C755;}

.tab-content{display:none;}
.tab-content.active{display:block;}

.big-input{
  width:100%;
  padding:14px;
  font-size:20px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-top:10px;
}

.colors{
  display:grid;
  grid-template-columns: repeat(9, 1fr);
  gap:8px;
  margin-top:10px;
}

.color{
  width:100%;
  aspect-ratio:1;
  border-radius:50%;
  cursor:pointer;
}

.emoji-panel{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:10px;
}

.emoji{
  font-size:22px;
  text-align:center;
  padding:12px;
  border-radius:10px;
  background:#f2f2f2;
  cursor:pointer;
}

.slider{margin-top:10px;}

.row{display:flex;gap:10px;}
button{flex:1;padding:12px;border:none;border-radius:10px;font-weight:bold;}
.green{background:#06C755;color:#fff;}
.gray{background:#ddd;}
</style>
</head>

<body>

<div class="header">LINE 大頭照產生器</div>

<div class="container">

<div class="card">
<div class="tabs">
<div class="tab active" onclick="setShape('square')">方形</div>
<div class="tab" onclick="setShape('circle')">圓形</div>
</div>
<canvas id="canvas" width="512" height="512"></canvas>
</div>

<div class="card">

<!-- ⭐ 全域 -->
大小
<input type="range" id="size" class="slider" min="40" max="200" value="80">

背景色
<input type="color" id="bg" value="#06C755">
<div class="colors" id="colorPalette"></div>

文字顏色
<input type="color" id="textColor" value="#ffffff">

<!-- 分頁 -->
<div class="tabs">
<div class="tab active" data-tab="0">文字</div>
<div class="tab" data-tab="1">Emoji</div>
<div class="tab" data-tab="2">顏文字</div>
<div class="tab" data-tab="3">LOGO</div>
</div>

<div class="tab-content active" data-content="0">
<input id="text" class="big-input" placeholder="輸入文字">
</div>

<div class="tab-content" data-content="1">
<div class="emoji-panel" id="emojiPanel"></div>
</div>

<div class="tab-content" data-content="2">
<input id="kaomoji" class="big-input" placeholder="(＾▽＾)">
<div class="emoji-panel" id="kaomojiPanel"></div>
</div>

<div class="tab-content" data-content="3">
<input type="file" id="upload">
<input id="logoText" class="big-input" placeholder="LOGO文字">
</div>

</div>

<div class="card row">
<button class="gray" onclick="resetAll()">重設</button>
<button class="green" onclick="download()">下載</button>
</div>

</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const textInput=document.getElementById("text");
const kaomojiInput=document.getElementById("kaomoji");
const logoTextInput=document.getElementById("logoText");

const bgInput=document.getElementById("bg");
const textColorInput=document.getElementById("textColor");
const sizeInput=document.getElementById("size");
const uploadInput=document.getElementById("upload");

let currentTab=0;
let shape="square";
let img=new Image();
let loaded=false;
let imgScale=1;

// 分頁
document.querySelectorAll("[data-tab]").forEach(tab=>{
  tab.onclick=()=>{
    currentTab=parseInt(tab.dataset.tab);

    document.querySelectorAll("[data-tab]").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");

    document.querySelectorAll("[data-content]").forEach(c=>{
      c.classList.remove("active");
      if(c.dataset.content==currentTab) c.classList.add("active");
    });

    draw();
  };
});

// 形狀
function setShape(s){shape=s;draw();}

// 色票
const colors=[
"#FF3B30","#FF9500","#FFCC00","#34C759","#00C7BE","#007AFF","#5856D6","#FF2D55","#8E8E93",
"#FFB3BA","#FFD6A5","#FFF3B0","#C8E6C9","#B2EBF2","#B3E5FC","#D1C4E9","#F8BBD0","#E0E0E0",
"#D6A6A6","#D9B08C","#E6D3A3","#A8C3A0","#9EC1CF","#8EA6C9","#B5A6D6","#D6A6C1","#C4C4C4"
];

colors.forEach(c=>{
const d=document.createElement("div");
d.className="color";
d.style.background=c;
d.onclick=()=>{bgInput.value=c;draw();}
document.getElementById("colorPalette").appendChild(d);
});

// emoji（48）
const emojis=[
"😀","😁","😂","🤣","😎","🥺",
"😍","😘","😜","🤩","🥳","😭",
"🐶","🐱","🐼","🐸","🦊","🐰",
"🍎","🍊","🍉","🍇","🍓","🍩",
"🍔","🍟","🍕","🌸","🌻","🌈",
"⭐","✨","🔥","❤️","💛","💚",
"💙","💜","🖤","🤍","🤎","💗",
"💖","💘","💝","💞","💕","💓"
];

emojis.forEach(e=>{
const d=document.createElement("div");
d.className="emoji";
d.innerText=e;
d.onclick=()=>{textInput.value+=e;draw();}
document.getElementById("emojiPanel").appendChild(d);
});

// 顏文字
const kaomojis=[
"(＾▽＾)","(≧▽≦)","(≧∇≦)","(๑•̀ㅂ•́)و",
"(T_T)","(ಥ﹏ಥ)","(；´Д｀)",
"(・∀・)","(・ω・)","(｀・ω・´)",
"(￣▽￣)","(¬‿¬)",
"(づ｡◕‿‿◕｡)づ","(つ≧▽≦)つ",
"(ﾉ◕ヮ◕)ﾉ","ヽ(・∀・)ﾉ"
];

kaomojis.forEach(k=>{
const d=document.createElement("div");
d.className="emoji";
d.innerText=k;
d.onclick=()=>{kaomojiInput.value=k;draw();}
document.getElementById("kaomojiPanel").appendChild(d);
});

// 上傳
uploadInput.onchange=e=>{
const file=e.target.files[0];
const reader=new FileReader();
reader.onload=ev=>{
img.onload=()=>{loaded=true;draw();}
img.src=ev.target.result;
};
reader.readAsDataURL(file);
};

// slider 控圖片
sizeInput.oninput=()=>{
imgScale=sizeInput.value/100;
draw();
};

// 監聽
[textInput,kaomojiInput,logoTextInput,bgInput,textColorInput].forEach(el=>{
el.addEventListener("input",draw);
});

// 畫圖
function draw(){
ctx.clearRect(0,0,512,512);

if(shape==="circle"){
ctx.save();
ctx.beginPath();
ctx.arc(256,256,256,0,Math.PI*2);
ctx.clip();
}

ctx.fillStyle=bgInput.value;
ctx.fillRect(0,0,512,512);

ctx.fillStyle=textColorInput.value;
ctx.font="bold "+sizeInput.value+"px sans-serif";
ctx.textAlign="center";
ctx.textBaseline="middle";

if(currentTab===0) ctx.fillText(textInput.value,256,256);
else if(currentTab===1) ctx.fillText(textInput.value,256,256);
else if(currentTab===2) ctx.fillText(kaomojiInput.value,256,256);
else if(currentTab===3 && loaded){
let size=512*imgScale;
ctx.drawImage(img,(512-size)/2,(512-size)/2,size,size);

if(logoTextInput.value){
ctx.fillText(logoTextInput.value,256,450);
}
}

if(shape==="circle") ctx.restore();
}

function download(){
const a=document.createElement("a");
a.href=canvas.toDataURL();
a.download="avatar.png";
a.click();
}

function resetAll(){
textInput.value="";
kaomojiInput.value="";
logoTextInput.value="";
draw();
}

draw();
</script>

</body>
</html>
