<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE еӨ§й ӯз…§з”ўз”ҹеҷЁ</title>

<style>
body{margin:0;font-family:-apple-system;background:#f3f4f6;}
.header{background:#06C755;color:#fff;padding:20px;text-align:center;font-weight:bold;}
.container{max-width:520px;margin:auto;padding:15px;}
.card{background:#fff;border-radius:16px;padding:15px;margin-bottom:15px;}
canvas{width:100%;border-radius:20px;background:#eee;}

.tabs{display:flex;gap:20px;border-bottom:2px solid #eee;margin-bottom:10px;}
.tab{padding:10px 0;cursor:pointer;color:#999;font-weight:bold;}
.tab.active{color:#06C755;border-bottom:3px solid #06C755;}

.tab-content{display:none;}
.tab-content.active{display:block;}

.big-input{
  width:100%;
  padding:14px;
  font-size:20px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-top:10px;
}

.colors{
  display:grid;
  grid-template-columns: repeat(9, 1fr);
  gap:8px;
  margin-top:10px;
}

.color{
  width:100%;
  aspect-ratio:1;
  border-radius:50%;
  cursor:pointer;
}

.emoji-panel{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:10px;
}

.kao-panel{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.emoji{
  font-size:22px;
  text-align:center;
  padding:12px;
  border-radius:10px;
  background:#f2f2f2;
  cursor:pointer;
}

.row{display:flex;gap:10px;}
button{flex:1;padding:14px;border:none;border-radius:10px;font-weight:bold;font-size:16px;}
.green{background:#06C755;color:#fff;}
.gray{background:#ddd;}
</style>
</head>

<body>

<div class="header">LINE еӨ§й ӯз…§з”ўз”ҹеҷЁ</div>

<div class="container">

<div class="card">
<div class="tabs">
<div class="tab active" onclick="setShape('square')">ж–№еҪў</div>
<div class="tab" onclick="setShape('circle')">ең“еҪў</div>
</div>
<canvas id="canvas" width="512" height="512"></canvas>
</div>

<div class="card">

иғҢжҷҜиүІ
<input type="color" id="bg" value="#06C755">
<div class="colors" id="colorPalette"></div>

<button onclick="setTransparent()" style="margin-top:10px;width:100%;padding:10px;border:none;border-radius:10px;background:#eee;">
йҖҸжҳҺиғҢжҷҜ
</button>

ж–Үеӯ—йЎҸиүІ
<input type="color" id="textColor" value="#ffffff">

<div class="tabs">
<div class="tab active" data-tab="0">ж–Үеӯ—</div>
<div class="tab" data-tab="1">Emoji</div>
<div class="tab" data-tab="2">йЎҸж–Үеӯ—</div>
<div class="tab" data-tab="3">LOGO</div>
</div>

<div class="tab-content active" data-content="0">
еӨ§е°Ҹ
<input type="range" id="sizeText" min="40" max="200" value="120">
<input id="text" class="big-input" placeholder="ијёе…Ҙж–Үеӯ—">
</div>

<div class="tab-content" data-content="1">
еӨ§е°Ҹ
<input type="range" id="sizeEmoji" min="40" max="200" value="80">
<div class="emoji-panel" id="emojiPanel"></div>
</div>

<div class="tab-content" data-content="2">
еӨ§е°Ҹ
<input type="range" id="sizeKao" min="40" max="200" value="80">
<input id="kaomoji" class="big-input" placeholder="(пјҫв–Ҫпјҫ)">
<div id="kaoList" class="kao-panel"></div>
</div>

<div class="tab-content" data-content="3">
еӨ§е°Ҹ
<input type="range" id="sizeLogo" min="0.5" max="3" step="0.01" value="1">
<input type="file" id="upload">
<input id="logoText" class="big-input" placeholder="LOGOж–Үеӯ—">
</div>

</div>

<div class="card row">
<button class="gray" onclick="resetAll()">йҮҚиЁӯ</button>
<button class="green" onclick="download()">дёӢијү</button>
</div>

</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const textInput=document.getElementById("text");
const kaomojiInput=document.getElementById("kaomoji");
const logoTextInput=document.getElementById("logoText");

const sizeText=document.getElementById("sizeText");
const sizeEmoji=document.getElementById("sizeEmoji");
const sizeKao=document.getElementById("sizeKao");
const sizeLogo=document.getElementById("sizeLogo");

const bgInput=document.getElementById("bg");
const textColorInput=document.getElementById("textColor");

const emojiPanel=document.getElementById("emojiPanel");
const kaoList=document.getElementById("kaoList");
const colorPalette=document.getElementById("colorPalette");
const upload=document.getElementById("upload");

let currentTab=0;
let shape="square";
let transparent=false;

let img=new Image();
let loaded=false;

/* еҲҶй Ғ */
document.querySelectorAll("[data-tab]").forEach(tab=>{
  tab.onclick=()=>{
    currentTab=parseInt(tab.dataset.tab);
    document.querySelectorAll("[data-tab]").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    document.querySelectorAll("[data-content]").forEach(c=>{
      c.classList.remove("active");
      if(c.dataset.content==currentTab) c.classList.add("active");
    });
    draw();
  };
});

/* еҪўзӢҖ */
function setShape(s){
  shape=s;
  draw();
}

/* йҖҸжҳҺ */
function setTransparent(){
  transparent=true;
  draw();
}

/* иүІзҘЁ */
const vivid=["#FF3B30","#FF9500","#FFCC00","#34C759","#00C7BE","#007AFF","#5856D6","#FF2D55","#8E8E93"];
const pastel=["#FFB3BA","#FFD6A5","#FFF3B0","#C8E6C9","#B2EBF2","#B3E5FC","#D1C4E9","#F8BBD0","#E0E0E0"];
const morandi=["#D6A6A6","#D9B08C","#E6D3A3","#A8C3A0","#9EC1CF","#8EA6C9","#B5A6D6","#D6A6C1","#C4C4C4"];

[vivid,pastel,morandi].forEach(group=>{
  group.forEach(c=>{
    const div=document.createElement("div");
    div.className="color";
    div.style.background=c;
    div.onclick=()=>{
      transparent=false;
      bgInput.value=c;
      draw();
    };
    colorPalette.appendChild(div);
  });
});

/* emoji */
["рҹҺ§","рҹҺө","рҹҺ¶","рҹҺӨ","рҹҺё","рҹҘҒ","рҹҺ№","рҹҸӢпёҸ","рҹ§ҳ","рҹҸғ","рҹҡҙ","вҡҪ","рҹҸҖ","рҹҸҠ"].forEach(e=>{
  const d=document.createElement("div");
  d.className="emoji";
  d.innerText=e;
  d.onclick=()=>{textInput.value+=e;draw();}
  emojiPanel.appendChild(d);
});

/* йЎҸж–Үеӯ— */
["аҙҰаөҚаҙҰаҙҝ Лүк’іЛү )вң§","(вү§в–ҪвүҰ)","(T_T)","(В¬_В¬)"].forEach(k=>{
  const d=document.createElement("div");
  d.className="emoji";
  d.innerText=k;
  d.onclick=()=>{kaomojiInput.value=k;draw();}
  kaoList.appendChild(d);
});

/* дёҠеӮі */
upload.onchange=e=>{
const reader=new FileReader();
reader.onload=ev=>{
img.onload=()=>{loaded=true;draw();}
img.src=ev.target.result;
};
reader.readAsDataURL(e.target.files[0]);
};

/* иҮӘеӢ•зё®ж”ҫ */
function autoSize(text){
let size=200;
while(size>20){
ctx.font=`bold ${size}px sans-serif`;
if(ctx.measureText(text).width<460) return size;
size-=2;
}
return size;
}

/* з•«ең– */
function draw(){
ctx.clearRect(0,0,512,512);

if(shape==="circle"){
ctx.save();
ctx.beginPath();
ctx.arc(256,256,256,0,Math.PI*2);
ctx.clip();
}

if(!transparent){
ctx.fillStyle=bgInput.value;
ctx.fillRect(0,0,512,512);
}

ctx.fillStyle=textColorInput.value;
ctx.textAlign="center";
ctx.textBaseline="middle";

let text=textInput.value||kaomojiInput.value||logoTextInput.value||"е“Ҳеӣү";
let size=autoSize(text);

ctx.font=`bold ${size}px sans-serif`;
ctx.fillText(text,256,256);

if(loaded){
ctx.drawImage(img,0,0,512,512);
}

if(shape==="circle") ctx.restore();
}

function download(){
const a=document.createElement("a");
a.href=canvas.toDataURL();
a.download="avatar.png";
a.click();
}

function resetAll(){
textInput.value="";
kaomojiInput.value="";
logoTextInput.value="";
img.src="";
loaded=false;
transparent=false;
draw();
}

draw();
</script>

</body>
</html>
