<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE 大頭照產生器</title>

<style>
body{margin:0;font-family:-apple-system;background:#f3f4f6;}
.header{background:#06C755;color:#fff;padding:20px;text-align:center;font-weight:bold;}
.container{max-width:520px;margin:auto;padding:15px;}
.card{background:#fff;border-radius:16px;padding:15px;margin-bottom:15px;}
canvas{width:100%;border-radius:20px;background:#eee;touch-action:none;}

.tabs{display:flex;gap:20px;border-bottom:2px solid #eee;margin-bottom:10px;}
.tab{padding:10px 0;cursor:pointer;color:#999;font-weight:bold;}
.tab.active{color:#06C755;border-bottom:3px solid #06C755;}

.tab-content{display:none;}
.tab-content.active{display:block;}

.big-input{
  width:100%;
  padding:14px;
  font-size:20px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-top:10px;
}

.colors{
  display:grid;
  grid-template-columns: repeat(9, 1fr);
  gap:8px;
}

.color{
  width:100%;
  aspect-ratio:1;
  border-radius:50%;
  cursor:pointer;
}

/* ⭐ 修正顏文字 */
.emoji-panel{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:10px;
}

.emoji{
  font-size:16px;
  padding:12px;
  background:#f2f2f2;
  border-radius:10px;
  text-align:center;
  word-break:break-all;
}

.slider{margin-top:10px;}

.row{display:flex;gap:10px;}
button{flex:1;padding:12px;border:none;border-radius:10px;font-weight:bold;}
.green{background:#06C755;color:#fff;}
.gray{background:#ddd;}
</style>
</head>

<body>

<div class="header">LINE 大頭照產生器</div>

<div class="container">

<div class="card">
<div class="tabs">
<div class="tab active" onclick="setShape('square')">方形</div>
<div class="tab" onclick="setShape('circle')">圓形</div>
</div>
<canvas id="canvas" width="512" height="512"></canvas>
</div>

<div class="card">

大小
<input type="range" id="size" class="slider" min="40" max="200" value="80">

背景色
<input type="color" id="bg" value="#06C755">
<div class="colors" id="colorPalette"></div>

文字顏色
<input type="color" id="textColor" value="#ffffff">

<div class="tabs">
<div class="tab active" data-tab="0">文字</div>
<div class="tab" data-tab="1">Emoji</div>
<div class="tab" data-tab="2">顏文字</div>
<div class="tab" data-tab="3">LOGO</div>
</div>

<div class="tab-content active" data-content="0">
<input id="text" class="big-input">
</div>

<div class="tab-content" data-content="1">
<div class="emoji-panel" id="emojiPanel"></div>
</div>

<div class="tab-content" data-content="2">
<input id="kaomoji" class="big-input">
<div class="emoji-panel" id="kaomojiPanel"></div>
</div>

<div class="tab-content" data-content="3">
<input type="file" id="upload">
<input id="logoText" class="big-input" placeholder="LOGO文字">
</div>

</div>

<div class="card row">
<button class="gray" onclick="resetAll()">重設</button>
<button class="green" onclick="download()">下載</button>
</div>

</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let currentTab=0,shape="square";
let img=new Image(),loaded=false;
let imgScale=1;

// ⭐ 拖曳控制
let imgX=0,imgY=0,textX=256,textY=450;
let dragging=null;

canvas.onmousedown=e=>{
const rect=canvas.getBoundingClientRect();
const x=e.clientX-rect.left;
const y=e.clientY-rect.top;

if(currentTab===3){
dragging="img";
}
};

canvas.onmousemove=e=>{
if(!dragging)return;

const rect=canvas.getBoundingClientRect();
const x=e.clientX-rect.left;
const y=e.clientY-rect.top;

if(dragging==="img"){
imgX=x-256;
imgY=y-256;
}
draw();
};

canvas.onmouseup=()=>dragging=null;

// 分頁
document.querySelectorAll("[data-tab]").forEach(tab=>{
tab.onclick=()=>{
currentTab=+tab.dataset.tab;
document.querySelectorAll("[data-tab]").forEach(t=>t.classList.remove("active"));
tab.classList.add("active");
document.querySelectorAll("[data-content]").forEach(c=>{
c.classList.remove("active");
if(c.dataset.content==currentTab)c.classList.add("active");
});
draw();
};
});

function setShape(s){shape=s;draw();}

// 色票
const colors=[
"#FF3B30","#FF9500","#FFCC00","#34C759","#00C7BE","#007AFF","#5856D6","#FF2D55","#8E8E93",
"#FFB3BA","#FFD6A5","#FFF3B0","#C8E6C9","#B2EBF2","#B3E5FC","#D1C4E9","#F8BBD0","#E0E0E0",
"#D6A6A6","#D9B08C","#E6D3A3","#A8C3A0","#9EC1CF","#8EA6C9","#B5A6D6","#D6A6C1","#C4C4C4"
];
colors.forEach(c=>{
let d=document.createElement("div");
d.className="color";
d.style.background=c;
d.onclick=()=>{bg.value=c;draw();}
colorPalette.appendChild(d);
});

// emoji（略）

// ⭐ 顏文字（含你指定）
const kaomojis=[
"ദ്ദി ˉ꒳ˉ )✧","( ‘• ω • `)","ฅ^•ﻌ•^ฅ",
"(づ•ᴗ•)づᯓ🍕","꒰ ⩌ᴥ⩌ ꒱","(⑉･̆༥･̆⑉)",
"(＾▽＾)","(≧▽≦)","(T_T)","(・∀・)"
];

kaomojis.forEach(k=>{
let d=document.createElement("div");
d.className="emoji";
d.innerText=k;
d.onclick=()=>{kaomoji.value=k;draw();}
kaomojiPanel.appendChild(d);
});

// 上傳
upload.onchange=e=>{
let r=new FileReader();
r.onload=ev=>{
img.onload=()=>{loaded=true;draw();}
img.src=ev.target.result;
};
r.readAsDataURL(e.target.files[0]);
};

// slider
size.oninput=()=>{
imgScale=size.value/100;
draw();
};

// draw
function draw(){
ctx.clearRect(0,0,512,512);

if(shape==="circle"){
ctx.save();
ctx.beginPath();
ctx.arc(256,256,256,0,Math.PI*2);
ctx.clip();
}

ctx.fillStyle=bg.value;
ctx.fillRect(0,0,512,512);

ctx.fillStyle=textColor.value;
ctx.font="bold "+size.value+"px sans-serif";
ctx.textAlign="center";
ctx.textBaseline="middle";

if(currentTab===0) ctx.fillText(text.value,256,256);
else if(currentTab===2) ctx.fillText(kaomoji.value,256,256);
else if(currentTab===3 && loaded){
let s=512*imgScale;
ctx.drawImage(img,imgX,imgY,s,s);
ctx.fillText(logoText.value,textX,textY);
}

if(shape==="circle") ctx.restore();
}

function download(){
let a=document.createElement("a");
a.href=canvas.toDataURL();
a.download="avatar.png";
a.click();
}

function resetAll(){draw();}

draw();
</script>

</body>
</html>
