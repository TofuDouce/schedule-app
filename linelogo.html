<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE 大頭照產生器</title>

<style>
body{margin:0;font-family:-apple-system;background:#f3f4f6;}
.header{background:#06C755;color:#fff;padding:20px;text-align:center;font-weight:bold;}
.container{max-width:520px;margin:auto;padding:15px;}
.card{background:#fff;border-radius:16px;padding:15px;margin-bottom:15px;}
canvas{width:100%;border-radius:20px;background:#eee;}

.tabs{display:none;} /* 🔥 隱藏原tab UI（功能還在） */

.big-input{
  width:100%;
  padding:14px;
  font-size:20px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-top:10px;
}

.colors{
  display:grid;
  grid-template-columns: repeat(9, 1fr);
  gap:8px;
  margin-top:10px;
}

.color{
  width:100%;
  aspect-ratio:1;
  border-radius:50%;
  cursor:pointer;
}

.emoji-panel{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:10px;
}

.kao-panel{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.emoji{
  font-size:22px;
  text-align:center;
  padding:12px;
  border-radius:10px;
  background:#f2f2f2;
  cursor:pointer;
}

.row{display:flex;gap:10px;}
button{flex:1;padding:14px;border:none;border-radius:10px;font-weight:bold;font-size:16px;}
.green{background:#06C755;color:#fff;}
.gray{background:#ddd;}

/* 🔥 浮動按鈕 */
.fab{
position:fixed;
right:20px;
bottom:20px;
width:56px;
height:56px;
border-radius:50%;
background:#06C755;
color:#fff;
font-size:22px;
border:none;
}

/* 🔥 浮動選單 */
.fabMenu{
position:fixed;
right:20px;
bottom:90px;
display:flex;
flex-direction:column;
gap:10px;
opacity:0;
pointer-events:none;
transition:.25s;
}
.fabMenu.active{
opacity:1;
pointer-events:auto;
}

.fabMenu button{
background:#fff;
color:#000;
border-radius:12px;
padding:10px;
}
</style>
</head>

<body>

<div class="header">LINE 大頭照產生器</div>

<div class="container">

<div class="card">
<canvas id="canvas" width="512" height="512"></canvas>
</div>

<div class="card">

背景色
<input type="color" id="bg" value="#06C755">
<div class="colors" id="colorPalette"></div>

文字顏色
<input type="color" id="textColor" value="#ffffff">

<!-- 原功能（保留） -->
<input id="text" class="big-input">
<input id="kaomoji" class="big-input">
<input id="logoText" class="big-input">
<input type="file" id="upload">

<div class="emoji-panel" id="emojiPanel"></div>
<div id="kaoList" class="kao-panel"></div>

</div>

<div class="card row">
<button class="gray" onclick="resetAll()">重設</button>
<button class="green" onclick="download()">下載</button>
</div>

</div>

<!-- 🔥 浮動工具 -->
<div class="fabMenu" id="fabMenu">
<button onclick="focusText()">文字</button>
<button onclick="openEmoji()">Emoji</button>
<button onclick="openKao()">顏文字</button>
<button onclick="upload.click()">LOGO</button>
</div>

<button class="fab" onclick="toggleFab()">＋</button>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const textInput=document.getElementById("text");
const kaomojiInput=document.getElementById("kaomoji");
const logoTextInput=document.getElementById("logoText");

const bgInput=document.getElementById("bg");
const textColorInput=document.getElementById("textColor");

const emojiPanel=document.getElementById("emojiPanel");
const kaoList=document.getElementById("kaoList");
const colorPalette=document.getElementById("colorPalette");
const upload=document.getElementById("upload");

let img=new Image();
let loaded=false;

/* 🔥 浮動控制 */
function toggleFab(){
fabMenu.classList.toggle("active");
}
function focusText(){
textInput.focus();
}
function openEmoji(){
emojiPanel.style.display="grid";
}
function openKao(){
kaoList.style.display="grid";
}

/* 色票（完全保留） */
const vivid=["#FF3B30","#FF9500","#FFCC00","#34C759","#00C7BE","#007AFF","#5856D6","#FF2D55","#8E8E93"];
const pastel=["#FFB3BA","#FFD6A5","#FFF3B0","#C8E6C9","#B2EBF2","#B3E5FC","#D1C4E9","#F8BBD0","#E0E0E0"];
const morandi=["#D6A6A6","#D9B08C","#E6D3A3","#A8C3A0","#9EC1CF","#8EA6C9","#B5A6D6","#D6A6C1","#C4C4C4"];

[vivid,pastel,morandi].forEach(group=>{
group.forEach(c=>{
const div=document.createElement("div");
div.className="color";
div.style.background=c;
div.onclick=()=>{bgInput.value=c;draw();}
colorPalette.appendChild(div);
});
});

/* emoji */
["🎧","🎵","🎶","🎤","🎸","🥁","🎹","🏋️","🧘","🏃","🚴","⚽","🏀","🏊"].forEach(e=>{
const d=document.createElement("div");
d.className="emoji";
d.innerText=e;
d.onclick=()=>{textInput.value+=e;draw();}
emojiPanel.appendChild(d);
});

/* 顏文字 */
["ദ്ദി ˉ꒳ˉ )✧","(≧▽≦)","(T_T)","(¬_¬)"].forEach(k=>{
const d=document.createElement("div");
d.className="emoji";
d.innerText=k;
d.onclick=()=>{kaomojiInput.value=k;draw();}
kaoList.appendChild(d);
});

/* 上傳 */
upload.onchange=e=>{
const reader=new FileReader();
reader.onload=ev=>{
img.onload=()=>{loaded=true;draw();}
img.src=ev.target.result;
};
reader.readAsDataURL(e.target.files[0]);
};

/* 監聽 */
[textInput,kaomojiInput,logoTextInput,bgInput,textColorInput]
.forEach(el=>el.addEventListener("input",draw));

function draw(){
ctx.clearRect(0,0,512,512);

ctx.fillStyle=bgInput.value;
ctx.fillRect(0,0,512,512);

ctx.fillStyle=textColorInput.value;
ctx.textAlign="center";
ctx.textBaseline="middle";

let text = textInput.value || kaomojiInput.value || logoTextInput.value || "哈囉";

let size=200;
while(size>20){
ctx.font=`bold ${size}px sans-serif`;
if(ctx.measureText(text).width<460) break;
size-=2;
}

ctx.font=`bold ${size}px sans-serif`;
ctx.fillText(text,256,256);

if(loaded){
ctx.drawImage(img,0,0,512,512);
}
}

function download(){
const a=document.createElement("a");
a.href=canvas.toDataURL();
a.download="avatar.png";
a.click();
}

function resetAll(){
textInput.value="";
kaomojiInput.value="";
logoTextInput.value="";
img.src="";
loaded=false;
draw();
}

draw();
</script>

</body>
</html>
