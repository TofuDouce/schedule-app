<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE 大頭照產生器</title>

<style>
body{margin:0;font-family:-apple-system;background:#f3f4f6;}
.header{background:#06C755;color:#fff;padding:20px;text-align:center;font-weight:bold;}
.container{max-width:520px;margin:auto;padding:15px;}
.card{background:#fff;border-radius:16px;padding:15px;margin-bottom:15px;}
canvas{width:100%;border-radius:20px;background:#eee;}

.preview{width:100%;border-radius:20px;margin-top:10px;}

.tabs{display:flex;gap:20px;border-bottom:2px solid #eee;margin-bottom:10px;}
.tab{padding:10px 0;cursor:pointer;color:#999;font-weight:bold;}
.tab.active{color:#06C755;border-bottom:3px solid #06C755;}

.tab-content{display:none;}
.tab-content.active{display:block;}

.big-input{
  width:100%;
  padding:14px;
  font-size:20px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-top:10px;
}

.colors{
  display:grid;
  grid-template-columns: repeat(9, 1fr);
  gap:8px;
  margin-top:10px;
}

.color{
  width:100%;
  aspect-ratio:1;
  border-radius:50%;
  cursor:pointer;
}

.emoji-panel{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:10px;
}

.kao-panel{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.emoji{
  font-size:22px;
  text-align:center;
  padding:12px;
  border-radius:10px;
  background:#f2f2f2;
  cursor:pointer;
}

.row{display:flex;gap:10px;}
button{flex:1;padding:14px;border:none;border-radius:10px;font-weight:bold;font-size:16px;}
.green{background:#06C755;color:#fff;}
.gray{background:#ddd;}

.option{margin-top:10px;display:flex;flex-direction:column;gap:6px;}
</style>
</head>

<body>

<div class="header">LINE 大頭照產生器</div>

<div class="container">

<div class="card">
<div class="tabs">
<div class="tab active" onclick="setShape('square')">方形</div>
<div class="tab" onclick="setShape('circle')">圓形</div>
</div>

<canvas id="canvas" width="1200" height="1200"></canvas>
<img id="preview" class="preview">
</div>

<div class="card">

背景色
<input type="color" id="bg" value="#06C755">

<div class="option">
<label><input type="checkbox" id="transparentBg"> 透明背景</label>
</div>

<div class="colors" id="colorPalette"></div>

文字顏色
<input type="color" id="textColor" value="#ffffff">

<div class="option">
<label><input type="checkbox" id="shadowSoft"> 柔光陰影</label>
<label><input type="checkbox" id="shadowLift"> 立體浮起</label>
<label><input type="checkbox" id="shadowStrong"> 設計陰影</label>
</div>

<div class="tabs">
<div class="tab active" data-tab="0">文字</div>
<div class="tab" data-tab="1">Emoji</div>
<div class="tab" data-tab="2">顏文字</div>
<div class="tab" data-tab="3">LOGO</div>
</div>

<div class="tab-content active" data-content="0">
大小
<input type="range" id="sizeText" min="40" max="200" value="120">
<input id="text" class="big-input" placeholder="輸入文字">
</div>

<div class="tab-content" data-content="1">
大小
<input type="range" id="sizeEmoji" min="40" max="200" value="80">
<div class="emoji-panel" id="emojiPanel"></div>
</div>

<div class="tab-content" data-content="2">
大小
<input type="range" id="sizeKao" min="40" max="200" value="80">
<input id="kaomoji" class="big-input">
<div id="kaoList" class="kao-panel"></div>
</div>

<div class="tab-content" data-content="3">
大小
<input type="range" id="sizeLogo" min="0.5" max="3" step="0.01" value="1">
<input type="file" id="upload">
<input id="logoText" class="big-input">
</div>

</div>

<div class="card row">
<button class="gray" onclick="resetAll()">重設</button>
<button class="green" onclick="download()">下載</button>
</div>

</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const preview=document.getElementById("preview");

const textInput=document.getElementById("text");
const kaomojiInput=document.getElementById("kaomoji");
const logoTextInput=document.getElementById("logoText");

const sizeText=document.getElementById("sizeText");
const sizeEmoji=document.getElementById("sizeEmoji");
const sizeKao=document.getElementById("sizeKao");
const sizeLogo=document.getElementById("sizeLogo");

const bgInput=document.getElementById("bg");
const textColorInput=document.getElementById("textColor");

const transparentBg=document.getElementById("transparentBg");
const shadowSoft=document.getElementById("shadowSoft");
const shadowLift=document.getElementById("shadowLift");
const shadowStrong=document.getElementById("shadowStrong");

const emojiPanel=document.getElementById("emojiPanel");
const kaoList=document.getElementById("kaoList");
const colorPalette=document.getElementById("colorPalette");
const upload=document.getElementById("upload");

let currentTab=0;
let shape="square";

let img=new Image();
let loaded=false;

document.querySelectorAll("[data-tab]").forEach(tab=>{
  tab.onclick=()=>{
    currentTab=parseInt(tab.dataset.tab);

    document.querySelectorAll("[data-tab]").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");

    document.querySelectorAll("[data-content]").forEach(c=>{
      c.classList.remove("active");
      if(c.dataset.content==currentTab) c.classList.add("active");
    });

    draw();
  };
});

function setShape(s){shape=s;draw();}

// 色票（新增2組）
const vivid=["#FF3B30","#FF9500","#FFCC00","#34C759","#00C7BE","#007AFF","#5856D6","#FF2D55","#8E8E93"];
const pastel=["#FFB3BA","#FFD6A5","#FFF3B0","#C8E6C9","#B2EBF2","#B3E5FC","#D1C4E9","#F8BBD0","#E0E0E0"];
const morandi=["#D6A6A6","#D9B08C","#E6D3A3","#A8C3A0","#9EC1CF","#8EA6C9","#B5A6D6","#D6A6C1","#C4C4C4"];
const earth=["#7F5539","#9C6644","#B08968","#A98467","#6C584C","#ADC178","#D4A373","#CCD5AE","#E6CCB2"];
const neon=["#FF00FF","#00FFFF","#39FF14","#FF073A","#FFEA00","#00FFEF","#FF6EC7","#00F5FF","#F000FF"];

[vivid,pastel,morandi,earth,neon].forEach(group=>{
  group.forEach(c=>{
    const div=document.createElement("div");
    div.className="color";
    div.style.background=c;
    div.onclick=()=>{bgInput.value=c;draw();}
    colorPalette.appendChild(div);
  });
});

// emoji & kaomoji（完全保留）
const emojis=["🎧","🎵","🎶","🎤","🎸","🥁","🎹","🏋️","🧘","🏃","🚴","⚽","🏀","🏊","🍔","🍟","🍕","🍣","🍩","🍰","☕","🧋","📚","💻","📱","🎮","🎨","✈️","🚗","🔥","✨","⭐","❤️","💛","💚","💙","💜","🐶","🐱","🐼","🦊","🐰"];
emojis.forEach(e=>{
  const d=document.createElement("div");
  d.className="emoji";
  d.innerText=e;
  d.onclick=()=>{textInput.value+=e;draw();}
  emojiPanel.appendChild(d);
});

const kaomojis=["(≧▽≦)","(￣▽￣)","(T_T)","(ಠ_ಠ)","(•‿•)","(づ｡◕‿‿◕｡)づ"];
kaomojis.forEach(k=>{
  const d=document.createElement("div");
  d.className="emoji";
  d.innerText=k;
  d.onclick=()=>{kaomojiInput.value=k;draw();}
  kaoList.appendChild(d);
});

// 上傳
upload.onchange=e=>{
const reader=new FileReader();
reader.onload=ev=>{
img.onload=()=>{loaded=true;draw();}
img.src=ev.target.result;
};
reader.readAsDataURL(e.target.files[0]);
};

// 監聽
[textInput,kaomojiInput,logoTextInput,sizeText,sizeEmoji,sizeKao,sizeLogo,bgInput,textColorInput,
transparentBg,shadowSoft,shadowLift,shadowStrong]
.forEach(el=>el.addEventListener("input",draw));

function draw(){

ctx.clearRect(0,0,1200,1200);

if(shape==="circle"){
ctx.save();
ctx.beginPath();
ctx.arc(600,600,600,0,Math.PI*2);
ctx.clip();
}

if(!transparentBg.checked){
ctx.fillStyle=bgInput.value;
ctx.fillRect(0,0,1200,1200);
}

ctx.fillStyle=textColorInput.value;
ctx.textAlign="center";
ctx.textBaseline="middle";

function drawTextWithShadow(text,font){
ctx.font=font;

if(shadowSoft.checked){
ctx.shadowColor="rgba(0,0,0,0.15)";
ctx.shadowBlur=30;
ctx.shadowOffsetY=6;
ctx.fillText(text,600,600);
}
if(shadowLift.checked){
ctx.shadowColor="rgba(0,0,0,0.25)";
ctx.shadowBlur=10;
ctx.shadowOffsetY=12;
ctx.fillText(text,600,600);
}
if(shadowStrong.checked){
ctx.shadowColor="rgba(0,0,0,0.4)";
ctx.shadowBlur=2;
ctx.shadowOffsetY=20;
ctx.fillText(text,600,600);
}

ctx.shadowColor="transparent";
ctx.fillText(text,600,600);
}

if(currentTab===0){
drawTextWithShadow(textInput.value||"哈囉",`900 ${sizeText.value}px sans-serif`);
}
if(currentTab===1){
drawTextWithShadow(textInput.value||"🎧",`bold ${sizeEmoji.value}px sans-serif`);
}
if(currentTab===2){
drawTextWithShadow(kaomojiInput.value||"(≧▽≦)",`bold ${sizeKao.value}px sans-serif`);
}
if(currentTab===3){
if(loaded){
let s=parseFloat(sizeLogo.value);
ctx.drawImage(img,(1200-1200*s)/2,(1200-1200*s)/2,1200*s,1200*s);
}
drawTextWithShadow(logoTextInput.value||"",`bold 120px sans-serif`);
}

if(shape==="circle") ctx.restore();

preview.src=canvas.toDataURL("image/png");
}

function download(){
const a=document.createElement("a");
a.href=canvas.toDataURL("image/png");
a.download="avatar.png";
a.click();
}

function resetAll(){
textInput.value="";
kaomojiInput.value="";
logoTextInput.value="";
img.src="";
loaded=false;
draw();
}

draw();
</script>

</body>
</html>
