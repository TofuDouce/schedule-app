<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE 大頭照產生器</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background:#f3f4f6;
}

.header{
  background:#06C755;
  color:#fff;
  padding:20px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

.container{
  max-width:520px;
  margin:auto;
  padding:15px;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:15px;
  margin-bottom:15px;
}

canvas{
  width:100%;
  border-radius:20px;
  background:#eee;
}

.tabs{
  display:flex;
  background:#eee;
  border-radius:12px;
  overflow:hidden;
  margin-bottom:10px;
}

.tabs button{
  flex:1;
  padding:10px;
  border:none;
  background:transparent;
  font-weight:bold;
}

.active{
  background:#fff;
  color:#06C755;
}

.row{
  display:flex;
  gap:10px;
}

.row button{flex:1;}

button{
  padding:12px;
  border-radius:10px;
  border:none;
  font-weight:bold;
}

.green{background:#06C755;color:#fff;}
.gray{background:#ddd;}

.colors{
  display:flex;
  gap:8px;
  margin-top:10px;
}

.color{
  width:32px;height:32px;border-radius:50%;
  cursor:pointer;
}

input{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<div class="header">LINE 大頭照產生器</div>

<div class="container">

<div class="card">
<div class="tabs">
<button id="squareBtn" class="active" onclick="setShape('square')">方形原圖</button>
<button id="circleBtn" onclick="setShape('circle')">圓形顯示</button>
</div>

<canvas id="canvas" width="512" height="512"></canvas>
</div>

<div class="card">

尺寸比例
<div class="row">
<button onclick="setSize(480)">480</button>
<button onclick="setSize(640)">640</button>
<button class="green" onclick="setSize(1080)">1080</button>
</div>

<br>

底色
<input type="color" id="bg" value="#06C755">

<div class="colors">
<div class="color" style="background:#06C755" onclick="pick('#06C755')"></div>
<div class="color" style="background:#FF6B6B" onclick="pick('#FF6B6B')"></div>
<div class="color" style="background:#FFD93D" onclick="pick('#FFD93D')"></div>
<div class="color" style="background:#4D96FF" onclick="pick('#4D96FF')"></div>
<div class="color" style="background:#222" onclick="pick('#222')"></div>
</div>

<br>

文字 / emoji
<input id="text" placeholder="輸入文字或 emoji">

文字顏色
<input type="color" id="textColor" value="#ffffff">

</div>

<div class="card row">
<button class="gray" onclick="resetAll()">重設</button>
<button class="green" onclick="download()">下載 PNG</button>
</div>

</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let size=512;
let shape="square";

function setShape(s){
  shape=s;
  document.getElementById("squareBtn").classList.remove("active");
  document.getElementById("circleBtn").classList.remove("active");

  if(s==="square") document.getElementById("squareBtn").classList.add("active");
  else document.getElementById("circleBtn").classList.add("active");

  draw();
}

function setSize(s){
  size=s;
  canvas.width=s;
  canvas.height=s;
  draw();
}

function pick(c){
  document.getElementById("bg").value=c;
  draw();
}

["bg","text","textColor"].forEach(id=>{
  document.getElementById(id).addEventListener("input",draw);
});

function draw(){
  const bg=document.getElementById("bg").value;
  const text=document.getElementById("text").value;
  const color=document.getElementById("textColor").value;

  ctx.clearRect(0,0,size,size);

  if(shape==="circle"){
    ctx.save();
    ctx.beginPath();
    ctx.arc(size/2,size/2,size/2,0,Math.PI*2);
    ctx.clip();
  }

  ctx.fillStyle=bg;
  ctx.fillRect(0,0,size,size);

  if(text){
    let fontSize=size/3;
    ctx.fillStyle=color;
    ctx.font=`bold ${fontSize}px sans-serif`;

    while(ctx.measureText(text).width>size*0.8){
      fontSize-=5;
      ctx.font=`bold ${fontSize}px sans-serif`;
    }

    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.fillText(text,size/2,size/2);
  }

  if(shape==="circle") ctx.restore();
}

function download(){
  const link=document.createElement("a");
  link.download="line-avatar.png";
  link.href=canvas.toDataURL("image/png");
  link.click();
}

function resetAll(){
  document.getElementById("text").value="";
  document.getElementById("bg").value="#06C755";
  document.getElementById("textColor").value="#ffffff";
  shape="square";
  setShape("square");
}

draw();
</script>

</body>
</html>
