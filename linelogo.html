<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE 大頭照產生器</title>

<style>
body{margin:0;font-family:-apple-system;background:#f3f4f6;}
.header{background:#06C755;color:#fff;padding:20px;text-align:center;font-weight:bold;}
.container{max-width:520px;margin:auto;padding:15px;}
.card{background:#fff;border-radius:16px;padding:15px;margin-bottom:15px;}
canvas{width:100%;border-radius:20px;background:#eee;}

.tabs{display:flex;gap:20px;border-bottom:2px solid #eee;margin-bottom:10px;}
.tab{padding:10px 0;cursor:pointer;color:#999;font-weight:bold;}
.tab.active{color:#06C755;border-bottom:3px solid #06C755;}

.tab-content{display:none;}
.tab-content.active{display:block;}

.big-input{
  width:100%;
  padding:14px;
  font-size:20px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-top:10px;
}

.colors{
  display:grid;
  grid-template-columns: repeat(9, 1fr);
  gap:8px;
  margin-top:10px;
}

.color{
  width:100%;
  aspect-ratio:1;
  border-radius:50%;
  cursor:pointer;
}

.emoji-panel{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:10px;
}

.kao-panel{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.emoji{
  font-size:22px;
  text-align:center;
  padding:12px;
  border-radius:10px;
  background:#f2f2f2;
  cursor:pointer;
}

.row{display:flex;gap:10px;}
button{flex:1;padding:14px;border:none;border-radius:10px;font-weight:bold;font-size:16px;}
.green{background:#06C755;color:#fff;}
.gray{background:#ddd;}
</style>
</head>

<body>

<div class="header">LINE 大頭照產生器</div>

<div class="container">

<div class="card">
<div class="tabs">
<div class="tab active" onclick="setShape('square')">方形</div>
<div class="tab" onclick="setShape('circle')">圓形</div>
</div>
<canvas id="canvas" width="512" height="512"></canvas>
</div>

<div class="card">

背景色
<input type="color" id="bg" value="#06C755">
<div class="colors" id="colorPalette"></div>

文字顏色
<input type="color" id="textColor" value="#ffffff">

<div class="tabs">
<div class="tab active" data-tab="0">文字</div>
<div class="tab" data-tab="1">Emoji</div>
<div class="tab" data-tab="2">顏文字</div>
<div class="tab" data-tab="3">LOGO</div>
</div>

<!-- 文字 -->
<div class="tab-content active" data-content="0">
大小
<input type="range" id="sizeText" min="40" max="200" value="80">
<input id="text" class="big-input">
</div>

<!-- Emoji -->
<div class="tab-content" data-content="1">
Emoji大小
<input type="range" id="sizeEmoji" min="40" max="200" value="80">

<!-- ⭐新增 -->
文字大小
<input type="range" id="sizeEmojiText" min="40" max="200" value="60">
<input id="emojiText" class="big-input" placeholder="輸入文字">

<div class="emoji-panel" id="emojiPanel"></div>
</div>

<!-- 顏文字 -->
<div class="tab-content" data-content="2">
顏文字大小
<input type="range" id="sizeKao" min="40" max="200" value="80">

<!-- ⭐新增 -->
文字大小
<input type="range" id="sizeKaoText" min="40" max="200" value="60">
<input id="kaoText" class="big-input" placeholder="輸入文字">

<input id="kaomoji" class="big-input">
<div id="kaoList" class="kao-panel"></div>
</div>

<!-- LOGO -->
<div class="tab-content" data-content="3">
LOGO大小
<input type="range" id="sizeLogo" min="0.5" max="3" step="0.01" value="1">

<!-- ⭐新增 -->
文字大小
<input type="range" id="sizeLogoText" min="40" max="200" value="60">

<input type="file" id="upload">
<input id="logoText" class="big-input">
</div>

</div>

<div class="card row">
<button class="gray" onclick="resetAll()">重設</button>
<button class="green" onclick="download()">下載</button>
</div>

</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let currentTab=0;
let shape="square";

let img=new Image();
let loaded=false;

// 原本
const textInput=document.getElementById("text");
const kaomojiInput=document.getElementById("kaomoji");
const logoTextInput=document.getElementById("logoText");

const sizeText=document.getElementById("sizeText");
const sizeEmoji=document.getElementById("sizeEmoji");
const sizeKao=document.getElementById("sizeKao");
const sizeLogo=document.getElementById("sizeLogo");

// ⭐新增
const emojiText=document.getElementById("emojiText");
const kaoText=document.getElementById("kaoText");
const sizeEmojiText=document.getElementById("sizeEmojiText");
const sizeKaoText=document.getElementById("sizeKaoText");
const sizeLogoText=document.getElementById("sizeLogoText");

const bgInput=document.getElementById("bg");
const textColorInput=document.getElementById("textColor");

const emojiPanel=document.getElementById("emojiPanel");
const kaoList=document.getElementById("kaoList");
const upload=document.getElementById("upload");

// 分頁
document.querySelectorAll("[data-tab]").forEach(tab=>{
  tab.onclick=()=>{
    currentTab=parseInt(tab.dataset.tab);
    document.querySelectorAll("[data-tab]").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    document.querySelectorAll("[data-content]").forEach(c=>{
      c.classList.remove("active");
      if(c.dataset.content==currentTab) c.classList.add("active");
    });
    draw();
  };
});

function setShape(s){shape=s;draw();}

// emoji
["🎧","🎵","🎸","🏋️","🧘","🏃","⚽","🍔","🍣","☕"].forEach(e=>{
  const d=document.createElement("div");
  d.className="emoji";
  d.innerText=e;
  d.onclick=()=>{emojiText.value+=e;draw();}
  emojiPanel.appendChild(d);
});

// 顏文字
["ദ്ദി ˉ꒳ˉ )✧","( ‘• ω • `)","ฅ^•ﻌ•^ฅ","(づ•ᴗ•)づᯓ🍕"]
.forEach(k=>{
  const d=document.createElement("div");
  d.className="emoji";
  d.innerText=k;
  d.onclick=()=>{kaomojiInput.value=k;draw();}
  kaoList.appendChild(d);
});

// 上傳
upload.onchange=e=>{
const reader=new FileReader();
reader.onload=ev=>{
img.onload=()=>{loaded=true;draw();}
img.src=ev.target.result;
};
reader.readAsDataURL(e.target.files[0]);
};

// 監聽（保留 + 新增）
document.querySelectorAll("input").forEach(el=>el.addEventListener("input",draw));

// 畫圖
function draw(){
ctx.clearRect(0,0,512,512);

ctx.fillStyle=bgInput.value;
ctx.fillRect(0,0,512,512);

ctx.fillStyle=textColorInput.value;
ctx.textAlign="center";
ctx.textBaseline="middle";

if(currentTab===0){
ctx.font=`bold ${sizeText.value}px sans-serif`;
ctx.fillText(textInput.value||"哈囉",256,256);
}

if(currentTab===1){
ctx.font=`bold ${sizeEmoji.value}px sans-serif`;
ctx.fillText(emojiText.value||"🎧",256,200);

ctx.font=`bold ${sizeEmojiText.value}px sans-serif`;
ctx.fillText(emojiText.value||"",256,350);
}

if(currentTab===2){
ctx.font=`bold ${sizeKao.value}px sans-serif`;
ctx.fillText(kaomojiInput.value||"(＾▽＾)",256,200);

ctx.font=`bold ${sizeKaoText.value}px sans-serif`;
ctx.fillText(kaoText.value||"",256,350);
}

if(currentTab===3){
if(loaded){
let s=parseFloat(sizeLogo.value);
ctx.drawImage(img,(512-512*s)/2,(512-512*s)/2,512*s,512*s);
}
ctx.font=`bold ${sizeLogoText.value}px sans-serif`;
ctx.fillText(logoTextInput.value||"",256,256);
}
}

function download(){
const a=document.createElement("a");
a.href=canvas.toDataURL();
a.download="avatar.png";
a.click();
}

function resetAll(){
document.querySelectorAll("input").forEach(i=>i.value="");
img.src="";
loaded=false;
draw();
}

draw();
</script>

</body>
</html>
