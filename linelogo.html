<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE 大頭照產生器</title>

<style>
body{margin:0;font-family:-apple-system;background:#f3f4f6;}
.header{background:#06C755;color:#fff;padding:20px;text-align:center;font-weight:bold;}
.container{max-width:520px;margin:auto;padding:15px;}
.card{background:#fff;border-radius:16px;padding:15px;margin-bottom:15px;}
canvas{width:100%;border-radius:20px;background:#eee;touch-action:none;}

.row{display:flex;gap:10px;}
.row button{flex:1;}

button{padding:10px;border:none;border-radius:10px;font-weight:bold;}
.green{background:#06C755;color:#fff;}
.gray{background:#ddd;}

.tabs,.emoji-tabs{
  display:flex;background:#eee;border-radius:10px;margin-bottom:10px;
}
.tabs button,.emoji-tabs button{
  flex:1;background:none;
}

.active{background:#fff;color:#06C755;}

input,select{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid #ddd;
}

.colors{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.color{width:28px;height:28px;border-radius:50%;cursor:pointer;}

.emoji-panel{display:flex;flex-wrap:wrap;gap:6px;}
.emoji{font-size:22px;cursor:pointer;padding:6px;border-radius:8px;}
.emoji:hover{background:#eee;}
</style>
</head>

<body>

<div class="header">LINE 大頭照產生器</div>

<div class="container">

<div class="card">
<div class="tabs">
<button id="sq" class="active" onclick="setShape('square')">方形</button>
<button id="ci" onclick="setShape('circle')">圓形</button>
</div>

<canvas id="canvas" width="512" height="512"></canvas>
</div>

<div class="card">

<input type="file" id="upload">

縮放
<input type="range" id="scale" min="0.5" max="3" step="0.01" value="1">

背景色
<input type="color" id="bg" value="#06C755">

<div class="colors" id="colorPalette"></div>

文字 / emoji
<input id="text">

<!-- emoji 分類 -->
<div class="emoji-tabs">
<button onclick="setEmojiTab(0)" class="active">😀</button>
<button onclick="setEmojiTab(1)">🐶</button>
<button onclick="setEmojiTab(2)">❤️</button>
</div>

<div class="emoji-panel" id="emojiPanel"></div>

字體
<select id="font">
<option value="sans-serif">預設</option>
<option value="Arial Black">粗體</option>
<option value="Comic Sans MS">可愛</option>
</select>

文字顏色
<input type="color" id="textColor" value="#ffffff">

</div>

<div class="card row">
<button class="gray" onclick="resetAll()">重設</button>
<button class="green" onclick="download()">下載</button>
</div>

</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let img=new Image();
let loaded=false;

let offsetX=0,offsetY=0;
let isDragging=false;

let textX=256,textY=256;
let draggingText=false;

let shape="square";

const morandiColors=[
"#D6A6A6","#D9B08C","#E6D3A3","#A8C3A0",
"#9EC1CF","#8EA6C9","#B5A6D6","#D6A6C1",
"#C4C4C4","#6E6E6E"
];

const emojiSets=[
["😀","😎","🥺","😂","🔥","✨","🎉"],
["🐶","🐱","🐼","🐸","🦊","🐰"],
["❤️","💛","💙","💜","🖤","💕"]
];

let currentEmojiSet=0;

function init(){
  const palette=document.getElementById("colorPalette");
  morandiColors.forEach(c=>{
    const d=document.createElement("div");
    d.className="color";
    d.style.background=c;
    d.onclick=()=>{bg.value=c;draw();}
    palette.appendChild(d);
  });

  renderEmoji();
}

function renderEmoji(){
  const panel=document.getElementById("emojiPanel");
  panel.innerHTML="";
  emojiSets[currentEmojiSet].forEach(e=>{
    const s=document.createElement("span");
    s.className="emoji";
    s.innerText=e;
    s.onclick=()=>{
      text.value+=e;
      draw();
    };
    panel.appendChild(s);
  });
}

function setEmojiTab(i){
  currentEmojiSet=i;
  document.querySelectorAll(".emoji-tabs button")
    .forEach((b,idx)=>b.classList.toggle("active",idx===i));
  renderEmoji();
}

function setShape(s){
  shape=s;
  document.getElementById("sq").classList.toggle("active",s==="square");
  document.getElementById("ci").classList.toggle("active",s==="circle");
  draw();
}

upload.onchange=e=>{
const file=e.target.files[0];
const reader=new FileReader();
reader.onload=ev=>{
img.onload=()=>{loaded=true;draw();}
img.src=ev.target.result;
};
reader.readAsDataURL(file);
};

["bg","text","scale","textColor","font"].forEach(id=>{
document.getElementById(id).addEventListener("input",draw);
});

// 拖曳（判斷文字或圖片）
canvas.addEventListener("mousedown",e=>{
  const dx=e.offsetX-textX;
  const dy=e.offsetY-textY;
  if(Math.abs(dx)<100 && Math.abs(dy)<50){
    draggingText=true;
  }else{
    isDragging=true;
  }
});

canvas.addEventListener("mouseup",()=>{
  isDragging=false;
  draggingText=false;
});

canvas.addEventListener("mousemove",e=>{
  if(isDragging){
    offsetX+=e.movementX;
    offsetY+=e.movementY;
    draw();
  }
  if(draggingText){
    textX+=e.movementX;
    textY+=e.movementY;
    draw();
  }
});

function draw(){
const bgColor=bg.value;
const txt=text.value;
const scale=parseFloat(scaleInput.value||scale.value);
const color=textColor.value;
const font=fontSelect.value||font.value;

ctx.clearRect(0,0,512,512);

if(shape==="circle"){
ctx.save();
ctx.beginPath();
ctx.arc(256,256,256,0,Math.PI*2);
ctx.clip();
}

ctx.fillStyle=bgColor;
ctx.fillRect(0,0,512,512);

if(loaded){
const size=Math.min(img.width,img.height);
ctx.drawImage(
img,
0,0,size,size,
offsetX+256-256*scale,
offsetY+256-256*scale,
512*scale,
512*scale
);
}

if(txt){
let fontSize=120;
ctx.font=`bold ${fontSize}px ${font}`;
while(ctx.measureText(txt).width>420){
  fontSize-=4;
  ctx.font=`bold ${fontSize}px ${font}`;
}

ctx.fillStyle=color;
ctx.textAlign="center";
ctx.textBaseline="middle";
ctx.fillText(txt,textX,textY);
}

if(shape==="circle") ctx.restore();
}

function download(){
const a=document.createElement("a");
a.href=canvas.toDataURL("image/png");
a.download="avatar.png";
a.click();
}

function resetAll(){
offsetX=0;offsetY=0;
textX=256;textY=256;
text.value="";
draw();
}

// 修正變數引用
const bg=document.getElementById("bg");
const text=document.getElementById("text");
const scaleInput=document.getElementById("scale");
const textColor=document.getElementById("textColor");
const fontSelect=document.getElementById("font");
const upload=document.getElementById("upload");

init();
draw();
</script>

</body>
</html>
