<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE 大頭照產生器</title>

<style>
body{margin:0;font-family:-apple-system;background:#f3f4f6;}
.header{background:#06C755;color:#fff;padding:20px;text-align:center;font-weight:bold;}
.container{max-width:520px;margin:auto;padding:15px;}
.card{background:#fff;border-radius:16px;padding:15px;margin-bottom:15px;}
canvas{width:100%;border-radius:20px;background:#eee;}

.tabs{
  display:flex;
  gap:20px;
  border-bottom:2px solid #eee;
  margin-bottom:10px;
}
.tab{
  padding:10px 0;
  cursor:pointer;
  color:#999;
  font-weight:bold;
}
.tab.active{
  color:#06C755;
  border-bottom:3px solid #06C755;
}

.tab-content{display:none;}
.tab-content.active{display:block;}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

.colors{
  display:grid;
  grid-template-columns: repeat(9, 1fr);
  gap:8px;
  margin-top:10px;
}

.color{
  width:100%;
  aspect-ratio:1;
  border-radius:50%;
  cursor:pointer;
}

.emoji-panel{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:10px;
}

.emoji{
  font-size:22px;
  cursor:pointer;
  padding:6px;
  border-radius:8px;
}

.row{display:flex;gap:10px;}
button{flex:1;padding:12px;border:none;border-radius:10px;font-weight:bold;}
.green{background:#06C755;color:#fff;}
.gray{background:#ddd;}
</style>
</head>

<body>

<div class="header">LINE 大頭照產生器</div>

<div class="container">

<div class="card">
<canvas id="canvas" width="512" height="512"></canvas>
</div>

<div class="card">

<!-- 分頁 -->
<div class="tabs">
<div class="tab active" data-tab="0">文字</div>
<div class="tab" data-tab="1">Emoji</div>
<div class="tab" data-tab="2">文字+Emoji</div>
<div class="tab" data-tab="3">LOGO</div>
</div>

<!-- 文字 -->
<div class="tab-content active" data-content="0">
<input id="text" placeholder="輸入文字">
</div>

<!-- emoji -->
<div class="tab-content" data-content="1">
<div class="emoji-panel" id="emojiPanel"></div>
</div>

<!-- 混合 -->
<div class="tab-content" data-content="2">
<input id="mixText" placeholder="文字 + emoji">
</div>

<!-- LOGO -->
<div class="tab-content" data-content="3">
<input type="file" id="upload">
</div>

背景色
<input type="color" id="bg" value="#06C755">

<div class="colors" id="colorPalette"></div>

文字顏色
<input type="color" id="textColor" value="#ffffff">

</div>

<div class="card row">
<button class="gray" id="resetBtn">重設</button>
<button class="green" id="downloadBtn">下載</button>
</div>

</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const textInput = document.getElementById("text");
const mixInput = document.getElementById("mixText");
const bgInput = document.getElementById("bg");
const textColorInput = document.getElementById("textColor");
const uploadInput = document.getElementById("upload");

let currentTab = 0;
let img = new Image();
let loaded = false;

// ===== 分頁 =====
document.querySelectorAll(".tab").forEach(tab=>{
  tab.addEventListener("click",()=>{
    currentTab = parseInt(tab.dataset.tab);

    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");

    document.querySelectorAll(".tab-content").forEach(c=>{
      c.classList.remove("active");
      if(c.dataset.content == currentTab){
        c.classList.add("active");
      }
    });

    draw();
  });
});

// ===== 色票 =====
const vividColors=["#FF3B30","#FF9500","#FFCC00","#34C759","#00C7BE","#007AFF","#5856D6","#FF2D55","#8E8E93"];
const pastelColors=["#FFB3BA","#FFD6A5","#FFF3B0","#C8E6C9","#B2EBF2","#B3E5FC","#D1C4E9","#F8BBD0","#E0E0E0"];
const morandiColors=["#D6A6A6","#D9B08C","#E6D3A3","#A8C3A0","#9EC1CF","#8EA6C9","#B5A6D6","#D6A6C1","#C4C4C4"];

function initColors(){
  const palette=document.getElementById("colorPalette");
  [vividColors,pastelColors,morandiColors].forEach(group=>{
    group.forEach(color=>{
      const div=document.createElement("div");
      div.className="color";
      div.style.background=color;
      div.onclick=()=>{
        bgInput.value=color;
        draw();
      };
      palette.appendChild(div);
    });
  });
}

// ===== emoji =====
const emojis=["😀","😎","🥺","😂","🔥","❤️","✨","🎉","🐶","🍀","🌈","🍩"];

function initEmoji(){
  const panel=document.getElementById("emojiPanel");
  emojis.forEach(e=>{
    const span=document.createElement("span");
    span.className="emoji";
    span.innerText=e;
    span.onclick=()=>{
      textInput.value += e;
      draw();
    };
    panel.appendChild(span);
  });
}

// ===== 上傳 =====
uploadInput.addEventListener("change", e=>{
  const file=e.target.files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=function(ev){
    img.onload=function(){
      loaded=true;
      draw();
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
});

// ===== 監聽 =====
[textInput, mixInput, bgInput, textColorInput].forEach(el=>{
  el.addEventListener("input", draw);
});

// ===== 畫圖 =====
function draw(){
  ctx.fillStyle = bgInput.value;
  ctx.fillRect(0,0,512,512);

  ctx.fillStyle = textColorInput.value;
  ctx.font = "bold 80px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  if(currentTab===0){
    ctx.fillText(textInput.value,256,256);
  }
  else if(currentTab===1){
    ctx.fillText(textInput.value,256,256);
  }
  else if(currentTab===2){
    ctx.fillText(mixInput.value,256,256);
  }
  else if(currentTab===3 && loaded){
    ctx.drawImage(img,0,0,512,512);
  }
}

// ===== 按鈕 =====
document.getElementById("downloadBtn").onclick=()=>{
  const a=document.createElement("a");
  a.href=canvas.toDataURL("image/png");
  a.download="avatar.png";
  a.click();
};

document.getElementById("resetBtn").onclick=()=>{
  textInput.value="";
  mixInput.value="";
  draw();
};

// ===== 初始化 =====
initColors();
initEmoji();
draw();
</script>

</body>
</html>
