<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE еӨ§й ӯз…§з”ўз”ҹеҷЁ</title>

<style>
body{margin:0;font-family:-apple-system;background:#f3f4f6;}
.header{background:#06C755;color:#fff;padding:20px;text-align:center;font-weight:bold;}
.container{max-width:520px;margin:auto;padding:15px;}
.card{background:#fff;border-radius:16px;padding:15px;margin-bottom:15px;}
canvas{width:100%;border-radius:20px;background:#eee;touch-action:none;}

.tabs{display:flex;gap:20px;border-bottom:2px solid #eee;margin-bottom:10px;}
.tab{padding:10px 0;color:#999;font-weight:bold;cursor:pointer;}
.tab.active{color:#06C755;border-bottom:3px solid #06C755;}

.tab-content{display:none;}
.tab-content.active{display:block;}

.big-input{
width:100%;padding:14px;font-size:20px;border-radius:12px;border:1px solid #ddd;margin-top:10px;
}

.colors{
display:grid;
grid-template-columns:repeat(9,1fr);
gap:8px;
}
.color{
width:100%;
aspect-ratio:1;
border-radius:50%;
cursor:pointer;
}

/* emoji */
.emoji-panel{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:10px;
}
.emoji{
font-size:22px;
padding:10px;
background:#f2f2f2;
border-radius:10px;
text-align:center;
cursor:pointer;
}

/* йЎҸж–Үеӯ—пјҲ2ж¬„пјү */
.kaomoji-panel{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}
.kaomoji{
font-size:18px;
padding:16px;
background:#f2f2f2;
border-radius:12px;
text-align:center;
white-space:nowrap;
cursor:pointer;
}

.row{display:flex;gap:10px;}
button{flex:1;padding:12px;border:none;border-radius:10px;font-weight:bold;}
.green{background:#06C755;color:#fff;}
.gray{background:#ddd;}
</style>
</head>

<body>

<div class="header">LINE еӨ§й ӯз…§з”ўз”ҹеҷЁ</div>

<div class="container">

<div class="card">
<div class="tabs">
<div class="tab active" onclick="setShape('square')">ж–№еҪў</div>
<div class="tab" onclick="setShape('circle')">ең“еҪў</div>
</div>
<canvas id="canvas" width="512" height="512"></canvas>
</div>

<div class="card">

еӨ§е°Ҹ
<input type="range" id="size" min="40" max="200" value="80">

иғҢжҷҜиүІ
<input type="color" id="bg" value="#06C755">
<div class="colors" id="colorPalette"></div>

ж–Үеӯ—йЎҸиүІ
<input type="color" id="textColor" value="#ffffff">

<div class="tabs">
<div class="tab active" data-tab="0">ж–Үеӯ—</div>
<div class="tab" data-tab="1">Emoji</div>
<div class="tab" data-tab="2">йЎҸж–Үеӯ—</div>
<div class="tab" data-tab="3">LOGO</div>
</div>

<div class="tab-content active" data-content="0">
<input id="text" class="big-input">
</div>

<div class="tab-content" data-content="1">
<div class="emoji-panel" id="emojiPanel"></div>
</div>

<div class="tab-content" data-content="2">
<input id="kaomoji" class="big-input">
<div class="kaomoji-panel" id="kaomojiPanel"></div>
</div>

<div class="tab-content" data-content="3">
<input type="file" id="upload">
<input id="logoText" class="big-input" placeholder="LOGOж–Үеӯ—">
</div>

</div>

<div class="card row">
<button class="gray" onclick="resetAll()">йҮҚиЁӯ</button>
<button class="green" onclick="download()">дёӢијү</button>
</div>

</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let currentTab=0,shape="square";
let img=new Image(),loaded=false;
let imgScale=1;

// жӢ–жӣі
let dragging=null;
let imgX=0,imgY=0;
let textX=256,textY=450;

canvas.addEventListener("mousedown",startDrag);
canvas.addEventListener("touchstart",startDrag);

canvas.addEventListener("mousemove",drag);
canvas.addEventListener("touchmove",drag);

canvas.addEventListener("mouseup",()=>dragging=null);
canvas.addEventListener("touchend",()=>dragging=null);

function getPos(e){
if(e.touches)return{
x:e.touches[0].clientX,
y:e.touches[0].clientY
};
return{x:e.clientX,y:e.clientY};
}

function startDrag(e){
if(currentTab!==3)return;
dragging="img";
}

function drag(e){
if(!dragging)return;
let pos=getPos(e);
let rect=canvas.getBoundingClientRect();

imgX=pos.x-rect.left-256;
imgY=pos.y-rect.top-256;

draw();
}

// еҲҶй Ғ
document.querySelectorAll("[data-tab]").forEach(tab=>{
tab.onclick=()=>{
currentTab=+tab.dataset.tab;
document.querySelectorAll("[data-tab]").forEach(t=>t.classList.remove("active"));
tab.classList.add("active");
document.querySelectorAll("[data-content]").forEach(c=>{
c.classList.remove("active");
if(c.dataset.content==currentTab)c.classList.add("active");
});
draw();
};
});

function setShape(s){shape=s;draw();}

// иүІзҘЁ
const colors=["#FF3B30","#FF9500","#FFCC00","#34C759","#00C7BE","#007AFF","#5856D6","#FF2D55","#8E8E93",
"#FFB3BA","#FFD6A5","#FFF3B0","#C8E6C9","#B2EBF2","#B3E5FC","#D1C4E9","#F8BBD0","#E0E0E0",
"#D6A6A6","#D9B08C","#E6D3A3","#A8C3A0","#9EC1CF","#8EA6C9","#B5A6D6","#D6A6C1","#C4C4C4"];

colors.forEach(c=>{
let d=document.createElement("div");
d.className="color";
d.style.background=c;
d.onclick=()=>{bg.value=c;draw();}
colorPalette.appendChild(d);
});

// emoji
["рҹҳҖ","рҹҳӮ","рҹҳҚ","рҹҘә","рҹҳҺ","рҹ”Ҙ","вқӨпёҸ","вңЁ","рҹҗ¶","рҹҚҖ","рҹҢҲ","рҹҚ©"].forEach(e=>{
let d=document.createElement("div");
d.className="emoji";
d.innerText=e;
d.onclick=()=>{text.value+=e;draw();}
emojiPanel.appendChild(d);
});

// йЎҸж–Үеӯ—
["аҙҰаөҚаҙҰаҙҝ Лүк’іЛү )вң§","( вҖҳвҖў Пү вҖў `)","аё…^вҖўп»ҢвҖў^аё…","(гҒҘвҖўбҙ—вҖў)гҒҘбҜ“рҹҚ•","к’° в©ҢбҙҘв©Ң к’ұ","(в‘үпҪҘМҶајҘпҪҘМҶв‘ү)"].forEach(k=>{
let d=document.createElement("div");
d.className="kaomoji";
d.innerText=k;
d.onclick=()=>{kaomoji.value=k;draw();}
kaomojiPanel.appendChild(d);
});

// дёҠеӮі
upload.onchange=e=>{
let r=new FileReader();
r.onload=ev=>{
img.onload=()=>{loaded=true;draw();}
img.src=ev.target.result;
};
r.readAsDataURL(e.target.files[0]);
};

// slider
size.oninput=()=>{imgScale=size.value/100;draw();};

// draw
function draw(){
ctx.clearRect(0,0,512,512);

if(shape==="circle"){
ctx.save();
ctx.beginPath();
ctx.arc(256,256,256,0,Math.PI*2);
ctx.clip();
}

ctx.fillStyle=bg.value;
ctx.fillRect(0,0,512,512);

ctx.fillStyle=textColor.value;
ctx.font="bold "+size.value+"px sans-serif";
ctx.textAlign="center";
ctx.textBaseline="middle";

if(currentTab===0) ctx.fillText(text.value,256,256);
else if(currentTab===2) ctx.fillText(kaomoji.value,256,256);
else if(currentTab===3 && loaded){
let s=512*imgScale;
ctx.drawImage(img,imgX,imgY,s,s);
ctx.fillText(logoText.value,textX,textY);
}

if(shape==="circle") ctx.restore();
}

function download(){
let a=document.createElement("a");
a.href=canvas.toDataURL();
a.download="avatar.png";
a.click();
}

function resetAll(){draw();}

draw();
</script>

</body>
</html>
