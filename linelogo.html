<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE 大頭照產生器</title>

<style>
body{margin:0;font-family:-apple-system;background:#f3f4f6;}
.header{background:#06C755;color:#fff;padding:20px;text-align:center;font-weight:bold;}
.container{max-width:520px;margin:auto;padding:15px;}
.card{background:#fff;border-radius:16px;padding:15px;margin-bottom:15px;}
canvas{width:100%;border-radius:20px;background:#eee;}

.tabs{display:flex;gap:20px;border-bottom:2px solid #eee;margin-bottom:10px;}
.tab{padding:10px 0;color:#999;font-weight:bold;cursor:pointer;}
.tab.active{color:#06C755;border-bottom:3px solid #06C755;}

.tab-content{display:none;}
.tab-content.active{display:block;}

.big-input{width:100%;padding:14px;font-size:20px;border-radius:12px;border:1px solid #ddd;margin-top:10px;}

.colors{display:grid;grid-template-columns:repeat(9,1fr);gap:8px;margin-top:10px;}
.color{aspect-ratio:1;border-radius:50%;cursor:pointer;}

.emoji-panel{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
.emoji{font-size:22px;padding:10px;background:#f2f2f2;border-radius:10px;text-align:center;cursor:pointer;}
</style>
</head>

<body>

<div class="header">LINE 大頭照產生器</div>

<div class="container">

<div class="card">
<canvas id="canvas" width="512" height="512"></canvas>
</div>

<div class="card">

背景色
<input type="color" id="bg" value="#06C755">
<div class="colors" id="colorPalette"></div>

文字顏色
<input type="color" id="textColor" value="#ffffff">

<div class="tabs">
<div class="tab active" data-tab="0">文字</div>
<div class="tab" data-tab="1">Emoji</div>
<div class="tab" data-tab="2">顏文字</div>
<div class="tab" data-tab="3">LOGO</div>
</div>

<!-- 文字 -->
<div class="tab-content active" data-content="0">
大小
<input type="range" id="sizeText" min="40" max="200" value="80">
<input id="text" class="big-input">
</div>

<!-- emoji -->
<div class="tab-content" data-content="1">
大小
<input type="range" id="sizeEmoji" min="40" max="200" value="80">
<div class="emoji-panel" id="emojiPanel"></div>
</div>

<!-- 顏文字 -->
<div class="tab-content" data-content="2">
大小
<input type="range" id="sizeKao" min="40" max="200" value="80">
<input id="kaomoji" class="big-input">
</div>

<!-- LOGO -->
<div class="tab-content" data-content="3">
大小
<input type="range" id="sizeLogo" min="0.5" max="3" step="0.01" value="1">
<input type="file" id="upload">
</div>

</div>

<div class="card">
<button onclick="resetAll()">重設</button>
<button onclick="download()">下載</button>
</div>

</div>

<script>
// ===== DOM =====
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const textInput=document.getElementById("text");
const kaomojiInput=document.getElementById("kaomoji");

const sizeText=document.getElementById("sizeText");
const sizeEmoji=document.getElementById("sizeEmoji");
const sizeKao=document.getElementById("sizeKao");
const sizeLogo=document.getElementById("sizeLogo");

const bgInput=document.getElementById("bg");
const textColor=document.getElementById("textColor");

const emojiPanel=document.getElementById("emojiPanel");
const upload=document.getElementById("upload");
const colorPalette=document.getElementById("colorPalette");

// ===== 狀態 =====
let currentTab=0;
let img=new Image();
let loaded=false;

// ===== 分頁 =====
document.querySelectorAll("[data-tab]").forEach(tab=>{
tab.onclick=()=>{
currentTab=+tab.dataset.tab;

document.querySelectorAll("[data-tab]").forEach(t=>t.classList.remove("active"));
tab.classList.add("active");

document.querySelectorAll("[data-content]").forEach(c=>{
c.classList.remove("active");
if(c.dataset.content==currentTab)c.classList.add("active");
});

draw();
};
});

// ===== 色票 =====
const colors=[
"#FF3B30","#FF9500","#FFCC00","#34C759","#00C7BE","#007AFF","#5856D6","#FF2D55","#8E8E93",
"#FFB3BA","#FFD6A5","#FFF3B0","#C8E6C9","#B2EBF2","#B3E5FC","#D1C4E9","#F8BBD0","#E0E0E0",
"#D6A6A6","#D9B08C","#E6D3A3","#A8C3A0","#9EC1CF","#8EA6C9","#B5A6D6","#D6A6C1","#C4C4C4"
];

colors.forEach(c=>{
let d=document.createElement("div");
d.className="color";
d.style.background=c;
d.onclick=()=>{bgInput.value=c;draw();}
colorPalette.appendChild(d);
});

// ===== emoji =====
const emojis=[
"😀","😁","😂","🤣","😎","🥺","😍","😘","😜","🤩","🥳","😭",
"🐶","🐱","🐼","🐸","🦊","🐰",
"🍎","🍊","🍉","🍇","🍓","🍩",
"🍔","🍟","🍕","🌸","🌻","🌈",
"⭐","✨","🔥","❤️","💛","💚",
"💙","💜","🖤","🤍","🤎","💗",
"💖","💘","💝","💞","💕","💓"
];

emojis.forEach(e=>{
let d=document.createElement("div");
d.className="emoji";
d.innerText=e;
d.onclick=()=>{
if(currentTab===1){
drawText=e;
draw();
}
};
emojiPanel.appendChild(d);
});

// ===== 上傳 =====
upload.onchange=e=>{
let r=new FileReader();
r.onload=ev=>{
img.onload=()=>{loaded=true;draw();}
img.src=ev.target.result;
};
r.readAsDataURL(e.target.files[0]);
};

// ===== draw =====
let drawText="哈囉";

function draw(){
ctx.clearRect(0,0,512,512);

// 背景
ctx.fillStyle=bgInput.value;
ctx.fillRect(0,0,512,512);

ctx.fillStyle=textColor.value;
ctx.textAlign="center";
ctx.textBaseline="middle";

if(currentTab===0){
drawText=textInput.value||"哈囉";
ctx.font="bold "+sizeText.value+"px sans-serif";
ctx.fillText(drawText,256,256);
}

if(currentTab===1){
ctx.font="bold "+sizeEmoji.value+"px sans-serif";
ctx.fillText(drawText||"😀",256,256);
}

if(currentTab===2){
drawText=kaomojiInput.value||"(＾▽＾)";
ctx.font="bold "+sizeKao.value+"px sans-serif";
ctx.fillText(drawText,256,256);
}

if(currentTab===3 && loaded){
let s=parseFloat(sizeLogo.value);
let w=512*s;
let h=512*s;
let x=(512-w)/2;
let y=(512-h)/2;
ctx.drawImage(img,x,y,w,h);
}
}

// ===== 監聽 =====
[textInput,kaomojiInput,sizeText,sizeEmoji,sizeKao,sizeLogo,bgInput,textColor]
.forEach(el=>el.oninput=draw);

// ===== reset =====
function resetAll(){
textInput.value="";
kaomojiInput.value="";
sizeText.value=80;
sizeEmoji.value=80;
sizeKao.value=80;
sizeLogo.value=1;
drawText="哈囉";
img.src="";
loaded=false;
draw();
}

// ===== download =====
function download(){
let a=document.createElement("a");
a.href=canvas.toDataURL();
a.download="avatar.png";
a.click();
}

draw();
</script>

</body>
</html>
