<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE 大頭照產生器</title>

<style>
body{margin:0;font-family:-apple-system;background:#f3f4f6;}
.header{background:#06C755;color:#fff;padding:20px;text-align:center;font-weight:bold;}
.container{max-width:520px;margin:auto;padding:15px;}
.card{background:#fff;border-radius:16px;padding:15px;margin-bottom:15px;}
canvas{width:100%;border-radius:20px;background:#eee;touch-action:none;}

.colors{display:grid;grid-template-columns:repeat(9,1fr);gap:8px;}
.color{aspect-ratio:1;border-radius:50%;cursor:pointer;}

.row{display:flex;gap:10px;}
button{flex:1;padding:12px;border:none;border-radius:10px;font-weight:bold;}
.green{background:#06C755;color:#fff;}
.gray{background:#ddd;}
</style>
</head>

<body>

<div class="header">LINE 大頭照產生器</div>

<div class="container">

<div class="card">
<canvas id="canvas" width="512" height="512"></canvas>
</div>

<div class="card">

文字
<input id="text" value="哈囉">

文字大小
<input type="range" id="fontSize" min="40" max="200" value="100">

背景色
<input type="color" id="bg" value="#06C755">

<div class="colors" id="palette"></div>

文字顏色
<input type="color" id="textColor" value="#ffffff">

LOGO
<input type="file" id="upload">

圖片縮放
<input type="range" id="imgScale" min="0.5" max="3" step="0.01" value="1">

</div>

<div class="card row">
<button class="gray" onclick="resetAll()">重設</button>
<button class="green" onclick="download()">下載</button>
</div>

</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

// ===== 狀態 =====
let text="哈囉";
let fontSize=100;
let bgColor="#06C755";
let textColor="#ffffff";

let img=new Image();
let imgLoaded=false;
let imgX=0,imgY=0,imgScale=1;

let dragging=false;

// ===== DOM =====
const textInput=document.getElementById("text");
const fontSlider=document.getElementById("fontSize");
const bgInput=document.getElementById("bg");
const textColorInput=document.getElementById("textColor");
const imgScaleSlider=document.getElementById("imgScale");

// ===== 色票 =====
const colors=["#FF3B30","#FF9500","#FFCC00","#34C759","#00C7BE","#007AFF","#5856D6","#FF2D55","#8E8E93"];

colors.forEach(c=>{
let d=document.createElement("div");
d.className="color";
d.style.background=c;
d.onclick=()=>{bgColor=c;bgInput.value=c;draw();}
palette.appendChild(d);
});

// ===== 監聽 =====
textInput.oninput=()=>{text=textInput.value;draw();}
fontSlider.oninput=()=>{fontSize=fontSlider.value;draw();}
bgInput.oninput=()=>{bgColor=bgInput.value;draw();}
textColorInput.oninput=()=>{textColor=textColorInput.value;draw();}
imgScaleSlider.oninput=()=>{imgScale=parseFloat(imgScaleSlider.value);draw();}

// ===== 上傳 =====
upload.onchange=e=>{
let r=new FileReader();
r.onload=ev=>{
img.onload=()=>{imgLoaded=true;draw();}
img.src=ev.target.result;
};
r.readAsDataURL(e.target.files[0]);
};

// ===== 拖曳 =====
canvas.onmousedown=()=>dragging=true;
canvas.onmouseup=()=>dragging=false;

canvas.onmousemove=e=>{
if(!dragging)return;
imgX+=e.movementX;
imgY+=e.movementY;
draw();
};

// ===== 畫 =====
function draw(){
ctx.clearRect(0,0,512,512);

// 背景
ctx.fillStyle=bgColor;
ctx.fillRect(0,0,512,512);

// 圖
if(imgLoaded){
let size=512*imgScale;
ctx.drawImage(img,imgX,imgY,size,size);
}

// 文字
ctx.fillStyle=textColor;
ctx.font=`bold ${fontSize}px sans-serif`;
ctx.textAlign="center";
ctx.textBaseline="middle";
ctx.fillText(text,256,256);
}

// ===== 重設（這裡是重點修好）=====
function resetAll(){
text="哈囉";
fontSize=100;
bgColor="#06C755";
textColor="#ffffff";
imgX=0;imgY=0;imgScale=1;
imgLoaded=false;

textInput.value=text;
fontSlider.value=fontSize;
bgInput.value=bgColor;
textColorInput.value=textColor;
imgScaleSlider.value=1;

draw();
}

// ===== 下載 =====
function download(){
let a=document.createElement("a");
a.href=canvas.toDataURL();
a.download="avatar.png";
a.click();
}

draw();
</script>

</body>
</html>
