<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE 大頭照產生器</title>

<style>
body{margin:0;font-family:-apple-system;background:#f3f4f6;}
.header{background:#06C755;color:#fff;padding:20px;text-align:center;font-weight:bold;}
.container{max-width:520px;margin:auto;padding:15px;}
.card{background:#fff;border-radius:16px;padding:15px;margin-bottom:15px;}
canvas{width:100%;border-radius:20px;background:#eee;}

.preview{width:100%;border-radius:20px;margin-top:10px;background:#fff;padding:10px;display:none;}

.tabs{display:flex;gap:20px;border-bottom:2px solid #eee;margin-bottom:10px;}
.tab{padding:10px 0;cursor:pointer;color:#999;font-weight:bold;}
.tab.active{color:#06C755;border-bottom:3px solid #06C755;}

.tab-content{display:none;}
.tab-content.active{display:block;}

.big-input{width:100%;padding:14px;font-size:20px;border-radius:12px;border:1px solid #ddd;margin-top:10px;}

.colors{display:grid;grid-template-columns: repeat(9, 1fr);gap:8px;margin-top:10px;}
.color{width:100%;aspect-ratio:1;border-radius:50%;cursor:pointer;}

.emoji-panel{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
.kao-panel{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}

.emoji{font-size:18px;text-align:center;padding:8px;border-radius:10px;background:#f2f2f2;cursor:pointer;}

.row{display:flex;gap:10px;}
button{flex:1;padding:14px;border:none;border-radius:10px;font-weight:bold;font-size:16px;}
.green{background:#06C755;color:#fff;}
.gray{background:#ddd;}

.tool-row{display:flex;align-items:center;gap:10px;margin-top:10px;}
.tool-row input[type="range"]{flex:1;}
.tool-row input[type="color"]{width:36px;height:36px;border:none;}
</style>
</head>

<body>

<div class="header">LINE 大頭照產生器</div>

<div class="container">

<div class="card">
<div class="tabs">
<div class="tab active" onclick="setShape('square')">方形</div>
<div class="tab" onclick="setShape('circle')">圓形</div>
</div>
<canvas id="canvas" width="512" height="512"></canvas>
</div>

<div class="card">

背景色
<input type="color" id="bg" value="#06C755">
<label><input type="checkbox" id="togglePalette" checked> 色票</label>
<label><input type="checkbox" id="transparentBg"> 透明</label>

<div class="colors" id="colorPalette"></div>

文字顏色
<input type="color" id="textColor" value="#ffffff">

<div class="tool-row">
<label><input type="checkbox" id="strokeToggle"> 描邊</label>
<input type="color" id="strokeColor" value="#000000">
<input type="range" id="strokeWidth" min="1" max="20" value="6">
</div>

<div class="tool-row">
<label><input type="checkbox" id="shadowSoft"> 柔光</label>
<label><input type="checkbox" id="shadowLift"> 浮起</label>
<label><input type="checkbox" id="shadowStrong"> 設計</label>
</div>

<div class="tabs">
<div class="tab active" data-tab="0">文字</div>
<div class="tab" data-tab="1">Emoji</div>
<div class="tab" data-tab="2">顏文字</div>
<div class="tab" data-tab="3">LOGO</div>
</div>

<div class="tab-content active" data-content="0">
大小
<input type="range" id="sizeText" min="40" max="300" value="150">
<input id="text" class="big-input" placeholder="筆記">
</div>

<div class="tab-content" data-content="1">
大小
<input type="range" id="sizeEmoji" min="40" max="300" value="120">
<div class="emoji-panel" id="emojiPanel"></div>
</div>

<div class="tab-content" data-content="2">
大小
<input type="range" id="sizeKao" min="40" max="300" value="120">
<input id="kaomoji" class="big-input">
<div id="kaoList" class="kao-panel"></div>
</div>

<div class="tab-content" data-content="3">
大小
<input type="range" id="sizeLogo" min="40" max="300" value="120">
<input type="file" id="upload">
<input id="logoText" class="big-input">
</div>

</div>

<div class="card row">
<button class="gray" onclick="resetAll()">重設</button>
<button class="green" onclick="download()">下載</button>
</div>

<div class="card">
<div>長按圖片可儲存</div>
<img id="preview" class="preview">
</div>

</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const preview=document.getElementById("preview");

const textInput=document.getElementById("text");
const sizeText=document.getElementById("sizeText");
const bgInput=document.getElementById("bg");
const textColorInput=document.getElementById("textColor");
const transparentBg=document.getElementById("transparentBg");

const strokeToggle=document.getElementById("strokeToggle");
const strokeColor=document.getElementById("strokeColor");
const strokeWidth=document.getElementById("strokeWidth");

const shadowSoft=document.getElementById("shadowSoft");
const shadowLift=document.getElementById("shadowLift");
const shadowStrong=document.getElementById("shadowStrong");

const togglePalette=document.getElementById("togglePalette");
const colorPalette=document.getElementById("colorPalette");

let shape="square";
let autoSize=true;

// 色票開關
togglePalette.onchange=()=>{
colorPalette.style.display=togglePalette.checked?"grid":"none";
};

// 自動大小
sizeText.oninput=()=>{autoSize=false;draw();}
textInput.oninput=()=>{autoSize=true;draw();}

// 監聽修正
[strokeToggle,strokeColor,strokeWidth,shadowSoft,shadowLift,shadowStrong,transparentBg]
.forEach(el=>el.addEventListener("change",draw));

// 色票
["#FF3B30","#FF9500","#FFCC00","#34C759","#007AFF","#5856D6","#FF2D55","#8E8E93"]
.forEach(c=>{
let d=document.createElement("div");
d.className="color";
d.style.background=c;
d.onclick=()=>{bgInput.value=c;draw();}
colorPalette.appendChild(d);
});

// emoji
["🎧","🎵","🎶","🎤","🎸","🔥","✨","❤️"].forEach(e=>{
let d=document.createElement("div");
d.className="emoji";
d.innerText=e;
d.onclick=()=>{textInput.value+=e;draw();}
document.getElementById("emojiPanel").appendChild(d);
});

// 顏文字
["(≧▽≦)","(ಥ﹏ಥ)","(ಠ_ಠ)","(•‿•)","(⊙_⊙)","(￣▽￣)"].forEach(k=>{
let d=document.createElement("div");
d.className="emoji";
d.innerText=k;
d.onclick=()=>{document.getElementById("kaomoji").value=k;draw();}
document.getElementById("kaoList").appendChild(d);
});

// 換行
function wrap(text){
let arr=[],line="";
for(let ch of text){
let test=line+ch;
ctx.font="900 100px sans-serif";
if(ctx.measureText(test).width>480){
arr.push(line);
line=ch;
}else line=test;
}
arr.push(line);
return arr;
}

function draw(){
ctx.clearRect(0,0,512,512);

// 圓形
if(shape==="circle"){
ctx.save();
ctx.beginPath();
ctx.arc(256,256,256,0,Math.PI*2);
ctx.clip();
}

// 背景
if(!transparentBg.checked){
ctx.fillStyle=bgInput.value;
ctx.fillRect(0,0,512,512);
}

// 文字
let text=textInput.value||"筆記";
let lines=wrap(text);

let size=autoSize?200:sizeText.value;

ctx.font=`900 ${size}px sans-serif`;

while(lines.some(l=>ctx.measureText(l).width>480)){
size-=2;
ctx.font=`900 ${size}px sans-serif`;
}

let lh=size*1.2;
let start=256-(lines.length-1)*lh/2;

ctx.fillStyle=textColorInput.value;
ctx.textAlign="center";
ctx.textBaseline="middle";

// 陰影
if(shadowSoft.checked){ctx.shadowColor="rgba(0,0,0,0.15)";ctx.shadowBlur=20;ctx.shadowOffsetY=4;}
if(shadowLift.checked){ctx.shadowColor="rgba(0,0,0,0.25)";ctx.shadowBlur=8;ctx.shadowOffsetY=8;}
if(shadowStrong.checked){ctx.shadowColor="rgba(0,0,0,0.4)";ctx.shadowBlur=2;ctx.shadowOffsetY=14;}

lines.forEach((l,i)=>{
let y=start+i*lh;
if(strokeToggle.checked){
ctx.lineWidth=strokeWidth.value;
ctx.strokeStyle=strokeColor.value;
ctx.strokeText(l,256,y);
}
ctx.fillText(l,256,y);
});

ctx.shadowColor="transparent";

if(shape==="circle") ctx.restore();
}

function download(){
preview.src=canvas.toDataURL();
preview.style.display="block";
}

function resetAll(){
textInput.value="";
draw();
}

function setShape(s){shape=s;draw();}

draw();
</script>

</body>
</html>
