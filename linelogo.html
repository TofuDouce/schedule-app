<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE 大頭照產生器</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#f5f6f7;
}

.header{
  background:#06C755;
  color:white;
  text-align:center;
  padding:20px;
  font-weight:bold;
}

.container{
  max-width:520px;
  margin:auto;
  padding:15px;
}

.card{
  background:white;
  border-radius:18px;
  padding:16px;
  margin-bottom:16px;
}

/* Tabs */
.tab-bar{
  display:flex;
  gap:20px;
  border-bottom:2px solid #eee;
  padding-bottom:6px;
}

.tab{
  color:#aaa;
  font-weight:600;
  cursor:pointer;
  padding-bottom:6px;
}

.tab.active{
  color:#06C755;
  border-bottom:3px solid #06C755;
}

/* Inputs */
.input-box{
  margin-top:15px;
  padding:16px;
  background:#f2f2f2;
  border-radius:16px;
  border:1px solid #e0e0e0;
  font-size:18px;
}

/* Emoji grid */
.emoji-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  margin-top:12px;
}

.emoji{
  background:#f4f4f4;
  padding:14px;
  text-align:center;
  border-radius:14px;
  font-size:22px;
  cursor:pointer;
}

.emoji:hover{
  background:#eaeaea;
}

/* Upload box */
.upload-box{
  border:2px dashed #ccc;
  border-radius:20px;
  text-align:center;
  padding:40px 20px;
  color:#888;
}

/* Slider */
.slider{
  width:100%;
  margin-top:10px;
}

input[type=range]{
  width:100%;
  accent-color:#06C755;
}

/* Buttons */
.row{
  display:flex;
  gap:10px;
}

button{
  flex:1;
  padding:14px;
  border:none;
  border-radius:14px;
  font-weight:bold;
}

.green{background:#06C755;color:white;}
.gray{background:#ddd;}

.tab-content{display:none;}
.tab-content.active{display:block;}

canvas{
  width:100%;
  border-radius:20px;
  background:#eee;
}
</style>
</head>

<body>

<div class="header">LINE 大頭照產生器</div>

<div class="container">

<div class="card">
<canvas id="canvas" width="512" height="512"></canvas>
</div>

<div class="card">

<div class="tab-bar">
<div class="tab active" onclick="switchTab(0)">文字</div>
<div class="tab" onclick="switchTab(1)">Emoji</div>
<div class="tab" onclick="switchTab(2)">文字+Emoji</div>
<div class="tab" onclick="switchTab(3)">LOGO</div>
</div>

<!-- 文字 -->
<div class="tab-content active">
<input id="text" class="input-box" placeholder="輸入文字">
</div>

<!-- emoji -->
<div class="tab-content">
<div class="emoji-grid" id="emojiPanel"></div>
</div>

<!-- 混合 -->
<div class="tab-content">
<input id="mixText" class="input-box" placeholder="文字 + emoji">
</div>

<!-- logo -->
<div class="tab-content">
<div class="upload-box">
📁<br><br>
點擊上傳 LOGO<br>
支援 PNG / JPG / SVG
<input type="file" id="upload" style="display:none">
</div>
</div>

<br>

大小
<input type="range" class="slider" id="size" min="50" max="150" value="100">

</div>

<div class="card row">
<button class="gray" onclick="resetAll()">重設</button>
<button class="green" onclick="download()">下載</button>
</div>

</div>

<script>
let currentTab=0;

function switchTab(i){
  currentTab=i;
  document.querySelectorAll(".tab").forEach((t,idx)=>{
    t.classList.toggle("active",idx===i);
  });
  document.querySelectorAll(".tab-content").forEach((c,idx)=>{
    c.classList.toggle("active",idx===i);
  });
  draw();
}

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const emojis=["🍊","😀","😎","🥰","🐱","🐶","🌸","🌈","⭐","✨"];

const panel=document.getElementById("emojiPanel");
emojis.forEach(e=>{
  const div=document.createElement("div");
  div.className="emoji";
  div.innerText=e;
  div.onclick=()=>{
    text.value+=e;
    draw();
  };
  panel.appendChild(div);
});

function draw(){
ctx.fillStyle="#06C755";
ctx.fillRect(0,0,512,512);

ctx.fillStyle="white";
ctx.font="bold 80px sans-serif";
ctx.textAlign="center";
ctx.textBaseline="middle";

if(currentTab===0){
ctx.fillText(text.value,256,256);
}
if(currentTab===1){
ctx.fillText(text.value,256,256);
}
if(currentTab===2){
ctx.fillText(mixText.value,256,256);
}
}

function download(){
const a=document.createElement("a");
a.href=canvas.toDataURL();
a.download="avatar.png";
a.click();
}

function resetAll(){
text.value="";
mixText.value="";
draw();
}

draw();
</script>

</body>
</html>
