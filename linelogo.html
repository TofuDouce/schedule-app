<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE Canva 編輯器 Pro</title>

<style>
body{margin:0;font-family:-apple-system;background:#f3f4f6;}
.header{
background:linear-gradient(135deg,#06C755,#00e676);
color:#fff;padding:20px;text-align:center;font-weight:bold;
}
.container{max-width:520px;margin:auto;padding:15px;}

.card{
background:#fff;border-radius:16px;padding:15px;margin-bottom:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

canvas{
width:100%;border-radius:20px;
background:repeating-conic-gradient(#ccc 0% 25%, #eee 0% 50%) 50%/20px 20px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

button{padding:12px;border:none;border-radius:10px;margin-top:10px;width:100%;font-weight:bold;}
.green{background:#06C755;color:#fff;}
.gray{background:#ddd;}

input{width:100%;padding:10px;margin-top:10px;border-radius:10px;border:1px solid #ddd;}
label{display:block;margin-top:8px;}
</style>
</head>

<body>

<div class="header">LINE Canva 編輯器 Pro</div>

<div class="container">

<div class="card">
<canvas id="canvas" width="512" height="512"></canvas>
</div>

<div class="card">
<input id="inputText" placeholder="輸入文字（可用 \n 換行）">

<label><input type="checkbox" id="shadowToggle"> 文字陰影</label>
<label><input type="checkbox" id="gradientToggle"> 漸層文字</label>
<label><input type="checkbox" id="glassToggle"> 玻璃背景</label>
<label><input type="checkbox" id="transparentToggle"> 透明背景</label>

<button class="green" onclick="addText()">新增文字</button>
<button class="green" onclick="addEmoji()">新增Emoji</button>
<button class="gray" onclick="clearAll()">清空</button>
<button class="green" onclick="showPreview()">產生 PNG</button>
</div>

<!-- 預覽區 -->
<div class="card">
<div style="font-weight:bold;margin-bottom:10px;">輸出結果（長按圖片存到相簿）</div>
<img id="preview" style="width:100%;border-radius:16px;">
</div>

</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let objects=[];
let selected=null;
let dragging=false;

const textInput=document.getElementById("inputText");

const shadowToggle=document.getElementById("shadowToggle");
const gradientToggle=document.getElementById("gradientToggle");
const glassToggle=document.getElementById("glassToggle");
const transparentToggle=document.getElementById("transparentToggle");

// ===== 新增 =====
function addText(){
objects.push({
type:"text",
text:textInput.value||"文字",
x:256,y:256,size:80
});
save();draw();
}

function addEmoji(){
objects.push({
type:"emoji",
text:"🎧",
x:256,y:256,size:80
});
save();draw();
}

// ===== 拖曳 =====
canvas.onmousedown=e=>{
const rect=canvas.getBoundingClientRect();
let x=(e.clientX-rect.left)*(512/rect.width);
let y=(e.clientY-rect.top)*(512/rect.height);

selected=null;
objects.forEach(o=>{
if(Math.abs(x-o.x)<50 && Math.abs(y-o.y)<50){
selected=o;
}
});
dragging=true;
};

canvas.onmouseup=()=>dragging=false;

canvas.onmousemove=e=>{
if(!dragging||!selected) return;

const rect=canvas.getBoundingClientRect();
selected.x=(e.clientX-rect.left)*(512/rect.width);
selected.y=(e.clientY-rect.top)*(512/rect.height);

save();
draw();
};

// ===== 自動縮放 =====
function fitText(text){
let size=120;
do{
ctx.font=`900 ${size}px sans-serif`;
size--;
}while(ctx.measureText(text).width>400 && size>20);
return size;
}

// ===== 畫圖 =====
function draw(){
ctx.clearRect(0,0,512,512);

// 背景
if(!transparentToggle.checked){
ctx.fillStyle="#06C755";
ctx.fillRect(0,0,512,512);
}

// glass
if(glassToggle.checked){
ctx.fillStyle="rgba(255,255,255,0.15)";
ctx.fillRect(0,0,512,512);
}

objects.forEach(o=>{
ctx.textAlign="center";
ctx.textBaseline="middle";

// 陰影
if(shadowToggle.checked){
ctx.shadowColor="rgba(0,0,0,0.3)";
ctx.shadowBlur=10;
ctx.shadowOffsetY=4;
}else{
ctx.shadowColor="transparent";
}

// 漸層
if(gradientToggle.checked){
let g=ctx.createLinearGradient(0,0,512,512);
g.addColorStop(0,"#fff");
g.addColorStop(1,"#ffd700");
ctx.fillStyle=g;
}else{
ctx.fillStyle="#fff";
}

// 多行
let lines=o.text.split("\\n");
let size=fitText(o.text);

lines.forEach((line,i)=>{
ctx.font=`bold ${size}px sans-serif`;
ctx.fillText(line,o.x,o.y+(i*size));
});

// 選取框
if(o===selected){
ctx.strokeStyle="#000";
ctx.strokeRect(o.x-60,o.y-60,120,120);
}
});
}

// ===== 預覽 PNG =====
function showPreview(){
const temp=document.createElement("canvas");
temp.width=1024;
temp.height=1024;

const t=temp.getContext("2d");

// 透明背景支援
if(!transparentToggle.checked){
t.fillStyle="#06C755";
t.fillRect(0,0,1024,1024);
}

t.drawImage(canvas,0,0,1024,1024);

const url=temp.toDataURL("image/png");

const img=document.getElementById("preview");
img.src=url;
img.scrollIntoView({behavior:"smooth"});
}

// ===== 儲存 =====
function save(){
localStorage.setItem("canvas_data",JSON.stringify(objects));
}

function load(){
let data=localStorage.getItem("canvas_data");
if(data) objects=JSON.parse(data);
}

// ===== 清空 =====
function clearAll(){
objects=[];
localStorage.clear();
draw();
}

textInput.addEventListener("input",draw);

load();
draw();
</script>

</body>
</html>
