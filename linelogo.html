<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE 大頭照產生器</title>

<style>
body{margin:0;font-family:-apple-system;background:#f3f4f6;}
.header{background:#06C755;color:#fff;padding:20px;text-align:center;font-weight:bold;}
.container{max-width:520px;margin:auto;padding:15px;}
.card{background:#fff;border-radius:16px;padding:15px;margin-bottom:15px;}

canvas{
  width:100%;
  max-width:420px;
  display:block;
  margin:auto;
  border-radius:20px;
  background:#eee;
}

.preview{
  width:100%;
  border-radius:20px;
  margin-top:10px;
  background:#fff;
  padding:10px;
  display:none;
}

.tabs{display:flex;gap:20px;border-bottom:2px solid #eee;margin-bottom:10px;}
.tab{padding:10px 0;cursor:pointer;color:#999;font-weight:bold;}
.tab.active{color:#06C755;border-bottom:3px solid #06C755;}

.tab-content{display:none;}
.tab-content.active{display:block;}

.big-input{
  width:100%;
  padding:14px;
  font-size:20px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-top:10px;
}

.colors{
  display:grid;
  grid-template-columns: repeat(9, 1fr);
  gap:8px;
  margin-top:10px;
}

.color{
  width:100%;
  aspect-ratio:1;
  border-radius:50%;
  cursor:pointer;
}

.emoji-panel{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
.kao-panel{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}

.emoji{
  font-size:22px;
  text-align:center;
  padding:12px;
  border-radius:10px;
  background:#f2f2f2;
  cursor:pointer;
}

.row{display:flex;gap:10px;}
button{flex:1;padding:14px;border:none;border-radius:10px;font-weight:bold;font-size:16px;}
.green{background:#06C755;color:#fff;}
.gray{background:#ddd;}

.tool-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:10px;
}

.tool-row input[type="range"]{
  flex:1;
}

.tool-row input[type="color"]{
  width:36px;
  height:36px;
  border:none;
}

.option{margin-top:10px;}
</style>
</head>

<body>

<div class="header">LINE 大頭照產生器</div>

<div class="container">

<div class="card">
<div class="tabs">
<div class="tab active" onclick="setShape('square')">方形</div>
<div class="tab" onclick="setShape('circle')">圓形</div>
</div>

<canvas id="canvas" width="512" height="512"></canvas>
</div>

<div class="card">

背景色
<input type="color" id="bg" value="#06C755">

<div class="option">
<label><input type="checkbox" id="transparentBg"> 透明背景</label>
</div>

<div class="colors" id="colorPalette"></div>

文字顏色
<input type="color" id="textColor" value="#ffffff">

<div class="tool-row">
<label><input type="checkbox" id="strokeToggle"> 描邊</label>
<input type="color" id="strokeColor" value="#000000">
<input type="range" id="strokeWidth" min="1" max="20" value="6">
</div>

<div class="tool-row">
<label><input type="checkbox" id="shadowSoft"> 柔光</label>
<label><input type="checkbox" id="shadowLift"> 浮起</label>
<label><input type="checkbox" id="shadowStrong"> 設計</label>
</div>

<div class="tabs">
<div class="tab active" data-tab="0">文字</div>
<div class="tab" data-tab="1">Emoji</div>
<div class="tab" data-tab="2">顏文字</div>
<div class="tab" data-tab="3">LOGO</div>
</div>

<div class="tab-content active" data-content="0">
大小
<input type="range" id="sizeText" min="40" max="300" value="150">
<input id="text" class="big-input" value="筆記">
</div>

<div class="tab-content" data-content="1">
大小
<input type="range" id="sizeEmoji" min="40" max="300" value="120">
<div class="emoji-panel" id="emojiPanel"></div>
</div>

<div class="tab-content" data-content="2">
大小
<input type="range" id="sizeKao" min="40" max="300" value="120">
<input id="kaomoji" class="big-input">
<div id="kaoList" class="kao-panel"></div>
</div>

<div class="tab-content" data-content="3">
大小
<input type="range" id="sizeLogo" min="0.5" max="3" step="0.01" value="1">
<input type="file" id="upload">
<input id="logoText" class="big-input">
</div>

</div>

<div class="card row">
<button class="gray" onclick="resetAll()">重設</button>
<button class="green" onclick="download()">下載</button>
</div>

<div class="card">
<div>長按圖片可儲存</div>
<img id="preview" class="preview">
</div>

</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const exportCanvas=document.createElement("canvas");
exportCanvas.width=1200;
exportCanvas.height=1200;
const exportCtx=exportCanvas.getContext("2d");

const preview=document.getElementById("preview");

const textInput=document.getElementById("text");
const kaomojiInput=document.getElementById("kaomoji");
const logoTextInput=document.getElementById("logoText");

const sizeText=document.getElementById("sizeText");
const sizeEmoji=document.getElementById("sizeEmoji");
const sizeKao=document.getElementById("sizeKao");
const sizeLogo=document.getElementById("sizeLogo");

const bgInput=document.getElementById("bg");
const textColorInput=document.getElementById("textColor");

const transparentBg=document.getElementById("transparentBg");

const shadowSoft=document.getElementById("shadowSoft");
const shadowLift=document.getElementById("shadowLift");
const shadowStrong=document.getElementById("shadowStrong");

const strokeToggle=document.getElementById("strokeToggle");
const strokeColor=document.getElementById("strokeColor");
const strokeWidth=document.getElementById("strokeWidth");

const emojiPanel=document.getElementById("emojiPanel");
const kaoList=document.getElementById("kaoList");
const colorPalette=document.getElementById("colorPalette");
const upload=document.getElementById("upload");

let currentTab=0;
let shape="square";

let img=new Image();
let loaded=false;

document.querySelectorAll("[data-tab]").forEach(tab=>{
  tab.onclick=()=>{
    currentTab=parseInt(tab.dataset.tab);
    document.querySelectorAll("[data-tab]").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    document.querySelectorAll("[data-content]").forEach(c=>{
      c.classList.remove("active");
      if(c.dataset.content==currentTab) c.classList.add("active");
    });
    draw();
  };
});

function setShape(s){shape=s;draw();}

const colors=["#FF3B30","#FF9500","#FFCC00","#34C759","#00C7BE","#007AFF","#5856D6","#FF2D55","#8E8E93"];
colors.forEach(c=>{
  const div=document.createElement("div");
  div.className="color";
  div.style.background=c;
  div.onclick=()=>{bgInput.value=c;draw();}
  colorPalette.appendChild(div);
});

["🎧","🎵","🎶","🎤","🎸"].forEach(e=>{
  const d=document.createElement("div");
  d.className="emoji";
  d.innerText=e;
  d.onclick=()=>{textInput.value=e;draw();}
  emojiPanel.appendChild(d);
});

["(≧▽≦)","(￣▽￣)","(T_T)"].forEach(k=>{
  const d=document.createElement("div");
  d.className="emoji";
  d.innerText=k;
  d.onclick=()=>{kaomojiInput.value=k;draw();}
  kaoList.appendChild(d);
});

function autoFontSize(ctx,text,maxSize,limit){
let size=maxSize;
ctx.font=`900 ${size}px sans-serif`;
while(ctx.measureText(text).width>limit && size>30){
size-=10;
ctx.font=`900 ${size}px sans-serif`;
}
return size;
}

function drawOne(ctx,w,h){
ctx.clearRect(0,0,w,h);

if(shape==="circle"){
ctx.save();
ctx.beginPath();
ctx.arc(w/2,h/2,w/2,0,Math.PI*2);
ctx.clip();
}

if(!transparentBg.checked){
ctx.fillStyle=bgInput.value;
ctx.fillRect(0,0,w,h);
}

ctx.fillStyle=textColorInput.value;
ctx.textAlign="center";
ctx.textBaseline="middle";

let text=textInput.value||"筆記";
let size=autoFontSize(ctx,text,sizeText.value,w*0.8);
ctx.font=`900 ${size}px sans-serif`;

if(shadowSoft.checked){
ctx.shadowColor="rgba(0,0,0,0.15)";
ctx.shadowBlur=20;
ctx.shadowOffsetY=4;
ctx.fillText(text,w/2,h/2);
}
if(shadowLift.checked){
ctx.shadowColor="rgba(0,0,0,0.25)";
ctx.shadowBlur=8;
ctx.shadowOffsetY=8;
ctx.fillText(text,w/2,h/2);
}
if(shadowStrong.checked){
ctx.shadowColor="rgba(0,0,0,0.4)";
ctx.shadowBlur=2;
ctx.shadowOffsetY=14;
ctx.fillText(text,w/2,h/2);
}

ctx.shadowColor="transparent";

if(strokeToggle.checked){
ctx.lineWidth=strokeWidth.value;
ctx.strokeStyle=strokeColor.value;
ctx.strokeText(text,w/2,h/2);
}

ctx.fillText(text,w/2,h/2);

if(shape==="circle") ctx.restore();
}

function draw(){
drawOne(ctx,512,512);
drawOne(exportCtx,1200,1200);
}

function download(){
const data=exportCanvas.toDataURL("image/png");
preview.src=data;
preview.style.display="block";

const a=document.createElement("a");
a.href=data;
a.download="avatar.png";
a.click();
}

function resetAll(){
textInput.value="筆記";
kaomojiInput.value="";
logoTextInput.value="";
img.src="";
loaded=false;

transparentBg.checked=false;
shadowSoft.checked=false;
shadowLift.checked=false;
shadowStrong.checked=false;
strokeToggle.checked=false;

draw();
}

document.querySelectorAll("input").forEach(el=>el.addEventListener("input",draw));

draw();
</script>

</body>
</html>
