<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🍱 超商便當 RPG ✦ Bento RPG</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg1:#fff9f6;
    --bg2:#ffece4;

    --card:#ffffff;

    --text:#54433a;
    --sub:#8e7a70;

    --gold:#f6c86c;
    --gold2:#efb94d;

    --line:#eee1d8;

}

body{

    min-height:100vh;

    background:
    linear-gradient(
        180deg,
        var(--bg1),
        var(--bg2)
    );

    font-family:
    "Zen Maru Gothic",
    "Quicksand",
    sans-serif;

    color:var(--text);

    padding:26px;

}

.container{

    max-width:1200px;
    margin:auto;

}

.hero{

    text-align:center;

    margin-bottom:30px;

}

.badge{

    display:inline-block;

    background:#fff0ca;

    color:#b78315;

    padding:8px 18px;

    border-radius:999px;

    font-size:14px;
    font-weight:700;

    margin-bottom:16px;

}

.title{

    font-size:clamp(34px,6vw,56px);

    margin-bottom:12px;

}

.subtitle{

    color:var(--sub);

}

.layout{

    display:grid;
    grid-template-columns:1fr;
    gap:24px;

}

@media(min-width:900px){

    .layout{
        grid-template-columns:1.2fr 0.8fr;
    }

}

.card{

    background:var(--card);

    border-radius:30px;

    padding:30px;

    box-shadow:
    0 10px 30px rgba(0,0,0,0.05);

}

.main-btn{

    width:100%;

    border:none;

    background:var(--gold);

    color:#5a473b;

    padding:18px;

    border-radius:20px;

    font-family:inherit;

    font-size:18px;
    font-weight:700;

    cursor:pointer;

    transition:0.2s;

    margin-top:16px;

}

.main-btn:hover{

    background:var(--gold2);

    transform:translateY(-2px);

}

.result{

    margin-top:24px;

    background:#fffaf7;

    border:1px dashed rgba(0,0,0,0.08);

    border-radius:24px;

    padding:24px;

    min-height:280px;

}

.bento-name{

    font-size:28px;
    font-weight:700;

    margin-bottom:10px;

}

.rare{

    display:inline-block;

    padding:6px 12px;

    border-radius:999px;

    background:#ffe6a8;

    color:#946300;

    font-size:13px;
    font-weight:700;

    margin-bottom:20px;

}

.stat{

    margin-bottom:10px;

    color:var(--sub);

    line-height:1.8;

}

.skill-box{

    margin-top:18px;

    background:white;

    border-radius:18px;

    padding:18px;

    border:1px solid var(--line);

}

.skill-title{

    font-weight:700;

    margin-bottom:10px;

    color:#b78315;

}

.event-box{

    margin-top:20px;

    padding:18px;

    border-radius:18px;

    background:#fff4ef;

    border:1px solid #ffe0d2;

}

.event-title{

    font-weight:700;

    margin-bottom:8px;

}

.list{

    display:flex;
    flex-direction:column;
    gap:14px;

}

.side-card{

    background:#fffaf7;

    border-radius:18px;

    padding:18px;

    border:1px solid rgba(0,0,0,0.06);

}

.side-title{

    font-weight:700;

    margin-bottom:8px;

}

.side-text{

    color:var(--sub);

    line-height:1.8;

    font-size:15px;

}

.footer{

    text-align:center;

    margin-top:38px;

    color:#9b877b;

    font-size:13px;

}

</style>
</head>

<body>

<div class="container">

    <div class="hero">

        <div class="badge">
            ✦ Convenience Store Fantasy RPG ✦
        </div>

        <h1 class="title">
            🍱 超商便當 RPG
        </h1>

        <div class="subtitle">
            深夜便利商店的傳說便當召喚系統
        </div>

    </div>

    <div class="layout">

        <!-- LEFT -->

        <div class="card">

            <button
                class="main-btn"
                onclick="summonBento()"
            >
                ✦ 召喚今日命運便當 ✦
            </button>

            <div
                class="result"
                id="result"
            >

                點擊按鈕開始召喚 ✦

            </div>

        </div>

        <!-- RIGHT -->

        <div class="card">

            <div class="list">

                <div class="side-card">

                    <div class="side-title">
                        👹 今日超商 Boss
                    </div>

                    <div
                        class="side-text"
                        id="bossText"
                    >
                        奧客店長正在巡邏。
                    </div>

                </div>

                <div class="side-card">

                    <div class="side-title">
                        🌙 深夜事件
                    </div>

                    <div
                        class="side-text"
                        id="eventText"
                    >
                        凌晨時段似乎不太平靜。
                    </div>

                </div>

                <div class="side-card">

                    <div class="side-title">
                        🥤 飲料 Buff
                    </div>

                    <div
                        class="side-text"
                        id="drinkText"
                    >
                        尚未獲得 Buff。
                    </div>

                </div>

            </div>

        </div>

    </div>

    <div class="footer">
        ✦ Bento RPG Simulator © ChuChu ✦
    </div>

</div>

<script>

/* =========================
   資料庫
========================= */

const prefixes = [

    "深夜限定",
    "爆量起司",
    "社畜救贖",
    "暗黑蒜香",
    "微波失敗的",
    "傳說中的",
    "被遺忘的",
    "凌晨三點",
    "半價之力",
    "覺醒型"

];

const mains = [

    "炙燒鮭魚便當",
    "炸雞咖哩飯",
    "照燒雞丼",
    "白醬培根義大利麵",
    "經典滷肉飯",
    "鹽烤鯖魚便當",
    "奶油焗烤飯",
    "黑胡椒鐵板麵",
    "唐揚雞便當",
    "雙倍香腸炒飯"

];

const rarities = [

    "★☆☆☆☆ N",
    "★★☆☆☆ R",
    "★★★☆☆ SR",
    "★★★★☆ SSR",
    "★★★★★ UR"

];

const effects = [

    "社畜回血 +35",
    "熬夜能力 +80",
    "下午兩點昏迷率 +70%",
    "快樂值提升",
    "鹽分暴擊",
    "精神恢復 +40",
    "孤獨抗性 +20",
    "罪惡感增加",
    "熱量突破極限",
    "獲得短暫幸福"

];

const skills = [

    "✦ 加熱暴走：微波後攻擊力翻倍",
    "✦ 深夜療癒：凌晨食用恢復精神值",
    "✦ 起司洪流：降低理智但增加快樂",
    "✦ 社畜之魂：加班抗性提升",
    "✦ 半價神諭：22:00 後能力增幅",
    "✦ 油脂護盾：防禦力提升"

];

const sideEffects = [

    "吃完會開始懷疑人生。",
    "容易突然想睡覺。",
    "會想打開 YouTube。",
    "今晚可能做奇怪的夢。",
    "有機率產生第二份便當幻覺。",
    "可能引發深夜 emo。"

];

const bosses = [

    "奧客店長：『為什麼熱狗不會自己轉？』",
    "凌晨補貨員：『今天又只剩你？』",
    "失控微波機：開始發出異音。",
    "神秘老太太：一直盯著御飯糰。",
    "咖啡機魔王：正在漏奶泡。"

];

const events = [

    "茶葉蛋存量低於警戒值。",
    "鮮食區正在發光。",
    "有人一次印了 200 張文件。",
    "御飯糰區出現神秘折扣。",
    "店內突然播放悲傷情歌。"

];

const drinks = [

    "絲襪奶茶：魔力 +20",
    "能量飲料：HP -10，熬夜 +99",
    "冰美式：精神清醒 +50",
    "草莓牛奶：快樂值提升",
    "無糖綠茶：理智恢復"

];

/* =========================
   隨機函式
========================= */

function random(arr){

    return arr[
        Math.floor(
            Math.random()*arr.length
        )
    ];

}

/* =========================
   主召喚
========================= */

function summonBento(){

    const atk =
    Math.floor(Math.random()*100)+1;

    const def =
    Math.floor(Math.random()*100)+1;

    const hp =
    Math.floor(Math.random()*100)+1;

    const price =
    Math.floor(Math.random()*80)+59;

    const html = `

        <div class="bento-name">
            ${random(prefixes)}
            ${random(mains)}
        </div>

        <div class="rare">
            ${random(rarities)}
        </div>

        <div class="stat">
            ⚔ 攻擊力：${atk}
        </div>

        <div class="stat">
            🛡 防禦力：${def}
        </div>

        <div class="stat">
            🍚 飽足值：${hp}
        </div>

        <div class="stat">
            💰 售價：NT$ ${price}
        </div>

        <div class="stat">
            ✨ 特效：
            ${random(effects)}
        </div>

        <div class="skill-box">

            <div class="skill-title">
                🍱 專屬技能
            </div>

            <div class="stat">
                ${random(skills)}
            </div>

        </div>

        <div class="event-box">

            <div class="event-title">
                ☠ 副作用
            </div>

            <div class="stat">
                ${random(sideEffects)}
            </div>

        </div>

    `;

    document.getElementById(
        "result"
    ).innerHTML = html;

    document.getElementById(
        "bossText"
    ).innerText =
    random(bosses);

    document.getElementById(
        "eventText"
    ).innerText =
    random(events);

    document.getElementById(
        "drinkText"
    ).innerText =
    random(drinks);

}

</script>

</body>
</html>
