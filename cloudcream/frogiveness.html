<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>✦ 原諒修行中心 ✦</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg1:#f5fff2;
    --bg2:#dcefd7;

    --text:#52624f;
    --sub:#7a8977;

    --gold:#d7d98c;
    --gold-hover:#c9cb79;

    --card:#ffffff;

    --base-font-size:20px;

}

body{

    min-height:100vh;

    background:
    linear-gradient(
        180deg,
        var(--bg1),
        var(--bg2)
    );

    font-family:
    "Zen Maru Gothic",
    "Quicksand",
    sans-serif;

    color:var(--text);

    padding:28px;

    display:flex;
    justify-content:center;
    align-items:center;

    position:relative;

    overflow:hidden;

    transition:
    background 1.5s ease;

    font-size:var(--base-font-size);

}

/* 100 功德背景 */

body.enlightened{

    background:
    linear-gradient(
        180deg,
        #d6ead0,
        #7ca47b
    );

}

/* 300 功德背景 */

body.voidmode{

    background:
    linear-gradient(
        180deg,
        #dcded9,
        #aab0a5
    );

    filter:saturate(0.7);

}

/* 外框 */

.decor-border{

    position:fixed;

    inset:12px;

    border:2px dashed rgba(82,98,79,0.14);

    border-radius:24px;

    pointer-events:none;

}

/* 浮水印 */

.watermark{

    position:fixed;

    right:24px;
    bottom:24px;

    color:rgba(82,98,79,0.35);

    font-size:12px;

    pointer-events:none;

}

.container{

    width:100%;
    max-width:1200px;

    position:relative;
    z-index:2;

}

/* top */

.topbar{

    display:flex;
    justify-content:flex-end;

    gap:8px;

    margin-bottom:18px;

}

.top-btn{

    border:none;

    background:white;

    border:1px solid rgba(82,98,79,0.12);

    color:var(--text);

    padding:8px 16px;

    border-radius:999px;

    cursor:pointer;

    font-family:inherit;
    font-size:15px;
    font-weight:700;

}

.top-btn:hover{

    background:#f6fff3;

}

/* hero */

.hero{

    text-align:center;

    margin-bottom:28px;

}

.badge{

    display:inline-block;

    background:rgba(125,170,120,0.15);

    color:#5c7b58;

    padding:7px 16px;

    border-radius:999px;

    font-size:15px;
    font-weight:700;

    margin-bottom:14px;

}

.title{

    font-size:clamp(36px,5vw,54px);

    line-height:1.4;

}

.subtitle{

    margin-top:10px;

    color:var(--sub);

    font-size:16px;

}

/* layout */

.layout{

    display:grid;

    grid-template-columns:1fr;

    gap:24px;

}

@media(min-width:900px){

    .layout{

        grid-template-columns:1.2fr 0.8fr;

    }

}

.card{

    background:var(--card);

    border-radius:28px;

    border:1px solid rgba(82,98,79,0.08);

    padding:30px;

    box-shadow:
    0 10px 30px rgba(82,98,79,0.05);

}

/* 青蛙 */

.frog-zone{

    text-align:center;

    margin-top:10px;

}

#frog{

    font-size:150px;

    cursor:pointer;

    user-select:none;

    transition:
    transform 0.15s,
    filter 0.3s;

    display:inline-block;

    filter:
    drop-shadow(
        0 10px 16px rgba(0,0,0,0.08)
    );

}

#frog:hover{

    transform:translateY(-4px);

}

#frog:active{

    transform:scale(0.9);

}

/* 靈魂對話 */

#frog.awaken{

    animation:
    frogTurn 1s ease;

}

@keyframes frogTurn{

    0%{
        transform:rotate(0deg);
    }

    50%{
        transform:rotate(-12deg);
    }

    100%{
        transform:rotate(0deg);
    }

}

.counter{

    margin-top:18px;

    font-size:28px;

    font-weight:700;

    color:#5c7b58;

}

/* 按鈕 */

.main-btn{

    width:100%;

    border:none;

    background:var(--gold);

    color:var(--text);

    padding:15px;

    border-radius:18px;

    cursor:pointer;

    font-family:inherit;

    font-size:16px;
    font-weight:700;

    margin-top:16px;

}

.main-btn:hover{

    background:var(--gold-hover);

}

/* 柔和框 */

.soft-box{

    background:#fbfffa;

    border:1px dashed rgba(82,98,79,0.16);

    border-radius:18px;

    padding:18px;

    margin-top:22px;

}

.soft-box-title{

    font-size:17px;
    font-weight:700;

    margin-bottom:10px;

}

.soft-box-text{

    color:var(--sub);

    line-height:1.9;

}

/* side */

.list{

    display:flex;
    flex-direction:column;

    gap:12px;

}

.list-item{

    background:#fcfffb;

    border:1px solid rgba(82,98,79,0.06);

    border-radius:16px;

    padding:16px 18px;

}

.list-item-title{

    font-weight:700;

    margin-bottom:6px;

}

.list-item-text{

    color:var(--sub);

    line-height:1.7;

    font-size:15px;

}

/* 浮字 */

.float-text{

    position:fixed;

    font-size:30px;

    font-weight:700;

    color:#446342;

    text-shadow:
    0 2px 8px rgba(255,255,255,0.9);

    pointer-events:none;

    animation:
    floatUp 1.4s ease-out forwards;

    z-index:999;

}

@keyframes floatUp{

    0%{
        opacity:1;
        transform:translateY(0);
    }

    100%{
        opacity:0;
        transform:translateY(-110px);
    }

}

/* footer */

.footer{

    text-align:center;

    margin-top:36px;

    color:var(--sub);

    font-size:14px;

}

.footer b{

    color:#6e9368;

}

</style>
</head>

<body>

<div class="decor-border"></div>

<div class="watermark">
    Forgiveness archive by <b>ChuChu</b> ✦
</div>

<div class="container">

    <!-- top -->

    <div class="topbar">

        <button
            class="top-btn"
            onclick="changeFont(-1)"
        >
            A -
        </button>

        <button
            class="top-btn"
            onclick="resetFont()"
        >
            A
        </button>

        <button
            class="top-btn"
            onclick="changeFont(1)"
        >
            A +
        </button>

    </div>

    <!-- hero -->

    <div class="hero">

        <div class="badge">
            原諒修行系統 🪷
        </div>

        <h1 class="title">
            原諒修行中心
        </h1>

        <p class="subtitle">
            有些事情，
            點久了就會慢慢放下。
        </p>

    </div>

    <div class="layout">

        <!-- LEFT -->

        <div class="card">

            <div class="soft-box">

                <div class="soft-box-title">
                    🌿 今日執念
                </div>

                <div
                    class="soft-box-text"
                    id="obsessionText"
                >
                    已讀不回。
                </div>

            </div>

            <div class="frog-zone">

                <div id="frog">
                    🐸
                </div>

                <div
                    class="counter"
                    id="counter"
                >
                    功德：0
                </div>

            </div>

            <button
                class="main-btn"
                id="autoBtn"
                onclick="toggleAuto()"
            >
                🌙 開啟自動修行
            </button>

            <div class="soft-box">

                <div class="soft-box-title">
                    ☁ 深夜語錄
                </div>

                <div
                    class="soft-box-text"
                    id="quoteText"
                >
                    「有些事情，
                    睡醒就沒那麼重要了。」
                </div>

            </div>

        </div>

        <!-- RIGHT -->

        <div class="card">

            <div class="list">

                <div class="list-item">

                    <div class="list-item-title">
                        🪷 修行境界
                    </div>

                    <div
                        class="list-item-text"
                        id="rankText"
                    >
                        普通人類
                    </div>

                </div>

                <div class="list-item">

                    <div class="list-item-title">
                        ☁ 放下率
                    </div>

                    <div
                        class="list-item-text"
                        id="forgiveText"
                    >
                        0%
                    </div>

                </div>

                <div class="list-item">

                    <div class="list-item-title">
                        🌙 今日心境
                    </div>

                    <div
                        class="list-item-text"
                        id="moodText"
                    >
                        還在執著。
                    </div>

                </div>

                <div class="list-item">

                    <div class="list-item-title">
                        🐸 青蛙觀測
                    </div>

                    <div
                        class="list-item-text"
                        id="frogText"
                    >
                        青蛙正在安靜看著你。
                    </div>

                </div>

            </div>

        </div>

    </div>

    <div class="footer">

        <div>
            ✦ Forgiveness Practice Center ✦
        </div>

        <div>
            Designed by <b>ChuChu</b> © 2026
        </div>

    </div>

</div>

<script>

/* 字體 */

let currentSize = 20;

function changeFont(v){

    currentSize += v;

    if(currentSize < 16){
        currentSize = 16;
    }

    if(currentSize > 26){
        currentSize = 26;
    }

    document.documentElement.style.setProperty(
        '--base-font-size',
        currentSize + 'px'
    );

}

function resetFont(){

    currentSize = 20;

    document.documentElement.style.setProperty(
        '--base-font-size',
        '20px'
    );

}

/* 功德 */

let count = 0;

let autoMode = false;

let autoInterval;

/* element */

const frog =
document.getElementById("frog");

const counter =
document.getElementById("counter");

/* phrases */

const phrases = [

    "算了吧",
    "放過自己",
    "功德 +1",
    "別氣了",
    "不要跟世界吵架",
    "執念正在減少",
    "今晚先睡吧",
    "深呼吸",
    "人生很短",
    "放下也是一種勝利",
    "🐸",
    "功德無量",
    "世界本來就怪怪的",
    "不要氣到自己",
    "沒事的",
    "一切都會過去"

];

const quotes = [

    "「真正的放下，是不再一直重播那件事。」",

    "「有些情緒，其實只是太累了。」",

    "「你點的不是青蛙，是自己的執念。」",

    "「凌晨的情緒通常比較誇張。」",

    "「世界不會因為你生氣而改變。」",

    "「也許對方只是手機沒電。」",

    "「原諒別人，有時候只是讓自己好睡一點。」",

    "「不要在半夜做人生決定。」"

];

const obsessions = [

    "已讀不回。",
    "主管訊息。",
    "前任限動。",
    "凌晨群組通知。",
    "奧客。",
    "突然想起來的黑歷史。",
    "星期一。",
    "沒有冰塊的冰美式。"

];

const moods = [

    "逐漸平靜。",
    "開始看淡世界。",
    "還在執著。",
    "情緒緩慢下降。",
    "有點想睡。"

];

const frogStates = [

    "青蛙正在安靜看著你。",
    "青蛙似乎理解了一切。",
    "青蛙開始進入禪定。",
    "青蛙沒有任何情緒。",
    "青蛙正在觀察人類。"

];

/* click */

frog.addEventListener(
    "click",
    (e)=>{

        gainKarma(
            e.clientX,
            e.clientY
        );

    }
);

function gainKarma(x,y){

    count++;

    counter.innerText =
    `功德：${count}`;

    playWoodBlock();

    showFloatingText(x,y);

    updateSide();

    specialEvents();

}

/* 木魚 */

function playWoodBlock(){

    const audioCtx =
    new (
        window.AudioContext ||
        window.webkitAudioContext
    )();

    const oscillator =
    audioCtx.createOscillator();

    const gainNode =
    audioCtx.createGain();

    oscillator.type = "sine";

    oscillator.frequency.setValueAtTime(
        420,
        audioCtx.currentTime
    );

    gainNode.gain.setValueAtTime(
        0.3,
        audioCtx.currentTime
    );

    gainNode.gain.exponentialRampToValueAtTime(
        0.01,
        audioCtx.currentTime + 0.12
    );

    oscillator.connect(gainNode);

    gainNode.connect(audioCtx.destination);

    oscillator.start();

    oscillator.stop(
        audioCtx.currentTime + 0.12
    );

}

/* 浮字 */

function showFloatingText(x,y){

    const div =
    document.createElement("div");

    div.className =
    "float-text";

    div.innerText =
    random(phrases);

    div.style.left =
    x + "px";

    div.style.top =
    (y - 40) + "px";

    document.body.appendChild(div);

    setTimeout(()=>{

        div.remove();

    },1400);

}

/* random */

function random(arr){

    return arr[
        Math.floor(
            Math.random()*arr.length
        )
    ];

}

/* update */

function updateSide(){

    document.getElementById(
        "quoteText"
    ).innerText =
    random(quotes);

    document.getElementById(
        "obsessionText"
    ).innerText =
    random(obsessions);

    document.getElementById(
        "moodText"
    ).innerText =
    random(moods);

    document.getElementById(
        "frogText"
    ).innerText =
    random(frogStates);

    document.getElementById(
        "forgiveText"
    ).innerText =
    Math.min(
        100,
        Math.floor(count / 10)
    ) + "%";

    /* rank */

    let rank =
    "普通人類";

    if(count >= 100){

        rank =
        "放下初心者";

    }

    if(count >= 300){

        rank =
        "半步聖人";

    }

    if(count >= 500){

        rank =
        "青蛙觀測者";

    }

    if(count >= 1000){

        rank =
        "無欲無求之人";

    }

    document.getElementById(
        "rankText"
    ).innerText =
    rank;

}

/* 特殊事件 */

function specialEvents(){

    /* 100 */

    if(count === 100){

        document.body.classList.add(
            "enlightened"
        );

        alert(
            "🪷 你開始看淡一些事情。\n\n背景進入禪意模式。"
        );

    }

    /* 300 */

    if(count === 300){

        document.body.classList.add(
            "voidmode"
        );

        alert(
            "☁ 世界開始變得安靜。"
        );

    }

    /* 500 */

    if(count === 500){

        frog.classList.add(
            "awaken"
        );

        setTimeout(()=>{

            alert(
                "🐸 施主，你還要敲多久？\n\n你其實已經原諒他了吧？"
            );

        },500);

    }

    /* 1000 */

    if(count === 1000){

        alert(
            "🌌 已無需修行。"
        );

    }

}

/* auto */

function toggleAuto(){

    autoMode = !autoMode;

    const btn =
    document.getElementById(
        "autoBtn"
    );

    if(autoMode){

        btn.innerText =
        "☁ 關閉自動修行";

        autoInterval =
        setInterval(()=>{

            gainKarma(
                window.innerWidth/2,
                window.innerHeight/2
            );

        },700);

    }

    else{

        btn.innerText =
        "🌙 開啟自動修行";

        clearInterval(
            autoInterval
        );

    }

}

</script>

</body>
</html>
