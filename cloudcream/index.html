<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>☁ Cream Cloud Archive ☁</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;

    transition:
    transform 0.2s ease,
    font-size 0.2s ease;
}

:root{

    --bg1:#fff9f6;
    --bg2:#ffebe3;

    --card:#ffffff;

    --text:#54433a;
    --sub:#8e7a70;

    --gold:#f6c86c;
    --gold-hover:#efb94d;

    --pink:#f79999;

    --base-font-size:20px;
}

body{

    min-height:100vh;

    background:
    linear-gradient(
        180deg,
        var(--bg1) 0%,
        var(--bg2) 100%
    );

    font-family:
    "Zen Maru Gothic",
    "Quicksand",
    sans-serif;

    color:var(--text);

    padding:22px;
}

/* =========================
   BORDER
========================= */

.decor-border{

    position:fixed;

    inset:12px;

    border:
    2px dashed rgba(142,122,112,0.12);

    border-radius:24px;

    pointer-events:none;
}

/* =========================
   CONTAINER
========================= */

.container{

    max-width:1200px;

    margin:auto;

    position:relative;
    z-index:2;
}

/* =========================
   FONT CONTROL
========================= */

.font-control{

    display:flex;

    justify-content:flex-end;

    gap:8px;

    margin-bottom:20px;
}

.font-btn{

    border:none;

    background:white;

    border:
    1px solid rgba(142,122,112,0.18);

    color:var(--text);

    padding:8px 14px;

    border-radius:999px;

    cursor:pointer;

    font-size:15px;
    font-weight:700;

    font-family:inherit;

    box-shadow:
    0 2px 8px rgba(0,0,0,0.03);
}

.font-btn:hover{

    background:#fff5ef;

    border-color:var(--gold);
}

.font-btn.active{

    background:var(--gold);

    border-color:var(--gold);
}

/* =========================
   HERO
========================= */

.hero{

    text-align:center;

    margin-bottom:30px;
}

.badge{

    display:inline-block;

    background:
    rgba(246,200,108,0.18);

    color:#b07910;

    padding:7px 18px;

    border-radius:999px;

    font-size:
    calc(var(--base-font-size) * 0.72);

    font-weight:700;

    margin-bottom:14px;
}

.title{

    font-size:
    clamp(34px,5vw,52px);

    line-height:1.4;
}

.subtitle{

    color:var(--sub);

    margin-top:10px;

    line-height:1.8;

    font-size:
    calc(var(--base-font-size) * 0.82);
}

/* =========================
   SEARCH
========================= */

.search-box{

    margin:28px auto;

    max-width:720px;
}

.search-input{

    width:100%;

    padding:15px 18px;

    border:none;

    border-radius:18px;

    background:white;

    border:
    1.5px solid rgba(142,122,112,0.1);

    font-family:inherit;

    font-size:
    calc(var(--base-font-size) * 0.82);

    color:var(--text);

    box-shadow:
    0 8px 24px rgba(84,67,58,0.05);
}

.search-input:focus{

    outline:none;

    border-color:var(--gold);

    box-shadow:
    0 0 0 4px rgba(246,200,108,0.2);
}

/* =========================
   FILTER
========================= */

.filter-bar{

    display:flex;

    flex-wrap:wrap;

    justify-content:center;

    gap:10px;

    margin-bottom:24px;
}

.filter-btn{

    border:none;

    background:#fff6ea;

    color:#b07910;

    padding:10px 16px;

    border-radius:999px;

    cursor:pointer;

    font-size:
    calc(var(--base-font-size) * 0.62);

    font-weight:700;

    font-family:inherit;
}

.filter-btn:hover{

    background:#ffe8be;
}

.filter-btn.active{

    background:var(--gold);

    color:#5d4523;
}

/* =========================
   GRID
========================= */

.grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fill,minmax(230px,1fr));

    gap:18px;
}

/* =========================
   CARD
========================= */

.card{

    background:var(--card);

    border-radius:24px;

    padding:18px;

    border:
    1px solid rgba(142,122,112,0.08);

    box-shadow:
    0 6px 18px rgba(84,67,58,0.05);

    transition:0.25s;
}

.card:hover{

    transform:translateY(-4px);

    box-shadow:
    0 14px 28px rgba(84,67,58,0.08);
}

.card-icon{

    font-size:30px;

    margin-bottom:12px;
}

.card-title{

    font-size:
    calc(var(--base-font-size) * 1.0);

    font-weight:700;

    margin-bottom:8px;

    word-break:break-word;
}

.card-desc{

    color:var(--sub);

    line-height:1.6;

    font-size:
    calc(var(--base-font-size) * 0.7);

    margin-bottom:10px;
}

/* =========================
   TAG
========================= */

.tags{

    display:flex;

    flex-wrap:wrap;

    gap:6px;

    margin-top:8px;
}

.tag{

    background:#fff5e6;

    color:#b07910;

    padding:5px 10px;

    border-radius:999px;

    font-size:
    calc(var(--base-font-size) * 0.5);

    font-weight:700;
}

/* =========================
   BUTTON
========================= */

.open-btn{

    width:100%;

    margin-top:14px;

    border:none;

    background:var(--gold);

    color:var(--text);

    padding:11px;

    border-radius:14px;

    font-family:inherit;

    font-size:
    calc(var(--base-font-size) * 0.68);

    font-weight:700;

    cursor:pointer;

    transition:0.2s;
}

.open-btn:hover{

    background:var(--gold-hover);
}

/* =========================
   LOADING
========================= */

.loading{

    text-align:center;

    color:var(--sub);

    padding:60px 20px;

    font-size:
    calc(var(--base-font-size) * 0.9);
}

/* =========================
   FOOTER
========================= */

.footer{

    text-align:center;

    margin-top:50px;

    color:var(--sub);

    font-size:14px;
}

.footer b{

    color:var(--pink);
}

/* =========================
   WATERMARK
========================= */

.watermark{

    position:fixed;

    right:22px;
    bottom:22px;

    color:
    rgba(142,122,112,0.4);

    font-size:12px;

    pointer-events:none;
}

</style>
</head>

<body>

<div class="decor-border"></div>

<div class="watermark">
    Made with pastel clouds by <b>ChuChu</b> ✦
</div>

<div class="container">

    <!-- FONT CONTROL -->

    <div class="font-control">

        <button
            id="font-small"
            class="font-btn"
            onclick="changeFontSize('small')"
        >
            A -
        </button>

        <button
            id="font-medium"
            class="font-btn active"
            onclick="changeFontSize('medium')"
        >
            A
        </button>

        <button
            id="font-large"
            class="font-btn"
            onclick="changeFontSize('large')"
        >
            A +
        </button>

    </div>

    <!-- HERO -->

    <div class="hero">

        <div class="badge">
            ☁ 奶油雲朵網站收藏館
        </div>

        <h1 class="title">
            Cream Cloud Archive
        </h1>

        <p class="subtitle">
            混沌、靈感與奶油雲朵 ✦
        </p>

    </div>

    <!-- SEARCH -->

    <div class="search-box">

        <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="搜尋網站名稱..."
        >

    </div>

    <!-- FILTER -->

    <div class="filter-bar">

        <button
            class="filter-btn active"
            onclick="filterCategory('all', this)"
        >
            全部
        </button>

        <button
            class="filter-btn"
            onclick="filterCategory('生活工具', this)"
        >
            ☁ 生活工具
        </button>

        <button
            class="filter-btn"
            onclick="filterCategory('生成宇宙', this)"
        >
            🎀 生成宇宙
        </button>

        <button
            class="filter-btn"
            onclick="filterCategory('摸魚遊樂園', this)"
        >
            🍞 摸魚遊樂園
        </button>

        <button
            class="filter-btn"
            onclick="filterCategory('奇怪實驗室', this)"
        >
            ✨ 奇怪實驗室
        </button>

        <button
            class="filter-btn"
            onclick="filterCategory('美食開團部', this)"
        >
            🧁 美食開團部
        </button>

        <button
            class="filter-btn"
            onclick="filterCategory('創作角落', this)"
        >
            📖 創作角落
        </button>

    </div>

    <!-- GRID -->

    <div id="appGrid" class="grid">

        <div class="loading">
            ☁ 正在讀取奶油雲朵小工具們...
        </div>

    </div>

    <!-- FOOTER -->

    <div class="footer">

        <div>
            ✦ Cream Cloud Archive ✦
        </div>

        <div>
            Designed by <b>ChuChu</b> © 2026
        </div>

    </div>

</div>

<script>

/* =========================
   GITHUB
========================= */

const GITHUB_USER = "TofuDouce";
const GITHUB_REPO = "schedule-app";
const GITHUB_FOLDER = "cloudcream";

/* =========================
   DOM
========================= */

const appGrid =
document.getElementById("appGrid");

const searchInput =
document.getElementById("searchInput");

let allApps = [];

let currentCategory = "all";

/* =========================
   FONT SIZE
========================= */

function changeFontSize(size){

    const root =
    document.documentElement;

    document
    .querySelectorAll(".font-btn")
    .forEach(btn =>
        btn.classList.remove("active")
    );

    document
    .getElementById(`font-${size}`)
    .classList.add("active");

    if(size === "small"){

        root.style.setProperty(
            "--base-font-size",
            "16px"
        );
    }

    else if(size === "medium"){

        root.style.setProperty(
            "--base-font-size",
            "20px"
        );
    }

    else if(size === "large"){

        root.style.setProperty(
            "--base-font-size",
            "26px"
        );
    }

}

/* =========================
   CATEGORY
========================= */

function detectCategory(name){

    const lower =
    name.toLowerCase();

    if(

        lower.includes("0050") ||
        lower.includes("stock") ||
        lower.includes("fee") ||
        lower.includes("schedule") ||
        lower.includes("shift")

    ){

        return{

            category:"生活工具",

            tags:[
                "工具",
                "生活",
                "計算"
            ]

        };

    }

    if(

        lower.includes("id") ||
        lower.includes("logo") ||
        lower.includes("generator") ||
        lower.includes("novel")

    ){

        return{

            category:"生成宇宙",

            tags:[
                "生成器",
                "創作",
                "靈感"
            ]

        };

    }

    if(

        lower.includes("game") ||
        lower.includes("play")

    ){

        return{

            category:"摸魚遊樂園",

            tags:[
                "遊戲",
                "快樂",
                "摸魚"
            ]

        };

    }

    if(

        lower.includes("food") ||
        lower.includes("eat")

    ){

        return{

            category:"美食開團部",

            tags:[
                "美食",
                "團購",
                "下午茶"
            ]

        };

    }

    return{

        category:"奇怪實驗室",

        tags:[
            "混沌",
            "神秘",
            "怪東西"
        ]

    };

}

/* =========================
   LOAD APPS
========================= */

async function loadApps(){

    try{

        const apiUrl =

        `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_FOLDER}`;

        const response =
        await fetch(apiUrl);

        const files =
        await response.json();

        const htmlFiles =
        files.filter(file =>

            file.name
            .toLowerCase()
            .endsWith(".html") &&

            file.name
            .toLowerCase() !== "index.html"

        );

        allApps = await Promise.all(

            htmlFiles.map(async file => {

                const cleanName =

                file.name
                .replace(".html","")
                .replace(/[-_]/g," ");

                const info =
                detectCategory(cleanName);

                let websiteTitle =
                `${info.category}的小工具網站 ✦`;

                try{

                    const fileResponse =
                    await fetch(file.download_url);

                    const htmlText =
                    await fileResponse.text();

                    const titleMatch =
                    htmlText.match(
                        /<title>(.*?)<\/title>/i
                    );

                    if(
                        titleMatch &&
                        titleMatch[1]
                    ){

                        websiteTitle =
                        titleMatch[1];

                    }

                }catch(error){

                    console.log(
                        "讀取 title 失敗",
                        error
                    );

                }

                return{

                    title:cleanName,

                    file:file.name,

                    desc:websiteTitle,

                    icon:
                    randomIcon(),

                    category:
                    info.category,

                    tags:
                    info.tags

                };

            })

        );

        renderApps(allApps);

    }

    catch(error){

        console.error(error);

        appGrid.innerHTML = `

            <div class="loading">
                ❌ 無法讀取資料夾內容
            </div>

        `;
    }

}

/* =========================
   RENDER
========================= */

function renderApps(apps){

    if(apps.length === 0){

        appGrid.innerHTML = `

            <div class="loading">
                ☁ 沒有找到網站
            </div>

        `;

        return;
    }

    appGrid.innerHTML = "";

    apps.forEach(app => {

        const card =
        document.createElement("div");

        card.className = "card";

        card.innerHTML = `

            <div class="card-icon">
                ${app.icon}
            </div>

            <div class="card-title">
                ${app.title}
            </div>

            <div class="card-desc">
                ${app.desc}
            </div>

            <div class="tags">

                ${app.tags.map(tag =>

                    `<div class="tag">${tag}</div>`

                ).join("")}

            </div>

            <button
                class="open-btn"
                onclick="openApp('${app.file}')"
            >
                ✦ OPEN ✦
            </button>

        `;

        appGrid.appendChild(card);

    });

}

/* =========================
   FILTER
========================= */

function filterCategory(category, button){

    currentCategory = category;

    document
    .querySelectorAll(".filter-btn")
    .forEach(btn =>
        btn.classList.remove("active")
    );

    button.classList.add("active");

    applyFilters();

}

/* =========================
   SEARCH
========================= */

searchInput.addEventListener(
    "input",
    applyFilters
);

function applyFilters(){

    const keyword =

    searchInput.value
    .toLowerCase();

    const filtered =

    allApps.filter(app => {

        const matchKeyword =

        app.title
        .toLowerCase()
        .includes(keyword);

        const matchCategory =

        currentCategory === "all" ||

        app.category === currentCategory;

        return(
            matchKeyword &&
            matchCategory
        );

    });

    renderApps(filtered);

}

/* =========================
   OPEN
========================= */

function openApp(file){

    window.location.href = file;

}

/* =========================
   ICON
========================= */

function randomIcon(){

    const icons = [

        "☁",
        "🌸",
        "🧁",
        "🍓",
        "📖",
        "✨",
        "🌷",
        "🫧",
        "🍞",
        "🎀"

    ];

    return icons[
        Math.floor(
            Math.random() * icons.length
        )
    ];

}

/* =========================
   START
========================= */

loadApps();

</script>

</body>
</html>
