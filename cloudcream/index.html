<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>☁ Cream Cloud Archive ☁</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg1:#fff9f6;
    --bg2:#ffebe3;

    --card:#ffffff;

    --text:#54433a;
    --sub:#8e7a70;

    --gold:#f6c86c;
    --gold-hover:#efb94d;

    --pink:#f79999;

    --line:#eadfd8;
}

body{
    min-height:100vh;

    background:
    linear-gradient(
        180deg,
        var(--bg1) 0%,
        var(--bg2) 100%
    );

    font-family:
    "Zen Maru Gothic",
    "Quicksand",
    sans-serif;

    color:var(--text);

    padding:28px;
}

.decor-border{
    position:fixed;
    inset:12px;

    border:2px dashed rgba(142,122,112,0.15);

    border-radius:24px;

    pointer-events:none;
}

.container{
    max-width:1300px;
    margin:auto;
    position:relative;
    z-index:2;
}

.hero{
    text-align:center;
    margin-bottom:34px;
}

.badge{
    display:inline-block;

    background:
    rgba(246,200,108,0.18);

    color:#b07910;

    padding:7px 18px;

    border-radius:999px;

    font-size:15px;
    font-weight:700;

    margin-bottom:14px;
}

.title{
    font-size:clamp(34px,5vw,52px);
    line-height:1.4;
}

.subtitle{
    color:var(--sub);
    margin-top:10px;
    line-height:1.8;
}

.search-box{
    margin:30px auto;
    max-width:700px;
}

.search-input{
    width:100%;

    padding:16px 20px;

    border:none;

    border-radius:20px;

    background:white;

    border:1.5px solid rgba(142,122,112,0.12);

    font-family:inherit;

    font-size:16px;

    color:var(--text);

    box-shadow:
    0 8px 24px rgba(84,67,58,0.05);
}

.search-input:focus{
    outline:none;

    border-color:var(--gold);

    box-shadow:
    0 0 0 4px rgba(246,200,108,0.2);
}

.grid{
    display:grid;

    grid-template-columns:
    repeat(auto-fill,minmax(280px,1fr));

    gap:24px;
}

.card{
    background:var(--card);

    border-radius:28px;

    padding:24px;

    border:1px solid rgba(142,122,112,0.1);

    box-shadow:
    0 10px 30px rgba(84,67,58,0.05);

    transition:0.25s;
}

.card:hover{
    transform:translateY(-4px);

    box-shadow:
    0 18px 40px rgba(84,67,58,0.08);
}

.card-icon{
    font-size:38px;
    margin-bottom:16px;
}

.card-title{
    font-size:22px;
    font-weight:700;

    margin-bottom:10px;
}

.card-desc{
    color:var(--sub);

    line-height:1.8;

    font-size:15px;

    min-height:60px;
}

.tags{
    display:flex;
    flex-wrap:wrap;
    gap:8px;

    margin-top:16px;
}

.tag{
    background:#fff5e6;

    color:#b07910;

    padding:6px 12px;

    border-radius:999px;

    font-size:12px;
    font-weight:700;
}

.open-btn{
    width:100%;

    margin-top:20px;

    border:none;

    background:var(--gold);

    color:var(--text);

    padding:14px;

    border-radius:16px;

    font-family:inherit;
    font-size:16px;
    font-weight:700;

    cursor:pointer;

    transition:0.2s;
}

.open-btn:hover{
    background:var(--gold-hover);
}

.loading{
    text-align:center;
    color:var(--sub);
    padding:60px 20px;
}

.footer{
    text-align:center;

    margin-top:50px;

    color:var(--sub);

    font-size:14px;
}

.footer b{
    color:var(--pink);
}

.watermark{
    position:fixed;

    right:24px;
    bottom:24px;

    color:rgba(142,122,112,0.4);

    font-size:12px;

    pointer-events:none;
}

</style>
</head>

<body>

<div class="decor-border"></div>

<div class="watermark">
    Made with pastel clouds by <b>ChuChu</b> ✦
</div>

<div class="container">

    <div class="hero">

        <div class="badge">
            ☁ 奶油雲朵網站收藏館
        </div>

        <h1 class="title">
            Cream Cloud Archive
        </h1>

        <p class="subtitle">
            自動讀取資料夾中的 HTML 網站並展示成日系粉彩卡片 ✦
        </p>

    </div>

    <div class="search-box">
        <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="搜尋網站名稱..."
        >
    </div>

    <div id="appGrid" class="grid">
        <div class="loading">
            ☁ 正在讀取奶油雲朵小工具們...
        </div>
    </div>

    <div class="footer">
        <div>
            ✦ Cream Cloud Archive ✦
        </div>

        <div>
            Designed by <b>ChuChu</b> © 2026
        </div>
    </div>

</div>

<script>

/* =========================
   GitHub Repo 設定
========================= */

const GITHUB_USER = "你的GitHub帳號";
const GITHUB_REPO = "你的repo名稱";
const GITHUB_FOLDER = "archive";

/* =========================
   DOM
========================= */

const appGrid = document.getElementById("appGrid");
const searchInput = document.getElementById("searchInput");

let allApps = [];

/* =========================
   自動讀取 GitHub 資料夾
========================= */

async function loadApps(){

    try{

        const apiUrl =
        `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_FOLDER}`;

        const response = await fetch(apiUrl);

        const files = await response.json();

        const htmlFiles = files.filter(file =>
            file.name.endsWith(".html") &&
            file.name !== "index.html"
        );

        allApps = htmlFiles.map(file => {

            const cleanName =
            file.name
            .replace(".html","")
            .replace(/[-_]/g," ");

            return{
                title: toTitleCase(cleanName),
                file: file.name,
                desc: "奶油雲朵風格小工具網站 ✦",
                icon: randomIcon(),
                tags: ["pastel","tool","html"]
            };

        });

        renderApps(allApps);

    }catch(error){

        appGrid.innerHTML = `
            <div class="loading">
                ❌ 無法讀取資料夾內容
            </div>
        `;

        console.error(error);

    }

}

/* =========================
   Render
========================= */

function renderApps(apps){

    if(apps.length === 0){

        appGrid.innerHTML = `
            <div class="loading">
                ☁ 沒有找到網站
            </div>
        `;

        return;
    }

    appGrid.innerHTML = "";

    apps.forEach(app => {

        const card = document.createElement("div");

        card.className = "card";

        card.innerHTML = `

            <div class="card-icon">
                ${app.icon}
            </div>

            <div class="card-title">
                ${app.title}
            </div>

            <div class="card-desc">
                ${app.desc}
            </div>

            <div class="tags">
                ${app.tags.map(tag =>
                    `<div class="tag">${tag}</div>`
                ).join("")}
            </div>

            <button
                class="open-btn"
                onclick="openApp('${app.file}')"
            >
                ✦ OPEN ✦
            </button>

        `;

        appGrid.appendChild(card);

    });

}

/* =========================
   開啟網站
========================= */

function openApp(file){

    window.location.href = file;

}

/* =========================
   搜尋
========================= */

searchInput.addEventListener("input", e => {

    const keyword =
    e.target.value.toLowerCase();

    const filtered = allApps.filter(app =>
        app.title.toLowerCase().includes(keyword)
    );

    renderApps(filtered);

});

/* =========================
   小工具
========================= */

function toTitleCase(str){

    return str.replace(
        /\w\S*/g,
        txt =>
        txt.charAt(0).toUpperCase() +
        txt.substring(1).toLowerCase()
    );

}

function randomIcon(){

    const icons = [
        "☁",
        "🌸",
        "🧁",
        "🍓",
        "📖",
        "✨",
        "🌷",
        "🫧",
        "🍞",
        "🎀"
    ];

    return icons[
        Math.floor(Math.random() * icons.length)
    ];

}

/* =========================
   Start
========================= */

loadApps();

</script>

</body>
</html>
