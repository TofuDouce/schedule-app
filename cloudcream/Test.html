<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>✦ 星語娃娃觀測站・Ultimate Edition ✦</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg1:#fff8f4;
    --bg2:#ffe7e1;

    --card:#ffffff88;
    --card-border:#ffffff66;

    --text:#58473d;
    --sub:#917f75;

    --gold:#f5c56e;
    --gold2:#f3b44c;

    --pink:#ff92b2;
    --pink2:#ffb5c8;

    --shadow:
    0 10px 30px rgba(0,0,0,.05),
    0 0 80px rgba(255,255,255,.25);

}

body{

    min-height:100vh;
    overflow-x:hidden;

    background:
    radial-gradient(circle at top left,#ffffff 0%,transparent 25%),
    radial-gradient(circle at bottom right,#ffd9e8 0%,transparent 30%),
    linear-gradient(180deg,var(--bg1),var(--bg2));

    font-family:
    "Zen Maru Gothic",
    "Quicksand",
    sans-serif;

    color:var(--text);

    padding:28px;

}

/* 星空 */

.stars{

    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:0;

}

.star{

    position:absolute;
    width:4px;
    height:4px;
    border-radius:50%;
    background:white;
    opacity:.5;
    animation: twinkle linear infinite;

}

@keyframes twinkle{

    0%{
        transform:translateY(0px) scale(.8);
        opacity:.2;
    }

    50%{
        transform:translateY(-8px) scale(1.4);
        opacity:1;
    }

    100%{
        transform:translateY(0px) scale(.8);
        opacity:.2;
    }

}

.container{

    position:relative;
    z-index:2;

    max-width:1400px;
    margin:auto;

}

.hero{

    text-align:center;
    margin-bottom:28px;

}

.badge{

    display:inline-flex;
    align-items:center;
    gap:8px;

    padding:8px 18px;

    border-radius:999px;

    background:rgba(255,255,255,.5);

    backdrop-filter:blur(16px);

    border:1px solid rgba(255,255,255,.7);

    box-shadow:var(--shadow);

    font-size:13px;
    font-weight:700;

    color:#ff7da4;

    margin-bottom:18px;

}

.title{

    font-size:clamp(32px,5vw,58px);
    line-height:1.2;

    margin-bottom:10px;

    text-shadow:
    0 2px 0 rgba(255,255,255,.8),
    0 10px 30px rgba(255,255,255,.5);

}

.subtitle{

    color:var(--sub);
    font-size:15px;

}

.layout{

    display:grid;
    grid-template-columns:1.2fr .8fr;
    gap:24px;

}

@media(max-width:980px){

    .layout{
        grid-template-columns:1fr;
    }

}

.card{

    position:relative;

    background:var(--card);

    backdrop-filter:blur(22px);

    border:1px solid var(--card-border);

    border-radius:34px;

    box-shadow:var(--shadow);

    overflow:hidden;

}

.card::before{

    content:"";

    position:absolute;
    inset:0;

    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,.4),
        transparent 40%
    );

    pointer-events:none;

}

.left-panel{

    padding:26px;

}

.section-title{

    display:flex;
    align-items:center;
    justify-content:space-between;

    margin-bottom:18px;

}

.section-title h2{

    font-size:28px;

}

/* 狀態 */

.status-box{

    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;

    margin-bottom:18px;

}

@media(max-width:800px){

    .status-box{
        grid-template-columns:repeat(2,1fr);
    }

}

.status{

    background:rgba(255,255,255,.45);

    border:1px solid rgba(255,255,255,.55);

    border-radius:22px;

    padding:16px;

    text-align:center;

}

.status .label{

    font-size:12px;
    color:var(--sub);

    margin-bottom:8px;

}

.status .value{

    font-size:20px;
    font-weight:700;

}

.love{
    color:#ff7ea7;
}

.happy{
    color:#ffb74d;
}

.clean{
    color:#6ec7ff;
}

.energy{
    color:#b28cff;
}

/* 舞台 */

.stage{

    position:relative;

    height:600px;

    border-radius:30px;

    overflow:hidden;

    background:
    radial-gradient(circle at top,#fffefc,#fff4ee);

    border:2px solid rgba(255,255,255,.65);

    box-shadow:
    inset 0 0 40px rgba(255,255,255,.6),
    0 20px 50px rgba(255,200,220,.15);

}

/* 房間背景 */

.room-bg{

    position:absolute;
    inset:0;

    background:
    radial-gradient(circle at top,#fff6f0,#ffe7df);

}

/* 漂浮光 */

.glow{

    position:absolute;

    width:420px;
    height:420px;

    border-radius:50%;

    background:
    radial-gradient(circle,
    rgba(255,255,255,.95),
    transparent 70%);

    filter:blur(50px);

    animation:floatGlow 8s ease-in-out infinite;

}

.glow1{
    top:-100px;
    left:-100px;
}

.glow2{
    bottom:-120px;
    right:-120px;
    animation-delay:4s;
}

@keyframes floatGlow{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-30px);
    }

    100%{
        transform:translateY(0px);
    }

}

.placeholder{

    position:absolute;
    inset:0;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    text-align:center;

    color:var(--sub);

}

.placeholder-icon{

    font-size:100px;
    margin-bottom:14px;

    animation:idleFloat 4s ease-in-out infinite;

}

@keyframes idleFloat{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-16px);
    }

    100%{
        transform:translateY(0px);
    }

}

/* 娃娃 */

#doll{

    position:absolute;

    left:50%;
    bottom:45px;

    transform:translateX(-50%);

    max-width:75%;
    max-height:480px;

    object-fit:contain;

    display:none;

    pointer-events:none;

    filter:
    drop-shadow(0 20px 30px rgba(0,0,0,.15));

    animation:breathing 4s ease-in-out infinite;

    transform-origin:center bottom;

}

@keyframes breathing{

    0%{
        transform:
        translateX(-50%)
        translateY(0px)
        scale(1);
    }

    50%{
        transform:
        translateX(-50%)
        translateY(-10px)
        scale(1.03);
    }

    100%{
        transform:
        translateX(-50%)
        translateY(0px)
        scale(1);
    }

}

/* 對話 */

.dialog{

    position:absolute;

    top:30px;
    left:50%;

    transform:translateX(-50%);

    background:rgba(255,255,255,.8);

    backdrop-filter:blur(14px);

    border:1px solid rgba(255,255,255,.8);

    border-radius:20px;

    padding:14px 20px;

    font-size:15px;

    color:var(--text);

    box-shadow:0 10px 30px rgba(0,0,0,.06);

    opacity:0;

    transition:.4s;

    pointer-events:none;

}

.dialog.show{

    opacity:1;
    transform:translateX(-50%) translateY(8px);

}

/* 工具列 */

.tools{

    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:12px;

    margin-top:18px;

}

@media(max-width:680px){

    .tools{
        grid-template-columns:repeat(2,1fr);
    }

}

.tool{

    border:none;

    background:rgba(255,255,255,.55);

    backdrop-filter:blur(14px);

    border:1px solid rgba(255,255,255,.75);

    border-radius:24px;

    padding:14px;

    cursor:pointer;

    transition:.25s;

    font-family:inherit;

}

.tool:hover{

    transform:translateY(-5px) scale(1.03);

}

.tool.active{

    background:linear-gradient(
    135deg,
    #fff7db,
    #ffe8a9);

    border-color:#ffd36d;

    box-shadow:
    0 0 0 4px rgba(255,211,109,.25);

}

.tool .emoji{

    font-size:28px;
    margin-bottom:8px;

}

.tool .name{

    font-size:14px;
    font-weight:700;

}

/* 右邊 */

.right-panel{

    padding:24px;

}

.input-group{

    margin-bottom:18px;

}

.label{

    display:block;

    margin-bottom:8px;

    font-size:14px;
    font-weight:700;

}

.input{

    width:100%;

    padding:14px 16px;

    border:none;

    border-radius:18px;

    background:rgba(255,255,255,.6);

    backdrop-filter:blur(14px);

    border:1px solid rgba(255,255,255,.7);

    font-size:15px;

    font-family:inherit;

}

.input:focus{

    outline:none;

    border-color:#ffd36d;

}

.file-btn,
.main-btn{

    width:100%;

    border:none;

    border-radius:18px;

    padding:16px;

    font-family:inherit;

    font-size:15px;
    font-weight:700;

    cursor:pointer;

    transition:.25s;

}

.file-btn{

    background:#54433a;
    color:white;

}

.main-btn{

    background:linear-gradient(
    135deg,
    #ffd67d,
    #ffb67a);

    color:#533f32;

    margin-top:8px;

}

.main-btn:hover{

    transform:translateY(-3px);

}

/* 收藏牆 */

.gallery{

    margin-top:24px;
    padding:24px;

}

.gallery-title{

    display:flex;
    align-items:center;
    justify-content:space-between;

    margin-bottom:18px;

}

.gallery-scroll{

    display:flex;
    gap:16px;

    overflow-x:auto;

    padding-bottom:10px;

}

.gallery-scroll::-webkit-scrollbar{

    height:8px;

}

.gallery-scroll::-webkit-scrollbar-thumb{

    background:rgba(255,255,255,.4);

    border-radius:999px;

}

.doll-card{

    min-width:240px;

    background:rgba(255,255,255,.5);

    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,.7);

    border-radius:26px;

    padding:16px;

    cursor:pointer;

    transition:.25s;

    position:relative;

}

.doll-card:hover{

    transform:translateY(-8px);

}

.doll-card.active{

    border-color:#ffd36d;

    box-shadow:
    0 0 0 4px rgba(255,211,109,.2);

}

.doll-thumb{

    width:100%;
    height:180px;

    object-fit:cover;

    border-radius:20px;

    margin-bottom:14px;

}

.doll-name{

    font-size:18px;
    font-weight:700;

    margin-bottom:6px;

}

.doll-desc{

    font-size:13px;
    color:var(--sub);

    margin-bottom:10px;

}

.doll-stats{

    display:flex;
    gap:10px;
    flex-wrap:wrap;

    font-size:12px;

}

.tag{

    padding:6px 10px;

    border-radius:999px;

    background:rgba(255,255,255,.7);

}

.delete{

    position:absolute;
    top:12px;
    right:12px;

    width:34px;
    height:34px;

    border:none;
    border-radius:50%;

    background:rgba(255,255,255,.75);

    cursor:pointer;

}

/* 粒子 */

.particle{

    position:absolute;

    pointer-events:none;

    font-size:34px;

    animation:particle 1.5s ease-out forwards;

}

@keyframes particle{

    0%{
        opacity:0;
        transform:
        translate(-50%,-50%)
        scale(.2);
    }

    20%{
        opacity:1;
    }

    100%{
        opacity:0;
        transform:
        translate(
            calc(-50% + var(--x)),
            calc(-50% + var(--y))
        )
        rotate(var(--r))
        scale(1.3);
    }

}

/* 互動動畫 */

.ani-pet{

    animation:pet .4s ease;

}

@keyframes pet{

    0%{
        transform:translateX(-50%) scale(1);
    }

    30%{
        transform:translateX(-50%) scale(1.08,.94);
    }

    100%{
        transform:translateX(-50%) scale(1);
    }

}

.ani-feed{

    animation:feed .45s ease;

}

@keyframes feed{

    0%{
        transform:translateX(-50%) scale(1);
    }

    40%{
        transform:translateX(-50%) scale(1.16);
    }

    100%{
        transform:translateX(-50%) scale(1);
    }

}

.ani-photo{

    animation:photo .35s ease;

}

@keyframes photo{

    0%{
        transform:translateX(-50%) scale(1);
    }

    50%{
        transform:
        translateX(-50%)
        translateY(-20px)
        scale(1.12);
    }

    100%{
        transform:translateX(-50%) scale(1);
    }

}

.footer{

    margin-top:24px;

    text-align:center;

    color:var(--sub);

    font-size:13px;

}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="container">

    <div class="hero">

        <div class="badge">
            ✨ Ultimate Healing Doll System v10.0
        </div>

        <h1 class="title">
            ✦ 星語娃娃觀測站 ✦
        </h1>

        <div class="subtitle">
            每一隻娃娃，都擁有自己的宇宙與情緒。
        </div>

    </div>

    <div class="layout">

        <!-- 左邊 -->

        <div class="card left-panel">

            <div class="section-title">
                <h2 id="mainTitle">
                    🧸 尚未選擇娃娃
                </h2>
            </div>

            <div class="status-box">

                <div class="status">
                    <div class="label">💖 親密度</div>
                    <div class="value love" id="loveText">0</div>
                </div>

                <div class="status">
                    <div class="label">🌸 心情值</div>
                    <div class="value happy" id="moodText">100</div>
                </div>

                <div class="status">
                    <div class="label">🛁 清潔度</div>
                    <div class="value clean" id="cleanText">100</div>
                </div>

                <div class="status">
                    <div class="label">🌙 精力值</div>
                    <div class="value energy" id="energyText">100</div>
                </div>

            </div>

            <div class="stage" id="stage">

                <div class="room-bg"></div>

                <div class="glow glow1"></div>
                <div class="glow glow2"></div>

                <div class="dialog" id="dialog">
                    ...
                </div>

                <div class="placeholder" id="placeholder">

                    <div class="placeholder-icon">
                        🌙
                    </div>

                    <div>
                        還沒有正在陪伴你的娃娃<br>
                        在右側召喚第一位夥伴吧 ✨
                    </div>

                </div>

                <img id="doll">

            </div>

            <div class="tools">

                <button class="tool active" onclick="setTool('pet',this)">
                    <div class="emoji">🖐️</div>
                    <div class="name">摸摸</div>
                </button>

                <button class="tool" onclick="setTool('feed',this)">
                    <div class="emoji">🍼</div>
                    <div class="name">餵食</div>
                </button>

                <button class="tool" onclick="setTool('beauty',this)">
                    <div class="emoji">✨</div>
                    <div class="name">打扮</div>
                </button>

                <button class="tool" onclick="setTool('photo',this)">
                    <div class="emoji">📸</div>
                    <div class="name">拍照</div>
                </button>

                <button class="tool" onclick="setTool('sleep',this)">
                    <div class="emoji">🌙</div>
                    <div class="name">睡覺</div>
                </button>

            </div>

        </div>

        <!-- 右邊 -->

        <div class="card right-panel">

            <div class="section-title">
                <h2>✨ 召喚新夥伴</h2>
            </div>

            <div class="input-group">

                <label class="label">
                    娃娃名字
                </label>

                <input
                    class="input"
                    id="nameInput"
                    placeholder="例如：星星熊..."
                >

            </div>

            <div class="input-group">

                <label class="label">
                    備註 / 類型
                </label>

                <input
                    class="input"
                    id="descInput"
                    placeholder="例如：20cm 棉花娃"
                >

            </div>

            <div class="input-group">

                <label class="label">
                    上傳照片
                </label>

                <label class="file-btn" for="fileInput">
                    📸 選擇娃娃照片
                </label>

                <input
                    type="file"
                    id="fileInput"
                    accept="image/*"
                    hidden
                >

            </div>

            <button class="main-btn" onclick="addDoll()">
                ✦ 收入星語圖鑑 ✦
            </button>

        </div>

    </div>

    <!-- 收藏牆 -->

    <div class="card gallery">

        <div class="gallery-title">

            <h2>
                🧸 我的娃娃宇宙
            </h2>

            <div id="countText">
                0 隻娃娃
            </div>

        </div>

        <div class="gallery-scroll" id="gallery">

        </div>

    </div>

    <div class="footer">
        ✦ 星語娃娃觀測站 Ultimate Edition © 2026 ✦
    </div>

</div>

<script>

/* =========================
   星空
========================= */

const stars = document.getElementById('stars');

for(let i=0;i<80;i++){

    const s = document.createElement('div');

    s.className = 'star';

    s.style.left = Math.random()*100 + '%';
    s.style.top = Math.random()*100 + '%';

    s.style.animationDuration =
    2 + Math.random()*6 + 's';

    s.style.opacity =
    Math.random();

    stars.appendChild(s);

}

/* =========================
   資料
========================= */

const STORAGE_KEY = 'ultimate_doll_system_v10';

let dolls = [];

let activeId = null;

let tempImage = '';

let currentTool = 'pet';

/* =========================
   UI
========================= */

const UI = {

    stage:document.getElementById('stage'),
    doll:document.getElementById('doll'),
    placeholder:document.getElementById('placeholder'),

    title:document.getElementById('mainTitle'),

    love:document.getElementById('loveText'),
    mood:document.getElementById('moodText'),
    clean:document.getElementById('cleanText'),
    energy:document.getElementById('energyText'),

    gallery:document.getElementById('gallery'),

    dialog:document.getElementById('dialog')

};

/* =========================
   初始化
========================= */

window.onload = ()=>{

    load();

    renderGallery();

    if(dolls.length){
        selectDoll(dolls[0].id);
    }

};

/* =========================
   圖片
========================= */

document
.getElementById('fileInput')
.addEventListener('change',e=>{

    const file = e.target.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = ev=>{

        tempImage = ev.target.result;

    };

    reader.readAsDataURL(file);

});

/* =========================
   新增
========================= */

function addDoll(){

    const name =
    document
    .getElementById('nameInput')
    .value
    .trim();

    const desc =
    document
    .getElementById('descInput')
    .value
    .trim();

    if(!name){

        alert('請幫娃娃取名字 ✨');
        return;

    }

    if(!tempImage){

        alert('請上傳照片 📸');
        return;

    }

    const doll = {

        id:'doll_'+Date.now(),

        name,

        desc:desc || '沒有備註',

        image:tempImage,

        love:0,
        mood:100,
        clean:100,
        energy:100,

        title:'初次相遇',

        lastTalk:Date.now()

    };

    dolls.push(doll);

    save();

    renderGallery();

    selectDoll(doll.id);

    document.getElementById('nameInput').value = '';
    document.getElementById('descInput').value = '';
    document.getElementById('fileInput').value = '';

    tempImage = '';

}

/* =========================
   選擇
========================= */

function selectDoll(id){

    activeId = id;

    const doll =
    dolls.find(d=>d.id===id);

    if(!doll) return;

    UI.doll.src = doll.image;

    UI.doll.style.display = 'block';

    UI.placeholder.style.display = 'none';

    UI.title.innerHTML =
    `🧸 ${doll.name}`;

    updateStatus();

    renderGallery();

    showDialog(randomTalk('hello'));

}

/* =========================
   更新狀態
========================= */

function updateStatus(){

    const d = getActive();

    if(!d) return;

    UI.love.innerText = d.love;
    UI.mood.innerText = d.mood;
    UI.clean.innerText = d.clean;
    UI.energy.innerText = d.energy;

}

/* =========================
   取得當前
========================= */

function getActive(){

    return dolls.find(
        d=>d.id===activeId
    );

}

/* =========================
   收藏牆
========================= */

function renderGallery(){

    UI.gallery.innerHTML = '';

    document.getElementById('countText')
    .innerText =
    `${dolls.length} 隻娃娃`;

    dolls.forEach(d=>{

        const card =
        document.createElement('div');

        card.className =
        `doll-card ${
            d.id===activeId ? 'active':''
        }`;

        card.onclick = ()=>selectDoll(d.id);

        card.innerHTML = `

            <button
                class="delete"
                onclick="deleteDoll('${d.id}',event)"
            >
                🗑️
            </button>

            <img
                class="doll-thumb"
                src="${d.image}"
            >

            <div class="doll-name">
                ${d.name}
            </div>

            <div class="doll-desc">
                ${d.desc}
            </div>

            <div class="doll-stats">

                <div class="tag">
                    💖 ${d.love}
                </div>

                <div class="tag">
                    🌸 ${d.mood}
                </div>

                <div class="tag">
                    🌙 ${d.energy}
                </div>

            </div>

        `;

        UI.gallery.appendChild(card);

    });

}

/* =========================
   刪除
========================= */

function deleteDoll(id,e){

    e.stopPropagation();

    if(!confirm('確定要讓娃娃離開嗎？🥺'))
    return;

    dolls =
    dolls.filter(d=>d.id!==id);

    save();

    renderGallery();

    if(activeId===id){

        activeId = null;

        if(dolls.length){

            selectDoll(dolls[0].id);

        }else{

            UI.doll.style.display='none';

            UI.placeholder.style.display='flex';

            UI.title.innerHTML='🧸 尚未選擇娃娃';

            UI.love.innerText='0';
            UI.mood.innerText='0';
            UI.clean.innerText='0';
            UI.energy.innerText='0';

        }

    }

}

/* =========================
   工具
========================= */

function setTool(tool,btn){

    currentTool = tool;

    document
    .querySelectorAll('.tool')
    .forEach(t=>t.classList.remove('active'));

    btn.classList.add('active');

}

/* =========================
   點擊互動
========================= */

UI.stage.addEventListener('click',e=>{

    if(!activeId) return;

    interact(e);

});

function interact(e){

    const d = getActive();

    if(!d) return;

    if(currentTool==='pet'){

        d.love += 5;
        d.mood += 3;

        animate('ani-pet');

        particle(e,'💖');

        showDialog(randomTalk('pet'));

    }

    if(currentTool==='feed'){

        d.energy += 10;
        d.mood += 4;

        animate('ani-feed');

        particle(e,'🍼');

        showDialog(randomTalk('feed'));

    }

    if(currentTool==='beauty'){

        d.love += 8;

        particle(e,'✨');

        showDialog(randomTalk('beauty'));

    }

    if(currentTool==='photo'){

        d.love += 4;

        animate('ani-photo');

        particle(e,'📸');

        flash();

        showDialog(randomTalk('photo'));

    }

    if(currentTool==='sleep'){

        d.energy += 20;
        d.mood += 6;

        particle(e,'🌙');

        showDialog(randomTalk('sleep'));

    }

    clamp(d);

    updateStatus();

    save();

    renderGallery();

}

/* =========================
   限制
========================= */

function clamp(d){

    d.mood =
    Math.min(999,Math.max(0,d.mood));

    d.energy =
    Math.min(999,Math.max(0,d.energy));

    d.clean =
    Math.min(999,Math.max(0,d.clean));

}

/* =========================
   動畫
========================= */

function animate(cls){

    UI.doll.classList.remove(
        'ani-pet',
        'ani-feed',
        'ani-photo'
    );

    void UI.doll.offsetWidth;

    UI.doll.classList.add(cls);

}

/* =========================
   粒子
========================= */

function particle(e,emoji){

    const rect =
    UI.stage.getBoundingClientRect();

    const p =
    document.createElement('div');

    p.className='particle';

    p.innerText=emoji;

    p.style.left =
    (e.clientX - rect.left)+'px';

    p.style.top =
    (e.clientY - rect.top)+'px';

    p.style.setProperty(
        '--x',
        (Math.random()*180-90)+'px'
    );

    p.style.setProperty(
        '--y',
        (-120-Math.random()*120)+'px'
    );

    p.style.setProperty(
        '--r',
        (Math.random()*90-45)+'deg'
    );

    UI.stage.appendChild(p);

    setTimeout(()=>{

        p.remove();

    },1500);

}

/* =========================
   對話
========================= */

function showDialog(text){

    UI.dialog.innerText = text;

    UI.dialog.classList.add('show');

    clearTimeout(UI.dialog.timer);

    UI.dialog.timer = setTimeout(()=>{

        UI.dialog.classList.remove('show');

    },2400);

}

function randomTalk(type){

    const talks = {

        hello:[

            '今天也要一起待著嗎？ ✨',
            '終於等到你了 🌸',
            '嘿嘿，我有乖乖待在這裡唷'

        ],

        pet:[

            '摸摸好舒服 💖',
            '好喜歡被你碰碰...',
            '再摸一下嘛 ✨'

        ],

        feed:[

            '吃飽飽了！',
            '感覺恢復精神了 🌸',
            '最喜歡你餵我了'

        ],

        beauty:[

            '我變漂亮了嗎 ✨',
            '今天想當最可愛的娃娃',
            '閃亮亮模式開啟！'

        ],

        photo:[

            '等等，我要擺姿勢 📸',
            '這張一定很好看！',
            '快拍快拍 ✨'

        ],

        sleep:[

            '晚安呀 🌙',
            '讓我稍微休息一下...',
            '一起進入夢裡吧'

        ]

    };

    const arr = talks[type];

    return arr[
        Math.floor(Math.random()*arr.length)
    ];

}

/* =========================
   閃光
========================= */

function flash(){

    UI.stage.animate(

        [

            {
                filter:'brightness(1)'
            },

            {
                filter:'brightness(1.7)'
            },

            {
                filter:'brightness(1)'
            }

        ],

        {
            duration:180
        }

    );

}

/* =========================
   存檔
========================= */

function save(){

    localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(dolls)
    );

}

/* =========================
   讀取
========================= */

function load(){

    const data =
    localStorage.getItem(STORAGE_KEY);

    if(data){

        dolls = JSON.parse(data);

    }

}

</script>

</body>
</html>
