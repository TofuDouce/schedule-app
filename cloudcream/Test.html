<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>✦ 星語娃娃觀測站 Ultimate ✦</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg1:#fff9f6;
    --bg2:#ffeae2;

    --card:rgba(255,255,255,.55);

    --text:#5d4b42;
    --sub:#9a887d;

    --pink:#ff93b4;
    --gold:#f3bc60;
    --blue:#79c8ff;
    --purple:#b68cff;

}

html,
body{
    overflow-x:hidden;
    overflow-y:auto;
}

body{

    min-height:100vh;

    background:
    radial-gradient(circle at top left,#ffffff 0%,transparent 24%),
    radial-gradient(circle at bottom right,#ffd9eb 0%,transparent 28%),
    linear-gradient(180deg,var(--bg1),var(--bg2));

    font-family:
    "Zen Maru Gothic",
    "Quicksand",
    sans-serif;

    color:var(--text);

    padding:18px;

}

/* 星空背景 */

.stars{

    position:fixed;
    inset:0;

    overflow:hidden;

    pointer-events:none;

    z-index:0;

}

.star{

    position:absolute;

    width:4px;
    height:4px;

    border-radius:50%;

    background:white;

    opacity:.6;

    animation:twinkle linear infinite;

}

@keyframes twinkle{

    0%{
        transform:translateY(0px) scale(.8);
        opacity:.3;
    }

    50%{
        transform:translateY(-8px) scale(1.4);
        opacity:1;
    }

    100%{
        transform:translateY(0px) scale(.8);
        opacity:.3;
    }

}

.container{

    position:relative;
    z-index:2;

    max-width:1280px;
    margin:auto;

    padding-bottom:40px;

}

/* HERO */

.hero{

    text-align:center;

    margin-bottom:14px;

}

.badge{

    display:inline-flex;

    align-items:center;

    gap:8px;

    background:rgba(255,255,255,.55);

    backdrop-filter:blur(14px);

    border:1px solid rgba(255,255,255,.7);

    padding:8px 16px;

    border-radius:999px;

    color:var(--pink);

    font-size:12px;
    font-weight:700;

    margin-bottom:12px;

    box-shadow:
    0 10px 25px rgba(0,0,0,.04);

}

.title{

    font-size:clamp(34px,5vw,56px);

    margin-bottom:4px;

    line-height:1.2;

}

.subtitle{

    color:var(--sub);

    font-size:14px;

}

/* 主布局 */

.layout{

    display:grid;

    grid-template-columns:1.2fr .8fr;

    gap:18px;

}

@media(max-width:980px){

    .layout{
        grid-template-columns:1fr;
    }

}

.card{

    background:var(--card);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.7);

    border-radius:30px;

    box-shadow:
    0 10px 35px rgba(0,0,0,.04);

    overflow:hidden;

}

/* 左側 */

.left-panel{

    padding:18px;

}

.section-title{

    margin-bottom:10px;

}

.section-title h2{

    font-size:24px;

}

/* 超壓縮狀態列 */

.status-strip{

    display:flex;

    align-items:center;
    justify-content:space-between;

    gap:8px;

    margin-bottom:12px;

    background:rgba(255,255,255,.4);

    border-radius:18px;

    padding:10px 14px;

    border:1px solid rgba(255,255,255,.6);

    overflow-x:auto;

}

.status-item{

    display:flex;

    align-items:center;

    gap:6px;

    white-space:nowrap;

    font-size:14px;
    font-weight:700;

}

.status-item span{

    opacity:.7;
    font-size:12px;

}

.love{
    color:var(--pink);
}

.happy{
    color:var(--gold);
}

.clean{
    color:var(--blue);
}

.energy{
    color:var(--purple);
}

/* 舞台 */

.stage{

    position:relative;

    height:min(52vh,600px);

    min-height:280px;

    border-radius:26px;

    overflow:hidden;

    background:
    radial-gradient(circle at top,#fffdfc,#fff3ed);

    border:2px solid rgba(255,255,255,.7);

}

/* 漂浮光 */

.glow{

    position:absolute;

    width:300px;
    height:300px;

    border-radius:50%;

    background:
    radial-gradient(circle,
    rgba(255,255,255,.95),
    transparent 70%);

    filter:blur(45px);

    animation:floatGlow 7s ease-in-out infinite;

}

.glow1{

    top:-100px;
    left:-100px;

}

.glow2{

    right:-100px;
    bottom:-100px;

    animation-delay:3s;

}

@keyframes floatGlow{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-25px);
    }

    100%{
        transform:translateY(0px);
    }

}

/* 娃娃 */

#doll{

    position:absolute;

    left:50%;
    bottom:12px;

    transform:translateX(-50%);

    max-width:80%;
    max-height:82%;

    object-fit:contain;

    display:none;

    pointer-events:none;

    filter:
    drop-shadow(0 18px 30px rgba(0,0,0,.12));

    animation:breathing 4s ease-in-out infinite;

}

@keyframes breathing{

    0%{
        transform:
        translateX(-50%)
        translateY(0px)
        scale(1);
    }

    50%{
        transform:
        translateX(-50%)
        translateY(-8px)
        scale(1.03);
    }

    100%{
        transform:
        translateX(-50%)
        translateY(0px)
        scale(1);
    }

}

/* placeholder */

.placeholder{

    position:absolute;
    inset:0;

    display:flex;

    flex-direction:column;

    align-items:center;
    justify-content:center;

    text-align:center;

    color:var(--sub);

}

.placeholder-icon{

    font-size:84px;

    margin-bottom:10px;

    animation:idleFloat 4s ease-in-out infinite;

}

@keyframes idleFloat{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-14px);
    }

    100%{
        transform:translateY(0px);
    }

}

/* 對話 */

.dialog{

    position:absolute;

    top:18px;
    left:50%;

    transform:translateX(-50%);

    background:rgba(255,255,255,.75);

    backdrop-filter:blur(12px);

    border-radius:18px;

    padding:10px 16px;

    font-size:13px;

    opacity:0;

    transition:.35s;

    pointer-events:none;

}

.dialog.show{

    opacity:1;

    transform:
    translateX(-50%)
    translateY(4px);

}

/* 工具列 */

.tools{

    display:grid;

    grid-template-columns:repeat(5,1fr);

    gap:8px;

    margin-top:10px;

}

@media(max-width:680px){

    .tools{
        grid-template-columns:repeat(5,1fr);
    }

}

.tool{

    border:none;

    background:rgba(255,255,255,.55);

    border:1px solid rgba(255,255,255,.7);

    backdrop-filter:blur(12px);

    border-radius:18px;

    padding:10px 6px;

    cursor:pointer;

    transition:.25s;

    font-family:inherit;

}

.tool:hover{

    transform:translateY(-4px);

}

.tool.active{

    background:
    linear-gradient(
    135deg,
    #fff5d2,
    #ffe7ab);

    border-color:#ffd56d;

}

.tool .emoji{

    font-size:22px;

    margin-bottom:4px;

}

.tool .name{

    font-size:11px;
    font-weight:700;

}

/* 右側 */

.right-panel{

    padding:18px;

}

.input-group{

    margin-bottom:14px;

}

.label{

    display:block;

    margin-bottom:6px;

    font-size:13px;
    font-weight:700;

}

.input{

    width:100%;

    padding:14px;

    border:none;

    border-radius:16px;

    background:rgba(255,255,255,.55);

    border:1px solid rgba(255,255,255,.7);

    font-family:inherit;

    font-size:14px;

}

.input:focus{

    outline:none;

    border-color:#ffd56d;

}

.file-btn,
.main-btn{

    width:100%;

    border:none;

    border-radius:16px;

    padding:14px;

    font-family:inherit;

    font-size:14px;
    font-weight:700;

    cursor:pointer;

}

.file-btn{

    background:#54443a;
    color:white;

}

.main-btn{

    margin-top:8px;

    background:
    linear-gradient(
    135deg,
    #ffd67d,
    #ffbc86);

    color:#5d4638;

}

/* 收藏牆 */

.gallery{

    margin-top:18px;

    padding:18px;

}

.gallery-title{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:14px;

}

.gallery-scroll{

    display:flex;

    gap:14px;

    overflow-x:auto;

    padding-bottom:10px;

}

.gallery-scroll::-webkit-scrollbar{

    height:7px;

}

.gallery-scroll::-webkit-scrollbar-thumb{

    background:rgba(255,255,255,.45);

    border-radius:999px;

}

.doll-card{

    min-width:220px;

    background:rgba(255,255,255,.5);

    border:1px solid rgba(255,255,255,.7);

    border-radius:22px;

    padding:12px;

    position:relative;

    cursor:pointer;

    transition:.25s;

}

.doll-card:hover{

    transform:translateY(-5px);

}

.doll-card.active{

    border-color:#ffd56d;

}

.doll-thumb{

    width:100%;
    height:160px;

    object-fit:cover;

    border-radius:16px;

    margin-bottom:10px;

}

.doll-name{

    font-size:16px;
    font-weight:700;

    margin-bottom:4px;

}

.doll-desc{

    font-size:12px;
    color:var(--sub);

    margin-bottom:8px;

}

.doll-mini{

    display:flex;

    gap:6px;

    flex-wrap:wrap;

}

.tag{

    padding:5px 8px;

    border-radius:999px;

    background:rgba(255,255,255,.65);

    font-size:11px;

}

.delete{

    position:absolute;

    top:10px;
    right:10px;

    width:30px;
    height:30px;

    border:none;

    border-radius:50%;

    background:rgba(255,255,255,.7);

    cursor:pointer;

}

/* 粒子 */

.particle{

    position:absolute;

    pointer-events:none;

    font-size:30px;

    animation:particle 1.4s ease-out forwards;

}

@keyframes particle{

    0%{
        opacity:0;
        transform:
        translate(-50%,-50%)
        scale(.2);
    }

    15%{
        opacity:1;
    }

    100%{
        opacity:0;

        transform:
        translate(
        calc(-50% + var(--x)),
        calc(-50% + var(--y))
        )
        rotate(var(--r))
        scale(1.3);

    }

}

/* 動畫 */

.ani-pet{
    animation:pet .4s ease;
}

@keyframes pet{

    0%{
        transform:translateX(-50%) scale(1);
    }

    35%{
        transform:translateX(-50%) scale(1.08,.94);
    }

    100%{
        transform:translateX(-50%) scale(1);
    }

}

.ani-feed{
    animation:feed .45s ease;
}

@keyframes feed{

    0%{
        transform:translateX(-50%) scale(1);
    }

    50%{
        transform:translateX(-50%) scale(1.12);
    }

    100%{
        transform:translateX(-50%) scale(1);
    }

}

.ani-photo{
    animation:photo .35s ease;
}

@keyframes photo{

    0%{
        transform:translateX(-50%) scale(1);
    }

    50%{
        transform:
        translateX(-50%)
        translateY(-16px)
        scale(1.08);
    }

    100%{
        transform:translateX(-50%) scale(1);
    }

}

.footer{

    text-align:center;

    margin-top:20px;

    color:var(--sub);

    font-size:12px;

}

/* 手機極致優化 */

@media(max-width:768px){

    body{
        padding:12px;
    }

    .hero{
        margin-bottom:10px;
    }

    .badge{

        font-size:10px;

        padding:6px 12px;

        margin-bottom:8px;

    }

    .title{

        font-size:32px;

    }

    .subtitle{

        font-size:12px;

    }

    .left-panel,
    .right-panel,
    .gallery{

        padding:14px;

    }

    .section-title h2{

        font-size:20px;

    }

    .status-strip{

        padding:8px 10px;

    }

    .status-item{

        font-size:13px;

    }

    .stage{

        height:48vh;

        min-height:240px;

    }

    #doll{

        max-height:76%;

    }

    .tool{

        padding:8px 4px;

    }

    .tool .emoji{

        font-size:20px;

    }

    .tool .name{

        font-size:10px;

    }

}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="container">

    <div class="hero">

        <div class="badge">
            ✨ Ultimate Healing Doll System v11.0
        </div>

        <h1 class="title">
            ✦ 星語娃娃觀測站 ✦
        </h1>

        <div class="subtitle">
            每一隻娃娃，都擁有自己的宇宙與情緒。
        </div>

    </div>

    <div class="layout">

        <!-- 左邊 -->

        <div class="card left-panel">

            <div class="section-title">
                <h2 id="mainTitle">
                    🧸 尚未選擇娃娃
                </h2>
            </div>

            <!-- 超壓縮狀態列 -->

            <div class="status-strip">

                <div class="status-item love">
                    💖 <span>親密</span>
                    <b id="loveText">0</b>
                </div>

                <div class="status-item happy">
                    🌸 <span>心情</span>
                    <b id="moodText">100</b>
                </div>

                <div class="status-item clean">
                    🛁 <span>清潔</span>
                    <b id="cleanText">100</b>
                </div>

                <div class="status-item energy">
                    🌙 <span>精力</span>
                    <b id="energyText">100</b>
                </div>

            </div>

            <div class="stage" id="stage">

                <div class="glow glow1"></div>
                <div class="glow glow2"></div>

                <div class="dialog" id="dialog">
                    ...
                </div>

                <div class="placeholder" id="placeholder">

                    <div class="placeholder-icon">
                        🌙
                    </div>

                    <div>
                        還沒有正在陪伴你的娃娃
                    </div>

                </div>

                <img id="doll">

            </div>

            <div class="tools">

                <button class="tool active" onclick="setTool('pet',this)">
                    <div class="emoji">🖐️</div>
                    <div class="name">摸摸</div>
                </button>

                <button class="tool" onclick="setTool('feed',this)">
                    <div class="emoji">🍼</div>
                    <div class="name">餵食</div>
                </button>

                <button class="tool" onclick="setTool('beauty',this)">
                    <div class="emoji">✨</div>
                    <div class="name">打扮</div>
                </button>

                <button class="tool" onclick="setTool('photo',this)">
                    <div class="emoji">📸</div>
                    <div class="name">拍照</div>
                </button>

                <button class="tool" onclick="setTool('sleep',this)">
                    <div class="emoji">🌙</div>
                    <div class="name">睡覺</div>
                </button>

            </div>

        </div>

        <!-- 右邊 -->

        <div class="card right-panel">

            <div class="section-title">
                <h2>✨ 召喚新夥伴</h2>
            </div>

            <div class="input-group">

                <label class="label">
                    娃娃名字
                </label>

                <input
                    class="input"
                    id="nameInput"
                    placeholder="例如：星星熊..."
                >

            </div>

            <div class="input-group">

                <label class="label">
                    備註 / 類型
                </label>

                <input
                    class="input"
                    id="descInput"
                    placeholder="例如：20cm 棉花娃"
                >

            </div>

            <div class="input-group">

                <label class="label">
                    上傳照片
                </label>

                <label class="file-btn" for="fileInput">
                    📸 選擇娃娃照片
                </label>

                <input
                    type="file"
                    id="fileInput"
                    accept="image/*"
                    hidden
                >

            </div>

            <button class="main-btn" onclick="addDoll()">
                ✦ 收入星語圖鑑 ✦
            </button>

        </div>

    </div>

    <!-- 收藏牆 -->

    <div class="card gallery">

        <div class="gallery-title">

            <h2>
                🧸 我的娃娃宇宙
            </h2>

            <div id="countText">
                0 隻娃娃
            </div>

        </div>

        <div class="gallery-scroll" id="gallery"></div>

    </div>

    <div class="footer">
        ✦ 星語娃娃觀測站 Ultimate Edition © 2026 ✦
    </div>

</div>

<script>

/* 星空 */

const stars = document.getElementById('stars');

for(let i=0;i<70;i++){

    const s = document.createElement('div');

    s.className = 'star';

    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*100+'%';

    s.style.animationDuration =
    2 + Math.random()*5 + 's';

    stars.appendChild(s);

}

/* 資料 */

const STORAGE_KEY = 'ultimate_doll_system_v11';

let dolls = [];

let activeId = null;

let tempImage = '';

let currentTool = 'pet';

/* UI */

const UI = {

    doll:document.getElementById('doll'),

    placeholder:document.getElementById('placeholder'),

    gallery:document.getElementById('gallery'),

    title:document.getElementById('mainTitle'),

    dialog:document.getElementById('dialog'),

    love:document.getElementById('loveText'),

    mood:document.getElementById('moodText'),

    clean:document.getElementById('cleanText'),

    energy:document.getElementById('energyText'),

    stage:document.getElementById('stage')

};

/* 初始化 */

window.onload = ()=>{

    load();

    renderGallery();

    if(dolls.length){

        selectDoll(dolls[0].id);

    }

};

/* 圖片 */

document
.getElementById('fileInput')
.addEventListener('change',e=>{

    const file = e.target.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = ev=>{

        tempImage = ev.target.result;

    };

    reader.readAsDataURL(file);

});

/* 新增 */

function addDoll(){

    const name =
    document
    .getElementById('nameInput')
    .value
    .trim();

    const desc =
    document
    .getElementById('descInput')
    .value
    .trim();

    if(!name){

        alert('請幫娃娃取名字 ✨');
        return;

    }

    if(!tempImage){

        alert('請上傳照片 📸');
        return;

    }

    const doll = {

        id:'doll_'+Date.now(),

        name,

        desc:desc || '沒有備註',

        image:tempImage,

        love:0,
        mood:100,
        clean:100,
        energy:100

    };

    dolls.push(doll);

    save();

    renderGallery();

    selectDoll(doll.id);

    document.getElementById('nameInput').value='';
    document.getElementById('descInput').value='';
    document.getElementById('fileInput').value='';

    tempImage='';

}

/* 選擇 */

function selectDoll(id){

    activeId = id;

    const d =
    dolls.find(x=>x.id===id);

    if(!d) return;

    UI.doll.src = d.image;

    UI.doll.style.display='block';

    UI.placeholder.style.display='none';

    UI.title.innerHTML =
    `🧸 ${d.name}`;

    updateStatus();

    renderGallery();

    showDialog('今天也一起待著嗎？ ✨');

}

/* 更新狀態 */

function updateStatus(){

    const d = getActive();

    if(!d) return;

    UI.love.innerText = d.love;
    UI.mood.innerText = d.mood;
    UI.clean.innerText = d.clean;
    UI.energy.innerText = d.energy;

}

function getActive(){

    return dolls.find(
        d=>d.id===activeId
    );

}

/* 收藏牆 */

function renderGallery(){

    UI.gallery.innerHTML='';

    document.getElementById('countText')
    .innerText =
    `${dolls.length} 隻娃娃`;

    dolls.forEach(d=>{

        const card =
        document.createElement('div');

        card.className =
        `doll-card ${
            d.id===activeId ? 'active':''
        }`;

        card.onclick =
        ()=>selectDoll(d.id);

        card.innerHTML = `

            <button
                class="delete"
                onclick="deleteDoll('${d.id}',event)"
            >
                🗑️
            </button>

            <img
                class="doll-thumb"
                src="${d.image}"
            >

            <div class="doll-name">
                ${d.name}
            </div>

            <div class="doll-desc">
                ${d.desc}
            </div>

            <div class="doll-mini">

                <div class="tag">
                    💖 ${d.love}
                </div>

                <div class="tag">
                    🌸 ${d.mood}
                </div>

                <div class="tag">
                    🌙 ${d.energy}
                </div>

            </div>

        `;

        UI.gallery.appendChild(card);

    });

}

/* 刪除 */

function deleteDoll(id,e){

    e.stopPropagation();

    if(!confirm('確定要刪除娃娃嗎？🥺'))
    return;

    dolls =
    dolls.filter(d=>d.id!==id);

    save();

    renderGallery();

}

/* 工具 */

function setTool(tool,btn){

    currentTool = tool;

    document
    .querySelectorAll('.tool')
    .forEach(t=>t.classList.remove('active'));

    btn.classList.add('active');

}

/* 互動 */

UI.stage.addEventListener('click',e=>{

    if(!activeId) return;

    interact(e);

});

function interact(e){

    const d = getActive();

    if(!d) return;

    if(currentTool==='pet'){

        d.love += 5;
        d.mood += 3;

        animate('ani-pet');

        particle(e,'💖');

        showDialog('摸摸好舒服 💖');

    }

    if(currentTool==='feed'){

        d.energy += 10;

        animate('ani-feed');

        particle(e,'🍼');

        showDialog('吃飽飽了 ✨');

    }

    if(currentTool==='beauty'){

        d.love += 8;

        particle(e,'✨');

        showDialog('我變漂亮了嗎？');

    }

    if(currentTool==='photo'){

        d.love += 4;

        animate('ani-photo');

        particle(e,'📸');

        flash();

        showDialog('快拍快拍 ✨');

    }

    if(currentTool==='sleep'){

        d.energy += 20;

        particle(e,'🌙');

        showDialog('晚安呀 🌙');

    }

    updateStatus();

    renderGallery();

    save();

}

/* 動畫 */

function animate(cls){

    UI.doll.classList.remove(
        'ani-pet',
        'ani-feed',
        'ani-photo'
    );

    void UI.doll.offsetWidth;

    UI.doll.classList.add(cls);

}

/* 粒子 */

function particle(e,emoji){

    const rect =
    UI.stage.getBoundingClientRect();

    const p =
    document.createElement('div');

    p.className='particle';

    p.innerText=emoji;

    p.style.left =
    (e.clientX-rect.left)+'px';

    p.style.top =
    (e.clientY-rect.top)+'px';

    p.style.setProperty(
        '--x',
        (Math.random()*160-80)+'px'
    );

    p.style.setProperty(
        '--y',
        (-120-Math.random()*120)+'px'
    );

    p.style.setProperty(
        '--r',
        (Math.random()*90-45)+'deg'
    );

    UI.stage.appendChild(p);

    setTimeout(()=>{

        p.remove();

    },1400);

}

/* 對話 */

function showDialog(text){

    UI.dialog.innerText = text;

    UI.dialog.classList.add('show');

    clearTimeout(UI.dialog.timer);

    UI.dialog.timer = setTimeout(()=>{

        UI.dialog.classList.remove('show');

    },2200);

}

/* 閃光 */

function flash(){

    UI.stage.animate(

        [

            { filter:'brightness(1)' },

            { filter:'brightness(1.5)' },

            { filter:'brightness(1)' }

        ],

        {

            duration:160

        }

    );

}

/* 存檔 */

function save(){

    localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(dolls)
    );

}

/* 讀取 */

function load(){

    const data =
    localStorage.getItem(STORAGE_KEY);

    if(data){

        dolls = JSON.parse(data);

    }

}

</script>
