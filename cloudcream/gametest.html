<!DOCTYPE html>
<html lang="zh-TW">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>極地開荒大師 V2</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    overflow:hidden;
    background:#dbeafe;
    font-family:"Microsoft JhengHei",sans-serif;
    touch-action:none;
}

canvas{
    display:block;
    background:#e0f2fe;
}

#topBar{
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    
    display:flex;
    gap:10px;

    background:rgba(15,23,42,.92);

    color:white;

    padding:10px 18px;

    border-radius:20px;

    border:2px solid #38bdf8;

    z-index:100;
}

.resource{

    font-weight:bold;
    font-size:14px;

}

#bottomPanel{

    position:absolute;

    bottom:10px;
    left:50%;

    transform:translateX(-50%);

    width:95%;
    max-width:420px;

    background:rgba(15,23,42,.92);

    border:2px solid #f59e0b;

    border-radius:18px;

    padding:10px;

    z-index:100;
}

.panelTitle{

    color:#fbbf24;

    text-align:center;

    font-weight:bold;

    margin-bottom:8px;
}

.btnRow{

    display:flex;

    gap:6px;

    margin-bottom:6px;
}

.gameBtn{

    flex:1;

    border:none;

    border-radius:10px;

    padding:10px;

    font-size:12px;

    font-weight:bold;

    background:#f59e0b;

    color:#0f172a;

    cursor:pointer;
}

.gameBtn:disabled{

    background:#475569;

    color:#94a3b8;
}

#zoneBanner{

    position:absolute;

    top:70px;

    left:50%;

    transform:translateX(-50%);

    background:rgba(0,0,0,.7);

    color:white;

    padding:8px 18px;

    border-radius:20px;

    z-index:100;
}

</style>
</head>

<body>

<div id="topBar">

<div class="resource">
🪵 <span id="woodCount">0</span>
</div>

<div class="resource">
🍖 <span id="meatCount">0</span>
</div>

<div class="resource">
⛏️ <span id="oreCount">0</span>
</div>

<div class="resource">
💰 <span id="goldCount">20</span>
</div>

<div class="resource">
👷 <span id="workerCount">0</span>
</div>

<div class="resource">
🏹 <span id="turretCount">0</span>
</div>

</div>

<div id="zoneBanner">

🌲 森林區

</div>

<div id="bottomPanel">

<div class="panelTitle">

⛺ 極地營地

</div>

<div class="btnRow">

<button class="gameBtn"
id="btnAxe">

🪓 升級飛斧
</button>

<button class="gameBtn"
id="btnWorker">

👷 雇工人
</button>

</div>

<div class="btnRow">

<button class="gameBtn"
id="btnTurret">

🏹 箭塔
</button>

<button class="gameBtn"
id="btnSell">

💰 售出資源
</button>

</div>

<div class="btnRow">

<button class="gameBtn"
id="btnCamp">

⛺ 升級營地
</button>

</div>

</div>

<canvas id="gameCanvas"></canvas>

<script>

const canvas =
document.getElementById("gameCanvas");

const ctx =
canvas.getContext("2d");

function resizeCanvas(){

    canvas.width =
    window.innerWidth;

    canvas.height =
    window.innerHeight;
}

resizeCanvas();

window.addEventListener(
"resize",
resizeCanvas
);

let resources={

    wood:0,

    meat:0,

    ore:0,

    gold:20
};

let axeLevel=1;

let campLevel=1;

let zoneLevel=0;

const zones=[

{
name:"🌲 森林區",
unlock:0
},

{
name:"⛏️ 礦區",
unlock:100
},

{
name:"❄️ 冰原區",
unlock:250
},

{
name:"👑 熊王區",
unlock:500
}

];

const player={

    x:0,
    y:0,

    speed:3.5,

    axeAngle:0,

    radius:40
};

const camp={

    x:0,
    y:0
};

const workers=[];

const turrets=[];

const bears=[];

const trees=[];

const ores=[];

const floatingTexts=[];

for(let i=0;i<40;i++){

    trees.push({

        x:(Math.random()-0.5)*1200,

        y:(Math.random()-0.5)*1200,

        hp:100,

        maxHp:100
    });
}

for(let i=0;i<20;i++){

    ores.push({

        x:(Math.random()-0.5)*1400,

        y:(Math.random()-0.5)*1400,

        hp:120,

        maxHp:120
    });
}

for(let i=0;i<8;i++){

    bears.push({

        x:(Math.random()-0.5)*1500,

        y:(Math.random()-0.5)*1500,

        hp:100,

        maxHp:100,

        speed:0.7
    });
}

let moveTargetX=0;
let moveTargetY=0;

let moving=false;

canvas.addEventListener(
"pointerdown",
e=>{

    moving=true;

    moveTargetX=
    player.x+
    (e.clientX-canvas.width/2);

    moveTargetY=
    player.y+
    (e.clientY-canvas.height/2);
});

canvas.addEventListener(
"pointermove",
e=>{

    if(!moving) return;

    moveTargetX=
    player.x+
    (e.clientX-canvas.width/2);

    moveTargetY=
    player.y+
    (e.clientY-canvas.height/2);
});

window.addEventListener(
"pointerup",
()=>moving=false
);

function updateUI(){

    woodCount.innerText=
    resources.wood;

    meatCount.innerText=
    resources.meat;

    oreCount.innerText=
    resources.ore;

    goldCount.innerText=
    resources.gold;

    workerCount.innerText=
    workers.length;

    turretCount.innerText=
    turrets.length;

    zoneBanner.innerText=
    zones[zoneLevel].name;
}

// ======================
// 按鈕功能
// ======================

btnAxe.onclick=()=>{

    let cost=axeLevel*20;

    if(resources.gold<cost) return;

    resources.gold-=cost;

    axeLevel++;

    updateUI();
};

btnWorker.onclick=()=>{

    if(resources.meat<15) return;

    resources.meat-=15;

    workers.push({

        x:camp.x,

        y:camp.y,

        speed:1.2,

        cooldown:0

    });

    updateUI();
};

btnTurret.onclick=()=>{

    if(resources.wood<30) return;

    resources.wood-=30;

    let angle=
    Math.random()*Math.PI*2;

    turrets.push({

        x:Math.cos(angle)*80,

        y:Math.sin(angle)*80,

        cooldown:0
    });

    updateUI();
};

btnSell.onclick=()=>{

    let earned=
    resources.wood+
    resources.meat*2+
    resources.ore*3;

    resources.gold+=earned;

    resources.wood=0;
    resources.meat=0;
    resources.ore=0;

    updateUI();
};

btnCamp.onclick=()=>{

    let cost=
    campLevel*50;

    if(resources.gold<cost)
    return;

    resources.gold-=cost;

    campLevel++;

    updateUI();
};

// ======================
// 玩家移動
// ======================

function updatePlayer(){

    if(!moving) return;

    let dx=
    moveTargetX-player.x;

    let dy=
    moveTargetY-player.y;

    let dist=
    Math.hypot(dx,dy);

    if(dist<5) return;

    player.x+=
    dx/dist*player.speed;

    player.y+=
    dy/dist*player.speed;
}

// ======================
// 飛斧攻擊
// ======================

function updateAxes(){

    player.axeAngle+=0.08;

    let axeCount=
    Math.min(
    axeLevel,
    4
    );

    let radius=
    player.radius+
    axeLevel*3;

    for(
        let i=0;
        i<axeCount;
        i++
    ){

        let angle=
        player.axeAngle+
        i*(Math.PI*2/axeCount);

        let axeX=
        player.x+
        Math.cos(angle)*radius;

        let axeY=
        player.y+
        Math.sin(angle)*radius;

        trees.forEach(tree=>{

            let dist=
            Math.hypot(

            axeX-tree.x,

            axeY-tree.y

            );

            if(dist<28){

                tree.hp-=1;

                if(tree.hp<=0){

                    tree.hp=
                    tree.maxHp;

                    resources.wood+=3;

                    floatingTexts.push({

                        x:tree.x,

                        y:tree.y,

                        text:"+3🪵",

                        life:60,

                        color:"#22c55e"
                    });

                    updateUI();
                }
            }
        });

        ores.forEach(ore=>{

            let dist=
            Math.hypot(

            axeX-ore.x,

            axeY-ore.y

            );

            if(dist<28){

                ore.hp-=1;

                if(ore.hp<=0){

                    ore.hp=
                    ore.maxHp;

                    resources.ore+=2;

                    floatingTexts.push({

                        x:ore.x,

                        y:ore.y,

                        text:"+2⛏️",

                        life:60,

                        color:"#94a3b8"
                    });

                    updateUI();
                }
            }
        });

        bears.forEach((bear,index)=>{

            let dist=
            Math.hypot(

            axeX-bear.x,

            axeY-bear.y

            );

            if(dist<28){

                bear.hp-=
                0.6+
                axeLevel*0.2;

                if(bear.hp<=0){

                    resources.meat+=5;

                    floatingTexts.push({

                        x:bear.x,

                        y:bear.y,

                        text:"+5🍖",

                        life:60,

                        color:"#ef4444"
                    });

                    bears.splice(index,1);

                    bears.push({

                        x:(Math.random()-0.5)*1600,

                        y:(Math.random()-0.5)*1600,

                        hp:100,

                        maxHp:100,

                        speed:0.7
                    });

                    updateUI();
                }
            }
        });

    }

}

// ======================
// 熊AI
// ======================

function updateBears(){

    bears.forEach(bear=>{

        let dx=
        player.x-bear.x;

        let dy=
        player.y-bear.y;

        let dist=
        Math.hypot(dx,dy);

        if(dist>20){

            bear.x+=
            dx/dist*
            bear.speed;

            bear.y+=
            dy/dist*
            bear.speed;
        }

    });

}

// ======================
// 工人AI
// ======================

function updateWorkers(){

    workers.forEach(worker=>{

        let target=null;

        let min=999999;

        trees.forEach(tree=>{

            let d=
            Math.hypot(

            worker.x-tree.x,

            worker.y-tree.y

            );

            if(d<min){

                min=d;

                target=tree;
            }

        });

        if(!target) return;

        let dx=
        target.x-worker.x;

        let dy=
        target.y-worker.y;

        let dist=
        Math.hypot(dx,dy);

        if(dist>15){

            worker.x+=
            dx/dist*
            worker.speed;

            worker.y+=
            dy/dist*
            worker.speed;
        }
        else{

            if(worker.cooldown>0){

                worker.cooldown--;

            }else{

                resources.wood++;

                worker.cooldown=60;

                floatingTexts.push({

                    x:worker.x,

                    y:worker.y,

                    text:"+1🪵",

                    life:50,

                    color:"#4ade80"
                });

                updateUI();
            }
        }

    });

}

// ======================
// 箭塔AI
// ======================

function updateTurrets(){

    turrets.forEach(turret=>{

        if(turret.cooldown>0){

            turret.cooldown--;

            return;
        }

        let target=null;

        let min=180;

        bears.forEach(bear=>{

            let d=
            Math.hypot(

            turret.x-bear.x,

            turret.y-bear.y

            );

            if(d<min){

                min=d;

                target=bear;
            }

        });

        if(target){

            target.hp-=25;

            turret.cooldown=50;

            floatingTexts.push({

                x:target.x,

                y:target.y,

                text:"🏹-25",

                life:50,

                color:"#38bdf8"
            });

        }

    });

}

// ======================
// 世界更新
// ======================

function updateWorld(){

    updatePlayer();

    updateAxes();

    updateBears();

    updateWorkers();

    // ======================
// 浮動文字
// ======================

function updateFloatingTexts(){

    for(
        let i=floatingTexts.length-1;
        i>=0;
        i--
    ){

        let ft=
        floatingTexts[i];

        ft.y-=0.5;

        ft.life--;

        if(ft.life<=0){

            floatingTexts.splice(i,1);

        }

    }

}

// ======================
// 區域解鎖
// ======================

function updateZone(){

    let totalValue=

    resources.gold+

    resources.wood+

    resources.meat*2+

    resources.ore*3;

    if(
        totalValue>=100 &&
        zoneLevel<1
    ){
        zoneLevel=1;
    }

    if(
        totalValue>=250 &&
        zoneLevel<2
    ){
        zoneLevel=2;
    }

    if(
        totalValue>=500 &&
        zoneLevel<3
    ){
        zoneLevel=3;
    }

}

// ======================
// 自動存檔
// ======================

function saveGame(){

    const data={

        resources,

        axeLevel,

        campLevel,

        zoneLevel

    };

    localStorage.setItem(
        "polarLiteSave",
        JSON.stringify(data)
    );

}

function loadGame(){

    let save=
    localStorage.getItem(
        "polarLiteSave"
    );

    if(!save) return;

    try{

        let data=
        JSON.parse(save);

        resources=
        data.resources ||
        resources;

        axeLevel=
        data.axeLevel ||
        axeLevel;

        campLevel=
        data.campLevel ||
        campLevel;

        zoneLevel=
        data.zoneLevel ||
        zoneLevel;

    }catch(e){

        console.log(e);

    }

}

loadGame();

setInterval(
saveGame,
5000
);

// ======================
// 繪製營地
// ======================

function drawCamp(){

    let icon="⛺";

    if(campLevel>=2)
    icon="🏠";

    if(campLevel>=4)
    icon="🏘️";

    if(campLevel>=6)
    icon="🏰";

    ctx.font="50px Arial";

    ctx.textAlign="center";

    ctx.fillText(

        icon,

        camp.x,
        camp.y

    );

}

// ======================
// 繪製世界
// ======================

function drawWorld(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    ctx.save();

    ctx.translate(

        canvas.width/2-player.x,

        canvas.height/2-player.y

    );

    // 地面

    ctx.strokeStyle=
    "#cbd5e1";

    for(
        let x=-2000;
        x<=2000;
        x+=80
    ){

        ctx.beginPath();

        ctx.moveTo(
            x,
            -2000
        );

        ctx.lineTo(
            x,
            2000
        );

        ctx.stroke();

    }

    for(
        let y=-2000;
        y<=2000;
        y+=80
    ){

        ctx.beginPath();

        ctx.moveTo(
            -2000,
            y
        );

        ctx.lineTo(
            2000,
            y
        );

        ctx.stroke();

    }

    // 樹

    trees.forEach(tree=>{

        ctx.font="34px Arial";

        ctx.textAlign="center";

        ctx.fillText(

            "🌲",

            tree.x,

            tree.y

        );

    });

    // 礦石

    ores.forEach(ore=>{

        ctx.font="30px Arial";

        ctx.fillText(

            "⛏️",

            ore.x,

            ore.y

        );

    });

    // 營地

    drawCamp();

    // 箭塔

    turrets.forEach(t=>{

        ctx.font="28px Arial";

        ctx.fillText(

            "🏹",

            t.x,

            t.y

        );

    });

    // 工人

    workers.forEach(w=>{

        ctx.font="26px Arial";

        ctx.fillText(

            "👷",

            w.x,

            w.y

        );

    });

    // 熊

    bears.forEach(b=>{

        ctx.font="32px Arial";

        ctx.fillText(

            "🐻",

            b.x,

            b.y

        );

        ctx.fillStyle=
        "#ef4444";

        ctx.fillRect(

            b.x-15,

            b.y-28,

            30,

            4

        );

        ctx.fillStyle=
        "#22c55e";

        ctx.fillRect(

            b.x-15,

            b.y-28,

            30*(b.hp/b.maxHp),

            4

        );

    });

    // 玩家

    ctx.font="34px Arial";

    ctx.fillText(

        "🤠",

        player.x,

        player.y

    );

    // 飛斧

    let axeCount=
    Math.min(
        axeLevel,
        4
    );

    let radius=
    player.radius+
    axeLevel*3;

    for(
        let i=0;
        i<axeCount;
        i++
    ){

        let angle=

        player.axeAngle+

        i*(Math.PI*2/axeCount);

        let ax=

        player.x+

        Math.cos(angle)*radius;

        let ay=

        player.y+

        Math.sin(angle)*radius;

        ctx.font="22px Arial";

        ctx.fillText(

            "🪓",

            ax,

            ay

        );

    }

    // 浮動文字

    floatingTexts.forEach(ft=>{

        ctx.fillStyle=
        ft.color;

        ctx.font=
        "bold 14px Arial";

        ctx.fillText(

            ft.text,

            ft.x,

            ft.y

        );

    });

    ctx.restore();

}

// ======================
// 主迴圈
// ======================

function gameLoop(){

    updateWorld();

    updateFloatingTexts();

    updateZone();

    drawWorld();

    updateUI();

    requestAnimationFrame(
        gameLoop
    );

}

gameLoop();

</script>

</body>
</html>
