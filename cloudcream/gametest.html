<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>極地開荒大師 Lite</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#dbeafe;
    font-family:"Microsoft JhengHei";
}

#ui{
    position:fixed;
    top:10px;
    left:10px;
    background:rgba(0,0,0,.7);
    color:white;
    padding:12px;
    border-radius:12px;
    z-index:10;
    min-width:160px;
}

button{
    width:100%;
    margin-top:5px;
    padding:8px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

canvas{
    display:block;
}
</style>
</head>

<body>

<div id="ui">

<div>🪵 木材：<span id="wood">0</span></div>

<div>💰 金幣：<span id="gold">15</span></div>

<div>🪓 飛斧等級：<span id="level">1</span></div>

<div>🗺️ 區域：<span id="zone">森林</span></div>

<button onclick="upgradeAxe()">
升級飛斧
</button>

<button onclick="sellWood()">
賣掉木材
</button>

</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}
resize();

window.addEventListener("resize",resize);

let wood=0;
let gold=15;
let axeLevel=1;

const zones=[
"森林",
"礦區",
"冰原",
"熊王區"
];

let zoneIndex=0;

const player={
    x:0,
    y:0,
    angle:0
};

let targetX=0;
let targetY=0;
let moving=false;

canvas.addEventListener("pointerdown",(e)=>{
    moving=true;

    targetX=
    e.clientX-canvas.width/2+player.x;

    targetY=
    e.clientY-canvas.height/2+player.y;
});

canvas.addEventListener("pointermove",(e)=>{
    if(!moving) return;

    targetX=
    e.clientX-canvas.width/2+player.x;

    targetY=
    e.clientY-canvas.height/2+player.y;
});

window.addEventListener("pointerup",()=>{
    moving=false;
});

const trees=[];

for(let i=0;i<30;i++){

    trees.push({

        x:Math.random()*1800-900,

        y:Math.random()*1800-900,

        hp:40

    });

}

function updateUI(){

    woodEl.innerText=wood;

    goldEl.innerText=gold;

    levelEl.innerText=axeLevel;

    zoneEl.innerText=zones[zoneIndex];

}

const woodEl=document.getElementById("wood");
const goldEl=document.getElementById("gold");
const levelEl=document.getElementById("level");
const zoneEl=document.getElementById("zone");

function upgradeAxe(){

    let cost=axeLevel*10;

    if(gold<cost) return;

    gold-=cost;

    axeLevel++;

    updateUI();
}

function sellWood(){

    gold+=wood;

    wood=0;

    if(gold>=100 && zoneIndex<zones.length-1){

        zoneIndex++;

    }

    updateUI();
}

function update(){

    if(moving){

        let dx=targetX-player.x;
        let dy=targetY-player.y;

        let dist=Math.hypot(dx,dy);

        if(dist>5){

            player.x+=dx/dist*3;

            player.y+=dy/dist*3;
        }
    }

    player.angle+=0.08;

    trees.forEach(tree=>{

        let dist=Math.hypot(

            player.x-tree.x,

            player.y-tree.y

        );

        if(dist<45+axeLevel*5){

            tree.hp-=0.2*axeLevel;

            if(tree.hp<=0){

                wood+=2;

                tree.hp=40;

                tree.x=Math.random()*1800-900;

                tree.y=Math.random()*1800-900;

                updateUI();
            }
        }

    });

}

function draw(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    ctx.save();

    ctx.translate(
        canvas.width/2-player.x,
        canvas.height/2-player.y
    );

    trees.forEach(tree=>{

        ctx.fillStyle="#15803d";

        ctx.beginPath();

        ctx.arc(
            tree.x,
            tree.y,
            18,
            0,
            Math.PI*2
        );

        ctx.fill();

    });

    ctx.fillStyle="#2563eb";

    ctx.beginPath();

    ctx.arc(
        player.x,
        player.y,
        12,
        0,
        Math.PI*2
    );

    ctx.fill();

    let axeCount=
    Math.min(
        axeLevel,
        4
    );

    for(let i=0;i<axeCount;i++){

        let a=
        player.angle+
        i*(Math.PI*2/axeCount);

        let ax=
        player.x+
        Math.cos(a)*35;

        let ay=
        player.y+
        Math.sin(a)*35;

        ctx.fillStyle="#f59e0b";

        ctx.fillRect(
            ax-5,
            ay-5,
            10,
            10
        );
    }

    ctx.restore();

}

function gameLoop(){

    update();

    draw();

    requestAnimationFrame(
        gameLoop
    );

}

updateUI();

gameLoop();

</script>

</body>
</html>
