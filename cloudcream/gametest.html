<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>寒霜模擬器</title>
    <style>
        body {
            margin: 0;
            background-color: #e0f2fe; /* 雪地背景色 */
            font-family: Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            pointer-events: none;
        }
        .resource-item {
            margin-bottom: 5px;
        }
        canvas {
            background: #f0fdf4; /* 畫布基底 */
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="ui-panel">
        <div class="resource-item">🍖 肉塊 (Meat): <span id="meat-count">0</span></div>
        <div class="resource-item">💵 鈔票 (Money): <span id="money-count">5</span></div>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// 遊戲數據狀態
let resources = { meat: 0, money: 5 };

// 1. 斜 45 度角（Isometric）座標轉換函數
// 將傳統的 (x, y) 轉換成 45 度角的網頁畫面座標
function toIso(x, y) {
    return {
        isoX: (x - y) + canvas.width / 2,
        isoY: (x + y) / 2 + 150
    };
}

// 2. 遊戲物件定義
// 防禦塔（位於地圖中央）
const tower = { x: 0, y: 0, range: 150, attackCooldown: 0 };

// 北極熊陣列
let bears = [
    { id: 1, x: -300, y: -50, hp: 100, maxHp: 100, speed: 1.2, size: 25 },
    { id: 2, x: -50, y: -300, hp: 120, maxHp: 120, speed: 0.9, size: 28 }
];

// 漂浮文字（用來顯示 +1 🍖 的特效）
let floatingTexts = [];

// 3. 遊戲主循環 (Game Loop)
function gameLoop() {
    update();
    render();
    requestAnimationFrame(gameLoop);
}

// 4. 邏輯更新
function update() {
    // 減少防禦塔冷卻時間
    if (tower.attackCooldown > 0) tower.attackCooldown--;

    bears.forEach((bear, index) => {
        // 讓北極熊往中央的防禦塔 (0,0) 移動
        let dx = tower.x - bear.x;
        let dy = tower.y - bear.y;
        let dist = Math.sqrt(dx * dx + dy * dy);

        if (dist > 10) {
            bear.x += (dx / dist) * bear.speed;
            bear.y += (dy / dist) * bear.speed;
        }

        // 防禦塔自動攻擊邏輯
        if (dist <= tower.range && tower.attackCooldown === 0) {
            bear.hp -= 25; // 每次攻擊扣 25 血
            tower.attackCooldown = 30; // 攻擊冷卻（約 0.5 秒）

            // 如果北極熊死掉了
            if (bear.hp <= 0) {
                resources.meat += 5; // 獲得 5 個肉
                document.getElementById('meat-count').innerText = resources.meat;

                // 觸發漂浮文字
                let isoPos = toIso(bear.x, bear.y);
                floatingTexts.push({ x: isoPos.isoX, y: isoPos.isoY, text: "+5 🍖", alpha: 1 });

                // 移除死掉的熊，並在遠方重新生成一隻新的
                bears.splice(index, 1);
                spawnBear();
            }
        }
    });

    // 更新漂浮文字狀態
    floatingTexts.forEach((ft, index) => {
        ft.y -= 1; // 往上漂
        ft.alpha -= 0.02; // 逐漸透明
        if (ft.alpha <= 0) floatingTexts.splice(index, 1);
    });
}

// 遠端隨機生成新的北極熊
function spawnBear() {
    const angle = Math.random() * Math.PI * 2;
    const radius = 350; // 從畫面外走進來
    bears.push({
        id: Date.now(),
        x: Math.cos(angle) * radius,
        y: Math.sin(angle) * radius,
        hp: 100,
        maxHp: 100,
        speed: 0.8 + Math.random() * 0.8,
        size: 20 + Math.random() * 10
    });
}

// 5. 畫面渲染 (Drawing)
function render() {
    // 清空畫布
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 畫出網格地板（增加 45 度角空間感）
    ctx.strokeStyle = "#e2e8f0";
    ctx.lineWidth = 1;
    for (let i = -400; i <= 400; i += 50) {
        let p1 = toIso(i, -400);
        let p2 = toIso(i, 400);
        ctx.beginPath(); ctx.moveTo(p1.isoX, p1.isoY); ctx.lineTo(p2.isoX, p2.isoY); ctx.stroke();

        let p3 = toIso(-400, i);
        let p4 = toIso(400, i);
        ctx.beginPath(); ctx.moveTo(p3.isoX, p3.isoY); ctx.lineTo(p4.isoX, p4.isoY); ctx.stroke();
    }

    // 畫出防禦塔的攻擊範圍圈（扁平橢圓以符合 45 度視角）
    let isoTower = toIso(tower.x, tower.y);
    ctx.beginPath();
    ctx.ellipse(isoTower.isoX, isoTower.isoY, tower.range, tower.range / 2, 0, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(59, 130, 246, 0.1)";
    ctx.fill();
    ctx.strokeStyle = "rgba(59, 130, 246, 0.4)";
    ctx.stroke();

    // 畫防禦塔本體（簡單幾何圖形代替）
    ctx.fillStyle = "#b45309"; // 棕色木頭建築
    ctx.fillRect(isoTower.isoX - 20, isoTower.isoY - 50, 40, 60);
    ctx.fillStyle = "#f59e0b"; // 塔頂黃色核心
    ctx.beginPath();
    ctx.arc(isoTower.isoX, isoTower.isoY - 50, 15, 0, Math.PI * 2);
    ctx.fill();

    // 畫北極熊
    bears.forEach(bear => {
        let isoBear = toIso(bear.x, bear.y);

        // 熊身體（白色橢圓）
        ctx.fillStyle = "#ffffff";
        ctx.strokeStyle = "#cbd5e1";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(isoBear.isoX, isoBear.isoY, bear.size, bear.size * 0.6, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        // 熊眼睛（代表方向）
        ctx.fillStyle = "#000000";
        ctx.beginPath();
        ctx.arc(isoBear.isoX + 5, isoBear.isoY - 2, 2, 0, Math.PI * 2);
        ctx.fill();

        // 畫血條 (HP Bar)
        let barWidth = 40;
        let barHeight = 5;
        let barX = isoBear.isoX - barWidth / 2;
        let barY = isoBear.isoY - bear.size - 10;

        // 血條背景（灰色）
        ctx.fillStyle = "#ef4444";
        ctx.fillRect(barX, barY, barWidth, barHeight);
        // 當前血量（綠色）
        ctx.fillStyle = "#22c55e";
        let currentBarWidth = (bear.hp / bear.maxHp) * barWidth;
        ctx.fillRect(barX, barY, currentBarWidth, barHeight);
    });

    // 畫漂浮文字
    floatingTexts.forEach(ft => {
        ctx.fillStyle = `rgba(220, 38, 38, ${ft.alpha})`;
        ctx.font = "bold 16px Arial";
        ctx.fillText(ft.text, ft.x, ft.y);
    });
}

// 啟動遊戲
gameLoop();
</script>

</body>
</html>
