<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 加入 viewport 讓手機畫面正確縮放，並防止雙擊放大 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>極地荒野生存模擬器 - 手機觸控版</title>
    <style>
        body {
            margin: 0;
            background-color: #cbd5e1;
            font-family: "Microsoft JhengHei", sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
            touch-action: none; /* 防止手機瀏覽器預設的下拉重新整理或縮放行為 */
        }
        #ui-header {
            position: absolute;
            top: 15px;
            display: flex;
            gap: 15px;
            background: rgba(15, 23, 42, 0.85);
            padding: 8px 18px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 2px solid #38bdf8;
            color: white;
            font-size: 16px;
            font-weight: bold;
            z-index: 10;
        }
        #upgrade-panel {
            position: absolute;
            bottom: 20px;
            background: rgba(15, 23, 42, 0.85);
            padding: 10px 20px;
            border-radius: 15px;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.3);
            border: 2px solid #f59e0b;
            display: flex;
            gap: 10px;
            z-index: 10;
            width: 90%;
            max-width: 400px;
            justify-content: space-around;
        }
        .btn {
            background: #f59e0b;
            color: #0f172a;
            border: none;
            padding: 8px 12px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn:disabled { background: #64748b; color: #cbd5e1; }
        canvas {
            background: #f1f5f9;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="ui-header">
        <div>🪵 木材: <span id="wood-count">0</span></div>
        <div>🍖 肉塊: <span id="meat-count">0</span></div>
        <div>💵 金幣: <span id="money-count">10</span></div>
    </div>

    <div id="upgrade-panel">
        <button class="btn" id="btn-tower" onclick="upgradePlayerAxe()">🛠️ 升級裝備 (需 10 💵)</button>
        <button class="btn" id="btn-spawn" onclick="spawnBearManual()">Bear 🐻</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// 讓畫布大小自動填滿手機螢幕
function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();

let resources = { wood: 0, meat: 0, money: 10 };
let axeLevel = 1;
let axeAngle = 0;

// 觸控與目標位置狀態
let touchActive = false;
let targetX = 0; // 企鵝想走去的目標世界座標 X
let targetY = 0; // 企鵝想走去的目標世界座標 Y

const player = { x: 0, y: 0, speed: 3.0, range: 100, size: 36 };
const baseStation = { x: 0, y: 0 };

// 螢幕畫面座標轉回世界座標（用於點擊判定）
function fromIso(screenX, screenY) {
    let offsetX = screenX - canvas.width / 2;
    let offsetY = screenY - canvas.height / 2; // 讓中心對準畫面中央
    return {
        x: (offsetY + offsetX / 2),
        y: (offsetY - offsetX / 2)
    };
}

// 世界座標轉畫面座標
function toIso(x, y) {
    return {
        isoX: (x - y) + canvas.width / 2,
        isoY: (x + y) / 2 + canvas.height / 2
    };
}

// 手機觸控事件監聽 (同時支援點擊與滑動拖曳)
function handleTouch(e) {
    touchActive = true;
    let clientX = e.touches ? e.touches[0].clientX : e.clientX;
    let clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    // 排除點擊到頂部或底部 UI 的觸發
    if (clientY < 80 || clientY > window.innerHeight - 80) return;

    let worldPos = fromIso(clientX, clientY);
    targetX = worldPos.x;
    targetY = worldPos.y;
}

window.addEventListener('touchstart', handleTouch, { passive: false });
window.addEventListener('touchmove', handleTouch, { passive: false });
window.addEventListener('touchend', () => touchActive = false);
// 兼顧滑鼠測試
window.addEventListener('mousedown', handleTouch);
window.addEventListener('mousemove', (e) => { if(e.buttons === 1) handleTouch(e); });
window.addEventListener('mouseup', () => touchActive = false);

// 初始化環境樹木
let environmentTrees = [];
for (let i = 0; i < 40; i++) {
    let rx = (Math.random() - 0.5) * 800;
    let ry = (Math.random() - 0.5) * 800;
    if (Math.sqrt(rx*rx + ry*ry) > 60) {
        environmentTrees.push({ x: rx, y: ry, emoji: Math.random() > 0.3 ? "🌲" : "🏔️", size: 20 + Math.random() * 10 });
    }
}

let resourceTrees = [
    { x: 120, y: -80, hp: 100, maxHp: 100 },
    { x: -100, y: 120, hp: 100, maxHp: 100 },
    { x: -150, y: -150, hp: 100, maxHp: 100 }
];

let bears = [
    { x: -300, y: -100, hp: 100, maxHp: 100, speed: 0.5, size: 32 },
    { x: 150, y: -300, hp: 120, maxHp: 120, speed: 0.4, size: 36 }
];

let floatingTexts = [];

function updateUI() {
    document.getElementById('wood-count').innerText = resources.wood;
    document.getElementById('meat-count').innerText = resources.meat;
    document.getElementById('money-count').innerText = resources.money;
    
    let cost = axeLevel * 10;
    const btn = document.getElementById('btn-tower');
    btn.innerText = `🛠️ 升級 Lv.${axeLevel} (${cost}💵)`;
    btn.disabled = resources.money < cost;
}

function upgradePlayerAxe() {
    let cost = axeLevel * 10;
    if (resources.money >= cost) {
        resources.money -= cost;
        axeLevel++;
        player.range += 12;
        updateUI();
    }
}

function spawnBearManual() {
    spawnBear();
}

function spawnBear() {
    const angle = Math.random() * Math.PI * 2;
    const radius = 350;
    bears.push({
        x: Math.cos(angle) * radius,
        y: Math.sin(angle) * radius,
        hp: 80 + axeLevel * 15,
        maxHp: 80 + axeLevel * 15,
        speed: 0.4 + Math.random() * 0.4,
        size: 28 + Math.random() * 10
    });
}

function gameLoop() {
    update();
    render();
    requestAnimationFrame(gameLoop);
}

function update() {
    // 手機移動邏輯：如果按住螢幕，角色就朝目標點移動
    if (touchActive) {
        let dx = targetX - player.x;
        let dy = targetY - player.y;
        let dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist > 5) {
            player.x += (dx / dist) * player.speed;
            player.y += (dy / dist) * player.speed;
        }
    }

    player.x = Math.max(-400, Math.min(400, player.x));
    player.y = Math.max(-400, Math.min(400, player.y));

    axeAngle += 0.05 + (axeLevel * 0.01);
    let currentAxeX = player.x + Math.cos(axeAngle) * player.range;
    let currentAxeY = player.y + Math.sin(axeAngle) * player.range;

    resourceTrees.forEach(tree => {
        let dx = currentAxeX - tree.x;
        let dy = currentAxeY - tree.y;
        let dist = Math.sqrt(dx*dx + dy*dy);

        if (dist < 35) {
            tree.hp -= 2;
            if (tree.hp <= 0) {
                tree.hp = tree.maxHp;
                resources.wood += 2;
                resources.money += 1;
                let iso = toIso(tree.x, tree.y);
                floatingTexts.push({ x: iso.isoX, y: iso.isoY - 20, text: "+2 🪵 +1 💵", alpha: 1 });
                updateUI();
            }
        }
    });

    bears.forEach((bear, bIndex) => {
        let bDx = player.x - bear.x;
        let bDy = player.y - bear.y;
        let bDist = Math.sqrt(bDx*bDx + bDy*bDy);

        if (bDist > 15) {
            bear.x += (bDx / bDist) * bear.speed;
            bear.y += (bDy / bDist) * bear.speed;
        } else {
            if (resources.money > 0 && Math.random() < 0.01) {
                resources.money = Math.max(0, resources.money - 1);
                updateUI();
            }
        }

        let aDx = currentAxeX - bear.x;
        let aDy = currentAxeY - bear.y;
        let aDist = Math.sqrt(aDx*aDx + aDy*aDy);

        if (aDist < 30) {
            bear.hp -= (1 + axeLevel * 0.2);
            if (bear.hp <= 0) {
                resources.meat += 3;
                resources.money += 2;
                let iso = toIso(bear.x, bear.y);
                floatingTexts.push({ x: iso.isoX, y: iso.isoY - 20, text: "+3 🍖 +2 💵", alpha: 1 });
                bears.splice(bIndex, 1);
                spawnBear();
                updateUI();
            }
        }
    });

    floatingTexts.forEach((ft, index) => {
        ft.y -= 1;
        ft.alpha -= 0.02;
        if (ft.alpha <= 0) floatingTexts.splice(index, 1);
    });
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 畫雪地網格
    ctx.strokeStyle = "#e2e8f0";
    ctx.lineWidth = 1;
    for (let i = -500; i <= 500; i += 60) {
        let p1 = toIso(i, -500); let p2 = toIso(i, 500);
        ctx.beginPath(); ctx.moveTo(p1.isoX, p1.isoY); ctx.lineTo(p2.isoX, p2.isoY); ctx.stroke();
        let p3 = toIso(-500, i); let p4 = toIso(500, i);
        ctx.beginPath(); ctx.moveTo(p3.isoX, p3.isoY); ctx.lineTo(p4.isoX, p4.isoY); ctx.stroke();
    }

    let isoPlayer = toIso(player.x, player.y);
    ctx.beginPath();
    ctx.ellipse(isoPlayer.isoX, isoPlayer.isoY, player.range, player.range / 2, 0, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(56, 189, 248, 0.05)";
    ctx.fill();
    ctx.strokeStyle = "rgba(56, 189, 248, 0.3)";
    ctx.lineWidth = 2;
    ctx.stroke();

    let renderQueue = [];

    environmentTrees.forEach(t => {
        renderQueue.push({ ySort: t.x + t.y, draw: () => {
            let iso = toIso(t.x, t.y);
            ctx.font = `${t.size}px Arial`;
            ctx.textAlign = "center";
            ctx.fillText(t.emoji, iso.isoX, iso.isoY);
        }});
    });

    resourceTrees.forEach(tree => {
        renderQueue.push({ ySort: tree.x + tree.y, draw: () => {
            let iso = toIso(tree.x, tree.y);
            ctx.font = "38px Arial";
            ctx.textAlign = "center";
            ctx.fillText("🌲", iso.isoX, iso.isoY);
            ctx.fillStyle = "#cbd5e1";
            ctx.fillRect(iso.isoX - 15, iso.isoY - 40, 30, 4);
            ctx.fillStyle = "#eab308";
            ctx.fillRect(iso.isoX - 15, iso.isoY - 40, (tree.hp / tree.maxHp) * 30, 4);
        }});
    });

    bears.forEach(bear => {
        renderQueue.push({ ySort: bear.x + bear.y, draw: () => {
            let iso = toIso(bear.x, bear.y);
            ctx.font = `${bear.size}px Arial`;
            ctx.textAlign = "center";
            ctx.fillText("🐻‍❄️", iso.isoX, iso.isoY);

            let bWidth = 30;
            ctx.fillStyle = "rgba(0,0,0,0.5)";
            ctx.fillRect(iso.isoX - bWidth/2, iso.isoY - bear.size, bWidth, 4);
            ctx.fillStyle = "#ef4444";
            ctx.fillRect(iso.isoX - bWidth/2, iso.isoY - bear.size, (bear.hp / bear.maxHp) * bWidth, 4);
        }});
    });

    let isoBase = toIso(baseStation.x, baseStation.y);
    renderQueue.push({ ySort: baseStation.x + baseStation.y, draw: () => {
        ctx.font = "50px Arial";
        ctx.textAlign = "center";
        ctx.fillText("🎪", isoBase.isoX, isoBase.isoY + 10);
    }});

    renderQueue.push({ ySort: player.x + player.y, draw: () => {
        ctx.font = `${player.size}px Arial`;
        ctx.textAlign = "center";
        ctx.fillText("🐧", isoPlayer.isoX, isoPlayer.isoY);
    }});

    renderQueue.sort((a, b) => a.ySort - b.ySort);
    renderQueue.forEach(obj => obj.draw());

    let currentAxeX = player.x + Math.cos(axeAngle) * player.range;
    let currentAxeY = player.y + Math.sin(axeAngle) * player.range;
    let isoAxe = toIso(currentAxeX, currentAxeY);
    
    ctx.save();
    ctx.translate(isoAxe.isoX, isoAxe.isoY);
    ctx.rotate(axeAngle * 5);
    ctx.font = "24px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("🪓", 0, 0);
    ctx.restore();

    floatingTexts.forEach(ft => {
        ctx.fillStyle = `rgba(15, 23, 42, ${ft.alpha})`;
        ctx.font = "bold 14px 'Microsoft JhengHei'";
        ctx.textAlign = "center";
        ctx.fillText(ft.text, ft.x, ft.y);
    });
}

// 監聽螢幕旋轉或大小變動
window.addEventListener('resize', () => {
    resizeCanvas();
});

updateUI();
gameLoop();
</script>

</body>
</html>
