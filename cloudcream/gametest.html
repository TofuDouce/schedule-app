<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ Pastel 紅豆餅帝國 ✦</title>

<style>
:root{
--pink:#ffe6f2;
--purple:#f2e7ff;
--card:rgba(255,255,255,.75);
--text:#5e5473;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Microsoft JhengHei",sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,var(--pink),var(--purple));
}

.top{
position:fixed;
top:12px;
left:12px;
right:12px;
display:flex;
justify-content:space-between;
gap:10px;
z-index:10;
}

.card{
background:var(--card);
backdrop-filter:blur(12px);
border-radius:20px;
padding:12px;
box-shadow:0 8px 20px rgba(0,0,0,.12);
}

.stat{
font-weight:bold;
color:var(--text);
}

.main{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.shop{
width:100%;
max-width:420px;
text-align:center;
background:var(--card);
backdrop-filter:blur(12px);
border-radius:30px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,.12);
}

.title{
font-size:28px;
font-weight:bold;
color:#7a5ea5;
margin-bottom:10px;
}

.dog{
font-size:56px;
animation:float 2s infinite;
}

.customer{
font-size:52px;
margin-top:10px;
}

.order{
font-size:18px;
font-weight:bold;
margin:12px 0;
color:#7a5ea5;
}

.cake{
font-size:80px;
cursor:pointer;
transition:.15s;
user-select:none;
}

.cake:active{
transform:scale(.9);
}

.bottom{
position:fixed;
bottom:12px;
left:12px;
right:12px;
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
}

button{
border:none;
border-radius:18px;
padding:16px;
font-size:16px;
font-weight:bold;
background:white;
cursor:pointer;
box-shadow:0 6px 15px rgba(0,0,0,.1);
}

button:active{
transform:scale(.96);
}

#message{
margin-top:15px;
height:24px;
font-weight:bold;
color:#ff6fa8;
}

@keyframes float{
50%{
transform:translateY(-8px);
}
}
</style>
</head>

<body>

<div class="top">

<div class="card stat">
💰 金幣：<span id="gold">50</span>
</div>

<div class="card stat">
🥮 庫存：<span id="cakes">0</span>
</div>

<div class="card stat">
⭐ 聲望：<span id="fame">0</span>
</div>

</div>

<div class="main">

<div class="shop">

<div class="title">
✦ Pastel 紅豆餅帝國 ✦
</div>

<div class="dog">🐶</div>

<div class="customer" id="customer">
👧
</div>

<div class="order" id="order">
想吃 🫘 紅豆餅
</div>

<div class="cake" id="cakeBtn">
🥮
</div>

<div id="message"></div>

</div>

</div>

<div class="bottom">

<button id="sellBtn">
🥮 販售
</button>

<button id="upgradeBtn">
🏪 升級
</button>

<button id="hireBtn">
👩‍🍳 員工
</button>

</div>

<script>

let gold=50;
let cakes=0;
let fame=0;
let level=1;
let workers=0;

const customers=["👧","👩","👨","👵","🧑"];
const flavors=[
"🫘紅豆",
"🧈奶油",
"🍫巧克力",
"🍓草莓",
"🍵抹茶"
];

function updateUI(){
goldEl.textContent=gold;
cakesEl.textContent=cakes;
fameEl.textContent=fame;
}

const goldEl=document.getElementById("gold");
const cakesEl=document.getElementById("cakes");
const fameEl=document.getElementById("fame");

const customerEl=document.getElementById("customer");
const orderEl=document.getElementById("order");
const messageEl=document.getElementById("message");

function newCustomer(){

customerEl.textContent=
customers[
Math.floor(
Math.random()*customers.length
)
];

orderEl.textContent=
"想吃 "+
flavors[
Math.floor(
Math.random()*flavors.length
)
]+" 餅";

}

document
.getElementById("cakeBtn")
.onclick=()=>{

cakes++;

messageEl.textContent=
"🥮 製作成功！";

updateUI();

};

document
.getElementById("sellBtn")
.onclick=()=>{

if(cakes<=0){

messageEl.textContent=
"沒有紅豆餅🥹";

return;
}

cakes--;

let earn=
5+level;

gold+=earn;

fame++;

messageEl.textContent=
`售出成功 +${earn}💰`;

newCustomer();

updateUI();

};

document
.getElementById("upgradeBtn")
.onclick=()=>{

let cost=
level*100;

if(gold<cost){

messageEl.textContent=
`需要 ${cost}💰`;

return;
}

gold-=cost;
level++;

messageEl.textContent=
`🏪 店面升級 Lv.${level}`;

updateUI();

};

document
.getElementById("hireBtn")
.onclick=()=>{

let cost=50;

if(gold<cost){

messageEl.textContent=
"金幣不足";

return;
}

gold-=cost;
workers++;

messageEl.textContent=
`👩‍🍳 員工 +1`;

updateUI();

};

setInterval(()=>{

if(workers>0){

cakes+=workers;

updateUI();

}

},3000);

newCustomer();
updateUI();

</script>

</body>
</html>
