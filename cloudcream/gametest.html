<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pastel 紅豆餅</title>

<style>
body{
margin:0;
font-family:"Microsoft JhengHei";
background:linear-gradient(135deg,#ffe5f3,#f0e7ff);
display:flex;
flex-direction:column;
align-items:center;
color:#6b5a7a;
}

h1{
margin-top:20px;
}

#top{
background:rgba(255,255,255,.7);
padding:15px;
border-radius:20px;
backdrop-filter:blur(10px);
margin:10px;
}

#customer{
font-size:28px;
margin:10px;
}

#grill{
display:grid;
grid-template-columns:repeat(2,120px);
gap:15px;
margin-top:20px;
}

.slot{
width:120px;
height:120px;
background:white;
border-radius:25px;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
cursor:pointer;
box-shadow:0 4px 12px rgba(0,0,0,.1);
}

#actions{
margin-top:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

button{
border:none;
padding:12px 20px;
border-radius:15px;
font-weight:bold;
cursor:pointer;
}

#message{
margin-top:20px;
height:30px;
font-weight:bold;
}

</style>
</head>
<body>

<h1>🥮 Pastel 紅豆餅店</h1>

<div id="top">
💰 金幣：<span id="gold">50</span>
</div>

<div id="customer">
👧 想吃 🫘 紅豆餅
</div>

<div id="grill"></div>

<div id="actions">
<button onclick="fillBatter()">🥣 倒麵糊</button>
<button onclick="addBean()">🫘 加紅豆</button>
<button onclick="flipCake()">🔄 翻面</button>
<button onclick="serveCake()">🥮 出餐</button>
</div>

<div id="message"></div>

<script>

let gold=50;
let selected=-1;

const grill=[];

for(let i=0;i<4;i++){
grill.push({
state:"empty"
});
}

function updateUI(){

document.getElementById("gold").textContent=gold;

const grillDiv=document.getElementById("grill");

grillDiv.innerHTML="";

grill.forEach((slot,index)=>{

let emoji="⭕";

if(slot.state==="batter") emoji="🥣";
if(slot.state==="bean") emoji="🫘";
if(slot.state==="cooking") emoji="🔥";
if(slot.state==="done") emoji="🥮";

let div=document.createElement("div");

div.className="slot";

div.textContent=emoji;

if(index===selected){

div.style.outline="4px solid hotpink";

}

div.onclick=()=>{

selected=index;

updateUI();

};

grillDiv.appendChild(div);

});

}

function msg(text){

document.getElementById("message")
.textContent=text;

}

function fillBatter(){

if(selected<0) return msg("先選烤盤");

if(grill[selected].state!=="empty")
return;

grill[selected].state="batter";

updateUI();

}

function addBean(){

if(selected<0) return msg("先選烤盤");

if(grill[selected].state!=="batter")
return;

grill[selected].state="bean";

updateUI();

}

function flipCake(){

if(selected<0) return msg("先選烤盤");

if(grill[selected].state!=="bean")
return;

grill[selected].state="cooking";

updateUI();

setTimeout(()=>{

if(grill[selected]
&&
grill[selected].state==="cooking"){

grill[selected].state="done";

updateUI();

}

},2000);

}

function serveCake(){

if(selected<0) return msg("先選烤盤");

if(grill[selected].state!=="done")
return msg("還沒做好");

grill[selected].state="empty";

gold+=15;

msg("🥮 客人超滿意！ +15💰");

updateUI();

}

updateUI();

</script>

</body>
</html>
