<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daily Soft ✦</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg:#f8f6f4;

    --card:#ffffff;

    --soft:#f1ece8;

    --main:#d9ae8c;

    --main-dark:#c99972;

    --text:#3c2e26;

    --sub:#8d7a6d;
}

body{

    min-height:100vh;

    background:var(--bg);

    font-family:
    "Zen Maru Gothic",
    "Quicksand",
    sans-serif;

    color:var(--text);

    padding:20px;

    overflow-x:hidden;

    position:relative;
}

/* watermark */

.watermark{

    position:fixed;

    right:22px;
    bottom:18px;

    color:#bba89b;

    font-size:12px;

    pointer-events:none;

    z-index:999;
}

/* container */

.container{

    max-width:820px;

    margin:auto;
}

/* hero */

.hero{

    margin-bottom:28px;
}

.small{

    color:#c9a689;

    font-size:14px;

    margin-bottom:8px;
}

.title{

    font-size:42px;

    font-weight:700;

    line-height:1.4;
}

.subtitle{

    margin-top:10px;

    color:var(--sub);

    line-height:1.8;
}

/* tabs */

.tabs{

    display:flex;

    gap:12px;

    overflow:auto;

    padding-bottom:8px;

    margin-bottom:22px;
}

.tab{

    border:none;

    min-width:140px;

    height:54px;

    white-space:nowrap;

    padding:0 22px;

    border-radius:999px;

    background:white;

    color:var(--text);

    font-size:16px;

    font-family:inherit;

    font-weight:700;

    cursor:pointer;

    border:
    1px solid rgba(0,0,0,.05);

    transition:.2s;

    flex-shrink:0;
}

.tab.active{

    background:var(--main);

    color:white;
}

/* add section */

.add-box{

    display:flex;

    gap:12px;

    margin-bottom:22px;
}

.add-input{

    flex:1;

    height:60px;

    border:none;

    border-radius:18px;

    background:white;

    padding:0 18px;

    font-size:17px;

    font-family:inherit;

    outline:none;

    color:var(--text);

    box-shadow:
    0 4px 10px rgba(0,0,0,.03);
}

.add-btn{

    border:none;

    padding:0 24px;

    border-radius:18px;

    background:var(--main);

    color:white;

    font-size:16px;

    font-family:inherit;

    cursor:pointer;

    transition:.2s;
}

.add-btn:hover{

    background:var(--main-dark);
}

/* board */

.board{

    background:var(--soft);

    border-radius:36px;

    padding:20px;

    display:grid;

    grid-template-columns:
    repeat(
        auto-fit,
        minmax(170px,1fr)
    );

    gap:18px;

    min-height:320px;
}

/* task */

.task{

    aspect-ratio:1/1;

    background:white;

    border-radius:28px;

    padding:18px;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    text-align:center;

    transition:.2s;

    animation:fade .25s ease;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.task.done{

    background:
    linear-gradient(
        180deg,
        #dfb28f,
        #d8aa85
    );

    color:white;
}

.task-text{

    font-size:20px;

    line-height:1.6;

    font-weight:700;

    margin-bottom:16px;

    word-break:break-word;
}

/* buttons */

.task-actions{

    display:flex;

    gap:10px;
}

.icon-btn{

    width:42px;
    height:42px;

    border:none;

    border-radius:50%;

    cursor:pointer;

    font-size:18px;

    transition:.2s;
}

.done-btn{

    background:white;

    color:#d6a682;
}

.delete-btn{

    background:#fff1f1;

    color:#d37f7f;
}

.icon-btn:hover{

    transform:scale(1.06);
}

/* stats */

.stats{

    margin-top:26px;

    display:flex;

    justify-content:center;

    gap:28px;

    color:#b9aaa0;

    font-size:17px;
}

/* empty */

.empty{

    grid-column:1/-1;

    display:flex;

    justify-content:center;

    align-items:center;

    color:#b7a79d;

    font-size:18px;

    min-height:220px;
}

/* footer */

.footer{

    text-align:center;

    margin-top:50px;

    margin-bottom:80px;

    color:#a9978a;

    font-size:14px;
}

.footer b{

    color:#d29d7c;
}

@media(max-width:640px){

    body{
        padding:16px;
    }

    .title{
        font-size:34px;
    }

    .board{
        grid-template-columns:1fr 1fr;
    }

    .task-text{
        font-size:18px;
    }

    .add-box{
        flex-direction:column;
    }

    .add-btn{
        height:56px;
    }
}

</style>
</head>

<body>

<div class="watermark">
    Made with soft thoughts by ChuChu ✦
</div>

<div class="container">

    <!-- HERO -->

    <div class="hero">

        <div class="small">
            Daily Soft ✦
        </div>

        <div class="title">
            今天的小任務 🌸
        </div>

        <div class="subtitle">
            把生活慢慢整理好
        </div>

    </div>

    <!-- TABS -->

    <div class="tabs" id="tabs"></div>

    <!-- ADD -->

    <div class="add-box">

        <input
        id="taskInput"
        class="add-input"
        placeholder="新增小任務..."
        >

        <button
        class="add-btn"
        onclick="addTask()"
        >
            ＋ 新增
        </button>

    </div>

    <!-- BOARD -->

    <div
    class="board"
    id="board"
    ></div>

    <!-- STATS -->

    <div class="stats">

        <div>
            完成：
            <span id="doneCount">0</span>
        </div>

        <div>
            全部：
            <span id="allCount">0</span>
        </div>

    </div>

    <!-- FOOTER -->

    <div class="footer">

        ✦ Daily Soft ✦
        <br><br>

        Designed by <b>ChuChu</b> © 2026

    </div>

</div>

<script>

/* 棋盤資料 */

let boards = {

    "每日任務":[

        {
            text:"喝6杯水",
            done:true
        },

        {
            text:"打掃臥室",
            done:false
        },

        {
            text:"閱讀30分鐘",
            done:false
        }
    ],

    "出遊計劃":[],

    "每月任務":[

        {
            text:"整理房間",
            done:false
        }
    ]
};

let currentBoard = "每日任務";

/* localStorage */

function saveBoards(){

    localStorage.setItem(
        "dailysoft_boards",
        JSON.stringify(boards)
    );
}

function loadBoards(){

    const saved =
    localStorage.getItem(
        "dailysoft_boards"
    );

    if(saved){

        boards = JSON.parse(saved);
    }
}

/* render tabs */

function renderTabs(){

    const tabs =
    document.getElementById("tabs");

    tabs.innerHTML = "";

    Object.keys(boards).forEach(name=>{

        const button =
        document.createElement("button");

        button.className =
        currentBoard === name
        ? "tab active"
        : "tab";

        button.innerText = name;

        button.onclick = ()=>{

            currentBoard = name;

            renderTabs();

            renderTasks();
        };

        tabs.appendChild(button);
    });
}

/* render tasks */

function renderTasks(){

    const board =
    document.getElementById("board");

    board.innerHTML = "";

    const tasks =
    boards[currentBoard];

    if(tasks.length === 0){

        board.innerHTML =
        `
        <div class="empty">
            目前沒有任務 🌸
        </div>
        `;
    }

    tasks.forEach((task,index)=>{

        const div =
        document.createElement("div");

        div.className =
        task.done
        ? "task done"
        : "task";

        div.innerHTML =

        `
        <div class="task-text">
            ${task.text}
        </div>

        <div class="task-actions">

            <button
            class="icon-btn done-btn"
            onclick="toggleTask(${index})"
            >
                ✓
            </button>

            <button
            class="icon-btn delete-btn"
            onclick="deleteTask(${index})"
            >
                ✕
            </button>

        </div>
        `;

        board.appendChild(div);
    });

    updateStats();
}

/* add task */

function addTask(){

    const input =
    document.getElementById(
        "taskInput"
    );

    const text =
    input.value.trim();

    if(!text){

        return;
    }

    boards[currentBoard].unshift({

        text:text,
        done:false
    });

    input.value = "";

    saveBoards();

    renderTasks();
}

/* toggle */

function toggleTask(index){

    boards[currentBoard][index].done =
    !boards[currentBoard][index].done;

    saveBoards();

    renderTasks();
}

/* delete */

function deleteTask(index){

    boards[currentBoard].splice(index,1);

    saveBoards();

    renderTasks();
}

/* stats */

function updateStats(){

    const tasks =
    boards[currentBoard];

    document.getElementById(
        "allCount"
    ).innerText =
    tasks.length;

    const done =
    tasks.filter(
        t=>t.done
    ).length;

    document.getElementById(
        "doneCount"
    ).innerText =
    done;
}

/* enter */

document
.getElementById("taskInput")
.addEventListener(
"keydown",
function(e){

    if(e.key === "Enter"){

        addTask();
    }
});

/* init */

loadBoards();

renderTabs();

renderTasks();

</script>

</body>
</html>
