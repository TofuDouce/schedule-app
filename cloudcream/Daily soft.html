<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daily Soft ✦</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg:#f8f6f4;

    --card:#ffffff;

    --soft:#f1ece8;

    --main:#d9ae8c;

    --main2:#ecd8c7;

    --text:#3c2e26;

    --sub:#8d7a6d;
}

body{

    min-height:100vh;

    background:var(--bg);

    font-family:
    "Zen Maru Gothic",
    "Quicksand",
    sans-serif;

    color:var(--text);

    padding:20px;

    overflow-x:hidden;
}

/* container */

.container{

    max-width:760px;

    margin:auto;
}

/* hero */

.hero{

    margin-bottom:26px;
}

.small{

    color:#c9a689;

    font-size:14px;

    margin-bottom:8px;
}

.title{

    font-size:38px;

    font-weight:700;

    line-height:1.4;
}

.subtitle{

    margin-top:10px;

    color:var(--sub);

    line-height:1.8;
}

/* tabs */

.tabs{

    display:flex;

    gap:12px;

    overflow:auto;

    padding-bottom:8px;

    margin-bottom:24px;
}

.tab{

    border:none;

    white-space:nowrap;

    padding:14px 22px;

    border-radius:999px;

    background:white;

    color:var(--text);

    font-size:16px;

    font-family:inherit;

    cursor:pointer;

    border:
    1px solid rgba(0,0,0,.05);

    transition:.2s;
}

.tab.active{

    background:var(--main);

    color:white;
}

/* add section */

.add-box{

    display:flex;

    gap:12px;

    margin-bottom:22px;
}

.add-input{

    flex:1;

    height:60px;

    border:none;

    border-radius:18px;

    background:white;

    padding:0 18px;

    font-size:17px;

    font-family:inherit;

    outline:none;

    color:var(--text);
}

.add-btn{

    border:none;

    padding:0 24px;

    border-radius:18px;

    background:var(--main);

    color:white;

    font-size:16px;

    font-family:inherit;

    cursor:pointer;

    transition:.2s;
}

.add-btn:hover{

    opacity:.9;
}

/* board */

.board{

    background:var(--soft);

    border-radius:36px;

    padding:20px;

    display:grid;

    grid-template-columns:
    repeat(
        auto-fit,
        minmax(160px,1fr)
    );

    gap:18px;
}

/* task */

.task{

    aspect-ratio:1/1;

    background:white;

    border-radius:26px;

    padding:18px;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    text-align:center;

    position:relative;

    transition:.2s;

    animation:fade .25s ease;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(8px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.task.done{

    background:
    linear-gradient(
        180deg,
        #dfb28f,
        #d8aa85
    );

    color:white;
}

.task-text{

    font-size:20px;

    line-height:1.6;

    font-weight:700;

    margin-bottom:16px;
}

/* buttons */

.task-actions{

    display:flex;

    gap:10px;
}

.icon-btn{

    width:40px;
    height:40px;

    border:none;

    border-radius:50%;

    cursor:pointer;

    font-size:18px;

    transition:.2s;
}

.done-btn{

    background:white;

    color:#d6a682;
}

.delete-btn{

    background:#fff1f1;

    color:#d37f7f;
}

.task.done .done-btn{

    background:white;

    color:#d6a682;
}

.icon-btn:hover{

    transform:scale(1.05);
}

/* stats */

.stats{

    margin-top:26px;

    display:flex;

    justify-content:center;

    gap:28px;

    color:#b9aaa0;

    font-size:17px;
}

.empty{

    text-align:center;

    color:#b9aaa0;

    padding:40px 0;

    grid-column:1/-1;
}

@media(max-width:640px){

    body{
        padding:16px;
    }

    .title{
        font-size:32px;
    }

    .board{
        grid-template-columns:1fr 1fr;
    }

    .task-text{
        font-size:18px;
    }

    .add-box{
        flex-direction:column;
    }

    .add-btn{
        height:56px;
    }
}

</style>
</head>

<body>

<div class="container">

    <!-- HERO -->

    <div class="hero">

        <div class="small">
            Daily Soft ✦
        </div>

        <div class="title">
            今天的小任務 🌸
        </div>

        <div class="subtitle">
            把生活慢慢整理好
        </div>

    </div>

    <!-- TABS -->

    <div class="tabs">

        <button class="tab active">
            每日任務
        </button>

        <button class="tab">
            出遊計劃
        </button>

        <button class="tab">
            每月任務
        </button>

    </div>

    <!-- ADD -->

    <div class="add-box">

        <input
        id="taskInput"
        class="add-input"
        placeholder="新增小任務..."
        >

        <button
        class="add-btn"
        onclick="addTask()"
        >
            ＋ 新增
        </button>

    </div>

    <!-- BOARD -->

    <div
    class="board"
    id="board"
    ></div>

    <!-- STATS -->

    <div class="stats">

        <div>
            完成：
            <span id="doneCount">0</span>
        </div>

        <div>
            全部：
            <span id="allCount">0</span>
        </div>

    </div>

</div>

<script>

let tasks = [

    {
        text:"喝5杯水",
        done:true
    },

    {
        text:"打掃臥室",
        done:true
    },

    {
        text:"閱讀30分鐘",
        done:false
    },

    {
        text:"洗澡",
        done:false
    },

    {
        text:"拉伸10分鐘",
        done:false
    }
];

function saveTasks(){

    localStorage.setItem(
        "dailysoft_tasks",
        JSON.stringify(tasks)
    );
}

function loadTasks(){

    const saved =
    localStorage.getItem(
        "dailysoft_tasks"
    );

    if(saved){

        tasks = JSON.parse(saved);
    }
}

function renderTasks(){

    const board =
    document.getElementById("board");

    board.innerHTML = "";

    if(tasks.length === 0){

        board.innerHTML =
        `
        <div class="empty">
            還沒有任務 🌸
        </div>
        `;
    }

    tasks.forEach((task,index)=>{

        const div =
        document.createElement("div");

        div.className =
        task.done
        ? "task done"
        : "task";

        div.innerHTML =

        `
        <div class="task-text">
            ${task.text}
        </div>

        <div class="task-actions">

            <button
            class="icon-btn done-btn"
            onclick="toggleTask(${index})"
            >
                ✓
            </button>

            <button
            class="icon-btn delete-btn"
            onclick="deleteTask(${index})"
            >
                ✕
            </button>

        </div>
        `;

        board.appendChild(div);
    });

    updateStats();
}

function addTask(){

    const input =
    document.getElementById(
        "taskInput"
    );

    const text =
    input.value.trim();

    if(!text){

        return;
    }

    tasks.unshift({

        text:text,
        done:false
    });

    input.value = "";

    saveTasks();

    renderTasks();
}

function toggleTask(index){

    tasks[index].done =
    !tasks[index].done;

    saveTasks();

    renderTasks();
}

function deleteTask(index){

    tasks.splice(index,1);

    saveTasks();

    renderTasks();
}

function updateStats(){

    document.getElementById(
        "allCount"
    ).innerText =
    tasks.length;

    const done =
    tasks.filter(
        t=>t.done
    ).length;

    document.getElementById(
        "doneCount"
    ).innerText =
    done;
}

/* Enter 新增 */

document
.getElementById("taskInput")
.addEventListener(
"keydown",
function(e){

    if(e.key === "Enter"){

        addTask();
    }
});

/* 初始化 */

loadTasks();

renderTasks();

</script>

</body>
</html>
