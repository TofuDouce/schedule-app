<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>✦ Daily Soft Board ✦</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg:#f8f6f4;

    --card:#ffffff;

    --soft:#f1ece8;

    --main:#d9ae8c;

    --main2:#ecd8c7;

    --text:#3c2e26;

    --sub:#8d7a6d;
}

body{

    min-height:100vh;

    background:var(--bg);

    font-family:
    "Zen Maru Gothic",
    "Quicksand",
    sans-serif;

    color:var(--text);

    padding:24px;

    overflow-x:hidden;
}

/* container */

.container{

    max-width:760px;

    margin:auto;
}

/* top */

.top{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:28px;
}

.circle-btn{

    width:54px;
    height:54px;

    border-radius:50%;

    border:none;

    background:#7f756f;

    color:white;

    font-size:26px;

    cursor:pointer;
}

/* title */

.hero{

    margin-bottom:28px;
}

.small{

    color:#c9a689;

    font-size:14px;

    margin-bottom:10px;
}

.title{

    font-size:42px;

    line-height:1.3;

    font-weight:700;
}

/* tabs */

.tabs{

    display:flex;

    gap:12px;

    overflow:auto;

    padding-bottom:8px;

    margin-bottom:26px;
}

.tab{

    border:none;

    white-space:nowrap;

    padding:14px 22px;

    border-radius:999px;

    background:white;

    color:var(--text);

    font-size:18px;

    font-family:inherit;

    cursor:pointer;

    border:
    1px solid rgba(0,0,0,.05);
}

.tab.active{

    background:var(--main);

    color:white;
}

/* board */

.board{

    background:var(--soft);

    border-radius:38px;

    padding:22px;

    display:grid;

    grid-template-columns:
    repeat(
        auto-fit,
        minmax(160px,1fr)
    );

    gap:18px;
}

/* task */

.task{

    aspect-ratio:1/1;

    background:white;

    border-radius:28px;

    padding:22px;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    text-align:center;

    position:relative;

    cursor:pointer;

    transition:.2s;

    user-select:none;
}

.task:hover{

    transform:
    translateY(-3px);
}

.task.done{

    background:
    linear-gradient(
        180deg,
        #dfb28f,
        #d8aa85
    );

    color:white;
}

.task-name{

    font-size:20px;

    line-height:1.6;

    font-weight:700;
}

/* check */

.check{

    margin-top:16px;

    width:42px;
    height:42px;

    border-radius:50%;

    background:white;

    color:#d6a682;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:22px;

    opacity:0;
}

.task.done .check{

    opacity:1;
}

/* bottom */

.bottom{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-top:28px;
}

.bottom-btn{

    width:68px;
    height:68px;

    border-radius:50%;

    border:none;

    background:white;

    color:#d1a27e;

    font-size:28px;

    cursor:pointer;

    box-shadow:
    0 8px 20px rgba(0,0,0,.04);
}

/* footer stats */

.stats{

    display:flex;

    justify-content:center;

    gap:34px;

    margin-top:42px;

    color:#d8d0ca;

    font-size:20px;
}

@media(max-width:640px){

    body{
        padding:18px;
    }

    .title{
        font-size:34px;
    }

    .board{
        grid-template-columns:1fr 1fr;
    }

    .task-name{
        font-size:18px;
    }
}

</style>
</head>

<body>

<div class="container">

    <!-- TOP -->

    <div class="top">

        <button class="circle-btn">
            ✕
        </button>

        <button class="circle-btn">
            ⋯
        </button>

    </div>

    <!-- HERO -->

    <div class="hero">

        <div class="small">
            Daily Soft Planner ✦
        </div>

        <div class="title">
            今天的小任務 🌸
        </div>

    </div>

    <!-- TABS -->

    <div class="tabs">

        <button class="tab active">
            每日任務
        </button>

        <button class="tab">
            出遊計劃
        </button>

        <button class="tab">
            每月任務
        </button>

        <button class="tab">
            ＋ 添加棋盤
        </button>

    </div>

    <!-- BOARD -->

    <div class="board">

        <div class="task done" onclick="toggleTask(this)">

            <div class="task-name">
                喝5杯水
            </div>

            <div class="check">
                ✓
            </div>

        </div>

        <div class="task done" onclick="toggleTask(this)">

            <div class="task-name">
                打掃臥室
            </div>

            <div class="check">
                ✓
            </div>

        </div>

        <div class="task done" onclick="toggleTask(this)">

            <div class="task-name">
                小綠鳥打卡
            </div>

            <div class="check">
                ✓
            </div>

        </div>

        <div class="task" onclick="toggleTask(this)">

            <div class="task-name">
                鏟貓砂
            </div>

            <div class="check">
                ✓
            </div>

        </div>

        <div class="task" onclick="toggleTask(this)">

            <div class="task-name">
                洗澡
            </div>

            <div class="check">
                ✓
            </div>

        </div>

        <div class="task" onclick="toggleTask(this)">

            <div class="task-name">
                拉伸<br>
                10分鐘
            </div>

            <div class="check">
                ✓
            </div>

        </div>

        <div class="task" onclick="toggleTask(this)">

            <div class="task-name">
                跑步<br>
                15分鐘
            </div>

            <div class="check">
                ✓
            </div>

        </div>

        <div class="task" onclick="toggleTask(this)">

            <div class="task-name">
                閱讀30分鐘
            </div>

            <div class="check">
                ✓
            </div>

        </div>

        <div class="task" onclick="toggleTask(this)">

            <div class="task-name">
                按時吃藥
            </div>

            <div class="check">
                ✓
            </div>

        </div>

    </div>

    <!-- BOTTOM -->

    <div class="bottom">

        <button class="bottom-btn">
            ✈
        </button>

        <button class="bottom-btn">
            ✎
        </button>

    </div>

    <!-- STATS -->

    <div class="stats">

        <div>
            ♡ 217
        </div>

        <div>
            ⌕ 5
        </div>

        <div>
            ↻ 9
        </div>

        <div>
            ✉ 74
        </div>

    </div>

</div>

<script>

function toggleTask(task){

    task.classList.toggle("done");
}

</script>

</body>
</html>
