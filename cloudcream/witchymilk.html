<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>✦ 魔女鍊金工房 ✦</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg-base:#fff9f6;
    --bg-gradient:#ffebe3;

    --card-bg:#ffffff;

    --text-main:#54433a;
    --text-sub:#8e7a70;

    --gold:#f6c86c;
    --gold-hover:#efb94d;

    --pink:#f79999;

}

body{

    min-height:100vh;

    background:
    linear-gradient(
        180deg,
        var(--bg-base),
        var(--bg-gradient)
    );

    font-family:
    "Zen Maru Gothic",
    "Quicksand",
    sans-serif;

    color:var(--text-main);

    padding:28px;

}

.container{

    max-width:1200px;
    margin:auto;

}

.hero{

    text-align:center;
    margin-bottom:30px;

}

.badge{

    display:inline-block;

    padding:8px 18px;

    background:#fff0cf;

    color:#b88618;

    border-radius:999px;

    font-size:14px;
    font-weight:700;

    margin-bottom:14px;

}

.title{

    font-size:clamp(34px,5vw,54px);

    margin-bottom:12px;

}

.subtitle{

    color:var(--text-sub);

}

.layout{

    display:grid;
    grid-template-columns:1fr;
    gap:24px;

}

@media(min-width:900px){

    .layout{
        grid-template-columns:1fr 1fr 1fr;
    }

}

.card{

    background:white;

    border-radius:28px;

    padding:28px;

    box-shadow:
    0 10px 30px rgba(0,0,0,0.05);

}

.section-title{

    font-size:24px;
    margin-bottom:10px;

}

.section-desc{

    color:var(--text-sub);

    line-height:1.8;

    margin-bottom:20px;

}

.main-btn{

    width:100%;

    border:none;

    background:var(--gold);

    color:#5a473b;

    padding:15px;

    border-radius:18px;

    font-family:inherit;

    font-size:16px;
    font-weight:700;

    cursor:pointer;

    transition:0.2s;

}

.main-btn:hover{

    background:var(--gold-hover);

    transform:translateY(-2px);

}

.result{

    margin-top:20px;

    background:#fffaf7;

    border-radius:20px;

    padding:20px;

    min-height:180px;

    border:1px dashed rgba(0,0,0,0.08);

}

.result-title{

    color:#b88618;

    font-weight:700;

    margin-bottom:10px;

}

.result-text{

    color:var(--text-sub);

    line-height:1.9;

}

.rare{

    margin-top:12px;

    display:inline-block;

    padding:6px 12px;

    border-radius:999px;

    background:#ffe7a8;

    color:#8f6510;

    font-size:13px;
    font-weight:700;

}

.footer{

    text-align:center;

    margin-top:40px;

    color:#9a8479;

    font-size:13px;

}

</style>
</head>

<body>

<div class="container">

    <div class="hero">

        <div class="badge">
            ✦ Witch Alchemy & RPG Generator ✦
        </div>

        <h1 class="title">
            魔女鍊金工房
        </h1>

        <div class="subtitle">
            藥水・稱號・裝備抽卡 ✦
        </div>

    </div>

    <div class="layout">

        <!-- 魔女藥水 -->

        <div class="card">

            <div class="section-title">
                🧪 魔女藥水
            </div>

            <div class="section-desc">
                隨機生成神秘鍊金藥水配方。
            </div>

            <button
                class="main-btn"
                onclick="generatePotion()"
            >
                ✦ 調製藥水 ✦
            </button>

            <div
                class="result"
                id="potionResult"
            >
                <div class="result-text">
                    點擊按鈕開始鍊金 ✦
                </div>
            </div>

        </div>

        <!-- 中二病稱號 -->

        <div class="card">

            <div class="section-title">
                👁 中二稱號
            </div>

            <div class="section-desc">
                被黑暗命運選中的稱號。
            </div>

            <button
                class="main-btn"
                onclick="generateTitle()"
            >
                ✦ 覺醒命運 ✦
            </button>

            <div
                class="result"
                id="titleResult"
            >
                <div class="result-text">
                    點擊按鈕進行覺醒 ✦
                </div>
            </div>

        </div>

        <!-- RPG 裝備 -->

        <div class="card">

            <div class="section-title">
                ⚔ RPG 裝備抽卡
            </div>

            <div class="section-desc">
                抽出屬於你的傳說裝備。
            </div>

            <button
                class="main-btn"
                onclick="generateWeapon()"
            >
                ✦ 開始抽卡 ✦
            </button>

            <div
                class="result"
                id="weaponResult"
            >
                <div class="result-text">
                    點擊按鈕開始召喚 ✦
                </div>
            </div>

        </div>

    </div>

    <div class="footer">
        ✦ Designed by ChuChu ✦
    </div>

</div>

<script>

/* =========================
   魔女藥水
========================= */

const potionNames = [
    "月光沉眠藥",
    "櫻花幻夢液",
    "黑貓幸運水",
    "深夜星霧藥",
    "銀月祈願劑",
    "夢境漂浮液"
];

const potionEffects = [
    "讓人短暫看見未來。",
    "提升夜晚魔力。",
    "召喚微弱星靈。",
    "使願望更容易實現。",
    "能聽見貓咪的心聲。",
    "獲得一晚的幸運效果。"
];

const potionIngredients = [
    "月光花瓣",
    "銀霧露水",
    "夜蝶粉末",
    "黑森林莓果",
    "星砂結晶",
    "古代羽毛"
];

function random(arr){

    return arr[
        Math.floor(Math.random()*arr.length)
    ];

}

function generatePotion(){

    const html = `
        <div class="result-title">
            ${random(potionNames)}
        </div>

        <div class="result-text">
            配方材料：
            ${random(potionIngredients)}、
            ${random(potionIngredients)}、
            ${random(potionIngredients)}
            <br><br>

            效果：
            ${random(potionEffects)}
        </div>

        <div class="rare">
            稀有度：★★★★☆
        </div>
    `;

    document.getElementById(
        "potionResult"
    ).innerHTML = html;

}

/* =========================
   中二病稱號
========================= */

const darkTitlesA = [
    "漆黑",
    "終焉",
    "虛空",
    "深紅",
    "銀月",
    "禁忌"
];

const darkTitlesB = [
    "魔眼",
    "支配者",
    "觀測者",
    "破壞神",
    "審判者",
    "幻影"
];

const darkDescriptions = [

    "被封印的力量正在甦醒。",
    "體內寄宿著未知存在。",
    "命運之輪已開始轉動。",
    "你的靈魂被黑夜選中。",
    "你能窺見世界的裂縫。"

];

function generateTitle(){

    const title =
    random(darkTitlesA)
    +
    random(darkTitlesB);

    const html = `
        <div class="result-title">
            「${title}」
        </div>

        <div class="result-text">
            ${random(darkDescriptions)}
        </div>

        <div class="rare">
            危險等級：SS
        </div>
    `;

    document.getElementById(
        "titleResult"
    ).innerHTML = html;

}

/* =========================
   RPG 裝備抽卡
========================= */

const weaponNames = [
    "星空聖劍",
    "深淵魔杖",
    "月蝕長弓",
    "銀霧短刀",
    "古代龍槍",
    "櫻花妖刀"
];

const weaponEffects = [
    "暴擊率提升 30%",
    "夜晚攻擊力翻倍",
    "附帶冰霜詛咒",
    "有機率召喚幻影",
    "提高幸運值",
    "可吸收黑暗能量"
];

const rarities = [
    "★★★ 普通",
    "★★★★ 稀有",
    "★★★★★ 傳說",
    "★★★★★★ 神話"
];

function generateWeapon(){

    const html = `
        <div class="result-title">
            ${random(weaponNames)}
        </div>

        <div class="result-text">
            特殊效果：
            ${random(weaponEffects)}
        </div>

        <div class="rare">
            ${random(rarities)}
        </div>
    `;

    document.getElementById(
        "weaponResult"
    ).innerHTML = html;

}

</script>

</body>
</html>
