.layout{

.card{

    background:var(--card-bg);

    border-radius:28px;

    border:1px solid rgba(144,123,116,0.1);

    box-shadow:
    0 12px 30px rgba(92,73,65,0.05);
}

.section-title{

    font-size:24px;

    margin-bottom:14px;
}

.section-desc{

    color:var(--text-sub);

    margin-bottom:20px;
}

.input-group{

    margin-bottom:18px;
}

.label{

    display:block;

    margin-bottom:8px;

    font-weight:700;
}

.input{

    width:100%;

    padding:15px 16px;

    border-radius:18px;

    border:1.5px solid rgba(144,123,116,0.14);

    background:#fffaf8;

    color:var(--text-main);

    font-size:16px;

    font-family:inherit;
}

.input:focus{

    outline:none;

    border-color:var(--gold);

    background:white;

    box-shadow:
    0 0 0 4px rgba(246,200,108,0.2);
}

.main-btn{

    width:100%;

    background:var(--gold);

    color:var(--text-main);

    border-radius:18px;

    font-size:17px;
    font-weight:700;

    font-family:inherit;

    transition:0.2s;

    box-shadow:
    0 8px 18px rgba(246,200,108,0.24);
}

.main-btn:hover{

    background:var(--gold-hover);

    transform:translateY(-2px);
}

.stock-box{

    margin-top:22px;

    background:#fffaf7;

    border-radius:24px;

    padding:22px;

    border:1px dashed rgba(144,123,116,0.18);
}

.stock-head{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:20px;
}

.stock-name{

    font-size:26px;

    font-weight:700;
}

.stock-code{

    color:var(--text-sub);

    font-size:14px;

    margin-top:4px;
}

.stock-price{

    font-size:44px;

    font-weight:700;
}

.up{
    color:var(--red);
}

.down{
    color:var(--green);
}

.change{

    margin-top:6px;

    font-size:15px;
    font-weight:700;
}

.grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:14px;

    margin-top:18px;
}

.info-card{

    background:white;

    border-radius:18px;

    padding:16px;

    border:1px solid rgba(144,123,116,0.08);
}

.info-title{

    color:var(--text-sub);

    font-size:13px;

    margin-bottom:6px;
}

.info-value{

    font-size:22px;

    font-weight:700;
}

.chart-wrap{

    margin-top:24px;

    background:white;

    border-radius:22px;

    padding:18px;

    border:1px solid rgba(144,123,116,0.08);
}

canvas{

    width:100% !important;
    height:260px !important;
}

.side-card{

    background:#fffdfc;

    border-radius:18px;

    padding:18px;

    border:1px solid rgba(144,123,116,0.08);

    border-bottom:1px dashed rgba(144,123,116,0.15);
}

.news-item:last-child{

}

.news-title{

    line-height:1.7;

    margin-bottom:6px;
}

.news-meta{

.footer{

<body>

<div class="decor"></div>

<div class="container">

    <div class="hero">

        <div class="badge">
            日系粉彩台股分析站 🌸
        </div>

        <h1 class="title">
            Sakura Stock
        </h1>

        <p class="subtitle">
            Gentle · Cozy · Real Taiwan Stock Data
        </p>

    </div>

    <div class="layout">

        <!-- LEFT -->

        <div class="card">

            <h2 class="section-title">
                台股分析 ✦
            </h2>

            <p class="section-desc">
                輸入股票代號查看：
                即時股價、MA、RSI、K線圖。
            </p>

            <div class="input-group">

                <label class="label">
                    股票代號
                </label>

                <input
                    id="stockInput"
                    class="input"
                    type="text"
                    placeholder="例如：2330"
                >

            </div>

            <button
                class="main-btn"
                onclick="searchStock()"
            >
                ✦ 開始分析 ✦
            </button>

            <div class="stock-box">

                <div class="stock-head">

                    <div>

                        <div
                            id="stockName"
                            class="stock-name"
                        >
                            台積電
                        </div>

                        <div
                            id="stockCode"
                            class="stock-code"
                        >
                            2330.TW
                        </div>

                    </div>

                    <div style="text-align:right;">

                        <div
                            id="stockPrice"
                            class="stock-price up"
                        >
                            --
                        </div>

                        <div
                            id="stockChange"
                            class="change up"
                        >
                            --
                        </div>

                    </div>

                </div>

                <div class="grid">

                    <div class="info-card">

                        <div class="info-title">
                            MA5
                        </div>

                        <div
                            id="ma5"
                            class="info-value"
                        >
                            --
                        </div>

                    </div>

                    <div class="info-card">

                        <div class="info-title">
                            MA20
                        </div>

                        <div
                            id="ma20"
                            class="info-value"
                        >
                            --
                        </div>

                    </div>

                    <div class="info-card">

                        <div class="info-title">
                            RSI
                        </div>

                        <div
                            id="rsi"
                            class="info-value"
                        >
                            --
                        </div>

                    </div>

                    <div class="info-card">

                        <div class="info-title">
                            MACD
                        </div>

                        <div
                            id="macd"
                            class="info-value"
                        >
                            --
                        </div>

                    </div>

                </div>

                <div class="chart-wrap">

                    <canvas id="stockChart"></canvas>

                </div>

            </div>

        </div>

        <!-- RIGHT -->

        <div class="card">

            <h2 class="section-title">
                最新新聞 ✦
            </h2>

            <div id="newsContainer">

                <div class="news-item">
                    <div class="news-title">
                        請搜尋股票 🌸
                    </div>
                </div>

            </div>

        </div>

    </div>

    <div class="footer">

        <div>
            ✦ Sakura Stock ✦
        </div>

        <div>
            Pastel Japanese Style Taiwan Stock Dashboard
        </div>

    </div>

</div>

<script>

let chart;

function calculateMA(data, period){

    return data.map((_, i) => {

        if(i < period - 1){
            return null;
        }

        const slice =
        data.slice(i - period + 1, i + 1);

        return (
            slice.reduce((a,b)=>a+b,0)
            / period
        );

    });

}

function calculateRSI(prices, period = 14){

    let gains = 0;
    let losses = 0;

    for(let i=1;i<=period;i++){

        const diff =
        prices[i] - prices[i-1];

        if(diff >= 0){
            gains += diff;
        }else{
            losses += Math.abs(diff);
        }

    }

    const rs =
    gains / losses;

    return (
        100 -
        (100 / (1 + rs))
    ).toFixed(2);

}

async function searchStock(){

    const stock =
    document.getElementById(
        "stockInput"
    ).value.trim();

    if(!stock){

        alert("請輸入股票代號 🌸");
        return;
    }

    try{

        const url =
        `https://query1.finance.yahoo.com/v8/finance/chart/${stock}.TW?range=3mo&interval=1d`;

        const response =
        await fetch(url);

        const data =
        await response.json();

        const result =
        data.chart.result[0];

        const meta =
        result.meta;

        const quote =
        result.indicators.quote[0];

        const closes =
        quote.close.filter(v=>v);

        const timestamps =
        result.timestamp.map(t=>{

            const d =
            new Date(t*1000);

            return (
                d.getMonth()+1
            ) + "/" + d.getDate();

        });

        const current =
        meta.regularMarketPrice;

        const previous =
        meta.previousClose;

        const diff =
        (
            current - previous
        ).toFixed(2);

        const percent =
        (
            diff / previous * 100
        ).toFixed(2);

        document.getElementById(
            "stockName"
        ).innerText =
        meta.symbol;

        document.getElementById(
            "stockCode"
        ).innerText =
        stock + ".TW";

        const priceEl =
        document.getElementById(
            "stockPrice"
        );

        const changeEl =
        document.getElementById(
            "stockChange"
        );

        priceEl.innerText =
        current.toFixed(2);

        if(diff >= 0){

            priceEl.className =
            "stock-price up";

            changeEl.className =
            "change up";

            changeEl.innerText =
            `▲ +${diff} (+${percent}%)`;

        }else{

            priceEl.className =
            "stock-price down";

            changeEl.className =
            "change down";

            changeEl.innerText =
            `▼ ${diff} (${percent}%)`;
        }

        const ma5 =
        calculateMA(closes,5)
        .filter(v=>v)
        .pop();

        const ma20 =
        calculateMA(closes,20)
        .filter(v=>v)
        .pop();

        const rsi =
        calculateRSI(
            closes.slice(-15)
        );

        document.getElementById(
            "ma5"
        ).innerText =
        ma5.toFixed(2);

        document.getElementById(
            "ma20"
        ).innerText =
        ma20.toFixed(2);

        document.getElementById(
            "rsi"
        ).innerText =
        rsi;

        document.getElementById(
            "macd"
        ).innerText =
        ma5 > ma20
        ? "多頭"
        : "空頭";

        renderChart(
            timestamps,
            closes
        );

        loadFakeNews(stock);

    }catch(error){

        console.error(error);

        alert(
            "讀取失敗 🌸\n請使用 Netlify 或 Vercel 部署"
        );

    }

}

function renderChart(labels, data){

    const ctx =
    document.getElementById(
        "stockChart"
    );

    if(chart){
        chart.destroy();
    }

    chart =
    new Chart(ctx,{

        type:"line",

        data:{

            labels,

            datasets:[{

                label:"收盤價",

                data,

                tension:0.3,

                borderWidth:3,

                fill:true,

                backgroundColor:
                "rgba(246,165,181,0.15)",

                borderColor:
                "#f6a5b5"

            }]
        },

        options:{

            responsive:true,

            plugins:{
                legend:{
                    display:false
                }
            }

        }

    });

}

function loadFakeNews(stock){

    const container =
    document.getElementById(
        "newsContainer"
    );

    container.innerHTML = `

    <div class="news-item">
        <div class="news-title">
            ${stock} 今日成交量明顯增加
        </div>

        <div class="news-meta">
            市場觀察 ・ 今日
        </div>
    </div>

    <div class="news-item">
        <div class="news-title">
            AI 類股續強 台股偏多整理
        </div>

        <div class="news-meta">
            財經新聞 ・ 今日
        </div>
    </div>

    <div class="news-item">
        <div class="news-title">
            外資持續關注電子權值股
        </div>

        <div class="news-meta">
            籌碼分析 ・ 今日
        </div>
    </div>

    `;

}

searchStock = searchStock;

</script>

</body>
