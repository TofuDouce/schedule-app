<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>✦ 貓咪客服中心 ✦</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg-base:#fff9f6;
    --bg-gradient:#ffebe3;

    --card-bg:#ffffff;

    --text-main:#54433a;
    --text-sub:#8e7a70;

    --gold:#f6c86c;
    --gold-hover:#efb94d;

    --pink:#f79999;

    --line:#eadfd8;

    --base-font-size:20px;

}

body{

    min-height:100vh;

    background:
    linear-gradient(
        180deg,
        var(--bg-base) 0%,
        var(--bg-gradient) 100%
    );

    font-family:
    "Zen Maru Gothic",
    "Quicksand",
    "Microsoft JhengHei",
    sans-serif;

    color:var(--text-main);

    padding:28px;

    display:flex;
    justify-content:center;
    align-items:center;

    position:relative;

    font-size:var(--base-font-size);

}

/* 外框 */

.decor-border{

    position:fixed;
    inset:12px;

    border:2px dashed rgba(142,122,112,0.15);

    border-radius:24px;

    pointer-events:none;

}

/* 浮水印 */

.watermark{

    position:fixed;

    right:24px;
    bottom:24px;

    color:rgba(142,122,112,0.4);

    font-size:12px;

    letter-spacing:0.5px;

    pointer-events:none;

}

.container{

    width:100%;
    max-width:1200px;

    position:relative;
    z-index:2;

}

/* topbar */

.topbar{

    display:flex;
    justify-content:flex-end;
    gap:8px;

    margin-bottom:18px;

}

.top-btn{

    border:none;

    background:white;

    border:1px solid rgba(142,122,112,0.18);

    color:var(--text-main);

    padding:8px 16px;

    border-radius:999px;

    cursor:pointer;

    font-family:inherit;
    font-size:15px;
    font-weight:700;

    transition:0.2s;

}

.top-btn:hover{

    background:#fff4ec;
    border-color:var(--gold);

}

/* hero */

.hero{

    text-align:center;
    margin-bottom:28px;

}

.badge{

    display:inline-block;

    background:rgba(246,200,108,0.18);

    color:#b57d18;

    padding:7px 16px;

    border-radius:999px;

    font-size:15px;
    font-weight:700;

    margin-bottom:14px;

}

.title{

    font-size:clamp(34px,5vw,50px);

    line-height:1.4;

    letter-spacing:1px;

}

.subtitle{

    margin-top:10px;

    color:var(--text-sub);

    font-size:16px;

}

/* layout */

.layout{

    display:grid;
    grid-template-columns:1fr;
    gap:24px;

}

@media(min-width:900px){

    .layout{
        grid-template-columns:1.2fr 0.8fr;
    }

}

.card{

    background:var(--card-bg);

    border-radius:28px;

    border:1px solid rgba(142,122,112,0.1);

    padding:30px;

    box-shadow:
    0 10px 30px rgba(84,67,58,0.05);

}

.section-title{

    font-size:24px;
    margin-bottom:18px;

}

.section-desc{

    color:var(--text-sub);
    line-height:1.8;
    margin-bottom:22px;

}

.input{

    width:100%;

    padding:14px 16px;

    border-radius:16px;

    border:1.5px solid rgba(142,122,112,0.16);

    background:#fffbf9;

    color:var(--text-main);

    font-size:16px;

    font-family:inherit;

    margin-bottom:16px;

}

.input:focus{

    outline:none;

    border-color:var(--gold);

    background:white;

    box-shadow:
    0 0 0 4px rgba(246,200,108,0.2);

}

.main-btn{

    width:100%;

    border:none;

    background:var(--gold);

    color:var(--text-main);

    padding:16px;

    border-radius:18px;

    cursor:pointer;

    font-family:inherit;
    font-size:17px;
    font-weight:700;

    box-shadow:
    0 6px 16px rgba(246,200,108,0.25);

    transition:0.2s;

}

.main-btn:hover{

    background:var(--gold-hover);

    transform:translateY(-2px);

}

.soft-box{

    background:#fffaf7;

    border:1px dashed rgba(142,122,112,0.2);

    border-radius:18px;

    padding:20px;

    margin-top:22px;

    min-height:220px;

}

.soft-box-title{

    font-size:17px;
    font-weight:700;

    margin-bottom:10px;

}

.soft-box-text{

    color:var(--text-sub);

    line-height:2;

    white-space:pre-line;

}

/* right */

.list{

    display:flex;
    flex-direction:column;
    gap:12px;

}

.list-item{

    background:#fffcfb;

    border:1px solid rgba(142,122,112,0.08);

    border-radius:16px;

    padding:16px 18px;

}

.list-item-title{

    font-weight:700;
    margin-bottom:6px;

}

.list-item-text{

    color:var(--text-sub);

    line-height:1.7;
    font-size:15px;

}

/* footer */

.footer{

    text-align:center;

    margin-top:36px;

    color:var(--text-sub);

    font-size:14px;

}

.footer b{

    color:var(--pink);

}

</style>
</head>

<body>

<div class="decor-border"></div>

<div class="watermark">
    Made with sleepy cats by <b>ChuChu</b> ✦
</div>

<div class="container">

    <!-- top -->

    <div class="topbar">

        <button
            class="top-btn"
            onclick="changeFont(-1)"
        >
            A -
        </button>

        <button
            class="top-btn"
            onclick="resetFont()"
        >
            A
        </button>

        <button
            class="top-btn"
            onclick="changeFont(1)"
        >
            A +
        </button>

    </div>

    <!-- hero -->

    <div class="hero">

        <div class="badge">
            深夜貓咪客服系統 🐈
        </div>

        <h1 class="title">
            貓咪客服中心
        </h1>

        <p class="subtitle">
            本客服不保證會認真回答。
        </p>

    </div>

    <div class="layout">

        <!-- left -->

        <div class="card">

            <h2 class="section-title">
                請輸入你的問題
            </h2>

            <p class="section-desc">
                貓咪客服將依照心情，
                給你一些可能沒什麼幫助的建議。
            </p>

            <input
                id="questionInput"
                class="input"
                type="text"
                placeholder="例如：我今天不想上班..."
            >

            <button
                class="main-btn"
                onclick="askCat()"
            >
                ✦ 呼叫客服貓咪 ✦
            </button>

            <div
                class="soft-box"
                id="replyBox"
            >

                <div class="soft-box-title">
                    🐾 客服尚未上線
                </div>

                <div class="soft-box-text">
                    貓咪目前正在睡覺。
                </div>

            </div>

        </div>

        <!-- right -->

        <div class="card">

            <h2 class="section-title">
                今日客服狀態
            </h2>

            <p class="section-desc">
                客服的工作意願每天都不同。
            </p>

            <div class="list">

                <div class="list-item">

                    <div class="list-item-title">
                        🐈 客服心情
                    </div>

                    <div
                        class="list-item-text"
                        id="moodText"
                    >
                        想睡覺。
                    </div>

                </div>

                <div class="list-item">

                    <div class="list-item-title">
                        🐟 罐罐存量
                    </div>

                    <div
                        class="list-item-text"
                        id="foodText"
                    >
                        尚有 3 罐。
                    </div>

                </div>

                <div class="list-item">

                    <div class="list-item-title">
                        📦 紙箱狀態
                    </div>

                    <div
                        class="list-item-text"
                        id="boxText"
                    >
                        客服目前在紙箱裡。
                    </div>

                </div>

            </div>

        </div>

    </div>

    <div class="footer">

        <div>
            ✦ Cat Customer Service Center ✦
        </div>

        <div>
            Designed by <b>ChuChu</b> © 2026
        </div>

    </div>

</div>

<script>

/* 字體 */

let currentSize = 20;

function changeFont(value){

    currentSize += value;

    if(currentSize < 16){
        currentSize = 16;
    }

    if(currentSize > 26){
        currentSize = 26;
    }

    document.documentElement.style.setProperty(
        '--base-font-size',
        currentSize + 'px'
    );

}

function resetFont(){

    currentSize = 20;

    document.documentElement.style.setProperty(
        '--base-font-size',
        '20px'
    );

}

/* random */

function random(arr){

    return arr[
        Math.floor(
            Math.random()*arr.length
        )
    ];

}

/* 資料庫 */

const openings = [

    "🐈 本客服正在伸懶腰……",
    "🐾 客服貓咪慢慢走過來了。",
    "📦 客服從紙箱裡探出頭。",
    "🐟 正在搜尋罐罐資料庫……",
    "☁ 客服似乎剛睡醒。",
    "🌙 深夜客服系統啟動。",
    "🐈 貓咪客服踩到了鍵盤。",
    "✨ 客服看了你一眼。",
    "💤 客服打了一個哈欠。",
    "🐾 正在載入貓咪智慧……"

];

const workReplies = [

    "人類似乎很討厭星期一。",
    "本客服建議先請假。",
    "你的靈魂今天沒有登入成功。",
    "加班不是適合貓咪理解的文化。",
    "你可能需要甜食。",
    "本客服認為上班可以晚五分鐘。",
    "今天適合假裝忙碌。",
    "請不要和主管對視。",
    "可以先去買咖啡。",
    "工作這種東西明天也會存在。"

];

const loveReplies = [

    "已讀不一定代表討厭。",
    "人類的戀愛行為很難理解。",
    "本客服建議先照顧自己。",
    "有時候只是對方睡著了。",
    "請不要在凌晨做重大戀愛決定。",
    "對方可能正在玩手機。",
    "貓咪無法處理曖昧問題。",
    "你值得被好好喜歡。",
    "戀愛和罐罐一樣難懂。",
    "有些人類回訊息很慢。"

];

const emoReplies = [

    "今天適合窩起來。",
    "辛苦活到現在了。",
    "不想努力也沒關係。",
    "先吃點東西吧。",
    "今晚適合早點休息。",
    "你已經很努力了。",
    "世界有時候真的很累。",
    "可以先抱抱棉被。",
    "本客服允許你今天耍廢。",
    "請記得呼吸。"

];

const foodReplies = [

    "本客服推薦白醬義大利麵。",
    "現在適合吃炸雞。",
    "御飯糰會理解你的。",
    "熱食區正在呼喚你。",
    "今天適合吃甜的。",
    "茶葉蛋也許能拯救你。",
    "本客服建議加起司。",
    "深夜最適合微波食品。",
    "冰淇淋可能有效。",
    "你需要碳水化合物。"

];

const randomReplies = [

    "本客服目前正在發呆。",
    "貓咪剛剛踩到網路線。",
    "今天的天空聞起來像罐罐。",
    "客服決定先舔毛。",
    "這問題超出貓咪智慧範圍。",
    "客服正在看窗外的小鳥。",
    "系統偵測到人類困惑。",
    "貓咪認為睡覺最重要。",
    "客服暫時失去幹勁。",
    "今天不適合思考太多。"

];

const actions = [

    "（開始舔毛）",
    "（默默窩進紙箱）",
    "（把問題推下桌）",
    "（踩了一下鍵盤）",
    "（盯著你看）",
    "（尾巴晃來晃去）",
    "（翻肚睡著）",
    "（假裝沒聽到）",
    "（突然暴衝）",
    "（正在打呼）"

];

const endings = [

    "今天辛苦了。",
    "記得喝水。",
    "可以先睡一覺。",
    "本客服即將下班。",
    "祝你今晚順利。",
    "請記得吃飯。",
    "貓咪相信你。",
    "不要太晚睡。",
    "明天再努力也可以。",
    "客服要回去睡覺了。"

];

const moods = [

    "很想睡。",
    "願意工作 3 分鐘。",
    "心情普通。",
    "不想理人。",
    "看到罐罐後恢復精神。",
    "正在發呆。"

];

const foods = [

    "剩下 1 罐。",
    "還有 5 罐。",
    "客服偷偷藏了罐罐。",
    "今天存量很多。",
    "快吃完了。"

];

const boxes = [

    "客服目前在紙箱裡。",
    "紙箱已被占領。",
    "客服拒絕離開紙箱。",
    "今天有新紙箱。",
    "客服把紙箱咬壞了。"

];

/* 主系統 */

function askCat(){

    const text =
    document.getElementById(
        "questionInput"
    ).value;

    let replySet = randomReplies;

    if(
        text.includes("上班") ||
        text.includes("工作") ||
        text.includes("老闆") ||
        text.includes("公司")
    ){

        replySet = workReplies;

    }

    else if(

        text.includes("喜歡") ||
        text.includes("愛") ||
        text.includes("男友") ||
        text.includes("女友") ||
        text.includes("已讀")

    ){

        replySet = loveReplies;

    }

    else if(

        text.includes("累") ||
        text.includes("哭") ||
        text.includes("煩") ||
        text.includes("痛苦") ||
        text.includes("emo")

    ){

        replySet = emoReplies;

    }

    else if(

        text.includes("吃") ||
        text.includes("晚餐") ||
        text.includes("宵夜") ||
        text.includes("餓")

    ){

        replySet = foodReplies;

    }

    const reply = `

${random(openings)}

${random(replySet)}

${random(actions)}

${random(endings)}

    `;

    document.getElementById(
        "replyBox"
    ).innerHTML = `

        <div class="soft-box-title">
            🐈 客服回覆
        </div>

        <div class="soft-box-text">
            ${reply}
        </div>

    `;

    document.getElementById(
        "moodText"
    ).innerText =
    random(moods);

    document.getElementById(
        "foodText"
    ).innerText =
    random(foods);

    document.getElementById(
        "boxText"
    ).innerText =
    random(boxes);

}

</script>

</body>
</html>
