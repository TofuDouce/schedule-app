<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 財富煉金術：105種極致奇物左右橫掃試煉</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:ital,wght@0,500;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg1: #0d0614;
            --bg2: #180b29;
            --bg3: #08030d;
            --gold: #d8bf8a;
            --gold-glow: rgba(216, 191, 138, 0.3);
            --text: #eadfff;
            --purple-light: #a897c9;
            --base-font-size: 19px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            height: 100vh;
            color: var(--text);
            font-family: "Cormorant Garamond", "Noto Serif TC", serif;
            background: radial-gradient(circle at top, rgba(180,150,255,.14), transparent 40%), 
                        linear-gradient(180deg, var(--bg1), var(--bg2), var(--bg3));
            padding: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: var(--base-font-size);
        }

        /* 星空背景 */
        .stars { position: fixed; inset: 0; overflow: hidden; z-index: -3; pointer-events: none; }
        .star {
            position: absolute; width: 2px; height: 2px; background: white;
            border-radius: 50%; opacity: .7; animation: twinkle 4s infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: .15; transform: scale(.7); }
            50% { opacity: 1; transform: scale(1.4); }
        }

        /* 頂部巨大財富面板 */
        .wealth-banner {
            width: 100%; background: rgba(24, 11, 41, 0.85);
            border: 1.5px solid var(--gold); border-radius: 12px; padding: 10px;
            text-align: center; margin-bottom: 12px; box-shadow: 0 0 20px var(--gold-glow);
            flex-shrink: 0; position: relative;
        }
        .wealth-title { font-family: 'Cinzel', serif; font-size: 18px; color: var(--purple-light); letter-spacing: 2px; }
        .wealth-amount {
            font-family: 'Cinzel', serif; font-size: 38px; font-weight: 700; color: var(--gold);
            text-shadow: 0 0 12px rgba(216, 191, 138, 0.8); margin: 2px 0;
        }
        .wealth-stats { font-size: 15px; color: #bcaed6; font-style: italic; }

        /* 核心修改：左右雙欄↔️選單佈局 */
        .container {
            display: flex;
            flex-direction: row; /* 確保徹底的左右排列 */
            gap: 15px;
            width: 100%; 
            flex-grow: 1; /* 填滿剩餘高度 */
            overflow: hidden; /* 防止主頁面出現大捲軸 */
        }

        /* 左側欄：100+款奇物商場（獨立滾動） */
        .shop-panel {
            flex: 1.2; /* 佔用左側較多空間 */
            background: rgba(20, 10, 35, 0.6); border: 1.5px solid rgba(216,191,138,.4);
            border-radius: 12px; padding: 15px;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* 右側欄：大帳本（獨立滾動） */
        .sidebar-panel {
            flex: 0.8; /* 佔用右側空間 */
            background: rgba(25, 12, 44, 0.8); border: 1.5px solid var(--gold);
            border-radius: 12px; padding: 15px; box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; overflow: hidden;
        }

        .panel-title {
            font-family: 'Cinzel', serif; font-size: 20px; color: var(--gold);
            text-align: center; margin-bottom: 10px; border-bottom: 1px solid rgba(216,191,138,.3);
            padding-bottom: 5px; letter-spacing: 1px; flex-shrink: 0;
        }

        /* 商品清單容器（高度塞滿、滾動流暢） */
        .items-list-container {
            overflow-y: scroll; flex-grow: 1; padding-right: 5px;
            display: flex; flex-direction: column; gap: 6px;
        }

        /* 極致精簡、內容豐富的橫向商品列 */
        .item-row {
            background: rgba(30, 16, 51, 0.7); border: 1px solid rgba(216,191,138,.15);
            border-radius: 6px; padding: 8px 12px; display: flex; align-items: center;
            justify-content: space-between; transition: all 0.1s;
        }
        .item-row:hover {
            border-color: var(--gold); background: rgba(43, 24, 71, 0.8);
            box-shadow: 0 0 8px rgba(216, 191, 138, 0.15);
        }
        
        .item-left { display: flex; align-items: center; gap: 10px; overflow: hidden; }
        .item-emoji { font-size: 24px; flex-shrink: 0; }
        .item-details { display: flex; flex-direction: column; overflow: hidden; }
        .item-name { font-weight: bold; font-size: 16px; color: #fff; }
        .item-desc { font-size: 12px; color: var(--purple-light); font-style: italic; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }

        .item-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        .item-price { font-family: 'Cinzel', serif; font-size: 15px; color: var(--gold); font-weight: bold; width: 120px; text-align: right; }
        
        .btn-group { display: flex; align-items: center; gap: 6px; }
        .action-btn {
            background: linear-gradient(135deg, #3d1d6d, #230d43); border: 1px solid rgba(216,191,138,.4);
            color: var(--text); border-radius: 4px; width: 26px; height: 26px; font-size: 14px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .action-btn:hover { background: var(--gold); color: #180b29; box-shadow: 0 0 5px var(--gold); }
        .item-count { font-family: 'Cinzel', serif; width: 22px; text-align: center; font-weight: bold; font-size: 15px; }

        /* 右側帳本清單 */
        .cart-wrapper { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .cart-list { overflow-y: auto; flex-grow: 1; margin-bottom: 5px; padding-right: 5px; }
        .cart-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 0; border-bottom: 1px solid rgba(168,151,201,0.15); font-size: 14px;
        }

        /* 結算區 */
        .summary-section {
            border-top: 1px solid rgba(216,191,138,.3); padding-top: 8px; flex-shrink: 0;
        }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 16px; }
        
        .magic-btn {
            width: 100%; background: linear-gradient(135deg, rgba(216,191,138,1), rgba(175,143,84,1));
            color: #1a0a2a; border: none; border-radius: 6px; padding: 10px; font-family: 'Cinzel', serif;
            font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.1s;
            letter-spacing: 1px;
        }
        .magic-btn:hover { transform: translateY(-1px); box-shadow: 0 0 10px var(--gold); }
        
        .random-btn {
            background: linear-gradient(135deg, #a897c9, #5d4880); color: #fff; border: 1px solid var(--gold);
        }

        /* 彈出圖卡浮層（不破壞左右選單） */
        .canvas-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 1000; justify-content: center; align-items: center; padding: 20px;
        }
        .canvas-box {
            background: #180b29; padding: 15px; border: 2px solid var(--gold); border-radius: 12px;
            text-align: center; max-width: 90%; max-height: 95%; overflow-y: auto;
        }
        #billCanvas { max-width: 100%; height: auto; border-radius: 6px; }

        /* 古典外框裝飾線 */
        .decor-frame {
            position: fixed; inset: 8px; border: 1px solid rgba(216,191,138,.15);
            border-radius: 14px; pointer-events: none; z-index: 999;
        }
    </style>
</head>

                const funnyConcepts = [
                    { name: '絕對零度冷笑話冷氣機', emoji: '🥶', desc: `【等級${rareLetter}】開啟後講出的冷笑話能瞬間將周圍空氣凍結至-180°C。` },
                    { name: '無限續杯伯爵紅茶量子壺', emoji: '🫖', desc: `【等級${rareLetter}】與鮮茶道底層邏輯糾纏，永遠倒不完的高階魔導茶壺。` },
                    { name: '阿毛之塔9999層直達電梯券', emoji: '🎫', desc: `【等級${rareLetter}】不用再丟骰子了，點下去直接送你上去直面最終大魔王。` },
                    { name: '忘記帶錢包自動化解尷術', emoji: '💳', desc: `【等級${rareLetter}】結帳時發動，能讓店員突然忘記自己是來上班的。` },
                    { name: '防發呆全息偷懶面具', emoji: '🎭', desc: `【等級${rareLetter}】戴上後主管看起來你正在瘋狂敲鍵盤，實際上你在閉眼流口水。` },
                    { name: '元大投資先生紅線漲停警報器', emoji: '🚨', desc: `【等級${rareLetter}】只要你買的股票跌了，它就會發出刺耳的「它正在蓄力」安慰語音。` },
                    { name: '隔壁同事薯條悄悄偷吃手套', emoji: '🧤', desc: `【等級${rareLetter}】戴上後偷拿隔壁的薯條，對方會以為是風吹走的。` },
                    { name: '全自動悲劇結局BE修正修正液', emoji: '🧪', desc: `【等級${rareLetter}】將小說裡的玻璃渣強行塗掉，強行改成原地結婚大圓滿。` },
                    { name: '這是一張毫無用處的黑圖卡', emoji: '🖼️', desc: `【等級${rareLetter}】拍賣價極高，說明只寫著：「你看不到我很正常，因為我也沒畫」。` },
                    { name: '時空斷層量子防加班沙漏', emoji: '⌛', desc: `【等級${rareLetter}】一到下午5點自動干擾公司時鐘，強行把時間快進到下班。` }
                ];

                const concept = funnyConcepts[i % funnyConcepts.length];
                const finalPrice = Math.floor((Math.random() * 950000000) + 15000) * (idNum % 4 === 0 ? 50 : 1);

                return {
                    id: `p${idNum}`,
                    name: `【${rareLetter}級】${concept.name} v${idNum}.0`,
                    price: finalPrice,
                    emoji: concept.emoji,
                    desc: concept.desc
                };
            })
        ];

        let cart = {};

        // 格式化千分位
        function formatMoney(num) {
            return '$' + num.toLocaleString('zh-TW');
        }

        // 徹底實現「左側↔️右側」平行雙欄中的左側渲染
        function renderShop() {
            const container = document.getElementById('itemsListContainer');
            container.innerHTML = productList.map(p => {
                const qty = cart[p.id] || 0;
                return `
                    <div class="item-row">
                        <div class="item-left">
                            <div class="item-emoji">${p.emoji}</div>
                            <div class="item-details">
                                <div class="item-name">${p.name}</div>
                                <div class="item-desc" title="${p.desc}">${p.desc}</div>
                            </div>
                        </div>
                        <div class="item-right">
                            <div class="item-price">${formatMoney(p.price)}</div>
                            <div class="btn-group">
                                <button class="action-btn" onclick="updateCart('${p.id}', -1)">-</button>
                                <span class="item-count" id="count-${p.id}">${qty}</span>
                                <button class="action-btn" onclick="updateCart('${p.id}', 1)">+</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 更新購物車
        function updateCart(id, change) {
            const product = productList.find(p => p.id === id);
            const currentQty = cart[id] || 0;
            const newQty = currentQty + change;

            if (newQty < 0) return;
            
            if (change > 0 && currentWealth - product.price < 0) {
                alert("🧙‍♂️【虛空警告】：資產不夠了！請先退貨幾座鮮茶道噴泉！");
                return;
            }

            if (newQty === 0) {
                delete cart[id];
            } else {
                cart[id] = newQty;
            }

            calculateTotal();
            document.getElementById(`count-${id}`).innerText = newQty;
            renderCart();
        }

        // 🎲 諸神黃昏隨機亂買
        function buyRandomly() {
            for (let i = 0; i < 15; i++) {
                const randIndex = Math.floor(Math.random() * productList.length);
                const p = productList[randIndex];
                if (currentWealth - p.price > 0) {
                    cart[p.id] = (cart[p.id] || 0) + 1;
                }
            }
            calculateTotal();
            renderShop();
            renderCart();
        }

        // 計算頂部面板數據
        function calculateTotal() {
            let totalSpent = 0;
            let totalItems = 0;

            for (let id in cart) {
                const product = productList.find(p => p.id === id);
                totalSpent += product.price * cart[id];
                totalItems += cart[id];
            }

            currentWealth = INITIAL_WEALTH - totalSpent;

            document.getElementById('remainingDisplay').innerText = formatMoney(currentWealth);
            document.getElementById('totalSpentDisplay').innerText = formatMoney(totalSpent);
            document.getElementById('totalCountDisplay').innerText = `${totalItems} 件`;

            const percentage = ((totalSpent / INITIAL_WEALTH) * 100).toFixed(6);
            let roastText = "";
            if (totalSpent === 0) {
                roastText = "左右雙欄已鋪貨完成，請體驗滑動點擊的無上揮霍快感！";
            } else if (percentage < 0.5) {
                roastText = `已花費 ${percentage}% 資產。這點開銷，連幫阿毛買黃金骨頭的包裝紙都不夠！`;
            } else {
                roastText = `警告！你竟然燃燒了 ${percentage}% 的天量資產！整個奧術大廳因你而顫抖！`;
            }
            document.getElementById('statsDisplay').innerText = roastText;
        }

        // 渲染右側大帳本
        function renderCart() {
            const cartList = document.getElementById('cartList');
            const keys = Object.keys(cart);

            if (keys.length === 0) {
                cartList.innerHTML = `
                    <div style="text-align: center; color: var(--purple-light); font-style: italic; padding-top: 80px; font-size: 14px;">
                        帳本空空如也，請在左側瘋狂點擊 ＋ 勾選因果...
                    </div>`;
                return;
            }

            cartList.innerHTML = keys.map(id => {
                const product = productList.find(p => p.id === id);
                const qty = cart[id];
                return `
                    <div class="cart-item">
                        <div style="display: flex; flex-direction: column;">
                            <span style="font-weight: bold; color: #fff;">${product.emoji} ${product.name}</span>
                            <span style="font-size: 11px; color: var(--purple-light); max-width: 250px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${product.desc}</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span style="color: var(--gold); font-size: 13px;">${formatMoney(product.price)} × ${qty}</span>
                            <button class="action-btn" style="border:none; color:#f29494; background:transparent;" onclick="updateCart('${id}', -${qty})">✕</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 關閉浮層
        function closeModal() {
            document.getElementById('canvasModal').style.display = 'none';
        }

        // 生成 Canvas 結算圖卡
        function generateInvoiceCard() {
            const keys = Object.keys(cart);
            if (keys.length === 0) {
                alert("🔮 提示：未網羅任何神物，無法締結虛空契約！");
                return;
            }

            const canvas = document.getElementById('billCanvas');
            const ctx = canvas.getContext('2d');
            const modal = document.getElementById('canvasModal');
            modal.style.display = 'flex';

            // 繪製背景
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#130722'); grad.addColorStop(0.5, '#1e0f35'); grad.addColorStop(1, '#0b0314');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 邊框
            ctx.strokeStyle = '#d8bf8a'; ctx.lineWidth = 2; ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);
            
            // 四角 ✦
            ctx.fillStyle = '#d8bf8a'; ctx.font = '18px serif'; ctx.textAlign = 'center';
            [{x:25,y:30}, {x:canvas.width-25,y:30}, {x:25,y:canvas.height-20}, {x:canvas.width-25,y:canvas.height-20}].forEach(c => {
                ctx.fillText('✦', c.x, c.y);
            });

            // 標題
            ctx.font = '24px "Cinzel", serif'; ctx.fillText('🔮 奧術至尊・百物滿載揮霍契書 🔮', canvas.width / 2, 70);

            let totalSpent = 0; let totalItems = 0;
            let shareText = "✦ 諸神黃昏・百物橫掃法契 ✦\n\n";

            keys.forEach(id => {
                const p = productList.find(p => p.id === id);
                totalSpent += p.price * cart[id];
                totalItems += cart[id];
                shareText += `【${p.emoji} ${p.name}】 × ${cart[id]}個\n`;
            });
            const remain = INITIAL_WEALTH - totalSpent;
            const pct = ((totalSpent / INITIAL_WEALTH) * 100).toFixed(5);

            ctx.textAlign = 'left'; ctx.font = '15px sans-serif'; ctx.fillStyle = '#a897c9';
            ctx.fillText(`初始至尊預算：$3,000,000,000,000`, 55, 130);
            ctx.fillText(`橫向搜刮品項：${totalItems} 件魔導產物`, 55, 160);

            // 明細表格背景
            ctx.fillStyle = 'rgba(255, 255, 255, 0.03)'; ctx.fillRect(50, 190, canvas.width - 100, 380);
            ctx.strokeStyle = 'rgba(216, 191, 138, 0.2)'; ctx.strokeRect(50, 190, canvas.width - 100, 380);

            ctx.fillStyle = '#d8bf8a'; ctx.font = 'bold 15px sans-serif';
            ctx.fillText('搜刮品項名稱與奧術效果', 65, 215);
            ctx.textAlign = 'right'; ctx.fillText('數量', canvas.width - 200, 215); ctx.fillText('小計', canvas.width - 65, 215);

            ctx.font = '14px sans-serif'; ctx.fillStyle = '#eadfff';
            let startY = 250;
            keys.slice(0, 9).forEach(id => {
                const p = productList.find(p => p.id === id);
                ctx.textAlign = 'left'; ctx.fillText(`${p.emoji} ${p.name.substring(0,18)}`, 65, startY);
                ctx.textAlign = 'right'; ctx.fillText(`${cart[id]}`, canvas.width - 200, startY);
                ctx.fillText(formatMoney(p.price * cart[id]), canvas.width - 65, startY);
                startY += 34;
            });
            if(keys.length > 9) {
                ctx.textAlign = 'center'; ctx.fillStyle = '#a897c9';
                ctx.fillText(`（...其餘 ${keys.length - 9} 種奢華奇物已封印於大卷軸下層...）`, canvas.width/2, 545);
            }

            // 總計
            ctx.textAlign = 'left'; ctx.font = '18px "Cinzel", serif'; ctx.fillStyle = '#f29494'; ctx.fillText('總計已揮霍：', 55, 610);
            ctx.textAlign = 'right'; ctx.font = 'bold 24px "Cinzel", serif'; ctx.fillText(formatMoney(totalSpent), canvas.width - 55, 610);

            ctx.textAlign = 'left'; ctx.font = '14px sans-serif'; ctx.fillStyle = '#a897c9'; ctx.fillText('剩餘至尊資產：', 55, 660);
            ctx.textAlign = 'right'; ctx.fillStyle = '#8ae0be'; ctx.fillText(formatMoney(remain), canvas.width - 55, 660);

            ctx.textAlign = 'center'; ctx.font = 'italic 14px serif'; ctx.fillStyle = '#bcaed6';
            ctx.fillText(`「今日法契已動用總資產之 ${pct}%，財富如星海無窮無盡。」`, canvas.width / 2, 730);
            ctx.fillText('✦ 財富煉金工坊大主祭 ✦', canvas.width / 2, 790);

            shareText += `\n💰 總共橫掃砸下：${formatMoney(totalSpent)}\n🌌 餘額還剩：${formatMoney(remain)}\n🔮 揮霍進度：已燃燒 ${pct}% 的神聖資產！\n\n「真正實現左欄選單橫掃。手速快到連點，今天又是買下星系的一天。🌙」`;
            navigator.clipboard.writeText(shareText).then(() => {}).catch(err => console.log(err));
        }

        // 初始化
        renderShop();
        calculateTotal();
    </script>
</body>
</html>
