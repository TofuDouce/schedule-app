<html lang="zh-TW">
<head>

        :root {
            --bg1: #0d0614;
            --bg2: #180b29;
            --bg3: #08030d;
            --gold: #d8bf8a;
            --gold-glow: rgba(216, 191, 138, 0.3);
            --text: #eadfff;
            --purple-light: #bcaed6;
            --base-font-size: 20px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            color: var(--text);
            font-family: "Cormorant Garamond", "Noto Serif TC", serif;
            background: radial-gradient(circle at top, rgba(180,150,255,.14), transparent 40%), 
                        linear-gradient(180deg, var(--bg1), var(--bg2), var(--bg3));
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: var(--base-font-size);
        }

        /* 星空背景 */
        .stars { position: fixed; inset: 0; overflow: hidden; z-index: -3; pointer-events: none; }
        .star {
            position: absolute; width: 2px; height: 2px; background: white;
            border-radius: 50%; opacity: .7; animation: twinkle 4s infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: .15; transform: scale(.7); }
            50% { opacity: 1; transform: scale(1.4); }

        /* 頂部巨大財富面板 */
        .wealth-banner {
            width: 100%; max-width: 850px; background: rgba(24, 11, 41, 0.9);
            border: 1.5px solid var(--gold); border-radius: 12px; padding: 20px;
            text-align: center; margin-bottom: 25px; box-shadow: 0 0 20px var(--gold-glow);

        .wealth-title { font-family: 'Cinzel', serif; font-size: 22px; color: var(--gold); letter-spacing: 2px; }
        .wealth-amount {
            font-family: 'Cinzel', serif; font-size: 46px; font-weight: 700; color: var(--gold);
            text-shadow: 0 0 12px rgba(216, 191, 138, 0.8); margin: 8px 0;
        }
        .wealth-stats { font-size: 16px; color: var(--purple-light); font-style: italic; }

        /* 主舞台大容器 */

            width: 100%;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* 🎯 核心：真正的左右箭頭商品橫向切換選單 */
        .carousel-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(20, 10, 35, 0.7);
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 30px 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            position: relative;
        }

        /* 巨大的左右切換箭頭 */
        .nav-arrow {
            background: linear-gradient(135deg, #4d268a, #2f1256);
            border: 1.5px solid var(--gold);
            color: var(--gold);
            font-size: 32px;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            user-select: none;
            box-shadow: 0 0 10px rgba(216, 191, 138, 0.2);
            flex-shrink: 0;
        }
        .nav-arrow:hover {
            background: var(--gold);
            color: #180b29;
            box-shadow: 0 0 15px var(--gold);
            transform: scale(1.05);
        }
        .nav-arrow:active { transform: scale(0.95); }

        /* 單一商品展示卡片（極致放大、清晰無比） */
        .product-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 10px 30px;
            min-height: 280px;
            justify-content: center;
        }

        .stage-emoji {
            font-size: 80px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 12px rgba(255,255,255,0.2));
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .stage-name {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .stage-desc {
            font-size: 17px;
            color: #bcaed6;
            line-height: 1.5;
            margin-bottom: 20px;
            max-width: 500px;
        }

        .stage-bottom {
            display: flex;
            align-items: center;
            gap: 25px;
            background: rgba(0,0,0,0.3);
            padding: 10px 25px;
            border-radius: 30px;
            border: 1px solid rgba(216,191,138,0.2);
        }

        .stage-price {
            font-family: 'Cinzel', serif;
            font-size: 24px;
            color: var(--gold);
            font-weight: bold;
        }

        /* 購買加減按鈕組 */
        .btn-group { display: flex; align-items: center; gap: 15px; }
        .action-btn {
            background: linear-gradient(135deg, #5c32a6, #3b196c); border: 1px solid var(--gold);
            color: var(--text); border-radius: 50%; width: 40px; height: 40px; font-size: 20px; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.1s;

        .action-btn:hover { background: var(--gold); color: #180b29; box-shadow: 0 0 8px var(--gold); }
        .item-count { font-family: 'Cinzel', serif; width: 40px; text-align: center; font-weight: bold; font-size: 24px; color: #fff; }

        /* 商品序號指示器 */
        .product-index-badge {
            position: absolute; top: 15px; right: 20px;
            font-family: 'Cinzel', serif; font-size: 14px; color: var(--purple-light);
            background: rgba(0,0,0,0.4); padding: 4px 10px; border-radius: 10px;
        }

        /* 下方大帳本面板 */
        .ledger-panel {
            background: rgba(25, 12, 44, 0.85); border: 1.5px solid var(--gold);
            border-radius: 16px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.4);

        .panel-title {
            font-family: 'Cinzel', serif; font-size: 22px; color: var(--gold);
            text-align: center; margin-bottom: 20px; border-bottom: 1px solid rgba(216,191,138,.3);

        .decor-frame {
            position: fixed; inset: 10px; border: 1px solid rgba(216,191,138,.15);
            border-radius: 14px; pointer-events: none; z-index: 999;
        }
    </style>
</head>

                const rareLetter = idNum % 4 === 0 ? 'S' : idNum % 3 === 0 ? 'A' : idNum % 2 === 0 ? 'B' : 'C';
                const funnyConcepts = [
                    { name: '絕對零度冷笑話冷氣機', emoji: '🥶', desc: `【等級${rareLetter}】開啟後講出的冷笑話能瞬間將周圍空氣凍結。` },
                    { name: '無限續杯伯爵紅茶量子壺', emoji: '🫖', desc: `【等級${rareLetter}】與鮮茶道底層邏輯糾纏，永遠倒不完的魔導壺。` },
                    { name: '阿毛之塔9999層直達電梯券', emoji: '🎫', desc: `【等級${rareLetter}】不用丟骰子，點下去直接送你上去面臨大魔王。` },
                    { name: '忘記帶錢包自動化解尷術', emoji: '💳', desc: `【等級${rareLetter}】結帳時發動，能讓店員突然忘記自己是來上班的。` },
                    { name: '防發呆全息偷懶面具', emoji: '🎭', desc: `【等級${rareLetter}】外人看起來你正在瘋狂敲鍵盤，實際上你在流口水。` },
                    { name: '元大先生紅線漲停警報器', emoji: '🚨', desc: `【等級${rareLetter}】股票跌了就會發出「它正在蓄力」的安慰語音。` },
                    { name: '隔壁同事薯條悄悄偷吃手套', emoji: '🧤', desc: `【等級${rareLetter}】戴上後偷拿薯條，對方會以為是風吹走的。` },
                    { name: '全自動悲劇結局BE修正液', emoji: '🧪', desc: `【等級${rareLetter}】將小說裡的玻璃渣塗掉，強行改成原地結婚大圓滿。` },
                    { name: '毫無用處的純黑拍賣圖卡', emoji: '🖼️', desc: `【等級${rareLetter}】說明寫著：「你看不到正常，因為我也沒畫」。` },
                    { name: '時空斷層量子防加班沙漏', emoji: '⌛', desc: `【等級${rareLetter}】5點自動干擾時鐘，強行把時間快進到下班。` }
                ];
                const concept = funnyConcepts[i % funnyConcepts.length];
                const finalPrice = Math.floor((Math.random() * 9500000) + 15000) * (idNum % 5 === 0 ? 300 : i+1);
                return {
                    id: `p${idNum}`,
                    name: `【${rareLetter}級】${concept.name} v${idNum}.0`,
                    price: finalPrice,
                    emoji: concept.emoji,
                    desc: concept.desc
                };
            })
        ];

        let cart = {};

        function formatMoney(num) {
            return '$' + num.toLocaleString('zh-TW');
        }

        // 核心渲染：只渲染當前 Index 的單一商品舞台
        function renderStageProduct() {
            const p = productList[currentIndex];
            const qty = cart[p.id] || 0;
            
            document.getElementById('productIndexBadge').innerText = `奇物 ${currentIndex + 1} / ${productList.length}`;
            
            const stage = document.getElementById('productStage');
            stage.innerHTML = `
                <div class="stage-emoji">${p.emoji}</div>
                <div class="stage-name">${p.name}</div>
                <div class="stage-desc">${p.desc}</div>
                <div class="stage-bottom">
                    <div class="stage-price">${formatMoney(p.price)}</div>
                    <div class="btn-group">
                        <button class="action-btn" onclick="updateCart('${p.id}', -1)">-</button>
                        <span class="item-count">${qty}</span>
                        <button class="action-btn" onclick="updateCart('${p.id}', 1)">+</button>
                    </div>
                </div>
            `;
        }

        // ⬅️ ➡️ 箭頭切換邏輯
        function switchProduct(direction) {
            currentIndex += direction;
            // 循環邊界處理
            if (currentIndex < 0) currentIndex = productList.length - 1;
            if (currentIndex >= productList.length) currentIndex = 0;
            renderStageProduct();
        }

        function updateCart(id, change) {
            const product = productList.find(p => p.id === id);
            const currentQty = cart[id] || 0;
            const newQty = currentQty + change;

            if (newQty < 0) return;
            
            if (change > 0 && currentWealth - product.price < 0) {
                alert("🧙‍♂️【虛空警告】：預算爆表！請先拿掉其他奇物！");
                return;
            }

            if (newQty === 0) {
                delete cart[id];
            } else {
                cart[id] = newQty;
            }

            calculateTotal();
            renderStageProduct(); // 刷新舞台上的數量顯示
            renderCart();
        }

        function buyRandomly() {
            for (let i = 0; i < 15; i++) {
                const randIndex = Math.floor(Math.random() * productList.length);
                const p = productList[randIndex];
                if (currentWealth - p.price > 0) {
                    cart[p.id] = (cart[p.id] || 0) + 1;
                }
            }
            calculateTotal();
            renderStageProduct();
            renderCart();
        }

        function calculateTotal() {
            let totalSpent = 0; let totalItems = 0;
            for (let id in cart) {
                const product = productList.find(p => p.id === id);
                totalSpent += product.price * cart[id];
                totalItems += cart[id];
            }
            currentWealth = INITIAL_WEALTH - totalSpent;

            document.getElementById('remainingDisplay').innerText = formatMoney(currentWealth);
            document.getElementById('totalSpentDisplay').innerText = formatMoney(totalSpent);
            document.getElementById('totalCountDisplay').innerText = `${totalItems} 件`;

            const percentage = ((totalSpent / INITIAL_WEALTH) * 100).toFixed(6);
            let roastText = "";
            if (totalSpent === 0) {
                roastText = "真正的左右橫向切換舞台已佈署，點擊 ⬅️ ➡️ 箭頭暢快翻閱！";
            } else if (percentage < 0.5) {
                roastText = `已消耗 ${percentage}% 資產。這點預算，連幫阿毛買純金骨頭的包裝紙都不夠！`;
            } else {
                roastText = `大肆揮霍！你燃燒了 ${percentage}% 的天量資產，大帳本已記錄！`;
            }
            document.getElementById('statsDisplay').innerText = roastText;
        }

        function renderCart() {
            const cartList = document.getElementById('cartList');
            const keys = Object.keys(cart);

            if (keys.length === 0) {
                cartList.innerHTML = `
                    <div style="text-align: center; color: #a897c9; font-style: italic; padding-top: 60px; font-size: 16px;">
                        大帳本空空如也，請使用上方 ＋ 號網羅奇物...
                    </div>`;
                return;
            }

            cartList.innerHTML = keys.map(id => {
                const product = productList.find(p => p.id === id);
                const qty = cart[id];
                return `
                    <div class="cart-item">
                        <div style="display: flex; flex-direction: column; overflow: hidden; max-width: 65%;">
                            <span style="font-weight: bold; color: #fff;">${product.emoji} ${product.name}</span>
                            <span style="font-size: 13px; color: #a897c9; text-overflow: ellipsis; white-space: nowrap; overflow: hidden;">${product.desc}</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 15px; flex-shrink: 0;">
                            <span style="color: var(--gold); font-size: 16px; font-weight: bold;">${formatMoney(product.price)} × ${qty}</span>
                            <button class="action-btn" style="border:none; color:#f29494; background:transparent; width:auto; height:auto; font-size:18px;" onclick="updateCart('${id}', -${qty})">✕</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function closeModal() { document.getElementById('canvasModal').style.display = 'none'; }

        function generateInvoiceCard() {
            const keys = Object.keys(cart);
            if (keys.length === 0) {
                alert("🔮 未購買任何商品，無法簽署契約！"); return;
            }

            const canvas = document.getElementById('billCanvas');
            const ctx = canvas.getContext('2d');
            document.getElementById('canvasModal').style.display = 'flex';

            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#130722'); grad.addColorStop(0.5, '#1e0f35'); grad.addColorStop(1, '#0b0314');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#d8bf8a'; ctx.lineWidth = 2; ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);
            
            ctx.fillStyle = '#d8bf8a'; ctx.font = '18px serif'; ctx.textAlign = 'center';
            ctx.fillText('✦', 30, 35); ctx.fillText('✦', canvas.width-30, 35);

            ctx.font = '24px "Cinzel", serif'; ctx.fillText('🔮 奧術至尊・百物滿載揮霍契書 🔮', canvas.width / 2, 70);

            let totalSpent = 0; let totalItems = 0;
            let shareText = "✦ 諸神黃昏・百物橫掃法契 ✦\n\n";

            keys.forEach(id => {
                const p = productList.find(p => p.id === id);
                totalSpent += p.price * cart[id]; totalItems += cart[id];
                shareText += `【${p.emoji} ${p.name}】 × ${cart[id]}個\n`;
            });
            const remain = INITIAL_WEALTH - totalSpent;
            const pct = ((totalSpent / INITIAL_WEALTH) * 100).toFixed(5);

            ctx.textAlign = 'left'; ctx.font = '16px sans-serif'; ctx.fillStyle = '#a897c9';
            ctx.fillText(`初始至尊預算：$3,000,000,000,000`, 55, 130);
            ctx.fillText(`橫向搜刮品項：${totalItems} 件魔導產物`, 55, 160);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.03)'; ctx.fillRect(50, 190, canvas.width - 100, 380);
            ctx.strokeStyle = 'rgba(216, 191, 138, 0.2)'; ctx.strokeRect(50, 190, canvas.width - 100, 380);

            ctx.fillStyle = '#d8bf8a'; ctx.font = 'bold 16px sans-serif';
            ctx.fillText('搜刮品項名稱與奧術效果', 65, 215);
            ctx.textAlign = 'right'; ctx.fillText('數量', canvas.width - 200, 215); ctx.fillText('小計', canvas.width - 65, 215);

            ctx.font = '15px sans-serif'; ctx.fillStyle = '#eadfff';
            let startY = 255;
            keys.slice(0, 9).forEach(id => {
                const p = productList.find(p => p.id === id);
                ctx.textAlign = 'left'; ctx.fillText(`${p.emoji} ${p.name.substring(0,18)}`, 65, startY);
                ctx.textAlign = 'right'; ctx.fillText(`${cart[id]}`, canvas.width - 200, startY);
                ctx.fillText(formatMoney(p.price * cart[id]), canvas.width - 65, startY);
                startY += 34;
            });
            
            if(keys.length > 9) {
                ctx.textAlign = 'center'; ctx.fillStyle = '#a897c9'; ctx.font = 'italic 14px sans-serif';
                ctx.fillText(`（...其餘 ${keys.length - 9} 種奢華奇物已封印於下層...）`, canvas.width/2, 545);
            }

            ctx.textAlign = 'left'; ctx.font = '18px "Cinzel", serif'; ctx.fillStyle = '#f29494'; ctx.fillText('總計已揮霍：', 55, 610);
            ctx.textAlign = 'right'; ctx.font = 'bold 24px "Cinzel", serif'; ctx.fillText(formatMoney(totalSpent), canvas.width - 55, 610);

            ctx.textAlign = 'left'; ctx.font = '15px sans-serif'; ctx.fillStyle = '#a897c9'; ctx.fillText('剩餘至尊資產：', 55, 660);
            ctx.textAlign = 'right'; ctx.fillStyle = '#8ae0be'; ctx.fillText(formatMoney(remain), canvas.width - 55, 660);

            ctx.textAlign = 'center'; ctx.font = 'italic 15px serif'; ctx.fillStyle = '#bcaed6';
            ctx.fillText(`「今日法契已動用總資產之 ${pct}%，財富如星海無窮無盡。」`, canvas.width / 2, 730);
            ctx.fillText('✦ 財富煉金工坊大主祭 ✦', canvas.width / 2, 790);

            shareText += `\n💰 總共橫掃砸下：${formatMoney(totalSpent)}\n🌌 餘額還剩：${formatMoney(remain)}\n🔮 揮霍進度：已燃燒 ${pct}%！`;
            navigator.clipboard.writeText(shareText).then(() => {}).catch(err => console.log(err));
        }

        // 初始化舞台
        renderStageProduct();
        calculateTotal();
    </script>
</body>
</html>
