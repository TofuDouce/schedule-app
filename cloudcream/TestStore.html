<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 財富煉金術：無限魔晶揮霍試煉場</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg1: #0d081b;
            --bg2: #160f29;
            --bg3: #1f143d;
            --gold: #d8bf8a;
            --gold-hover: #f3dfb6;
            --text: #eadfff;
            --text-muted: #a897c9;
            --base-font-size: 18px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            color: var(--text);
            font-family: "Cormorant Garamond", serif;
            background: radial-gradient(circle at top, rgba(180,150,255,.15), transparent 45%), 
                        linear-gradient(180deg, var(--bg1), var(--bg2), var(--bg3));
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--base-font-size);
        }

        /* 滿天星空 */
        .stars {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: -3;
            pointer-events: none;
        }
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: .6;
            animation: twinkle 4s infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: .2; transform: scale(.8); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        /* 古典邊框 */
        .frame {
            position: fixed;
            inset: 12px;
            border: 1.5px solid rgba(216,191,138,.4);
            border-radius: 24px;
            pointer-events: none;
            z-index: 999;
        }
        .frame::before {
            content: "✦";
            position: absolute;
            color: var(--gold);
            font-size: 14px;
            top: 8px; left: 12px;
        }

        /* 響應式雙欄佈局 */
        .container {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 24px;
            z-index: 10;
        }

        @media (max-width: 850px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* 共通奢華卡片 */
        .magic-card {
            background: rgba(20, 12, 38, 0.7);
            border: 1px solid rgba(216, 191, 138, 0.25);
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(138, 92, 246, 0.1);
            backdrop-filter: blur(8px);
            position: relative;
        }

        .card-corner {
            position: absolute;
            color: rgba(216, 191, 138, 0.3);
            font-size: 12px;
            pointer-events: none;
        }
        .top-left { top: 8px; left: 10px; }
        .top-right { top: 8px; right: 10px; }

        /* 標題與巨額資產區 */
        .header-zone {
            text-align: center;
            margin-bottom: 24px;
        }
        h1 {
            font-family: "Cinzel", serif;
            font-size: 26px;
            letter-spacing: 2px;
            color: var(--gold);
            text-shadow: 0 0 10px rgba(216,191,138,0.3);
            margin-bottom: 10px;
        }
        .wealth-display {
            font-family: "Cinzel", serif;
            font-size: 38px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            margin: 10px 0;
            letter-spacing: 1px;
        }
        .wealth-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            font-style: italic;
        }

        /* 商品列表佈局優化 (寬鬆、比例合適的垂直條目) */
        .shop-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 12px;
        }

        .shop-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(216, 191, 138, 0.12);
            border-radius: 10px;
            transition: all 0.25s ease;
        }
        .shop-item:hover {
            border-color: rgba(216, 191, 138, 0.35);
            background: rgba(255, 255, 255, 0.05);
        }

        .item-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            padding-right: 16px;
        }
        .item-name {
            font-size: 19px;
            font-weight: 600;
            color: var(--text);
        }
        .item-price {
            font-family: "Cinzel", serif;
            font-size: 14px;
            color: var(--gold);
            letter-spacing: 0.5px;
        }

        /* 互動控制項 */
        .item-controls {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .btn-calc {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 1px solid var(--gold);
            background: transparent;
            color: var(--gold);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .btn-calc:hover:not(:disabled) {
            background: var(--gold);
            color: var(--bg1);
            box-shadow: 0 0 8px var(--gold);
        }
        .btn-calc:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: var(--text-muted);
            color: var(--text-muted);
        }

        .item-count {
            font-family: "Cinzel", serif;
            font-size: 18px;
            min-width: 28px;
            text-align: center;
        }

        /* 右側大帳本欄位 */
        .sidebar-title {
            font-family: "Cinzel", serif;
            font-size: 19px;
            color: var(--gold);
            text-align: center;
            border-bottom: 1px solid rgba(216,191,138,0.2);
            padding-bottom: 12px;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }

        .receipt-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 350px;
            overflow-y: auto;
            padding-right: 4px;
        }
        /* 客製化滾動條 */
        .receipt-list::-webkit-scrollbar { width: 4px; }
        .receipt-list::-webkit-scrollbar-thumb { background: rgba(216,191,138,0.2); border-radius: 4px; }

        .receipt-item {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            color: var(--text-muted);
            padding: 4px 0;
            border-bottom: 1px dashed rgba(255,255,255,0.05);
        }

        .total-zone {
            margin-top: 20px;
            padding-top: 14px;
            border-top: 1px solid rgba(216,191,138,0.2);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
        }
        .grand-total {
            font-size: 18px;
            color: var(--gold);
            font-weight: bold;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 13px;
            color: var(--text-muted);
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="stars" id="starContainer"></div>
    <div class="frame"></div>

    <div class="container">
        <div class="magic-card">
            <div class="card-corner top-left">✦</div>
            <div class="card-corner top-right">✦</div>
            
            <div class="header-zone">
                <h1>財富煉金術・無限魔晶試煉</h1>
                <div class="wealth-display" id="remainingAssets">$3.00 T</div>
                <div class="wealth-subtitle">此生註定揮霍，靈魂不染銅臭</div>
            </div>

            <div class="shop-list" id="shopList"></div>
        </div>

        <div class="magic-card" style="height: fit-content;">
            <div class="card-corner top-left">☾</div>
            <div class="card-corner top-right">☾</div>
            
            <div class="sidebar-title">✦ 揮霍物資清冊 ✦</div>
            <div class="receipt-list" id="receiptList"></div>
            
            <div class="total-zone">
                <div class="total-row">
                    <span>已消耗件數</span>
                    <span id="totalItems">0 件</span>
                </div>
                <div class="total-row grand-total">
                    <span>已揮霍總額</span>
                    <span id="spentTotal">$0</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 初始神級資產：三兆元
        const INITIAL_ASSETS = 3000000000000;
        
        // 荒謬奢華的購物清單
        const products = [
            { id: 1, name: "🍿 阿毛專屬奢華純金骨頭", price: 500000 },
            { id: 2, name: "☕ 包下整間鮮茶道喝 100 年", price: 15000000 },
            { id: 3, name: "🏰 附帶沉睡惡龍的歐洲古堡", price: 8500000000 },
            { id: 4, name: "🚀 搭乘火箭去月球背面偷挖隕石", price: 120000000000 },
            { id: 5, name: "🪐 買下一顆以自己命名的小行星", price: 950000000000 }
        ];

        // 紀錄購物數量的狀態
        let cart = {};
        products.forEach(p => cart[p.id] = 0);

        // 核心高質感格式化引擎：將滿畫面的 0 換成優雅縮寫 (K, M, B, T)
        function formatElegant(num) {
            if (num === 0) return "$0";
            const absNum = Math.abs(num);
            let formatted = "";
            let suffix = "";

            if (absNum >= 1e12) {
                formatted = (num / 1e12).toFixed(2);
                suffix = " T"; // Trillion 兆
            } else if (absNum >= 1e9) {
                formatted = (num / 1e9).toFixed(2);
                suffix = " B"; // Billion 十億
            } else if (absNum >= 1e6) {
                formatted = (num / 1e6).toFixed(2);
                suffix = " M"; // Million 百萬
            } else if (absNum >= 1e3) {
                formatted = (num / 1e3).toFixed(2);
                suffix = " K"; // Thousand 千
            } else {
                formatted = num.toLocaleString();
            }

            // 移除尾隨不必要的 .00 保持簡潔
            if (formatted.endsWith(".00")) {
                formatted = formatted.substring(0, formatted.length - 3);
            }
            return `$${formatted}${suffix}`;
        }

        // 計算目前大帳本狀態
        function calculateStats() {
            let totalSpent = 0;
            let totalCount = 0;

            products.forEach(p => {
                const qty = cart[p.id];
                totalSpent += qty * p.price;
                totalCount += qty;
            });

            const remaining = INITIAL_ASSETS - totalSpent;

            // 更新介面
            document.getElementById('remainingAssets').innerText = formatElegant(remaining);
            document.getElementById('spentTotal').innerText = formatElegant(totalSpent);
            document.getElementById('totalItems').innerText = `${totalCount} 件`;

            renderReceipt();
        }

        // 修改數量機制
        function updateQty(id, change) {
            cart[id] = Math.max(0, cart[id] + change);
            
            // 防呆：確認是否超過總資產限制
            let currentTotal = 0;
            products.forEach(p => currentTotal += cart[p.id] * p.price);
            if (currentTotal > INITIAL_ASSETS) {
                cart[id] = cart[id] - change; // 退回
                alert("🔮 奧術警告：您的財富流動已達凡世巔峰，無法容納更多物資！");
                return;
            }

            document.getElementById(`count-${id}`).innerText = cart[id];
            document.getElementById(`btn-minus-${id}`).disabled = cart[id] === 0;
            calculateStats();
        }

        // 渲染商品區塊 (優化版面高度與寬度，舒爽好閱讀)
        function renderShop() {
            const container = document.getElementById('shopList');
            container.innerHTML = products.map(p => `
                <div class="shop-item">
                    <div class="item-info">
                        <span class="item-name">${p.name}</span>
                        <span class="item-price">代價：${formatElegant(p.price)}</span>
                    </div>
                    <div class="item-controls">
                        <button class="btn-calc" id="btn-minus-${p.id}" onclick="updateQty(${p.id}, -1)" disabled>−</button>
                        <span class="item-count" id="count-${p.id}">0</span>
                        <button class="btn-calc" onclick="updateQty(${p.id}, 1)">+</button>
                    </div>
                </div>
            `).join('');
        }

        // 渲染右側清單
        function renderReceipt() {
            const container = document.getElementById('receiptList');
            const activeItems = products.filter(p => cart[p.id] > 0);

            if (activeItems.length === 0) {
                container.innerHTML = `<div style="text-align:center; color:var(--text-muted); font-style:italic; padding:20px 0;">尚未染指任何塵世寶物</div>`;
                return;
            }

            container.innerHTML = activeItems.map(p => `
                <div class="receipt-item">
                    <span>${p.name} × ${cart[p.id]}</span>
                    <span class="color-gold">${formatElegant(p.price * cart[p.id])}</span>
                </div>
            `).join('');
        }

        // 產生閃爍星空
        function createStars() {
            const container = document.getElementById('starContainer');
            for (let i = 0; i < 40; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.top = `${Math.random() * 100}%`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.animationDelay = `${Math.random() * 4}s`;
                container.appendChild(star);
            }
        }

        // 初始化
        createStars();
        renderShop();
        calculateStats();
    </script>
</body>
</html>
