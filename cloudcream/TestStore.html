<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔮 財富煉金術：無限魔晶揮霍試煉場</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg1: #0f0a1c;
            --bg2: #19122e;
            --bg3: #080510;
            --gold: #d8bf8a;
            --text: #eadfff;
            --text-muted: #a897c9;
            --card-inner: rgba(255, 255, 255, 0.03);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            color: var(--text);
            font-family: "Cormorant Garamond", serif;
            background: radial-gradient(circle at top, rgba(180,150,255,.15), transparent 45%), 
                        linear-gradient(180deg, var(--bg1), var(--bg2), var(--bg3));
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* 滿天星空背景 */
        .stars {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: -3;
            pointer-events: none;
        }
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: .7;
            animation: twinkle 4s infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: .15; transform: scale(.7); }
            50% { opacity: 1; transform: scale(1.4); }
        }

        /* 懸浮神秘月亮 */
        .moon {
            font-size: 28px;
            text-shadow: 0 0 15px rgba(216,191,138,0.5);
            animation: floatMoon 4s ease-in-out infinite;
            margin-bottom: 4px;
        }
        @keyframes floatMoon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* 古典塔羅牌外框 */
        .frame {
            position: fixed;
            inset: 12px;
            border: 1.5px solid rgba(216,191,138,.35);
            border-radius: 32px;
            pointer-events: none;
            z-index: 999;
        }
        .frame::before {
            content: "✦"; position: absolute; top: 10px; left: 12px; color: var(--gold); font-size: 14px; opacity: 0.7;
        }
        .frame::after {
            content: "✦"; position: absolute; top: 10px; right: 12px; color: var(--gold); font-size: 14px; opacity: 0.7;
        }
        .corner-bl { content: "✦"; position: absolute; bottom: 10px; left: 12px; color: var(--gold); font-size: 14px; opacity: 0.7; }
        .corner-br { content: "✦"; position: absolute; bottom: 10px; right: 12px; color: var(--gold); font-size: 14px; opacity: 0.7; }

        /* 大標題區 */
        .header-title {
            font-family: "Cinzel", serif;
            font-size: 21px;
            color: var(--gold);
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 2px;
        }

        /* 剩餘資產看板 */
        .wealth-display {
            font-family: "Cinzel", serif;
            font-size: 34px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 15px rgba(255,255,255,0.25);
            text-align: center;
            margin-bottom: 16px;
        }

        /* 橫向古典分類選單 */
        .category-tabs {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            width: 100%;
            max-width: 450px;
            padding-bottom: 8px;
            margin-bottom: 20px;
            scrollbar-width: none;
        }
        .category-tabs::-webkit-scrollbar { display: none; }
        
        .tab-btn {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(216, 191, 138, 0.2);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 20px;
            white-space: nowrap;
            cursor: pointer;
            font-family: "Cormorant Garamond", serif;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        .tab-btn.active {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(216, 191, 138, 0.12);
            box-shadow: 0 0 10px rgba(216,191,138,0.2);
        }

        /* 核心直覺：商品橫向滑動輸送帶（拒絕左右兩邊框架！） */
        .product-slider {
            display: flex;
            gap: 18px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            width: 100%;
            max-width: 360px;
            padding: 4px 4px 20px 4px;
            scrollbar-width: none;
        }
        .product-slider::-webkit-scrollbar { display: none; }

        /* 精緻金色塔羅牌風 商品卡片 */
        .product-card {
            flex: 0 0 100%; /* 滿格置中，滑動手感極佳 */
            background: var(--card-inner);
            border: 1.5px solid rgba(216, 191, 138, 0.3);
            border-radius: 20px;
            padding: 26px;
            scroll-snap-align: center;
            box-shadow: 0 12px 30px rgba(0,0,0,0.5), inset 0 0 15px rgba(216,191,138,0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 290px;
            position: relative;
        }

        /* 卡片內部的對稱四角細星芒裝飾 */
        .card-star {
            position: absolute; color: rgba(216,191,138,0.2); font-size: 10px;
        }

        .product-info h3 {
            font-size: 21px;
            color: #fff;
            margin-bottom: 12px;
            line-height: 1.4;
            text-align: center;
            border-bottom: 1px solid rgba(216,191,138,0.15);
            padding-bottom: 12px;
        }
        .product-price {
            font-family: "Cinzel", serif;
            font-size: 15px;
            color: var(--gold);
            text-align: center;
            letter-spacing: 1px;
        }

        /* 增減控制項 */
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            padding: 6px 16px;
            border-radius: 25px;
            border: 1px solid rgba(216,191,138,0.2);
            margin-top: 16px;
        }
        .btn-action {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid var(--gold);
            background: transparent;
            color: var(--gold);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .btn-action:active {
            background: rgba(216,191,138,0.2);
        }
        .btn-action:disabled {
            opacity: 0.15;
        }
        .qty-display {
            font-family: "Cinzel", serif;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
        }

        /* 提示左右滑動的小點點指標 */
        .swipe-indicator {
            font-size: 13px;
            color: var(--text-muted);
            font-style: italic;
            margin-top: -6px;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }

        /* 底部清爽結算小吧 */
        .summary-bar {
            width: 100%;
            max-width: 360px;
            margin-top: auto;
            background: rgba(20, 12, 38, 0.85);
            border: 1.5px solid rgba(216, 191, 138, 0.3);
            border-radius: 16px;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <div class="stars" id="starsContainer"></div>

    <div class="frame">
        <div class="corner-bl">✦</div>
        <div class="corner-br">✦</div>
    </div>

    <div class="moon">🌙</div>
    <div class="header-title">🔮 剩餘魔晶資產</div>
    <div class="wealth-display" id="walletDisplay">$3.00 T</div>

    <div class="category-tabs" id="tabsContainer"></div>

    <div class="swipe-indicator">⟨ 左右滑動探索品項 ⟩</div>

    <div class="product-slider" id="sliderContainer"></div>

    <div class="summary-bar">
        <div>已執迷：<span id="totalQty" style="color:var(--gold); font-weight:bold; font-family:'Cinzel';">0</span> 件</div>
        <div>已揮霍：<span id="totalSpent" style="color:var(--gold); font-family:'Cinzel'; font-weight:bold;">$0</span></div>
    </div>

    <script>
        const START_MONEY = 3000000000000; // 三兆

        // 星空背景初始化
        const starsContainer = document.getElementById('starsContainer');
        for (let i = 0; i < 40; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.animationDelay = Math.random() * 4 + 's';
            starsContainer.appendChild(star);
        }

        const cats = {
            "trivial": "🍿 塵世無聊小事",
            "luxury": "🏰 凡人奢華極限",
            "cosmic": "🪐 宇宙級大買賣",
            "abstract": "🧬 概念與超自然"
        };

        // 生成 100 種帶有奇幻神祕感的大名單
        const items = [];
        const tNames = ["阿毛專屬純金咬咬骨頭", "包下全台鮮茶道喝到下輩子", "請全辦公室吃一萬年紅豆餅", "買下隔壁同事的滑鼠左鍵", "買斷全台灣星期一早上的陽光", "把這輩子看過的冷笑話做成法典", "雇用100個人天天在路邊對我鼓掌", "買下網頁裡所有會眨眼的星星", "買一條永遠不會斷線的充電線", "請香菜大師在全城灑滿香菜", "買下元大投資先生App當單機遊戲", "讓全公司的印表機只印阿毛的照片", "把所有討厭的通知聲換成貓叫", "買下全台灣所有鹽酥雞攤的九層塔", "買下一座專門藏私房錢的垃圾桶", "投資研發「自動幫你回LINE」機器人", "買斷全台所有手搖飲的微糖微冰", "請人每天早上幫我把棉對折成豆腐干", "買下暗戀對象看過的所有星座運勢", "買一隻會說「主人好棒」的尖叫雞", "把全公司鍵盤的Enter鍵鍍金", "買一架專門幫我送下午茶的無人機", "買下所有星期五下午的快樂心情", "買一個永遠能精準四捨五入的計算機", "買斷這輩子所有不用上班的週日"];
        const lNames = ["附帶沉睡惡龍的歐洲古堡", "買下杜拜塔改名為「阿毛大樓」", "訂製純金打造的防彈外賣外送箱", "包下整條高鐵當作私人玩具火車", "買下好萊塢劇組幫我拍一集上班日常", "包下整個馬爾地夫給流浪狗辦派對", "買下全日本所有溫泉旅館一整年", "訂製一台能自動吐出鈔票的ATM", "買下一整座裝滿珍貴跑車的地下車庫", "請私人交響樂團每天在我起床時演奏", "買下一座純金做成的水上樂園", "聘請米其林三星主廚當我的宵夜管家", "買下巴黎鐵塔並把它漆成紫色", "買下一艘帶有停機坪的超巨大遊艇", "包下紐約時代廣場大螢幕播阿毛", "買下私人小島並宣布獨立建國", "用鑽石打造一具專屬的辦公椅", "買下世界最大的寶石拿來砸核桃", "買下十架私人飛機編隊在空中畫愛心", "包下整座迪士尼樂園讓我自己玩", "買下一條街的店面全部開貓咪咖啡廳", "用純金線編織一條睡覺用的毯子", "買下一座古代皇家御用藏書閣", "買下一艘可以潛入馬里亞納海溝的潛艇", "買下地中海某處的私人珊瑚礁半島"];
        const cNames = ["搭乘火箭去月球背面偷挖隕石", "買下一顆以自己命名的小行星", "在火星上蓋一座私人度假別墅", "買斷土星環的一整段當作私人戒指", "投資研發「太陽系第一條星際鐵路」", "把自己的名字用雷射刻在月球表面", "買下一整顆充滿鑽石的超前衛行星", "包下哈伯太空望遠鏡拍我的自拍照", "買下一艘退役的太空梭放在後院當裝飾", "在太空軌道上建一座懸浮游泳池", "買下冥王星的冠名權並改名「阿毛星」", "雇用全人類最頂尖科學家幫我找外星人", "買下一座小型的室內人造黑洞模擬器", "在地球軌道上打一個超巨大的探照燈", "買下一片人造流星雨隨時發射", "買下木星上那個大紅斑的永久所有權", "投資一個可以把垃圾送到太陽燒掉的計畫", "買下一整座停滿外星幽浮的祕密機庫", "在月球上開第一家連鎖鮮茶道分店", "買下一套真實比例的鋼彈並裝上火箭推進器", "在星際間發射一個裝滿我歌聲的廣播器", "買下一片星雲當作我的專屬畫布", "買斷水星上所有面向太陽那側的土地", "投資建造一個太空電梯直接直達平流層", "買下全銀河系最好看的一束超新星爆炸"];
        const aNames = ["向時間老人買回我浪費掉的青春", "買斷全人類所有做惡夢的權利", "買下一條絕對能實現的命運喜劇線", "跟惡魔簽約買下「永遠不會胖」的體質", "買下全宇宙所有冷笑話的智慧財產權", "購買一個能看透同事在想什麼的水晶球", "買下「一秒學會所有程式語言」魔法", "購買100個不會出任何Bug的幽靈工程師", "買下一個能把時間暫停5秒的懷錶", "購買全宇宙最神祕的「塔羅預言解答本」", "向命運買下一輩子抽獎都中頭獎的運氣", "買下一個能跟家裡寵物對話的萬能翻譯器", "購買一朵永遠不會凋謝的星光玫瑰", "買下一段能讓人瞬間忘記尷尬回憶的咒語", "購買能隨意穿梭到古代看恐龍的旅行門票", "買下一個放在口袋裡能無限生錢的福袋", "向重力學買下「隨時可以懸浮10公分」特權", "買下一個能自動過濾所有廢話的耳機", "購買全人類最完美的「強迫症方塊消除器」", "買下一整夜絕對不會失眠的完美睡眠", "向死神買下「多活100年」的奢華保固期", "買下一個能自動把負能量轉化為黃金的魔方", "購買一雙穿上去走路永遠不會累的隱形鞋", "買下一套讓全世界在同一秒一起咳嗽的奧術", "買斷這個揮霍網站的最終最高神明控制權"];

        for(let i=0; i<25; i++) items.push({ id:`t-${i}`, cat:"trivial", name:tNames[i], price: 35000 * (i+1) });
        for(let i=0; i<25; i++) items.push({ id:`l-${i}`, cat:"luxury", name:lNames[i], price: 850000000 * (i+1) });
        for(let i=0; i<25; i++) items.push({ id:`c-${i}`, cat:"cosmic", name:cNames[i], price: 12000000000 * (i+1) });
        for(let i=0; i<25; i++) items.push({ id:`a-${i}`, cat:"abstract", name:aNames[i], price: 65000000000 * (i+1) });

        let cart = {};
        let currentCat = "trivial";

        // K, M, B, T 質感大額縮寫
        function formatMoney(num) {
            if (num === 0) return "$0";
            const abs = Math.abs(num);
            let res = "";
            let suf = "";
            if (abs >= 1e12) { res = (num / 1e12).toFixed(2); suf = " T"; }
            else if (abs >= 1e9) { res = (num / 1e9).toFixed(2); suf = " B"; }
            else if (abs >= 1e6) { res = (num / 1e6).toFixed(2); suf = " M"; }
            else if (abs >= 1e3) { res = (num / 1e3).toFixed(2); suf = " K"; }
            else { res = num.toLocaleString(); }
            return `$${res.endsWith(".00") ? res.substring(0, res.length - 3) : res}${suf}`;
        }

        // 渲染橫向分類標籤
        function renderTabs() {
            const container = document.getElementById('tabsContainer');
            container.innerHTML = Object.keys(cats).map(key => `
                <button class="tab-btn ${key === currentCat ? 'active' : ''}" onclick="switchCat('${key}')">
                    ${cats[key]}
                </button>
            `).join('');
        }

        function switchCat(key) {
            currentCat = key;
            renderTabs();
            renderSlider();
            document.getElementById('sliderContainer').scrollLeft = 0;
        }

        // 渲染橫向滑動商品卡片
        function renderSlider() {
            const container = document.getElementById('sliderContainer');
            const filtered = items.filter(item => item.cat === currentCat);

            container.innerHTML = filtered.map(item => {
                const qty = cart[item.id] || 0;
                return `
                    <div class="product-card">
                        <div class="card-star" style="top:8px; left:8px;">✦</div>
                        <div class="card-star" style="top:8px; right:8px;">✦</div>
                        <div class="card-star" style="bottom:8px; left:8px;">✦</div>
                        <div class="card-star" style="bottom:8px; right:8px;">✦</div>

                        <div class="product-info">
                            <h3>${item.name}</h3>
                            <div class="product-price">命運代價：${formatMoney(item.price)}</div>
                        </div>
                        <div class="controls">
                            <button class="btn-action" onclick="changeQty('${item.id}', -1)" ${qty === 0 ? 'disabled' : ''}>−</button>
                            <span class="qty-display">${qty}</span>
                            <button class="btn-action" onclick="changeQty('${item.id}', 1)">+</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function changeQty(id, delta) {
            const currentQty = cart[id] || 0;
            const newQty = Math.max(0, currentQty + delta);

            let tempTotal = 0;
            items.forEach(item => {
                const q = item.id === id ? newQty : (cart[item.id] || 0);
                tempTotal += q * item.price;
            });

            if (tempTotal > START_MONEY) {
                alert("🔮 靈魂額度爆表！你的超能力不夠支付這項奢侈品了！");
                return;
            }

            if (newQty === 0) delete cart[id];
            else cart[id] = newQty;

            renderSlider();
            updateTotals();
        }

        function updateTotals() {
            let totalSpent = 0;
            let totalQty = 0;

            items.forEach(item => {
                if (cart[item.id]) {
                    totalSpent += cart[item.id] * item.price;
                    totalQty += cart[item.id];
                }
            });

            document.getElementById('walletDisplay').innerText = formatMoney(START_MONEY - totalSpent);
            document.getElementById('totalSpent').innerText = formatMoney(totalSpent);
            document.getElementById('totalQty').innerText = totalQty;
        }

        // 初始化啟動
        renderTabs();
        renderSlider();
        updateTotals();
    </script>
</body>
</html>
