<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 財富煉金術：105種極致奇物左右橫掃試煉</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:ital,wght@0,500;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg1: #0d0614;
            --bg2: #180b29;
            --bg3: #08030d;
            --gold: #d8bf8a;
            --gold-glow: rgba(216, 191, 138, 0.3);
            --text: #eadfff;
            --purple-light: #bcaed6;
            --base-font-size: 18px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            height: 100vh;
            color: var(--text);
            font-family: "Cormorant Garamond", "Noto Serif TC", serif;
            background: radial-gradient(circle at top, rgba(180,150,255,.14), transparent 40%), 
                        linear-gradient(180deg, var(--bg1), var(--bg2), var(--bg3));
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: var(--base-font-size);
        }

        /* 星空背景 */
        .stars { position: fixed; inset: 0; overflow: hidden; z-index: -3; pointer-events: none; }
        .star {
            position: absolute; width: 2px; height: 2px; background: white;
            border-radius: 50%; opacity: .7; animation: twinkle 4s infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: .15; transform: scale(.7); }
            50% { opacity: 1; transform: scale(1.4); }
        }

        /* 頂部巨大財富面板 */
        .wealth-banner {
            width: 100%; background: rgba(24, 11, 41, 0.9);
            border: 1.5px solid var(--gold); border-radius: 12px; padding: 15px;
            text-align: center; margin-bottom: 15px; box-shadow: 0 0 20px var(--gold-glow);
            flex-shrink: 0;
        }
        .wealth-title { font-family: 'Cinzel', serif; font-size: 20px; color: var(--gold); letter-spacing: 2px; }
        .wealth-amount {
            font-family: 'Cinzel', serif; font-size: 42px; font-weight: 700; color: var(--gold);
            text-shadow: 0 0 12px rgba(216, 191, 138, 0.8); margin: 5px 0;
        }
        .wealth-stats { font-size: 16px; color: var(--purple-light); font-style: italic; }

        /* 核心：左右↔️選單平行佈局 */
        .container {
            display: flex;
            flex-direction: row; 
            gap: 20px;
            width: 100%; 
            flex-grow: 1; 
            overflow: hidden; 
        }

        /* 左側欄：105款奇物商場（獨立滾動） */
        .shop-panel {
            flex: 1.3; 
            background: rgba(20, 10, 35, 0.7); border: 1.5px solid rgba(216,191,138,.4);
            border-radius: 12px; padding: 20px;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* 右側欄：大帳本（獨立滾動） */
        .sidebar-panel {
            flex: 0.7; 
            background: rgba(25, 12, 44, 0.85); border: 1.5px solid var(--gold);
            border-radius: 12px; padding: 20px; box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; overflow: hidden;
        }

        .panel-title {
            font-family: 'Cinzel', serif; font-size: 22px; color: var(--gold);
            text-align: center; margin-bottom: 15px; border-bottom: 1px solid rgba(216,191,138,.3);
            padding-bottom: 8px; letter-spacing: 1px; flex-shrink: 0;
        }

        /* 商品清單容器（拉開高度、禁止擁擠） */
        .items-list-container {
            overflow-y: scroll; flex-grow: 1; padding-right: 8px;
            display: flex; flex-direction: column; gap: 12px; /* 加大商品與商品間的距離 */
        }

        /* 優化後的商品列：高度充足、排版乾淨 */
        .item-row {
            background: rgba(35, 19, 59, 0.7); border: 1px solid rgba(216,191,138,.2);
            border-radius: 8px; padding: 12px 16px; display: flex; align-items: center;
            justify-content: space-between; transition: all 0.2s;
            min-height: 85px; /* 確保有足夠的高度，字體不重疊 */
        }
        .item-row:hover {
            border-color: var(--gold); background: rgba(48, 26, 82, 0.9);
            box-shadow: 0 0 10px rgba(216, 191, 138, 0.25);
        }
        
        .item-left { display: flex; align-items: center; gap: 15px; overflow: hidden; flex: 1; }
        .item-emoji { font-size: 32px; flex-shrink: 0; }
        .item-details { display: flex; flex-direction: column; overflow: hidden; gap: 4px; }
        .item-name { font-weight: bold; font-size: 18px; color: #fff; letter-spacing: 0.5px; }
        .item-desc { font-size: 13.5px; color: #a897c9; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .item-right { display: flex; align-items: center; gap: 20px; flex-shrink: 0; }
        .item-price { font-family: 'Cinzel', serif; font-size: 17px; color: var(--gold); font-weight: bold; text-align: right; min-width: 130px; }
        
        .btn-group { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.2); padding: 4px; border-radius: 6px; }
        .action-btn {
            background: linear-gradient(135deg, #4d268a, #2f1256); border: 1px solid rgba(216,191,138,.4);
            color: var(--text); border-radius: 4px; width: 32px; height: 32px; font-size: 16px; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .action-btn:hover { background: var(--gold); color: #180b29; box-shadow: 0 0 5px var(--gold); }
        .item-count { font-family: 'Cinzel', serif; width: 30px; text-align: center; font-weight: bold; font-size: 17px; color: #fff; }

        /* 右側帳本清單 */
        .cart-wrapper { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .cart-list { overflow-y: auto; flex-grow: 1; margin-bottom: 10px; padding-right: 5px; }
        .cart-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 0; border-bottom: 1px solid rgba(168,151,201,0.2); font-size: 15px;
        }

        /* 結算區 */
        .summary-section {
            border-top: 1px solid var(--gold); padding-top: 12px; flex-shrink: 0;
        }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 18px; }
        
        .magic-btn {
            width: 100%; background: linear-gradient(135deg, rgba(216,191,138,1), rgba(175,143,84,1));
            color: #1a0a2a; border: none; border-radius: 6px; padding: 12px; font-family: 'Cinzel', serif;
            font-size: 17px; font-weight: 700; cursor: pointer; transition: all 0.1s;
            letter-spacing: 1px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .magic-btn:hover { transform: translateY(-1px); box-shadow: 0 0 12px var(--gold); }
        
        .random-btn {
            background: linear-gradient(135deg, #8a73b3, #433060); color: #fff; border: 1px solid var(--gold);
        }

        /* 彈出圖卡浮層 */
        .canvas-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 1000; justify-content: center; align-items: center; padding: 20px;
        }
        .canvas-box {
            background: #180b29; padding: 20px; border: 2px solid var(--gold); border-radius: 12px;
            text-align: center; max-width: 95%; max-height: 95%; overflow-y: auto;
        }
        #billCanvas { max-width: 100%; height: auto; border-radius: 6px; }

        /* 古典外框裝飾線 */
        .decor-frame {
            position: fixed; inset: 10px; border: 1px solid rgba(216,191,138,.2);
            border-radius: 14px; pointer-events: none; z-index: 999;
        }
    </style>
</head>

                    { name: '防發呆全息偷懶面具', emoji: '🎭', desc: `【等級${rareLetter}】外人看起來你正在瘋狂敲鍵盤，實際上你在流口水。` },
                    { name: '元大先生紅線漲停警報器', emoji: '🚨', desc: `【等級${rareLetter}】股票跌了就會發出「它正在蓄力」的安慰語音。` },
                    { name: '隔壁同事薯條悄悄偷吃手套', emoji: '🧤', desc: `【等級${rareLetter}】戴上後偷拿薯條，對方會以為是風吹走的。` },
                    { name: '全自動悲劇結局BE修正液', emoji: '🧪', desc: `【等級${rareLetter}】將小說裡的玻璃渣塗掉，強行改成原地結婚大圓滿。` },
                    { name: '毫無用處的純黑拍賣圖卡', emoji: '🖼️', desc: `【等級${rareLetter}】說明寫著：「你看不到正常，因為我也沒畫」。` },
                    { name: '時空斷層量子防加班沙漏', emoji: '⌛', desc: `【等級${rareLetter}】5點自動干擾時鐘，強行把時間快進到下班。` }
                ];
                const concept = funnyConcepts[i % funnyConcepts.length];
                const finalPrice = Math.floor((Math.random() * 9500000) + 15000) * (idNum % 5 === 0 ? 300 : i+1);
                return {
                    id: `p${idNum}`,
                    name: `【${rareLetter}級】${concept.name} v${idNum}.0`,
                    price: finalPrice,
                    emoji: concept.emoji,
                    desc: concept.desc
                };
            })
        ];

        let cart = {};

        function formatMoney(num) {
            return '$' + num.toLocaleString('zh-TW');
        }

        // 核心渲染：寬敞、不重疊
        function renderShop() {
            const container = document.getElementById('itemsListContainer');
            container.innerHTML = productList.map(p => {
                const qty = cart[p.id] || 0;
                return `
                    <div class="item-row">
                        <div class="item-left">
                            <div class="item-emoji">${p.emoji}</div>
                            <div class="item-details">
                                <div class="item-name">${p.name}</div>
                                <div class="item-desc" title="${p.desc}">${p.desc}</div>
                            </div>
                        </div>
                        <div class="item-right">
                            <div class="item-price">${formatMoney(p.price)}</div>
                            <div class="btn-group">
                                <button class="action-btn" onclick="updateCart('${p.id}', -1)">-</button>
                                <span class="item-count" id="count-${p.id}">${qty}</span>
                                <button class="action-btn" onclick="updateCart('${p.id}', 1)">+</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateCart(id, change) {
            const product = productList.find(p => p.id === id);
            const currentQty = cart[id] || 0;
            const newQty = currentQty + change;

            if (newQty < 0) return;
            
            if (change > 0 && currentWealth - product.price < 0) {
                alert("🧙‍♂️【虛空警告】：預算爆表！請先拿掉其他奇物！");
                return;
            }

            if (newQty === 0) {
                delete cart[id];
            } else {
                cart[id] = newQty;
            }

            calculateTotal();
            document.getElementById(`count-${id}`).innerText = newQty;
            renderCart();
        }

        function buyRandomly() {
            for (let i = 0; i < 15; i++) {
                const randIndex = Math.floor(Math.random() * productList.length);
                const p = productList[randIndex];
                if (currentWealth - p.price > 0) {
                    cart[p.id] = (cart[p.id] || 0) + 1;
                }
            }
            calculateTotal();
            renderShop();
            renderCart();
        }

        function calculateTotal() {
            let totalSpent = 0; let totalItems = 0;
            for (let id in cart) {
                const product = productList.find(p => p.id === id);
                totalSpent += product.price * cart[id];
                totalItems += cart[id];
            }
            currentWealth = INITIAL_WEALTH - totalSpent;

            document.getElementById('remainingDisplay').innerText = formatMoney(currentWealth);
            document.getElementById('totalSpentDisplay').innerText = formatMoney(totalSpent);
            document.getElementById('totalCountDisplay').innerText = `${totalItems} 件`;

            const percentage = ((totalSpent / INITIAL_WEALTH) * 100).toFixed(6);
            let roastText = "";
            if (totalSpent === 0) {
                roastText = "橫向排版已全面修復，字體絕不擠壓，請暢快搜刮！";
            } else if (percentage < 0.5) {
                roastText = `已消耗 ${percentage}% 資產。這點預算，連幫阿毛買純金骨頭的包裝紙都不夠！`;
            } else {
                roastText = `大肆揮霍！你燃燒了 ${percentage}% 的天量資產，整個大廳在劇烈震盪！`;
            }
            document.getElementById('statsDisplay').innerText = roastText;
        }

        function renderCart() {
            const cartList = document.getElementById('cartList');
            const keys = Object.keys(cart);

            if (keys.length === 0) {
                cartList.innerHTML = `
                    <div style="text-align: center; color: #a897c9; font-style: italic; padding-top: 120px; font-size: 15px;">
                        帳本空空如也，請在左側點擊 ＋ 購買商品...
                    </div>`;
                return;
            }

            cartList.innerHTML = keys.map(id => {
                const product = productList.find(p => p.id === id);
                const qty = cart[id];
                return `
                    <div class="cart-item">
                        <div style="display: flex; flex-direction: column; overflow: hidden; max-width: 70%;">
                            <span style="font-weight: bold; color: #fff;">${product.emoji} ${product.name}</span>
                            <span style="font-size: 12px; color: #a897c9; text-overflow: ellipsis; white-space: nowrap; overflow: hidden;">${product.desc}</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 10px; flex-shrink: 0;">
                            <span style="color: var(--gold); font-size: 14px; font-weight: bold;">${formatMoney(product.price)} × ${qty}</span>
                            <button class="action-btn" style="border:none; color:#f29494; background:transparent; width:auto; height:auto;" onclick="updateCart('${id}', -${qty})">✕</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function closeModal() { document.getElementById('canvasModal').style.display = 'none'; }

        function generateInvoiceCard() {
            const keys = Object.keys(cart);
            if (keys.length === 0) {
                alert("🔮 未購買任何商品，無法簽署契約！"); return;
            }

            const canvas = document.getElementById('billCanvas');
            const ctx = canvas.getContext('2d');
            document.getElementById('canvasModal').style.display = 'flex';

            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#130722'); grad.addColorStop(0.5, '#1e0f35'); grad.addColorStop(1, '#0b0314');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#d8bf8a'; ctx.lineWidth = 2; ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);
            
            ctx.fillStyle = '#d8bf8a'; ctx.font = '18px serif'; ctx.textAlign = 'center';
            ctx.fillText('✦', 30, 35); ctx.fillText('✦', canvas.width-30, 35);

            ctx.font = '24px "Cinzel", serif'; ctx.fillText('🔮 奧術至尊・百物滿載揮霍契書 🔮', canvas.width / 2, 70);

            let totalSpent = 0; let totalItems = 0;
            let shareText = "✦ 諸神黃昏・百物橫掃法契 ✦\n\n";

            keys.forEach(id => {
                const p = productList.find(p => p.id === id);
                totalSpent += p.price * cart[id]; totalItems += cart[id];
                shareText += `【${p.emoji} ${p.name}】 × ${cart[id]}個\n`;
            });
            const remain = INITIAL_WEALTH - totalSpent;
            const pct = ((totalSpent / INITIAL_WEALTH) * 100).toFixed(5);

            ctx.textAlign = 'left'; ctx.font = '16px sans-serif'; ctx.fillStyle = '#a897c9';
            ctx.fillText(`初始至尊預算：$3,000,000,000,000`, 55, 130);
            ctx.fillText(`橫向搜刮品項：${totalItems} 件魔導產物`, 55, 160);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.03)'; ctx.fillRect(50, 190, canvas.width - 100, 380);
            ctx.strokeStyle = 'rgba(216, 191, 138, 0.2)'; ctx.strokeRect(50, 190, canvas.width - 100, 380);

            ctx.fillStyle = '#d8bf8a'; ctx.font = 'bold 16px sans-serif';
            ctx.fillText('搜刮品項名稱與奧術效果', 65, 215);
            ctx.textAlign = 'right'; ctx.fillText('數量', canvas.width - 200, 215); ctx.fillText('小計', canvas.width - 65, 215);

            ctx.font = '15px sans-serif'; ctx.fillStyle = '#eadfff';
            let startY = 255;
            keys.slice(0, 9).forEach(id => {
                const p = productList.find(p => p.id === id);
                ctx.textAlign = 'left'; ctx.fillText(`${p.emoji} ${p.name.substring(0,18)}`, 65, startY);
                ctx.textAlign = 'right'; ctx.fillText(`${cart[id]}`, canvas.width - 200, startY);
                ctx.fillText(formatMoney(p.price * cart[id]), canvas.width - 65, startY);
                startY += 34;
            });
            
            if(keys.length > 9) {
                ctx.textAlign = 'center'; ctx.fillStyle = '#a897c9'; ctx.font = 'italic 14px sans-serif';
                ctx.fillText(`（...其餘 ${keys.length - 9} 種奢華奇物已封印於下層...）`, canvas.width/2, 545);
            }

            ctx.textAlign = 'left'; ctx.font = '18px "Cinzel", serif'; ctx.fillStyle = '#f29494'; ctx.fillText('總計已揮霍：', 55, 610);
            ctx.textAlign = 'right'; ctx.font = 'bold 24px "Cinzel", serif'; ctx.fillText(formatMoney(totalSpent), canvas.width - 55, 610);

            ctx.textAlign = 'left'; ctx.font = '15px sans-serif'; ctx.fillStyle = '#a897c9'; ctx.fillText('剩餘至尊資產：', 55, 660);
            ctx.textAlign = 'right'; ctx.fillStyle = '#8ae0be'; ctx.fillText(formatMoney(remain), canvas.width - 55, 660);

            ctx.textAlign = 'center'; ctx.font = 'italic 15px serif'; ctx.fillStyle = '#bcaed6';
            ctx.fillText(`「今日法契已動用總資產之 ${pct}%，財富如星海無窮無盡。」`, canvas.width / 2, 730);
            ctx.fillText('✦ 財富煉金工坊大主祭 ✦', canvas.width / 2, 790);

            shareText += `\n💰 總共橫掃砸下：${formatMoney(totalSpent)}\n🌌 餘額還剩：${formatMoney(remain)}\n🔮 揮霍進度：已燃燒 ${pct}%！`;
            navigator.clipboard.writeText(shareText).then(() => {}).catch(err => console.log(err));
        }

        renderShop();
        calculateTotal();
    </script>
</body>
</html>
