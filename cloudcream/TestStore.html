<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 財富煉金術：百種奇物極致揮霍試煉</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:ital,wght@0,500;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg1: #0d0614;
            --bg2: #180b29;
            --bg3: #08030d;
            --gold: #d8bf8a;
            --gold-glow: rgba(216, 191, 138, 0.3);
            --text: #eadfff;
            --purple-light: #a897c9;
            --base-font-size: 19px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            color: var(--text);
            font-family: "Cormorant Garamond", "Noto Serif TC", serif;
            background: radial-gradient(circle at top, rgba(180,150,255,.14), transparent 40%), 
                        linear-gradient(180deg, var(--bg1), var(--bg2), var(--bg3));
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: var(--base-font-size);
            overflow-x: hidden;
        }

        /* 星空背景 */
        .stars { position: fixed; inset: 0; overflow: hidden; z-index: -3; pointer-events: none; }
        .star {
            position: absolute; width: 2px; height: 2px; background: white;
            border-radius: 50%; opacity: .7; animation: twinkle 4s infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: .15; transform: scale(.7); }
            50% { opacity: 1; transform: scale(1.4); }
        }

        /* 懸浮月亮 */
        .floating-moon {
            font-size: 28px; margin-bottom: 5px; text-shadow: 0 0 15px rgba(255,230,150,0.6);
            animation: floatMoon 4s ease-in-out infinite;
        }
        @keyframes floatMoon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* 頂部巨大財富面板 */
        .wealth-banner {
            width: 100%; max-width: 1400px; background: rgba(24, 11, 41, 0.75);
            border: 1.5px solid var(--gold); border-radius: 16px; padding: 15px;
            text-align: center; margin-bottom: 20px; box-shadow: 0 0 25px var(--gold-glow);
            backdrop-filter: blur(10px);
        }
        .wealth-title { font-family: 'Cinzel', serif; font-size: 20px; color: var(--purple-light); letter-spacing: 2px; }
        .wealth-amount {
            font-family: 'Cinzel', serif; font-size: 42px; font-weight: 700; color: var(--gold);
            text-shadow: 0 0 15px rgba(216, 191, 138, 0.8); margin: 2px 0;
        }
        .wealth-stats { font-size: 16px; color: #bcaed6; font-style: italic; }

        /* 主佈局：雙欄 */
        .container {
            display: grid; grid-template-columns: 1.3fr 0.7fr; gap: 20px;
            width: 100%; max-width: 1400px; height: calc(100vh - 180px); min-height: 600px;
        }

        @media (max-width: 1024px) { 
            .container { grid-template-columns: 1fr; height: auto; } 
        }

        /* 左側：橫向清單商場（高度固定可滾動，爽快點擊） */
        .shop-panel {
            background: rgba(20, 10, 35, 0.5); border: 1px solid rgba(216,191,138,.3);
            border-radius: 16px; padding: 20px; backdrop-filter: blur(5px);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .panel-title {
            font-family: 'Cinzel', serif; font-size: 24px; color: var(--gold);
            text-align: center; margin-bottom: 15px; border-bottom: 1px solid rgba(216,191,138,.2);
            padding-bottom: 8px; letter-spacing: 2px; flex-shrink: 0;
        }

        /* 核心修改：商品改用左右選單式的極致橫向小選單 */
        .items-list-container {
            overflow-y: auto; flex-grow: 1; padding-right: 5px;
            display: flex; flex-direction: column; gap: 8px;
        }

        /* 商品左右排版卡片 */
        .item-row {
            background: rgba(30, 16, 51, 0.6); border: 1px solid rgba(216,191,138,.15);
            border-radius: 8px; padding: 10px 16px; display: flex; align-items: center;
            justify-content: space-between; transition: all 0.15s ease;
        }
        .item-row:hover {
            border-color: var(--gold); background: rgba(43, 24, 71, 0.7);
            box-shadow: 0 0 10px rgba(216, 191, 138, 0.1);
        }
        
        /* 商品左半部資訊 */
        .item-left { display: flex; align-items: center; gap: 12px; overflow: hidden; white-space: nowrap; }
        .item-emoji { font-size: 26px; flex-shrink: 0; }
        .item-details { display: flex; flex-direction: column; overflow: hidden; }
        .item-name { font-weight: bold; font-size: 17px; color: #fff; text-overflow: ellipsis; overflow: hidden; }
        .item-desc { font-size: 13px; color: var(--purple-light); text-overflow: ellipsis; overflow: hidden; font-style: italic; }

        /* 商品右半部價格與按鈕 */
        .item-right { display: flex; align-items: center; gap: 15px; flex-shrink: 0; }
        .item-price { font-family: 'Cinzel', serif; font-size: 16px; color: var(--gold); font-weight: bold; width: 140px; text-align: right; }
        
        .btn-group { display: flex; align-items: center; gap: 8px; }
        .action-btn {
            background: linear-gradient(135deg, #3d1d6d, #230d43); border: 1px solid rgba(216,191,138,.4);
            color: var(--text); border-radius: 6px; width: 30px; height: 30px; font-size: 16px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.1s;
        }
        .action-btn:hover { background: var(--gold); color: #180b29; box-shadow: 0 0 8px var(--gold); }
        .item-count { font-family: 'Cinzel', serif; width: 25px; text-align: center; font-weight: bold; font-size: 16px; }

        /* 右側：大帳本大底層 */
        .sidebar-panel {
            background: rgba(25, 12, 44, 0.75); border: 1.5px solid rgba(216,191,138,.4);
            border-radius: 16px; padding: 20px; box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; justify-content: space-between; overflow: hidden;
        }

        .cart-wrapper { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .cart-list { overflow-y: auto; flex-grow: 1; margin-bottom: 10px; padding-right: 5px; }
        .cart-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 0; border-bottom: 1px solid rgba(168,151,201,0.2); font-size: 15px;
        }
        .cart-item-info { display: flex; flex-direction: column; }
        .cart-del-btn {
            background: transparent; border: none; color: #f29494; cursor: pointer;
            font-size: 15px; padding: 3px; transition: transform 0.1s;
        }
        .cart-del-btn:hover { transform: scale(1.2); text-shadow: 0 0 5px #f29494; }

        /* 結算總計區 */
        .summary-section {
            border-top: 1px solid rgba(216,191,138,.3); padding-top: 12px; flex-shrink: 0;
        }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 17px; }
        
        .magic-btn {
            width: 100%; background: linear-gradient(135deg, rgba(216,191,138,1), rgba(175,143,84,1));
            color: #1a0a2a; border: none; border-radius: 10px; padding: 12px; font-family: 'Cinzel', serif;
            font-size: 17px; font-weight: 700; cursor: pointer; transition: all 0.2s ease;
            letter-spacing: 1px; text-shadow: 0 1px 1px rgba(255,255,255,0.3); margin-top: 8px;
        }
        .magic-btn:hover { transform: translateY(-2px); box-shadow: 0 0 15px var(--gold); }
        
        .random-btn {
            background: linear-gradient(135deg, #a897c9, #5d4880); color: #fff; border: 1px solid var(--gold);
        }
        .random-btn:hover { box-shadow: 0 0 15px #a897c9; }

        /* 畫布區 */
        .canvas-container {
            width: 100%; max-width: 1400px; margin-top: 25px; text-align: center;
            background: rgba(15, 6, 25, 0.6); border-radius: 16px; padding: 20px;
            border: 1px dashed rgba(216,191,138,0.4); display: none;
        }
        #billCanvas { max-width: 100%; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .canvas-tip { font-size: 14px; color: var(--purple-light); margin-top: 10px; font-style: italic; }

        /* 古典外框裝飾線 */
        .decor-frame {
            position: fixed; inset: 10px; border: 1px solid rgba(216,191,138,.2);
            border-radius: 20px; pointer-events: none; z-index: 999;
        }

        /* 滾動條美化 */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(216,191,138,0.25); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold); }
    </style>
</head>
<body>

    <div class="decor-frame"></div>
    <div class="stars" id="starsContainer"></div>

    <div class="floating-moon">🌙</div>

    <div class="wealth-banner">
        <div class="wealth-title">✦ 奧術至尊・百物滿載揮霍虛空 ✦</div>
        <div class="wealth-amount" id="remainingDisplay">$3,000,000,000,000</div>
        <div class="wealth-stats" id="statsDisplay">您已花費了 0% 的資產，請盡情享受左右掃貨的快感。</div>
    </div>

    <div class="container">
        
        <div class="shop-panel">
            <div class="panel-title">🔮 命運奇物百寶庫 (左右快速選單)</div>
            <div class="items-list-container" id="itemsListContainer"></div>
        </div>

        <div class="sidebar-panel">
            <div class="cart-wrapper">
                <div class="panel-title">List 📜 揮霍魔導清單</div>
                <button class="magic-btn random-btn" onclick="buyRandomly()" style="margin-bottom: 10px; margin-top: 0;">🎲 諸神黃昏・隨機鋪張浪費</button>
                <div class="cart-list" id="cartList">
                    <div style="text-align: center; color: var(--purple-light); font-style: italic; padding-top: 60px; font-size: 15px;">
                        尚未勾選任何因果神物...
                    </div>
                </div>
            </div>

            <div class="summary-section">
                <div class="summary-row">
                    <span>當前揮霍總計：</span>
                    <span style="color: var(--gold); font-weight: bold;" id="totalSpentDisplay">$0</span>
                </div>
                <div class="summary-row" style="font-size: 14px; color: var(--purple-light);">
                    <span>購買物件總數：</span>
                    <span id="totalCountDisplay">0 晶</span>
                </div>
                <button class="magic-btn" onclick="generateInvoiceCard()">🔮 一鍵締結魔因結算</button>
            </div>
        </div>

    </div>

    <div class="canvas-container" id="canvasContainer">
        <div class="panel-title" style="font-size: 18px;">📸 諸神黃昏・炫富至尊法契</div>
        <canvas id="billCanvas" width="600" height="850"></canvas>
        <div class="canvas-tip">✦ 契約已自動複製！可長按圖卡儲存，發送至 LINE/Threads 震撼凡人 ✦</div>
    </div>

    <script>
        // 初始化星空
        const starsContainer = document.getElementById('starsContainer');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.animationDelay = Math.random() * 4 + 's';
            starsContainer.appendChild(star);
        }

        const INITIAL_WEALTH = 3000000000000; // 三兆元
        let currentWealth = INITIAL_WEALTH;

        // 喪心病狂排滿 102 項商品的史詩級清單
        const productList = [
            // 級別一：生活爆笑與阿毛梗
            { id: 'p1', name: '阿毛專屬純金浮誇骨頭', price: 500000, emoji: '🐶', desc: '純金打造，咬下去會自動發出豪華交響樂音效。' },
            { id: 'p2', name: '鮮茶道伯爵紅茶封店100年', price: 15000000, emoji: '☕', desc: '讓全球的鮮茶道店員這輩子只為你一個人搖紅茶。' },
            { id: 'p3', name: '奶奶加持神級大火炒飯', price: 120000, emoji: '🍳', desc: '吃一粒就能讓奧術智力與飽足感同時突破天際。' },
            { id: 'p4', name: '爺爺愛心秘製超燙鹹稀飯', price: 95000, emoji: '🥣', desc: '無論放多久都維持在最完美的 98°C，極致暖胃。' },
            { id: 'p5', name: '禮拜三限量手工宇宙水餃', price: 350000, emoji: '🥟', desc: '只有星期三會從蟲洞傳送過來的神祕黃金比例韭菜餃。' },
            { id: 'p6', name: '鮮茶道極光藍莓果茶噴泉', price: 8800000, emoji: '🍹', desc: '在院子裡建造一座日夜不停噴出酸甜果茶的魔法噴泉。' },
            { id: 'p7', name: '會唱歌的全息螢幕蒼蠅', price: 8888, emoji: '🪰', desc: '在你的手機螢幕上跳天鵝湖，發出 4K 高音質嗡嗡聲。' },
            { id: 'p8', name: '強迫症絕對倒轉魔法時鐘', price: 55000000, emoji: '⏳', desc: '能把時間往回撥 5 分鐘，專門用來後悔點錯手續費。' },
            { id: 'p9', name: '元大投資先生免手續費聖盾', price: 120000000, emoji: '🛡️', desc: '裝備後下單任何零股，手續費強行歸零。' },
            { id: 'p10', name: '一整條灑滿香菜的脆皮豬排', price: 45000, emoji: '🥩', desc: '反香菜聯盟看了會集體暈厥的終極美食。' },
            
            // 級別二：奢華電子與中二網路
            { id: 'p11', name: '強迫收購Twitter並改名', price: 1400000000000, emoji: '🛸', desc: '把全球使用者的頭像強制換成傲嬌阿毛的吐舌照。' },
            { id: 'p12', name: '鑲滿24K純金的馬桶', price: 8500000, emoji: '🚽', desc: '每一次沖水都會發出神聖的唱詩班讚美聲。' },
            { id: 'p13', name: '火星表面阿毛度假別墅', price: 85000000000, emoji: '⛺', desc: '地底自帶純氧花園與無限重力的柴犬跑步機。' },
            { id: 'p14', name: '全息投影虛擬發呆鏡子', price: 150000, emoji: '🪞', desc: '照了之後裡面會顯示：「偵測到您在虛度光陰」。' },
            { id: 'p15', name: '可以發射雷射光的特製墨鏡', price: 3200000, emoji: '🕶️', desc: '戴上它，看誰不爽就用眼神在牆上燒出一個✦。' },
            { id: 'p16', name: '2000字神級虐戀小說大綱', price: 50000, emoji: '📚', desc: '一秒產生逼哭百萬讀者的 BE 史詩大作大綱。' },
            { id: 'p17', name: '會自動幫你寫 Bug 的AI鍵盤', price: 66666, emoji: '⌨️', desc: '每打三個字就會自動附贈兩個難以排查的幽靈 Bug。' },
            { id: 'p18', name: '傲嬌柴犬專用純絲綢披風', price: 1200000, emoji: '🧣', desc: '穿上後走在路上，回頭率高達百分之兩百。' },
            { id: 'p19', name: '包下整個北極圈來看極光', price: 4500000000, emoji: '🌌', desc: '順便雇一千隻企鵝（雖然北極沒有）排成你的名字。' },
            { id: 'p20', name: '純鈦合金無人機遛狗服務', price: 7800000, emoji: '🛸', desc: '配備自動餵食肉乾功能，阿毛跑再快也追得上。' },

            // 隨機填充至 100+ 個（快速生成）
            ...Array.from({length: 82}, (_, i) => {
                const idNum = i + 21;
                const emojis = ['🔮','✨','💎','💰','🏰','🚀','🌋','🏔️','⚓','✈️','🛩️','🚂','🏎️','🏍️','👑','🎸','🎻','🎨','🎬','🎟️','🦁','🦄','🦖','🦈','🐳','🍉','🍓','🍔','🍕','🍣','🍿','🍩','🍺','🍷','🧉','🎪','🎮','🎰','🎳','🎸','🛎️','🧲','🧪','🧬','🔭','📡','🪐','☄️','💥','🔥','💧','⚡','🌈','☀️','🍿','🌮','🥨','🥯','🥞','🧇','🧈','🥖','🍛','🍲','🍥','🍢','🍨','🧁','🍫','🍭','🍯','🍼'];
                const names = ['極品因果律','虛空星屑','深淵魔能','黃金至尊','奧術螺旋','泰坦重工','絕對防禦','精靈祝福','諸神黃昏','混沌主宰','不朽王座','星際超跑','皇家限定','高階煉金','上古禁咒','降維打擊','量子迷宮','時空斷層'];
                const units = ['核彈','永動機','甜甜圈','宇宙飛船','聖杯','寶劍','大頭貼','手續費計算機','炒飯鍋','貓薄荷','泡麵','高鐵','皮卡車'];
                
                const emoji = emojis[idNum % emojis.length];
                const name = `${names[idNum % names.length]}${units[idNum % units.length]} v${idNum}.0`;
                const price = Math.floor((Math.random() * 850000000) + 10000) * (idNum % 3 === 0 ? 100 : 1);
                
                return {
                    id: `p${idNum}`,
                    name: name,
                    price: price,
                    emoji: emoji,
                    desc: `這是編號第 ${idNum} 號的遠古神秘奇物，具有強大的揮霍因果律能量。`
                };
            })
        ];

        let cart = {};

        // 格式化千分位
        function formatMoney(num) {
            return '$' + num.toLocaleString('zh-TW');
        }

        // 核心修改：渲染成左右排列的精簡選單
        function renderShop() {
            const container = document.getElementById('itemsListContainer');
            container.innerHTML = productList.map(p => {
                const qty = cart[p.id] || 0;
                return `
                    <div class="item-row">
                        <div class="item-left">
                            <div class="item-emoji">${p.emoji}</div>
                            <div class="item-details">
                                <div class="item-name">${p.name}</div>
                                <div class="item-desc">${p.desc}</div>
                            </div>
                        </div>
                        <div class="item-right">
                            <div class="item-price">${formatMoney(p.price)}</div>
                            <div class="btn-group">
                                <button class="action-btn" onclick="updateCart('${p.id}', -1)">-</button>
                                <span class="item-count" id="count-${p.id}">${qty}</span>
                                <button class="action-btn" onclick="updateCart('${p.id}', 1)">+</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 更新購物車
        function updateCart(id, change) {
            const product = productList.find(p => p.id === id);
            const currentQty = cart[id] || 0;
            const newQty = currentQty + change;

            if (newQty < 0) return;
            
            if (change > 0 && currentWealth - product.price < 0) {
                alert("🧙‍♂️【傲慢警告】：瘋狂砸錢導致虛空倉庫歸零！請趕緊退貨一些銀河系！");
                return;
            }

            if (newQty === 0) {
                delete cart[id];
            } else {
                cart[id] = newQty;
            }

            calculateTotal();
            document.getElementById(`count-${id}`).innerText = newQty;
            renderCart();
        }

        // 🎲 趣味功能：隨機瘋狂亂買
        function buyRandomly() {
            for (let i = 0; i < 15; i++) {
                const randIndex = Math.floor(Math.random() * productList.length);
                const p = productList[randIndex];
                if (currentWealth - p.price > 0) {
                    cart[p.id] = (cart[p.id] || 0) + 1;
                }
            }
            calculateTotal();
            renderShop();
            renderCart();
        }

        // 計算數據
        function calculateTotal() {
            let totalSpent = 0;
            let totalItems = 0;

            for (let id in cart) {
                const product = productList.find(p => p.id === id);
                totalSpent += product.price * cart[id];
                totalItems += cart[id];
            }

            currentWealth = INITIAL_WEALTH - totalSpent;

            document.getElementById('remainingDisplay').innerText = formatMoney(currentWealth);
            document.getElementById('totalSpentDisplay').innerText = formatMoney(totalSpent);
            document.getElementById('totalCountDisplay').innerText = `${totalItems} 晶`;

            const percentage = ((totalSpent / INITIAL_WEALTH) * 100).toFixed(6);
            let roastText = "";
            if (totalSpent === 0) {
                roastText = "您目前兩袖清風，凡人的銅臭味還沒沾染到您的靈魂。";
            } else if (percentage < 0.1) {
                roastText = `已花費 ${percentage}% 資產。這點毛毛雨，連幫阿毛買純金骨頭的包裝紙都不夠！`;
            } else if (percentage < 5) {
                roastText = `已消耗 ${percentage}% 魔晶。您精湛的左右開弓流暢掃貨，成功引起了財政部注意！`;
            } else {
                roastText = `警告！你竟然燃燒了 ${percentage}% 的資產！整個奧術世界的通貨膨脹率因你暴漲！`;
            }
            document.getElementById('statsDisplay').innerText = roastText;
        }

        // 渲染右側清單
        function renderCart() {
            const cartList = document.getElementById('cartList');
            const keys = Object.keys(cart);

            if (keys.length === 0) {
                cartList.innerHTML = `
                    <div style="text-align: center; color: var(--purple-light); font-style: italic; padding-top: 60px; font-size: 15px;">
                        尚未勾選任何因果神物...
                    </div>`;
                return;
            }

            cartList.innerHTML = keys.map(id => {
                const product = productList.find(p => p.id === id);
                const qty = cart[id];
                return `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <span>${product.emoji} ${product.name}</span>
                            <span style="font-size: 12px; color: var(--gold);">${formatMoney(product.price)} × ${qty}</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span style="font-weight: bold; color: #fff;">${formatMoney(product.price * qty)}</span>
                            <button class="cart-del-btn" onclick="updateCart('${id}', -${qty})">✕</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Canvas 畫布締結契約圖卡
        function generateInvoiceCard() {
            const keys = Object.keys(cart);
            if (keys.length === 0) {
                alert("🔮 提示：空空如也的帳本是無法共鳴的，先去左右橫掃一下吧！");
                return;
            }

            const canvas = document.getElementById('billCanvas');
            const ctx = canvas.getContext('2d');
            const container = document.getElementById('canvasContainer');
            container.style.display = 'block';

            // 背景
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#130722'); grad.addColorStop(0.5, '#1e0f35'); grad.addColorStop(1, '#0b0314');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 金框
            ctx.strokeStyle = '#d8bf8a'; ctx.lineWidth = 2; ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);
            
            // 四角 ✦
            ctx.fillStyle = '#d8bf8a'; ctx.font = '18px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            [{x:23,y:23}, {x:canvas.width-23,y:23}, {x:23,y:canvas.height-23}, {x:canvas.width-23,y:canvas.height-23}].forEach(c => {
                ctx.fillText('✦', c.x, c.y);
            });

            // 標題
            ctx.font = '26px "Cinzel", serif'; ctx.fillText('🔮 奧術至尊・百物滿載揮霍契書 🔮', canvas.width / 2, 70);

            let totalSpent = 0; let totalItems = 0;
            let shareText = "✦ 諸神黃昏・百物橫掃法契 ✦\n\n";

            keys.forEach(id => {
                const p = productList.find(p => p.id === id);
                totalSpent += p.price * cart[id];
                totalItems += cart[id];
                shareText += `【${p.emoji} ${p.name}】 × ${cart[id]}個\n`;
            });
            const remain = INITIAL_WEALTH - totalSpent;
            const pct = ((totalSpent / INITIAL_WEALTH) * 100).toFixed(5);

            ctx.textAlign = 'left'; ctx.font = '16px sans-serif'; ctx.fillStyle = '#a897c9';
            ctx.fillText(`最初神格預算：$3,000,000,000,000`, 55, 130);
            ctx.fillText(`清單網羅品項：${totalItems} 件魔導產物`, 55, 160);

            // 明細表格背景
            ctx.fillStyle = 'rgba(255, 255, 255, 0.03)'; ctx.fillRect(50, 190, canvas.width - 100, 380);
            ctx.strokeStyle = 'rgba(216, 191, 138, 0.3)'; ctx.strokeRect(50, 190, canvas.width - 100, 380);

            ctx.fillStyle = '#d8bf8a'; ctx.font = 'bold 15px sans-serif';
            ctx.fillText('橫向搜刮品項', 70, 220);
            ctx.textAlign = 'right'; ctx.fillText('數量', canvas.width - 220, 220); ctx.fillText('小計金額', canvas.width - 70, 220);

            ctx.font = '15px sans-serif'; ctx.fillStyle = '#eadfff';
            let startY = 260;
            // 圖卡最多呈現前 9 個，避免爆表
            keys.slice(0, 9).forEach(id => {
                const p = productList.find(p => p.id === id);
                ctx.textAlign = 'left'; ctx.fillText(`${p.emoji} ${p.name}`, 70, startY);
                ctx.textAlign = 'right'; ctx.fillText(`${cart[id]}`, canvas.width - 220, startY);
                ctx.fillText(formatMoney(p.price * cart[id]), canvas.width - 70, startY);
                startY += 32;
            });
            if(keys.length > 9) {
                ctx.textAlign = 'center'; ctx.fillStyle = '#a897c9';
                ctx.fillText(`（...其餘 ${keys.length - 9} 種奢華奇物已封印於卷軸下層...）`, canvas.width/2, 550);
            }

            // 總計
            ctx.textAlign = 'left'; ctx.font = '18px "Cinzel", serif'; ctx.fillStyle = '#f29494'; ctx.fillText('總計已揮霍：', 55, 610);
            ctx.textAlign = 'right'; ctx.font = 'bold 24px "Cinzel", serif'; ctx.fillText(formatMoney(totalSpent), canvas.width - 55, 610);

            ctx.textAlign = 'left'; ctx.font = '15px sans-serif'; ctx.fillStyle = '#a897c9'; ctx.fillText('剩餘至尊資產：', 55, 660);
            ctx.textAlign = 'right'; ctx.fillStyle = '#8ae0be'; ctx.fillText(formatMoney(remain), canvas.width - 55, 660);

            ctx.textAlign = 'center'; ctx.font = 'italic 15px serif'; ctx.fillStyle = '#bcaed6';
            ctx.fillText(`「今日法契已動用總資產之 ${pct}%，財富如星海無窮無盡。」`, canvas.width / 2, 730);
            ctx.fillText('✦ 財富煉金工坊大主祭 ✦', canvas.width / 2, 790);

            shareText += `\n💰 總共瘋狂砸下：${formatMoney(totalSpent)}\n🌌 餘額還剩：${formatMoney(remain)}\n🔮 揮霍進度：已燃燒 ${pct}% 的神聖資產！\n\n「看過左右開弓的購物手速嗎？今天又是隨手買下幾百個星系的一天。🌙」`;
            navigator.clipboard.writeText(shareText).then(() => {
                container.scrollIntoView({ behavior: 'smooth' });
            }).catch(err => console.log(err));
        }

        // 初始化
        renderShop();
        calculateTotal();
    </script>
</body>
</html>
