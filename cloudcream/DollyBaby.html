<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 萌物專屬・Emoji 互動療癒摸摸機 🌸</title>
    <style>
        /* 日式簡約粉彩柔和配色 */
        :root {
            --bg-pastel: #fbf5f3;      /* 溫柔極簡米白 */
            --card-bg: #ffffff;        /* 純白卡片 */
            --primary-pink: #ffdae0;   /* 粉彩櫻花粉 */
            --primary-blue: #d6eaff;   /* 粉彩天空藍 */
            --text-main: #6d6465;      /* 溫柔深栗褐 */
            --text-sub: #9e9394;       /* 柔和灰褐 */
            --border-line: #f0e6e6;    /* 極細線條 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: var(--bg-pastel);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* 主療癒卡片容器 */
        .container {
            width: 100%;
            max-width: 650px;
            background: var(--card-bg);
            border-radius: 32px;
            padding: 30px;
            box-shadow: 0 16px 40px rgba(224, 211, 211, 0.4);
            border: 1px solid var(--border-line);
            text-align: center;
        }

        h1 {
            font-size: 24px;
            color: var(--text-main);
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-sub);
            margin-bottom: 24px;
        }

        /* 隱藏原生檔案上傳，做成漂亮按鈕 */
        .upload-box {
            margin-bottom: 20px;
        }
        
        #fileInput {
            display: none;
        }

        .upload-btn {
            display: inline-block;
            padding: 10px 24px;
            background-color: #ffffff;
            border: 2px dashed #e2d5d5;
            color: var(--text-sub);
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .upload-btn:hover {
            border-color: #ffb8c6;
            color: #ff8fa4;
            background-color: #fffafb;
        }

        /* 模式切換器（魔法道具包） */
        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .mode-btn {
            padding: 12px 28px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        /* 撫摸模式按鈕樣式 */
        .btn-stroke {
            background-color: #fff0f2;
            color: #ff6b8b;
            border: 2px solid #ffdae0;
        }
        .btn-stroke.active {
            background-color: #ffdae0;
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(255, 218, 224, 0.6);
        }

        /* 洗澡模式按鈕樣式 */
        .btn-bath {
            background-color: #f0f6ff;
            color: #4a90e2;
            border: 2px solid #d6eaff;
        }
        .btn-bath.active {
            background-color: #d6eaff;
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(214, 234, 255, 0.6);
        }

        .mode-btn:active {
            transform: scale(0.98);
        }

        /* 互動大舞台 */
        .stage {
            position: relative;
            width: 100%;
            height: 420px;
            background-color: #faf6f6;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border-line);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 預設提示文字 */
        .placeholder-text {
            color: var(--text-sub);
            font-size: 15px;
            pointer-events: none;
            z-index: 1;
        }

        /* 娃娃本體照片 */
        .doll-img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 16px;
            user-select: none;
            -webkit-user-drag: none;
            z-index: 2;
            display: none;
            transition: transform 0.1s ease-out; /* 讓被摸時的晃動更絲滑 */
        }

        /* ✨ 關鍵自訂游標：當滑鼠移入舞台時，隱藏原本箭頭 */
        .stage.has-img {
            cursor: none;
        }

        /* 追隨滑鼠的自訂 Emoji 游標 */
        .custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            font-size: 42px; /* 道具手掌與肥皂的大小 */
            pointer-events: none;
            z-index: 9999;
            display: none;
            transform: translate(-50%, -50%);
            user-select: none;
        }

        /* 噴發出來的 Emoji 特效 */
        .particle {
            position: absolute;
            font-size: 32px;
            pointer-events: none;
            z-index: 10;
            animation: floatUp 0.8s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
            user-select: none;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.4) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translate(var(--x), var(--y)) scale(1.3) rotate(var(--r));
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ 萌物專屬・Emoji 互動療癒摸摸機 ✨</h1>
        <div class="subtitle">拍下你的棉花娃或寵物，換上道具好好的寵愛牠吧！</div>

        <div class="upload-box">
            <label for="fileInput" class="upload-btn">📸 點擊上傳你的娃娃照片</label>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div class="mode-selector">
            <button class="mode-btn btn-stroke active" onclick="setMode('stroke')">🖐️ 撫摸模式</button>
            <button class="mode-btn btn-bath" onclick="setMode('bath')">🧼 洗澡模式</button>
        </div>

        <div class="stage" id="stage" onmousemove="handleMove(event)" onmousedown="triggerInteraction(event)">
            <div class="placeholder-text" id="placeholder">請先在上方上傳照片，才能開始互動唷 🌸</div>
            <img src="" alt="娃娃" class="doll-img" id="doll">
        </div>
    </div>

    <div class="custom-cursor" id="customCursor">🖐️</div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const stage = document.getElementById('stage');
        const doll = document.getElementById('doll');
        const placeholder = document.getElementById('placeholder');
        const customCursor = document.getElementById('customCursor');

        // 當前模式：'stroke' (撫摸) 或 'bath' (洗澡)
        let currentMode = 'stroke';
        let hasImage = false;

        // 圖片上傳解析
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    doll.src = event.target.result;
                    doll.style.display = 'block';
                    placeholder.style.display = 'none';
                    stage.classList.add('has-img');
                    hasImage = true;
                };
                reader.readAsDataURL(file);
            }
        });

        // 切換模式（更換游標與噴發物件設定）
        function setMode(mode) {
            currentMode = mode;
            
            // 更新按鈕高亮
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            if (mode === 'stroke') {
                document.querySelector('.btn-stroke').classList.add('active');
                customCursor.innerText = '🖐️';
            } else {
                document.querySelector('.btn-bath').classList.add('active');
                customCursor.innerText = '🧼';
            }
        }

        // 處理游標跟隨與滑動即時觸發
        let lastSpawnTime = 0;
        function handleMove(e) {
            if (!hasImage) return;

            // 讓自訂道具（手掌/肥皂）跟著滑鼠移動
            customCursor.style.display = 'block';
            customCursor.style.left = e.clientX + 'px';
            customCursor.style.top = e.clientY + 'px';

            // 滑動時自動噴發的效果（加點冷卻時間，每 60 毫秒最多噴一個，避免畫面太密集）
            const now = Date.now();
            if (now - lastSpawnTime > 60) {
                // 只有滑鼠在娃娃圖片上方滑動時才噴發
                if (e.target === doll) {
                    spawnEmoji(e);
                    bounceDoll();
                    lastSpawnTime = now;
                }
            }
        }

        // 點擊滑鼠時也絕對會噴發
        function triggerInteraction(e) {
            if (!hasImage) return;
            if (e.target === doll || e.target === stage) {
                spawnEmoji(e);
                bounceDoll();
            }
        }

        // 離開舞台時隱藏專屬游標
        stage.addEventListener('mouseleave', () => {
            customCursor.style.display = 'none';
        });

        // 產生噴發 Emoji 核心邏輯
        function spawnEmoji(e) {
            const rect = stage.getBoundingClientRect();
            // 計算出相對於舞台內部的精確 X, Y 座標
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const particle = document.createElement('div');
            particle.className = 'particle';
            
            // 根據目前模式決定噴出的特效
            if (currentMode === 'stroke') {
                particle.innerText = '💖'; // 撫摸出愛心
            } else {
                particle.innerText = '✨'; // 洗澡出閃亮泡泡
            }

            particle.style.left = `${x}px`;
            particle.style.top = `${y}px`;

            // 讓每個噴出來的 Emoji 有隨機的噴射軌跡與角度
            const randomX = (Math.random() - 0.5) * 160; // 左右擴散
            const randomY = -60 - Math.random() * 100;    // 向上噴發
            const randomRotate = (Math.random() - 0.5) * 60; // 隨機旋轉

            particle.style.setProperty('--x', `${randomX}px`);
            particle.style.setProperty('--y', `${randomY}px`);
            particle.style.setProperty('--r', `${randomRotate}deg`);

            stage.appendChild(particle);

            // 動畫結束後自動洗掉標籤，保持網頁輕量不卡頓
            particle.addEventListener('animationend', () => {
                particle.remove();
            });
        }

        // 娃娃被撫摸或洗澡時的縮放晃動反饋
        function bounceDoll() {
            // 隨機產生微幅的左右搖擺與縮放，像真的被揉捏一樣
            const randomRot = (Math.random() - 0.5) * 6; // -3 到 3 度
            doll.style.transform = `scale(0.96) rotate(${randomRot}deg)`;
            
            // 0.1秒後彈回原狀
            setTimeout(() => {
                doll.style.transform = 'scale(1) rotate(0deg)';
            }, 100);
        }
    </script>
</body>
</html>
