<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>✦ 萌物專屬・多娃魔性養成觀測站 v4.0 ✦</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg-base:#fff9f6;
    --bg-gradient:#ffebe3;
    --card-bg:#ffffff;
    --text-main:#54433a;
    --text-sub:#8e7a70;
    --gold:#f6c86c;
    --gold-hover:#efb94d;
    --pink:#f79999;
    --line:#eadfd8;
    --base-font-size:20px;
}

body{
    min-height:100vh;
    background:linear-gradient(180deg, var(--bg-base) 0%, var(--bg-gradient) 100%);
    font-family: "Zen Maru Gothic", "Quicksand", "Microsoft JhengHei", sans-serif;
    font-size: var(--base-font-size);
    color:var(--text-main);
    padding:20px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:100%;
    max-width:1100px;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.hero{
    text-align:center;
}

.badge{
    display:inline-block;
    background:rgba(246,200,108,0.18);
    color:#b57d18;
    padding:6px 14px;
    border-radius:999px;
    font-size:14px;
    font-weight:700;
    margin-bottom:8px;
}

.title{
    font-size:clamp(28px,4vw,40px);
    line-height:1.3;
}

/* 上方主要互動雙欄佈局 */
.main-layout{
    display:grid;
    grid-template-columns:1fr;
    gap:20px;
}

@media(min-width:850px){
    .main-layout{
        grid-template-columns: 1.3fr 0.7fr;
    }
}

.card{
    background:var(--card-bg);
    border-radius:24px;
    border:1px solid rgba(142,122,112,0.1);
    padding:24px;
    box-shadow: 0 10px 30px rgba(84,67,58,0.04);
}

.section-title{
    font-size:22px;
    margin-bottom:14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* 互動舞台 */
.stage-wrapper {
    position: relative;
    width: 100%;
    background: #fffcfb;
    border: 2px dashed rgba(142,122,112,0.15);
    border-radius: 20px;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 380px;
    margin-bottom: 16px;
}

.stage-wrapper.has-img { cursor: none; }

.upload-placeholder {
    text-align: center;
    color: var(--text-sub);
    pointer-events: none;
    font-size: 16px;
}

#dollImage {
    max-width: 80%;
    max-height: 340px;
    object-fit: contain;
    pointer-events: none;
    display: none;
    transform-origin: center bottom;
}

/* -------------------------------------
   🔥 重新調校：更具魔性的物理動效
------------------------------------- */

/* 1. 撫摸：柔和Ｑ彈果凍 */
.ani-stroke { animation: jelly 0.25s ease-out; }
@keyframes jelly {
    0% { transform: scale(1, 1); }
    30% { transform: scale(1.12, 0.88); }
    60% { transform: scale(0.92, 1.08); }
    100% { transform: scale(1, 1); }
}

/* 2. 洗澡：改版【超絕特技水龍捲】(縮放+狂轉+滾動位移) */
.ani-bath { animation: whirlpoolWash 0.45s ease-in-out; }
@keyframes whirlpoolWash {
    0% { transform: scale(1) translate(0, 0) rotate(0deg); }
    20% { transform: scale(0.7) translate(-30px, -20px) rotate(-90deg); }
    45% { transform: scale(1.2) translate(40px, -40px) rotate(140deg); }
    70% { transform: scale(0.6) translate(-20px, 30px) rotate(280deg); }
    100% { transform: scale(1) translate(0, 0) rotate(360deg); }
}

/* 3. 餵奶：究極巨大化飽嗝 */
.ani-feed { animation: superSize 0.3s ease-in-out; }
@keyframes superSize {
    0% { transform: scale(1); }
    40% { transform: scale(1.3); }
    70% { transform: scale(0.96); }
    100% { transform: scale(1); }
}

/* 4. 輕敲：無情劇烈靈魂搖晃 */
.ani-poke { animation: absoluteViolence 0.2s linear infinite; animation-iteration-count:1; }
@keyframes absoluteViolence {
    0% { transform: translate(0, 0) rotate(0deg); }
    20% { transform: translate(-10px, 4px) rotate(-6deg); }
    40% { transform: translate(10px, -4px) rotate(6deg); }
    60% { transform: translate(-8px, -2px) rotate(-4deg); }
    80% { transform: translate(8px, 4px) rotate(4deg); }
    100% { transform: translate(0, 0) rotate(0deg); }
}

/* ------------------------------------- */

/* 浮動粒子與游標 */
.custom-cursor { position: fixed; top: 0; left: 0; font-size: 42px; pointer-events: none; z-index: 9999; display: none; transform: translate(-50%, -50%); user-select: none; }
.click-emoji { position: absolute; font-size: 36px; pointer-events: none; z-index: 10; animation: floatUp 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; }
@keyframes floatUp {
    0% { transform: translate(-50%, -50%) scale(0.3); opacity: 1; }
    100% { transform: translate(var(--x), var(--y)) scale(1.3) rotate(var(--r)); opacity: 0; }
}

/* 工具列 */
.tool-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
.tool-btn { background: #fffaf7; border: 1.5px solid rgba(142,122,112,0.16); border-radius: 14px; padding: 10px 4px; font-size: 20px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 2px; font-family: inherit; font-weight: 700; }
.tool-btn span { font-size: 12px; color: var(--text-sub); }
.tool-btn.active { background: #fff4ec; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(246,200,108,0.25); }

/* 狀態列 */
.status-bar { background: #fffaf7; border-radius: 14px; padding: 12px; margin-bottom: 14px; border: 1px solid rgba(142,122,112,0.08); font-size: 15px; }
.status-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
.status-val { font-weight: 700; color: var(--pink); }

/* 表單輸入 */
.input-group { margin-bottom: 10px; }
.label { display: block; margin-bottom: 4px; font-weight: 700; font-size: 15px; }
.input { width: 100%; padding: 10px 12px; border-radius: 12px; border: 1.5px solid rgba(142,122,112,0.16); background: #fffbf9; font-size: 15px; font-family: inherit; }
.input:focus { outline: none; border-color: var(--gold); background: white; }
.file-btn { background: #54433a; color: white; padding: 10px; border-radius: 12px; cursor: pointer; text-align: center; font-size: 14px; font-weight: 700; display: block; margin-top: 4px; }
.main-btn { width: 100%; border: none; background: var(--gold); color: var(--text-main); padding: 12px; border-radius: 12px; cursor: pointer; font-family: inherit; font-size: 16px; font-weight: 700; transition: 0.2s; margin-top: 5px; }
.main-btn:hover { background: var(--gold-hover); }

/* -------------------------------------
   🌟 核心改版：底部左右橫向滑動展示牆
------------------------------------- */
.bottom-gallery {
    width: 100%;
}

.scroll-container {
    display: flex;
    gap: 16px;
    overflow-x: auto;
    padding: 8px 4px 16px 4px;
    scroll-behavior: smooth;
    
    /* 隱藏滾動條但保留滑動功能 (讓介面乾淨) */
    -webkit-overflow-scrolling: touch;
}

/* 自訂精美滾動條 */
.scroll-container::-webkit-scrollbar {
    height: 8px;
}
.scroll-container::-webkit-scrollbar-track {
    background: rgba(142,122,112,0.05);
    border-radius: 99px;
}
.scroll-container::-webkit-scrollbar-thumb {
    background: rgba(142,122,112,0.2);
    border-radius: 99px;
}
.scroll-container::-webkit-scrollbar-thumb:hover {
    background: var(--gold);
}

.gallery-card {
    flex: 0 0 240px; /* 固定寬度，不壓縮 */
    background: var(--card-bg);
    border: 1px solid rgba(142,122,112,0.1);
    border-radius: 20px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    position: relative;
    box-shadow: 0 6px 18px rgba(84,67,58,0.02);
}

.gallery-card:hover {
    transform: translateY(-4px);
    border-color: var(--gold);
}

.gallery-card.active {
    border-color: var(--pink);
    background: #fff6f7;
    box-shadow: 0 8px 20px rgba(247,153,153,0.15);
}

.gallery-thumb {
    width: 90px;
    height: 90px;
    border-radius: 16px;
    object-fit: cover;
    background: #f7f7f7;
    margin-bottom: 10px;
    border: 1px solid rgba(142,122,112,0.05);
}

.gallery-name {
    font-weight: 700;
    font-size: 16px;
    margin-bottom: 4px;
    width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.gallery-love {
    font-size: 13px;
    color: var(--pink);
    font-weight: 700;
    margin-bottom: 2px;
}

.gallery-desc {
    font-size: 12px;
    color: var(--text-sub);
    width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.gallery-delete {
    position: absolute;
    top: 10px;
    right: 10px;
    background: none;
    border: none;
    font-size: 14px;
    cursor: pointer;
    opacity: 0.4;
    transition: 0.2s;
}
.gallery-card:hover .gallery-delete { opacity: 1; }

/* ------------------------------------- */

.footer { text-align: center; margin-top: 10px; color: var(--text-sub); font-size: 13px; }
</style>
</head>

<body>

<div class="container">

    <!-- HERO HEADER -->
    <div class="hero">
        <div class="badge">🌸 萌物多娃大世界 v4.0（橫向收藏流）</div>
        <h1 class="title">我的娃娃養成觀測站</h1>
    </div>

    <!-- MAIN TWO COLUMNS -->
    <div class="main-layout">
        
        <!-- LEFT: 核心互動大舞台 -->
        <div class="card">
            <h2 class="section-title" id="currentDollName">🔮 請選擇或新增一隻娃娃</h2>
            
            <div class="status-bar">
                <div class="status-row">
                    <span>👑 羈絆稱號：<b id="dollTitle" style="color: #b57d18;">無</b></span>
                    <span>💖 親密指數：<b id="dollLove" class="status-val">0</b></span>
                </div>
                <div class="status-row">
                    <span>💬 寶貝備註：<span id="dollDesc" style="color: var(--text-sub);">尚未選擇娃娃</span></span>
                </div>
            </div>

            <!-- 魔法道具包切換 -->
            <div class="tool-selector">
                <button class="tool-btn active" onclick="setTool('stroke', '🖐️', '💖', this)">🖐️<span>撫摸</span></button>
                <button class="tool-btn" onclick="setTool('bath', '🧼', '✨', this)">🧼<span>洗澡</span></button>
                <button class="tool-btn" onclick="setTool('feed', '🍼', '🥛', this)">🍼<span>餵奶</span></button>
                <button class="tool-btn" onclick="setTool('poke', '🥊', '💢', this)">🥊<span>輕敲</span></button>
            </div>

            <!-- 互動舞台 -->
            <div class="stage-wrapper" id="stage" onmousemove="handleStageMove(event)" onmousedown="handleStageClick(event)">
                <div class="upload-placeholder" id="placeholder">
                    <div style="font-size:44px;">🧸</div>
                    <p>下方沒有正在互動的娃娃唷<br>請先召喚夥伴或點擊卡片開始！</p>
                </div>
                <img id="dollImage" src="" alt="娃娃本體">
            </div>
        </div>

        <!-- RIGHT: 召喚新夥伴表單 -->
        <div class="card" style="display:flex; flex-direction:column; justify-content:center;">
            <h2 class="section-title">✨ 召喚新夥伴</h2>
            
            <div class="input-group">
                <label class="label">娃娃名字</label>
                <input class="input" type="text" id="newName" placeholder="例如：阿熊隊長...">
            </div>

            <div class="input-group">
                <label class="label">類別 / 備註</label>
                <input class="input" type="text" id="newDesc" placeholder="例如：10cm棉花娃">
            </div>

            <div class="input-group">
                <label class="label">上傳照片</label>
                <label for="fileInput" class="file-btn">📸 選擇相簿照片</label>
                <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="previewImage(this)">
                <div id="uploadStatus" style="font-size: 12px; color: var(--pink); margin-top: 4px; display: none; font-weight: bold; text-align:center;">✓ 照片已就緒</div>
            </div>

            <button class="main-btn" onclick="addDoll()">✦ 收入大帳本 ✦</button>
        </div>

    </div>

    <!-- BOTTOM: 左右橫向滑動展示大軍 -->
    <div class="bottom-gallery">
        <h2 class="section-title" style="font-size: 18px; padding-left: 4px;">
            🧸 我的娃娃大軍牆 (<span id="dollCount">0</span>)
            <span style="font-size:12px; color:var(--text-sub); font-weight:normal;">💡 支援左右滑動瀏覽唷</span>
        </h2>
        <div class="scroll-container" id="dollSlider">
            <!-- 娃娃橫向卡片會生成在這邊 -->
        </div>
    </div>

    <div class="footer">
        Designed by <b>ChuChu</b> © 2026
    </div>
</div>

<!-- 實體道具跟隨游標 -->
<div class="custom-cursor" id="customCursor">🖐️</div>

<script>
let dolls = [];
let activeDollId = null;
let currentTool = 'stroke';
let cursorEmoji = '🖐️';
let particleEmoji = '💖';
let tempImgBase64 = "";

window.onload = function() {
    const savedDolls = localStorage.getItem('pastel_dolls_v4');
    if (savedDolls) {
        dolls = JSON.parse(savedDolls);
        renderDollSlider();
        if (dolls.length > 0) {
            selectDoll(dolls[0].id);
        }
    }
};

function saveToStorage() {
    localStorage.setItem('pastel_dolls_v4', JSON.stringify(dolls));
}

function previewImage(input) {
    const file = input.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            tempImgBase64 = e.target.result;
            document.getElementById('uploadStatus').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }
}

function addDoll() {
    const nameInput = document.getElementById('newName');
    const descInput = document.getElementById('newDesc');
    
    if (!nameInput.value.trim()) {
        alert("請幫娃娃取個名字嘛 🌸");
        return;
    }
    if (!tempImgBase64) {
        alert("請上傳一張娃娃的照片唷 📸");
        return;
    }

    const newDoll = {
        id: 'doll_' + Date.now(),
        name: nameInput.value.trim(),
        desc: descInput.value.trim() || "尚無備註",
        image: tempImgBase64,
        love: 0
    };

    dolls.push(newDoll);
    saveToStorage();
    renderDollSlider();
    selectDoll(newDoll.id);

    // 清空
    nameInput.value = "";
    descInput.value = "";
    tempImgBase64 = "";
    document.getElementById('fileInput').value = "";
    document.getElementById('uploadStatus').style.display = 'none';
}

function deleteDoll(id, event) {
    event.stopPropagation();
    if (!confirm("確定要讓這隻娃娃離開你的大帳本嗎？🥺")) return;
    
    dolls = dolls.filter(d => d.id !== id);
    saveToStorage();
    renderDollSlider();

    if (activeDollId === id) {
        if (dolls.length > 0) {
            selectDoll(dolls[0].id);
        } else {
            activeDollId = null;
            document.getElementById('dollImage').style.display = 'none';
            document.getElementById('placeholder').style.display = 'block';
            document.getElementById('stage').classList.remove('has-img');
            document.getElementById('currentDollName').innerText = "🔮 請選擇或新增一隻娃娃";
            document.getElementById('dollTitle').innerText = "無";
            document.getElementById('dollLove').innerText = "0";
            document.getElementById('dollDesc').innerText = "尚未選擇娃娃";
        }
    }
}

// 渲染底部橫向滑動列表
function renderDollSlider() {
    const slider = document.getElementById('dollSlider');
    document.getElementById('dollCount').innerText = dolls.length;
    slider.innerHTML = "";

    dolls.forEach(doll => {
        const titleText = getTitleByLove(doll.love);
        const card = document.createElement('div');
        card.className = `gallery-card ${doll.id === activeDollId ? 'active' : ''}`;
        card.id = `slide_${doll.id}`;
        card.onclick = () => selectDoll(doll.id);

        card.innerHTML = `
            <button class="gallery-delete" onclick="deleteDoll('${doll.id}', event)">🗑️</button>
            <img src="${doll.image}" class="gallery-thumb">
            <div class="gallery-name">${doll.name}</div>
            <div class="gallery-love">💖 <span class="love-num">${doll.love}</span></div>
            <div class="gallery-desc">${titleText} · ${doll.desc}</div>
        `;
        slider.appendChild(card);
    });
}

function selectDoll(id) {
    activeDollId = id;
    const doll = dolls.find(d => d.id === id);
    if (!doll) return;

    document.getElementById('currentDollName').innerText = `🧸 正在與「${doll.name}」互動中`;
    document.getElementById('dollDesc').innerText = doll.desc;
    document.getElementById('dollLove').innerText = doll.love;
    document.getElementById('dollTitle').innerText = getTitleByLove(doll.love);

    const img = document.getElementById('dollImage');
    const placeholder = document.getElementById('placeholder');
    img.src = doll.image;
    img.style.display = 'block';
    placeholder.style.display = 'none';
    document.getElementById('stage').classList.add('has-img');

    // 切換底部 active 樣式
    document.querySelectorAll('.gallery-card').forEach(c => c.classList.remove('active'));
    const currentCard = document.getElementById(`slide_${id}`);
    if (currentCard) currentCard.classList.add('active');
}

function getTitleByLove(love) {
    if (love < 50) return "素昧平生";
    if (love < 200) return "略有默契 🌸";
    if (love < 600) return "情同手足 🧸";
    if (love < 1500) return "掌上明珠 ✨";
    return "💖 靈魂伴侶 💖";
}

function setTool(toolName, cEmoji, pEmoji, btn) {
    currentTool = toolName;
    cursorEmoji = cEmoji;
    particleEmoji = pEmoji;
    
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('customCursor').innerText = cEmoji;
}

const stage = document.getElementById('stage');
const customCursor = document.getElementById('customCursor');
let lastSpawn = 0;

function handleStageMove(e) {
    if (!activeDollId) return;

    customCursor.style.display = 'block';
    customCursor.style.left = e.clientX + 'px';
    customCursor.style.top = e.clientY + 'px';

    const now = Date.now();
    if (now - lastSpawn > 60) {
        if (e.target === document.getElementById('dollImage')) {
            spawnParticle(e);
            addLove(1);
            animateDoll();
            lastSpawn = now;
        }
    }
}

function handleStageClick(e) {
    if (!activeDollId) return;
    spawnParticle(e);
    addLove(5);
    animateDoll();
}

stage.addEventListener('mouseleave', () => {
    customCursor.style.display = 'none';
});

function addLove(amount) {
    const doll = dolls.find(d => d.id === activeDollId);
    if (!doll) return;

    doll.love += amount;
    
    // 同步左邊
    document.getElementById('dollLove').innerText = doll.love;
    document.getElementById('dollTitle').innerText = getTitleByLove(doll.love);
    
    // 同步底部橫向卡片
    const slideCard = document.getElementById(`slide_${activeDollId}`);
    if (slideCard) {
        slideCard.querySelector('.love-num').innerText = doll.love;
        slideCard.querySelector('.gallery-desc').innerText = `${getTitleByLove(doll.love)} · ${doll.desc}`;
    }
    
    saveToStorage();
}

function spawnParticle(e) {
    const rect = stage.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const el = document.createElement('div');
    el.className = 'click-emoji';
    el.innerText = particleEmoji;
    el.style.left = `${x}px`;
    el.style.top = `${y}px`;

    const rx = (Math.random() - 0.5) * 180 + 'px';
    const ry = (-80 - Math.random() * 120) + 'px';
    const rr = (Math.random() - 0.5) * 90 + 'deg';

    el.style.setProperty('--x', rx);
    el.style.setProperty('--y', ry);
    el.style.setProperty('--r', rr);

    stage.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
}

function animateDoll() {
    const img = document.getElementById('dollImage');
    img.className = ''; 
    void img.offsetWidth; // 刷網頁重繪魔法
    
    if (currentTool === 'stroke') {
        img.classList.add('ani-stroke');
    } else if (currentTool === 'bath') {
        img.classList.add('ani-bath');
    } else if (currentTool === 'feed') {
        img.classList.add('ani-feed');
    } else if (currentTool === 'poke') {
        img.classList.add('ani-poke');
    }
}
</script>
</body>
</html>
