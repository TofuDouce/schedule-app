<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>✦ 萌物專屬・多娃養成觀測站 ✦</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght=500;700&family=Zen+Maru+Gothic:wght=500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg-base:#fff9f6;
    --bg-gradient:#ffebe3;
    --card-bg:#ffffff;
    --text-main:#54433a;
    --text-sub:#8e7a70;
    --gold:#f6c86c;
    --gold-hover:#efb94d;
    --pink:#f79999;
    --line:#eadfd8;
    --base-font-size:20px;
}

body{
    min-height:100vh;
    background:linear-gradient(180deg, var(--bg-base) 0%, var(--bg-gradient) 100%);
    font-family: "Zen Maru Gothic", "Quicksand", "Microsoft JhengHei", sans-serif;
    color:var(--text-main);
    padding:28px;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.decor-border{
    position:fixed;
    inset:12px;
    border:2px dashed rgba(142,122,112,0.15);
    border-radius:24px;
    pointer-events:none;
}

.container{
    width:100%;
    max-width:1200px;
    position:relative;
    z-index:2;
}

.topbar{
    display:flex;
    justify-content:flex-end;
    gap:8px;
    margin-bottom:18px;
}

.top-btn{
    border:none;
    background:white;
    border:1px solid rgba(142,122,112,0.18);
    color:var(--text-main);
    padding:8px 16px;
    border-radius:999px;
    cursor:pointer;
    font-family:inherit;
    font-size:15px;
    font-weight:700;
    transition:0.2s;
}

.top-btn:hover{
    background:#fff4ec;
    border-color:var(--gold);
}

.hero{
    text-align:center;
    margin-bottom:28px;
}

.badge{
    display:inline-block;
    background:rgba(246,200,108,0.18);
    color:#b57d18;
    padding:7px 16px;
    border-radius:999px;
    font-size:15px;
    font-weight:700;
    margin-bottom:14px;
}

.title{
    font-size:clamp(34px,5vw,50px);
    line-height:1.4;
    letter-spacing:1px;
}

.subtitle{
    margin-top:10px;
    color:var(--text-sub);
    font-size:16px;
}

.layout{
    display:grid;
    grid-template-columns:1fr;
    gap:24px;
}

@media(min-width:900px){
    .layout{
        grid-template-columns:1.2fr 0.8fr;
    }
}

.card{
    background:var(--card-bg);
    border-radius:28px;
    border:1px solid rgba(142,122,112,0.1);
    padding:30px;
    box-shadow: 0 10px 30px rgba(84,67,58,0.05);
}

.section-title{
    font-size:24px;
    margin-bottom:18px;
}

.section-desc{
    color:var(--text-sub);
    line-height:1.8;
    margin-bottom:22px;
}

/* 互動舞台相關 */
.stage-container {
    position: relative;
    width: 100%;
}

.stage-wrapper {
    position: relative;
    width: 100%;
    background: #fffcfb;
    border: 2px dashed rgba(142,122,112,0.2);
    border-radius: 20px;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 400px;
    margin-bottom: 20px;
}

.stage-wrapper.has-img {
    cursor: none; /* 有圖片時隱藏原生滑鼠 */
}

.upload-placeholder {
    text-align: center;
    color: var(--text-sub);
    pointer-events: none;
}

#dollImage {
    max-width: 85%;
    max-height: 380px;
    object-fit: contain;
    pointer-events: none;
    display: none;
    transform-origin: center bottom;
}

/* 實體道具跟隨游標 */
.custom-cursor {
    position: fixed;
    top: 0;
    left: 0;
    font-size: 42px;
    pointer-events: none;
    z-index: 9999;
    display: none;
    transform: translate(-50%, -50%);
    user-select: none;
}

/* 噴出的粒子動效 */
.click-emoji {
    position: absolute;
    font-size: 32px;
    pointer-events: none;
    z-index: 10;
    animation: floatUp 0.7s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
}

@keyframes floatUp {
    0% { transform: translate(-50%, -50%) scale(0.4); opacity: 1; }
    100% { transform: translate(var(--x), var(--y)) scale(1.3) rotate(var(--r)); opacity: 0; }
}

/* 道具包工具列樣式 */
.tool-selector {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 18px;
}

.tool-btn {
    background: #fffaf7;
    border: 1.5px solid rgba(142,122,112,0.16);
    border-radius: 16px;
    padding: 12px 6px;
    font-size: 20px;
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    font-family: inherit;
    font-weight: 700;
}

.tool-btn span {
    font-size: 12px;
    color: var(--text-sub);
}

.tool-btn:hover {
    background: #fff4ec;
    border-color: var(--gold);
}

.tool-btn.active {
    background: #fff4ec;
    border-color: var(--gold);
    box-shadow: 0 0 0 4px rgba(246,200,108,0.3);
}

/* 表單與輸入 */
.input-group { margin-bottom: 14px; }
.label { display: block; margin-bottom: 6px; font-weight: 700; font-size: 15px; }
.input { width: 100%; padding: 12px 14px; border-radius: 14px; border: 1.5px solid rgba(142,122,112,0.16); background: #fffbf9; color: var(--text-main); font-size: 15px; font-family: inherit; }
.input:focus { outline: none; border-color: var(--gold); background: white; box-shadow: 0 0 0 4px rgba(246,200,108,0.2); }
.file-btn { background: #4d4038; color: white; padding: 12px; border-radius: 14px; cursor: pointer; text-align: center; font-size: 14px; font-weight: 700; display: block; margin-top: 6px; }

/* 娃娃列表卡片 */
.list { display: flex; flex-direction: column; gap: 12px; max-height: 400px; overflow-y: auto; padding-right: 4px; }
.list-item { background: #fffcfb; border: 1px solid rgba(142,122,112,0.08); border-radius: 16px; padding: 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s; position: relative; }
.list-item:hover { border-color: var(--gold); background: #fffbf9; }
.list-item.active { border-color: var(--pink); background: #fff6f7; box-shadow: 0 4px 12px rgba(247,153,153,0.15); }
.list-thumb { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; background: #eee; }
.list-info { flex: 1; }
.list-item-title { font-weight: 700; font-size: 16px; display: flex; align-items: center; gap: 6px; }
.list-item-text { color: var(--text-sub); font-size: 13px; margin-top: 2px; }
.delete-btn { background: none; border: none; color: var(--pink); font-size: 18px; cursor: pointer; padding: 4px; position: absolute; right: 12px; top: 12px; z-index: 5; }
.delete-btn:hover { transform: scale(1.1); }

/* 狀態面板 */
.status-bar {
    background: #fffaf7;
    border-radius: 16px;
    padding: 14px;
    margin-bottom: 18px;
    border: 1px solid rgba(142,122,112,0.1);
}
.status-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 14px; }
.status-val { font-weight: 700; color: var(--pink); }

.main-btn { width: 100%; border: none; background: var(--gold); color: var(--text-main); padding: 14px; border-radius: 16px; cursor: pointer; font-family: inherit; font-size: 16px; font-weight: 700; box-shadow: 0 6px 16px rgba(246,200,108,0.25); transition: 0.2s; }
.main-btn:hover { background: var(--gold-hover); transform: translateY(-2px); }
.footer { text-align: center; margin-top: 36px; color: var(--text-sub); font-size: 14px; }
.footer b { color: var(--pink); }
.watermark { position: fixed; right: 24px; bottom: 24px; color: rgba(142,122,112,0.4); font-size: 12px; letter-spacing: 0.5px; pointer-events: none; }
</style>
</head>

<body>

<div class="decor-border"></div>
<div class="watermark">Made with pastel thoughts by <b>ChuChu</b> ✦</div>

<div class="container">

    <div class="topbar">
        <button class="top-btn" onclick="adjustFontSize(-2)">A -</button>
        <button class="top-btn" onclick="adjustFontSize(0)">A</button>
        <button class="top-btn" onclick="adjustFontSize(2)">A +</button>
    </div>

    <div class="hero">
        <div class="badge">🌸 萌物多娃大世界 v2.0</div>
        <h1 class="title">我的娃娃養成觀測站</h1>
        <p class="subtitle">切換不同的魔法道具，親手撫摸、洗澡、餵食你最心愛的寶貝們吧！</p>
    </div>

    <div class="layout">

        <!-- LEFT: 核心互動大舞台 -->
        <div class="card">
            <h2 class="section-title" id="currentDollName">🔮 請選擇或新增一隻娃娃</h2>
            
            <div class="status-bar">
                <div class="status-row">
                    <span>👑 羈絆稱號：<b id="dollTitle" style="color: #b57d18;">無</b></span>
                    <span>💖 親密指數：<b id="dollLove" class="status-val">0</b></span>
                </div>
                <div class="status-row">
                    <span>💬 寶貝備註：<span id="dollDesc" style="color: var(--text-sub);">尚未選擇娃娃</span></span>
                </div>
            </div>

            <!-- 魔法道具包切換 -->
            <div class="tool-selector">
                <button class="tool-btn active" onclick="setTool('stroke', '🖐️', '💖', this)">🖐️<span>撫摸</span></button>
                <button class="tool-btn" onclick="setTool('bath', '🧼', '✨', this)">🧼<span>洗澡</span></button>
                <button class="tool-btn" onclick="setTool('feed', '🍼', '🥛', this)">🍼<span>餵奶</span></button>
                <button class="tool-btn" onclick="setTool('poke', '🥊', '💢', this)">🥊<span>輕敲</span></button>
            </div>

            <!-- 互動舞台 -->
            <div class="stage-container">
                <div class="stage-wrapper" id="stage" onmousemove="handleStageMove(event)" onmousedown="handleStageClick(event)">
                    <div class="upload-placeholder" id="placeholder">
                        <div style="font-size:48px;">🧸</div>
                        <p>目前沒有正在互動的娃娃<br>請在右側選擇或新增一隻唷！</p>
                    </div>
                    <img id="dollImage" src="" alt="娃娃本體">
                </div>
            </div>
        </div>

        <!-- RIGHT: 新增娃娃與收藏清單 -->
        <div class="card">
            <h2 class="section-title">✨ 召喚新夥伴</h2>
            
            <div class="input-group">
                <label class="label">娃娃名字</label>
                <input class="input" type="text" id="newName" placeholder="例如：阿熊隊長、努Ki...">
            </div>

            <div class="input-group">
                <label class="label">類別 / 備註</label>
                <input class="input" type="text" id="newDesc" placeholder="例如：10cm棉花娃 / 超級傲嬌">
            </div>

            <div class="input-group">
                <label class="label">上傳照片</label>
                <label for="fileInput" class="file-btn">📸 選擇相簿照片</label>
                <input type="file" id="fileInput" accept="image/*" onchange="previewImage(this)">
                <div id="uploadStatus" style="font-size: 13px; color: var(--pink); margin-top: 6px; display: none; font-weight: bold;">✓ 照片已就緒</div>
            </div>

            <button class="main-btn" onclick="addDoll()">✦ 收入收藏大帳本 ✦</button>

            <hr style="border: none; border-top: 1px dashed var(--line); margin: 20px 0;">

            <h2 class="section-title">🧸 我的娃娃大軍 (<span id="dollCount">0</span>)</h2>
            <div class="list" id="dollList">
                <!-- 娃娃清單會動態生成在這邊 -->
            </div>
        </div>

    </div>

    <div class="footer">
        <div>✦ Pastel Minimal Doll Diary ✦</div>
        <div>Designed by <b>ChuChu</b> © 2026</div>
    </div>
</div>

<!-- 實體道具跟隨游標 -->
<div class="custom-cursor" id="customCursor">🖐️</div>

<script>
// 養成系統全域變數
let dolls = [];
let activeDollId = null;
let currentTool = 'stroke';
let cursorEmoji = '🖐️';
let particleEmoji = '💖';
let tempImgBase64 = "";

// 載入 localStorage 資料
window.onload = function() {
    const savedDolls = localStorage.getItem('pastel_dolls');
    if (savedDolls) {
        dolls = JSON.parse(savedDolls);
        renderDollList();
        if (dolls.length > 0) {
            selectDoll(dolls[0].id);
        }
    }
};

// 儲存至 localStorage
function saveToStorage() {
    localStorage.setItem('pastel_dolls', JSON.stringify(dolls));
}

// 預覽與暫存圖片
function previewImage(input) {
    const file = input.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            tempImgBase64 = e.target.result;
            document.getElementById('uploadStatus').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }
}

// 新增一隻娃娃
function addDoll() {
    const nameInput = document.getElementById('newName');
    const descInput = document.getElementById('newDesc');
    
    if (!nameInput.value.trim()) {
        alert("請幫娃娃取個名字嘛 🌸");
        return;
    }
    if (!tempImgBase64) {
        alert("請上傳一張娃娃的照片唷 📸");
        return;
    }

    const newDoll = {
        id: 'doll_' + Date.now(),
        name: nameInput.value.trim(),
        desc: descInput.value.trim() || "尚無備註",
        image: tempImgBase64,
        love: 0
    };

    dolls.push(newDoll);
    saveToStorage();
    renderDollList();
    selectDoll(newDoll.id);

    // 清空表單
    nameInput.value = "";
    descInput.value = "";
    tempImgBase64 = "";
    document.getElementById('fileInput').value = "";
    document.getElementById('uploadStatus').style.display = 'none';
}

// 刪除娃娃
function deleteDoll(id, event) {
    event.stopPropagation(); // 防止觸發選擇娃娃
    if (!confirm("確定要讓這隻娃娃離開你的大帳本嗎？🥺")) return;
    
    dolls = dolls.filter(d => d.id !== id);
    saveToStorage();
    renderDollList();

    if (activeDollId === id) {
        if (dolls.length > 0) {
            selectDoll(dolls[0].id);
        } else {
            activeDollId = null;
            document.getElementById('dollImage').style.display = 'none';
            document.getElementById('placeholder').style.display = 'block';
            document.getElementById('stage').classList.remove('has-img');
            document.getElementById('currentDollName').innerText = "🔮 請選擇或新增一隻娃娃";
            document.getElementById('dollTitle').innerText = "無";
            document.getElementById('dollLove').innerText = "0";
            document.getElementById('dollDesc').innerText = "尚未選擇娃娃";
        }
    }
}

// 渲染右側列表
function renderDollList() {
    const listContainer = document.getElementById('dollList');
    document.getElementById('dollCount').innerText = dolls.length;
    listContainer.innerHTML = "";

    dolls.forEach(doll => {
        const titleText = getTitleByLove(doll.love);
        const item = document.createElement('div');
        item.className = `list-item ${doll.id === activeDollId ? 'active' : ''}`;
        item.onclick = () => selectDoll(doll.id);

        item.innerHTML = `
            <img src="${doll.image}" class="list-thumb">
            <div class="list-info">
                <div class="list-item-title">${doll.name} <span style="font-size:11px; background:rgba(247,153,153,0.15); color:var(--pink); padding:2px 6px; border-radius:99px;">${titleText}</span></div>
                <div class="list-item-text">💖 親密：${doll.love} | ${doll.desc}</div>
            </div>
            <button class="delete-btn" onclick="deleteDoll('${doll.id}', event)">🗑️</button>
        `;
        listContainer.appendChild(item);
    });
}

// 選擇某隻娃娃進入舞台
function selectDoll(id) {
    activeDollId = id;
    const doll = dolls.find(d => d.id === id);
    if (!doll) return;

    // 更新左側舞台資訊
    document.getElementById('currentDollName').innerText = `🧸 正在與「${doll.name}」互動中`;
    document.getElementById('dollDesc').innerText = doll.desc;
    document.getElementById('dollLove').innerText = doll.love;
    document.getElementById('dollTitle').innerText = getTitleByLove(doll.love);

    const img = document.getElementById('dollImage');
    const placeholder = document.getElementById('placeholder');
    img.src = doll.image;
    img.style.display = 'block';
    placeholder.style.display = 'none';
    document.getElementById('stage').classList.add('has-img');

    // 刷新列表高亮
    document.querySelectorAll('.list-item').forEach(item => item.classList.remove('active'));
    renderDollList();
}

// 依據親密度計算稱號
function getTitleByLove(love) {
    if (love < 50) return "素昧平生";
    if (love < 200) return "略有默契 🌸";
    if (love < 600) return "情同手足 🧸";
    if (love < 1500) return "掌上明珠 ✨";
    return "💖 靈魂伴侶 💖";
}

// 切換道具
function setTool(toolName, cEmoji, pEmoji, btn) {
    currentTool = toolName;
    cursorEmoji = cEmoji;
    particleEmoji = pEmoji;
    
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('customCursor').innerText = cEmoji;
}

// 舞台上滑鼠移動動效
const stage = document.getElementById('stage');
const customCursor = document.getElementById('customCursor');
let lastSpawn = 0;

function handleStageMove(e) {
    if (!activeDollId) return;

    // 實體道具跟隨滑鼠
    customCursor.style.display = 'block';
    customCursor.style.left = e.clientX + 'px';
    customCursor.style.top = e.clientY + 'px';

    // 滑動刷親密感
    const now = Date.now();
    if (now - lastSpawn > 60) {
        if (e.target === document.getElementById('dollImage')) {
            spawnParticle(e);
            addLove(1);
            animateDoll();
            lastSpawn = now;
        }
    }
}

function handleStageClick(e) {
    if (!activeDollId) return;
    spawnParticle(e);
    addLove(3); // 點擊加更多親密值！
    animateDoll();
}

// 離開舞台隱藏道具
stage.addEventListener('mouseleave', () => {
    customCursor.style.display = 'none';
});

// 增加親密度
function addLove(amount) {
    const doll = dolls.find(d => d.id === activeDollId);
    if (!doll) return;

    doll.love += amount;
    document.getElementById('dollLove').innerText = doll.love;
    document.getElementById('dollTitle').innerText = getTitleByLove(doll.love);
    
    // 節流儲存，避免卡頓
    saveToStorage();
}

// 噴發粒子核心
function spawnParticle(e) {
    const rect = stage.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const el = document.createElement('div');
    el.className = 'click-emoji';
    el.innerText = particleEmoji;
    el.style.left = `${x}px`;
    el.style.top = `${y}px`;

    // 隨機彈道運動軌跡
    const rx = (Math.random() - 0.5) * 180 + 'px';
    const ry = (-80 - Math.random() * 120) + 'px';
    const rr = (Math.random() - 0.5) * 80 + 'deg';

    el.style.setProperty('--x', rx);
    el.style.setProperty('--y', ry);
    el.style.setProperty('--r', rr);

    stage.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
}

// 依據不同道具，娃娃產生截然不同的「神經病反饋動畫」
function animateDoll() {
    const img = document.getElementById('dollImage');
    
    if (currentTool === 'stroke') {
        // 撫摸：左右溫柔晃動、害羞縮放
        const rot = (Math.random() - 0.5) * 6;
        img.style.transform = `scale(0.96, 1.04) rotate(${rot}deg)`;
    } else if (currentTool === 'bath') {
        // 洗澡：上下舒服浮動
        img.style.transform = `translateY(-15px) scale(1)`;
    } else if (currentTool === 'feed') {
        // 餵奶：開心地長大一下下
        img.style.transform = `scale(1.08)`;
    } else if (currentTool === 'poke') {
        // 輕敲：劇烈左右晃動（被揍了）
        const rot = (Math.random() - 0.5) * 20;
        img.style.transform = `translateX(${(Math.random() - 0.5) * 15}px) rotate(${rot}deg)`;
    }

    setTimeout(() => {
        img.style.transform = 'scale(1) translate(0) rotate(0deg)';
    }, 120);
}

// 字體調整縮放
let currentSize = 20;
function adjustFontSize(modifier) {
    if (modifier === 0) currentSize = 20;
    else {
        currentSize += modifier;
        if (currentSize < 14) currentSize = 14;
        if (currentSize > 28) currentSize = 28;
    }
    document.body.style.fontSize = currentSize + 'px';
}
</script>
</body>
</html>
