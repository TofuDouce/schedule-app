<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>✦ 命運產生器 ✦</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg-base:#fff9f6;
    --bg-gradient:#ffebe3;

    --card-bg:#ffffff;

    --text-main:#54433a;
    --text-sub:#8e7a70;

    --gold:#f6c86c;
    --gold-hover:#efb94d;

    --pink:#f79999;
}

body{
    min-height:100vh;

    background:
    linear-gradient(
        180deg,
        var(--bg-base),
        var(--bg-gradient)
    );

    font-family:
    "Zen Maru Gothic",
    "Quicksand",
    sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:30px;

    color:var(--text-main);
}

.container{
    width:100%;
    max-width:900px;
}

.card{
    background:white;

    border-radius:32px;

    padding:35px;

    box-shadow:
    0 10px 30px rgba(0,0,0,0.05);
}

.hero{
    text-align:center;
    margin-bottom:30px;
}

.badge{
    display:inline-block;

    background:#fff2cf;

    color:#b88416;

    padding:8px 18px;

    border-radius:999px;

    font-size:14px;
    font-weight:700;

    margin-bottom:14px;
}

.title{
    font-size:42px;
    margin-bottom:10px;
}

.subtitle{
    color:var(--text-sub);
}

.input-group{
    margin-bottom:22px;
}

.label{
    display:block;
    margin-bottom:10px;
    font-weight:700;
}

.input{
    width:100%;

    padding:16px;

    border-radius:18px;

    border:1.5px solid #eee;

    background:#fffaf7;

    font-size:16px;

    font-family:inherit;
}

.input:focus{
    outline:none;

    border-color:var(--gold);
}

.main-btn{
    width:100%;

    border:none;

    background:var(--gold);

    color:#5a473b;

    padding:16px;

    border-radius:18px;

    font-size:17px;
    font-weight:700;

    cursor:pointer;

    transition:0.2s;
}

.main-btn:hover{
    background:var(--gold-hover);
    transform:translateY(-2px);
}

.result{
    margin-top:28px;

    background:#fffaf7;

    border-radius:24px;

    padding:24px;

    display:none;
}

.result.show{
    display:block;
}

.result-item{
    margin-bottom:18px;
}

.result-title{
    font-weight:700;
    margin-bottom:6px;

    color:#b88416;
}

.result-text{
    line-height:1.8;
    color:var(--text-sub);
}

.footer{
    margin-top:24px;
    text-align:center;

    color:#a18c80;
    font-size:13px;
}

</style>
</head>

<body>

<div class="container">

    <div class="card">

        <div class="hero">

            <div class="badge">
                ✦ Magical Fate Generator ✦
            </div>

            <h1 class="title">
                神秘命運產生器
            </h1>

            <div class="subtitle">
                今天的你會被什麼命運選中呢？
            </div>

        </div>

        <div class="input-group">
            <label class="label">
                輸入你的名字
            </label>

            <input
                id="nameInput"
                class="input"
                type="text"
                placeholder="請輸入名字..."
            >
        </div>

        <button class="main-btn" onclick="generateFate()">
            ✦ 開始占卜 ✦
        </button>

        <div class="result" id="result">

            <div class="result-item">
                <div class="result-title">
                    🌸 神秘稱號
                </div>

                <div class="result-text" id="titleText"></div>
            </div>

            <div class="result-item">
                <div class="result-title">
                    🎨 守護色
                </div>

                <div class="result-text" id="colorText"></div>
            </div>

            <div class="result-item">
                <div class="result-title">
                    ✨ 魔法道具
                </div>

                <div class="result-text" id="itemText"></div>
            </div>

            <div class="result-item">
                <div class="result-title">
                    🔮 今日命運
                </div>

                <div class="result-text" id="fateText"></div>
            </div>

            <div class="result-item">
                <div class="result-title">
                    ⭐ 稀有度
                </div>

                <div class="result-text" id="rareText"></div>
            </div>

        </div>

        <div class="footer">
            Designed with pastel magic ✦
        </div>

    </div>

</div>

<script>

const titles = [
    "月光魔女",
    "櫻花旅人",
    "深夜占星師",
    "銀霧精靈",
    "夢境收藏家",
    "命運觀測者",
    "祈願守護者"
];

const colors = [
    "奶油杏色",
    "霧粉櫻花",
    "銀月白",
    "暮光紫",
    "蜂蜜金",
    "星夜藍"
];

const items = [
    "會發光的羽毛筆",
    "古老月亮懷錶",
    "沉睡水晶球",
    "迷霧塔羅牌",
    "銀色貓咪吊墜",
    "夜空魔法書"
];

const fates = [
    "今天會遇見改變命運的小巧合。",
    "你的直覺將異常準確。",
    "某個人正在偷偷想念你。",
    "今晚適合許願。",
    "會收到意外的溫柔。",
    "今天有機率觸發神秘幸運事件。"
];

const rares = [
    "★★☆☆☆ 普通",
    "★★★☆☆ 稀有",
    "★★★★☆ 超稀有",
    "★★★★★ 傳說"
];

function random(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function generateFate(){

    const name =
    document.getElementById("nameInput").value;

    if(name.trim()===""){
        alert("請先輸入名字 ✦");
        return;
    }

    document.getElementById("result").classList.add("show");

    document.getElementById("titleText").innerText =
    `${name} 的稱號是「${random(titles)}」`;

    document.getElementById("colorText").innerText =
    random(colors);

    document.getElementById("itemText").innerText =
    random(items);

    document.getElementById("fateText").innerText =
    random(fates);

    document.getElementById("rareText").innerText =
    random(rares);
}

</script>

</body>
</html>
