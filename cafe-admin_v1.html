<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>小怪獸咖啡館 · 後台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F1E4; --dot:#E6DDC7;
  --card:#FFFCF3; --card-edge:#D9CDB0; --card-under:#DDE3CE;
  --ink:#453A28; --ink-soft:#8A7B5C; --ink-faint:#B6A886;
  --accent:#5F9E6E; --accent-dk:#477F58; --accent-pale:#E3EFDD;
  --on-accent:#FFFFFF; --input-bg:#FBF7EA;
  --danger:#D4826A; --danger-dk:#B36249;
  --scrim:#3A3223; --r:24px;
  --monster:#8C6FC6; --monster-dk:#6B4FA6; --monster-eye:#FFFDF6;
  --font:"Zen Maru Gothic",system-ui,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0;font-family:var(--font);background:var(--bg);color:var(--ink);
  line-height:1.7;min-height:100svh;
  background-image:radial-gradient(var(--dot) 1.5px,transparent 1.5px);
  background-size:22px 22px;
  padding:18px 13px calc(40px + env(safe-area-inset-bottom));
}
.wrap{max-width:600px;margin:0 auto}
.card{
  background:var(--card);border:2px solid var(--card-edge);border-radius:var(--r);
  box-shadow:0 6px 0 var(--card-under);padding:18px;margin-bottom:14px;
}
.bar{display:flex;align-items:center;gap:11px}
.monster{width:44px;height:39px;flex:0 0 auto;position:relative;background:var(--monster);border-radius:22px 22px 18px 18px;box-shadow:0 3px 0 var(--monster-dk)}
.monster i{position:absolute;top:14px;width:8px;height:8px;background:var(--monster-eye);border-radius:50%}
.monster i:nth-child(1){left:9px} .monster i:nth-child(2){right:9px}
.monster b{position:absolute;bottom:9px;left:50%;transform:translateX(-50%);width:13px;height:6px;border-radius:0 0 9px 9px;background:var(--monster-eye)}
h1{font-size:17px;font-weight:900;margin:0}
.sub{font-size:12.5px;color:var(--ink-soft);margin:0}
button{font-family:var(--font);font-weight:700;cursor:pointer;border:0}
.btn{
  background:var(--accent);color:var(--on-accent);font-size:15px;
  border-radius:99px;padding:12px 20px;box-shadow:0 4px 0 var(--accent-dk);
}
.btn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--accent-dk)}
.btn:disabled{background:var(--card-edge);box-shadow:0 4px 0 var(--ink-faint);cursor:not-allowed}
.btn.wide{width:100%}
.btn.ghost{background:var(--card);color:var(--ink-soft);border:2px solid var(--card-edge);box-shadow:none;font-size:13.5px;padding:9px 16px}
.btn.warn{background:var(--danger);box-shadow:0 4px 0 var(--danger-dk)}
.btn.sm{font-size:13px;padding:8px 14px;box-shadow:0 3px 0 var(--accent-dk)}
label{display:block;font-weight:700;font-size:14px;margin:14px 0 6px}
input[type=text],textarea,select{
  width:100%;font-family:var(--font);font-size:15px;color:var(--ink);
  background:var(--input-bg);border:2px solid var(--card-edge);
  border-radius:14px;padding:11px 13px;
}
textarea{min-height:70px;resize:vertical;line-height:1.6}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.row .btn{flex:1;min-width:120px}
.toggles{display:flex;gap:10px;margin-top:16px}
.tg{
  flex:1;text-align:center;background:var(--input-bg);border:2px solid var(--card-edge);
  border-radius:16px;padding:11px 6px;font-size:14px;font-weight:700;color:var(--ink-soft);cursor:pointer;
}
.tg.on{background:var(--accent-pale);border-color:var(--accent);color:var(--accent-dk)}
.tg small{display:block;font-weight:500;font-size:11.5px;color:var(--ink-faint)}
.file{
  display:block;text-align:center;background:var(--input-bg);
  border:2px dashed var(--card-edge);border-radius:16px;padding:18px 12px;
  font-size:14.5px;font-weight:700;color:var(--accent-dk);cursor:pointer;
}
.file input{display:none}
.meter{font-size:12.5px;color:var(--ink-soft);text-align:center;margin-top:8px}
.meter.bad{color:var(--danger-dk);font-weight:700}
.item{
  display:flex;align-items:center;gap:11px;padding:13px 0;
  border-bottom:1px dashed var(--card-edge);
}
.item:last-child{border-bottom:0}
.item .info{flex:1;min-width:0}
.item .nm{font-weight:700;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item .mt{font-size:12px;color:var(--ink-faint)}
.pill{
  display:inline-block;font-size:11px;font-weight:700;padding:1px 9px;border-radius:99px;
  background:var(--accent-pale);color:var(--accent-dk);margin-right:5px;
}
.pill.lock{background:#EFE6FA;color:var(--monster-dk)}
.empty{text-align:center;color:var(--ink-faint);font-size:14px;padding:26px 0}
#err{display:none;background:#FBEAE4;border:2px solid var(--danger);color:var(--danger-dk);border-radius:16px;padding:12px 14px;font-size:13.5px;margin-bottom:14px}
#ok{display:none;background:var(--accent-pale);border:2px solid var(--accent);color:var(--accent-dk);border-radius:16px;padding:11px 14px;font-size:13.5px;margin-bottom:14px;text-align:center;font-weight:700}
.hide{display:none!important}
#modal{
  position:fixed;inset:0;background:rgba(58,50,35,.82);z-index:50;
  display:none;flex-direction:column;padding:calc(14px + env(safe-area-inset-top)) 10px calc(14px + env(safe-area-inset-bottom));
}
#modal.on{display:flex}
#modal iframe{flex:1;width:100%;border:0;border-radius:18px;background:#fff}
#modal .top{display:flex;gap:10px;margin-bottom:10px}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

  <div class="card bar">
    <div class="monster"><i></i><i></i><b></b></div>
    <div style="flex:1;min-width:0">
      <h1>咖啡館後台</h1>
      <p class="sub" id="who">尚未登入</p>
    </div>
    <button class="btn ghost hide" id="btnOut">登出</button>
  </div>

  <div id="err"></div>
  <div id="ok"></div>

  <!-- 登入 -->
  <div class="card" id="gate">
    <p style="margin:0 0 4px;font-size:14.5px">只有老闆能進來。</p>
    <button class="btn wide" id="btnIn">用 Google 登入</button>
  </div>

  <!-- 清單 -->
  <div class="card hide" id="listCard">
    <button class="btn wide" id="btnNew">收一件新作品</button>
    <div id="list"><div class="empty">載入中⋯⋯</div></div>
  </div>

  <!-- 編輯 -->
  <div class="card hide" id="editCard">
    <h1 id="edTitle">收一件新作品</h1>

    <label for="fName">名稱</label>
    <input type="text" id="fName" placeholder="小怪獸咖啡館">

    <label for="fDesc">一句話說明</label>
    <textarea id="fDesc" placeholder="把積木跟糖果罐合在一起的網站產生器"></textarea>

    <label for="fCat">分類</label>
    <select id="fCat">
      <option>模擬器</option>
      <option>小說</option>
      <option>網站工具</option>
      <option>日常工具</option>
      <option>實驗性質</option>
      <option>其他</option>
    </select>

    <label>程式碼</label>
    <label class="file">
      選一個 HTML 檔
      <input type="file" id="fFile" accept=".html,.htm,text/html">
    </label>
    <div class="meter" id="meter">還沒有程式碼</div>

    <div class="toggles">
      <div class="tg on" id="tgPub" data-v="pub">公開<small>大家看得到</small></div>
      <div class="tg" id="tgLock" data-v="lock">加鎖<small>只有你看得到</small></div>
    </div>
    <div class="toggles">
      <div class="tg" id="tgPin">釘選在最前面</div>
    </div>

    <div class="row">
      <button class="btn" id="btnSave">儲存</button>
      <button class="btn ghost" id="btnPrev">預覽</button>
    </div>
    <div class="row">
      <button class="btn ghost" id="btnDown">下載原始碼</button>
      <button class="btn ghost" id="btnCancel">取消</button>
    </div>
    <div class="row">
      <button class="btn warn wide hide" id="btnDel">刪掉這件作品</button>
    </div>
  </div>

</div>

<div id="modal">
  <div class="top">
    <button class="btn sm" id="btnClose">關閉預覽</button>
  </div>
  <iframe id="pv" sandbox="allow-scripts allow-same-origin allow-modals allow-popups"></iframe>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getFirestore, collection, doc, getDoc, getDocs, setDoc, deleteDoc }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyC4oq_W36ji4o6p7p2JxLS2FKc-gITFJ4I",
  authDomain: "monster-cafe-79d56.firebaseapp.com",
  projectId: "monster-cafe-79d56",
  storageBucket: "monster-cafe-79d56.firebasestorage.app",
  messagingSenderId: "327222778800",
  appId: "1:327222778800:web:a38e81d92c8def3621d475"
};
const OWNER = 'CbBcZ01ymNQou4X6HMfNMtEgXRl2';
const MAX = 900000;

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const $ = id => document.getElementById(id);
const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function err(msg){ $('err').textContent = msg; $('err').style.display = 'block'; window.scrollTo({top:0,behavior:'smooth'}); }
function clearErr(){ $('err').style.display = 'none'; }
function ok(msg){ const e = $('ok'); e.textContent = msg; e.style.display = 'block'; setTimeout(() => { e.style.display = 'none'; }, 2600); }

function friendly(e){
  const c = (e && e.code) || '';
  if(c.includes('permission-denied')) return '權限被擋下來了。請確認 Firebase 規則已經發布，而且裡面的 UID 沒打錯。';
  if(c.includes('unauthorized-domain')) return '這個網域還沒授權。請到 Firebase → Authentication → 設定 → 已授權網域，加入 tofudouce.github.io。';
  if(c.includes('popup-blocked')) return '彈出視窗被擋住了。網址列左邊「ᴀA」→ 網站設定 → 允許彈出式視窗。';
  if(c.includes('popup-closed')) return '登入視窗被關掉了，再按一次就好。';
  if(c.includes('unavailable')) return '連不上資料庫，請檢查網路後再試。';
  return '出錯了：' + ((e && e.message) || e);
}

// 狀態
let cur = null;      // 正在編輯的作品
let code = '';       // 目前的程式碼
let works = [];

// 登入
$('btnIn').addEventListener('click', async () => {
  clearErr();
  try{ await signInWithPopup(auth, new GoogleAuthProvider()); }
  catch(e){ err(friendly(e)); }
});
$('btnOut').addEventListener('click', () => signOut(auth));

onAuthStateChanged(auth, async user => {
  if(!user){
    $('who').textContent = '尚未登入';
    $('gate').classList.remove('hide');
    $('btnOut').classList.add('hide');
    $('listCard').classList.add('hide');
    $('editCard').classList.add('hide');
    return;
  }
  if(user.uid !== OWNER){
    $('who').textContent = '這個帳號不是老闆';
    err('登入的帳號不是老闆本人，看不到後台。請登出換一個帳號。');
    $('btnOut').classList.remove('hide');
    $('gate').classList.add('hide');
    return;
  }
  $('who').textContent = user.displayName + '，歡迎回來';
  $('gate').classList.add('hide');
  $('btnOut').classList.remove('hide');
  $('listCard').classList.remove('hide');
  await loadList();
});

// 清單
async function loadList(){
  clearErr();
  works = [];
  try{
    for(const coll of ['posts_public','posts_private']){
      const snap = await getDocs(collection(db, coll));
      snap.forEach(d => works.push(Object.assign({ id:d.id, coll }, d.data())));
    }
  }catch(e){ err(friendly(e)); return; }

  works.sort((a,b) => (b.pinned?1:0) - (a.pinned?1:0) || (b.updated||0) - (a.updated||0));

  if(!works.length){
    $('list').innerHTML = '<div class="empty">架上還空著。按上面那顆按鈕收第一件作品。</div>';
    return;
  }
  $('list').innerHTML = works.map((w, i) =>
    '<div class="item">' +
      '<div class="info">' +
        '<div class="nm">' + (w.pinned ? '★ ' : '') + esc(w.name) + '</div>' +
        '<div class="mt">' +
          '<span class="pill' + (w.coll === 'posts_private' ? ' lock' : '') + '">' +
          (w.coll === 'posts_private' ? '加鎖' : '公開') + '</span>' +
          esc(w.cat) + '　' + Math.round((w.size || 0)/1024) + ' KB' +
        '</div>' +
      '</div>' +
      '<button class="btn sm" data-i="' + i + '">編輯</button>' +
    '</div>'
  ).join('');
  $('list').querySelectorAll('button[data-i]').forEach(b => {
    b.addEventListener('click', () => openEdit(works[+b.dataset.i]));
  });
}

// 編輯
function setMeter(){
  const m = $('meter');
  if(!code){ m.textContent = '還沒有程式碼'; m.classList.remove('bad'); return; }
  const kb = new Blob([code]).size;
  m.textContent = '目前 ' + Math.round(kb/1024) + ' KB';
  m.classList.toggle('bad', kb > MAX);
  if(kb > MAX) m.textContent += '　太大了，上限 880 KB';
}
function setLock(isLock){
  $('tgPub').classList.toggle('on', !isLock);
  $('tgLock').classList.toggle('on', isLock);
}
$('tgPub').addEventListener('click', () => setLock(false));
$('tgLock').addEventListener('click', () => setLock(true));
$('tgPin').addEventListener('click', e => e.currentTarget.classList.toggle('on'));

$('btnNew').addEventListener('click', () => {
  cur = null; code = '';
  $('edTitle').textContent = '收一件新作品';
  $('fName').value = ''; $('fDesc').value = ''; $('fCat').value = '模擬器';
  $('fFile').value = '';
  setLock(false);
  $('tgPin').classList.remove('on');
  setMeter();
  $('btnDel').classList.add('hide');
  $('listCard').classList.add('hide');
  $('editCard').classList.remove('hide');
  window.scrollTo({top:0,behavior:'smooth'});
});

async function openEdit(w){
  clearErr();
  cur = w; code = '';
  $('edTitle').textContent = '編輯作品';
  $('fName').value = w.name || '';
  $('fDesc').value = w.desc || '';
  $('fCat').value = w.cat || '其他';
  $('fFile').value = '';
  setLock(w.coll === 'posts_private');
  $('tgPin').classList.toggle('on', !!w.pinned);
  $('meter').textContent = '讀取程式碼中⋯⋯';
  $('btnDel').classList.remove('hide');
  $('listCard').classList.add('hide');
  $('editCard').classList.remove('hide');
  window.scrollTo({top:0,behavior:'smooth'});
  try{
    const snap = await getDoc(doc(db, w.coll, w.id, 'blob', 'source'));
    code = snap.exists() ? (snap.data().code || '') : '';
  }catch(e){ err(friendly(e)); }
  setMeter();
}

$('fFile').addEventListener('change', e => {
  const f = e.target.files && e.target.files[0];
  if(!f) return;
  const r = new FileReader();
  r.onload = () => {
    code = r.result;
    if(!$('fName').value) $('fName').value = f.name.replace(/\.html?$/i, '');
    setMeter();
  };
  r.onerror = () => err('這個檔案讀不起來，換一個試試。');
  r.readAsText(f, 'utf-8');
});

$('btnSave').addEventListener('click', async () => {
  clearErr();
  const name = $('fName').value.trim();
  if(!name){ err('先給它一個名稱。'); return; }
  if(!code){ err('還沒選程式碼檔案。'); return; }
  const size = new Blob([code]).size;
  if(size > MAX){ err('這個檔案 ' + Math.round(size/1024) + ' KB，超過 880 KB 的上限，存不進去。'); return; }

  const isLock = $('tgLock').classList.contains('on');
  const coll = isLock ? 'posts_private' : 'posts_public';
  const id = cur ? cur.id : (Date.now().toString(36) + Math.random().toString(36).slice(2, 7));

  const btn = $('btnSave');
  btn.disabled = true; btn.textContent = '儲存中⋯⋯';
  try{
    await setDoc(doc(db, coll, id), {
      name,
      desc: $('fDesc').value.trim(),
      cat: $('fCat').value,
      pinned: $('tgPin').classList.contains('on'),
      size,
      updated: Date.now()
    });
    await setDoc(doc(db, coll, id, 'blob', 'source'), { code });

    // 換過公開加鎖，把舊的那份清掉
    if(cur && cur.coll !== coll){
      await deleteDoc(doc(db, cur.coll, cur.id, 'blob', 'source'));
      await deleteDoc(doc(db, cur.coll, cur.id));
    }
    backToList();
    ok('已收進架上');
  }catch(e){
    err(friendly(e));
  }finally{
    btn.disabled = false; btn.textContent = '儲存';
  }
});

$('btnDel').addEventListener('click', async () => {
  if(!cur) return;
  if(!confirm('「' + cur.name + '」會被永久刪掉，包含程式碼。確定嗎？')) return;
  clearErr();
  try{
    await deleteDoc(doc(db, cur.coll, cur.id, 'blob', 'source'));
    await deleteDoc(doc(db, cur.coll, cur.id));
    backToList();
    ok('已經刪掉了');
  }catch(e){ err(friendly(e)); }
});

$('btnPrev').addEventListener('click', () => {
  if(!code){ err('還沒有程式碼可以預覽。'); return; }
  $('pv').srcdoc = code;
  $('modal').classList.add('on');
});
$('btnClose').addEventListener('click', () => {
  $('modal').classList.remove('on');
  $('pv').srcdoc = '';
});

$('btnDown').addEventListener('click', () => {
  if(!code){ err('還沒有程式碼可以下載。'); return; }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([code], { type:'text/html' }));
  a.download = (($('fName').value.trim() || 'work')) + '.html';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 4000);
});

$('btnCancel').addEventListener('click', backToList);

function backToList(){
  cur = null; code = '';
  $('editCard').classList.add('hide');
  $('listCard').classList.remove('hide');
  loadList();
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
