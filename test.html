<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✦ 太極鰲車輪餅．美味結算工坊 by ChuChu ✦</title>

    <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
    <meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet,noimageindex">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            transition:font-size .2s ease,transform .2s ease;
        }

        :root{
            --bg-base:#fff9f6;
            --bg-gradient-end:#ffebe3;
            --card-bg:#ffffff;
            --text-main:#54433a;
            --text-sub:#8e7a70;
            --flavor-bg:#fffbf9;
            --butter-gold:#f6c86c;
            --butter-gold-hover:#f3b946;
            --berry-pink:#f79999;
            --base-font-size:16px;
        }

        body{
            min-height:100vh;
            color:var(--text-main);
            font-family:"Zen Maru Gothic","Quicksand","Microsoft JhengHei",sans-serif;
            background:linear-gradient(180deg,var(--bg-base) 0%,var(--bg-gradient-end) 100%);
            padding:24px;
            display:flex;
            align-items:center;
            justify-content:center;
            position:relative;
        }

        .decor-border{
            position:fixed;
            inset:12px;
            border:2px dashed rgba(142,122,112,.15);
            border-radius:24px;
            pointer-events:none;
            z-index:999;
        }

        .container{
            width:100%;
            max-width:1040px;
            margin:auto;
            position:relative;
            z-index:2;
            padding:10px 0;
            padding-bottom:50px;
        }

        .font-control{
            display:flex;
            justify-content:flex-end;
            gap:8px;
            margin-bottom:12px;
        }

        .font-btn{
            background:var(--card-bg);
            border:1px solid rgba(142,122,112,.2);
            color:var(--text-main);
            padding:6px 14px;
            border-radius:30px;
            cursor:pointer;
            font-size:13px;
            font-weight:bold;
            box-shadow:0 2px 6px rgba(0,0,0,.03);
        }

        .font-btn:hover{
            background:#fff5f0;
            border-color:var(--butter-gold);
        }

        .font-btn.active{
            background:var(--butter-gold);
            color:var(--text-main);
            border-color:var(--butter-gold);
            box-shadow:0 2px 8px rgba(246,200,108,.4);
        }

        .title-block{
            text-align:center;
            margin-bottom:30px;
        }

        .main-title{
            font-size:clamp(24px,4.5vw,36px);
            font-weight:700;
            color:var(--text-main);
            letter-spacing:1px;
            line-height:1.4;
        }

        .title-badge{
            display:inline-block;
            background:rgba(246,200,108,.2);
            color:#bd8619;
            font-size:13px;
            padding:4px 12px;
            border-radius:20px;
            margin-bottom:8px;
            font-weight:700;
        }

        .layout-grid{
            display:flex;
            flex-direction:column;
            gap:24px;
            margin-bottom:30px;
        }

        @media(min-width:950px){
            .layout-grid{
                flex-direction:row;
                align-items:stretch;
            }
        }

        .main-calculator,
        .sidebar-panel{
            background:var(--card-bg);
            border:1px solid rgba(142,122,112,.12);
            border-radius:24px;
            padding:28px;
            box-shadow:0 10px 30px rgba(84,67,58,.05);
            display:flex;
            flex-direction:column;
        }

        @media(min-width:950px){
            .sidebar-panel{
                width:380px;
            }
        }

        .form-group{
            margin-bottom:16px;
        }

        .form-label{
            display:block;
            font-size:calc(var(--base-font-size) * .9);
            font-weight:700;
            color:var(--text-main);
            margin-bottom:8px;
        }

        .classic-input{
            width:100%;
            background:#fffbf9;
            border:1.5px solid rgba(142,122,112,.18);
            border-radius:14px;
            padding:12px 16px;
            color:var(--text-main);
            font-size:calc(var(--base-font-size) * 1);
            font-family:inherit;
        }

        .classic-input:focus{
            outline:none;
            border-color:var(--butter-gold);
            background:#ffffff;
            box-shadow:0 0 0 3px rgba(246,200,108,.25);
        }

        .category-tabs{
            display:flex;
            gap:6px;
            margin-bottom:16px;
            overflow-x:auto;
            padding-bottom:4px;
        }

        .tab-btn{
            background:#f7f3f0;
            border:1px solid transparent;
            color:var(--text-sub);
            padding:8px 14px;
            border-radius:12px;
            cursor:pointer;
            font-size:13px;
            font-weight:700;
            white-space:nowrap;
            font-family:inherit;
        }

        .tab-btn:hover{
            color:var(--text-main);
            background:#eee7e2;
        }

        .tab-btn.active{
            background:#fff4dd;
            border-color:rgba(246,200,108,.5);
            color:#b07910;
        }

        .flavor-scroll-area{
            max-height:380px;
            overflow-y:auto;
            padding-right:4px;
            margin-bottom:15px;
        }

        .flavor-group-pane{
            display:none;
        }

        .flavor-group-pane.active{
            display:block;
        }

        .flavor-row{
            display:flex;
            align-items:center;
            justify-content:space-between;
            background:var(--flavor-bg);
            padding:12px 16px;
            border-radius:16px;
            margin-bottom:8px;
            border:1px solid rgba(142,122,112,.06);
        }

        .flavor-name{
            font-size:calc(var(--base-font-size) * .95);
            color:var(--text-main);
            font-weight:700;
        }

        .flavor-price{
            font-size:12px;
            color:var(--text-sub);
        }

        .counter-controls{
            display:flex;
            align-items:center;
            gap:12px;
        }

        .counter-btn{
            width:28px;
            height:28px;
            border-radius:50%;
            border:1.5px solid rgba(142,122,112,.2);
            background:#ffffff;
            color:var(--text-main);
            cursor:pointer;
            font-size:15px;
            font-weight:700;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .counter-btn:hover{
            border-color:var(--butter-gold);
            color:var(--butter-gold-hover);
        }

        .counter-value{
            font-size:calc(var(--base-font-size) * 1);
            font-weight:700;
            width:20px;
            text-align:center;
            color:var(--text-main);
        }

        .magic-btn{
            width:100%;
            background:var(--butter-gold);
            border:none;
            color:var(--text-main);
            padding:14px;
            border-radius:16px;
            cursor:pointer;
            font-family:inherit;
            font-weight:700;
            font-size:calc(var(--base-font-size) * 1);
            box-shadow:0 4px 12px rgba(246,200,108,.3);
            margin-top:auto;
        }

        .magic-btn:hover{
            background:var(--butter-gold-hover);
            transform:translateY(-1px);
        }

        .ledger-list{
            max-height:240px;
            overflow-y:auto;
            margin-bottom:15px;
            padding-right:4px;
        }

        .ledger-item{
            padding:12px 0;
            border-bottom:1px dashed rgba(142,122,112,.15);
            font-size:calc(var(--base-font-size) * .85);
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .ledger-name{
            color:var(--text-main);
            font-weight:700;
        }

        .ledger-detail{
            color:var(--text-sub);
        }

        .ledger-actions{
            display:flex;
            align-items:center;
            gap:8px;
            white-space:nowrap;
        }

        .summary-box{
            background:#fffbf5;
            border:1.5px solid rgba(246,200,108,.3);
            border-radius:16px;
            padding:14px;
            margin-bottom:12px;
        }

        .summary-row{
            display:flex;
            justify-content:space-between;
            margin-bottom:6px;
            font-size:calc(var(--base-font-size) * .9);
        }

        .action-btn-group{
            display:flex;
            flex-direction:column;
            gap:8px;
            margin-top:auto;
        }

        .copy-all-btn,
        .gen-image-btn{
            width:100%;
            border:none;
            color:#ffffff;
            padding:11px;
            border-radius:12px;
            cursor:pointer;
            font-family:inherit;
            font-weight:700;
            font-size:13px;
        }

        .copy-all-btn{
            background:#4a3b32;
        }

        .gen-image-btn{
            background:#e67e22;
        }

        .image-card-container{
            background:var(--card-bg);
            border:1px solid rgba(142,122,112,.12);
            border-radius:24px;
            padding:24px;
            text-align:center;
            box-shadow:0 10px 30px rgba(84,67,58,.05);
            max-width:900px;
            margin:24px auto 0 auto;
        }

        .output-real-image{
            width:100%;
            height:auto;
            border-radius:16px;
            border:1px solid rgba(142,122,112,.15);
            display:none;
        }

        .image-placeholder{
            padding:40px 20px;
            border:2px dashed rgba(142,122,112,.15);
            border-radius:16px;
            color:var(--text-sub);
            font-size:13px;
        }

    </style>
</head>

<body>

<div class="decor-border"></div>

<div class="container">

    <div class="title-block">
        <div class="title-badge">下午茶開團應緣神隊友 🥞</div>
        <h1 class="main-title">太極鰲車輪餅</h1>
    </div>

    <div class="image-card-container">

        <h4>📸 今日美味結算大圖卡</h4>

        <div id="imgPlaceholder" class="image-placeholder">
            點選產生圖片按鈕後，這裡會自動凝聚出精美儀表板圖卡唷！
        </div>

        <img id="outputCardImage" class="output-real-image">

    </div>

    <canvas id="captureCanvas" width="900" height="1200"></canvas>
    <script>

function autoUpdateVisualCardImage(){

    const canvas=document.getElementById('captureCanvas');
    const ctx=canvas.getContext('2d');

    canvas.width=900;

    const lineHeight=28;

    const records=[
        {
            name:"小明",
            detailsText:"紅豆 x1, 奶油 x1, 芝麻 x2",
            cost:60
        },
        {
            name:"小花",
            detailsText:"巧克力 x2, 奶油 x1",
            cost:45
        }
    ];

    let totalHeight=220;

    records.forEach(r=>{
        let lines=r.detailsText.split(', ');
        totalHeight+=lines.length * lineHeight + 50;
    });

    canvas.height=totalHeight + 180;

    // 背景
    let gradient=ctx.createLinearGradient(0,0,0,canvas.height);

    gradient.addColorStop(0,'#fff9f6');
    gradient.addColorStop(1,'#ffebe3');

    ctx.fillStyle=gradient;

    ctx.fillRect(0,0,canvas.width,canvas.height);

    // 外框
    ctx.strokeStyle='#e3d6cf';
    ctx.lineWidth=2;

    ctx.strokeRect(
        15,
        15,
        canvas.width-30,
        canvas.height-30
    );

    // 標題
    ctx.textAlign='center';

    ctx.font='bold 32px "Microsoft JhengHei"';

    ctx.fillStyle='#54433a';

    ctx.fillText(
        '🥞 太極鰲車輪餅 · 下午茶結算單 🥞',
        canvas.width/2,
        70
    );

    // 分隔線
    ctx.strokeStyle='rgba(142,122,112,.2)';

    ctx.beginPath();

    ctx.moveTo(80,95);

    ctx.lineTo(canvas.width-80,95);

    ctx.stroke();

    let currentY=140;

    ctx.textAlign='left';

    ctx.font='bold 20px "Microsoft JhengHei"';

    ctx.fillStyle='#8e7a70';

    ctx.fillText(
        '📝 個人點餐明細：',
        45,
        currentY
    );

    currentY+=45;

    records.forEach(record=>{

        // 名字
        ctx.font='bold 22px "Microsoft JhengHei"';

        ctx.fillStyle='#54433a';

        ctx.fillText(
            `【${record.name}】`,
            45,
            currentY
        );

        // 品項
        ctx.font='18px "Microsoft JhengHei"';

        ctx.fillStyle='#8e7a70';

        let lines=record.detailsText.split(', ');

        let lineY=currentY;

        lines.forEach(line=>{

            ctx.fillText(
                line,
                210,
                lineY
            );

            lineY+=lineHeight;
        });

        // 金額
        ctx.textAlign='right';

        ctx.font='bold 24px "Quicksand"';

        ctx.fillStyle='#d96a6a';

        ctx.fillText(
            `$${record.cost}`,
            canvas.width-70,
            currentY
        );

        ctx.textAlign='left';

        currentY=lineY + 24;

        // 分隔線
        ctx.strokeStyle='rgba(142,122,112,.08)';

        ctx.beginPath();

        ctx.moveTo(45,currentY-12);

        ctx.lineTo(canvas.width-45,currentY-12);

        ctx.stroke();
    });

    // 總金額區塊
    currentY+=30;

    ctx.fillStyle='#ffffff';

    ctx.fillRect(
        45,
        currentY,
        canvas.width-90,
        120
    );

    ctx.strokeStyle='rgba(246,200,108,.6)';

    ctx.strokeRect(
        45,
        currentY,
        canvas.width-90,
        120
    );

    ctx.textAlign='left';

    ctx.font='bold 20px "Microsoft JhengHei"';

    ctx.fillStyle='#54433a';

    ctx.fillText(
        '今日開團總金額：',
        70,
        currentY+68
    );

    ctx.textAlign='right';

    ctx.font='bold 36px "Quicksand"';

    ctx.fillStyle='#d96a6a';

    ctx.fillText(
        '$105',
        canvas.width-70,
        currentY+72
    );

    // 浮水印
    ctx.textAlign='center';

    ctx.font='14px "Quicksand"';

    ctx.fillStyle='rgba(142,122,112,.4)';

    ctx.fillText(
        'Made with yummy thoughts by ChuChu ✦ © 2026',
        canvas.width/2,
        canvas.height-35
    );

    const dataURL=canvas.toDataURL("image/png");

    const outputImg=document.getElementById('outputCardImage');

    outputImg.src=dataURL;

    outputImg.style.display='block';

    document.getElementById('imgPlaceholder').style.display='none';
}

autoUpdateVisualCardImage();

</script>

</body>
</html>
