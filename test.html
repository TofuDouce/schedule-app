<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中正診所 Portal</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            /* 預設主題色：天空藍 */
            --accent-primary: #0284c7;
            --accent-hover: #0369a1;
            --accent-light: rgba(2, 132, 199, 0.1);
            
            /* 字體大小變數 */
            --base-font-size: 16px;
            
            /* 網格列數變數 (卡片排版張數設定) */
            --grid-cols: 4;

            /* 日間模式變數 */
            --bg-gradient: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 100%);
            --panel-bg: rgba(255, 255, 255, 0.45);
            --panel-border: rgba(255, 255, 255, 0.4);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-bg: rgba(255, 255, 255, 0.65);
            --card-hover-bg: rgba(255, 255, 255, 0.85);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.08);
            --sidebar-bg: rgba(255, 255, 255, 0.85);
        }

        [data-theme="dark"] {
            /* 夜間模式變數 */
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #050b14 100%);
            --panel-bg: rgba(30, 41, 59, 0.45);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: rgba(30, 41, 59, 0.6);
            --card-hover-bg: rgba(47, 63, 89, 0.75);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --sidebar-bg: rgba(15, 23, 42, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: var(--base-font-size);
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        /* 頂部導航與時鐘 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1rem 1.5rem;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            box-shadow: var(--shadow);
        }

        .clinic-info h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-primary);
        }

        .clock-container {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        #clock {
            font-size: 1.4rem;
            font-weight: 600;
        }

        #date {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* 主要書籤區塊 */
        .section-title {
            font-size: 1.2rem;
            margin: 1.5rem 0 1rem 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-main);
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(var(--grid-cols), minmax(0, 1fr));
            gap: 1.25rem;
            margin-bottom: 2rem;
        }

        /* 卡片設計 */
        .link-card {
            display: flex;
            flex-direction: column;
            padding: 1.25rem;
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--panel-border);
            border-radius: 14px;
            box-shadow: var(--shadow);
            text-decoration: none;
            color: var(--text-main);
            position: relative;
            cursor: pointer;
        }

        .link-card:hover {
            background: var(--card-hover-bg);
            transform: translateY(-2px);
            border-color: var(--accent-primary);
        }

        /* C13 黃色醒目提示效果 */
        .link-card.highlight-c13 {
            border: 2px solid #eab308;
            background: rgba(234, 179, 8, 0.05);
        }
        .link-card.highlight-c13:hover {
            background: rgba(234, 179, 8, 0.12);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .card-icon {
            font-size: 1.5rem;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent-light);
            color: var(--accent-primary);
            border-radius: 10px;
        }

        .card-title {
            font-weight: 600;
            font-size: 1.05rem;
        }

        .card-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        /* 側邊欄控制按鈕 */
        .admin-trigger {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 56px;
            height: 56px;
            background: var(--accent-primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            z-index: 999;
        }
        .admin-trigger:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        /* 右側彈出式管理面板 (側邊欄) */
        .sidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100vh;
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid var(--panel-border);
            box-shadow: -4px 0 32px rgba(0,0,0,0.15);
            z-index: 1000;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .sidebar.open {
            right: 0;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 1rem;
        }

        .sidebar-title {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .close-sidebar {
            background: none;
            border: none;
            font-size: 1.2rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        /* 管理面板子區塊 */
        .sidebar-section {
            background: rgba(0, 0, 0, 0.02);
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid var(--panel-border);
        }

        .sidebar-section-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--accent-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* 顯示與排版設定控制項 (字體與卡片張數) */
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .control-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        .control-item input[type="range"] {
            width: 150px;
            accent-color: var(--accent-primary);
        }

        .control-item select {
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            background: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--panel-border);
        }

        /* 主題色彩選色器 */
        .color-picker {
            display: flex;
            gap: 0.75rem;
            margin-top: 0.5rem;
        }

        .color-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .color-dot.active {
            border-color: var(--text-main);
            transform: scale(1.1);
        }

        /* eGFR 計算器樣式 */
        .egfr-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .sidebar input, .sidebar select {
            width: 100%;
            padding: 0.5rem;
            border-radius: 6px;
            border: 1px solid var(--panel-border);
            background: var(--card-bg);
            color: var(--text-main);
            font-size: 0.9rem;
        }

        .btn {
            width: 100%;
            padding: 0.5rem;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .btn:hover {
            background: var(--accent-hover);
        }

        #egfr-result {
            margin-top: 0.75rem;
            padding: 0.5rem;
            border-radius: 6px;
            background: var(--accent-light);
            font-size: 0.9rem;
            font-weight: 600;
            text-align: center;
        }

        /* 編輯與管理書籤列表 */
        .manage-links-list {
            max-height: 150px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .manage-link-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.4rem 0.5rem;
            background: var(--card-bg);
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
        }

        /* 響應式斷點優化 */
        @media (max-width: 1024px) {
            :root { --grid-cols: 3 !important; }
            body { padding: 1rem; }
        }

        @media (max-width: 768px) {
            :root { --grid-cols: 2 !important; }
            .sidebar { width: 100%; right: -100%; }
            .header { flex-direction: column; gap: 0.5rem; text-align: center; }
            .clock-container { text-align: center; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="clinic-info">
            <h1>中正診所 Portal</h1>
        </div>
        <div class="clock-container">
            <div id="clock">00:00:00</div>
            <div id="date">西元 2026年05月16日 │ 民國 115年05月16日 (六)</div>
        </div>
    </header>

    <h2 class="section-title"><i class="fa-solid fa-star"></i> 核心公用連結</h2>
    <div class="links-grid" id="primary-grid"></div>

    <h2 class="section-title"><i class="fa-solid fa-link"></i> 常用與行政連結</h2>
    <div class="links-grid" id="secondary-grid"></div>

    <div class="admin-trigger" onclick="toggleSidebar()">
        <i class="fa-solid fa-gear"></i>
    </div>

    <div class="sidebar" id="adminSidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">⚙️ 控制中心</div>
            <button class="close-sidebar" onclick="toggleSidebar()"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-section-title"><i class="fa-solid fa-sliders"></i> 顯示與排版設定</div>
            <div class="control-group">
                <div class="control-item">
                    <label>內文字體大小</label>
                    <input type="range" id="fontSizeSlider" min="14" max="22" value="16" oninput="updateFontSize(this.value)">
                    <span id="fontSizeVal">16px</span>
                </div>
                <div class="control-item">
                    <label>橫向卡片張數</label>
                    <select id="gridColsSelect" onchange="updateGridCols(this.value)">
                        <option value="3">每列 3 張卡片</option>
                        <option value="4" selected>每列 4 張卡片</option>
                        <option value="5">每列 5 張卡片</option>
                        <option value="6">每列 6 張卡片</option>
                    </select>
                </div>
                <div class="control-item">
                    <label>深色模夜間模式</label>
                    <select id="themeSelect" onchange="updateTheme(this.value)">
                        <option value="light">日間模式</option>
                        <option value="dark">夜間模式</option>
                    </select>
                </div>
                <div class="control-item" style="flex-direction: column; align-items: flex-start; gap: 0.25rem;">
                    <label>主題核心色系</label>
                    <div class="color-picker">
                        <div class="color-dot" style="background: #0284c7;" onclick="updateAccentColor('#0284c7', '#0369a1', 'rgba(2, 132, 199, 0.1)', this)" title="天空藍"></div>
                        <div class="color-dot" style="background: #10b981;" onclick="updateAccentColor('#10b981', '#047857', 'rgba(16, 185, 129, 0.1)', this)" title="翡翠綠"></div>
                        <div class="color-dot" style="background: #a855f7;" onclick="updateAccentColor('#a855f7', '#7e22ce', 'rgba(168, 85, 247, 0.1)', this)" title="丁香紫"></div>
                        <div class="color-dot" style="background: #64748b;" onclick="updateAccentColor('#64748b', '#475569', 'rgba(100, 116, 139, 0.1)', this)" title="磨砂灰"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-section-title"><i class="fa-solid fa-calculator"></i> eGFR 計算器 (CKD-EPI 2021)</div>
            <div class="egfr-inputs">
                <input type="number" id="egfr-creatinine" placeholder="Cr 肌肉酐酸" step="0.01">
                <input type="number" id="egfr-age" placeholder="年齡">
            </div>
            <div class="egfr-inputs">
                <select id="egfr-gender">
                    <option value="male">男性</option>
                    <option value="female">女性</option>
                </select>
            </div>
            <button class="btn" onclick="calculateEGFR()">一秒計算結果</button>
            <div id="egfr-result">請輸入數值進行計算</div>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-section-title"><i class="fa-solid fa-plus"></i> 新增自訂書籤</div>
            <div class="control-group" style="gap: 0.5rem;">
                <input type="text" id="new-title" placeholder="書籤名稱 (例如: 健保申報系統)">
                <input type="text" id="new-url" placeholder="網址 (https://...)">
                <input type="text" id="new-desc" placeholder="簡短描述說明">
                <input type="text" id="new-icon" placeholder="圖示 Emoji (例如: 🏥)" value="🔗">
                <select id="new-category">
                    <option value="secondary">常用與行政連結</option>
                    <option value="primary">核心公用連結</option>
                </select>
                <button class="btn" onclick="addCustomLink()">確認新增卡片</button>
            </div>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-section-title"><i class="fa-solid fa-trash-can"></i> 管理自訂連結</div>
            <div class="manage-links-list" id="manageLinksContainer"></div>
        </div>
    </div>

    <script>
        // 內建核心固定的書籤資料
        const coreLinks = {
            primary: [
                { id: 'c1', title: '健保雲端系統', url: 'https://vpn.nhi.gov.tw', desc: 'VPN 健保雲端查詢系統、醫事人員憑證登入。', icon: '🏥' },
                { id: 'c2', title: '診所各類表單', url: 'https://docs.google.com', desc: '中正診所內部表單、行政庶務、排班表專區。', icon: '📝' },
                { id: 'c3', title: '藥品與健保代碼', url: 'https://www.nhi.gov.tw', desc: '健保用藥品項查詢、適應症與特殊申報規範。', icon: '🔍' }
            ],
            secondary: [
                { id: 'c4', title: '亞東醫院轉診', url: 'https://www.femh.org.tw', desc: '亞東綠色通道、轉診單線上填報與報告查詢。', icon: '🚗' },
                { id: 'c5', title: 'NIIS 疫苗系統', url: 'https://niis.cdc.gov.tw', desc: '全國預防接種資訊管理系統，流感/新冠常規查詢。', icon: '💉' },
                { id: 'c13', title: 'C13 考核自評表', url: 'https://docs.google.com/spreadsheets', desc: '年度診所督導考核、C13 自評表項目即時填報。', icon: '⭐', highlight: true }
            ]
        };

        // 從 localStorage 載入使用者設定與自訂連結
        let customLinks = JSON.parse(localStorage.getItem('portal_custom_links')) || [];

        // 初始化
        window.addEventListener('DOMContentLoaded', () => {
            initClock();
            loadSettings();
            renderLinks();
            initColorPickerActive();
        });

        // 側邊欄開關邏輯
        function toggleSidebar() {
            document.getElementById('adminSidebar').classList.toggle('open');
        }

        // 1. 顯示排版核心功能：設定字體大小
        function updateFontSize(size) {
            document.documentElement.style.setProperty('--base-font-size', size + 'px');
            document.getElementById('fontSizeVal').innerText = size + 'px';
            localStorage.setItem('portal_font_size', size);
        }

        // 2. 顯示排版核心功能：設定卡片橫向張數 (欄數)
        function updateGridCols(cols) {
            document.documentElement.style.setProperty('--grid-cols', cols);
            localStorage.setItem('portal_grid_cols', cols);
        }

        // 3. 顯示排版核心功能：主題切換
        function updateTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('portal_theme', theme);
        }

        // 4. 顯示排版核心功能：變更核心色系
        function updateAccentColor(primary, hover, light, element) {
            document.documentElement.style.setProperty('--accent-primary', primary);
            document.documentElement.style.setProperty('--accent-hover', hover);
            document.documentElement.style.setProperty('--accent-light', light);
            
            localStorage.setItem('portal_color_primary', primary);
            localStorage.setItem('portal_color_hover', hover);
            localStorage.setItem('portal_color_light', light);

            document.querySelectorAll('.color-dot').forEach(dot => dot.classList.remove('active'));
            if(element) element.classList.add('active');
        }

        // 讀取設定檔
        function loadSettings() {
            const savedSize = localStorage.getItem('portal_font_size') || '16';
            document.getElementById('fontSizeSlider').value = savedSize;
            updateFontSize(savedSize);

            const savedCols = localStorage.getItem('portal_grid_cols') || '4';
            document.getElementById('gridColsSelect').value = savedCols;
            updateGridCols(savedCols);

            const savedTheme = localStorage.getItem('portal_theme') || 'light';
            document.getElementById('themeSelect').value = savedTheme;
            updateTheme(savedTheme);

            const savedPrimary = localStorage.getItem('portal_color_primary');
            if(savedPrimary) {
                const savedHover = localStorage.getItem('portal_color_hover');
                const savedLight = localStorage.getItem('portal_color_light');
                updateAccentColor(savedPrimary, savedHover, savedLight, null);
            }
        }

        function initColorPickerActive() {
            const currentPrimary = localStorage.getItem('portal_color_primary') || '#0284c7';
            document.querySelectorAll('.color-dot').forEach(dot => {
                if(dot.style.backgroundColor === currentPrimary || (currentPrimary === '#0284c7' && dot.title === '天空藍')) {
                    dot.classList.add('active');
                }
            });
        }

        // 渲染主要與次要網格卡片
        function renderLinks() {
            const primaryGrid = document.getElementById('primary-grid');
            const secondaryGrid = document.getElementById('secondary-grid');
            const manageContainer = document.getElementById('manageLinksContainer');

            primaryGrid.innerHTML = '';
            secondaryGrid.innerHTML = '';
            manageContainer.innerHTML = '';

            // 合併內建卡片與自訂卡片
            const allPrimary = [...coreLinks.primary, ...customLinks.filter(l => l.category === 'primary')];
            const allSecondary = [...coreLinks.secondary, ...customLinks.filter(l => l.category === 'secondary')];

            // 渲染核心公用
            allPrimary.forEach(link => {
                primaryGrid.appendChild(createCardElement(link));
            });

            // 渲染行政連結
            allSecondary.forEach(link => {
                secondaryGrid.appendChild(createCardElement(link));
            });

            // 渲染側邊欄中的刪除列表管理項
            customLinks.forEach((link, index) => {
                const item = document.createElement('div');
                item.className = 'manage-link-item';
                item.innerHTML = `
                    <span>${link.icon} ${link.title}</span>
                    <button class="delete-btn" onclick="deleteLink(${index})"><i class="fa-solid fa-trash-can"></i></button>
                `;
                manageContainer.appendChild(item);
            });
        }

        function createCardElement(link) {
            const a = document.createElement('a');
            a.className = 'link-card' + (link.highlight ? ' highlight-c13' : '');
            a.href = link.url;
            a.target = '_blank';
            a.innerHTML = `
                <div class="card-header">
                    <div class="card-icon">${link.icon || '🔗'}</div>
                    <div class="card-title">${link.title}</div>
                </div>
                <div class="card-desc">${link.desc || '暫無描述說明。'}</div>
            `;
            return a;
        }

        // 新增自訂卡片書籤
        function addCustomLink() {
            const title = document.getElementById('new-title').value.trim();
            const url = document.getElementById('new-url').value.trim();
            const desc = document.getElementById('new-desc').value.trim();
            const icon = document.getElementById('new-icon').value.trim();
            const category = document.getElementById('new-category').value;

            if(!title || !url) {
                alert('請填寫書籤名稱與網址！');
                return;
            }

            customLinks.push({ title, url, desc, icon, category });
            localStorage.setItem('portal_custom_links', JSON.stringify(customLinks));
            
            // 清空輸入欄位
            document.getElementById('new-title').value = '';
            document.getElementById('new-url').value = '';
            document.getElementById('new-desc').value = '';

            renderLinks();
            alert('自訂網頁卡片新增成功！');
        }

        // 刪除自訂書籤
        function deleteLink(index) {
            if(confirm('確定要刪除這張自訂連結卡片嗎？')) {
                customLinks.splice(index, 1);
                localStorage.setItem('portal_custom_links', JSON.stringify(customLinks));
                renderLinks();
            }
        }

        // 醫學 eGFR 計算器功能 (CKD-EPI 2021)
        function calculateEGFR() {
            const scr = parseFloat(document.getElementById('egfr-creatinine').value);
            const age = parseFloat(document.getElementById('egfr-age').value);
            const gender = document.getElementById('egfr-gender').value;

            if (isNaN(scr) || isNaN(age)) {
                document.getElementById('egfr-result').innerText = '請填入正確的數值！';
                return;
            }

            let kappa = (gender === 'female') ? 0.7 : 0.9;
            let alpha = (gender === 'female') ? -0.241 : -0.302;
            let genderMultiplier = (gender === 'female') ? 1.012 : 1;

            let minTerm = Math.pow(Math.min(scr / kappa, 1), alpha);
            let maxTerm = Math.pow(Math.max(scr / kappa, 1), -1.200);
            let ageTerm = Math.pow(0.9938, age);

            let egfr = 142 * minTerm * maxTerm * ageTerm * genderMultiplier;
            
            document.getElementById('egfr-result').innerText = `eGFR：${egfr.toFixed(1)} mL/min/1.73m²`;
        }

        // 即時時鐘邏輯
        function initClock() {
            const days = ['日', '一', '二', '三', '四', '五', '六'];
            setInterval(() => {
                const now = new Date();
                const h = String(now.getHours()).padStart(2, '0');
                const m = String(now.getMinutes()).padStart(2, '0');
                const s = String(now.getSeconds()).padStart(2, '0');
                document.getElementById('clock').innerText = `${h}:${m}:${s}`;
                
                const rYear = now.getFullYear();
                const mYear = rYear - 1911;
                const mon = String(now.getMonth() + 1).padStart(2, '0');
                const date = String(now.getDate()).padStart(2, '0');
                const day = days[now.getDay()];
                document.getElementById('date').innerText = `西元 ${rYear}年${mon}月${date}日 │ 民國 ${mYear}年${mon}月${date}日 (${day})`;
            }, 1000);
        }
    </script>
