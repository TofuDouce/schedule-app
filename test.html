<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>群星低語 ✦ Whispering Cosmos</title>

    <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
    <meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
    <meta name="bingbot" content="noindex,nofollow,noarchive,nosnippet,noimageindex">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- 引入日系經典圓體 Zen Maru Gothic 以及原本的魔法英文 Cinzel -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: font-size 0.2s ease, transform 0.4s ease, box-shadow 0.4s ease, background-color 0.3s ease, border-color 0.3s ease;
        }

        :root {
            --bg1: #171320;
            --bg2: #241a35;
            --bg3: #31244d;
            --gold: #d8bf8a;
            --text: #f4efff;
            --card: rgba(29, 24, 44, .72);
            --gold-low: rgba(216, 191, 138, 0.15);
            
            /* 文字大小基礎設定級距 */
            --base-font-size: 16px;
        }

        body {
            min-height: 100vh;
            color: var(--text);
            /* 全面套用日系圓潤字體體系 */
            font-family: "Zen Maru Gothic", "Microsoft JhengHei", "BlinkMacSystemFont", sans-serif;
            font-weight: 400;
            background: radial-gradient(circle at top, rgba(180,150,255,.14), transparent 40%),
                        linear-gradient(180deg, var(--bg1), var(--bg2), var(--bg3));
            padding: 28px;
            position: relative;
            font-size: var(--base-font-size);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 星空背景 */
        .stars {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: -3;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: .7;
            animation: twinkle 4s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: .15; transform: scale(.7); }
            50% { opacity: 1; transform: scale(1.4); }
        }

        /* 魔法古典外框 */
        .frame {
            position: fixed;
            inset: 14px;
            border: 1.5px solid rgba(216,191,138,.48);
            border-radius: 38px;
            pointer-events: none;
            z-index: 999;
        }

        .frame::before {
            content: "";
            position: absolute;
            inset: 12px;
            border: 1px solid rgba(216,191,138,.18);
            border-radius: 30px;
        }

        /* 四角裝飾 */
        .corner {
            position: fixed;
            width: 120px;
            height: 120px;
            pointer-events: none;
            z-index: 1000;
        }

        .corner::before {
            content: "";
            position: absolute;
            inset: 0;
            border: 1.5px solid rgba(216,191,138,.45);
            border-radius: 50%;
        }

        .corner::after {
            content: "✦";
            position: absolute;
            color: rgba(216,191,138,.85);
            font-size: 26px;
        }

        .tl { top: 18px; left: 18px; }
        .tl::before { clip-path: polygon(0 0, 100% 0, 0 100%); }
        .tl::after { top: 18px; left: 18px; }

        .tr { top: 18px; right: 18px; }
        .tr::before { clip-path: polygon(0 0, 100% 0, 100% 100%); }
        .tr::after { top: 18px; right: 18px; }

        .bl { bottom: 18px; left: 18px; }
        .bl::before { clip-path: polygon(0 0, 0 100%, 100% 100%); }
        .bl::after { bottom: 18px; left: 18px; }

        .br { bottom: 18px; right: 18px; }
        .br::before { clip-path: polygon(100% 0, 0 100%, 100% 100%); }
        .br::after { bottom: 18px; right: 18px; }

        /* 主內容區容器 */
        .container {
            width: 100%;
            max-width: 960px;
            margin: auto;
            position: relative;
            z-index: 2;
            padding: 20px 0;
        }

        /* 文字大小控制列 */
        .font-control {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: -10px;
            position: relative;
            z-index: 1010;
        }

        .font-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(216, 191, 138, 0.3);
            color: var(--text);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-family: "Zen Maru Gothic", sans-serif;
            font-size: 14px;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .font-btn:hover {
            background: rgba(216, 191, 138, 0.2);
            color: var(--gold);
            border-color: var(--gold);
        }

        .font-btn.active {
            background: var(--gold);
            color: var(--bg1);
            font-weight: 700;
            border-color: var(--gold);
        }

        /* 懸浮月亮 */
        .moon {
            text-align: center;
            margin-top: 10px;
            position: relative;
        }

        .moon::before {
            content: "";
            position: absolute;
            left: 50%;
            top: -50px;
            width: 1px;
            height: 50px;
            background: rgba(216,191,138,.35);
        }

        .moon-symbol {
            font-size: 42px;
            color: var(--gold);
            text-shadow: 0 0 18px rgba(216,191,138,.25);
            animation: floatMoon 4s ease-in-out infinite;
        }

        @keyframes floatMoon {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(6px); }
        }

        /* 標題與核心主視覺 */
        .title-block {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 35px;
        }

        .main-title {
            font-family: "Zen Maru Gothic", "Cinzel", serif;
            font-weight: 700;
            letter-spacing: 4px;
            line-height: 1.2;
            font-size: clamp(28px, 5.5vw, 48px);
            background: linear-gradient(180deg, #ffffff 0%, #f1e8ff 40%, #d8bf8a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        /* 雙欄響應式布局 */
        .layout-grid {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        @media (min-width: 900px) {
            .layout-grid {
                flex-direction: row;
                align-items: stretch;
            }
        }

        /* 核心主要功能卡片 */
        .main-calculator {
            flex: 1;
            background: var(--card);
            border: 1px solid rgba(255,255,255,.06);
            border-radius: 34px;
            padding: 32px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 20px 50px rgba(0,0,0,.3);
        }

        /* 側邊說明面板卡片 */
        .sidebar-panel {
            width: 100%;
            background: var(--card);
            border: 1px solid rgba(255,255,255,.06);
            border-radius: 34px;
            padding: 28px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 20px 50px rgba(0,0,0,.3);
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 900px) {
            .sidebar-panel {
                width: 320px;
            }
        }

        /* 古典表單元件通用設計 */
        .form-label {
            display: block;
            font-size: calc(var(--base-font-size) * 0.9);
            color: #bba9e8;
            margin-bottom: 8px;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .input-wrapper {
            position: relative;
        }

        .classic-input {
            width: 100%;
            background: rgba(15, 11, 25, 0.5);
            border: 1px solid rgba(216, 191, 138, 0.25);
            border-radius: 16px;
            padding: 14px 18px;
            color: #ffffff;
            font-family: 'Zen Maru Gothic', sans-serif;
            font-weight: 500;
            font-size: calc(var(--base-font-size) * 1.05);
            letter-spacing: 1px;
        }

        .classic-input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 12px rgba(216, 191, 138, 0.2);
        }

        /* 分隔線 */
        .classic-hr {
            margin: 24px 0;
            border: none;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(216,191,138,.4), transparent);
        }

        /* 側邊欄專用古典標題 */
        .sidebar-title {
            font-family: "Zen Maru Gothic", serif;
            font-size: calc(var(--base-font-size) * 1.15);
            color: var(--gold);
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .sidebar-desc {
            font-size: 13px;
            color: #a897c9;
            text-align: center;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        /* 顏色語意庫 */
        .color-gold { color: var(--gold); }
        .color-rose { color: #f29494; }
        .color-mint { color: #8ae0be; }
        .color-purple { color: #c39eff; }
        .color-text { color: var(--text); }

        /* 頁尾 */
        .footer {
            text-align: center;
            margin-top: 35px;
        }

        .footer-line {
            width: 100px;
            height: 1px;
            margin: auto;
            margin-bottom: 14px;
            background: linear-gradient(90deg, transparent, rgba(216,191,138,.5), transparent);
        }

        .footer-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-family: "Zen Maru Gothic", "Cinzel", sans-serif;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 2px;
            color: #eadfff;
        }

        .creator {
            margin-top: 6px;
            font-size: 13px;
            color: #a897c9;
            letter-spacing: 1px;
        }

        /* ================= 互動元件樣式 ================= */
        
        /* 魔法按鈕 */
        .magic-btn {
            width: 100%;
            background: linear-gradient(135deg, rgba(216, 191, 138, 0.15), rgba(138, 110, 216, 0.15));
            border: 1.5px solid var(--gold);
            color: var(--gold);
            padding: 14px;
            border-radius: 18px;
            cursor: pointer;
            font-family: "Zen Maru Gothic", sans-serif;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        .magic-btn:hover {
            background: linear-gradient(135deg, rgba(216, 191, 138, 0.3), rgba(138, 110, 216, 0.3));
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(216, 191, 138, 0.2);
        }

        .magic-btn:active {
            transform: translateY(1px);
        }

        /* 儀表數據網格 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 15px;
        }

        .stat-box {
            background: rgba(15, 11, 25, 0.3);
            border: 1px solid rgba(216, 191, 138, 0.15);
            border-radius: 14px;
            padding: 12px;
            text-align: center;
        }

        .stat-val {
            font-family: "Zen Maru Gothic", sans-serif;
            font-size: 18px;
            color: var(--gold);
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-lbl {
            font-size: 11px;
            color: #a897c9;
        }

        /* 占卜卡牌顯示區 */
        .divination-display {
            background: rgba(15, 11, 25, 0.4);
            border: 1px dashed rgba(216, 191, 138, 0.3);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            margin-top: 20px;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card-icon {
            font-size: 36px;
            margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(216, 191, 138, 0.5);
        }

        .card-name {
            font-family: "Zen Maru Gothic", sans-serif;
            font-size: 18px;
            color: var(--gold);
            font-weight: 700;
            letter-spacing: 1px;
        }

        .card-phrase {
            font-size: 14px;
            color: #d1c4e9;
            margin-top: 6px;
        }

        /* 脈衝動畫效果 */
        .pulse-effect {
            animation: pulse 0.5s ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); box-shadow: 0 0 25px rgba(216, 191, 138, 0.4); }
            100% { transform: scale(1); }
        }

        /* 右側日誌列表 */
        .log-list {
            list-style: none;
            font-size: 13px;
            color: #bba9e8;
            margin-top: 10px;
        }

        .log-item {
            padding: 8px 0;
            border-bottom: 1px solid rgba(216, 191, 138, 0.1);
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="frame"></div>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="container">
    <div class="font-control">
        <button class="font-btn" onclick="changeFontSize('small', this)">A -</button>
        <button class="font-btn active" onclick="changeFontSize('medium', this)">A</button>
        <button class="font-btn" onclick="changeFontSize('large', this)">A +</button>
    </div>

    <div class="moon">
        <div class="moon-symbol">☾</div>
    </div>

    <div class="title-block">
        <!-- 網站主標題已更新 -->
        <h1 class="main-title" id="pageTitle">群星低語 ✦ Whispering Cosmos</h1>
    </div>

    <div class="layout-grid">
        
        <!-- 左側：核心主要互動功能卡片 -->
        <div class="main-calculator" id="mainCorePanel">
            <!-- 功能一：聖痕真名共鳴儀 -->
            <div class="form-group">
                <label class="form-label">✦ 聖痕真名共鳴儀 (Stigma Resonance)</label>
                <div class="input-wrapper">
                    <input type="text" id="magicInput" class="classic-input" placeholder="輸入姓名或密語以解析以太..." oninput="analyzeEssence()">
                </div>
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-val" id="statMana">0</div>
                        <div class="stat-lbl">奧術魔能值</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-val" id="statElement">—</div>
                        <div class="stat-lbl">主導元素</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-val" id="statColor">—</div>
                        <div class="stat-lbl">靈魂色彩</div>
                    </div>
                </div>
            </div>

            <hr class="classic-hr">

            <!-- 功能二：星軌命運占卜 -->
            <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label">✦ 星軌命運抽卡占卜 (Orbit Divination)</label>
                <button class="magic-btn" onclick="drawDestinyCard()">注入魔能・翻閱命運</button>
                
                <div class="divination-display" id="cardDisplay">
                    <div class="card-icon">🔮</div>
                    <div class="card-name">命運之輪尚未轉動</div>
                    <div class="card-phrase">請點擊上方按鈕，向星軌祈求今日的奧術啟示。</div>
                </div>
            </div>
        </div>

        <!-- 右側：側邊說明與歷史日誌面板 -->
        <div class="sidebar-panel" id="sidebarPanel">
            <h3 class="sidebar-title" id="sideTitle">🔮 啟示秘典</h3>
            <p class="sidebar-desc" id="sideDesc">密語將在此處具象化，揭示隱藏在符號背後的群星低語。</p>
            
            <div id="dynamicNotice" style="flex: 1; display: flex; flex-direction: column; border: 1px dashed rgba(216, 191, 138, 0.15); border-radius: 16px; padding: 16px;">
                <div style="font-size: 13px; color: var(--gold); margin-bottom: 8px; font-weight: 700;">※ 當前星象指引</div>
                <div id="divinationDetail" style="font-size: 13px; color: #a897c9; line-height: 1.6; flex: 1;">
                    命運是由無數個隨機組成的必然。當你向傳送門輸入真名或轉動星軌，矩陣便會開始記錄你的奧術軌跡。
                </div>
                
                <div style="margin-top: 15px; border-top: 1px solid rgba(216, 191, 138, 0.1); padding-top: 10px;">
                    <div style="font-size: 11px; color: #7a6b99; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; font-weight: 700;">命運歷史日誌</div>
                    <ul class="log-list" id="logList">
                        <li class="log-item" style="color: #7a6b99; justify-content: center;">暫無占卜紀錄</li>
                    </ul>
                </div>
            </div>
        </div>

    </div>

    <!-- 頁尾：已將帶有帳簿感（ledger）的文字徹底移除 -->
    <div class="footer">
        <div class="footer-line"></div>
        <div class="footer-inner">
            <span id="footerBrand">✦ Lazy Dreamer ✦</span>
        </div>
        <div class="creator" id="footerSubtext">Crafted with moonlight & starlight magic</div>
    </div>
</div>

<script>
/* ===== 星空隨機位置背景生成 ===== */
const stars = document.getElementById("stars");
for (let i = 0; i < 140; i++) {
    const star = document.createElement("div");
    star.className = "star";
    star.style.left = Math.random() * 100 + "%";
    star.style.top = Math.random() * 100 + "%";
    star.style.animationDelay = Math.random() * 4 + "s";
    stars.appendChild(star);
}

/* ===== 魔法字體級距縮放切換 ===== */
function changeFontSize(size, btnElement) {
    const root = document.documentElement;
    document.querySelectorAll('.font-btn').forEach(btn => btn.classList.remove('active'));
    btnElement.classList.add('active');
    
    if (size === 'small') {
        root.style.setProperty('--base-font-size', '13px');
    } else if (size === 'medium') {
        root.style.setProperty('--base-font-size', '16px');
    } else if (size === 'large') {
        root.style.setProperty('--base-font-size', '20px');
    }
}

/* ================= 魔法互動核心邏輯 JavaScript ================= */

const elements = ["火 Pneuma", "水 Hydro", "風 Aether", "土 Geo", "雷 Fulgur", "光 Cosmos", "暗 Void"];
const colors = ["緋紅 Rose", "深邃 Azure", "翠綠 Mint", "琥珀 Gold", "幽紫 Opal", "純白 Frost", "曜黑 Shadow"];

function analyzeEssence() {
    const input = document.getElementById("magicInput").value;
    
    if (!input.trim()) {
        document.getElementById("statMana").innerText = "0";
        document.getElementById("statElement").innerText = "—";
        document.getElementById("statColor").innerText = "—";
        return;
    }

    let hash = 0;
    for (let i = 0; i < input.length; i++) {
        hash = input.charCodeAt(i) + ((hash << 5) - hash);
    }
    hash = Math.abs(hash);

    const manaValue = (hash % 900) + 100;
    const elementIndex = hash % elements.length;
    const colorIndex = (hash >> 2) % colors.length;

    document.getElementById("statMana").innerText = manaValue;
    document.getElementById("statElement").innerText = elements[elementIndex];
    document.getElementById("statColor").innerText = colors[colorIndex];
}

const fateCards = [
    { icon: "🃏", name: "愚者 (The Fool)", phrase: "純粹的未知與全新的開端。", detail: "星象顯示你正站在某個巨大轉折點。不要害怕犯錯，現在正是盲目相信直覺並往前躍進的最佳時機。" },
    { icon: "🧙‍♂️", name: "魔術師 (The Magician)", phrase: "資源已萬事俱備，只欠行動。", detail: "你周圍的元素正處於完美的和諧狀態。你擁有解決當前難題所需的所有才華與工具，大膽地去創造吧。" },
    { icon: "👑", name: "女祭司 (The High Priestess)", phrase: "靜與潛意識的智慧。", detail: "群星建議你今日「以靜制動」。聆聽你的內心低語，秘密會在黑暗中自行浮現，暫時不需要向外尋求解答。" },
    { icon: "☀️", name: "太陽 (The Sun)", phrase: "無與倫比的成功與生命力。", detail: "魔能矩陣大放異彩！這是極致幸運的象徵，無論你當前在苦惱什麼，光明都將驅散陰霾，帶來溫暖的成果。" },
    { icon: "🌙", name: "月亮 (The Moon)", phrase: "迷茫、潛伏的恐懼與幻覺。", detail: "潮汐正在影響你的心智。當前看見的阻礙可能只是陰影投射出的幻象，穩住心神，等待晨曦破曉，迷霧自散。" },
    { icon: "🏰", name: "高塔 (The Tower)", phrase: "驟變與老舊結構的瓦解。", detail: "別慌！雖然這代表突然的衝擊或計劃被打亂，但唯有震碎不穩固的舊地基，真正堅韌的奧術核心才能重新建立。" },
    { icon: "🌟", name: "星星 (The Star)", phrase: "永不熄滅的希望與靈感。", detail: "在漫長的黑夜中，有一顆屬於你的星辰正在指引道路。保持信念，這是一個漫長但絕對會走向療癒與豐盛的旅程。" }
];

function drawDestinyCard() {
    const cardDisplay = document.getElementById("cardDisplay");
    const divinationDetail = document.getElementById("divinationDetail");
    const logList = document.getElementById("logList");

    cardDisplay.classList.remove("pulse-effect");
    void cardDisplay.offsetWidth;
    cardDisplay.classList.add("pulse-effect");

    const randomIndex = Math.floor(Math.random() * fateCards.length);
    const card = fateCards[randomIndex];

    cardDisplay.innerHTML = `
        <div class="card-icon">${card.icon}</div>
        <div class="card-name">${card.name}</div>
        <div class="card-phrase">「${card.phrase}」</div>
    `;

    divinationDetail.innerText = card.detail;

    const now = new Date();
    const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
    
    if (logList.innerText.includes("暫無占卜紀錄")) {
        logList.innerHTML = "";
    }

    const newLog = document.createElement("li");
    newLog.className = "log-item";
    newLog.innerHTML = `<span>${card.icon} ${card.name.split(" ")[0]}</span> <span style="font-family:monospace; color:#7a6b99;">${timeStr}</span>`;
    
    logList.insertBefore(newLog, logList.firstChild);

    if (logList.children.length > 4) {
        logList.removeChild(logList.lastChild);
    }
}
</script>
