<!DOCTYPE html>
<html lang="zh-Hant" data-theme="dark" data-color="purple">

<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>中正診所 Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">

<style>

/* =========================
🎨 ROOT
========================= */

:root{

    --dynamic-title-size:28px;
    --dynamic-desc-size:17px;
    --grid-cols:4;

    --bg1:#09070f;
    --bg2:#140f1f;
    --bg3:#1f1730;

    --text-main:#fff5df;
    --text-sub:#d9cfe7;

    --gold:#e7c57e;
    --gold-light:#fff1c5;

    --card-bg:rgba(31,23,47,.88);

    --header-bg:
    rgba(10,8,18,.92);

    --line:
    rgba(255,255,255,.08);

    --shadow:
    0 20px 50px rgba(0,0,0,.55);

    --accent:#d8c3ff;
    --accent-soft:rgba(216,195,255,.12);

    --accent-glow:
    0 0 28px rgba(216,195,255,.22);
}

/* =========================
🌈 COLOR
========================= */

:root[data-color="blue"]{
    --accent:#8fd9ff;
    --accent-soft:rgba(143,217,255,.14);
    --accent-glow:0 0 28px rgba(143,217,255,.24);
}

:root[data-color="green"]{
    --accent:#9ce8b5;
    --accent-soft:rgba(156,232,181,.14);
    --accent-glow:0 0 28px rgba(156,232,181,.24);
}

:root[data-color="purple"]{
    --accent:#dcc8ff;
    --accent-soft:rgba(220,200,255,.14);
    --accent-glow:0 0 28px rgba(220,200,255,.25);
}

:root[data-color="gray"]{
    --accent:#e3e3ec;
    --accent-soft:rgba(227,227,236,.14);
    --accent-glow:0 0 28px rgba(227,227,236,.24);
}

/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{

    min-height:100vh;

    overflow-x:hidden;

    font-family:
    "Noto Sans TC",
    sans-serif;

    color:var(--text-main);

    background:

    radial-gradient(
        circle at top,
        rgba(255,255,255,.05),
        transparent 20%
    ),

    radial-gradient(
        circle at 20% 30%,
        var(--accent-soft),
        transparent 25%
    ),

    radial-gradient(
        circle at 80% 20%,
        rgba(255,220,150,.06),
        transparent 20%
    ),

    linear-gradient(
        180deg,
        var(--bg1),
        var(--bg2),
        var(--bg3)
    );

    background-attachment:fixed;

    position:relative;
}

/* 星空 */

body::before{

    content:"";

    position:fixed;
    inset:0;

    pointer-events:none;

    background-image:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,.7) 1px, transparent 1px),
    radial-gradient(circle at 70% 50%, rgba(255,255,255,.4) 1px, transparent 1px),
    radial-gradient(circle at 90% 20%, rgba(255,255,255,.5) 1px, transparent 1px),
    radial-gradient(circle at 35% 85%, rgba(255,255,255,.4) 1px, transparent 1px);

    background-size:300px 300px;

    opacity:.35;

    z-index:-1;
}

/* =========================
HEADER
========================= */

.header{

    position:fixed;

    top:0;
    left:0;
    right:0;

    z-index:1000;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:18px 5%;

    background:
    linear-gradient(
        to bottom,
        rgba(8,6,15,.96),
        rgba(16,12,26,.92)
    );

    backdrop-filter:blur(25px);

    border-bottom:
    1px solid rgba(255,255,255,.06);

    box-shadow:
    0 10px 35px rgba(0,0,0,.5);
}

.header::after{

    content:"";

    position:absolute;

    left:0;
    right:0;
    bottom:0;

    height:2px;

    background:
    linear-gradient(
        to right,
        transparent,
        var(--accent),
        transparent
    );
}

.title-main{

    font-family:"Cinzel",serif;

    font-size:
    clamp(28px,5vw,52px);

    font-weight:900;

    letter-spacing:2px;

    background:
    linear-gradient(
        to bottom,
        #fff8e3,
        var(--gold)
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.portal-sub{

    margin-top:4px;

    font-size:11px;

    letter-spacing:6px;

    color:var(--accent);
}

#clock{

    font-family:"Cinzel",serif;

    font-size:
    clamp(24px,5vw,42px);

    font-weight:900;

    color:#fff4d7;

    text-align:right;
}

#date{

    margin-top:4px;

    font-size:14px;

    font-weight:700;

    color:var(--accent);

    text-align:right;
}

/* ========================= */

.main{

    width:100%;
    max-width:1500px;

    margin:auto;

    padding:
    128px
    26px
    120px;
}

.section-title{

    margin:
    50px 0
    28px;

    text-align:center;

    font-size:30px;

    font-weight:900;

    letter-spacing:5px;

    color:#fff0cb;
}

.section-title::before,
.section-title::after{

    content:"✦";

    color:var(--accent);

    margin:0 12px;
}

/* =========================
GRID
========================= */

.grid{

    display:grid;

    grid-template-columns:
    repeat(var(--grid-cols),1fr);

    gap:28px;
}

/* =========================
CARD
========================= */

.card{

    position:relative;

    overflow:hidden;

    border-radius:34px;

    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,.06),
        rgba(255,255,255,.02)
    ),
    var(--card-bg);

    border:
    1px solid rgba(255,255,255,.08);

    box-shadow:var(--shadow);

    transition:.35s;
}

.card::before{

    content:"";

    position:absolute;

    inset:12px;

    border-radius:28px;

    border:
    1px solid rgba(255,255,255,.08);

    pointer-events:none;
}

.card::after{

    content:"☽";

    position:absolute;

    top:14px;
    right:18px;

    font-size:20px;

    color:var(--accent);

    opacity:.85;
}

.card:hover{

    transform:
    translateY(-8px)
    scale(1.02);

    box-shadow:
    0 30px 60px rgba(0,0,0,.62),
    var(--accent-glow);
}

.card-link{

    display:flex;

    flex-direction:column;

    justify-content:center;
    align-items:center;

    text-align:center;

    text-decoration:none;

    color:inherit;

    min-height:240px;

    padding:34px 20px;
}

.icon-box{

    font-size:60px;

    margin-bottom:18px;
}

.card-title{

    font-size:
    var(--dynamic-title-size);

    font-weight:900;

    line-height:1.2;

    margin-bottom:12px;

    color:#fff5d9;
}

.card-desc{

    font-size:
    var(--dynamic-desc-size);

    line-height:1.6;

    color:var(--text-sub);
}

.highlight-card{

    background:
    linear-gradient(
        180deg,
        rgba(255,230,170,.14),
        rgba(255,255,255,.03)
    ),
    rgba(46,32,18,.92) !important;
}

/* =========================
BUTTONS
========================= */

.controls{

    position:fixed;

    right:24px;
    bottom:24px;

    display:flex;
    flex-direction:column;

    gap:16px;

    z-index:1500;
}

.ctrl-btn{

    width:68px;
    height:68px;

    border-radius:50%;

    border:
    1px solid rgba(255,255,255,.08);

    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,.12),
        rgba(255,255,255,.03)
    ),
    rgba(18,12,28,.92);

    color:white;

    font-size:30px;

    cursor:pointer;

    transition:.3s;
}

.ctrl-btn:hover{

    transform:
    translateY(-4px)
    scale(1.06);

    box-shadow:
    var(--accent-glow);
}

/* =========================
ADMIN PANEL
========================= */

.admin-panel{

    position:fixed;

    top:0;
    right:-100%;

    width:500px;
    max-width:100%;

    height:100vh;

    overflow-y:auto;

    z-index:3000;

    padding:34px;

    background:
    linear-gradient(
        180deg,
        rgba(18,14,30,.98),
        rgba(10,8,18,.98)
    );

    backdrop-filter:blur(35px);

    border-left:
    1px solid rgba(255,255,255,.06);

    transition:.4s;
}

.admin-panel.show{
    right:0;
}

/* =========================
WIDGET
========================= */

.widget-grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(320px,1fr));

    gap:28px;
}

.widget-card{

    border-radius:34px;

    padding:26px;

    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,.06),
        rgba(255,255,255,.02)
    ),
    rgba(30,22,46,.88);

    border:
    1px solid rgba(255,255,255,.08);
}

.widget-header{

    font-size:24px;

    font-weight:900;

    margin-bottom:20px;

    color:#fff0c6;
}

.widget-input{

    width:100%;

    padding:16px;

    border-radius:18px;

    border:
    1px solid rgba(255,255,255,.08);

    background:
    rgba(255,255,255,.06);

    color:white;

    outline:none;

    font-size:16px;

    margin-bottom:14px;
}

.widget-main-btn{

    width:100%;

    padding:15px;

    border:none;

    border-radius:18px;

    cursor:pointer;

    background:
    linear-gradient(
        to right,
        var(--gold),
        #fff1c7
    );

    color:#2d1c10;

    font-weight:900;
}

.todo-item{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:12px;

    border-radius:14px;

    margin-bottom:10px;

    background:
    rgba(255,255,255,.05);
}

.todo-item.done{

    opacity:.5;

    text-decoration:line-through;
}

.note-area{

    width:100%;
    height:240px;

    resize:none;

    border:none;

    border-radius:24px;

    background:
    rgba(255,255,255,.05);

    color:white;

    padding:20px;

    outline:none;
}

/* =========================
RWD
========================= */

@media(max-width:1200px){

    .grid{
        grid-template-columns:repeat(3,1fr);
    }
}

@media(max-width:800px){

    .grid{
        grid-template-columns:repeat(2,1fr);
    }
}

@media(max-width:540px){

    .grid{
        grid-template-columns:1fr;
    }

    .main{
        padding:
        118px
        18px
        100px;
    }

    .card-link{
        min-height:190px;
    }

    .admin-panel{
        width:100%;
    }
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

    <div>

        <div class="title-main">
            中正診所
        </div>

        <div class="portal-sub">
            PORTAL SYSTEM
        </div>

    </div>

    <div>

        <div id="clock">
            00:00:00
        </div>

        <div id="date"></div>

    </div>

</div>

<!-- MAIN -->

<div class="main">

    <div class="section-title">
        主要入口
    </div>

    <div id="primaryGrid" class="grid"></div>

    <div class="section-title">
        次要工具
    </div>

    <div id="secondaryGrid" class="grid"></div>

    <!-- 模組 -->

    <div class="section-title">
        魔法模組
    </div>

    <div class="widget-grid">

        <!-- TODO -->

        <div class="widget-card">

            <div class="widget-header">
                ✦ 今日任務
            </div>

            <input
                id="todoInput"
                class="widget-input"
                placeholder="新增待辦事項..."
            >

            <button
                class="widget-main-btn"
                onclick="addTodo()"
            >
                新增任務
            </button>

            <div
                id="todoList"
                style="margin-top:18px;"
            ></div>

        </div>

        <!-- 倒數 -->

        <div class="widget-card">

            <div class="widget-header">
                ☾ 倒數日
            </div>

            <input
                type="text"
                id="countdownTitle"
                class="widget-input"
                placeholder="事件名稱"
            >

            <input
                type="date"
                id="countdownDate"
                class="widget-input"
            >

            <button
                class="widget-main-btn"
                onclick="saveCountdown()"
            >
                儲存倒數
            </button>

            <div
                id="countdownDisplay"
                style="margin-top:22px;"
            ></div>

        </div>

        <!-- 筆記 -->

        <div class="widget-card">

            <div class="widget-header">
                ✦ Mystic Notes
            </div>

            <textarea
                id="quickNote"
                class="note-area"
                placeholder="寫下你的想法..."
                oninput="saveQuickNote()"
            ></textarea>

        </div>

    </div>

    <!-- 背景 -->

    <div class="section-title">
        自訂背景
    </div>

    <div class="widget-card">

        <div class="widget-header">
            🌙 上傳背景圖片
        </div>

        <input
            type="file"
            id="bgUploader"
            accept="image/*"
            class="widget-input"
        >

        <button
            class="widget-main-btn"
            onclick="uploadBackground()"
        >
            套用背景
        </button>

        <button
            class="widget-main-btn"
            style="
            margin-top:14px;
            background:
            linear-gradient(
                to right,
                #ff738f,
                #ffb7c4
            );
            "
            onclick="removeBackground()"
        >
            移除背景
        </button>

    </div>

</div>

<!-- CONTROLS -->

<div class="controls">

    <button
        class="ctrl-btn"
        onclick="toggleTheme()"
        id="themeBtn">
        🌙
    </button>

    <button
        class="ctrl-btn"
        onclick="toggleAdminMode()">
        ⚙️
    </button>

</div>

<!-- ADMIN -->

<div class="admin-panel" id="adminPanel">

<h2 style="
font-size:34px;
color:#ffe8ba;
margin-bottom:20px;
">
介面管理
</h2>

<div style="
display:flex;
gap:16px;
margin-bottom:30px;
">

<div class="color-dot"
style="
width:48px;
height:48px;
border-radius:50%;
background:#8fd9ff;
cursor:pointer;
"
onclick="setColor('blue')"></div>

<div class="color-dot"
style="
width:48px;
height:48px;
border-radius:50%;
background:#9ce8b5;
cursor:pointer;
"
onclick="setColor('green')"></div>

<div class="color-dot"
style="
width:48px;
height:48px;
border-radius:50%;
background:#dcc8ff;
cursor:pointer;
"
onclick="setColor('purple')"></div>

<div class="color-dot"
style="
width:48px;
height:48px;
border-radius:50%;
background:#e3e3ec;
cursor:pointer;
"
onclick="setColor('gray')"></div>

</div>

</div>

<script>

/* =========================
CONFIG
========================= */

const SHEET_URL =
`https://docs.google.com/spreadsheets/d/1uYBA_CncbEAydmzNC1SRnsKJdswNgQh3zg1x6TKo0UU/export?format=csv&gid=0`;

let todos =
JSON.parse(
localStorage.getItem("portal_todos")
)
|| [];

/* =========================
CLOCK
========================= */

function updateClock(){

const now = new Date();

document.getElementById("clock")
.innerText =
now.toLocaleTimeString(
"zh-TW",
{hour12:false}
);

const y =
now.getFullYear();

const minguo =
y - 1911;

document.getElementById("date")
.innerText =
`(民${minguo}) ${y}/${
String(now.getMonth()+1)
.padStart(2,'0')
}/${
String(now.getDate())
.padStart(2,'0')
}`;
}

/* =========================
THEME
========================= */

function setColor(color){

document.documentElement
.setAttribute('data-color',color);

localStorage.setItem(
'cz_theme_color',
color
);
}

function toggleTheme(){

const root =
document.documentElement;

const next =
root.getAttribute('data-theme')
=== 'dark'
? 'light'
: 'dark';

root.setAttribute(
'data-theme',
next
);

document.getElementById(
'themeBtn'
).innerText =
next === 'dark'
? '🌙'
: '☀️';

localStorage.setItem(
'cz_portal_theme',
next
);
}

/* =========================
ADMIN
========================= */

function toggleAdminMode(){

document
.getElementById("adminPanel")
.classList.toggle("show");
}

/* =========================
CARD
========================= */

function createCard(l){

return `
<div class="card ${l.isHighlight ? 'highlight-card' : ''}">

<a class="card-link"
href="${l.url}"
target="_blank">

<span class="icon-box">
${l.icon || '🔗'}
</span>

<div class="card-title">
${l.title}
</div>

<div class="card-desc">
${l.desc || ''}
</div>

</a>

</div>
`;
}

/* =========================
GOOGLE SHEET
========================= */

async function fetchCloudData(){

try{

const res =
await fetch(
SHEET_URL +
"&cb=" +
Date.now()
);

const text =
await res.text();

const lines =
text.split(/\r?\n/)
.slice(1);

const pg =
document.getElementById("primaryGrid");

const sg =
document.getElementById("secondaryGrid");

pg.innerHTML = "";
sg.innerHTML = "";

lines.forEach(line=>{

const cols =
line
.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
.map(c=>
c.replace(/^"|"$/g,'').trim()
);

if(cols.length >= 3){

const [
cat,
title,
url,
desc,
icon
] = cols;

const html =
createCard({
title,
url,
desc,
icon,
isHighlight:
title.includes("重要")
});

if(
cat
.toLowerCase()
.includes('primary')
){
pg.innerHTML += html;
}else{
sg.innerHTML += html;
}
}
});

}catch(e){

console.error(e);
}
}

/* =========================
TODO
========================= */

function renderTodos(){

const list =
document.getElementById("todoList");

list.innerHTML = "";

todos.forEach((todo,index)=>{

const div =
document.createElement("div");

div.className =
`todo-item ${todo.done ? 'done' : ''}`;

div.innerHTML = `
<div
style="flex:1;cursor:pointer;"
onclick="toggleTodo(${index})"
>
${todo.text}
</div>

<button
onclick="deleteTodo(${index})"
style="
border:none;
background:#ff5f7c;
color:white;
width:32px;
height:32px;
border-radius:50%;
cursor:pointer;
"
>
✕
</button>
`;

list.appendChild(div);
});
}

function addTodo(){

const input =
document.getElementById("todoInput");

if(!input.value.trim()) return;

todos.unshift({
text:input.value,
done:false
});

localStorage.setItem(
"portal_todos",
JSON.stringify(todos)
);

input.value = "";

renderTodos();
}

function toggleTodo(index){

todos[index].done =
!todos[index].done;

localStorage.setItem(
"portal_todos",
JSON.stringify(todos)
);

renderTodos();
}

function deleteTodo(index){

todos.splice(index,1);

localStorage.setItem(
"portal_todos",
JSON.stringify(todos)
);

renderTodos();
}

/* =========================
COUNTDOWN
========================= */

function saveCountdown(){

const title =
document.getElementById(
"countdownTitle"
).value;

const date =
document.getElementById(
"countdownDate"
).value;

if(!title || !date) return;

localStorage.setItem(
"portal_countdown",
JSON.stringify({
title,
date
})
);

renderCountdown();
}

function renderCountdown(){

const data =
JSON.parse(
localStorage.getItem(
"portal_countdown"
)
);

if(!data) return;

const target =
new Date(data.date);

const now =
new Date();

const diff =
Math.ceil(
(target-now)
/
(1000*60*60*24)
);

document.getElementById(
"countdownDisplay"
).innerHTML = `
<div style="
padding:22px;
border-radius:24px;
text-align:center;
background:
rgba(255,255,255,.05);
">

<div style="
font-size:18px;
margin-bottom:10px;
color:#fff0c6;
">
${data.title}
</div>

<div style="
font-size:52px;
font-weight:900;
color:var(--accent);
">
${diff}
</div>

<div>DAYS</div>

</div>
`;
}

/* =========================
NOTE
========================= */

function saveQuickNote(){

localStorage.setItem(
"portal_note",
document.getElementById(
"quickNote"
).value
);
}

function loadQuickNote(){

document.getElementById(
"quickNote"
).value =
localStorage.getItem(
"portal_note"
)
|| "";
}

/* =========================
BACKGROUND
========================= */

function uploadBackground(){

const file =
document.getElementById(
"bgUploader"
).files[0];

if(!file) return;

const reader =
new FileReader();

reader.onload = function(e){

localStorage.setItem(
"portal_custom_bg",
e.target.result
);

applyCustomBackground();
};

reader.readAsDataURL(file);
}

function applyCustomBackground(){

const bg =
localStorage.getItem(
"portal_custom_bg"
);

if(!bg) return;

document.body.style.background = `
linear-gradient(
rgba(0,0,0,.65),
rgba(0,0,0,.78)
),
url(${bg})
center center / cover no-repeat fixed
`;
}

function removeBackground(){

localStorage.removeItem(
"portal_custom_bg"
);

location.reload();
}

/* =========================
LOAD
========================= */

window.onload = ()=>{

const savedColor =
localStorage.getItem(
'cz_theme_color'
)
|| 'purple';

setColor(savedColor);

const savedTheme =
localStorage.getItem(
'cz_portal_theme'
)
|| 'dark';

document.documentElement
.setAttribute(
'data-theme',
savedTheme
);

document.getElementById(
'themeBtn'
