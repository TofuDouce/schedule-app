<script>

function showToast(msg){

    const toast=document.getElementById('toastBox');

    toast.textContent=msg;

    toast.classList.add('show');

    setTimeout(()=>{
        toast.classList.remove('show');
    },2200);
}

const menuData={

cat15:[
{id:'ch1',name:'紅豆',price:15},
{id:'ch2',name:'奶油',price:15},
{id:'ch3',name:'花生',price:15},
{id:'ch4',name:'巧克力',price:15},
{id:'ch5',name:'咖啡',price:15},
{id:'ch6',name:'玉米',price:15},
{id:'ch7',name:'哈密瓜奶油',price:15},
{id:'ch8',name:'草莓奶油',price:15},
{id:'ch9',name:'起士',price:15},
{id:'ch10',name:'胡椒蛋',price:15},
{id:'ch11',name:'蘿蔔絲',price:15},
{id:'ch12',name:'酸菜菜脯',price:15},
{id:'ch13',name:'高麗菜飯',price:15}
],

'cat18-19':[
{id:'ch14',name:'奧利奧OREO雙餡',price:18},
{id:'ch15',name:'芝麻',price:19}
],

cat20:[
{id:'ch16',name:'地瓜',price:20},
{id:'ch17',name:'三餡',price:20},
{id:'ch18',name:'麻吉 + 任一口味',price:20},
{id:'ch19',name:'原味麻吉',price:20},
{id:'ch20',name:'黑糖麻吉',price:20},
{id:'ch21',name:'紅豆 + 麻吉',price:20},
{id:'ch22',name:'奶油 + 麻吉',price:20},
{id:'ch23',name:'芝麻 + 麻吉',price:20},
{id:'ch24',name:'巧克力 + 麻吉',price:20}
],

'cat21-25':[
{id:'ch25',name:'起司蛋',price:21},
{id:'ch26',name:'芋頭',price:25},
{id:'ch27',name:'五餡',price:25}
]

};

let currentSelection={};

let globalLedger=[];

function initSelections(){

    Object.keys(menuData).forEach(cat=>{

        menuData[cat].forEach(item=>{

            currentSelection[item.id]=0;

        });

    });

}

function renderFlavorLists(){

    const area=document.getElementById('flavorScrollArea');

    area.innerHTML='';

    Object.keys(menuData).forEach((cat,index)=>{

        const pane=document.createElement('div');

        pane.className=`flavor-group-pane ${index===0?'active':''}`;

        pane.id=`pane-${cat}`;

        menuData[cat].forEach(item=>{

            const row=document.createElement('div');

            row.className='flavor-row';

            row.innerHTML=`

            <div>
                <span class="flavor-name">${item.name}</span>
                <span class="flavor-price">$ ${item.price} / 個</span>
            </div>

            <div class="counter-controls">

                <button class="counter-btn"
                onclick="updateCount('${item.id}',-1)">
                -
                </button>

                <span class="counter-value"
                id="count-${item.id}">
                0
                </span>

                <button class="counter-btn"
                onclick="updateCount('${item.id}',1)">
                +
                </button>

            </div>
            `;

            pane.appendChild(row);

        });

        area.appendChild(pane);

    });

}

function switchCategory(catId){

    document.querySelectorAll('.tab-btn').forEach(btn=>{
        btn.classList.remove('active');
    });

    document.getElementById(`btn-${catId}`).classList.add('active');

    document.querySelectorAll('.flavor-group-pane').forEach(pane=>{
        pane.classList.remove('active');
    });

    document.getElementById(`pane-${catId}`).classList.add('active');
}

function updateCount(id,delta){

    const newVal=(currentSelection[id]||0)+delta;

    if(newVal>=0 && newVal<=99){

        currentSelection[id]=newVal;

        document.getElementById(`count-${id}`).textContent=newVal;

        calculateSingleTotal();
    }
}

function findItemById(id){

    for(let cat of Object.keys(menuData)){

        let match=menuData[cat].find(i=>i.id===id);

        if(match) return match;
    }

    return null;
}

function calculateSingleTotal(){

    let sum=0;

    Object.keys(currentSelection).forEach(id=>{

        const qty=currentSelection[id];

        const item=findItemById(id);

        if(item && qty>0){

            sum+=qty*item.price;
        }
    });

    document.getElementById('singleTotal').textContent=`$ ${sum}`;

    return sum;
}

function submitOrder(){

    const name=document.getElementById('memberInput').value.trim();

    if(!name){

        showToast('請輸入名字');

        return;
    }

    let hasItems=false;

    let detailSegments=[];

    let itemsOrdered={};

    Object.keys(currentSelection).forEach(id=>{

        const qty=currentSelection[id];

        if(qty>0){

            hasItems=true;

            const item=findItemById(id);

            detailSegments.push(`${item.name} x${qty}`);

            itemsOrdered[id]=qty;
        }
    });

    if(!hasItems){

        showToast('請先選擇品項');

        return;
    }

    const cost=calculateSingleTotal();

    globalLedger.push({

        id:Date.now(),
        name:name,
        detailsText:detailSegments.join('、'),
        items:itemsOrdered,
        cost:cost

    });

    renderLedger();

    document.getElementById('memberInput').value='';

    initSelections();

    Object.keys(currentSelection).forEach(id=>{

        document.getElementById(`count-${id}`).textContent='0';

    });

    calculateSingleTotal();

    showToast('已加入帳本');
}

function renderLedger(){

    const list=document.getElementById('ledgerList');

    if(globalLedger.length===0){

        list.innerHTML=`
        <div id="emptyLedger"
        style="text-align:center;padding:40px 0;color:#8e7a70;">
        還沒有人點餐唷！
        </div>
        `;

        return;
    }

    list.innerHTML='';

    let totalMoney=0;

    let totalFlavorCounters={};

    globalLedger.forEach(record=>{

        totalMoney+=record.cost;

        Object.keys(record.items).forEach(id=>{

            totalFlavorCounters[id]=(totalFlavorCounters[id]||0)+record.items[id];

        });

        const div=document.createElement('div');

        div.className='ledger-item';

        div.innerHTML=`

        <div style="flex:1;min-width:0;">

            <span class="ledger-name">
            【${record.name}】
            </span>

            <span class="ledger-detail">
            ${record.detailsText}
            </span>

        </div>

        <div class="ledger-actions">

            <span style="font-size:22px;color:#d96a6a;font-weight:700;">
            $${record.cost}
            </span>

        </div>
        `;

        list.appendChild(div);

    });

    document.getElementById('grandTotal').textContent=`$ ${totalMoney}`;

    let statSegments=[];

    Object.keys(totalFlavorCounters).forEach(id=>{

        const item=findItemById(id);

        if(item){

            statSegments.push(`${item.name}:${totalFlavorCounters[id]}個`);
        }

    });

    document.getElementById('allFlavorStats').textContent=
    statSegments.join(' / ');
}

function copyFilteredLedgerText(){

    if(globalLedger.length===0){

        showToast('目前沒有資料');

        return;
    }

    let text='✦ 太極鰲車輪餅點餐單 ✦\n\n';

    globalLedger.forEach(record=>{

        text+=`【${record.name}】\n`;

        text+=`${record.detailsText}\n`;

        text+=`共 ${record.cost} 元\n\n`;

    });

    text+=`總金額：${document.getElementById('grandTotal').textContent}`;

    navigator.clipboard.writeText(text);

    showToast('已複製');
}

function clearAllLedgers(){

    if(confirm('確定要清空嗎？')){

        globalLedger=[];

        renderLedger();

        document.getElementById('allFlavorStats').textContent='無';

        document.getElementById('grandTotal').textContent='$ 0';

        showToast('已清空');
    }
}

function triggerGenerateImage(){

    if(globalLedger.length===0){

        showToast('目前沒有資料');

        return;
    }

    autoUpdateVisualCardImage();
}

/* 文字換行 */
function splitLongText(ctx,text,maxWidth){

    let words=text.split('、');

    let lines=[];

    let current='';

    words.forEach(word=>{

        let test=current ? current+'、'+word : word;

        if(ctx.measureText(test).width > maxWidth){

            if(current) lines.push(current);

            current=word;

        }else{

            current=test;
        }

    });

    if(current) lines.push(current);

    return lines;
}

/* 圓角矩形 */
function roundRect(ctx,x,y,width,height,radius,fill,stroke){

    ctx.beginPath();

    ctx.moveTo(x+radius,y);

    ctx.lineTo(x+width-radius,y);

    ctx.quadraticCurveTo(x+width,y,x+width,y+radius);

    ctx.lineTo(x+width,y+height-radius);

    ctx.quadraticCurveTo(x+width,y+height,x+width-radius,y+height);

    ctx.lineTo(x+radius,y+height);

    ctx.quadraticCurveTo(x,y+height,x,y+height-radius);

    ctx.lineTo(x,y+radius);

    ctx.quadraticCurveTo(x,y,x+radius,y);

    ctx.closePath();

    if(fill) ctx.fill();

    if(stroke) ctx.stroke();
}

/* 新版大圖卡 */
function autoUpdateVisualCardImage(){

    const canvas=document.getElementById('captureCanvas');

    const ctx=canvas.getContext('2d');

    canvas.width=720;

    let dynamicHeight=240;

    globalLedger.forEach(record=>{

        dynamicHeight+=130;

    });

    dynamicHeight+=220;

    canvas.height=dynamicHeight;

    // 背景
    let gradient=ctx.createLinearGradient(0,0,0,canvas.height);

    gradient.addColorStop(0,'#fff9f6');
    gradient.addColorStop(1,'#ffebe3');

    ctx.fillStyle=gradient;

    ctx.fillRect(0,0,canvas.width,canvas.height);

    // 外框
    ctx.strokeStyle='#ead8cf';

    ctx.lineWidth=3;

    ctx.strokeRect(20,20,canvas.width-40,canvas.height-40);

    // 標題
    ctx.textAlign='center';

    ctx.fillStyle='#54433a';

    ctx.font='bold 36px "Microsoft JhengHei"';

    ctx.fillText('🥞 太極鰲車輪餅結算單 🥞',canvas.width/2,70);

    ctx.font='20px "Microsoft JhengHei"';

    ctx.fillStyle='#8e7a70';

    ctx.fillText('下午茶美味統計圖卡',canvas.width/2,110);

    let currentY=170;

    // 明細
    globalLedger.forEach(record=>{

        ctx.fillStyle='rgba(255,255,255,0.9)';

        roundRect(ctx,40,currentY-30,640,95,20,true,false);

        ctx.fillStyle='#54433a';

        ctx.font='bold 24px "Microsoft JhengHei"';

        ctx.textAlign='left';

        ctx.fillText(`【${record.name}】`,60,currentY);

        ctx.font='20px "Microsoft JhengHei"';

        ctx.fillStyle='#7a6a62';

        const lines=splitLongText(ctx,record.detailsText,420);

        let detailY=currentY+35;

        lines.forEach(line=>{

            ctx.fillText(line,60,detailY);

            detailY+=30;

        });

        // 單品金額
        ctx.textAlign='right';

        ctx.fillStyle='#d96a6a';

        ctx.font='bold 32px "Quicksand"';

        ctx.fillText(`$${record.cost}`,650,currentY+18);

        currentY+=Math.max(120,55+lines.length*30);
    });

    // 統計框
    ctx.fillStyle='rgba(255,255,255,0.92)';

    roundRect(ctx,40,currentY,640,180,20,true,false);

    currentY+=45;

    ctx.textAlign='left';

    ctx.fillStyle='#8e7a70';

    ctx.font='bold 24px "Microsoft JhengHei"';

    ctx.fillText('🥞 全體品項統計',60,currentY);

    currentY+=40;

    ctx.fillStyle='#54433a';

    ctx.font='20px "Microsoft JhengHei"';

    const statLines=splitLongText(
        ctx,
        document.getElementById('allFlavorStats').textContent,
        560
    );

    statLines.forEach(line=>{

        ctx.fillText(line,60,currentY);

        currentY+=30;
    });

    currentY+=15;

    ctx.strokeStyle='rgba(0,0,0,0.08)';

    ctx.beginPath();

    ctx.moveTo(60,currentY);

    ctx.lineTo(650,currentY);

    ctx.stroke();

    currentY+=50;

    ctx.fillStyle='#54433a';

    ctx.font='bold 26px "Microsoft JhengHei"';

    ctx.fillText('💰 今日總金額',60,currentY);

    ctx.textAlign='right';

    ctx.fillStyle='#d96a6a';

    ctx.font='bold 42px "Quicksand"';

    ctx.fillText(
        document.getElementById('grandTotal').textContent,
        650,
        currentY+8
    );

    // 底部
    ctx.textAlign='center';

    ctx.fillStyle='rgba(142,122,112,0.45)';

    ctx.font='16px "Quicksand"';

    ctx.fillText(
        'Made with yummy thoughts by ChuChu ✦',
        canvas.width/2,
        canvas.height-30
    );

    const dataURL=canvas.toDataURL('image/png');

    const output=document.getElementById('outputCardImage');

    output.src=dataURL;

    output.style.display='block';

    document.getElementById('imgPlaceholder').style.display='none';

    showToast('✨ 圖卡生成完成');
}

window.onload=function(){

    initSelections();

    renderFlavorLists();

};

</script>
