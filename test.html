<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>油漆大狂歡 ✦ Paint Splash</title>
    <meta name="robots" content="noindex,nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b090f;
            font-family: "Zen Maru Gothic", sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            cursor: crosshair;
        }
        /* 頂部極簡控制列 */
        .ui-layer {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
        }
        .title-block {
            pointer-events: auto;
        }
        .title {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .subtitle {
            font-size: 12px;
            color: #7b6f93;
            margin-top: 4px;
            letter-spacing: 1px;
        }
        .controls {
            display: flex;
            gap: 12px;
            pointer-events: auto;
        }
        .btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e2d9f3;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }
        .btn.active {
            background: #d8bf8a;
            color: #120e1a;
            border-color: #d8bf8a;
            font-weight: 700;
        }
        .footer {
            width: 100%;
            text-align: center;
        }
        .hint-text {
            font-size: 14px;
            color: rgba(234, 223, 255, 0.3);
            letter-spacing: 3px;
            animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.02); }
        }
    </style>
</head>
<body>

    <canvas id="paintCanvas"></canvas>

    <div class="ui-layer">
        <div class="header">
            <div class="title-block">
                <h1 class="title">油漆大狂歡</h1>
                <div class="subtitle">✦ Paint Splash</div>
            </div>
            <div class="controls">
                <button class="btn active" id="modeClear" onclick="setMode('clear')">煙火流星</button>
                <button class="btn" id="modeKeep" onclick="setMode('keep')">瘋狂塗鴉</button>
                <button class="btn" onclick="clearCanvas()">洗刷畫布</button>
            </div>
        </div>
        <div class="footer">
            <div class="hint-text">輕觸任何角落・釋放色彩瘋狂</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let currentMode = 'clear'; // 'clear' = 動態消散, 'keep' = 永久殘留

        // 特調發光霓虹油漆色系
        const colors = [
            '#ff3366', '#ff6633', '#FFCC00', '#33cc66', 
            '#3399ff', '#9933ff', '#ff33cc', '#00f5d4'
        ];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if(currentMode === 'keep') clearCanvas(); 
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class PaintSplatter {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                // 讓油漆向四周隨機噴濺，有大有小才有物理層次感
                this.radius = Math.random() * 8 + 2; 
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 12 + 3;
                this.speedX = Math.cos(angle) * speed;
                this.speedY = Math.sin(angle) * speed;
                
                this.gravity = 0.15; // 地心引力讓油漆往下垂流
                this.friction = 0.95; // 空氣阻力
                this.opacity = 1;
                this.decay = Math.random() * 0.015 + 0.008;
            }

            update() {
                this.speedX *= this.friction;
                this.speedY *= this.friction;
                this.speedY += this.gravity;
                this.x += this.speedX;
                this.y += this.speedY;
                
                if (currentMode === 'clear') {
                    this.opacity -= this.decay;
                } else {
                    // 殘留模式下，速度慢到一定程度就停止計算，凝固在畫布上
                    if(Math.abs(this.speedX) < 0.1 && Math.abs(this.speedY) < 0.1) {
                        this.opacity = 1;
                    }
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                // 加上超炫麗的發光濾鏡效果
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        function createSplash(x, y) {
            const burstCount = Math.floor(Math.random() * 20) + 40; // 每次點擊噴出 40~60 個油漆點
            const groupColor = colors[Math.floor(Math.random() * colors.length)]; // 同一次點擊使用同色系更有整體感
            
            for (let i = 0; i < burstCount; i++) {
                particles.push(new PaintSplatter(x, y, groupColor));
            }
        }

        // 點擊事件
        canvas.addEventListener('mousedown', (e) => {
            createSplash(e.clientX, e.clientY);
        });

        // 手機觸控支援
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            createSplash(touch.clientX, touch.clientY);
        }, { passive: false });

        // 切換模式
        function setMode(mode) {
            currentMode = mode;
            document.getElementById('modeClear').classList.toggle('active', mode === 'clear');
            document.getElementById('modeKeep').classList.toggle('active', mode === 'keep');
            clearCanvas();
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = [];
        }

        // 動態渲染引擎
        function renderLoop() {
            if (currentMode === 'clear') {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }

            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                p.update();
                p.draw();

                // 移除完全透明的粒子
                if (currentMode === 'clear' && p.opacity <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(renderLoop);
        }

        renderLoop();
    </script>
</body>
</html>
