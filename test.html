<!-- 🌙 直接取代你原本的「倒數日 widget-card」 -->

<div class="widget-card">

    <div class="widget-header">
        ☾ 倒數日
    </div>

    <input
        type="text"
        id="countdownTitle"
        class="widget-input"
        placeholder="事件名稱"
    >

    <input
        type="date"
        id="countdownDate"
        class="widget-input"
    >

    <button
        class="widget-main-btn"
        onclick="addCountdown()"
    >
        新增倒數日
    </button>

    <div
        id="countdownList"
        class="countdown-list"
    ></div>

</div>

<style>

/* =========================
COUNTDOWN
========================= */

.countdown-list{

    margin-top:24px;

    display:flex;

    flex-direction:column;

    gap:16px;
}

.countdown-card{

    position:relative;

    overflow:hidden;

    padding:22px;

    border-radius:24px;

    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,.06),
        rgba(255,255,255,.02)
    ),
    rgba(255,255,255,.04);

    border:
    1px solid rgba(255,255,255,.08);

    transition:.25s;
}

.countdown-card:hover{

    transform:
    translateY(-3px);

    box-shadow:
    var(--accent-glow);
}

/* 月亮 */

.countdown-card::after{

    content:"☽";

    position:absolute;

    top:14px;
    right:16px;

    color:var(--accent);

    opacity:.8;
}

/* 快到期 */

.countdown-card.soon{

    border:
    1px solid rgba(255,220,120,.35);

    box-shadow:
    0 0 24px rgba(255,220,120,.12);
}

/* 過期 */

.countdown-card.expired{

    opacity:.45;

    filter:grayscale(.4);
}

.countdown-top{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:18px;
}

.countdown-name{

    font-size:20px;

    font-weight:900;

    color:#fff1c8;

    padding-right:16px;
}

.countdown-actions{

    display:flex;

    gap:10px;
}

.countdown-btn{

    border:none;

    width:36px;
    height:36px;

    border-radius:50%;

    cursor:pointer;

    font-size:15px;

    font-weight:900;

    transition:.2s;
}

.edit-btn{

    background:
    linear-gradient(
        to right,
        #8fd9ff,
        #c8eeff
    );

    color:#102030;
}

.del-btn{

    background:
    linear-gradient(
        to right,
        #ff6f8e,
        #ffc0cb
    );

    color:white;
}

.countdown-btn:hover{

    transform:scale(1.08);
}

.countdown-days{

    font-size:58px;

    font-weight:900;

    color:var(--accent);

    line-height:1;

    text-shadow:
    0 0 18px rgba(255,255,255,.12);
}

.countdown-label{

    margin-top:8px;

    font-size:14px;

    letter-spacing:4px;

    opacity:.7;
}

/* 日期 */

.countdown-date{

    margin-top:18px;

    font-size:14px;

    color:var(--text-sub);
}

</style>

<script>

/* =========================
COUNTDOWN SYSTEM V2
========================= */

let countdowns =
JSON.parse(
    localStorage.getItem(
        "portal_countdowns"
    )
)
|| [];

/* ========================= */

function addCountdown(){

    const title =
    document.getElementById(
        "countdownTitle"
    ).value.trim();

    const date =
    document.getElementById(
        "countdownDate"
    ).value;

    if(!title || !date){

        return alert(
            "請輸入名稱與日期"
        );
    }

    countdowns.unshift({

        id:Date.now(),

        title,

        date
    });

    saveCountdowns();

    document.getElementById(
        "countdownTitle"
    ).value = "";

    document.getElementById(
        "countdownDate"
    ).value = "";

    renderCountdowns();
}

/* ========================= */

function renderCountdowns(){

    const list =
    document.getElementById(
        "countdownList"
    );

    if(!list) return;

    list.innerHTML = "";

    countdowns.forEach(item=>{

        const target =
        new Date(item.date);

        const now =
        new Date();

        const diff =
        Math.ceil(
            (target-now)
            /
            (1000*60*60*24)
        );

        let statusClass = "";

        if(diff <= 7 && diff >= 0){

            statusClass = "soon";
        }

        if(diff < 0){

            statusClass = "expired";
        }

        const div =
        document.createElement("div");

        div.className =
        `countdown-card ${statusClass}`;

        div.innerHTML = `

        <div class="countdown-top">

            <div class="countdown-name">
                ${item.title}
            </div>

            <div class="countdown-actions">

                <button
                    class="countdown-btn edit-btn"
                    onclick="editCountdown(${item.id})"
                >
                    ✎
                </button>

                <button
                    class="countdown-btn del-btn"
                    onclick="deleteCountdown(${item.id})"
                >
                    ✕
                </button>

            </div>

        </div>

        <div class="countdown-days">
            ${diff}
        </div>

        <div class="countdown-label">
            DAYS
        </div>

        <div class="countdown-date">
            ${item.date}
        </div>

        `;

        list.appendChild(div);
    });
}

/* ========================= */

function deleteCountdown(id){

    if(!confirm("確定刪除？"))
    return;

    countdowns =
    countdowns.filter(
        x=>x.id !== id
    );

    saveCountdowns();

    renderCountdowns();
}

/* ========================= */

function editCountdown(id){

    const target =
    countdowns.find(
        x=>x.id === id
    );

    if(!target) return;

    const newTitle =
    prompt(
        "修改名稱",
        target.title
    );

    if(newTitle === null) return;

    const newDate =
    prompt(
        "修改日期 YYYY-MM-DD",
        target.date
    );

    if(newDate === null) return;

    target.title =
    newTitle;

    target.date =
    newDate;

    saveCountdowns();

    renderCountdowns();
}

/* ========================= */

function saveCountdowns(){

    localStorage.setItem(
        "portal_countdowns",
        JSON.stringify(countdowns)
    );
}

/* ========================= */
/* 初始化 */
/* ========================= */

window.addEventListener(
    "load",
    renderCountdowns
);

</script>
