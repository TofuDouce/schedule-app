<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✦ 太極鰲車輪餅．美味團購 ✦</title>
    <style>
        :root { --base-font-size: 18px; --bg-base: #fff9f6; --card-bg: #ffffff; --text-main: #54433a; --butter-gold: #f6c86c; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg-base); padding: 20px; font-size: var(--base-font-size); color: var(--text-main); }
        .container { max-width: 800px; margin: auto; }
        .main-calculator { background: var(--card-bg); padding: 2rem; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .gen-image-btn { width: 100%; background: #e67e22; color: #fff; padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        #outputCardImage { width: 100%; max-width: 700px; display: none; margin-top: 20px; border-radius: 16px; border: 2px solid var(--butter-gold); }
    </style>
</head>
<body>

<div class="container">
    <div class="main-calculator">
        <h1>太極鰲車輪餅</h1>
        <div id="flavorScrollArea"></div>
        <button class="gen-image-btn" onclick="triggerGenerateImage()">📸 產生精美大圖卡</button>
        <img id="outputCardImage" alt="結算圖卡">
    </div>
</div>

<canvas id="captureCanvas" width="700" style="display:none;"></canvas>

<script>
const menuData = {
    cat15: [
        { id: 'ch1', name: '紅豆', price: 15 }, { id: 'ch2', name: '奶油', price: 15 },
        { id: 'ch3', name: '花生', price: 15 }, { id: 'ch4', name: '巧克力', price: 15 },
        { id: 'ch5', name: '咖啡', price: 15 }, { id: 'ch6', name: '玉米', price: 15 },
        { id: 'ch7', name: '哈密瓜奶油', price: 15 }, { id: 'ch8', name: '草莓奶油', price: 15 },
        { id: 'ch9', name: '起士', price: 15 }, { id: 'ch10', name: '胡椒蛋', price: 15 },
        { id: 'ch11', name: '蘿蔔絲', price: 15 }, { id: 'ch12', name: '酸菜菜脯', price: 15 },
        { id: 'ch13', name: '高麗菜飯', price: 15 }
    ],
    'cat18-19': [
        { id: 'ch14', name: '奧利奧OREO雙餡', price: 18 }, { id: 'ch15', name: '芝麻', price: 19 }
    ],
    cat20: [
        { id: 'ch16', name: '地瓜', price: 20 }, { id: 'ch17', name: '三餡', price: 20 },
        { id: 'ch18', name: '麻吉 + 任一口味', price: 20 }, { id: 'ch19', name: '原味麻吉', price: 20 },
        { id: 'ch20', name: '黑糖麻吉', price: 20 }, { id: 'ch21', name: '紅豆 + 麻吉', price: 20 },
        { id: 'ch22', name: '奶油 + 麻吉', price: 20 }, { id: 'ch23', name: '芝麻 + 麻吉', price: 20 },
        { id: 'ch24', name: '巧克力 + 麻吉', price: 20 }
    ],
    'cat21-25': [
        { id: 'ch25', name: '起司蛋', price: 21 }, { id: 'ch26', name: '芋頭', price: 25 },
        { id: 'ch27', name: '五餡', price: 25 }
    ]
};

let globalLedger = JSON.parse(localStorage.getItem('chuchu_pie_ledger')) || [];

function findItemById(id) {
    for (let cat in menuData) {
        let match = menuData[cat].find(i => i.id === id);
        if (match) return match;
    }
    return { name: "未知", price: 0 };
}

function triggerGenerateImage() {
    const canvas = document.getElementById('captureCanvas');
    const ctx = canvas.getContext('2d');
    
    // 動態高度計算 (確保內容不會被切斷)
    let totalHeight = 150;
    globalLedger.forEach(record => {
        totalHeight += 50; 
        totalHeight += (Object.keys(record.items).length * 35);
    });
    canvas.height = totalHeight + 100;

    // 繪製背景
    ctx.fillStyle = "#fff9f6";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // 繪製標題
    ctx.fillStyle = "#54433a";
    ctx.font = "bold 32px Microsoft JhengHei";
    ctx.fillText("✦ 太極鰲車輪餅結算單 ✦", 180, 70);
    
    // 繪製內容
    let currentY = 130;
    globalLedger.forEach(record => {
        ctx.font = "bold 22px Microsoft JhengHei";
        ctx.fillText(`👤 ${record.name}`, 40, currentY);
        currentY += 40;
        
        ctx.font = "18px Microsoft JhengHei";
        Object.keys(record.items).forEach(id => {
            const item = findItemById(id);
            const qty = record.items[id];
            // 強制換行：一行一個品項
            ctx.fillText(`• ${item.name}：${item.price}元 x ${qty}個 = ${item.price * qty}元`, 70, currentY);
            currentY += 35;
        });
        currentY += 20;
    });

    // 輸出圖片
    const outputImg = document.getElementById('outputCardImage');
    outputImg.src = canvas.toDataURL("image/png");
    outputImg.style.display = "block";
}
</script>
</body>
</html>
