<!DOCTYPE html>
<html lang="zh-Hant" data-theme="dark" data-color="purple">

<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>中正診所 Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">

<style>

/* =========================
ROOT
========================= */

:root{

    --dynamic-title-size:28px;
    --dynamic-desc-size:17px;
    --grid-cols:4;

    --bg1:#09070f;
    --bg2:#140f1f;
    --bg3:#1f1730;

    --text-main:#fff5df;
    --text-sub:#d9cfe7;

    --gold:#e7c57e;

    --card-bg:rgba(31,23,47,.88);

    --shadow:
    0 20px 50px rgba(0,0,0,.55);

    --accent:#dcc8ff;

    --accent-soft:
    rgba(220,200,255,.12);

    --accent-glow:
    0 0 28px rgba(220,200,255,.25);
}

/* =========================
COLOR
========================= */

:root[data-color="blue"]{
    --accent:#8fd9ff;
    --accent-soft:rgba(143,217,255,.14);
    --accent-glow:0 0 28px rgba(143,217,255,.24);
}

:root[data-color="green"]{
    --accent:#9ce8b5;
    --accent-soft:rgba(156,232,181,.14);
    --accent-glow:0 0 28px rgba(156,232,181,.24);
}

:root[data-color="purple"]{
    --accent:#dcc8ff;
    --accent-soft:rgba(220,200,255,.14);
    --accent-glow:0 0 28px rgba(220,200,255,.25);
}

:root[data-color="gray"]{
    --accent:#e3e3ec;
    --accent-soft:rgba(227,227,236,.14);
    --accent-glow:0 0 28px rgba(227,227,236,.24);
}

/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{

    min-height:100vh;

    overflow-x:hidden;

    font-family:
    "Noto Sans TC",
    sans-serif;

    color:var(--text-main);

    background:

    radial-gradient(
        circle at top,
        rgba(255,255,255,.05),
        transparent 20%
    ),

    radial-gradient(
        circle at 20% 30%,
        var(--accent-soft),
        transparent 25%
    ),

    radial-gradient(
        circle at 80% 20%,
        rgba(255,220,150,.06),
        transparent 20%
    ),

    linear-gradient(
        180deg,
        var(--bg1),
        var(--bg2),
        var(--bg3)
    );

    background-attachment:fixed;

    position:relative;
}

body::before{

    content:"";

    position:fixed;
    inset:0;

    pointer-events:none;

    background-image:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,.7) 1px, transparent 1px),
    radial-gradient(circle at 70% 50%, rgba(255,255,255,.4) 1px, transparent 1px),
    radial-gradient(circle at 90% 20%, rgba(255,255,255,.5) 1px, transparent 1px),
    radial-gradient(circle at 35% 85%, rgba(255,255,255,.4) 1px, transparent 1px);

    background-size:300px 300px;

    opacity:.35;

    z-index:-1;
}

/* =========================
HEADER
========================= */

.header{

    position:fixed;

    top:0;
    left:0;
    right:0;

    z-index:1000;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:18px 5%;

    background:
    linear-gradient(
        to bottom,
        rgba(8,6,15,.96),
        rgba(16,12,26,.92)
    );

    backdrop-filter:blur(25px);

    border-bottom:
    1px solid rgba(255,255,255,.06);

    box-shadow:
    0 10px 35px rgba(0,0,0,.5);
}

.header::after{

    content:"";

    position:absolute;

    left:0;
    right:0;
    bottom:0;

    height:2px;

    background:
    linear-gradient(
        to right,
        transparent,
        var(--accent),
        transparent
    );
}

.title-main{

    font-family:"Cinzel",serif;

    font-size:
    clamp(28px,5vw,52px);

    font-weight:900;

    letter-spacing:2px;

    background:
    linear-gradient(
        to bottom,
        #fff8e3,
        var(--gold)
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.portal-sub{

    margin-top:4px;

    font-size:11px;

    letter-spacing:6px;

    color:var(--accent);
}

#clock{

    font-family:"Cinzel",serif;

    font-size:
    clamp(24px,5vw,42px);

    font-weight:900;

    color:#fff4d7;

    text-align:right;
}

#date{

    margin-top:4px;

    font-size:14px;

    font-weight:700;

    color:var(--accent);

    text-align:right;
}

/* ========================= */

.main{

    width:100%;
    max-width:1500px;

    margin:auto;

    padding:
    128px
    26px
    120px;
}

.section-title{

    margin:
    50px 0
    28px;

    text-align:center;

    font-size:30px;

    font-weight:900;

    letter-spacing:5px;

    color:#fff0cb;
}

.section-title::before,
.section-title::after{

    content:"✦";

    color:var(--accent);

    margin:0 12px;
}

/* =========================
GRID
========================= */

.grid{

    display:grid;

    grid-template-columns:
    repeat(var(--grid-cols),1fr);

    gap:28px;
}

/* =========================
CARD
========================= */

.card{

    position:relative;

    overflow:hidden;

    border-radius:34px;

    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,.06),
        rgba(255,255,255,.02)
    ),
    var(--card-bg);

    border:
    1px solid rgba(255,255,255,.08);

    box-shadow:var(--shadow);

    transition:.35s;
}

.card::before{

    content:"";

    position:absolute;

    inset:12px;

    border-radius:28px;

    border:
    1px solid rgba(255,255,255,.08);

    pointer-events:none;
}

.card::after{

    content:"☽";

    position:absolute;

    top:14px;
    right:18px;

    font-size:20px;

    color:var(--accent);

    opacity:.85;
}

.card:hover{

    transform:
    translateY(-8px)
    scale(1.02);

    box-shadow:
    0 30px 60px rgba(0,0,0,.62),
    var(--accent-glow);
}

.card-link{

    display:flex;

    flex-direction:column;

    justify-content:center;
    align-items:center;

    text-align:center;

    text-decoration:none;

    color:inherit;

    min-height:240px;

    padding:34px 20px;
}

.icon-box{

    font-size:60px;

    margin-bottom:18px;
}

.card-title{

    font-size:
    var(--dynamic-title-size);

    font-weight:900;

    line-height:1.2;

    margin-bottom:12px;

    color:#fff5d9;
}

.card-desc{

    font-size:
    var(--dynamic-desc-size);

    line-height:1.6;

    color:var(--text-sub);
}

/* =========================
BUTTONS
========================= */

.controls{

    position:fixed;

    right:24px;
    bottom:24px;

    display:flex;
    flex-direction:column;

    gap:16px;

    z-index:1500;
}

.ctrl-btn{

    width:68px;
    height:68px;

    border-radius:50%;

    border:
    1px solid rgba(255,255,255,.08);

    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,.12),
        rgba(255,255,255,.03)
    ),
    rgba(18,12,28,.92);

    color:white;

    font-size:30px;

    cursor:pointer;

    transition:.3s;
}

.ctrl-btn:hover{

    transform:
    translateY(-4px)
    scale(1.06);

    box-shadow:
    var(--accent-glow);
}

/* =========================
WIDGET
========================= */

.widget-grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(320px,1fr));

    gap:28px;
}

.widget-card{

    border-radius:34px;

    padding:26px;

    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,.06),
        rgba(255,255,255,.02)
    ),
    rgba(30,22,46,.88);

    border:
    1px solid rgba(255,255,255,.08);
}

.widget-header{

    font-size:24px;

    font-weight:900;

    margin-bottom:20px;

    color:#fff0c6;
}

.widget-input{

    width:100%;

    padding:16px;

    border-radius:18px;

    border:
    1px solid rgba(255,255,255,.08);

    background:
    rgba(255,255,255,.06);

    color:white;

    outline:none;

    font-size:16px;

    margin-bottom:14px;
}

.widget-main-btn{

    width:100%;

    padding:15px;

    border:none;

    border-radius:18px;

    cursor:pointer;

    background:
    linear-gradient(
        to right,
        var(--gold),
        #fff1c7
    );

    color:#2d1c10;

    font-weight:900;
}

/* =========================
TODO
========================= */

.todo-item{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:12px;

    border-radius:14px;

    margin-bottom:10px;

    background:
    rgba(255,255,255,.05);
}

.todo-item.done{

    opacity:.5;

    text-decoration:line-through;
}

/* =========================
COUNTDOWN
========================= */

.countdown-list{

    margin-top:24px;

    display:flex;

    flex-direction:column;

    gap:16px;
}

.countdown-card{

    position:relative;

    overflow:hidden;

    padding:22px;

    border-radius:24px;

    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,.06),
        rgba(255,255,255,.02)
    ),
    rgba(255,255,255,.04);

    border:
    1px solid rgba(255,255,255,.08);

    transition:.25s;
}

.countdown-card:hover{

    transform:
    translateY(-3px);

    box-shadow:
    var(--accent-glow);
}

.countdown-card::after{

    content:"☽";

    position:absolute;

    top:14px;
    right:16px;

    color:var(--accent);

    opacity:.8;
}

.countdown-card.soon{

    border:
    1px solid rgba(255,220,120,.35);

    box-shadow:
    0 0 24px rgba(255,220,120,.12);
}

.countdown-card.expired{

    opacity:.45;

    filter:grayscale(.4);
}

.countdown-top{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:18px;
}

.countdown-name{

    font-size:20px;

    font-weight:900;

    color:#fff1c8;

    padding-right:16px;
}

.countdown-actions{

    display:flex;

    gap:10px;
}

.countdown-btn{

    border:none;

    width:36px;
    height:36px;

    border-radius:50%;

    cursor:pointer;

    font-size:15px;

    font-weight:900;
}

.edit-btn{

    background:
    linear-gradient(
        to right,
        #8fd9ff,
        #c8eeff
    );

    color:#102030;
}

.del-btn{

    background:
    linear-gradient(
        to right,
        #ff6f8e,
        #ffc0cb
    );

    color:white;
}

.countdown-days{

    font-size:58px;

    font-weight:900;

    color:var(--accent);

    line-height:1;
}

.countdown-label{

    margin-top:8px;

    font-size:14px;

    letter-spacing:4px;

    opacity:.7;
}

.countdown-date{

    margin-top:18px;

    font-size:14px;

    color:var(--text-sub);
}

/* =========================
NOTE
========================= */

.note-area{

    width:100%;
    height:240px;

    resize:none;

    border:none;

    border-radius:24px;

    background:
    rgba(255,255,255,.05);

    color:white;

    padding:20px;

    outline:none;
}

/* =========================
RWD
========================= */

@media(max-width:1200px){

    .grid{
        grid-template-columns:repeat(3,1fr);
    }
}

@media(max-width:800px){

    .grid{
        grid-template-columns:repeat(2,1fr);
    }
}

@media(max-width:540px){

    .grid{
        grid-template-columns:1fr;
    }

    .main{
        padding:
        118px
        18px
        100px;
    }

    .card-link{
        min-height:190px;
    }

    .countdown-days{
        font-size:46px;
    }
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

    <div>

        <div class="title-main">
            中正診所
        </div>

        <div class="portal-sub">
            PORTAL SYSTEM
        </div>

    </div>

    <div>

        <div id="clock">
            00:00:00
        </div>

        <div id="date"></div>

    </div>

</div>

<!-- MAIN -->

<div class="main">

    <div class="section-title">
        魔法模組
    </div>

    <div class="widget-grid">

        <!-- TODO -->

        <div class="widget-card">

            <div class="widget-header">
                ✦ 今日任務
            </div>

            <input
                id="todoInput"
                class="widget-input"
                placeholder="新增待辦事項..."
            >

            <button
                class="widget-main-btn"
                onclick="addTodo()"
            >
                新增任務
            </button>

            <div
                id="todoList"
                style="margin-top:18px;"
            ></div>

        </div>

        <!-- COUNTDOWN -->

        <div class="widget-card">

            <div class="widget-header">
                ☾ 倒數日
            </div>

            <input
                type="text"
                id="countdownTitle"
                class="widget-input"
                placeholder="事件名稱"
            >

            <input
                type="date"
                id="countdownDate"
                class="widget-input"
            >

            <button
                class="widget-main-btn"
                onclick="addCountdown()"
            >
                新增倒數日
            </button>

            <div
                id="countdownList"
                class="countdown-list"
            ></div>

        </div>

        <!-- NOTE -->

        <div class="widget-card">

            <div class="widget-header">
                ✦ Mystic Notes
            </div>

            <textarea
                id="quickNote"
                class="note-area"
                placeholder="寫下你的想法..."
                oninput="saveQuickNote()"
            ></textarea>

        </div>

    </div>

</div>

<!-- CONTROLS -->

<div class="controls">

    <button
        class="ctrl-btn"
        onclick="toggleTheme()"
        id="themeBtn">
        🌙
    </button>

</div>

<script>

/* =========================
CLOCK
========================= */

function updateClock(){

const now = new Date();

document.getElementById("clock")
.innerText =
now.toLocaleTimeString(
"zh-TW",
{hour12:false}
);

const y =
now.getFullYear();

const minguo =
y - 1911;

document.getElementById("date")
.innerText =
`(民${minguo}) ${y}/${
String(now.getMonth()+1)
.padStart(2,'0')
}/${
String(now.getDate())
.padStart(2,'0')
}`;
}

/* =========================
THEME
========================= */

function toggleTheme(){

const root =
document.documentElement;

const next =
root.getAttribute('data-theme')
=== 'dark'
? 'light'
: 'dark';

root.setAttribute(
'data-theme',
next
);

document.getElementById(
'themeBtn'
).innerText =
next === 'dark'
? '🌙'
: '☀️';
}

/* =========================
TODO
========================= */

let todos =
JSON.parse(
localStorage.getItem(
"portal_todos"
)
)
|| [];

function renderTodos(){

const list =
document.getElementById(
"todoList"
);

list.innerHTML = "";

todos.forEach((todo,index)=>{

const div =
document.createElement("div");

div.className =
`todo-item ${todo.done ? 'done' : ''}`;

div.innerHTML = `
<div
style="flex:1;cursor:pointer;"
onclick="toggleTodo(${index})"
>
${todo.text}
</div>

<button
onclick="deleteTodo(${index})"
style="
border:none;
background:#ff5f7c;
color:white;
width:32px;
height:32px;
border-radius:50%;
cursor:pointer;
"
>
✕
</button>
`;

list.appendChild(div);
});
}

function addTodo(){

const input =
document.getElementById(
"todoInput"
);

if(!input.value.trim()) return;

todos.unshift({

text:input.value,

done:false
});

localStorage.setItem(
"portal_todos",
JSON.stringify(todos)
);

input.value = "";

renderTodos();
}

function toggleTodo(index){

todos[index].done =
!todos[index].done;

localStorage.setItem(
"portal_todos",
JSON.stringify(todos)
);

renderTodos();
}

function deleteTodo(index){

todos.splice(index,1);

localStorage.setItem(
"portal_todos",
JSON.stringify(todos)
);

renderTodos();
}

/* =========================
COUNTDOWN
========================= */

let countdowns =
JSON.parse(
localStorage.getItem(
"portal_countdowns"
)
)
|| [];

function addCountdown(){

const title =
document.getElementById(
"countdownTitle"
).value.trim();

const date =
document.getElementById(
"countdownDate"
).value;

if(!title || !date){

return alert(
"請輸入名稱與日期"
);
}

countdowns.unshift({

id:Date.now(),

title,

date
});

saveCountdowns();

document.getElementById(
"countdownTitle"
).value = "";

document.getElementById(
"countdownDate"
).value = "";

renderCountdowns();
}

function renderCountdowns(){

const list =
document.getElementById(
"countdownList"
);

list.innerHTML = "";

countdowns.forEach(item=>{

const target =
new Date(item.date);

const now =
new Date();

const diff =
Math.ceil(
(target-now)
/
(1000*60*60*24)
);

let statusClass = "";

if(diff <= 7 && diff >= 0){

statusClass = "soon";
}

if(diff < 0){

statusClass = "expired";
}

const div =
document.createElement("div");

div.className =
`countdown-card ${statusClass}`;

div.innerHTML = `

<div class="countdown-top">

<div class="countdown-name">
${item.title}
</div>

<div class="countdown-actions">

<button
class="countdown-btn edit-btn"
onclick="editCountdown(${item.id})"
>
✎
</button>

<button
class="countdown-btn del-btn"
onclick="deleteCountdown(${item.id})"
>
✕
</button>

</div>

</div>

<div class="countdown-days">
${diff}
</div>

<div class="countdown-label">
DAYS
</div>

<div class="countdown-date">
${item.date}
</div>

`;

list.appendChild(div);
});
}

function deleteCountdown(id){

if(!confirm("確定刪除？"))
return;

countdowns =
countdowns.filter(
x=>x.id !== id
);

saveCountdowns();

renderCountdowns();
}

function editCountdown(id){

const target =
countdowns.find(
x=>x.id === id
);

if(!target) return;

const newTitle =
prompt(
"修改名稱",
target.title
);

if(newTitle === null) return;

const newDate =
prompt(
"修改日期 YYYY-MM-DD",
target.date
);

if(newDate === null) return;

target.title =
newTitle;

target.date =
newDate;

saveCountdowns();

renderCountdowns();
}

function saveCountdowns(){

localStorage.setItem(
"portal_countdowns",
JSON.stringify(countdowns)
);
}

/* =========================
NOTE
========================= */

function saveQuickNote(){

localStorage.setItem(
"portal_note",
document.getElementById(
"quickNote"
).value
);
}

function loadQuickNote(){

document.getElementById(
"quickNote"
).value =
localStorage.getItem(
"portal_note"
)
|| "";
}

/* =========================
LOAD
========================= */

window.onload = ()=>{

setInterval(
updateClock,
1000
);

updateClock();

renderTodos();

renderCountdowns();

loadQuickNote();
};

</script>

</body>
</html>
