<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcane Portal ✦ 魔法功能核心</title>

    <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
    <meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
    <meta name="bingbot" content="noindex,nofollow,noarchive,nosnippet,noimageindex">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: font-size 0.2s ease, transform 0.4s ease, box-shadow 0.4s ease, background-color 0.3s ease, border-color 0.3s ease;
        }

        :root {
            --bg1: #171320;
            --bg2: #241a35;
            --bg3: #31244d;
            --gold: #d8bf8a;
            --text: #f4efff;
            --card: rgba(29, 24, 44, .72);
            --gold-low: rgba(216, 191, 138, 0.15);
            
            /* 文字大小基礎設定級距 */
            --base-font-size: 16px;
        }

        body {
            min-height: 100vh;
            color: var(--text);
            font-family: "Cormorant Garamond", serif;
            background: radial-gradient(circle at top, rgba(180,150,255,.14), transparent 40%),
                        linear-gradient(180deg, var(--bg1), var(--bg2), var(--bg3));
            padding: 28px;
            position: relative;
            font-size: var(--base-font-size);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 星空背景 */
        .stars {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: -3;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: .7;
            animation: twinkle 4s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: .15; transform: scale(.7); }
            50% { opacity: 1; transform: scale(1.4); }
        }

        /* 魔法古典外框 */
        .frame {
            position: fixed;
            inset: 14px;
            border: 1.5px solid rgba(216,191,138,.48);
            border-radius: 38px;
            pointer-events: none;
            z-index: 999;
        }

        .frame::before {
            content: "";
            position: absolute;
            inset: 12px;
            border: 1px solid rgba(216,191,138,.18);
            border-radius: 30px;
        }

        /* 四角裝飾 */
        .corner {
            position: fixed;
            width: 120px;
            height: 120px;
            pointer-events: none;
            z-index: 1000;
        }

        .corner::before {
            content: "";
            position: absolute;
            inset: 0;
            border: 1.5px solid rgba(216,191,138,.45);
            border-radius: 50%;
        }

        .corner::after {
            content: "✦";
            position: absolute;
            color: rgba(216,191,138,.85);
            font-size: 26px;
        }

        .tl { top: 18px; left: 18px; }
        .tl::before { clip-path: polygon(0 0, 100% 0, 0 100%); }
        .tl::after { top: 18px; left: 18px; }

        .tr { top: 18px; right: 18px; }
        .tr::before { clip-path: polygon(0 0, 100% 0, 100% 100%); }
        .tr::after { top: 18px; right: 18px; }

        .bl { bottom: 18px; left: 18px; }
        .bl::before { clip-path: polygon(0 0, 0 100%, 100% 100%); }
        .bl::after { bottom: 18px; left: 18px; }

        .br { bottom: 18px; right: 18px; }
        .br::before { clip-path: polygon(100% 0, 0 100%, 100% 100%); }
        .br::after { bottom: 18px; right: 18px; }

        /* 主內容區容器 */
        .container {
            width: 100%;
            max-width: 960px;
            margin: auto;
            position: relative;
            z-index: 2;
            padding: 20px 0;
        }

        /* 文字大小控制列 */
        .font-control {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: -10px;
            position: relative;
            z-index: 1010;
        }

        .font-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(216, 191, 138, 0.3);
            color: var(--text);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-family: "Cinzel", serif;
            font-size: 14px;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .font-btn:hover {
            background: rgba(216, 191, 138, 0.2);
            color: var(--gold);
            border-color: var(--gold);
        }

        .font-btn.active {
            background: var(--gold);
            color: var(--bg1);
            font-weight: bold;
            border-color: var(--gold);
        }

        /* 懸浮月亮 */
        .moon {
            text-align: center;
            margin-top: 10px;
            position: relative;
        }

        .moon::before {
            content: "";
            position: absolute;
            left: 50%;
            top: -50px;
            width: 1px;
            height: 50px;
            background: rgba(216,191,138,.35);
        }

        .moon-symbol {
            font-size: 42px;
            color: var(--gold);
            text-shadow: 0 0 18px rgba(216,191,138,.25);
            animation: floatMoon 4s ease-in-out infinite;
        }

        @keyframes floatMoon {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(6px); }
        }

        /* 標題與核心主視覺 */
        .title-block {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 35px;
        }

        .main-title {
            font-family: "Cinzel", serif;
            font-weight: 700;
            letter-spacing: 4px;
            line-height: 1.2;
            font-size: clamp(32px, 6vw, 54px);
            background: linear-gradient(180deg, #ffffff 0%, #f1e8ff 40%, #d8bf8a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        /* 雙欄響應式布局 */
        .layout-grid {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        @media (min-width: 900px) {
            .layout-grid {
                flex-direction: row;
                align-items: stretch;
            }
        }

        /* 核心空白主要功能卡片 */
        .main-calculator {
            flex: 1;
            background: var(--card);
            border: 1px solid rgba(255,255,255,.06);
            border-radius: 34px;
            padding: 32px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 20px 50px rgba(0,0,0,.3);
        }

        /* 側邊說明面板卡片 */
        .sidebar-panel {
            width: 100%;
            background: var(--card);
            border: 1px solid rgba(255,255,255,.06);
            border-radius: 34px;
            padding: 28px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 20px 50px rgba(0,0,0,.3);
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 900px) {
            .sidebar-panel {
                width: 320px;
            }
        }

        /* 古典表單元件通用設計（預留給未來表單使用） */
        .form-label {
            display: block;
            font-size: calc(var(--base-font-size) * 0.9);
            color: #bba9e8;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .input-wrapper {
            position: relative;
        }

        .classic-input {
            width: 100%;
            background: rgba(15, 11, 25, 0.5);
            border: 1px solid rgba(216, 191, 138, 0.25);
            border-radius: 16px;
            padding: 12px 16px;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            font-weight: 600;
            font-size: calc(var(--base-font-size) * 1.1);
        }

        .classic-input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 12px rgba(216, 191, 138, 0.2);
        }

        /* 分隔線 */
        .classic-hr {
            margin: 24px 0;
            border: none;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(216,191,138,.4), transparent);
        }

        /* 側邊欄專用古典標題 */
        .sidebar-title {
            font-family: "Cinzel", serif;
            font-size: calc(var(--base-font-size) * 1.15);
            color: var(--gold);
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .sidebar-desc {
            font-size: 13px;
            color: #a897c9;
            text-align: center;
            line-height: 1.5;
            margin-bottom: 16px;
            font-style: italic;
        }

        /* 顏色語意庫 */
        .color-gold { color: var(--gold); }
        .color-rose { color: #f29494; }
        .color-mint { color: #8ae0be; }
        .color-text { color: var(--text); }

        /* 頁尾 */
        .footer {
            text-align: center;
            margin-top: 35px;
        }

        .footer-line {
            width: 100px;
            height: 1px;
            margin: auto;
            margin-bottom: 14px;
            background: linear-gradient(90deg, transparent, rgba(216,191,138,.5), transparent);
        }

        .footer-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-family: "Cinzel", serif;
            font-size: 20px;
            letter-spacing: 2px;
            color: #eadfff;
        }

        .creator {
            margin-top: 6px;
            font-size: 13px;
            color: #a897c9;
            letter-spacing: 1px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="frame"></div>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="container">
    <div class="font-control">
        <button class="font-btn" onclick="changeFontSize('small', this)">A -</button>
        <button class="font-btn active" onclick="changeFontSize('medium', this)">A</button>
        <button class="font-btn" onclick="changeFontSize('large', this)">A +</button>
    </div>

    <div class="moon">
        <div class="moon-symbol">☾</div>
    </div>

    <div class="title-block">
        <h1 class="main-title" id="pageTitle">Arcane Portal</h1>
    </div>

    <div class="layout-grid">
        
        <div class="main-calculator" id="mainCorePanel">
            <div style="text-align: center; padding: 40px 0; color: rgba(216,191,138,0.5); font-style: italic;">
                ✦ 核心魔法框架已就緒 ✦<br>
                <span style="font-size: 14px; color: #a897c9;">（未來要添加的新功能、按鈕、輸入框，將在此處完美生成）</span>
            </div>
        </div>

        <div class="sidebar-panel" id="sidebarPanel">
            <h3 class="sidebar-title" id="sideTitle">🔮 啟示秘典</h3>
            <p class="sidebar-desc" id="sideDesc">待功能注入後，此處將顯示專屬的指引、數據或微調配置參數項目。</p>
            
            <div style="flex: 1; display: flex; align-items: center; justify-content: center; border: 1px dashed rgba(216, 191, 138, 0.15); border-radius: 16px; padding: 20px; font-size: 13px; color: #7a6b99; text-align: center; font-style: italic;">
                ※ 註：右側提示面板亦已同步清空留白。
            </div>
        </div>

    </div>

    <div class="footer">
        <div class="footer-line"></div>
        <div class="footer-inner">
            <span id="footerBrand">✦ Lazy Dream ✦</span>
        </div>
        <div class="creator" id="footerSubtext">Crafted with moonlight & ledger magic</div>
    </div>
</div>

<script>
/* ===== 星空隨機位置背景生成 ===== */
const stars = document.getElementById("stars");
for (let i = 0; i < 140; i++) {
    const star = document.createElement("div");
    star.className = "star";
    star.style.left = Math.random() * 100 + "%";
    star.style.top = Math.random() * 100 + "%";
    star.style.animationDelay = Math.random() * 4 + "s";
    stars.appendChild(star);
}

/* ===== 魔法字體級距縮放切換 ===== */
function changeFontSize(size, btnElement) {
    const root = document.documentElement;
    document.querySelectorAll('.font-btn').forEach(btn => btn.classList.remove('active'));
    btnElement.classList.add('active');
    
    if (size === 'small') {
        root.style.setProperty('--base-font-size', '13px');
    } else if (size === 'medium') {
        root.style.setProperty('--base-font-size', '16px');
    } else if (size === 'large') {
        root.style.setProperty('--base-font-size', '20px');
    }
}

/* ===== 未來注入的功能邏輯 JavaScript 寫在這裡 ===== */
// 示例：未來由我來為你編寫與網頁互動的邏輯
</script>

</body>
</html>
