<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工事中</title>
  <!-- 不被搜尋引擎收錄 -->
  <meta name="robots" content="noindex, nofollow">

  <!-- ============================================================
       ★ 設定區 ★  以後開新頁,只要改這一塊就好!
       ============================================================ -->
  <script>
    const CONFIG = {
      emoji:    "🌙",                       // 上方的小圖示
      title:    "這裡沒有路喔～",            // 大標題
      subtitle: "Under Construction",        // 英文副標(全大寫)
      lines: [                               // 中間內文,每行一句
        "這個小角落還在悄悄施工中,",
        "網頁還在烘焙、程式還在攪拌🌙",
        "不如先回頭走走,稍後再來看看吧!"
      ],
      brand:    "工事中 · 慵懶夢境"          // 最下方品牌署名
    };
  </script>
  <!-- ============================================================
       設定區結束。以下通常不用動。
       ============================================================ -->

  <style>
    :root {
      /* 莫蘭迪紫色系 */
      --bg:        #f4f1f7;
      --bg-2:      #faf8fc;
      --card:      #fffdff;
      --plum:      #6f6386;   /* 深莫蘭迪紫(標題) */
      --plum-soft: #9b8eb3;
      --lavender:  #c3b6d8;
      --lavender-soft: #ddd3ec;
      --pale:      #ece5f4;
      --text:      #5d5468;
      --muted:     #9a8fa8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, var(--bg) 0%, var(--bg-2) 100%);
      color: var(--text);
      font-family: "Noto Serif TC", "Microsoft JhengHei", serif;
      padding: 28px;
      text-align: center;
      overflow: hidden;
    }
    .card {
      position: relative;
      background: var(--card);
      border-radius: 30px;
      padding: 48px 36px 40px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 18px 50px rgba(111, 99, 134, .16);
    }
    .blob {
      font-size: 72px;
      display: inline-block;
      animation: float 3.6s ease-in-out infinite;
      filter: drop-shadow(0 6px 10px rgba(111, 99, 134, .2));
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-3deg); }
      50%      { transform: translateY(-12px) rotate(3deg); }
    }
    h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 2px;
      margin: 20px 0 6px;
      color: var(--plum);
    }
    .sub {
      font-size: 14px;
      letter-spacing: 4px;
      color: var(--lavender);
      margin-bottom: 22px;
      text-transform: uppercase;
    }
    p {
      color: var(--muted);
      line-height: 1.9;
      font-size: 15.5px;
    }
    .dots {
      display: flex;
      justify-content: center;
      gap: 9px;
      margin-top: 30px;
    }
    .dots span {
      width: 14px; height: 14px;
      border-radius: 50%;
      animation: blink 1.6s ease-in-out infinite;
    }
    .dots span:nth-child(1){ background: var(--plum);          animation-delay: 0s; }
    .dots span:nth-child(2){ background: var(--plum-soft);     animation-delay: .2s; }
    .dots span:nth-child(3){ background: var(--lavender);      animation-delay: .4s; }
    .dots span:nth-child(4){ background: var(--lavender-soft); animation-delay: .6s; }
    .dots span:nth-child(5){ background: var(--pale);          animation-delay: .8s; }
    @keyframes blink {
      0%, 100% { opacity: .35; transform: translateY(0); }
      50%      { opacity: 1;   transform: translateY(-5px); }
    }
    .footnote {
      margin-top: 26px;
      font-size: 12.5px;
      letter-spacing: 1px;
      color: var(--lavender);
    }
    /* 背景柔和裝飾圓 */
    .deco { position: fixed; border-radius: 50%; filter: blur(2px); opacity: .5; z-index: -1; }
    .deco.a { width: 160px; height: 160px; background: var(--lavender-soft); top: -40px;  left: -40px; }
    .deco.b { width: 220px; height: 220px; background: var(--pale);          bottom: -70px; right: -60px; }
    .deco.c { width: 90px;  height: 90px;  background: var(--plum-soft);      bottom: 60px; left: 20px; opacity: .25; }
  </style>
</head>
<body>
  <div class="deco a"></div>
  <div class="deco b"></div>
  <div class="deco c"></div>

  <div class="card">
    <div class="blob" id="emoji"></div>
    <h1 id="title"></h1>
    <div class="sub" id="subtitle"></div>
    <p id="lines"></p>
    <div class="dots">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="footnote" id="brand"></div>
  </div>

  <script>
    // 把設定區的內容套進頁面
    document.getElementById("emoji").textContent    = CONFIG.emoji;
    document.getElementById("title").textContent    = CONFIG.title;
    document.getElementById("subtitle").textContent = CONFIG.subtitle;
    document.getElementById("brand").textContent    = CONFIG.brand;
    document.getElementById("lines").innerHTML       = CONFIG.lines.join("<br>");
    document.title = CONFIG.title;
  </script>
</body>
</html>
