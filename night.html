<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL - PROTOCOL ERROR</title>
    <style>
        :root {
            --primary-color: #a89fbb; /* 莫蘭迪紫灰 */
            --bg-color: #1a1a1e;
            --text-color: #dcdcdc;
            --border-color: #444;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Consolas', 'Courier New', monospace;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        #terminal {
            width: 100%;
            max-width: 800px;
            border: 1px solid var(--border-color);
            padding: 20px;
            background: #232328;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        #output {
            height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
            white-space: pre-wrap;
            border-bottom: 1px solid #333;
        }
        #input-line {
            display: flex;
        }
        #prompt { color: var(--primary-color); margin-right: 10px; }
        input {
            background: transparent;
            border: none;
            color: #fff;
            outline: none;
            width: 100%;
            font-size: 1rem;
        }
        .highlight { color: #f0e68c; }
        .error { color: #ff6b6b; }
    </style>
</head>
<body>

<div id="terminal">
    <div id="output">=== 系統重啟中... 權限層級：GUEST ===
輸入 <span class="highlight">"help"</span> 查看可用指令。
系統偵測到環境中存在 1 個未知的邏輯鎖定。</div>
    <div id="input-line">
        <span id="prompt">></span>
        <input type="text" id="command-input" autofocus autocomplete="off">
    </div>
</div>

<script>
    const output = document.getElementById('output');
    const input = document.getElementById('command-input');

    let state = {
        location: 'corridor',
        inventory: [],
        power: false,
        decrypted: false,
        attempts: 0
    };

    const world = {
        corridor: {
            desc: "你身處於昏暗的走廊。北邊有一扇 [重裝甲門]，牆上有一個 [控制箱]。",
            items: ["絲線"]
        },
        control_box: {
            desc: "控制箱面板需要 4 位數密碼。提示：二進位 1011 的十進位值。",
            locked: true
        }
    };

    function log(msg, type = '') {
        const div = document.createElement('div');
        div.className = type;
        div.innerHTML = msg;
        output.appendChild(div);
        output.scrollTop = output.scrollHeight;
    }

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const cmd = input.value.trim().toLowerCase();
            processCommand(cmd);
            input.value = '';
        }
    });

    function processCommand(cmd) {
        log(`<span style="color: #a89fbb">> ${cmd}</span>`);
        
        const args = cmd.split(' ');
        const action = args[0];

        switch(action) {
            case 'help':
                log("可用指令: look (查看), go [目標], use [物品], inspect [對象], inv (背包)");
                break;
            case 'look':
                log(world[state.location].desc);
                break;
            case 'inv':
                log("背包內容: " + (state.inventory.length ? state.inventory.join(', ') : "空無一物"));
                break;
            case 'go':
                if (args[1] === '控制箱' || args[1] === 'box') {
                    state.location = 'control_box';
                    log("已移動至 控制箱 前。");
                } else if (args[1] === '走廊') {
                    state.location = 'corridor';
                    log("回到走廊。");
                } else {
                    log("無法到達該位置。", "error");
                }
                break;
            case 'use':
                handleUse(args[1]);
                break;
            case '11': // 二進位解謎
                if (state.location === 'control_box') {
                    state.power = true;
                    log("【系統提示】密碼正確。電力系統已強行重啟。甲門鎖定解除。", "highlight");
                } else {
                    log("無效的指令或位置。", "error");
                }
                break;
            default:
                log("未知指令。請嘗試更精確的動作。", "error");
        }
    }

    function handleUse(item) {
        if (item === '11' && state.location === 'control_box') {
            log("你直接輸入了數值...");
        } else {
            log("目前無法使用該物品。");
        }
    }
</script>
</body>
</html>
