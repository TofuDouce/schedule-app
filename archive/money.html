<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>✦ 元大貸款試算 ✦</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg-base:#fff9f6;
    --bg-gradient:#ffebe3;

    --card-bg:#ffffff;

    --text-main:#54433a;
    --text-sub:#8e7a70;

    --gold:#f6c86c;
    --gold-hover:#efb94d;

    --pink:#f79999;

    --line:#eadfd8;

    --green:#a8d5ba;

    --base-font-size:20px;
}

body{
    min-height:100vh;

    background:
    linear-gradient(
        180deg,
        var(--bg-base) 0%,
        var(--bg-gradient) 100%
    );

    font-family:
    "Zen Maru Gothic",
    "Quicksand",
    "Microsoft JhengHei",
    sans-serif;

    color:var(--text-main);

    padding:28px;

    display:flex;
    justify-content:center;
    align-items:center;

    position:relative;
}

.decor-border{
    position:fixed;
    inset:12px;

    border:2px dashed rgba(142,122,112,0.15);

    border-radius:24px;

    pointer-events:none;
}

.container{
    width:100%;
    max-width:900px;

    position:relative;
    z-index:2;
}

.hero{
    text-align:center;
    margin-bottom:28px;
}

.badge{
    display:inline-block;

    background:rgba(246,200,108,0.18);

    color:#b57d18;

    padding:7px 16px;

    border-radius:999px;

    font-size:15px;
    font-weight:700;

    margin-bottom:14px;
}

.title{
    font-size:clamp(34px,5vw,52px);
    line-height:1.4;
    letter-spacing:1px;
}

.subtitle{
    margin-top:10px;

    color:var(--text-sub);

    font-size:16px;
}

.layout{
    display:grid;
    grid-template-columns:1fr;
    gap:24px;
}

@media(min-width:900px){
    .layout{
        grid-template-columns:1.1fr 0.9fr;
    }
}

.card{
    background:var(--card-bg);

    border-radius:28px;

    border:1px solid rgba(142,122,112,0.1);

    padding:30px;

    box-shadow:
    0 10px 30px rgba(84,67,58,0.05);
}

.section-title{
    font-size:24px;
    margin-bottom:18px;
}

.section-desc{
    color:var(--text-sub);
    line-height:1.8;
    margin-bottom:24px;
}

.input-group{
    margin-bottom:18px;
}

.label{
    display:block;

    margin-bottom:8px;

    font-weight:700;
    font-size:16px;
}

.input{
    width:100%;

    padding:15px 16px;

    border-radius:16px;

    border:1.5px solid rgba(142,122,112,0.16);

    background:#fffbf9;

    color:var(--text-main);

    font-size:17px;

    font-family:inherit;

    transition:0.2s;
}

.input:focus{
    outline:none;

    border-color:var(--gold);

    background:white;

    box-shadow:
    0 0 0 4px rgba(246,200,108,0.2);
}

.main-btn{
    width:100%;

    border:none;

    background:var(--gold);

    color:var(--text-main);

    padding:16px;

    border-radius:18px;

    cursor:pointer;

    font-family:inherit;
    font-size:18px;
    font-weight:700;

    margin-top:14px;

    box-shadow:
    0 6px 16px rgba(246,200,108,0.25);

    transition:0.2s;
}

.main-btn:hover{
    background:var(--gold-hover);

    transform:translateY(-2px);
}

.result-box{
    background:#fffaf7;

    border:1px dashed rgba(142,122,112,0.2);

    border-radius:22px;

    padding:22px;

    margin-bottom:18px;
}

.result-title{
    font-size:18px;
    font-weight:700;

    margin-bottom:8px;
}

.result-text{
    color:var(--text-sub);
    line-height:1.8;
}

.big-result{
    margin-top:18px;

    background:
    linear-gradient(
        135deg,
        #fff3d9,
        #ffe8ba
    );

    border-radius:22px;

    padding:26px;

    text-align:center;

    border:2px solid rgba(246,200,108,0.25);
}

.big-result-label{
    font-size:16px;
    color:#8e7a70;
    margin-bottom:10px;
}

.big-result-number{
    font-size:48px;
    font-weight:700;
    color:#b57d18;
}

.list{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.list-item{
    background:#fffcfb;

    border:1px solid rgba(142,122,112,0.08);

    border-radius:18px;

    padding:18px;
}

.list-item-title{
    font-weight:700;
    margin-bottom:8px;
}

.list-item-text{
    color:var(--text-sub);
    line-height:1.8;
    font-size:15px;
}

.footer{
    text-align:center;

    margin-top:36px;

    color:var(--text-sub);

    font-size:14px;
}

.footer b{
    color:var(--pink);
}

.watermark{
    position:fixed;

    right:24px;
    bottom:24px;

    color:rgba(142,122,112,0.4);

    font-size:12px;

    letter-spacing:0.5px;

    pointer-events:none;
}

</style>
</head>

<body>

<div class="decor-border"></div>

<div class="watermark">
    Made with pastel thoughts by <b>ChuChu</b> ✦
</div>

<div class="container">

    <div class="hero">

        <div class="badge">
            元大股票貸款試算 🌸
        </div>

        <h1 class="title">
            股票市值貸款計算器
        </h1>

        <p class="subtitle">
            Gentle · Soft · Financial Helper ✦
        </p>

    </div>

    <div class="layout">

        <!-- LEFT -->

        <div class="card">

            <h2 class="section-title">
                輸入你的資料 ✦
            </h2>

            <p class="section-desc">
                輸入年薪、股票市值、
                與目前已使用的信貸額度，
                系統會自動幫你試算可貸金額。
            </p>

            <div class="input-group">
                <label class="label">
                    年薪（萬元）
                </label>

                <input
                    class="input"
                    id="salary"
                    type="number"
                    placeholder="例如：100"
                >
            </div>

            <div class="input-group">
                <label class="label">
                    股票市值（萬元）
                </label>

                <input
                    class="input"
                    id="stock"
                    type="number"
                    placeholder="例如：1700"
                >
            </div>

            <div class="input-group">
                <label class="label">
                    已使用信貸額度（萬元）
                </label>

                <input
                    class="input"
                    id="used"
                    type="number"
                    placeholder="例如：390"
                >
            </div>

            <button
                class="main-btn"
                onclick="calculate()"
            >
                ✦ 開始試算 ✦
            </button>

        </div>

        <!-- RIGHT -->

        <div class="card">

            <h2 class="section-title">
                試算結果 ✨
            </h2>

            <p class="section-desc">
                根據你的輸入資料，
                自動計算月收入與可貸額度。
            </p>

            <div class="result-box">
                <div class="result-title">
                    月收入
                </div>

                <div
                    class="result-text"
                    id="monthlyIncome"
                >
                    尚未計算
                </div>
            </div>

            <div class="result-box">
                <div class="result-title">
                    理論可貸額度
                </div>

                <div
                    class="result-text"
                    id="maxLoan"
                >
                    尚未計算
                </div>
            </div>

            <div class="result-box">
                <div class="result-title">
                    扣除已使用額度後
                </div>

                <div
                    class="result-text"
                    id="finalLoan"
                >
                    尚未計算
                </div>
            </div>

            <div class="big-result">

                <div class="big-result-label">
                    可貸款金額 ✦
                </div>

                <div
                    class="big-result-number"
                    id="bigResult"
                >
                    -- 萬
                </div>

            </div>

        </div>

    </div>

    <div class="footer">

        <div>
            ✦ Pastel Loan Calculator ✦
        </div>

        <div>
            Designed by <b>ChuChu</b> © 2026
        </div>

    </div>

</div>

<script>

function calculate(){

    const salary =
        parseFloat(
            document.getElementById("salary").value
        ) || 0;

    const stock =
        parseFloat(
            document.getElementById("stock").value
        ) || 0;

    const used =
        parseFloat(
            document.getElementById("used").value
        ) || 0;

    // 月收入公式
    const monthlyIncome =
        (salary / 12) +
        (stock * 0.015);

    // 理論可貸
    const maxLoan =
        monthlyIncome * 22;

    // 扣除額度
    const finalLoan =
        maxLoan - used;

    document.getElementById(
        "monthlyIncome"
    ).innerHTML =
        `
        (${salary} ÷ 12)
        + (${stock} × 1.5%)
        <br><br>
        ≈ ${monthlyIncome.toFixed(2)} 萬
        `;

    document.getElementById(
        "maxLoan"
    ).innerHTML =
        `
        ${monthlyIncome.toFixed(2)}
        × 22
        <br><br>
        ≈ ${maxLoan.toFixed(2)} 萬
        `;

    document.getElementById(
        "finalLoan"
    ).innerHTML =
        `
        ${maxLoan.toFixed(2)}
        - ${used}
        <br><br>
        ≈ ${finalLoan.toFixed(2)} 萬
        `;

    document.getElementById(
        "bigResult"
    ).innerHTML =
        `${finalLoan.toFixed(0)} 萬`;

}

</script>

</body>
</html>
