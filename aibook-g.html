<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 小說大綱產生器 2.0</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .selected {
            background-color: #6366f1 !important;
            color: white !important;
            border-color: #6366f1 !important;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4);
        }
    </style>
</head>
<body class="bg-slate-900 min-h-screen py-10 px-4 font-sans text-slate-100 selection:bg-indigo-500 selection:text-white">

    <div class="max-w-5xl mx-auto bg-slate-800 rounded-2xl shadow-2xl overflow-hidden border border-slate-700">
        <!-- 頂部 Banner -->
        <div class="bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-600 p-8 text-center text-white relative">
            <div class="absolute inset-0 bg-black/10 backdrop-blur-[1px]"></div>
            <div class="relative z-10">
                <h1 class="text-4xl font-extrabold tracking-wider drop-shadow-md">🔮 靈感原力：長篇小說大綱產生器 2.0</h1>
                <p class="text-indigo-100 mt-3 text-lg font-light">自訂世界觀與情感走向，一鍵解鎖兩千字架構藍圖</p>
            </div>
        </div>

        <div class="p-6 md:p-10 space-y-8">
            <!-- 自訂姓名區 -->
            <div class="bg-slate-850 p-6 rounded-xl border border-slate-700/50 shadow-inner grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">🧑‍頭號男主角姓名（選填）</label>
                    <input type="text" id="custom-male" placeholder="預設隨機姓名" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">👩‍頭號女主角姓名（選填）</label>
                    <input type="text" id="custom-female" placeholder="預設隨機姓名" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">🦹 主要反派/幕後黑手（選填）</label>
                    <input type="text" id="custom-vile" placeholder="預設隨機姓名" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-indigo-500">
                </div>
            </div>

            <!-- 選項區 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- 左側：背景與結局 -->
                <div class="space-y-6">
                    <div>
                        <h3 class="text-lg font-bold text-indigo-400 mb-3 flex items-center">🗺️ 1. 故事時空背景 <span class="text-xs text-slate-500 ml-2">(單選)</span></h3>
                        <div class="flex flex-wrap gap-25" id="style-group">
                            <button class="px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg hover:border-indigo-400 transition-all text-sm" onclick="selectOption('style', '古典修仙')">古典修仙</button>
                            <button class="px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg hover:border-indigo-400 transition-all text-sm" onclick="selectOption('style', '現代都市')">現代都市</button>
                            <button class="px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg hover:border-indigo-400 transition-all text-sm" onclick="selectOption('style', '東方宮廷')">東方宮廷</button>
                            <button class="px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg hover:border-indigo-400 transition-all text-sm" onclick="selectOption('style', '日式異世界')">日式異世界</button>
                            <button class="px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg hover:border-indigo-400 transition-all text-sm" onclick="selectOption('style', '西方史詩奇幻')">西方史詩奇幻</button>
                            <button class="px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg hover:border-indigo-400 transition-all text-sm" onclick="selectOption('style', '末日賽博龐克')">末日賽博龐克</button>
                        </div>
                    </div>

                    <div>
                        <h3 class="text-lg font-bold text-purple-400 mb-3 flex items-center">🏁 2. 最終結局走向 <span class="text-xs text-slate-500 ml-2">(單選)</span></h3>
                        <div class="flex flex-wrap gap-2" id="ending-group">
                            <button class="px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg hover:border-purple-400 transition-all text-sm" onclick="selectOption('ending', '大圓滿 (Happy Ending)')">大圓滿 (HE)</button>
                            <button class="px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg hover:border-purple-400 transition-all text-sm" onclick="selectOption('ending', '極致悲劇 (Bad Ending)')">極致悲劇 (BE)</button>
                            <button class="px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg hover:border-purple-400 transition-all text-sm" onclick="selectOption('ending', '開放式留白結局')">開放式留白結局</button>
                            <button class="px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg hover:border-purple-400 transition-all text-sm" onclick="selectOption('ending', '神級核心大反轉')">神級核心大反轉</button>
                        </div>
                    </div>
                </div>

                <!-- 右側：基調與元素 -->
                <div class="space-y-6">
                    <div>
                        <h3 class="text-lg font-bold text-pink-400 mb-3 flex items-center">💔 3. 情感糾葛基調 <span class="text-xs text-slate-500 ml-2">(單選)</span></h3>
                        <div class="flex flex-wrap gap-2" id="tone-group">
                            <button class="px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg hover:border-pink-400 transition-all text-sm" onclick="selectOption('tone', '剜心虐戀')">剜心虐戀</button>
                            <button class="px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg hover:border-pink-400 transition-all text-sm" onclick="selectOption('tone', '高甜無虐')">高甜無虐</button>
                            <button class="px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg hover:border-pink-400 transition-all text-sm" onclick="selectOption('tone', '相愛相殺')">相愛相殺</button>
                            <button class="px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg hover:border-pink-400 transition-all text-sm" onclick="selectOption('tone', '強強聯手')">強強聯手</button>
                            <button class="px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg hover:border-pink-400 transition-all text-sm" onclick="selectOption('tone', '宿命錯過')">宿命錯過</button>
                        </div>
                    </div>

                    <div>
                        <h3 class="text-lg font-bold text-emerald-400 mb-3 flex items-center">🧬 4. 核心故事元素 <span class="text-xs text-slate-500 ml-2">(可多選)</span></h3>
                        <div class="flex flex-wrap gap-2" id="elements-group">
                            <button class="px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg hover:border-emerald-400 transition-all text-sm" onclick="toggleElement(this, '重生復仇')">重生復仇</button>
                            <button class="px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg hover:border-emerald-400 transition-all text-sm" onclick="toggleElement(this, '跨時空穿梭')">跨時空穿梭</button>
                            <button class="px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg hover:border-emerald-400 transition-all text-sm" onclick="toggleElement(this, '降智系統真相')">系統真相</button>
                            <button class="px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg hover:border-emerald-400 transition-all text-sm" onclick="toggleElement(this, '硬核破案懸疑')">破案懸疑</button>
                            <button class="px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg hover:border-emerald-400 transition-all text-sm" onclick="toggleElement(this, '破鏡無法重圓')">破鏡無法重圓</button>
                            <button class="px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg hover:border-emerald-400 transition-all text-sm" onclick="toggleElement(this, '隱藏身分掉馬')">隱藏身分掉馬</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 生成按鈕 -->
            <div class="pt-4">
                <button onclick="generateOutline()" class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-bold py-4 px-6 rounded-xl shadow-lg transition-all transform hover:-translate-y-0.5 active:translate-y-0 text-xl tracking-widest cursor-pointer">
                    ✨ 啟動矩陣・演算兩千字史詩大綱
                </button>
            </div>

            <!-- 讀取畫面 -->
            <div id="loading" class="hidden text-center py-16">
                <div class="inline-block animate-spin rounded-full h-14 w-14 border-t-4 border-b-4 border-indigo-500 mb-4"></div>
                <p class="text-slate-400 text-lg animate-pulse tracking-wide">正在構築宏觀世界觀、注入角色靈魂、編織命運線...</p>
            </div>

            <!-- 結果呈現區 -->
            <div id="result-box" class="hidden space-y-4 border-t border-slate-700 pt-8 animate-fade-in">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <h2 class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-indigo-400" id="output-title">【故事大綱】</h2>
                    <div class="flex gap-2 w-full sm:w-auto">
                        <span id="word-count" class="bg-indigo-950/80 text-indigo-400 border border-indigo-800 text-sm font-semibold px-4 py-1.5 rounded-lg flex items-center">字數計量中</span>
                        <button onclick="copyToClipboard()" class="bg-slate-700 hover:bg-slate-600 text-white text-sm px-4 py-1.5 rounded-lg border border-slate-600 transition-colors cursor-pointer">📋 複製大綱</button>
                    </div>
                </div>
                
                <!-- 大綱本文 -->
                <div id="output-content" class="text-slate-300 leading-relaxed whitespace-pre-line bg-slate-900/60 p-6 md:p-8 rounded-xl border border-slate-700/80 shadow-inner overflow-y-auto max-h-[700px] text-base space-y-4">
                    <!-- 內文由 JS 生成 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 邏輯引擎 -->
    <script>
        let selections = { style: '', tone: '', ending: '', elements: [] };

        function selectOption(type, value) {
            const container = document.getElementById(`${type}-group`);
            const buttons = container.getElementsByTagName('button');
            for (let btn of buttons) {
                btn.classList.remove('selected');
                if (btn.innerText.includes(value) || value.includes(btn.innerText)) {
                    btn.classList.add('selected');
                }
            }
            selections[type] = value;
        }

        function toggleElement(btn, value) {
            btn.classList.toggle('selected');
            if (selections.elements.includes(value)) {
                selections.elements = selections.elements.filter(item => item !== value);
            } else {
                selections.elements.push(value);
            }
        }

        function generateOutline() {
            if (!selections.style || !selections.tone || !selections.ending) {
                alert("🔮 提示：請先選取「故事背景」、「結局走向」與「情感基調」再進行演算喔！");
                return;
            }

            document.getElementById('result-box').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');

            setTimeout(() => {
                const style = selections.style;
                const tone = selections.tone;
                const ending = selections.ending;
                const elems = selections.elements.length > 0 ? selections.elements.join(' × ') : '命運絲線';

                // 名字池
                const defaultNames = {
                    '古典修仙': {m: '墨蒼溟', f: '葉琉璃', v: '太上長老·玄霄'},
                    '現代都市': {m: '厲夜寒', f: '白惜弱', v: '跨國財閥·霍天擎'},
                    '東方宮廷': {m: '容瑕', f: '謝長歌', v: '攝政王·宇文拓'},
                    '日式異世界': {m: '萊恩·克洛斯', f: '希爾薇婭', v: '墮落災厄·魔皇'},
                    '西方史詩奇幻': {m: '雷恩·奧古斯都', f: '艾莉西亞', v: '不朽巫妖·卡爾薩斯'},
                    '末日賽博龐克': {m: 'V-零號', f: '霓虹', v: '荒坂義體巨頭'}
                };

                const mName = document.getElementById('custom-male').value.trim() || defaultNames[style].m;
                const fName = document.getElementById('custom-female').value.trim() || defaultNames[style].f;
                const vName = document.getElementById('custom-vile').value.trim() || defaultNames[style].v;

                let title = `《${style}檔案：在${tone}的深淵裡，與${elems}奔向${ending}》`;
                
                // 龐大文本庫拼接（模擬 2000 字細緻大綱）
                let txt = `### 🌌 一、 世界觀架構與世界底層邏輯\n`;
                txt += `故事發生在一個將【${style}】美學發揮到極致的巨型舞台。這裡的生存法則極其殘酷，核心驅動力在於對【${elems}】這股神祕力量的爭奪。在這個世界中，高層統治者（如${vName}）掌控了絕對的話語權，而普通個體或底層階級只能在夾縫中求生存。\n`;
                txt += `此處的世界觀不僅是背景，更是推動【${tone}】情感的核心引擎。環境的冰冷與制度的沉重，讓${mName}與${fName}之間的每一次接觸、每一場抉擇都顯得無比昂貴與驚心動魄。空氣中瀰漫著陰謀與宿命的味道，從序幕開始，一場涉及整個世界底牌的權力洗牌就已經悄然展開。\n\n`;

                txt += `### 👥 二、 核心核心人物矩陣與命運鎖鏈\n`;
                txt += `**■ 男主角：${mName}**\n`;
                txt += `擁有頂級實力與極深城府的上位者或潛伏者。他背負著滅族之仇或逆天改命的終極任務。在冷酷殘忍的外表下，隱藏著對世界底層規律的絕望。他的性格缺陷在於極度的「不信任感」，直到遇見${fName}，這顆冰封的心才被強行撕開一道裂痕。但在這世界中，動心往往等同於有了軟肋。\n\n`;
                txt += `**■ 女主角：${fName}**\n`;
                txt += `靈魂具有極高純度與破局關鍵的女性。她可能看似柔弱，但內心的韌性與精神內核遠超常人。她不甘於淪為【${elems}】巨輪下的祭品，在直面命運的多次絞殺時，她選擇用最決絕、最智慧的方式迎擊。她是${mName}生命中的唯一變數，也是刺破黑暗的一道極光。\n\n`;
                txt += `**■ 核心反派/命運推手：${vName}**\n`;
                txt else `龐大體制或古老禁忌的實體化身。他沒有絕對的善惡，只有絕對的利益與對權力的極致貪婪。他布下了跨越百年的大局，將男女主角玩弄於股掌之間，是造成【${tone}】衝突以及最終迎來【${ending}】的關鍵骨牌。\n\n`;

                txt += `### 📜 三、 五幕式長篇正文劇情核心大綱\n\n`;
                
                txt += `#### 🎬 【第一幕：宿命漩渦的起始點（約350字）】\n`;
                txt += `序幕拉開，${fName}在一次關於【${elems}】的突發變故中，意外撞破了${vName}的驚天陰謀。在逃亡過程中，她與正在執行祕密任務、隱藏身分的${mName}不期而遇。兩人的初次見面伴隨著極高的張力與致命的試探。${mName}本欲將其作為棋子或直接抹除，卻被${fName}身上展現出的特殊特質所震撼。在【${style}】特有的灰暗色調與生存高壓下，兩人被迫達成了利益綁定的短暫同盟。此時，命運的齒輪開始瘋狂加速，兩人在並肩逃過第一波追殺後，心防各自漏出了一拍，卻不知這正是萬劫不復的深淵起點。\n\n`;

                txt += `#### 🎬 【第二幕：情愫裂變與殘酷真相的剝離（約450字）】\n`;
                txt += `隨著劇情的深度推進，兩人深入到了世界的核心地帶。在無數次生死邊緣的拉扯中，【${tone}】的特質開始瘋狂肆虐。如果這是虐戀，兩人會在相愛中發現彼此隔著血海深仇；如果是強強聯手，則是各自戴著假面在黑夜中熱烈交鋒。${mName}數次在生死關頭暴露出他唯一的溫柔，而${fName}也用自己的智慧幫助${mName}突破瓶頸。然而，就在感情達到沸點時，${vName}冷酷地揭開了最殘酷的真相：原來${fName}的靈魂（或身分）本身就是啟動【${elems}】的最終祭品，而${mName}最初的接近，竟然也夾雜著不可告人的目的。信任在一瞬間化為齏粉。\n\n`;

                txt += `#### 🎬 【第三幕：絕望高潮與命運的決裂一擊（約500字）】\n`;
                txt += `這是整部小說最狂暴的情感與劇情高潮點。所有隱瞞的祕密全數曝光，世界底層的矛盾全面暴走。在${vName}的逼迫與整個世界的冷眼旁觀下，${mName}與${fName}迎來了最痛苦的決裂。在漫天大雨（或賽博霓虹、修仙雷劫）中，兩人刀劍相向。${fName}為了證明自己的道，或者為了保護內心深處的愛，做出了震驚全場的瘋狂舉動——她親手震碎了自己的本源（或自願墜入深淵）；而${mName}在目睹這一幕時，內心的理智瞬間崩潰，他的力量在極致的痛苦中瘋狂覺醒，甚至不惜祭出禁忌之術，將整個【${style}】世界的半數勢力生生葬送。血色染紅了蒼穹。\n\n`;

                txt += `#### 🎬 【第四幕：深淵潛伏與絕地逆襲的密謀（約400字）】\n`;
                txt += `大戰過後，世界陷入了漫長的死寂。${mName}化身為徹頭徹尾的冷血暴君或復仇幽靈，在暗中發了瘋似地尋找挽回的方法，他瘋狂清算著${vName}的所有羽翼，讓所有人為當年的代價陪葬。而另一邊，墜入深淵的${fName}並未真正死去，她在死亡邊緣參透了【${elems}】的終極奧義，完成了靈魂的浴火重生。雖然身處不同的空間或陣營，但兩人透過命運的絲線，依然在暗中進行著無言的默契配合。隨著最終神廟/核心主機的開啟，決戰的號角再度吹響，他們將在因果的終點迎來最終審判。\n\n`;

                txt += `#### 🎬 【第五幕：終局之戰與命運的歸宿——${ending}（約300字）】\n`;
                
                if(ending.includes('HE')) {
                    txt += `在最終的因果聖殿中，${mName}與${fName}實現了真正的靈魂共鳴。他們徹底看穿了${vName}的虛妄，聯手使出驚世駭俗的終極底牌，將束縛了這個世界數千年的命運矩陣徹底擊碎！【${elems}】的力量化為了漫天反哺世界的雨露。經歷了【${tone}】的萬般折磨，兩人的手終於穿越了血與火，死死扣在了一起。他們放下了所有的權利與仇恨，隱姓埋名，消失在重獲新生的晨曦之中。長風萬里，此生不負。\n\n`;
                } else if(ending.includes('BE')) {
                    txt += `命運終究是一場無法擺脫的黑色幽默。雖然${mName}拼盡全力重創了${vName}，但世界底層邏輯的運轉必須有人獻祭。在最後一刻，${fName}展現了最淒美的微笑，她選擇用自己的身軀封印了即將崩塌的【${elems}】核心。在${mName}撕心裂肺的怒吼聲中，她化為了無數星光，消散在冷冽的風中。多年後，${mName}孤身一人登上了世界的權力頂峰，他受萬人景仰，卻活成了一座沒有靈魂的冰冷雕像。每當大雪紛飛，他總會握著那枚冰冷的信物，獨自走向無終點的黑夜。\n\n`;
                } else if(ending.includes('留白')) {
                    txt += `最後的戰場上，核心能量全面失控，時空發生了無法逆轉的坍塌。${mName}、${fName}與宿敵${vName}一同被捲入了無盡的黑洞與虛無之中。當光芒散去，世界重歸平靜，但兩人的身影卻徹底消失了。多年以後，江湖上、都市的街角裡，流傳著各種關於他們的傳說。有人說曾看過一位斷臂的劍客身旁跟著一位白衣女子；有人說在平行時空裡他們才剛相遇。故事在最懸疑、最唯美的那一瞬間戛然而止，留下讀者在無盡的遐想中品味這份深刻的餘韻。\n\n`;
                } else {
                    txt += `在決戰的最後一秒，劇情發生了驚天大逆轉！原來，一直引導著兩人的【${elems}】系統，才是真正的最終Boss；而那個看似無惡不作的${vName}，其實是上一代為了保護世界而化身惡魔的守護者。${mName}與${fName}在瞬間得知了世界的真相——原來他們所有人，都只是高維度生物筆下的一段程式碼（或一場夢境）。面對這荒誕的真相，兩人在最後關頭相視一笑，做出了最瘋狂的決定：引爆自身全部的靈魂，徹底抹除這個世界在宇宙中的坐標。畫面歸於純白，震撼靈魂。\n\n`;
                }

                txt += `### 💡 四、 衍生寫作指南與商業價值分析\n`;
                txt += `1. **核心爽點與賣點**：本大綱完美融合了【${style}】的獨特氛圍與【${elems}】的創新設定。劇情節奏跌宕起伏，極具網文的吸睛特質。\n`;
                txt += `2. **人物情緒張力**：在處理【${tone}】情節時，切忌無病呻吟。必須將角色的痛苦與大背景的逼迫結合（如：為了拯救大局不得不親手封印愛人），這種「被迫的決裂」最能引發讀者強烈的共鳴與淚點。\n`;
                txt += `3. **場景視覺錘**：建議在小說中設定3個核心視覺意象（如：不滅的黑火、崩潰的霓虹大樓、染血的玉珮）。每當情感發生重大轉折時就讓該意象出現，能極大加深讀者的記憶點。`;

                // 隨機動態擴充，生成長篇細分章節，確保穩穩撐出長篇厚重感
                let chapterGuide = `\n\n### 🗺️ 五、 全書實戰章節細分指引（20章黃金結構）\n`;
                for(let i=1; i<=20; i++) {
                    let focus = "";
                    if(i<=4) focus = "【開局鋪墊】著重描寫男女主角在時空背景下的各自困境與危局，鋪陳核心元素。";
                    else if(i<=8) focus = "【情感升溫】兩人被迫聯手，在世界暗流中碰撞出強烈火花，反派陰謀初顯。";
                    else if(i<=12) focus = "【核心轉折】驚天秘密引爆，信任崩塌，迎來全書最關鍵的決裂與痛感巔峰。";
                    else if(i<=16) focus = "【觸底反彈】主角在深淵中各自覺醒、蛻變，蓄積向宿命與反派復仇的終極力量。";
                    else focus = "【終局收線】雙方底牌盡出，世界格局全面洗牌，迎來震撼人心的終極結局。";
                    
                    chapterGuide += `*   **第 ${i} 章核心情節**：圍繞【${tone}】與【${elems}】展開。${focus}（預估本章寫作字數：3500字）\n`;
                }
                txt += chapterGuide;

                // 渲染與計算
                document.getElementById('output-title').innerText = title;
                document.getElementById('output-content').innerHTML = txt.replace(/\n/g, '<br>');
                document.getElementById('word-count').innerText = `計量：約 ${txt.length} 字`;
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('result-box').classList.remove('hidden');
                document.getElementById('result-box').scrollIntoView({ behavior: 'smooth' });
            }, 1800);
        }

        function copyToClipboard() {
            const text = document.getElementById('output-content').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("📋 大綱已成功複製到剪貼簿！可以自由貼到 Word 或 Notion 囉！");
            }).catch(err => {
                alert("複製失敗，請手動全選複製。");
            });
        }
    </script>
</body>
